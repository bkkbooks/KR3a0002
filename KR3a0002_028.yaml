body:
  text: 宥坐篇第二十八孔子觀於魯桓公之廟有欹器焉孔子問於守廟者曰此為何器守廟者曰此蓋為宥坐之器孔子曰吾聞宥坐之器者虛則欹中則正滿則覆孔子顧謂弟子曰注水焉弟子挹水而注之中而正滿而覆虛而欹孔子喟然而歎曰吁惡有滿而不覆者哉子路曰敢問持滿有道乎孔子曰聰明聖知守之以愚功被天下守之以讓勇力撫世守之以怯富有四海守之以謙此所謂挹而損之之道也孔子為魯攝相朝七日而誅少正卯門人進問曰夫少正卯魯之聞人也夫子為政而始誅之得無失乎孔子曰居吾語汝其故人有惡者五而盜竊不與焉一曰心達而險二曰行辟而堅三曰言僞而辨四曰記醜而博五曰順非而澤此五者有一於人則不得免於君子之誅而少正卯兼有之故居處足以聚徒成群言談足以飾邪營衆強足以反是獨立此小人之桀雄也不可不誅也是以湯誅尹諧文王誅潘止周公誅管叔太公誅華仕管仲誅付里乙子産誅鄧析史付此七子者皆異世同心不可不誅也詩曰憂心悄悄慍于群小小人成群斯足憂矣孔子為魯司寇有父子訟者孔子拘之三月不別也其父請止孔子舍之季孫聞之不說曰是老也欺豫語豫曰為國家必以孝今殺一人以戮不孝又舍之冉子以告孔子慨然歎曰嗚呼上失之下殺之其可乎不教其民而聽其訟殺不辜也三軍大敗不可斬也獄犴不治不可刑也罪不在民故也今嫚令謹誅賊也生也有時斂也無時暴也不教而責成功虐也已此三者然後刑可即也書曰義刑義殺勿庸以即豫維曰未有順事言先教也故先王既陳之以道上先服之若不可尚賢以綦之若不可廢不能以單之綦三年而百姓從風矣躬行不從然後俟之以刑則民知罪矣詩曰尹氏大師維周之氐秉國之均四方是維天子是庳卑民不迷是以威厲而不試刑錯而不用此之謂也今之世則不然亂其教繁其刑其民迷惑而墮焉則從而制之是以刑彌繁而邪不勝三尺之岸而虛車不能登也百仞之山任負車登焉何則陵遲故也數仞之牆而民不踰也百仞之山而豎子馮而游焉陵遲故也今夫世之陵遲亦久矣而能使民勿踰乎詩曰周道如砥其直如矢君子所履小人所視眷焉顧之潸焉出涕豈不哀哉詩曰瞻彼日月悠悠我思道之云遠曷云能來子曰伊稽首不其有來乎孔子觀於東流之水子貢問於孔子曰君子之所以見大水必觀焉者是何也孔子曰夫水大遍與諸生而無為也似德其流也埤下裾拘必循其理似義其洸洸乎不淈盡似道若有決行之其應佚若聲響其赴百仞之谷不懼似勇主量必平似法盈不求概似正淖約微達似察以出以入以就鮮潔似善化其萬折也必東似志是故君子見大水必觀焉孔子曰吾有恥也吾有鄙也吾有殆也幼不能強學老無以教之吾恥之去其故鄉事君而達卒遇故人曾無舊言吾鄙之與小人處者吾殆之也孔子曰如垤而進吾與之如丘而止吾已矣今學曾未如疣贅則具然欲為人師孔子南適楚厄於陳蔡之閒七日不火食藜羹不糂弟子皆有飢色子路進問之曰由聞之為善者天報之以福為不善者天報之以禍今夫子纍德積義懷美行之日久矣奚居之隱也孔子曰由不識吾語汝汝以知者為必用邪王子比干不見剖心乎女以忠者為必用邪關龍逄不見刑乎女以諫者為必用邪吳子胥不磔姑蘇東門外乎夫遇不遇者時也賢不肖者材也君子博學深謀不遇時者多矣由是觀之不遇世者衆矣何獨丘也哉且夫芷蘭生於深林非以無人而不芳君子之學非為通也為窮而不困憂而意不衰也知禍福終始而心不惑也夫賢不肖者材也為不為者人也遇不遇者時也死生者命也今有其人不遇其時雖賢其能行乎苟遇其時何難之有故君子博學深謀修身端行以俟其時孔子曰由居吾語汝昔晉公子重耳霸心生於曹越王勾踐霸心生於會稽齊桓公小白霸心生於莒故居不隱者思不遠身不佚者志不廣女庸安知吾不得之桑落之下乎哉子貢觀於魯廟之北堂出而問於孔子曰鄉者賜觀於太廟之北堂吾亦未輟還復瞻被北蓋皆𢇍被有說邪匠過絶邪孔子曰太廟之堂亦嘗有說官致良工因麗節文非無良材也蓋曰貴文也
