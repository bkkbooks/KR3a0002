body:
  text: 天論篇第十七天行有常不為堯存不為桀亡應之以理則吉應之以亂則凶彊本而節用則天不能貧養備而動時則天不能病循道而不貣則天不能禍故水旱不能使之飢渴寒暑不能使之疾祅怪不能使之凶本荒而用侈則天不能使之富養略而動罕則天不能使之全倍道而妄行則天不能使之吉故水旱未至而飢寒暑未薄而疾祅怪未生而凶受時與治世同而殃禍與治世異不可以怨天其道然也故明於天人之分則可謂至人矣不為而成不求而得夫是之謂天職如是者雖深其人不加慮焉雖大不加能焉雖精不加察焉夫是之謂不與天爭職天有其時地有其財人有其治夫是之謂能參舍其所以參而願其所參則惑矣列星隨旋日月遞照四時代御陰陽大化風雨博施萬物各得其和以生各得其養以成不見其事而見其功夫是之謂神皆知其所以成莫知其無形夫是之謂天功唯聖人為不求知天天職既立天功既成形具而神生好惡喜怒哀樂臧焉夫是之謂天情耳目鼻口形能各有接而不相能也夫是之謂天官心居中虛以治五官夫是之謂天君財非其類以養其類夫是之謂天養順其類者謂之福逆其類者謂之禍夫是之謂天政暗其天君亂其天官棄其天養逆其天政背其天情以喪天功夫是之謂大凶聖人清其天君正其天官備其天養順其天政養其天情以全其天功如是則知其所為知其所不為矣則天地官而萬物役矣其行曲治其養曲適其生不傷夫是之謂知天故大巧在所不為大知在所不慮所志於天者已其見象之可以期者矣所志於地者已其見宜之可以息者矣所志於四時者已其見數之可以事者矣所志於陰陽者已其見和之可以治者矣官人守天而自為守道也治亂天邪曰日月星辰瑞歷是禹桀之所同也禹以治桀以亂治亂非天也時邪曰繁啓蕃長於春夏畜積收臧於秋冬是又禹桀之所同也禹以治桀以亂治亂非時也地邪曰得地則生失地則死是又禹桀之所同也禹以治桀以亂治亂非地也詩曰天作高山大王荒之彼作矣文王康之此之謂也天不為人之惡寒也輟冬地不為人之惡遼遠也輟廣君子不為小人之胸胸也輟行天有常道矣地有常數矣君子有常體矣君子道其常而小人計其功詩曰禮義之不愆何恤人之言兮此之謂也楚王後車千乘非知也君子啜菽飲水非愚也是節然也若夫志意修德行厚知慮明生於今而志乎古則是其在我者也故君子慕其在己者而不慕其在天者小人錯其在己者而慕其在天者君子敬其在己者而不慕其在天者是以日進也小人錯其在己者而慕其在天者是以日退也故君子之所以日進與小人之所以日退一也君子小人之所以相縣者在此耳星隊木鳴國人皆恐曰是何也曰無何也是天地之變陰陽之化物之罕至者也怪之可也而畏之非也夫日月之有食風雨之不時怪星之黨見是無世而不常有之上明而政平則是雖並世起無傷也上暗而政險則是雖無一至者無益也夫星之隊木之鳴是天地之變陰陽之化物之罕至者也怪之可也而畏之非也物之已至者人祅則可畏也楛耕傷稼耘耨失薉政險失民田薉稼惡糴貴民飢道路有死人夫是之謂人祅政令不明舉錯不時本事不理夫是之謂人祅勉力不時則牛馬相生寇難並至夫是之謂人祅也祅是生於亂三者錯無安國矣其說甚爾其菑甚慘可怪也而不可畏也傳曰萬物之怪書不說也無用之辨不急之察棄而不治也若夫君臣之義父子之親夫婦之別則日切瑳而不舍也雩而雨何也曰無他也猶不雩而雨也日月食而救之天旱而雩卜筮然後決大事非以為得求也以文之也故君子以為文而百姓以為神以為文則吉以為神則凶也在天者莫明於日月在地者莫明於水火在物者莫明於珠玉在人者莫明於禮義故日月不高則光輝不赫水火不積則輝潤不博珠玉不暏乎外則王公不以為寶禮義不加於國家則功名不白故人之命在天國之命在禮君人者隆禮尊賢而王重法愛民而霸好利多詐而危權謀傾覆幽險而盡亡矣大天而思之孰與物畜而裁之從天而頌之孰與制天命而用之望時而待之孰與應時而使之因物而多之孰與騁能而化之思物而物之孰與理物而勿失之也願於物之所以生孰與有物之所以成故錯人而思天則失萬物之情百王之無變足以為道貫一廢一起應之以貫理貫不亂不知貫不知應變貫之大體未嘗亡也亂生其差治盡其詳故道之所善中則可從畸則不可為匿則大惑行水者表深表不明則陷治民者表道表不明則亂禮者表也非禮昏世也昏世大亂也故道無不明外內異表隱顯有常民陷乃去萬物為道一偏一物為萬物一偏愚者為一物一偏而自以為知道無知也慎子有見於後無見於先老子有見於詘無見於信墨子有見於齊無見於畸宋子有見於少無見於多有後而無先則群衆無門有詘而無信則貴賤不分有齊而無畸則政令不施有少而無多則群衆不化書曰無有作好遵王之道無有作惡遵王之路此之謂也
