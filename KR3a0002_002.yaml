body:
  text: 修身篇第二見善修然必有以自存也見不善愀然必以自省也善在身介然必以自好也不善在身菑然必以自惡也故非我而當者吾師也是我而當者吾友也諂諛我者吾賊也故君子隆師而親友以致惡其賊好善無猒受諫而能戒雖欲無進得乎哉小人反是致亂而惡人之非己也致不肖而欲人之賢己也心如虎狼行如禽獸而又惡人之賊己也諂諛者親諫爭者疏修正為笑至忠為賊雖欲無滅亡得乎哉詩曰潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依此之謂也扁善之度以治氣養生則後彭祖以修身自強則名配堯禹宜於時通利以處窮禮信是也凡用血氣志意知慮由禮則治達不由禮則勃亂提僈食飲衣服居處動靜由禮則和節不由禮則觸陷生疾容貌態度進退趨行由禮則雅不由禮則夷固僻違庸衆而野故人無禮則不生事無禮則不成國家無禮則不寧詩云禮儀卒度笑語卒獲此之謂也以善先人者謂之教以善和人者謂之順以不善先人者謂之諂以不善和人者謂之諛是是非非謂之智非是是非謂之愚傷良曰讒害良曰賊是謂是非謂非曰直竊貨曰盜匿行曰詐易言曰誕趣舍無定謂之無常保利棄義謂之至賊多聞曰博少聞曰淺多見曰間少見曰陋難進曰偍易忘曰漏少而理曰治多而亂曰耗治氣養心之術血氣剛強則柔之以調和智慮漸深則一之以易良勇膽猛戾則輔之以道順齊給便利則節之以動止狹隘褊小則廓之以廣大卑溼重遲貪利則抗之以高志庸衆駑散則劫之以師友怠慢僄棄則照之以禍災愚款端愨則合之以禮樂通之以思索凡治氣養心之術莫徑由禮莫要得師莫神一好夫是之謂治氣養心之術也志意修則驕富貴道義重則輕王公內省而外物輕矣傳曰君子役物小人役於物此之謂也身勞而心安為之利少而義多為之事亂君而通不如事窮君而順焉故良農不為水旱不耕良賈不為折閲不市士君子不為貧窮怠乎道體恭敬而心忠信術禮義而情愛人橫行天下雖困四夷人莫不貴勞苦之事則爭先饒樂之事則能讓端愨誠信拘守而詳橫行天下雖困四夷人莫不任體倨固而心藝詐術順墨而精雜汙橫行天下雖達四方人莫不賤勞苦之事則偷儒轉脫饒樂之事則佞兌而不曲辟違而不愨程役而不録橫行天下雖達四方人莫不棄行而供冀非漬淖也行而俯項非擊戾也偶視而先俯非恐懼也然夫士欲獨修其身不以得罪於比俗之人也夫驥一日而千里駑馬十駕則亦及之矣將以窮無窮逐無極與其折骨絶筋終身不可以相及也將有所止之則千里雖遠亦或遲或速或先或後耳胡為乎其不可以相及也不識步道者將以窮無窮逐無極與意亦有所止之與夫堅白同異有厚無厚之察非不察也然而君子不辨止之也倚魁之行非不難也然而君子不行止之也故學曰遲彼止而待我我行而就之則亦或遲或速或先或後胡為乎其不可以同至也故蹞步而不休跛鱉千里纍土而不輟丘山崇成厭其源開其瀆江河可竭一進一退一左一右六驥不致彼人之才性之相縣也豈若跛鱉之與六驥足哉然而跛鱉致之六驥不致是無他故焉或為之或不為爾道雖邇不行不至事雖小不為不成其為人也多暇日者其出人不遠矣好法而行士也篤志而體君子也齊明而不竭聖人也人無法則倀倀然有法而無志其義則渠渠然依乎法而又深其類然後溫溫然禮者所以正身也師者所以正禮也無禮何以正身無師吾安知禮之為是也禮然而然則是情安禮也師云而云則是知若師也情安禮知若師則是聖人也故非禮是無法也非師是無師也不是師法而好自用譬之是猶以盲辨色以聾辨聲也舍亂妄無為也故學也者法禮也夫師以身為正儀而貴自安者也詩云不識不知順帝之則此之謂也端愨順弟則可謂善少者矣加好學遜敏焉則有鈞無上可以為君子者矣偷儒憚事無廉恥而嗜乎飲食則可謂惡少者矣加愓悍而不順險賊而不弟焉則可謂不詳少者矣雖陷刑戮可也老老而壯者歸焉不窮窮而通者積焉行乎冥冥而施乎無報而賢不肖一焉人有此三行雖有大過天其不遂乎君子之求利也略其遠害也早其避辱也懼其行道理也勇君子貧窮而志廣富貴而體恭安燕而血氣不惰勞倦而容貌不枯怒不過奪喜不過豫君子貧窮而志廣隆仁也富貴而體恭殺藝也安燕而血氣不惰柬理也勞倦而容貌不枯好文也怒不過奪喜不過豫是法勝私也書曰無有作好遵王之道無有作惡遵王之路此言君子之能以公義勝私欲也
