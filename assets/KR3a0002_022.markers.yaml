  - {type: variant, offset: 129, length: 235, content: 利而為謂之事正義而為謂之行所以知之在人者謂之知知有所合謂之智智所以能之在人者謂之能能有所合謂之能性傷謂之病節遇謂之命是散名之在人者也是後王之成名也故王者之制名名定而實辨道行而志通則慎率民而一焉故析辭擅作名以亂正名使民疑惑人多辨訟則謂之大姦其罪猶為符節度量之罪也故其民莫敢託為奇辭以亂正名故其民愨愨則易使易使則功其民莫敢託為奇辭以亂正名故壹於道法而謹於循令矣如是則其迹長矣迹長功成治之極也是謹於守名約之功也今聖王沒名守慢奇辭起名實亂是非之形不明則雖守法之吏誦數之儒亦皆亂若, SBCK: 目録上言又}
