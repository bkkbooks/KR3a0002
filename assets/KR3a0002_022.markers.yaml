  - {type: variant, offset: 1809, length: 0, content: '', WYG: 萬物錯雜膠膠訰訰然}
  - {type: variant, offset: 1810, length: 1, content: 待, WYG: 衆人不能循其事若天之嗣其事不可識嗣繼也言聖人如天之繼嗣衆人不能識其意百姓淺然不識其鄰鄰近也百姓淺見不能識其所近况能識其深乎所謂日用而不知者也若此則可謂大聖矣哀公曰善魯哀公問舜冠於孔子孔子不對哀公不問舜德徒問其冠故不對也三問不對哀公曰}
  - {type: variant, offset: 1812, length: 1, content: 欲, WYG: 人問舜冠於子何以不言也孔子對曰古之王者有務而拘領者矣其政好生而惡殺焉務讀為冒拘與句同曲領也言雖冠衣拙朴而行仁政也尚書大傳曰古之人衣上有冒而句領者鄭康成注云言在德不在服也古之人三皇時也冒覆項也句領繞頸也禮正服方領也是以鳳在列樹麟在郊野烏鵲之巢可俯而窺也君不此問而問舜冠所以不對也魯哀公問於孔子曰寡人生於深宫之中長於婦人之手寡人未嘗知哀也未嘗知憂也未嘗知勞也未嘗知懼也未嘗知危也孔子曰君之所問聖君之問也丘小人也何足以知之美大其問故謙不敢對也曰非吾子無所聞之也孔子曰君入廟門而右登自胙階仰視榱棟俛見几筵其器存其人亡君以此思哀則哀將焉不至矣謂祭祀時也胙與阼同榱亦椽也哀將焉不至言必至也君昧爽而櫛冠昧闇也爽明也謂初曉尚暗之時平明而聽朝一物不應亂之端也君以此思憂則憂將焉不至矣君平明而聽朝日昃而退諸侯之子孫必有在君之末庭者君以此思勞則勞將焉不至矣諸侯之子孫謂奔亡至魯而仕者自平明至日昃在末庭而修臣禮君若思其勞則勞可知也以喻哀公亦諸侯之子孫不戒懼修德亦將有此奔亡之勞也君出魯之四門以望魯四郊亡國之虚則必有數蓋焉虛讀為墟有數蓋焉猶言蓋有數焉倒言之耳新序作亡國之墟列必有數矣君以此思懼則懼將焉不至矣且丘聞之君者舟也庶人者水也水則載舟水則覆舟君以此思危則危將焉不至矣魯哀公問於孔子曰紳委章甫有益於仁乎紳大帶也委委貌周之冠也章甫殷冠也鄭注儀禮云委安也所以安正容貌章表明也殷質言所以表明大夫也孔子蹴然曰君號然也莊子音義崔譔云蹴然變色之貌號讀為胡聲相近字遂誤耳家語作君胡然也資衰苴杖者不聽樂非耳不能聞也服使然也資與齊同苴竹杖也苴謂蒼白色自死之竹也黼衣黻裳者不茹葷非口不能味也服使然也黼衣黻裳祭服也白與黒為黼黑與青為黻禮祭致齊不茹葷非不能味謂非不能知味也鄭注周禮司服云𤣥冕者衣裳刺繡而已且丘聞之好肆不守折長者不為市竊其有益與其無益君其知之矣好喜也言喜於市肆之人不使所守貨財折耗而長者亦不能為此市井盗􅀼之事長者不為市而販者不為非也家語王肅注云言市肆弗能為廉好肆則不折也人為市佔之行則不守折人為長者之行則亦不為市買之事竊宜為察察其有益與其無益以竊字屬下句魯哀公問於孔子曰請問取人問取人之術也孔子對曰無取健健羡之人無取詌未詳家語作無取鉗王肅云謂妄對不謹誠者或曰捷給鉗人之口}
