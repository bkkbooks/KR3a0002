  - {type: variant, offset: 1453, length: 491, content: 也辭讓之節得矣長少之理順矣忌諱不稱祅辭不出以仁心說以學心聽以公心辨不動乎眾人之非譽不冶觀者之耳目不賂貴者之權埶不利傳辟者之辭故能處道而不貳咄而不奪利而不流貴公正而賤鄙爭是士君子之辨說也詩曰長夜漫兮永思騫兮大古之不慢兮禮義之不愆兮何恤人之言兮此之謂也君子之言涉然而精俛然而類差差然而齊彼正其名當其辭以務白其志義者也彼名辭也者志義之使也足以相通則舍之矣苟之姦也故名之足以指實辭足以見極則舍之矣外是者謂之訒是君子之所棄而愚者拾以為己實故愚者之言芴然而粗嘖然而不類誻誻然而沸彼誘其名眩其辭而無深於其志義者也故窮藉而無極甚勞而無功貪而無名故知者之言也慮之易知也行之易安也持之易立也成則必得其所好而不遇其所惡焉而愚者反是詩曰為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也凡語治而待去欲者無以道欲而困於有欲者也凡語治而待寡欲者無以節欲而困於欲多者也有欲無欲異類也生死也性之具也非治亂也欲之多寡異類也情之數也非治亂也欲不待可得而求者從所可欲不待可得所受乎天也求者從所可所受乎心也所受乎天之一欲制於所受乎心之多求固難類所受乎天也人之所欲生甚矣人之所惡死甚矣然而人有從生成死者非不欲生而欲死也, SBCK: ''}
