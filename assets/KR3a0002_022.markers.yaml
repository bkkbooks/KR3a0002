  - {type: variant, offset: 1670, length: 0, content: '', WYG: 君子比德焉温潤而澤仁也鄭康成云色柔温潤似仁縝栗而理知也鄭云栗堅貌也理有文理似智者處事堅固又有文理堅剛而不屈義也似義者剛直不回也廉而不劌行也劌傷也雖有廉稜而不傷物似有徳行者不傷害人折而不撓勇也雖摧折而不撓屈似勇者也瑕適並見情也瑕玉之病也適玉之美澤調適之謂也瑕適並見似不匿其情者也禮記曰瑕不掩瑜瑜不掩瑕忠也扣之其聲清揚而逺聞其止輟然辭也扣與叩同似有辭辨言發言則人樂聽}
