  - {type: variant, offset: 1609, length: 2, content: 彼名, WYG: 曾子曰無内人之疏而外人之親無禁}
  - {type: variant, offset: 1613, length: 0, content: '', WYG: 内人之疏外人之親謂以疏為内以親為外家語曰不比於親而比於疏}
  - {type: punctuation, offset: 1614, content: 、, id: KR3a0002_tls_022-bkkpn316}
  - {type: 'tls:seg', offset: 1614, content: '', id: KR3a0002_tls_022-8a.10}
  - {type: variant, offset: 1614, length: 0, content: '', WYG: 不亦逺乎韓詩外傳作無内疏而無外親也無身不善而怨人無刑已至而呼天内人之疏而外人之親不亦逺乎謂失之逺矣身不善而怨人不亦反乎反謂乖悖刑已至而呼天不亦晩乎詩曰㳙㳙源水不雝不塞轂已破碎乃大其輻事以敗矣乃重太息其云益乎源水水之泉源也雝讀為壅大其輻謂壯大其輻也重太息嘆嗟之甚也三者皆言不愼其初追悔無及也曾子病曾元持足曾子曰元}
  - {type: page-break, offset: 1614, content: '', id: KR3a0002_WYG_020-12a, image: WYG0695/WYG0695-0299a.png}
  - {type: variant, offset: 1615, length: 0, content: '', WYG: 之吾語汝曾元曾子之子也夫魚鼈黿鼉猶以淵為淺而堀其中堀與窟同鷹鳶猶以山為卑而增巢其上及其得也必以餌故君子苟能無以利害}
