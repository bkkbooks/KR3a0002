  - {type: variant, offset: 2062, length: 439, content: 可得而求之情之所必不免也以為可而道之知所必出也故雖為守門欲不可去雖為天子欲不可盡欲雖不可盡可以近盡也欲雖不可去求可節也所欲雖不可盡求者猶近盡欲雖不可去所求不得慮者欲節求也道者進則近盡退則節求天下莫之若也凡人莫不從其所可而去其所不可知道之莫之若也而不從道者無之有也假之有人而欲南無多而惡北無寡豈為夫南者之不可盡也離南行而北走也哉今人所欲無多所惡無寡豈為夫所欲之不可盡也離得欲之道而取所惡也哉故可道而從之奚以損之而亂不可道而離之奚以益之而治故知者論道而已矣小家珍說之所願皆衰矣凡人之取也所欲未嘗粹而來也其去也所惡未嘗粹而往也故人無動而不可以不與權俱衡不正則重縣於仰而人以為輕輕縣於俛而人以為重此人所以惑於輕重也權不正則禍託於欲而人以為福福託於惡而人以為禍此亦人所以惑於禍福也道者古今之正權離道而內自擇則不知禍福之所託易者以一易一人曰無得亦無喪也以一易兩人曰無喪而有得也以兩易一人曰無得而有喪也計者取所多謀者從所可以兩易一人莫之為明其數也從道而出猶以一易兩也奚喪離道而內自擇是猶以兩易, SBCK: 第}
