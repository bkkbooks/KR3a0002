  - {type: variant, offset: 1947, length: 3, content: 生而可, SBCK: 其罪廢其人也後讀齊東野語知其詆排之非至論今又得四庫全書總目二則足為仲友吐氣今并録}
  - {type: variant, offset: 1947, length: 1, content: 生, WYG: 身􅈛也有讀為又􅈛與邇同語曰桓公用其賊文公用其盗謂管仲寺人勃鞮也盗亦賊也以喻士信慤則仇讐可用不信慤則親戚可疎故明主任計不信怒闇主信怒不任計信亦任也計勝怒者彊怒勝計者亡定公問於顔淵曰東野子之善馭乎東野氏也馭與御同顔淵對曰善則善矣雖然其馬將失失讀為逸奔也下同家語作馬將佚也定公不恱入謂左右曰君子固讒人乎三日}
  - {type: page-break, offset: 1947, content: '', id: KR3a0002_WYG_020-20a, image: WYG0695/WYG0695-0303a.png}
  - {type: variant, offset: 1947, length: 3, content: 生而可, krp: 其罪廢其人也後讀齊東野語知其詆排之非至論今又得四庫全書總目二則足為仲友吐氣今并録}
  - {type: variant, offset: 1949, length: 0, content: '', WYG: 校來謁之曰東野畢之馬失校人掌養馬之官也兩驂列兩服入廐兩服馬在中兩驂兩服之外馬列與裂同謂外馬擘裂中馬牽引而入廐定公越席而起曰趨駕召顔淵顔淵至趨讀為促速也定公曰前日寡人問吾子吾子曰東野畢之馭善則善矣雖然其馬將失不識吾子何以知之顔淵對曰臣以政知之昔舜巧於使民而造父巧於使馬舜不窮其民造父不窮其馬是舜無失民造父無失馬也今東野畢之馭上車執轡銜體正矣步驟馳騁朝禮畢矣銜體銜輿馬體也步驟馳騁盡禮畢矣謂調集其馬或步驟馳騁盡朝廷之禮也歷險致逺馬力盡矣然猶求馬不已是以知之也定公曰善}
  - {type: page-break, offset: 1949, content: '', id: KR3a0002_WYG_020-20b, image: WYG0695/WYG0695-0303b.png}
  - {type: variant, offset: 1950, length: 0, content: '', WYG: 得少進乎定公更請少進其說顔淵對曰臣聞之鳥窮則啄獸窮則攫人窮則詐自古及今未有窮其下而能無危者也堯問第三十二堯問於舜曰我欲致天下為之奈何恐天下不歸故欲致而取之也對曰執一無失行微無怠忠信無倦而天下自來執一專意也行微行細微之事也言精專不怠而天下自歸不必致也執一如天地如天地無變易時也行微如日月日月之行人所不見似於細微安徐然而出無怠止之時也忠誠盛於内賁於外形於四海賁飾也形見也禮記曰富潤屋德潤身心廣體胖故君子必誠其意也天下其在一隅耶夫有何足致也夫物在一隅者則可舉而致之今有道天下盡歸不在於一隅焉用致也有讀為又魏武侯謀事而當羣臣莫能逮退朝而有喜色武侯晉大夫畢萬之後文侯之子也吳起進曰亦常有}
  - {type: page-break, offset: 1950, content: '', id: KR3a0002_WYG_020-21a, image: WYG0695/WYG0695-0303c.png}
  - {type: variant, offset: 1951, length: 84, content: 死也故欲過之而動不及心止之也心之所可中理則欲雖多奚傷於治欲不及而動過之心使之也心之所可失理則欲雖寡奚止於亂故治亂在於心之所可亡於情之所欲不求之其所在而求之其所亡雖曰我得, SBCK: 備攷近年舶來盧文弨校本荀子云以影宋本校今以是本比讐}
  - {type: variant, offset: 1951, length: 1, content: 死, WYG: 楚莊王之語聞於左右者乎武侯曰楚莊王之語何如吳起對曰楚莊王謀事而當羣臣莫逮退朝而有憂色申公巫臣進問曰王朝而有憂色何也巫臣楚申邑大夫也莊王曰不榖謀事而當羣臣莫能逮是以憂也其在中蘬之言也中蘬與仲虺同湯左相也曰諸侯自為得師者王得友者霸得疑者存自為謀而莫已若者亡疑謂博聞達識或決疑惑者今以不榖之不肖而羣臣莫吾逮吾國幾於亡乎是以憂也楚莊王以憂而君以憙武侯逡巡再拜曰天使夫子振寡人之過也振舉伯禽將歸於魯伯禽周公子成王封為魯侯將歸謂初之國也周公謂伯禽之傅曰汝將行盍志而子美德乎將行何不志記汝所𫝊之子美徳以言我對曰其為人寛好自用以愼寛寛𢎞也自用好自務其用也愼謹宻也此三者其美德也已周公曰嗚呼以人惡為美德乎君子好以道德故其民歸道君子好以道德教人故其民歸道者衆非謂寛𢎞也彼其寛也出無辨矣汝又美之彼伯禽既無道德但務寛容此乃出於善惡無别汝何以為美也孔子曰寛則得衆亦謂人愛恱歸之也彼其好自用也是所以窶小也窶無禮也彼伯禽好自用而不諮詢是乃無禮驕人而器局小也書曰自用則小尚書大傳曰是其好自用也以斂益之也君子力如牛不與牛爭力走如馬不與馬爭走知如士不與士爭知士謂臣下掌事者不爭言委任彼爭者均者之氣也汝又美之好自用則必不委任而與之爭事爭事乃均敵者尚氣之事非人君之量也彼其慎也是其所以淺也彼伯禽之慎宻不廣接士適所以自使智識淺近也聞之曰無越踰不見士周公聞之古也越踰謂過一日也見士問曰無乃不察乎懼其壅蔽故問無乃有不察之事乎不聞即物少至少至則淺物事也不見士則無所聞無所聞則所知之事亦少少則意淺矣聞或為問也彼淺者賤人之道也汝又美之吾語汝我文王之為子為文王之子也武王之為弟成王之為叔父周公先成王薨未知成王之諡此云成王乃後人所加之耳吾於天下不賤矣然而吾所執贄而見者十人周公自執贄而見者十人禮見其所尊敬者雖君亦執贄故哀公執贄請見周豐鄭注尚書大傳云十人公卿之中也三十人羣士之中也百人羣大夫之中也還贄而相見者三十人禮臣見君則不還贄敵者不敢當則還之禮尚徃來也士相見禮曰主人復見之以其贄曰曏者吾夫子辱使某見請還贄於將命者鄭康成云贄者所執以至也君子見於所尊敬必執贄以將其厚意也貌執之士者百有餘人執猶待也以禮貌接待之士百餘人也欲言而請畢事者千有餘人謂卑賤之士恐其言之不盡周公先請其畢辭也說苑曰周公踐天子之位七年布衣之士所執贄而師見者十人所見者十二人窮巷白屋所先見者四十九人時進善者百人教士千人朝者萬人於是吾僅得三士焉以正吾身以定天下於是千百人之中僅乃得三士正身治國吾所以得三士者亡於十人與三十人中乃在百人與千人之中十人與三十人雖尊敬未得賢至百人千人然後乃得三人以明接士不廣無由得賢}
