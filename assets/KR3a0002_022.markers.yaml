  - {type: variant, offset: 1798, length: 1, content: 欲, WYG: 居今之俗服古之服志記識也服古之服猶若夫子服逢掖之衣章甫之冠也舎此}
  - {type: variant, offset: 1800, length: 1, content: 困, WYG: 為非者不亦鮮乎舍去此謂古也哀公曰然則夫章甫絇屨紳而搢笏者此賢乎章甫殷冠王肅云絇謂屨頭有拘飾也鄭康成云絇之言拘也以為行戒狀如刀衣鼻在屨頭紳大帶也搢笏}
  - {type: variant, offset: 1802, length: 2, content: 有欲, WYG: 紳}
  - {type: punctuation, offset: 1806, content: 。, id: KR3a0002_tls_022-bkkpn356}
  - {type: 'tls:seg', offset: 1806, content: '', id: KR3a0002_tls_022-9a.4}
  - {type: variant, offset: 1806, length: 1, content: 凡, WYG: 孔子對曰不必然夫端衣𤣥裳絻而乘路者志不在於食葷端衣𤣥裳即朝𤣥端也絻與冕同鄭云端者取其正也士之衣袂皆二尺二寸而廣幅是廣袤等也其祛尺二寸大夫已上侈之侈之者蓋半而益一焉則袂三尺三寸祛尺八寸路王者之車亦車之通名爾雅云輅車之大者葷葱薤之屬也斬衰菅屨杖而啜粥者志不在於酒肉儀禮䘮服曰斬者何不緝也衰長六尺博四寸三升布為之鄭注䘮服云上曰衰下曰裳當心前有衰後有負板左右有辟領孝子哀戚無所不在也菅菲也此言服被於外亦所以制其心也生今之世志古之道居今之俗服古之服舍此而為非者雖有不亦鮮乎哀公曰善孔子曰人有五儀言人之賢愚觀其儀法有五也有庸人有士有君子有賢人有大聖哀公曰敢問何如斯可謂庸人矣孔子對曰所謂庸人者口不能道善言心不知色色色色謂以己之色觀彼之色知其好惡也論}
  - {type: page-break, offset: 1806, content: '', id: KR3a0002_WYG_020-14b, image: WYG0695/WYG0695-0300b.png}
  - {type: page-break, offset: 1806, content: '', id: KR3a0002_WYG_020-15a, image: WYG0695/WYG0695-0300c.png}
  - {type: variant, offset: 1808, length: 0, content: '', WYG: 曰色斯舉矣不知選賢人善士託其身焉以為己憂不知託賢但自憂而已勤行不知所務止交不知所定交謂接待於物皆言不能辨是非倀倀失據也日選擇於物不知所貴不知可貴重也從物如流不知所歸為外物所誘蕩而不返也五鑿為正心從而壊如此則可謂庸人矣鑿竅也五鑿謂耳目鼻口及心之竅也言五鑿雖似於正而其心已從外物所誘而壊矣是庸愚之人也一曰五鑿五情也莊子曰六鑿相攘司馬彪曰六情相攘奪韓詩外傳作五藏為正也哀公曰善敢問何如斯可謂士矣孔子對曰所謂士者雖不能盡道術必有率也雖不能徧美善必有處也率循也雖不能盡徧必循處其一隅言有所執守也是故知不務多務審其所知論語曰子路有聞未之能行唯恐有聞也言不務多務審其所謂止於辨明事而已矣行不務多務審其所由由從也謂不從不正之道故知既已知之矣言既已謂之矣行既已由之矣則若性命肌膚之不可易也言固守所見如愛其性命肌膚之不可以他物移易者也故富貴不足以益也卑賤不足以損也皆謂志不可奪如此則可謂士矣士者修立之稱一曰士事也言其善於任事可以入官也哀公曰善敢問何如斯可謂君子矣孔子對曰所謂君子者言忠信而心不德不自以為有德仁義在身而色不伐思慮明通而辭不爭故猶然如將可及者君子也猶然舒遲之貌所謂瞻之在前忽然在後家語作油然王肅曰不進貌也哀公曰善敢問何如斯可謂賢人矣孔子對曰所謂賢人者行中規䋲而不傷於本言足法於天下而不傷於身本亦身也言雖廣大而不傷其身也所謂言滿天下無口過行滿天下無怨惡富有天下而無怨財富有天下謂王者之佐也怨讀為藴言雖富有天下而無藴畜私財也家語作無宛禮記曰事大積焉而不宛古藴通而此因誤為怨字耳布施天下而不病貧言廣施德澤慈惠用窮使家給人足而上不憂貧乏所謂百姓足君孰與不足也如此則可謂賢人矣賢者亞聖之名說文云賢多才哀公曰善敢問何如斯可謂大聖矣孔子對曰所謂大聖者知通乎大道應變而不窮辨乎萬物之情性者也辨别萬物之情性也大道者所以變化遂成萬物也情性者所以理然不取舍也辨情性乃能理是非之取舍而不惑是故其事大辨乎天地其事謂聖人所理化之事言辨别萬事如天地之别萬物各使區分也明察乎日月聖人之明察如日月總要萬物於風雨總要猶統領也風以動之雨以潤之言統領萬物如風雨之生成也繆繆肫肫其事不可循繆當為膠相加之貌莊子云膠膠擾擾肫與訰同雜亂之貌爾雅云訰訰亂也言聖人}
