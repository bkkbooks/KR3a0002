  - {type: variant, offset: 1964, length: 0, content: '', WYG: 遂滅萊或曰正輿子字子馬其不用未聞說苑諸卿已諫楚莊王曰曹不用僖負羈而宋并之萊不用子猛而齊併之據年代齊滅萊在楚莊王之後未詳諸卿已之諫}
