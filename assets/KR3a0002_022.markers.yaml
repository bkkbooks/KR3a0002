  - {type: variant, offset: 1846, length: 0, content: '', WYG: 悖亂讒疾之人多妄誕說苑曰哀公問於孔子曰人何若為可取也孔子曰無取拑者無取捷者無取口叡者拑者太給利不可盡用也捷者必兼人不可為法也口叡者多誕而}
  - {type: page-break, offset: 1846, content: '', id: KR3a0002_WYG_020-19b, image: WYG0695/WYG0695-0302d.png}
