  - {type: variant, offset: 1796, length: 0, content: '', WYG: 識無識不知天命也失諸已而反諸人豈不亦迂哉南郭惠子問於子貢曰夫子之門何其雜也南郭惠子未詳其姓名蓋居南郭因}
  - {type: variant, offset: 1797, length: 0, content: '', WYG: 為號莊子有南郭子綦夫子弟子也雜謂賢不肖相雜而至子貢曰君子正身以俟欲來者不距欲去者不止且夫良醫之門多病人櫽栝之側多枉木是以雜也君子有三恕有君不能事有臣而求其使非恕也有親不能報有子而求其孝非恕也報孝養也詩曰欲報之徳有兄不能敬有弟而求其聽令非恕也士明於此三恕則可以端身矣孔子曰君子有三思而不可不思也少而不學長無能也老而不教死無思也無門人思其徳有而不施窮無與也窮乏之時無所徃託是故君子少思長則學老思死則教有思窮則施哀公篇第三十一魯哀公問於孔子曰吾欲論吾國之士與之治國敢問何如之耶孔子對曰生今之世志古之}
  - {type: page-break, offset: 1797, content: '', id: KR3a0002_WYG_020-13b, image: WYG0695/WYG0695-0299d.png}
