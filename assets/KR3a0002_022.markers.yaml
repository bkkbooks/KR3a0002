  - {type: variant, offset: 1602, length: 2, content: 務白, WYG: 有終身之樂無一日之憂小人者}
  - {type: page-break, offset: 1602, content: '', id: KR3a0002_WYG_020-11b, image: WYG0695/WYG0695-0298d.png}
  - {type: variant, offset: 1605, length: 1, content: 志, WYG: 未得也則憂不得既已得之又恐失之是以有終身之憂無一日之樂也法行篇第三十禮義謂之法所以行之謂之行公輸不能加於繩聖人莫能加於禮公輸魯巧人名班雖至巧繩墨之外亦不能加也禮者衆人法而不知聖人法而知之衆人皆知禮可以為法而不知其}
