markers:
  front:
  - {type: variant, offset: 0, length: 1, content: 正, SBCK: 重刋宋台州夲荀子跋今世中土􅀁􅀓荀子宋夲有二一為北宋吕夏卿熈甯夲一為南宋錢佃江西漕司夲而唐與政􅀁刋于台州當時為一重公案者顧無􅀓焉嘉􅂟间盧􅈽􅀴學士據朱文㳺􅀁蔵影鈔吕夏卿夲合元明夲校刋行世王懐祖顧澗薲皆有異議然吕錢兩夲至今無重刋者余􅀄来日夲時􅀙書肆購淂此書􅀟鈎夲數卷訪之廼知為狩石望之舊蔵台州夲此其􅀁擬重刋未成者厥􅓸􅀙島田篁村見影摹全部因告知星使黎公求淂之以付梓人一仍其舊踰年乃成按此夲後亦有吕夏卿等衘}
  - {type: page-break, offset: 0, content: '', id: KR3a0002_SBCK_022-1a}
  - {type: variant, offset: 0, length: 2, content: 正名, WYG: 子卷二十唐楊倞註宥坐}
  - {type: variant, offset: 0, length: 1, content: 正, krp: 重刋宋台州夲荀子跋今世中土所傳荀子宋夲有二一為北宋吕夏卿熈甯夲一為南宋錢佃江西漕司夲而唐與政所刋于台州當時為一重公案者顧無傳焉嘉慶间盧抱經學士據朱文㳺所蔵影鈔吕夏卿夲合元明夲校刋行世王懐祖顧澗薲皆有異議然吕錢兩夲至今無重刋者余𥘉来日夲時從書肆購淂此書雙鈎夲數卷訪之廼知為狩石望之舊蔵台州夲此其所擬重刋未成者厥􅓸從島田篁村見影摹全部因告知星使黎公求淂之以付梓人一仍其舊踰年乃成按此夲後亦有吕夏卿等衘}
  body:
  - {type: 'tls:seg', offset: 0, content: '', id: KR3a0002_tls_022-1a.1}
  - {type: xml-element, offset: 0, content: '', id: KR3a0002_tls_022-bkkxmlele1}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 又别有熈甯元年中書劄子曽公亮等銜名據興政自序忠視熈甯之故則知其略無校改案王伯厚所擧四條惟君子知嚮矣此夲仍作如響不相應因知伯厚􅀁擧者嚮響之異非知如之異此自校刋紀聞者之失夲仍何挍如作若盧􅈽􅀴􅀁勘以此夲照之其遺漏不下數百字又不第顧澗薲􅀁擧君道}
  - {type: page-break, offset: 2, content: '', id: KR3a0002_SBCK_022-1b}
  - {type: variant, offset: 2, length: 0, content: '', krp: 又别有熈甯元年中書劄子曽公亮等銜名據興政自序忠視熈甯之故則知其略無校改案王伯厚所擧四條惟君子知嚮矣此夲仍作如響不相應因知伯厚所擧者嚮響之異非知如之異此自校刋紀聞者之失夲仍何挍如作若盧抱經所勘以此夲照之其遺漏不下數百字又不第顧澗薲所擧君道}
  - {type: variant, offset: 3, length: 1, content: 第, SBCK: 狂生者不胥時而樂之不作落也此間别有朝鮮古刋夲亦略与此夲同余又合元纂啚夲明丗徳堂夲及王懷祖劉端臨郝蘭皋諸先生之說更􅂙以日夲物茂卿子四卷有讀荀冡田虎斷四卷有荀子久保愛注}
  - {type: variant, offset: 3, length: 1, content: 第, krp: 狂生者不胥時而樂之不作落也此間别有朝鮮古刋夲亦略与此夲同余又合元纂啚夲明丗徳堂夲及王懷祖劉端臨郝蘭皋諸先生之說更參以日夲物茂卿子四卷有讀荀冡田虎斷四卷有荀子久保愛注}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 卷有荀子増豬飼彦博遺一卷有荀子􅀘􅀁訂别爲札記以未見吕錢兩原夲􅀅以有待故未附刋焉光緒甲申三月宜都楊守敬􅀝装書經籍訪古志荀子}
  - {type: page-break, offset: 6, content: '', id: KR3a0002_SBCK_022-2a}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 八此已下皆荀卿及弟子所引記傳雜事故總推於末孔子觀於魯桓公之廟有欹器焉春秋哀公三年桓宫僖宫災公羊傳曰此皆毁宗廟也其言災何復立也或曰三桓之祖廟欹器傾欹易覆之器孔子問於守廟者曰此為何器守廟者曰此蓋為宥坐之器宥與右同言人君可置於坐右以為戒也說苑作坐右或曰宥與侑同勸也文子曰三皇五帝有勸戒之器名侑巵注云欹器也孔子曰吾聞宥坐之器者虛則欹中則正滿則覆孔子顧謂弟子曰注水焉弟子挹水而注之挹酌中而正滿而覆虛而欹孔子喟然而嘆曰吁惡有滿而不覆者哉子路曰敢問持滿有道乎孔子曰聰明聖知守之以愚功被天下守之以譲勇力撫世守之以怯撫掩也猶言蓋世也富有四海守之以謙此所謂挹而損之之道也挹亦退也挹而損之猶言損之又損孔子為魯攝相朝七日而誅少正卯為司冦而攝相也朝謂聽朝也門人進問曰夫少正卯魯之聞人也夫子為政而始誅之得無失乎聞人謂有名為人所聞知者也始誅先誅之也孔子曰居吾語汝其故人有惡者五而盗竊不與焉一曰心達而險}
  - {type: page-break, offset: 6, content: '', id: KR3a0002_WYG_020-1b, image: WYG0695/WYG0695-0293d.png}
  - {type: page-break, offset: 6, content: '', id: KR3a0002_WYG_020-2a, image: WYG0695/WYG0695-0294a.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 卷有荀子増豬飼彦博遺一卷有荀子𥙷所訂别爲札記以未見吕錢兩原夲将以有待故未附刋焉光緒甲申三月宜都楊守敬倚装書經籍訪古志荀子}
