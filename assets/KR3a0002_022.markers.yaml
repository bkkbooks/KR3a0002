  - {type: variant, offset: 1488, length: 0, content: '', WYG: 也今之世則不然亂其教繁其刑其民迷惑而墮焉則從而制之是以刑彌繁而邪不勝三尺之岸而虛車不能登也百仞之山任負車登焉何則陵遲故也岸崖也負重也任負車任重之車也遲慢也陵遲言丘陵之勢漸慢也王肅云陵遲陂阤也數仞之牆而民不踰也百仭之山而竪子馮而游焉陵遲故也今夫世之陵遲亦久矣而能使民勿踰}
