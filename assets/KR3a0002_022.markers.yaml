  - {type: variant, offset: 1545, length: 1, content: 詩, WYG: 如北則儒者之道畢矣雖舜不能加毫末於是矣孝子所以不從命有三從命則親危不從命則親安孝子不從命乃𠂻𠂻善也謂善發於𠂻心矣從命則親辱不從命則親榮孝子不從命乃義從命則禽獸不從命則脩飾孝子不從命乃敬從命則陷身於禽獸之行不從命則親為脩飾君子不從命是乃敬親故可以從而不從是不子也未可以從而從是不𠂻也明於從不從之義而能致恭敬忠信端慤以愼行之則可謂大孝矣傳}
