  - {type: variant, offset: 1598, length: 1, content: 當, WYG: 叮嚀之也子路趨而出改服而入蓋猶若也猶若舒和之貌禮記曰君子蓋猶猶爾也孔子曰志之吾語汝奮於言者華奮於行者伐色知而有能者小人也奮振矜也色知謂所知見知顔色有能自有}
  - {type: variant, offset: 1600, length: 1, content: 辭, WYG: 能皆矜伐之意故君子知之曰知之不知曰不知言之要也能之曰能之不能曰不能行之至也皆在不隠其情言要則知行至則仁既知且仁夫惡有不足矣哉子路入子曰由知者若何仁者若何子路對曰知者使人知己仁者使人愛己子曰可謂士矣士者修立之稱子貢入子曰賜知者若何仁者若何子貢對曰知者知人仁者愛人子曰可謂士君子矣顔淵入子曰回知者若何仁者若何知者皆讀為智顔淵對曰知者自知仁者自愛子曰可謂明君子矣子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意樂其為治之意既已得之又樂其治是}
  - {type: page-break, offset: 1600, content: '', id: KR3a0002_WYG_020-11a, image: WYG0695/WYG0695-0298c.png}
