  - {type: variant, offset: 459, length: 964, content: 以辨同異貴賤明同異別如是則志無不喻之患事無困廢之禍此所為有名也然則何緣而以同異曰緣天官凡同類同情者其天官之意物也同故比方之疑似而通是所以共其約名以相期也形體色理以目異聲音清濁調竽奇聲以耳異甘苦鹹淡辛酸奇味以口異香臭芬鬱腥臊漏庮奇臭以鼻異疾養凔熱滑鈹輕重以形體異說故喜怒哀樂愛惡欲以心異心有徵知徵知則緣耳而知聲可也緣目而知形可也然而徵知必將待天官之當簿其類然後可也五官簿之而不知心徵之而無說則人莫不然謂之不知此所緣而以同異也然後隨而命之同則同之異則異之單足以喻則單單不足以喻則兼單與兼無所相避則共雖共不為害矣知異實者之異名也故使異實者莫不異名也不可亂也猶使同實者莫不同名也故萬物雖眾有時而欲徧舉之故謂之物物也者大共名也推而共之共則有共至於無共然後止有時而欲偏舉之故謂之鳥獸鳥獸也者大別名也推而別之別則有別至於無別然後止名無固宜約之以命約定俗成謂之宜異於約則謂之不宜名無固實約之以命實約定俗成謂之實名名有固善徑易而不拂謂之善名物有同狀而異所者有異狀而同所者可別也狀同而為異所者雖可合謂之二實狀變而實無別而為異者謂之化有化而無別謂之一實此事之所以稽實定數也此制名之樞要也後王之成名不可不察也見侮不辱聖人不愛己殺盜非殺人也此惑於用名以亂名者也驗之所以為有名而觀其孰行則能禁之矣山淵平情欲寡芻豢不加甘大鐘不加樂此惑於用實以亂名者也驗之所緣無以同異而觀其孰調則能禁之矣非而謁楹有牛馬非馬也此惑於用名以亂實者也驗之名約以其所受悖其所辭則能禁之矣凡邪說辟言之離正道而擅作者無不類於三惑者矣故明君知其分而不與辨也夫民易一以道而不可與共故故明君臨之以勢道之以道申之以命章之以論禁之以刑故其民之化道也如神辨埶惡用矣哉今聖人沒天下亂姦言起君子無埶以臨之無刑以禁之故辨說也實不喻然後命命不喻然後期期不喻然後說說不喻然後辨故期命辨說也者用之大文也而王業之始也名聞而實喻名之用也累而成文名之麗也用麗俱得謂之知名名也者所以期累實也辭也者兼異實之名以諭一意也辨說也者不異實名以喻動靜之道也期命也者辨說之用也辨說也者心之象道也心也者道之工宰也道也者治之經理也心合於道說合於心辭合於說正名而期質請而喻辨異而不過推類而不悖聽則合文辨則盡故以正道而辨姦猶引繩以持曲直是故邪說不能亂百家無所竄有兼聽之明而無奮矜之容有兼覆之厚而無伐德之色說行則天下正說不行則白道而不冥窮是聖, SBCK: 十八}
