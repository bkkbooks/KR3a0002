  - {type: variant, offset: 2421, length: 414, content: 一易一人曰無得亦無喪也以一易兩人曰無喪而有得也以兩易一人曰無得而有喪也計者取所多謀者從所可以兩易一人莫之為明其數也從道而出猶以一易兩也奚喪離道而內自擇是猶以兩易一也奚得其累百年之欲易一時之嫌然且為之不明其數也有嘗試深觀其隱而難其察者志輕理而不外重物者無之有也外重物而不內憂者無之有也行離理而不外危者無之有也外危而不內恐者無之有也心憂恐則口銜芻豢而不知其味耳聽鍾鼓而不知其聲目視黼黻而不知其狀輕煖平簟而體不知其安故嚮萬物之美而不能嗛也假而得閒而嗛之則不能離也故嚮萬物之美而盛憂兼萬物之利而盛害如此者其求物也養生也粥壽也故欲養其欲而縱其情欲養其性而危其形欲養其樂而攻其心欲養其名而亂其行如此者雖封侯稱君其與夫盜無以異乘軒戴絻其與無足無以異夫是之謂以己為物役矣心平愉則色不及傭而可以養目聲不及傭而可以養耳蔬食菜羹而可以養口麤布之衣麤紃之履而可以養體局室蘆簾稾蓐尚机筵而可以養形故無萬物之美而可以養樂無埶列之位而可以養名如是而加天下焉其, WYG: ''}
