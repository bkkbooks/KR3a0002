  - {type: variant, offset: 1577, length: 0, content: '', WYG: 故勞苦彫萃而能無失其敬彫傷也萃與顇同雖勞苦彫萃而不敢懈惰失敬也災禍患難而能無失其義則不幸不順見惡而能無失其愛不幸以不順於親而見惡也非仁人莫能行詩曰孝子不匱此之謂也魯哀公問於孔子曰子從父命孝乎臣從君命貞乎三問孔子不對不敢違哀公之意故不對孔子趨出以語子貢曰鄉者君問丘曰子從父命孝乎臣從君命貞乎三問而丘不對賜以為何如子貢曰子從父命孝矣臣從君命貞矣夫子有奚對焉孔子曰小人哉賜不識也昔萬乘之國有爭臣四人則封疆不削千乘之國有爭臣三人則社稷不危百乘之家有爭臣二人則宗廟不毁父有爭子不行無禮士有爭友不為不義故子從父奚子孝臣從君奚臣貞審其所以從之之謂孝之謂貞也審其可從則從不可從則不從子路問於孔子曰有人於此夙興夜寐耕耘樹藝手足胼胝以養其親然而無孝之名何也樹栽植藝播種胼謂手足勞駢併也胝皮厚也丁思反孔子曰意者身不敬與辭不遜與色不順與古之人有言曰衣與繆與不女聊繆紕繆也與讀為歟聊頼也言雖與之衣而紕繆不精則不聊頼於汝也或曰繆綢也言雖衣服我綢繆我而不敬不順則不頼汝也韓詩外傳作衣子教子家語云人與已不順欺也王肅云人與已事實通不相欺也皆與此不同也今夙興夜寐耕耘樹藝手足胼胝以養其親無此三者則何以為而無孝之名也孔子曰由志之吾語汝雖有國士之力不能自舉其身非無力也勢不可也國士一國勇力之士故入而行不脩身之罪也出而名不章友之過也故}
