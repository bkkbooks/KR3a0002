  - {type: variant, offset: 1852, length: 91, content: 數也非治亂也欲不待可得而求者從所可欲不待可得所受乎天也求者從所可所受乎心也所受乎天之一欲制於所受乎心之多求固難類所受乎天也人之所欲生甚矣人之所惡死甚矣然而人有從生成死者非不欲生而欲死, WYG: 其犲狼}
