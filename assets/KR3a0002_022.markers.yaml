  - {type: variant, offset: 1579, length: 0, content: '', WYG: 入則篤行出則友賢何為而無孝}
  - {type: variant, offset: 1580, length: 0, content: '', WYG: 名也子路問於孔子曰魯大夫練而牀禮耶孔子曰吾不知也練小祥也禮語曰期而小祥居垔室寢有席又期而大祥居復寢中月而禫禫而牀也子路出謂子貢曰吾以夫子為無所不知夫子徒有所不知子貢曰汝何問哉子路曰由問魯大夫練而牀禮耶夫子曰吾不知也子貢曰吾將為汝問之子貢問曰練而牀禮耶孔子曰非禮也子貢出謂子路曰汝謂夫子為有所不知乎夫子徒無所不知汝問非也禮居是邑不非其大夫懼於訕上子路盛服見孔子孔子曰由是裾裾何也裾裾衣服盛貌說苑作襜襜也昔者江出於岷山其始出也其源可以濫觴及其至江之津也不放舟不避風則不可涉也放讀為方國語曰方舟投附韋昭曰方並也編木為附說苑作方舟方附也詩云方之舟之非維下流水多耶維與唯同}
  - {type: page-break, offset: 1580, content: '', id: KR3a0002_WYG_020-10a, image: WYG0695/WYG0695-0298a.png}
  - {type: page-break, offset: 1580, content: '', id: KR3a0002_WYG_020-10b, image: WYG0695/WYG0695-0298b.png}
