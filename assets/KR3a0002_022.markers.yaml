  - {type: variant, offset: 1583, length: 13, content: 而精俛然而類差差然而齊彼正, WYG: 也說苑作非下衆水之多乎今汝服既盛顔色充盈天下且孰肯諫汝矣充盈猛厲也由告之畢乂呼}
