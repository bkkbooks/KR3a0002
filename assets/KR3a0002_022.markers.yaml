  - {type: variant, offset: 1847, length: 0, content: '', WYG: 信後恐不驗也韓詩外傳曰無取健無取佞無取口讒健驕也佞諂也口讒誕也皆大同而小}
  - {type: variant, offset: 1848, length: 3, content: 類也情, WYG: 故弓調而後求勁焉馬服而後求良焉士信慤而後求知能焉士不信慤而有多知能譬}
