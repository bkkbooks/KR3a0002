  - {type: variant, offset: 65, length: 153, content: 謂之性性之和所生精合感應不事而自然謂之性性之好惡喜怒哀樂謂之情情然而心為之擇謂之慮心慮而能為之動謂之偽慮積焉能習焉而後成謂之偽正利而為謂之事正義而為謂之行所以知之在人者謂之知知有所合謂之智智所以能之在人者謂之能能有所合謂之能性傷謂之病節遇謂之命是散名之在人者也是後王之成名也故王者之制名名定而實辨道行而志通, WYG: 非爵禄}
