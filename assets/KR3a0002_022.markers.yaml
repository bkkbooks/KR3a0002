  - {type: variant, offset: 1787, length: 3, content: 凡語治, WYG: 詩秦風小戎之篇引之喻君子比德曾子曰同遊}
  - {type: variant, offset: 1791, length: 3, content: 待去欲, WYG: 不見愛者吾必不仁也仁者必能使人愛己交而不見敬者吾必不長也不長厚故為人所輕臨財而不見信者吾必不信也廉潔不聞於人三者在身曷怨人當反諸已怨人者窮怨天}
