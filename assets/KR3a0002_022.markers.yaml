  - {type: variant, offset: 7, length: 0, content: '', SBCK: 十卷求古樓藏宋槧大字本唐楊倞注首有荀子注序次新目録接序}
  - {type: variant, offset: 7, length: 1, content: 後, WYG: 曰行辟而堅三曰言偽而辯四曰記醜而博五曰順非而澤心達而險謂心通達於事而凶險也辟讀為僻醜謂怪異之事澤有潤澤也此五者有一於人則不得免於君子之誅而少正夘兼有之故居處足以聚徒成羣言談足以飾邪營衆彊足以反是獨立此小人之桀雄也不可不誅也營讀為熒熒衆惑衆也彊剛愎也反是以非為是也獨立人不能傾之也是以湯誅尹諧文}
  - {type: variant, offset: 7, length: 0, content: '', krp: 十卷求古樓藏宋槧大字本唐楊倞注首有荀子注序次新目録接序}
  - {type: variant, offset: 8, length: 70, content: 王之成名刑名從商爵名從周文名從禮散名之加於萬物者則從諸夏之成俗曲期遠方異俗之鄉則因之而為通散名之在人者生之所以然者謂之性性之和所生精合感應不, SBCK: 每卷首題荀子卷第幾登仕郎守大理評}
  - {type: variant, offset: 8, length: 70, content: 王之成名刑名從商爵名從周文名從禮散名之加於萬物者則從諸夏之成俗曲期遠方異俗之鄉則因之而為通散名之在人者生之所以然者謂之性性之和所生精合感應不, krp: 每卷首題荀子卷第幾登仕郎守大理評}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 誅潘止周公誅管叔太公誅華仕管仲誅付里乙子産誅鄧析史付韓子曰太公封於齊東海上有居士狂矞華仕昆弟二人立議曰吾不臣天子不友諸侯耕而食}
