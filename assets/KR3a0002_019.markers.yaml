  - {type: variant, offset: 186, length: 3, content: 差貧富, WYG: 男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣故以夫婦為本咸感也以髙下下以男下女柔上而剛下陽唱隂和然後相成聘士之義親迎之道重始也聘士謂若安車束帛重其禮也迎魚敬反禮者人之所履也失所履則顚蹷陷溺所失微而其為亂大者禮也禮之於正國家也如權衡之於}
