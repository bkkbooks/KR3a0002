  - {type: variant, offset: 1617, length: 0, content: '', WYG: 子十九而冠冠而聽治其教至也十九而冠先於臣下一年也雖人君之子猶年長而冠冠而後聴其政治以明教至然後治事不敢輕易君子也者而好之其人有君子之質而所好得其人謂得賢師也其人也而不教不祥祥善非君子而好之非其人也既無君子之質又所好非其人非其人而教之齎盗糧借賊兵也若使不善人教非君子是猶資盗賊之兵糧為害滋甚不如不教也齎與資同兵五兵也不自嗛其行者言濫過嗛足也謂行不足也所以不足其行者由於言辭汎濫過度也古之賢人賤為布衣貧為匹夫食則饘粥不足衣則豎褐不完然而非禮不進非義不受安取此豎褐僮豎之褐亦短褐也言賢人雖貧窮義不苟進安取此言過而行不副之事也子夏貧衣若縣鶉人曰子何不仕曰}
