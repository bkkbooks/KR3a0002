  - {type: variant, offset: 1230, length: 0, content: '', SBCK: 王誅四武王誅二周公卒業至成康則案無誅已篇言周公終並解在仲尼重引此者以明不與民爭利則刑罰省也王業猶不得無誅伐至成康然後刑措也多積財而羞無有貧羞重民任而誅不能任而復誅之使民不能勝此邪行之所以起刑罰之所以多也上好羞則民闇飾矣則民闇自脩飾也好羞貧而事奢侈上好富則民死利矣二者亂之衢也道衢民語曰欲富乎忍恥矣傾絶矣絶故舊矣與義分背矣顧廉恥忍恥不也分背如人分背而行傾絶謂傾身絶命而求上好富則人民之行如此安得不亂湯旱而禱曰政不節與使民疾與何以不雨至斯極也苦疾宫室榮與婦謁盛與何以不雨至斯極也謁盛謂婦言是榮盛謁請也婦也用苞苴行與讒夫興與何以不雨至斯極也注禮記云苞苴裹魚肉者或以葦或以茅也貨賄必以物苞褁故緫謂之苞苴興起也鄭天之生民非為君也天之立君以為民也故古者列地建國非以貴諸侯而已列官職差禄爵非以尊大夫而已等級也差謂制主道知人臣道知事事謂職守人謂賢良故舜之治天下不以事詔而萬物成使禹治水不告治水之方略不以事詔告但委任而已謂若農六博也王逸注楚詞云投六箸行六棊故曰六博今之博􅈰可以得貨財先王之道可以為堯舜故以喻焉六貳之博則相對也亦二六君子之學如蛻幡然遷之幡與翻同如蟬蛻也故其行效其立效其坐效其置顔色出辭氣效造次皆學而不捨也效放也置措也言無留善無留滯有善即行無宿問不俟經宿當時即問善學者盡其}
