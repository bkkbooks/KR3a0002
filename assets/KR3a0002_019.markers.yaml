  - {type: variant, offset: 25, length: 2, content: 求求, krp: 以播八音則不成樂雖和順積中而英華不發於故曰仁義禮樂其致一也得中故曰其致一也言四者雖殊同歸於君子處仁以義然後仁也能斷仁而行義以禮然後義也禮然後為義也雖能斷而不違制禮反本成末然後禮也也本反復義為本終成於禮節也謂仁義末謂禮節謂以仁三者皆通然後道也三者通明為道然後貨財曰賻輿馬曰賵衣服曰禭玩好曰贈玉貝曰唅瑟笙竽之屬何休曰此皆春秋之制也此與公羊穀梁之說同玩好謂明器琴是助死者之禮也知生則賵賻知死則禭唅之也賻猶覆也賵猶助也皆助生送死之禮禭猶遺也遺賻賵所以佐生也贈禭所以送死也送死不及柩尸弔生不及悲哀非禮也葬事皆謂故吉行五十犇喪百里賵贈及事禮之大也贈及事既說弔奔喪曰日行百里不以夜行因明奔喪亦宜行逺也禮記禮者政之輓也車然如輓為政不以禮政不行矣天子即位上卿進曰如之何憂之長也能除患則為福不能除患則為賊授天子一策書於策讀之而授天子深上卿於周若冢宰也皆謂下除患則百福歸之不能則反為賊害策編竹為之後易之戒之也言天下安危所繋其憂甚逺長問何以治之能為天爲也以玉中卿進曰配天而有下土者先事慮事先患慮患先事慮事謂之接中卿若宗伯也接讀爲捷速也接則事優成先患慮患謂之豫豫則禍不生事至而後慮者謂之後後則事不舉患至而後慮者謂之困困則禍不可禦授天子二策第二策也禦禁二䇿下卿進曰敬戒無怠慶者在堂弔者在閭在門言相襲之速閭門之外也下卿若司寇也慶者雖在堂弔者已禍與福鄰莫知其門賈誼曰憂喜聚門言同一門出入也豫哉豫哉萬民望之授天子三策也三策第三策豫哉言可戒備禹見耕者耦立而式過十室之邑必下耕曰耦兩人共室之邑必有忠信故下之也論語曰長沮桀溺耦而耕十殺大蚤朝大晩非禮也小綏大夫殺則止佐車蚤謂下先上也又曰朝辨色始入殺謂田獵禽獸也禮記曰天子殺則下大綏諸侯殺則下後虞人入澤犲祭獸然後田獵先於此為早也又曰田不以禮殺太蚤爲陵犯也朝大晩為懈㢮也或曰禮記曰獺祭魚然物也是暴天治民不以禮動斯陷矣平衡曰拜下衡曰稽首至地曰稽顙衡之平禮記平衡與此平衡謂磬折頭與腰如殊義大夫之臣拜不稽首非尊家臣也所以辟君也為避辟讀一命齒於郷再命齒於族三命族人雖七十不敢先二命卿也鄭注禮記曰此一命公侯之士再命大夫雖七十者不敢先言不唯不與少者齒老者亦不敢先也皆郷飲酒時齒謂以年次坐若立也禮記曰三命不齒族人上大夫中大夫下大夫公侯之士子男之大夫也故曰此覆一命再命三命也一命雖夫也下大吉事尚尊喪事尚親親者為主禮記曰以服之吉事朝廷列位也喪事以序也精麤爲君臣不得不尊父子不得不親兄弟不得不順夫婦不得不驩少者以長老者以養之禮法驩與歡同不得謂不得聖人故天地生之聖人成之聘問也享獻也私覿私見也所以相問也聘享奉使大夫出以圭璋聘聘享以賔禮見私覿以臣禮見故曰私見鄭注儀禮云享獻也束帛加璧享所以有獻也享畢賔奉束錦以請覿所以私見也以厚恩意也既聘又獻所言語之美穆穆皇皇皇皇正也郭璞云爾雅曰穆穆敬也儀脩飾或曰穆穆美也皇皇有光儀也詩曰皇皇者華皇皇正脩正貌穆容儀謹敬也皆由言語之美所以威朝廷之美濟濟鎗鎗貌蹌蹌有行列貌鎗與蹌同濟濟多士為人臣下者有諫}
