  - {type: variant, offset: 1607, length: 0, content: '', krp: 寡有之妻詩大雅思齊之篇至于兄弟然後治于家邦言自家刑國也言賢也御治也言文王先立禮法於其妻以然則賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友難朋友焉可息哉相攝佐者以威儀也亦既醉之篇毛云言然則賜願息耕孔子曰詩云晝爾于茅宵爾索綯亟其乗屋其始播百榖耕難耕焉可息哉絞也亟急也乗屋升屋治其敝漏也詩豳風七月之篇于茅徃取茅也綯然則賜無息者乎孔子曰望其壙臯如也嵮如也鬲如也此則知所息矣冢也宰如髙貌嵮與壙丘壠臯當為宰宰如張湛注云見其墳壤鬲異則知息之有所之也塡同謂土塡塞也鬲謂隔絶於上列子作宰如墳子貢曰大哉死乎君子息焉小人休焉國風之好色也傳曰盈其欲而不愆其止得淑女也盈其好色謂關雎樂言好色人所不免美其不過禮也故詩序云關雎樂得淑女以欲謂好仇寤寐思服也止禮也欲雖盈滿而不敢過禮求之此賢才而無傷善之心焉是關雎之義也配君子憂在進賢不淫其色哀窈窕思其誠可比於金石其聲可内於宗廟石言不變也其聲可内於宗廟其誠以禮自防之誠也比於金覃詩云關雎后妃之德風之始也所以風化天下故用之郷謂以其樂章播八音奏於宗廟郷飲酒禮合樂周南關雎葛國是其聲可内於宗廟者也人焉用之邦國焉既云用之邦小雅不以於汙上自引而居下人不為驕君所用自引而䟽逺也以用也汙上驕君也言作小雅之疾今之政以思徃者其言有文焉其聲有哀焉多刺小雅鄙陋聲有哀謂哀以思也幽厲而思文武言有文謂不國將興必貴師而重傅貴師而重傅則法度存國將衰必賤師而輕傅賤師而輕傅則人有快肆意人有人有快則法度壞古者匹夫五十而士十而後爵此云禮四十而仕五或曰為卿士五十而士恐誤}
