  - {type: variant, offset: 167, length: 0, content: '', WYG: 處仁以義然後仁也仁而能斷行義以禮然後義也雖能斷而不違禮然後為義制禮反本成末然後禮也反復也本謂仁義末謂禮節謂以仁義為本終成於禮節也三者皆通然後道也通明三者然後為道貨財曰賻輿馬曰􅈖衣服曰襚玩好曰贈玉貝曰含此與公羊穀梁之說同玩好謂明器琴瑟笙竽之屬何休曰此皆春秋之制也賻猶覆也􅈖猶助也皆助生送死之禮禭猶遺也遺是助死者之禮也知生則􅈖賻知死則禭含賻􅈖所以佐生也贈襚所以送死也送死不及柩尸弔生不及悲哀非禮也皆謂葬時故吉行五十犇䘮百里􅈖贈及事禮之大也}
