  - {type: variant, offset: 7, length: 0, content: '', krp: 尊賢而王重法愛民而霸好利多詐而危欲近四旁莫如中央故王者必居天下之中禮也居中央取其朝貢道里均禮也言此明都邑居土中之意不近偏旁如此其禮制天子外屏諸侯内屏禮也外屏不欲見外也内屏不欲見内也今浮思也何休注公羊云禮天子屏猶蔽也屏謂之樹鄭康成云若内屏大夫以簾士以帷倞謂不欲見内不察泉中魚之義也諸侯臺門天子外闕兩觀諸侯内闕一觀禮天子外屏諸侯諸侯召其臣臣不俟駕㒹倒衣裳而走禮也詩曰㒹之倒之自公召之天子召諸侯輦輿就馬禮也待馬至故輦輿就馬輦謂人輓車言不暇詩曰我出我輿于彼牧矣自天子所謂我來矣出車之詩小雅來矣謂以王命召已也此明諸侯奉上禮也篇毛云出車就馬於牧地鄭云有人自天子所謂我天子山冕諸侯玄冠大夫裨冕士韋弁禮也冕山取其山則謂之山冕鄭注周禮司服云古冕服十二章謂畫山於衣而服冕即衮冕也蓋取其龍則謂之衮冕彞皆畫裳四章次六曰藻次七曰粉米次八曰黼次九曰黻皆衣五章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗以事尊卑服之諸侯亦服焉上公衮無升龍侯伯鷘子男毳繡鄭注禮云禆之言卑也天子六服大裘為上其餘為禆覲不得服也韋弁謂以爵韋為韠而戴弁也玉藻曰韠君朱大夫孤絺卿大夫玄鄭云大夫禆冕蓋亦言禆冕止於大夫士巳下韋也素士爵天子御珽諸侯御荼大夫服笏禮也所進御也珽大珪長三尺杼上終葵首謂剡上至其首而御服皆器用之名尊者謂之御卑者謂之服御者言臣下然無所屈也荼讀如舒遲之舒儒者所畏在前也方也茶古舒字玊之上圓下方者也鄭康成云珽天子彫弓諸侯彤弓大夫黑弓禮也文飾彤弓朱彫謂彫畫為服御之禮也弓此明貴賤諸侯相見卿為介會介副也聘義卿相見謂於郄地為使則以卿為上擯出會則以卿為上介也為上擯大夫為承擯君親禮賔言主君見聘以其教出畢行羣臣盡行從君也教謂戒令畢行謂使仁居守主後事春使仁厚者梁傳曰智者慮義者行仁者守然後可以會矣秋傳一子守二子從此明諸侯出疆之禮又榖聘人以珪問士以璧召人以瑗絶人以玦反絶以環遺之也衛侯使工尹襄問子貢以弓是其類也說文云聘人以圭謂使人聘他國以珪璋也問謂訪其國事因君召臣以三節周禮珍珪以徵守鄭云以徴召守國之諸侯瑗者大孔璧也爾雅好倍肉謂之瑗肉倍好謂之璧禮記曰臣以瑗歟玦如環而缺肉好若一謂之環古者臣有罪待放若今徵郡守以竹使符也然則天子以珍圭召諸侯諸侯召也反絶謂反其符絶者此明諸侯以玉接人臣之禮也於境三年不敢去與之環則還與之玦則絶皆所以見意人主仁心設焉知其役也禮其盡也故王者先仁而後禮天施然也其役用則在知盡善則人之根本所施設在人也此明為國以仁為先也在禮天施天道之所施設聘禮志曰幣厚則傷德財侈則殄禮禮云禮云玉帛云乎哉記志記曰不以美没之也也言玉帛禮之未也禮詩曰物其指矣唯其偕矣不時冝不敬交不驩欣雖指非禮也魚麗之詩小雅冝謂合冝此明聘好輕財重禮之義也篇指與㫖同美也偕齊等也時謂得時水行者表深使人無陷治民者表亂使人無失禮者其表也先王以禮表天下之亂今廢禮者是去表也故民迷惑而陷禍患此刑罰之所以繁也國當以禮示人也表標志也此明為舜曰維予從欲而治欲而治引之以喻禮能成聖亦猶舜賴臯陶也虞書舜美臯陶之辭言臯陶明五刑故舜得從故禮之生為賢人以下至庶民也非為成聖也然而亦所以成聖也不學不成中人設禮本為亦不成也然聖人不學堯學於君疇舜學於務成昭禹學於西王國說家有務成子十一篇昭其名也尸子曰務君疇漢書古今人表作尹夀又漢藝文志小下之順從天下之逆天下不足失也西王國未詳所說或曰大成昭之教舜曰避天下之逆從天下之順天下不足取也避天學于大填顓頊學于録圖帝嚳學于赤松子堯學于尹夀舜學禹生於西羌西王國西羌之賢人也新序子夏對哀公曰黄帝于時子思武王學于郭叔此明聖人亦資於教也于務成跗禹學于西王國湯學于成子伯文王學五十不成䘮七十唯衰存縗庥而已其禮皆可略也禮曰七不成䘮不備哭踊之節衰存但服在身也十唯衰麻親迎之禮父南郷而立子北面而跪醮而命之徃迎爾相成我宗事也宗事宗鄭云相助事廟之隆率以敬先妣之嗣若則有常作朂儀禮嗣也汝之行則當有常深戒之詩曰大姒嗣徽音率鄭云朂勉也若汝也勉率婦道以敬其為先妣之子曰諾唯恐不能敢忘命矣嗣先妣不敢忘父命也子言唯恐不能勉率以夫行也者行禮之謂也者在禮也所以稱行禮也者貴者敬焉老者孝焉長者弟焉幼者慈焉賤者惠焉五者則可為人之行也惠亦賜也言行禮如此賜予其宫室猶用慶賞於國家也忿怒其臣妾猶用刑罰於萬民也治家則以治國也宫室妻子也此明能君子之於子愛之而勿面使之而勿貌導之以道而勿彊人曰有嚴君焉勿彊不欲使其愧也此語出曾子面貌謂以顔色慰恱之不欲施小惠也故易家禮以順人心為本故亡於禮經而順人心者背禮者也恊則禮雖先王未之有可以義}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 也禮記曰禮也者義之實也恊諸義而禮之大凡事生飾驩也送死飾哀也軍旅飾威也可不為之飾太質故親親故故庸庸勞勞仁之殺也庸庸勞庸功也差等也皆仁恩之差也殺所介反勞謂稱其功勞以報有功勞者殺貴貴尊尊賢賢老老長長義之倫也恩皆出}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 也禮之大凡事生飾驩也送死飾哀也軍旅飾威也不可太質故為之飾親親故故庸庸勞勞仁之殺也庸功也庸庸勞勞謂稱其功勞以報有功勞者殺差等也皆仁恩之差也殺所介反貴貴尊尊賢賢老老長長義之倫也倫理也此五者非仁恩皆出}
