  - {type: variant, offset: 1605, length: 1, content: 極, SBCK: 養無有匱然則賜願息於妻子孔子曰詩云刑于寡妻至于兄弟以御于家􅀖妻子難妻子焉可息哉刑法}
  - {type: variant, offset: 1605, length: 1, content: 極, WYG: 養無有匱竭之時故天長賜以善也然則賜願息於妻子孔子曰詩云刑于寡妻至于兄弟以御于家邦妻子難妻子焉可息哉詩大雅思齊之篇刑法也寡徳之妻言賢也御治也言文王先立禮法於其妻以至于兄弟然後治于家邦言自家刑國也然則賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友難朋友焉可息哉亦既醉之篇毛云言相攝佐者以威儀也然則賜願息耕孔子曰詩云晝爾于茅宵爾索綯亟其乘屋其始播百榖耕難耕焉可息哉詩豳七月之篇于茅徃取茅也綯絞也亟急也乘屋升屋治其弊漏也然則賜無息者乎孔子曰望其壙臯如也嵮如也鬲如也此則知所息矣壙丘壠臯當為宰宰冢也宰如髙貌嵮與塡同如謂土塡塞也鬲謂革絶於上列子作宰如墳如張湛注云見其墳壤鬲異則知息之有所也子貢曰大哉死乎君子息焉小人休焉國風之好色也傳曰盈其欲而不愆其止好色謂關雎樂得淑女也盈其欲謂好仇寤寐思服也止禮也欲雖盈滿而不敢過禮求之此言好色人所不免美其不過禮也故詩序云關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也其誠可比於金石其聲可内於宗廟其誠以禮自防之誠也比於金石言不變也其聲可内於宗廟謂以樂章播八音奏於宗廟鄉飲酒禮合樂周南關雎葛覃詩序云關雎后妃之徳風之始也所以風化天下故用之鄉人焉用之邦國焉既云用之邦國是其聲可内於宗廟者也小雅不以於汙上自引而居下以用也汙上驕君也言作小雅之人不為驕君所用自引而疏逺也疾今之政以思徃者其言有文焉其聲有哀焉小雅多刺幽厲而思文武言有文謂不鄙陋聲有哀謂哀以思也國將興必貴師而重傅貴師而重傅則法度存國將衰必賤師而輕傅賤師而輕傅則人有快人肆其意人有快則法度壊古者匹夫五十而士禮四十而士五十而後爵此云五十而士恐誤或曰為卿士}
