  - {type: variant, offset: 1538, length: 2, content: 羞瘠, SBCK: 無親博學而無方好多而無定者君子不與皆謂雖廣博而無師法也無親不親師也方法也此少不諷壯不論議雖可未成也學雖有善質未為成人也諷謂就學諷詩書也言不君子壹教弟子壹學亟成急也已力反壹專壹也亟君子進則能益上之譽而損下之憂損减進仕不能而居之誣也無益而厚受之竊也竊位誣君學者非必為仕而仕者必如學徃如子貢問於孔子曰賜倦於學矣願息事君息息休孔子曰詩云温恭朝夕執事有恪事君難事君焉可息哉那之篇詩商頌然則賜願息事親孔子曰詩云孝子不匱永錫爾類事親難事親焉可息哉篇毛云匱竭也詩大雅既醉之竭之時}
