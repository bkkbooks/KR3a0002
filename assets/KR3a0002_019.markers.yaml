  - {type: variant, offset: 1279, length: 1, content: 盡, krp: 孟反色澤洽謂德潤小人不誠於内而求之於外言而不稱師謂之畔之半也畔者倍教而不稱師謂之倍之倍倍者反逆之名也教人不稱師}
  - {type: variant, offset: 1281, length: 1, content: 殺, SBCK: 罪重故謂倍畔之人明君不内朝士大夫遇諸塗不與言不足於行者説過行不能副也言説太過故不足於信者誠言言故信不能數欲誠實其行不貴言也副君子所以貴故春秋善胥命}
  - {type: variant, offset: 1281, length: 1, content: 殺, krp: 罪重故謂倍畔之人明君不内朝士大夫遇諸塗不與言不足於行者説過行不能副也言説太過故不足於信者誠言言故信不能數欲誠實其行不貴言也副君子所以貴故春秋善胥命}
