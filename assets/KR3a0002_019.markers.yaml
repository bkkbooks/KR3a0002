  - {type: variant, offset: 1223, length: 0, content: '', SBCK: 異禮論篇並解於下臣事君以貨中臣事君以身上臣事君以人謂死衛社稷人謂舉賢也貨謂聚斂及珍異獻君身易曰復自道何其咎小易雖有失返而從道何其咎過也畜卦初九之辭復返也自從也本春秋賢穆公以為能變也無大夫此何以書賢穆公也何賢乎穆公以為公羊傳曰秦伯使遂來聘遂者何秦大夫也秦殽函而自變悔作秦誓詢兹黄髮是也能變也謂前不}
  - {type: variant, offset: 1223, length: 0, content: '', WYG: 異並解於禮論篇下臣事君以貨中臣事君以身上臣事君以人貨謂聚斂及珍異獻君身謂死衛社稷人謂舉賢也易曰復自道何其咎易小畜卦初九之辭復返也自從也本雖有失返而從道何其咎過也春秋賢穆公以為能變也公羊傳曰秦伯使遂來聘遂者何秦大夫也秦無大夫此何以書賢穆公也何賢乎穆公以為能變也謂前不}
  - {type: variant, offset: 1223, length: 0, content: '', krp: 異禮論篇並解於下臣事君以貨中臣事君以身上臣事君以人謂死衛社稷人謂舉賢也貨謂聚斂及珍異獻君身易曰復自道何其咎小易雖有失返而從道何其咎過也畜卦初九之辭復返也自從也本春秋賢穆公以為能變也無大夫此何以書賢穆公也何賢乎穆公以為公羊傳曰秦伯使遂來聘遂者何秦大夫也秦殽函而自變悔作秦誓詢兹黄髮是也能變也謂前不}
  - {type: punctuation, offset: 1224, content: ，, id: KR3a0002_tls_019-bkkpn279}
  - {type: 'tls:seg', offset: 1224, content: '', id: KR3a0002_tls_019-9a.6}
  - {type: variant, offset: 1224, length: 0, content: '', SBCK: 蹇叔百里之言敗於士有妒友則賢交不親君有妒臣則賢人不至蔽公者謂之昧隱良者謂之妒謂之暗昧掩蔽公道奉妒昧者謂之交譎人相成為惡也交通於譎詐之交譎之人妒昧之臣國之薉孽也終為國之災害也薉與穢同孽祅孽言口能言之身能行之國寶也口不能言身能行之國器也言而有行也如器物雖不口能言之身不能行國用也而用也國賴其言口言善身行惡國祅也治國者敬其寶愛其器任其用除其祅不富無}
  - {type: page-break, offset: 1224, content: '', id: KR3a0002_SBCK_019-11a}
  - {type: variant, offset: 1224, length: 0, content: '', WYG: 蹇叔百里之言敗於崤函而自變悔作秦誓詢兹黄髮是也士有妒友則賢交不親君有妒臣則賢人不至蔽公者謂之昧隱良者謂之妒掩閉公道謂之暗昧奉妒昧者謂之交譎交通於譎詐之人相成為惡也交譎之人妒昧之臣國之薉孽也薉與穢同孽妖孽言終為國之災害也口能言之身能行之國寶也口不能言身能行之國器也如器物雖不言而有行也口能言之身不能行國用也國頼其言可用也口言善身行惡國妖也治國者敬其寶愛其器任其用除其妖不富無}
  - {type: page-break, offset: 1224, content: '', id: KR3a0002_WYG_019-10a, image: WYG0695/WYG0695-0286c.png}
  - {type: variant, offset: 1224, length: 0, content: '', krp: 蹇叔百里之言敗於士有妒友則賢交不親君有妒臣則賢人不至蔽公者謂之昧隱良者謂之妒謂之暗昧掩蔽公道奉妒昧者謂之交譎人相成為惡也交通於譎詐之交譎之人妒昧之臣國之薉孽也終為國之災害也薉與穢同孽祅孽言口能言之身能行之國寶也口不能言身能行之國器也言而有行也如器物雖不口能言之身不能行國用也而用也國賴其言口言善身行惡國祅也治國者敬其寶愛其器任其用除其祅不富無}
  - {type: variant, offset: 1225, length: 2, content: 隆殺, SBCK: 養民情知榮辱衣食足不教無以理民性故須教人性惡故家五畒宅百畒田務其業而勿奪其時所以富之也五畒之宅樹之以桑五十者可以衣帛矣百畒宅居處也百畒一夫田也務謂勸勉之孟子曰之家可以無飢矣之田無失其時八口立太學設庠序脩六禮明十教所以道之也詩曰飲之食之教之誨之王事具矣也禮記曰父慈子孝兄良弟悌夫義婦聽長禮記曰六禮冠昏䘮祭郷相見十教即十義義道謂教導之也十或}
  - {type: page-break, offset: 1225, content: '', id: KR3a0002_SBCK_019-11b}
  - {type: variant, offset: 1225, length: 2, content: 隆殺, WYG: 養民情衣食足知榮辱不教無以理民性人性惡故須教故家五畝宅百畝田務其業而勿奪其時所以富之也宅居處也百畝一夫田也務謂勸勉之也孟子曰五畝之宅樹之以桑五十者可以衣帛矣百畝之田無失其時八口之家可以無飢矣立大學設庠序修六禮明十教所以導之也詩曰飲之食之教之誨之王事具矣禮記曰六禮冠昏䘮祭鄉相見十教即十義也禮記曰父慈子孝兄良弟悌夫義婦聽長恵㓜順君仁臣忠十者謂之仁義導謂教導之也十或}
