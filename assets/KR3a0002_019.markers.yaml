  - {type: variant, offset: 1279, length: 1, content: 盡, SBCK: 孟反色澤洽謂德潤小人不誠於内而求之於外言而不稱師謂之畔之半也畔者倍教而不稱師謂之倍之倍倍者反逆之名也教人不稱師}
