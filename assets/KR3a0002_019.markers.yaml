  - {type: variant, offset: 1617, length: 0, content: '', SBCK: 子十九而冠冠而聽治其教至也年長而冠冠而後聽其政治以明敎至然十九而冠先於臣下一年也雖人君之子猶敢輕易後治事不君子也者而好之其人所好得其人謂有君子之質而師也得賢其人也而不教不祥善祥非君子而好之非其人也所好非其人也既無君子之質又非其人而教之齎盜糧借賊兵也借盗賊之兵糧為害滋甚不如若使不善人教非君子是猶資同兵五兵也不敎也齎與資不自嗛其行者言濫過行不足也嗛足也謂於言辭汎濫過度也所以不足其行者由古之賢人賤為布衣貧為匹夫食則饘粥不足衣則竪褐不完然而非禮不進非義不受安取此短褐也言賢人雖竪褐僮竪之褐亦言過而行不副之事乎貧窮義不苟進安取此子夏貧衣若縣鶉人曰子何不仕曰}
