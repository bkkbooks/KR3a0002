  - {type: variant, offset: 1238, length: 1, content: 隆, WYG: 也治稼穡曰場樹蔬菜曰園謂若公儀子不奪園夫工女之利也從士以上皆羞利而不與民爭業樂分施而耻積藏然故民不困財貧窶者有所竄其手竄容也容集其手而力作}
