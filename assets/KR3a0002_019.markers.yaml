  - {type: variant, offset: 1640, length: 2, content: 喪動, SBCK: 聞也公子展之後柳下惠魯人門至賤者子夏言昔柳下惠衣之􅁦惡與後門者同時人名獲字禽居於柳下諡惠季其伯仲也後門者君子守後不知也非}
  - {type: variant, offset: 1640, length: 2, content: 喪動, WYG: 聞也柳下惠魯賢人公子展之後名獲字禽居於柳下諡惠季其伯仲也後門者君子守後門至賤者子夏言昔柳下惠衣之弊惡與後門者同時人尚無疑怪者言安於貧賤渾跡而人不知也非}
  - {type: variant, offset: 1640, length: 2, content: 喪動, krp: 聞也公子展之後柳下惠魯人門至賤者子夏言昔柳下惠衣之弊惡與後門者同時人名獲字禽居於柳下諡惠季其伯仲也後門者君子守後不知也非}
