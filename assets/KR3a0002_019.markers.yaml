  - {type: variant, offset: 11, length: 3, content: 曰人生, SBCK: 倫理也此五者非仁行之得其節禮之序也則是禮有次序行仁義得其節仁愛也故親義理也故行禮節也故成雖有仁義無禮以節非仁不親非義不行不成之亦仁有里義有門以安居門所以出入也里與門皆謂禮也里所仁非其里}
  - {type: page-break, offset: 11, content: '', id: KR3a0002_SBCK_019-5b}
  - {type: variant, offset: 11, length: 3, content: 曰人生, WYG: 行之得其節禮之序也行仁義得其節則是禮有次序也仁愛也故親義理也故行禮節也故成非仁不親非義不行雖有仁義無禮以節之亦不成仁有里義有門里與門皆謂禮也里所以安居門所以出入仁非其里}
