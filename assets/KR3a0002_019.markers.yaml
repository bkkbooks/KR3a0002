  - {type: 'tls:seg', offset: 1282, content: '', id: KR3a0002_tls_019-9a.18}
  - {type: variant, offset: 1283, length: 0, content: '', SBCK: 詩非屢盟其心一也傳曰相命也何言乎相命近正也古者不盟春秋魯􅁊公三年齊侯衞侯胥命于蒲公羊長言其一心而相信則不在盟誓也結言而退又詩曰君子屢盟亂是用善為詩者不説善為易者不占善為禮者不相其心同也言皆者也相謂爲人賛相也與理㝠㑹者至於無言説曾子曰孝子言為可聞行為可見使人可見不苟為斯為孝子也發言使人可聞不詐妄也立行言為可聞所以說逺也行為可見所以說近也近者說則親逺者說則附親近而附逺孝子之道也則毁辱無由及親也說皆讀為恱近親逺附曾子行晏子從於郊曰嬰聞之君子贈人以言庶人贈人以財嬰貧無財請假於君子贈吾子以言君子假於子弟子此云送曾子豈好事者為之歟謙辭也晏子先於孔子曾子之父猶孔乗輿之輪太山之木也示諸檃栝三月五月為幬菜敝而不反其常木之器也言寘諸檃栝或三月或五月此皆言車之才也示讀為寘檃栝矯煣至於轂輻皆敝而䂓曲不反其初所謂三材不失職也周禮也幬菜未詳或曰菜讀為菑謂轂與輻也言矯煣直木為牙冒轂之革也革急則木廉隅見考工記又曰察其菑蚤不齵則考工記曰望其轂欲其眼也進而視之欲其幬之廉也鄭云幬也匡刺也晏子春秋曰今夫車輪山之直木良匠煣之其貟}
  - {type: page-break, offset: 1283, content: '', id: KR3a0002_SBCK_019-18b}
