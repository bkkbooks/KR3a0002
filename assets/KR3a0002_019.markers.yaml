  - {type: variant, offset: 168, length: 0, content: '', WYG: 說弔贈及事因明犇䘮亦宜行逺也禮記犇䘮日行百里不以夜行禮者政之輓也如輓車然為政不以禮政不行矣天子即位上卿進曰如之何憂之長也能除患則為福不能除患則為賊授天子一策上卿於周若冢宰也皆謂書於策讀之而授天子深戒之也言天下安危所繋其憂甚逺長問何以治之能為天下除患則百福歸之不能則反為賊害策編竹為之後易之以玉焉也中卿進曰配天而有下土者先事慮事先患慮患先事慮事謂之接接讀為㨗速也中卿若宗伯也接則事優成先患慮患謂之豫豫則禍不生事至而後慮者謂之後後則事不舉患至而後慮者謂之困困則禍不可禦授天子二策禦禁也二䇿第二策下卿進曰敬戒無怠慶者在堂弔者在閭下卿若司冦也慶者雖在堂弔者已在門言相襲之速閭門也禍與福鄰莫知其門言同一門出入也賈誼曰憂喜聚門豫哉豫哉萬民望之授天子三策豫哉言可戒備也三策第三策禹見耕者耦立而式過十室之邑必下兩人共耕曰耦論語曰長沮桀溺耦而耕十室之邑必有忠信故下之也殺大蚤朝大晩非禮也殺謂田獵禽獸也禮記曰天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車蚤謂下先上也又曰朝辨色始入殺太蚤謂陵犯也朝大晩為懈弛也或曰禮記曰獺祭魚然後魚人入澤梁豺祭獸然後田獵先於此為蚤也又曰田不以禮是暴天物也治民不以禮動斯陷矣平衡曰拜下衡曰稽首至地曰稽顙平衡謂磬折頭與腰如衡之平禮記平衡與此義殊大夫之臣拜不稽首非尊家臣也所以辟君也辟讀為避一命齒於鄉再命齒於族三命族人雖七十不敢先一命公侯之士再命大夫三命卿也鄭註禮記曰此皆鄉飲酒時齒謂以年次坐若立也禮記曰三命不齒族人雖七十者不敢先言不唯不與少者齒老者亦不敢先也上大夫中大夫下大夫此覆一命再命三命也一命惟公侯之士子男之大夫也故曰下大夫也吉事上尊䘮事尚親吉事朝廷列位也䘮事以親者為主禮記曰以服之精麄為序君臣不}
