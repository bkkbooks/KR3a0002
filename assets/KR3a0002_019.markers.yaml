  - {type: variant, offset: 2798, length: 1168, content: 事生飾歡也送死飾哀也祭祀飾敬也師旅飾威也是百王之所同古今之所一也未有知其所由來者也故壙壠其䫉象室屋也棺椁其䫉象版蓋斯象拂也無帾絲歶縷翣其䫉以象菲帷幬尉也抗折其䫉以象槾茨番閼也故卒禮者無他焉明死生之義送以哀敬而終周藏也故葬埋敬葬其形也祭祀敬事其神也其銘誄繫世敬傳其名也事生飾始也送死飾終也終始具而孝子之事畢聖人之道備矣刻死而附生謂之墨刻生而附死謂之惑殺生而送死謂之賊大象其生以送其死使死生終始莫不稱宜而好善是禮義之法式也儒者是矣三年之喪何也曰稱情而立文因以飾群別親䟽貴賤之節而不可益損也故曰無適不易之術也創巨者其日久痛甚者其瘉遲三年之喪稱情而立文所以為至痛極也齊衰苴杖居廬食粥席薪枕塊所以為至痛飾也三年之喪二十五月而畢哀痛未盡思慕未忘然而禮以是斷之者豈不以送死有已復生有節也哉凡生乎天地之閒者有血氣之屬必有知有知之屬莫不愛其類今夫大鳥獸則失亡其群匹越月踰時則必反鈆過故鄉則必徘徊焉鳴號焉躑躅焉踟躕焉然後能去之也小者是燕爵猶有啁噍之頃焉然後能去之故有血氣之屬莫知於人故人之於其親也至死無窮將由夫愚陋淫邪之人與則彼朝死而夕忘之然而縱之則是曾鳥獸之不若也彼安能相與群居而無亂乎將由夫脩飾之君子與則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也故先王聖人安為之立中制節一使足以成文理則舍之矣然則何以分之曰至親以朞斷是何也曰天地則已易矣四時則已徧矣其在宇中者莫不更始矣故先王案以此象之也然則三年何也曰加隆焉案使倍之故再期也由九月以下何也曰案使不及也故三年以為隆緦小功以為殺期九月以為閒上取象於天下取象於地中取則於人人所以群居和一之理盡矣故三年之喪人道之至文者也夫是之謂至隆是百王之所同古今之所一也君之喪所以取三年何也曰君者治辨之主也文理之原也情貌之盡也相率而致隆之不亦可乎詩曰愷悌君子民之父母彼君子者固有為民父母之說焉父能生之不能食之母能食之不能教誨之君者已能食之矣又善教誨之者也三年畢矣哉乳母飲食之者也而三月慈母衣被之者也而九月君曲備之者也三年畢乎哉得之則治失之則亂文之至也得之則安失之則危情之至也兩至者俱積焉以三年事之猶未足也直無由進之耳故社祭社也稷祭稷也郊者并百王於上天而祭祀之也三月之殯何也曰大之也重之也所致隆也所致親也將舉錯之遷徙之離宮室而歸丘陵也先王恐其不文也是以繇其期足之日也故天子七月諸侯五月大夫三月皆使其須足以容事事足以容成成足以容文文足以容備曲容備物之謂道矣祭者志意思慕之積也愅詭悒僾而不能無時至焉故人之歡欣和合之時則夫忠臣孝子亦愅詭而有所至矣彼其所至者甚大動也案屈然已則其於志意之積者惆然不嗛其於禮節者闕然不具故先王案為之立文尊尊親親之義至矣故曰祭者志意思慕之積也忠信愛敬之至矣禮節文貌之盛矣苟非聖人莫之能知也聖人明知之士君子安行之官人以為守百姓以成俗其在君子以為人道也其在百姓以為鬼事也故鍾鼓管磬琴瑟竽笙韶夏護武汋桓箾象是, SBCK: ''}
