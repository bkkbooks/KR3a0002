  - {type: variant, offset: 1774, length: 221, content: 求也垂涕恐懼然而幸生之心未已持生之事未輟也卒矣然後作具之故雖備家必踰日然後能殯三日而成服然後告遠者出矣備物者作矣故殯久不過七十日速不損五十日是何也曰遠者可以至矣百求可以得矣百事可以成矣其忠至矣其節大矣其文備矣然後月朝卜宅月夕卜日然後葬也當是時也其義止誰得行之其義行誰得止之故三月之葬殯其䫉以生設飾死者也殆非直留死者以安生也是致隆思慕之義也卒禮之凡變而飾動而遠久而平故死之為道也不飾則惡惡則不哀尒則翫翫則厭厭則忘忘則不敬一朝而喪其嚴親而所以送葬, SBCK: ''}
