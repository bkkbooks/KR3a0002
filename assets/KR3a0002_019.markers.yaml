  - {type: variant, offset: 1241, length: 1, content: 理, WYG: 王誅四武王誅二周公卒業至成康則案無誅已並解在仲尼篇言周公終王業猶不得無誅伐至成康然後刑措也重引此者明不與民爭利則刑罰}
