  - {type: variant, offset: 1272, length: 1, content: 君, WYG: 古者列地建國非以貴諸侯而已列官職差爵禄非以尊大夫而已差謂制等級也主道知人臣道知事人謂賢良事謂職守故舜之治天下不以事詔而萬物成不以事詔告但委任而已謂若使禹治水不告治水之方略農精於田而不可以為田師工賈亦然以賢易不肖不待卜而後知吉以治伐亂不待戰而後知克無人禦敵故知必克齊人欲伐魯忌卞莊}
  - {type: variant, offset: 1274, length: 0, content: '', SBCK: 立志如窮通變似不能雖天子三公問正以是非對唯一故曰如窮至尊至貴對之也君子隘窮而不失而隕穫不失道勞倦而不苟苟不也免臨患難而不忘細席之言漸於飢寒而志不尸子子夏曰君子昔所踐履之言此細亦當讀為昔或曰細席講論之席僻銙於五兵而辭不懾臨大事不忘昔席之言昔席蓋王吉諫昌邑王曰廣厦之下細旃之}
