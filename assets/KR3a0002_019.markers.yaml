  - {type: variant, offset: 169, length: 0, content: '', WYG: 不尊父子不得不親兄弟不得不順夫婦不得不驩少者以長老者以養不得謂不得聖人之禮法驩與歡同故天地生之聖人成之聘問也享獻也私覿私見也使大夫出以珪璋聘所以相問也聘享奉束帛加璧享所以有獻也享畢賔奉束帛以請覿所以私見也聘享以賔禮見私覿以臣禮見故曰私見鄭注儀禮云享獻也既聘又獻所以厚恩意也言語之美穆穆皇皇爾雅曰穆穆敬也皇皇正也郭璞云皇皇自修正貌穆穆容儀謹敬也皆由言語之美所以威儀修飾或曰穆穆美也皇皇有光儀也詩曰皇皇者華朝廷之美濟濟鎗鎗鎗與蹌同濟濟多士貌蹌蹌有行列貌為人臣下者有諌而無訕有亡而無疾有怨而無怒謗上曰訕亡去也疾與嫉同惡也怨謂若公弟叔肹衛侯之弟鱄怒謂若慶鄭也君於大夫三問}
