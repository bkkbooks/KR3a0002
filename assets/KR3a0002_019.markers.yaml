  - {type: variant, offset: 1225, length: 2, content: 隆殺, krp: 養民情知榮辱衣食足不教無以理民性故須教人性惡故家五畒宅百畒田務其業而勿奪其時所以富之也五畒之宅樹之以桑五十者可以衣帛矣百畒宅居處也百畒一夫田也務謂勸勉之孟子曰之家可以無飢矣之田無失其時八口立太學設庠序脩六禮明十教所以道之也詩曰飲之食之教之誨之王事具矣也禮記曰父慈子孝兄良弟悌夫義婦聽長禮記曰六禮冠昏䘮祭郷相見十教即十義義道謂教導之也十或}
  - {type: variant, offset: 1228, length: 1, content: 要, SBCK: 七也惠幼順君仁臣忠十者謂之人武王始入殷表商容之閭式箕子之囚哭比干之墓天下郷善矣安國曰商容殷之賢人紂所貶退也表築旌之言武王好善天下郷之孔天下國有儍士世有賢人士每世皆有賢人天下之國皆有儍迷者不問路溺者不問遂亡人好獨所以迷由於不問路溺由以喻雖有賢儍不能用也水中可涉之徑也獨謂自用其計於不問遂亡由於好獨遂謂經隧詩曰我言維服勿用為笑先民有言詢于芻蕘言博問也雅板詩大我之所言乃今之急事汝無笑也之篇毛云芻蕘薪者也鄭云服事也有法者以法行無法者以類舉而舉之也皆類於法以其本知其末以其左知其右凡百事異理而相守也異其守其事雖同歸於理之類也則一謂若為善不同慶賞刑罰通類而後應於類通明功罰必罰罪不失其類也然後百姓應之謂賞必賞致教習俗相順而後行後可行也順人心然八十者一子不事九十者舉家不事廢疾非人不養者一人不事父母之䘮三年不事􅒥衰大功三月不事從諸侯不來或君之人入菜地不當為來謂從他國與新有昏朞不事䘮昏皆古者有與嗣續也事謂力役不事所以重其哀戚子謂子家駒續然大夫不如晏子父之後名覊駒其字也續然補續君之過不能子孔子謂言也子家駒魯公子慶之孫公孫歸如晏子也興功用故不晏子功用之臣也不如子産用不如雖有功恩惠也子産之子産惠人也不如管仲管仲之才略也雖有恩惠不如管仲之為人力功不力義力智不力仁合諸雖九不全用仁義也侯一匡天下而野人也不可以為天子大夫子皆言四仁義故不可為王者佐類郊野之人未浸漬於孟子三見宣王不言事門人曰曷為三遇齊王而不言事孟子曰我先攻其邪心心乃可與言也以正色攻去邪公行子之之燕岐云齊大夫也子之蓋其先也孟子曰行子有子之䘮右師徃弔趙遇曾元於􅂗曰燕君何如曾元曰志卑曾元曾參之子言不求逺大也志卑者輕物事物輕物者不求助以自輔不求賢苟不求助何能舉不勝任矣既無輔助必氐羗之虜也俘掠謂見不憂其係壘也而憂其不焚也死則焚其屍今不憂壘讀為纍氐羗之俗氏春秋曰憂其死而不焚虜獲而憂不焚是愚也吕利夫秋豪害靡國家然且為之幾為知計哉害遂披靡而來及於國家言靡披靡也利夫秋豪之細其虜何異幾辭也或曰幾讀為豈不䘏其大而憂其小與氐羗之今夫亡箴者終日求之而不得其得之非目益明也眸而見之也心之於慮亦然亦當反覆盡其精妙如眸子之求眸謂以眸審視之也言心於思慮也箴義與利者人之所兩有也雖堯舜不能去民之欲利然而能使其欲利不克其好義也勝也克亦雖桀紂亦不能去民之好義然而能使其好義不勝其欲利也故義勝利者為治世利克義者為亂世上重義則義克利上重利則利克義故天子不言多少諸侯不言利害大夫不言得䘮貨財也皆謂言士不通貨財得貿遷如商賈也士賤雖得言之亦不有國之君不息牛羊育也息蕃錯質之臣不息鷄豚子曰出疆必載質蓋錯置也質讀為贄孟於君再拜稽首禮記曰畜乗馬者不察於鷄豚或曰置質猶古字通耳置贄謂執贄而置於君士相見禮曰士大夫奠贄人臣則不得與下爭利言委質也言凡委質爲冢卿不脩幣大夫不為場園曰場樹菜􅂼曰園謂若公儀子不奪園夫工女之冢卿上卿不脩幣謂不脩財幣販息之也治稼穡也利從士以上皆羞利而不與民爭業樂分施而恥積臧然故民不困財貧窶者有所竄其手其手而力作也竄容也謂容集}
