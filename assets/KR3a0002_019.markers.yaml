  - {type: 'tls:seg', offset: 1243, content: '', id: KR3a0002_tls_019-9a.11}
  - {type: variant, offset: 1243, length: 1, content: 情, WYG: 也多積財而羞無有羞貧重民任而誅不能使民不能勝任而復誅之此邪行之所以起刑罰之所以多也上好羞則民闇飾矣好羞貧而事奢侈則民闇自修飾也上好富則民死利矣二者亂之衢也衢道民語曰欲富乎忍恥矣傾絶矣絶故舊矣與義分背矣忍耻不顧廉耻傾絶謂傾身絶命而求也分背如人分背而行上好富則人民之行如此安得不亂湯旱而禱曰政不節與使民疾與何以不雨至斯極也疾苦宫室榮與婦謁盛與何以不雨至斯極也榮盛謁請也婦謁盛謂婦言是}
