  - {type: variant, offset: 5, length: 0, content: '', WYG: 七此篇蓋弟子雜録荀卿之語皆略舉其要不可以一事名篇故總謂之大略也舊第二十七大略舉其標首所以起下文也君人者隆禮尊賢而王重法愛民而霸好利多詐而危欲近四旁莫如中央故王者必居天下之中禮也此明都邑居土中之意不近偏旁居中央取其朝貢道里均禮也言其禮制如此天子外屏諸侯内屏禮也外屏不欲見外也内屏不欲見内也屏猶蔽也屏謂之樹鄭康成云若今浮思也何休注公羊云禮天子諸侯臺門天子外闕兩觀諸侯内闕一觀禮天子外屏諸侯内屏大夫以簾士以帷倞謂不欲見内不察泉中魚之義也諸侯召其臣臣不俟駕顚倒衣裳而走禮也詩曰顚之倒之自公召之天子召諸侯諸侯輦輿就馬禮也輦謂人輓車言不暇待馬至故輦輿就馬也詩曰我出我車于彼牧矣自天子所謂我來矣詩小雅出車之篇毛云出車就馬於牧地鄭云有人自天子所謂我來矣謂以王命召已也此明諸侯奉上之禮也天子山冕諸侯𤣥冠大夫裨冕士韋弁禮也山冕謂畫山於衣而服冕即衮冕也蓋取其龍則謂之衮冕取其山則謂之山冕鄭注周禮司服云古冕服十二章衣五章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彞皆畫裳四章次六曰藻次七曰粉米次八曰黼次}
