  - {type: variant, offset: 1275, length: 1, content: 致, SBCK: 臨難不忘素所講習忠義之言漢書歲不寒無以知松栢事不難無以知君子無日不在是一日無有次必於是也不懐道所謂造雨小漢故濳李廵曰漢水溢流為潛今未詳或曰爾雅云漢為潛成至}
  - {type: variant, offset: 1275, length: 1, content: 致, krp: 臨難不忘素所講習忠義之言漢書歲不寒無以知松栢事不難無以知君子無日不在是一日無有次必於是也不懐道所謂造雨小漢故濳李廵曰漢水溢流為潛今未詳或曰爾雅云漢為潛成至}
