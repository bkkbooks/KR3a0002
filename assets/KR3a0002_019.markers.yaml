  - {type: variant, offset: 1237, length: 0, content: '', WYG: 曰士大夫奠贄於君再拜稽首禮曰畜馬乘者不察於雞豚或曰置質猶言委質也言凡委質為人臣則不得與下爭利冡卿不修幣大夫不為場園冢卿上卿不修幣謂不修財幣販息}
