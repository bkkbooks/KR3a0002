  - {type: variant, offset: 1943, length: 4, content: 獵禾稼服, SBCK: 貳若雜博則惑也其情之至極在一而詩云采采卷耳不盈頃筐嗟我懷人寘彼周行也頃筐畚屬易盈之器也思君子置於周之列位也詩周南卷耳之篇毛公云采采事采之也卷耳苓耳頃筐易滿也卷耳易得也然而不可以貳周行則不能滿況乎難得之正道而可以他術貳之乎采易得之物實易滿之器以懷人寘周行之心貳之故曰心枝則無知傾則不精貳則疑惑以賛稽之萬物可兼知也以一端而不二之道助考之則可枝旁引如樹枝也賛助也稽考也雜則愈不知也兼知萬物若博身盡其故則美事則身美矣故事也盡不二之類不可兩也故知}
  - {type: page-break, offset: 1943, content: '', id: KR3a0002_SBCK_015-10b}
  - {type: variant, offset: 1943, length: 4, content: 獵禾稼服, WYG: 貳若雜博則惑也詩云采采卷耳不盈頃筐嗟我懷人寘彼周行詩周南卷耳之篇毛公曰采采事采之也卷耳枲耳也頃筐畚屬易盈之噐也思君子置於周之列位也頃筐易滿也卷耳易得也然而不可以貳周行采易得之物實易盈之噐以懷人寘周行之心二之則不滿况乎難得之正道也而可以他術貳之乎故曰心枝則無知傾則不精貳則疑惑以贊稽之萬物可兼知也枝旁引如樹枝也賛助也稽考也以一端不貳之道助考之則可兼知萬物若博雜則愈不知也身盡其故則羙故自也盡不貳之事則身羙矣類不可兩也故知}
