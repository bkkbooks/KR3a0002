  - {type: variant, offset: 711, length: 353, content: 下可用也上不足卬則下不可用也下可用則強下不可用則弱是強弱之常也隆禮效功上也重祿貴節次也上功賤節下也是強弱之凡也好士者強不好士者弱愛民者強不愛民者弱政令信者強政令不信者弱民齊者強民不齊者弱賞重者強賞輕者弱刑威者強刑侮者弱械用兵革攻完便利者強械用兵革窳楛不便利者弱重用兵者強輕用兵者弱權出一者強權出二者弱是強弱之常也齊人隆技擊其技也得一首者則賜贖錙金無本賞矣是事小敵毳則偷可用也事大敵堅則渙然離耳若飛鳥然傾側反覆無日是亡國之兵也兵莫弱是矣是其出賃市傭而戰之幾矣魏氏之武卒以度取之衣三屬之甲操十二石之弩負服矢五十个置戈其上冠䩜帶劍贏三日之糧日中而趨百里中試則復其戶利其田宅是其氣力數年而衰而復利未可奪也改造則不易周也是故地雖大其稅必寡是危國之兵也秦人其生民也陿阸其使民也酷烈劫之以埶隱之以阸忸之以慶賞鰌之以刑罰使, krp: ''}
  - {type: variant, offset: 712, length: 0, content: '', WYG: 意同言心未嘗不包藏言有所謂虚也心未嘗不滿也然而有所謂一滿當為兩兩謂同時兼知心未嘗不動也然而有所謂静雖動不使害静人生而有知知而有志志也者臧也在心為志然而有所謂虛不以所已臧害所將受謂之虛見善則遷不滯於積習也心生而有知知而有異異也者同時兼知之同時兼知之兩也然而有所謂一不以夫一害此一謂之一既不滯於一隅物雖輻湊而至盡}
