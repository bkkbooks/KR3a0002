  - {type: variant, offset: 3427, length: 430, content: 兼人者有以力兼人者有以富兼人者彼貴我名聲美我德行欲為我民故辟門除涂以迎吾入因其民襲其處而百姓皆安立法施令莫不順比是故得地而權彌重兼人而兵俞強是以德兼人者也非貴我名聲也非美我德行也彼畏我威劫我埶故民雖有離心不敢有畔慮若是則戎甲俞眾奉養必費是故得地而權彌輕兼人而兵俞弱是以力兼人者也非貴我名聲也非美我德行也用貧求富用飢求飽虛腹張口來歸我食若是則必發夫稟窌之粟以食之委之財貨以富之立良有司以接之已朞三年然後民可信也是故得地而權彌輕兼人而國俞貧是以富兼人者也故曰以德兼人者王以力兼人者弱以富兼人者貧古今一也兼并易能也唯堅凝之難焉齊能并宋而不能凝也故魏奪之燕能并齊而不能凝也故田單奪之韓之上地方數百里完全富足而趨趙趙不能凝也故秦奪之故能并之而不能凝則必奪不能并之又不能凝其有則必亡能凝之則必能并之矣得之則凝兼兵無強古者湯以薄武王以滈皆百里之地也天下為一諸侯為臣無它故焉能凝之也故凝士以禮凝民以政禮脩而士服政平而民安士服民安夫是之謂大凝以守則固以征則強令行禁止王者之事畢矣, SBCK: 明荀子卷第十五}
