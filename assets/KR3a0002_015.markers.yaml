  - {type: 'tls:seg', offset: 2977, content: '', id: KR3a0002_tls_015-16a.5}
  - {type: variant, offset: 2977, length: 0, content: '', WYG: 周而成泄而敗明君無之有也以周密為成以漏泄為敗明君無此事也明君日月之照臨安用周密也宣而成隱而敗闇君無之有也以宣露為成以隱蔽為敗闇君亦無此事也闇君務在隱蔽而不知昭明之功也}
