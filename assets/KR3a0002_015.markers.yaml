  - {type: variant, offset: 2966, length: 2, content: 賞慶, WYG: 之無益於成也求之無益於得也憂戚之無益於幾也言役心無益復憂戚亦不能近道也則廣焉能弃之矣不以自妨也不少頃干之胸中廣讀}
  - {type: variant, offset: 2969, length: 0, content: '', WYG: 曠逺也不以自妨謂不以無益害有益也不慕徃不閔來無邑憐}
  - {type: punctuation, offset: 2970, content: ，, id: KR3a0002_tls_015-bkkpn632}
  - {type: 'tls:seg', offset: 2970, content: '', id: KR3a0002_tls_015-16a.4}
  - {type: variant, offset: 2970, length: 0, content: '', WYG: 心不慕徃謂不恱慕無益之事而徃從之也不閔來謂不憂閔無益之事而來正之也或曰徃古昔也來將來也不慕徃古不閔將來言為義所在無所繫滯也邑憐未詳或曰邑與悒同怏也憐讀為恡惜也言棄無益之事更無悒怏恡惜之心此皆明不為異端所蔽也當時}
  - {type: variant, offset: 2971, length: 5, content: 見害傷焉止, WYG: 動物至而應事起而辯治亂可否昭然明}
