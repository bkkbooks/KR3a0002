  - {type: variant, offset: 1760, length: 1, content: 夫, SBCK: 心事道則萬物無不盡以飾心思道則其餘字皆衍也作之則行言人心有動作則自行也以虚心須執其本而末隨也萬變無不察此皆言知道察知道行體道者也謂須道者虚則將也體謂不離道也知道察謂思道者靜則察也知道行虚壹而靜謂之大淸明壅蔽者言無有萬物莫形而不見莫見而不論莫論而失位者無不見見則無不能論􅀃論􅀃旣虚壹而靜則通於萬物故有形得其宜則無不坐於室而見四海處於今而論久逺䟽觀萬物而知其情參稽治亂而通其度考度制也䟽通參驗稽經緯天地而材官萬物制割大理而宇宙裏矣任裏當爲理材或爲栽也材謂當其分官謂不失其恢恢廣廣孰知其極睪睪廣廣孰知其德涫涫紛紛孰知其形明參日月大滿八極}
