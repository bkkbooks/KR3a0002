  - {type: variant, offset: 1743, length: 0, content: '', SBCK: 之蔽者唐鞅奚齊是也王之臣吕唐鞅宋康子論衡曰宋王問唐鞅曰吾殺戮甚衆而羣臣愈不畏何氏春秋曰宋康王染於唐鞅田不禋奚齊晋獻公驪􅁎之也不若無辨其善一時罪之則羣臣畏矣宋王從之也對曰王罰不善者善者胡爲畏王少欲羣臣之畏唐鞅蔽於欲權而逐載子王者見孟子或曰戴子戴驩也載讀爲戴戴不勝使薛居州傅門者謹爲我司之使者報曰不見輜車見有奉笥而與李史史韓子曰戴驩爲宋太宰夜使人曰吾聞有數夜乘輜車之李史據其時代當是戴驩也蓋為唐鞅所逐奔齊也受笥又戴驩謂齊王曰王大仁於薛公大不忍人奚齊蔽於欲國而罪申生譛獻公殺之春秋穀梁傳曰晉里克弑其申生晋獻公之太子奚齊之兄為驪􅁎所子也不正其殺太子申生而立也君之子奚齊其君之子云者國人不唐鞅戮於宋奚齊戮於晉逐賢相而罪孝兄身爲刑戮然而不知此蔽塞之禍也故以貪鄙背叛爭權而不危辱滅亡者自古及今未甞有之也鮑叔􅇞戚隰朋仁知且不蔽故能持管仲而名利福禄與管仲齊翼也持扶召公吕望仁知且不蔽故能持周公而名利福禄與周公齊傳曰知賢之謂明輔賢之謂能勉之彊之其福必長此之謂也此不蔽之福也言必勉之勉之彊之若山出口丁子有尾之類也蔽於虛辭而不知實理虚辭謂莊子蔽於天而不知人推治亂於天而不知在人也天謂無爲自然之道莊子但故由用謂之道盡利也道無復仁義皆盡於求利也由從也若由於用則天下之由俗謂之道盡嗛矣節限則天下之道盡於快意也嗛口簟反俗當爲欲嗛與慊同快也言若從人所欲不爲由法謂之道盡數矣下之道盡於術數也由法而不由賢則天由埶謂之道盡便矣則盡於逐便無復脩立便便宜也從埶而去智由辭謂之道盡論矣􅀃也論辨由天謂之道盡因矣其自因任治化也然無復此數具者皆道之一隅也夫道者體常而盡變一隅不足以舉之變猶天地常存言道者體常盡之變化也能盡萬物曲知之人觀於道之一隅而未之能識也一隅猶昧況大道乎曲知言不通於大道也故以爲足而飾之其言之成理也謂其持之有故内以自亂外以惑人上以蔽下下以蔽上此蔽塞之禍也孔子仁知且不蔽故學亂術足以爲先王者也多才藝足以亂雜也言其王也及先一家得周道舉而用之不蔽於成積也習也言其所用不滯於衆人舊習故能功業如此一家得謂作春秋也周道舉謂刪詩書定禮樂成積舊故德與周公齊名與三王並此不蔽之福也聖人知心術之患見蔽塞之禍故無欲無惡無始無終無近無逺無博無淺無古無今兼陳萬物而中縣衡焉其中而縣衡揣不滯於一隅但當重也其輕是故衆異不得相蔽以亂其倫也理倫何謂衡曰道禮義道謂故心不可以不知道心不知道則不可道而可非道以道爲可可謂心不知道則不也合意人孰欲得恣而守其所不可以禁其所可合意之事以自禁其合意者人心誰欲得縱恣而肯守其不以其不可道之心取人則必合於不道人而不知合於道人其類各求以其不可道之心與不可道之人論道人亂之本也賢害善必有妬夫何以知以知道問何道也人曰心知道然後可道可道然後能守道以禁非道以其可道之心取人則合於道人而不合於不道之人矣以其可道之心與道人論非道治之要也姦去惡必能懲何患不知患不知道人心苟知道何故治之要在於知道人何以知道問知道之術如何也旣知道人在於知道曰心無邪在心心何以知曰虚壹而靜以知道也能然則可心未甞不臧也然而有所謂虚未甞不苞藏然有所謂虚也臧讀爲藏古字通下同言心心未甞不滿也然而有所謂一謂同時兼知滿當爲兩兩心未甞不動也然而有所謂靜害靜也雖動不使人生而有知知而有志志也者臧也爲志在心然而有所謂虚不以己所臧害所將受謂之虚則遷見善積習也不滯於心生而有知知而有異異也者同時兼知之同時兼知之兩也然而有所謂一不以夫一害此一謂之壹物雖輻湊而至旣不滯於一隅待之也盡可以一心卧則夢偷則自行使之則謀也自卧寢則必夢偷則必放縱役用則必謀}
