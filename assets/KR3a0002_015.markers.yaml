  - {type: variant, offset: 2937, length: 2, content: 刑二, krp: 心譬如槃水正錯而勿動則湛濁在下而淸明在上滓也下同湛讀爲沈泥則足以見鬚眉而察理矣之文理理肌膚微風過之湛濁動乎下淸明亂於上則不可以得大形之正也心亦如是矣故導之以理養之以淸物莫之傾和之氣淸謂沖則足以定是非決嫌疑矣小物引之則其正外易其心内傾則不足以決麤理矣心不一於道爲言此者以喻則惑也異端所蔽故好書者衆矣而倉頡獨傳者壹也道異術不能亂之故獨傳也情箸古者倉頡之有天倉頡黄帝史官言古亦有好書者不如倉頡一於其神農亦然也下守法授親好稼者衆矣而后稷獨傳者壹也好樂者衆矣而夔獨傳者壹也好義者衆矣而舜獨傳者壹也倕作弓浮游作矢而羿精於射云黄帝臣此云浮游未詳或者浮游夷倕舜之共工世本云夷牟作矢宋衷注也弓矢舜已前有之此云倕作弓當是改制精巧故亦言作也牟之别名或聲相近而誤耳言倕游雖作弓矢未必能射而羿精之奚仲作車乘杜作乘馬而造父精於御自古及今未甞有兩而能精者也帝時已有車服故謂奚仲夏禹時車正黄同乘馬四馬也四馬駕車處於相土故曰作乗馬以其作乗之軒轅此云奚仲者亦改制耳世本云相土作乗馬杜與土土契孫也吕氏春秋曰乗馬作一駕馬之法故謂之乗杜乗並音剰相曾子曰是其庭可以搏䑕惡能與我歌矣言有人視庭中可是蓋當爲視曽子外物誘之思不精故不能成歌詠也以搏擊䑕則安能與我成歌詠乎言空石之中有人焉其名曰觙山空石之中名之曰觙觙字及事並空石石穴也蓋古有善射之人處深假設喻之耳未詳所出或其爲人也善射以好思静思其射好喜也清妙之耳目之欲接則敗其思蚊䖟之聲聞則挫其精是以闢耳目之欲而逺蚊蝱之聲閑居靜思則通靜思不接外物故能通射之妙挫損也精精誠也闢屏除也言閑居思仁若是可謂微乎則可謂微乎假設問之辭也言靜思仁如空石之人思射孟子惡敗而出妻可謂能自彊矣之之辭孟此已下荅可謂能自彊於脩身也子惡其敗德而出其妻有子惡卧而焠掌可謂能自忍矣未及好也其寢卧而焠其掌若刺股有子蓋有若也焠灼也惡子焠掌可謂能自忍其身則未及善好思者也若思道之至然也未及好也當爲未及好思也誤分在下更作一句耳有用焠掌乎則自無寢焉闢耳目之欲可謂能自彊矣未及思也蚊蝱之聲聞則挫其精可謂危矣未可謂微也矣言能闢耳目之欲則可謂能自危而戒懼未可謂能自彊矣未及思也十字並衍耳可謂危精妙之謂也可謂㣲也微者夫微者至人也如舜者惟精惟一至人也何彊何忍何危在作爲苟未臻極雖在空石之中旣造於精妙之域則冥與理㑹不至也猶未故濁明外景淸明内景混跡淸謂虚白景光色也濁謂聖人縱其欲兼其情而制焉者理矣夫何彊何忍何危由於暗與理㑹故也何必如空石之徒乎兼猶盡也聖人雖縱欲盡情而不過制者故仁者之行道也無爲也聖人之行道也無彊也也無彊謂全無違理彊制之萌也無爲謂知違理則不作所謂造形而悟仁者之思也恭聖人之思也樂此治心之道也樂謂性與天道無所不適思慮也恭謂乾乾夕惕也凡觀物有疑中心不定則外物不淸審也淸明吾慮不淸則未可定然否也㝠㝠而行者見寢木以爲伏虎也見植林以爲後人也㝠㝠蔽其明也夜也冥冥暮醉者越百歩步溝以爲蹞步之澮也曰跬澮小溝也蹞與跬同半步俯而出城門以爲小之閨也酒亂其神也門也閨小厭目而視者視一以爲兩掩耳而聽者聽漠漠而以爲哅哅埶亂其官也也哅哅喧聲也官司主也言厭指按也一渉反漠漠無聲主守哅許用反勢亂耳目之所故從山下望牛者若羊而求羊者不下牽也逺蔽其大也從山下而望木者十仞之木若箸而求箸者不上折也髙蔽其長也守道者亦宜知異術之蔽類此也皆知爲髙逺所蔽故不往求然則水動而景揺人不以定美惡水埶玄也或讀爲眩玄幽深也瞽者仰視而不見星人不以定有無用精惑也明也精目之有人焉以此時定物則世之愚者也彼愚者之定物以疑决疑决必不當夫苟不當安能無過乎慎墨之屬也以疑决疑猶夏首之南有人焉曰㳙蜀梁而不見王逸曰夏首水口也㳙蜀梁未詳何代夏首夏水之首楚詞云過夏首而西浮顧龍門人隱於宕山餌木能致風雨者也人姓㳙名蜀梁列仙傳有㳙子齊其爲人也愚而善畏好有所畏善猶喜也明月而宵行俯見其影以爲伏鬼也卬視其髮以爲立魅也仰同卬與背而走比至其家者失氣而死豈不哀哉氣謂困甚氣背棄去也失也絶凡人之有鬼也必以其感忽之閒疑玄之時正之深難測也必以此時定其有鬼也感驚動也感忽猶慌愡也玄亦幽此人之所以無有而有無之時也以無爲有也此皆人所疑惑無有謂以有爲無也有無謂也之時而已以正事故傷於溼而擊鼓鼓痺則必有敝鼔喪豚之費矣而未有俞疾之福也反擊鼓烹豚以禱神何益於愈疾乎若以此定事則與已以正事謂人以此定事也痺冷疾也傷於濕則患痺俞讀爲愈俗不殊也故雖不在夏首之南則無以異矣墨慎猶是也之蔽亦凡以知人之性也可以知物之理也之性推以知人物理也之則可知以可以知人之性求可以知物之理而無所疑止之則没世窮年不能徧也盡其年壽疑或爲凝疑止謂有所不爲窮年其所以貫理焉雖億萬已不足以浹萬物之變與愚者若一浹周也貫習也當爲接子叶反或學老身長子而與愚者若一猶不知錯夫是之謂妄人子已長矣猶不知廢捨無益錯置也謂廢捨也身已老矣愚妄之人也之學夫是之謂故學也者固學止之也惡乎止之曰止諸至足曷謂至足曰聖也當有王字誤或曰聖下更道不學異術也聖王之道是爲至足也脱耳言人所學當止於聖人之道及王聖也者盡倫者也王也者盡制者也制法度也倫物理也兩盡者足以爲天下極矣至足也所以爲故學者以聖王爲師案以聖王之制爲法法其法以求其統類類以務象效其人之大綱統類法嚮是而務士也類是而幾君子也者脩飾之名君子有道徳之稱也幾近也類聖}
  - {type: 'tls:seg', offset: 2940, content: '', id: KR3a0002_tls_015-15a.25}
  - {type: variant, offset: 2941, length: 0, content: '', SBCK: 近之則爲君子士知之聖人也之道者知聖王故有知非以慮是則謂之懼是則謂之能戒懼也自知其非以圖慮於有勇非以持是則謂之賊持制是也勇於爲非以察孰非以分是則謂之簒甚孰之心此簒奪之人也也察甚其非以分爲是多能非以脩蕩是則謂之知爲是則謂之知言智者能變非爲是也脩飾也蕩動也多能知非脩飾蕩動而辨利非以言是則謂之詍之詍詍多言也詩曰無然詍詍辯説利口而飾非以言亂是則謂傳曰}
  - {type: page-break, offset: 2941, content: '', id: KR3a0002_SBCK_015-17b}
  - {type: variant, offset: 2941, length: 0, content: '', WYG: 近之則為君子士者修飾之名君子有道徳之稱也知之聖人也知聖王之道者故有知非以慮是則謂之懼自知其非以圖慮於是則謂之能戒懼也有勇非以持是則謂之賊勇於為非以持制是察孰非以分是則謂之簒孰甚也察其甚非以分為是之心此簒奪之人也多能非以修蕩是則謂之知修飾也蕩動也多能非修飾蕩動而為是則謂之知言智者能變非為是也辯利非以言是則謂之詍辯説利口而飾非以言亂是則謂之詍詍多言也詩曰無然詍詍傳曰}
