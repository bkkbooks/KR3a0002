  - {type: variant, offset: 1875, length: 0, content: '', SBCK: 也而神明之主也出令而無所受令以使百心出令體所使也體不爲百自禁也自使也自奪也自取也自行也自止也然所以爲形之君也此六者皆由心使也故口可劫而使墨云形可劫而使詘申心不可劫而使易意是之則受非之則辭心不可劫所以尤冝慎擇劫迫也云言也百體可劫塞之患也所好懼蔽故}
