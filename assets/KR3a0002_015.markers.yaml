  - {type: variant, offset: 1114, length: 623, content: 世有勝非幸也數也故齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之銳士秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義有遇之者若以焦熬投石焉兼是數國者皆干賞蹈利之兵也傭徒鬻賣之道也未有貴上安制綦節之理也諸侯有能微妙之以節則作而兼殆之耳故招近募選隆埶詐尚功利是漸之也禮義教化是齊之也故以詐遇詐猶有巧拙焉以詐遇齊辟之猶以錐刀墮大山也非天下之愚人莫敢試故王者之兵不試湯武之誅桀紂也拱揖指麾而強暴之國莫不趨使誅桀紂若誅獨夫故泰誓曰獨夫紂此之謂也故兵大齊則制天下小齊則治鄰敵若夫招近募選隆埶詐尚功利之兵則勝不勝無常代翕代張代存代亡相為雌雄耳矣夫是之謂盜兵君子不由也故齊之田單楚之莊蹻秦之衛鞅燕之繆蟣是皆世俗之所謂善用兵者也是其巧拙強弱則未有以相君也若其道一也未及和齊也掎契司詐權謀傾覆未免盜兵也齊桓晉文楚莊吳闔閭越句踐是皆和齊之兵也可謂入其域矣然而未有本統也故可以霸而不可以王是強弱之效也孝成王臨武君曰善請問為將孫卿子曰知莫大乎棄疑行莫大乎無過事莫大乎無悔事至無悔而止矣成不可必也故制號政令欲嚴以威慶賞刑罰欲必以信處舍收臧欲周以固徙舉進退欲安以重欲疾以速窺敵觀變欲潛以深欲伍以參遇敵決戰必道吾所明無道吾所疑夫是之謂六術無欲將而惡廢無急勝而忘敗無威內而輕外無見其利而不顧其害凡慮事欲孰而用財欲泰夫是之謂五權將所以不受命於主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至凡受命於主而行三軍三軍既定百官得序群物皆正則主不能喜敵不能怒, SBCK: 海哭}
