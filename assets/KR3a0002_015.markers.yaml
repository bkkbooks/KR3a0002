  - {type: variant, offset: 1288, length: 207, content: 敢試故王者之兵不試湯武之誅桀紂也拱揖指麾而強暴之國莫不趨使誅桀紂若誅獨夫故泰誓曰獨夫紂此之謂也故兵大齊則制天下小齊則治鄰敵若夫招近募選隆埶詐尚功利之兵則勝不勝無常代翕代張代存代亡相為雌雄耳矣夫是之謂盜兵君子不由也故齊之田單楚之莊蹻秦之衛鞅燕之繆蟣是皆世俗之所謂善用兵者也是其巧拙強弱則未有以相君也若其道一也未及和齊也掎契司詐權謀傾覆未免盜兵也齊桓晉文楚莊吳闔閭越句踐是皆和齊之兵也可謂入其域矣然而未有本統也故可以霸, WYG: 形}
