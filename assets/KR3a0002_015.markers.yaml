  - {type: variant, offset: 2933, length: 0, content: '', SBCK: 不以事詔而萬物成能舜已未甞躬親以事告人一於道伹委任衆賢而處一之危其榮滿側養一之微榮矣而未知危謂不自安戒懼之謂也側一謂心一也危之當爲之危業業終使之安也養心之微謂養其未萌不使異端亂之謂偪側亦充滿之義微精妙也處心之危言能戒懼兢兢無形故雖榮而未知言辭之爲治養其未萌也也處心之危有形故其榮滿則可知也養心之微故道經曰人心之危道心之微}
  - {type: variant, offset: 2933, length: 2, content: 蓋殺, WYG: 不以事詔而萬物成舜能}
  - {type: variant, offset: 2933, length: 0, content: '', krp: 不以事詔而萬物成能舜已未甞躬親以事告人一於道伹委任衆賢而處一之危其榮滿側養一之微榮矣而未知危謂不自安戒懼之謂也側一謂心一也危之當爲之危業業終使之安也養心之微謂養其未萌不使異端亂之謂偪側亦充滿之義微精妙也處心之危言能戒懼兢兢無形故雖榮而未知言辭之爲治養其未萌也也處心之危有形故其榮滿則可知也養心之微故道經曰人心之危道心之微}
  - {type: variant, offset: 2934, length: 1, content: 殺, SBCK: 有道之經也孔安國曰今虞書有此語而云道經此以明舜之治在精}
  - {type: variant, offset: 2934, length: 1, content: 殺, krp: 有道之經也孔安國曰今虞書有此語而云道經此以明舜之治在精}
  - {type: variant, offset: 2936, length: 0, content: '', SBCK: 於道不蔽於一隅也危則難安微則難明故誡以精一信執其中引危微之幾惟明君子而後能知之與機同㡬萌兆也故}
