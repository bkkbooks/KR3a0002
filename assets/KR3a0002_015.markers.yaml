  - {type: variant, offset: 2302, length: 310, content: 天下也故近者親其善遠方慕其義兵不血刃遠邇來服德盛於此施及四極詩曰淑人君子其儀不忒此之謂也李斯問孫卿子曰秦四世有勝兵強海內威行諸侯非以仁義為之也以便從事而已孫卿子曰非女所知也女所謂便者不便之便也吾所謂仁義者大便之便也彼仁義者所以脩政者也政脩則民親其上樂其君而輕為之死故曰凡在於軍將率末事也秦四世有勝諰諰然常恐天下之一合而軋己也此所謂末世之兵未有本統也故湯之放桀也非其逐之鳴條之時也武王之誅紂也非以甲子之朝而後勝之也皆前行素脩也此所謂仁義之兵也今女不求之於本而索之於末此世之所以亂也禮者治辨之極也強國之本也威行之道也功名之揔也王公由之所以得天下也不由之所以隕社稷也故堅甲利兵不足以為武高城深池不足以為固嚴令繁刑不足以為威由其, WYG: ''}
