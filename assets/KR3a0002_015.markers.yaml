  - {type: variant, offset: 2684, length: 244, content: 非其道故也汝潁以為險江漢以為池限之以鄧林緣之以方城然而秦師至而鄢郢舉若振槁然是豈無固塞隘阻也哉其所以統之者非其道故也紂刳比干囚箕子為炮格之刑殺戮無時臣下懍然莫必其命然而周師至而令不行乎下不能用其民是豈令不嚴刑不繁也哉其所以統之者非其道故也古之兵戈矛弓矢而已矣然而敵國不待試而詘城郭不辦溝池不拑固塞不樹機變不張然而國晏然不畏外而固者無它故焉明道而鈞分之時使而誠愛之則下之和上也如影響有不由令者然后俟之以刑故刑一人而天下服罪人不郵其上知罪之在己也是故刑罰省而威行如流無它故焉由其道故也古者帝堯, SBCK: 舜}
