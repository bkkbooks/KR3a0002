  - {type: variant, offset: 2944, length: 0, content: '', SBCK: 曲直者耶正而能分是非治曲直乎言有不以合王制與不合爲隆能也必不若夫非分是非非治曲直非辨治亂非治人道雖能之無益於人不能無損於人案直將治怪説玩竒辭以相撓滑也案彊鉗而利口厚顔而忍詬無正而恣睢妄辨而幾利矝夸也幾近也妄辨幾利謂妄爲辨説所近者惟滑亂也音骨彊彊服人鉗鉗人口也詬詈也恣睢也利不好辭讓不敬禮節而好相推擠此亂世姦人之􅀃也則天下之治􅀃者方多然矣惠之屬慎墨季}
  - {type: page-break, offset: 2944, content: '', id: KR3a0002_SBCK_015-18b}
  - {type: variant, offset: 2944, length: 0, content: '', WYG: 曲直者耶冇不以合王制與不合為隆正者而能分是非治曲直乎言必不能也若夫非分是非非治曲直非辯治亂非治人道雖能之無益於人不能無損於人案直將治怪説玩竒辭以相撓滑也案彊鉗而利口厚顔而忍詬無正而恣睢妄辯而幾利滑亂也音骨彊彊服人鉗鉗人口也詬詈也恣睢矜夸也幾近也妄辯幾利謂妄為辯説所近者惟利也不好辭讓不敬禮節而好相推擠此亂世姦人之説也則天下之治説者方多然矣慎墨季惠之屬}
  - {type: variant, offset: 2944, length: 0, content: '', krp: 曲直者耶正而能分是非治曲直乎言有不以合王制與不合爲隆能也必不若夫非分是非非治曲直非辨治亂非治人道雖能之無益於人不能無損於人案直將治怪説玩竒辭以相撓滑也案彊鉗而利口厚顔而忍詬無正而恣睢妄辨而幾利矝夸也幾近也妄辨幾利謂妄爲辨説所近者惟滑亂也音骨彊彊服人鉗鉗人口也詬詈也恣睢也利不好辭讓不敬禮節而好相推擠此亂世姦人之說也則天下之治說者方多然矣惠之屬慎墨季}
