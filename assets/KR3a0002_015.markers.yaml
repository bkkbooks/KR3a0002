  - {type: variant, offset: 2937, length: 2, content: 刑二, WYG: 處一危之其榮滿側養一之微榮矣而未知一謂心一也危之當為之危危謂不自安戒懼之謂也側謂偪側亦充滿之義微精妙也處心之危言能戒懼兢兢業業終使之安也養心之微謂養其未萌不使異端亂之也處心之危有形故其榮滿則可知也養心之微無形故雖榮而未知言舜之為治養其未萌也故道經曰人心之危道心之微今虞書有此語而云道經盖有道之經也孔安國曰危則難安微則難明故戒以精一信執其中引此以明舜之治在精於一道不蔽於一隅也危微之幾惟明君子而後能知之㡬萌兆也與機同故人心譬如槃水正錯而勿動則湛濁在下而清明在上湛濁謂沈汎滓也下同則足以見鬚眉而察理矣理肌膚之文理微風過之湛濁動乎下清明亂於上則不可以得大形之正也心亦如是矣導之以理養之以清物莫之傾清謂冲和之氣則足以定是非決嫌疑矣小物引之則其正外易其心内傾則不足以决麤理也言此者以喻心不一於道為異端所蔽則惑矣故好書者衆矣而倉頡獨傳者一也倉頡黄帝史官言古亦有好書者不如倉頡一於其道異術不能亂之故獨傳也好稼者衆矣而后稷獨傳者一也好樂者衆矣而䕫獨傳者一也好義者衆矣而舜獨傳者一也倕作弓浮游作矢而羿精於射倕舜之共工世本云夷牟作矢宋𠂻註云黄帝臣此云浮游未詳或者浮游夷牟之别名或聲相近而誤耳言倕游雖作弓矢未必能射而羿精之也弓矢舜已前有之此云倕作弓當是改制精巧故亦言作也奚仲作車乘杜作乘馬而造父精於御自古及今未嘗有兩而能精者也奚仲夏禹時車正黄帝時已有車服故謂之軒轅此云奚仲者亦改制耳世本云相土作乘馬杜與土同乘馬四馬駕車起於相土故曰作乘馬以其作乘馬之法故謂之乘並音剰相土契孫也吕氏春秋曰乘馬作一駕曾子曰是其庭可以搏䑕惡能與我歌矣是當為視曽子曰有人視庭中可以搏擊䑕則安能與我成歌詠乎言外物誘之思不精故不能成歌詠也空石之中有人焉其名曰觙空石石穴也盖古有善射之人處深山空石之中名之曰觙觙字及事並未詳所出或假設喻耳其為人也善射以好思好喜也清静思其射之妙耳目之欲接則敗其思蚊䖟之聲聞則挫其精是以闢耳目之欲而逺蚊䖟之聲閑居静思則通挫損也精精誠也闢屏除也言閑居静思不接外物故能通射之妙也思仁若是可謂微乎言静思仁如空石之人思射則可謂微乎假設問之辭也孟子惡敗而出妻可謂能自彊矣此已下荅之之辭孟子惡其敗德而出其妻可謂能自彊於修身也有子惡卧而焠掌可謂能自忍矣未及好也有子盖有若也焠灼也惡寢卧而焠其掌若刺股然也未及好也當為未及好思也誤分在下更作一句耳有子焠掌可謂能自忍其身則未及善射好思者也若思道之至則自無寢焉用焠掌乎闢耳目之欲可謂能自彊矣末及思也蚊䖟之聲聞則挫其精可謂危矣未可謂微也可謂能自彊矣未及思也十字並衍耳可謂危矣言能闢耳目之欲則可謂能自危而戒懼未可謂㣲也微者精妙之謂也夫微者至人也惟精惟一如舜者至人也何彊何忍何危既造於精妙之域則冥與理㑹不在作為苟未臻極雖在空石之中猶未至也故濁明外景清明内景景光色也濁謂混跡清謂虛白聖人縱其欲兼其情而制焉者理矣夫何彊何忍何危兼猶盡也聖人雖縱欲盡情而不過制者由於暗與理㑹故也何必如空石之徒乎故仁者之行道也無為也聖人之行道也無彊也無為謂知違理則不作所謂造形而悟也無彊謂全無違理彊制之萌也仁者之思也恭聖人之思也樂此治心之道也思慮也恭謂乾乾夕惕也樂謂性與天道無所不適也凡觀物有疑中心不定則外物不清清明審也吾慮不清則未可定然否也冥𠖇而行者見寢石以為伏虎也見植林以為後人也𠖇冥蔽其明也冥𠖇暮夜也醉者越百歩之溝以為蹞歩之澮也蹞與跬同半歩曰跬澮小溝也俯而出城門以為小之閨也酒亂其神也閨小門也厭目而視者視一以為兩掩耳而聽者聽漠漠以為哅哅勢亂其官也厭指按也一渉反漠無聲也哅哅喧聲也官司主也言勢亂耳目之所主守哅許甬反故從山下望牛者若羊而求羊者不下牽也逺蔽其大也從山下而望木者十仞之木若箸而求箸者不上折也髙蔽其長也皆知為髙逺所蔽故不徃求然則守道者亦宜知異術之蔽類此也水動而影揺人不以定羙惡水勢𤣥也𤣥幽深也或讀為眩瞽者仰視而不見星辰不以定有無用精惑也精目之明也有人焉以此時定物則世之愚者也彼愚者之定物以疑决疑决必不當夫苟不當安能無過乎以疑决疑猶慎墨之屬也夏首之南有人焉曰㳙蜀梁夏首夏水之首楚詞云過夏首而西浮顧龍門而不見王逸曰夏首夏水口也㳙蜀梁未詳何代人姓㳙名蜀梁列仙傳有㳙子齊人隱於宕山餌水能致風雨者也其為人也愚而善畏善猶喜也好有所畏明月而宵行俯見其影以為伏鬼也卬視其髮以為立魅也卬與仰同背而走比至其家者失氣而死豈不哀哉背弃去也失氣謂困甚氣絶也凡人之有鬼也必以其感忽之間疑𤣥之時正之感驚動也感忽猶慌惚也𤣥亦幽深難測也必以此時定其有鬼也此人之所以無有而有無之時也無有謂以有為無也有無謂以無為有也此皆人所疑惑之時也而已以正事故傷於溼而擊鼓鼓痺則必有弊鼔䘮豚之費矣而未有俞疾之福也已以正事謂人以此定事也痺冷疾也傷於溼則患痺反擊鼓烹豚以禱神何益於愈疾乎若以此定事則與俗不殊也俞讀為愈故雖不在夏首之南則無以異矣慎墨之蔽亦猶是也凡以知人之性也可以知物之理也以知人之性推之則可知物理也以可以知人之性求可以知物之理而無所疑止之則没世窮年不能徧也疑止謂有所不為窮年盡其年夀疑或為凝其所以貫理焉雖億萬已不足以浹萬物之變與愚者若一貫習也浹周也子叶反或當為接學老身長子而與愚者若一猶不知錯夫是之謂妄人錯置也謂廢捨也身已老矣子已長矣猶不知廢捨無益之學夫是之謂愚妄人也故學也者固學止之也惡乎止之曰止諸至足曷謂至足曰聖也或曰聖下更當有王字誤脱耳言人所學當止於聖人之道及王道不學異術也聖王之道是為至足也聖也者盡倫者也王也者盡制者也倫物理也制法度也兩盡者足以為天下極矣所以為至足也故學者以聖王為師案以聖王之制為法法其法以求其統類類以務象効其人統類法之大綱嚮是而務士也類是而幾君子也幾近也類聖}
