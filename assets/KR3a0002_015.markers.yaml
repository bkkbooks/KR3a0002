  - {type: variant, offset: 1744, length: 2, content: 必先, SBCK: 行放縱也使役也言人心有所思寢故心未甞不動也然而有所謂靜不以夢劇亂知謂之靜胷中以亂其知斯爲靜也此皆明不蔽於一端虚受之義也夢想象也劇囂煩也言處心有常不蔽於想象囂煩而介於未得道而求道者謂之虚壹而靜心不滯於有求道之是虛壹而靜偏見曲説則作之則將須道者之虚則人將}
