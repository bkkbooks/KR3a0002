  - {type: variant, offset: 361, length: 317, content: 之用十里之國則將有百里之聽用百里之國則將有千里之聽用千里之國則將有四海之聽必將聰明警戒和摶而一故仁人之兵聚則成卒散則成列延則若莫邪之長刃嬰之者斷兌則若莫邪之利鋒當之者潰圜居而方正則若盤石然觸之者角摧案角鹿埵隴種東籠而退耳且夫暴國之君將誰與至哉彼其所與至者必其民也而其民之親我歡若父母其好我芬若椒蘭彼反顧其上則若灼黥若仇讎人之情雖桀跖豈又肯為其所惡賊其所好者哉是猶使人之子孫自賊其父母也彼必將來告之夫又何可詐也故仁人用國日明諸侯先順者安後順者危慮敵之者削反之者亡詩曰武王載發有虔秉鉞如火烈烈則莫我敢遏此之謂也孝成王臨武君曰善請問王者之兵設何道何行而可孫卿子曰凡在大王將率末事也臣請遂道王者諸侯強弱存亡之效安危之埶君賢者其國治君不能者其國, WYG: ''}
