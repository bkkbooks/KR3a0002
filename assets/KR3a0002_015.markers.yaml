  - {type: variant, offset: 3162, length: 561, content: 風俗以一有離俗不順其上則百姓莫不敦惡莫不毒孼若祓不祥然後刑於是起矣是大刑之所加也辱孰大焉將以為利耶則大刑加焉身苟不狂惑戇陋誰睹是而不改也哉然後百姓曉然皆知循上之法像上之志而安樂之於是有能化善脩身正行積禮義尊道德百姓莫不貴敬莫不親譽然後賞於是起矣是高爵豐祿之所加也榮孰大焉將以為害邪則高爵豐祿以持養之生民之屬孰不願也雕雕焉縣貴爵重賞於其前縣明刑大辱於其後雖欲無化能乎哉故民歸之如流水所存者神所為者化而順暴悍勇力之屬為之化而愿旁辟曲私之屬為之化而公矜糺收繚之屬為之化而調夫是之謂大化至一詩曰王猶允塞徐方既來此之謂也凡兼人者有三術有以德兼人者有以力兼人者有以富兼人者彼貴我名聲美我德行欲為我民故辟門除涂以迎吾入因其民襲其處而百姓皆安立法施令莫不順比是故得地而權彌重兼人而兵俞強是以德兼人者也非貴我名聲也非美我德行也彼畏我威劫我埶故民雖有離心不敢有畔慮若是則戎甲俞眾奉養必費是故得地而權彌輕兼人而兵俞弱是以力兼人者也非貴我名聲也非美我德行也用貧求富用飢求飽虛腹張口來歸我食若是則必發夫稟窌之粟以食之委之財貨以富之立良有司以接之已朞三年然後民可信也是故得地而權彌輕兼人而國俞貧是以富兼人者也故曰以德兼人者王以力兼人者弱以富兼人者貧古今一也兼并易能也唯堅凝之難焉齊能并宋而不能凝也故魏奪之燕能并齊而不能凝也故田單奪之韓之上地方數百里完, WYG: 四庫}
