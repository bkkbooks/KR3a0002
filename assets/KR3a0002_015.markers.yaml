  - {type: variant, offset: 2943, length: 0, content: '', SBCK: 有二非察是是察非非之以爲非者衆以爲是者而之而察謂合王制與不合王制也察非觀其合王所以非察是是否也制與天下有不以是爲隆正也然而猶有能分是非}
  - {type: page-break, offset: 2943, content: '', id: KR3a0002_SBCK_015-18a}
  - {type: variant, offset: 2943, length: 0, content: '', WYG: 有二非察是是察非衆以為是者而非之以為非者而是之謂合王制與不合王制也所以非察是是察非觀其合王制與否也天下有不以是為隆正也然而猶有能分是非}
