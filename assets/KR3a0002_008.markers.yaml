  - {type: variant, offset: 16, length: 10, content: 公屏成王而及武王以屬, SBCK: 浹於}
  - {type: variant, offset: 16, length: 10, content: 公屏成王而及武王以屬, krp: 浹於}
  - {type: variant, offset: 21, length: 3, content: 及武王, WYG: 不能愛民不能利民而求民之親愛已不可得也民之不親不愛而求其為已用為已死不可得也人不為己用不為己死而求兵之勁城之固不可得也兵不勁城不固而求敵之不至不可得也敵至而求無危削不滅亡不可得也危削滅亡之情舉積此矣而求安樂是狂生者也狂生者不胥時而落故人主欲彊固安樂則莫若反之民欲附下一民則莫若反之政欲修政美國則莫若求其人彼或積蓄而得之者不世絶彼其人者生乎今之世而志乎古之道}
