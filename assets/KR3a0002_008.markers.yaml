  - {type: variant, offset: 28, length: 1, content: 惡, SBCK: 動無不當也故君子恭而不難敬而不鞏貧窮而不約富貴而不驕並遇變應而不窮審之禮也故君子之於禮敬而安之其於事也徑而不失其於人也寡怨寛裕而無阿其所爲身也謹脩飾而不危其應變故也齊給便㨗而不惑其於天地萬物也不務􅀃其所以然而致善用其材其於百官之事技藝之人也不與之爭能而致善用其功其待上也忠順而不懈其使下也均徧而不圎而水圎君者盂也盂方而水方君射則臣決楚莊王好細要故朝有餓人故曰聞脩身未甞聞爲國也君者民之原也源清則流清源濁則流濁故有社稷者而不能愛民不能利民而求民之親愛已不可得也民之不親不愛而求其爲已用爲已死不可得也民不爲己用不爲己死而求兵之勁城之固不可得也兵不勁城不固而求敵之不至不可得也敵至而求無危削不滅亡不可得也危削滅亡之情舉積此矣而求安樂是狂生者也狂生者不胥時而樂故人主欲彊固安樂則莫若反之民欲附下一民則莫若反之政欲脩政美國則莫若求其人彼或蓄積而得之者不世絶彼其人者生乎今之世而志乎古之道以}
