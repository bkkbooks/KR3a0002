  - {type: 'tls:seg', offset: 4084, content: '', id: KR3a0002_tls_008-19a.27}
  - {type: variant, offset: 4085, length: 3, content: 有防表, WYG: 義皆願奉教陳忠於前之日久矣雖然奉陽君妬大王不得任事是以外賓客游談之士無敢盡忠於前盧藏用云奉陽君名成又案後語奉陽君卒蘇秦乃從燕而來說肅侯合從之事而公子成武靈王時猶不肯朝服即公子成非奉陽君}
  - {type: punctuation, offset: 4089, content: 。, id: KR3a0002_tls_008-bkkpn851}
  - {type: xml-element, offset: 4089, content: '', id: KR3a0002_tls_008-bkkxmlele159}
  - {type: xml-element, offset: 4089, content: '', id: KR3a0002_tls_008-bkkxmlele160}
  - {type: page-break, offset: 4089, content: '', id: KR3a0002_SBCK_008-16a}
  - {type: variant, offset: 4089, length: 0, content: '', WYG: 齊之孟嘗可謂􅆲臣也史記曰齊閔王既滅宋益驕欲盡滅孟嘗孟甞君恐乃如魏魏昭王以為相西合於秦趙與燕共伐破齊後齊襄王立孟嘗中子為諸侯無所屬襄王新立畏孟嘗而與連和是􅆲臣也}
