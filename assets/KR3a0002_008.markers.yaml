  - {type: variant, offset: 4078, length: 0, content: '', SBCK: 國具人主不能不有游觀安燕之時則不得不有疾病物故之變焉如是國者事物之至也如泉原一物不應亂之端也故曰人主不可以獨也卿相輔佐人主之基杖也不可不早具也人主必將有卿相輔佐足任者然後可其德音足以塡撫百姓其知慮足以應待萬變然後可夫是之謂國具四鄰諸侯之相與不可以不相接也然而不必相親也故人主必將有足使喻志決疑於逺方者然後可其辨􅀃足以解煩其智慮足以决疑其齊斷足以拒難不還秩不反}
  - {type: page-break, offset: 4078, content: '', id: KR3a0002_SBCK_008-13b}
  - {type: page-break, offset: 4078, content: '', id: KR3a0002_SBCK_008-14a}
  - {type: variant, offset: 4078, length: 0, content: '', WYG: 國具人主不能不有遊觀安燕之時則不得不有疾病物故之變焉如是國者事物之至也如泉源一物不應亂之端也故曰人主不可以獨也卿相輔佐人主之基杖也不可不早具也故人主必將有卿相輔佐足任者然後可其徳音足以鎮撫百姓其知慮足以應待萬變然後可夫是之謂國具四鄰諸侯之相與不可以不相接也然而不必相親也故人主必將有足使喻志决疑於逺方者然後可其辯說足以解煩其知慮足以决疑其齊斷足以距難不還秩不反}
  - {type: page-break, offset: 4078, content: '', id: KR3a0002_WYG_008-11a, image: WYG0695/WYG0695-0196a.png}
  - {type: variant, offset: 4078, length: 0, content: '', krp: 國具人主不能不有游觀安燕之時則不得不有疾病物故之變焉如是國者事物之至也如泉原一物不應亂之端也故曰人主不可以獨也卿相輔佐人主之基杖也不可不早具也人主必將有卿相輔佐足任者然後可其德音足以塡撫百姓其知慮足以應待萬變然後可夫是之謂國具四鄰諸侯之相與不可以不相接也然而不必相親也故人主必將有足使喻志決疑於逺方者然後可其辨說足以解煩其智慮足以决疑其齊斷足以拒難不還秩不反}
  - {type: variant, offset: 4079, length: 0, content: '', SBCK: 然而應薄扞患足以持社稷然後可夫是之謂國具故人主無便嬖左右足信者之謂闇無卿相輔佐足任者之謂獨所使於四鄰諸侯者非人之謂􅀌􅀌獨而晻謂之危國雖若存古之人曰亡矣詩曰濟濟多士文王以寧此之謂也材人愿愨拘録計數纎嗇而無敢遺喪是官人史吏之材也脩飭端正尊法敬分而無傾側之心守職循業不敢損益可傳世也而不可使侵奪是士大夫官師之材也知隆禮義之爲尊君也知好士之爲美名也知愛民之爲安國也知有常法之爲一俗也知尚賢使能之爲長功也知務本禁末之爲多材也知無與下爭小利之爲便於事也知明制度權物稱用之爲不泥也是卿相輔佐之材也未及君道也能論官此三材者而無失其次是謂人主之道也若是則身佚而國治功大而名美上可以王下可以霸是人主之要守也人主不能論此三材者不知道此道安值將卑埶出勞併耳目之樂而親自貫日而治詳一内而曲辨之慮與臣下爭小察而綦偏能自古及今未有如此而不亂者也是所謂視乎不可見聽乎不可聞爲乎不可成此之謂也荀}
