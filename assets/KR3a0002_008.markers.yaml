  - {type: variant, offset: 68, length: 0, content: '', SBCK: 法度而公是所以班治之也論德而定次量能而授官皆使其人載其事而各得其所宜上賢使之爲三公次賢使之爲諸侯下賢使之爲士大夫是所以顯設之也脩冠弁衣裳黼黻文章琱琢刻鏤皆有等差是所以藩飾之也故由天子至於庶人也莫不騁其能得其志安樂其事是所同也衣煖而食充居安而游樂事時制明而用足是又所同也若夫重色而成文章重味而成珍備是所􅄛也聖王財􅄛以明辨異上以飾賢良而明貴賤下以飾長幼而明親䟽上在王公之朝下在百姓之家天下曉然皆知其所非以爲異也將以明分達治而保萬世也故天子諸侯無靡費之用士大夫無流淫之行百吏官人無怠慢之事衆庶百姓無姦怪之俗無盜賊之罪其能以}
