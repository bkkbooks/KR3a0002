  - {type: variant, offset: 4079, length: 0, content: '', krp: 然而應薄扞患足以持社稷然後可夫是之謂國具故人主無便嬖左右足信者之謂闇無卿相輔佐足任者之謂獨所使於四鄰諸侯者非人之謂孤孤獨而晻謂之危國雖若存古之人曰亡矣詩曰濟濟多士文王以寧此之謂也材人愿愨拘録計數纎嗇而無敢遺喪是官人史吏之材也脩飭端正尊法敬分而無傾側之心守職循業不敢損益可傳世也而不可使侵奪是士大夫官師之材也知隆禮義之爲尊君也知好士之爲美名也知愛民之爲安國也知有常法之爲一俗也知尚賢使能之爲長功也知務本禁末之爲多材也知無與下爭小利之爲便於事也知明制度權物稱用之爲不泥也是卿相輔佐之材也未及君道也能論官此三材者而無失其次是謂人主之道也若是則身佚而國治功大而名美上可以王下可以霸是人主之要守也人主不能論此三材者不知道此道安值將卑埶出勞併耳目之樂而親自貫日而治詳一内而曲辨之慮與臣下爭小察而綦偏能自古及今未有如此而不亂者也是所謂視乎不可見聽乎不可聞爲乎不可成此之謂也荀}
  - {type: variant, offset: 4080, length: 9, content: 言有壇宇行有防表也, SBCK: 卷第八}
  - {type: variant, offset: 4080, length: 0, content: '', WYG: 卷八欽定四庫全書荀子卷九唐楊倞註臣道篇第十三人臣之論論人臣之善惡有態臣者有篡臣者有功臣者有聖臣者解並在下内不足使一民外不足使距難百姓不親諸侯不信然而巧敏佞說說音恱或作稅善取寵乎上是態臣者也以佞媚為容態上不忠乎君下善取譽乎民不恤公道通義朋黨比周以環主圖私為務是􅆲臣者也環主環繞其主不使賢臣得用圖謀也􅆲臣者􅆲奪其軍政也内足使一民外足使距難民親之士信之上忠乎君下愛百姓而不倦是功臣者也民親士信然後立功也上則能尊君下則能愛民政令教化形下如影形制也}
  - {type: page-break, offset: 4080, content: '', id: KR3a0002_WYG_009-1a, image: WYG0695/WYG0695-0197a.png}
  - {type: page-break, offset: 4080, content: '', id: KR3a0002_WYG_009-1b, image: WYG0695/WYG0695-0197b.png}
  - {type: variant, offset: 4080, length: 9, content: 言有壇宇行有防表也, krp: 卷第八}
  - {type: variant, offset: 4081, length: 0, content: '', WYG: 施政令教化以制其下如影之隨形動而輙隨不使違越也應卒遇變齊給如響齊疾也給供給也應事而至謂之給夫卒變人所遲疑今聖臣應之疾速如響之應聲卒倉忽反推類接譽以待無方曲成制象是聖臣者也此明應卒遇變之意無方無常也推其比類接其聲譽言見其本而知其末也待之無常謂不滯於一隅也委曲皆成制度法象言物至而應無非由法不苟而行之也聖者無所不通之謂也故用聖臣者王用功臣者彊用􅆲臣者危用態臣者亡態臣用則必死􅆲臣用則必危此言態臣甚於􅆲臣者葢當時之多用侒媚變詐之人深欲戒之故極言之也功臣用則必榮聖臣用則必尊故齊之蘇秦蘇秦初相趙後仕燕終死於齊故曰齊之蘇秦楚之州侯楚襄王佞臣也史記莊辛諫襄王曰君王左州侯右夏侯輦從鄢陵君與壽陵君載方府之金與之馳騁乎雲夢之中不知穰侯受令於秦王填澠塞之内而投已於澠塞之外韓子曰州侯相荆貴而荆王疑之因問左右對曰無}
  - {type: page-break, offset: 4081, content: '', id: KR3a0002_WYG_009-2a, image: WYG0695/WYG0695-0197c.png}
  - {type: variant, offset: 4082, length: 2, content: 壇宇, WYG: 如出一口也秦之張儀可謂態臣者也皆變態佞媚之臣儀或作禄韓之張去疾葢張良之祖漢書良其先韓人大父開地相韓戰國策韓有張翠納賂於宣大后也趙之奉陽後語蘇秦說趙肅侯肅候之弟奉陽君為相不恱蘇秦蘇秦乃去之又戰國䇿蘇秦說趙王曰天下之卿相人君及至布衣之士莫不髙大王之}
  - {type: page-break, offset: 4082, content: '', id: KR3a0002_WYG_009-2b, image: WYG0695/WYG0695-0197d.png}
