  - {type: variant, offset: 11, length: 2, content: 崩成, SBCK: 敬忌一人以擇此之謂也合符節别契劵者所以爲信也上好權謀則臣下百吏誕詐之人乗是而後欺探籌投鉤者所以爲公也上好曲私則臣下百吏乗是而後偏衡石稱縣者所以爲平也上好傾覆則臣下百吏乗是而後險斗斛敦槩者所以爲嘖也上好貪利則臣下百吏乗是而後豐取刻與以無度取於民故械數者治之流也非治之原也君子者治之原也官人守數君子養原源清則流清源濁則流濁故上好禮義尚賢使能無貪利之心則下亦將綦辭讓致忠信而謹於臣子矣如是則雖在小民不待合符節别契劵而信不待探籌投鉤而公不待衡石稱縣而平不待斗斛敦槩而嘖故賞不用而民勸罰不用而民服有司不勞而事治政令不煩而俗美百姓莫敢不順上之法象上之志而勸上之事而安樂之矣故藉斂忘費事業忘勞宼難忘死城郭不待飾而固兵刃不待陵而勁敵國不待服而詘四海之民不待令而一夫是之謂至平詩曰}
  - {type: page-break, offset: 11, content: '', id: KR3a0002_SBCK_008-2a}
  - {type: page-break, offset: 11, content: '', id: KR3a0002_SBCK_008-2b}
