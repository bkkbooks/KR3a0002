  - {type: variant, offset: 3381, length: 364, content: 為盜勇則必為賊云能則必為亂察則必為怪辨則必為誕人有師有法而知則速通勇則速威云能則速成察則速盡辨則速論故有師法者人之大寶也無師法者人之大殃也人無師法則隆性矣有師法則隆積矣而師法者所得乎積非所受乎性性不足以獨立而治性也者吾所不能為也然而可化也積也者非吾所有也然而可為也注錯習俗所以化性也并一而不二所以成積也習俗移志安久移質并一而不二則通於神明參於天地矣故積土而為山積水而為海旦暮積謂之歲至高謂之天至下謂之地宇中六指謂之極涂之人百姓積善而全盡謂之聖人彼求之而後得為之而後成積之而後高盡之而後聖故聖人也者人之所積也人積耨耕而為農夫積斲削而為工匠積反貨而為商賈積禮義而為君子工匠之子莫不繼事而都國之民安習其服居楚而楚居越而越居夏而夏是非天性也積靡使然也故人知謹注錯慎習俗大積靡則為君子矣縱情性而不足問學則為小人矣為君子則常安榮矣為小人則常, SBCK: ''}
