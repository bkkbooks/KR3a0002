  - {type: variant, offset: 51, length: 0, content: '', SBCK: 好之者貧爲之者窮然而于是獨猶將爲之也不爲少頃輟焉曉然獨明於先王之所以得之所以失之知國之安危臧否若别白黑是其人者也大用之則天下爲一諸侯爲臣小用之則威行鄰敵縱不能用使無去其疆域則國終身無故故君人者愛民而安好士而榮兩者無一焉而亡詩曰价人維藩太師維垣此之謂也道者何也曰君道也君者何也曰能羣也能羣也者何也曰善生養人者也善班治人者也善顯設人者也善藩飾人者也善生養人者人親之善班治人者人安之善顯設人者人樂之善藩飾人者人榮之四統者俱}
