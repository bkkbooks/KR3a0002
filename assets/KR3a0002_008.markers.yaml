  - {type: variant, offset: 71, length: 0, content: '', SBCK: 今人主有六患使賢者爲之則與不肖者規之使智者慮之則與愚者論之使脩士行之則與汙邪之人疑之雖欲成功得乎哉譬之是猶立直木而恐其景之枉也惑莫大焉語曰好女之色惡者之孽也公正之士衆人之痤也循乎道之人汙邪之賊也今使汙邪之人論其怨賊而求其無偏得乎哉譬之是猶立枉木而求其景之直也亂莫大焉故古之人爲之不然其取人有道其用人有法取人之道參之以禮用人之法禁之以等行義動静度之以禮知慮取舍稽之以成日月積久校之以功故卑不得以臨尊輕不得以縣重愚不得以謀知是以萬舉不過也故校之以禮而觀其能安敬也與之舉錯遷移而觀其能應變也與之安燕而觀其能無流慆也接之以聲色權利忿怒患險而觀其能無離守也彼誠有之者與誠無之者若白黑然可詘邪哉故伯樂不可欺以馬而君子不可欺以人此明王之道也人主欲得善射逺中微者縣貴爵重賞以招致之内不可以阿子弟外不可以隱逺人能中是者取之是豈不必得之之道也哉雖聖人不能易也欲得善馭速致逺者一日而千里縣貴爵重賞以招致之内不可以阿子弟外不可以隱逺人能致是者取之是豈不必得之之道也哉雖聖人不能易也欲治國馭民調一上下將内以固誠外以拒難治則制人人不能制也亂則危辱滅亡可立而待也然而求卿相輔佐則獨不若是其公也案唯便嬖親比己者之用也豈不過甚矣哉故有社稷者莫不欲彊俄則弱矣莫不欲安俄則危矣莫不欲存俄則亡矣古有萬國今有數千焉是無它故莫不失之是也故明主有私人以金石珠玉無私人以官職事業是何也曰本不利於所私也彼不能而主使之則是主闇也臣不能而誣能則是臣詐也主闇於上臣詐於下滅亡無日俱害之道也夫文王非無貴戚也非無子弟也非無便嬖也倜然乃舉太公於州人而用之豈私之也哉以爲親邪則周􅁎姓也而彼姜姓也以爲故也則未甞相識也以爲好麗邪則夫人行年七十有二齫然而齒墮矣然而用之者夫文王欲立貴道欲白貴名以惠天下而不可以獨也非于是莫足以舉之故舉于是而用之於是乎貴道果立貴名果明}
