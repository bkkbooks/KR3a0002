  - {type: substitution, offset: 2954, original: 說, replacement: 説, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19811}}
  - {type: variant, offset: 2958, length: 237, content: 以異於墨子矣然而明不能分別呼先王以欺愚者而求衣食焉得委積足以揜其口則揚揚如也隨其長子事其便辟舉其上客𠐥然若終身之虜而不敢有他志是俗儒者也法後王一制度隆禮義而殺詩書其言行已有大法矣然而明不能齊法教之所不及聞見之所未至則知不能類也知之曰知之不知曰不知內不自以誣外外不自以欺內以是尊賢畏法而不敢怠傲是雅儒者也法先王統禮義一制度以淺持博以古持今以一持萬苟仁義之類也雖在鳥獸之中若別白黑倚物怪變所未嘗聞也所未嘗見也卒然起一方則舉統類而應之無所儗怍張法而度之則晻然若合符節是大儒者也故人, SBCK: 愛闇}
