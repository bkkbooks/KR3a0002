  - {type: variant, offset: 4, length: 1, content: 八, SBCK: 十二有亂君無亂國有治人無治法羿之法非亡也而羿不世中禹之法猶存而夏不世王故法不能獨立類不能自行得其人則存失其人則亡法者治之端也君子者法之原也故有君子則法雖省足以徧矣無君子則法雖具失先後之施不能應事之變足以亂矣不知法之義而正法之數者雖愽傳臨事必亂故明主急得其人而闇主急得其埶急得其人則身佚而國治功}
