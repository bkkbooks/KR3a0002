  - {type: variant, offset: 68, length: 0, content: '', krp: 法度而公是所以班治之也論德而定次量能而授官皆使其人載其事而各得其所宜上賢使之爲三公次賢使之爲諸侯下賢使之爲士大夫是所以顯設之也脩冠弁衣裳黼黻文章琱琢刻鏤皆有等差是所以藩飾之也故由天子至於庶人也莫不騁其能得其志安樂其事是所同也衣煖而食充居安而游樂事時制明而用足是又所同也若夫重色而成文章重味而成珍備是所衍也聖王財衍以明辨異上以飾賢良而明貴賤下以飾長幼而明親䟽上在王公之朝下在百姓之家天下曉然皆知其所非以爲異也將以明分達治而保萬世也故天子諸侯無靡費之用士大夫無流淫之行百吏官人無怠慢之事衆庶百姓無姦怪之俗無盜賊之罪其能以}
  - {type: variant, offset: 69, length: 1, content: 戾, SBCK: 義徧矣故曰治則􅄛及百姓亂則不足及王公此之謂也至道大形隆禮至法則國有常尚賢使能則民知方纂論公察則民不疑賞克罰偷則民不怠兼聽齊明則天下歸之然後明分職序事業材技官能莫不治理則公道達而私門塞矣公義明而私事息矣如是則德厚者進而佞􅀃者止貪利者退而廉節者起書曰先時者殺無赦不逮時者殺無赦人習其事而固人之百事如耳目鼻口之不可以相借官也故職分而民不探次定而序不亂兼聽齊明而百事不留如是則臣下百吏至于庶人莫不脩己而後敢安正誠能而後敢受職百姓易俗小人變心姦怪之屬莫不反愨夫是之謂政敎之極故天子不視而見不聽而聦不慮而知不動而功塊然獨坐而天下從之如一體如四支之從心夫是之謂大形詩曰温温恭人維德之基此之謂也爲人主者莫不欲彊而惡弱欲安而惡危欲榮而惡辱是禹桀之所同也要此三欲辟此三惡果何道而便曰在愼取相道莫徑是矣故知而不仁不可仁而不知不可旣知且仁是人主之寶也而王霸之佐也不急得不智得而不用不仁無其人而幸有其功愚莫大}
