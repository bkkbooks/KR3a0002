  - {type: variant, offset: 88, length: 2246, content: 而天下不稱偏焉教誨開導成王使諭於道而能揜迹於文武周公歸周反籍於成王而天下不輟事周然而周公北面而朝之天子也者不可以少當也不可以假攝為也能則天下歸之不能則天下去之是以周公屏成王而及武王以屬天下惡天下之離周也成王冠成人周公歸周反籍焉明不滅主之義也周公無天下矣鄉有天下今無天下非擅也成王鄉無天下今有天下非奪也變勢次序之節然也故以枝代主而非越也以弟誅兄而非暴也君臣易位而非不順也因天下之和遂文武之業明枝主之義抑亦變化矣天下厭然猶一也非聖人莫之能為夫是謂大儒之效秦昭王問孫卿子曰儒無益於人之國孫卿子曰儒者法先王隆禮義謹乎臣子而致貴其上者也人主用之則勢在本朝而宜不用則退編百姓而愨必為順下矣雖窮困凍餧必不以邪道為貪無置錐之地而明於持社稷之大義嗚呼而莫之能應然而通乎財萬物養百姓之經紀勢在人上則王公之材也在人下則社稷之臣國君之寶也雖隱於窮閻漏屋人莫不貴貴道誠存也仲尼將為魯司寇沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏踰境而徙魯之粥牛馬者不豫賈必蚤正以待之也居於闕黨闕黨之子弟罔不分有親者取多孝弟以化之也儒者在本朝則美政在下位則美俗儒之為人下如是矣王曰然則其為人上何如孫卿曰其為人上也廣大矣志意定乎內禮節脩乎朝法則度量正乎官忠信愛利形乎下行一不義殺一無罪而得天下不為也此君子義信乎人矣通於四海則天下應之如讙是何也則貴名白而天下治也故近者歌謳而樂之遠者竭蹶而趨之四海之內若一家通達之屬莫不從服夫是之謂人師詩曰自西自東自南自北無思不服此之謂也夫其為人下也如彼其為人上也如此何謂其無益於人之國也昭王曰善先王之道仁之隆也比中而行之曷謂中曰禮義是也道者非天之道非地之道人之所以道也君子之所道也君子之所謂賢者非能徧能人之所能之謂也君子之所謂知者非能徧知人之所知之謂也君子之所謂辨者非能徧辨人之所辨之謂也君子之所謂察者非能徧察人之所察之謂也有所止矣相高下視墝肥序五種君子不如農人通財貨相美惡辨貴賤君子不如賈人設規矩陳繩墨便備用君子不如工人不䘏是非然不然之情以相薦撙以相恥怍君子不若惠施鄧析也若夫譎德而定次量能而授官使賢不肖皆得其位能不能皆得其官萬物得其宜事變得其應慎墨不得進其談惠施鄧析不敢竄其察言必當理事必當務是然後君子之所長也凡事行有益於治者立之無益於理者廢之夫是之謂中事凡知說有益於理者為之無益於理者舍之夫是之謂中說事行失中謂之姦事知說失中謂之姦道姦事姦道治世之所棄而亂世之所從服也若夫充虛之相施易也堅白同異之分隔也是聰耳之所不能聽也明目之所不能見也辯士之所不能言也雖有聖人之知未能僂指也不知無害為君子知之無損為小人工匠不知無害為巧君子不知無害為治王公好之則亂法百姓好之則亂事而狂惑戇陋之人乃始率其群徒辨其談說明其辟稱老身長子不知惡也夫是之謂上愚曾不如好相鷄狗之可以為名也詩曰為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也我欲賤而貴愚而知貧而富可乎曰其唯學乎彼學者行之曰士也敦慕焉君子也知之聖人也上為聖人下為士君子孰禁我哉鄉也混然涂之人也俄而並乎堯禹豈不賤而貴矣哉鄉也效門室之辨混然曾不能決也俄而原仁義分是非圖回天下於掌上而辨白黑豈不愚而知矣哉鄉也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉今有人於此㞕然藏千溢之寶雖行貣而食人謂之富矣彼寶也者衣之不可衣也食之不可食也賣之不可僂售也然而人謂之富何也豈不大富之器誠在此也是杅杅亦富人已豈不貧而富矣哉故君子無爵而貴無祿而富不言而信不怒而威窮處而榮獨居而樂豈不至尊至富至重至嚴之情舉積此哉故曰貴名不可以比周爭也不可以夸誕有也不可以勢重脅也必將誠此然後就也爭之則失讓之則至遵遁則積夸誕則虛故君子務脩其內而讓之於外務積德於身而處之以遵遁如是則貴名起如日月天下應之如雷霆故曰君子隱而顯微而明辭讓而勝詩曰鶴鳴于九皋聲聞于天此之謂也鄙夫反是比周而譽俞少鄙爭而名俞辱煩勞以求安利其身而俞危詩曰民之無良相怨一方受爵不讓至于己斯亡此之謂也故能小而事大辟之是猶力之少而任重也舍粹折無適也身不肖而誣賢是猶傴身而好升高也指其頂者愈眾故明主譎德而序位所以為不亂也忠臣誠能然後敢受職所以為不窮也分不亂於上能不窮於下治辨之極也詩曰平平左右亦是率從是言上下之交不相亂也以從俗為善以貨財為寶以養生為己至道是民德也行法至堅不以私欲亂所聞如是則可謂勁士矣行法至堅好脩正其所聞以橋飾其情性其言多當矣而未諭也其行多當矣而未安也其知慮多當矣而未周密也上則能大其所隆下則能開道不己若者如是則可謂篤厚君子矣脩百王之法若辨白黑應當世之變若數一二行禮要節而安之若生四枝要時立功之巧若詔四時平正和民之善億萬之眾而摶若一人如是則可謂聖人矣井井兮其有理也嚴嚴兮其能敬己也介介兮其有終始也猒猒兮其能長久也樂樂兮其執道不殆也炤炤兮其用知之明也脩脩兮其用統類之行也綏綏兮其有文章也熙熙兮其樂人之臧也隱隱兮其恐人之不當也則可謂聖人矣此其道出乎一曷謂一曰執神而固曷謂神曰盡善挾治之謂神曷謂固曰萬物莫足以傾之之謂固神固之謂聖人聖人也者道之管也天下之道管是矣百王之道一是矣故詩書禮樂之道歸是矣詩言是其志也書言是其事也禮言是其行也樂言是其和也春秋言是其微也故風之所以為不逐者取是以節之也小雅之所以為小者取是而文之也大雅之所以為大者取是而光之也頌之所以為至者取是而通之也天下之道畢是矣鄉是者臧倍是者亡鄉是如不臧倍是如不亡者自古及今未嘗有也客有道曰孔子曰周公其盛乎身貴而愈恭家富而愈儉勝敵而愈戒應之曰是殆非周公之行非孔子之言也武王崩成王幼周公屏成王而及武王履天子之籍負扆而坐諸侯趨走堂下當是時也夫又誰為恭矣哉兼制天下立七十一國姬姓獨居五十三人焉, SBCK: ''}
