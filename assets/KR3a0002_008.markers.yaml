  - {type: variant, offset: 14, length: 1, content: 幼, SBCK: 猶允塞徐方既來此之謂也請問爲人君曰以禮分施均徧而不偏請問爲人臣曰以禮待君忠順而不懈請問爲人父曰寛惠而有禮請問爲人子曰敬愛而致文請問爲人兄曰慈愛而見友請問爲人弟曰敬詘而不苟請問爲人夫曰致功而不流致臨而有辨請問爲人妻曰夫有禮則柔從聽侍夫無禮則恐懼而自竦也此道也偏立而亂俱立而治其足以稽矣請問兼能之奈何曰審之禮也古者先王審禮以方皇}
