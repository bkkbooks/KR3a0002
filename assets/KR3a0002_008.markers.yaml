  - {type: page-break, offset: 4079, content: '', id: KR3a0002_SBCK_008-15b}
  - {type: variant, offset: 4079, length: 0, content: '', WYG: 然而應薄扞患足以持社稷然後可夫是之謂國具故人主無便嬖左右足信者之謂闇無卿相輔佐足任者謂之獨所使於四鄰諸侯者非其人謂之孤孤獨而晻謂之危國雖若存古之人曰亡矣詩曰濟濟多士文王以寧此之謂也材人愿慤拘録計數纎嗇而無敢遺喪是官人史吏之才也修飾端正尊法敬分而無傾側之心守職循業不敢益損可傳世也而不可使侵奪是士大夫官師之材也知隆禮義之為尊君也知好士之為美名也知愛民之為安國也知有常法之為一俗也知尚賢使能之為長功也知務本禁末之為多材也知無與下争小利之為便於事也知明制度權物稱用之為不泥也是卿相輔佐之材未及君道也能論官此三材者而無失其次是為人主之道也若是則身佚而國治功大而名美上可以王下可以霸是人主之要守也人主不能論此三材者不知道此道安值將卑執出勞併耳目之樂而親自貫日而治詳一内而曲辨之慮與臣下争小察而綦偏能自古及今未有如此而不亂者也是所謂視乎不可見聽乎不可聞為乎不可成此之謂也荀}
