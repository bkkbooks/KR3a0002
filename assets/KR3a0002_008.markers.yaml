  - {type: variant, offset: 3196, length: 183, content: 用俗人則萬乘之國亡用俗儒則萬乘之國存用雅儒則千乘之國安用大儒則百里之地久而後三年天下為一諸侯為臣用萬乘之國則舉錯而定一朝而伯不聞不若聞之聞之不若見之見之不若知之知之不若行之學至於行之而止矣行之明也明之為聖人聖人也者本仁義當是非齊言行不失豪釐無他道焉已乎行之矣故聞之而不見雖博必謬見之而不知雖識必妄知之而不行雖敦必困不聞不見則雖當非仁也其道百舉而百陷也故人無師無法而知, SBCK: ''}
