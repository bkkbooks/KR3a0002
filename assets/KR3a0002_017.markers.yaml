  - {type: variant, offset: 6, length: 0, content: '', SBCK: 登仕郎守大理評事􅀭倞注性惡篇第二十三荀卿明於治道知其可化無勢位當戰國時競爲貪亂不脩仁義而欲無主乃亂惟聦明時乂亦與此義同也以臨之故激憤而著此論書曰惟}
  - {type: variant, offset: 6, length: 0, content: '', krp: 登仕郎守大理評事揚倞注性惡篇第二十三荀卿明於治道知其可化無勢位當戰國時競爲貪亂不脩仁義而欲無主乃亂惟聦明時乂亦與此義同也以臨之故激憤而著此論書曰惟}
