  - {type: variant, offset: 9, length: 0, content: '', SBCK: 人之性惡其善者僞也凡非天性而人作爲之者僞爲也矯也矯其本性也傍爲亦㑹意字也皆謂之僞故爲字人今人之性生而有好利焉順是故爭奪生而辭讓亡焉謂順其性也天生性也順是生而有疾惡焉順是故殘賊生而忠信亡焉惡烏路反疾與嫉同生而有耳目之欲有好聲色焉順是故淫亂生而禮義文理亡焉文條理也文理謂節然則從人之性順人之情必出於爭奪合於犯分亂理而歸於暴故必將有師法之化禮義之道導同道與然後出於辭讓合於文理而歸於治用此觀之然則人之性惡明矣其善者僞也故枸木必將待櫽括烝矯然後直木也烝謂烝之使柔矯謂矯之使直也枸讀爲鈎曲也下皆同櫽括正曲木之鈍金必將待礱厲然後利厲與礪同礱厲皆磨也今人之性惡必將待師法然後正得禮義然後治今人無師法則偏險而不正無禮義則悖亂而不治古者聖王以人之性惡以爲偏險而不正悖亂而不治是以爲之起禮義制法度以矯飾人之情性而正之以擾化人之情性而導之也使皆出於治合於道者也擾馴也矯彊抑也今之人化師法積文學道禮義者爲君子縱性情安恣睢而違禮義者爲小人用此觀之然則人之性惡明矣其善者僞也孟子曰人之學者其性善所以成其天性之善孟子言人之有學適所論者是也非矯也與告子曰是不然是不及知人之性而不察人人之性僞之分者也近不能及於知猶不及知謂智慮淺冲人不及知之言不到也書曰予凡性者天之就也不可學不可事禮義者聖人之所生也人之所學而能所事而成者也也任也周禮太宰職六曰事典聖人之所生明非天性也事爲官鄭云任事也以富邦國以任百不可學不可事而在人者謂之性可學而能可事而成之在人者謂之僞是性僞之分也學而能不事而成也不可學不可事謂不今人之性目可以見耳可以聽夫可以見之明不離目可以聽之聦不離耳目可聽之聦}
