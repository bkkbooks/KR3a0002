  - {type: variant, offset: 308, length: 0, content: '', SBCK: 爲名也闕未詳或曰闕缺也劒至利則喜缺辟閭即湛盧也閭盧聲相近盧黑色也湛盧言湛然如水而黒未詳新序閭丘卬謂齊宣王曰辟閭巨闕天下之良劒也或曰也言神劒柔可卷而懷之舒則可用辟閭或此義歟也又張景陽七發􅀃劒曰舒辟不常李善云辟卷然而不加砥厲則不能利不得人力則不能斷驊騮騹􅂹纎離緑耳此皆古之良馬也騹讀爲騏謂青皆周穆王八駿名此不同纎離即列子盗驪也驪文如博棊列子作赤􅂹與然而前必有銜轡之制後有鞭䇿之威加之以造父之馭然後一日而致千里也}
