  - {type: variant, offset: 357, length: 353, content: 接而不相能也夫是之謂天官心居中虛以治五官夫是之謂天君財非其類以養其類夫是之謂天養順其類者謂之福逆其類者謂之禍夫是之謂天政闇其天君亂其天官棄其天養逆其天政背其天情以喪天功夫是之謂大凶聖人清其天君正其天官備其天養順其天政養其天情以全其天功如是則知其所為知其所不為矣則天地官而萬物役矣其行曲治其養曲適其生不傷夫是之謂知天故大巧在所不為大知在所不慮所志於天者已其見象之可以期者矣所志於地者已其見宜之可以息者矣所志於四時者已其見數之可以事者矣所志於陰陽者已其見和之可以治者矣官人守天而自為守道也治亂天邪曰日月星辰瑞歷是禹桀之所同也禹以治桀以亂治亂非天也時邪曰繁啟蕃長於春夏畜積收臧於秋冬是又禹桀之所同也禹以治桀以亂治亂非時也地邪曰得地則生失地則死是又禹桀之所同也禹以治桀以亂治亂非地也詩曰天作高山大王荒之彼作矣文王康, WYG: 慶兆民頼}
