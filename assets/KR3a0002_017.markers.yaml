  - {type: variant, offset: 1725, length: 1, content: 路, SBCK: 時捷速也長幼各任其力故事也故仁者仁此者也貴賤分親䟽序長幼五者也愛仁謂愛􅀃也此謂尚賢使能等則爲仁也􅀃此五者義者分此者也合宜則爲義也分别此五者使節者死生此者也生則爲名節也能爲此五者死忠者惇慎此者也讀慎此五者則爲忠也如順人臣能厚順兼此而能之備矣而能之則爲德兼此仁義忠節也備備而不矜一自善也謂之聖不矜伐於人皆一皆也徳備而如也聖人包容萬物與天地同功何所矜伐爲也所以自善則謂之聖人夫衆人之心有一善則􅀭􅀭不矜矣夫故天下不與爭能而致善用其功矜不善用於衆功矜則有敵故不尊也而推衆力故天下不敢爭能而極有而不有也夫故爲天下貴矣不自有有能而詩曰淑人君子其儀不忒其儀不忒正是四國}
  - {type: page-break, offset: 1725, content: '', id: KR3a0002_SBCK_017-20b}
  - {type: variant, offset: 1725, length: 1, content: 路, WYG: 時也故仁者仁此者也仁謂愛恱也此謂尚賢使能等貴賤分親踈序長㓜五者也愛恱此五者則可以為仁義者分此者也分别此五者使合宜則為義也節者死生此者也能為此五者死生則為名節也忠者敦慎此者也慎讀為順人臣能厚順此五者則為忠也兼此而能之備矣兼此仁義忠節而能之則為德備矣備而不矜一自善也謂之聖一皆也徳備而不矜伐於人皆所以自善則謂之聖人夫衆人之心有一善則揚揚如也聖人包容萬物與天地同功何所矜伐為也不矜矣夫故天下不與争能而致善用其功不矜而推衆力故天下不敢争能而極善用於衆功矜則有敵故不尊也有而不有也夫故為天下貴矣有能而不自有詩曰淑人君子其儀不忒其儀不忒正是四國}
