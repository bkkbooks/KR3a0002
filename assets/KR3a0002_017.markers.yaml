  - {type: variant, offset: 26, length: 0, content: '', SBCK: 曰是不然夫陶人埏埴而生瓦然則瓦埴豈陶人之性也哉哉亦積僞然後成也豈陶人亦性而能瓦埴工人斵木而生器然則器木豈工人之性也哉夫聖人之於禮義也辟亦陶埏而生之也爲譬辟讀然則禮義積僞者豈人之本性也哉凡人之性者堯舜之與桀跖其性一也君子之與小人其性一也惡也言皆今將}
