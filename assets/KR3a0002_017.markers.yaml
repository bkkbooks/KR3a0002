  - {type: variant, offset: 1725, length: 1, content: 路, krp: 時捷速也長幼各任其力故事也故仁者仁此者也貴賤分親䟽序長幼五者也愛仁謂愛說也此謂尚賢使能等則爲仁也說此五者義者分此者也合宜則爲義也分别此五者使節者死生此者也生則爲名節也能爲此五者死忠者惇慎此者也讀慎此五者則爲忠也如順人臣能厚順兼此而能之備矣而能之則爲德兼此仁義忠節也備備而不矜一自善也謂之聖不矜伐於人皆一皆也徳備而如也聖人包容萬物與天地同功何所矜伐爲也所以自善則謂之聖人夫衆人之心有一善則揚揚不矜矣夫故天下不與爭能而致善用其功矜不善用於衆功矜則有敵故不尊也而推衆力故天下不敢爭能而極有而不有也夫故爲天下貴矣不自有有能而詩曰淑人君子其儀不忒其儀不忒正是四國}
