  - {type: variant, offset: 32, length: 0, content: '', WYG: 性也所賤於桀跖小人者從其性順其情安恣睢以出乎貪利争奪故人之性惡明矣其善者偽也桀跖小人是人之本性也天非私曾騫孝已}
