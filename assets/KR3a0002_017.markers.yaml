  - {type: variant, offset: 922, length: 332, content: 君子小人之所以相縣者在此耳星隊木鳴國人皆恐曰是何也曰無何也是天地之變陰陽之化物之罕至者也怪之可也而畏之非也夫日月之有食風雨之不時怪星之黨見是無世而不常有之上明而政平則是雖並世起無傷也上闇而政險則是雖無一至者無益也夫星之隊木之鳴是天地之變陰陽之化物之罕至者也怪之可也而畏之非也物之已至者人祅則可畏也楛耕傷稼耘耨失薉政險失民田薉稼惡糴貴民飢道路有死人夫是之謂人祅政令不明舉錯不時本事不理夫是之謂人祅勉力不時則牛馬相生寇難並至夫是之謂人祅也祅是生於亂三者錯無安國矣其說甚爾其菑甚慘可怪也而不可畏也傳曰萬物之怪書不說也無用之辯不急之察棄而不治也若夫君臣之義父子之親夫婦之別則日切瑳而不舍也雩而雨何也曰無佗也猶不雩而雨也日月食而救之天旱而雩卜筮然後決大事非以為得求也以文之也, SBCK: ''}
