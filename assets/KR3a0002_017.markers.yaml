  - {type: variant, offset: 717, length: 1, content: 為, SBCK: 然刑罰怒罪爵賞踰德以族論罪以世舉賢誓太亦云尹氏卒曷爲貶譏世卿也所謂罪人以族官人以世公羊故一人有罪而三族皆夷德雖如舜不免刑均是以族論罪也均同也謂同被其刑也三族父母妻族也夷滅也先祖當賢後子孫必顯行雖如桀紂列從必尊此以世舉賢也從謂行列相從當或爲甞也當賢謂身當賢}
  - {type: variant, offset: 717, length: 0, content: '', WYG: 然刑罰怒罪爵賞踰德以族論罪以世舉賢泰誓所謂罪人以族官人以世公羊亦云尹氏卒曷}
  - {type: variant, offset: 717, length: 1, content: 為, krp: 然刑罰怒罪爵賞踰德以族論罪以世舉賢誓太亦云尹氏卒曷爲貶譏世卿也所謂罪人以族官人以世公羊故一人有罪而三族皆夷德雖如舜不免刑均是以族論罪也均同也謂同被其刑也三族父母妻族也夷滅也先祖當賢後子孫必顯行雖如桀紂列從必尊此以世舉賢也從謂行列相從當或爲甞也當賢謂身當賢}
  - {type: variant, offset: 718, length: 0, content: '', WYG: 貶譏世卿也故一人有罪而三族皆夷德雖如舜不免刑均是以族論罪也三族父母妻族也夷滅也均同也謂同被其刑也先祖當賢後子孫必顯行雖如桀紂列從必尊此以世舉賢也當賢謂身當賢}
