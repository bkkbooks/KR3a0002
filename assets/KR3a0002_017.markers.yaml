  - {type: variant, offset: 302, length: 2, content: 成莫, SBCK: 爲性者五曰之於五也反於一而悖於四性之於情視其品情之品有上中中焉者之於五一也不少有焉則少反焉其於四也混下焉者焉者之於七也動而處其中中焉者之於七也有所甚有所亡下三其所以爲情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上情之於性視其品孟子之言性曰人之性善荀子之言性曰人然而求合其中者也下焉者之於七也亡與甚直情而行者也而進善與始也混而今也善惡皆舉其中而遺其上下者也得之性惡揚子之言性曰人之性善惡混夫始善而進惡與始惡食我之生也叔向之母聞其號也知必滅其宗越椒之生也子其一而失其二者也叔魚之生也其母視之}
  - {type: variant, offset: 302, length: 2, content: 成莫, WYG: 為情者七曰何也曰性之品有上中下三上焉者善而已矣中焉者可道而上下也下焉者惡焉而已矣其所以為性者五曰仁曰禮曰信曰義曰智上焉者之於五也主於一而行於四中焉者之於五一也不少有焉則少及焉則其於四也混下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也情之於性視其品孟子之言性曰人之性善荀子之言性曰人之性惡揚子之言性曰人之性善惡混夫始善而進惡歟始惡而進善歟始也混而今也善惡歟皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也其母視之}
  - {type: page-break, offset: 302, content: '', id: KR3a0002_WYG_017-11a, image: WYG0695/WYG0695-0270a.png}
  - {type: variant, offset: 302, length: 2, content: 成莫, krp: 爲性者五曰之於五也反於一而悖於四性之於情視其品情之品有上中中焉者之於五一也不少有焉則少反焉其於四也混下焉者焉者之於七也動而處其中中焉者之於七也有所甚有所亡下三其所以爲情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上情之於性視其品孟子之言性曰人之性善荀子之言性曰人然而求合其中者也下焉者之於七也亡與甚直情而行者也而進善與始也混而今也善惡皆舉其中而遺其上下者也得之性惡揚子之言性曰人之性善惡混夫始善而進惡與始惡食我之生也叔向之母聞其號也知必滅其宗越椒之生也子其一而失其二者也叔魚之生也其母視之}
