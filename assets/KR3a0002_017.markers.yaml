  - {type: variant, offset: 23, length: 1, content: 吉, WYG: 皮膚枯槁也感而自然不待事而後生之者也受性自爾不待學而知也夫感而不能然必且待事而後然者謂之生於偽是性偽之所生其不同之徴也徴驗故聖人化性而起偽言聖人能變化本性而興起矯為也偽起於性而生禮義老子曰智惠出有大偽莊子亦云仁相偽也義相虧也皆言非其本性也禮義生而制法度然則禮義法度者是聖人之所生也故聖人之所以同於衆其不異於衆者性也所以異而過衆者偽也聖人過衆在能起偽夫好利而欲得者此人之情性也假之有弟兄資財而分者且順情性好利而欲得若是則兄弟相拂奪矣拂違戾也或曰拂字從木旁弗擊也方言云自關而西謂之拂今之農噐連枷也且發辭也且化禮義之文理若是則讓乎國人矣故順情性則弟兄争矣化禮義則讓乎國人矣凡人之欲為善者為性惡也為其性惡所以欲為善也夫薄願厚惡願羙狹願廣貧願富賤願貴苟無之中者必求於外故富而不願財貴而不願勢苟有之中者必不及於外既有富貴於中故不及財勢於外也用此觀之人之欲為善者為性惡也無於中故求於外亦猶貧願富之比今人之性固無禮義故彊學而求有之也性不知禮義故思慮而求知之也然則性而已則人無禮義不知禮義性而已謂不矯偽者人無禮義則亂不知禮義則悖然則性而已則悖亂在已用此觀之人之性惡明矣其善者偽也不矯而為之則悖亂在已以此知其性惡也孟子曰人之性善曰是不然凡古今天下之所謂善者正理平治也所謂惡者偏險悖亂也是善惡之分也已言善惡之分在此二者分扶問反今誠以人之性固正理平治邪則有惡用聖王惡用禮義矣哉有讀為又惡音烏雖有聖王禮義將曷加於正理平治也哉今不然人之性惡今以性善為不然者謂人之性惡也故古者聖人以人之性惡以為偏險而不正悖亂而不治故為之立君上之勢以臨之明禮義以化之起法正以治之重刑罰以禁之使天下皆出於治合於善也是聖王之治而禮義之化也今當試去君上之勢無禮義之化去法正之治無刑罰之禁倚而觀天下民人之相與也倚任也或曰倚偏倚猶傍觀也若是則夫彊者害弱而奪之衆者暴寡而譁之衆者陵暴於寡而諠譁之不使得發言也天下之悖亂而相亡不待頃矣頃少頃也本或為須須臾也用此觀之然則人之性惡明矣其善者偽也故善言古者必有節於今善言天者必有徴於人節凖徵驗凡論者貴其有辨合其符驗辨别也周禮小宰聽稱責以傅别郭司農云别之為兩兩家各執其一符以竹為之亦相合之物言論議如别之合如符之驗然後可施行也故坐而言之起而可設張而可施行今孟子曰人之性善無辨合符驗坐而言之起而不可設張而不可施行豈不過甚矣哉故性善則去聖王息禮義矣性善則不假聖王禮義也性惡則興聖王貴禮義矣故櫽栝之生為构木也繩墨之起為不直也立君上明禮義為性惡也用此觀之然則人之性惡明矣其善者偽也直木不待櫽栝而直者其性直也构木必將待櫽栝烝矯然後直者以其性不直也今人之性惡必將待聖王之治禮義之化然後皆出於治合於善也用此觀之然則人之性惡明矣其善者偽也問者曰禮義積偽者是人之性故聖人能生之也言禮義雖是積偽所為亦皆人之天性自有聖人能生之衆人但不能生耳}
