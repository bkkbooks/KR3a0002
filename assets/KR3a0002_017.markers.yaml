  - {type: variant, offset: 33, length: 2, content: 節用, SBCK: 生所賤於桀跖小人者從其性順其情安恣睢以出乎貪利爭奪故人之性惡明矣其善者僞也人之本性也桀跖小人是天非私曾騫孝已而外衆人也之太子皆有至孝之行也曽参閔子騫也孝已殷髙宗然而曾騫孝已獨厚於孝之實而全於孝之名者何也以綦於禮義故也極爲禮義故也三人能矯其性天非私齊魯之民而外秦人也然而於父子之義夫婦之别不如齊魯之孝具敬父者何也孝道敬父孝具能具而有文謂夫婦有别也當爲敬文傳冩誤耳敬以秦人之從情性安恣睢慢於禮義故也豈其性異矣哉爲曾閔慢綦禮義}
