  - {type: variant, offset: 15, length: 3, content: 為桀亡, WYG: 離目可以聽之聦不離耳使質朴資材自善如聞見之聦明常不離於耳目此乃天性也故曰目明而耳聦也故曰如目明耳聦此乃是其性不然則是矯偽使之也今人之性飢而欲飽寒而欲煖勞而欲休此人之情性也今人飢見長而不敢先食者將有所讓也勞而不敢求息者將有所代也所以代尊長也夫子之讓乎父弟之讓乎兄子之代乎父弟之代乎兄此二行者皆反於性而悖於情也悖違然而孝子之道禮義之文理也故順情性則不辭讓矣辭讓則悖於情性矣用此觀之然則人之性惡明矣其善者偽也問者曰人之性惡則禮義惡生禮義從何而生惡音烏}
