  - {type: variant, offset: 23, length: 1, content: 吉, SBCK: 皮膚枯槁也也佚與逸同人勞感而自然不待事而後生之者也待學而知也受性自爾不夫感而不能然必且待事而後然者謂之生於僞是性僞之所生其不同之徴也驗徴故聖人化性而起僞本性而興起矯言聖人能變化也僞僞起於信而生禮義子亦云仁相僞也義相虧老子曰智惠出有大僞莊其本性也也皆言非禮義生而制法度然則禮義法度者是聖人之所生也故聖人之所以同於衆其不異於衆者性也所以異而過衆者僞也在能起僞聖人過衆夫好利而欲得者此人之情性也假之人有弟兄資財而分者且順情性好利而欲得若是則兄弟相怫奪矣違怫而西謂之拂今之農器連枷也且發辭也戾也或曰拂字從木旁弗擊也方言云自關且化禮義之文理若是則讓乎國人矣故順情性則弟兄爭矣化禮義則讓乎國人矣凡人之欲爲善者爲性惡也以欲爲善也爲其性惡所夫薄願厚惡願美狹願廣貧願富賤願貴苟無之中者必求於外故富而不願財貴而不願埶苟有之中者必不及於外不及財勢於外也旣有富貴於中故用此觀之人之欲爲善者爲性惡也外亦猶貧願富無於中故求於比之今人之性固無禮義故彊學而求有之也性不知禮義故思慮而求知之也然則生而已則人無禮義不知禮義不矯僞者性而已謂人無禮義則亂不知禮義則悖然則生而已則悖亂在已用此觀之人性惡明矣其善者僞也已以此知其性惡也不矯而爲之則悖亂在孟子曰人之性善曰是不然凡古今天下之所謂善者正理平治也所謂惡者偏險悖亂也是善惡之分也已二者分扶問反善惡之分在此今誠以人之性固正理平治邪則有惡用聖王惡用禮義矣哉惡音烏也有讀爲又雖有聖王禮義將曷加於正理平治也哉今不然人之性惡者爲人之性惡也今以性善爲不然故古者聖人以人之性惡以爲偏險而不正悖亂而不治故爲之立君上之埶以臨之明禮義以化之起法正以治之重刑罰以禁之使天下皆出於治合於善也是聖王之治而禮義之化也今當試去君上之埶無禮義之化去法正之治無刑罰之禁􅀝而觀天下民人之相與也偏倚猶傍觀也倚任也或曰􅀝若是則夫彊者害弱而奪之衆者暴寡而譁之譁之不使得發言也衆者陵暴於寡而諠天下之悖亂而相亡不待頃矣爲須須􅁷也頃少頃也本或用此觀之然則人之性惡明矣其善者僞也故善言古者必有節於今善言天者必有徴於人徵驗節準凡論者貴其有辨合其符驗也周辨别符以竹爲之亦相合之物言論議如别之合如符之驗然可禮小宰聽稱責以傅别鄭司農云别之爲兩兩家各執其一也施行故坐而言之起而可設張而可施行今孟子曰人之性善無辨合符驗坐而言之起而不可設張而不可施行豈不過甚矣哉故性善則去聖王息禮義矣假聖王禮性善則不也義性惡則與聖王貴禮義矣故櫽栝之生爲枸木也繩墨之起爲不直也立君上明禮義爲性惡也用此觀之然則人之性惡明矣其善者僞也直木不待櫽栝而直者其性直也枸木必將待櫽栝烝矯然後直者以其性不直也今人之性惡必將待聖王之治禮義之化然後皆出於治合於善也用此觀之然則人之性惡明矣其善者僞也問者曰禮義積僞者是人之性故聖人能生之也自有聖人能生之衆人但不能生耳言禮義雖是積僞所爲亦皆人之天性}
