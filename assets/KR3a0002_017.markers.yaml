  - {type: variant, offset: 9, length: 0, content: '', WYG: 欲無主乃亂惟聦明時乂亦與此義同也人之性惡其善者偽也偽為也矯也其本性也凡非天性而人作為之者皆謂之偽故為字人傍為亦㑹意字也今人之性生而有好利焉順是故争奪生而辭讓亡焉天生性也順是謂順其性也生而有疾惡焉順是故殘賊生而忠信亡焉疾與嫉同惡烏路反生而有耳目之欲有好聲色焉順是故淫亂生而禮義文理亡焉文理謂節文條理也然則從人之性順人之情必出於争奪合於犯分亂理而歸於暴故必將有師法之化禮義之道道與導同然後出於辭讓合於文理而歸於治用此觀之然則人之性惡明矣其善者偽也故构木必將待櫽栝烝矯然後直构讀為鈎曲也下同櫽栝正曲木之木也烝謂烝之使柔矯謂矯之使直也鈍金必將待礱厲然後利礱厲皆磨也厲與勵同今人之性惡必將待師法然後正得禮義然後治今人無師法則偏險而不正無禮義則悖亂而不治古者聖王以人之性惡以為偏險而不正悖亂而不治是以為之起禮義制法度以矯飾人之情性而正之以擾化人之情性而道之也使皆出於治合於道者也矯彊抑也擾訓也今之人化師法積文學道禮義者為君子縱性情安恣睢而違禮義者為小人用此觀之然則人之性惡明矣其善者偽也孟子曰人之學者其性善孟子言人之有學適所以成其天性之善非矯也與告子所論是也曰是不然是不及知人之性而不察乎人之性偽之分者也不及知謂智慮淺近不能及於知猶言不到也書曰子冲人不及知之也凡性者天之就也不可學不可事禮義者聖人之所生也人之所學而能所事而成者也聖人之所生明非天性也事為也任也周禮大宰職六曰事典以富邦國以任百官鄭云任事也不可學不可事而在人者謂之性可學而能可事而成之在人者謂之偽是性偽之分也不可學不可事謂不學而能不事而成也今人之性目可以見耳可以聽夫可以見之明不離目可以聽之聦不離耳可見之明}
