  - {type: variant, offset: 309, length: 1, content: 是, SBCK: 人雖有性質美而心辨知必將求賢師而事之擇賢友而友之得賢師而事之則所聞者堯舜禹湯之道也得良友而友之則所見者忠信敬讓之行也身日進於仁義而不自知也者靡使然也順從也靡謂相磨切也或曰靡今與不善人處則所聞者欺誣詐僞也所見者汙漫淫邪貪利之行也也漫誕汙穢行曰舜以其辱行漫我也漫欺誑也莊子北人無擇身且加於刑戮而不自知者靡使然也傳曰不知其子視其友不知其君視其左右靡而已矣靡而已矣君子篇第二十四君之事即君子當爲天子恐傳寫誤也凡篇名多用初發之語名之此篇皆論人天子無妻告人無匹也尊無與二故無匹也告言也妻者齊也天子四海之内無客禮告無適也曰天子無客禮適讀爲敵禮記自阼階不敢有其室也莫敢主焉君適其臣升足能行待相者然後進口能言待官人然後詔舌之官也官人掌喉不視而見不聽而聦不言而信不慮而知不動而功告至備也故能至備也盡委於羣下天子也者埶至重形至佚心至愈爲愉愈讀志無所詘形無所勞尊無上矣詩曰普天之下莫非王土率土之濵莫非王臣此}
