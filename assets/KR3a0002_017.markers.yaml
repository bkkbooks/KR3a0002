  - {type: variant, offset: 15, length: 3, content: 為桀亡, krp: 離於也於耳目明而耳聦不可學明矣於學是乃天性也如目明耳聦之不假孟子曰今人之性善將皆失喪其性故也本性故惡也孟子言失喪曰若是則過矣今人之性生而離其朴離其資必失而喪之生而任其性則離其質朴質也資材也言人若而愚惡其失喪必也朴而偷薄離其資材用此觀之然則人之性惡明矣所謂性善者不離其朴而美之不離其資而利之也不假飾而善此則爲天性不離質朴資材自得美利使夫資朴之於美心意之於善若夫可以見之明不離目可以聽之聦不離耳聞見之聦明常不離使質朴資材自善如乃天性也於耳目此故曰目明而耳聦也乃是其性不然則是故曰如目明耳聦此之也矯僞使今人之性飢而欲飽寒而欲煖勞而欲休此人之情性也今人飢見長而不敢先食者將有所讓也勞而不敢求息者將有所代也尊長也所以代夫子之讓乎父弟之讓乎兄子之代乎父弟之代乎兄此二行者皆反於性而悖於情也違悖然而孝子之道禮義之文理也故順情性則不辭讓矣辭讓則悖於情性矣用此觀之然則人之性惡明矣其善者僞也問者曰人之性惡則禮義惡生生惡音烏禮義何從而}
