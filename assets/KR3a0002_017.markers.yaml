  - {type: variant, offset: 317, length: 0, content: '', WYG: 不可以為富也皆知夫賊害之人不可以為夀也皆知夫犯上之禁不可以為安也由其道則人得其所好焉不由其道則必遇其所惡焉道謂政令是故刑罰綦省而威行如流治世曉然皆知夫為姦則雖隱竄逃亡之由不足以免也故莫不服罪而請自請形戮書曰凡人自得罪此之謂也言人人自得其罪不敢隱也與今康誥義不同或斷章取義歟故刑當罪則威不當罪則侮爵當賢則貴不當賢則賤不當則為下所侮賤古者刑不過罪爵不踰德故殺其父而臣其子殺其兄而臣其弟言當罪而用賢歸于至公也謂若殛鯀與禹殺管叔封康叔之比者刑罰不怒罪爵賞不踰德分然各以其誠通善惡分然其忠誠皆得通逹無屈滯是以為善者勸}
