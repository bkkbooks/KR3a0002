  - {type: variant, offset: 20, length: 0, content: '', krp: 曰凡禮義者是生於聖人之僞非故生於人之性也矯僞抑制非本生於人性也故猶本也言禮義生於聖人故陶人埏埴而爲器也擊黏土而成器埏音羶陶人瓦工也埏擊也埴黏土然則器生於工人之僞非故生於人之性也自是生言陶器爲之也或曰工人當爲陶人故猶本也於工人學而爲之非本生於人性自能故工人斵木而成器然則器生於工人之僞非故生於人之性也聖人積思慮習僞故}
