  - {type: variant, offset: 1730, length: 0, content: '', SBCK: 尸鳩之詩曹風正身任物則四國皆化恃才矜能則所得者小也篇言善人君子其儀不忒故能正四方之國以喻荀子卷第十七}
  - {type: variant, offset: 1730, length: 0, content: '', WYG: 詩曹風鳲鳩之篇言善人君子其威儀不忒故能正四方之國以喻正身任物則四國皆化恃才矜能則無所得者也荀子卷十七欽定四庫全書荀子卷}
