  - {type: variant, offset: 180, length: 0, content: '', WYG: 不肯為君子君子可以為小人而不肯為小人小人君子者未嘗不可以相為也然而不相為者可以而不可使也故塗之人可以為禹則然塗之人能為禹未必然也雖不能為禹無害可以為禹足可以徧行天下然而未嘗有能徧行天下者也夫工匠農賈未嘗不可以相為事也事業然則未嘗能相為事也用此觀之然則可以為未必能也雖不能無害可以為然則能不能之與可不可其不同逺矣其不可以相為明矣工賈可以相為而不能相為是可與能不同也可與能既不同則終不可以相為也此明禹亦性惡以能積偽為聖人非禹性本善也聖人異於衆者在化性也堯問於舜曰人情何如舜對曰人情甚不羙又何問焉妻子具而孝衰於親嗜欲}
