  - {type: variant, offset: 307, length: 0, content: '', WYG: 灾其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽瞍之舜鯀之禹習非不惡也而卒為聖人之性善惡果混乎故曰三子之言性也舉其中而遺其上下者也得其一而失其二者也曰然則性之上下者其終不可移乎曰上之性就學而愈明下之性畏威而寡罪是故上者可學而下者可制也其品則孔子謂不移也曰今之言性者異於此何也曰今之言者雜老佛而言也雜佛老而言之也者奚言而不異有聖人之知者有士君子之知者有小人之知者有役夫之知者多言則文而類終日議其所以言之千舉萬變其統類一也是聖人之知也文謂言不鄙陋也類謂其統類不乖謬也雖終旦議其所以然其言千舉萬變終始條貫如一是聖人之知也少言則徑而省論而法若佚之以繩是士君子之知也徑易也省謂辭寡論而法謂論議皆有法不放縱也論或為倫佚猶引也佚以繩言其直也聖人經營事廣故曰多言君子止恭其所守故曰少言也其言也諂其行也悖其舉事多侮是小人之知也言諂行悖謂言行相違也齊給便敏而無類雜能旁魄而無用齊疾也給謂應之速如供給者也便謂輕巧敏速也無類首尾乖戾雜能多異術也旁魄廣博也無用不應於用便匹延反魄音薄折速粹熟而不急折謂折辭若堅白之論者也速謂發辭㨗速粹熟所著論甚精熟也不急言不急於用也不恤是非不論曲直以期勝人為意是役夫之知也期於必勝人惠施之論也徒自勞苦争勝而不知禮義故曰役夫之知也有上勇者有中勇者有下勇者天下有中敢直其身中謂中道敢果决也直其身謂中立而不倚無回邪也先王有道敢行其意言不疑也上不循於亂世之君下不俗於亂世之民循順從也俗謂從其俗也仁之所在無貧窮仁之所亡無富貴唯仁亦在為富貴禮記曰不祈多積多文以為富天下知之則欲與天下同苦樂之得權位則與天下之人同休戚苦或為共也天下不知之則傀然獨立天地之間而不畏是上勇也傀偉大貌公回反或曰傀與塊同獨居之貌也禮恭而意儉大齊信焉而輕貨財大重也齊信謂整齊於信也賢者推而尚之不肖者敢援而廢之是中勇也尚上也援牽引也輕身而重貨恬禍而廣觧恬安也謂安於禍難也而廣自觧說言以辭勝人也觧佳買反苟免不恤是非然不然之情以期勝人為意是下勇也繁弱鉅黍古之良弓也繁弱封父之弓左傳曰封父之繁弱鉅與拒同黍當為來史記蘇秦說韓王曰谿子少時力能拒來司馬貞云言弓弩勢勁足以拒於來敵也然而不得排擏則不能自正排擏輔正弓弩之噐擏巨京反桓公之葱太公之闕文王之録莊君之􅘈闔閭之干將莫邪鉅闕辟閭此皆古之良劒也葱闕録􅘈齊桓公齊大公周文王楚莊王之劒名皆未詳所出葱青色也録與緑同三劒以色為名曹植七啓説劒云彫以翠緑亦其類也􅘈劒光采慌惚難視以}
