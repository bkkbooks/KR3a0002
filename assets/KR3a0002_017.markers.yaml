  - {type: 'tls:seg', offset: 303, content: '', id: KR3a0002_tls_017-3a.13}
  - {type: variant, offset: 306, length: 0, content: '', SBCK: 必以賄死􅀭也其母}
  - {type: variant, offset: 306, length: 0, content: '', WYG: 必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為大慼知若敖氏之鬼不食也人之性果善乎后稷之生也其母}
  - {type: variant, offset: 306, length: 0, content: '', krp: 必以賄死揚也其母}
  - {type: variant, offset: 307, length: 0, content: '', SBCK: 災其始匍匐也則歧歧然嶷嶷然文王之在母也母文以爲大慼知若敖氏之􅀑不食也人之性果善乎后稷之生之均文三之管蔡習非不善也而卒爲姦瞽􅅱之舜鮌之禹習不憂旣生也傅不勤旣學也師不煩人之性果惡乎堯之朱舜舉其中而遺其上下者也得其一而失其二者也曰然則性之非不惡也而卒爲聖人之性善惡果混乎故曰三子之言性也寡罪是故上者可學而下者可制也其品則孔子謂不移也曰上下者其終不可移乎曰上之性就學而愈明下之性畏威而佛而言也雜老佛而言之也者奚言而不異今之言性者異於此何也曰今之言者雜老有聖人之知者有士君子之知者有小人之知者有役夫之知者多言則文而類終日議其所以言之千舉萬變其統類一也是聖人之知也議其所以然其言千舉萬變終始條貫如一是聖文謂言不鄙陋也類謂其統類不乖謬也雖終日知也人之少言則徑而省論而法若佚之以繩是士君子之知也有法不放縱也論或爲倫佚猶引也佚徑易也省謂辭寡論而法謂論議皆多言君子止恭其所守故曰少言也以繩言其直也聖人經營事廣故曰其言也諂其行也悖其舉事多悔是小人之知也言行相違也言諂行悖謂齊給便敏而無類雜能旁魄而母用給謂應齊疾也多異術也旁魄廣博也毋用不應於用便匹延反魄音薄之速如供給者也便謂輕巧敏速也無類首尾乖戾雜能析速粹孰而不急謂發辭捷速粹孰所著論甚精析謂析辭若堅白之論者也速不急於用也孰也不急亦不恤是非不論曲直以期勝人爲意是役夫之知也勞苦爭勝而不知禮義故曰役期於必勝人惠施之論也徒自知也夫之有上勇者有中勇者有下勇者天下有中敢直其身謂中立而不􅀝無回邪也中謂中道敢果决也直其身先王有道敢行其意疑也言不上不循於亂世之君下不俗於亂世之民謂從其俗也循順從也俗仁之所在無貧窮仁之所亡無富貴記曰不祈多積多文唯仁所在爲富貴禮富也以爲天下知之則欲與天下同苦樂之則與天得權位苦或爲共也下之人同休戚天下不知之則傀然獨立天地之間而不畏是上勇也曰傀與塊同獨居之貌也傀傀偉大貌也公回反或禮恭而意儉大齊信焉而輕貨財謂釐齊於信大重也齊信也賢者敢推而尚之不肖者敢援而廢之是中勇也牽引也尚上也援輕身而重貨恬禍而廣解觧􅀃言以辭勝人也解佳買反恬安也謂安於禍難也而廣自苟免不恤是非然不然之情以期勝人爲意是下勇也繁弱鉅黍古之良弓也父之繁弱鉅與拒同黍當繁弱封父之弓左傳曰封來司馬貞云言弓弩埶勁足以拒於來敵也爲來史記蘇秦􅀃韓王曰谿子少府時力距然而不得排㯳則不能自正之器㯳巨京反排㯳轉正弓弩􅁊公之葱大公之闕文王之録莊君之曶闔閭之干將莫邪鉅闕辟閭此皆古之良劒也齊􅁊公齊葱闕録曶三劒以色爲名曹植七啓􅀃劒云雕以翠緑亦其類也曶劒光太公周文王楚莊王之劒名皆未詳所出葱青色也録與緑同因以爲名鉅闕亦是也干將莫邪巨闕皆呉王闔閭劒名辟閭采慌忽難視以}
