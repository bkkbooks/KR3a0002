  - {type: variant, offset: 1154, length: 149, content: 義則渠渠然依乎法而又深其類然後溫溫然禮者所以正身也師者所以正禮也無禮何以正身無師吾安知禮之為是也禮然而然則是情安禮也師云而云則是知若師也情安禮知若師則是聖人也故非禮是無法也非師是無師也不是師法而好自用譬之是猶以盲辨色以聾辨聲也舍亂妄無為也故學也者法禮也夫師以身為正儀而貴自安者也詩云不識不知順帝之則, SBCK: 時矣}
