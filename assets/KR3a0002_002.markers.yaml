  - {type: variant, offset: 1524, length: 1, content: 喜, WYG: 農時也上則能順天子之命下則能保百姓是諸侯之所以取國家也志行脩臨官治上則能順上下則能保職是士大夫之所以取田邑也脩法則度量刑辟圖籍度丈尺量斗斛刑法之書左氏傳曰先王議事以制}
