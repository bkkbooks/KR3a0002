  - {type: variant, offset: 1521, length: 0, content: '', krp: 而喪終身之軀然且爲之是忘其身也家室立殘親戚不免乎刑戮然且爲之是忘其親也戮及親戚尸子曰非人蓋當時禁鬪殺人之法以親戚徇一言而不顧之也君之用兵也以爲民傷鬪則君上之所惡也刑法之所大禁也然且爲之是忘其君也憂忘其身曰當爲下忘其身誤爲夏又夏轉誤爲憂字耳遭憂患刑戮而不能保其身是憂忘其身也或内忘其親上忘其君是刑法之所不舍也聖王之所不畜也乳彘不觸虎乳㺃不逺遊不忘其親也人也憂忘其身内忘其親上忘其君則是人也而曽㺃彘之不若也凡鬪者必自以爲是而以人爲非也已誠是也人誠非也則是己君子而人小人也以君子與小人相賊害也憂以忘其身内以忘其親上以忘其君豈}
  - {type: variant, offset: 1523, length: 0, content: '', SBCK: 甚矣哉是人也所謂以狐父之戈钃牛矢也於賤也狐父地名史記伍被時人舊有此語喻以貴而用管子曰蚩尤爲雍狐之㦸狐父之戈豈近此耶钃刺也之欲反故良曰吳王兵敗於狐父徐廣曰梁碭之間也蓋其地山名戈其說未聞刺也或讀斸爲斫劒謂之屬鏤亦取其將以爲智邪則愚莫大焉將以爲利邪則害莫大焉將以爲榮邪則辱莫大焉將以爲安邪則危莫大焉人之有􅃲何哉我欲屬之狂惑疾病邪則不可聖王又誅之之欲反屬託也我欲屬之鳥䑕禽獸邪則不可其形體又人而好惡多同也其好惡多與賢視其形體則又人􅃲爲異耳人同但好人之有􅃲何哉我甚醜之何爲􅃲也其禍如此有㺃彘之勇者有賈盜之勇者賈盜勇於求財㺃彘勇於求食古賈音有小人之勇者有士君子之勇者於暴士小人勇人有此數勇也君子勇於義言爭飲食無廉恥不知是非不辟死傷不畏衆彊恈恈然惟利飲食之見是狗彘之勇者也言云牟愛也宋魯之間曰牟辟讀爲避恈恈愛欲之貌方爲事利爲于僞反爲事及利也爭貨財無辭讓果敢而振猛貪而戾恈恈然唯利之見是賈盜之勇也戾乖背振動也振而矜之何休云亢陽之貌也也春秋公羊傳曰葵丘之㑹􅁊公輕死而暴是小人之勇也義之所在不傾於權不顧其利舉國而與之不爲攺視重死持義而不橈是士君子之勇也苟生也儒行曰愛其死以有待也雖重愛其死而執節持義不橈曲以儵䱁者浮陽之魚也水上就陽也今字書無䱁字蓋儵䱁魚名浮陽謂此魚好浮於濠梁之上儵魚出遊是亦浮陽之義或曰浮陽渤海縣名也儵音稠當爲鮁說文云即鱣鮪鮁鮁字蓋儵魚一名儵鮁莊子與惠子遊於末反鮁布胠於沙而思水則無逮矣言云袪去也齊趙之胠與袪同揚子雲方莊子有胠篋篇亦取去之義也緫語去於沙謂失水去在沙上也挂於患而欲謹則無益矣魚也人亦猶自知者不怨人知命者不怨天怨人者窮者則窮迫無所出徒怨憤於人不自修怨天者無志之人有志皆歸於命故不怨天但自修身遇與不遇失之已反之人豈不迂乎哉責人也迂失也反榮辱之大分安危利害之常體先義而後利者榮先利而後義者辱榮者常通辱者常窮通者常制人窮者常制於人於人受制是榮辱之大分也然其大分如此矣其中雖未必皆然材愨者常安利蕩悍者常危害蕩悍巳解於脩身篇材愨謂材性愿愨也安利者常樂易危害者常憂險詩所謂愷悌者也樂易歡樂平易也樂易者常夀長憂險者常夭折是安危利害之常體也如此亦大率夫天生蒸民有所以取之下職業皆有取之道非言天生衆民其君臣上敗之也其道所以志意致脩德行致厚智慮致明是天子之所以取天下也之所以取天下之道也致極也言如此是乃天子政令法舉措時聽斷公役不}
