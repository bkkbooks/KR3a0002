  - {type: variant, offset: 1533, length: 1, content: 書, SBCK: 以亂得亂也君子非得勢以臨之則無由得開内焉而内善道也開小人之心今是人之口腹安知禮義安知辭讓安知廉恥隅積所知隅一言口腹無也積積習隅謂其分亦呥呥而噍鄉鄉而飽巳矣貌如鹽呥呥噍鄉趨飲食貌許亮反反噍嚼也才笑反鄉人無師無法則其心正其口腹也如口腹之欲也人不學則心正今使人生而未甞睹芻豢稻粱也唯菽藿糟糠之爲睹則以至足爲在此也俄而粲然有秉芻豢而至者則瞲然視之}
