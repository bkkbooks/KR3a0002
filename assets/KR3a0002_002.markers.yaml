  - {type: variant, offset: 957, length: 0, content: '', krp: 則止時行禮義}
  - {type: variant, offset: 958, length: 0, content: '', SBCK: 中時君子遭時則大行不遇則龍蛇何必沈身則行不必枯槁赴淵}
  - {type: page-break, offset: 958, content: '', id: KR3a0002_SBCK_002-1b}
