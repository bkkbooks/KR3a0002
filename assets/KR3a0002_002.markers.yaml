  - {type: variant, offset: 1556, length: 1, content: 能, WYG: 謂吉小人之謂凶故長短小大善惡形相非吉凶也古之人無有也學者不道也蓋帝堯長帝舜短文王長周公短仲尼長子弓短子弓蓋仲弓也言子者著其為師也漢書儒林傳馯臂字子弓江東人受易者也然馯臂傳易之外更無所聞荀卿子論說常與仲尼相配必非馯臂也馯音寒昔者衛靈公有臣曰公孫呂身長七尺靣長三尺焉廣三寸鼻目耳具而名動天下靣長三尺廣三寸言其狹而長甚也鼻目耳雖皆具而相去踈逺所}
