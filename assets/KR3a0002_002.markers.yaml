  - {type: variant, offset: 1307, length: 0, content: '', WYG: 詩小雅魚麗之篇言雖有物亦須得其時以喻當之為貴君子易知而難狎坦蕩蕩故易知不比黨故難狎易懼而難脅小心而志不可奪也畏患而不避義死欲利而不為所非心以為非則捨之交親而不比親謂仁恩比謂暱狎言辯而不辭辯足以明事不至於騁辭蕩蕩乎其有以殊於世也與俗人有異也君子能亦好不能亦好小人能亦醜不能亦醜君子能則寛容易直以開道人道與導同不能則恭敬繜絀以畏事人繜與撙同絀與黜同謂自撙節貶損也小人能則倨傲僻違以驕溢人溢滿不能則妬嫉怨誹以傾覆人故曰君子能則人榮學焉不能則人樂告之小人能則人賤學焉不能則人羞告之是君子小人之分也分異也如字君子寛而不僈僈與慢同怠惰也廉而不劌亷稜也說文云劌利傷也但有廉隅不至於兩傷也辯而不争察而不激但明察而不激切也寡立而不勝堅彊而不暴雖寡立而不能勝雖堅彊而不兇暴柔從而不流恭敬謹慎而容不至於孤介也夫是之謂至文言德備也詩曰溫溫恭人維德之基此之謂矣詩大雅抑之篇温温寛柔貌君子崇人之德揚人之美非諂諛也正義直指舉人之過惡非毁疵也疵病也或曰讀為訾言已之光美擬於禹舜參於天地非夸誕也與時屈伸柔從若蒲葦非懾怯也蒲葦所以為席可卷者也剛彊猛毅靡所不信非驕暴也信讀為伸下同古字通用以義變應知當曲直故也以義隨變而應其所知當於曲直也詩曰左之左之君子宜之右之右之君子有之此言君子之能以義屈伸變應也詩小雅裳裳者華之篇以能應變故左右無不得其宜也君子小人之反也與小人相反君子大心則天而道小心則畏義而節天而道謂合於天而順道知則明通而類類謂知統類也愚則}
