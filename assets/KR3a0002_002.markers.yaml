  - {type: variant, offset: 1510, length: 0, content: '', SBCK: 由於有忮害之心也至明察而見傷殘者博之而窮者訾也辯博言詞於好毁訾也而見窮蹙者由淸之而俞濁者口也濁者在口說之過欲求其清而俞矣但能口說斯俞濁也俞讀爲愈謂言過其實也或曰絜其身則自淸豢之而俞瘠者交也瘠也故上篇云}
