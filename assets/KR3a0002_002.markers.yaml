  - {type: variant, offset: 1543, length: 5, content: 無有作惡遵, SBCK: 仁義之統以相羣居以相持養以相藩飾以相安固邪飾藩蔽文飾也持養保養也藩以夫桀跖之道是其爲相縣也幾直夫芻豢稻粱之縣糟糠爾哉糟糠比芻豢哉幾讀爲豈下同言以先}
