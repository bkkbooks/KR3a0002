  - {type: 'tls:seg', offset: 1528, content: '', id: KR3a0002_tls_002-12a.22}
  - {type: variant, offset: 1529, length: 0, content: '', SBCK: 非知能材性然也是注錯習俗之節異也俗節限制之也習俗謂所習風仁義德行常安之術也然而未必不危也汙僈突盜常危之術也然而未必不安也人無擇曰舜以其辱行汙漫我漫莫半反莊子又僈當爲漫漫亦汙也水冒物謂之漫莊子云北云縱逸也一曰漫欺誑之也曰澶漫爲樂崔云淫術也李故君子道其常而小人道其怪也之事取以自比也道語也怪謂非常凡人有所一同飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨白黒美惡而耳辨音聲淸濁口辨鹹甘苦鼻辨芬芳腥臊骨體膚理辨寒暑疾養理膚養與癢同肌膚之文理是又人之所常生而有也是無待而然者也是禹桀之所同也可以爲堯禹可以爲桀跖可以爲工匠可以爲農賈在勢注錯習俗之所積爾積習在所是又人之所生而有也是無待而然者也是禹桀之所同也爲堯禹則常安榮爲桀跖則常危辱爲堯禹則常愉佚爲工匠農賈則常煩勞然而人力爲此而寡爲彼何也曰陋也不爲言人由於性之固陋也彼堯禹而爲此桀跖堯禹者非生而具者也夫起於變故成乎脩脩之爲待盡而後備者也後乃能備之孟子曰天將降大任於是人也必先苦其心志勞其變故患難事故也言堯禹起於憂患成於脩飾由於待盡物理然性增益其所不爲也智生於憂患而死於安樂爲于僞反筋骨窮餓其體膚空乏其身行拂亂其所爲不能動心忍人之生固小人無師無}
  - {type: page-break, offset: 1529, content: '', id: KR3a0002_SBCK_002-17b}
