  - {type: variant, offset: 1370, length: 0, content: '', WYG: 小人矣公生明偏生闇端慤生通詐偽生塞多窮塞也誠信生神誠信至則通於神明中庸曰至誠如神夸誕生惑矜夸妄誕則貪惑於物此六生者君子慎之而禹桀所以分也所以分賢愚也欲惡取舎之權舉下事也見其可欲也則必前後慮其可惡也者見其可利也則必前後慮其可害也者而兼權之熟計之權所以平輕重者熟甚也猶成熟也然後定其欲惡取舎如是則常}
