  - {type: variant, offset: 1310, length: 1, content: 弟, krp: 命以愼其獨者也以順人所不睹恐懼乎其所不聞至誠不欺故人亦不違之也命如此者由慎其獨所致也慎其獨謂戒慎乎其所善之爲道者不誠則不獨能慎其獨也無至誠則不不獨則不形慎其不能能形見於外獨故其徳亦不不形則雖作於心見於色出於言民猶若未從也雖從必疑出令民猶如未從者若如也無至誠故雖亦必疑之也雖彊使之從天地爲大矣不誠則不能化萬物聖人爲知矣不誠則不能化萬民父子爲親矣不誠則䟽君上爲尊矣不誠則卑謂卑下所尊不爲在夫誠者君子之所守也而政事之本也唯所居以其類至類自至謂天地誠則能化萬物聖所居所止也唯其所止至誠則以誠則親君上誠則尊也人誠則能化萬民父子操之則得之舍之則失之持操操而得之則輕舉也詩曰德輶如毛持至誠也而得之則易輕則獨行而不難舉至誠事自行矣則慎獨之獨行而不舍則濟矣乎不巳至誠在濟而材盡長遷而不反其初則化矣不反其初謂中道不廢也既濟則材性自盡長遷君子位尊而志恭心小而道大所聽視者近而所聞見者逺是何邪是操術然也以謂所持之術如此也近知逺以今知古故千人萬人之情一人之情是也相逺人情不天地始者今日是也百王之道後王是也王不殊行堯舜則是亦堯舜也後王當今之王言後王之道與百君子審後王之道而論於百王之前若端拜而議以百王之前比之若服玄端拜揖而議言其從容不勞也時人多端玄端朝服也端拜猶言端拱言君子審後王所宜施行之道而爲治故荀卿明之言後世澆醨難以推禮義之統分是非之分如字上分之使當其分下扶問反分緫天下之要治海内之衆若使一人故操彌約而事彌大其宗主也約少也得五寸之矩盡天下之方也之器也矩正方故君子不下室堂而海内之情舉積此者則操術然也也舉皆有通士者有公士者有直士者有愨士者有小人者上則能尊君下則能愛民物至而應事起而辨若是}
