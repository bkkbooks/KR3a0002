  - {type: 'tls:seg', offset: 956, content: '', id: KR3a0002_tls_002-8a.20}
  - {type: variant, offset: 957, length: 0, content: '', SBCK: 則止時行禮義}
  - {type: variant, offset: 957, length: 0, content: '', WYG: 則止時行則行不必枯槁赴淵也楊子雲非屈原曰君子遭時則大行不遇時則龍蛇何必沈身也山淵平天地比比謂齊等也莊子曰天與地卑山與澤平音義曰以地比天則地卑於天若宇宙}
