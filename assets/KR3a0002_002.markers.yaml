  - {type: 'tls:seg', offset: 959, content: '', id: KR3a0002_tls_002-8a.21}
  - {type: variant, offset: 959, length: 2, content: 倚魁, SBCK: 揚子雲非屈原曰山淵平天地比地卑於天若以宇宙}
  - {type: variant, offset: 959, length: 2, content: 倚魁, WYG: 是天地長親比相隨無天髙地下}
  - {type: variant, offset: 959, length: 2, content: 倚魁, krp: 揚子雲非屈原曰山淵平天地比地卑於天若以宇宙}
  - {type: variant, offset: 962, length: 0, content: '', SBCK: 髙則似天地皆卑天地皆卑則山與澤平比謂齊等也莊子曰天與地卑山與澤平音義曰以平地比天則無天髙地下之殊也在髙山則天亦髙在深泉則天亦下故曰天矣或曰天無實形地之上空虚者盡皆天也是天地長親比相隨皆相似是山澤平也地比地去夫天逺近齊秦襲逺若以天地之大包之則曾無襲合也齊在東秦在西相去甚爲一國也隔異亦可合入乎耳出乎口口也言山有耳口也凡呼於未詳所明之意或曰即山出乎耳出乎口或曰山能吐納雲霧是以有口一山衆山皆應是山聞人聲而應之故曰入鈎有須齊秦襲未詳自也丁之曲者爲鈎須與尾皆毛類是同也荘子音義云夫萬物無入乎耳出乎口鈎有須皆淺學所未見或曰鈎有須即丁子有尾曲波爲尾今丁子二字雖左}
  - {type: variant, offset: 962, length: 0, content: '', WYG: 殊也在髙山則天亦髙在深淵則天亦下故曰天地比地去天逺近皆相似是山澤平也齊秦襲襲合也齊在東秦在西相去甚逺若以天地之大包之則曾無隔異亦可合爲一國也入乎耳出乎口未詳所明之意或曰即山出口也言山有耳口也凡呼於一山衆山皆應是山聞人聲而應之故曰入乎耳出乎口或曰山能吐納雲霧是以有口也鈎有須未詳自齊秦襲入乎耳出乎口鈎有須皆淺學所未見或曰鈎有須即丁子有尾也丁之曲者為鈎須與尾皆尾類是同也莊子音義云夫萬物無形形無定稱在上為首在下為尾世人謂右}
