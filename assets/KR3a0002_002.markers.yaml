  - {type: variant, offset: 1526, length: 0, content: '', WYG: 為刑辟圖謂摸寫土地之形籍謂書其戸口之數也不知其義謹守其數慎不敢損益也若制所然父子相傳以持王公世傳法則所以保持王公言王公賴之所為治也是故三代雖亡治法猶存是官人百吏之所以取祿秩也孝悌原慤軥録疾力以敦比其事業而不敢怠傲是庶人之所以取煖衣飽食長生久視以免於刑戮也軥與拘同拘録謂自撿束也疾力謂速力而作也敦厚也比親也言不敢怠惰也飾邪說文姦言為倚事倚已解上倚事怪異之事陶誕突盜陶當為檮杌之檮頑嚚之貌突凌突不順也或曰陶當爲逃隱匿其情也愓悍憍暴愓與蕩同以偷生反側於亂世之間是姦人之所以取危辱死刑也其慮之不深其擇之不謹其定取舎楛僈是其所以危也小人所以危亡由於計慮之失也楛惡也謂不堅固材性知能君子小人一也好榮惡辱好利惡害是君子小人之所同也若其所以求之之道則異矣小人也者疾為誕而欲人之信已也疾為詐而欲人之親已也禽獸之行而欲人之善已也慮之難知也行之難安也持之難立也慮之難知謂人難測其姦詐行之難安言易顛覆也持之難立謂難扶持之也成則必不得其所好必遇其所惡焉雖使姦詐得成亦必有禍無福故君子者信矣而亦欲人之信已也忠矣而亦欲人之親已也脩正治辨矣而亦欲人之善已也慮之易知也行之易安也持之易立也成則必得其所好必不遇其所惡焉是故窮則不隱通則大明不隱謂人不能蔽隱身死而名彌白白彰明也小人莫不延頸舉踵而願曰知慮材性固有似賢人也願猶慕也賢人謂賢}
