  - {type: variant, offset: 1543, length: 0, content: '', WYG: 仁義之統以相羣居以相持養以相藩飾以相安固邪持養保養也藩飾蕃蔽文飾也以夫桀跖之道是其為相縣也幾直夫芻豢之縣糟糠爾哉言以先王之道與桀跖相縣豈止糟糠比芻豢哉幾讀為豈下同然而人力為此而寡為彼何也曰陋也陋也者天下之公患也公共有此患也人之大殃大害也故曰人者好告示人告之示之靡之儇之鈆之重之靡順從也儇疾也火縁反靡之儇之猶言緩之急之也鈆與沿同循也撫循之申重之也則夫塞者俄且通也陋者俄且僴也愚者俄且知也僴與􅍀同猛也方言云晉魏之間謂猛為僴陋者俄且僴言鄙陋之人俄且矜莊有威儀也詩曰瑟兮僴兮鄭云僴寛大也下板反是若不行則湯武在上曷益桀紂在上曷損若不行告示之道則湯武何益於天下桀紂何損於百姓所以貴湯武賤桀紂以行與不行耳湯武存則天下從而治桀紂存則天下從而亂如是者豈非人之情固可與如此可與如彼也哉人之情食欲有芻豢衣欲有文繡行欲有輿馬又欲夫餘財蓄積之富也皆人之所貴也然而窮年累世不知不足是人之情也不知不足當為不知足剰不字或曰不足猶不得也今人之生也方多蓄雞狗猪彘又蓄牛羊然而食不敢有酒肉餘刀布有囷窌刀布皆錢也刀取其利布取其廣囷廪也圜曰囷方曰廪窌窖也地藏曰窖窌匹貌反然而衣不敢有絲帛約者有筐篋之藏然而行不敢有輿馬約儉嗇也筐篋藏布帛者也言又富於餘刀布也是何也非不欲也幾不長慮顧後而恐無以繼之故也於是又節用御欲御制也或作禦止也收歛蓄藏以繼之也是於已長慮顧後幾不甚善矣哉幾亦讀為豈今夫偷生淺知之屬曾此而不知也偷苟且也糧食大侈不顧其後俄則屈安窮矣大讀為太屈竭也安語助也猶言屈然窮矣安已解前是其所以不免於凍餓操瓢囊爲溝壑中瘠者也乞食羸痩於溝壑者言不知久逺生業故至於此也况夫先王之道仁義之統詩書禮樂之分乎為生業尚不能知况能知其逺大者分制也扶問反彼固天下之大慮也將為天下生民之屬長慮顧後而保萬世也其㳅長矣其温厚矣其功盛姚逺矣㳅古流字温猶足也言先王之道於生人其為温足也亦厚矣姚與遙同言功業之盛甚長逺也非熟脩為之君子莫之能知也熟甚也甚脩飾作為之君子也故曰短綆不可以汲深井之泉知不幾者不可與及聖人之言綆索也幾近也謂不近於習也夫詩書禮樂之分固非庸人之所知也故曰一之而可再也既知一則務之二有之而可久也不可中道而廢廣之而可通也知禮樂廣博則於事可通慮之而可安也思慮禮樂則無危懼反鈆察之而俞可好也鈆與㳂同循也既知禮樂之後却循察之愈可好而不厭俞音愈以治情則利利益也禮記曰故聖王所以治人之七情修十義捨禮何以治之以為名則榮以羣則和以獨則足知詩書禮樂羣居則和同獨處則自足樂意者其是耶樂意莫過於此夫貴為天子富有天下是人情之所同欲也然則從人之欲則勢不能容物不能贍也故先王案為之制禮義以分之以禮義分别上下也使有貴賤之等長幼之差知賢愚能不能之分皆使人載其事而各得其宜載行也任之也然後使慤禄多少厚薄之稱慤實也謂實其禄使當其才稱尺證反是夫羣居和一之道也故仁人在上則農以力盡田賈以察盡財百工以巧盡械器盡謂精於事察謂明其盈虚說文云有盛為械無盛為器士大夫以上至於公侯莫不以仁厚知能盡官職夫是之謂至乎各當其分雖貴賤不同然謂之至平也故或禄天下而不自以為多謂為天子以天下為禄也或監門御旅抱關擊柝而不自以為寡監門主門也御讀爲迓迓旅逆旅也抱闗門卒也擊柝擊木所以警夜者皆知其分故雖賤而不以為寡也故曰斬而齊枉而順不同而一夫是之謂人倫舊有此語引以喻貴賤雖不同不以齊一然而要歸於治也斬而齊謂彊斬之使齊若漢書之一切者枉而順雖枉曲不直然而歸於順也不同而一謂殊塗同歸也夫如此是人之倫理也詩曰受小共大共為下國駿䝉此之謂也詩殷頌長發之篇共執也駿大也䝉讀為龎厚也今詩作駿龎言湯執小玉大玉大厚於下國言下皆頼其德也荀子卷二欽定四庫全書荀子卷三唐楊倞註非相篇第五相視也視其骨狀以知吉凶貴賤也妄誕者多以此惑世時人或矜其狀貌而忽於務實故荀卿作此篇非之漢書刑法家有相人二十四篇相人古之人}
