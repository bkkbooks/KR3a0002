  - {type: variant, offset: 1527, length: 1, content: 予, krp: 於夫不知其與已無以異也則君子汪錯之當而小人注錯之過也錯履也亦與措注錯謂所注意同也置義故孰察小人之知能足以知其有餘可以爲君子之所爲也譬之越人安越楚人安楚君子安雅弁彼鸒斯歸飛提提鸒斯雅烏也雅正也正而有美德者謂之雅詩曰}
