  - {type: variant, offset: 218, length: 732, content: 通利以處窮禮信是也凡用血氣志意知慮由禮則治達不由禮則勃亂提僈食飲衣服居處動靜由禮則和節不由禮則觸陷生疾容貌態度進退趨行由禮則雅不由禮則夷固僻違庸眾而野故人無禮則不生事無禮則不成國家無禮則不寧詩云禮儀卒度笑語卒獲此之謂也以善先人者謂之教以善和人者謂之順以不善先人者謂之諂以不善和人者謂之諛是是非非謂之智非是是非謂之愚傷良曰讒害良曰賊是謂是非謂非曰直竊貨曰盜匿行曰詐易言曰誕趣舍無定謂之無常保利棄義謂之至賊多聞曰博少聞曰淺多見曰閑少見曰陋難進曰偍易忘曰漏少而理曰治多而亂曰耗治氣養心之術血氣剛強則柔之以調和智慮漸深則一之以易良勇膽猛戾則輔之以道順齊給便利則節之以動止狹隘褊小則廓之以廣大卑溼重遲貪利則抗之以高志庸眾駑散則刦之以師友怠慢僄棄則炤之以禍災愚款端愨則合之以禮樂通之以思索凡治氣養心之術莫徑由禮莫要得師莫神一好夫是之謂治氣養心之術也志意脩則驕富貴道義重則輕王公內省而外物輕矣傳曰君子役物小人役於物此之謂也身勞而心安為之利少而義多為之事亂君而通不如事窮君而順焉故良農不為水旱不耕良賈不為折閱不市士君子不為貧窮怠乎道體恭敬而心忠信術禮義而情愛人橫行天下雖困四夷人莫不貴勞苦之事則爭先饒樂之事則能讓端愨誠信拘守而詳橫行天下雖困四夷人莫不任體倨固而心埶詐術順墨而精雜汙橫行天下雖達四方人莫不賤勞苦之事則偷儒轉脫饒樂之事則佞兌而不曲辟違而不愨程役而不錄橫行天下雖達四方人莫不棄行而供冀非漬淖也行而俯項非擊戾也偶視而先俯非恐懼也然夫士欲獨脩其身不以得罪於比俗之人也夫驥一日而千里駑馬十駕則亦及之矣將以窮無窮逐無極與其折骨絕筋終身不可以相及也將有所止之則千里雖遠亦或遲或速或先或後耳胡為乎其不可以相及也不識步道者將以窮無窮逐無極與意亦有所止之與夫堅白同異有厚無厚之察非不察也, SBCK: ''}
