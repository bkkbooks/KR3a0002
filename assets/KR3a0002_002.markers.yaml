  - {type: variant, offset: 958, length: 0, content: '', krp: 中時君子遭時則大行不遇則龍蛇何必沈身則行不必枯槁赴淵}
  - {type: punctuation, offset: 959, content: ；, id: KR3a0002_tls_002-bkkpn210}
