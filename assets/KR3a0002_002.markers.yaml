  - {type: variant, offset: 1308, length: 1, content: 愨, WYG: 慤而法愚謂無機智也法謂守法度也見由則恭而止由用也止謂不放縱也或曰止禮也言恭而有禮見閉則敬而齊謂閉塞道不行也敬而齊謂自齊整而不怨也喜則和而理憂則靜而理皆當其理通則文而明有文而彰明也窮則約而詳隱約而詳明其道也小人則不然大心則慢而暴小心則淫而傾以邪諂事人也知則攫盜而漸漸進也謂貪利不知止也愚則毒賊而亂毒害也愚而無畏忌也見由則兊而倨兊恱也言喜於徼幸而倨傲也見閉則怨而險怨上而險賊也喜則輕而翾輕謂輕佻失據翾小飛也言小人之喜輕佻如小鳥之翾然音許緣反或曰與環同說文云急也憂則挫而懾通則驕而偏偏頗窮則弃而儑弃自弃也儑當為濕方言云濕優也字書無儑字韓詩外傳作弃而累也傳曰君子兩進小人兩廢此之謂也君子治治非治亂也曷謂耶曰禮義之謂治非禮義之謂亂也故君子者治禮義者也非治非禮義者也然則國亂將弗治與曰國亂而治之者非案亂而治之之謂也去亂而被之以治案據也據舊亂而治之也荀子安案多為語助與此不同人汙而修之者人有汙穢之行將修為善非案汙而修之之謂也去汙而易之以修故去亂而非治亂也去汙而非修汙也治之為名猶曰君子為治而不為亂爲修而不為汙矣治之名號如此君子挈其辯而同焉者合矣挈修整也謂不煩雜善其言而類焉者應矣出其言善千里之外應之故馬鳴而馬應之非知也其勢然也知音智故新浴者振其衣新沐者彈其冠人之情也言潔其身者懼外物之汙也猶賢者必不受不善人之汙者也其誰能以已之僬僬受人之掝掝者哉僬僬明察之貌也僬盡謂窮盡明於事易曰窮理盡性掝當為惑惑惛也楚辭曰安能以身之察察受物之惛惛者乎僬予誚反君子養心莫善於誠無姦詐則心常安也致誠則無他事矣致極也極其誠則外物不能害唯仁之為守唯義之為行致其誠在仁義誠心守仁則形形則神神則能化矣誠心守於仁愛則必形見於外則下尊之如神能化育之矣化謂遷善也誠心行義則理理則明明則能變矣義行則事有條理明而易人不敢欺故能變改其惡也變化代興謂之天德既能變化則德同於天馴致於善謂之化改其舊質謂之變言始於化終於變也猶天道隂陽運行則為化春生冬落則為變也天不言而人推髙焉地不言而人推厚焉四時不言而百姓期焉期謂知其時候夫此有常以至其誠者也至極也天地四時所以有常如此者由極其誠所致君子至德嘿然而喻未施而親不怒而威君子有至德所以嘿然不言而人自喻其意夫此}
