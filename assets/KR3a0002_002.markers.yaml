  - {type: variant, offset: 1558, length: 0, content: '', WYG: 為異名動天下言天下皆知其賢或曰狹長如此不近人情恐文句誤脫也楚之孫叔敖期思之鄙人也杜元凱云期思楚邑名今弋陽期思縣鄙人郊野之人也突秃長左軒較之下而以楚霸突謂短髮可凌突人者故莊子說趙劒士蓬頭突􅁂長左左脚長也軒較之下而以楚霸言修文德不勞甲兵逺征伐也說文云軒曲輈也鄭注考工記云較兩輢較上出式者詩曰猗重較兮葉}
