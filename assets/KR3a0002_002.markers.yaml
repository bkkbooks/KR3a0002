  - {type: variant, offset: 1529, length: 0, content: '', WYG: 非知能材性然也是注錯習俗之節異也習俗謂所習風俗節限之制也仁義德行常安之術也然而未必不危也汙僈突盜常危之術也然而未必不安也僈當爲漫漫亦汙也水冒物謂之漫莊子云此人無擇曰舜以其辱行漫我漫莫半反莊子又曰澶漫爲樂崔云淫術也李云縱逸也一曰漫欺枉之也故曰君子道其常而小人道其怪道語謂非常之事取以自比也凡人有所一同飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨白黑美惡耳辨音聲清濁口辨鹹酸甘苦鼻辨芬芳腥臊骨體膚理辨寒暑疾養膚理肌膚之文理養與癢同是又人之所常生而有也是無待而然者也是禹桀之所同也可以為堯禹可以為桀跖可以為工匠可以為農賈在勢注錯習俗之所積耳在所積習是又人之所生而有也是無待而然者也是禹桀之所同也為堯禹則常安榮為桀跖則常危辱為堯禹則常愉佚為工匠農賈則常煩勞然而人力為此而寡為彼何也曰陋也言人不為彼堯禹而為此桀跖由於性之固陋者也堯禹者非生而具者也夫起於變故成乎脩脩之爲待盡而後備者也變故患難事故也言堯禹起於憂患成於脩飾由於待盡物理然後乃能備之孟子曰天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所為所以動心忍性增益其所不能然後知生於憂患而死於安樂為于偽反人之生固小人無師無}
