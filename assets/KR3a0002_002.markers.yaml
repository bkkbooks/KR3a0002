  - {type: variant, offset: 1314, length: 0, content: '', WYG: 通士矣物有至則能應之事有疑則能辨之通者不滯之謂也不下比以闇上不上同以疾下闇上掩上之明也疾與嫉同分争於中不以私害之若是則可謂公士矣謂於事之中有分争者不以私害之則可謂公正之士也身之所長上雖不知不以悖君不怨君而違悖也身之所短上雖不知不以取賞受禄不誣長短不飾以情自竭若是則可謂直士矣不矜其長不掩其短但任直道而竭盡其情也庸言必信之庸行必慎之庸常也謂言常信行常慎畏法流俗而不敢以其所獨甚法效也畏法流移之俗又不敢以其所獨}
