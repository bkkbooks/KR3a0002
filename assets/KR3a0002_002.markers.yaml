  - {type: variant, offset: 1524, length: 1, content: 喜, krp: 農時也舉措時謂興力上則能順天子之命下則能保百姓是諸侯之所以取國家也志行脩臨官治上則能順上下則能保其職是士大夫之所以取田邑也循法則度量刑辟圖籍左氏傳曰先王議事以制}
  - {type: variant, offset: 1526, length: 0, content: '', SBCK: 爲度尺丈量斗斛刑辟刑法之書籍謂書其戸口之數也刑辟圖謂模寫土地之形不知其義謹守其數慎不敢損益也所然若制父子相傳以持王公以保持王公世傳法則所所爲治者也言王公賴之是故三代雖亡治法猶存是官人百吏之所以取禄秩也孝弟愿愨軥録疾力以敦比其事業而不敢怠傲是庻人之所以取煖衣飽食長生久視以免於刑戮也而作也敦厚也比親也言不敢怠惰也軥與拘同拘録謂自檢束也疾力謂速力飾邪說文姦言爲􅀝事事怪異之事􅀝已解上􅀝陶誕突盜檮頑嚚之貌突陶當爲檮杌之當爲逃隱匿其情也凌突不順也或曰陶愓悍憍暴蕩同愓與以偷生反側於亂世之閒是姦人之所以取危辱死刑也其慮之不深其擇之不謹其定取舍楛僈是其所以危也失也楛惡也謂不堅固也小人所以危亡由於計慮之材性知能君子小人一也好榮惡辱好利惡害是君子小人之所同也若其所以求之之道則異矣小人也者疾爲誕而欲人之信已也疾爲詐而欲人之親已也禽獸之行而欲人之善已也慮之難知也行之難安也持之難立也言易顛覆也持之難立謂難扶持之也慮之難知謂人難測其姦詐行之難安成則必不得其所好必遇其所惡焉得成亦必雖使姦詐無福有禍故君子者信矣而亦欲人之信已也忠矣而亦欲人之親已也脩正治辨矣而亦欲人之善已也慮之易知也行之易安也持之易立也成則必得其所好必不遇其所惡焉是故窮則不隱通則大明不能隱蔽不隱謂人身死而名彌白明也白彰小人莫不延頸舉踵而願曰知慮材性固有以賢人矣賢人謂賢願猶慕也人也}
