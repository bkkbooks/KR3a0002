  - {type: variant, offset: 1307, length: 0, content: '', SBCK: 須得其時以喻當之爲貴也詩小雅魚麗之篇言雖有物亦君子易知而難狎不比黨故難狎坦蕩蕩故易知易懼而難脅不可奪也小心而志畏患而不避義死欲利而不爲所非則捨之心以爲非交親而不比比謂暱狎親謂仁恩言辯而不辭足辯至於騁辭以明一不蕩蕩乎其有以殊於世也有異與俗人君子能亦好不能亦好小人能亦醜不能亦醜君子能則寛容易直以開道人導同道與不能則恭敬繜絀以畏事人同謂自撙節貶損繜與撙同絀與黜小人能則倨傲僻違以驕溢人滿溢不能則妬嫉怨誹以傾覆人故曰君子能則人榮學焉不能則人樂告之小人能則人賤學焉不能則人羞告之是君子小人之分也如字分異也君子寛而不僈怠惰也僈與慢同廉而不劌文云劌利廉稜也說不至於刃傷也傷也但有廉隅辯而不爭察而不激不激切也但明察而寡立而不勝堅彊而不暴雖堅強而不兇暴雖寡立人不能勝柔從而不流恭敬謹慎而容孤介也不至於夫是之謂至文備言德詩曰温温恭人惟德之基此之謂也温温寛柔貌詩大雅抑之篇君子崇人之德揚人之美非謟䛕也正義直指舉人之過惡非毁疵也曰讀爲訾疵病也或言已之光美擬於禹舜參於天地非夸誕也與時屈伸柔從若蒲葦非懾怯也席可卷者也蒲葦所以爲剛彊猛毅靡所不信非驕暴也同古字通用信讀爲伸下以義變應知當曲直故也所知當於曲直也以義隨變而應其詩曰左之左之君子宜之右之右之君子有之此言君子能以義屈信變應故也以能應變故左右無不詩小雅裳裳者華之篇也得宜君子小人之反也相反與小人君子大心則天而道小心則畏義而節於天而順道天而道謂合知則明通而類統類類謂知愚則}
