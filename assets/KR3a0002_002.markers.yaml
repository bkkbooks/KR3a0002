  - {type: variant, offset: 1564, length: 0, content: '', SBCK: 然則從人之欲則勢不能容物不能贍也故先王案爲之制禮義以分之别上下也以禮義分使貴賤之等長㓜之差知賢愚能不能之分皆使人載其事而各得其宜任之也載行也然後使愨禄多少厚薄之稱當其才稱尺證反愨實也謂實其禄使是夫羣居和一之道也故仁人在上則農以力盡田賈以察盡財百工以巧盡械器虚說文云有盛爲械無盛盡謂精於事察謂明其盈器爲士大夫以上至於公侯莫不以其仁厚知能盡官職夫是之謂至平同然謂之至平也各當其分雖貴賤不故或禄天下而不自以爲多天下爲禄也謂爲天子以或監門御旅抱關擊柝而不自以爲寡御讀爲迓迓監門主門也夜者皆知其分故雖賤而不以爲寡也旅逆旅也抱關門卒也擊柝擊木所以警故曰斬而齊枉而順不同而一夫是之謂人倫喻貴賤雖不同舊有此語引以枉而順雖枉曲不直然而歸於順也不同而一謂殊途同歸也夫如此不以齊一然而要歸於治也斬而齊謂彊斬之使齊若漢書之一切者倫理也是人之詩曰受小共大共爲下國駿蒙此之謂也駿庬言湯執大玉小玉大厚於下國言下皆賴其德也詩殷頌長發之篇共執也駿大也蒙讀爲厖厚也今詩作荀子卷第二}
