  - {type: variant, offset: 1494, length: 0, content: '', SBCK: 之類不論夫貧賤者則求柔之柔屈就之也見貧賤者皆是非仁人之情也是姦人將以盜名於晻世者也險莫大焉之名於昏闇之世姦人盜富貴貧賤暗同晻與故曰盜名不如盜貨田仲史鰌不如盜也號曰於陵仲子史鰌衛大夫字子魚賣直也田仲齊人處於陵不食兄禄辭富貴爲人灌園榮辱篇第四憍泄者人之殃也慢也殃或爲䄃泄與媟同嬻也恭儉者偋五兵也窶也與此義不同偋防正反偋當爲屏却也說文有偋字僻雖有戈矛之剌不如恭儉之利也人深言入故與人善言煖於布帛傷人之言深於矛㦸故薄薄之地不得履之非地不安也危足無所履者也凡在言也以廣大之地側足無所容者皆由以言害身也薄薄謂旁薄廣大之貌危足側足也凡皆也所巨涂則讓小涂則殆雖欲不謹若云不使凡行前殆近也單行則後之若能用意如此雖欲爲不謹敬若有制物}
