  - {type: 'tls:seg', offset: 1520, content: '', id: KR3a0002_tls_002-12a.20}
  - {type: variant, offset: 1520, length: 0, content: '', SBCK: 所交接非其道則必有患難雖食芻豢而更辯而不說者爭也稱說或讀爲恱不說不爲人所直立而不見知者勝也勝謂好勝人也直立謂已直人曲廉而不見貴者劌也刻巳太劌傷也故不見貴也過不得中道勇而不見憚者貪也故雖勇而不見憚貪利則委曲求人信而不見敬者好剸行也行謂不度是剸與專同專如白公者也非好復言此小人之所務而君子之所不爲也􅃲者忘其身者也忘其親者也忘其君者也行其少頃之}
  - {type: page-break, offset: 1520, content: '', id: KR3a0002_SBCK_002-11b}
  - {type: variant, offset: 1520, length: 0, content: '', WYG: 辯而不說者争也不說不為人所稱說或讀為恱直立而不見知者勝也直立謂已直人曲勝謂好勝人廉而不見貴者劌也劌傷也刻已太過不得中道故不見貴也勇而不見憚者貪也貪利則委曲求人故雖勇而不見憚信而不見敬者好剸行也剸與專同專行謂不度是非好復言如白公者也此小人之所務而君子之所不為也鬭者忘其身者也忘其親者也忘其君者也行其少頃之}
  - {type: page-break, offset: 1520, content: '', id: KR3a0002_WYG_002-10a, image: WYG0695/WYG0695-0133c.png}
  - {type: variant, offset: 1520, length: 0, content: '', krp: 所交接非其道則必有患難雖食芻豢而更辯而不說者爭也稱說或讀爲恱不說不爲人所直立而不見知者勝也勝謂好勝人也直立謂已直人曲廉而不見貴者劌也刻巳太劌傷也故不見貴也過不得中道勇而不見憚者貪也故雖勇而不見憚貪利則委曲求人信而不見敬者好剸行也行謂不度是剸與專同專如白公者也非好復言此小人之所務而君子之所不爲也鬪者忘其身者也忘其親者也忘其君者也行其少頃之}
  - {type: variant, offset: 1521, length: 0, content: '', SBCK: 而喪終身之軀然且爲之是忘其身也家室立殘親戚不免乎刑戮然且爲之是忘其親也戮及親戚尸子曰非人蓋當時禁􅃲殺人之法以親戚徇一言而不顧之也君之用兵也以爲民傷􅃲則君上之所惡也刑法之所大禁也然且爲之是忘其君也憂忘其身曰當爲下忘其身誤爲夏又夏轉誤爲憂字耳遭憂患刑戮而不能保其身是憂忘其身也或内忘其親上忘其君是刑法之所不舍也聖王之所不畜也乳彘不觸虎乳㺃不逺遊不忘其親也人也憂忘其身内忘其親上忘其君則是人也而曽㺃彘之不若也凡􅃲者必自以爲是而以人爲非也已誠是也人誠非也則是己君子而人小人也以君子與小人相賊害也憂以忘其身内以忘其親上以忘其君豈}
  - {type: page-break, offset: 1521, content: '', id: KR3a0002_SBCK_002-12a}
  - {type: variant, offset: 1521, length: 0, content: '', WYG: 而喪終身之軀然且為之是忘其身也室家立殘親戚不免乎刑戮然且為之是忘其親也蓋當時禁鬭殺人之法戮及親戚尸子曰非人君之用兵也以為民傷鬬則以親戚殉一言而不改之也君上之所惡刑法之所大禁也然且為之是忘其君也憂忘其身遭憂患刑戮而不能保其身是憂忘其身也或曰當為下忘其身誤為憂字耳内忘其親上忘其君是刑法之所不赦也聖王之所不畜也乳彘觸虎乳狗不逺遊不忘其親也小人憂忘其身内忘其親上忘其君則是人也而曾狗彘之不若也凡鬭者必自以為是而以人為非也已誠是也人誠非也則是己君子而人小人也以君子與小人相賊害也憂以忘其身内以忘其親上以忘其君豈}
