  - {type: variant, offset: 62, length: 1, content: 上, WYG: 祭齊大羮而飽庶羞貴本而親用也祭月祭也齊讀為嚌至齒也謂尸舉大羮但至齒而已至庶羞而致飽也用謂可用食也貴本之謂文親用之謂理文謂脩飾理謂合宜兩者合而成文以歸大一夫是之謂大隆貴本親用兩者相合然後備成文理大讀為太太一謂太古時禮記曰夫禮必本於太一言雖備成文理然猶}
  - {type: variant, offset: 62, length: 0, content: '', krp: 本謂造飲食之初禮記曰郊血大饗腥也祫祭先王也尚}
  - {type: variant, offset: 63, length: 0, content: '', SBCK: 也􅀇酒水也大羮肉汁無鹽梅之饗尚􅀇尊而用酒醴先黍稷而飯稻梁同四時饗與享以酒醴先陳黍稷而後飯以稻梁也享廟也用謂酌獻也以􅀇酒爲上而獻祭齊大羮而飽庶羞貴本而親用也齒也謂尸舉大羮但至祭月祭也齊讀爲嚌至飽也用謂可用食也齒而已矣至庶羞而致貴本之謂文親用之謂理理謂合宜文謂脩飾兩者合而成文以歸大一夫是之謂大隆太太一謂太古時也禮記曰夫禮必本於太貴本親用兩者相合然後備成文理大讀爲禮司馬貞曰隆盛也得禮文理歸於太一是禮之盛也一言雖備成文理然猶}
  - {type: page-break, offset: 63, content: '', id: KR3a0002_SBCK_013-5a}
  - {type: variant, offset: 63, length: 0, content: '', krp: 也玄酒水也大羮肉汁無鹽梅之饗尚玄尊而用酒醴先黍稷而飯稻梁同四時饗與享以酒醴先陳黍稷而後飯以稻梁也享廟也用謂酌獻也以玄酒爲上而獻祭齊大羮而飽庶羞貴本而親用也齒也謂尸舉大羮但至祭月祭也齊讀爲嚌至飽也用謂可用食也齒而已矣至庶羞而致貴本之謂文親用之謂理理謂合宜文謂脩飾兩者合而成文以歸大一夫是之謂大隆太太一謂太古時也禮記曰夫禮必本於太貴本親用兩者相合然後備成文理大讀爲禮司馬貞曰隆盛也得禮文理歸於太一是禮之盛也一言雖備成文理然猶}
  - {type: variant, offset: 64, length: 9, content: 忠乎君下善取譽乎民, SBCK: 忘本而歸於太一是謂大隆於故尊之尚􅀇酒也俎之尚生魚也豆之先大羹也一也時皆貴本之義故云一也一謂一於古也此以象太古利爵之}
