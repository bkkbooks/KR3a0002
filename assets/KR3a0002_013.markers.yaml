  - {type: variant, offset: 1466, length: 1, content: 似, WYG: 之䘮所以取三年何也問君之䘮何取於三年之制君者治辨之主也文理之原也情貌之盡也相率而致隆之不亦可乎治辨謂能治人使有辨别也文理法理條貫也原本也情忠誠也貌恭敬也致至也言人所施忠敬無盡於君者則臣下相率服䘮而至於三年不亦可乎詩云愷悌君子民之父母彼君子者固有為民父母之説焉父能生之不能養之養謂哺乳之也養或謂食母能食之不能教誨之食音嗣君者已能食}
