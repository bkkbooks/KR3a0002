  - {type: variant, offset: 321, length: 3, content: 順從命, SBCK: 無方之民法禮足禮謂之有方之士方猶道也足謂無闕失禮之中焉能思索謂之能慮禮之中焉能勿易謂之能固中雖能思索勿易猶無益勿易不變也若不在禮之能慮能固加好者焉斯聖人矣故天者髙之極也地者下之極也無窮者廣之極也北無窮東西南聖人者道之極也故學者固學爲聖人也非特學爲無方之民也禮者以財物爲用爲行禮之用也以貢獻問遺之類以貴賤爲文貴賤文飾也以車服旗章爲以多少爲用以別上下也多少異制所以隆殺爲要或厚或薄唯其所當爲貴也隆豐厚殺減降也要當也禮文理繁情用省是禮之隆也獻之禮賔主百拜情唯主敬文文理謂威儀情用謂忠誠若享之隆盛也過於情是禮文理省情用繁是禮之殺也之尚若尊文雖減殺是亦禮也􅀇酒本於質素情過於文理情用相爲内外表裏並行而雜是禮之中流也行相雜是禮之中流中或豐或殺情文代勝並淸濁相混也流言如水之故君子上致其隆下盡其殺而中處其中厚小禮則盡其隆殺中用得其中皆不失禮也君子知禮者致極也言君子於大禮則極其隆歩驟馳騁厲鶩不外是矣是君子之壇宇宮廷也出於隆殺之間壇宇宮廷已解於上厲鶩疾鶩也史記作廣鶩言雖馳騁不人有是士君子也外是民也氓無所知者是猶此也民民於是其中焉方皇周挾曲得其次序是聖人也皇方中徘徊周匝委曲皆得其次序}
