  - {type: variant, offset: 123, length: 1, content: 倦, SBCK: 反淸廟之不文謂無曲折也禮記曰斬鍾比於編鍾爲簡略也尚拊之膈未詳或曰尚謂上古也拊樂器歌謂工以樂歌淸廟之篇也一人倡三人歎言和之者寡也縣一揚子雲長楊賦曰拮膈鳴球韋昭曰古文膈爲擊或曰膈當爲名膈擊也即所謂戞擊鳴球搏拊琴瑟也尚古樂所以示質也義書曰搏拊琴瑟孔安國曰拊以韋爲之實之以糠所以節樂也周特大戴禮作搏拊一名相禮記曰治亂以相拊所以輔樂相亦輔之而拊其格不取其聲示質也朱􅃶䟽越鄭􅀇云朱􅃶練朱􅃶也練禮大祭祀登歌令奏擊拊司馬貞說拊鬲謂懸鍾格也不擊其鍾越踈通之使聲遲也史記作洞越或曰隔讀爲戞也則聲濁越瑟底孔也畫䟽之所以發越其聲故謂之凡禮始乎稅成乎文終乎恱校禮始於脱略成於文飾終乎稅减史記作始乎脱成乎文終乎稅言大戴禮作終於隆盛也禮記曰禮主其减校未詳故至備情文俱盡爲禮之至備情文俱盡乃之類文謂禮物威儀也情謂禮意喪主哀祭主敬其次情文代勝文勝於情情不能至備或禮之次也勝於文}
