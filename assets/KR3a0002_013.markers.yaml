  - {type: variant, offset: 74, length: 9, content: 䘏公道通義朋黨比周, SBCK: 醮也成事之俎不甞也三臭之不食也一也前也史記作不啐成事謂尸既飽禮成不甞其爼儀禮醮盡也謂祭祀畢告利成利成之時其爵不卒奠子筵氣謂食畢也許又反皆謂禮畢無文飾復歸於朴亦象尸又三飯上佐食受尸牢肺正脊加于肵是臭謂歆其}
  - {type: variant, offset: 74, length: 9, content: 䘏公道通義朋黨比周, WYG: 醮也成事之俎不嘗也三臭之不食也一也醮盡也謂祭禮必告利成利成之時其爵不卒奠于筵前也史記作不卒成事謂尸既飽禮成不嘗其爼儀禮尸又三飯士佐食受尸牢肺正脊加于肵臭謂歆其氣謂食畢也許又反皆謂禮畢無文飾復歸于朴亦象太古時史記作三侑之不食司馬貞云禮祭必立侑}
