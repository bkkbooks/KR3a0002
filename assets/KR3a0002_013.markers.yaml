  - {type: variant, offset: 1466, length: 1, content: 似, SBCK: 之喪所以取三年何也於三年之制問君之喪何取曰君者治辨之主也文理之原也情貌之盡也相率而致隆之不亦可乎理法理條貫也原本也情志誠治辨謂能治人使有辨別也文者則臣下相率服喪而至於三年不亦可乎也貌恭敬也致至也言人所施忠敬無盡於君詩曰愷悌君子民之父母彼君子者固有爲民父母之說焉父能生之不能養之也養或爲食養謂哺乳之母能食之不能敎誨之嗣也食者君者巳能食}
