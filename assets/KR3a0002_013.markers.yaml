  - {type: variant, offset: 321, length: 3, content: 順從命, WYG: 無方之民法禮足禮謂之有方之士足謂無闕失方猶道也禮之中焉能思索謂之能慮禮之中焉能勿易謂之能固勿易不變也若不在禮之中雖能思索勿易猶無益能慮能固加好者焉斯聖人矣故天者高之極也地者下之極也無窮者廣之極也東西南北無窮聖人者道之極也故學者固學為聖人也非特學為無方之民也禮者以財物為用以貢獻問遺之類為行禮之用以貴賤為文以車服旂章為貴賤文飾也以多少為異多少異制所以别上下也以隆殺為要隆豐厚殺減降要當也禮或厚或薄唯其所當為貴也文理繁情用省是禮之隆也文理謂威儀情用謂忠誠若享獻之禮賔主百拜情唯主敬文過於情是禮之隆盛也文理省情用繁是禮之殺也若尊之上𤣥酒本於質情過於文雖減殺是亦禮也文理情用相為内外表裏並行而雜是禮之中流也或豐或殺情文代勝並行相雜是禮之中流中流言如水清濁相混故君子上致其隆下盡其殺而中處其中君子知禮者致極也言君子於大禮則極其隆厚小禮則盡其隆殺中用得其中皆不失禮也歩驟馳騁厲鶩不外是矣是君子之壇宇宮庭也厲鶩疾鶩也史記作廣鶩言雖馳騁不出於隆殺之間壇宇宮庭已解於上人有是士君子也外是民也是猶此也民氓無所知也於是其中焉方皇周挾曲得其次序是聖人也方皇讀為彷徨猶徘徊也挾讀為浹布也言於是禮之中徘徊周布委曲皆得其次序}
