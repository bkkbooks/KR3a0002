  - {type: variant, offset: 84, length: 1, content: 環, SBCK: 勸尸食至三飯而止每飯有侑一人故曰三侑既是太古時也史記作三侑之不食司馬貞云禮祭必立侑自食也勸尸故不昏之未發齊也太廟之未入尸也始卒之未小斂也一也太古時也史記作大昏皆謂未有威儀節文象曲禮云齊戒以告􅀑神此三者皆禮之初始質而未備之未廢齊也司馬貞曰廢齊謂㛰禮父親醮子而迎故一也故云大路之素未集也郊之麻絻也喪服之先散麻也一也丹漆也禮記云大路素而越席又曰丹大路殷祭天車王者所乗也未集不集衮龍之屬也士喪禮始死}
  - {type: page-break, offset: 84, content: '', id: KR3a0002_SBCK_013-6a}
  - {type: variant, offset: 84, length: 1, content: 環, WYG: 勸尸食至三飯而止每飯有侑一人故曰三侑既是勸尸故不自食也大昬之未發齊也大廟之未入尸也始卒之未小斂也一也皆謂未有威儀節文象太古時也史記作大昏未發齊也司馬貞曰發齊謂昏禮也父親醮子而迎故曲禮云齋戒以告鬼神此三者皆禮之初也始質而未偽故云一也大路之素未集也郊之麻絻也䘮服之先散麻也一也大路祭天車王者所乗也未集不集丹漆也禮記曰大路素而越席又曰丹漆雕幾之美而素車之乗麻絻緝麻為冕所謂大裘而冕不用衮龍之屬也士䘮禮始死}
