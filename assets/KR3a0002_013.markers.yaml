  - {type: variant, offset: 1305, length: 1, content: 二, WYG: 貌之變足以别吉凶明貴賤親踈之節期止矣期當為斯外是姦也雖難君子賤之故量食而食之量要而帶之相高以毁瘠是姦人之道也非禮義之文非孝子之情也將以有為者也非禮義之節文孝子之真情將有作為以邀名求利若演門也故説豫娩澤憂戚萃惡是吉凶憂愉之情發於顔色者也説讀為悦豫樂也娩媚也音晚澤顔色潤澤也萃與顇同惡顔色惡也發見也歌謡謸笑哭泣諦號是吉凶憂愉之情發於聲音者也謸與傲同戲謔也説文云謸悲聲與此義不同諦音啼管子曰豕人立而啼古字通用號胡刀反芻豢稻粱酒醴餰鬻魚肉菽藿酒漿是吉凶憂愉之情發於食飲者也餰鬻菽藿䘮者之食卑絻黼黻文織資麤衰絰菲繐菅屨是吉凶憂愉之情發於衣服者也卑絻與禆冕同衣裨衣而服冕也裨之言卑也天子六服大裘為上餘為卑以事尊卑服之諸侯已下皆服焉文織染絲織為文章也資與齊同即齊衰也麄麄布也今麄布亦謂之資菲草衣蓋如蓑然或當時䘮者有服此也繐衰也鄭云繐衰小功之繐四升半之衰也凡布細而疎者謂之繐今南陽有鄧林繐布菅茅也春秋傳曰晏子杖菅屨也疎房檖䫉越席牀第几筵屬茨倚廬席薪枕塊是吉凶憂愉之情發於居處者也茨蓋屋草也屬茨令茨相連屬而已至疎漏也倚廬鄭云倚木為廬謂一邊著地如倚物者既葬柱楣􅂗廬也兩情者人生固有端焉兩情謂吉與凶憂與愉言此兩情固自有端緒非出於禮}
