  - {type: variant, offset: 58, length: 2, content: 態臣, SBCK: 道誤爲蹈傳寫又誤以蹈爲㗖耳蹈亦作㗖司馬貞曰㗖音含苞也言士大夫皆得苞所以别尊者事尊卑者事卑宜大者巨宜小者小也故有天下者事十世傳作天子七廟十當爲七穀梁有一國者事五世有五乗之地者事三世里爲成古者十大夫有菜地者得立三廟也成出革車一乗五乗之地謂有三乗之地者事二世士立二廟也祭法所謂適持手而食者不得立祭廟其持工食力也手而食謂農所以別積厚積厚者流澤廣積薄者流澤狹也年震夷伯之廟夷伯魯大夫因此以積與績同功業也穀梁傳僖公十五二故德厚者流光德薄者流卑是以貴始徳之本也見天子至于士皆有廟也天子七廟諸侯五大夫三士大饗尚􅀇尊俎生魚先大羹貴食飲之本也饗大味}
