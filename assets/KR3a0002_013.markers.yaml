  - {type: variant, offset: 48, length: 8, content: 巧敏佞說善取寵乎, WYG: 社至於諸侯道及士大夫道通也言社自諸侯通及士大夫也適士皆得祭門及行史記道作士大夫也或曰道行神也亦作㗖司馬貞曰㗖音含苞也言士大夫皆得苞立社倞謂是萹通道誤為蹈傳寫又誤以蹈為蹈耳所以别尊者事尊卑者事卑宜大者巨宜小者小故有天下者事十世十當為七穀梁傳作天子七廟有一國者事五世有五乗之地者事三世古者十里為成成出革車一乗五乗之地謂大夫有采地者得立三廟也有三乗之地者事二世祭法所謂適士立二廟也持手而食者不得立宗廟持其手而食謂農工所以表積厚積厚者流澤廣積薄者流澤狹也積與績同功業也穀梁傳僖公十五年震夷伯之廟夷伯魯大夫因以此見天子至于士皆有廟也天子廟七諸侯五大夫三士二故徳厚者流光徳薄者流卑是以貴始徳之本也大饗尚𤣥尊俎生魚先大羮貴食飲之本也大饗祫祭先王也尚}
