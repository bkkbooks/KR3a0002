  - {type: variant, offset: 45, length: 2, content: 信然, SBCK: 敢壞史記作不敢懷司馬貞謂不祧其廟若魯周公蓋誤耳云思也大夫士有常宗百世不遷之大宗也别子若繼别子之後爲族人所常宗桓也魯三所以别貴始貴始得之本也言德之本得當爲徳傳有此語在貴始穀梁郊止乎天子}
