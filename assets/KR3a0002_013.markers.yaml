  - {type: variant, offset: 129, length: 0, content: '', SBCK: 情以歸質素是雖無文飾但復之水可薦於􅀑神也亦禮也若潢汙行潦天地以合日月以明四時以序星辰以行江河以流萬物以昌好惡以節喜怒以當之則天時人事皆亂也昌謂各遂其生也言禮能上調天時下節人情若無禮以分别以爲下則順以爲}
  - {type: page-break, offset: 129, content: '', id: KR3a0002_SBCK_013-7a}
  - {type: variant, offset: 129, length: 0, content: '', WYG: 天地以合日月以明四時以序星辰以行江河以流萬物以昌好惡以節喜怒以當言禮能上調天時下節人情若無禮以分别之則天時人事皆亂也昌謂各遂其生也以為下則順以為}
