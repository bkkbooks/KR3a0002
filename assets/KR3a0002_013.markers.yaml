  - {type: variant, offset: 1446, length: 0, content: '', WYG: 成聖人之名也故曰天地合而萬物生陰陽接而變化起性偽合而天下治天能生物不能辨物也地能載人不能治人也宇中萬物生人之屬待聖人然後分也詩曰懷柔百神及河喬嶽此之謂也引此喻聖人能并治之詩周頌時邁之篇䘮禮者以生者飾死者也大象其生以送其死也故如死如生如存如亡終始一也不以死異於生亡異於存始卒沐浴鬠體飯唅象生執也儀禮鬠用組鄭云用組束髮也古文鬠皆為括體為𤓰椾之屬士䘮禮主人左扱米實于右三實一具左中亦如之几實米唯盈鄭云于右尸口之右唯盈取滿而已是飯唅之禮也象生執謂象生時所持之事執或為持不沐則濡櫛三律而止不浴則濡巾三式而止律理髮也今秦俗猶以批髪為栗濡濕也式與拭同士䘮禮尸無有不沐浴者此云蓋末世多不備禮也充耳而設瑱士䘮禮瑱用白纊鄭云瑱充耳纊新綿也飯以生稻唅以槁骨反生術矣生桷禾也槁枯也槁骨具也術法也前説象其生也此已下説反於生之法也説䙝衣襲三稱縉紳而無鈎帶矣縉與搢同扱也紳大帶也搢紳謂扱於帶鈎之所用弛張也今不復解脱故不設鉤也䙝衣親身之衣也士䘮禮飯唅後乃襲三稱明衣不在算設韐帶搢笏禮記曰季康子之母死陳䙝衣鄭𤣥云䙝衣非上服陳之將以歛也設掩面儇目鬠而不冠笄矣士䘮禮掩用練帛廣終幅長五尺儇與還同繞也士䘮禮幎目用緇方尺二寸䞓裏著組繫幎讀如縈縈與還義同鬠而不笄謂但鬠髪而已不加冠及笄也士䘮禮笄用桑又云鬠用組乃笄此云不笄或後世畧也書其名置于其重則名不見而柩獨明矣書其名于旌也士䘮禮為銘各以其物亡則以緇長半幅䞓末長終幅廣三寸書銘于末曰某氏某之柩重以木為之長三尺夏祝取飯之餘為粥盛以二鬲縣于重羃用葦席書其名置于重謂見所書置于重則名已無但知其柩也士䘮禮祝取銘置于重案銘皆有名此云無蓋後世禮變今猶然薦器則冠有鍪而母縱薦器謂陳明器也鍪冠捲如兠鍪也縱韜髪者也士冠禮緇纚廣終幅長六尺謂明器之冠也有如兠鍪加首之形而無韜髮之縱也鍪之言蒙也冒也所以冒首莫侯反或音冒罋廡虛而不實士䘮禮罋三醯醢屑廡二醴酒皆有羃盡䘮禮陳鬼器人器鬼器虛人器實也禮記宋襄公葬其夫人醯醢百罋曽子曰既曰明器而又實之有簟席而無牀第此言棺中不施牀第大歛小歛則皆有也木器不成斵陶器不成物薄器不成内木不成於雕斵不加}
