  - {type: variant, offset: 123, length: 1, content: 倦, WYG: 反清廟之歌謂工以樂歌清廟之什也一人倡三人歎言和之者寡也縣一鍾比於編鍾為簡畧也尚拊之膈未詳或曰尚謂上古也拊樂器名膈擊也即所謂戞擊鳴球搏拊琴瑟也尚古樂所以示質也揚子雲長楊賦曰戞擊鳴球韋昭曰古文膈為擊或曰膈當為拊大戴禮作搏拊一名相禮記曰治亂以相拊所以輔樂亦相輔之義書曰搏拊琴瑟孔安國曰搏拊以韋為之實之以槺所以節樂也周禮大祭祀登歌令奏擊拊司馬貞曰拊膈謂懸鐘格也不擊其鐘而拊其格不取其聲示質也朱絃通越鄭𤣥云朱絃練朱絃也練則聲濁越瑟底孔所以發越其聲故謂之越疎通之後使聲遲也史記作洞越或曰膈讀為戞凡禮始乎棁成乎文終乎悦校史記作始乎脱成乎文終乎棁言禮始於脱畧成於文飾終於棁减禮記曰禮主其减校未詳大戴禮作終於隆盛也故至備情文俱盡情文俱盡乃為禮之至備情謂禮意䘮主哀祭主敬之類文謂禮物威儀也其次情文代勝不能至備文勝於情情勝於文}
