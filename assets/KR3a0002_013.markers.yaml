  - {type: variant, offset: 1469, length: 1, content: 奪, SBCK: 又善敎誨之者也誨謂制命也食謂禄廪敎三年畢矣哉三年報之猶未畢也君者兼父母之恩以乳母飲食之者也而三月慈母衣被之者也而九月君曲備之者也三年畢乎哉飲食衣被曲備謂兼得之則治失之則亂文之至也繫是有法度之至也文謂法度也治亂所得之則安失之則危情之至也就安是忠厚之至也情謂忠厚謂使人去危兩至者俱積焉以三年事之猶未足也直無由進之耳也直但故社祭社也稷祭稷也榖之神以弃配之但各止社土神以勾龍配之稷百而已祭一神郊者并百王於上天而祭祀之也百神百王郊天則兼祭百神以喻君兼父母者也也或神字誤爲王言社稷唯祭一神至三月之殯何也葬也此殯謂曰大之也重之也所致隆也所致親也將舉錯之遷徙之離宫室而歸丘陵也先王恐其不文也是以繇其期足之日也故繇其期足之日}
  - {type: page-break, offset: 1469, content: '', id: KR3a0002_SBCK_013-23b}
  - {type: page-break, offset: 1469, content: '', id: KR3a0002_SBCK_013-24a}
  - {type: variant, offset: 1469, length: 1, content: 奪, WYG: 又善教誨之者也食謂禄廪教誨謂制命也三年畢矣哉君者兼父母之恩以三年報之猶未畢也乳母飲食之者也而三月慈母衣被之者也而九月君曲被之者也三年畢乎哉曲被謂兼飲食衣服得之則治失之則亂文之至也文謂法度也治亂所繫是有法度之至也得之則安失之則危情之至也情謂忠厚使人去危就安是忠厚之至者也兩至者俱積焉以三年事之猶未足也直無由進之耳直但也故社祭社也稷祭稷也社土神以勾龍配之稷百穀之神以棄配之但各止祭一神而已郊者并百王於上天而祭祀之也百王百神也或神字誤為王言社稷唯祭一神至郊天則兼祭百神以喻君兼父母者也三月之殯何也此殯謂葬之也曰大之也重之也所致隆也所致親也將舉錯之遷徙之離宮室而歸丘陵也先王恐其不文也是以繇其期足之日也所至厚至親將徙而歸之陵不可急遽無文飾故繇其期足之日}
