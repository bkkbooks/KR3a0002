  - {type: variant, offset: 6, length: 0, content: '', SBCK: 今升禮起於何也曰}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 本天地者生之本也先祖者類之本也類種君師者治之本也無天地惡生無先祖惡出無君師惡治三者偏亡焉無安}
  - {type: variant, offset: 6, length: 0, content: '', krp: 今升禮起於何也曰}
  - {type: variant, offset: 7, length: 1, content: 臣, SBCK: 生而有欲欲而不得則不能無求求而無度量分界則不能不爭問反分扶爭則亂亂則窮無所出窮謂計先王惡其亂也故制禮義以分}
  - {type: variant, offset: 7, length: 1, content: 臣, WYG: 偏亡謂闕一也故禮上事天下事地尊先祖而隆君師是禮}
  - {type: page-break, offset: 7, content: '', id: KR3a0002_WYG_013-3b, image: WYG0695/WYG0695-0234d.png}
  - {type: variant, offset: 7, length: 1, content: 臣, krp: 生而有欲欲而不得則不能無求求而無度量分界則不能不爭問反分扶爭則亂亂則窮無所出窮謂計先王惡其亂也故制禮義以分}
  - {type: variant, offset: 9, length: 0, content: '', SBCK: 以養人之欲給人之求然後有分求可給欲可養使欲必不窮乎物物必不屈於欲兩者相持而長是禮之所以起也之立中道故爲屈竭也先王爲持故能長久是禮所起之本意也不盡於物物不竭於欲欲與物相扶故禮者養也芻豢稻粱五味調香所以養口也椒蘭芬芳所以養鼻也彫􅅣刻鏤黼黻文章所以養目也鍾鼓管磬琴瑟竽笙所以養耳也䟽房檖䫉越席牀第几筵所以養體也䟽房通䟽通也宮室尊嚴之名或曰貌讀爲邈言屋宇深䆳􅃡邈也第牀棧明之房也䫉古貌字檖䫉未詳或曰檖讀爲䆳貌廟也廟者所重司馬貞曰疏䆫也也越席剪蒲席也古人故禮者養也君子既得其養又好其别曷謂别曰貴賤有等長㓜有差貧富輕重皆有稱者也宜尺證反稱謂各當其故天子大路越席所以養體也側載睪芷所以養鼻也前有錯衡所以養目也和鸞之聲歩中武象趨中韶護所以養耳也正}
  - {type: page-break, offset: 9, content: '', id: KR3a0002_SBCK_013-1b}
  - {type: page-break, offset: 9, content: '', id: KR3a0002_SBCK_013-2a}
  - {type: variant, offset: 9, length: 4, content: 論有態臣, WYG: 三本也所以奉其三本也故王}
  - {type: variant, offset: 9, length: 0, content: '', krp: 以養人之欲給人之求然後有分求可給欲可養使欲必不窮乎物物必不屈於欲兩者相持而長是禮之所以起也之立中道故爲屈竭也先王爲持故能長久是禮所起之本意也不盡於物物不竭於欲欲與物相扶故禮者養也芻豢稻粱五味調香所以養口也椒蘭芬芳所以養鼻也彫琢刻鏤黼黻文章所以養目也鍾鼓管磬琴瑟竽笙所以養耳也䟽房檖䫉越席牀第几筵所以養體也䟽房通䟽通也宮室尊嚴之名或曰貌讀爲邈言屋宇深䆳𬗟邈也第牀棧明之房也䫉古貌字檖䫉未詳或曰檖讀爲䆳貌廟也廟者所重司馬貞曰疏䆫也也越席剪蒲席也古人故禮者養也君子既得其養又好其别曷謂别曰貴賤有等長㓜有差貧富輕重皆有稱者也宜尺證反稱謂各當其故天子大路越席所以養體也側載睪芷所以養鼻也前有錯衡所以養目也和鸞之聲歩中武象趨中韶護所以養耳也正}
