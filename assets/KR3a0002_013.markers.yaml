  - {type: variant, offset: 10, length: 0, content: '', SBCK: 篇並解在龍旗九斿所以養信也龍於縿練斿九旗正幅爲絲龍旗畫龍於旗爾雅曰素升見而信之識至尊也養猶奉也斿所以屬之者也信謂使萬人寢兕於甲胄也謂武士寢處持虎暢鏤膺劉氏云􅀞虎於旍竿及楯等也謂以虎皮爲弓衣武士執持者也詩曰虎蛟韅腋之韅馬曰以鮫魚皮爲之革蓋象蛟形徐廣絲末鄭云覆苓也絲簚蓋織絲爲之末與簚同禮記曰君羔簚虎犆狄反簚亡彌龍所以養威也謂金飾衡軛之末爲龍首彌如字又讀爲弭弭末也爲輿􅀝較交虎伏軾龍首銜軛也徐廣曰乗輿車以金薄繆龍故大路之馬必倍至敎順然後乗之所以養安也精至也或以倍至謂倍加識車也至極敎順然後乗之備驚奔也必倍爲句倍謂反之車在馬前令馬孰孰知夫出死要節之所以養生也自要約以節義謂立節也使孰便孰甚也出死出身死冦難也要節生也若不能然則亂而不保其生也要一遙反甚知其出死要節盡忠於君是乃所以受禄養孰知夫出費用之所以養財也屬是乃所以求奉養其財費用財以成禮謂問遺之奪也不相侵孰知夫恭敬辭讓之所以養安也恭無而不安也敬辭讓則亂孰知夫禮義文理之所以養情也情性不知所歸也無禮義文理則縱故人苟生之爲見若者必死出死要節若此者必死也言苟唯以生爲所見不能苟利之爲見若者必害以成禮若此者必遇害也苟唯以利爲所見不能用財苟怠惰偷懦之爲安居若者必危不能恭敬辭讓若此者必危也懦讀爲儒言苟以怠惰爲安居苟情說之爲樂若者必滅不知禮義文理恣其所欲若說讀爲恱言苟以情恱爲樂滅亡也此者必故人一之於禮義則兩得之矣一之於情性則兩喪之矣兩得專一於情性則禮義專一於禮義則禮義情性喪也情性兩故儒者將使人兩得之者也墨者將使人兩喪之者也是儒墨之分也禮}
