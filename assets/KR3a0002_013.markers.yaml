  - {type: variant, offset: 129, length: 0, content: '', krp: 情以歸質素是雖無文飾但復之水可薦於鬼神也亦禮也若潢汙行潦天地以合日月以明四時以序星辰以行江河以流萬物以昌好惡以節喜怒以當之則天時人事皆亂也昌謂各遂其生也言禮能上調天時下節人情若無禮以分别以爲下則順以爲}
  - {type: variant, offset: 131, length: 0, content: '', SBCK: 明萬物變而不亂貳之則喪也禮豈不至矣哉順在上位則治萬禮在下位則使人一在禮喪亡也變而不亂貳謂不立隆以爲極而天下莫之}
  - {type: variant, offset: 131, length: 0, content: '', WYG: 明萬物變而不亂貳之則䘮也禮豈不至矣哉禮在下位則使人順在上位則萬變而不亂貳謂不一在禮䘮亡也立隆以為極而天下莫之}
  - {type: variant, offset: 131, length: 0, content: '', krp: 明萬物變而不亂貳之則喪也禮豈不至矣哉順在上位則治萬禮在下位則使人一在禮喪亡也變而不亂貳謂不立隆以爲極而天下莫之}
  - {type: variant, offset: 132, length: 0, content: '', SBCK: 損益也使天下不復更能損益也立隆盛之禮以極盡人情本末相順貞曰司馬復情以歸太一是本末相順也禮之盛文理合以歸太一禮之殺終始相應始於脱略終司馬貞曰禮略是終始相應也於稅亦殺也殺亦脫至文以有別至察以有說禮言司馬貞曰說音悅言禮之至察有以明鴻殺委曲之情文足之至文以其有}
