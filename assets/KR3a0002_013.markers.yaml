  - {type: variant, offset: 1446, length: 0, content: '', SBCK: 成聖人之名一謂不分散言性僞也故曰天地合而萬物生隂陽接而變化起性僞合而天下治天能生物不能辨物也地能載人不能治人也宇中萬物生人之屬待聖人然後分也詩曰懷柔百神及河喬嶽此之謂也之詩周頌時邁之篇引此喻聖人能并治卒禮者以生者飾死者也大象其生以送其死也故如死如生如存如亡終始一也生亡異於存不以死異於始卒沐浴鬠體飯唅象生執也鄭云用組組儀禮鬠用組米實于右三實一貝左中亦如之凡實米唯盈鄭云于右束髮也古文鬠皆爲括體謂爪揃之屬士喪禮主人左扱象生執謂象生時所執持之事執或爲持尸口之右唯盈取滿而已是飯唅之禮也不沐則濡櫛三律而止不浴則濡巾三式而止今秦俗猶律理髮也無有不沐浴者此云蓋末世多不備禮也以批髪爲栗濡濕也式與拭同士喪禮尸充耳而設瑱云瑱充耳纊新綿也士喪禮瑱用白纊鄭飯以生稻唅以槁骨反生術矣前說象其生此已下說反於生之法生稻禾也槁枯也槁骨貝也術法也設褻衣襲三稱縉紳而無鈎帶矣縉紳謂扱笏於帶鈎鈎帶縉與搢同扱也紳大帶也之衣也士喪禮飯唅後乃襲三稱明衣不在筭設韐帶搢帶之鈎所用弛張也今不復解脱故不設鈎也褻衣親身鄭􅀇云褻衣非上服陳之將以斂笏禮記曰季康子之母死陳褻衣設掩面儇目鬠而不冠笄矣儇與還同繞也士喪禮幎目用緇士喪禮掩用練帛廣終幅長五尺笄謂但鬠髪而已不加冠及笄也士喪禮笄用桑又云鬠方尺二寸䞓裏著組繫幎讀如縈縈與還義同鬠而不笄或後世略也用組乃笄此云不書其名置于其重則名不見而柩獨明矣則以緇長半幅䞓末長終幅廣三寸書銘書其名於旌也士喪禮爲銘各以其物亡粥盛以二鬲懸于重羃用葦席書其名置於重謂見所書置于末曰某氏某之柩重以木爲之長三尺夏祝取飯之餘爲重案銘皆有名此云無蓋後世禮變今猶然也于重則名已無但知其柩也士喪禮祝取銘置于薦器則冠有鍪而母縱縱韜髪者也士冠禮緇纚廣終幅長薦器薦陳明器也鍪冠捲如兠鍪也縱也鍪之言蒙也冒也所以冒首莫侯反或音冒六尺謂明器之冠有如兠鍪加首之形而無韜髮之甕廡虚而不實而不實蓋喪禮陳􅀑器人器􅀑器虛人器實也旣夕禮甕三醯醢屑甒二醴酒皆有實此云虚曽子曰既曰明器矣而又實之禮記宋襄公葬其夫人醯醢百甕有簟席而無􅇃第大斂小斂則皆有也此言棺中不施牀第木器不成斵陶器不成物薄器不成内物不可用也薄器竹葦之器不成内謂木不成於雕斵不加}
