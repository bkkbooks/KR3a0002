  - {type: variant, offset: 1499, length: 2, content: 平湯, WYG: 期也事䘮具也道者委曲容物備物者也祭者志意思慕之情也愅詭唈僾而不能無時至焉愅變也詭異也皆謂變異感動之貌唈僾氣不舒憤鬱之貌爾雅僾唈也郭云嗚唈短氣也言人感動或憤鬱不能無時而至言有待而至也愅音革唈音邑僾音愛故人之歡欣和合之時則夫忠臣孝子亦愅詭而有所至矣歡欣之時忠臣孝子則感動而思君親之不得同樂也彼其所至者甚大動也言所至之情甚大感動也案屈然已則其於志意之情者惆然不嗛其於禮節者闕然不具屈竭也屈然空然也惆然悵然也嗛足也言若無祭祀之禮空然而已則忠臣孝子之情悵然不足禮節又闕然不具也故先王案為之立文尊尊親親之義至矣文謂祭祀節文故曰祭者志意思慕之情也忠信愛敬之至矣禮節文貌之盛矣苟非聖人莫之能知也聖人明知之士君子安行之官人以為守百姓以成俗其在君子以為人道也其在百姓以為鬼事也以為人道則安而行之以為鬼事則畏而奉之也故鐘鼓管磬琴瑟竽笙韶夏護}
