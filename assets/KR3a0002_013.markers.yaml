  - {type: variant, offset: 64, length: 9, content: 忠乎君下善取譽乎民, WYG: 忘本而歸於太一是謂大隆於禮司馬貞曰隆盛也得禮文理歸於太一是禮之盛也故尊之尚𤣥酒也俎之尚生魚也豆之先大羮也一也一謂一於古也此以象太古時皆貴本之義故云一也利爵之}
