  - {type: variant, offset: 1447, length: 1, content: 出, WYG: 也瓦不成於器物不可用也薄器竹葦之器不成内謂有其外形内不可用也内或為用禮記曰竹不成用瓦不成味鄭云成善也竹不可善用謂籩無縢也味當作沬沬靧也笙竽具而不和琴瑟張而不均鄭云無宮商之調也輿藏而馬反告不用也輿謂軼軸也國君謂之輴藏謂埋之也馬謂駕軼軸之馬告示也言也士䘮禮既啓遷于祖用軸禮記君葬用輴四綍二碑大夫葬用輴二綍二碑士葬用國車皆至葬時埋之也具生器以適墓象徙道也生器用器也弓矢盤盂之屬徙遷改也徙道其生時之道器當在家今以適墓以象人行不從常行之道更徙他道也畧而不盡䫉而不功趨輿而藏之金革轡靷而不入明不用也畧而不盡謂簡畧而不盡備也䫉形也言但有形䫉不加功精好也趨輿而藏之謂以輿趨於墓而藏之趨者速也速藏之意也金謂和鸞革車軼也説文云靷所以引軸者也杜元凱云靷在馬胷或曰䫉讀為邈像也今謂畫物為䫉下䫉皆同義象徙道又明不用也以器適墓象具改易生時之器亦所以明不用也是皆所以重哀也有異生時皆所以重孝子之哀也故生器文而不功明器䫉而不用生器生時所用之器士䘮禮曰用器弓矢耒耜兩敦兩杆盤匜之屬明器鬼器塗車芻靈木不成斵竹不成用瓦不成沬之屬禮記曰周人兼用之以言不知死者有知無知故雜用生器與明器也凡禮事生飾歡也送死飾哀也祭祀飾敬也師旅飾威也是百王之所同古今之所一也未有知其所由來者也故壙壠其䫉象室屋也壙墓中壠冢也禮記曰適墓不登壠䫉猶意也言其意以象生時也或音邈棺椁其䫉象版蓋斯象拂也版謂車上障蔽者蓋車蓋也斯未詳象衍字拂即茀也爾雅釋器云輿革前謂之鞎後謂之茀郭云以韋靶車軾及後戸也無帾絲歶縷翣其䫉以象菲帷幬尉也無讀為幠幠覆也所以覆尸者也士䘮禮幠用衾夷衾是也帾與褚同禮記曰素錦褚又曰褚幕丹質鄭云所以覆棺也絲歶未詳蓋亦䘮車之飾也或曰絲讀為綏禮記曰畫翣二皆載綏鄭云以五采羽注於翣首也歶讀為魚謂以銅魚懸於池下禮記曰魚躍拂池縷讀為栁蔞字誤為縷字耳菲謂編章為蔽蓋古人所用障蔽門户者今貧者猶然或曰菲當為厞隱也謂隱奥之處也或曰非讀為扉户扇也幬讀為帳尉讀為罻罻網也帷帳如網也抗折其䫉以象摱茨畨閼也士䘮禮陳明器於乘車之西折横覆之抗木横三縮者五無簀窆事畢加之壙上以承抗席抗禦也所以禦止土者摱扞也茨蓋屋也摱茨猶墍茨也摱莫于反畨讀為藩藩籬也閼為門戸壅閼風塵者抗所以禦上折所以承抗皆不使外物侵内有象於摱茨藩閼也故䘮禮者無他焉明死生之義送以哀敬而終周藏也故葬埋敬葬其形也葬也者藏也所以為葬埋之禮敬藏其形體也祭祀敬事其神也其銘誄繫世敬傳其名也銘謂書其功於器物若孔悝之鼎銘者誄謂誄其行狀以為謚也繫世謂書其傳襲若今之譜諜也皆所以敬傳其名於後世也事生飾始也送死飾終也終始具而孝子之事畢聖人之道備矣刻死而附生謂之墨刻生而附死謂之惑刻損減附増益也墨子之法惑謂惑亂過禮也殺生而送死謂之賊殉葬殺人與賊同也大象其生以送其死使死生終始莫不稱宜而好善是禮義之法式也儒者是矣三年之䘮何也曰稱情而立文鄭康成曰稱人之情輕重而制其禮也因以飾羣别親疎貴賤之節而不可益損也故曰無適不易之術也羣别謂羣而有别也適往也無往不易言所至皆不可易此術或曰適讀為敵創巨者其日久痛甚者其愈遲三年之䘮稱情而立文所以為至痛極也創傷也楚良反日久愈遲互言之也皆言久乃能平故重䘮必待三年乃除亦為至痛之極不可朞月而已齊衰苴杖居廬食粥席薪枕塊所以為至痛飾也禮記斬衰苴杖謂以苴惡死竹為之杖鄭云飾謂章表也三年之䘮二十五月而畢哀痛未盡思慕未忘然而禮以是斷之者豈不以送死有已復生有節也哉斷决也丁亂反鄭云復生謂除䘮反生者之事也凡生乎天地之間者有血氣之屬莫不有知有知之屬莫不愛其類今夫大鳥獸則失亡其羣疋越月踰時則必反鈆過故鄉則必徘徊焉鳴號焉躑躅焉踟蹰焉然後能去之也鈆與㳂同循也禮記作反廵故鄉徘徊旋飛翔之貌躑躅以足擊地也踟蹰不能去之貌小者是燕爵猶有啁噍之頃焉然後能去之也燕爵與鷰雀同故有血氣之屬莫知於人故人之於其親也至}
