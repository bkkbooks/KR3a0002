  - {type: variant, offset: 57, length: 3, content: 是態臣, WYG: 也𤣥酒水也大羮汁無鹽梅之味也本謂造飲食之物禮記曰郊血大饗腥也饗尚𤣥尊而用酒醴先黍稷而飯稻粱饗與享同四時享廟也用謂酌獻也以𤣥酒為上而獻以酒醴先陳黍稷而後飯以稻粱}
