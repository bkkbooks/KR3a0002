  - {type: variant, offset: 1304, length: 0, content: '', WYG: 立麤衰也不至於瘠弃立麄衰以為居䘮之飾亦不使羸瘠自弃其立聲樂恬愉也不至於流淫墯慢其立哭泣哀戚也不至於隘懾傷生是禮之中流也隘窮也懾猶戚也之怯反中流禮之中道也故}
