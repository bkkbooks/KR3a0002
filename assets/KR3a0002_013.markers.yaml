  - {type: variant, offset: 1300, length: 1, content: 敬, SBCK: 立聲樂恬愉也不至於流淫惰慢其立哭泣哀戚也不至於隘懾傷生是禮之中流也也懾隘窮流禮之中道也猶戚也之怯反中故情貌之變足以別吉凶明貴賤親䟽之節期止矣爲斯期當外是姦也雖難君子賤之故量食而食之量要而帶之相高以毁瘠是姦人之道也非禮義之文也非孝子之情也將以有爲者也眞情將有作爲以邀名非禮義之節文孝子之演門也求利若故說豫娩澤憂戚萃惡是吉凶憂愉之情發於顔色者也澤顔色潤澤也萃與顇同惡顔說讀爲恱豫樂也娩媚也音晚發見也色惡也歌謡謸笑哭泣諦號是吉凶憂愉之情發於聲音者也聲與此義不同諦讀爲啼管子謸與傲同戲謔也說文云謸悲字通用號胡刀反曰豕人立而啼古芻豢稻粱酒醴餰鬻魚肉菽藿酒漿是吉凶憂愉之情發於食飲者也喪者之食餰鬻菽藿卑絻黼黻文織資麤衰絰菲繐菅屨是吉凶憂愉之情發於衣服者也禆冕同卑絻與以事尊卑服之諸侯以下皆服焉文織染絲織爲文章也資與衣裨衣而服冕也裨之言卑也天子六服大裘爲上其餘爲卑或當時喪者有服此也繐繐衰也鄭􅀇云繐衰小功之縷四升􅒥同即齊衰也麤麤布也今麤布亦謂之資菲草衣蓋如蓑然鄧繐布菅茅也春秋傳曰晏子杖菅屨也半之衰也凡布細而踈者謂之繐今南陽有䟽房檖䫉越席牀第几筵屬茨倚廬席薪枕塊是吉凶憂愉之情發於居處者也屬茨令茨相茨蓋屋草也謂}
