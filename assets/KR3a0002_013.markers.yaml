  - {type: variant, offset: 636, length: 1, content: 信, SBCK: 也修士士之進修者謂上士也一郷謂一郷内之姻族也屬謂付託之使主喪也通國謂通好之國也一國謂同在朝而葬同盟至大夫三月同位至士踰月外姻至春秋傳曰天子七月而葬同軌畢至諸侯五月庶人之喪合族黨動州里刑餘罪人之喪不得合族黨獨屬妻子棺椁三寸衣衾三領不得飾棺不得晝行以昬殣凡縁而往埋之刑之餘刑餘遭寸刑人之棺也喪大記士陳衣于序東三十稱今云三領死也墨子曰桐棺三寸葛以爲緘趙簡子亦云然}
