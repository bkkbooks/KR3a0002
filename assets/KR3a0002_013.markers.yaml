  - {type: variant, offset: 1454, length: 1, content: 公, WYG: 夕忘之然而縱之則是曾鳥獸之不若也彼安能相與羣居而無亂乎將由夫脩飾之君子與則三年之䘮二十五月而畢若駟之過隙然而遂之則是無窮也隙壁孔也鄭云喻疾也遂之謂不時除也故先王聖人安為之立中制節一使足以成文理則舍之矣禮記作焉為之立中制節鄭云焉猶然立中制節謂服之年月也舍除也王肅云一皆也然則何以分之分半也半於三年矣曰至親以期斷斷决也鄭云言服之正雖至親皆期而除是何也鄭云問服斷於期之義也曰天地則以易矣四時則以徧矣其在宇中者莫不更始也宇中者謂萬物故先王案以此象之也然則三年何也鄭云法此變易可以期何乃三年為也曰加隆焉案使倍之故載期也鄭云言於父母加厚其恩使倍期也由九月已下何也由從也從大功已下也曰案使不及也鄭云言使其不若父母也故三年以為隆緦麻小功以為殺期九月以為間隆厚也殺減也所介反間則其間也古莧反情在隆殺之間也上取象於天下取象於地中取則於人人所以羣居和一之鄭云取象於天地謂法其變易也自三年以至緦皆嵗時之數言既象天地又足盡人恩聚居粹厚之也故三年之䘮人道之至文者也}
