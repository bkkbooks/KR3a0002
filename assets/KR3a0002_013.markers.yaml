  - {type: variant, offset: 703, length: 3, content: 闇桀紂, SBCK: 辱至辱之道奉君父也此蓋論墨子薄葬是以禮者謹於吉凶不相厭者也掩也或曰不使相厭惡非也厭掩也烏甲反謂不使相侵紸纊聽息之時則夫忠臣孝子亦知其閔已屬纊也言此時知紸讀爲注注纊即絓絓古化反以爲黊字非也其必至於憂閔也或曰紸當爲然而殯歛之具未有求也相厭也所謂不垂涕恐懼然而幸生之心未巳持生之事未輟也卒矣然後作具之具之作之故雖備家必踰日然後能殯三日而成服足也備豐然後告遠者出矣備物者作矣故殯久不過七十日速不損五十日三月者也損減也此皆據士喪禮首尾是何也曰遠者可以至矣百求可以得矣百事可以成矣其忠至矣其節大矣其文備矣凡附於身者必誠必信勿之有悔焉耳三月而葬凡附於棺忠誠也節人子之節也文器用儀制也子思曰喪三日而殯之有悔焉耳者必誠必信勿然後月朝􅁲日月夕􅁲宅然後葬也大夫之禮也士則筮宅士喪禮先筮宅後􅁲日此之月月朝月初也月夕月末也先􅁲日知其期然後􅁲宅此􅁲宅未詳也朝􅁲日月夕當是時也其義止誰得行之其義行誰得止之者抑情不肖者企及聖人爲之節制使賢故三月之葬殯其䫉以生設飾死者也殆非直留死者以安生也器用飾死者三月乃能備也䫉象也言其象以生之所設是致隆思慕之義也卒禮之凡常道凡謂變而飾每加飾謂殯歛動而遠游云飯禮記子客位祖於庭葬於墓所以即遠也於牖下小歛於戸内大歛於阼殯於久而平如平常也久則哀殺故死之爲道也不飾則惡惡則不哀尒則翫翫戲狎也尒與邇同翫則厭厭則忘忘則不敬一朝而喪其嚴親而所以送葬之者不哀不敬則嫌於禽獸矣君子恥之故變而飾}
