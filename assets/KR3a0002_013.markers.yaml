  - {type: variant, offset: 1447, length: 1, content: 出, krp: 也瓦不成於器味鄭云成善也竹不可善用謂邊無縢也味當作沬靧也有其外形内不可用也内或爲用禮記曰竹不成用瓦不成竿笙具而不和琴瑟張而不均商之調也鄭玄云無宫輿藏而馬反告不用也埋之也馬謂駕軼軸之馬告示輿謂軼軸也國君謂之輴藏謂碑大夫葬用輴二綍二碑士葬用國車皆至葬時埋之也言也士喪禮既啓遷于祖用軸禮記君葬用輴四綍二具生器以適墓象徙之道也盤盂之屬徙遷改生器用器也弓矢以象人行不從常行之道更徙他道也也徙道其生時之道器當在家今以適墓略而不盡䫉而不功趨輿而藏之金革轡靷而不入明不用也有形䫉不加功精好也趨輿而藏之謂以輿略而不盡謂簡略而不盡備也䫉形也言但鞅也說文云靷所以引軸者也杜元凱云靷在馬胷或趨於墓而藏之趨者速也速藏之意也金謂和鸞革車物爲䫉下䫉皆同義曰䫉讀爲邈像也今畫象徙道又明不用也適墓以器亦所以明不用也象其改易生時之器是皆所以重哀也皆所以重有異生時哀也孝子之故生器文而不功明器䫉而不用器生之屬明器鬼器塗車芻靈木不成斵竹不成用瓦不成沫生時所用之器旣夕禮曰用器弓矢耒耜兩敦兩杆槃匜者有知無知故雜用生器與明器也之屬禮記曰周人兼用之以言不知死凡禮事生飾歡也送死飾哀也祭祀飾敬也師旅飾威也是百王之所同古今之所一也未有知其所由來者也故壙壟其䫉象室屋也也禮記曰適壙墓中壟家意以象生時也或音邈墓不登壟䫉猶意也言其棺椁其䫉象版蓋斯象拂也也爾雅釋器云輿革前謂之鞎後謂之茀郭云以韋板謂車上障蔽者蓋車蓋也斯未詳象衍字拂即茀後戸也靶車軾及無帾絲歶縷翣其䫉以象菲帷幬尉也衾是也帾與禇同禮記曰素錦禇又曰禇幕丹質鄭無讀爲幠幠覆也所以覆尸者也士喪禮幠用衾夷禮記曰畫翣二皆載緌鄭云以五采羽注於翣首也歶讀爲云所以覆棺也絲歶未詳蓋亦喪車之飾也或曰絲讀爲緌誤爲縷耳菲謂編草爲蔽蓋古人所用障蔽門户者今貧魚謂以銅魚懸於池下禮記曰魚躍拂池縷讀爲柳蔞字扉户扇也擣讀爲幬帳之幬尉讀爲罻罻網也帷帳如網者猶然或曰菲當爲匪隱也謂隱奥之處也或曰菲讀爲也抗折其䫉以象槾茨番閼也於乘車之西折旣夕禮陳明器抗禦也所以禦止土者槾扞也茨蓋屋也槾茨猶墍茨也槾莫撗覆之抗木撗三縮土五無簀窆事畢加之壙上以承抗席折所以承抗皆不使外物侵内有象於槾茨藩閼也干反番讀爲藩籬也閼謂門戸壅閼風塵者抗所以禦土故卒禮者無他焉明死生之義送以哀敬而終周藏也故葬埋敬葬其形也以爲葬埋之禮葬也者藏也所形體也敬藏其祭祀敬事其神也其銘誄繫世敬傳其名也狀以爲謚也繫世謂書其傳襲若今之譜諜也皆所銘謂書其功於器物若孔悝之鼎銘者誄謂誄其行於後世也以敬傳其名事生飾始也送死飾終也終始具而孝子之事畢聖人之道備矣刻死而附生謂之墨刻生而附死謂之惑之法惑謂惑亂過禮也刻損減附増益也墨子殺生而送死謂之賊人與賊殉葬殺也同大象其生以送其死使死生終始莫不稱宜而好善是禮義之法式也儒者是矣三年之喪何也曰稱情而立文之情輕重而制鄭康成云稱人也其禮因以飾羣別親䟽貴賤之節而不可益損也故曰無適不易之術也別也適往也無羣別謂羣而有易此術或曰適讀爲敵往不易言所至皆不可創巨者其日久痛甚者其瘉遲三年之喪稱情而立文所以爲至痛極也能平故重喪必待三年乃除亦爲至痛之極不創傷也楚良反日久瘉遲互言之也皆言久乃而已可朞月齊衰苴杖居廬食粥席薪枕塊所以爲至痛飾也竹爲之杖鄭云飾情之章表也禮記斬衰苴杖苴謂以苴惡死三年之喪二十五月而畢哀痛未盡思慕未忘然而禮以是斷之者豈不以送死有已復生有節也哉謂除喪反生者之事也斷决也丁亂反鄭云復生凡生乎天地之閒者有血氣之屬必有知有知之屬莫不愛其類今夫大鳥獸則失亡其羣匹越月踰時則必反鈆過故郷則必徘徊焉鳴號焉躑躅焉踟蹰焉然後能去之也㳂同鈆與之貌躑躅以足擊地也踟蹰不能去之貌循也禮記作反廵過其故郷徘徊旋飛翔小者是燕爵猶有啁噍之頃焉然後能去之鷰雀同燕爵與故有血氣之屬莫知於人故人之於其親也至}
