  - {type: punctuation, offset: 1501, content: 、, id: KR3a0002_tls_013-bkkpn344}
  - {type: variant, offset: 1502, length: 0, content: '', SBCK: 汋􅁊箾簡象是君子之所以為愅詭其所喜樂之文也哀痛敦惡之意本皆因説祭遂廣言喜樂韶夏之屬箾音朔賈逵曰舞曲名武汋桓皆周頌篇名簡因於感動而為之文飾也喜樂不可無文飾故制為鍾鼓王伐紂之樂未詳象周武齊衰苴杖居廬食粥席薪枕塊是君子之所以為愅詭其所哀痛之文也齊衰苴杖之屬言本皆因於感動也感動其所哀痛而不可無文飾故制為師旅有制刑法有等莫不稱罪是君子之所以為愅詭其所敦惡之文也等輕重異也敦厚也厚惡深惡也師旅所以討有罪制謂人數也有動敦惡故制師旅刑法以為文飾或曰敦讀為頓頓困躓也本因感卜筮視日齊戒修塗几筵饋薦告祝如或饗之文為項燕視日修塗視日之吉凶史記周牲體也薦進黍稷也告祝謂尸命祝以嘏于主人曰皇尸命工謂惨自宮至廟之道􅂗也几筵謂祝筵几于室中東面也饋獻宜稼于田眉壽萬年勿替引之如或歆饗其祀然也祝承致多福無疆于汝孝孫來女孝孫使女受禄于天物取而皆祭之如或甞之尸取菹㨎于醢祭于豆閒佐食物取每物皆取也謂祝命授祭}
  - {type: page-break, offset: 1502, content: '', id: KR3a0002_SBCK_013-25b}
  - {type: page-break, offset: 1502, content: '', id: KR3a0002_SBCK_013-26a}
  - {type: variant, offset: 1502, length: 0, content: '', WYG: 酌􅁊箾簡象是君子之所以為愅詭其所喜樂之文也因説祭遂廣言喜樂哀痛敦惡之意本皆因於感動而為之文飾也喜樂不可無文飾故制為鐘鼓韶夏之屬箾音朔賈逵曰舞曲名武酌桓皆周頌篇名簡未詳象周武王伐紂之樂也齊衰苴杖居廬食粥席薪枕塊是君子之所以為愅詭其所哀痛之文也感動其所哀痛而不可無文飾故制為齊衰苴杖之屬言本皆因於感動也師旅有制刑法有等莫不稱罪是君子之所以為愅詭其所敦惡之文也師旅所以討有罪制謂人數也有等輕重異也敦厚也厚惡深惡也或曰敦讀為頓頓困躓也本因感動敦惡故制師旅刑法以為文飾卜筮視日齋戒脩塗几筵饋薦告祝如或饗之視日之吉凶史記周文為項燕視日脩塗謂脩自宮至廟之道􅂗也几筵謂祝筵几于室中東靣也饋獻牲體也薦進黍稷也告祝謂尸命祝以嘏于主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受禄于天宜稼于田眉壽萬年勿替引之如或歆饗其祀然也物取而皆祭之如或甞之物取每物皆取也謂祝命授祭尸取葅㨎于醢祭于豆間佐食取黍稷肺授尸尸祭之又取肝㨎于鹽振祭齊之}
