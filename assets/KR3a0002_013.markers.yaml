  - {type: variant, offset: 620, length: 1, content: 正, WYG: 君子敬始而慎終終始如一是君子之道禮}
  - {type: variant, offset: 620, length: 1, content: 正, krp: 君子敬始而愼終終始如一是君子之道禮}
  - {type: variant, offset: 623, length: 0, content: '', SBCK: 文也夫厚其生而薄其死是敬其有知而慢其無知也是姦人之道而倍叛之心也君子以倍叛之心接臧榖猶且羞之而況以事其所隆親乎相與牧羊音義云孺子曰穀或曰臧已解在王霸篇莊子曰臧與穀哺乳小兒也所隆親所厚之親也榖讀爲鬭榖於菟之榖榖乳也謂故死之爲道也一而不可得再復也}
  - {type: variant, offset: 623, length: 0, content: '', WYG: 文也夫厚其生而薄其死是敬其有知而慢其無知也是姦人之道而倍叛之心也君子以倍叛之心接臧穀猶且羞之而況以事其所隆親乎臧已解在王霸篇莊子曰臧與穀相與牧羊音義云孺子曰穀或曰穀讀為鬭穀於蒐之穀穀乳謂哺乳小兒也所隆親所厚之親也故死之為道也一而不可得再復也}
  - {type: page-break, offset: 623, content: '', id: KR3a0002_WYG_013-9a, image: WYG0695/WYG0695-0237c.png}
  - {type: variant, offset: 623, length: 0, content: '', krp: 文也夫厚其生而薄其死是敬其有知而慢其無知也是姦人之道而倍叛之心也君子以倍叛之心接臧榖猶且羞之而況以事其所隆親乎相與牧羊音義云孺子曰穀或曰臧已解在王霸篇莊子曰臧與穀哺乳小兒也所隆親所厚之親也榖讀爲鬭榖於菟之榖榖乳也謂故死之爲道也一而不可得再復也}
  - {type: variant, offset: 624, length: 1, content: 設, SBCK: 之所以致重其君子之所以致重其親於是盡矣臣子於極重之道不以其一死不可再復盡也可不故事生不忠厚不敬文謂之野心篤厚忠厚忠野人不知禮者也敬文恭敬有文飾野送死不忠厚不敬文謂之瘠薄瘠君子賤野而羞瘠故天子棺槨十重諸侯五重大夫三重士再重重水兕革棺被之其禮記云天子之棺四椁以端長六尺又禮器曰天子七月而葬五重八翣鄭云五重厚三寸杝棺一梓棺二四者皆周棺束縮二衡三衽毎束一栢爲十重也諸侯已下與禮記多少不同未詳也謂杭木與茵也今云十重蓋以棺槨與杭木合然後皆有衣衾多少厚薄之數皆有翣菨文章之等以敬飾之比者也衾謂君錦衾大夫縞衾士緇衾也衣謂衣衾禮記所謂君陳衣于庭百稱之棺之牆飾也翣以木爲衣以白布畫爲雲氣如今之攝食謂遣車所苞遣奠也翣菨當爲蔞翣鄭康成云蔞翣飾也柳之言聚也諸飾所聚柳以象宮室也劉熙釋名也周禮縫人衣翣柳之材鄭云必先􅆞衣其木乃以張黼荒火三列黻三列素錦褚加帷荒纁紐六齊五采五云輿棺之車其蓋曰柳文章之等謂君龍帷三池振容池君纁戴六纁披六大夫已下各有差也具黼翣二黻翣二畫翣二皆戴圭魚躍拂使生死終始若一一足以爲人願是先王之道忠臣孝子之極也足忠孝之極在此也生死如一}
