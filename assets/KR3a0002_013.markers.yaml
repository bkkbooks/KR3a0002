  - {type: variant, offset: 1499, length: 2, content: 平湯, SBCK: 期物者也曲容物備祭者志意思慕之情也愅詭悒僾而不能無時至焉動之貌悒僾氣不舒憤鬱之愅變也詭異也皆謂變異感鬱不能無時而至言有時而至也愅音革悒音邑僾貌爾雅云僾悒也郭云嗚悒短氣也言人感動或憤愛音故人之歡欣和合之時則夫忠臣孝子亦愅詭而有所至矣而思君親之不得同樂也歡欣之時忠臣孝子則感動彼其所至者甚大動也甚大感動也言所至之情案屈然已則其於志意之情者惆然不嗛其於禮節者闕然不具也言若無祭祀之禮空然而已則忠臣屈竭也屈然空然也惆然悵然也嗛足禮節又闕然不具也孝子之情悵然不足故先王案爲之立文尊尊親親之義至矣祀節文文謂祭故曰祭者志意思慕之情也忠信愛敬之至矣禮節文貌之盛矣苟非聖人莫之能知也聖人明知之士君子安行之官人以為守百姓以成俗其在君子以為人道也其在百姓以為􅀑事也以為􅀑事則畏而奉之以為人道則安而行之故鍾鼓管磬琴瑟竽笙韶夏護}
