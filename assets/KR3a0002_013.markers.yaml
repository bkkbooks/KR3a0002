  - {type: variant, offset: 3, length: 2, content: 第十, WYG: 龍旗九斿所以養信也龍旗畫龍旗爾雅曰素升龍干縿練斿九旗正幅為絲斿所以屬之者也信謂使萬人見而信之識至尊也養猶奉也寢兕謂武士寢處於甲胄者也持虎謂以虎皮為弓衣武士執持者也詩曰虎韔鏤膺劉氏云畫虎於鈴竿及楯也蛟韅韅馬服之革蓋象蛟形徐廣曰以蛟魚皮為之絲末末與幦同禮記曰若羔幦虎犆鄭云覆芩也絲幦蓋織絲為幦亡狄反彌龍所以養威也彌如字又讀為弭弭末也謂金飾衡軛之末為龍首也徐廣曰乗輿單以金薄繆龍為輿倚較交虎伏軾龍首銜軛故大路之馬必倍至教順然後乗之所以養安也倍至謂倍加精至也或以必倍為自倍謂反之車在馬前令馬熟識車也至極教順然後乗之備驚奔也熟知夫出死要節之所以養生也熟甚也出死出身死冦難也要節自要約以節義謂立節也使熟便其知其出要節盡忠於君是乃所以受禄養生也若不能然則亂而不保其生也要一遙反熟知夫出費用之所以養財也費用財以成禮謂問遺之屬是乃所以求奉養其財不相侵奪也熟知夫恭敬辭讓之所以養安也無恭敬辭讓則亂而不安也熟知夫禮義文理之所以養情也無禮義文理則縱情性不知所歸也故人苟生之為見若者必死言苟唯以生為所見不能出死要節若此者必死也苟利之為見若者必害苟唯以利為所見不能用財以成禮若此者必遇害苟怠惰偷懦之為安若者必危懦讀為儒言苟以怠惰為安居不能恭敬辭讓若此者必危苟情説之為樂若者必滅説讀為悦言苟以情悦為樂不知禮義文理恣其所欲若此者必滅亡故人一之於禮義則兩得之矣一之於情性則兩䘮之矣專一於禮義則禮義情性兩得專一於情性則禮義情性兩䘮故儒者將使人兩得之者也墨者將使人兩䘮之者也是儒墨之分也禮有}
