  - {type: variant, offset: 1454, length: 1, content: 公, SBCK: 夕忘之然而縱之則是曾鳥獸之不若也彼安能相與羣居而無亂乎將由夫脩飾之君子與則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也云喻疾也遂隙壁孔也鄭時除也之謂不故先王聖人安爲之立中制節一使足以成文理則舍之矣節鄭云焉猶然立中制禮記作焉爲之立中制除也王肅云一皆也節謂服之年月也舍然則何以分之於三年矣分半也半曰至親以朞斷雖至親皆期而除也斷決也鄭云言服之正是何也斷於期之鄭云問服也義曰天地則已易矣四時則已徧矣其在宇中者莫不更始矣謂萬物宇中者故先王案以此象之也然則三年何也以期何乃三年爲鄭云法此變易可曰加隆焉案使倍之故再期也厚其恩使倍期也鄭云言於父母加由九月以下何也功以下也由從也從大曰案使不及也云鄭不若父母言使其恩故三年以爲隆緦小功以爲殺期九月以爲閒閒也古莧反情在隆殺之閒也隆厚也殺減也所介反閒則其上取象於天下取象於地中取則於人人所以羣居和一之理盡矣易也自三年以至緦皆嵗時鄭云取象於天地謂法其變以盡人聚居粹厚之恩也之數也言既象天地又足故三年之喪人道之至文者也}
