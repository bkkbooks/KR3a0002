  - {type: variant, offset: 132, length: 0, content: '', WYG: 損益也立隆盛之禮以極盡人情使天下不復更能損益也本末相順司馬貞曰禮之盛文理合以歸大一禮之殺復情以歸大一是本末相順也終始相應司馬貞曰禮始於脱畧終於梲棁亦殺也殺亦脱畧是終始相應至文以有别至察以有説言禮之至文以其有}
