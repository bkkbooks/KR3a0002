  - {type: variant, offset: 624, length: 1, content: 設, WYG: 之所以致重其君子之所以致重其親於是盡矣以其死不可再復臣子於極重之道不可不盡也故事生不忠厚不敬文謂之野忠厚忠心篤厚敬文恭敬有文飾野野人不知禮者送死不忠厚不敬文謂之瘠瘠薄君子賤野而羞瘠故天子棺槨十重諸侯五重大夫三重士載重禮記曰天子之棺四重水兕革棺被之其厚三寸杝棺一梓棺二四者皆周棺束縮二衡三衽毎束一柏椁以端長六尺而葬五重八翣鄭云五重杭木與茵也今十重蓋以棺椁與杭木合為十重也諸侯已下與禮記多少不同未詳也然後皆有衣衾多少厚薄之數皆有翣菨文章之等以敬飾之衣謂禮記君陳衣于庭百稱之比也衾謂君錦衾大夫縞衾士緇衾也翣菨當為翣萎鄭康成曰翣萎棺之牆飾也翣以木為衣以白布畫為雲氣如今之攝也周禮縫人衣翣柳之林柳之言聚諸飾所聚柳以象宮室也劉熙釋名云䘮之車其蓋曰柳文章之等謂君龍帷三池振容黼荒火三列黻三列素錦褚加為荒纁紐六齊五采五具黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六大夫已下各有差也使生死終始若一足以為人願是先王之道忠臣孝子之極也生死如一}
