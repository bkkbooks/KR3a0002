  - {type: variant, offset: 1625, length: 0, content: '', WYG: 見顯也明謂日月光謂水火金玉天顯其日月之明而地顯其水火金玊之光君子則貴其德之全也脩身篇第二見善脩然必以自存也修然整飾貌言見善必自整飾使存於身也見不善愀然必以自省也愀然憂懼貌自省其過也善在身介然必以自好也介然堅固貌易曰介如石焉自好自樂其善也不善在身也菑然必以自惡也菑讀為災災然災害在身之貌故非我而當者吾師也是我而當者吾友也諂諛我者吾賊也故君子隆師而親友以致惡其賊致猶極也下同好善無厭受諫而能誡雖欲無進得乎哉小人反是致亂而惡人之非己也致不肖而欲人之賢己也心如虎狼行如禽獸而又怨人之賊已也諂諛者親諫諍者䟽修正爲笑至忠爲賊雖欲無滅亡得乎哉至忠反以爲賊詩曰潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依此之謂也詩小雅小旻之篇毛注云潝潝然患其上訿訿然不思稱乎上鄭云臣不事君亂之階也故甚可哀潝許急反訿音紫扁善之度以治氣養生則後彭祖以修身自名則配堯禹扁讀爲辨韓詩外傳曰君子有辨善之度言君子有辨别善之法即謂禮也言若用禮治氣養生則夀不及於彭祖若以修身自為名號則配堯禹不朽矣言禮雖不能治氣養生而長於修身自為名號以此辨之則善可知矣彭祖堯臣名鏗封於彭城經虞夏商夀七百歳也宜於時通利以處窮禮信是也信誠也言所用修身及時通處窮禮誠是也孟子曰君子窮則獨善其身達則兼善天下凡用血氣志意知慮由禮則治通不由禮則勃亂提僈提僈舒緩也爾雅云媞媞安也詩曰好人提提皆舒緩之義食飲衣服居處動靜由禮則和節不由禮則觸陷生疾容貌態度進退趨行由禮則雅不由禮則夷固辟違庸衆而野夷倨也論語曰原壤夷俟固陋也庸凡庸衆衆人野郊野之人故人無禮則不生事無禮則不成國家無禮則不寧詩曰禮儀卒度笑語卒獲此之謂也詩小雅楚茨之篇卒盡也獲得也以善先人者謂之教以善和人者謂之順先謂首唱也和胡卧反下同以不善先人者謂之諂以不善和人者謂之諛諂之言陷也謂以佞言陷之諛與俞同義故為不善和人也是是非非謂之知能辨是為是非爲非謂之智也非是是非謂之愚以是為非以非為是謂之愚也傷良曰讒害良曰賊是謂是非謂非曰直竊貨曰盜匿行曰詐易言曰誕趣舎無定謂之無常不恒之人保利弃義謂之至賊保安多聞曰博少聞曰淺多見曰閑閑習也能習其事則不廹遽少見曰陋難進曰偍偍與提媞皆同謂舒緩也易忘曰漏少而理曰治多而亂曰耗少謂舉其要而有條理謂之治耗虗竭也凡物多而易盡曰耗也治氣養心之術言以禮修身是亦治氣飬心之術不必如彭祖也血氣剛彊則柔之以調和知慮漸深則一之以易良漸進也或曰漸浸也子廉反詩曰漸車帷裳言智慮深則近險詐故一之以易良也勇膽猛戾則輔之以道順膽有膽氣戾忿惡也此性多不順故以道順輔之也齊給便利則節之以動止爾雅云齊疾也齊急便利皆捷速也懼其太陵遽故節之使安徐也狹隘􅄶小則廓之以廣大卑濕重遲貪利則抗之以髙志卑謂謙下濕亦謂自卑下如地之下濕然也方言濕優也自闗而西凡志而不得欲而不獲髙而不墜行而中止皆謂之濕亦謂之過謙恭而無禮者重遲寛緩也夫過恭則無威儀寛緩􅁪不及機事貪利則苟得也故皆抗之髙志也或曰卑濕亦謂遲緩也言遲緩之人如有卑濕之疾不能運動也庸衆駑散則刦之以師友庸衆已解上駑謂材下如駑馬者也散不拘檢者也刦奪去也言以師友去其舊性也怠慢僄弃則炤之以禍災僄輕也謂自輕其身也音匹妙反方言楚謂相輕薄為僄炤之以禍災謂以禍災照燭之使知懼也炤與照同愚款端慤則合之以禮樂通之以思索款誠款也說文云款意有所欲也愚款端慤多無潤色故曰合之以禮樂此皆言修身之術在攻其所短也凡治氣養心之術莫徑由禮莫要得師莫神一好徑捷速也神神明也一好謂好善不好惡也夫是之謂治氣養心之術也志意脩則驕富貴矣道義重則輕王公矣内省則外物輕矣傳曰君子役物小人役於物此之謂也君君子能役物小人為物所役凡言言傳曰皆舊所傳聞之言也身勞而心安爲之利少而義多為之事亂君而通不如事窮君而順焉窮君小國廹脅之君也言事大國暴亂之君違道而通不如事小國之君順行其道也故良農不為水旱不耕良賈不為折閲不市折損也閲賣也謂損所閱賣之物價也賈音古士君子不為貧窮怠乎道體恭敬而心忠信術禮義而情愛人術法也横行天下雖困四夷人莫不貴横行不順理而行困窮也言所至皆貴也勞苦之事則争先饒樂之事則能讓端慤誠信拘守而詳拘守謂守而勿失詳謂審於事也橫行天下雖困四夷人莫不任體倨固而心執詐術順墨而精雜汗倨傲也固鄙固順墨當為愼墨愼謂齊宣王時處士慎到也其術本黄老歸刑名先申韓其意相似多明不尚賢不使能之道著書四十一篇墨翟宋人號墨子墨子著書三十五篇其術多務儉嗇精當為清雜汗謂非禮義之言也横行天下雖逹四方人莫不賤勞苦之事則偷懦轉脫偷謂苟避於事懦亦謂懦弱畏事皆怠惰之義或曰偷當為輸揚子方言云懦輸愚郭璞注謂懦㦏也又云解偷懦謂懦之人苟求免於事之義饒樂之事則佞兊而不曲兊恱也言接恱於人以求饒樂之事不曲謂直取之也辟違而不慤乖辟違背不能端慤誠信辟讀為僻程役而不錄程功役勞役錄檢束也於功程及勞役之事怠惰而不檢束言不能拘守而詳之也橫行天下雖達四方人莫不弃行而供冀非漬淖也供恭也冀當為翼凢行自當恭敬非謂漬於泥淖也人在泥淖中則兢兢然或曰李廵注爾雅冀州曰冀近也恭敬謂不敢放誕也行而俯項非擊戾也擊戾謂項曲戾不能仰者也擊戾猶言乖戾也偶視而先俯非恐懼也偶視對視也然夫士欲獨修其身不以得罪於比俗之人也夫驥一日而千里駑馬十駕則亦及之矣將以窮無窮逐無極與其折骨絶筋終身不可以相及也將有所止之則千里雖逺亦或遲或速或先或後胡為乎其不可以相及也不識步道者將以窮無窮逐無極與意亦有所止之與逺行夫堅白同異有厚無厚之察非不察也此言公孫龍惠施之曲說異理不可為法也堅白謂厚堅白也公孫堅白論曰堅白石三可乎曰不可二可乎曰可謂目視石但見白不知其堅則謂之白石手觸石則知其堅而不知其白則謂之堅石是堅白終不可合為一也司馬彪曰堅白謂堅石非石白馬非馬也同異謂使異者同同者異或曰即莊子所謂大同而與小同異此之謂小同異言同在天地之間故謂之大同物各有種類所同故謂之小同是大同與小同異也此畧舉同異故曰此謂小同異莊子又曰萬物畢同畢異此之謂大同異言萬物揔謂之物莫不皆同是萬物畢同若分而别之則人耳目鼻口百體草木枝葉花實無不皆異是物畢異也此具舉同異故曰此之謂大同異莊子又曰無厚不可積也其大千里無厚謂厚之極不可爲厚薄也不可積言其委積至多不可使復積也凡無厚不可積因於有厚可積故得其大千里千里者舉大之極也然而君子不辨止之也止而不為倚魁之行非不難也然而君子不行止之也倚奇也奇讀為奇偶之奇方言云秦晉之間凡物體全而不具謂之倚魁大也倚魁皆謂偏倚狂怪之行莊子曰南方有倚人焉曰黄獠也故學曰遲彼止而待我我行而就之學曰謂為學者傳此言也遲待也直吏反則亦或遲或速或先或後胡為乎其不可以同至也故蹞步不休跛鼈千里累土不輟丘山崇成重意莊六十四章九層之臺起於累土千里之行始於足下厭其源開其瀆江河可竭厭塞也音一涉反源江竇也一進一退一左一右六驥不致言不齊故不能致逺路也彼人之才性之相懸也豈若跛鼈之與六驥足哉然而跛鼈致之六驥不致是無他故焉或為之或不爲之耳道雖邇不行不至事雖小不為不成其爲人也多暇日者其出入不逺矣多暇日謂怠出入謂道路所至也好法而行士也好法而能行則謂之士士事也謂能治其事也篤志而體君子也厚其志而知大體者也齊明而不竭聖人也齊謂無偏頗也不竭不窮也書曰成湯克齊聖廣淵人無法則倀倀然倀倀無所適貌也言不知所措履禮記曰倀倀乎其何之有法而無志其義則渠渠然渠讀為遽古字渠遽通渠渠不寛泰之貌志識也不識其義謂但拘守文字而已矣依乎法而又深其類然後温温然深其類謂深知統類温温有潤澤之貌舉類君子所難故屢言之也禮者所以正身也師者所以正禮也無禮何以正身無師吾安知禮之為是也禮然而然則是情安禮也師云而云則是知若師也情安禮知若師則是聖人也情安禮謂若天性所安不以學也行不違禮言不違師則與聖人無異言師法之效如此故非禮是無法也非師是無師也無師謂不以師為師不是師法而好自用譬之是猶以盲辨色以聾辨聲也舎亂妄無為也舎除也除亂妄之人孰肯爲此也故學也者禮法也夫師以身為正儀而貴自安者也效師之禮法以爲正儀如性之所安斯爲貴也禮或爲體詩曰不識不知順帝之則此之謂也詩大雅皇矣之篇引此以喻師法暗合天道如文王雖未知已順天之法則也端慤順弟則可謂善少者矣弟與悌同加好學遜敏焉則有鈞無上可以為君子者矣既好學遜敏又有鈞平之心而無上人之意則可以為君子矣或曰有鈞無上四字􅄛耳偷儒憚事無廉恥而嗜乎飲食則可謂惡少者矣偷儒憚事皆謂懦弱怠惰畏勞苦之人也加惕悍而不順險賊而不弟焉韓侍郎云惕與蕩同字作心邊易謂放蕩兇悍也則可謂不詳少者矣雖陷刑戮可也詳當為祥老老而壯者歸焉老老謂以老為老而尊敬之也孟子曰伯夷太公二老者天下之大老也是天下之父也其父歸之其子焉往不窮窮而通者積焉窮者則寛而容之不廹蹙以苛政謂惠恤鰥寡窮匱也積填委也既然則通者歸亦多矣覆巢毁卵則鳳凰不至竭澤涸魚則蛟龍不遊又與此同也行乎冥冥施乎無報而賢不肖一焉行乎𠖇冥謂行事不務求人之知施乎無報謂施不務報如此賢不肖同慕而歸之也人有此三行雖有大過天其不遂乎若不幸而有過天亦佑之矣此固不宜有大災也君子之求利也略其遠思也早其避辱也懼其行道理也勇君子貧窮而志廣富貴而體恭安燕而血氣不惰勞勌而容貌不枯怒不過奪喜不過予予賜也周禮八柄三曰予以馭其幸君子貧窮而志廣隆仁也仁愛之心厚故所思者廣言務於逺大濟物也富貴而體恭殺勢也滅權勢之威故形體恭謹殺所介反安燕而血氣不惰柬理也柬與簡同言柬擇事理所宜而不務驕逸故雖安燕而不至怠惰勞勌而容貌不枯好交也以和好交接於物志意常泰也怒不過奪喜不過予法勝私也以公滅私故賞罰得中也書曰無有作好遵王之道無有作惡遵王之路此言君子之能以公義勝私欲也書洪範之辭荀子卷一欽定四庫全書荀子卷}
