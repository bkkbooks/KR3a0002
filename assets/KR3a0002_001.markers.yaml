  - {type: variant, offset: 306, length: 0, content: '', SBCK: 鳥之巢至精密多繫於葦竹之上蒙鳩焦鷯也苕葦之秀也今巧婦曰一名蒙鳩亦以其愚也言人不知學問其所置身亦猶繫葦之是也蒙當爲蔑方言云鷦鷯自關而西謂之桑飛或謂之蔑雀或謂完堅矣大風至則苕折卵破者何也所託者然也危也說苑客謂孟甞君曰鷦鷯巢於葦苕箸之以髪可}
