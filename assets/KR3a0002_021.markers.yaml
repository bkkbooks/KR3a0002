  - {type: variant, offset: 76, length: 227, content: 自為也妬繆於道而人誘其所迨也私其所積唯恐聞其惡也倚其所私以觀異術唯恐聞其美也是以與治離走而是己不輟也豈不蔽於一曲而失正求也哉心不使焉則白黑在前而目不見雷鼓在側而耳不聞況於使者乎德道之人亂國之君非之上亂家之人非之下豈不哀哉故為蔽欲為蔽惡為蔽始為蔽終為蔽遠為蔽近為蔽博為蔽淺為蔽古為蔽今為蔽凡萬物異則莫不相為蔽此心術之公患也昔人君之蔽者夏桀殷紂是也桀蔽於末喜斯觀而不知關龍逄以惑其心而亂其行紂蔽於妲己飛廉而不知微子啟以惑其心而亂其行故群臣去忠而事私百姓怨非而, SBCK: 定卿言}
