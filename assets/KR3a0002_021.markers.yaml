  - {type: variant, offset: 1773, length: 1376, content: 能知之故人心譬如槃水正錯而勿動則湛濁在下而清明在上則足以見鬚眉而察膚理矣微風過之湛濁動乎下清明亂於上則不可以得大形之正也心亦如是矣故導之以理養之以清物莫之傾則足以定是非決嫌疑矣小物引之則其正外易其心內傾則不足以決庶理矣故好書者眾矣而倉頡獨傳者壹也好稼者眾矣而后稷獨傳者壹也好樂者眾矣而夔獨傳者壹也好義者眾矣而舜獨傳者壹也倕作弓浮游作矢而羿精於射奚仲作車桑杜作乘馬而造父精於御自古及今未嘗有兩而能精者也曾子曰是其庭可以搏鼠惡能與我歌矣空石之中有人焉其名曰觙其為人也善射以好思耳目之欲接則敗其思蚊䖟之聲聞則挫其精是以闢耳目之欲而遠蚊蝱之聲閑居靜思則通思仁若是可謂微乎孟子惡敗而出妻可謂能自彊矣有子惡臥而焠掌可謂能自忍矣未及好也闢耳目之欲可謂能自彊矣未及思也蚊蝱之聲聞則挫其精可謂危矣未可謂微也夫微者至人也至人也何彊何忍何危故濁明外景清明內景聖人縱其欲兼其情而制焉者理矣夫何彊何忍何危故仁者之行道也無為也聖人之行道也無彊也仁者之思也恭聖人之思也樂此治心之道也凡觀物有疑中心不定則外物不清吾慮不清則未可定然否也冥冥而行者見寢木以為伏虎也見植林以為後人也冥冥蔽其明也醉者越百步之溝以為蹞步之澮也俯而出城門以為小之閨也酒亂其神也厭目而視者視一以為兩掩耳而聽者聽漠漠而以為哅哅埶亂其官也故從山上望牛者若羊而求羊者不下牽也遠蔽其大也從山下望木者十仞之木若箸而求箸者不上折也高蔽其長也水動而景搖人不以定美惡水埶玄也瞽者仰視而不見星人不以定有無用精惑也有人焉以此時定物則世之愚者也彼愚者之定物以疑決疑決必不當夫苟不當安能無過乎夏首之南有人焉曰涓蜀梁其為人也愚而善畏明月而宵行俯見其影以為伏鬼也卬視其髮以為立魅也背而走比至其家者失氣而死豈不哀哉凡人之有鬼也必以其感忽之閒疑玄之時定之此人之所以無有而有無之時也而己以正事故傷於溼而擊鼓鼓痺則必有敝鼓喪豚之費矣而未有俞疾之福也故雖不在夏首之南則無以異矣凡以知人之性也可以知物之理也以可以知人之性求可以知物之理而無所疑止之則沒世窮年不能徧也其所以貫理焉雖億萬已不足以浹萬物之變與愚者若一學老身長子而與愚者若一猶不知錯夫是之謂妄人故學也者固學止之也惡乎止之曰止諸至足曷謂至足曰聖也聖也者盡倫者也王也者盡制者也兩盡者足以為天下極矣故學者以聖王為師案以聖王之制為法法其法以求其統類類以務象效其人嚮是而務士也類是而幾君子也知之聖人也故有知非以慮是則謂之攫有勇非以持是則謂之賊察孰非以分是則謂之篡多能非以脩蕩是則謂之知辨利非以言是則謂之詍傳曰天下有二非察是是察非謂合王制與不合王制也天下有不以是為隆正也然而猶有能分是非治曲直者邪若夫非分是非非治曲直非辨治亂非治人道雖能之無益於人不能無損於人案直將治怪說玩奇辭以相撓滑也案彊鉗而利口厚顏而忍詬無正而恣睢妄辨而幾利不好辭讓不敬禮節而好相推擠此亂世姦人之說也則天下之治說者方多然矣傳曰析辭而為察言物而為辨君子賤之博聞彊志不合王制君子賤之此之謂也為之無益於成也求之無益於得也憂戚之無益於幾也則廣焉能棄之矣不以自妨也不少頃干之胸中不慕往不閔來無邑憐之心當時則動物至而應事起而辨治亂可否昭然明矣周而成泄而敗明君無之有也宣而成隱而敗闇君無之有也故君人者周則讒言至矣直言反矣小人邇而君子遠矣詩云墨以為明狐狸其蒼此言上幽而下險也君人者宣則直言至矣而讒言反矣君子邇而小人遠矣詩曰明明在下赫赫在上此言上明而下化也, SBCK: 序}
