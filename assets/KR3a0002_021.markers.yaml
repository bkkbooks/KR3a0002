  - {type: variant, offset: 7, length: 1, content: 凡, krp: 篇除復重定箸三十二篇爲孫卿新書十二卷至倞分易卷第更名荀子皇朝熈寍初儒官校上詔國子監刋印頒行之中興蒐補遺逸監書􅎊具獨荀子猶闕學者不見舊書傳習閩本文字舛異仲友於三館睹舊文大懼湮没訪得善本假守餘隙迺以公帑鋟木悉視熈寍之故詩曰雖無老成人尚有典刑卿不可作其書獨非典刑乎向博極羣書序卿事大氐本司馬遷於遷書有三不合春申君死當齊王建二十八年距宣王八十七年向言卿以宣王時來㳺學春申君死而卿廢設以宣王末年㳺齊年巳百三十七矣遷書記孟子以惠王三十五年至梁當齊宣王七年惠王以叟稱孟子計亦五十餘後二十三年子之亂燕孟子在齊若卿來以宣王時不得如向言後孟子百餘歳田忘薦孫臏爲軍師敗魏桂陵當齊威王二十六年距趙孝成王七十八年臨武若與卿議兵於王前向以爲孫臏倞以敗魏馬陵疑年馬陵去桂陵又十三年矣崇文揔目言卿楚人楚禮爲客卿與遷書向序駮益難信据遷傳參卿書其大略可睹卿名况趙人以齊襄王時㳺稷下距孟子至齊五十年矣於列大夫三爲祭酒去之楚春申君以爲蘭陵令以䜛去之趙與臨武君議兵入秦見應侯昭王以聘反乎楚復爲蘭陵令旣廢家蘭陵以終自戰國爭冨彊儒道絀孟子學孔子言王可反掌致卒不見用卿後孟子亦尊孔氏子思作中庸孟子述之道性善至卿以爲人性惡故非子思孟軻揚雄以爲同門異戸孟子與告子言性卒絀告子惜卿不見孟子不免異說方說士徼時好卿獨守儒議兵以仁義冨以儒術彊以道德之威旨意與孟子同見應侯病秦無儒昭王謂儒無益}
