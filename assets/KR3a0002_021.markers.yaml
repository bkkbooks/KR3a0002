  - {type: variant, offset: 313, length: 1373, content: 其所以喪九牧之地而虛宗廟之國也桀死於鬲山紂縣於赤斾身不先知人又莫之諫此蔽塞之禍也成湯鑒於夏桀故主其心而慎治之是以能長用伊尹而身不失道此其所以代夏王而受九有也文王監於殷紂故主其心而慎治之是以能長用呂望而身不失道此其所以代殷王而受九牧也遠方莫不致其珍故目視備色耳聽備聲口食備味形居備宮名受備號生則天下歌死則四海哭夫是之謂至盛詩曰鳳凰秋秋其翼若干其聲若簫有凰有鳳樂帝之心此不蔽之福也昔人臣之蔽者唐鞅奚齊是也唐鞅蔽於欲權而逐載子奚齊蔽於欲國而罪申生唐鞅戮於宋奚齊戮於晉逐賢相而罪孝兄身為刑戮然而不知此蔽塞之禍也故以貪鄙背叛爭權而不危辱滅亡者自古及今未嘗有之也鮑叔甯戚隰朋仁知且不蔽故能持管仲而名利福祿與管仲齊召公呂望仁知且不蔽故能持周公而名利福祿與周公齊傳曰知賢之謂明輔賢之謂能勉之彊之其福必長此之謂也此不蔽之福也昔賓孟之蔽者亂家是也墨子蔽於用而不知文宋子蔽於欲而不知得慎子蔽於法而不知賢申子蔽於埶而不知知惠子蔽於辭而不知實莊子蔽於天而不知人故由用謂之道盡利矣由俗謂之道盡嗛矣由法謂之道盡數矣由埶謂之道盡便矣由辭謂之道盡論矣由天謂之道盡因矣此數具者皆道之一隅也夫道者體常而盡變一隅不足以舉之曲知之人觀於道之一隅而未之能識也故以為足而飾之內以自亂外以惑人上以蔽下下以蔽上此蔽塞之禍也孔子仁知且不蔽故學亂術足以為先王者也一家得周道舉而用之不蔽於成積也故德與周公齊名與三王並此不蔽之福也聖人知心術之患見蔽塞之禍故無欲無惡無始無終無近無遠無博無淺無古無今兼陳萬物而中縣衡焉是故眾異不得相蔽以亂其倫也何謂衡曰道故心不可以不知道心不知道則不可道而可非道人孰欲得恣而守其所不可以禁其所可以其不可道之心取人則必合於不道人而不知合於道人以其不可道之心與不可道之人論道人亂之本也夫何以知曰心知道然後可道可道然後能守道以禁非道以其可道之心取人則合於道人而不合於不道之人矣以其可道之心與道人論非道治之要也何患不知故治之要在於知道人何以知道曰心心何以知曰虛壹而靜心未嘗不臧也然而有所謂虛心未嘗不滿也然而有所謂一心未嘗不動也然而有所謂靜人生而有知知而有志志也者臧也然而有所謂虛不以所已臧害所將受謂之虛心生而有知知而有異異也者同時兼知之同時兼知之兩也然而有所謂一不以夫一害此一謂之壹心臥則夢偷則自行使之則謀故心未嘗不動也然而有所謂靜不以夢劇亂知謂之靜未得道而求道者謂之虛壹而靜作之則將須道者之虛虛則入將事道者之壹壹則盡將思道者之靜靜則察知道察知道行體道者也虛壹而靜謂之大清明萬物莫形而不見莫見而不論莫論而失位坐於室而見四海處於今而論久遠䟽觀萬物而知其情參稽治亂而通其度經緯天地而材官萬物制割大理而宇宙裏矣恢恢廣廣孰知其極睪睪廣廣孰知其德涫涫紛紛孰知其形明參日月大滿八極夫是之謂大人夫惡有蔽矣哉心者形之君也而神明之主也出令而無所受令自禁也自使也自奪也自取也自行也自止也故口可劫而使墨云形可劫而使詘申心不可劫而使易意是之則受非之則辭故曰心容其擇也無禁必自見其物也雜博其精之至也不貳詩云采采卷耳不盈頃筐嗟我懷人寘彼周行頃筐易滿也卷耳易得也然而不可以貳周行故曰心枝則無知傾則不精貣則疑惑以贊稽之萬物可兼知也身盡其故則美類不可兩也故知者擇一而壹焉農精於田而不可以為田師賈精於市而不可以為市師工精於器而不可以為器師有人也不能此三技而可使治三官曰精於道者也非精於物者也精於物者以物物精於道者兼物物故, SBCK: ''}
