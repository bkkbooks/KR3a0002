  - {type: variant, offset: 0, length: 3149, content: 解蔽篇第二十一凡人之患蔽於一曲而闇於大理治則復經兩疑則惑矣天下無二道聖人無兩心今諸侯異政百家異說則必惑是惑非惑治惑亂亂國之君亂家之人此其誠心莫不求正而以自為也妬繆於道而人誘其所迨也私其所積唯恐聞其惡也倚其所私以觀異術唯恐聞其美也是以與治離走而是己不輟也豈不蔽於一曲而失正求也哉心不使焉則白黑在前而目不見雷鼓在側而耳不聞況於使者乎德道之人亂國之君非之上亂家之人非之下豈不哀哉故為蔽欲為蔽惡為蔽始為蔽終為蔽遠為蔽近為蔽博為蔽淺為蔽古為蔽今為蔽凡萬物異則莫不相為蔽此心術之公患也昔人君之蔽者夏桀殷紂是也桀蔽於末喜斯觀而不知關龍逄以惑其心而亂其行紂蔽於妲己飛廉而不知微子啟以惑其心而亂其行故群臣去忠而事私百姓怨非而不用賢良退處而隱逃此其所以喪九牧之地而虛宗廟之國也桀死於鬲山紂縣於赤斾身不先知人又莫之諫此蔽塞之禍也成湯鑒於夏桀故主其心而慎治之是以能長用伊尹而身不失道此其所以代夏王而受九有也文王監於殷紂故主其心而慎治之是以能長用呂望而身不失道此其所以代殷王而受九牧也遠方莫不致其珍故目視備色耳聽備聲口食備味形居備宮名受備號生則天下歌死則四海哭夫是之謂至盛詩曰鳳凰秋秋其翼若干其聲若簫有凰有鳳樂帝之心此不蔽之福也昔人臣之蔽者唐鞅奚齊是也唐鞅蔽於欲權而逐載子奚齊蔽於欲國而罪申生唐鞅戮於宋奚齊戮於晉逐賢相而罪孝兄身為刑戮然而不知此蔽塞之禍也故以貪鄙背叛爭權而不危辱滅亡者自古及今未嘗有之也鮑叔甯戚隰朋仁知且不蔽故能持管仲而名利福祿與管仲齊召公呂望仁知且不蔽故能持周公而名利福祿與周公齊傳曰知賢之謂明輔賢之謂能勉之彊之其福必長此之謂也此不蔽之福也昔賓孟之蔽者亂家是也墨子蔽於用而不知文宋子蔽於欲而不知得慎子蔽於法而不知賢申子蔽於埶而不知知惠子蔽於辭而不知實莊子蔽於天而不知人故由用謂之道盡利矣由俗謂之道盡嗛矣由法謂之道盡數矣由埶謂之道盡便矣由辭謂之道盡論矣由天謂之道盡因矣此數具者皆道之一隅也夫道者體常而盡變一隅不足以舉之曲知之人觀於道之一隅而未之能識也故以為足而飾之內以自亂外以惑人上以蔽下下以蔽上此蔽塞之禍也孔子仁知且不蔽故學亂術足以為先王者也一家得周道舉而用之不蔽於成積也故德與周公齊名與三王並此不蔽之福也聖人知心術之患見蔽塞之禍故無欲無惡無始無終無近無遠無博無淺無古無今兼陳萬物而中縣衡焉是故眾異不得相蔽以亂其倫也何謂衡曰道故心不可以不知道心不知道則不可道而可非道人孰欲得恣而守其所不可以禁其所可以其不可道之心取人則必合於不道人而不知合於道人以其不可道之心與不可道之人論道人亂之本也夫何以知曰心知道然後可道可道然後能守道以禁非道以其可道之心取人則合於道人而不合於不道之人矣以其可道之心與道人論非道治之要也何患不知故治之要在於知道人何以知道曰心心何以知曰虛壹而靜心未嘗不臧也然而有所謂虛心未嘗不滿也然而有所謂一心未嘗不動也然而有所謂靜人生而有知知而有志志也者臧也然而有所謂虛不以所已臧害所將受謂之虛心生而有知知而有異異也者同時兼知之同時兼知之兩也然而有所謂一不以夫一害此一謂之壹心臥則夢偷則自行使之則謀故心未嘗不動也然而有所謂靜不以夢劇亂知謂之靜未得道而求道者謂之虛壹而靜作之則將須道者之虛虛則入將事道者之壹壹則盡將思道者之靜靜則察知道察知道行體道者也虛壹而靜謂之大清明萬物莫形而不見莫見而不論莫論而失位坐於室而見四海處於今而論久遠䟽觀萬物而知其情參稽治亂而通其度經緯天地而材官萬物制割大理而宇宙裏矣恢恢廣廣孰知其極睪睪廣廣孰知其德涫涫紛紛孰知其形明參日月大滿八極夫是之謂大人夫惡有蔽矣哉心者形之君也而神明之主也出令而無所受令自禁也自使也自奪也自取也自行也自止也故口可劫而使墨云形可劫而使詘申心不可劫而使易意是之則受非之則辭故曰心容其擇也無禁必自見其物也雜博其精之至也不貳詩云采采卷耳不盈頃筐嗟我懷人寘彼周行頃筐易滿也卷耳易得也然而不可以貳周行故曰心枝則無知傾則不精貣則疑惑以贊稽之萬物可兼知也身盡其故則美類不可兩也故知者擇一而壹焉農精於田而不可以為田師賈精於市而不可以為市師工精於器而不可以為器師有人也不能此三技而可使治三官曰精於道者也非精於物者也精於物者以物物精於道者兼物物故君子壹於道而以贊稽物壹於道則正以贊稽物則察以正志行察論則萬物官矣昔者舜之治天下也不以事詔而萬物成處一之危其榮滿側養一之微榮矣而未知故道經曰人心之危道心之微危微之幾惟明君子而後能知之故人心譬如槃水正錯而勿動則湛濁在下而清明在上則足以見鬚眉而察膚理矣微風過之湛濁動乎下清明亂於上則不可以得大形之正也心亦如是矣故導之以理養之以清物莫之傾則足以定是非決嫌疑矣小物引之則其正外易其心內傾則不足以決庶理矣故好書者眾矣而倉頡獨傳者壹也好稼者眾矣而后稷獨傳者壹也好樂者眾矣而夔獨傳者壹也好義者眾矣而舜獨傳者壹也倕作弓浮游作矢而羿精於射奚仲作車桑杜作乘馬而造父精於御自古及今未嘗有兩而能精者也曾子曰是其庭可以搏鼠惡能與我歌矣空石之中有人焉其名曰觙其為人也善射以好思耳目之欲接則敗其思蚊䖟之聲聞則挫其精是以闢耳目之欲而遠蚊蝱之聲閑居靜思則通思仁若是可謂微乎孟子惡敗而出妻可謂能自彊矣有子惡臥而焠掌可謂能自忍矣未及好也闢耳目之欲可謂能自彊矣未及思也蚊蝱之聲聞則挫其精可謂危矣未可謂微也夫微者至人也至人也何彊何忍何危故濁明外景清明內景聖人縱其欲兼其情而制焉者理矣夫何彊何忍何危故仁者之行道也無為也聖人之行道也無彊也仁者之思也恭聖人之思也樂此治心之道也凡觀物有疑中心不定則外物不清吾慮不清則未可定然否也冥冥而行者見寢木以為伏虎也見植林以為後人也冥冥蔽其明也醉者越百步之溝以為蹞步之澮也俯而出城門以為小之閨也酒亂其神也厭目而視者視一以為兩掩耳而聽者聽漠漠而以為哅哅埶亂其官也故從山上望牛者若羊而求羊者不下牽也遠蔽其大也從山下望木者十仞之木若箸而求箸者不上折也高蔽其長也水動而景搖人不以定美惡水埶玄也瞽者仰視而不見星人不以定有無用精惑也有人焉以此時定物則世之愚者也彼愚者之定物以疑決疑決必不當夫苟不當安能無過乎夏首之南有人焉曰涓蜀梁其為人也愚而善畏明月而宵行俯見其影以為伏鬼也卬視其髮以為立魅也背而走比至其家者失氣而死豈不哀哉凡人之有鬼也必以其感忽之閒疑玄之時定之此人之所以無有而有無之時也而己以正事故傷於溼而擊鼓鼓痺則必有敝鼓喪豚之費矣而未有俞疾之福也故雖不在夏首之南則無以異矣凡以知人之性也可以知物之理也以可以知人之性求可以知物之理而無所疑止之則沒世窮年不能徧也其所以貫理焉雖億萬已不足以浹萬物之變與愚者若一學老身長子而與愚者若一猶不知錯夫是之謂妄人故學也者固學止之也惡乎止之曰止諸至足曷謂至足曰聖也聖也者盡倫者也王也者盡制者也兩盡者足以為天下極矣故學者以聖王為師案以聖王之制為法法其法以求其統類類以務象效其人嚮是而務士也類是而幾君子也知之聖人也故有知非以慮是則謂之攫有勇非以持是則謂之賊察孰非以分是則謂之篡多能非以脩蕩是則謂之知辨利非以言是則謂之詍傳曰天下有二非察是是察非謂合王制與不合王制也天下有不以是為隆正也然而猶有能分是非治曲直者邪若夫非分是非非治曲直非辨治亂非治人道雖能之無益於人不能無損於人案直將治怪說玩奇辭以相撓滑也案彊鉗而利口厚顏而忍詬無正而恣睢妄辨而幾利不好辭讓不敬禮節而好相推擠此亂世姦人之說也則天下之治說者方多然矣傳曰析辭而為察言物而為辨君子賤之博聞彊志不合王制君子賤之此之謂也為之無益於成也求之無益於得也憂戚之無益於幾也則廣焉能棄之矣不以自妨也不少頃干之胸中不慕往不閔來無邑憐之心當時則動物至而應事起而辨治亂可否昭然明矣周而成泄而敗明君無之有也宣而成隱而敗闇君無之有也故君人者周則讒言至矣直言反矣小人邇而君子遠矣詩云墨以為明狐狸其蒼此言上幽而下險也君人者宣則直言至矣而讒言反矣君子邇而小人遠矣詩曰明明在下赫赫在上此言上明而下化也, WYG: 荀}
