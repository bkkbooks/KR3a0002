  - {type: variant, offset: 100, length: 0, content: '', SBCK: 之度已則以繩接人則用枻則以繩墨接人則牽引而致之言正枻牽引也度已猶正已也君子正已度大各反枻以世反韓侍郎云枻者檠枻也正弓弩之器也已而馴致人也或曰枻當爲拽枻楫也言如以楫櫂進舟􅂳也度已以繩故足以爲天下法則矣接人用枻故能寛容因求以成天下之大事矣在衆成事故君子賢而能容罷事者音疲罷弱不任知而能容愚博而能容淺粹而能容雜夫是之謂兼術術兼容之法粹專一也兼詩曰徐方既同天子之功此之謂也物亦猶天子之同徐方也詩大雅常武之篇言君子容談說之術矜莊以莅之端誠以處之堅彊以持之分别以諭之譬稱以明之欣驩芬薌以送之寶之珍之責之神之如是則說常無不受神之謂目神異其説不敢慢也說並音稅稱尺言談説之法如此人乃信之芬薌言至芳絜也與香同證反薌雖不說人人莫}
  - {type: page-break, offset: 100, content: '', id: KR3a0002_SBCK_003-10b}
  - {type: variant, offset: 100, length: 0, content: '', WYG: 爲甚所善謂已所好尚也故贈人以言重於金石珠玉觀人以言美於黼黻文章觀人以言謂使人觀其言黼黻文章皆色之美者白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章聽人之言樂於鐘鼓琴瑟使人聽其言故君子之於言無厭無厭倦鄙夫反是好其實不恤其文但好其質而不知文飾若墨子之屬是以終身不免埤汙傭俗埤汙皆下也謂鄙陋也埤與痺音同渚水處謂之汙亦地之下者也汙一孤反故易曰括囊無咎無譽腐儒之謂也腐儒如杇腐之物無所用也引易以喻不談說者凡說之難以至髙遇至卑以至治接至亂以先王之至髙至治之道說末世至卑至亂之君所以為難也說音稅未可直至也逺舉則病繆近世則病傭未可直至言必在援引古今也逺舉上世之事則患繆妄下舉近世之事則患傭鄙也善者於是間也亦必逺舉而不繆近世而不傭與時遷徙與世偃仰緩急贏絀贏餘也贏絀猶言伸屈也府然若渠堰櫽括之於已也府與俯同就物之貌或讀為附渠堰所以制水櫽括所以制木君子制人亦猶此也曲得所謂焉然而不折傷言談説委曲皆得其意之所謂然而不折傷其道也故君子之度已則以繩接人則用抴抴牽引也度已猶正已也君子正已則以繩墨接人則牽引而致之言正已而馴致人也或曰抴當為拽抴揖也言如以揖擢進舟舩也度大各反抴以世反韓侍郎云抴者檠抴也匡弓弩之器也度已以繩故足以為天下法則矣接人用抴故能寛容因求以成天下之大事矣成事在衆故君子賢而能容罷罷弱不任事者音疲知而能容愚博而能容淺粹而能容雜夫是之謂兼術粹專一也兼術兼容之法詩曰徐方既同天子之功此之謂也詩大雅常武之篇言君子容物亦猶天子之同徐方也談說之術齊莊以涖之端誠以處之堅彊以持之分别以喻之譬稱以明之欣驩芬薌以送之寳之珍之貴之神之如是則說常無不受言談説之法如此人乃信之芬薌言至芳潔也神之謂自神異其説不敢慢也說音稅稱尺證反薌與香同雖不說人人莫}
