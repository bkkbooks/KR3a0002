  - {type: variant, offset: 375, length: 2, content: 溫溫, WYG: 或出或處能靜謂安時處順也脩正者也知命者也著是者也明著其時是之事不使人疑其姦詐也今之所謂處士者無能而云能者也云能自言其能也慎子曰勁而害能則亂也云能而害無能則亂也蓋戰國時以言能為云能當時之語也無知而云知者也利心無足而佯無欲者也好利不知足而詐為無欲者也行偽險穢而彊髙言謹慤者也以不俗為俗以不合俗人自為其俗也離蹤而跂訾者也訾讀為恣離蹤謂離於俗而放蹤跂恣謂跂足違俗而恣其志志意皆違俗自髙之貌或曰蹤當為縰傳寫誤耳縱與纚同步也離縱謂離於俗而步去跂訾謂跂足自髙而訾毁於人離力智反跂丘弭反訾將此反士君子之所能不能為君子能為可貴不能使人必貴已可貴貴道德也能為可信不能使人必信已能為可用不能使人必用已可用謂才能也故君子恥不脩不恥見汙見汙為人所汙穢也恥不信不恥不見信恥不能不恥不見用是以不誘於譽不恐於誹虛譽不能誘誹謗不能動率道而行端然正已不為物傾側夫是之謂誠君子誠實也謂無虚偽也詩云温温}
