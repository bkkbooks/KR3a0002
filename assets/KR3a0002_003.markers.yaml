  - {type: variant, offset: 8, length: 0, content: '', SBCK: 淺薄曲直有以相縣矣然而仁人}
  - {type: variant, offset: 8, length: 0, content: '', krp: 淺薄曲直有以相縣矣然而仁人}
  - {type: variant, offset: 9, length: 0, content: '', SBCK: 能推知士不能明是人之三必窮也也言智慮德曲直猶能否言不知已之不及也知音智行下孟反縣讀爲懸行至淺薄其能否與人又相縣逺不能推讓明白之人有此三數行者以爲上則必危爲下則必滅詩曰雨雪瀌瀌宴然聿消莫肯下隧式居屢驕此之謂也聲之誤耳晛日氣也隧讀爲隨屢讀爲婁婁歛詩小雅角弓之篇今詩作見晛曰消作宴然蓋矣幽王曽莫肯下隨於人用此居處歛其驕慢之過也也言雨雪瀌瀌然見日氣而自消喻欲爲善則惡自消人之所以爲人者何巳也之人而}
