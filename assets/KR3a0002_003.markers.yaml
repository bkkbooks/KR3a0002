  - {type: variant, offset: 3, length: 6, content: 第三君子行不, WYG: 今詩作見晛曰消盖聲之誤耳晛日氣也遺讀為隨婁歛也言雨雪瀌瀌然見日氣自消喻欲為善則惡自消矣幽王曾莫肯下隨於人用此居處歛其驕慢之過也人之所以為人者何已也已與以同問何以謂之人而}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 五多以此惑世時人或矜其狀貌而忽於務實相視也視其骨狀以知吉凶貴賤也妄誕者刑法家有相人二十四篇故荀卿作此篇非之漢書相人古之人無有也學者不道也說道古者有姑布子卿襄子者或本無姑字姑布姓子卿名相趙今之世梁有唐舉蔡澤者相李兊相人之形狀顔色而知其吉凶妖祥世俗稱之古之人無有也學者不道也深非之也再}
  - {type: page-break, offset: 4, content: '', id: KR3a0002_SBCK_003-1b}
  - {type: variant, offset: 4, length: 0, content: '', krp: 五多以此惑世時人或矜其狀貌而忽於務實相視也視其骨狀以知吉凶貴賤也妄誕者刑法家有相人二十四篇故荀卿作此篇非之漢書相人古之人無有也學者不道也說道古者有姑布子卿襄子者或本無姑字姑布姓子卿名相趙今之世梁有唐舉蔡澤者相李兊相人之形狀顔色而知其吉凶妖祥世俗稱之古之人無有也學者不道也深非之也再}
