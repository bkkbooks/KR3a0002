  - {type: variant, offset: 375, length: 2, content: 溫溫, krp: 或出脩正者也知命者也箸是者也使人疑其姦詐也明箸其時是之事不今之所謂處士者無能而云能者也亂也云能而害無能則亂也蓋戰國時云能自言其能也慎子曰勁而害能則當時之語也以言能爲云能無知而云知者也利心無足而佯無欲者也詐爲無欲者也好利不知足而行僞險穢而彊髙言謹愨者也以不俗爲俗自爲其俗也以不合俗人離縱而跂訾者也而恣其志意皆違俗自髙之貌或曰縱當爲縰傳寫訾讀爲恣離縱謂離於俗而放縱跂恣謂跂足違俗跂足自髙而訾毁於人離力智反跂丘氏反縱所綺反誤耳縱與纚同步也離縱謂離於俗而步去跂訾亦謂士君子之所能不能爲君子能爲可貴不能使人必貴已道德也可貴謂能爲可信不能使人必信已能爲可用不能使人必用已才能也可用謂故君子恥不脩不恥見汙所汙穢也見汙爲人恥不信不恥不見信恥不能不耻不見用是以不誘於譽不恐於誹能誘誹虚譽不能動謗不率道而行端然正已不爲物傾側夫是之謂誠君子無虚僞也誠實也謂詩云温温}
