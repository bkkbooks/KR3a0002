  - {type: variant, offset: 779, length: 317, content: 善其言而類焉者應矣故馬鳴而馬應之非知也其勢然也故新浴者振其衣新沐者彈其冠人之情也其誰能以己之潐潐受人之掝掝者哉君子養心莫善於誠致誠則無它事矣唯仁之為守唯義之為行誠心守仁則形形則神神則能化矣誠心行義則理理則明明則能變矣變化代興謂之天德天不言而人推高焉地不言而人推厚焉四時不言而百姓期焉夫此有常以至其誠者也君子至德嘿然而喻未施而親不怒而威夫此順命以慎其獨者也善之為道者不誠則不獨不獨則不形不形則雖作於心見於色出於言民猶若未從也雖從必疑天地為大矣不誠則不能化萬物聖人為知矣不誠則不能化萬民父子為親矣不誠則䟽君上為尊矣不誠則卑夫誠者君子之所守也而政事之本也唯所居以其類至操之則得之舍之則失之操而得之則輕輕則獨行獨行而不舍則濟矣濟而材盡長遷而不, SBCK: 䂓}
