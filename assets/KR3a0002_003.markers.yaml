  - {type: variant, offset: 389, length: 1, content: 崇, SBCK: 之容其冠進其衣逢其容良冠在進謂掖也良謂樂易也前也逢大也謂逢儼然壯然祺然蕼然恢恢然廣廣然昭昭然蕩蕩然是父兄之容也貌壯然不可儼然矜莊之憂懼之貌蕼當爲肆謂寛舒之貌恢恢廣廣皆容衆貌昭昭明犯之貌或當爲莊祺然蕼然未詳或曰祺祥也吉也謂安泰不恢夷之貌顯之貌蕩蕩其冠進其衣逢其容愨敬謹儉然恀然輔然端然訾然洞然綴綴然瞀瞀然是子弟之容也爾雅曰恀恃也郭云江東呼母爲恀儉然自卑謙之貌恀然恃尊長之貌洞洞乎其敬也綴綴然不乖離之貌謂相連綴也瞀瞀然不敢正音紙輔然相親附之貌端然不傾倚之貌洞然恭敬之貌禮記曰貌視之吾語汝學者之嵬容形狀嵬巳解於上說學者爲嵬行之其冠絻其纓禁緩其容簡連俯也纓冠之繫也禁緩未絻當爲俛謂太向前而低傲慢不前之貌紟其禁反連讀如徃蹇來連之連詳或曰讀爲紟紟帶也言其纓大如帶而緩也簡連填填然狄狄然莫莫然瞡瞡然瞿瞿然盡盡然盱盱然之貌或動而跳躍或靜而不言皆謂舉指無􅁪也瞡瞡未填填滿足貌狄讀爲趯跳躍之貌莫讀爲貊貊靜也不言物之貌盱盱張目之貌皆謂視瞻不平或大察也盱許于反詳或曰瞡與規同規規小見之貌瞿瞿瞪視之貌盡盡極視盡酒食聲色之中瞞瞞然瞑瞑然視不審貌謂好恱之瞞瞞閇目之貌瞑瞑莫干反瞑母丁反甚佯若不視也瞞禮節之中則疾疾然訾訾然憎謂訾也嫉毁勞苦事業之中則儢儢然離離然偷儒而罔無廉恥而忍謢徯音訽是學者之嵬也心不力也音吕偷儒謂苟辟事之勞苦也罔謂罔冐不畏}
