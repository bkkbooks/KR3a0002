  - {type: variant, offset: 374, length: 0, content: '', WYG: 云匪上帝不時殷不用舊雖無老成人尚有典刑曾是莫聽大命以傾此之謂也詩大雅蕩之篇鄭云老成人伊尹伊陟臣扈之屬也典刑常事故法也古之所謂士仕者厚敦者也合羣者也士仕謂士之入仕合謂和合羣衆也樂富貴者也樂其道也樂分施者也施或所宜反逺罪過者也逺于願反務事理者也務使事有條理羞獨富者也使家給人足也今之所謂士仕者汙漫者也賊亂者也汙漫已解在榮辱篇恣睢者也恣睢已解於上貪利者也觸抵者也恃權勢而忤人無禮義而唯權勢之嗜者也古之所謂處士者德盛者也能靜者也處士不仕者也易}
