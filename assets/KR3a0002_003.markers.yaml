  - {type: variant, offset: 0, length: 2, content: 不苟, SBCK: 荀子卷第三登仕郎守大理評事揚倞注非相}
  - {type: page-break, offset: 0, content: '', id: KR3a0002_SBCK_003-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 於葉名諸梁字子髙楚僣稱王其大夫稱公白公亦是也㣲細也葉音攝然白公之亂也令尹子西司馬子期皆死焉白公楚太子建之子平王之孫子西楚平王長庶子公子申子期亦平王子公子結葉公子髙入據楚誅白公定楚國如反手耳仁義功名善於後世故事}
