  - {type: variant, offset: 373, length: 0, content: '', SBCK: 章具焉佛然乎世之俗起焉東南隅謂之窔西南隅謂之奥佛讀爲勃勃然興起貌窔一弔反言不出室堂之内也斂聚集之貌則六説者不能入也十二子者不能親也無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容諸侯所能畜一國所能容言王者之佐雖在下位非國能畜者故仲尼所至輕去也或曰時君不知其賢無一君一成名況乎諸侯莫不願以爲臣不願得以爲臣或曰既成名之後則王者之輔佐也況況比也言其所成之名比況於人莫與爲偶故諸侯莫容也或曰況猶益也國語驪姬曰衆況厚之諸侯莫不願得以爲臣乎未知其賢則無國能是聖人之不得埶者也仲尼子弓是也一天下財萬物裁同財與長養人民兼利天下通達之屬莫不從服至人力所通者也通達之屬謂舟車所六說者立息十二子者遷化從化遷而則是聖人之得勢者舜禹是也今夫仁人也將何務哉上則法舜禹之制下則法仲尼子弓之義以務息十二子之說如是則天下之害除仁人之事畢聖王之跡箸矣信信信也疑疑亦信也雖不同皆歸於信也信可信者疑可疑者意貴賢仁也賤不肖亦仁也言而當知也黙而當亦知也故知黙由知言也不知爲不知是知也論語曰知之爲知之浪反當丁故多言而類聖人也少言而法君子也少言而法謂不敢自造言説所言皆守典法也言雖多而不流􅊺皆類於禮義是聖人之制作者也多少無法而流湎然雖辯小人也反沈者不復出也湎沈也流者不復故勞力而不當民務謂之姦事民之務民務四勞知而不律先王謂之姦心法律辯說譬諭齊給便利而不順禮義謂之姦說亦謂言辭敏捷也齊疾也給急也便利此三姦者聖王之所禁也知而險賊而神賊害不測如用智於險又也神爲詐而巧爲詐巧於言無用而辯無用也言辯而辯不給惠而察道理而聦察也惠順也辭辯不順治之大殃也行辟而堅曰僻辟讀飾非而好非也好飾玩姦而澤而使有潤澤也玩與翫同習姦言辯而逆古之大禁也於常理逆者乖知而無法異見騁其如字也知勇而無憚死輕察辯而操僻淫操持僻淫之事爲察察之辯而刀反操七大而用之大而用之也以前數事爲好姦而與衆衆人共之好姦而與同之也謂使人利足而迷惑不顧禍患也苟求利足而迷負石而墜狄負石謂申徒亦利足而迷者之類也投河言好名以至此也是天下之所弃也兼服天下之心髙上尊貴不以驕人不驕人在貴位聦明聖知不以窮人齊給速通不爭先人剛毅勇敢不以傷人不知則問不能則學雖能必讓然後爲德賢之德也然後爲聖遇君則脩臣下之義遇鄉則脩長幼之義之中也在鄉黨遇長則脩子弟之義遇友則脩禮節辭讓之義遇賤而少者則脩告導寛容之義無不愛也無不敬也無與人爭也恢然如天地之苞萬物如是則賢者貴之不肖者親之如是而不服者則可謂訞怪狡猾之人矣妖同訞與雖則子弟之中刑及之而宜人子弟之中亦宜刑戮妖怪狡猾之人雖在家公法乎及之況}
