  - {type: variant, offset: 639, length: 0, content: '', krp: 應當侯維服事也鄭云媚愛兹詩大雅下武之篇一人謂}
  - {type: variant, offset: 640, length: 0, content: '', SBCK: 也哉武王之嗣行祖考之事謂伐紂定天下引此者明臣事君亦猶此也可愛乎武王能當此順德謂能成其祖考之功也服事也明祖考也武王之繼求善處大重理任大事大位也大重謂擅寵於萬乗之國必無後患之術莫若好同之與之同好賢人也者援賢博施除怨而無妨害人念舊惡除怨不能耐任之則慎行此道也能者雖不欲用必忍而用之耐忍也慎讀爲順言人有賢道耐乃代反則順巳所行之能而不耐任忍急用之有能者不且恐失寵則莫若早同之推賢讓能而安隨其後如是有寵則必榮失寵則必無罪是事君者之寶而必無後患之術也其言駁雜今此又言以或曰荀}
