  - {type: variant, offset: 553, length: 1, content: 通, krp: 充屈静而理謂不隕穫也理謂不失其道和而理謂不富}
  - {type: variant, offset: 554, length: 0, content: '', WYG: 以為仁}
  - {type: variant, offset: 555, length: 1, content: 文, SBCK: 施廣貧則用節可貴可賤也可富可貧也可殺}
  - {type: variant, offset: 555, length: 0, content: '', WYG: 必聖立隆而勿貳也仁謂仁人聖亦通也以事君則必通達以為仁則必有聖知之名者在於所立敦厚而專一也此謂可行天下之術也然後恭敬以先之忠信以統之慎謹以行之端慤以守之頓窮則疾力以申重之以敦厚不貳為本然後輔之以恭敬之屬頓謂困躓也疾力勤力也困危之時則尤加勤力而不敢怠惰申重猶再三也君雖不知無怨疾之心功雖甚大無伐德之色省求多功愛敬不勌如是則常無不順矣省少也少所求即多立功勞省所景反以事君則必通以為仁則必聖夫是之謂天下之術少事長賤事貴不肖事賢是天下之通義也有人也勢不在人上而羞為人下是姦人之心也志不免乎姦心行不免乎姦道而求有君子聖人之名辟之是猶伏而咶天救經而引其足也辟讀為譬咶與䑛同經縊也伏而䑛天愈益逺也救經而引其足愈益急也經音徑說必不行矣俞務而俞逺俞讀為愈故君子時屈則屈時伸則伸也勢在上則為上在下則為下必當其分安有勢不在上而羞為下之心哉荀子卷三欽定四庫全書荀子卷四唐楊倞註儒效篇第八效功也大儒之效武王崩成王㓜周公屏成王而及武王以屬天下惡天下之倍周也屏蔽及繼屬續也屬之欲反履天下之籍籍謂天下之圖籍也聽天下之斷偃然如固有之而天下不稱貪焉偃然猶安然固有之謂如固合有此位也殺管叔虚殷國而天下不稱戾焉虚讀為墟戾暴也墟殷國謂殺武庚遷殷頑民于洛邑朝歌為墟也兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉左氏傳成鮮對魏獻子曰昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人皆舉親也與此數略同言四十人蓋舉成數又曰昔周公弔二叔之不咸故封建親戚以蕃周室管蔡郕霍魯衛毛聃郜雍曹滕畢原鄷郇}
