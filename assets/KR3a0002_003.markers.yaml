  - {type: variant, offset: 371, length: 0, content: '', SBCK: 姦人之雄聖王起所以先誅也然後盜賊次之盜賊得變此不得變也使自新也變謂教之非十二子篇第六假今之世亂之世治世則姦言無所容故十二子借亂世假如今之世也或曰假借也今之世謂戰國昬衆也以惑飾邪說文姦言以􅞏亂天下僥同􅞏與欺惑愚衆矞宇嵬􅃈大也放蕩恢大也嵬謂爲狂險之行者也􅃈矞與譎同詭詐也又余律反宇未詳或曰宇亦猶山之髙不平也周禮大司樂云大傀烖則去樂鄭云傀猶怪也晏者謂爲姦細之行者也說文云嵬髙不平也今此言嵬者其行狂險傀行自勤於飢寒命之曰狂僻之民明上之所禁也嵬當與傀義同子春秋曰不以上爲本不以民爲憂内不恤其家外不顧其游夸言又牛彼反音五每反使天下混然不知是非治亂之所存者有人矣之貌有在也混然無分别縱情性安恣睢禽獸行義則與禽獸無異故曰禽獸行睢許季反恣睢矜放之貌言任情性所爲而不知禮不足以合文通治文義通於治道不足合於古之然而其持之有故其言之成理足以欺惑愚衆曰持之有故又其言論能妄稱古人亦有如此者故足欺惑愚人衆人矣成文理故曰言之成理是它嚻魏牟也本楚平王孫有曰公它嚻未詳何代人世志道家有公子牟四篇班固曰先莊子莊子稱之今莊子有公子牟它成豈同族乎韓詩外傳作范魏牟牟魏公子封於中山漢書藝文公孫龍之言公孫龍平原君之客而張湛以爲文侯子據年代非也稱莊子之言以折公孫龍據即與莊子同時也又列子稱公子牟解送之未知何者爲定也說苑曰公子牟東行穰侯忍情性綦谿利跂性也綦谿未忍謂違驕其足也莊子曰楊墨乃始離跂自以爲得離力智反跂丘氏反詳蓋與跂義同也利與離同離跂違俗自絜之貌謂離於物而跂苟以分異人爲髙人以爲髙行也苟求分異不同於不足以合大衆明大分不足明大分大分謂忠孝之大義也既求分異則不足合大衆苟立小節故然而其持之有故其言之成理足以欺惑愚衆是陳仲史鰌也上巳解不知一天下建國家之權稱權稱言不知輕重稱尺證反不知齊一天下建立國家之上功用大儉約而僈差等也僈輕也輕僈差等謂欲使君臣上下同勞苦也功用功力也大讀曰太言以功力爲上而過儉約曽不足以容辨異縣君臣分别而縣隔君臣也上下同等則其中不容然而其持之有故其言之成理足以欺惑愚衆是墨翟宋鈃也時孟子作宋牼牼與鈃同音口莖反宋鈃宋人與孟子尹文子彭蒙慎到同尚法而無法下脩而好作法爲上而自無法以脩尚上也言所著書雖以言自相矛盾也立爲下而好作爲上則取聽於上下則取從於俗下之意也言苟順上終日言成文典及紃察之則倜然無所歸宿成文典若循察則䟽逺無所指歸也紃與循同倜然䟽逺貌宿止也雖言不可以經國定分俗故法度不立也取聽於上取從於然而其持之有故其言之成理足以欺惑愚衆是慎到田駢也學本黄老大歸名法慎到已解上田駢齊人遊稷下著書十五篇其不法先王不是禮義義為是不以禮而好治怪說玩􅄾辭為竒異之竒玩與翫同􅄾讀甚察而不惠順惠辯而無用多事而寡功不可以爲治綱紀然而其持之有故其言之成理足以欺惑愚衆是惠施鄧析也略法先王而不知其統不知體統統謂綱紀也言其大略雖法先王而然而猶材劇志大聞見雜博案徃舊造說謂之五行前案行五行五常仁義禮智者也古之事而自造其說謂之五甚僻違而無類幽隱而無說閉約而無解戾而不知善類也幽隱無說閉約無約結也解說也僻違無類謂乖僻違作方略也荀卿常言法後王治賞世而孟軻子思以爲必行堯舜文解謂其言幽隱閉結而不能自解說謂伹言堯舜之道而不知其興僻違無類孟子曰管仲曾西之所不爲解佳買反武之道然後爲治不知隨時設教救當世之弊故言案飾其辭而祗敬之曰此真先君子之言也說先君子孔言自敬其辭也子子思唱之孟軻和之軻鄒人字子輿皆著書七篇子思孔子之孫名伋字子思孟世俗之溝猶瞀儒嚾嚾然不知其所非也區瞀與此義同嚾嚾喧囂之貌謂爭辨也拘音㓂猶音柚溝讀爲拘拘愚也猶猶豫不定也瞀闇也漢書五行志作遂受而傳之以爲仲尼子游爲兹厚於後世尼仲德厚於後世也子游爲此言垂是則子思孟軻之罪也若夫緫方略齊言行壹統類而羣天下之英傑而告之以大古教之以}
