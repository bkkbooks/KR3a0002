  - {type: variant, offset: 1268, length: 355, content: 君下則能愛民物至而應事起而辨若是則可謂通士矣不下比以闇上不上同以疾下分爭於中不以私害之若是則可謂公士矣身之所長上雖不知不以悖君身之所短上雖不知不以取賞長短不飾以情自竭若是則可謂直士矣庸言必信之庸行必慎之畏法流俗而不敢以其所獨是若是則可謂愨士矣言無常信行無常貞唯利所在無所不傾若是則可謂小人矣公生明偏生闇端愨生通詐偽生塞誠信生神夸誕生惑此六生者君子慎之而禹桀所以分也欲惡取舍之權見其可欲也則必前後慮其可惡也者見其可利也則必前後慮其可害也者而兼權之孰計之然後定其欲惡取舍如是則常不大陷矣凡人之患偏傷之也見其可欲也則不慮其可惡也者見其可利也則不顧其可害也者是以動則必陷為則必辱是偏傷之患也人之所惡者吾亦惡之夫富貴者則類傲之夫貧賤者則求柔之是非仁人之情也是姦人將以盜名於晻世者也險莫大焉故曰盜名不如盜貨田仲史鰌不如盜也, WYG: ''}
