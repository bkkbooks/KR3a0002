  - {type: variant, offset: 556, length: 0, content: '', WYG: 之昭也䢴晉應韓武之穆也凡蒋邢茅胙祭周公之𦙍也餘國名淺學難盡詳究教誨開導成王使諭於道而能揜迹於文武開導謂開通道逹揜襲也周公歸周周公所歸畿内之國亦名周春秋周公黒肩蓋其後也言周公自歸其國也反籍於成王而天下不輟事周然而周公北面而朝之待其固安之後北面為臣明攝政非為已也天子也者不可以少當也不可少頃當此位也不可以假攝為也周公所以少頃假攝天子之位蓋權宜以安周室也能則天下歸之不能則天下去之是以周公屏成王而及武王以屬天下惡天下之離周也成王冠成人周公歸周反籍焉明不滅主之義也周公無天下矣鄕有天下今無天下非擅也鄕讀為向下同擅與禪同言非禪譲與成王也成王鄕無天下今有天下非奪也變勢次序節然也節期也權變次序之期如此也故以枝代主而非越也枝枝子周公武王之弟故曰枝主成王也以弟誅兄而非暴也謂殺管叔管叔周公之兄也君臣易位而非不順也時不得不然故易位非為不順因天下之和遂文武之業明枝主之義抑亦變化矣天下厭然猶一也厭然順從之貌一渉反非聖人莫之能為夫是之謂大儒之效秦昭王問孫卿曰儒無益於人之國漢宣帝名詢劉向編録故以荀卿為孫卿孫卿子曰儒者法先王隆禮義謹乎臣子而致貴其上者也謹乎臣子謂使不敢為非致極也人主用之則勢在夲朝而宜言儒者得權勢在夲朝則事皆合宜不用則退編百姓而慤必為順下矣必不為悖亂也雖窮困凍餧必不以邪道為貪無置錐之地}
  - {type: page-break, offset: 556, content: '', id: KR3a0002_WYG_004-2a, image: WYG0695/WYG0695-0152a.png}
  - {type: page-break, offset: 556, content: '', id: KR3a0002_WYG_004-2b, image: WYG0695/WYG0695-0152b.png}
