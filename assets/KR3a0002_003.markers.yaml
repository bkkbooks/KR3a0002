  - {type: variant, offset: 560, length: 1, content: 約, WYG: 美政在下位則美俗儒之為人下如是矣王曰然則其為人上何如孫卿曰其為人上也廣大矣志意定乎内禮節脩乎朝法則度量正乎官忠信愛利形乎下官百官形見也行一不義殺一無罪}
  - {type: variant, offset: 562, length: 2, content: 詳小, WYG: 得天下不為也此君義信乎}
