  - {type: variant, offset: 485, length: 1, content: 君, WYG: 之道豈不行人自不行耳故又以下事明之也文王載百里地而天下一所載之地不過百里而天下一以有道也桀紂舎之厚於有天下之勢而不得以匹夫老桀紂舎道雖有天下厚重之勢而不得如庶人夀終故善用之則百里之國足以獨立矣不善用之則楚六千里而爲讎人役善用謂善用道也讎人秦也楚懐王死於秦其}
