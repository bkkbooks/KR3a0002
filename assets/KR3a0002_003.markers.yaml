  - {type: variant, offset: 389, length: 1, content: 崇, WYG: 之容其冠進其衣逢其容良進謂冠在前也逄大也謂逢掖也良謂樂易也儼然壯然祺然蕼然恢恢然廣廣然昭昭然蕩蕩然是父兄之容也儼然矜莊之貌壯然不可犯之貌或當為莊祺然蕼然未詳或曰祺祥也吉也為安泰不憂懼之貌蕼當為肆謂寛舒之貌恢恢廣廣皆容衆之貌昭昭明顯之貌蕩蕩恢夷之貌其冠進其衣逢其容慤謹敬儉然恀然輔然端然紫然洞然綴綴然瞀瞀然是子弟之容也儉然自謙卑之貌多然恃尊長之貌爾雅曰恀恃也郭云江東呼母爲恀音紙輔然相親附之貌端然不傾倚之貌紫然未詳或曰與孳同柔弱之貌洞然恭敬之貌禮記曰洞洞乎其敬也綴綴然不乖離之貌謂相連綴也瞀瞀然不敢正視之貌吾語汝學者之嵬說學者為嵬行之形狀嵬已解於上其冠絻其纓禁緩其容簡連絻當為俛謂太向前而低俯也纓冠之繫也禁緩未詳或曰讀爲紟紟帶也言其纓大如帶而緩也簡連傲慢不前之貌紟其禁反連讀如往蹇來連之連填填然狄狄然莫莫然瞡瞡然瞿瞿然盡盡然盱盱然填填然滿足之貌狄讀爲趯跳躍之貌莫讀爲貊貊靜也不言之貌或動而跳躍或静而不言皆謂舉止無恒也瞡瞡未詳或曰瞡與規同規規小見之貌瞿瞿瞪視之貌盡盡極視盡物之貌盱盱張目之貌皆謂視瞻不平或太察也盱許于反酒食聲色之中則瞞瞞然瞑瞑然瞞瞞閉目之貌瞑瞑視不審之貌謂好恱之甚佯若不視也瞞莫于反瞑母丁反禮節之中則疾疾然訾訾然謂憎疾毁訾也勞苦事業之中則儢儢然離離然偷儒而罔無廉恥而忍謑音徯訽是學者之嵬也事業謂作業也儢儢不勉强之貌離離不親事之貌陸法言云儢心不力也音呂偷儒謂苟避事之勞苦也罔謂冈冐不畏}
