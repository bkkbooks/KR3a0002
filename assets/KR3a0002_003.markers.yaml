  - {type: variant, offset: 396, length: 0, content: '', WYG: 威儀而已矣正其衣冠齊其顔色嗛然而終日不言是子夏氏之賤儒也嗛與慊同快也謂自得之貌終日不言謂務於沈黙史記樂毅與燕惠王書曰先王以為嗛於志也偷儒憚事無廉恥而耆飲食必曰君子固不用力是子游氏之賤儒也偷儒已解上耆與嗜同此皆言先儒性有所偏愚者效而慕之故有此弊也彼君子則不然佚而不惰勞而不僈雖逸而不懈惰雖勞而不弛慢宗原應變曲得其宜如是然後聖人也宗原根本也言根本及應變皆曲得其宜也仲尼篇第七仲尼之門人五尺之䜿子言羞稱乎五伯是何也曰然彼誠可羞稱也齊桓五伯之盛者也言盛者猶如此況其下乎伯讀為霸或曰伯長也為諸侯之長春秋傳曰王命内史叔興父䇿命晉侯為侯伯也前事則殺兄而爭國兄子糾也内行則姑姊妹之不嫁者七人閨門之内般樂奢汰般亦樂也汰侈也音太下同以齊之分奉之而不足分半也用稅賦之半也公羊傳曰師喪分焉外事則詐邾襲莒并國三十五詐邾未聞襲莒謂桓公與管仲謀伐莒未發爲東郭牙先知之是也并國三十五謂滅譚滅遂滅項之類其餘所未盡聞也其行事也若是其險汙淫汰也事險而行汚也行下孟反彼固曷足稱乎大君子之門哉若是而不亡乃霸何也曰於乎夫齊桓公有天下之大節焉夫孰能亡之於乎讀為嗚呼嘆}
