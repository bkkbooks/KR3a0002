  - {type: variant, offset: 374, length: 0, content: '', SBCK: 云匪上帝不時殷不用舊雖無老成人尚有典刑曽是莫聽大命以傾此之謂也陟臣扈之屬也典刑常事故法也詩大雅蕩之篇鄭云老成人伊尹伊古之所謂士仕者厚敦者也合羣者也謂士士仕和合羣衆也之入仕合謂樂富貴者也道也樂其樂分施者也宜反施或所逺罪過者也願反逺于務事理者也有條理務使事羞獨富者也人足也使家給今之所謂士仕者汙漫者也賊亂者也在榮辱篇汙漫已解恣睢者也解於上恣睢巳貪利者也觸抵者也而忤人恃權埶無禮義而唯權埶之嗜者也古之所謂處士者德盛者也能靜者也或處能靜謂安時處順也處士不仕者也易}
