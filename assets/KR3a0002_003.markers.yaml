  - {type: variant, offset: 56, length: 0, content: '', SBCK: 特以其二足而無毛也以其有辨也夫禽獸有父子而無父子之親有牝牡而無男女之别故人道莫不有辨辨莫大於分踈之分也有上下親分莫大於禮有禮也分生於禮莫大於聖王其人存其政舉聖王制禮者言聖王有百吾孰法焉聖問可爲法也王至多誰故曰文久而息節族久而絶制度也言文禮文節息宗族久則廢也禮文久則制度滅守法數之有司極禮而褫有司世褫解也朝三禠之言此者以喻久逺難詳不如隨時興治禠直吏反世相承守禮之法數至於極久亦下脫也易曰或錫之鞶帶終故曰欲觀聖王之跡則於其粲然者矣後王是也則是聖王之跡也夫禮法所興以救當世之急故隨後王近時之王也粲然明白之貌言近世明王之法之術然後可斯惑也孔子曰殷因於夏禮所損益可知也故荀卿深時設教不必拘於舊聞而時人以爲君必用堯舜之道臣必行禹稷後王者以其近巳而俗相類議卑而易行也陳以後王爲法審其所貴君子焉司馬遷曰法彼後王者天下之君也舍後王而道上古譬之是猶舍己之君而事人之君也故曰欲觀千歳則數今日欲知億萬則審一二欲知上世則審周道欲知周道則審其人所貴君子巳謂群觀其道也之君也審謂故曰以近知逺以一知萬以微知明此之謂也夫妄人曰古今異情其以治亂者異道而衆人惑焉彼衆人者愚而無說陋而無度者也測度度大各反下同言其愚陋而不能辨說其所見焉猶可欺也而況於千世之傳也聞也傳傳妄人者門庭之閒猶可誣欺也而況於千世之上乎聖人何以不欺曰聖人者以已度者也之意故人不能以已意度古人欺人也欺亦不故以人度人以情度情之人情既云欲惡以今之人情度古治亂有異皆同豈其以類度類若牛馬也類種類謂以說度功其功業也以言說度以道觀盡人百姓積善而全盡謂之聖人也以道觀盡物之理儒效篇曰涂之古今一度也彼安在其古今異情乎古今不殊盡可以此度類不悖雖久同理乖悖雖久言種類不不殊何至人而獨異哉而理同今之牛馬與古故鄉乎邪曲而不迷觀乎雜物而不惑以此度之不正之道而不迷雜物􅋑燿而以測度之道明之故向於邪曲讀爲向不惑鄉五帝之外無傳人其人事跡後世無傳者外謂巳前也無傳人謂非無賢人也久故也五帝之中無傳政非無善政也久故也顓頊髙辛唐虞也中間也五帝少昊禹湯有傳政而不若周之察也非無善政也久故也傳者久則論略近則論詳略則舉大詳則舉小綱詳周備也略謂舉其大愚者聞其略而不知其詳聞其詳而不知其大也知詳以小知大也唯聖賢乃能以略是以文久而滅節族久而絶凡言不合先王不順}
