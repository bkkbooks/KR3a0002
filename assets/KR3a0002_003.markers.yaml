  - {type: variant, offset: 1, length: 1, content: 苟, WYG: 揣長不揳大不權輕重亦將志乎心耳揳與絜同約也謂約計其大小也絜户結反莊子匠石見櫟社樹絜之百圍權稱也輕重體之輕重也言不論形狀長短大小肥瘠唯在志意修飾耳長短小大美惡形相豈論也哉且徐偃王之狀目可瞻焉徐國名僣稱王其狀偃仰而不俯故謂之偃王周穆王使楚誅之瞻焉言不能俯視細物逺望纔見焉尸子曰徐偃王有筋而無骨仲尼之狀靣如蒙倛倛方相也其首䝉茸然故曰䝉倛子虗賦曰䝉公先驅韓侍郎云四目為方相兩目為倛倛音欺慎子曰毛嬙西施天下之至姣也衣之以皮倛則見之者皆走也周公之狀身如斷菑爾雅云木立死曰椔椔與菑同臯陶之狀色如削𤓰如削去皮之𤓰青綠色閎夭之狀靣無見膚閎夭文王臣在十亂之中言多􅁂髯蔽其膚傅說之狀身如植鰭植立也如魚之立也伊尹之狀靣無須麋麋與眉同禹跳湯偏尹子曰禹之勞十年不窺其家手不爪脛不生毛偏枯之病步不相過人曰禹步鄭注尚書大傳湯半體枯呂氏春秋曰禹通水濬川顔色黎黑步不相過也堯舜參牟子牟與眸同參牟子謂有二瞳之相參也史記曰舜目重瞳重瞳蓋堯亦然尹子曰舜兩眸子是謂重明作事成法出言成章當時傳聞今書傳亦難盡詳究所出矣從者將論志意比類文學邪直將差長短辨美惡而相欺傲邪從者荀卿門人問將論志意文學耶但以好醜相欺傲也古者桀紂長巨姣美天下之傑也筋力越勁百人之敵也姣好也倍萬人曰傑越過人也勁勇也然而身死國亡為天下大僇後世言惡則必稽焉僇與戮同稽考也後世言惡必考桀紂為證是非容貌之患也聞見之不衆論議之卑爾亦非以容貌害身言美惡皆非所患但以聞見不廣議論不髙故致禍耳今世俗之亂君鄉曲之儇子方言云儇疾也又曰慧也與喜而翾義同輕薄巧慧之子也儇火𤣥反莫不美麗姚冶奇衣婦飾血氣態度擬於女子說文曰姚美好貌冶妖竒衣珍異之衣婦飾謂婦人之飾言輕細也擬於女子言柔弱便僻也婦人莫不願得以為夫處女莫不願得以爲士士者未娶妻之稱易曰老婦得其士夫弃其親家而欲奔之者比肩並起然而中君羞以為臣中父羞以為子中兄羞以為弟中人羞以為友不必上智皆知惡也俄則束乎有司而戮乎大市犯刑法為有司所束縳也莫不呼天啼哭苦傷其今而後悔其始苦傷今之刑戮悔其始之所為是非容貌之患也聞見之不衆論議之卑爾然則從者將孰可也問從者形相與志意孰為益乎人有三不祥幼而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也言必有禍災也人有三必窮為上則不能愛下為下則好非其上是人之一必窮也鄉則不若偝則謾之是人之二必窮也鄉讀為向若如也謾欺毁也莫于反知行淺薄曲直有以縣矣然而仁人不能推知士不能明是人之三必窮也曲直猶能否也言智慮德行至淺薄其能否與人又相懸逺不能推讓明白之言不知已之不及也知音智行下孟反縣讀為懸人有此三數行者以為上則必危為下則必滅詩曰雨雪瀌瀌見晛聿消莫肯下遺式居婁驕此之謂也詩小雅角弓之}
