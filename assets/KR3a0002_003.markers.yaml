  - {type: variant, offset: 566, length: 0, content: '', WYG: 天下應之如讙以君義通於四海故應之如讙讙喧也言聲齊應之也是何也則貴名白而天下治也貴名謂儒名可貴白明顯之貎故近者歌謳而樂之逺者竭蹶而趨之竭蹶顚倒也逺者顚倒趨之如}
