  - {type: variant, offset: 371, length: 0, content: '', WYG: 姦人之雄聖王起所以先誅也然後盜賊次之盜賊得變此不得變也變謂教之使自新也非十二子篇第六假今之世假如今之世也或曰假借也今之世謂戰國昬亂之世治世則姦言無所容故十二子借亂世以惑衆也飾邪說文姦言以梟亂天下梟與鴞同欺惑愚衆矞宇嵬𤨏矞與譎同詭詐也又余律反宇未詳或曰宇大也放蕩恢大也嵬謂為狂險之行也𤨏者謂為姦細之行也說文云嵬髙不平也今此言嵬者其行狂險亦猶山之髙不平也周禮大司樂云大傀烖則去樂鄭云傀猶怪也晏子春秋曰不以上為本不以民為憂内不恤其家外不顧其游夸言傀行自謹於飢寒命之曰狂僻之民明上之所禁也嵬當與傀義同音五每反又牛彼反使天下混然不知是非治亂之所存者有人矣混然無分别之貌有在也縱情性安恣睢禽獸之行恣睢矜放之貌言任情性所為而不知禮義則與禽獸無異故曰禽獸行睢香萃反不足以合文通治不足合於古之文義通於治道然而其持之有故其言之成理足以欺惑愚衆妄稱古之人亦有如此者故曰持之有故又其言論能成文理故曰言之成理足以欺惑愚衆也是它囂魏牟也它囂未詳何代人世本楚平王孫有田公它成豈同族乎韓詩外傳作范魏牟牟魏公子封於中山漢書蓺文志道家有公子牟四篇班固曰先在莊子莊子稱之今莊子有公子牟稱莊子之言以折公孫龍據即與莊子同時也又列子稱公子牟解公孫龍之言公孫龍平原君之客而張湛以為文侯子據年代非也說苑曰公子牟東行穰侯送之未知何者為定也忍情性綦谿利跂忍謂違驕其性也綦谿未詳盖與跂義同也利與離同離跂違俗自絜之貌謂離於物而跂足也莊子曰楊墨乃始離跂自以為得離力智反跂丘氏反苟以分異人為髙苟求分異不同於人以為髙行也不足以合大衆明大分既求分異則不足合大衆苟立小節故不足明大分大分謂忠孝之大義也然而其持之有故其言之成理足以欺惑愚衆是陳仲史鰌也已解上不知壹天下建國家之權稱不知齊一天下建立國家之權稱言不知輕重稱尺證反上功用大儉約而僈差等功用功力也大讀曰太言以公力為上而過儉約也僈輕也輕僈差等謂欲使君臣上下同勞苦也曾不足以容辨異縣君臣上下同等則其中不容分别而懸隔君臣也然而其持之有故其言之成理足以欺惑愚衆是墨翟宋鈃也宋鈃宋人與孟子尹文子彭蒙慎到同時孟子作宋牼牼與鈃同口莖反尚法而無法下修而好作尚上也言所著書雖以法為上而自無法以修立為下而好作偽言自相矛盾矣上則取聽於上下則取從於俗言苟順上下意也終日言成文典及紃察之則倜然無所歸宿紃與循同倜然踈逺貌宿止也雖言成文典若反覆紃察則疎逺無所歸也不可以經國定分取聽於上取從於俗故法度不立也然而其持之有故其言之成理足以欺惑愚衆是慎到田駢也田駢齊人也遊稷下著書十五篇其學本黄老大歸名法慎到已解上不法先王不是禮義不以禮義為是而好治怪說玩琦辯玩與翫同𤦺讀為奇異之竒甚察而不惠惠順辨而無用多事而寡功不可以為治綱紀然而其持之有故其言之成理足以欺惑愚衆是惠施鄧析也略法先王而不知其統言其大略雖法先王而不知體統統謂紀綱也猶然而材劇志大聞見雜博猶然舒遲貌禮記曰君子盖猶猶爾劇繁多也案往舊造說謂之五行案前古之事而自造其說謂之五行五行五常仁義禮智信是也甚僻違而無類幽隱而無說閉約而無解約結也解說也僻違無類謂乖僻違戾而不知善類也幽隱無說閉約無解謂其言幽隱閉結而不能自解說謂但言堯舜之道而不知其興作方略也荀卿常言法後王治當世而孟軻子思以為必行堯舜文武之道然後為治不知隨時設教救當世之弊故言僻違無類孟子曰管仲曾西之所不為解佳買反案飾其辭而祗敬之曰此真先君子之言也言自敬其辭說先君子孔子也子思唱之孟軻和之子思孔子之孫名伋字子思孟軻鄒人字子輿皆著書七篇世俗之溝猶瞀儒嚾嚾然不知其所非也溝讀為拘拘愚也猶猶豫不定之貌瞀儒暗也漢書五行志作區瞀與此義同嚾嚾喧嚻之貌謂爭辯也拘音寇又音抽遂受而傳之以為仲尼子游為兹厚於後世仲尼子游為此言垂德厚於後世也是則子思孟軻之罪也若夫緫方略齊言行壹統類而羣天下之英傑而告之以太古教之以}
