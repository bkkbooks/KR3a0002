  - {type: variant, offset: 553, length: 1, content: 通, SBCK: 充屈静而理謂不隕穫也理謂不失其道和而理謂不富}
  - {type: variant, offset: 553, length: 0, content: '', WYG: 理謂不失其道和而理謂不充屈静而理謂不隕穫也富則施廣貧則用節可貴可賤也可富可貧也可殺而不可使爲姦也君雖寵榮屈辱之終不可使為姦也是持寵處位終身不厭之術也雖在貧窮徒處之勢亦取象於是矣夫是之謂吉人徒處徒行或曰獨處也雖貧賤其所立志亦取法於此也詩曰媚兹一人應侯順德永言孝思昭哉嗣服此之謂也詩大雅下武之篇一人謂君也媚愛應當侯維服事也鄭云媚愛兹此也可愛乎武王能此順德謂能成其祖考之功也服事也明哉武王之嗣行祖考之事謂伐紂定天下引此者明臣事君亦猶武王之繼祖考也求善處大重理任大事大重謂大位也擅寵於萬乗之國必無後患之術莫若好同之好賢人與之同者也援賢博施除怨而無妨害之除怨不念舊惡能耐任之則慎行此道耐忍也慎讀為順言人有賢能者雖不欲用必忍而用之則順已所行之道耐乃代反能而不耐任有能者不忍急用之且恐失寵則莫若早同之推賢讓能而安隨其後如是有寵則必榮失寵則必無罪是事君者之寳而必無後患之術也或曰荀子非王道之書其言駁雜今此又言以術事君曰不然夫荀卿生於衰世意在濟時故或論王道或論霸道或論强國在時君所擇同歸於治者也若髙言堯舜則道必不合何以拯斯民於塗炭乎故反經合義曲成其道若得行其志治平之後則亦堯舜之道也又荀卿門人多仕於大國故戒以保身推賢之術與大雅既明且哲豈云異哉故知者之舉事也滿則慮嗛嗛不足也當其盈滿則思其後不足之時而先防之平則慮險安則慮危曲重其豫猶恐及其旤是以百舉而不陷也委曲重多而備豫之猶恐其及旤旤與禍同孔子曰巧而好度必節勇而好同必勝知而好謙必賢此之謂也巧者多作淫靡故好法度者必得其節勇者多凌物故好與人同者必勝之也愚者反是處重擅權則好專事而妬賢能抑有功而擠有罪志驕盈而輕舊怨抑傷之也擠報排也輕舊怨謂輕舊怨以􅈔嗇而不行施道乎上為重招權於下以妨害人雖欲無危得乎哉施道施惠之道欲重其威福故招權使歸於已是以位尊則必危任重則必廢擅寵則必辱可立而待也可炊而傹也炊與吹同傹當為僵言可以氣吹之而僵仆傹音竟是何也則墮之者衆而持之者寡矣墮許窺反天下之行術可以行於天下之術以事君則必}
