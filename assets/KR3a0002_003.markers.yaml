  - {type: variant, offset: 656, length: 0, content: '', WYG: 世之所棄而亂世之所從服也若夫充虚之相施易也充實也施讀曰移移易謂使實者虚虚者實堅白同異之分隔也以堅白異同之言相分别隔異同異已解上也是聦耳之所不能聽也明目之所不能見也辯士之所不能言也雖有聖人之知未能僂指也僂疾也言雖聖人亦不可疾速指陳僂力主反公羊傳曰夫人不僂何休曰僂疾也齊人言也不知無害為君子知之無損為小人工匠不知無害為巧君子不知無害為治君子卿大夫也王公好之則亂法百姓好之則亂事事謂作業而狂惑戇陋之人乃始率其羣徒辯其談説明其辟稱老身長子不知惡也戇愚也辟音譬稱尺證反身老子長言終身不知惡之也夫是之謂上愚有偏僻之見}
  - {type: page-break, offset: 656, content: '', id: KR3a0002_WYG_004-6a, image: WYG0695/WYG0695-0154a.png}
  - {type: variant, offset: 657, length: 1, content: 禮, WYG: 昧然無知然亦不免於愚故曰上愚曾不如好相雞狗之可以為名也有恵施鄧析之名尚不如相雞狗之名也詩曰為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也詩小雅何人斯之篇毛云蜮短狐也靦姡也鄭云使汝為鬼為蜮則汝誠不可得見也姡然有面目汝乃人也人相視無有極時終必與汝相見也引此以喻狂惑之人也我欲賤而貴愚而智貧而富可乎曰其唯學乎彼學者行之曰士也彼為儒學者能行則為士也士者脩立之稱敦慕焉君子也敦厚慕之知之聖人也知之謂通於學也於事皆通則與聖人無異也上為聖人下為士君子孰禁我哉為學之後則誰能禁我使不為聖人士君子也鄕也混然塗之人也俄而並乎堯禹豈不賤而貴矣哉混然無所知之貎並比也鄕音向塗與途同鄕也效門室之辨混然曾不能决也效白辨别也向者明白門室之别異猶不能决言所知淺也俄而原仁義分是非圖廻天下於掌上而辯白黒豈不愚而知矣哉原夲也謂知仁}
  - {type: page-break, offset: 657, content: '', id: KR3a0002_WYG_004-6b, image: WYG0695/WYG0695-0154b.png}
  - {type: page-break, offset: 657, content: '', id: KR3a0002_WYG_004-7a, image: WYG0695/WYG0695-0154c.png}
  - {type: variant, offset: 660, length: 0, content: '', WYG: 夲圖謀也廻轉也言圖謀運轉天下之事如在掌上也鄕也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉胥靡刑徒人也胥相靡繫也}
  - {type: variant, offset: 661, length: 1, content: 亂, WYG: 鏁相聮相繫漢書所謂鋃鐺者也舉皆也顔師古曰聮繫使相隨而服役之猶今囚徒以鏁連枷也今有人於此㞕然藏千溢之寳雖行貸而食人謂之富矣㞕然雜碎衆多之貎行貸行乞也貸士得反彼寳也者衣之不可衣也下衣於既反言已為衣則不可衣著食之不可食也賣之不可僂售也僂疾然而人謂之富何也豈不大富之器誠在此也喻學者雖未得衣食亦猶藏千金之寳也是杅杅亦富人已豈不貧而富矣哉杅杅即于于也自足之貌荘子曰聽居居視于于}
