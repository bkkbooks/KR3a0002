  - {type: variant, offset: 653, length: 0, content: '', WYG: 相高下視墝肥序五種君子不如農人相視也高下原隰也墝薄田也五種黍稷豆麥麻謂不失次序各當土宜也通財貨相美惡辨貴賤君子不如賈人視貨物之美惡辨其貴賤也賈與估同設規矩陳繩墨便備用君子不如工人便備用謂精巧便於備用不恤是非然不然之情以相薦撙以相恥怍君子不若惠施鄧析也薦藉也謂相蹈籍撙抑皆謂相陵駕也怍慙也若夫謫徳而定次謫與商同古字商度其徳而定位次夲或亦多作譎譎與决同謂斷决其徳故下亦有决徳而定次也量能而授官使賢不肖皆得其位能不能皆得其官任使各當其才萬物得其宜事變得其應慎墨不得進其談惠施鄧析不敢竄其察竄隠匿也言二子之察無所逃匿君子皆識也言必當理事必當務是然後君子之所長也凡事行有益於理者立之行下孟反無益於理者廢之夫是}
  - {type: page-break, offset: 653, content: '', id: KR3a0002_WYG_004-5a, image: WYG0695/WYG0695-0153c.png}
