  - {type: variant, offset: 460, length: 3, content: 當曲直, SBCK: 使人之勞佚也鄉讀爲向趨也審勞佚畜積脩􅃲而能顛倒其敵者也術而能傾覆其敵也畜積倉廪脩戰􅃲之詐心以勝矣彼以讓飾爭依乎仁而蹈利者也飾爭非真爲讓所以蹈利非真仁也讓也行仁所以小人之傑也彼固曷足稱乎大君子之門哉者之政}
  - {type: variant, offset: 460, length: 3, content: 當曲直, WYG: 使人之勞佚也畜積脩鬭而能顛倒其敵者也畜積倉廪修戰鬬之術而能傾覆其敵也詐心以勝矣彼以讓飾爭依乎仁而蹈利者也為讓所以飾争非真讓也行仁所以蹈利非真仁也小人之傑也彼固曷足稱乎大君子之門哉前章言五霸救時}
  - {type: variant, offset: 460, length: 3, content: 當曲直, krp: 使人之勞佚也鄉讀爲向趨也審勞佚畜積脩鬪而能顛倒其敵者也術而能傾覆其敵也畜積倉廪脩戰鬪之詐心以勝矣彼以讓飾爭依乎仁而蹈利者也飾爭非真爲讓所以蹈利非真仁也讓也行仁所以小人之傑也彼固曷足稱乎大君子之門哉者之政}
  - {type: variant, offset: 464, length: 0, content: '', SBCK: 言其失孟子曰五霸者三王前章言五霸救時故褒美之此章明王人也之罪彼王者則不然致賢能而以救不肖致彊而能以寛弱戰必能殆之而羞與之􅃲不力服也必以義服委然成文以示之天下就人使成文理以示委然俯就之貌言俯下天而暴國安自化矣有災繆者然後誅之災有之非顛倒其敵也怪繆戾者然後誅故聖王之誅也綦省矣所景反省少也文王誅四大邦侵阮徂共春秋傳曰文王聞崇徳亂而伐四謂密也阮也共也崇}
  - {type: page-break, offset: 464, content: '', id: KR3a0002_SBCK_003-24b}
  - {type: variant, offset: 464, length: 0, content: '', WYG: 褒美之此章明王者之政故言其失孟子曰五霸者三王之罪人也彼王者則不然致賢而能以救不肖致彊而能以寛弱戰必能殆之而羞與之鬬必以義服不力服也委然成文以示之天下委然俯就之貌言俯就人使成文理以示天下也而暴國安自化矣有災繆者然後誅之有災怪繆戾者然後誅之非顛倒其敵也故聖王之誅也綦省矣省少也所景反文王誅四四謂密也阮也共也崇}
