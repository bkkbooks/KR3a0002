  - {type: 'tls:seg', offset: 558, content: '', id: KR3a0002_tls_003-6a.12}
  - {type: variant, offset: 558, length: 0, content: '', WYG: 於持社稷之大義嗚呼而莫之能應然而通乎財萬物養百姓之經紀嗚呼歎辭也財與裁同雖歎其莫已知無應之者而亦不怠惰困棄常通於裁萬物養百姓之綱紀也勢在人上則王公之材也在人之上謂為人君也在人下則社稷之臣國君之寳也雖隱於}
  - {type: page-break, offset: 558, content: '', id: KR3a0002_WYG_004-3a, image: WYG0695/WYG0695-0152c.png}
  - {type: variant, offset: 559, length: 5, content: 則約而詳小, SBCK: 徒處之埶亦取象於是矣夫是之謂吉}
  - {type: variant, offset: 559, length: 0, content: '', WYG: 閻漏屋人莫不貴之道誠存也窮閻窮僻之處閻里門也漏屋弊屋漏雨者也仲尼将為司寇魯司寇也沈猶氏不敢朝飲其羊公愼氏出其妻慎潰氏踰境而徙皆魯人家語曰沈猶氏常朝飲其羊以詐市人公慎氏妻淫不制慎潰氏奢侈踰法魯之鬻六畜者飾之以儲價魯之粥牛馬者不豫賈必蚤正以待之者也豫賈定為高價也粥牛馬者不敢高價言仲尼必先正其身以待物故得從化如此賈讀為價居於闕黨闕黨之子弟罔不分有親者取多居謂孔子閑居闕黨之子弟罔不分均有無於分均之官有父母者取多也孝悌以化之也由孔子以孝悌化之儒者在夲朝}
  - {type: page-break, offset: 559, content: '', id: KR3a0002_WYG_004-3b, image: WYG0695/WYG0695-0152d.png}
