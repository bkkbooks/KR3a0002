  - {type: variant, offset: 392, length: 2, content: 德揚, SBCK: 言事業謂作業也儢儢不勉彊之貌離離不親事之貌陸法言云儢所解或取聲韻假借或推傳寫錯誤因隨所見而通之也也謢訽謂詈辱也此一章皆明視其狀貌而辨善惡也今之弟佗其冠祌禫其辭爲沖澹謂其言淡泊也弟佗其冠未詳祌禫當禹行而舜趨是子張氏之賤儒也威儀而已矣但宗聖}
  - {type: variant, offset: 392, length: 2, content: 德揚, WYG: 言也謑訽謂詈辱也此一章皆明視之狀貌而辨善惡也今之所解或取聲韻假借或推儢爲錯誤因隨所見而通之也第作其冠祌禫其辭第作其冠未詳祌禫當作冲澹謂其言淡薄也禹行而舜趨是子張氏之賤儒也但宗聖}
