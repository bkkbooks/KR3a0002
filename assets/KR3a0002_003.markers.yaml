  - {type: variant, offset: 542, length: 2, content: 齊喜, SBCK: 僔卑退也僔與撙同主信愛之則謹慎而嗛春秋榖梁傳曰一榖不升謂之嗛嗛與歉同不足也言不敢自滿也按主專任之則拘守而詳詳明法度謹守職事主安近之則慎比而不邪而不回邪謟佞謹慎親比於上主䟽逺之則全一而不倍懷離二之心不以䟽逺而主損絀之則恐懼而不怨貴而不爲夸侈也夸奢信而不忘處謙得信於主謙讀爲嫌疑其作威福也不處嫌疑閒使人任重而不敢專財利至則言善而不及也必將盡辭讓之義然後受而善寡如不合當此財利也不及而如也言已之善福事至}
  - {type: page-break, offset: 542, content: '', id: KR3a0002_SBCK_003-25b}
  - {type: variant, offset: 542, length: 2, content: 齊喜, WYG: 僔僔與撙同卑退也主信愛之則謹慎而嗛嗛與歉同不足也言不敢自滿也春秋榖梁傳曰一榖不升謂之嗛主專任之則拘守而詳謹守職事詳明法度主安近之則慎比而不邪謹慎親比於上而不回邪諂佞主䟽遠之則全一而不倍不以䟽逺而懷離二之心主損絀之則恐懼而不怨貴而不為夸夸奢侈也信而不處謙謙讀為嫌得信於主不處嫌疑間使人疑其作威福也任重而不敢專財利至則言善而不及也必將盡辭讓之義然後受善而不及如言已之善寡不合當此財利也福事至}
