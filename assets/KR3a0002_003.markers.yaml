  - {type: variant, offset: 568, length: 0, content: '', WYG: 四海之内若一家通逹之屬莫不從服夫是之謂人師通逹之屬謂舟車所至人力所通之處也師長也言儒者之功如此故可以為人師長也詩曰自西自東自南自北無思不服此之謂也詩}
  - {type: variant, offset: 569, length: 3, content: 心則慢, WYG: 雅文王有聲之篇引此以明天下皆歸之夫其為人下也如彼其為人上也如此何謂其無益於人之國也昭王曰善先王之道仁人隆也比中}
  - {type: variant, offset: 573, length: 6, content: 暴小心則流淫, WYG: 行之先王之道謂儒學仁人之所崇高也以其比類中道}
