  - {type: variant, offset: 396, length: 0, content: '', SBCK: 正其衣冠齊其顔色嗛然而終日不言是子夏氏之賤儒也沈黙史記樂毅與燕惠王書曰先王以爲嗛於嗛與慊同快也謂自得之貌終日不言謂務於也志偷儒憚事無廉恥而耆飲食必曰君子固不用力是子游氏之賤儒也同此皆言先儒性有偷儒巳解上耆與嗜之故有此敝也所偏愚者效而慕彼君子則不然佚而不惰勞而不僈雖勞而不弛慢雖逸而不懈惰宗原應變曲得其宜如是然後聖人也應變皆曲得其宜也宗原根本也言根本及仲尼篇第七仲尼之門人五尺之竪子言羞稱乎五伯是何也曰然彼誠可羞稱也齊􅁊五伯之盛者也爲諸侯之長春秋傳曰王命内史叔興父䇿命晉言盛者猶如此況其下乎伯讀爲霸或曰伯長也伯也爲侯前事則殺兄而爭國糾也兄子内行則姑姊妹之不嫁者七人閨門之内般樂奢汰亦般音太下同􅊨樂也汰侈也以齊之分奉之而不足稅之半也公分半也用賦喪分焉羊傳曰師外事則詐邾襲莒并國三十五邾詐也并國三十五謂滅譚滅遂滅項之類其餘所未盡聞也􅊨未聞襲莒謂􅁊公與管仲謀伐莒未發爲東郭牙先知之是其事行也若是其險汙淫汰也如彼也行下孟反事險而行汙固曷足稱乎大君子之門哉若是而不亡乃霸何也曰於乎夫齊􅁊公有天下之大節焉夫孰能亡之聲大節謂大節義也於乎讀爲嗚呼歎}
