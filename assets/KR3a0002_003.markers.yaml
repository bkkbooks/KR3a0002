  - {type: variant, offset: 698, length: 198, content: 治之之謂也去亂而被之以治人汙而脩之者非案汙而脩之之謂也去汙而易之以脩故去亂而非治亂也去汙而非脩汙也治之為名猶曰君子為治而不為亂為脩而不為汙也君子絜其辯而同焉者合矣善其言而類焉者應矣故馬鳴而馬應之非知也其勢然也故新浴者振其衣新沐者彈其冠人之情也其誰能以己之潐潐受人之掝掝者哉君子養心莫善於誠致誠則無它事矣唯仁之為守唯義之為行誠心守仁則形形則神神則能化矣誠心行義則理理則明明則能變矣變化代興謂之天德天, WYG: 富}
