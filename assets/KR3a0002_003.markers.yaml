  - {type: variant, offset: 5, length: 0, content: '', SBCK: 言者故相形不如論心論心不如擇術術也術道形不勝心心不勝術術正而心順則形相雖惡而心術善無害爲}
  - {type: variant, offset: 5, length: 0, content: '', krp: 言者故相形不如論心論心不如擇術術也術道形不勝心心不勝術術正而心順則形相雖惡而心術善無害爲}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 也形相雖善而心術惡無害爲小人也君子之謂吉小人之謂凶故長短小大善惡形相非吉凶也古之人無有也學者不道也蓋帝堯長帝舜短文王長周公短仲尼長子弓短馯臂字子弓江東人受易者也然馯臂傳易之外子弓蓋仲弓也言子者著其爲師也漢書儒林傳夫稱公白公亦是也微細也葉音攝於葉名諸梁字子髙楚􅆫稱王其大然白公之亂也令尹子西司馬子期皆死焉孫子西楚平王長庶子公子白公楚太子建之子平王之王子公子結申子期亦平葉公子髙入據楚誅白公定楚國如反手爾仁義功名善於後世故士不揣長不揳大不權輕重亦將志乎心爾同約也揳與絜輕重體之輕重也言不論形狀長短大小肥瘠唯在志意脩飾耳謂約計其大小也絜户結反莊子匠石見社樹絜之百圍權稱也長短小大美惡形相豈論也哉且徐偃王之狀目可瞻馬之偃王周穆王使楚誅之瞻馬言不能俯徐國名僣稱王其狀偃仰而不能俯故謂曰徐偃王有筋而無骨也視細物逺望纔見馬尸子仲尼之狀面如蒙倛也其首倛方相倛倛音欺慎子曰毛廧西施天下之至姣也衣之以皮倛則見之者皆蒙茸然故曰蒙倛子虚賦曰蒙公先驅韓侍郎云四目爲方相兩目爲也走周公之狀身如斷菑曰椔與菑同爾雅云木立死臯陶之狀色如削􅀲􅀲青綠色如削皮之閎夭之狀面無見膚夭閎言多􅁂髯蔽其膚也文王臣在十亂之中傅說之狀身如植鰭魚之立也植立也如伊尹之狀面無須麋眉同麋與禹跳湯偏禹之勞尹子曰禹歩鄭注尚書大傳云湯半體枯呂氏春秋曰禹通水濬川顔十年不窺其家手不爪脛不生毛偏枯之病多歩不相過人曰不相過色黎黑歩堯舜參牟子之相參也史記曰舜目重瞳牟與眸同參牟子謂有二瞳法岀言成章當時傳聞今書傳亦難盡詳究所岀也重曈蓋堯亦然尸子曰舜兩眸子是謂重明作事成從者將論志意比類文學邪直將差長短辨美惡而相欺傲邪文學邪伹以好醜相欺傲也從者荀卿門人問將論志意古者桀紂長巨姣美天下之傑也筋力越勁百人之敵也越過人也勁勇也姣好也倍萬人曰傑然而身死國亡爲天下大僇後世言惡則必稽焉世言惡必考桀紂爲僇與戮同稽考也後也證是非容貌之患也聞見之不衆論議之卑爾但以聞見不廣論議不髙故致禍耳亦非以容貌害身言美惡皆非所患今世俗之亂君鄉曲之儇子翾義同輕薄巧慧之子也儇方言云儇疾也慧也與喜而反火􅀇莫不美麗姚冶竒衣婦飾血氣態度擬於女子婦人之飾言輕細也擬於女子言柔弱便辟也說文云姚美好貌冶妖竒衣珍異之衣婦飾謂如婦人莫不願得以爲夫處女莫不願得以爲士曰老婦得其士夫士者未娶妻之稱易弃其親家而欲奔之者比肩並起然而中君羞以爲臣中父羞以爲子中兄羞以爲弟中人羞以爲友必不知惡也上智皆俄則束乎有司而戮乎大市有司所束犯刑法爲也縳莫不呼天啼哭苦傷其今而後悔其始悔其始之所爲苦傷今之刑戮是非容貌之患也聞見之不衆而論議之卑爾然則從者將孰可也形相與問從者爲益乎志意孰人有三不祥㓜而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也有禍言必也災人有三必窮爲上則不能愛下爲下則好非其上是人之一必窮也鄉則不若偝則謾之是人之二必窮也謾欺毁也莫于反鄉讀爲向若如也智}
