  - {type: variant, offset: 22, length: 8, content: 欺惑愚眾矞宇嵬瑣, SBCK: 之道在明分掩地表􅅿田使土相掩地謂耕經界使有畔也掩表明也謂明其刺􅋄殖榖古草字刺絶也􅋄多糞肥田是農夫衆庶之事也守時力民力民使之疾力守時敬授人時進事長功長其功利進其事業和齊百姓使人不偷是將率之事也也若今宰守将率猶主領高者不旱下者不水寒暑和節而五榖以時孰是天下之事也事非由人力也是天下豐穰之若夫兼而覆之兼而愛之兼而制之嵗雖凶敗水旱使百姓無凍餒之患則是聖君賢相之事也墨子之言昭昭然為天下憂不足夫不足非天下之公患也之患也非公共特墨子之私憂過計也今是土之生五榖也人善治之則􅅿數盆一嵗而再獲之實二鬴墨子曰子墨子弟子仕蓋當時以盆為量考工記曰盆待汝以千盆授我五百盆故去之獲讀為穫於衞而反子曰何故反曰與我言而不當曰然後􅀲桃棗李一夲數以盆鼓獻米者操量鼓數以盆鼓謂一本一株也鼓量也禮記曰謂除五榖之外更有此果實數度以盆量之也言然後者然後葷菜百䟽以澤量澤也猶俗量牛馬然後義與上同葷辛菜也䟽與􅂼同以澤量言滿然後六畜禽獸一而剸車一獸滿一車剸與專同言黿鼉魚鼈鰌鱣以時别一而成羣夭其生使得成遂也一而成羣言每别謂生育與母分别也以時别謂不得成羣一類皆然後飛鳥鳬鴈若煙海覆海皆言多遠望如煙之然後昆蟲萬物生其閒物之外其閒又有昆蟲萬物昆蟲蚳䗘蜩范之屬也除天出得隂而藏之蟲也鄭云昆明也得陽而可以相食養者不可勝數也夫天地之生萬物也固有餘足以食人矣麻葛繭絲鳥獸之羽毛齒革也固有餘足以衣人矣聲衣去夫有餘不足非天下之公患也特墨子之私憂過計也天下之公患亂傷之也胡不甞試相與求亂之者誰也我以墨子之非樂也則}
