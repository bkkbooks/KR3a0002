  - {type: variant, offset: 35, length: 0, content: '', SBCK: 衣麤食惡憂戚而非樂言樂墨子人情憂戚故曰憂戚而非樂也無益於人故作非樂篇無樂則若是則瘠瘠則}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 衣麤食惡憂戚而非樂墨子言樂無益於人故作非樂篇無樂則人情憂戚故曰憂戚而非樂也若是則瘠瘠則}
  - {type: variant, offset: 35, length: 0, content: '', krp: 衣麤食惡憂戚而非樂言樂墨子人情憂戚故曰憂戚而非樂也無益於人故作非樂篇無樂則若是則瘠瘠則}
  - {type: variant, offset: 36, length: 0, content: '', SBCK: 足欲不足欲則賞不行奉養既薄則瘠奉養薄也也夫賞以富厚故人勸勉有功勞者而與之麤衣惡食不能足其欲欲既不足則賞何能行乎言皆由不顧賞其道也大觳郭云觳無潤也義與瘠同觳苦角反是賞道廢也莊子説墨子曰其生也勤其死也薄墨子大有天下小有一國將少人徒省官職景反省所上功勞苦與百姓均事業齊功勞食饔飡而治也謂君臣並耕而若是則不威不威則賞罰不行若君臣齊等則威不立矣上下懸隔故得以法臨馭賞不行則賢者不可得而進也罰不行則不肖者不可得而退也賢而退不肖賞罰所以進賢者不可得而進不肖不可得而退則能不能不可得而官也於列位不可置置也而廢若是則萬物失冝事變失應上失天時下失地利中失人和貫故有斯敝也賞罰不行賢愚一天下敖然若燒若焦萬物寡少如被焚燒然敖讀為熬若燒若焦言墨子雖為之衣褐帶索嚽菽飲水惡能足之乎與嚽音烏啜同惡既以伐其本竭其原而焦天下矣故先王聖人為之不然}
