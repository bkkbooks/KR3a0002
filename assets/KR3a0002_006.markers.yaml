  - {type: variant, offset: 110, length: 1, content: 分, WYG: 如邱山也不時焚燒無所藏之夫天下何患乎不足也故儒術誠行則天下大而富使有功大讀為泰優泰也使謂為上之使可使則有功者也撞鐘擊鼓而和詩曰鐘鼔喤喤磬筦将将降福穰穰降福簡簡威儀反反既醉既飽福禄來反此之謂也詩周頌執競之篇毛云喤喤将将皆聲和貌穰穰衆也簡簡大也鄭云反反順習之貌反復也故墨術誠行則天下尚儉而彌貧非鬭而日爭墨子有非政篇非政則非鬭也既上失天時下失地利則物出必寡雖尚儉而民彌貧物不能贍雖以鬭為非日日爭競也勞苦頓萃而愈無功愀然憂戚非樂而日不和説文云頓下首也萃與顇同上下不能相制雖勞苦頓萃猶将無益也鄭注禮記云愀然變動貌詩曰天方薦瘥䘮亂𢎞多民言無嘉憯莫懲嗟此之謂也詩小雅節南山之篇薦重也瘥病也憯曾也懲止也嗟奈何薦或作荐􅂷事養民􅂷下也以上所操持之事下就於民而養之謂施小惠拊循之唲嘔之拊與撫同撫循慰悦也唲嘔嬰兒語聲也唲於佳反嘔與謳同冬日則為之饘粥夏日則與之𤓰麮麩煑麥飯也丘舉反以偷取少頃之譽焉是偷道也可以少頃得姦民之譽}
  - {type: page-break, offset: 110, content: '', id: KR3a0002_WYG_006-11a, image: WYG0695/WYG0695-0175a.png}
