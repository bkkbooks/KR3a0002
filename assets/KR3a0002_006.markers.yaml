  - {type: variant, offset: 11, length: 5, content: 飾邪說文姦, SBCK: 而不然厚刀布之斂以奪之財重田野之税以奪之食苛􅀜市之征以難其事征出入賣買皆有税也使貨苛暴也征亦税也苛闗市之故曰難其事財不得通流不然而已矣此而已不唯如有掎挈伺詐權謀傾覆以相顛倒以靡敝之摭其事挈舉有讀為又掎也敝敗也或曰靡讀為麋麋散也敝盡也其過伺候其罪詐偽其辭顛倒反覆也靡盡百姓曉然皆知其汙漫暴亂而將大危亡也穢行也汙漫皆半反漫莫是以臣或弑其君下或殺其上粥其城倍其節而不死其事者無它故焉人主自取之也此皆由上無恩德故下亦傾覆也粥其城謂以城降人以為已利節忠節詩曰無}
