  - {type: variant, offset: 107, length: 1, content: 眾, SBCK: 鐘擊鳴鼓吹竽笙彈琴瑟以塞其耳必将錭琢刻鏤黼黻文章以塞其目雕同錭與必將芻豢稻梁五味芬芳以塞其口充也塞猶然後衆人徒備官職漸慶賞進漸嚴刑罰以戒其心使天下生民之屬皆知己之所願欲之舉在于是也故其賞行願欲皆在是于也説苑亦作是于也舉皆也于是猶言是于言生民所皆知己之所畏恐之舉在于是也故其罰威可畏其罰賞行罰威則賢者可得而進也不肖者可得而退也能不能可得而官也若是則萬物得其宜事變得其應上得天時下得地利中得人和財貨渾渾如泉源源言不絶也渾户渾渾水流貌如泉反本汸汸如河海水多貌也汸讀為滂暴暴如丘山卒起暴暴高大如丘山也之貌言物多委積不時焚燒無所臧之夫天下何患乎不足也故儒術誠行則天下大而富使而功上之使也可使則有功也大讀為泰優泰也使謂為撞鐘擊鼓而和詩曰鐘鼓喤喤管磬瑲瑲降福穰穰降福􅂤􅂤威儀反反既醉既飽福禄來反此之謂也穰衆也􅂤􅂤大也鄭云反反順習之貌反復也詩周頌執競之篇毛云喤喤瑲瑲皆聲和貌穰故墨術誠行則天下尚儉而彌貧非鬭而日爭地利則物出必寡雖尚儉而民彌貧物不能贍雖墨子有非政篇非政即非鬭也既上失天時下失日日爭競也以鬭為非而勞苦頓萃而愈無功愀然憂戚非樂而日不和不能相制雖勞苦頓顇猶將無益説文云頓下首也萃與顇同上下愀然變動貌也也鄭注禮記云詩曰天方薦瘥喪亂􅀪多民一饒反牢反要進事長功功利也益上之輕非譽而恬失民譽而安然忘於失民也恬安也言不顧下之毁事進矣而百姓疾之長進事雖姓怨而百是又不可偷偏者也為此勞民之事也言亦不可苟且偏徒壊墮落必反無功墮落必反無成功也雖苟求功利旋即毁壊故垂事養譽不可以遂功而忘民亦不可皆姦道也用以故古之人為之不然使民夏不宛暍暍傷暑也或曰宛當為奥篆文宛字與奥字略相似使民謂役使民也宛讀爲藴暑氣也詩曰藴隆蟲蟲六反熱也遂誤耳奥於冬不凍寒急不傷力緩不後時不使有所傷害皆謂量民之力事成功立上下俱富而百姓皆愛其上人歸之如流水親之歡如父母為之出死㫁亡而愉者無它故焉忠信調和均辨之至也}
