  - {type: variant, offset: 109, length: 0, content: '', krp: 察也均平均辨故君國長民者欲趨時遂功則和調累解速乎急疾忠信均辨説乎賞慶矣必先脩正其在我者然後徐責其在人者威乎刑罰其義未詳亦恐脱誤自故君國長人已下而使嬰累解釋則民速乎急疾言效上之急不後時也若或曰累解嬰累解釋也言君長人欲趨時遂功者若和調則民畏乎刑罰累音類解佳買反説讀為恱忠信均辨則民悦乎慶賞若先責已而後責人三德者誠乎上則下應之如影嚮解忠信均辨正三德謂調和累嚮讀為響或曰三德即忠信調和均辨也己而後責人也誠乎上謂上誠意行之也雖欲無明達得乎哉書曰乃}
  - {type: variant, offset: 110, length: 0, content: '', SBCK: 明服維民其力懋和而有疾此之謂也則民勉力為和調而疾速以明效書康誥懋勉也言君大明以服下急也上之故不教而誅則刑繁而邪不勝教而不誅則姦民不懲誅而不賞則勤屬之民不勸屬之欲反屬或為厲屬也者謂箸於事業也誅賞而不類則下疑俗儉而百姓不一罪儉當為險險謂徼幸免罪苟且求不類不以其類謂賞不當功罰不當也賞故先王明禮義以壹之致忠信以愛之尚賢使能以次之爵服慶賞以申重之亦申令曰申重也再時其事輕其任以調齊之人趨時不奪時其事謂使量力而使也之也輕其任謂潢然兼覆之養長之如保赤子水大至之貌也潢與滉同潢然若是故姦邪不作盜賊不起而化善者勸勉矣為善者也化善化而是何邪則其道易可行平易其塞固其政令一民心者固其所充塞其防表明防隄白易識標表明故曰上一則下一矣上二則下二矣辟之若􅋄木枝葉必類本此之謂也􅋄古草字辟讀為譬不利而利之不如利而後利之之利也不愛而用之不如愛而後用之之功也利而後利之不如利而不利者之利也愛而後用之不如愛而不用者之功也利而不利也愛而不用也者取天下矣利而後利之愛而後用之者保社稷矣不利而利之不愛而用之者危國家也觀國之治亂臧否至於疆易而端已見矣也見賢遍反易與場同端首其􅃸徼支繚}
