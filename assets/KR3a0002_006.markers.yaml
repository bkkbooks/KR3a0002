  - {type: page-break, offset: 36, content: '', id: KR3a0002_SBCK_006-11b}
  - {type: variant, offset: 36, length: 0, content: '', WYG: 足欲不足欲則賞不行瘠奉養薄也奉養既薄則不能足其欲欲既不足則賞何能行乎言皆由不顧賞也夫賞以富厚故人勸勉有功勞者而與之麄衣惡食是常道廢也荘子説墨子曰其生也勤其死也薄其道大觳郭云觳無潤也義與瘠同觳苦角反墨子大有天下小有一國将少人徒省官職省所景反上功勞苦與百姓均事業齊功勞謂君臣並耕而食饔飡而治若是則不威不威則賞罰不行上下懸隔故得以法臨馭若君臣齊等則威不立矣賞不行則賢者不可得而進也罰不行則不肖者不可得而退也賞罰所以進賢而退不肖賢者不可得而進也不肖者不可得而退也則能不能不可得而官也不可置於列位而廢置也若是則萬物失宜事變失應上失天時下失地利中失人和賞罰不行賢愚一貫故有斯弊天下敖然若燒若焦敖讀為􅆈若燒若焦言萬物寡少如被燒焚然墨子雖為之衣褐帶索嚽菽飲水惡能足之乎嚽與啜同惡與烏同既以伐其夲竭其原而焦天下矣故先王聖人為之不然}
