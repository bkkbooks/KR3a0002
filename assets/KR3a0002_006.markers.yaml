  - {type: variant, offset: 7, length: 1, content: 假, WYG: 服大裘為上其餘為裨裨之言卑也以事尊卑服之諸侯已下亦服焉鷩冕絺冕皆是也士皮弁服皮弁謂以白鹿皮為冠象上古也素積為裳用十五升布為之積猶辟也辟蹙其腰中故謂之素積也徳必稱位位必稱禄禄必稱用由士以上則必以禮樂節之衆庻百姓則必以法數制之君子用德小人用刑量地而立國謂若王制天子之縣内九十三國也計利而畜民謂若周制計一鄉地利所出畜萬二千五百家度人力而授事謂若一夫受田百畝使民必勝事事必出利利足以生民皆使衣食百用出入相揜百用雜用養生送死之類出出財也入入利也揜覆蓋也出入相揜謂量入為出使覆蓋不乏絶也必時藏餘謂之稱數足用有餘則以時藏之此之謂有稱之術數也故自天子通於庻人事無大小多少由是推之故曰朝無幸位民無幸生此之謂也上下所為之事皆以稱數推之故無徼幸之徒無德而禄謂之幸位惰㳺而食謂之幸生也輕田野之税平闗市之征平猶除也謂譏而不征也省商賈之數省減也謂使農夫衆也罕興力役無奪農時如是則國富矣夫是之謂以政裕民此以政優饒民之術也人之生不能無羣羣而無分則爭爭則亂亂則窮矣窮困故無分者人之大害也有分者天下之夲利也本當為大而人君者所以管分之樞要也樞户樞也故美之者是美天下之夲也美謂美其有分安之者是安天下之夲也貴之者是貴天下之夲也古者先王分割而等異之也以分割制之以等差異之故使或美或惡或厚或薄或佚或樂或劬或勞美謂褒寵惡謂刑戮厚薄貴賤也在位則佚樂百姓則劬勞也非特以為淫泰夸麗之聲将以明仁之文通仁之順也仁謂人也言為此上事不惟使人瞻望自為夸大之聲将以明仁人乃得此文飾言至貴也通仁人乃得此順從言不違其志也故為之彫琢刻鏤黼黻文章玉謂之彫亦謂之琢木謂之刻金謂之鏤白與黒謂之黼黒與青謂之黻青與赤謂之文赤與白謂之章使足以辨貴賤而已不求其觀不求使人觀望也古亂反為之鐘鼔管磬琴瑟竽笙使足以辨吉凶合歡定和而已不求其餘和謂和􅂔餘謂過度而作鄭衛者也為之宫室臺榭使足以避燥濕養德辨輕重而已不求其外德謂君上之德輕重尊卑也外謂峻宇彫牆之類也詩曰彫琢其章金玉其相亹亹我王綱紀四方此之謂也詩大雅棫樸之篇相質也亹亹勸勉之貎言彫琢為文章又以金玉為質勉力為善所以紀綱四方也與詩義小異也若夫重色而衣之重味而食之重財物而制之合天下而君之重多也直用反非特所以為淫泰也固以為王天下治萬變材萬物材與裁同養萬民兼制天下者為莫若仁人之善也夫故其知慮足以治之其仁厚足以安之其德音足以化之得之則治失之則亂百姓誠頼其知也故相率而為之勞苦以務佚之以養其知也知讀為智誠美其厚也故為之出死㫁亡以覆救之以養其厚厚謂恩厚也出死謂出身致死㫁猶判也言判其死亡也覆蓋蔽也㫁丁亂反誠美其德也故為之彫琢刻鏤黼黻文章以藩飾之以養其德有德者宜備藩衞文飾也故仁人在上百姓貴之如帝天帝也親之如父母為之出死㫁亡而愉者愉歡無他故焉其所是焉誠美其所得焉誠大其所利焉誠多是謂可其意也言百姓所得者多故親愛之也詩曰我任我輦我車我牛我行既集蓋云歸哉此之謂也詩小雅黍苗之篇引此以明百姓不憚勤勞以奉上鄭云集猶成也蓋猶皆也轉餽之役有負任者有輓輦者有将車者有牽傍牛者事既成召伯則皆告之云可以歸矣故曰君子以德小人以力君子以德撫下故百姓以力事上也力者德之役也力為德所使役百姓之力待之而後功百姓雖有力待君上所使然後有功也百姓之羣待之而後和百姓之財待之而後聚百姓之勢待之而後安百姓之壽待之而後長皆明待君上之德化然後無爭奪相殺父子不得不親兄弟不得不順男女不得不歡少者以長老者以養故曰天地生之聖人成之此之謂也古者有此語引此以明之也}
