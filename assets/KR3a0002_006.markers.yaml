  - {type: variant, offset: 109, length: 0, content: '', SBCK: 察也均平均辨故君國長民者欲趨時遂功則和調累解速乎急疾忠信均辨説乎賞慶矣必先脩正其在我者然後徐責其在人者威乎刑罰其義未詳亦恐脱誤自故君國長人已下而使嬰累解釋則民速乎急疾言效上之急不後時也若或曰累解嬰累解釋也言君長人欲趨時遂功者若和調則民畏乎刑罰累音類解佳買反説讀為恱忠信均辨則民悦乎慶賞若先責已而後責人三德者誠乎上則下應之如影嚮解忠信均辨正三德謂調和累嚮讀為響或曰三德即忠信調和均辨也己而後責人也誠乎上謂上誠意行之也雖欲無明達得乎哉書曰乃}
