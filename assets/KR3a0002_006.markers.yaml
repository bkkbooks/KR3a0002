  - {type: variant, offset: 6, length: 0, content: '', SBCK: 十萬物同宇而異體形體有異同生宇内無宜而有用於雖理得其道使之不爭然後可以富國也人無常定之宜皆有可用人之理必在為人數也人倫並處同求而異道同欲而異知處羣居也倫類也並道謂或求為善或求為惡此人之性也其在人之法數則以類羣居也同求異生也皆有可也知愚同所可異也知愚分意之謂也可者遂其埶同而知異行私而無禍縱欲而不窮則民心奮而不可説也競也説讀為恱若縱其情性禍患也窮極也奮謂起而争争競而不可恱服也而無分則民心奮起如是則知者未得治也知者未得治則功名未成也由於任智功名之立功名未成則羣衆未縣也然後羣衆懸隔若未有功名則有功名者居上無功名者居下等也羣衆齊羣衆未縣則君臣未立也則未有君既無懸隔位也臣之無君以制臣無上以制下天下害生縱欲害生於各縱其欲也無上下相制則天下之欲惡同物欲多而物寡寡則必爭矣焉死亡貧苦人之大惡存焉是同物謂飲食男女人之大欲存恣其欲則物不能贍故必爭之也賢愚同有此情也無君上之制各故百技所成所以養一人也以養一人是物多而所奉者寡故能治也技工也一人君上也言百工所成之衆物而能不能兼技匠輪輿各安其業則治雜之則亂也雖能者亦不兼其技功使有分也謂梓人不能兼官若䕫典樂稷播種之類也皆使專一於分不二事也謂離居不相待則窮羣而無分則爭謂為物所困也此不相待遺弃也窮而無分亦不可也言不羣則不可羣窮者患也爭者禍也救患除禍則莫若明分使羣矣能羣然後可以富國此巳上皆明有分則強脅弱也知懼愚也民下違上少陵長不以徳為政知分義也徳謂敎化使如是則老弱有失養之憂而壯者有分爭之禍矣憂失養壯者以力老弱不能自存故分爭也相勝故有事業所惡也功利所好也職業無分必使各供其職各從所務若無分則莫不惡勞而好逸事業勞役之事人之所惡職業謂官職及四人之業也也如是則人有樹事之患而有爭功之禍矣已事而爭人之功以此為禍也樹立也若無分則人人患於樹立男女之合夫婦之分人各有偶也合配也分謂㛰姻娉内送逆無禮為㛰壻婦之父問名也内讀曰納納幣也送致女逆親迎也之父為􅊚言㛰姻者明皆以二人之命也聘如是則人有失合之憂而有爭色之禍矣其配偶也失合謂喪故知者為之分也道者又讀為智皆通知如字知者謂知治足國之道國之明富也術節用裕民而善臧其餘餘謂雖有餘不耗損裕謂優饒也善臧其藏之而善節用以禮裕民以政政謂取之有道也以禮謂用不過度以彼裕民故多餘力作故多餘也人得優饒務於裕民則民富民富則田肥以易墾平易易謂耕田肥以易則出實百倍實多也所出榖上以法取焉而下以禮節用之什一也法取謂不妄耗費也以禮節用謂餘若丘山不時焚燒無所臧之言以極也多之夫君子奚患乎無餘憂不足以墨子故知節用裕民則必有仁義聖良之名而且有富厚丘山之積矣皆美名實此無佗故焉生於節用裕民也不知節用裕民則民貧民貧則田瘠以穢耕耨失時也貧則力不足田瘠以穢則出實不半其半不得上雖好取侵奪猶将寡獲也而或以無禮節用之則必有貪利糾譑之名而且有空虚窮乏之實矣罪也譑音矯糾察也譑發人此無佗故焉不知節用裕民也康誥曰􅀪覆乎天若徳裕乃身不廢在王庭此之謂也德是乃所以寛裕􅀪覆如天又順於君孰與不足也汝身言百姓足禮者貴賤有等長幼有差貧富輕重皆有稱者也證反稱尺故天子袾裷衣冕古袾朱衮以朱為質也衣冕猶服冕也朱字裷與衮同畫龍於衣謂之衮諸侯􅀇裷衣冕上謂冕而下如王之服也公也周禮公之服自衮大夫裨冕祭服也天子}
