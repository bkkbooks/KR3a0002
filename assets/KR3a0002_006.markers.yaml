  - {type: variant, offset: 1329, length: 264, content: 之容其冠進其衣逢其容良儼然壯然祺然蕼然恢恢然廣廣然昭昭然蕩蕩然是父兄之容也其冠進其衣逢其容愨儉然恀然輔然端然訾然洞然綴綴然瞀瞀然是子弟之容也吾語汝學者之嵬容其冠絻其纓禁緩其容𥳑連填填然狄狄然莫莫然瞡瞡然瞿瞿然盡盡然盱盱然酒食聲色之中則瞞瞞然瞑瞑然禮節之中則疾疾然訾訾然勞苦事業之中則儢儢然離離然偷儒而罔無廉恥而忍䜁訽是學者之嵬也弟佗其冠祌禫其辭禹行而舜趨是子張氏之賤儒也正其衣冠齊其顏色嗛然而終日不言是子夏氏之賤儒也偷儒憚事無廉恥而耆飲食必曰君子固不用力是子游氏之賤儒也彼君子則不然佚而不惰勞而不僈宗原應變曲得其宜如是然後聖人也, SBCK: 卷第六}
