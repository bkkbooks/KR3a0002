  - {type: variant, offset: 851, length: 196, content: 天下之所棄也兼服天下之心高上尊貴不以驕人聰明聖知不以窮人齊給速通不以先人剛毅勇敢不以傷人不知則問不能則學雖能必讓然後為德遇君則脩臣下之義遇鄉則脩長幼之義遇長則脩子弟之義遇友則脩禮節辭讓之義遇賤而少者則脩告導寬容之義無不愛也無不敬也無與人爭也恢然如天地之苞萬物如是則賢者貴之不肖者親之如是而不服者則可謂訞怪狡猾之人矣雖則子弟之中刑及之而宜詩云匪上帝不時殷不用舊雖無老成人尚有典刑曾是莫聽大命以傾, SBCK: 四國}
