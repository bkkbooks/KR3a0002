  - {type: variant, offset: 22, length: 8, content: 欺惑愚眾矞宇嵬瑣, WYG: 之道在明分掩地表畝掩地謂耕田使地相掩表明也謂明其經界使有畔也刺􅋄殖榖刺絶也屮古草字也多糞肥田是農夫衆庶之事也守時力民守時敬授人時力民使之疾力進事長功進其事業長其功利和齊百姓使民不偷是将率之事也将率猶主領也若今宰守高者不旱下者不水寒暑和節而五榖以時熟是天下之事也是天下豐穰之事非由人力也若夫兼而覆之兼而愛之兼而制之嵗雖凶敗水旱使百姓無凍餒之患則是聖君賢相之事也墨子之言昭昭然為天下憂不足夫不足非天下之公患也非公共之患也特墨子之私憂過計也今是土之生五榖也人善治之則畝數盆一嵗而再獲之蓋當時以盆為量考工記曰盆實二鬴墨子曰子墨子弟子仕於衞而反子曰何故反曰與我言而不當曰待汝以千盆授我五百盆故去之獲讀為穫然後𤓰􅊝棗李一夲數以盆鼔一夲一株也鼓量也禮記曰獻米者操量鼔數以盆鼓謂數度以盆量也言然後謂除五榖之外更有此果實然後葷菜百疎以澤量葷辛菜也疎與䟽同以澤量言滿澤也猶俗量牛馬然後義與上同也然後六畜禽獸一切而剸車剸與專同言一獸滿一車也黿鼉魚鼈鰌鱣以時别一而成羣别謂生育與母分别也以時别謂不及其生使得成遂也一而成羣言每一類皆得成羣也然後飛鳥鳬鴈若烟海遠望如烟之覆海皆言多也然後昆蟲萬物生其間昆蟲蚳䗘蜩范之屬也除大物之外其間又有昆蟲萬物鄭云昆明也得陽而出得隂而藏之蟲也可以相食養者不可勝數也夫天地之生萬物也固有餘足以食人矣麻葛繭絲鳥獸之羽毛齒革也固有餘足以衣人矣衣去聲夫有餘不足非天下之公患也特墨子之私憂過計也天下之公患亂傷之也胡不嘗試相與求亂之者誰也我以墨子之非樂也則}
