  - {type: variant, offset: 6, length: 0, content: '', WYG: 十萬物同宇而異體同生宇内形體有異無宜而有用雖於人無常定之宜皆有可用人之理必在理得其道使之不爭然後可以富國也為人數也人倫並處同求而異道同欲而異知倫類也並處羣居也其在人之法數則以類羣居也同求異道謂或求為善或求為惡此人之性也生也皆有可也知愚同所可異也知愚分可者遂其意之謂也勢同而知異行私而無禍縱欲而不窮則民心奮而不可説也禍患也窮極也奮謂起而争競也説讀為悦若縱情性而無分則民心奮起争競而不可悦服也如是則知者未得治也知者未得治則功名未成也功名之立由於任智功名未成則羣衆未懸也有功名者居上無功名者居下然後羣衆懸隔若未有功名則羣衆齊等羣衆未懸則君臣未立也既無懸隔則未有君臣之位也無君以制臣無上以制下天下害生縱欲無上下相制則天下之害生於各縱其欲也欲惡同物欲多而物寡寡則必爭矣同物謂飲食男女人之大欲存焉死亡貧苦人之大惡存焉是賢愚同有此情也無君上之制各恣其欲則物不能贍故必爭之也故百技所成所以養一人也技功也一人君上也言百工所成之衆物所以養一人是物多而所奉者寡故能治也而能不能兼技雖能者亦不兼其技功使有分也謂梓匠輪輿各安其業則治雜之則亂人不能兼官皆使專一於分不二事也謂若䕫典樂稷播種之類離居不相待則窮羣而無分則爭不相待遺棄也窮謂為物所困也此言不羣則不可羣而無分亦不可也窮者患也爭者禍也救患除禍則莫若明分使羣矣此已上皆明有分則能羣然後可以富國也彊脅弱也知懼愚也民下違上少陵長不以徳為政徳謂教化使如分義如是則老弱有失養之憂而壮者有分爭之禍矣老弱不能以自存故憂失養壮者以力相勝故有分爭也事業所惡也功利所好也職業無分事業謂勞役之事人之所惡職業謂官職及四人之業也必使各供其職各從所務若無分則莫不惡勞而好逸也如是則人有樹事之患而有爭功之禍矣樹立也若無分則人人患於樹立己事而争人之功以此為禍也男女之合夫婦之分合配也分謂人各有偶也㛰姻聘内送逆無禮婦之父為㛰婿之父為姻言㛰姻者皆以二人之命也聘問名也内讀為納納幣也送致女逆親迎也如是則人有失合之憂而有爭色之禍矣失合謂䘮其配偶也故知者為之分也知如字知者謂知治道者乂讀為智皆通足國之道明富國之術也節用裕民而善藏其餘裕謂優饒也善藏其餘謂雖有餘不耗損而善藏之節用以禮裕民以政以禮謂用不過度以政謂取之有道也彼裕民故多餘人得優饒務於力作故多餘也裕民則民富民富則田肥以易易謂耕墾平易田肥以易則出實百倍所出榖實多也上以法取焉而下以禮節用之法取謂什一也以禮節用謂不妄耗費也餘若丘山不時焚燒無所藏之以言多之極也夫君子奚患乎無餘以墨子憂不足故知節用裕民則必有仁義聖良之名而且有富厚邱山之積矣名實皆美此無他故焉生於節用裕民也不知節用裕民則民貧民貧則田􅇤以穢貧則力不足耕耨失時也田􅇤以穢則出實不半不得其半上雖好取侵奪猶将寡獲也而或以無禮節用之則必有貪利紏譑之名而且有空虚窮乏之實矣紏察也譑發人罪也譑音矯此無他故焉不知節用裕民也康誥曰𢎞覆乎天若徳裕乃身此之謂也𢎞覆如天又順於德是乃所以寛裕汝身言百姓足君孰與不足也禮者貴賤有等長㓜有差貧富輕重皆有稱者也稱尺證反故天子袾裷衣冕袾古朱字裷字與衮同盡龍於衣謂之衮朱衮以朱為質也衣冕猶服冕也諸侯𤣥裷衣冕謂上公也周禮公之服自衮冕而下如王之服也大夫裨冕衣禆衣而服冕謂祭服也天子}
