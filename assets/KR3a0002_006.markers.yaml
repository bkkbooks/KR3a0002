  - {type: variant, offset: 111, length: 0, content: '', SBCK: 繚繞言委曲巡警也候斥候徼巡也支繚支其竟關之政盡察察言無不察也竟與境同盡察極是亂國已故用苛察之政也亂國多盜賊姦人入其境其田疇穢都邑露是貪主已財民貧力不足故露也露謂無城郭墻垣主貪觀其朝廷則其貴者不賢觀其官職則其治者不能觀其便嬖則其信者不慤是闇王已臣寵幸者也便嬖左右小慤也主闇故姦人多容也信者不慤所親信者不愿凡主相臣下百吏之俗其於貨財取與計數也須孰盡察風俗俗謂盡察極察也其於計數貨財必待精孰極察然後行取謂賦斂與謂賜與計數計筭也須待也孰精孰也於貪利者也言不簡易急其禮義節奏也芒軔僈楛是辱國已荒言不習孰也軔柔也亦怠惰之義僈與慢禮義節奏謂行禮義之節文芒昧也或讀為國言必見陵辱也同楛不堅固也辱其耕者樂田其戰士安難其百吏好法其朝廷隆禮其卿相調議是治國已逃難也安難不觀其朝廷則其貴者賢觀其官職則其治者能觀其便嬖則其信者慤是明主已凡主相臣下百吏之屬其於貨財取與計數也寛饒􅂤易貨財也不汲汲於其於禮義節奏也陵謹盡察是榮國已於禮義也謹陵侵陵言深敢慢易也嚴也言不賢齊則其親者先貴能齊則其故者先官所謂故舊不遺則民不偷雖舉在至公而必先親故其臣下百吏汙者皆化而脩悍者皆化而愿躁者皆化而慤是明主之功已之人也躁暴急觀國之強弱貧富有徵驗先見也徵驗言其上不隆禮則兵弱上不愛民則兵弱已諾不信則兵弱慶賞不漸則兵弱進漸将率不能則兵弱帥同率與上好攻取功則國貧安業也民不得上好利則國貧重也賦斂士大夫衆則國貧百赤茀所謂三工商衆則國貧者少農桑無制數度量則國貧則物耗費不為限量下貧則上貧下富則上富君孰不足百姓與足故田野縣鄙者財之本也垣窌倉廩者財之末也窌窖也掘地藏榖也榖垣築墻四周以藏榖也廩窌匹教反藏曰倉米藏曰百姓時和事業得叙者貨之源也等賦府庫者貨之流也豐也事業得叙耕稼得時和得天之和氣謂嵗通名别而言之則粟米布帛曰財錢布􅀛貝曰貨也其次序上不奪農時也等賦以差等制賦貨財皆錢榖故明主必謹養其和節其流開其源而時斟酌焉謂賦斂賑䘏豐荒有制也節謂薄斂開謂勸課時斟酌潢然使天下必有餘而上不憂不足如是則上下俱富交無所藏之是知國計之極也上下不相隱交無所藏言故禹十年水湯七年旱而天下無菜色者十年之後年榖復孰而陳積有餘之色也無食菜是無它故焉知本末源流之謂也故田野荒而倉廩實百姓虚而府庫滿夫是之謂國蹷倒也蹷傾伐其本竭其源而并之其末}
