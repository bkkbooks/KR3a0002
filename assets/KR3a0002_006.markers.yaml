  - {type: variant, offset: 1051, length: 0, content: '', SBCK: 鳩之篇曹風尸持國之難易易之法也論守國難事強暴之國難使強暴之國事我易事之以貨寶則貨寶單而交不結約信盟誓則約定而畔無日已約日文子作約定而反無日也定隨即畔之無日言不過一割國之錙銖以賂之則割定而欲無猒以地賂強國割地必不多與故十黍之重爲銖八兩爲錙此謂傳作割國之疆垂以賂之也以錙銖言之猒一占反韓詩外事之彌煩其侵人愈甚必至於資單國舉然後已盡舉其國與人單盡也國舉謂也雖左堯而右舜未有能以此道得免焉者也辟之是猶使處女嬰寳珠佩寳玉繫嬰玉中可寳者也於頸也寳謂珠負戴黃金而遇中山之盜也雖為之逄䝉視詘要橈膕君盧屋妾由将不足以免之橈曲也膕曲脚中古獲反盧當為廬由逄䝉}
  - {type: page-break, offset: 1051, content: '', id: KR3a0002_SBCK_006-21b}
  - {type: variant, offset: 1051, length: 0, content: '', WYG: 曹風鳲鳩之篇持國之難易論守國難易之法也事彊暴之國難使彊暴之國事我易事之以貨寶則貨寶單而交不結約信盟誓則約定而畔無日約以定隨即畔之無日言不過一日文子作約定而反無日割國之錙銖以賂之則割定而欲無厭十黍之重為銖八兩為錙此謂以地賂彊國割地必不多與故以錙銖言之厭一占反韓詩外傳作割國之疆􅂷以賂之事之彌煩其侵人愈甚必至於資單國舉然後已單盡也國舉謂盡舉其國與人也雖左堯而右舜未有能以此道得免焉者也辟之是猶使處女嬰寳珠珮寳玉嬰繫於頸也寳謂珠玉中可寳者也負戴黃金而遇中山之盗雖為之逄䝉視詘要撓膕君盧屋妾由将不足以免之逄䝉}
  - {type: page-break, offset: 1051, content: '', id: KR3a0002_WYG_006-18b, image: WYG0695/WYG0695-0178d.png}
  - {type: variant, offset: 1051, length: 0, content: '', krp: 鳩之篇曹風尸持國之難易易之法也論守國難事強暴之國難使強暴之國事我易事之以貨寶則貨寶單而交不結約信盟誓則約定而畔無日已約日文子作約定而反無日也定隨即畔之無日言不過一割國之錙銖以賂之則割定而欲無猒以地賂強國割地必不多與故十黍之重爲銖八兩爲錙此謂傳作割國之疆垂以賂之也以錙銖言之猒一占反韓詩外事之彌煩其侵人愈甚必至於資單國舉然後已盡舉其國與人單盡也國舉謂也雖左堯而右舜未有能以此道得免焉者也辟之是猶使處女嬰寳珠佩寳玉繫嬰玉中可寳者也於頸也寳謂珠負戴黃金而遇中山之盜也雖為之逄䝉視詘要橈膕君盧屋妾由将不足以免之橈曲也膕曲脚中古獲反盧當為廬由逄䝉}
