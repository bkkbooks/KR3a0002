  - {type: variant, offset: 7, length: 1, content: 假, SBCK: 服衣禆衣而服冕謂服之諸侯已下亦服焉鷩冕絺冕皆是也大裘為上其餘為裨裨之言卑也以事尊卑士皮弁服升布為之積猶辟也辟蹙其􅆎中故謂之素積也皮弁謂以白鹿皮為冠象上古也素積為裳用十五徳必稱位位必稱禄禄必稱用由士以上則必以禮樂節之衆庻百姓則必以法數制之子君人用刑用德小量地而立國縣内九十三國也謂若王制天子之計利而畜民所出畜萬二千五百家謂若周制計一郷地利度人力而授事受田百􅅿謂若一夫使民必勝事事必出利利足以生民皆使衣食百用出入相揜出財也入入利也揜覆蓋也百用雜用養生送死之類出出使覆蓋不乏絶也出入相揜謂量入為必時臧餘謂之稱數餘則以足用有有稱之術數也時臧之此之謂故自天子通於庻人事無大小多少由是推之故曰朝無幸位民無幸生此之謂也徒無德而禄謂之幸位惰㳺而食謂之幸生上下所為之事皆以稱數推之故無徼幸之也輕田野之税平關市之征幾而不征也平猶除也謂省商賈之數農夫衆也省減也謂使罕興力役無奪農時如是則國富矣夫是之謂以政裕民優饒民此以政也之術人之生不能無羣羣而無分則爭爭則亂亂則窮矣困窮故無分者人之大害也有分者天下之本利也為大本當而人君者所以管分之樞要也樞也樞户故美之者是美天下之本也其有分美謂美安之者是安天下之本也貴之者是貴天下之本也古者先王分割而等異之也以等差異也以分割制之故使或美或惡或厚或薄或佚或樂或劬或勞薄貴賤也在位則佚樂美謂褒寵惡謂刑戮厚劬勞也百姓則非特以為淫泰夸麗之聲將以明仁之文通仁之順也瞻望自為夸大之聲将以明仁人仁謂人也言為此上事不唯使人乃得此順從言不違其志也乃得此文飾言至貴也通仁人故為之雕琢刻鏤黼黻文章謂之鏤白與黒謂之黼黒與青謂玉謂之雕亦謂之琢木謂之刻金文赤與白謂之章之黻青與赤謂之使足以辨貴賤而已不求其觀望也古亂反不求使人觀為之鍾鼓管磬琴瑟竽笙使足以辨吉凶合歡定和而已不求其餘度而作鄭衛者也和謂和氣餘謂過為之宫室臺榭使足以避燥溼養德辨輕重而已不求其外上之德德謂君峻宇雕牆之類也輕重尊卑也外謂詩曰雕琢其章金玉其相亹亹我王綱紀四方此之謂也篇相質也亹亹詩大雅棫樸之力為善所以綱紀四方也與詩義小異也勸勉之貎言雕琢為文章又以金玉為質勉若夫重色而衣之重味而食之重財物而制之合天下而君之直用及重多也非特以為淫泰也固以為王天下治萬變材萬物裁同材與養萬民兼制天下者為莫若仁人之善也夫故其知慮足以治之其仁厚足以安之其德音足以化之得之則治失之則亂百姓誠賴其知也故相率而為之勞苦以務佚之以養其知也為智知讀誠美其厚也故為之出死斷亡以覆救之以養其厚也出身致死㫁猶判厚恩厚也出死謂蓋蔽也㫁丁亂反也言判其死亡也覆誠美其德也故為之雕琢刻鏤黼黻文章以藩飾之以養其德也德有衞文飾也者宜備藩故仁人在上百姓貴之如帝也天帝親之如父母為之出死斷亡而愉者歡愉無它故焉其所是焉誠美其所得焉誠大其所利焉誠多所得者多故親愛之也是謂可其意也言百姓詩曰我任我輦我車我牛我行既集蓋云歸哉此之謂也上也鄭云集猶成也蓋猶皆也轉餫之役有負任詩小雅黍苗之篇引此以明百姓不憚勤勞以奉事既成召伯則皆告之云可歸哉者有輓輦者有将車者有牽徬牛者故曰君子以德小人以力百姓以力事上也君子以德撫下故力者德之役也為力使役德所百姓之力待之而後功上所使然後有功百姓雖有力待君也百姓之羣待之而後和百姓之財待之而後聚百姓之埶待之而後安百姓之壽待之而後長然後無爭奪相殺也皆明待君上之德化父子不得不親兄弟不得不順男女不得不歡少者以長老者以養故曰天地生之聖人成之此之謂也引以明之也古者有此語}
