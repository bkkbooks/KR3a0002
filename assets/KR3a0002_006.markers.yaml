  - {type: variant, offset: 113, length: 0, content: '', WYG: 非長久之道也事必不就功必不立是姦治者也姦人為治偷取}
  - {type: variant, offset: 113, length: 0, content: '', krp: 主相不知惡也則}
  - {type: variant, offset: 114, length: 0, content: '', SBCK: 傾覆滅亡則可立而待也以國}
  - {type: variant, offset: 114, length: 0, content: '', WYG: 譽傮然要時務民傮然盡人力貌説文云傮終也要時趨時也務勉強也謂以勞役彊民也傮子牢反要一饒反進事長功益上之功利也輕非譽而恬失民恬安也言不顧下之毁譽而安然忘於失民也事進矣而百姓疾之事雖長進而百姓怨是又不可偷偏者也言亦不可苟且偏為此勞苦民之事也徒壊墮落必反無功雖苟求功利旋即毁壊墮落必反無成功也故垂事養譽不可以遂功而忘民亦不可皆姦道也以用故古人為之不然使民夏不宛暍使民謂役使民也宛讀曰藴暑氣也詩曰藴隆蟲蟲暍傷暑也或曰宛當為奥篆文宛字與奥字略相似遂誤耳奥與六反熱也冬不凍寒急不傷力緩不後時皆謂量民之力不使有所傷害事成功立上下俱富而百姓皆愛其上人歸之如流水親之歡如父母為之出死㫁亡而愉者無他故焉忠信調和均辨之至也均平均辨明察故君國長民者欲趨時遂功則和調累解速乎急疾忠信均辨説乎賞慶矣必先脩正其在我者然後徐責其在人者威乎刑罰自故君國長民以下其義未詳亦恐脱誤或曰累解嬰累解釋也言君長人欲趨時遂功者若和調而使嬰累解釋則民速乎急疾言效上之急不後時也若忠信均辨則民悦乎慶賞若先責已後責人則民畏乎刑罰累音類解佳買切説讀為悦三德者誠乎上則下應之如影嚮三德謂調和解累忠信均辨正己而後責人也誠乎上謂上誠意行之也嚮讀為響或曰三德即忠信調和均辨也雖欲無明達得乎哉書曰乃大明服惟民其勑懋和若有疾此之謂也書康誥懋勉也言君大明以服下則勉力為調和而疾速以明效上之急也故不教而誅則刑繁而邪不勝教而不誅則姦民不懲誅而不賞則勤屬之民不勸屬謂著於事業之欲反或讀為厲誅賞而不類則下疑俗儉而百姓不一不類不以其類謂賞不當功罰不當罪儉當為險險謂徼幸免罪苟且求賞也故先王明禮義以一之致忠信以愛之尚賢使能以次之爵服慶賞以申重之申亦重也再令曰申時其事輕其任以調齊之時其事謂使人趨時不奪之也輕其任謂量力而使也潢然兼覆之養長之如保赤子潢與㳾同潢然水大至之貌也若是故姦邪不作盗賊不起而化善者勸勉矣化善化而為善者也是何耶則其道易平易可行其塞固其政令一其所充塞民心者固其防表明隄防標表明白易識故曰上一則下一矣上二則下二矣辟之若􅋄木枝葉必類夲此之謂也辟讀為譬􅋄古草字不利而利之不如利而後利之之利也不愛而用之不如愛而後用之之功也利而後利之不如利而不利者之利也愛而後用之不如愛而不用者之功也利而不利也愛而不用也者取天下矣利而後利之愛而後用之者保社稷也不利而利之不愛而用之者危國家也觀國之治亂臧否至於疆易而端已見矣易與場同端首也見賢遍反其候徼支繚候斥候徼廵也支繚支分繚繞言委曲廵警也其竟關之政盡察竟與境同盡察極察言無不察也是亂國已亂國多盗賊姦人故用苛察之政也入其境其田疇穢都邑路是貪主已路謂無城郭墻垣主貪財民貧力不足故路也觀其朝廷則其貴者不賢觀其官職則其治者不能觀其便嬖則其信者不慤是闇主已便嬖左右小臣寵幸者也信者不慤所親信者不愿慤也主闇故姦人多容也凡主相臣下百吏之俗其於貨財取與計數也湏熟盡察俗謂風俗取謂賦斂與謂賜與計數計算也湏待也熟精熟也盡察極察也其於計數貨財必待精熟極察然後行言不簡易急於貪利者也其禮義節奏也芒軔僈楛是辱國已禮義節奏謂行禮義之節文芒昧也或讀為荒言不習熟也軔柔也亦怠惰之義僈與慢同楛不堅固也辱國言必見凌辱也其耕者樂田其戰士安難其百吏好法其朝廷隆禮其卿相調議是治國已安難不逃難也觀其朝廷則其貴者賢觀其官職則其治者能觀其便嬖則其信者慤是明主已凡主相臣下百吏之俗其於貨財取與計數也寛饒簡易不汲汲於貨財也其於禮義節奏也陵謹盡察是榮國已陵侵陵言深於禮義也謹嚴也言不敢慢易也賢齊則其親者先貴能齊則其故者先官雖舉在至公而必先親故所謂故舊不遺則民不偷其臣下百吏汙者皆化而脩悍者皆化而愿躁者皆化而慤是明主之功已躁暴急之人也觀國之彊弱貧富有徵驗徵驗言其驗先見也上不隆禮則兵弱上不愛民則兵弱已諾不信則兵弱慶賞不漸則兵弱漸進将率不能則兵弱率與帥同上好攻取功則國貧民不得安業也上好利則國貧賦斂重也士大夫衆則國貧所謂三百赤芾工商衆則國貧農桑者少也無制數度量則國貧不為限量則物耗費下貧則上貧下富則上富百姓足君孰與不足故田野縣鄙者財之夲也垣􅐎倉廩者財之末也垣築牆四周以藏榖也􅐎窖也掘地藏榖也榖藏曰倉米藏曰廩􅐎匹教反百姓時和事業得叙者貨之源也等賦府庫者貨之流也時和得天之和􅂔謂嵗豐也事業得叙耕稼得其次序上不奪農時也等賦以差等制賦貨財皆錢榖通名别而言之則䅇未布帛曰財錢布龜貝曰貨也故明主必謹養其和節其流開其源而時斟酌焉節謂薄斂開謂勸課時斟酌謂賦斂賑䘏豐荒有制也潢然使天下必有餘而上不憂不足如是則上下俱富交無所藏之是知國計之極也交無所蔵言上下不相隱故禹十年水湯七年旱而天下無菜色者十年之後年榖復熟而陳積有餘無食菜之色也是無他故焉知夲末源流之謂也故田野荒而倉廩實百姓虚而府庫滿夫是之謂國蹷蹷傾倒也伐其夲竭其源而并之其末然而主相不知惡也則其傾覆滅亡可立而待也以國}
