  - {type: variant, offset: 2800, length: 0, content: '', krp: 抇亂今厚葬故抇也是特姦人之誤於亂說以欺愚者而潮䧟之以偷取利焉夫是之謂大姦特姦人言是乃於不仁不孝也以偷取利謂偝棄死者而苟取其}
  - {type: variant, offset: 2802, length: 0, content: '', SBCK: 生自誤惑於亂說因以欺愚者猶於泥潮之中䧟之謂使䧟葬以惑當世故以此譏之者也是時墨子之徒說薄傳曰危人而自安害人而自利此之謂也生者與此義同危害死者以利子宋子曰明見侮之不辱使人不鬭解在天宋子已鬬也莊子說宋子曰見侮不辱救民之鬬尹文子曰見侮論篇宋子言若能明侵侮而不以爲辱之義則可使人不矣宋子蓋尹文弟子何休注公羊曰以子冠氏上者著其師不辱見推不矜禁暴息兵救世之鬬此人君之徳可以爲主難宋子之徒也也言此者蓋以人皆以見侮爲辱故鬬也知見侮之爲不辱則不鬭矣應之曰然則亦以人之情爲不惡侮乎曰惡而不辱也其侮雖惡烏路反下同而不以爲辱惡曰若是則必不得}
