  - {type: variant, offset: 1763, length: 1, content: 家, SBCK: 後能知四時之生犧牲之物玉帛之類采服之宜主祭祀之官祀當爲祝有事謂祭行神也國語曰使名之所出而必帥舊典者為之宗又曰使先聖之後能知山川彝器之量次主之度屏攝之位壇場之所上下之神祇氏姓神者謂之祝韋昭曰宗大宗伯也掌祭祀之禮禮記太祝之號宗廟之事昭穆之世齊敬之勤禮節之宜而敬恭明祥也掌祈福乗大路趨越席以養安曰大路繁纓一就大路祭天車禮記按禮以大路越席爲質素此云養安以爲盛飾未詳其趨􅄛字耳越席結蒲爲席養安言恐其不安以此和養之以質爲重也意或曰古人側載睪芷以養鼻解上於車上傍睪芷香草也已以養鼻也側載之用前有錯衡以養目毛云錯衡文衡詩曰約軝錯衡和鸞之聲􅇍中武象騶中韶䕶以養耳車上鈴和鸞皆鳴則和應皆所以爲行節也許愼曰和取其敬鸞以象鳥之也韓詩外傳云鸞在衡和在軾前升車馬動馬動則鸞鳴鸞行周禮大馭云凡馭路行以肆夏趨以采薺以鸞和爲節聲武象韶䕶皆樂名也騶當爲趨􅇍謂車緩行趨謂車速趨謂路門至應門也鄭云行謂大寢至路門三公奉軶持納與軜同軜與軶轅前也納者詩曰鋈以觼軜驂馬内軜繫軾前諸侯持輪挾輿先馬之左右也挾輿在車或挾輿者或先馬者先馬導馬也或持輪者大侯編後大夫次之國稍大侯之列者大在五等小侯元士次之元士上士也禮記曰庶方小侯僻逺小國及附庸也曰天子之元士視附庸也小侯入天子之國曰某人又庶士介而夾道也介而坐庶士軍士側以禦非常也道被甲坐於道庶人隱竄莫敢視望居如大神動如天帝之甚也言畏敬持老養衰猶有善於是者與不老者休也休猶有安樂恬愉如是者乎老者休息之名豈更有休息安樂樂過此不老老也猶言不顯顯也或曰不字􅄛耳夫故曰諸侯有老天子無老有筋力衰竭求致仕諸侯供職貢朝聘故子異也者與天有擅國無擅}
