  - {type: variant, offset: 3181, length: 0, content: '', SBCK: 有義榮有埶辱無害爲堯有埶榮無害爲桀義榮埶榮唯君子然後兼有之義辱埶辱唯小人然後兼有之是榮辱之分也聖王以爲法士大夫以爲道官人以爲守百姓以成俗萬世不能易也主敎化者官人守職事之官也言上下皆以榮辱爲治也士大夫今子宋子案不然獨詘容爲已慮一朝而改之說必不行矣分獨欲屈容受辱爲已之道其言宋子}
