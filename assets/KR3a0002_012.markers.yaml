  - {type: variant, offset: 2805, length: 1, content: 彼, SBCK: 必以其惡之爲說非以其辱之爲故也不在於辱也凡鬬在於惡今倡優侏儒狎徒詈侮而不鬭者是豈鉅知見侮之爲不辱哉遽知宋子有見侮不辱之論哉狎戲也鉅與遽同言此倡優豈速然而不鬭者不惡故也今人或入其央瀆竊其豬彘也如今人央瀆中瀆溝也家出水則援劒㦸而逐之不避死傷是豈以喪豬爲辱也哉然而不憚鬭者惡之故也雖以見侮爲辱也不惡則不鬭之論者也不知宋子雖知見侮爲不辱惡之則必鬭之論也知宋子然則鬭與不鬭邪亡於辱之與不辱也乃在於惡之與不惡也夫今子宋子}
