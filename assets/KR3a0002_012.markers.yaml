  - {type: variant, offset: 2150, length: 1, content: 要, WYG: 解如字説讀為税金舌蔽口猶將無益也金舌以金為舌金舌蔽口以喻不言也雖子宋子見侵侮金舌蔽口不對欲以率先猶無益於不鬬也揚子法言曰金口而木舌金或讀為噤不知其無益則不知不知}
