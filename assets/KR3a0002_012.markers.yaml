  - {type: variant, offset: 1606, length: 0, content: '', SBCK: 宜不能以義制利不能以僞飾性則兼以爲民則兼并之令盡爲民氓也僞謂矯其本性也無能者聖王已沒天下無聖則固莫足以擅天下矣禪讓固無天下有聖而在後者則天下不離後者則天有聖繼其不離叛也下有}
