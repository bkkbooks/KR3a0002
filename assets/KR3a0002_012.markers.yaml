  - {type: variant, offset: 2811, length: 0, content: '', SBCK: 見侮不金舌弊口猶將無益也見侵侮金舌弊口而不對欲以率先猶無益於不金舌以金爲舌金舌弊口以喻不言也雖子宋子而木舌金或讀爲噤鬬也揚子法言曰金口不知其無益則不知說無益不知此知也是不知其無益也直以欺人則不仁不仁不知辱莫大焉知辱無過此也發論而不仁不將以爲有益於人則與無益於人也反預於無益人}
