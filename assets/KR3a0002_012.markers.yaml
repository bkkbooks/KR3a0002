  - {type: variant, offset: 1829, length: 1, content: 其, WYG: 矣朱象乃罪人之當誅戮者豈堯舜之過哉論語曰上智與下愚不移是也堯舜者天下之英也鄭康成註禮記云英謂俊選之尤者朱象者天下之嵬一時之瑣也言嵬𤨏之人縱被堯舜之治猶不可化言教化所不及嵬𤨏已解在非十二子之篇今世俗之為説者不怪朱象而非堯舜豈不過甚矣哉夫是之謂嵬説狂妄之説羿蠭門者天下之善射者也不}
