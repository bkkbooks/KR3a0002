  - {type: variant, offset: 2785, length: 0, content: '', SBCK: 滿體文繡充棺黄金充椁加之以丹矸重之以曾靑靑銅之精形如丹矸丹砂也曾丹矸重以曽靑言以丹靑采畫也珠者其色極淸故謂之曾靑加以犀象以爲樹於壙樹之也中琅玕龍兹華覲以爲實有琅玕樹龍兹未琅玕似珠崑崙山也公羊傳曰衛侯朔屬負兹爾雅曰蓐謂之兹史記曰衛詳覲當爲瑾華謂有光華者也或曰龍兹即今之龍鬚席王曰漸臺五重黄金白玉琅玕龍䟽翡翠珠璣莫落連飾叔封布兹徐廣曰兹者籍席之名列女傳}
