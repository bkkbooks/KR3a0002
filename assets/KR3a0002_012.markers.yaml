  - {type: variant, offset: 1763, length: 1, content: 家, WYG: 後能知四時之生犧牲之物玉帛之類采服之儀宗彛之量次主之度屏攝之位壇場之所上下之神氏姓之出而必率舊典者為之宗又曰使先聖之後能知山川之號宗廟之事昭穆之世齋敬之勤禮節之宜威儀之則容貌之崇忠信之質褾絜之服而敬㳟明神者為之祝韋昭曰宗大宗伯也掌祭祀之官禮記曰大祝掌祈福祥也乗大路越席以養安大路祭天車禮曰大路繁纓一就越席結蒲為席養安言恐其不安以此和養之按禮記大路越席為質素也此云養安以為盛飾未詳其意或曰古人以質為重也側載睪芷以養鼻睪芷香草也已解上於車中傍側載芷用以養鼻前有錯衡以養目詩曰約軧錯衡毛曰錯衡文衡和鸞之聲歩中武象騶中韶䕶以養耳和鸞皆車上鈴也韓詩外傳云鸞在衡和在軾前升車則馬動馬動則鸞鳴鸞鳴則和應皆所以為行節也許慎曰和取其敬鸞以象鳥之聲武象韶䕶皆樂名騶當為趨歩謂車緩行趨謂車速行周禮大馭云凡馭路行以肆夏趨以采齊皆以鸞和為節鄭云行謂大寢至路門趨謂路門至應門也三公奉軛持納軛轅前也納與軜同軜謂驂馬内軜繫軾前者詩曰鋈以觼軜諸侯持輪挾輿先馬挾輿在車之左右也先馬導馬也或持輪者或挾輿者或先馬者大侯編後大夫次之大侯國稍大在五等之列者小侯元士次之小侯遠小國及附庸也元士上士也禮記曰庶方小侯入天子之國曰某人又曰天子之元士視附庸也庶士介而坐道庶士軍士也介而坐道被甲坐於道側以禦非常也庶人隱竄莫敢望視居如大神動如天帝言敬畏之甚也持老養衰猶有善於是者與不老者休也休猶有安樂恬愉如是乎不老老也猶言不顯顯也或曰衍不字也夫老者休息名言豈更有休息安樂過此故曰諸侯有老天子無老諸侯供職貢朝聘故有筋力衰竭求致仕者與天子異也有擅國無擅}
