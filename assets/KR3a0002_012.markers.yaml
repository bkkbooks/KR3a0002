  - {type: variant, offset: 2812, length: 0, content: '', SBCK: 謂也與讀爲預本謂有益於人則得大辱而退耳說莫病是矣侮不辱反自本欲使人見辱耳得大子宋子曰見侮不辱應之曰凡議必將立隆正然後可也然後可也崇高正直無隆正}
  - {type: variant, offset: 2812, length: 0, content: '', krp: 謂也與讀爲預本謂有益於人則得大辱而退耳說莫病是矣侮不辱反自本欲使人見辱耳得大子宋子曰見侮不辱應之曰凡議必將立隆正然後可也然後可也崇高正直無隆正}
  - {type: variant, offset: 2813, length: 453, content: 是主闇也臣不能而誣能則是臣詐也主闇於上臣詐於下滅亡無日矣俱害之道也故惟明主能愛其所愛闇主則必危其所愛夫文王非無貴戚也非無子弟也非無便嬖也倜然乃舉太公於州人而用之豈私之也哉以為親邪則周姬姓也而彼姜姓也以為故也則未嘗相識也以為好麗邪則夫人行年七十有二齫然兩齒墮矣然而用之者夫文王欲立貴道欲白貴名以惠天下而不可以獨也非是子莫足以舉之故舉是子而用之於是乎貴道果立貴名果明兼制天下立七十一國姬姓獨居五十三人周之子孫苟不狂惑者莫不為天下之顯諸侯如是者能愛人也故舉天下之大道立天下之大功然後隱其所憐所愛其下猶足以為天下之顯諸侯故曰唯明主為能愛其所愛闇主則必危其所愛此之謂也牆之外目不見也里之前耳不聞也而人主之守司遠者天下近者境內不可不略知也天下之變境內之事有弛易齵差者矣而人主無由知之則是拘脅蔽塞之端也耳目之明如是其狹也人主之守司如是其廣也其中不可以不知也如是其危也然則人主將何以知之曰便嬖左右者人主之所以窺遠收眾之門戶牖嚮也不可不早具也故人主必將有便嬖左右足信者然後可其知慧足使規物其端誠足使定物然後可夫是之謂國具人主, WYG: ''}
  - {type: variant, offset: 2814, length: 2, content: 主闇, SBCK: 非不分而辨訟不決故所聞曰天下之大隆是非之封界分職名象之所起王制是}
