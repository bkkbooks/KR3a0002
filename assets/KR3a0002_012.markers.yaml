  - {type: variant, offset: 1521, length: 0, content: '', WYG: 有誰與讓矣讓者勢位敵之名若上下相縣則無與讓矣有讀為又道徳純備智慧甚明南面而聽天下生民之屬莫不振動從服以化順之天下無隱士無遺善無隱藏不用之士也同焉者}
  - {type: variant, offset: 1522, length: 0, content: '', WYG: 也異焉者非也夫有惡擅天下矣夫自知不堪其事則求賢而禪位今以堯舜}
