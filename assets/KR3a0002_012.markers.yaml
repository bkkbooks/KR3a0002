  - {type: variant, offset: 2817, length: 1, content: 臣, SBCK: 王制謂王者之舊制名謂指名象謂法象故凡言議期命是非以聖王爲師也皆以聖王爲法也期物之所㑹也命名物而聖王之分榮辱是也如宋子以見侮爲不辱哉聖王以榮辱爲人之大分豈是有兩端矣有二也榮辱各有義榮者有埶榮者有義辱者有埶辱者志意脩德行厚知慮明是榮之由中出者也夫是之謂義榮爵列尊貢禄厚形埶勝也禄謂受君之禄卿相士大貢謂所受貢賦謂天子諸侯謂埶位也夫也形埶上爲天子諸侯下爲卿相士大夫是榮之從外至者也夫是之謂埶榮流淫汗僈漫已解在榮辱篇汙穢行也僈當爲犯分亂理驕暴貪利是辱之由中出者也夫是之謂義辱詈侮捽搏搏手擊也捽持頭也捶笞臏腳骨也腳古脚字臏脚捶笞皆杖擊也臏膝馬喜臏脚於宋卒相中山謂刖其膝骨也鄒陽曰司斬斷枯磔暴屍也磔車裂斷如字枯棄市辜義同歟韓子曰楚南之地麗水之中生金民多竊采之也周禮以疈辜祭四方百物謂披磔牲體也或者枯與疈疑辜即枯也又莊子有辜人謂犯罪應死之人也采金之禁得而輙辜磔所辜磔甚衆而民竊金不止藉靡舌謂胥靡也謂刑徒之人以鐵鏁相連繫也舌藉見陵藉也才夜反靡繫縛也與縻義同即能合舌舉而}
