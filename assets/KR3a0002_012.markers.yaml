  - {type: variant, offset: 450, length: 71, content: 司不勞而事治政令不煩而俗美百姓莫敢不順上之法象上之志而勸上之事而安樂之矣故藉斂忘費事業忘勞寇難忘死城郭不待飾而固兵刃不待陵而勁敵國不待服而詘四, SBCK: 能德明威積}
  - {type: variant, offset: 450, length: 71, content: 司不勞而事治政令不煩而俗美百姓莫敢不順上之法象上之志而勸上之事而安樂之矣故藉斂忘費事業忘勞寇難忘死城郭不待飾而固兵刃不待陵而勁敵國不待服而詘四, krp: 能德明威積}
  - {type: punctuation, offset: 456, content: ，, id: KR3a0002_tls_012-bkkpn99}
  - {type: 'tls:seg', offset: 456, content: '', id: KR3a0002_tls_012-2a.44}
  - {type: variant, offset: 458, length: 569, content: 不煩而俗美百姓莫敢不順上之法象上之志而勸上之事而安樂之矣故藉斂忘費事業忘勞寇難忘死城郭不待飾而固兵刃不待陵而勁敵國不待服而詘四海之民不待令而一夫是之謂至平詩曰王猶允塞徐方既來此之謂也請問為人君曰以禮分施均徧而不偏請問為人臣曰以禮待君忠順而不懈請問為人父曰寬惠而有禮請問為人子曰敬愛而致文請問為人兄曰慈愛而見友請問為人弟曰敬詘而不苟請問為人夫曰致功而不流致臨而有辨請問為人妻曰夫有禮則柔從聽待夫無禮則恐懼而自竦也此道也偏立而亂俱立而治其足以稽矣請問兼能之奈何曰審之禮也古者先王審禮以方皇周浹於天下動無不當也故君子恭而不難敬而不鞏貧窮而不約富貴而不驕並遇變應而不窮審之禮也故君子之於禮敬而安之其於事也徑而不失其於人也寡怨寬裕而無阿其所為身也謹脩飾而不危其應變故也齊給便捷而不惑其於天地萬物也不務說其所以然而致善用其材其於百官之事技藝之人也不與之爭能而致善用其功其待上也忠順而不懈其使下也均徧而不偏其交游也緣義而有類其居鄉里也容而不亂是故窮則必有名達則必有功仁厚兼覆天下而不閔明達周天地理萬變而不疑血氣和平志意廣大行義塞於天地之閒仁智之極也夫是之謂聖人審之禮也請問為國曰聞脩身未嘗聞為國也君者儀也民者景也儀正而景正君者槃也民者水也槃圓而水圓君者盂也盂方而水方君射則臣決楚莊王好細要故朝有餓人故曰聞脩身未嘗聞為國也君者民之原也源清則流清源濁則流濁, WYG: ''}
