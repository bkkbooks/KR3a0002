  - {type: variant, offset: 1520, length: 0, content: '', SBCK: 也天下歸之之謂王天下去之之謂亡故桀紂無天下而湯武不弑君由此效之也獨夫耳豈爲殺君乎由用也效明也天下皆去桀紂是無天下也湯武誅明之用此論湯武者民之父母也桀紂者民之怨賊也今世俗之爲說者以桀紂爲君而以湯武爲弑然則是誅民之父母而師民之怨賊也長師不祥莫大焉以天下之合爲君則天下未甞合於桀紂也然則以湯武爲弑則天下未甞有說也直墮之耳甞有此世俗自古論說未湯武耳之墮損故天子唯其人天下者至重也非至彊莫之能任乃能勝重任物之至彊者至大也非至辨莫之能分小智所能分别也至大則難詳故非至衆也非至明莫之能知其情僞不能和輯也天下之人至衆非極知此三至者非聖人莫之能盡故非聖人莫之能王非聖人安能王重大如此三者況反乎王于聖人備道全美者也是縣天下之權稱也知輕重也稱尺證反懸天下如權稱之懸揔桀紂者其知慮至險也其至意至闇也爲志意至意當其行之爲至亂也親者䟽之賢者賤之生民怨之禹湯之後也而不得一人之與刳比干囚箕子身死國亡爲天下之大僇後世之言惡者必稽焉紂以爲􅀛鏡也言惡者必稽考桀是不容妻子之數也之徒也列子梁王謂揚朱曰先生有一妻一妾不能治不能容有其妻子是如此之人數也猶言不能保妻子也故至賢疇四海湯武是也至罷不容妻子桀紂是也或曰疇與籌同謂計度也疇四海謂以四海爲疇域今世俗之爲說者以桀紂爲有天下而臣湯武豈不過甚矣哉臣而殺之是過甚也以桀紂爲君以湯武爲譬之是猶傴巫跛匡大自以爲有知也人王霸篇曰賤之匡讀爲尫癈疾之言世俗此說猶巫尫大自以爲神異也如㑌與此匡同禮記曰吾欲暴尫而奚若故可以有奪人國不可以有奪人天下可以有竊國不可以有竊天下也者天下之心難歸故不可也一國之人易服故可以有竊卿之屬是也竊國田常六可以奪之者可以有國不可以有天下竊可以得國而不可以得天下是何也曰國小具也可以小人有也可以小道得也可以小力持也天下者大具也不可以小人有也不可以小道得也不可以小力持也國者小人可以有之然而未必不亡也亡明取國與取天下殊也小人既可以有之則易滅天下者至大也非聖人莫之能有也世俗之爲說者曰治古無肉刑而有象刑形象故謂之象形也書曰臯陶方施象刑惟明孔安國云治古古之治世也肉刑墨劓剕宮也象刑異章服恥辱其刑亦非謂形象也象法也案書之象墨黥其面而已更無劓刖之刑也世俗以爲古之重罪以墨􅄺以黑巾幪其頭而已或曰墨黥當爲墨幪伹慅嬰布爲纓鄭云凶冠之當爲澡嬰謂澡濯其其布以爲纓也澡或讀爲草愼子作草纓也飾令罪人服之禮記曰緦冠繰纓鄭云有事共艾畢前君以朱大夫素士爵韋令罪人服之故以蒼白色共未詳或􅄛字耳艾蒼白色畢與韠同紱也所以蔽也爲韠菲對屨也愼子作䋽言罪人或菲或枲爲屨菲草屨也對當爲䋽傳寫誤耳䋽枲禮有䟽屨傳曰藨蒯之菲也故曰菲䋽屨䋽方孔反對或爲蒯殺赭衣而不純純音準殺所介反愼子曰有虞氏之誅以畫詭當黥以草以赤土染衣故曰赭衣純縁也殺之所以異於常人之服也傳曰唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪幪巾纓當劓以復䋽當刖以艾韠當宮此有虞之誅也又尚書大也治古如是治古如是世俗說以是不然以爲治邪則人固莫觸罪非獨不用肉刑亦不用象刑矣以爲人或觸罪矣而直輕其刑然則是殺人者不死傷人者不刑也罪至重而刑至輕庸人不知惡矣亂莫大焉路反惡烏凡刑人之本禁暴惡惡且徵其未也未謂將來徵讀爲懲殺人者不死而傷人者不刑是謂惠暴而寛賊也非惡惡也故象刑殆非生於治古並起於亂今也妄爲此說今之亂世治古不然凡爵列官職賞慶刑罰皆報也以類相從者也其善惡報謂報其善惡者得其惡也各以類相從謂善者得一物失稱亂之端也失其所失稱謂也稱尺證反稱類不相從夫徳不稱位能不稱官賞不當功罰不當罪不祥莫大焉昔者武王伐有商誅紂斷其首懸之赤斾大白旗此云赤旂所傳史記武王斬紂頭懸之大白周之大赤即史記之說非也聞各異也禮記明堂位說旗曰殷之夫征暴誅悍治之盛也殺人者死傷人者刑是百王之所同也未有知其所由來者也刑稱罪則治不稱罪則亂故治則刑重亂則刑輕必行則治世刑注漢書曰世所以治乃刑重所以亂乃刑輕也不敢犯故重亂世刑不行則人易犯故輕李竒犯治之罪固重犯亂之罪固輕也者少有犯則衆惡之治世家給人足犯法法者多不可盡用重典當輕也罪固當重也亂世人廹於飢寒犯書曰刑罰世輕世重此之謂也亂故法有重輕也書甫刑以言世有治世俗之爲說者湯武不能禁令是何也不言有所不至者能施禁令故曰楚越不受制是不然湯武者至天下之善禁令者也湯居亳武王居鄗皆百里之地也天下爲一諸侯爲臣通達之屬莫不振動從服以化順之同恐也振與震曷爲楚越獨不受制也彼王者之制也視形埶而制械用間者異俗器械異制衣服異宜也即禮記所謂廣谷大川異制民生其稱遠近而等貢獻豈必齊哉等差也稱尺證反故魯人以榶衛人用柯齊人用一革之榶或謂之柯或曰方未詳或曰方言云盌謂云謂榖張也言榶張也郭土地形制不同者械用備飾不可不異也故諸夏之國同服同儀也諸夏廹儀謂風俗化故同服同儀也近京師易一以教蠻夷戎狄之國同服不同制爲要荒之服其制度不同也夷狄遐逺又各在一方雖同封内甸服伯里甸服孔安國曰王畿之内也禹貢五治田也爲天子服封外侯服之外五百里也侯􅀱也斥􅀱而服畿外也禹貢五百里侯服孔云甸服侯服候斥也事王也韋昭公侯衛賔服自侯圻至衛圻其閒五圻圻五韋昭注國語曰侯候圻衛衛圻圻之外甸圻甸圻之外男圻男圻之外采圻采圻之外衛圻百里中國之界也謂之賔服常以貢獻賔服於王五圻者侯據周官職方氏與禹貢異制也康誥曰侯甸男􅀖采衛是也此蠻夷要服服之外五百職方氏云衛安國云要謂要束以文教要一昭反里曰蠻服又其外五百里曰夷服孔戎狄荒服謂鎭服藩職方氏所之地與戎狄同俗故謂之荒荒忽無常之言服也韋昭曰各相去五百里九州之外荒裔甸服者祭侯服者祀賔服者享要服者貢荒服者終王於曾祖也時享於二祧終謂世終朝嗣王也韋昭曰日祭於祖考上食也近漢亦然月祀日祭月祀時享嵗貢二字誤脫耳此下當有終王}
