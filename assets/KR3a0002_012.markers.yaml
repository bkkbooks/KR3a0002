  - {type: variant, offset: 1320, length: 0, content: '', WYG: 即禮記所謂廣谷大川異制民生其間者異俗噐械異制衣服異宜稱遠邇而等貢獻豈必齊哉稱尺證反等差也故魯人以榶衛人用柯齊人用一革未詳或曰方言云盌謂}
  - {type: punctuation, offset: 1321, content: ，, id: KR3a0002_tls_012-bkkpn284}
  - {type: 'tls:seg', offset: 1321, content: '', id: KR3a0002_tls_012-5a.61}
  - {type: variant, offset: 1321, length: 139, content: 則威行鄰敵縱不能用使無去其疆域則國終身無故故君人者愛民而安好士而榮兩者無一焉而亡詩曰价人維藩太師維垣此之謂也道者何也曰君之所道也君者何也曰能群也能群也者何也曰善生養人者也善班治人者也善顯設人者也善藩飾人者也善生養人者人親之善班治人者人安之善顯設人者人樂之善藩飾人者人榮之四統者俱, SBCK: 同害}
  - {type: variant, offset: 1321, length: 0, content: '', WYG: 榶盂謂之柯或曰方言榶張也郭云謂榖張也土地形制不同者械用備飾不可不異也故諸夏之國同服同儀儀謂風俗也諸夏廹近京師易一以教化故同服同儀也蠻夷戎狄之國同服不同制夷狄遐遠又各在一方雖同為要荒之服其制度不同也封内甸服王畿之内也禹貢五百里甸服孔安國曰為天子服治田也封外侯服畿外也禹貢五百里侯服孔云甸服之外五百里也侯候也斥候而服事王也韋昭云侯服候圻也侯衛賔服韋昭注國語曰侯候圻衛衛圻自侯圻至衛圻其間五圻圻五百里五五二千五百里中國之界也謂之賔服常以服貢賔見於王五圻者候圻之外曰甸圻甸圻之外曰男圻男圻之外曰采圻采圻之外曰衛圻康誥曰侯甸男采衛是也此據周官職方氏與禹貢異制蠻夷要服職方氏衛服之外五百里曰蠻服又其外五百里曰夷服孔安國云要謂要束以文教要一昭反戎狄荒服職方氏所謂鎮服者也韋昭云各相去五百里九州之外荒裔之地與戎狄同俗故謂之荒荒忽無常之言甸服者祭侯服者祀賔服者享要服者貢荒服者終王韋昭曰日食祭於祖考上食也近漢亦然月祀於曾祖也時享於二祧也嵗貢於壇墠也終謂世終朝嗣王也日祭月祀時享嵗貢終王夫是之謂視形勢而制械用稱遠近而等貢獻是王者之至也至當為志所以志識遠近也彼楚越者且時享嵗貢終王之屬也必齊之日祭月祀之屬然後曰受制耶是規磨之説也規磨之説猶差錯之説也規者正圓之器磨乆}
