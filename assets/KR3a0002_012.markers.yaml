  - {type: variant, offset: 2141, length: 0, content: '', WYG: 不鬭者是豈鉅知見侮之為不辱哉狎戲也鉅與遽同言此倡優豈速遽知宋子有見侮不辱之論哉然而不鬭者不}
  - {type: variant, offset: 2142, length: 0, content: '', WYG: 故也今人或入其央瀆竊其猪彘央瀆中瀆也如今人家出水溝也則援劒㦸而逐之不避死傷是豈以䘮猪為辱也哉然而不憚鬭者惡之故也雖以見侮為辱也不惡則不鬭不知宋子之論者也雖知見侮為不辱惡之則必鬭知宋子之論也然則鬭與不鬭耶亡於辱之與不辱也乃在於惡之與不惡也夫今子宋子不能解人之惡侮而務説人以勿辱也豈不過甚矣哉解達也不知人情惡侮而使見侮不}
