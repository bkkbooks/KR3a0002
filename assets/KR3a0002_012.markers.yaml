  - {type: xml-element, offset: 0, content: '', id: KR3a0002_tls_012-bkkxmlele1}
  - {type: variant, offset: 5, length: 1, content: 二, SBCK: 八世俗之爲說者曰主道利周是不然篇皆此一匿其情不使下知也世俗以爲主道利在如此也論世俗之乖謬荀卿以正論辨之周密也謂隱主者民之唱也上者下之儀也之表儀也謂下法上彼將聽唱而應視儀而動唱黙則民無應也儀隱則下無動也不應不動則上下無以相}
  - {type: variant, offset: 5, length: 1, content: 二, WYG: 八世俗之為説者曰主道利周是不然此一篇皆論世俗之乖謬荀卿以正論辨之周密也謂隱匿其情不使下知也世俗以為主道利在如此也主者民之唱也上者下之儀也謂下法上之表儀也彼將聽唱而應視儀而動唱嘿則民無應也儀隱則下無動也不應不動則上下無以相}
  - {type: variant, offset: 5, length: 1, content: 二, krp: 八世俗之爲說者曰主道利周是不然篇皆此一匿其情不使下知也世俗以爲主道利在如此也論世俗之乖謬荀卿以正論辨之周密也謂隱主者民之唱也上者下之儀也之表儀也謂下法上彼將聽唱而應視儀而動唱黙則民無應也儀隱則下無動也不應不動則上下無以相}
  - {type: xml-element, offset: 6, content: '', id: KR3a0002_tls_012-bkkxmlele2}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3a0002_tls_012-1a.3}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 也以效上是不相須也上不導其下則下無若是則與無上同也不祥莫大焉故上者下之本也上宣明則下治辨矣從則明别於事也宣露辨别也下知所上端誠則下愿愨矣上公正則下易直矣不敢險曲也上公正則下治辨則易一愿愨則易使易直則易知易一則彊易使則功易知則明是治之所由生也上周密則下疑􅀇矣讀爲􅅭惑也下同􅀇謂幽深難知或上幽險則下漸詐矣漸浸也謂浸成其詐也漸子廉反幽隱也險難測也漸進也如字又曰上偏曲則下比周矣疑􅀇則難一從故難一也疑惑不知所漸詐則難使比周則難知不可知其情禮記曰下人人懷和親比則上長勞也難知則君難一則不彊難使則不功難知則不明是}
  - {type: page-break, offset: 7, content: '', id: KR3a0002_SBCK_012-1b}
  - {type: page-break, offset: 7, content: '', id: KR3a0002_SBCK_012-2a}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 也上不導其下則下無以効上是不相須者也若是則與無上同也不祥莫大焉故上者下之本也上宣明則下治辨矣宣露辨别也下知所從則明别於事也上端誠則下愿慤矣上公正則下易直矣上公正則下不敢險曲也治辨則易一愿慤則易使易直則易知易一則彊易使則功易知則明是治之所由生也上周密則下疑𤣥矣𤣥謂幽深難知或讀為眩惑也與下同上幽險則下漸詐矣幽隱也險難測也漸進也如字又曰漸浸也謂浸成其詐也子廉反上偏曲則下比周矣疑𤣥則難一疑惑不知所從故難一也漸詐則難使比周則難知人人懷私相親比則上不可知其情禮記曰下難知則君長勞難一則不彊難使則不功難知則不明是}
  - {type: page-break, offset: 7, content: '', id: KR3a0002_WYG_012-1b, image: WYG0695/WYG0695-0223b.png}
  - {type: page-break, offset: 7, content: '', id: KR3a0002_WYG_012-2a, image: WYG0695/WYG0695-0224a.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 也以效上是不相須也上不導其下則下無若是則與無上同也不祥莫大焉故上者下之本也上宣明則下治辨矣從則明别於事也宣露辨别也下知所上端誠則下愿愨矣上公正則下易直矣不敢險曲也上公正則下治辨則易一愿愨則易使易直則易知易一則彊易使則功易知則明是治之所由生也上周密則下疑玄矣讀爲眩惑也下同玄謂幽深難知或上幽險則下漸詐矣漸浸也謂浸成其詐也漸子廉反幽隱也險難測也漸進也如字又曰上偏曲則下比周矣疑玄則難一從故難一也疑惑不知所漸詐則難使比周則難知不可知其情禮記曰下人人懷和親比則上長勞也難知則君難一則不彊難使則不功難知則不明是}
  - {type: variant, offset: 8, length: 4, content: 君無亂國, SBCK: 之所由作也故主道利明不利幽利宣不利周故主道明則下安主道幽則下危知所從則自危也下知所從則安不故下安則貴上下危則賤上賤猶惡也貴猶愛也故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危謀上畏則故主道莫惡乎難知莫危乎使下畏已傳曰惡之者衆則危書曰克明明徳帝乙罔不明徳愼罰書多方曰成湯至于詩曰明明在下大明之詩大雅故赫赫然著見於天也篇言文王之徳明明在下故先王明之豈特􅀇之耳哉耳也特猶世俗之爲說者曰桀紂}
  - {type: page-break, offset: 8, content: '', id: KR3a0002_SBCK_012-2b}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 之所由作也故主道利明不利幽利宣不利周故主道明則下安主道幽則下危下知所從則安不知所從則自危也故下安則貴上下危則賤上貴猶愛也賤猶惡也故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危畏則謀上故主道莫惡乎難知莫危乎使下畏已傳曰惡之者衆則危書曰克明明徳尚書多方曰成湯至于帝乙罔不明徳慎罰詩曰明明在下詩大雅大明之篇言文王之徳明明在下故赫赫然著見於天也故先王明之豈特𤣥之耳哉特猶直也世俗之為説者曰桀紂有天下湯武簒而奪之是不然以桀紂為常有天下之籍則然以常主天下之圖籍則然也親有天下之籍則不然躬親能有天下則不然以其不能治之也天下謂在桀紂則不然古者天子千官諸侯百官以是千官也令行於諸夏之國謂之王夏大也中原之大國以是百官也令行於境内國雖不安不至於廢易遂亡謂之}
  - {type: page-break, offset: 8, content: '', id: KR3a0002_WYG_012-2b, image: WYG0695/WYG0695-0224b.png}
  - {type: variant, offset: 8, length: 4, content: 君無亂國, krp: 之所由作也故主道利明不利幽利宣不利周故主道明則下安主道幽則下危知所從則自危也下知所從則安不故下安則貴上下危則賤上賤猶惡也貴猶愛也故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危謀上畏則故主道莫惡乎難知莫危乎使下畏已傳曰惡之者衆則危書曰克明明徳帝乙罔不明徳愼罰書多方曰成湯至于詩曰明明在下大明之詩大雅故赫赫然著見於天也篇言文王之徳明明在下故先王明之豈特玄之耳哉耳也特猶世俗之爲說者曰桀紂}
  - {type: punctuation, offset: 9, content: ，, id: KR3a0002_tls_012-bkkpn1}
  - {type: 'tls:seg', offset: 9, content: '', id: KR3a0002_tls_012-1a.4}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 僅存之君聖王之子也子子孫也有天下之後也勢籍之所在也天下之宗室也然而不材不中不中謂處事不當也中丁仲反内則百姓疾之外則諸侯叛之近者境内不一遙者諸侯不聽令不行於境内甚者諸侯侵削之攻伐之若是則雖未亡吾謂之}
  - {type: page-break, offset: 9, content: '', id: KR3a0002_WYG_012-3a, image: WYG0695/WYG0695-0224c.png}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 天下矣聖王没有勢籍者罷不足以縣天下聖王禹湯也有勢籍者謂其子孫也罷謂弱不任事也縣繫也天下無君桀紂不能治天下是無君諸侯有能徳明威積海内之民莫不願得以為君師師長然而暴國獨侈安能誅之暴國即桀紂也侈謂奢汰放縱必不傷害無罪之民誅暴國之君若誅獨夫天下皆去無助之者若一夫焉若是則可謂能用天下矣能用天下之謂王湯武非取天下也非奪桀紂之天下也脩其道行其義興天下之同利除天下之同害而天下歸之也桀紂非去天下也非天下自去也反禹湯之徳}
  - {type: page-break, offset: 10, content: '', id: KR3a0002_WYG_012-3b, image: WYG0695/WYG0695-0224d.png}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 禮義之分禽獸之行積其凶全其惡而天下去之也天下歸之之謂王天下去之之謂亡故桀紂無天下而湯武不弑君由此効之也天下皆去桀紂是無天下也湯武誅獨夫耳豈為殺君乎由用也効明也用此論明之湯武者民之父母也桀紂者民之怨賊也今世俗之為説者以桀紂為君而以湯武為弑然則是誅民之父母而師民之怨賊也師長不祥莫大焉以天下合為君則天下未嘗合於桀紂也然則以湯武為弑則天下未嘗有説也直隳之耳自古論説未嘗有此世俗之人隳損湯武耳故天子唯其人天下者至重也非至彊莫之能任物之彊者乃能勝重任至大也非至辯莫之能分至大則難詳故非小智所能分别也至衆也非至明莫之能知天下之人至衆非極知其情偽不能和輯此三至者非聖人莫之能盡故非聖人莫之能王重大如此非聖人安能王乎王于况反聖人備道全美者也是縣天下之權稱也縣天下如權稱之縣揔知輕重也稱尺證反桀紂者其知慮至險也其志意至闇也其行之為至亂也親者疏之賢者賤之生民怨之禹湯之後也而不得一人之與刳比干囚箕子身死}
  - {type: page-break, offset: 11, content: '', id: KR3a0002_WYG_012-4a, image: WYG0695/WYG0695-0225a.png}
  - {type: page-break, offset: 11, content: '', id: KR3a0002_WYG_012-4b, image: WYG0695/WYG0695-0225b.png}
  - {type: punctuation, offset: 12, content: ；, id: KR3a0002_tls_012-bkkpn2}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3a0002_tls_012-1a.5}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 亡為天下之大戮後世之言惡者必稽焉言惡者必稽考桀紂以為龜鏡也是不容妻子之數也不能容}
  - {type: variant, offset: 13, length: 6, content: 治人無治法羿, SBCK: 天下湯武篡而奪}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 其妻子是如此之人數也猶言不能保其妻子也列子梁王謂楊朱曰先生有一妻不能}
  - {type: variant, offset: 13, length: 6, content: 治人無治法羿, krp: 天下湯武篡而奪}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 也故至賢疇四海湯武是也至罷不容妻子桀紂是也疇四海謂以四海為疇域或曰疇與籌同計度也今世俗之為説者以桀紂為有天下而臣湯武豈不過甚矣哉以桀紂為君以湯武為臣而殺之是過甚也譬之是猶傴巫跂匡大自以為有知也匡讀為尫癈疾之}
  - {type: punctuation, offset: 15, content: ，, id: KR3a0002_tls_012-bkkpn3}
  - {type: 'tls:seg', offset: 15, content: '', id: KR3a0002_tls_012-1a.6}
  - {type: variant, offset: 15, length: 4, content: 無治法羿, WYG: 王霸篇曰賤}
  - {type: punctuation, offset: 18, content: 。, id: KR3a0002_tls_012-bkkpn4}
  - {type: 'tls:seg', offset: 18, content: '', id: KR3a0002_tls_012-1a.7}
  - {type: variant, offset: 20, length: 6, content: 法非亡也而羿, SBCK: 是}
  - {type: variant, offset: 20, length: 2, content: 法非, WYG: 如㑌與此匡同禮記曰吾欲暴尫而奚若言俗此説猶巫尫大自以為神異也故可以有奪人國不可有以奪人天下可以有竊國不可有以竊天下也一國之人易服故可以有竊者天下之心難歸故不可也竊國田常六卿之屬是也可以奪之者可以有國而不可以有天下竊可以得國而不可以得天下是何也曰國小具也可以小人有也可以小道得也可以小力持也天下者大具也不可以小人有也不可以小道得也不可以小力持也國者小人可以有之然而未必不}
  - {type: page-break, offset: 20, content: '', id: KR3a0002_WYG_012-5a, image: WYG0695/WYG0695-0225c.png}
  - {type: variant, offset: 20, length: 6, content: 法非亡也而羿, krp: 是}
  - {type: punctuation, offset: 24, content: ，, id: KR3a0002_tls_012-bkkpn5}
  - {type: 'tls:seg', offset: 24, content: '', id: KR3a0002_tls_012-1a.8}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 小人既可以有之則易滅亡明取國與取天下殊也天下者至大也非聖人莫之能有也世俗之為説者曰治古無肉刑}
  - {type: page-break, offset: 24, content: '', id: KR3a0002_WYG_012-5b, image: WYG0695/WYG0695-0225d.png}
  - {type: variant, offset: 25, length: 1, content: 羿, WYG: 有象刑治古古治世也肉刑墨劓剕宮也象刑異章服恥辱其形象故謂之象刑也書曰臯陶方施象刑惟明孔安國云象法也案書之象刑亦非謂形象墨黥世俗以為古之重罪以墨湼其面而已更無劓刖之刑也或曰墨黥當為墨幪以黑巾幪其頭而已慅嬰當為澡嬰謂澡濯其布為纓鄭云凶冠之飾令罪人服之禮記曰緦冠繰纓鄭云有事其布以為纓繰或讀為草慎子作草纓共艾畢共未詳或衍字艾蒼白色畢與韠同蔽也所以蔽前君以朱大夫素士爵韋令罪人服之故以蒼白色為韋也菲對屨菲草屨也對當為䋽傳寫誤耳䋽枲也慎子作䋽言罪人或菲或枲為屨故曰菲䋽屨䋽方孔反對或為蒯禮有疏屨傳曰麄蒯之菲也殺赭衣而}
  - {type: variant, offset: 27, length: 3, content: 世中禹, SBCK: 然以桀紂爲常有天下}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 純以赤土染衣故曰赭衣純縁也殺之所以異於常人之服也純音準殺所介反慎子曰有虞氏之誅以畫跪當黥以草纓當劓以復䋽當刖以艾畢當宮此有虞之誅也又尚書大傳曰唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪幪巾也治古如是}
  - {type: page-break, offset: 27, content: '', id: KR3a0002_WYG_012-6a, image: WYG0695/WYG0695-0226a.png}
  - {type: variant, offset: 27, length: 3, content: 世中禹, krp: 然以桀紂爲常有天下}
  - {type: variant, offset: 28, length: 2, content: 中禹, WYG: 俗説以治古如是是不然以為治耶則人固莫觸罪非獨不用肉刑亦不用象刑矣以為人或觸罪矣而直輕其刑然則是殺人者不死傷人者不刑也罪至重而刑至輕庸人不知惡也亂莫大焉惡烏路反凡刑人}
  - {type: punctuation, offset: 29, content: ：, id: KR3a0002_tls_012-bkkpn6}
  - {type: 'tls:seg', offset: 29, content: '', id: KR3a0002_tls_012-1a.9}
  - {type: variant, offset: 31, length: 5, content: 法猶存而夏, SBCK: 籍則然之圖籍則然以常主天下親有天下之籍則}
  - {type: variant, offset: 31, length: 3, content: 法猶存, WYG: 本禁暴惡惡且徵其未也徵讀為懲未謂將來殺人者不死}
  - {type: variant, offset: 31, length: 5, content: 法猶存而夏, krp: 籍則然之圖籍則然以常主天下親有天下之籍則}
  - {type: punctuation, offset: 34, content: ，, id: KR3a0002_tls_012-bkkpn7}
  - {type: 'tls:seg', offset: 34, content: '', id: KR3a0002_tls_012-1a.10}
  - {type: variant, offset: 35, length: 1, content: 夏, WYG: 傷人者}
  - {type: variant, offset: 37, length: 4, content: 世王故法, SBCK: 然有天下躬親能}
  - {type: variant, offset: 37, length: 0, content: '', WYG: 刑是謂惠暴而寛賊也非惡惡也故象刑殆非生於治古並起於亂今也今之亂}
  - {type: page-break, offset: 37, content: '', id: KR3a0002_WYG_012-6b, image: WYG0695/WYG0695-0226b.png}
  - {type: variant, offset: 37, length: 4, content: 世王故法, krp: 然有天下躬親能}
  - {type: variant, offset: 38, length: 3, content: 王故法, WYG: 妄為此説治古}
