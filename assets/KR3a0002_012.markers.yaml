  - {type: variant, offset: 3517, length: 304, content: 詩曰濟濟多士文王以寧此之謂也材人愿愨拘錄計數纖嗇而無敢遺喪是官人史吏之材也脩飭端正尊法敬分而無傾側之心守職循業不敢損益可傳世也而不可使侵奪是士大夫官師之材也知隆禮義之為尊君也知好士之為美名也知愛民之為安國也知有常法之為一俗也知尚贀使能之為長功也知務本禁末之為多材也知無與下爭小利之為便於事也知明制度權物稱用之為不泥也是卿相輔佐之材也未及君道也能論官此三材者而無失其次是謂人主之道也若是則身佚而國治功大而名美上可以王下可以霸是人主之要守也人主不能論此三材者不知道此道安值將卑埶出勞併耳目之樂而親自貫日而治詳一日而曲辨之慮與臣下爭小察而綦偏能自古及今未有如此而不亂者也是所謂視乎不可見聽乎不可聞為乎不可成此之謂也, SBCK: 哉荀子卷第十二}
