  - {type: variant, offset: 1551, length: 1, content: 所, SBCK: 規磨之說也規者正圓之器磨久則偏盡規磨之說猶言差錯之說也韓子曰規有磨而水有波我欲更之無奈之何此通於權者而不圓失於度程也文子曰水雖平必有波衡雖正必有差也言溝中之瘠也羸􅇤者以喻智慮淺也謂行乞之人在溝壑中則未足與及王者之制也語曰淺不可與測深愚不足與謀知坎井之鼃不可與語東海之樂此之謂也蟇類也事出莊子坎井或作壇井鼃戸媧反言小不知大也司馬彪曰坎井壊井也鼃蝦世俗之爲說者曰堯舜擅讓義謂除地爲墠告擅與禪同墠亦同賢後世徳薄故父子相繼荀卿言堯舜相承但傳位於賢而天而傳位也後因謂之禪位世俗以爲堯舜徳厚故禪讓聖于虞舜是亦有讓之說此云非擅讓蓋書序美堯之徳雖是已與傳子無異非謂求名而禪讓也案書序曰將遜于位讓以天下與舜有諸孟子曰天子不能以天下與人曰孰與之傳位與遜讓無異非是先自有讓意也孟子亦云萬章曰堯與賢天與子則與子也曰天與之又曰天與賢則是不然天子者埶位至尊無敵於天下夫有誰與讓矣下相縣則無與讓矣有讓者埶位敵之名若上又也讀爲道徳純備智惠甚明南面而聽天下生民之屬莫不振動從服以化順之天下無隱士無遺善用之士也無隱藏不同焉者是也異焉者非也夫有惡擅天下矣事則求賢而禪夫自知不堪其無不理又烏用禪位哉位今以堯舜之明聖事曰死而擅之禪讓之事因謂或者既}
