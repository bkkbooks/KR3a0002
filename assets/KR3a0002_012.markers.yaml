  - {type: variant, offset: 96, length: 300, content: 施不能應事之變足以亂矣不知法之義而正法之數者雖博傅臨事必亂故明主急得其人而闇主急得其埶急得其人則身佚而國治功大而名美上可以王下可以霸不急得其人而急得其埶則身勞而國亂功廢而名辱社稷必危故君人者勞於索之而休於使之書曰唯文王敬忌一人以擇此之謂也合符節別契券者所以為信也上好權謀則臣下百吏誕詐之人乘是而後欺探籌投鉤者所以為公也上好曲私則臣下百吏乘是而後偏衡石稱縣者所以為平也上好傾覆則臣下百吏乘是而後險斗斛敦概者所以為嘖也上好貪利則臣下百吏乘是而後豐取刻與以無度取於民故械數者治之流也非治之原也君子者治之原也官人守數君子養原源清則流清源濁則流濁故上好禮義尚賢使能而無貪利之心則下亦將綦辭讓致忠信而謹於臣子矣如, SBCK: 若}
