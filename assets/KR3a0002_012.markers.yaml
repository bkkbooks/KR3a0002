  - {type: variant, offset: 1606, length: 0, content: '', krp: 宜不能以義制利不能以僞飾性則兼以爲民則兼并之令盡爲民氓也僞謂矯其本性也無能者聖王已沒天下無聖則固莫足以擅天下矣禪讓固無天下有聖而在後者則天下不離後者則天有聖繼其不離叛也下有}
  - {type: variant, offset: 1607, length: 3, content: 宜上賢, SBCK: 歸朝不易位國不更制天下厭然與郷無以異也渉反郷音向厭然順服貌一以堯繼堯夫又何變之有矣豈爲禪讓改變與他人乎言繼位相承與一堯無異聖不在後子而在三公則天下如歸猶復而振之矣歸後子而歸三公也復而振之謂猶如天下巳去而衰息今後子嗣子謂丹朱商均也三公宰相謂舜禹天下如歸言不而振起也}
  - {type: variant, offset: 1607, length: 3, content: 宜上賢, WYG: 歸不離叛朝不易位國不更制天下厭然與鄉無以異也厭然順服貌一渉反鄉音向以堯繼堯夫又何變之有矣言繼位相承與一堯無異豈為禪讓改變與他人乎聖不在後子而在三公則天下如歸猶復而振之也後子嗣子謂丹朱商均也三公宰相謂舜禹天下如歸言不歸後子而歸三公也復而振之謂猶如天下已去而衰息今}
