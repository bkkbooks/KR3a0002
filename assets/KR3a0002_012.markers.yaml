  - {type: variant, offset: 2180, length: 1, content: 仁, WYG: 也崇高正直然後可也無隆正則是非不分而辯訟不决故所聞曰天下之大隆也是非之封界分職名象之所起王制是也名謂指名象謂法象王制謂王者舊制故凡言議期命是非以聖王為師期物之所㑹也命名物也皆以聖王為法而聖王之分榮辱是也聖王以榮辱為人之大分豈如宋子以見侮為不辱哉是有兩端矣榮辱各有二也有義榮者有勢榮者有義辱者有勢辱者志意脩徳行厚知慮明是榮之由中出者也夫是之謂義榮爵列尊貢禄厚形勢勝貢謂所受貢賦謂天子諸侯也禄謂受君之禄卿相士大夫也形勢謂勢位也上為天子諸侯下為卿相士大夫是榮從外至者也夫是之謂勢榮流淫汙僈汙穢行也僈當為漫已解在榮辱篇犯分亂理驕暴貪利是辱之由中出者也夫是之謂義辱詈侮捽搏捽持頭也搏手擊也捶笞臏腳捶笞皆杖擊也臏膝骨也腳古脚字臏脚則刖其膝骨也鄒陽曰司馬喜臏脚於宋卒相中山斬斷枯磔斷如字枯弃市暴屍也磔車裂也周禮以疈辜祭四方百物注謂披磔牲也或者枯與疈辜義同歟韓子曰淮南之地麗水之中生金民多竊采之采金之禁行而輙辜磔所辜磔甚衆而民竊金不止疑辜即枯也又莊子有辜人謂犯罪應死之人藉靡舌􅀈藉見凌藉也才夜反靡繫縛與縻義同即謂胥靡也謂刑徒之人以鐵鏁相連繫也舌􅀈未詳或曰莊子云公孫龍口呿}
