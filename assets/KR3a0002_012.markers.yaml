  - {type: variant, offset: 2182, length: 537, content: 不知不可既知且仁是人主之寶也而王霸之佐也不急得不智得而不用不仁無其人而幸有其功愚莫大焉今人主有六患使賢者為之則與不肖者規之使智者慮之則與愚者論之使脩士行之則與汙邪之人疑之雖欲成功得乎哉譬之是猶立直木而恐其景之枉也惑莫大焉語曰好女之色惡者之孽也公正之士眾人之痤也循乎道之人汙邪之賊也今使汙邪之人論其怨賊而求其無偏得乎哉譬之是猶立枉木而求其景之直也亂莫大焉故古之人為之不然其取人有道其用人有法取人之道參之以禮用人之法禁之以等行義動靜度之以禮知慮取舍稽之以成日月積久校之以功故卑不得以臨尊輕不得以縣重愚不得以謀知是以萬舉不過也故校之以禮而觀其能安敬也與之舉錯遷移而觀其能應變也與之安燕而觀其能無流慆也接之以聲色權利忿怒患險而觀其能無離守也彼誠有之者與誠無之者若白黑然可詘邪哉故伯樂不可欺以馬而君子不可欺以人此明王之道也人主欲得善射射遠中微者則縣貴爵重賞以招致之內不可以阿子弟外不可以隱遠人能中是者取之是豈不必得之之道也哉雖聖人不能易也欲得善馭及速致遠者一日而千里縣貴爵重賞以招致之內不可以阿子弟外不可以隱遠人能致是者取之是豈不必得之之道也哉雖聖人不能易也欲治國馭民調一上下將內以固城外以拒難治則制人人不能制也亂則危辱滅亡可立而待也然而求卿相輔佐則獨不若是其公也案唯便嬖親比己者之用, SBCK: 非堯舜}
