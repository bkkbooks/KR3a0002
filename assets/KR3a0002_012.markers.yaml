  - {type: variant, offset: 1791, length: 2, content: 諸侯, WYG: 而讓賢天下則不也夫曰堯舜擅讓是虛言也是淺者之傳陋者之説也不知逆順之理小大至不至之變也小謂一國大謂天下至不至猶言當不當也未可與及天下之大理者也世俗之為説者曰堯舜不能教化是何也曰朱象不化是不然也堯舜至天下之善教化者也南面而聽天下生民之屬莫不振動從服以化順之言天下}
