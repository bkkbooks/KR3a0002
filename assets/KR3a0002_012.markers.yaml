  - {type: variant, offset: 1855, length: 1, content: 至, WYG: 詩小雅十月之交篇言下民相為妖孽災害非從天降噂噂然相對談語背則相憎為此者蓋由人耳世俗之為説者曰大古薄葬棺厚三寸衣衾三領𦵏田不妨田故不掘也此蓋言古之人君也三領三稱也禮記君陳衣于序東西領南上故以領言葬田不妨田言所葬之地不妨農耕也殷已前平葬無丘壠之識亂今厚葬飾棺故掘也是不及知治}
