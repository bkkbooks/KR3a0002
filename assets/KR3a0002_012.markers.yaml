  - {type: variant, offset: 2797, length: 0, content: '', SBCK: 則求利之詭緩而犯分之羞大也詐之心緩也詭詐也求利詭夫亂今然後反是上以無法使下以無度行知者不得慮能者不得治賢者不得使位使人不得在若是則上失天性下失地利中失人和故百事廢財物詘而禍亂起王公則病不足於上庶人則凍餒羸瘠於下於是焉桀紂群居而盜賊擊奪以危上矣盡如桀紂也言在上位者必禽獸行虎狼貪故脯巨人而炙嬰兒矣若是則有何尤抇人之墓抉人之口而求利矣哉口取其珠也抉挑也抉人雖此倮而埋之猶且必抇也安得葬薶哉薶而不發不可得葬彼乃將食其肉而齕其骨也夫}
