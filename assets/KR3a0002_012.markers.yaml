  - {type: variant, offset: 1726, length: 1, content: 聖, SBCK: 或曰當食謂焚香氣歇即更以新者代之水傍睪傳寫誤遺其水耳代睪而雍而􅜂樂章名奏雍詩周頌者以雍􅜂言其僣也雍而􅜂饌論語曰三家五祀執薦者百人侍西房氣於四郊而祭五徳之帝也或曰此五祀謂礿祠烝甞及周禮宗伯以血祭祭社稷五祀鄭云五祀四時迎五行之也皆}
  - {type: page-break, offset: 1726, content: '', id: KR3a0002_SBCK_012-13a}
  - {type: variant, offset: 1726, length: 1, content: 聖, WYG: 或曰當為澤澤蘭也士虞禮茵著用荼實緩澤焉俗書澤字並水旁睪傳寫誤也遺其水耳代睪而食謂焚香氣歇歇即更以新者代之雍而徹乎雍詩周頌樂章名奏雍而徹饌論語曰三家者以雍徹言其僣也五祀執薦者百人侍西房周禮宗伯以血祭祭社稷五祀鄭云五祀四時迎五行之氣於四郊而祭五徳之帝也或曰此五祀謂礿祀蒸嘗及大祫也或曰國語展禽曰禘郊祖宗報此五者國之祀典也皆}
  - {type: page-break, offset: 1726, content: '', id: KR3a0002_WYG_012-11a, image: WYG0695/WYG0695-0228c.png}
  - {type: variant, offset: 1726, length: 1, content: 聖, krp: 或曰當食謂焚香氣歇即更以新者代之水傍睪傳寫誤遺其水耳代睪而雍而徹樂章名奏雍詩周頌者以雍徹言其僣也雍而徹饌論語曰三家五祀執薦者百人侍西房氣於四郊而祭五徳之帝也或曰此五祀謂礿祠烝甞及周禮宗伯以血祭祭社稷五祀鄭云五祀四時迎五行之也皆}
  - {type: variant, offset: 1728, length: 2, content: 財衍, SBCK: 者所親臨之祭非謂户竈中霤門行之五祀也薦大祫也或曰國語展禽曰禘郊祖宗報此五者國之祀典立也西房西廂也侍或爲待也謂所薦陳之物籩豆之屬也侍侍居則設張容負依而坐諸侯趨走乎堂下容謂羽衛也居則設張居安居也聽朝之時也或曰爾雅云容謂之防郭璞云如今􅇃頭小曲屏風唱其容儀負依而坐也户牖之閒謂之依作扆扆依音同容於戸牖間負之而坐也射者所}
