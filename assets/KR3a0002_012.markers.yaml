  - {type: variant, offset: 2179, length: 0, content: '', WYG: 知辱無過此也將以為有益於人耶則與無益於人也與讀為預本謂有益於人反預於無益人之論也則得大辱而退耳説莫病是矣本欲使人見侮不辱反自得大辱耳子宋子曰見侮不辱應之曰凡議必將立隆正然後}
