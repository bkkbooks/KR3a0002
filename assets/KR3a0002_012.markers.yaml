  - {type: variant, offset: 3186, length: 0, content: '', SBCK: 猶以塼塗塞江海也以僬僥而戴太山也僥短人長三尺者塼涂以􅂗壘塼也僬蹎跌碎折不待頃矣也頃少頃也蹎與顚同躓二三子之善於子宋子者殆不若止之將恐得傷}
  - {type: variant, offset: 3186, length: 0, content: '', krp: 猶以塼塗塞江海也以僬僥而戴太山也僥短人長三尺者塼涂以塗壘塼也僬蹎跌碎折不待頃矣也頃少頃也蹎與顚同躓二三子之善於子宋子者殆不若止之將恐得傷}
  - {type: variant, offset: 3187, length: 1, content: 危, SBCK: 體也息其說也傷其體謂受大辱二三子慕宋子道者也止謂子宋子曰人之情欲寡而皆以己之情爲欲多是過也子宋子曰以禁攻寢兵爲外以情欲寡淺為内也以凡人之情所欲在少不在多也莊子說宋故率其羣徒辨其談說明其譬稱將使人知情欲之寡也欲之寡或爲情之欲寡也稱謂所冝也稱尺證反情應之曰然則亦以人之情爲欲目不欲綦色耳不欲綦聲口不欲綦味鼻不欲綦臭形不欲綦佚此五綦者亦以人之情爲不欲乎曰人之情欲是已曰若是則說必不行矣以人之情爲欲此五綦者而不欲多譬之是猶以人之情爲欲富貴而不欲貨也好美而惡西施也古之人爲之不然以人之情爲欲多而不欲寡故賞以富厚而罰以殺損也以謂之殺減也所介反富厚賞之以殺損罰是百王之所同也故上賢禄天下次賢禄一國下賢禄田邑愿愨之民完衣食禄下至愿愨之民猶得完衣食皆所以人之情爲欲多故使徳重者受厚其功以報今子宋子以是之情爲欲寡而不欲多}
