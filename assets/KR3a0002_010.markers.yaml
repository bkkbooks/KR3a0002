  - {type: variant, offset: 1985, length: 427, content: 鐘擊鳴鼓吹竽笙彈琴瑟以塞其耳必將錭琢刻鏤黼黻文章以塞其目必將芻豢稻梁五味芬芳以塞其口然後眾人徒備官職漸慶賞嚴刑罰以戒其心使天下生民之屬皆知己之所願欲之舉在于是也故其賞行皆知己之所畏恐之舉在于是也故其罰威賞行罰威則賢者可得而進也不肖者可得而退也能不能可得而官也若是則萬物得其宜事變得其應上得天時下得地利中得人和財貨渾渾如泉源汸汸如河海暴暴如丘山不時焚燒無所臧之夫天下何患乎不足也故儒術誠行則天下大而富使而功撞鐘擊鼓而和詩曰鐘鼓喤喤管磬瑲瑲降福穰穰降福𥳑𥳑威儀反反既醉既飽福祿來反此之謂也故墨術誠行則天下尚儉而彌貧非鬭而日爭勞苦頓萃而愈無功愀然憂戚非樂而日不和詩曰天方薦瘥喪亂弘多民言無嘉憯莫懲嗟此之謂也垂事養民拊循之唲嘔之冬日則為之饘粥夏日則與之瓜麮以偷取少頃之譽焉是偷道也可以少頃得姦民之譽然而非長久之道也事必不就功必不立是姦治者也傮然要時務民進事長功輕非譽而恬失民事進矣而百姓疾之是又不可偷偏者也徙壞墮落必反無功故垂事養譽不可以遂功而忘民亦不可皆姦道也, SBCK: 衆美國家}
