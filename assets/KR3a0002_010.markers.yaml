  - {type: variant, offset: 536, length: 4, content: 重皆有稱, krp: 易其刑威者強刑侮者弱則強不當罪則人刑當罪使人可畏弱也侮僈故械用兵革攻完便利者強好加功}
  - {type: punctuation, offset: 542, content: 。, id: KR3a0002_tls_010-bkkpn105}
  - {type: 'tls:seg', offset: 542, content: '', id: KR3a0002_tls_010-3a.6}
  - {type: variant, offset: 542, length: 0, content: '', SBCK: 器攻當爲功功精於用則強也械牢固便利械用兵革窳楛不便利者弱病也窳器謂不堅固也音􅁃楛濫惡重用兵者強輕用兵者弱用兵重難強者權出一者強權出二者弱則弱也政多門是強弱之常也齊人隆技擊敵者號爲技擊孟康曰兵家技材力也齊人以勇力擊斬械積機闗以立攻守之勝之技巧技巧者習手足便器其技也得一首者賜贖錙金無本賞矣也其技擊之術斬得一首則宫八兩曰錙本賞謂有功同受賞斬首雖勝亦不賞是無本賞也賜錙金贖之斬首雖戰敗亦賞不是事小敵毳則偷可用也仲子曰屠可以旦夕得甘脆以養親也可偷竊用之也毳讀爲脆史記聶政謂嚴事大敵堅則渙然離耳渙者離也易􅀃卦曰若飛鳥然傾側反覆無日言傾側反覆之速不得一日也若飛鳥言無馮而易也無日是亡國之兵也兵莫弱是矣是其出賃市傭而戰之幾矣而使之戰相去幾何也此與賃市中傭作之人魏氏之武卒以度取之取之謂取其長短材力中度者武卒選擇武勇之卒號爲武卒度衣三屬之甲凡三屬也衣於氣反屬之欲反如淳曰上身一髀褌一踁繳一操十二石之弩負服矢五十个置戈其上上謂荷戈也置戈於身之冠䩜帶劔師古曰箸兠鍪而又帶劒也䩜與胄同漢書作胄帶劒顔贏三日之糧日中而趨百里一日之中也贏負擔也日中中試則復其户利其田宅曰利謂給其便利之處中丁仲反復方目反復其户不傜役也利其田宅不征衆也顔師古是數年而衰而未可奪也改造則不易周也奪其優復使皆怨也改造更選擇也則又如前此中試者䈥力數年而衰亦未可遽奪其優是}
