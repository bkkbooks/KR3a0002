  - {type: 'tls:seg', offset: 525, content: '', id: KR3a0002_tls_010-3a.3}
  - {type: variant, offset: 525, length: 0, content: '', SBCK: 其國治􅂤禮賤義者其國亂治者強亂者弱是強弱之本也上足卬則下可用也上不足卬則下不可用也仰冝向反能敎且化長養之是足仰卬古仰字不仰不足仰也下託上曰下可用則強下不可用則弱是強弱之常也隆禮效功上也重禄}
  - {type: page-break, offset: 525, content: '', id: KR3a0002_SBCK_010-5a}
  - {type: variant, offset: 525, length: 0, content: '', WYG: 其國治簡禮賤義者其國亂治者彊亂者弱是彊弱之本也上足卭則下可用也上不足卭則下不可用也卭古仰字不仰不足仰也下託上曰仰宜向反能教且化長養之是足仰下可用則彊下不可用則弱是彊弱之常也隆禮效功上也重禄}
  - {type: page-break, offset: 525, content: '', id: KR3a0002_WYG_010-4b, image: WYG0695/WYG0695-0205b.png}
  - {type: variant, offset: 525, length: 0, content: '', krp: 其國治簡禮賤義者其國亂治者強亂者弱是強弱之本也上足卬則下可用也上不足卬則下不可用也仰冝向反能敎且化長養之是足仰卬古仰字不仰不足仰也下託上曰下可用則強下不可用則弱是強弱之常也隆禮效功上也重禄}
  - {type: variant, offset: 526, length: 0, content: '', SBCK: 節次也上功}
  - {type: variant, offset: 526, length: 0, content: '', WYG: 節次也上功}
  - {type: variant, offset: 526, length: 0, content: '', krp: 節次也上功}
  - {type: variant, offset: 527, length: 0, content: '', SBCK: 節下也是強弱之凡也賞僭也重禄重難其禄不使素效驗也功戰功也效功謂不使上戰功輕忠義則弱大凡如此也餐也節忠義也君能隆禮驗功則強好士者強不好士者弱士也士賢愛民者強不愛民者弱政令信者強政令不信者弱下可信信謂使民齊者強不齊者弱同力齊謂賞重者強賞輕者弱必賞}
  - {type: page-break, offset: 527, content: '', id: KR3a0002_SBCK_010-5b}
  - {type: variant, offset: 527, length: 0, content: '', WYG: 節下也是彊弱之凡也效驗也功戰功也效功謂不使賞僭也重禄重難其禄不使素餐也節忠義也若能隆禮驗功則彊上戰功輕忠義則弱大凡如此也好士者彊不好士者弱士賢士也愛民者彊不愛民者弱政令信者彊政令不信者弱信謂使下可信民齊者彊不齊者弱齊謂同力賞重者彊賞輕者弱重難其賞使必賞}
  - {type: variant, offset: 527, length: 0, content: '', krp: 節下也是強弱之凡也賞僭也重禄重難其禄不使素效驗也功戰功也效功謂不使上戰功輕忠義則弱大凡如此也餐也節忠義也君能隆禮驗功則強好士者強不好士者弱士也士賢愛民者強不愛民者弱政令信者強政令不信者弱下可信信謂使民齊者強不齊者弱同力齊謂賞重者強賞輕者弱必賞}
