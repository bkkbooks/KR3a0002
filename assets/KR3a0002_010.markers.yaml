  - {type: variant, offset: 1527, length: 413, content: 私憂過計也今是土之生五穀也人善治之則畝數盆一歲而再獲之然後瓜桃棗李一本數以盆鼓然後葷菜百䟽以澤量然後六畜禽獸一而剸車黿鼉魚鱉鰌鱣以時別一而成群然後飛鳥鳧鴈若煙海然後昆蟲萬物生其閒可以相食養者不可勝數也夫天地之生萬物也固有餘足以食人矣麻葛繭絲鳥獸之羽毛齒革也固有餘足以衣人矣夫有餘不足非天下之公患也特墨子之私憂過計也天下之公患亂傷之也胡不嘗試相與求亂之者誰也我以墨子之非樂也則使天下亂墨子之節用也則使天下貧非將墮之也說不免焉墨子大有天下小有一國將蹙然衣麤食惡憂戚而非樂若是則瘠瘠則不足欲不足欲則賞不行墨子大有天下小有一國將少人徒省官職上功勞苦與百姓均事業齊功勞若是則不威不威則賞罰不行賞不行則賢者不可得而進也罰不行則不肖者不可得而退也賢者不可得而進不肖不可得而退則能不能不可得而官也若是則萬物失宜事變失應上失天時下失地利中失人和天下敖然若燒若焦墨子雖為之衣褐帶索嚽菽飲水惡能足之乎既以伐其本竭其原而焦天下矣故先王聖人為之不然知夫, WYG: 死}
