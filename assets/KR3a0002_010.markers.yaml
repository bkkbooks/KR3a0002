  - {type: variant, offset: 2704, length: 0, content: '', SBCK: 後雖欲無化能乎哉故民歸之如流水所存者神所爲者化所至之處存至也言爲民皆從化也畏之如神凡所施而順暴悍勇力之屬爲之化而愿力之人皆化而愿慤也順從也謂好從暴悍勇旁辟曲私之屬爲之化而公辟讀爲僻旁偏頗也矜糺收繚之屬爲之化而調繚繞言委曲也四者皆鄙陋之人今被化則調和也矜謂夸汰糺謂好發摘人過者也收謂掠美者也繚謂夫是之謂大化至一至一極一也大化者皆化也詩曰王猶允}
