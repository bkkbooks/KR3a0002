  - {type: variant, offset: 543, length: 0, content: '', SBCK: 地雖大其稅必寡是危國之兵也寡資用貧乏故優復既多則稅危國秦人其生民也陿阸其使民也酷烈民生地險固則寇不能害嚴刑罰則人皆致死也所生之地陿阸謂秦地險固也酷烈嚴刑罰也劫之以埶廹之使出戰謂以威埶劫隱之以阸氏曰秦地多阸藏隱其民於阸謂隱蔽以險阸使敵不能害鄭中忸之以慶賞之賞慶使習以爲常忸女九反忸與狃同串習也戰勝則與鰌之以刑罰蛇曰鰌我亦勝我音秩或作䠓七六反鰌藉也不勝則以刑罰陵藉之莊子風謂使}
  - {type: page-break, offset: 543, content: '', id: KR3a0002_SBCK_010-7a}
