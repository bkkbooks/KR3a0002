  - {type: variant, offset: 1388, length: 2, content: 兼足, WYG: 詩大雅文王有聲之篇王者有誅而無戰城守不攻兵格不擊徳義未加所以敵人不服故不攻擊也且恐傷我之士卒也上下相喜則慶之敵人上下相愛悦則慶賀之豈尚侵伐乎不屠城屠謂毁其城殺其民若屠者然也不濳軍不留衆不久留暴露於外也師不越時古者行役不踰時也故亂者樂其政不安其上欲其至也東征西怨之比臨武君曰善陳囂問孫卿子曰先生議兵常以仁義為本陳囂荀卿弟子言先生之議常言兵以仁義為本仁者愛人義者循理然則又何以兵為愛人則懼其殺傷循理則不欲争奪焉肯抗兵相加乎凡所爲有兵者為爭奪也非謂愛人循理孫卿子曰非女所知也彼仁者愛人愛人故惡人之害之也義者循理循理故惡人之亂之也彼兵者所以禁暴除害也非争奪也故仁人之兵所存者神所過者化所存止之處畏之如神所過往之國無不從化若時雨之降莫不說喜是以堯伐驩兠伐亦誅也書曰放驩兠于崇山也舜伐有苖命禹伐之書曰帝曰咨禹惟時有苖弗率汝徂征之禹伐共工書曰流共工于幽州皆堯之事此云禹伐共工未詳也湯伐有夏文王伐崇武王伐紂此二帝四王夏殷或稱王或稱帝曲禮曰措之廟立之主曰帝四王謂夏殷也至周自貶損全稱王故以文武為兩王也皆以仁義之兵行於天下也故近者親其善逺方慕其徳兵不血刄逺邇來服徳盛於此施及四極詩曰淑人君子其儀不忒此之謂也曹風鳴鳩之篇李斯問孫卿子曰李斯孫卿弟子後為秦相秦四世有勝兵彊海内威行諸侯非以仁義為之也以便從事而已便其所從之事而已謂若刼之以勢隱之以阨忸之以慶賞鰌之以刑罰之比也孫卿子曰非女所知也女所謂便者不便之便也汝以不便人為便之也吾所謂仁義者大便之便也吾以大便人為便也彼仁義者所以修政者也政修則民親其上樂其君而輕為之死故曰凡在於軍將率末事也荀卿前對趙孝成王有此語弟子所知故引以答之也秦四世有勝諰諰然常恐}
