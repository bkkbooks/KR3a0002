  - {type: variant, offset: 5, length: 2, content: 萬物, WYG: 五臨武君與孫卿子議兵於趙孝成王前臨武君盖楚􅀈未知姓名戰國䇿曰天下合從趙使魏加見楚春申君曰君有將乎春申君曰有矣僕欲將臨武君魏加曰臣少之時好射臣願以射譬可乎春申君曰可魏加曰異日者更嬴與王處京臺之下更嬴曰臣能為王引弓虚發而下鳥有間鳴鴈從東方來更嬴以虚發而下之王曰射之精乃至於此乎更嬴曰此孽也王曰先生何以知之對曰其飛徐者其創痛也其鳴悲者久失羣也故羣創未息而驚心未去聞弦音烈而髙飛故云也今臨武君嘗為秦孽不可以為距秦之將趙孝成王晉大夫趙夙之後簡子十世孫或曰劉向叙云孫卿至趙與孫臏議兵趙孝成王前臨武君即孫臏也今案史記年表齊宣王二年孫臏為軍師則敗魏於馬陵至趙孝成王元年已七十餘年年代相逺疑臨武君非此孫臏也王曰請問兵要臨武君對曰上得天時若順太歳及孤虚之類也下得地利若右背山陵前左水澤之比也觀敵之變動後之發先之至此用兵之要術也孫卿子曰不然臣所聞古之道凡用兵攻戰之本在乎一民弓矢不調則羿不能以中微六馬不和則造父不能以致逺士民不親附則湯武不能以必勝也故善附民者是乃善用兵者也故兵要在乎善附民而已臨武君曰不然兵之所貴者勢利也乘勢争利所行者變詐也竒計也善用兵者感忽悠闇莫知其所從出感忽悠闇皆謂倐忽之間也感忽恍忽也悠闇逺視分辨之貎莫知所從出謂若九天之上九地之下使敵人不測魯連子曰弃感忽之恥累世之功也孫吳用之無敵於天下豈必待附民哉孫謂吳王闔閭將孫武吳謂魏武侯將吳起也孫卿子曰不然臣之所道仁人之兵王者之志也帝王之志意如此也君之所貴權謀勢利也所行攻奪變詐者諸侯之事也仁人之兵不可詐也彼可詐者怠慢者也路亶者也路暴露也亶讀為袒露袒謂上下不相覆葢新序作落單君臣上下之間滑然有離徳也滑亂也音骨言彼可欺詐者皆如此之國故以桀詐桀猶巧拙有幸焉以桀詐堯譬之若以卵投石以指撓沸撓攬也以指撓沸言必爛也新序作以指繞沸若赴水火入焉焦沒耳故仁人上下說仁人上下相愛之意百將一心三軍}
