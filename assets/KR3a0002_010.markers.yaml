  - {type: variant, offset: 2746, length: 1, content: 利, SBCK: 權彌重兼人而兵俞強是以德兼人者也愈下同俞讀爲非貴我名聲也非美我德行也彼畏我威劫我埶所劫也爲我埶故民雖有離心不敢有畔慮若是則戎甲俞衆奉養必費必煩費也奉養戎甲是故得地而權彌輕兼人而兵俞弱是以力兼人者也非貴我名聲也非美我德行也用貧求富用飢求飽虚腹張口來歸我食若是則必發夫掌窌}
