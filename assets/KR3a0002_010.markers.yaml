  - {type: variant, offset: 754, length: 0, content: '', SBCK: 進聞金聲而退順命爲上有功次之命故有功次之軍之所重在順令不進而進猶令不退而退也其罪惟均令也令敎不退而退其罪同也言使之不進而進猶令不殺老弱不獵禾稼躐同獵與也踐服者不禽格者不舎犇命者不獲戰而退服謂不來歸其命者不獲之爲囚俘也犇與奔同者不追禽之格謂相拒捍者奔命謂奔走凡誅非誅其百姓也誅其亂百姓者也百姓有扞其賊則是亦賊也賊之扞蔽也扞其賊謂爲以故順刃者生蘇刃者死犇命者貢爲傃傃向也謂相向格􅃲者貢順刃謂不戰偝之而走者蘇讀獻於上將也謂取歸命者微子開封於宋後封於宋此云開者紂之庶兄名啓歸周劉向改之也蓋漢景帝諱曹觸龍斷於軍富有四海其臣有左􅀃苑曰桀貴爲天子左師觸龍􅀃大后請長安君質秦豈復與古}
