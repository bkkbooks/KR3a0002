  - {type: variant, offset: 774, length: 142, content: 本也安之者是安天下之本也貴之者是貴天下之本也古者先王分割而等異之也故使或美或惡或厚或薄或佚樂或劬勞非特以為淫泰夸麗之聲將以明仁之文通仁之順也故為之雕琢刻鏤黼黻文章使足以辨貴賤而已不求其觀為之鍾鼓管磬琴瑟竽笙使足以辨吉凶合歡定和而已不求其餘為之宮室臺榭使足以避燥溼養德辨輕重而已不求其外, SBCK: 謂人師長師}
