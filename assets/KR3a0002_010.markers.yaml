  - {type: variant, offset: 536, length: 4, content: 重皆有稱, WYG: 易其賞則弱也刑威者彊刑侮者弱刑當罪使民可畏則彊不當罪則人侮僈故弱也械用兵革攻完便利者彊攻當為功精好加功}
