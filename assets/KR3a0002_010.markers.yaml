  - {type: variant, offset: 542, length: 0, content: '', WYG: 器械牢固便利於用則彊也械用兵革窳楛不便利者弱窳器疾也音瘐楛濫惡謂不堅固也重用兵者彊輕用兵者弱重難用兵者彊權出一者彊權出二者弱政多門則弱是彊弱之常也齊人隆技擊技技力也齊人以勇力擊斬敵者號為技擊孟康曰兵家之技巧技巧者習手足便器械積機闗以立攻守之勝者其技也得一首者賜贖錙金無本賞矣八兩曰錙本賞謂有功同受賞也其技擊之術斬得一首則官賜錙金贖之斬首雖戰敗亦賞不斬首雖勝亦不賞是無本賞也是事小敵毳則偷可用也可偷竊用之也毳讀為脆史記聶政謂嚴仲子曰屠可以旦夕得甘脆以養親也事大敵堅則渙焉離耳易說卦曰渙者離也若飛鳥然傾側反覆無日若飛鳥言無憑依而易也無日言傾側反覆之速不得一日也是亡國之兵也兵莫弱是矣是其出賃市傭而戰之幾矣此與賃市中傭作之人而使之戰相去幾何也魏氏之武卒以度取之武卒選擇武勇之卒號為武卒度取之謂取其長短材力中度者衣三屬之甲如淳曰上身一髀褌一脛繳一凡三屬也衣於氣反屬之欲反操十二石之弩負服矢五十箇置戈其上置戈於身之上謂荷戈也冠䩜帶劔䩜與胄同漢書作胄帶劒顔師古曰著兜牟而又帶劒也贏三日之糧日中而趨百里贏負擔也日中一日之中也中試則復其户利其田宅復其户不徭役也利其田宅不征衆也顔師古曰利謂給其便利之處中丁仲反復方目反是數年而衰而未可奪也改造則不易周也此中試者筋力數年而衰亦未可􅑈奪其優奪其優復使皆怨也改造更選擇也則又如前是}
