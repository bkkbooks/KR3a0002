  - {type: variant, offset: 1316, length: 0, content: '', WYG: 未免盗兵也契讀為挈持也掎挈猶言掎摭也司讀為伺詐欺誑也皆謂因其危弱即掩襲之也齊桓晉文楚莊吳闔閭越勾踐是皆和齊之兵也可謂入其域矣入禮義教化之域孟康曰入王兵之域也然而未有本統也本統謂前行素修若湯武也故可}
