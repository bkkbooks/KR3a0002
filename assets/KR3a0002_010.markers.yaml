  - {type: variant, offset: 5, length: 2, content: 萬物, SBCK: 五臨武君與孫卿子議兵於趙孝成王前武臨申君曰君有將乎春申君曰有矣僕欲將臨武君魏加曰臣君蓋楚將未知姓名戰國䇿曰天下合從趙使魏加見楚春更嬴與王處京臺之下更嬴曰臣能爲王引弓虚發而下鳥少之時好射臣願以射譬可乎春申君曰可魏加曰異曰者於此乎更嬴曰此孽也王曰先生何以知之對曰其飛徐者有閒鳴鴈從東方來更嬴以虚發而下之王曰射之精乃至􅁌音烈而髙飛故隕也今臨武君甞爲秦孽不可以爲距秦其創痛也其鳴悲者久失羣也故創痛未息而驚心未去聞孫卿至趙與孫臏議兵趙孝成王前臨武君即孫臏也今桉史之將趙孝成王晉大夫趙夙之後簡子十世孫或曰劉向叙云成王元年已七十餘年年代相逺疑臨武君非此孫臏也記年表齊宣王二年孫臏爲軍師則敗魏於馬陵至趙孝王曰請問兵要臨武君對曰上得天時歳反􅀌若順太類也虚之下得地利左水澤之比也若右背山陵前觀敵之變動後之發先之至此用兵之要術也孫卿子曰不然臣所聞古之道凡用兵攻戰之本在乎壹民弓矢不調則羿不能以中微六馬不和則造父不能以致逺士民不親附則湯武不能以必勝也故善附民者是乃善用兵者也故兵要在乎善附民而已臨武君曰不然兵之所貴者埶利也爭利乘埶所行者變詐也計竒善用兵者感忽悠闇莫知其所從出逺視不分辨之貎莫知所從出謂若九天之上感忽悠闇皆謂倐忽之閒也感忽恍忽也悠闇曰棄感忽之恥累世之功也九地之下使敵人不測魯連子孫吳用之無敵於天下豈必待附民哉吳謂魏武侯將吳起也孫謂吳王闔閭將孫武孫卿子曰不然臣之所道仁人之兵王者之志也之志帝王此也意如君之所貴權謀埶利也所行攻奪變詐者諸侯之事也仁人之兵不可詐也彼可詐者怠慢者也路亶者也上下不相覆蓋新叙作落單路暴露也亶讀爲袒露袒謂君臣上下之閒滑然有離德者也言彼可欺詐滑亂也音骨之國也者皆如此故以桀詐桀猶巧拙有幸焉以桀詐堯譬之若以卵投石以指撓沸指撓沸言撓攬也以作以指繞沸必爛也新序若赴水火入焉焦没耳故仁人上下相愛之意􅀃仁人上下百將一心三軍}
