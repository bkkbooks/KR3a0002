  - {type: variant, offset: 1331, length: 4, content: 汙漫暴亂, WYG: 任則主不能喜敵不能怒不苟徇上意故主不能喜不為變詐故敵不能怒也夫是之謂至臣為臣之至當也慮必先事}
  - {type: 'tls:seg', offset: 1335, content: '', id: KR3a0002_tls_010-7a.15}
  - {type: variant, offset: 1336, length: 0, content: '', WYG: 申之以敬謀慮必在事先重之以敬常戒懼而有僃也愼終如始終始如一夫是之謂大吉言必無覆敗之禍也凡百事之成也必在敬之其敗也必在慢之故敬勝怠則吉怠勝敬則滅計勝欲則從欲勝計則凶戰如守不務越逐也書曰不愆于五歩六歩乃止齊焉行如戰有功如幸不務驕矜敬謀無壙無壙言不敢須臾不敬也壙與曠同敬事無壙敬吏無壙敬衆無壙敬敵無壙夫是之謂五無壙愼行此六術五權三至而處之以恭敬無壙夫是之謂天下之}
