  - {type: variant, offset: 2914, length: 415, content: 觀其便嬖則其信者不愨是闇主已凡主相臣下百吏之屬其於貨財取與計數也須孰盡察其禮義節奏也芒軔僈楛是辱國已其耕者樂田其戰士安難其百吏好法其朝廷隆禮其卿相調議是治國已觀其朝廷則其貴者賢觀其官職則其治者能觀其便嬖則其信者愨是明主已凡主相臣下百吏之屬其於貨財取與計數也寬饒𥳑易其於禮義節奏也陵謹盡察是榮國已賢齊則其親者先貴能齊則其故者先官其臣下百吏汙者皆化而脩悍者皆化而愿躁者皆化而愨是明主之功已觀國之強弱貧富有徵上不隆禮則兵弱上不愛民則兵弱已諾不信則兵弱慶賞不漸則兵弱將率不能則兵弱上好攻取功則國貧上好利則國貧士大夫眾則國貧工商眾則國貧無制數度量則國貧下貧則上貧下富則上富故田野縣鄙者財之本也垣窌倉廩者財之末也百姓時和事業得敘者貨之源也等賦府庫者貨之流也故明主必謹養其和節其流開其源而時斟酌焉潢然使天下必有餘而上不憂不足如是則上下俱富交無所藏之是知國計之極也故禹十年水湯七年旱而天下無菜色者十年之後年穀復孰而陳積有餘是無它故焉知本末源流之謂, WYG: 凝}
