  - {type: variant, offset: 3428, length: 621, content: 數焉是無它故焉其所以失之一也君人者亦可以覺矣百里之國足以獨立矣凡攻人者非以為名則案以為利也不然則忿之也仁人之用國將脩志意正身行伉隆高致忠信期文理布衣紃屨之士誠是則雖在窮閻漏屋而王公不能與之爭名以國載之則天下莫之能隱匿也若是則為名者不攻也將辟田野實倉廩便備用上下一心三軍同力與之遠舉極戰則不可境內之聚也保固視可午其軍取其將若撥麷彼得之不足以藥傷補敗彼愛其爪牙畏其仇敵若是則為利者不攻也將脩小大強弱之義以持慎之禮節將甚文珪璧將甚碩貨賂將甚厚所以說之者必將雅文辨慧之君子也彼苟有人意焉夫誰能忿之若是則為忿者不攻也為名者否為利者否為忿者否則國安于盤石壽於旗翼人皆亂我獨治人皆危我獨安人皆失喪之我按起而制之故仁人之用國非特將持其有而已矣又將兼人詩曰淑人君子其儀不忒其儀不忒正是四國此之謂也持國之難易事強暴之國難使強暴之國事我易事之以貨寶則貨寶單而交不結約信盟誓則約定而畔無日割國之錙銖以賂之則割定而欲無猒事之彌煩其侵人愈甚必至於資單國舉然後已雖左堯而右舜未有能以此道得免焉者也辟之是猶使處女嬰寶珠佩寶玉負戴黃金而遇中山之盜也雖為之逄蒙視詘要橈膕若盧屋妾由將不足以免也故非有一人之道也直將巧繁拜請而畏事之則不足以持國安身故明君不道也必將脩禮以齊朝正法以齊官平政以齊民然後節奏齊於朝百事齊於官眾庶齊於下如是則近者競親遠方致願上下一心三軍同力名聲足以暴炙之威強足以捶笞之拱揖指麾而強暴之國莫不趨使譬之是猶烏獲與焦僥搏也故曰事強暴之國難使強暴之國事我易此之謂也, SBCK: ''}
