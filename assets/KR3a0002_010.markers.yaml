  - {type: variant, offset: 1337, length: 2, content: 大危, WYG: 則通於神明矣天下莫及之將臨武君曰善請問王者之軍制孫卿子曰將死鼓死謂不棄之而奔}
  - {type: punctuation, offset: 1341, content: 。, id: KR3a0002_tls_010-bkkpn277}
  - {type: 'tls:seg', offset: 1341, content: '', id: KR3a0002_tls_010-7a.16}
  - {type: variant, offset: 1341, length: 0, content: '', WYG: 左傳曰師之耳目在吾旗鼓馭死轡百吏死職士大夫死行列聞鼓聲而進聞金聲而退順命為上有功次之軍之所重在順命故有功次之令不進而進猶令不退而退也其罪惟均令教令也言使之不進而進猶令不退而退其罪同也不殺老弱不獵禾稼獵與踐同踐也服者不禽格者不赦犇命者不獲服謂不戰而退者不追禽之格謂相距捍者奔命謂奔走來歸其命者不獲之為囚俘也犇與奔同凡誅非誅其百姓也誅其亂百姓者也百姓有捍其賊則}
  - {type: page-break, offset: 1341, content: '', id: KR3a0002_WYG_010-10b, image: WYG0695/WYG0695-0208b.png}
  - {type: variant, offset: 1342, length: 0, content: '', WYG: 亦賊也捍其賊謂為賊之捍蔽也}
  - {type: variant, offset: 1343, length: 0, content: '', WYG: 故順刄者生蘇刄者死犇命者貢順刄謂不戰背之而走者蘇讀為傃傃向也謂相向格鬬者貢謂取歸命者獻於上將也微子開封於宋紂之庶兄名啓歸周後封於宋此云開者盖漢景帝諱劉向改之也曹觸龍斷於軍說苑曰桀貴為天子富有四海其}
