  - {type: variant, offset: 1395, length: 0, content: '', WYG: 漢地志沛國有垂鄉豈垂沙乎史記楚懐王二十八年秦與齊韓魏共攻楚殺楚將唐昧取我重丘而去昧與蔑同莊蹻起楚分而為三四司馬貞史記素隱曰莊蹻楚將言其起為亂後楚遂分為四韓子曰楚王欲伐越莊子曰臣患目能見百歩而不見􅊿王之兵敗於齊晉莊蹻為盗境内吏不能禁而欲伐越此智之如目也蹻初為盗後為楚將是豈無堅甲利兵也哉其所以統之者非其道故也汝潁以為險江漢以為池限之以鄧林縁之以方城鄧林北界鄧地之山林縁繞也方城楚北界山名也然而秦師至而鄢郢舉若振槁然舉謂舉而取之鄢郢楚都振擊也槁枯葉也謂白起伐楚一戰舉鄢郢也是豈無固塞隘阻也哉其所以統之者非其道故也紂刳比干囚箕子為炮烙刑列女傳曰炮烙為膏銅柱加之炭上令有罪者行焉輒墜火中紂與妲己大笑烙古責反殺戮無時臣下凛然莫必其命凛然悚慄之貎莫自謂必全其命也然而周師至而令不行乎下不能用其民是豈令不嚴刑不繁也哉其所以統之者非其道故也古之兵戈矛弓矢而已矣然而敵國不待試而詘試用也詘服也城郭不辨辨治也或音辦溝池不拑拑古掘字史記作城郭不集溝池不掘也文子曰無伐樹木無鉗墳墓鉗亦音掘或曰拑當作相篆文相字與拑字相近遂誤耳固塞不樹機變不張固塞謂使邊竟險固若今之邊城也樹立也塞先代反機變謂器械變動攻敵也然而國晏然不畏外而}
