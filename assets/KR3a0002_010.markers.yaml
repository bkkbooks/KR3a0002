  - {type: variant, offset: 999, length: 148, content: 其知慮足以治之其仁厚足以安之其德音足以化之得之則治失之則亂百姓誠賴其知也故相率而為之勞苦以務佚之以養其知也誠美其厚也故為之出死斷亡以覆救之以養其厚也誠美其德也故為之雕琢刻鏤黼黻文章以藩飾之以養其德也故仁人在上百姓貴之如帝親之如父母為之出死斷亡而不愉者無它故焉其所是焉誠美其所得焉誠大其所利焉誠多詩, WYG: 泰誓}
