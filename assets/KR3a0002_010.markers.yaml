  - {type: variant, offset: 2743, length: 0, content: '', SBCK: 凡兼人者有三術有以德兼人者有以力兼人者有以富兼人者彼貴我名聲美我德行欲爲我民故辟門除涂以迎吾入同開也辟與闢道涂也除涂治其因其民襲其處而百姓皆安之愛恱因其民言}
