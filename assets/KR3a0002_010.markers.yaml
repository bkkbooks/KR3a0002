  - {type: variant, offset: 1950, length: 0, content: '', SBCK: 百姓者無禮義忠信焉慮率用賞慶刑罰埶詐除阸其下獲其功用而已矣言大凡也除焉慮無慮猶以阸狃之以慶賞之類阸或爲險也謂驅逐阸謂廹蹙若秦劫之以埶隱之大宼則至使之持危城則必畔遇敵處戰則必北北者乖背北敗走也走爲北也之名故以敗勞苦煩辱則必犇奔同犇與霍焉離耳下反制其上則上下易位若秦項然霍焉猶渙焉也離散之後故賞慶刑罰埶詐之爲道者傭徒粥賣之道也}
  - {type: page-break, offset: 1950, content: '', id: KR3a0002_SBCK_010-18b}
  - {type: variant, offset: 1950, length: 0, content: '', WYG: 百姓者無禮義忠信焉慮率用賞慶刑罰勢詐除扼其下獲其功用而已矣焉慮無慮猶言大凡也除謂驅逐阨謂廹蹙若秦劫之以勢隱之以扼狃之以慶賞之類阨或為險大宼則至使之持危城則必畔遇敵處戰則必北北敗走也北者乖背之名故以敗走為北也勞苦煩辱則必犇犇與奔同霍焉離耳下反制其上霍焉猶渙焉也離散之後則上下易位若秦項然故賞慶刑罰勢詐之為道者傭徒鬻賣之道也}
