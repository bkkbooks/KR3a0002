  - {type: variant, offset: 194, length: 325, content: 若明分使群矣強脅弱也知懼愚也民下違上少陵長不以德為政如是則老弱有失養之憂而壯者有分爭之禍矣事業所惡也功利所好也職業無分如是則人有樹事之患而有爭功之禍矣男女之合夫婦之分婚姻娉內送逆無禮如是則人有失合之憂而有爭色之禍矣故知者為之分也足國之道節用裕民而善臧其餘也節用以禮裕民以政彼裕民故多餘裕民則民富民富則田肥以易田肥以易則出實百倍上以法取焉而下以禮節用之餘若丘山不時焚燒無所臧之夫君子奚患乎無餘也故知節用裕民則必有仁義聖良之名而且有富厚丘山之積矣此無他故焉生於節用裕民也不知節用裕民則民貧民貧則田瘠以穢田瘠以穢則出實不半上雖好取侵奪猶將寡獲也而或以無禮節用之則必有貪利糾譑之名而且有空虛窮乏之實矣此無他故焉不知節用裕民也康誥曰弘覆乎天若德裕乃身不廢在王庭, SBCK: 我敢遏}
