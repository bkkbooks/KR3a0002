  - {type: variant, offset: 766, length: 1, content: 美, WYG: 齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之銳士秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義有遇}
