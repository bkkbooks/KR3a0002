  - {type: 'tls:seg', offset: 523, content: '', id: KR3a0002_tls_010-3a.2}
  - {type: variant, offset: 523, length: 0, content: '', SBCK: 師本由仁義雖用武持􅃏而猶以敬爲先故得如火詩殷頌武王湯也發讀爲斾虔敬遏止也湯建斾興止之也之盛無能孝成王臨武君曰善請問王者之兵設何道何行而可敎令也行動用也設謂制置道謂論􅀃孫卿子曰凡在大王將率末事也臣請遂道王者諸侯強弱存亡之效安危之埶同所類率與帥遂問用兵之術荀卿欲陳王道因不荅其問故言凡在大王反道􅀃也效驗也孝成王見荀卿論兵謂王者以兵爲急故遂廣􅀃湯武五霸及戰國諸侯之事之所務將帥乃其末事耳所急敎化也君賢者其國治君不能者其國亂隆}
  - {type: variant, offset: 523, length: 0, content: '', WYG: 詩殷頌武王湯也發讀為斾䖍敬遏止也湯建斾興師本由仁義雖用武持鉞而猶以敬為先故得如火之盛無能止之也孝成王臨武君曰善請問王者之兵設何道何行而可設謂制置道謂論說教令也行動用也孫卿子曰凡在大王將率末事也臣請遂道王者諸侯彊弱存亡之效安危之勢率與帥同所類反道說也效驗也孝成王見荀卿論兵謂王者以兵為急故遂問用兵之術荀卿欲陳王道因不答其問故言凡在大王之所務將帥乃其末事耳所急教化也遂廣說湯武五霸及戰國諸侯之事也君賢者其國治君不能者其國亂隆}
  - {type: variant, offset: 523, length: 0, content: '', krp: 師本由仁義雖用武持鉞而猶以敬爲先故得如火詩殷頌武王湯也發讀爲斾虔敬遏止也湯建斾興止之也之盛無能孝成王臨武君曰善請問王者之兵設何道何行而可敎令也行動用也設謂制置道謂論說孫卿子曰凡在大王將率末事也臣請遂道王者諸侯強弱存亡之效安危之埶同所類率與帥遂問用兵之術荀卿欲陳王道因不荅其問故言凡在大王反道說也效驗也孝成王見荀卿論兵謂王者以兵爲急故遂廣說湯武五霸及戰國諸侯之事之所務將帥乃其末事耳所急敎化也君賢者其國治君不能者其國亂隆}
