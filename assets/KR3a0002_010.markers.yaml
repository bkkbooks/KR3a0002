  - {type: variant, offset: 727, length: 2, content: 爭爭, SBCK: 主不能喜敵不能怒喜不爲變詐故敵不能不苟徇上意故主不能也怒夫是之謂至臣至當也爲臣之慮必先事而申之以敬敬常戒懼而有備也謀慮必在事先重之以愼終如始終始如一失是之謂大吉敗之禍也言必無覆凡百事之成也必在敬之其敗也必在慢之故敬勝怠}
