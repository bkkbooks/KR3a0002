  - {type: variant, offset: 1122, length: 1, content: 愉, SBCK: 見其睫主之兵敗於齊晉莊蹻爲盜境内吏不是豈無堅甲利兵也哉其所以統之者非其道故也汝潁以爲險江漢以爲池限之以鄧林縁之以方城繞也方城楚北界山名也鄧林北界鄧地之山林縁然而秦師至而鄢郢舉若振槁然鄢郢楚都振擊舉謂舉而取之伐楚一戰舉鄢郢也也槁枯葉也謂白起是豈無固塞隘阻也哉其所以統之者非其道故也紂刳比干囚箕子爲炮烙刑者行焉輙墮火中紂與妲己大笑烙古責反列女傳曰炮烙謂膏銅柱加之炭上令有罪殺戮無時臣下懔然莫必其命貌莫自謂必懔然悚栗之命也全其然而周師至而令不行乎下不能用其民是豈令不嚴刑不繁也哉其所以統之者非其道故也古之兵戈矛弓矢而已矣然而敵國不待試而詘詘服也試用也城郭不辦治辦音辨也或溝池不拑掘文子曰無伐樹木無鉗墳墓鉗亦拑古掘字史記作城郭不集溝池不抇字與拑字相近遂誤耳音掘或曰拑當爲抇􅂐文固塞不樹機變不張也塞先代反機變謂器械變動攻敵也固塞謂使邊境險固若今之邊城也樹立然而國晏然不畏外而明内}
