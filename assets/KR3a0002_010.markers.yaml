  - {type: variant, offset: 1190, length: 171, content: 而後功百姓之群待之而後和百姓之財待之而後聚百姓之埶待之而後安百姓之壽待之而後長父子不得不親兄弟不得不順男女不得不歡少者以長老者以養故曰天地生之聖人成之此之謂也今之世而不然厚刀布之斂以奪之財重田野之稅以奪之食苛關市之征以難其事不然而已矣有掎挈伺詐權謀傾覆以相顛倒以靡敝之百姓曉然皆知其汙漫暴亂而將大危亡也是以臣或弒其君下或殺其上粥其城倍其節而不, SBCK: ''}
