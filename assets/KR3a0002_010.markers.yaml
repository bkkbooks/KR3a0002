  - {type: variant, offset: 769, length: 0, content: '', krp: 也無異周人故近者歌謳而樂之逺者竭蹷而趨之顛仆竭蹷作竭走而趨之猶言匍匐也新序無幽閒辟陋之國莫不趨使而安樂之四海之内若一家通達之屬莫不從服夫}
  - {type: variant, offset: 770, length: 3, content: 美天下, SBCK: ''}
  - {type: variant, offset: 770, length: 1, content: 美, WYG: 數國者皆干賞蹈利之兵也傭徒鬻賣之道也未有貴上安制綦節之理也干求也言秦魏雖足以相勝皆求賞蹈利之兵與傭徒之人鬻賣其力作無異未有愛貴其上為之致死安於制度自不踰越極於中義心不為非之理者也諸侯有能微妙之以節則作而兼殆之耳微妙精盡也節仁義也作起也殆危也諸侯有能精盡仁義則起而無危也兼此數國謂禽滅之故招近募選隆勢詐尚功利是漸之也近當為延傳寫誤耳招延謂引致之也募選謂以財召之而選擇可者此論齊之技擊也隆勢詐謂以威勢變詐為尚此論秦也尚功利謂有功則利其田宅論魏也漸進也言漸進而近於法未為理也或曰漸浸漬也謂其賞罰纔可漸染於外中心未恱服漸子亷反禮義教化是齊之也服其心是齊一人之術也故以詐遇詐猶有巧拙焉猶齊之技擊不可以當魏之武卒也以詐遇齊辟之猶以錐刀墮太山也辟音譬墮毁也錐許唯反非}
