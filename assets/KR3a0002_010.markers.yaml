  - {type: variant, offset: 1393, length: 0, content: '', WYG: 一合而軋已也漢書諰作鰓蘇林曰讀如愼而無禮則葸之葸鰓懼貎也先禮反張晏曰軋踐轢之也此所謂末世之兵未有本統也本統前行素修故湯之放桀也非其逐之鳴條之時也武王之誅紂也非以甲子之朝而後勝之也皆前行素修也此所謂仁義之兵也前行素修謂前已行之素已修之行讀如字今女不求之於本而索之於末此世之所以亂也本謂仁義末謂變詐世所以亂亦由不求於本而索於末如李斯之說也禮者治辯之極也彊國之本也威行之}
  - {type: variant, offset: 1394, length: 0, content: '', WYG: 也功名之揔也辯别也揔要也彊國謂彊其國也王公由之所以得天下也不由所以隕社稷也故堅甲利兵不足以為勝髙城深池不足以為固嚴令繁刑不足以為威由其道則行不由其道則廢由用也道即禮也用禮即行不用禮雖堅甲嚴刑皆不足恃也楚人鮫革犀兕以為甲鞈如金石鞈堅貎以鮫魚皮及犀兕為甲堅如金石之不可入史記作堅如金石鞈古洽反管子曰制重罪入以兵甲犀脇二㦸輕罪入蘭盾鞈革二㦸犀兕堅如金石之狀也宛鉅鐵釶􅃤如蠭蠆宛地名属南陽徐廣曰大鋼曰鉅釶與鍦同矛也方言云自闗而西謂之矛吳揚之間謂之鍦言宛地出此剛鐵為矛􅃤如蜂蠆言其中人之􅃤毒也鍦音啻輕利僄遫卒如飄風言楚人之􅀈㨗也僄亦輕也匹妙反或當為嫖姚之嫖嫖驍勇也遫與速同然而兵殆於垂沙唐篾死殆謂危亡也垂沙地名未詳所}
  - {type: page-break, offset: 1394, content: '', id: KR3a0002_WYG_010-13b, image: WYG0695/WYG0695-0209d.png}
