  - {type: 'tls:seg', offset: 549, content: '', id: KR3a0002_tls_010-3a.7}
  - {type: variant, offset: 551, length: 4, content: 玄裷衣冕, SBCK: 有能微妙之以節則作而兼殆之耳義也作起也殆危微妙精盡也節仁而無危也兼此數國謂擒滅之也諸侯有能精盡仁義則能起故招近募選隆埶詐尚功利是漸之也謂引致之也募選謂以財近當爲延傳寫誤耳招延詐爲尚此論秦也尚功利謂有功則利其田宅論魏也漸召之而選擇可者此論齊之技擊也隆埶詐謂以威埶變謂其賞罰纔可漸染於外中心未恱服漸子廉反進也言漸進而近於法未爲理也或曰漸浸漬也禮義敎化是齊之也壹人之術也服其心是齊故以詐遇詐猶有巧拙焉以當魏之武卒也猶齊之技擊不可以詐遇齊辟之猶以錐刀墮}
