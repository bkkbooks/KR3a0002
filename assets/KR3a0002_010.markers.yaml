  - {type: variant, offset: 769, length: 0, content: '', SBCK: 也無異周人故近者歌謳而樂之逺者竭蹷而趨之顛仆竭蹷作竭走而趨之猶言匍匐也新序無幽閒辟陋之國莫不趨使而安樂之四海之内若一家通達之屬莫不從服夫}
