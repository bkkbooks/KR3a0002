  - {type: variant, offset: 1110, length: 0, content: '', krp: 其善逺方慕其德兵不血刃逺邇來服德盛於此施及四極詩曰淑人君子其儀不忒此之謂也鳩之篇謂曹風尸李斯問孫卿子曰子後爲秦相李斯孫卿弟秦四世有勝兵強海内威行諸侯非以仁義爲之也以便從事而已之以阸狃之以慶賞鰌之以刑罰之比便其所從之事而已謂若劫之以埶隱孫卿子曰非女所知也女所謂便者不便之便也爲便之也汝以不便人吾所謂仁義者大便之便也人爲便也吾以大便彼仁義者所以脩政者也政脩則民親其上樂其君而輕爲之死故曰凡在於軍將率末事也語弟子所知故引以答之也荀卿前對趙孝成王有此言秦四世有勝諰諰然常恐天下之一合而軋已也之葸鰓懼貌也先禮反張晏曰軋踐轢也漢書諰作鰓蘇林曰讀如愼而無禮則葸此所謂末世之兵未有本統也行素脩本統前故湯之放桀也非其逐之鳴條之時也武王之誅紂也非以甲子之朝而後勝之也皆前行素脩也此所謂仁義之兵也素已修之行讀如字前行素脩謂前已行之今女不求之於本而索之於末此世之所以亂也不求於本而索於末如李斯之說也本謂仁義末謂變詐世所以亂亦由禮者治辨之極也強國之本也威行之道也功名之揔也國謂強其國也辨别也揔要也強王公由之所以得夫下也不由所以隕社稷也故堅甲利兵不足以爲勝髙城深池不足以爲固嚴令繁刑不足以爲威由其道則行不由其道則廢道即禮由用也堅甲嚴刑皆不足恃也也用禮即行不用禮雖楚人鮫革犀兕以爲甲鞈如金石史記作堅如金石鞈古洽反管子曰制重罪入以兵鞈堅貌以鮫魚皮及犀兕爲甲堅如金石之不可入二㦸犀兕堅如金石之狀也甲犀脅二㦸輕罪入蘭盾鞈革宛鉅鐵釶慘如蠭蠆云自關而西謂之矛呉揚之間謂之釶言宛地出此剛宛地名屬南陽徐廣曰大剛曰鉅釶與釶同矛也方言中人之慘毒也鉇音啻鐵爲矛慘如蜂蠆言其輕利僄遬卒如飄風楚言爲嫖姚之嫖嫖驍勇也遬與速同人之趫捷也僄亦輕也匹妙反或當然而兵殆於垂沙唐篾死沛郡有垂鄉豈垂沙乎史記楚懷王二十殆謂危亡也垂沙地名未詳所在漢地志唐昧取我重丘而去昧與蔑同􅊨八年秦與齊韓魏共攻楚殺楚將莊蹻起楚分而爲三四分爲四韓子曰楚王欲伐越莊子曰臣患目能見百司馬貞史記索隱曰莊蹻楚將言其起爲亂後楚遂能禁而欲伐越此智}
