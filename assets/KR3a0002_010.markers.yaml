  - {type: variant, offset: 725, length: 1, content: 分, SBCK: 急勝而忘敗無威内而輕外無見其利而不顧其害戰而輕敵強使人出凡慮事欲孰而用財欲泰審泰謂孰謂精賞也不吝夫是之謂五權之機權也五者爲將所以不受命於主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至而不變至謂一守凡受命於主而行三軍三軍旣定百官得序羣物皆正得序各當其任百官軍之百吏}
