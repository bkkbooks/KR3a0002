  - {type: variant, offset: 720, length: 0, content: '', SBCK: 陵奪矣處舍營壘也收臧財物也周徙舉進退欲安以重欲疾以速不爲輕舉動靜則安重而不失機權則疾速而窺敵觀變欲潛以深欲伍以參閒諜謂使伍之於敵之閒而盡知其事韓子曰省同異之言以知朋觀敵欲濳隱深入之也伍參猶錯雜也使間諜或叄之或又曰參之以比物伍之以合參也黨之分偶參伍之驗以責陳言之實遇敵決戰必道吾所明}
