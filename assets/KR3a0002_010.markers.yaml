  - {type: variant, offset: 762, length: 2, content: 樞要, WYG: 得而後功之守險阨而用之既得勝乃賞其功所以人自為戰而立功者衆也功賞相長也五甲首而𨽻五家有功而賞之使相長獲得五甲首則役𨽻鄉里之五家也是最為衆彊長久多地以正故四世有勝非幸也數也為之有根本不邀一時之利故能衆彊長久也不復其户利其田宅故多地也以正言比齊魏之苟且為正言秦亦非天幸有術數然也四世孝公惠王武王昭王}
