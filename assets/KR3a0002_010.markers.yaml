  - {type: variant, offset: 1321, length: 2, content: 靡敝, WYG: 王是彊弱之效也湯武王而桓文霸齊魏則代存代亡是其效也孝成王臨武君曰善請問為將孫卿子曰知莫大乎棄疑不用疑謀是智之大行莫大乎無過事莫大乎無悔至無悔而止矣成不可必也不可必不得必謂成功忘其警僃莊子曰聖人以必不必故謂兵衆人以不必必之故多兵故制號政令欲嚴以威慶賞刑罰欲必以信處舍收藏欲周以固處舍營壘也收藏財物也周密牢固則敵不敢凌奪矣徙舉進退欲安以重欲疾以速静則安重而不為輕舉動則疾速而不失機權窺敵觀變欲潛以深欲伍以參謂使間諜觀敵欲潜隱深入之也伍參猶錯雜也使間諜或參之或伍之於敵之間而盡知其事韓子曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以此物伍之以合參也遇敵决戰必道吾所明無道吾所疑道言也行也夫是之謂六術自制號政令已下有六也無欲將而惡廢無急勝而亡敗無威内而輕外無見其利而不顧其害彊使人出戰而輕敵凡慮事欲熟而用財欲泰熟謂精審泰謂不恡賞也夫是之謂五權五者為將之機權也所以不受命於主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至至謂一守而不變凡受命於主而行三軍三軍既定百官得序羣物皆正百官軍}
