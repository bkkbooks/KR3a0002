  - {type: variant, offset: 543, length: 0, content: '', krp: 地雖大其稅必寡是危國之兵也寡資用貧乏故優復既多則稅危國秦人其生民也陿阸其使民也酷烈民生地險固則寇不能害嚴刑罰則人皆致死也所生之地陿阸謂秦地險固也酷烈嚴刑罰也劫之以埶廹之使出戰謂以威埶劫隱之以阸氏曰秦地多阸藏隱其民於阸謂隱蔽以險阸使敵不能害鄭中忸之以慶賞之賞慶使習以爲常忸女九反忸與狃同串習也戰勝則與鰌之以刑罰蛇曰鰌我亦勝我音秩或作䠓七六反鰌藉也不勝則以刑罰陵藉之莊子風謂使}
  - {type: variant, offset: 544, length: 5, content: 子袾裷衣冕, SBCK: 下之民所以要利於上者非􅃲無由也阸而用之得而後功之所以人自爲戰而立功者衆也守險阸而用之旣得勝乃賞其功功賞相長也五甲首而隷五家長獲得五甲首則有功而賞之使相之五家也役隷郷里是最爲衆強長久多地以正故四世有勝非幸也數也故能衆強長久也不復其户爲之有根本不邀一時之利亦非天幸有術數然也四世孝公惠王武王昭王也利其田宅故多地也以正言比齊魏之苟且爲正言秦故齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之銳士秦之銳士不可以當􅁊文之節制􅁊文之節制不可以敵湯武之仁義有遇之者若以焦熬投石焉物投石也熬五刀反以魏遇秦猶以焦熬之兼是數國者皆干賞蹈利之兵也傭徒鬻賣之道也未有貴上安制綦節之理也利之兵與傭徒之人鬻賣其力作無異干求也言秦魏雖足以相勝皆求賞蹈不踰越極於忠義心不爲非之理者也未有愛貴其上爲之致死安於制度自}
