  - {type: variant, offset: 1360, length: 0, content: '', WYG: 樂之逺者竭蹶而趨之竭蹶顛什猶言匍匐也新序作竭走而趨之無幽間辟陋之國莫}
  - {type: variant, offset: 1361, length: 8, content: 死其事者無它故焉, WYG: 趨使而安樂之四海之内若一家通達之屬莫不從服夫是之謂}
  - {type: variant, offset: 1362, length: 579, content: 其事者無它故焉人主自取之詩曰無言不讎無德不報此之謂也兼足天下之道在明分掩地表畝刺屮殖穀多糞肥田是農夫眾庶之事也守時力民進事長功和齊百姓使人不偷是將率之事也高者不旱下者不水寒暑和節而五穀以時孰是天地之事也若夫兼而覆之兼而愛之兼而制之歲雖凶敗水旱使百姓無凍餒之患則是聖君賢相之事也墨子之言昭昭然為天下憂不足夫不足非天下之公患也特墨子之私憂過計也今是土之生五穀也人善治之則畝數盆一歲而再獲之然後瓜桃棗李一本數以盆鼓然後葷菜百䟽以澤量然後六畜禽獸一而剸車黿鼉魚鱉鰌鱣以時別一而成群然後飛鳥鳧鴈若煙海然後昆蟲萬物生其閒可以相食養者不可勝數也夫天地之生萬物也固有餘足以食人矣麻葛繭絲鳥獸之羽毛齒革也固有餘足以衣人矣夫有餘不足非天下之公患也特墨子之私憂過計也天下之公患亂傷之也胡不嘗試相與求亂之者誰也我以墨子之非樂也則使天下亂墨子之節用也則使天下貧非將墮之也說不免焉墨子大有天下小有一國將蹙然衣麤食惡憂戚而非樂若是則瘠瘠則不足欲不足欲則賞不行墨子大有天下小有一國將少人徒省官職上功勞苦與百姓均事業齊功勞若是則不威不威則賞罰不行賞不行則賢者不可得而進也罰不行則不肖者不可得而退也賢者不可得而進不肖不可得而退則能不能不可得而官也若是則萬物失宜事變失應上失天時下失地利中失人和天下敖然若燒若焦墨子雖為之衣褐帶索嚽菽飲水惡能足之乎既以伐其本竭其原而焦天下矣故先王聖人為之不然知夫為, SBCK: 爲}
