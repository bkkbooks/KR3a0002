  - {type: variant, offset: 711, length: 0, content: '', SBCK: 詐力相勝故齊之田單楚之莊蹻秦之衞鞅燕之繆蟣是皆世俗之所謂善用兵者也威王使爲將將兵循江而上略蜀黔中以西蹻至滇池田單齊襄王臣安平君也史記莊蹻者楚莊王苖裔楚奪楚巴黔中郡道塞不通因還以其衆至滇變服從其俗方三百里地肥饒數千里以兵滅定屬楚欲歸報㑹秦擊商君者也繆蟣未聞也焉衞鞅秦孝公臣封爲是其巧拙強弱則未有以相君也若其道一也詐故曰其道一也雖術不同皆出於變未及和齊也於和齊人心也數子之術未能及掎契司詐權謀傾覆未免盜兵也司讀爲伺詐欺誑也皆謂因其危契讀爲挈持也掎挈猶言掎摭也襲之也弱即掩齊􅁊􅀳文楚莊呉闔閭越句踐是皆和齊之兵也可謂入其域矣域孟康曰入王入禮義敎化之域也兵之然而未有本統也脩若湯武也本統謂前行素故可以霸而不可以王是強弱之效也齊魏則代存代亡湯武王而􅁊文霸效也是其孝成王臨武君曰善請問爲將孫卿子曰知莫大乎棄疑是智之大不用疑謀行莫大乎無過事莫大乎無悔事至無悔而止矣成不可必也以不必故旡兵衆人以不必必之故多兵不得必謂成功忘其警備莊子曰聖人以故制號}
