  - {type: variant, offset: 2662, length: 1388, content: 聲以時順脩使夷俗邪音不敢亂雅大師之事也脩隄梁通溝澮行水潦安水臧以時決塞歲雖凶敗水旱使民有所耘艾司空之事也相高下視肥墝序五種省農功謹蓄臧以時順脩使農夫樸力而寡能治田之事也脩火憲養山林藪澤草木魚鱉百素以時禁發使國家足用而財物不屈虞師之事也順州里定廛宅養六畜閒樹藝勸教化趨孝弟以時順脩使百姓順命安樂處鄉鄉師之事也論百工審時事辨功苦尚完利便備用使彫琢文采不敢專造於家工師之事也相陰陽占祲兆鑽龜陳卦主攘擇五卜知其吉凶妖祥傴巫跛擊之事也脩採清易道路謹盜賊平室律以時順脩使𧶜旅安而𧵍財通治市之事也抃急禁悍防淫除邪戮之以五刑使暴悍以變姦邪不作司寇之事也本政教正法則兼聽而時稽之度其功勞論其慶賞以時順脩使百吏盡免而眾庶不偷冢宰之事也論禮樂正身行廣教化美風俗兼覆而調一之辟公之事也全道德致隆高綦文理一天下振毫末使天下莫不順比從服天王之事也故政事亂則冢宰之罪也國家失俗則辟公之過也天下不一諸侯俗反則天王非其人也具具而王具具而霸具具而存具具而亡用萬乘之國者威彊之所以立也名聲之所以美也敵人之所以屈也國之所以安危臧否也制與在此亡乎人王霸安存危殆滅亡制與在我亡乎人夫威彊未足以殆鄰敵也名聲未足以懸天下也則是國未能獨立也豈渠得免夫累乎天下脅於暴國而黨為吾所不欲於是者日與桀同事同行無害為堯是非功名之所就也非存亡安危之所隨也功名之所就存亡安危之所隨必將於愉殷赤心之所誠以其國為王者之所亦王以其國為危殆滅亡之所亦危殆滅亡殷之日案以中立無有所偏而為縱橫之事偃然案兵無動以觀夫暴國之相捽也案平政教審節奏砥礪百姓為是之日而兵剸天下之勁矣案然脩仁義伉隆高正法則選賢良養百姓為是之日而名聲剸天下之美矣權者重之兵者勁之名聲者美之夫堯舜者一天下也不能加毫末於是矣故權謀傾覆之人退則賢良知聖之士案自進矣刑政平百姓和國俗節則兵勁城固敵國案自詘矣務本事積財物而勿忘棲遲薛越也是使群臣百姓皆以制度行則財物積國家案自富矣三者體此而天下服暴國之君案自不能用其兵矣何則彼無與至也彼其所與至者必其民也其民之親我也歡若父母好我芳若芝蘭反顧其上則若灼黥若仇讎彼人之情性也雖桀跖豈有肯為其所惡賊其所好者哉彼以奪矣故古之人有以一國取天下者非往行之也脩政其所天下莫不願如是而可以誅暴禁悍矣故周公南征而北國怨曰何獨不來也東征而西國怨曰何獨後我也孰能有與是鬭者與安以其國為是者王殷之日安以靜兵息民慈愛百姓辟田野實倉廩便備用安謹募選閱材技之士然後漸賞慶以先之嚴刑罰以防之擇士之知事者使相率貫也是以厭然畜積脩飾而物用之足也兵革器械者彼將日日暴露毀折之中原我今將脩飾之拊循之掩蓋之於府庫貨財粟米者彼將日日捿遲薛越之中野我今將畜積并聚之於倉廩材技股肱健勇爪牙之士彼將日日挫頓竭之於仇敵我今將來致之并閱之砥礪之於朝廷如是則彼日積敝我日積完彼日積貧我日積富彼日積勞我日積佚君臣上下之閒者彼將厲厲焉日日相離疾也我今將頓頓焉日日相親愛也以是待其敝安以其國為是者霸立身則從傭俗事行則遵傭故進退貴賤則舉傭士之所以接下之百姓者則庸寬惠如是者則安存立身則輕楛事行則蠲疑進退貴賤則舉佞侻之所以接下之人百姓者則好取侵奪如是者危殆立身則憍暴事行則傾覆進退貴賤則舉幽險詐故人之所以接下之人百姓者則好用其死力矣而慢其功勞好用其籍斂矣而忘其本務如是者滅亡此五等者不可不善擇也王霸安存危殆滅亡之具也善擇者制人不善擇者人制之善擇之者王不善擇之者亡夫王者之與亡者制人之與人制之也是其為相懸也亦遠矣, SBCK: 荀子卷第九}
