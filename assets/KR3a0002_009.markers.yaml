  - {type: variant, offset: 591, length: 412, content: 君子不安位馬駭輿則莫若靜之庶人駭政則莫若惠之選賢良舉篤敬興孝悌收孤寡補貧窮如是則庶人安政矣庶人安政然后君子安位矣傳曰君者舟也庶人者水也水則載舟水則覆舟此之謂也故君人者欲安則莫若平政愛民矣欲榮則莫若隆禮敬士矣欲立功名則莫若尚賢使能矣是君人者之大節也三節者當則其餘莫不當矣三節者不當則其餘雖曲當猶將無益也孔子曰大節是也小節是也上君也大節是也小節非也一出焉一入焉中君也大節非也小節雖是也吾無觀其餘矣成侯嗣公聚斂計數之君也未及取民也鄭子產取民者也未及為政也管仲為政者也未及脩禮也故脩禮者王為政者彊取民者安聚斂者亡故王者富民霸者富士僅存之國富大夫亡國富筐篋實府庫筐篋已富府庫已實而百姓貧夫是之謂上溢而下漏入不可以守出不可以戰則傾覆滅亡可立而待也故我聚之以亡敵得之以彊聚斂者召寇肥敵亡國危身之道也故明君不蹈也王奪之人霸奪之與彊奪之地奪之人者臣諸侯奪之與者友諸侯奪之地者敵諸侯臣諸侯者王友諸侯者霸敵諸侯者危用彊者人之城守人之出戰而我以力勝, WYG: 物必報}
