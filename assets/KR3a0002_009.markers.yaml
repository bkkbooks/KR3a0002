  - {type: variant, offset: 720, length: 950, content: 餘莫不當矣三節者不當則其餘雖曲當猶將無益也孔子曰大節是也小節是也上君也大節是也小節非也一出焉一入焉中君也大節非也小節雖是也吾無觀其餘矣成侯嗣公聚斂計數之君也未及取民也鄭子產取民者也未及為政也管仲為政者也未及脩禮也故脩禮者王為政者彊取民者安聚斂者亡故王者富民霸者富士僅存之國富大夫亡國富筐篋實府庫筐篋已富府庫已實而百姓貧夫是之謂上溢而下漏入不可以守出不可以戰則傾覆滅亡可立而待也故我聚之以亡敵得之以彊聚斂者召寇肥敵亡國危身之道也故明君不蹈也王奪之人霸奪之與彊奪之地奪之人者臣諸侯奪之與者友諸侯奪之地者敵諸侯臣諸侯者王友諸侯者霸敵諸侯者危用彊者人之城守人之出戰而我以力勝之也則傷人之民必甚矣傷人之民甚則人之民惡我必甚矣人之民惡我甚則日欲與我鬭人之城守人之出戰而我以力勝之則傷吾民必甚矣傷吾民甚則吾民之惡我必甚矣吾民之惡我甚則日不欲為我鬭人之民日欲與我鬭吾民日不欲為我鬭是彊者之所以反弱也地來而民去累多而功少雖守者益所以守者損是以大者之所以反削也諸侯莫不懷交接怨而不忘其敵伺彊大之間承彊大之敝也知彊大之敝此彊大之殆時也知彊道者不務彊也慮以王命全其力凝其德力全則諸侯不能弱也德凝則諸侯不能削也天下無王霸主則常勝矣是知彊道者也彼霸者不然辟田野實倉廩便備用案謹募選閱材技之士然後漸慶賞以先之嚴刑罰以糾之存亡繼絕衛弱禁暴而無兼并之心則諸侯親之矣脩友敵之道以敬接諸侯則諸侯說之矣所以親之者以不并也并之見則諸侯䟽之矣所以說之者以友敵也臣之見則諸侯離矣故明其不并之行信其友敵之道天下無王霸主則常勝矣是知霸道者也閔王毀於五國桓公劫於魯莊無它故焉非其道而慮之以王也彼王者不然仁眇天下義眇天下威眇天下仁眇天下故天下莫不親也義眇天下故天下莫不貴也威眇天下故天下莫敢敵也以不敵之威輔服人之道故不戰而勝不攻而得甲兵不勞而天下服是知王道者也知此三具者欲王而王欲霸而霸欲彊而彊矣王者之人飾動以禮義聽斷以類明振毫末舉錯應變而不窮夫是之謂有原是王者之人也王者之制道不過三代法不貳後王道過三代謂之蕩法貳後王謂之不雅衣服有制宮室有度人徒有數喪祭械用皆有等宜聲則凡非雅聲者舉廢色則凡非舊文者舉息械用則凡非舊器者舉毀夫是之謂復古是王者之制也王者之論無德不貴無能不官無功不賞無罪不罰朝無幸位民無幸生尚賢使能而等位不遺析愿禁悍而刑罰不過百姓曉然皆知夫為, SBCK: 害}
