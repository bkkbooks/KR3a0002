  - {type: variant, offset: 1189, length: 741, content: 其力凝其德力全則諸侯不能弱也德凝則諸侯不能削也天下無王霸主則常勝矣是知彊道者也彼霸者不然辟田野實倉廩便備用案謹募選閱材技之士然後漸慶賞以先之嚴刑罰以糾之存亡繼絕衛弱禁暴而無兼并之心則諸侯親之矣脩友敵之道以敬接諸侯則諸侯說之矣所以親之者以不并也并之見則諸侯䟽之矣所以說之者以友敵也臣之見則諸侯離矣故明其不并之行信其友敵之道天下無王霸主則常勝矣是知霸道者也閔王毀於五國桓公劫於魯莊無它故焉非其道而慮之以王也彼王者不然仁眇天下義眇天下威眇天下仁眇天下故天下莫不親也義眇天下故天下莫不貴也威眇天下故天下莫敢敵也以不敵之威輔服人之道故不戰而勝不攻而得甲兵不勞而天下服是知王道者也知此三具者欲王而王欲霸而霸欲彊而彊矣王者之人飾動以禮義聽斷以類明振毫末舉錯應變而不窮夫是之謂有原是王者之人也王者之制道不過三代法不貳後王道過三代謂之蕩法貳後王謂之不雅衣服有制宮室有度人徒有數喪祭械用皆有等宜聲則凡非雅聲者舉廢色則凡非舊文者舉息械用則凡非舊器者舉毀夫是之謂復古是王者之制也王者之論無德不貴無能不官無功不賞無罪不罰朝無幸位民無幸生尚賢使能而等位不遺析愿禁悍而刑罰不過百姓曉然皆知夫為善於家而取賞於朝也為不善於幽而蒙刑於顯也夫是之謂定論是王者之論也王者之法等賦政事財萬物所以養萬民也田野什一關市幾而不征山林澤梁以時禁發而不稅相地而衰政理道之遠近而致貢通流財物粟米無有滯留使相歸移也四海之內若一家故近者不隱其能遠者不疾其勞無幽閒隱僻之國莫不趨使而安樂之夫是之謂人師是王者之法也北海則有走馬吠犬焉然而中國得而畜使之南海則有羽翮齒革曾青丹干焉然而中國得而財之東海則有紫綌魚鹽焉然而中國得而衣食之西海則有皮革文旄焉然而中國得而用之故澤人足乎木山人足乎魚農夫不斲削不陶冶而足械用工賈不耕田而足菽粟故虎豹為猛矣然而君, WYG: 書荀}
