  - {type: variant, offset: 2301, length: 360, content: 天下無它故焉得之分義也故人生不能無群群而無分則爭爭則亂亂則離離則弱弱則不能勝物故宮室不可得而居也不可少頃舍禮義之謂也能以事親謂之孝能以事兄謂之弟能以事上謂之順能以使下謂之君君者善群也群道當則萬物皆得其宜六畜皆得其長群生皆得其命故養長時則六畜育殺生時則草木殖政令時則百姓一賢良服聖主之制也草木榮華滋碩之時則斧斤不入山林不夭其生不絕其長也黿鼉魚鱉鰌鱣孕別之時罔罟毒藥不入澤不夭其生不絕其長也春耕夏耘秋收冬藏四者不失時故五穀不絕而百姓有餘食也汙池淵沼川澤謹其時禁故魚鱉優多而百姓有餘用也斬伐養長不失其時故山林不童而百姓有餘材也聖王之用也上察於天下錯於地塞滿天地之閒加施萬物之上微而明短而長狹而廣神明博大以至約故曰一與一是為人者謂之聖人也序官宰爵知賓客祭祀饗食犧牲之牢數司徒知百宗城郭立器之數司馬知師旅甲兵乘白之數脩憲命審詩商禁, SBCK: ''}
