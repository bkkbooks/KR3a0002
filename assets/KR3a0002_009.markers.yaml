  - {type: variant, offset: 211, length: 1, content: 雜, SBCK: 能則是禽獸也知敬賢禽獸不人不肖而不敬則是狎虎也言必見害狎輕侮也禽獸則亂狎虎則危災及其身矣詩曰不敢暴虎不敢馮河人知其一莫知其它戰戰兢兢如臨深淵如履薄冰此之謂也徒渉人知其一莫知其它言人皆詩小雅小旻之篇暴虎徒摶馮河知小人爲害有甚於此也知暴虎馮河立至於害而不故仁者必敬人敬人有道賢者則貴而敬之不肖者則畏而敬之賢者則親而敬之不肖者則䟽而敬之其敬一也其情二也若夫忠信端愨而不害傷則無接而不然是仁人之質也則凡所接物皆然言嘉善而矜不其敬雖異至於忠信端愨不傷害之而欲傷害之也質體也能不以人之不肖逆詐待忠信以爲質端愨以爲統自處而待物者也統綱紀也言以端愨禮義以爲文文飾用爲倫類以爲理近以知逺以此爲條理也倫人倫類物之種類言推喘而言臑而動而一可以爲法則動也一皆也言一動一息之間皆臑與勸學篇蝡同喘微言也蠕微也臑人允反可以爲法則詩曰不􅆫不賊鮮不爲則此之謂也賊害則少不爲人法則矣詩大雅抑之篇言不􅆫差恭敬禮也調和樂也爭兢也調和不謹愼利也􅃲怒害也故君子安禮樂利謹愼而無􅃲怒是以百舉不過也小人反是通忠之順然而終歸於順也忠有所雍塞故通之權險之平險之事權用危可扶持則變其危險使治平也使至於平也或曰權變也旣不禍亂之從聲應聲而從君雖禍亂也之三者非明主莫之能知也忠賢而身死國亡也闇君不知所以殺害爭然後善戾然後功出死無私致忠而公夫是之謂通忠之順信陵君似之矣君然諫爭公信陵君諫魏王請救趙不從遂矯君命破秦而魏國以安故後能善違戾君然後立功出身死戰不爲私事而歸於至忠至之似奪然後義殺然後仁上下易位然後貞惡桀紂之亂天下而奪之是義也不忍蒼生之涂炭而殺之奪者不義之名殺者不仁之稱上下易位則非貞也而湯武愚當分歸於正道是貞也是仁也雖上下易位而使賢功參天地澤被生民夫是之謂權險之平湯武是也過而通情和而無經上意而無常守經常也但和順不䘏}
