  - {type: variant, offset: 569, length: 4, content: 維齊非齊, SBCK: 義刑義殺勿庸以即汝惟曰未有順事言先敎也義刑義殺亦書康誥言雖我未有順事故使民犯法躬自厚而薄責於人也勿用即行之當先敎後刑也雖先後不失尚謙曰程者物之準也之揔名也程者度量禮者節之準也謂節差等也君臣之程以立數禮以定倫二之數有禮則可以言有程則可以立一子之倫也定君臣父德以叙位能以授官之位考其能以授度其德以序上下伯夷典禮之比也所任之官若䕫典樂凡節奏欲陵而生民欲寛生養民也言人君自守禮之節奏則欲嚴峻不弛慢養民節奏謂禮節奏陵峻也侵陵亦嚴峻之義生民謂以徳敎迫切之也則欲寛容不節奏陵而文生民寛而安峻亦有節奏雖於刻急文飾不至上文下安功名之極也不可以加矣君者國之隆也父者家之隆也尊也隆猶隆一而治二而亂自古及今未有二隆爭重而能長久者師術有四而博習不與焉可以爲人師師法不術法也言有四德則與音豫在博習也尊嚴而憚可以爲師耆艾而信可以爲師六十曰耆五十曰艾誦􅀃而不陵不犯可以爲師􅀃不自陵突觸犯言行其所學誦謂誦經􅀃謂解􅀃謂守其誦知微而論可以爲師講論論盧困切知精微之理而能故師術有四而博習不與焉水深而回湍峻則多旋流也回流旋也水深不樹落則糞本糞其根也謂木葉落弟子通利則思師於已也思其厚詩曰無言不讎無德不報}
