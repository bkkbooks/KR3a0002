  - {type: variant, offset: 61, length: 2, content: 能屬, WYG: 官謂無主首也衡讀為横横至横逆而至也聞聽而明譽之君子聞聽流言流說則明白稱譽謂顯露其事不為隱蔽如此則姦人不敢獻其謀也定其當而當然後士其刑賞而還與之士當為事行也言定其當否既當之後乃行其刑賞返與之也謂其言當}
  - {type: variant, offset: 61, length: 2, content: 能屬, krp: 官謂無流者無根源之謂撗至撗逆而至也主首也衡讀爲撗聞聽而明譽之說則明白稱譽謂君子聞聽流言流則姦人不敢獻其謀也顯露其事不爲隱蔽如此定其當而當然後士其刑賞而還與之其刑賞反與之也謂其言當}
