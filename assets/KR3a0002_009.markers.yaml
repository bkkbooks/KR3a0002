  - {type: variant, offset: 41, length: 1, content: 分, WYG: 之大忠也復報也以德行之事報白於君使自化於善周禮宰夫掌諸臣之復萬民之逆也以徳調君而補之次忠也謂匡救其惡也以是諫非而怒之下忠也使君有害賢之名故為下忠不恤君之榮辱不恤國之臧否偷合苟容以之持禄養交而已耳國賊也若周公之於成王也可謂大忠矣若管仲之於桓公可謂次忠矣若子胥之於夫差可謂下忠矣若曹觸龍之於紂者可謂國賊矣說苑曰桀貴為天子富有天下其左師觸龍者諂諛不正此云紂}
  - {type: page-break, offset: 41, content: '', id: KR3a0002_WYG_009-6b, image: WYG0695/WYG0695-0199d.png}
  - {type: variant, offset: 41, length: 1, content: 分, krp: 之大忠也報白於君使自化於復報也以德行之事之復萬民之逆也善周禮宰夫掌諸臣以德調君而補之次忠也其惡也謂匡救以是諫非而怒之下忠也之名故爲下使君有害賢也忠不卹君之榮辱不卹國之臧否偷合苟容以之持禄養交而已耳國賊也若周公之於成王也可謂大忠矣若管仲之於桓公可謂次忠矣若子胥之於夫差可謂下忠矣若曹觸龍之於紂者可謂國賊矣苑說龍者謟䛕不正此云紂}
  - {type: variant, offset: 43, length: 1, content: 定, WYG: 知孰是仁者必敬人凡人非賢則案不肖}
  - {type: variant, offset: 43, length: 1, content: 定, krp: 知孰是曰桀貴爲天子富有天下其左師觸仁者必敬人凡人非賢則案不肖也人賢而不能則是禽獸也知敬賢禽獸不人不肖而不敬則是狎虎也言必見害狎輕侮也禽獸則亂狎虎則危災及其身矣詩曰不敢暴虎不敢馮河人知其一莫知其它戰戰兢兢如臨深淵如履薄冰此之謂也徒渉人知其一莫知其它言人皆詩小雅小旻之篇暴虎徒摶馮河知小人爲害有甚於此也知暴虎馮河立至於害而不故仁者必敬人敬人有道賢者則貴而敬之不肖者則畏而敬之賢者則親而敬之不肖者則䟽而敬之其敬一也其情二也若夫忠信端愨而不害傷則無接而不然是仁人之質}
  - {type: punctuation, offset: 45, content: ，, id: KR3a0002_tls_009-bkkpn7}
  - {type: 'tls:seg', offset: 45, content: '', id: KR3a0002_tls_009-1a.10}
  - {type: variant, offset: 45, length: 0, content: '', WYG: 人賢而不能}
  - {type: variant, offset: 46, length: 0, content: '', WYG: 是禽獸也禽獸不知敬賢人不肖而不敬則是狎虎也狎輕侮也言必見害禽獸則亂狎虎則危災及其身詩曰不敢暴虎不敢馮河人知其一莫知其佗戰戰兢兢如臨深淵如履薄氷此之謂也詩小雅小旻之篇暴虎徒搏馮河徒渉人知其一莫知其佗言人皆知暴虎馮河立至於害而不知小人為害}
  - {type: page-break, offset: 46, content: '', id: KR3a0002_WYG_009-7a, image: WYG0695/WYG0695-0200a.png}
  - {type: variant, offset: 46, length: 0, content: '', krp: 凡所接物皆然言嘉善而矜不其敬雖異至於忠信端愨不傷害之而欲傷害之也質體也能不以人之不肖逆詐待忠信以爲質端愨以爲統自處而待物者也統綱紀也言以端愨禮義以爲文文飾用爲倫類以爲理近以知逺以此爲條理也倫人倫類物之種類言推喘而言臑而動而一可以爲法則動也一皆也言一動一息之間皆臑與勸學篇蝡同喘微言也蠕微也臑人允反可以爲法則詩曰不僭不賊鮮不爲則此之謂也賊害則少不爲人法則矣詩大雅抑之篇言不僭差恭敬禮也調和樂也爭兢也調和不謹愼利也鬪怒害也故君子安禮樂利謹愼而無鬪怒是以百舉不過也小人反是通忠之順然而終歸於順也忠}
  - {type: variant, offset: 47, length: 2, content: 昭繆, WYG: 甚於此也故仁者必敬人敬人有道賢者則貴而敬之不肖者則畏而敬之賢者則親而敬之不肖者則疎而敬之其敬一也其情二也若夫忠信端慤而不害傷則無接而不然是仁人之質也其敬雖異至於忠信端慤不傷害則凡所接物皆然言嘉善而矜不能不以人之不肖逆詐待之而欲傷害之也質體也忠信以為質端慤以為統統綱紀也言已端慤自處而待物也禮義以為文用為文飾倫類以為理倫人倫類物之種類言推近以知逺以此為條理也喘而言臑而動而一可以為法則臑與勸學篇蠕同喘微言也臑微動也一皆也言一動一息之間皆可以為法則也臑人元反詩曰不僣不賊鮮不為則此之謂也詩大雅抑之篇言不僣差賊害則少不為人法則矣恭敬禮也調和樂也調和不争競也謹慎利也鬬怒害也故君子安禮樂利謹慎而無鬬怒是以百舉不過也小人反是通忠之順忠有所壅塞故通之然而終歸之於順也權險之平權困危險之事使至於平也或曰權變也既不可扶持則變其危險使治平也禍亂之從聲君雖禍亂應聲而從之也三者非明主莫之能知也闇君不知所以殺害忠賢而身死國亡也争然後善戾然後功出死無私致忠而公夫是之謂通忠之順信陵君似之矣諫争君然後能善違戻君然後立功出身死戰不為私事而歸於至忠至公信陵君諫魏王請救趙不從遂矯君命破秦而魏國以安故似之奪然後義殺然後仁上下易位然後貞奪者不義之名殺者不仁之稱上下易位則非貞也而湯武惡桀紂之亂天下而奪之是義也不忍蒼生之塗炭而殺之是仁}
  - {type: page-break, offset: 47, content: '', id: KR3a0002_WYG_009-7b, image: WYG0695/WYG0695-0200b.png}
  - {type: page-break, offset: 47, content: '', id: KR3a0002_WYG_009-8a, image: WYG0695/WYG0695-0200c.png}
  - {type: variant, offset: 47, length: 2, content: 昭繆, krp: 所雍塞故通之權險之平險之事權用危可扶持則變其危險使治平也使至於平也或曰權變也旣不禍亂之從聲應聲而從君雖禍亂也之三者非明主莫之能知也忠賢而身死國亡也闇君不知所以殺害爭然後善戾然後功出死無私致忠而公夫是之謂通忠之順信陵君似之矣君然諫爭公信陵君諫魏王請救趙不從遂矯君命破秦而魏國以安故後能善違戾君然後立功出身死戰不爲私事而歸於至忠至之似奪然後義殺然後仁上下易位然後貞惡桀紂之亂天下而奪之是義也不忍蒼生之涂炭而殺之奪者不義之名殺者不仁之稱上下易位則非貞也而湯武愚當分歸於正道是貞也是仁}
  - {type: punctuation, offset: 50, content: 。, id: KR3a0002_tls_009-bkkpn8}
  - {type: 'tls:seg', offset: 50, content: '', id: KR3a0002_tls_009-1a.11}
  - {type: variant, offset: 51, length: 2, content: 王公, WYG: 上下易位而使賢愚各當分歸於正道是貞也功參天地澤被生民夫是之謂權險之平湯武是也過而同情和而無經經常也但和順上意而無常守不恤是非不論曲直偷合苟容迷亂狂生迷亂其君使生狂也夫是之謂禍亂之從聲飛亷惡來是也傳曰斬而齊枉而順不同而壹此言反經合道如信陵湯武者也所以斬之取其齊也以枉曲之取其順也所以不同取其一也初雖似乖戾然終歸於理者也詩曰受小球大球為下國綴旒此之謂也詩商頌長發之篇球玉也鄭𤣥云綴猶結也旒旌旗之垂者言湯既為天所命則受小玉謂尺二寸圭受大玉謂珽也長三尺執圭搢珽以與諸侯㑹同結定其心如旌旗之旒掺著焉引此以明湯武取天下權險之平為勑下國者也致仕篇第十四明致賢}
  - {type: page-break, offset: 51, content: '', id: KR3a0002_WYG_009-8b, image: WYG0695/WYG0695-0200d.png}
  - {type: variant, offset: 51, length: 2, content: 王公, krp: 上下易位而使賢功參天地澤被生民夫是之謂權險之平湯武是也過而通情和而無經上意而無常守經常也但和順不䘏是非不治曲直偷合苟容迷亂狂生使生狂也迷亂其君夫是之謂禍亂之從聲飛廉惡來是也傳曰斬而齊枉而順不同而壹斬之取其齊也以枉曲之取其順也所此言反經合道如信陵湯武者也所以乖戾然終歸於理者也以不同取其一也初雖似詩曰受小球大球爲下國綴旒此之謂也綴猶結也旒旌旗之垂者言湯既詩商頌長發之篇球玉也鄭玄云圭搢珽以與諸侯㑹同結定其心如旌旗之旒縿著焉引此以爲天所命則受小玉謂尺二寸圭也受大玉謂珽也長三尺執之平爲救下國者也明湯武取天下權險致}
