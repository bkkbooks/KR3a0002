  - {type: variant, offset: 7, length: 2, content: 為政, SBCK: 金與之馳騁乎雲夢之中不知穰侯受令乎秦王塡黽塞之齊之管仲晉之咎犯舅􅀌偃咎犯其字也咎與舅同晉文公之楚之孫叔敖可謂功臣矣殷之伊尹周之太公可謂聖臣矣是人臣之論也吉凶賢不肖之極也不肖極於論臣也國之吉凶人君賢必謹志之而愼自爲擇取焉足以稽矣而愼自擇取則足以稽考用臣也志記也言必謹記此四臣之安危從命而利君謂之順從命而不利君謂之謟逆命而利君謂之忠逆命而不利君謂之篡不䘏君之榮辱不䘏國之臧否偷合苟容以持禄養交而已耳謂之國賊謂養養交外交若蘇秦張儀孟甞君所至爲相也其與君交接之不忤犯使怒也一}
