  - {type: 'tls:seg', offset: 221, content: '', id: KR3a0002_tls_009-2a.9}
  - {type: variant, offset: 222, length: 3, content: 英傑至, SBCK: 明白稱譽謂君子聞聽流言流則姦人不敢獻其謀也顯露其事不爲隱蔽如此定其當而當然後士其刑賞而還與之其刑賞反與之也謂其言當於善則事之以士當爲事行也言定其當否既當之後乃行以刑當丁浪反賞當於惡則事之如}
