  - {type: variant, offset: 24, length: 2, content: 廢元, krp: 存趙夫輔車相故諫爭輔拂之人社稷之臣也國君之寶也明君之所尊所厚也而闇主惑之以爲已賊也故明君之所賞闇君之所罰也闇君之所賞明君之所殺也伊尹箕子可謂諫矣尹伊子諫紂諫太甲箕比干子胥可謂爭矣平原君之於趙也可謂輔矣信陵君之於魏也可謂拂矣傳曰從道不從君此之謂也故正義之臣設則朝廷不頗位也頗邪也設謂置於列諫爭輔拂之人信則君過不逺信讀爲伸謂道行也信謂見信於君或曰爪牙之士施則仇讎不作也施謂展其材也爪牙之士勇力之臣邊境之臣處則疆垂不喪陲同垂與故明主好同而闇王好獨任其智獨謂自明主尚賢使能而饗其盛其臣之功業也盛謂大業言饗闇主妬賢畏能而滅其功沒也滅掩罰其忠賞其賊夫是之謂至闇桀紂所以滅也事聖君者有聽從無諫爭無失聖君事中君者有諫爭無謟諛者也謟諛則遂成闇君也中君可上可下若齊桓公事暴君者有補削無橋拂其}
