  - {type: variant, offset: 172, length: 1, content: 天, SBCK: 至闇桀紂所以滅也事聖君者有聽從無諫爭無失聖君事中君者有諫爭無謟諛者也謟諛則遂成闇君也中君可上可下若齊􅁊公事暴君者有補削無橋拂其惡言不敢顯諫闇匡救補謂彌縫其闕削謂除去害使君有殺賢之名故不為也拂音佛之也橋謂屈其性也拂違也橋拂則身見廹脅於亂時窮居於暴國而無所避之則崇其美揚其善違其惡隱其敗言其所長不稱其所短以爲成俗俗言如此而不變若舊俗然也謂危行言遜以避害也以爲成詩曰國有大命不可以告人防其躬身此之謂也詩逸恭敬而遜聽從而敏不敢有以私決擇也更私自決斷選擇也敏謂承命而速行不敢不敢有以私取與也以順上爲志是事聖君之義也而已但禀命忠信而不䛕諫諍而不謟橋然剛折端志而無傾側之心剛折剛直面折也端志不邪曲也橋彊貎禮記曰和而不流彊哉矯是案曰是非案曰非是事中君之義也調而不流柔而不屈寛容而不亂從而不屈曲雖寛容而不雖調和而不至流湎雖柔亂也與爲曉然以至道而無不調和也至道無爲不爭曉然明喻之貎怒無不調和言皆不違拂也之道以至道則暴君不能加而能化易時關内之是事暴君之義也旣以沖和事之則能化易其暴戾關當爲開傳寫誤耳内與納同言曰以道關通於君之心中也之性時以善道開納之也或若馭其樸馬習之馬不樸馬未調暴君之難故重明之也可遽牽制必縱緩之事若養赤子知必在順適其性不赤子嬰兒也未有所也驚懼若食餧人併與之食則必死今以善道節量與之不使飢渴於至道如餧人之欲食一曰餧人曰人惑則死使狂惑也莊子故因其懼也而改其過故因使其懼則思}
