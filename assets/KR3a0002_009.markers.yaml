  - {type: variant, offset: 584, length: 135, content: 安輿庶人駭政則君子不安位馬駭輿則莫若靜之庶人駭政則莫若惠之選賢良舉篤敬興孝悌收孤寡補貧窮如是則庶人安政矣庶人安政然后君子安位矣傳曰君者舟也庶人者水也水則載舟水則覆舟此之謂也故君人者欲安則莫若平政愛民矣欲榮則莫若隆禮敬士矣欲立功名則莫若尚賢使能矣是君人者之大節也三節者當則, SBCK: 幸而過寧􅆫無濫與}
