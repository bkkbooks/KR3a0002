  - {type: variant, offset: 228, length: 2, content: 亂則, SBCK: 明通方起以尚盡矣明白通明通謂同上盡謂盡忠於上也逹其意方起並起尚與上夫是之謂衡聽顯幽重明退姦進良之術川淵深而魚鼈歸之山林茂而禽獸歸之刑政平而百姓歸之禮義備而君子歸之故禮及身而行脩義及}
