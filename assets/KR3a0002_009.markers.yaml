  - {type: variant, offset: 37, length: 2, content: 待政, krp: 流柔而不屈寛容而不亂從而不屈曲雖寛容而不雖調和而不至流湎雖柔亂也與爲曉然以至道而無不調和也至道無爲不爭曉然明喻之貎怒無不調和言皆不違拂也之道以至道則暴君不能加而能化易時關内之是事暴君之義也旣以沖和事之則能化易其暴戾關當爲開傳寫誤耳内與納同言曰以道關通於君之心中也之性時以善道開納之也或若馭其樸馬習之馬不樸馬未調暴君之難故重明之也可遽牽制必縱緩之事若養赤子知必在順適其性不赤子嬰兒也未有所也驚懼若食餧人併與之食則必死今以善道節量與之不使飢渴於至道如餧人之欲食一曰餧人曰人惑則死使狂惑也莊子故因其懼也而改其過故因使其懼則思德過改因其憂也而辨其故端則遷善也辨其致憂之因其喜也而入其道納故因以道入之欣喜之時多所聽因其怒也而除其怨怒除去之也怨惡之人因君曲得所謂焉曲皆得所謂所謂即雖憂懼喜怒之殊委性也化易君書曰從命而不拂微諫而不倦爲上則明爲下則遜此之謂也訓也書伊事人而不順者不疾者也也不疾言怠慢也不順上意也疾速疾而不順者不敬者也敬而不順者不忠者也忠而不順者無功者也有功而不順者無德者也故無德之爲道也傷疾墮功滅苦故君子不爲也恐錯誤耳爲或爲違傷疾墮功滅苦未詳或有大忠者有次忠者有下忠者有國賊者以德復君}
