  - {type: variant, offset: 28, length: 2, content: 待教, WYG: 敢顯諫闇匡敎之也撟謂屈其性也拂違也撟拂則身見害使君有殺賢之名故不為也拂音佛廹脅於亂時窮居於暴國}
  - {type: variant, offset: 28, length: 2, content: 待教, krp: 敢顯諫闇匡救補謂彌縫其闕削謂除去害使君有殺賢之名故不為也拂音佛之也橋謂屈其性也拂違也橋拂則身見廹脅於亂時窮居於暴國}
  - {type: variant, offset: 31, length: 90, content: 誅中庸雜民不待政而化分未定也則有昭繆也雖王公士大夫之子孫也不能屬於禮義則歸之庶人雖庶人之子孫也積文學正身行能屬於禮義則歸之卿相士大夫故姦言姦說姦事姦能遁逃反側之民職而教之須而待之勉, SBCK: 闇主惑}
  - {type: variant, offset: 31, length: 1, content: 誅, WYG: 無所避之則崇其美揚其善違其惡隠其敗言其所長不稱其所短以爲成俗謂危行言遜以避害也以為成俗言如此而不變若舊俗然也詩曰國有大命不可以告人妨其躬身此之謂也逸詩恭敬而遜聽從而敏不敢有以私决擇也敏謂氶命而速行不敢更私自决斷選擇也不敢有以私取與也以順上為志是事聖君之義也但禀命而已忠信而不諛諫争而不諂撟然剛折端志而無傾側之心撟彊貎禮記曰和而不流彊哉矯剛折剛直靣折也端志不邪曲也是案曰是非案曰非是事}
  - {type: page-break, offset: 31, content: '', id: KR3a0002_WYG_009-5a, image: WYG0695/WYG0695-0199a.png}
  - {type: variant, offset: 31, length: 1, content: 誅, krp: 無所避之則崇其美揚其善違其惡隱其敗言其所長不稱其所短以爲成俗俗言如此而不變若舊俗然也謂危行言遜以避害也以爲成詩曰國有大命不可以告人防其躬身此之謂也詩逸恭敬而遜聽從而敏不敢有以私決擇也更私自決斷選擇也敏謂承命而速行不敢不敢有以私取與也以順上爲志是事聖君之義也而已但禀命忠信而不䛕諫諍而不謟橋然剛折端志而無傾側之心剛折剛直面折也端志不邪曲也橋彊貎禮記曰和而不流彊哉矯是案曰是非案曰非是事}
