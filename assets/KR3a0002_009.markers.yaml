  - {type: variant, offset: 37, length: 2, content: 待政, WYG: 流柔而不屈寛容而不亂雖調和而不至流湎雖柔從而不屈曲雖寛容而不與為亂也曉然以至道而無不調和也曉然明喻之貎至道無為不争之道以至道則暴君不能加怒無不調和言皆不違拂也而能化易時關内之是事暴君之義也關當為開傳寫誤也内與納同言既以冲和事之則能化易其暴戻之性時以善道開納之也或曰以道關通於君之心中也若馭撲馬撲馬未調習之馬不可遽牽制必縱緩之事暴君之難故重明之也若養赤子赤子嬰兒也未有所知必在順適其性不驚懼也若食餧人使饑渴於至道如餧人之欲食或曰餧人併與之食則必死今以善道節量與之不使狂惑也莊子曰人惑則死故因其懼也而改其過懼則思徳故因使其改過因其憂也而辨其故辨其至憂之端則遷善也因其喜也而入其道忻喜之時多所聽納故因以道入之因其怒也而除其怨怨惡之人因君怒除去之也曲得所謂焉雖憂懼喜怒之殊委曲皆得所謂所謂即化易君性也書曰從命而不拂微諫而不倦為上則明為下則遜此之謂也書伊訓也事人而不順者不疾者也不順上意也疾速也不疾言怠慢也疾而不順者不敬者也敬而不順者不忠者也忠而不順者無功者也有功而不順者無徳者也故無徳之為道也傷疾墮功滅苦故君子不為也傷疾墮功滅苦未詳或恐錯誤耳為或為違也有大忠者有次忠者有下忠者有國賊者以徳復君}
