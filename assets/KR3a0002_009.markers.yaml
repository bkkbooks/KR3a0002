  - {type: variant, offset: 565, length: 0, content: '', WYG: 位考其能以授所任之官若䕫典樂伯夷典禮之比也凡節奏欲陵而生民欲寛節奏謂禮節奏陵峻也侵陵亦嚴峻之義生民謂以徳敎生養民也言人君自守禮之節奏則欲嚴峻不弛慢養民則欲寛容不廹切之也節奏陵而文生民寛而安節奏雖峻亦有文飾不至於刻急上文下安功名之極也不可以加矣君者國之隆也父者家之隆也隆猶尊也隆一而治二而亂自古及今未有二隆争重而能長久者師術有四而博習不與焉術法也言有四徳則可以為人師法不在博習也與音預尊嚴而憚可以為師耆艾而信可以為師五十曰艾六十曰耆誦說而不陵不犯可以為師誦謂誦經說謂解說謂守其誦說不自陵突觸犯言行其所學知微而論可以為師知精微之理而能講論論盧困反故師術有四而博習不與焉水深則回回流旋也水深不湍峻則多旋流也樹落糞}
