  - {type: 'tls:seg', offset: 216, content: '', id: KR3a0002_tls_009-2a.8}
  - {type: variant, offset: 216, length: 0, content: '', SBCK: 狂生使生狂也迷亂其君夫是之謂禍亂之從聲飛廉惡來是也傳曰斬而齊枉而順不同而壹斬之取其齊也以枉曲之取其順也所此言反經合道如信陵湯武者也所以乖戾然終歸於理者也以不同取其一也初雖似詩曰受小球大球爲下國綴旒此之謂也綴猶結也旒旌旗之垂者言湯既詩商頌長發之篇球玉也鄭􅀇云圭搢珽以與諸侯㑹同結定其心如旌旗之旒縿著焉引此以爲天所命則受小玉謂尺二寸圭也受大玉謂珽也長三尺執之平爲救下國者也明湯武取天下權險致士篇第十四士之義明致}
  - {type: page-break, offset: 216, content: '', id: KR3a0002_SBCK_009-9b}
  - {type: variant, offset: 217, length: 0, content: '', SBCK: 衡聽顯幽重明退姦進良之術偏聽也顯幽衡平也謂}
  - {type: variant, offset: 218, length: 1, content: 肖, SBCK: 曰德明惟明能顯幽則重明矣能退姦則良進矣謂使幽人明顯}
  - {type: page-break, offset: 218, content: '', id: KR3a0002_SBCK_009-10a}
  - {type: variant, offset: 220, length: 1, content: 雜, SBCK: 雍蔽也重明謂既明又使明也書朋黨比周之譽君子不聽殘賊加累之􅉲君子不用以罪惡加累誣人也殘賊謂賊害人加累隱忌雍蔽之人君子不近妬賢雍讀曰擁隱亦蔽也忌謂貨財禽犢之請君子不許謁者也行賂請凡流言流􅀃流事流謀流譽流愬不官而衡至者君子愼之愬􅉲也不官謂無流者無根源之謂撗至撗逆而至也主首也衡讀爲撗聞聽而明譽之􅀃}
