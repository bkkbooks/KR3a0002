  - {type: variant, offset: 21, length: 2, content: 待頃, WYG: 聽遂以解國之大患除國之大害成於尊君安國謂之輔事見平原君傳有能抗君之命竊君之重反君之事以安國之危除君之辱功伐足以成國之大利謂之拂抗拒也戰功曰伐左傳郄至驟稱其伐拂讀為弼弼所以輔正弓弩者也或讀為佛違君之意也謂若信陵君違魏王之命竊其兵符殺晉鄙反軍不救趙之事遂破秦}
