  - {type: variant, offset: 253, length: 7, content: 凡聽威嚴猛厲而, SBCK: 則貴名明白天下皆願從挾讀爲浹能以禮浹洽者也之詩曰惠此中國以綏四方此之謂也民勞之詩大雅也引此以明自近及逺也篇中國京師也四方諸夏川淵者龍魚之居也山林者鳥獸之居也國家者士民之居也川淵枯則龍魚去之山林險則鳥獸去之國家失政則士民去之無土則人}
