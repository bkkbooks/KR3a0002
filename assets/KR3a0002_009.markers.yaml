  - {type: variant, offset: 1931, length: 2119, content: 剝而用之故天之所覆地之所載莫不盡其美致其用上以飾賢良下以養百姓而安樂之夫是之謂大神詩曰天作高山大王荒之彼作矣文王康之此之謂也以類行雜以一行萬始則終終則始若環之無端也舍是而天下以衰矣天地者生之始也禮義者治之始也君子者禮義之始也為之貫之積重之致好之者君子之始也故天地生君子君子理天地君子者天地之參也萬物之總也民之父母也無君子則天地不理禮義無統上無君師下無父子夫婦是之謂至亂君臣父子兄弟夫婦始則終終則始與天地同理與萬世同久夫是之謂大本故喪祭朝聘師旅一也貴賤殺生與奪一也君君臣臣父父子子兄兄弟弟一也農農士士工工商商一也水火有氣而無生草木有生而無知禽獸有知而無義人有氣有生有知亦且有義故最為天下貴也力不若牛走不若馬而牛馬為用何也曰人能群彼不能群也人何以能群曰分分何以能行曰義故義以分則和和則一一則多力多力則彊彊則勝物故宮室可得而居也故序四時裁萬物兼利天下無它故焉得之分義也故人生不能無群群而無分則爭爭則亂亂則離離則弱弱則不能勝物故宮室不可得而居也不可少頃舍禮義之謂也能以事親謂之孝能以事兄謂之弟能以事上謂之順能以使下謂之君君者善群也群道當則萬物皆得其宜六畜皆得其長群生皆得其命故養長時則六畜育殺生時則草木殖政令時則百姓一賢良服聖主之制也草木榮華滋碩之時則斧斤不入山林不夭其生不絕其長也黿鼉魚鱉鰌鱣孕別之時罔罟毒藥不入澤不夭其生不絕其長也春耕夏耘秋收冬藏四者不失時故五穀不絕而百姓有餘食也汙池淵沼川澤謹其時禁故魚鱉優多而百姓有餘用也斬伐養長不失其時故山林不童而百姓有餘材也聖王之用也上察於天下錯於地塞滿天地之閒加施萬物之上微而明短而長狹而廣神明博大以至約故曰一與一是為人者謂之聖人也序官宰爵知賓客祭祀饗食犧牲之牢數司徒知百宗城郭立器之數司馬知師旅甲兵乘白之數脩憲命審詩商禁淫聲以時順脩使夷俗邪音不敢亂雅大師之事也脩隄梁通溝澮行水潦安水臧以時決塞歲雖凶敗水旱使民有所耘艾司空之事也相高下視肥墝序五種省農功謹蓄臧以時順脩使農夫樸力而寡能治田之事也脩火憲養山林藪澤草木魚鱉百素以時禁發使國家足用而財物不屈虞師之事也順州里定廛宅養六畜閒樹藝勸教化趨孝弟以時順脩使百姓順命安樂處鄉鄉師之事也論百工審時事辨功苦尚完利便備用使彫琢文采不敢專造於家工師之事也相陰陽占祲兆鑽龜陳卦主攘擇五卜知其吉凶妖祥傴巫跛擊之事也脩採清易道路謹盜賊平室律以時順脩使𧶜旅安而𧵍財通治市之事也抃急禁悍防淫除邪戮之以五刑使暴悍以變姦邪不作司寇之事也本政教正法則兼聽而時稽之度其功勞論其慶賞以時順脩使百吏盡免而眾庶不偷冢宰之事也論禮樂正身行廣教化美風俗兼覆而調一之辟公之事也全道德致隆高綦文理一天下振毫末使天下莫不順比從服天王之事也故政事亂則冢宰之罪也國家失俗則辟公之過也天下不一諸侯俗反則天王非其人也具具而王具具而霸具具而存具具而亡用萬乘之國者威彊之所以立也名聲之所以美也敵人之所以屈也國之所以安危臧否也制與在此亡乎人王霸安存危殆滅亡制與在我亡乎人夫威彊未足以殆鄰敵也名聲未足以懸天下也則是國未能獨立也豈渠得免夫累乎天下脅於暴國而黨為吾所不欲於是者日與桀同事同行無害為堯是非功名之所就也非存亡安危之所隨也功名之所就存亡安危之所隨必將於愉殷赤心之所誠以其國為王者之所亦王以其國為危殆滅亡之所亦危殆滅亡殷之日案以中立無有所偏而為縱橫之事偃然案兵無動以觀夫暴國之相捽也案平政教審節奏砥礪百姓為是之日而兵剸天下之勁矣案然脩仁義伉隆高正法則選賢良養百姓為是之日而名聲剸天下之美矣權者重之兵者勁之名聲者美之夫堯舜者一天下也不能加毫末於是矣故權謀傾覆之人退則賢良知聖之士案自進矣刑政平百姓和國俗節則兵勁城固敵國案自詘矣務本事積財物而勿忘棲遲薛越也是使群臣百姓皆以制度行則財物積國家案自富矣三者體此而天下服暴國之君案自不能用其兵矣何則彼無與至也彼其所與至者必其民也其民之親我也歡若父母好我芳若芝蘭反顧其上則若灼黥若仇讎彼人之情性也雖桀跖豈有肯為其所惡賊其所好者哉彼以奪矣故古之人有以一國取天下者非往行之也脩政其所天下莫不願如是而可以誅暴禁悍矣故周公南征而北國怨曰何獨不來也東征而西國怨曰何獨後我也孰能有與是鬭者與安以其國為是者王殷之日安以靜兵息民慈愛百姓辟田野實倉廩便備用安謹募選閱材技之士然後漸賞慶以先之嚴刑罰以防之擇士之知事者使相率貫也是以厭然畜積脩飾而物用之足也兵革器械者彼將日日暴露毀折之中原我今將脩飾之拊循之掩蓋之於府庫貨財粟米者彼將日日捿遲薛越之中野我今將畜積并聚之於倉廩材技股肱健勇爪牙之士彼將日日挫頓竭之於仇敵我今將來致之并閱之砥礪之於朝廷如是則彼日積敝我日積完彼日積貧我日積富彼日積勞我日積佚君臣上下之閒者彼將厲厲焉日日相離疾也我今將頓頓焉日日相親愛也以是待其敝安以其國為是者霸立身則從傭俗事行則遵傭故進退貴賤則舉傭士之所以接下之百姓者則庸寬惠如是者則安存立身則輕楛事行則蠲疑進退貴賤則舉佞侻之所以接下之人百姓者則好取侵奪如是者危殆立身則憍暴事行則傾覆進退貴賤則舉幽險詐故人之所以接下之人百姓者則好用其死力矣而慢其功勞好用其籍斂矣而忘其本務如是者滅亡此五等者不可不善擇也王霸安存危殆滅亡之具也善擇者制人不善擇者人制之善擇之者王不善擇之者亡夫王者之與亡者制人之與人制之也是其為相懸也亦遠矣, WYG: 卷}
