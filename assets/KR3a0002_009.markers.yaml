  - {type: variant, offset: 57, length: 0, content: '', krp: 義明致賢衡聽顯幽重明退姦進良之術偏聽也顯幽衡平也謂不曰德明惟明能顯幽則重明矣能退姦則良進矣謂使幽人明顯不雍蔽也重明謂既明又使明也書朋黨比周之譽君}
  - {type: variant, offset: 58, length: 1, content: 孫, WYG: 不聽殘賊加累之譛君子不用殘賊謂賊害人加累以罪惡加累誣人也隠忌雍蔽之人君子不近隠亦蔽也忌謂妬賢雍讀曰擁貨財禽犢之請君子不許行賂請謁者也凡流言流說流事流謀流譽流愬不官而衡至者君子慎之流者無根源之謂愬譛}
  - {type: variant, offset: 58, length: 1, content: 孫, krp: 不聽殘賊加累之譖君子不用以罪惡加累誣人也殘賊謂賊害人加累隱忌雍蔽之人君子不近妬賢雍讀曰擁隱亦蔽也忌謂貨財禽犢之請君子不許謁者也行賂請凡流言流說流事流謀流譽流愬不官而衡至者君子愼之愬譖}
