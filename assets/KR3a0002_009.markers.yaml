  - {type: variant, offset: 24, length: 6, content: 廢元惡不待教, SBCK: 存趙夫輔車相故諫爭輔拂之人社稷之臣也國君之寶也明君之所尊所厚也}
  - {type: variant, offset: 24, length: 2, content: 廢元, WYG: 存趙夫輔車相依今趙存則魏安故曰安國之危除君之辱也故諫争輔拂之人社稷之臣也國君之寶也明君之所尊厚也而闇主惑之以為已賊也故明君之所賞闇君之所罰也闇君之所賞明君之所殺也伊尹箕子可謂諫矣伊尹諫太甲箕子諫紂比干子胥可謂争矣平原君之於趙也可謂輔矣信陵君之於魏也可謂拂矣傳曰從道不從君此之謂也故正義之臣設則朝廷不頗設謂置於列位頗邪也諫争輔拂之人信則君過不逺信謂見信於君或曰信讀為伸謂道行也爪牙之士施則仇讎不作爪牙之士勇力之臣也施謂展其材也邊境之臣處則疆垂不喪垂與陲同故明主好同而闇主好獨獨謂自任其智明主尚賢使能而饗其盛盛謂大業言饗其臣之功業也闇主妬賢畏能而滅其功滅掩沒也罰其忠賞其賊夫是之謂至闇桀紂所以滅也事聖君者有聽從無諫争聖君無失事中君者有諫争無諂諛中君可上可下若齊桓公者也諂諛則遂成闇君也事暴君者有補削無撟拂補謂彌縫其闕削謂除去其}
