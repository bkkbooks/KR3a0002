  - {type: variant, offset: 1671, length: 555, content: 於家而取賞於朝也為不善於幽而蒙刑於顯也夫是之謂定論是王者之論也王者之法等賦政事財萬物所以養萬民也田野什一關市幾而不征山林澤梁以時禁發而不稅相地而衰政理道之遠近而致貢通流財物粟米無有滯留使相歸移也四海之內若一家故近者不隱其能遠者不疾其勞無幽閒隱僻之國莫不趨使而安樂之夫是之謂人師是王者之法也北海則有走馬吠犬焉然而中國得而畜使之南海則有羽翮齒革曾青丹干焉然而中國得而財之東海則有紫綌魚鹽焉然而中國得而衣食之西海則有皮革文旄焉然而中國得而用之故澤人足乎木山人足乎魚農夫不斲削不陶冶而足械用工賈不耕田而足菽粟故虎豹為猛矣然而君子剝而用之故天之所覆地之所載莫不盡其美致其用上以飾賢良下以養百姓而安樂之夫是之謂大神詩曰天作高山大王荒之彼作矣文王康之此之謂也以類行雜以一行萬始則終終則始若環之無端也舍是而天下以衰矣天地者生之始也禮義者治之始也君子者禮義之始也為之貫之積重之致好之者君子之始也故天地生君子君子理天地君子者天地之參也萬物之總也民之父母也無君子則天地不理禮義無統上無君師下無父子夫婦是之謂至亂君臣父子兄弟夫婦始則終終則始與天地同理與萬世同久夫是之謂大本故喪祭朝聘師旅一也貴賤殺生與奪一也君君臣臣父父子子兄兄弟弟一也農農士士工工商商一也水火有氣而無生草木有生而無知禽獸有知而無義人有氣有生有知亦且有義故最為天下貴也力, SBCK: ''}
