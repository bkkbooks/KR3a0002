  - {type: variant, offset: 21, length: 2, content: 待頃, SBCK: 聽遂以解國之大患除國之大害成於尊君安國謂之輔原君傳事見平有能抗君之命竊君之重反君之事以安國之危除君之辱功伐足以成國之大利謂之拂功曰伐左抗拒也戰爲佛違君之意也謂若信陵君違魏王之命竊其兵符殺傳郤至驟稱其伐拂讀爲弼弼所以輔正弓弩者也或讀依今趙存則魏安故曰安國之危除君之辱也晉鄙反軍不救趙之事遂破秦}
