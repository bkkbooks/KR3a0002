  - {type: variant, offset: 57, length: 0, content: '', WYG: 義衡聽顯幽重明退姦進良之術衡平也謂不偏聽也顯幽謂使幽人明顯不擁蔽也重明謂既明又使明也書曰德明惟明能顯幽則重明矣能退姦則良進矣朋黨比周之譽君}
