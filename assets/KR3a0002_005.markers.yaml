  - {type: variant, offset: 10, length: 0, content: '', SBCK: 霸奪之與彊奪之地國也彊國之術人謂賢人與與地也則奪人奪之人者臣諸侯奪之與者友諸侯奪之地者敵諸侯臣諸侯者王友諸侯者霸敵諸侯者危用彊者非知彊道者用彊力勝人人之城守人之出戰而我以力勝之也則傷人之民必甚矣傷人之民甚則人之民惡我必甚矣人之民惡我甚則日欲與我鬬人之城守人之出戰而我以力勝之則傷吾民必甚矣傷吾民甚則吾民之惡我必甚矣吾民之惡我甚則日不欲為我鬬人之民日欲與我鬭吾民日不欲為我鬭是彊者之所以反弱也地來而民去累多而功少累也累憂雖守者益所以守者損是以大者之所以反削也者所以守者謂所以守地之人也守者謂地也守國以地為本故曰守諸侯莫不懐交接怨而不忘其敵以力勝而不義交接連結也既夲多作壊交接言壊其與已交接之道也故諸侯皆欲相連結怨國而不忘與之為敵伺彊大之間承彊大之敝也知彊大之敝此彊大之殆時也也殆危知彊大者不務彊也不務以力勝也知彊大之術者慮以王命全其力凝其德慮常用王命謂不敢慮計也以用也其計其徳謂不輕舉也擅侵暴也凝定也定力全則諸侯不能弱也德凝則諸侯不能削也天下無王霸主則常勝矣是知彊道者也國常勝主或衍字無王霸之主則彊彼霸者不然辟田野實倉廩便備用傳曰無重器備備用足用也左案謹募選閲材技之士重募也選閲揀擇也材技武藝案發聲謹嚴也募招也謹募猶之材官也過人者猶漢然後漸慶賞以先之勉以慶賞也漸進也言進嚴刑罰以糾之存亡繼絶衞弱禁暴而無兼并之心則諸侯親之矣併下同并讀曰脩友敵之道以敬接諸侯則諸侯説之矣恱下同説讀為所以親之者以不并也并之見則諸侯䟽之矣遍反見賢所以説之者以友敵也臣之見則諸侯離矣故明其不并之行信其友敵之道孟反行下人不疑信謂使天下無王霸主則常勝矣是知霸道者也主常勝也無王者則霸閔王毁於五國十年樂毅以燕史記齊閔王四閔王出奔莒也趙楚魏秦破齊􅁊公劫於魯莊爲魯莊公之臣曹劌所公羊傳柯之盟齊􅁊公也劫無它故焉非其道而慮之以王也以計慮爲王不行其道而亡也所以危彼王者不然仁眇天下義眇天下威眇天下仁感其義畏其威也眇盡也盡天下皆懷其仁眇天下故天下莫不親也義眇天下故天下莫不貴也威眇天下故天下莫敢敵也以不敵之威輔服人之道以服人其道可故不戰而勝不攻而得甲兵不勞而天下服是知王道者也知此三具者欲王而王欲霸而霸欲彊而彊矣王者之人之佐王者飾動以禮義動必以禮義所脩飾及舉聽斷以類善類謂輕重得中也所聽斷之事皆得其明振毫末言細微振舉也見必舉錯應變而不窮夫是之謂有原是王者之人也為政之本原本也知王者之制制度也説王者道不過三代法不貳後王貳後王言以當世之王為法不離貳而遠取之論王道不過夏殷周之事過則久遠難信法不道過三代謂之蕩法貳後王謂之不雅解上並已衣服有制宫室有度人徒有數卒胥徒也人徒謂士喪祭械用皆有等宜級各當其宜也械器也皆有等聲則凡非雅聲者舉廢皆舉色則凡非舊文者舉息繢之事也謂染采畫械用則凡非舊器者舉毁代故事舊謂三夫是之謂復古是王者之制也復古不必遠舉也復三代故事則是王者之論罰也盧困反論謂論説賞無德不貴無能不官無功不賞無罪不罰朝無幸位民無幸生幸也幸僥尚賢使能而等位不遺等位等級之位也不遺言各當其材析愿禁悍而刑罰不過與凶悍者異也悍凶暴也刑析分異也分其愿慤之民使而已不刻深也罰不過言但禁之百姓曉然皆知夫為善於家而取賞於朝也為不善於幽而䝉刑於顯也夫是之謂定論是王者之論也論論不易則定論不易之勸也人知沮王者之等賦政事財萬物所以養萬民也制萬物皆為養人非貪利也財與裁同等賦賦税有等所以為等賦及政事裁田野什一一也什税􅀜市幾而不征不征税也禮記幾作譏幾呵察也但呵察姦人而山林澤梁以時禁發而不税及時則發禮記曰􅆩祭魚然後漁人石絶水爲梁所以取魚也非時則禁然後入山林也入澤梁草木零落相地而衰政輕重政或讀爲征衰初相視也衰差也政爲之反危理道之遠近而致貢若百里賦納緫二百里納銍理條理也貢任土所貢也謂也之類通流財物粟米}
