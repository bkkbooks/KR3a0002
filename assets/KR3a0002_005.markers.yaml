  - {type: variant, offset: 423, length: 316, content: 也然而身死國亡為天下大僇後世言惡則必稽焉是非容貌之患也聞見之不眾論議之卑爾今世俗之亂君鄉曲之儇子莫不美麗姚冶奇衣婦飾血氣態度擬於女子婦人莫不願得以為夫處女莫不願得以為士棄其親家而欲奔之者比肩並起然而中君羞以為臣中父羞以為子中兄羞以為弟中人羞以為友俄則束乎有司而戮乎大市莫不呼天啼哭苦傷其今而後悔其始是非容貌之患也聞見之不眾而論議之卑爾然則從者將孰可也人有三不祥幼而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也人有三必窮為上則不能愛下為下則好非其上是人之一必窮也鄉則不若偝則謾之是人之二必窮也智行淺薄曲直有以相縣矣然而仁人不能推知士不能明是人之三必窮也人有此數行者以為上則必危為下則必滅詩曰雨雪瀌瀌宴然聿消莫肯下隧式居屢驕此之謂也, SBCK: ''}
