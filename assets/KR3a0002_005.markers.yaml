  - {type: variant, offset: 800, length: 0, content: '', SBCK: 安危臧否也制與在此亡乎人王霸安存危殆滅亡制與在我亡乎人夫威彊未足以殆鄰敵也名聲未足以懸天下也則是國未能獨立也豈渠得免夫累乎天下脅於暴國而黨}
  - {type: page-break, offset: 800, content: '', id: KR3a0002_SBCK_005-18b}
  - {type: variant, offset: 800, length: 0, content: '', WYG: 安危臧否也制與在此亡乎人王覇安存危殆滅亡制與在我亡乎人夫威彊未足以殆鄰敵也名聲未足以懸天下也則是國未能獨立也豈渠得免夫累乎天下脅於暴國而黨}
  - {type: variant, offset: 800, length: 0, content: '', krp: 安危臧否也制與在此亡乎人王霸安存危殆滅亡制與在我亡乎人夫威彊未足以殆鄰敵也名聲未足以懸天下也則是國未能獨立也豈渠得免夫累乎天下脅於暴國而黨}
  - {type: variant, offset: 801, length: 0, content: '', SBCK: 吾所不欲於是者日與桀同事同行無害為堯是非功名之所就也非存亡安危之所墮也功名之所就存亡安危之所墮必將於愉殷赤心之所誠以其國為王者之所亦王以其國為危殆滅亡之所亦危殆滅亡殷之日案以中立無有所偏而為縱橫之事偃然案兵無動以觀夫暴國之相卒也案平政敎審節奏砥礪百姓為是之日而兵剸天下勁矣案然脩仁義伉隆髙正法則選賢良養百姓為是之日而名聲剸天下之美矣權者重之兵者勁之名聲者美之夫堯舜者一天下也不能加毫末於是矣故權謀傾覆之}
  - {type: page-break, offset: 801, content: '', id: KR3a0002_SBCK_005-19a}
  - {type: variant, offset: 801, length: 0, content: '', WYG: 吾所不欲於是者日與桀同事同行無害為堯是非功名之所就也非存亡安危之所墮也功名之所就存亡安危之所墮必将於愉殷赤心之所誠以其國為王者之所亦王以其國為危殆滅亡之所亦危殆滅亡殷之日案以中立無有所偏而為縱橫之事偃然案兵無動以觀夫暴國之相卒也案平政教審節奏砥礪百姓為是之日而兵剸天下勁矣案脩仁義伉隆髙正法則選賢良養百姓為是之日而名聲剸天下之美矣權者重之兵者勁之名聲者美之夫堯舜者一天下也不能加毫末於是矣權謀傾覆之}
