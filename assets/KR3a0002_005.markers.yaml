  - {type: variant, offset: 5, length: 1, content: 相, WYG: 疾上收而養之材而事之五疾瘖聾跛躄㫁者侏儒各當其材使之謂若矇瞽修聲聾瞶司火之屬官施而衣食之兼覆無遺官為之施設所職而與之衣食才行反時者死無赦夫是之謂天德王者之政也天徳天覆之徳聽政之大分以善至者待之以禮以不善至者待之以刑兩者分别則賢不肖不雜是非不亂賢不肖不雜則英傑至是非不亂則國家治若是名聲日聞天下願令行禁止王者之事畢矣願謂}
