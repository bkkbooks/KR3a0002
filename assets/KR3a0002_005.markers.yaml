  - {type: variant, offset: 27, length: 0, content: '', SBCK: 罽也旄旄牛故澤人足乎木山人足乎魚農夫不斵削不陶冶而足械用工賈不耕田而足菽粟故虎豹為猛矣然而君子剥而用之故天之所覆地之所載莫不盡其美致其用來為人用也物皆盡其美而上以飾賢良下以養百姓而安樂之養謂衣食飾謂車服夫是之謂大神物故曰大神也能變通裁制萬詩曰天作髙山大王荒之彼作矣文王康之此之謂也之篇荒大也詩周頌天作則能尊大之彼大王作此都文王又能安之也康安也言天作此高山使興雲雨大王自豳遷焉以類行雜不患於雜也得其統類則以一行萬萬人可治也行於一人則樞要也皆謂得其始則終終則始若環之無端也舍是而天下以衰矣以此道為治終始不窮無休息則始謂類與一也終謂雜與萬也言則亂也衰初危反天下得其次序舍此天地者生之始也禮義者治之始也君子者禮義之始也義本於君子也始猶本也言禮為之貫之積重之致好之者君子之始也禮言之謂學使委積重多也致極也好之言不倦也義以君子為本君子以習學為本貫習也積重故天地生君子君子理天地君子者天地之參也萬物之緫也民之父母也成化育也緫領也參謂與之相參共無君子則天地不理禮義無統上無君師下無父子夫婦是之謂至亂君臣父子兄弟夫婦始則終終則始與天地同理與萬}
