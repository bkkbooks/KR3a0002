  - {type: variant, offset: 21, length: 4, content: 姑布子卿, SBCK: 球琳琅玕焉皆出西東海則有紫紶魚鹽焉然而中國得而衣食之字書亦無紶字當紫紫具也紶未詳蓋亦蚌蛤之屬今案本草謂之石决明陶云俗傳是紫貝定小為蜐郭璞江賦曰石􅎕應節而􅀭葩注云石􅎕􅀛形春則生花古以􅀛具為貨故曰衣食之􅎕居業反異附石生大者如手明耀五色内亦含珠西海則有皮革文旄焉然而中國得而用之織皮孔云貢四獸禹貢梁州貢熊羆尾文旄謂染之為文綵也之皮織皮}
