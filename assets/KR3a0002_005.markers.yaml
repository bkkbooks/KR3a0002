  - {type: variant, offset: 35, length: 0, content: '', SBCK: 大本有君子始則終終則始謂一世始言長久也然後可以故喪祭朝聘師旅一也之始為之制喪祭朝此已下明君子禮義不使淫放也下一之義皆同聘之禮所以齊一民各當其道貴賤殺生與奪一也於沮勸使民一君君臣臣父父子子兄兄弟弟一也於恩義使人一農農士士工工商商一也於職業使人一水火有氣而無生草木有生而無知知謂性識生謂滋長禽獸有知而無義人有氣有生有知亦且有義故最為天下貴也亦有無義者也亦且者言其中力不若牛走不若馬而牛馬為用何也曰人能羣彼不能羣也人何以能羣曰分則不能羣也無分則爭爭分何以能行曰以義故義以分則和須也義謂言分義相也裁㫁和則一一則多力多力則彊彊則勝物故宫室可得而居也所以安居物不能害故序四時裁萬物兼利天下無它故焉得之分義也有以治天下也分義故能故人生不能無羣羣而無分則爭爭則亂亂則離離則弱弱則不能勝物故宫室不可得而居也不可少頃舍禮義之謂也能以事親謂之孝能以事兄謂之弟能以事上謂之順能以使下謂之君能以禮義能以皆謂也君者善羣也為羣也善能使人羣道當則萬物皆得其宜六畜皆得其長羣生皆得其命其安命性故養長時則六畜育殺生時則草木殖斬伐殺生政令時則百姓一賢良服聖主之制也謂爲之任使時謂有常服草木榮華滋碩之時則斧斤不入山林不夭其生不絶其長也黿鼉魚鼈鰌鱣孕别之時魯宣公曰魚方別孕韋昭曰自别於別謂生育與母分别也國語里革諫子也雄而懷罔􅅈毒藥不入澤不夭其生不絶其長也雍氏禁澤之沈者也毒藥毒魚之藥周禮春耕夏耘秋收冬藏四者不失時故五榖不絶而百姓有餘食也汙池淵沼川澤謹其時禁處謹嚴也汙渟水之故魚鼈優多而百姓有餘用也外可用􅐙易用謂食足之斬伐養長不失其時故山林不童而百姓有餘材也木曰童山無草聖王之用也用也用財上察於天下錯於地財也錯千故反順天時以養地塞備天地之閒加施萬物之上地萬物皆得其所言聖王之用使天微而明短而長狹而廣者近所及者遠也言用禮義故所守神明博大以至約治化雖神言用禮義本至簡約也明博大原其故曰一與一是為人者謂之聖人也此為人者則謂之聖人也一與一動皆一也是此也以序官官之法也謂王者序宰爵知賔客祭祀饗食犧牲之牢數之屬有庖人獸人皆掌犧牲一曰爵官爵宰膳宰爵主掌也饗食饗宴也周禮膳夫掌犧牲之事者也也言膳宰之官爵司徒知百宗城郭立器之數司徒之職掌建邦土地之圖與其人民之數立器言五方器百宗百族也城郭謂其小大也立器所立之器用也周禮大使作竒伎奇器也械異制皆知其數不司馬知師旅甲兵乘白之數四丘為甸亦謂之乘以其治田則謂之甸出長轂一乘則周禮二千五百人為師五百人為旅四井為邑四邑為丘謂甸徒猶今之白丁也或曰白當為百百人也謂之乘每乘又有甲士三人歩卒七十二人白脩憲命憲脩德教國子中和祗庸孝友之類也法之命所以表示人也謂若以樂審詩商賞字體及聲詩商當為誅者或曰詩謂四方之歌謡商謂商聲哀思之音如寗戚之悲歌之誤故樂論篇曰其在序官也脩憲命審誅賞其徒屬之功過也禁淫聲聲鄭云淫聲鄭衛之音也周禮大司樂禁其淫聲慢以時順脩不謂順之脩之失其時而使夷俗邪音不敢亂雅大師之事也大師樂官之長大讀曰太夷俗謂蠻夷之樂雅正聲也脩隄梁水梁橋也隄所以防通溝澮有澮澮上有道鄭云溝廣深各四尺澮廣二㝷深二仞溝澮皆所以通水周禮十夫之田有溝溝上有畛千夫也行水潦下孟反行廵行也安水臧使漏溢臧才浪反使水歸其壑安謂不以時決塞之不使失時也旱則決之水則塞歲雖凶敗水旱使民有所耘艾司空之事也為刈艾讀相高下視肥墝序五種觀其地所宜而種之墝苦交反高下原隰也五榖􅁰稷豆麻麥省農功勤惰而勸之省觀也觀其謹蓄臧嚴謹以時順脩使農夫樸力而寡能治田之事也禁其佗能也治田田使農夫敦朴於力穡也畯脩火憲林鄭注周禮憲表也主表其刑禁也不使非時焚山澤月令二月無焚山養山林藪澤草木魚鼈百索索百物也百索上所以時禁發發謂許民采取禁謂為之厲禁使國家足用而財物不屈虞師之事也禮山虞澤虞也屈竭也虞師周順州里和順使之定􅌀宅謂􅌀也定其分界不使相侵奪也市内百姓之居宅謂邑内居養六畜之也勸人養閒樹藝間之使䟽宻得宜也樹藝種樹及桑柘也勸教化趨孝弟化趨之使敦勸之使從敎讀爲促孝弟趨以時順脩使百姓順命安樂處郷郷師之事也公一人郷大夫每郷卿一人郷師公卿也周禮郷老二郷論百工巧拙論其誠工有不當必行其罪也月令曰物勒工名以考其審時事有氣材有美工有巧考工記曰天有時地工日號無悖于時皆審其時之事也合此四者然後可以為良月令曰監辨功苦好者若謂濫功謂器之精功堅苦脆也惡者韋昭曰尚完利若車之利轉之類也完堅也利謂便於用便備用使彫琢文采不敢專造於家工師之事也造專也私造相隂陽陽謂數也相視也隂占祲兆相侵之氣赤黒之占占候也祲隂陽兆謂望其雲物知歳之吉凶也祲是其類也兆謂􅀛兆或曰兆萌鑚􅀛陳卦火􅋹荆華鑚􅀛謂以揲蓍布卦也灼之也陳卦謂主攘擇五卜五卜洪範所謂曰雨曰霽曰攘擇攘除不祥擇取吉事也言兆之}
