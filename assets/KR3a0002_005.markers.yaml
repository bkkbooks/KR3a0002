  - {type: variant, offset: 60, length: 0, content: '', SBCK: 路不必全依周禮抃急禁悍為愿已解上也抃當為析急當防淫除邪戮之以五刑使暴悍以變姦邪不作司宼之事也本政教正法則兼聽而時稽之正其治受其㑹而詔王廢置三嵗則大計也稽計也考也周禮太宰嵗終則令百官府各度其功勞論其慶賞以時順脩使百吏免盡而衆庶不偷冡宰之事也論禮樂正身行廣教化美風俗兼覆而調一之辟公之事也全道德致隆高綦文理一天下振毫末使天下莫不順比從服天王之事}
