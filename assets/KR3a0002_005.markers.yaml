  - {type: punctuation, offset: 6, content: （, id: KR3a0002_tls_005-bkkpn1}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 制也此皆名無差等有天有地而上下有差明王始立而處國有制差等也制亦謂夫兩貴之不能相事兩賤之不能相使是天數也數也天之埶位齊而欲惡同物不能澹則必爭不知紀極故物不能足也澹讀為贍既無等級則皆爭則必亂亂則窮矣竭也物窮先王惡其亂也故制禮義以分之使有貧富貴賤之等足以相兼臨者是養天下之夲也而不窮竭使物有餘書曰維齊非齊此之謂也以諭有差等然後可以為治也書吕刑言維齊一者乃在不齊馬駭輿則君子不安輿車中也馬駭於庶}
  - {type: page-break, offset: 6, content: '', id: KR3a0002_SBCK_005-4a}
  - {type: variant, offset: 6, length: 0, content: '', krp: 制也此皆名無差等有天有地而上下有差明王始立而處國有制差等也制亦謂夫兩貴之不能相事兩賤之不能相使是天數也數也天之埶位齊而欲惡同物不能澹則必爭不知紀極故物不能足也澹讀為贍既無等級則皆爭則必亂亂則窮矣竭也物窮先王惡其亂也故制禮義以分之使有貧富貴賤之等足以相兼臨者是養天下之夲也而不窮竭使物有餘書曰維齊非齊此之謂也以諭有差等然後可以為治也書吕刑言維齊一者乃在不齊馬駭輿則君子不安輿車中也馬駭於庶}
