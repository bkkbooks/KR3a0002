  - {type: variant, offset: 9, length: 1, content: 人, WYG: 和解調通則寛和不拒下也凝定也凝止謂定止其不可也則姦言並至嘗試之説鋒起嘗試之説謂假借以事試為之也荘子曰嘗試論之鋒起謂如鋒刃齊起言鋭而難拒也若是則聽大事煩是又傷之也聽大謂所聽之事多也傷傷政也故法而不議則法之所不至者必廢議謂講論也雖有法度而不能講論則不周治故法所不至者必廢也職而不通則職之所不及者必隊雖舉當其職而不能通明其類則職所不及者必隊隊與墜同故法而議職而通}
