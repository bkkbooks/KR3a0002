  - {type: 'tls:seg', offset: 7, content: '', id: KR3a0002_tls_005-1a.4}
  - {type: variant, offset: 7, length: 1, content: 古, SBCK: 駭政則君子不安位上之政也駭政不安馬駭輿則莫若静之庶人駭政則莫若惠之惠也惠恩選賢良舉篤敬興孝悌收孤寡補貧窮如是則庶人安政矣庶人安政然后君子安位傳曰君者舟也庶人者水也水則載舟水則覆舟此之謂也故君人者欲安則莫若平政愛民矣欲榮則莫若隆禮敬士矣欲立功名則莫若尚賢使能矣是君人者之大節也三節者當則其餘莫不當矣三節者不當則其餘雖曲當猶將無益也當當丁浪反曲當謂委曲皆孔子曰大節是也小節是也上君也大節是也小節非也一出焉一入焉中君也一失也謂一得大節非也小節雖是也吾無觀其餘矣成侯嗣公聚斂計數之君也也史記衞聲公卒成侯嗣公皆衞君公重如耳愛泄姬而恐其皆因其愛重以雍已也乃貴薄疑子成侯立成侯卒子平侯立平侯卒子嗣君立韓子曰衛嗣賂之以金後召關市問其有客過與汝金汝回遣之關市大以敵如耳尊魏妃以耦泄姬曰以是相參也又使過客關市此皆計數之類也恐以嗣公為明察未及取民也取也民謂得民心未及謂其才未及鄭子產取民者也未及為政者也衆人之母能食禮記曰子産猶敎之也之不能管仲為政者也未及脩禮者也教化也言未及故脩禮者王為政者彊取民者安聚斂者亡故王者富民霸者富士伍也士卒僅存之國富大夫亡國富筐篋實府庫筐篋已富府庫已實而百姓貧夫是之謂上溢而下漏空虚可立而待也如器之上溢下漏入不可以守出不可以戰則傾覆滅亡可立而待也故我聚之以亡敵得之以彊聚斂者召寇肥敵亡國危身之道也故明君不蹈也王奪}
