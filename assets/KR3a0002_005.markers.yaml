  - {type: 'tls:seg', offset: 5, content: '', id: KR3a0002_tls_005-1a.3}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 疾上收而養之材而事之之謂若矇瞽脩聲聾聵司火之屬也五疾瘖聾跛躄㫁者侏儒各當其材使官施而衣食之兼覆無遺而與之衣食也官為之施設所職才行反時者死無赦夫是之謂天德王者之政也覆之徳天徳天聽政之大分以善至者待之以禮以不善至者待之以刑兩者分别則賢不肖不雜是非不亂賢不肖不雜則英傑至是非不亂則國家治若是名聲日聞天下願令行禁止則王者之事畢矣皆願矣願謂人人凡聽政也論聽威嚴猛厲而不好假導人寛和假借導引人也厲剛烈也假導謂以則下畏恐而不親周閉而不竭不竭盡也隱閉其情而若是則大事殆乎弛小事殆乎遂也春秋傳曰遂弛廢也遂因循於弛廢小事近於因循言不肯革敝矣繼事也下既隱情不敢論説則大事近和解調通好假導人而無所凝止之定也凝止謂定止其不可也和解調通謂寛和不拒下也凝則姦言並至甞試之説鋒起事試為之也莊子曰嘗試之説謂假借以刃齊起言鋭而難拒也甞試論之鋒起謂如鋒若是則聽大事煩是又傷之也多也傷傷政也聽大謂所聽之事故法而不議則法之所不至者必廢則不周洽故法所不至者必廢也議謂講論也雖有法度而不能講論職而不通則職之所不及者必隊不能通明其類雖舉當其職而必隊隊與墜同則職所不及者故法而議職而通無隱謀無遺善而百事無過非君子莫能故公平者職之衡也中和者聽之繩也重繩所以辨曲直言君聽聽政也衡所以知輕事無過中和謂寛猛得中也子用公平中和之道故能百其有法者以法行無法者以類舉聽之盡也比類類謂偏黨而無經聽之辟也也辟讀曰僻無經謂無常法故有良法而亂者有之矣有君子而亂者自古及今未嘗聞也傳曰治生乎君子亂生乎小人此之謂也其人亡其政息其人存其政舉分均則不偏也分扶問反分均謂貴賤敵埶齊則不壹衆齊則不使則不可}
