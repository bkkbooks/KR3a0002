  - {type: variant, offset: 1513, length: 489, content: 之度己則以繩接人則用枻度己以繩故足以為天下法則矣接人用枻故能寬容因眾以成天下之大事矣故君子賢而能容罷知而能容愚博而能容淺粹而能容雜夫是之謂兼術詩曰徐方既同天子之功此之謂也談說之術矜莊以莅之端誠以處之堅彊以持之譬稱以諭之分別以明之欣驩芬薌以送之寶之珍之責之神之如是則說常無不受雖不說人人莫不貴夫是之謂為能貴其所貴傳曰唯君子為能貴其所貴此之謂也君子必辯凡人莫不好言其所善而君子為甚焉是以小人辯言險君子辯言仁也言而非仁之中也則其言不若其默也其辯不若其吶也言而仁之中也則好言者上矣不好言者下也故仁言大矣起於上所以導於下政令是也起於下所以忠於上謀救是也故君子之行仁也無厭志好之行安之樂言之故言君子必辯小辯不如見端見端不如見本分小辯而察見端而明本分而理聖人士君子之分具矣有小人之辯者有士君子之辯者有聖人之辯者不先慮不早謀發之而當成文而類居錯遷徙應變不窮是聖人之辯者也先慮之早謀之斯須之言而足聽文而致實博而黨正是士君子之辯者也聽其言則辭辨而無統用其身則多詐而無功上不足以順明王下不足以和齊百姓然而口舌之於噡唯則節足以為奇偉偃卻之屬夫是之謂姦人之雄聖王起所以先誅也然後盜賊次之盜賊得變此不得變也, SBCK: 卷第五}
