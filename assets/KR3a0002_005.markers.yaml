  - {type: variant, offset: 212, length: 210, content: 突禿長左軒較之下而以楚霸葉公子高微小短瘠行若將不勝其衣然白公之亂也令尹子西司馬子期皆死焉葉公子高入據楚誅白公定楚國如反手爾仁義功名善於後世故士不揣長不揳大不權輕重亦將志乎心爾長短小大美惡形相豈論也哉且徐偃王之狀目可瞻馬仲尼之狀面如蒙倛周公之狀身如斷菑皋陶之狀色如削瓜閎夭之狀面無見膚傅說之狀身如植鰭伊尹之狀面無須麋禹跳湯偏堯舜參牟子從者將論志意比類文學邪直將差長短辨美惡而相欺傲邪古者桀紂長巨姣美天下之傑也筋力越勁百人之, SBCK: ''}
