  - {type: variant, offset: 801, length: 0, content: '', krp: 吾所不欲於是者日與桀同事同行無害為堯是非功名之所就也非存亡安危之所墮也功名之所就存亡安危之所墮必將於愉殷赤心之所誠以其國為王者之所亦王以其國為危殆滅亡之所亦危殆滅亡殷之日案以中立無有所偏而為縱橫之事偃然案兵無動以觀夫暴國之相卒也案平政敎審節奏砥礪百姓為是之日而兵剸天下勁矣案然脩仁義伉隆髙正法則選賢良養百姓為是之日而名聲剸天下之美矣權者重之兵者勁之名聲者美之夫堯舜者一天下也不能加毫末於是矣故權謀傾覆之}
  - {type: variant, offset: 802, length: 0, content: '', SBCK: 退則賢良知聖之士案自進矣刑政平百姓和國俗節則兵勁城固敵國案自詘矣務本事積財物而勿忘棲遲薛越也是使羣臣百姓皆以制度行則財物積國家案自富矣三者體此而天下服暴國之君案自不能用其兵矣何則彼無與至也彼其所與至者必其民也其民之親我也歡若父母好我芳若芝蘭反顧其上則若灼黥若仇讎彼人之情性也雖桀跖豈有肯為其所惡賊其所好者哉彼以奪矣故古之人有以一國取天下}
