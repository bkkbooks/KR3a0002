  - {type: variant, offset: 30, length: 69, content: 唐舉相人之形狀顏色而知其吉凶妖祥世俗稱之古之人無有也學者不道也故相形不如論心論心不如擇術形不勝心心不勝術術正而心順則形相雖惡而心術善無害為, WYG: ''}
