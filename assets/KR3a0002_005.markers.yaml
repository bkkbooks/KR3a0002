  - {type: variant, offset: 1, length: 1, content: 相, WYG: 制}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 九請問為政曰賢能不待次而舉若傅説起於板不以官之次序相也築為罷不能不待頃而廢􅁷也頃須元惡不待敎而誅惡不待教而誅之也不教而殺謂之虐唯元中庸雜民不待政而化化之不待政成之後也中庸民易與為善故教則分未定也則有昭繆也使賢者居上不肖者居下如昭穆之分别然不問其世族繆讀為穆父昭子穆言為政當分未定之時則為之分别也雖王公士大夫之子孫也不能屬於禮義則歸之庶人雖庶人之子孫也積文學正身行能屬於禮義則歸之卿相士大夫繫屬欲反也之故姦言姦説姦事姦能遁逃反側之民職而敎之須而待之本事也須而待之謂須暇之而待其遷善也反側不安之民也職而教之謂使各當敎其勉之以慶賞懲之以刑罰安職則畜不安職則棄四裔之比也畜養也棄謂投}
  - {type: page-break, offset: 4, content: '', id: KR3a0002_SBCK_005-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 九請問為政曰賢能不待次而舉不以官之次序若傅説起於版築為相也罷不能不待頃而廢頃湏臾也元惡不待教而誅不教而殺謂之虐惟元惡不教而誅之也中庸民不待政而化中庸民易與為善故教則化之不待政成之後也分未定也則有昭繆也繆讀為穆父昭子穆言為政當分未定之時則為之分别使賢者居上不肖者居下如昭穆之分别然不問其世族也雖王公士大夫之子孫也不能屬於禮義則歸之庶人雖庶人之子孫也積文學正身行能屬於禮義則歸之卿相士大夫屬繫也之欲反故姦言姦説姦事姦能遁逃反側之民職而教之湏而待之反側不安之民也職而教之謂使各當教其夲事也湏而待之謂湏暇之而待其遷善也勉之以慶賞懲之以刑罰安職則畜不安職則弃畜養也弃謂投四裔之比也}
  - {type: page-break, offset: 4, content: '', id: KR3a0002_WYG_005-1b, image: WYG0695/WYG0695-0161b.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 九請問為政曰賢能不待次而舉若傅説起於板不以官之次序相也築為罷不能不待頃而廢臾也頃須元惡不待敎而誅惡不待教而誅之也不教而殺謂之虐唯元中庸雜民不待政而化化之不待政成之後也中庸民易與為善故教則分未定也則有昭繆也使賢者居上不肖者居下如昭穆之分别然不問其世族繆讀為穆父昭子穆言為政當分未定之時則為之分别也雖王公士大夫之子孫也不能屬於禮義則歸之庶人雖庶人之子孫也積文學正身行能屬於禮義則歸之卿相士大夫繫屬欲反也之故姦言姦説姦事姦能遁逃反側之民職而敎之須而待之本事也須而待之謂須暇之而待其遷善也反側不安之民也職而教之謂使各當敎其勉之以慶賞懲之以刑罰安職則畜不安職則棄四裔之比也畜養也棄謂投}
