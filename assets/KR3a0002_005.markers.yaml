  - {type: variant, offset: 806, length: 1, content: 二, SBCK: 誅暴禁悍矣故周公南征而北國怨曰何獨不來也東征而西國怨曰何獨後我也孰能有與是鬭者與安以其國為是者王殷之日安以靜兵息民慈愛百姓辟田野實倉廩便備用安謹募選閲材技之士然後漸賞慶以先之嚴刑罰以防之擇士之知事者使相率貫也是以厭然畜積脩飾而物用之}
