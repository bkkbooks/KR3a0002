  - {type: variant, offset: 18, length: 1, content: 古, SBCK: 不隱其能謂竭其才力也不無幽閒隱僻之國莫不趨使而安樂之隔之國不為王者趨使而幽深也閒隔也言無有深教也安樂政夫是之謂人師是王者之法也為政如此師長也言亦使人法效之者也乃可以長久也師者北海則有走馬吠犬焉然而中國得而畜使之也走馬吠犬今北地之大犬也海謂荒晦絶遠之地不必至海水南海則有羽翮齒革曾青丹干焉然而中國得而財之可繢畫及化黃金者出蜀山越嶲丹于丹砂翮大鳥羽齒象齒革犀兕之革曽青銅之精尚書禹貢雍州球琳琅玕孔云石而似珠者爾雅亦云西北也蓋一名丹干干讀為矸胡旦反或曰丹丹砂也干當為玕方此云南方者蓋南方亦有也方之美}
