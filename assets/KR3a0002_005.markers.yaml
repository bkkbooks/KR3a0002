  - {type: variant, offset: 808, length: 3, content: 而無毛, SBCK: 也兵革器械者彼将日日暴露毁折之中原我今將脩飾之拊循之掩蓋之於府庫貨財粟米者彼將日日捿遲薛越之中野我今将畜積并聚之於倉廩材技股肱健勇爪牙之士彼將日日挫頓竭之於仇敵我今將來致之并閲之砥礪之於朝廷如是則彼日積敝我日積完彼日積貧我日積富彼日積勞我日積佚君臣上下之間者彼將厲厲焉日日相離疾也我今将頓頓焉日日相親愛}
