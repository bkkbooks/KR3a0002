  - {type: variant, offset: 1038, length: 226, content: 謂也夫妄人曰古今異情其所以治亂者異道而眾人惑焉彼眾人者愚而無說陋而無度者也其所見焉猶可欺也而況於千世之傳也妄人者門庭之閒猶可誣欺也而況於千世之上乎聖人何以不可欺曰聖人者以己度者也故以人度人以情度情以類度類以說度功以道觀盡古今一也類不悖雖久同理故鄉乎邪曲而不迷觀乎雜物而不惑以此度之五帝之外無傳人非無賢人也久故也五帝之中無傳政非無善政也久故也禹湯有傳政而不若周之察也非無善政也久故也傳者久則俞略近則俞詳略則舉大詳則舉小愚者聞其略而不知其詳聞其小而不知其大, SBCK: ''}
