  - {type: variant, offset: 115, length: 620, content: 也君子之謂吉小人之謂凶故長短小大善惡形相非吉凶也古之人無有也學者不道也蓋帝堯長帝舜短文王長周公短仲尼長子弓短昔者衛靈公有臣曰公孫呂身長七尺面長三尺焉廣三寸鼻目耳具而名動天下楚之孫叔敖期思之鄙人也突禿長左軒較之下而以楚霸葉公子高微小短瘠行若將不勝其衣然白公之亂也令尹子西司馬子期皆死焉葉公子高入據楚誅白公定楚國如反手爾仁義功名善於後世故士不揣長不揳大不權輕重亦將志乎心爾長短小大美惡形相豈論也哉且徐偃王之狀目可瞻馬仲尼之狀面如蒙倛周公之狀身如斷菑皋陶之狀色如削瓜閎夭之狀面無見膚傅說之狀身如植鰭伊尹之狀面無須麋禹跳湯偏堯舜參牟子從者將論志意比類文學邪直將差長短辨美惡而相欺傲邪古者桀紂長巨姣美天下之傑也筋力越勁百人之敵也然而身死國亡為天下大僇後世言惡則必稽焉是非容貌之患也聞見之不眾論議之卑爾今世俗之亂君鄉曲之儇子莫不美麗姚冶奇衣婦飾血氣態度擬於女子婦人莫不願得以為夫處女莫不願得以為士棄其親家而欲奔之者比肩並起然而中君羞以為臣中父羞以為子中兄羞以為弟中人羞以為友俄則束乎有司而戮乎大市莫不呼天啼哭苦傷其今而後悔其始是非容貌之患也聞見之不眾而論議之卑爾然則從者將孰可也人有三不祥幼而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也人有三必窮為上則不能愛下為下則好非其上是人之一必窮也鄉則不若偝則謾之是人之二必窮也智行淺薄曲直有以相縣矣然而仁人不能推知士不能明是人之三必窮也人有此數行者以為上則必危為下則必滅詩曰雨雪瀌瀌宴然聿消莫肯下隧式居屢驕, WYG: ''}
