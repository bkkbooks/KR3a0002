  - {type: variant, offset: 7, length: 1, content: 古, WYG: 人皆願矣凡聽論聽政也威嚴猛厲而不好假道人厲剛烈也假道謂以寛和假借道引人也則下畏恐而不親周閉而不竭隱閉其情不竭盡也若是則大事殆乎弛小事殆乎遂弛廢也遂因循也春秋傳曰遂繼事也下既隱情不敢論説則大事近於弛廢小事近於因循言不肯革弊也和解調通好假道人而無所凝止}
