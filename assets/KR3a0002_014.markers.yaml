  - {type: variant, offset: 135, length: 0, content: '', WYG: 廉制盡筋骨之力以要鐘鼓俯㑹之節而靡有悖逆者衆積䜄䜄乎吾觀於鄉而知王道之易易也主人親速賔及介而衆賔皆從之至于門外主人拜賔及介而衆賔皆入貴賤之義别矣三揖至于階三讓以賔升拜至獻酬辭讓之節繁及介省矣至于衆賔升受坐祭立飲不酢而隆殺之義辨矣工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂偹遂出二人揚觶乃立司正焉知其能和樂而不流也賔酬主人主人酬介介酬衆賔少長以齒終於沃者焉知其能弟長而無遺也降說屨升坐脩爵無數飲酒之節朝不廢朝莫不廢夕賔出主人拜送節文終遂焉知其能安燕而不亂也貴賤}
  - {type: page-break, offset: 135, content: '', id: KR3a0002_WYG_014-5a, image: WYG0695/WYG0695-0247c.png}
