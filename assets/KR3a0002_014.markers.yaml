  - {type: 'tls:seg', offset: 137, content: '', id: KR3a0002_tls_014-1a.37}
  - {type: variant, offset: 137, length: 0, content: '', WYG: 明滯於一隅如有物壅蔽之也凡人之患蔽於一曲而闇於大理一曲一端之曲説是時各蔽於異端曲説故作此篇以觧之治則復經兩疑則惑矣言治世用禮義則自復經常之正道兩疑謂不知一於正道而疑蔽者為是一本作兩則疑惑矣天下無二道聖人無兩心今諸侯異政百家異説則必或是或非或理或亂亂國之君亂家之人此其誠心莫不求正而以自為也妬繆於道而人誘其所迨也迨近也近謂所好也言亂君亂人本亦求理以其嫉妬迷繆於道故人因其所好而誘之謂若好險則墨氏誘之好辯則惠氏誘之也私其所積唯恐聞其惡也積習倚其所私以觀異術唯恐聞其羙也倚任也或曰偏倚也猶傍觀也言妬於異術也是以與治雖走而是已不輟也走並馳治謂正道也既私其所習妬繆於道雖與治並馳而自是不輟雖或作離豈不蔽於一曲而失正求也哉心不使焉則白黒在前而目不見雷鼔在側而耳不聞况於使者乎雷鼔大鼓聲如雷者使役也以論不役心於正道則自無聞見矣况乎役心於異術豈復更聞正求哉德道之人有賢德也亂國之君非之上亂家之人非之下豈不哀哉上下共非故可哀也數為蔽數為蔽之端也欲為蔽惡為蔽始為蔽終為蔽逺為蔽近為蔽博為蔽淺為蔽古為蔽今為蔽此其所知所好滯於一隅故皆為蔽凡萬物異則莫不相為蔽此心術之公患也公共也所好異則相為蔽昔人君之蔽者夏桀殷紂是也桀蔽於末喜斯觀而不知關龍逄以惑其心而亂其行末喜桀妃斯觀未聞韓侍郎云斯或當為斟斟觀夏同姓國喜其君當時為桀佞臣也國語史蘇曰昔夏桀伐有施有施人以末喜女焉賈侍中云有施喜姓國也紂蔽於妲己飛廉而不知微子啓以惑其心而亂其行妲己紂妃飛廉紂之佞臣惡來之父善走者秦之祖也微子紂之庶兄微國子爵啓其名也國語曰殷紂伐有蘇有蘇以妲己女焉賈侍中云有蘇紀姓之國也故羣臣去忠而事私百姓怨非而不用事任也不用不為上用也非或為誹賢良退處而隱逃此其所以䘮九牧之地而虛宗廟之國也九牧九州之牧虛讀為墟桀死於亭山亭山南巢之山或本作鬲山案漢書地理志廬江有􅈞縣當是誤以􅈞為鬲傳冩又誤為亭􅈞音潜紂縣於赤斾史記武王斬紂頭縣於太白旗此云赤斾所傳聞異也身不先知又莫之諌此蔽塞之禍也成湯鑒於夏桀故主其心而愼治之主其心言不為邪佞所惑是以能長用伊尹而身不失道此其所以代夏王而受九有也文王鑒於殷紂故主其心而慎治之是以能長用呂望而身不失道此其所以代殷王而受九牧也九有九牧皆九州也撫有其地則謂之九有養其民則謂之九牧逺}
