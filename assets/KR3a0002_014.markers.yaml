  - {type: variant, offset: 5, length: 2, content: 四衡, WYG: 夫樂者樂也人情之所必不免也故人不能無樂樂則必發於聲音形於動静而人之道聲音動静性術之變盡是矣故人不能不樂樂則不能無形形而不為道則不能無亂先王惡其亂也故制雅頌之聲以道之使其聲足以樂而不流使其文足以辨而不諰使其曲直繁省廉肉節奏足以感動人之善心使夫邪汙之氣無由得接焉是先王立樂之方也而墨子非之奈何故樂在宗廟之中君臣上下同聼之則莫不和敬閨門之内父子兄弟同}
