  - {type: variant, offset: 106, length: 11, content: 言姦說姦事姦謀姦譽姦愬, WYG: 聲感人而逆氣應之逆氣成象而亂生焉正聲感人而順氣應之順氣成象而治生焉唱和有應善惡相象故君子愼其所去就也君子以鐘鼔導志以琴瑟樂心動其干戚飾以羽旄從以磬管故其清明象天其廣大象地其俯仰周旋有似於四時故樂行而志清禮脩而行成耳目聰明血氣和平移風易俗天下皆寧莫善於樂故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂故樂者所以導樂也金石絲竹者所以導樂也樂行而民嚮方矣故樂者治人之盛者也而墨子非之且樂也者和之不可變者也禮也者理之不可易者也樂合同禮别異禮樂之統管乎人心矣窮本極變樂之情也著誠去偽禮之經也墨子非之㡬遇刑也明王已沒}
