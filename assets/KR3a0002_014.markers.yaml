  - {type: variant, offset: 105, length: 74, content: 姦言姦說姦事姦謀姦譽姦愬莫之試也忠言忠說忠事忠謀忠譽忠愬莫不明通方起以尚盡矣夫是之謂衡聽顯幽重明退姦進良之術川淵深而魚鱉歸之山林茂而禽獸歸之刑政平而, SBCK: ''}
  - {type: variant, offset: 105, length: 0, content: '', WYG: 百姓不安其處不樂其鄉不足其上矣故禮樂廢而邪音起者危削侮辱之本也故先王貴禮樂而賤邪音其在序官也曰脩憲命審誅賞禁淫聲以時順脩使夷俗邪音不敢亂雅太師之事也墨子曰樂者聖王之所非也而儒者為之過也君子以為不然樂者聖人之所樂也而可以善民心其感人深其移風易俗故先王導之以禮樂而民和睦夫民有好惡之情而無喜怒之應則亂先王惡其亂也故脩其行正其樂而天下順焉故齊衰之服哭泣之聲使人之心悲帯甲嬰胄歌於行伍使人之心傷姚冶之容鄭衛之音使人之心淫紳端章甫舞韶歌武使人之心莊故君子耳不聽淫聲目不視女色口不出惡言此三者君子愼之凡}
