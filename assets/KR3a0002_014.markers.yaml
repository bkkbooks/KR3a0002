  - {type: variant, offset: 136, length: 0, content: '', WYG: 隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者足以正身安國矣彼國安而天下安故曰吾觀於鄉而知王道之易易也亂世之徴其服組其容婦其俗滛其志利其行雜其聲樂險其文章匿而采其養生無度其送死瘠墨賤禮義而貴勇力貧則為盗富則為賊治世反是也荀子卷十四欽定四庫全書荀子卷十五唐楊倞註解蔽篇第二十一蔽者言不能}
