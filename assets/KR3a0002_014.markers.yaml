  - {type: variant, offset: 523, length: 199, content: 臨事接民而以義變應寬裕而多容恭敬以先之政之始也然後中和察斷以輔之政之隆也然後進退誅賞之政之終也故一年與之始三年與之終用其終為始則政令不行而上下怨疾亂所以自作也書曰義刑義殺勿庸以即汝惟曰未有順事言先教也程者物之準也禮者節之準也程以立數禮以定倫德以敘位能以授官凡節奏欲陵而生民欲寬節奏陵而文生民寬而安上文下安功名之極也不可以加矣君者國之隆也父者家之隆也隆一而治二而亂自古及今未有二隆爭重而能長久者師術有, SBCK: 荀子卷第十}
