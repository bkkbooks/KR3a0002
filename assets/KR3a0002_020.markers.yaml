  - {type: variant, offset: 819, length: 257, content: 歌武使人之心莊故君子耳不聽淫聲目不視女色口不出惡言此三者君子慎之凡姦聲感人而逆氣應之逆氣成象而亂生焉正聲感人而順氣應之順氣成象而治生焉唱和有應善惡相象故君子慎其所去就也君子以鍾鼓導志以琴瑟樂心動以干戚飾以羽毛從以磬管故其清明象天其廣大象地其俯仰周旋有似於四時故樂行而志清禮脩而行成耳目聰明血氣和平移風易俗天下皆寧美善相樂故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂故樂者所以道樂也金石絲竹所以道德也樂行而民鄉方矣故樂者治人之盛者也而墨子非之且樂也者和之不可變者也禮也者理之不可易者也樂合, SBCK: ''}
