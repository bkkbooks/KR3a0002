  - {type: variant, offset: 394, length: 0, content: '', SBCK: 亦大儒以人之性善孫卿後孟子百餘年孫卿以爲人性惡故作性惡一篇以非孟子蘇秦張儀以邪道􅀃諸侯以大貴顯孫卿退而笑之曰夫不以其道進者必不以其道亡至漢興江都相董仲舒亦大儒作書美孫卿孫卿卒不用於世老於蘭陵疾濁世之政亡國亂君相屬不遂大道而營乎巫祝信禨祥鄙儒小拘如莊周等又滑稽於是推儒墨道德之行事興壞序列著數萬言而卒葬蘭陵而趙亦有公孫龍爲堅白同異之辨處子之言魏有李悝盡地力之敎楚有尸子長廬子芊子皆著書然非}
