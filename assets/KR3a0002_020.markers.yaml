  - {type: variant, offset: 448, length: 266, content: 道也猶瞽之於白黑也猶聾之於清濁也猶欲之楚而北求之也夫聲樂之入人也深其化人也速故先王謹為之文樂中平則民和而不流樂肅莊則民齊而不亂民和齊則兵勁城固敵國不敢嬰也如是則百姓莫不安其處樂其鄉以至足其上矣然後名聲於是白光暉於是大四海之民莫不願得以為師是王者之始也樂姚冶以險則民流慢鄙賤矣流慢則亂鄙賤則爭亂爭則兵弱城犯敵國危之如是則百姓不安其處不樂其鄉不足其上矣故禮樂廢而邪音起者危削侮辱之本也故先王貴禮樂而賤邪音其在序官也曰脩憲命審誅賞禁淫聲以時順脩使夷俗邪音不敢亂雅大師之事也墨子曰樂者聖王之所非也而儒者為之過矣君子以為不然樂者聖人之所樂也而, SBCK: 記傳}
