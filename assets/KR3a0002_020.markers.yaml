  - {type: variant, offset: 1077, length: 543, content: 禮別異禮樂之統管乎人心矣窮本極變樂之情也著誠去偽禮之經也墨子非之幾遇刑也明王以沒莫之正也愚者學之危其身也君子明樂乃其德也亂世惡善不此聽也於乎哀哉不得成也弟子勉學無所營也聲樂之象鼓天麗鍾統實磬廉制竽笙肅和筦籥發猛塤篪翁博瑟易良琴婦好歌清盡舞意天道兼鼓其樂之君邪故鼓似天鍾似地磬似水竽笙簫和筦籥似星辰日月鞉柷拊鞷椌楬似萬物曷以知舞之意曰目不自見耳不自聞也然而治俯仰詘信進退遲速莫不廉制盡筋骨之力以要鍾鼓俯會之節而靡有悖逆者眾積意謘謘乎孔子曰吾觀於鄉而知王道之易易也主人親速賓及介而眾賓皆從之至于門外主人拜賓及介而眾賓皆入貴賤之義別矣三揖至于階三讓以賓升拜至獻酬辭讓之節繁及其介省矣至于眾賓升受坐祭立飲不酢而降隆殺之義辨矣工入升歌三終主人獻之笙入三終主人獻之閒歌三終合樂三終工告樂備遂出二人揚觶乃立司正焉知其能和樂而不流也賓酬主人主人酬介介酬眾賓少長以齒終於沃洗者焉知其能弟長而無遺也降脫屨升坐脩爵無數飲酒之節朝不廢朝暮不廢夕賓出主人拜送節文終遂焉知其能安燕而不亂也貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者是足以正身安國矣彼國安而天下安故曰吾觀於鄉而知王道之易易也亂世之徵其服組其容婦其俗淫其志利其行雜其聲樂險其文章匿而采其養生無度其送死瘠墨賤禮義而貴勇力貧則為盜富則為賊治世反是也, SBCK: 校臣吕夏卿重校}
