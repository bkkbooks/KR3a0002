  - {type: variant, offset: 384, length: 0, content: '', SBCK: 法也孫卿善爲詩禮易春秋至齊襄王時孫卿最爲老師齊尚脩列大夫之缺而孫卿三爲祭酒焉齊人或䜛孫卿乃適楚楚相春申君以爲蘭陵令人或謂春申曰湯以七十里文王以百里孫卿賢者也今與之百里地楚其危乎春申君謝之孫卿去之趙後客或謂春申君曰伊尹去夏入殷殷王而夏亡管仲去魯入齊魯弱而齊強故賢者}
