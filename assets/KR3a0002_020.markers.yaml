markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 荀子卷第二十登仕郎守大理評事揚倞注宥坐篇第二十八記傳雜事故緫推之於末此以下皆荀卿及弟子所引孔子觀於魯􅁊公之廟有欹器焉公三年春秋哀復立也或曰三􅁊之祖廟欹器傾欹易覆之器􅁊宫僖宫災公羊傳曰此皆毀宗廟也其言災何孔子問於守廟者曰此為何器守廟者曰此蓋為宥坐之器也說苑作坐右或曰宥與侑同勸也文宥與右同言人君可置於坐右以為戒器名侑巵注云欹器也子曰三皇五帝有勸戒之孔子曰吾聞宥坐之器者虚則欹中則正滿則覆孔子顧謂弟子曰注水焉弟子挹水而注之酌挹中而正滿而覆虚而欹孔子喟然而歎曰吁惡有滿而不覆者哉子路曰敢問持滿有道乎孔子曰聦明聖知守之以愚功􅀍天下守之以譲勇力撫世守之以怯言蓋世矣撫掩也猶富有四海守之以謙此所謂挹而損之之道也亦挹猶言損之又損退也挹而損之孔子為魯攝相朝七日而誅少正卯冦而為司謂聽朝也攝相也朝門人進問曰夫少正卯魯之聞人也夫子為政而始誅之得無失乎名為人所聞人謂有誅先誅之也聞知者也始孔子曰居吾語汝其故人有惡者五而盜竊不與焉一曰心達而險二曰行辟而堅三曰言偽而辨四曰記醜而博五曰順非而澤讀曰僻醜謂怪異之事澤有􅃳澤也心達而險謂心通達於事而凶險也辟此五者有一於人則不得免於君子之誅而少正夘兼有之故居處足以聚徒成羣言談足以飾邪營衆強足以反是獨立此小人之桀雄也不可不誅也也強剛愎也反是以營讀為熒熒衆惑衆人不能傾之也非為是也獨立是以湯誅尹諧文王誅潘止周公誅管叔太公誅華仕管仲誅付里乙子産誅鄧析史付狂矞華仕昆弟二人立議曰吾不臣韓子曰太公封於齊東海上有居士名無君之禄不仕而事力太公使執而殺之以為首誅周天子不友諸侯耕而食之掘而飲之吾無求於人無上之也太公曰是昆弟立議曰不臣天子是望不得而臣也不公從魯聞急傳而問之曰二子賢者也今日饗國殺之何是望不得以賞罰勸禁也且夫王之所以使其臣者非爵禄友諸侯是望不得而使也耕而食之掘而飲之無求於人者以誅也尹諧潘止付里乙史付事迹並未聞也則刑罰也今四者不足以使之則望誰為君乎是此七子者皆異世同心不可不誅也詩曰憂心悄悄愠于羣小小人成羣斯足憂矣風柏詩鄁憂貌愠怒也舟之篇悄悄孔子為魯司寇有父子訟者孔子拘之三月不别辨其子之罪别猶決也謂不其父請止孔子舍之季孫聞之不説曰是老也欺予稱春秋傳曰老大夫之尊為寡君老也使圉將不得語予曰為國家必以孝今殺一人以戮不孝又舍之冉子以告孔子慨然歎曰嗚呼上失之下殺之其可乎不教其民而聽其訟殺不辜也三軍大敗不可斬也獄犴不治不可刑也罪不在民故也犴獄犬象所以守者犴胡地野犬亦善守獄故獄謂之犴也不治謂法令不當也犴亦獄也詩曰冝犴宜獄獄字從二嫚令謹誅賊也也賊賊害人也嫚與慢同謹嚴今有時斂也無時暴也歛無時是緩暴也言生物有時而賦不敎而責成功虐也已此三者然後刑可即也即就巳止書曰義刑義殺勿庸以即予維曰未有順事言先教也之心不使任其喜怒也維刑殺皆以義猶自謂未有書康誥言周公命康叔使以義刑義殺勿用以就汝犯者自責其教之不至也使人可順守之事故有抵故先王既陳之以道上先服之行之然後教之服行也謂先自若不可尚賢以綦之若不可廢不能以單之也盡謂黜削單或為殫綦極也謂優寵也單盡綦三年而百姓往矣不過三年也百姓從化極邪民不從然後俟之以刑則民知罪矣誅其姦邪也百姓既往然後詩曰尹氏大師維周之氐秉國之均四方是維天子是庳卑民不迷庳讀為毗輔也卑讀為俾詩小雅節南山之篇氐本也是以威厲而不試刑錯而不用此之謂也也試厲抗錯置也如置物於地不動也亦用也但抗其威而不用也今之世則不然亂其教繁其刑其民迷惑而墮焉則從而制之是以刑彌繁而邪不勝三尺之岸而虚車不能登也百仞之山任負車登焉何則陵遲故也遲言丘陵之勢漸慢也王肅云陵遲陂阤也岸崖也負重也任負車任重之車也遲慢也陵數仞之牆而民不踰也百仞之山而竪子馮而游焉陵遲故也今夫世之陵遲亦久矣而能使民勿踰乎詩曰周道如砥其直如矢君子所履小人所視眷焉顧之潸焉出涕豈不哀哉之道所以陵遲哀其法度墮壊詩小雅大東之篇言失其砥矢詩曰瞻彼日月悠悠我思道之云逺曷云能來鄁詩之篇風雄雉子曰伊稽首不其有來乎至有所不來稽首恭敬之使下人稽首歸向雖道逺能無來乎者爲其上失其道而人散也若施德化孔子觀於東流之水子貢問於孔子曰君子之所以見大水必觀焉者是何孔子曰夫水大徧與諸生而無為也似德水能徧生萬徧與諸生謂德者說苑作遍予而無私者物為其不有其功似上德不其流也埤下裾拘必循其理似義也其流必就卑下或方或曲必循卑下埤讀為卑裾與倨同方也拘讀為鉤曲流也卑下句倨之也情義分然者也之理似義者無不循理也說苑作其其洸洸乎不淈盡似道之無窮也家語作浩浩無屈盡之期似道也洸讀為滉滉水至之貌淈讀為屈竭也似道若有決行之其應佚若聲響其赴百仞之谷不懼似勇響言若響之應聲也似勇者果於赴難也決行決之使行也佚與逸同奔逸也若聲主量必平似法經阬坎注必平之然後過似有法度主讀為注量謂坑受水之處也言所平也者均盈不求槩似正槩而不稅言水盈滿則不待槩平斗斛之木也考工記曰假於刑法之禁也槩而自平如正者不淖約微達似察也綽約柔弱也淖當為綽約弱者之見細微也說苑作綽弱微達雖至柔弱而浸淫微通達於物似察以出以入以就鮮絜似善化之使人去惡就美也說苑作不清以入言萬物出入於水則必鮮絜似善化者出也鮮絜以其萬拆也必東似志北千萬縈折不常然折縈曲也雖東西南奪者說苑作其折必東也而必歸於東似有志不可是故君子見大水必觀焉孔子曰吾有恥也吾有鄙也吾有殆也幼不能強學老無以教之吾恥之教人也無才藝以去其故郷事君而達卒遇故人曾無舊言吾鄙之言卒倉忽反舊言平生之與小人處者吾殆之也孔子曰如垤而進吾與之如丘而止吾已矣今學曾未如肬贅則具然欲為人師也莊子曰肬贅結肉尤具然自滿足之貌也以生為負贅懸肬肬音孔子南適楚厄於陳蔡之閒七日不火食藜羮不糂蘇覽反糂與糝同弟子皆有飢色子路進問之曰由聞之爲善者天報之以福爲不善者天報之以禍今夫子累德積義懐美行之日久矣奚居之隱也窮約隱謂孔子曰由不識吾語汝汝以知者爲必用邪王子比干不見剖心乎女以忠者爲必用邪關龍逄不見刑乎女以諫者爲必用邪吳子胥不磔姑蘇東門外乎裂也磔車都名姑蘇吳夫遇不遇者時也賢不肖者材也君子博學深謀不遇時者多矣由是觀之不遇世者衆矣何獨丘也哉且夫芷蘭生於深林非以無人而不芳君子之學非為通也求通不為為窮而不困憂而意不衰也知禍福終始而心不惑也天知命皆為樂夫賢不肖者材也為不為者人也善在人也為善不為遇不遇者時也死生者命也今有其人不遇其時雖賢其能行乎苟遇其時何難之有故君子博學深謀修身端行以俟其時孔子曰由居吾語汝昔晉公子重耳霸心生於曹亡過曹曹恭公重耳晉文公名之公因此激怒而霸心生也聞其駢脅使其祼浴薄而觀越王勾踐霸心生於會稽棲於會稽也謂以甲盾五千齊􅁊公小白霸心生於莒奔莒蓋亦為所不禮小白齊􅁊公名齊亂故居不隱者思不逺身不佚者志不廣也家語作常逸者佚與逸同謂奔竄女庸安知吾不得之桑落之下乎哉時蓋暴露居此樹之下桑落九月時也夫子當子貢觀於魯廟之北堂出而問於孔子曰鄉者賜觀於太廟之北堂吾亦未輟還復瞻被九蓋皆繼被有說邪匠過絶邪在也輟止也北堂神主所材木斷絶相接繼也子貢問北盍皆繼續彼有說邪匠過九當為北傳寫誤耳被皆當為彼蓋音盍户扇也皆繼謂其王肅云觀北面之蓋皆斷絶也誤而遂絶之也家語作北蓋皆斷孔子曰太廟之堂亦常有說今則無也言舊曾說官致良工因麗節文極致木之美麗節文而裁制之所以斷絶家語作官致良工之也官致良工謂初造太廟之時官極其良工工則因隨其功巧蓋貴文也匠匠致良材盡其非無良材也蓋曰貴文也無非文飾也此蓋明夫子之博識也良材大木不斷絶者蓋所以貴子道篇第二十九入孝出弟人之小行也自卑如弟也弟與悌同謂上順下篤人之中行也下篤愛於卑㓜上順從於君父從道不從君從義不從父人之大行也若夫志以禮安言以類使則儒道畢矣類不怪說也如此則儒者之志安於禮不妄動也言發以矣道畢雖舜不能加毫末於是也孝子所以不從命有三從命則親危不從命則親安不從命乃衷發於衷心矣衷善也謂善從命則親辱不從命則親榮孝子不從命乃義從命則禽獸不從命則脩飾孝子不從命乃敬身於禽獸從命則陷飾君子不從命是乃敬親之行不從命則使親為脩故可以從而不從是不子也未可以從而從是不衷也明於從不從之義而能致恭敬忠信端慤以愼行之則可謂大孝矣傳曰從道不從君從義不從父此之謂也故勞苦彫萃而能無失其敬彫顇不敢解惰失敬也彫傷也萃與顇同雖勞苦災禍患難而能無失其義則不幸不順見惡而能無失其愛親而見惡也不幸以不順於非仁人莫能行詩曰孝子不匱此之謂也魯哀公問於孔子曰子從父命孝乎臣從君命貞乎三問孔子不對違哀不敢故不對公之意孔子趨出以語子貢曰郷者君問丘也曰子從父命孝乎臣從君命貞乎三問而丘不對賜以為何如子貢曰子從父命孝矣臣從君命貞矣夫子有奚對焉孔子曰小人哉賜不識也昔萬乘之國有爭臣四人則封疆不削千乗之國有爭臣三人則社稷不危百乘之家有爭臣二人則宗廟不毁父有爭子不行無禮士有爭友不為不義故子從父奚子孝臣從君奚臣貞審其所以從之之謂孝之謂貞也則從不可審其可從從也從則不子路問於孔子曰有人於此夙興夜寐耕耘樹藝手足胼胝以養其親然而無孝之名何也駢併也胝皮厚也胝丁私反樹栽植藝播種駢謂手足勞孔子曰意者身不敬與辭不遜與色不順與古之人有言曰衣與繆與不女聊讀爲歟聊頼繆紕繆也與也言雖衣服我綢繆我而不敬不順則不頼汝也韓詩外也言雖與之衣而紕繆不精則不聊頼於汝也或曰繆綢曰人與已事實通不相欺也皆與此不同也傳作衣子教子家語云人與已不順欺也王肅今夙興夜寐耕耘樹藝手足胼胝以養其親無此三者則何以爲而無孝之名也孔子曰由志之吾語汝雖有國士之力不能自舉其身非無力也勢不可也勇力之士國士一國故入而行不脩身之罪也出而名不章友之過也故君子入則篤行出則友賢何為而無孝之名也子路問於孔子曰魯大夫練而牀禮邪孔子曰吾不知也垔室寢有席又期而大祥居復練小祥也禮記曰期而小祥居禫而牀也寢中月而禫子路出謂子貢曰吾以夫子為無所不知夫子徒有所不知子貢曰女何問哉子路曰由問魯大夫練而牀禮邪夫子曰吾不知也子貢曰吾將為汝問之子貢問曰練而牀禮邪孔子曰非禮也子貢出謂子路曰女謂夫子為有所不知乎夫子徒無所不知汝問非也禮居是邑不非其大夫訕上懼於子路盛服見孔子孔子曰由是裾裾何也說苑作襜襜也裾裾衣服盛貌昔者江出於㟭山其始出也其源可以濫觴及其至江之津也不放舟不避風則不可涉也方舟投柎韋昭曰放讀為方國語曰舟方柎也詩曰方之舟之方並也編木為柎說苑作方非唯下流水多邪與唯盛色厲亦然也說苑作非下衆水之多乎維同言豈不以下流水多故人畏之邪言服今汝衣服既盛顔色充盈天下且孰肯諌汝矣猛厲充盈由名丁寍之也告之畢又呼其子路趨而出改服而入蓋猶若也曰君子蓋猶猶爾也猶若舒和之貌禮記孔子曰志之吾語女奮於言者華奮於行者伐色知而有能者小人也色有能自有其能皆矜伐之意奮振矜也色知謂所知見於顔故君子知之曰知之不知曰不知言之要也能之曰能之不能曰不能行之至也隠其情皆在不言要則知行至則仁既知且仁夫惡有不足矣哉子路入子曰由知者若何仁者若何子路對曰知者使人知己仁者使人愛己子曰可謂士矣立之稱士者脩子貢入子曰賜知者若何仁者若何子貢對曰知者知人仁者愛人子曰可謂士君子矣顔淵入子曰回知者若何仁者若何讀為智知者皆顔淵對曰知者自知仁者自愛子曰可謂明君子矣子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意治之意樂其為既巳得之又樂其治是以有終身之樂無一日之憂小人者其未得也則憂不得既巳得之又恐失之是以有終身之憂無一日之樂也法行篇第三十之謂之行行下孟反禮義謂之法所以行公輸不能加於繩聖人莫能加於禮巧人名公輸魯外亦不能加也班雖至巧繩墨之禮者衆人法而不知聖人法而知之法而不知其義者也衆人皆知禮可以為曾子曰無内人之䟽而外人之親為内以親為外家語曰不比於親而比無禁辭也内人之䟽外人之親謂以踈傳作無内踈而無外親也於踈者不亦逺乎韓詩外無身不善而怨人無刑已至而呼天内人之踈而外人之親不亦逺乎逺矣謂失之身不善而怨人不以反乎乖悖反謂刑已至而呼天不亦晩乎詩曰㳙㳙源水不雝不塞轂已破碎乃大其輻事已敗矣乃重大息其云益乎大其輻謂壯大其輻也重太源水水之泉源也雝讀為壅不愼其初追悔無及也息嗟嘆之甚也三者皆言曾子病曾元持足曾子曰元志之吾語汝之子也曾元曾子夫魚鼈黿鼉猶以淵為淺而堀其中窟同堀與鷹鳶猶以山為卑而增巢其上及其得也必以餌故君子苟能無以利害義則恥辱亦無由至矣子貢問於孔子曰君子之所以貴玉而賤珉者何也似玉者珉石之為夫玉之少而珉之多邪孔子曰惡賜是何言也烏謂此義也惡音烏猶言夫君子豈多而賤之少而貴之哉夫玉者君子比德焉温􅃳而澤仁也柔温􅃳似仁鄭康成云色栗而理知也似智者處事堅固又有文理鄭云栗堅貌也理有文理也堅剛而不屈義也直不回也以義者剛廉而不劌行也而不傷物似有德劌傷也雖有廉稜傷害人行者不折而不橈勇也撓屈似勇者雖摧折而不瑕適並見情也不匿其情者也禮記曰瑕不掩瑜瑜不掩瑕忠也瑕玉之病也適玉之美澤調適之處也瑕適並見似扣之其聲清揚而逺聞其止輟然辭也同似有扣與叩禮記作叩之其聲清越以長其終屈然樂也辭辨言發言則人樂聽之言畢更無繁辭也故雖有珉之雕雕不若玉之章章也章素質明箸也雕雕謂雕飾文采詩曰言念君子温其如玉此之謂也戎之篇引詩秦風小子比德之喻君曾子曰同遊而不見愛者吾必不仁也使人愛已仁者必能交而不見敬者吾必不長也長不人所輕厚故為臨財而不見信者吾必不信也不聞廉㓗人於三者在身曷怨人諸已當反怨人者窮怨天者無識天命也不識知失之已而反諸人豈不亦迂哉南郭惠子問於子貢曰夫子之門何其雜也有南郭子綦夫子弟子也雜謂賢不肖相雜而至南郭惠子未詳其姓名蓋居南郭因以為號莊子子貢曰君子正身以俟欲來者不距欲去者不止且夫良醫之門多病人隱栝之側多枉木是以雜也孔子曰君子有三恕有君不能事有臣而求其使非恕也有親不能報有子而求其孝非恕也曰欲報之徳報孝養也詩有兄不能敬有弟而求其聽令非恕也士明於此三恕則可以端身矣孔子曰君子有三思而不可不思也少而不學長無能也老而不教死無思也思其徳無門人有而不施窮無與也無所往託窮乏之時是故君子少思長則學老思死則教有思窮則施也哀公篇第三十一魯哀公問於孔子曰吾欲論吾國之士與之治國敢問何如之邪孔子對曰生今之菅屨杖而啜粥者志不在於酒肉曰斬者何儀禮䘮服衰下曰裳當心前有衰後有負板左右有辟領孝子哀戚不緝也衰長六寸博四寸三升布為之鄭注䘮服云上曰被於外亦所以制其心也無不在也菅菲也此言服生今之世志古之道居今之俗服古之服舍此而為非者雖有不亦鮮乎哀公曰善孔子曰人有五儀愚觀其儀言人之賢五也法有有庸人有士有君子有賢人有大聖哀公曰敢問何如斯可謂庸人矣孔子對曰所謂庸人者口不能道善言心不知色色其好惡也論語云色斯舉矣色色謂以已色觀彼之色知不知選賢人善士託其身焉以為已憂自憂而已不知託賢但勤行不知所務止交不知所定能辨是非倀倀失據也交謂接待於物皆言不日選擇於物不知所貴貴重者不知可從物如流不知所歸蕩而不返也為外物所誘五鑿為正心從而壞如此則可謂庸人矣竅也言五鑿雖似於正而其心已鑿竅也五鑿謂耳目鼻口及心之子曰六鑿相攘司馬彪曰六情相攘奪韓詩外傳作五藏從外物所誘而壊矣是庸愚之人也一曰五鑿五情也莊也為正哀公曰善敢問何如斯可謂士矣孔子對曰所謂士者雖不能盡道術必有率也雖不能徧美善必有處也處其一隅言有所執守也率循也雖不能盡徧必循是故知不務多務審其所知之能行唯恐有聞論語曰子路有聞未言不務多務審其所謂事而巳矣止於辨明行不務多務審其所由從不正之道由從也謂不故知既巳知之矣言既巳謂之矣行既巳由之矣則若性命肌膚之不可易也膚之不可以他物移易者也言固守所見如愛其性命肌故富貴不足以益也卑賤不足以損也不可奪皆謂志如此則可謂士矣言其善於任事可以入官也士者脩立之稱一曰士事也哀公曰善敢問何如斯可謂之君子矣孔子對曰所謂君子者言忠信而心不德為有德不自以仁義在身而色不伐思慮明通而辭不爭故猶然如將可及者君子也之在前忽然在後家語猶然舒遲之貌所謂瞻云不進貌也作油然王肅哀公曰善敢問何如斯可謂賢人矣孔子對曰所謂賢人者行中規繩而不傷於本言足法於天下而不傷於身身也本亦滿天下無口過行滿天下無怨惡言雖廣大而不傷其身也所謂言富有天下而無怨財而無藴蓄私財也家語作無宛禮記曰事大積焉而富有天下謂王者之佐也怨讀為藴言雖富有天下因誤為怨字耳不宛古藴苑通此布施天下而不病貧澤子惠困言廣施德所謂百姓與足君孰與不足窮使家給人足而上不憂貧乏如此則謂賢人矣者賢文云賢多才亞聖之名說哀公曰善敢問何如斯可謂大聖矣孔子對曰所謂大聖者知通乎大道應變而不窮辨乎萬物之情性者也物之情辨别萬也性大道者所以變化遂成萬物也情性者所以理然不取舍也非之取舍而不惑辨情性乃能理是是故其事大辨乎天地萬事如天地之别萬物各使區分其事謂聖人所理化之事言辨别明察乎日月察如日月聖人之明緫要萬物於風雨統領也緫要猶領萬物如風雨之生成也風以動之雨以􅃳之言統繆繆肫肫其事不可循之貌爾雅云訰訰亂也言聖人治萬物錯雜膠膠訰訰然繆當為膠相加之貌莊子云膠膠擾擾肫與訰同訰雜亂其事訰之旬反而衆人不能循若天之嗣其事不可識聖人如天嗣繼也言不能識其意之繼嗣衆人百姓淺然不識其隣淺見不能識隣近也百姓所謂日用而不知者也其所近況能識其深乎若此則可謂大聖矣哀公曰善魯哀公問舜冠於孔子孔子不對三問不對問其冠故不對也哀公不問舜德徒哀公曰寡人問舜冠於子何以不言也孔子對曰古之王者有務而拘領者矣其政好生而惡殺焉為冒務讀曰古之人衣上有冒而句領者鄭康成注云言在德不在拘與句同曲領也言雖冠衣拙朴而行仁政也尚書大傳也句領繞頸也禮正服方領也服也古之人三皇時也冒覆項是以鳳在列樹麟在郊野烏鵲之巢可俯而窺也君不此問而問舜冠所以不對也魯哀公問於孔子曰寡人生於深宫之中長於婦人之手寡人未嘗知哀也未嘗知憂也未嘗知勞也未嘗知懼也未嘗知危也孔子曰君之所問聖君之問也丘小人也何足以知之問故謙美大其對也不敢曰非吾子無所聞之也孔子曰君入廟門而右登自胙階仰視榱棟俛見几筵其器存其人亡君以此思哀將焉不至矣椽也哀將焉不至言必至也謂祭祀時也胙與阼同榱亦君昧爽而櫛冠爽明昧闇尚暗之時也謂初曉平明而聽朝一物不應亂之端也君以此思憂則憂將焉不至矣君平明而聽朝日􅉴而退諸侯之子孫必有在君之末庭者君以此思勞則勞將焉不至矣侯諸臣禮君若思其勞則勞可知也若喻哀公亦諸侯之子孫之子孫謂奔亡至魯而仕者自平明至日具在末庭而修有此奔亡之勞也不戒慎修德亦將君出魯之四門以望魯四郊亡國之虚則必有數蓋焉焉猶言蓋有數焉虚讀為墟有數蓋國之虚列必有數矣倒言之耳新序作亡君以此思懼則懼將焉不至矣且丘聞之君者舟也庶人者水也水則載舟水則覆舟君以此思危則危將焉不至矣魯哀公問於孔子曰紳委章甫有益於仁乎儀禮云委安也所以安正容貌章表明也殷質紳大帶也委委貌周之冠也章甫殷冠也鄭注明大夫也言所以表孔子蹴然曰君號然也譔云蹴然變莊子音義崔遂誤耳家語作君胡然也色貌號讀為胡聲相近字資衰苴杖者不聽樂非耳不能聞也服使然也謂蒼白色自死之竹也資與齎同苴杖竹也苴黼衣黻裳者不茹葷非口不能味也服使然也不茹葷非不能味謂非不能知味也鄭注周禮司服云黼衣黻裳祭服也白與黒為黼黑與青為黻禮祭致齊刺黻而已􅀇冕者衣裳且丘聞之好肆不守折長不為市竊其有益與其無益君其知之矣也言好喜此市井盗􅀼之事長者不為市而販者不為非家語王喜於市肆之人不使所守貨財折耗而長者亦不能為行則不守折人為長者行則亦不為市買之事竊宜為肅注云言市肆弗能為廉好肆則不折也人為市估之竊字屬下句也察察其有益與以魯哀公問於孔子曰請問取人之術也問取人孔子對曰無取健之人健羡無取詌不謹誠者或曰捷給鉗人之口者未詳家語作無取鉗王肅云謂妄對無取口啍諄同啍與多言或曰詩云誨爾諄諄口諄謂口教誨心無誠實者諄方言云齊魯凡相疾惡謂之諄憎諄之閠反王肅云啍閔也諄論健貪也詌亂也口啍誕也貪欲鉗忌之健羡之人多何若為可取也孔子曰無取拑者無取捷者無取口叡者人多悖亂讒嫉之人多妄誕說苑曰哀公問於孔子曰人者多誕而寡信後恐不驗也韓詩外傳云無取健無取佞拑者太給利不可盡用也捷者必兼人不可為法也口叡口讒誕也皆大同小異也無取口讒健驕也佞諂也故弓調而後求勁焉馬服而後求良焉士信慤而後求知能焉士不信慤而有多知能譬之其犲狼也不可以身尒也尒與邇同有讀為又語曰􅁊公用其賊文公用其盜信慤則仇讎可用不信慤則親戚可踈謂管仲寺人勃鞮也盜亦賊也以喻士故明主任計不信怒闇主信怒不任計任也信亦計勝怒則強怒勝計則亡定公問於顔淵曰東野子之善馭乎馭與御同東野氏也顔淵對曰善則善矣雖然其馬將失家語作馬將佚也失讀為逸奔也下同定公不恱入謂左右曰君子固讒人乎三日而校來謁曰東野畢之馬失馬之官也校人掌養兩驂列兩服入廐裂同謂外馬擘裂中馬牽引而入廐兩服馬在中兩驂兩服之外馬列與定公越席而起曰趨駕召顔淵顔淵至促速也趨讀為定公曰前日寡人問吾子吾子曰東野畢之馭善則善矣雖然其馬將失不識吾子何以知之顔淵對曰臣以政知之昔舜巧於使民而造父巧於使馬舜不窮其民造父不窮其馬是舜無失民造父無失馬也今東野畢之馭上車執轡銜體正矣步驟馳騁朝禮畢矣矣謂調習其馬或步驟馳騁盡朝廷銜體銜與馬體也步驟馳騁朝禮畢也之禮歷險致逺馬力盡矣然猶求馬不已是以知之也定公曰善可得少進乎少進其說定公更請顔淵對曰臣聞之鳥窮則啄獸窮則攫人窮則詐自古及今未有窮其下而能無危者也堯問篇第三十二堯問於舜曰我欲致天下為之柰何未歸故恐天下取之也欲致而對曰執一無失行微無怠忠信無勌而天下自來精專不怠而天下自歸不必致也執一專意也行微行細微之事也言執一如天地變易時也如天地無行微如日月見似於細微安徐日月之行人所不之時也然而怠止忠誠盛於内賁於外形於四海飾賁心廣體胖故君子必誠其意也也形見也禮記曰富􅃳屋德潤身天下其在一隅邪夫有何足致也道天下盡歸不在於一隅焉用致也夫物在一隅者則可舉而致之今有為又有讀魏武侯謀事而當羣臣莫能逮退朝而有喜色之後文侯之子也武侯晉大夫畢萬呉起進曰亦甞有以楚莊王之語聞於左右者乎武侯曰楚莊王之語何如呉起對曰楚莊王謀事而當羣臣莫逮退朝而有憂色申公巫臣進問曰王朝而有憂色何也邑大夫也巫臣楚申莊王曰不榖謀事而當羣臣莫能逮是以憂也其在中蘬之言也同湯左相也中蘬與仲虺曰諸侯自為得師者王得友者霸得疑者存自為謀而莫已若者亡或決疑惑者也疑謂博聞達識今以不榖之不肖而羣臣莫吾逮吾國幾於亡乎是以憂也楚莊王以憂而君以喜武侯逡廵再拜曰天使夫子振寡人之過也舉也振者伯禽將歸於魯子成王封伯禽周公謂初之國也為魯侯將歸周公謂伯禽之傅曰女將行盍志而子美德乎􅀓之子美徳以言我將行何不志記汝所對曰其為人寛好自用以愼務其用也愼謹宻也寛寛􅀪也自用好自此三者其美德已周公曰嗚呼以人惡為美德乎君子好以道德故其民歸道民歸道者衆非謂寛􅀪也君子好以道德教人故其彼其寛也出無辨矣女又美之但務寛容此乃出彼伯禽既無道德曰寛則得衆亦謂人愛恱歸之也於善惡無别汝何以為美也孔子彼其好自用也是所以窶小也禮驕人而器局小也書曰自用則小尚書窶無禮也彼伯禽好自用而不諮詢是乃無也以斂益之也大傳曰是其好自君子力如牛不與牛爭力走如馬不與馬爭走知如士不與士爭知謂士不爭言委任臣下掌事者彼爭者均者之氣也女又美之乃均敵者尚氣之事非人君之量者也好自用則必不委任而與之爭事爭事彼其慎也是其以淺也適所以自使知識淺近也彼伯禽之慎宻不廣接士聞之日無越踰不見士踰謂過一日也周公聞之古也越見士問曰無乃不察乎乃有不察之事乎懼其壅蔽故問無不聞即物少至少至則淺之事亦少少則意自淺矣聞或為問也物事也不見士則無所聞無所聞則所知彼淺者賤人之道也女又美之乎吾語女我文王之為子之子也為文王武王之為弟成王之為叔父先成周公云成王乃後人所加之耳王薨未宜知成王之謚此吾於天下不賤矣然而吾所執贄而見者十人禮見其所尊敬者雖君亦周公自執贄而見者十人公卿之中也三十人羣士之中百人羣夫之中也執贄故哀公執贄請見周豊鄭注尚書大傳云十人還贄而相見者三十人還之禮尚徃來也士相見禮曰主人禮臣見君則不還贄敵者不敢當則不廣無由得賢也得三人以明接士故上士吾薄為之貌下士吾厚為之貌執贄之禮懼失賢士之心故厚為之貌尤上士中誠重之故可薄為之貌下士既無敬也加謹人人皆以我為越踰好士然故士至不人以禮貌之故而至也知則以為越踰然士亦士至而後見物也物事見物然後知其是非之所在戒之哉女以魯國驕人幾矣驕士汝今以魯國之小而遂驕人危矣幾危也周公言我以天下之貴猶不敢夫仰禄之士猶可驕也亮反仰魚正身之士不可驕也彼正身之士舍貴而為賤舍富而為貧舍佚而為勞顔色黎黑而不失其所梨謂面黎讀為之色也如凍梨是以天下之紀不息文章不廢也守賴得綱紀文章常存也道之士不苟徇人故語曰繒丘之封人鄫故國封人繒與鄫同丘志繒縣屬東海也掌疆界者漢書地理見楚相孫叔敖曰吾聞之也處官久者士妬之禄厚者民怨之位尊者君恨之今相國有此三者而不得罪楚之士民何也孫叔敖曰吾三相楚而心瘉卑每益禄而施瘉博位滋尊而禮瘉恭是以不得罪於楚之士民也子貢問於孔子曰賜為人下而未知也為人下未知其益也下謙下也子貢問於孔子曰為人下者乎其猶土也深抇之而得甘泉焉故没反抇掘也樹之而五榖播焉草木殖焉禽獸育焉生則立焉死則入焉多其功而不息為人下者其猶土也昔虞不用宫之竒而晉并之萊不用子馬而齊并之之宫襄二年齊侯伐蔡蔡人使正輿子賂夙沙衛以索馬牛皆竒虞賢臣諫不從以其族行子馬未詳其姓名左氏傳曰師齊師大敗之遂滅萊或曰正輿子字子馬其不用未聞百匹又六年齊侯伐萊萊人使王湫帥師及正輿子軍齊用子猛而齊并之據年代齊滅萊在楚莊後未詳諸卿說苑諸卿已諫楚莊王曰曹不用僖負羈宋并之萊不諫也已之紂刳王子比干而武王得之不親賢用知而身死國亡也為說者曰孫卿不及孔子是不然孫卿迫於亂世鰌於嚴刑上無賢主下遇暴秦禮義不行教化不成仁者詘約天下􅄀􅄀行全刺之諸侯大傾當是時也知者不得慮能者不得治賢者不得使故君上蔽而無覩賢人距而不受然則孫卿將懐聖之心􅀩佯狂之色視天下以愚詩曰既明且哲以保其身此之謂也是其所以名聲不白徒與不衆光輝不博也今之學者得孫卿之遺言餘教足以為天下法式表儀所存者神所遇者化觀其善行孔子弗過世不詳察云非聖人柰何天下不治孫卿不遇時也德若堯禹世少知之方術不用為人所疑其知至明循道正行足以為綱紀嗚呼賢哉冝為帝王天地不知善桀紂殺賢良比干剖心孔子拘匡接輿辟世箕子佯狂田常為亂闔閭擅強為惡得福善者有殃今為說者又不察其實乃信其名時世不同譽何由生不得為政功安能成志修德厚孰謂不賢乎荀卿弟子之辭也自為說者已下或荀卿新書十二卷三十二篇勸學篇第一修身篇第二不苟篇第三榮辱篇第四非相篇第五非十二子篇第六仲尼篇第七成相篇第八儒效篇第九王制篇第十富國篇第十一王霸篇第十二君道篇第十三臣道篇第十四致仕篇第十五議兵篇第十六強國篇第十七天論篇第十八正論篇第十九}
