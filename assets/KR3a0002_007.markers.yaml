  - {type: variant, offset: 1133, length: 0, content: '', SBCK: 時晏是也佻與傜同緩也謂不迫促也巧任巧者之任不迫促則日而不趨三年臺成而民振欲上恱乎君游民足乎食彼佻子請發粟公不許當爲路寢之臺令史重其績逺其涂佻其同也亦與此縣鄙將輕田野之稅省刀布之斂罕舉力役無奪農時如是則農夫莫不朴力而寡能矣不務他能也但質朴而力作士大夫務節死制然而兵勁爲然後然而當百吏畏法循繩然後國常不亂商賈敦愨無詐則商旅安貨}
