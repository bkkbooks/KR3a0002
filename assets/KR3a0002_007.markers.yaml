  - {type: variant, offset: 1072, length: 4, content: 心功雖甚, SBCK: 如虺豕奚若新序作日欲司間而相與投藉之去遂之籍踐也一作投錯之司間伺其閒隟投擿也卒有宼難之事又望百姓之爲已死不可得也􅀃無以取之焉之中論􅀃也卒千忽反無以此事爲得孔子曰審吾所以適人適人之所以來我也此之謂也與人之道爲其復來報適人往與人也審慎其也我傷國者何也曰以小人尚民而威小人在上尚上也使威也位而作以非所取於民而巧賦之類也若兵甲田是傷國之}
  - {type: page-break, offset: 1072, content: '', id: KR3a0002_SBCK_007-23a}
  - {type: variant, offset: 1072, length: 4, content: 心功雖甚, WYG: 如虺豕也日欲司間而相與投籍之去逐之司間伺其間隙投擲也籍踐也一作投錯之卒有宼難之事又望百姓之為已死不可得也說無以取之焉論說之中無以此事為得也卒千忽反孔子曰審吾所以適人適人之所以來我也此之謂也適人往與人也審慎其與人之道為其復來報我也傷國者何也曰以小人尚民而威尚上也使小人在上位而作威也以非所取於民而巧若兵甲田賦之類也是傷國之}
