  - {type: variant, offset: 485, length: 0, content: '', SBCK: 其等位爵服足以容天下之賢士矣道賢士有道德者也此論百里國取天下之其官職事業足以容天下之能士矣才藝也能士者循其舊法擇其善者而明用之足以順服好利之人矣法而用之則民衣食足而好利之人順服也擇舊法之善者而明用之謂擇務本厚生之賢士一焉能士官焉好利之人服焉三者具}
  - {type: page-break, offset: 485, content: '', id: KR3a0002_SBCK_007-13a}
  - {type: variant, offset: 485, length: 0, content: '', WYG: 可以取天下是不虚其難者在人主之知之也所患人主不知小國可以取天下之道也取天下者非負其土地而從之之謂也非謂它國負荷其土地來而從我之謂也道足以一人而已矣其道足以齊一人故天下歸之也彼其人苟一則其土地且奚去我而適他彼國之人苟一於我則其土地奚往哉故百里之地其等位爵服足以容天下之賢士矣此論百里國取天下之道賢士有道徳者也其官職事業足以容天下之能士矣能士者材藝也循其舊法擇其善者而明用之足以順服好利之人矣擇舊法之善者而明用之謂擇務本厚生之法而用之則民衣食足而好利之民順服也賢士一焉能士官焉好利之人服焉三者具}
  - {type: page-break, offset: 485, content: '', id: KR3a0002_WYG_007-11a, image: WYG0695/WYG0695-0185c.png}
  - {type: variant, offset: 485, length: 0, content: '', krp: 其等位爵服足以容天下之賢士矣道賢士有道德者也此論百里國取天下之其官職事業足以容天下之能士矣才藝也能士者循其舊法擇其善者而明用之足以順服好利之人矣法而用之則民衣食足而好利之人順服也擇舊法之善者而明用之謂擇務本厚生之賢士一焉能士官焉好利之人服焉三者具}
  - {type: variant, offset: 488, length: 0, content: '', SBCK: 盡無􅚀是其外矣爲用也具謂俱故百里之地足以竭埶矣業是天下之人埶盡於此矣竭盡也有等位爵服官職事致忠信箸仁義足以竭人矣義足以盡天下之人謂皆來歸致極也箸明也言極忠信明仁也兩者合而天下取諸侯後同者先危者兩埶盡人也合謂能盡詩曰自西自東自南自北無思不服}
