  - {type: variant, offset: 464, length: 1, content: 成, SBCK: 内是緫方而議之也陜以西邵公主之一相處則天子共己而矣讀爲拱垂拱共讀爲恭或也而已出若入若天下莫不平均莫不治辨也出若若如此德使能官施之事或曰若順也入若謂内外皆如此也謂如論是百}
