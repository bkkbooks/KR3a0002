  - {type: variant, offset: 19, length: 0, content: '', SBCK: 志意加義乎法則度量箸之以政事案申重之以貴賤殺生使襲然終始猶一也賞罰使相掩襲無間隙終始如一也申亦重也既爲政皆以義又申重以如是則夫名聲之部發於天地之閒也豈不如日月雷霆然矣哉空言猶得不隱乎天下今若以顯諸部當爲剖謂開發也仲尼匹夫但箸日月雷霆也侯行義必如故曰以國齊義一日而白湯武是也一朝而名聲明白湯武是也齊當爲濟以一國皆取濟於義湯以亳武王以鄗皆百里之地也詩曰考卜維王宅是鎬京維􅀛正之亳湯國都鄗與鎬同武王所都京也成之武王天下爲一諸侯爲臣通達之屬莫不從服無它故焉以濟義矣是所謂義立而王也取濟於義也非有它故但德雖未至也義雖未濟也有徳義霸者亦極盡濟也但未能至然而天下之理略奏矣者略有節奏也天下之謂條理刑賞己諾信乎天下矣有諾責寜有己怨信乎天下謂諾許也已不許也禮記曰與其柯盟之比也若齊􅁊不背臣下曉然皆知其可要也其可與要約要約也皆知一堯反不欺也要政令巳陳雖覩利敗不欺其民原命三謂若伐而退之比也日之糧不降約結巳定雖覩利敗不欺其與相與衞不遂滅之爲己利之比也親與之國謂若齊􅁊許赦魯如是則兵勁城固敵國畏之國一綦明與國信之爲基也綦亦當雖末在僻陋之國威動天下}
  - {type: page-break, offset: 19, content: '', id: KR3a0002_SBCK_007-3a}
  - {type: page-break, offset: 19, content: '', id: KR3a0002_SBCK_007-3b}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 天下名垂乎後世以義得濟之日成功之後也言仲尼行義既成之後不行乎天下謂極昭明天下莫能隠匿之今亦以天下之顯諸侯誠義乎志意加義乎法則度量著之以政事案申重之以貴賤殺生使襲然終始猶一也申亦重也既為政皆以義又申重以賞罰使相掩襲無間隙終始如一也如是則夫名聲之部發於天地之間也豈不如日月雷霆然矣哉部當為剖謂開發也仲尼匹夫但著空言猶得不隠乎天下今若以顯諸侯行義必如日月雷霆故曰以國齊義一日而白湯武是也齊當為濟以一國皆取濟於義一朝而名聲明白湯武是也湯以亳武以鄗皆百里之地亳湯國都鄗與鎬同武王所都京也詩曰考卜維王宅是鎬京維龜正之武王成之天下為一諸侯為臣通達之屬莫不從服無它故焉以濟義矣是所謂義立而王也非有他故但取濟於義也徳雖未至也義雖未濟也霸者亦有徳義但未能至極盡濟也然而天下之理略奏矣天下之理謂條理者略有節奏也刑賞己諾信乎天下矣諾許也已不許也禮記曰與其有諾責寜有己怨信乎天下謂若齊桓不背柯盟之比也臣下曉然皆知其可要也要約也皆知其可與要約不欺也要一堯反政令己陳雖覩利敗不欺其民謂若伐原命三日之糧不降而退之比也約結已定雖覩利敗不欺其與與相親與之國謂若齊桓許赦魯衞不遂滅之為己利之比也如是則兵勁城固敵國畏之國一綦明與國信之綦亦當為基也雖在僻陋之國威動天下}
