  - {type: 'tls:seg', offset: 356, content: '', id: KR3a0002_tls_007-2a.17}
  - {type: variant, offset: 357, length: 0, content: '', WYG: 國錯者非封焉之謂也非受之茆土然後為安或曰修封疆立城郭之謂也何法之道誰子之與也設問之詞既非封焉之謂問}
