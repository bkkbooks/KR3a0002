  - {type: variant, offset: 24, length: 223, content: 曰然彼誠可羞稱也齊桓五伯之盛者也前事則殺兄而爭國內行則姑姊妹之不嫁者七人閨門之內般樂奢汰以齊之分奉之而不足外事則詐邾襲莒并國三十五其事行也若是其險汙淫汰也彼固曷足稱乎大君子之門哉若是而不亡乃霸何也曰於乎夫齊桓公有天下之大節焉夫孰能亡之倓然見管仲之能足以託國也是天下之大知也安忘其怒出忘其讎遂立以為仲父是天下之大決也立以為仲父而貴戚莫之敢妬也與之高國之位而本朝之臣莫之敢惡也與之書社三百而富人莫之敢距也貴賤長少秩秩焉莫不從桓公而貴敬之是天下之大節也, SBCK: 如字爲}
