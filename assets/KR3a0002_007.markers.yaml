  - {type: variant, offset: 351, length: 0, content: '', SBCK: 提挈一國之利貪求之也利也功役使不務張其義齊其信唯利之求開張内則不憚詐其民而求小利焉土功詐其民謂若梁伯好至之比曰宼將外則不憚詐其與而求大利焉楚靈謂若遂滅之之比也王以義討陳蔡因内不脩正其所以有然常欲人之有貨財也有土地如是則臣下百姓莫不以}
  - {type: variant, offset: 351, length: 0, content: '', WYG: 提挈一國之人以呼召功利言所務唯功利也功役使利貪求之也不務張其義齊其信唯利之求張開内則不憚詐其民而求小利焉謂若梁伯好土功詐其民言宼將至之比也外則不憚詐其與而求大利焉謂若楚靈王以義討陳蔡因遂滅之之比也内不修正其所以有然常欲人之有有土地貨財也如是則臣下百姓莫不以}
