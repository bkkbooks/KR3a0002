  - {type: variant, offset: 353, length: 0, content: '', WYG: 待其上矣上詐其下下詐其上則是上下析也離析如是則敵國輕之不得人心故輕之也與國疑之權謀日行而國不免危削綦之而亡其極者則滅亡齊閔薛公是也薛公孟嘗君田文齊閔王之相也齊閔王為五國所伐皆薛公使然故同言之也故用彊齊非}
  - {type: page-break, offset: 353, content: '', id: KR3a0002_WYG_007-4b, image: WYG0695/WYG0695-0182b.png}
  - {type: variant, offset: 353, length: 0, content: '', krp: 待其上矣上詐其下下詐其上則是上下析也析離如是則敵國輕之故輕之也不得人心與國疑之權謀日行而國不免危削綦之而亡則滅亡其極者齊閔薛公是也也齊閔王爲五國所伐皆薛公薛公孟甞君田文齊閔王之相言之也使然故同故用彊齊非}
  - {type: variant, offset: 354, length: 3, content: 勝矣彼, SBCK: 脩禮義也非}
  - {type: variant, offset: 354, length: 2, content: 勝矣, WYG: 修禮義也非以本政教也非以一天下也綿綿常以結引馳外為務綿綿不絶貎引讀為靷靷引軸之物結引續緜於軸所以引車也齊閔薛公不修徳政但使說客引軸馳騖於他國以權詐為務也故彊南足以破楚史記齊閔王二十三年與秦敗楚重丘南割楚之淮北也西足以詘秦北足以敗燕史記閔王三十六年與韓魏攻秦至凾谷軍焉中足以舉宋閔王三十八年伐宋宋王死於温舉謂舉其國而滅之也及以燕趙起而攻之若振槁然閔王四十年燕秦楚三晉敗我於齊西振擊也槁枯葉也言當權謀强盛之時雖破敵滅國及樂毅以諸國攻之若擊枯葉之易也而身死國亡為天下大戮為天下大戮辱也春秋傳曰古者明王伐不敬取其鯨鯢而封之以為大戮也後世言惡則必稽焉後世稽考閔王為龜鏡也是無他故焉唯其不由禮義而由權謀也三者明王之所謹擇也仁人之所務白也善擇者制人不善擇者人制之善擇者用霸王不善擇者用權謀也國者天下之大器也重任也不可不善為擇所而後錯之錯險則危所處也錯讀為措不可不善為擇道然後道之塗薉則塞不可不善為擇道路而道達之薉與穢同塞謂行不通也危塞則亡所以為之善擇}
  - {type: page-break, offset: 354, content: '', id: KR3a0002_WYG_007-5a, image: WYG0695/WYG0695-0182c.png}
  - {type: variant, offset: 354, length: 3, content: 勝矣彼, krp: 脩禮義也非}
