  - {type: variant, offset: 1067, length: 0, content: '', SBCK: 加焉是故百姓貴之如帝親之如父母爲之出死斷亡而不愉者無它故焉字剩耳不愉不道德誠明利澤誠厚也亂世不然汙漫突盜以先之盜竊也突陵突觸權謀傾覆以示之俳優侏儒婦女之請謁以悖之可戲弄者悖亂也俳優倡優侏儒短人使愚詔}
