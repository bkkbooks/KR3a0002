  - {type: variant, offset: 493, length: 1, content: 厚, krp: 謂也故四方皆歸之其道足以齊一人羿蠭門者善服射者也羿蠭蒙善射故射者服蠭門即蠭蒙學射}
  - {type: variant, offset: 495, length: 0, content: '', SBCK: 羿音逄之蠭王良造父者善服馭者也御韓子曰字伯王良趙簡子之善御者馭與御同也樂造父周穆王之御皆聦明君子者善服人者也人服而勢從之人不服而勢去之故王者已於服人矣盡此也王者之功故人主欲得善射射逺中微則莫若羿蠭門矣細微之物射及逺中欲得善馭及速致逺則莫若使王良造父矣欲得調壹天下制秦楚則莫若聦明君子矣彊國故制之者也荀卿在齊楚秦天下其用知甚􅂤至少也用智慮其爲事不勞而功名致大甚易處而綦可樂也故明君以爲寶而愚者以爲難寶愚者以任賢明君以任賢爲也爲難夫貴爲天子富}
  - {type: page-break, offset: 495, content: '', id: KR3a0002_SBCK_007-14a}
  - {type: variant, offset: 495, length: 0, content: '', krp: 羿音逄之蠭王良造父者善服馭者也御韓子曰字伯王良趙簡子之善御者馭與御同也樂造父周穆王之御皆聦明君子者善服人者也人服而勢從之人不服而勢去之故王者已於服人矣盡此也王者之功故人主欲得善射射逺中微則莫若羿蠭門矣細微之物射及逺中欲得善馭及速致逺則莫若使王良造父矣欲得調壹天下制秦楚則莫若聦明君子矣彊國故制之者也荀卿在齊楚秦天下其用知甚簡至少也用智慮其爲事不勞而功名致大甚易處而綦可樂也故明君以爲寶而愚者以爲難寶愚者以任賢明君以任賢爲也爲難夫貴爲天子富}
  - {type: variant, offset: 496, length: 0, content: '', WYG: 等位爵服官職事業是}
  - {type: variant, offset: 498, length: 0, content: '', SBCK: 名爲聖王兼制人人莫得而制也是人情}
  - {type: variant, offset: 498, length: 0, content: '', krp: 名爲聖王兼制人人莫得而制也是人情}
  - {type: variant, offset: 499, length: 1, content: 勢, SBCK: 所同欲也而王者兼而有是者也重色而衣之重味而食之重財物而制之直用反重多也合天下而君之飲食甚厚聲樂甚大臺謝甚髙榭同謝與園囿甚廣臣使諸侯一天下是又人情之所同欲也而天子之禮制如是者也制如此其禮之所與之所欲也盛言盡人情制度以陳政令以挾浹洽也挾讀爲官人失要則死公侯失禮則幽記曰各􅀭其職百官要政令之要約也禮執衞侯歸之于京師寘諸深室也廢職服大刑幽囚也春秋傳曰􅀳侯四方之國有侈離之德則必滅皆謂不遵法度侈奢侈離乖離名聲若日月功績如天地天下之人應之如影嚮是又人情之所同欲也而王者兼而有是者也故人之情口好味而臭味莫美焉耳好聲而聲樂莫大焉目好色而文章致繁婦女莫衆焉形體好佚而安重閒靜莫愉焉也或閒隙愉樂也讀爲閑心好利而穀禄莫厚焉合天下之所同願兼而有之睪牢天下而制之若制子孫䇿燕太子丹謂荆軻曰秦有貪功之心非盡天下之地牢睪牢未詳睪或作畢言盡牢籠天下也新序作宰牢戰國與漢書丘嫂轑釡之轑義同皆修理斡運之意也海内之王其意不厭或曰睪讀如以薅荼蓼之薅牢人苟不狂惑戇陋者其誰能睹是}
  - {type: page-break, offset: 499, content: '', id: KR3a0002_SBCK_007-14b}
  - {type: page-break, offset: 499, content: '', id: KR3a0002_SBCK_007-15a}
