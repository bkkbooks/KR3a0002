  - {type: variant, offset: 827, length: 3, content: 榮失寵, SBCK: 不加焉豪末不以尤愛之孝經曰不敢侮於鰥寡而況於士民乎不理加於孤獨鰥寡也四者人所輕賤故聖王故下之親上歡如父母可殺而不可使不順君臣上下貴賤長幼至于庶人莫不以是爲隆正親上爲隆正也是謂親上也皆以然後皆内自省以謹於分其上愛敬踰越也故不敢是百王之所以同也而禮法之樞要也民之道而得民也是百王之同用愛然後農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公緫方而議}
  - {type: page-break, offset: 827, content: '', id: KR3a0002_SBCK_007-18a}
  - {type: variant, offset: 827, length: 3, content: 榮失寵, WYG: 不加焉不以豪末不理加於孤獨鰥寡也四者人所輕賤故聖王尤愛之孝經曰不敢侮於鰥寡而况於上民乎故下之親上歡如父母可殺而不可使不順君臣上下貴賤長㓜至於庶人莫不以是為隆正是謂親上也皆以親上為隆正也然後皆内自省以謹於分愛敬其上故不敢踰越也是百王之所以同也而禮法之樞要也是百王之同用愛民之道而得民也然後農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公揔方而議}
  - {type: page-break, offset: 827, content: '', id: KR3a0002_WYG_007-15a, image: WYG0695/WYG0695-0187c.png}
  - {type: variant, offset: 827, length: 3, content: 榮失寵, krp: 不加焉豪末不以尤愛之孝經曰不敢侮於鰥寡而況於士民乎不理加於孤獨鰥寡也四者人所輕賤故聖王故下之親上歡如父母可殺而不可使不順君臣上下貴賤長幼至于庶人莫不以是爲隆正親上爲隆正也是謂親上也皆以然後皆内自省以謹於分其上愛敬踰越也故不敢是百王之所以同也而禮法之樞要也民之道而得民也是百王之同用愛然後農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公緫方而議}
  - {type: punctuation, offset: 828, content: ，, id: KR3a0002_tls_007-bkkpn159}
  - {type: 'tls:seg', offset: 828, content: '', id: KR3a0002_tls_007-4a.18}
  - {type: variant, offset: 831, length: 0, content: '', SBCK: 天子共已而止矣岀若入若天下莫不平均莫不治辨是百王之所同而禮法之大分也勸勉餘並已解上也亦謂致愛其下故皆若夫貫日而治平權物而稱用制物使稱於用稱尺證反貫日積日也使條理平正權使衣服有制宫室有度人徒有數喪祭械用皆有等宜以是用挾於萬物皆有等宜言等差皆得其宜也挾讀爲人徒謂胥徒給傜伇者也械用器用也浹尺寸㝷丈莫得不循乎制度數量然後行則是官人使吏之事也不足數於大君子之前吏數閱數也大君子謂人君也官人列官之人使吏所使役之故君人者立隆政本朝而當也當丁浪反隆政所隆之政所使要百事者誠仁人也綱紀者謂相也主百事之要約則身佚而國治功大而名美上可以王下可以霸立隆政本朝而不當所使要百事者非仁人也則身勞而國亂功廢而名辱社稷}
  - {type: page-break, offset: 831, content: '', id: KR3a0002_SBCK_007-18b}
  - {type: variant, offset: 831, length: 0, content: '', WYG: 天子共己而止矣若出若入天下莫不平均莫不治辯是百王之所同而禮法之大分也亦謂致愛其下故皆勸勉餘並已解上也若夫貫日而治平權物而稱用貫日積日也使條理平正權制物使稱於用稱尺正反使衣服有制宫室有度人徒有數喪祭械用皆有等宜以是用挾於萬物人徒謂胥徒給徭役者也械用噐用也皆有等宜言等差皆得其宜也挾讀為浹尺寸㝷丈莫得不循乎制數度量然後行則是官人使吏之事也不足數於大君子之前官人列官之人使吏所使役之吏數閲數也大君子謂人君也故君人者立隆政本朝而當隆政所隆之政也當丁浪反所使要百事者誠仁人也主百事之要約綱紀者謂相也則身佚而國治功大而名美上可以王下可以霸立隆正本朝而不當所使要百事者非仁人也則身勞而國亂功廢而名辱社稷}
