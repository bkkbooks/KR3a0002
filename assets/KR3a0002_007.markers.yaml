  - {type: variant, offset: 374, length: 7, content: 彼固曷足稱乎大, WYG: 安與夫千歲之信士為之也謂使百世不易可信之士為政人無百歲之壽而有千歲之信士何也又問之曰以夫千歲之法自持者是乃千歲之信士矣以禮義自持者則是千歲之士不以夀千歲也能自持則能持國故與積禮義之}
  - {type: page-break, offset: 374, content: '', id: KR3a0002_WYG_007-6b, image: WYG0695/WYG0695-0183b.png}
