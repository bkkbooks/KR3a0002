  - {type: variant, offset: 1155, length: 1, content: 志, WYG: 鄭康成云兩書一札同而别之長曰質短曰劑皆今之劵書也左氏傳曰趙盾為政董逋逃由質晏或曰質正也如是則商賈莫}
  - {type: variant, offset: 1157, length: 1, content: 免, WYG: 敦慤而無詐矣百工將時斬伐佻其期日而利其巧任如是則百工莫不忠信而不楛矣時斬伐即周禮仲冬月斬陽木仲夏月斬陰木是也佻與徭同緩也謂不廹促也巧任巧者之任不廹促則百工自利矣楛謂器用不牢固也晏子春秋曰景公之時晏子請發粟公不許為路寢之臺令史重其續逺其凃佻其日而不趨三年臺成而民振欲上恱}
  - {type: variant, offset: 1159, length: 2, content: 姦心, WYG: 君遊民足乎食彼佻亦與此同也縣鄙將輕田野之稅省刀布之歛罕舉力役無奪農時如是則農夫莫不朴力而寡能矣但質朴而力作不務他能也士大夫務節死制然而兵勁然而當為然後百吏畏法循繩然後國常不亂商賈敦慤無詐則商旅安貨通財而國求給矣所求之物皆給足也百工忠信而不楛則器用巧便而財不匱矣農夫朴力而寡能則上不失天時下不失地利中得人和而百事不廢是之謂政令}
