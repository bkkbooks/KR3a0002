  - {type: variant, offset: 912, length: 0, content: '', SBCK: 也事煩則狂守多謂自任主百也亂治國者分已定則主相臣下百吏各謹其所聞不務聽其所不聞無越思謹謂守行各謹其所見不務視其所不見所聞所見誠以齊矣事不侵越也齊謂各當其則雖幽間隱辟百姓莫敢不敬分安制以禮化其上是治國之徴也度不敢踰分徵驗也治國之徵驗在分定間讀為閑辟讀為僻安制謂安於國之制主道治近不治逺道如此人主之治明不治幽治一不治二主能治近則逺者理主能治明則幽者化主能當一則百事正夫兼聽天下日有餘而治不足者如此也是治之極也旣能治近又務治逺旣能治明又務見幽旣能當一又務正百浪}
  - {type: page-break, offset: 912, content: '', id: KR3a0002_SBCK_007-20b}
  - {type: variant, offset: 912, length: 0, content: '', WYG: 也事煩則狂亂也治國者分已定則主相臣下百吏各謹其所聞不務聽其所不聞謹謂守行無越思各謹其所見不務視其所不見所聞所見誠以齊矣齊謂各當其事不侵越也則雖幽間隠辟百姓莫敢不敬分安制以禮化其上是治國之徵也間讀為閑辟讀為僻安制謂安於國之制度不敢踰分徵驗也治國之徵驗在分定主道治近不治逺人主之道如此治明不治幽治一不治二主能治近則逺者理主能治明則幽者化主能當一則百事正夫兼聽天下日有餘而治不足者如此也是治之極也既能治近又務治逺既能治明又務見幽既能當一又務正百當丁浪}
