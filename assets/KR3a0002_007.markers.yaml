  - {type: variant, offset: 16, length: 2, content: 羞稱, SBCK: 仲尼行義既成之後不隱今亦以天下之顯諸侯誠義}
  - {type: variant, offset: 16, length: 2, content: 羞稱, WYG: 語以義著言語謂所論說皆明義也濟之日不隠}
