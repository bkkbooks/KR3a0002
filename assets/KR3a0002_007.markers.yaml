  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 荀子卷第七登仕郎守大理評事揚王霸篇第十一國者天下之制利用也過於國制􅄛字耳天下用之利者無人主者天下之利勢也利者也勢之最得道以持之則大安也大榮也積美之原也不得道以持之則大危也大累也有之不如無之如無國有國不及其綦也索爲匹夫不可得也極之時綦謂窮齊湣宋獻是也偃也爲齊閔王所滅吕氏春秋云宋康王湣與閔同齊閔王爲淖齒所殺宋獻宋君各私爲謚故與此不同此云獻國㓕之後其臣子故人主天下之利勢也然而不能自安也安之者必將道也道守之必將以故用國者義立而王信立而霸權謀立而亡三者明主之所謹擇也愼擇之所宜謹仁人之所務白也白也白明挈國以呼禮義而無以害之務皆禮義也無以害之謂不以他事害禮義也挈提舉也言提挈一國之人皆使呼召禮義言所行一不義殺一無罪而得天下仁者不爲也擽然扶持心國且若是其固也所持心持國不行不櫟讀為落石貎也其然如石之固也義不殺無罪落所與爲之者之人則舉義士也用義士謂若伊吕之比者舉皆也所與為政之人則皆所以爲布陳於國家刑法者則舉義法也夏贖刑之類也謂若周穆王訓主之所極然帥羣臣而首郷之者則舉義志也所極信率志意也主也一曰志記也舊典之有義者謂若六經也羣臣歸向之者則皆義之志謂不懐不義之意如是則下仰上以義矣是綦定也以義爲本仰魚亮反綦當爲基基本也言綦定而國定國定而天下定}
