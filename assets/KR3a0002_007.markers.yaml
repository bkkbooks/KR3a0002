  - {type: variant, offset: 439, length: 1, content: 誅, SBCK: 養五綦之具具也故百樂者生於治國者也憂患者生於亂國者也急逐樂而緩治國者非知樂者也故明君者必將先治其國然後百樂得其中治國得於並音落之中樂闇君者必將急逐樂而緩治國故憂患不可勝校也校計必至於身死國亡然後止也豈不哀哉將以爲樂乃得憂焉將以爲安乃得危焉將以爲福乃得死亡焉豈不哀哉於乎君人者亦可以察若言矣乎於之言謂以上之􅀃讀爲嗚呼若言如此故治國有道人主有職知在其職也其道守若夫貫日而治詳一日而曲列之積日貫日日而委曲列之無差錯也也積日而使條理詳備一是所使夫百吏官人爲也不足以是傷游玩安燕之樂使百吏官人煩碎之事旣人君游燕之樂也爲之則不足以此害若夫論一相以兼率之使臣下百吏莫不宿道郷方而務擇之也率領論謂討論選下皆以宿道向方爲務不敢姦詐也也宿道止於道也向方不迷亂也臣是夫人主之職也不在躬親小事也論相乃是人主之職若是則一天下名配堯禹之主者守至約而詳事至佚而功任事垂衣裳不下簟席之上而海内之人莫不願得以爲帝王夫是之謂至約樂莫大焉人主者以官人爲能者也匹夫者以自能爲能者也人主得使人爲之匹夫則無所移之百􅅿一守事業窮無所移之也之守事業百􅅿一夫人主必躬治小事則與匹夫何異也耕稼也耕稼窮於此無所移於人若今以一人兼聽天下日有餘而治不足者使人爲之也一人今以所治之事少而不足言不足治也使人為}
