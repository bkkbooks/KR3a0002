  - {type: variant, offset: 841, length: 0, content: '', SBCK: 天下取失當一人而社稷危不能當一人而能當千人百人者􅀃無之有也之中􅀃論之當也當皆丁浪反無此事能當謂能用人旣能當一人則身有何勞而爲語助也而爲皆垂衣裳而天下定故湯用伊尹文王用吕尚武王用召公成王用周公且卑者五伯王者伯讀爲霸卑言功業卑於齊􅁊公閨門之内懸樂奢泰游抏之脩抏與玩同言齊桓唯懸簨簴也泰與汰同脩也此是於天下不見謂脩之脩飾也天下不謂然九合諸侯一匡天下爲五伯長是亦無它故焉知一政於管仲也是君人者之要守也任賢也要守在知者易爲之興力而功名綦大賢之君也智者知任舍是而孰足爲也之言其餘皆不定爲也舍是任賢之事何足為故古之人有大功名者}
