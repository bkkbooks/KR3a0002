  - {type: variant, offset: 0, length: 0, content: '', WYG: 七唐楊倞註王霸篇第十一國者天下之制利用也天下用之利者無過於國制衍字耳人主者天下之利勢也勢之最利者也得道以持之則大安也大榮也積美之源也不得道以持之則大危也大累也有之不如無之有國不如無國有也及其綦也索為匹夫不可得也綦謂窮極之時齊湣宋獻是也湣與閔同齊湣王為淖齒所殺宋獻宋君謚也為齊湣王所滅吕氏春秋云宋康王此云獻國滅之後其臣子各私為謚故與此不同也故人主天下之利勢也然而不能自安也安之者必將道也必將以道守之故用國者義立而王信立而霸權謀立而亡三者明主之所謹擇也所宜謹愼擇之仁人之所務白也白明白也挈國以呼禮義而無以害之挈提舉也言挈提一國之人皆使呼召禮義言所務皆禮義也無以害之謂不以他事害禮義也行一不義殺一無罪而得天下仁者不為也櫟然扶持心國且若是其固也櫟然落石貎其所持心持國不行不義不殺無罪落然如石之固也之所與為之者之人則舉義士也舉皆也所與為政之人則皆用義士謂若伊吕之比者也之所以為布陳於國家刑法者則舉義法也謂若周穆王訓夏贖刑之類也主之所極然帥羣臣而首嚮之者則舉義志也志意也主所極信率羣臣歸嚮之者則皆義之志意謂不懐不義之意也或曰志記也舊典之有義者謂若六經也如是則下仰上以義矣是綦定也綦當為基基本也言以義為本仰魚亮反綦定而國定國定而天下定}
