  - {type: variant, offset: 543, length: 0, content: '', WYG: 制也是人情之所同欲也而王者兼而有是者也重色而衣之重味而食之重財物而制之重多也直用反合天下而君之飲食甚厚聲樂甚大臺謝甚髙謝與榭同園囿甚}
  - {type: variant, offset: 543, length: 4, content: 廣有其埶, krp: 偏舉人臣則爭職而妒賢}
  - {type: variant, offset: 544, length: 0, content: '', WYG: 臣使諸侯一天下是又人情之所同欲也而天子之禮制如是者也禮之與制如此其盛言盡人情之所欲也制度以陳政令以挾挾讀為浹洽也官人失要則死公侯失禮則幽要政令之要約也禮記曰各揚其職百官廢質服大刑幽囚也春秋傳曰晉侯執衛侯歸之于京師寘諸深室也四方之國}
  - {type: page-break, offset: 544, content: '', id: KR3a0002_WYG_007-12b, image: WYG0695/WYG0695-0186b.png}
  - {type: variant, offset: 545, length: 0, content: '', WYG: 侈離之徳則必滅侈奢侈離乖離皆謂不遵法度名聲若日月功積如天地天下之人應之如影嚮是又人情之所同欲也而王者兼而有是者也故人之情口好味而臭味莫美焉耳好聲而聲樂莫大焉目好色而文章致繁婦女莫衆焉形體好佚而安重間靜莫愉焉間隙也或讀為閑愉樂也心好利而穀禄莫厚焉合天下之所同願兼而有之睪牢天下而制之若制子孫睪牢未詳睪或作畢言盡牢籠天下也新序作宰牢戰國䇿燕太子丹謂荆軻曰秦有貪功之心非盡天下之地牢海内之王}
  - {type: page-break, offset: 545, content: '', id: KR3a0002_WYG_007-13a, image: WYG0695/WYG0695-0186c.png}
