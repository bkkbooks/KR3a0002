  - {type: variant, offset: 369, length: 1, content: 小, WYG: 是憚憚非變也憚與坦同言國者但繼世之主自新耳此積久之法坦坦然無變也巢子曰有陰而逺者有坦明而功者杜伯射宣王於畝田是坦明功者據古憚與坦通改王改行也自是改一王則改其所行之事非法變也或曰國語襄王謂晉文公曰先民有言曰改玉改行玉佩玉行歩也故一朝之日也一日之人也然而厭焉有千歲之固何也設問之辭一朝之日謂今日之事明朝不同言易變也一日之人謂今日之生未保明日言壽促也厭讀為黶禮記曰見君子而後厭然揜其不善鄭注云閉藏貎言事之易變}
