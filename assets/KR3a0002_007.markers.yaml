  - {type: variant, offset: 427, length: 1, content: 暴, SBCK: 仁人之所以務白也語者丁寜之也荀子多重敘前故國者重任也不以積持之則不立之法持之不以積乆覆也則傾故國者世所以新者也是憚憚非變也無變也隨巢子曰有隂而逺者有坦明而功者杜伯射宣王憚與坦同言國者但繼世之主自新耳此積久之法坦坦然者據古憚與坦通於􅅿田是坦明而功改王改行也之事非法變也或曰國語自是改一王則改其所行曰改王改行玉佩玉行歩也襄王謂􅀳文公曰先民有言故一朝之日也一日之人也然而厭焉有千歲之固何也一朝之日謂設問之辭言壽促也厭讀爲黶禮記曰見君子而後厭然掩其不善鄭注云今日之事明朝不同言易變也一日之人謂今日之生未保明日故有黶然深藏千歲不變改之法乎閉藏貎言事之易變人之夀促如此何曰援夫千歲之信法以持之也安與夫千歲之信士爲之也可信之士爲政謂使百世不易人無百歲之壽而有千嵗之信士何也之又問曰以夫千歲之法自持者是乃千歲之信士矣以夀千歲也能自持則能持固也以禮義自持者則是千歲之士不故與積禮義之君子爲之則王與端誠信全之士爲之則霸與權謀傾覆之人爲之則亡三者明主之所以謹擇也而仁人之所以務白也善擇之者制人不善擇之者人制之彼持國者必不可以獨也獨治也君不可然則彊固榮辱在於取相矣身能相能如是者王文王太公也謂若湯伊尹身不能知恐懼而求能者如是者彊樂毅也若燕昭身不能不知恐懼而求能者安唯便僻左右親比已者之用如是者危削侯右夏侯之比也謂若楚襄王左州綦之而亡之比宋獻國者巨用之則大小用之則小之極也巨者大綦大而王綦小而亡小巨分流者存水之分流也小巨各半如巨用之者先義而後利安不卹親䟽不卹貴賤唯誠能之求夫是之謂巨用之小用之者先利而後義安不卹是非不治曲直唯便僻親比己者之用夫是之謂小用之巨用之者若彼小用之者若此小巨分流者亦一若彼一若此也親比已者之用或誠能之求或故曰粹而王駮而霸無一焉而亡此之謂也舜舉臯陶粹全也若管仲内任堅貂即小巨分流者無一焉而亡無一賢人若不仁者逺即巨用之綦大而王者也駮雜也若齊􅁊外任即綦小而亡者也厲王專任皇甫尹氏國無禮則不正禮之所以正國也譬之猶衡之於輕重也猶繩墨之於曲直也猶規矩之於方圓也所以辨曲直規矩所以定方圓也禮能正國譬衡所以辨輕重繩墨旣錯之而人莫之能誣也懸不可欺以輕重繩錯置也禮記曰衡誠矩誠設不可欺以方圓也墨誠陳不可欺以曲直規詩曰如霜雪之將將如日月之光明詩逸爲之則存不爲則亡此之謂也禮也爲爲國危則無樂君}
