  - {type: variant, offset: 384, length: 30, content: 門哉彼王者則不然致賢而能以救不肖致彊而能以寬弱戰必能殆之而羞, SBCK: 與也求誰人付}
  - {type: variant, offset: 384, length: 2, content: 門哉, WYG: 則王與端誠信全之士為之則霸與權謀傾覆之人為之則亡三者明王之所謹擇也仁人之所務白也善擇之者制人不善擇之者人制之}
