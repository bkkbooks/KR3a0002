  - {type: variant, offset: 442, length: 0, content: '', SBCK: 得如此尸于曰兼聽天下之大自稱日有餘言兼聽之日有餘也而治不足謂治者恕也韓子曰夫爲人主而身察百官則日不足力不給也堯南橈交阯北懷幽都東西至日之所出入有餘日而不足於而日有餘上之任勢使然也日而實反故先王舍已能而因法數審賞罰故治不足大有天下小有一國諸侯天子必自爲之然後可則勞苦耗顇莫甚焉悴顦顇也耗謂精神竭如是則雖臧獲不肯與天子易埶業奴曰臧罵婢曰獲燕齊亡奴謂之臧亡臧獲奴婢也方言云荆淮海岱之間罵者故周禮其奴婢男子入于罪隷女子入于春藁勢業權埶婢謂之獲或曰取貨謂之臧擒得謂之獲皆謂有罪爲奴婢也事業以是縣天下一四海何故必自爲之人之寡以是一必自爲之言力不任之也懸天下之重一四海之大何故爲之者役夫之道也墨子之􅀃也自勞苦矣墨子之􅀃必論德使能而官施之者}
