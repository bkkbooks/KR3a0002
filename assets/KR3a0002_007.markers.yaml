  - {type: variant, offset: 422, length: 1, content: 示, krp: 何法導逹}
  - {type: variant, offset: 424, length: 0, content: '', WYG: 樂煩碎之事既使百吏官人為之則不足以此害人君游燕之樂也若夫論一相以兼率之使臣下百吏莫不宿道鄉方而務論謂討論選擇之也率領也宿道止於道也鄉方不迷亂也臣下皆以宿道鄉方為務不敢姦詐也是夫人主之職也論相人主之職不在窮親小事若是則一}
