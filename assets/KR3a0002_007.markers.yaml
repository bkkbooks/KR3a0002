  - {type: variant, offset: 824, length: 1, content: 寵, SBCK: 可樂如是其美焉者乎嗚呼君人者亦可以察若言矣此之言也可以察如揚朱哭衢涂曰此夫過舉蹞歩而覺跌千里者夫哀哭之於墨子與墨子弟揚朱戰國時人後衢涂歧路也秦俗以兩爲衢或曰四達謂之衢覺知也半歩曰子禽滑釐辨論其􅀃在愛已不㧞一毛以利天下與墨子相反里者乎故甚哀而哭之易曰差以毫釐謬以千里也蹞跌差也言此歧路第過舉半􅇍}
  - {type: page-break, offset: 824, content: '', id: KR3a0002_SBCK_007-16a}
  - {type: variant, offset: 824, length: 1, content: 寵, WYG: 可樂如是其美焉者乎嗚呼君人者亦可以察若言矣可以察如此之言也楊朱哭衢塗曰此夫過舉蹞歩而覺跌千里者夫哀哭之楊朱戰國時人後於墨子與墨子弟子禽滑釐辯論其說在愛己不㧞一毛以利天下與墨相反衢塗岐路也秦俗以兩為衢或曰四達謂之衢覺知也半歩曰蹞跌差也言此岐路第過舉半歩}
  - {type: variant, offset: 824, length: 1, content: 寵, krp: 可樂如是其美焉者乎嗚呼君人者亦可以察若言矣此之言也可以察如揚朱哭衢涂曰此夫過舉蹞歩而覺跌千里者夫哀哭之於墨子與墨子弟揚朱戰國時人後衢涂歧路也秦俗以兩爲衢或曰四達謂之衢覺知也半歩曰子禽滑釐辨論其說在愛已不㧞一毛以利天下與墨子相反里者乎故甚哀而哭之易曰差以毫釐謬以千里也蹞跌差也言此歧路第過舉半步}
  - {type: variant, offset: 826, length: 0, content: '', SBCK: 知差而哭況跌千此亦榮辱安危存亡之衢已此其爲可哀甚於衢涂滅亡故可哀甚於衢涂也此謂求誠能之士也不求則嗚呼哀哉君人者千歲而不覺也不知求誠能之士嘆君人者千嵗而無國而不有治法無國而不有亂法無國而不有賢士無國而不有罷士昭曰病也無行而罷周禮以嘉國語曰罷士無伍罷女無家韋之使善者也石平罷民謂平無國而不有愿民無國而不有悍民無國而不有美俗無國而不有惡俗兩者並行而國在上偏而國安在下偏而國危多罷士少愿民多悍民少之類下偏反是上偏偏行上事也謂治法多亂法少賢士上一而王下一而亡行也一謂令故其法治其佐賢其民愿其俗美而四者齊夫是之謂上一如是則不戰而勝不攻而得甲兵不勞而天下服故湯以亳武王以鄗鎬同鄗與皆百里之地也天下爲一諸侯爲臣通逹之屬莫不從服無它故焉四者齊也所闕也齊謂無桀紂即序於有天下之勢索爲匹夫而不可得也有天下即序於次序爲天子也之埶謂就王者之是無它故焉四者並亡也故百王之法不同若是所歸者一也上莫不致愛其下而制之以禮上之於下如保赤子政令制度所以接下之人百姓有不理者如豪末則雖孤獨鰥寡}
  - {type: page-break, offset: 826, content: '', id: KR3a0002_SBCK_007-16b}
  - {type: page-break, offset: 826, content: '', id: KR3a0002_SBCK_007-17a}
  - {type: page-break, offset: 826, content: '', id: KR3a0002_SBCK_007-17b}
  - {type: variant, offset: 826, length: 0, content: '', WYG: 知差而哭况跌千里者乎故甚哀而哭之易曰差以毫釐謬以千里也此亦榮辱安危存亡之衢已此其為可哀甚於衢塗此謂求誠能之士也不求則滅亡故可哀甚於衢塗也嗚呼哀哉君人者千歲而不覺也嘆君人者千嵗而不知求誠能之士無國而不有治法無國而不有亂法無國而不有賢士無國而不有罷士國語曰罷士無伍罷女無家韋昭曰病也無行而罷周禮以嘉石平罷民謂平之使善者也無國而不有愿民無國而不有悍民無國而不有美俗無國而不有惡俗兩者並行而國在上偏而國安在下偏而國危上偏偏行上事也謂治法多亂法少賢士多罷士少愿民多悍民少之類下偏反是上一而王下一而亡一謂令行也故其治法其佐賢其民愿其俗美而四者齊夫是之謂上一如是則不戰而勝不攻而得用兵不勞而天下服故湯以亳武王以鄗鄗與鎬同皆百里之地也天下為一諸侯為臣通達之屬莫不服從無他故焉四者齊也齊謂無所闕也桀紂即序於有天下之勢索為匹夫而不可得也即序於有天下之勢謂就王者之次序為天子是無他故焉四者並亡也故百王之法不同若是所歸者一也上莫不致愛其下而制之以禮上之於下如保赤子政令制度所以接下之人百姓有不理者如豪末則雖孤獨鰥寡}
  - {type: page-break, offset: 826, content: '', id: KR3a0002_WYG_007-14a, image: WYG0695/WYG0695-0187a.png}
