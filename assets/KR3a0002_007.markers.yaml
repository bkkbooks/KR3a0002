  - {type: variant, offset: 1187, length: 1, content: 引, WYG: 後偏衡石稱縣者所以為平也上好傾覆則臣下百吏乘是而後險斗斛敦槩者所以為嘖也上好貪利則臣下百吏乗是而後鄙豐取刻與以無度取於民故械數者治之流也非治之源也君子者治之源也官人守數君子養源源清則流清源濁則流濁故上好禮義尚賢使能無貪利之心則下亦將綦辭讓致忠信而謹於臣子矣如是則雖在小民不待合符節别契劵而信不待探籌投鉤而公不待衡石稱縣而平不待斗斛敦槩而嘖故賞不用而民勸罰不用而民服有司不勞而事治政令不煩而俗美百姓莫敢不順上之法象上之志而勸上之事而安樂之矣故籍斂忘費事業忘勞宼難忘死城郭不待飾而固兵刄不待陵而勁敵國不待服而詘四海之民不待令而一夫是之謂王乎詩曰王猷允塞徐方既來此之謂也請問為人君曰以禮分施均徧而不偏請問為人臣曰以禮待君忠順而不懈請問為人父曰寛惠而有禮請問為人子曰敬愛而致文請問為人兄曰慈愛而見友請問為人弟曰敬詘而不苟請問為人夫曰致功而不流致臨而有辨請問為人妻曰夫有禮則柔從聽侍夫無禮則恐懼而自竦也此道也偏立而亂俱立而治}
