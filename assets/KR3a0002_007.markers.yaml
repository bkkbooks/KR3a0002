  - {type: variant, offset: 433, length: 0, content: '', SBCK: 哉譬之是由好聲色而恬無耳目也豈不哀哉雖好聲色將何用哉恬安也安然無耳目夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚綦極也綦或爲甚傳寫誤耳佚安樂也臭氣也凡氣香亦謂之臭禮記曰佩容臭此五綦者人情之所必不免也養五綦者}
