  - {type: variant, offset: 353, length: 0, content: '', SBCK: 待其上矣上詐其下下詐其上則是上下析也析離如是則敵國輕之故輕之也不得人心與國疑之權謀日行而國不免危削綦之而亡則滅亡其極者齊閔薛公是也也齊閔王爲五國所伐皆薛公薛公孟甞君田文齊閔王之相言之也使然故同故用彊齊非}
