  - {type: 'tls:seg', offset: 386, content: '', id: KR3a0002_tls_007-2a.21}
  - {type: variant, offset: 387, length: 0, content: '', WYG: 持國者必不可以獨也君不可獨治也然則彊國榮辱在於取相矣身能相能如是者王謂若湯伊尹文王太公也身不能知恐懼而求能者如是者彊若燕昭樂毅也身不能不知恐懼而求能者安唯便僻左右親比己者之用如是者危削謂若楚㐮王左州侯右夏侯之比也綦之而亡宋獻之比國者巨用之則大小用之則小巨者大之極也綦大而王綦小而亡小巨分流者存小巨各半如水之分流也巨用之者先義而後利安不恤親疎不恤貴賤唯誠能之求夫是之謂巨用之小用之者先利而後義安不恤是非不治曲直唯便僻親比己者之用夫是之謂小用之巨用之者若彼小用之者若此小巨分流者亦一若彼也亦一若此也或誠能之求或親比己者之用故曰粹而王駁而霸無一焉而亡此之謂也粹全也若舜舉臯陶不仁者逺即巨用之綦大而}
  - {type: page-break, offset: 387, content: '', id: KR3a0002_WYG_007-7a, image: WYG0695/WYG0695-0183c.png}
  - {type: variant, offset: 389, length: 0, content: '', WYG: 也駮雜也若齊桓外任管仲内任豎刁則小巨分流者無一焉而亡無賢人若厲王專任皇甫尹氏即綦小而亡者也國無禮}
  - {type: page-break, offset: 389, content: '', id: KR3a0002_WYG_007-7b, image: WYG0695/WYG0695-0183d.png}
