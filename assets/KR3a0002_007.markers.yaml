  - {type: variant, offset: 427, length: 1, content: 暴, WYG: 詳事至佚而功事任垂衣裳不下簟席之上而海内之民莫不願得以為帝王夫是之謂至約樂莫大焉人主者以官人為能者也匹夫者以自能為能者也人主得使人為之匹夫則無所移之百畝一守事業窮無所移之也百畝一夫之守事業耕稼也耕稼窮於此無所移於人若人主必窮治小事則與匹夫何異之也今以一人兼聽天下日有餘而治不足者使人為之也今以一人兼聽天下之大自稱日有餘言兼聽之日有餘也而治不足謂所治之事少而不足言不足治也使人為之故得如此尹子曰堯南撓交阯北懐幽都東西至日之所出入有餘日而不足於治者恕也韓子曰夫為人主而身察百官則日不足力不給也故先王舍己能而因法數審賞罰故治不足而日有餘上之任勢使然也日音而實反大有天下小有一}
