  - {type: variant, offset: 413, length: 2, content: 羞與, WYG: 人莫能誣也錯置也禮記曰衡誠懸不可欺以輕重䋲墨誠陳不可欺以曲直規矩誠設不可欺以方圓者也詩云如霜雪}
  - {type: variant, offset: 416, length: 5, content: 鬭委然成文, SBCK: 誰子猶誰人也愼子曰弃道設問之辭旣非封焉之謂問}
  - {type: variant, offset: 416, length: 1, content: 鬭, WYG: 將將如日月之光明逸詩為之則存不為之則亡此之謂也為為禮也國危則無樂君國安則無憂民亂則國危治則國安今君人者急逐樂而緩治國豈不過甚矣哉譬之是猶好聲色而恬無耳目也豈不哀哉恬安也安然無耳目雖好聲色將何用哉夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚臭􅂔也凡氣香亦謂之臭禮記曰皆佩容臭綦極也綦或為其傳寫誤耳佚安樂之也此五綦者人情之所必不免也養五綦者有具具謂廣大富厚治辨彊固之道無具則五綦者不可得而致也萬乘之國可謂廣大富厚矣加有治辯彊固之道焉有讀為又辯分别事若是則恬愉無患難矣然後養五綦之具具也故百樂者生於治國者也憂患者生於亂國者也急逐樂而緩治國者非知樂者也故明君者必將先治其國然後百樂得其中得於治國之中樂並音洛闇君者必將荒逐樂而緩治國故憂患不可勝校也計校必至於身死國亡然後止也豈不哀哉將以為樂乃得憂焉將以為安乃得危焉將以為福乃得死亡焉豈不哀哉於乎君人者亦可以察若言矣於乎讀為嗚呼若言如此之言謂己上之說故治國有道人主有職在知其道守其職也若夫貫日而治詳一日而曲列之貫日積日也積日而使條治詳僃一日如}
