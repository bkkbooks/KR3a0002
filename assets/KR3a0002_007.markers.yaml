  - {type: variant, offset: 358, length: 5, content: 讓飾爭依乎, SBCK: 本政敎也非以一天下也緜緜常以結引馳外爲務所以引車也齊閔薛公不脩德政但使􅀃客引軸馳緜緜不絶貌引讀爲靷靷引軸之物結引謂繫於軸權詐爲務也騖於他國以故彊南足以破楚與秦敗楚於重丘南割史記齊閔王二十三年北也楚之淮西足以詘秦北足以敗燕六年與韓魏共史記閔王三十谷軍焉攻秦至函中足以舉宋於温舉謂舉其國而滅之也閔王三十八年伐宋宋王死及以燕趙起而攻之若振槁然秦楚三晉敗我閔王四十年燕破敵滅國及樂毅以諸國攻之若擊枯葉之易也於濟西振擊也槁枯葉也言當權謀彊盛之時雖而身死國亡爲天下大戮明王伐不敬取其鯨鯢而封之以爲天下大戮辱也春秋傳曰古者戮也爲大後世言惡則必稽焉王爲􅀛鏡也後世稽考閔是無它故焉唯其不由禮義而由權謀也三者明主之所以謹擇也而}
  - {type: page-break, offset: 358, content: '', id: KR3a0002_SBCK_007-5b}
  - {type: variant, offset: 358, length: 5, content: 讓飾爭依乎, WYG: 何法道達之求誰人付與之誰子猶誰人也愼子曰棄道術舍度量以求一人之識識天下誰子之識能足焉故道王者之法與王者之人為之則亦王道霸者之法與霸者之人為之則亦霸道亡國之法與亡國之人為之則亦亡荅辭也道皆與導同三者明主之所謹擇也而}
