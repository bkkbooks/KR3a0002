  - {type: variant, offset: 1902, length: 1, content: 若, SBCK: 衆人也也衆人謂衆庶人也溝音寇愚也溝瞀無知志忍私然後能公行忍情性然後能脩謂忍下孟反矯其性行知而好問然後能才好問然後能有其智慮}
  - {type: variant, offset: 1902, length: 1, content: 若, krp: 衆人也也衆人謂衆庶人也溝音寇愚也溝瞀無知志忍私然後能公行忍情性然後能脩謂忍下孟反矯其性行知而好問然後能才好問然後能有其智慮}
  - {type: variant, offset: 1904, length: 0, content: '', SBCK: 及常藝才公脩而才可謂小儒矣故為小儒也皆矯其不及志安公}
  - {type: variant, offset: 1904, length: 181, content: 行則湯武在上曷益桀紂在上曷損湯武存則天下從而治桀紂存則天下從而亂如是者豈非人之情固可與如此可與如彼也哉人之情食欲有芻豢衣欲有文繡行欲有輿馬又欲夫餘財蓄積之富也然而窮年累世不知不足是人之情也今人之生也方知畜雞狗豬彘又畜牛羊然而食不敢有酒肉餘刀布有囷窌然而衣不敢有絲帛約者有筐篋之藏然而行不敢有輿馬是何也非不欲也幾不長慮顧後而恐無以繼之故也於是又節用禦欲收斂畜藏以繼, WYG: 聽}
  - {type: variant, offset: 1904, length: 0, content: '', krp: 及常藝才公脩而才可謂小儒矣故為小儒也皆矯其不及志安公}
