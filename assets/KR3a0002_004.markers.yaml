  - {type: variant, offset: 960, length: 1, content: 庶, krp: 雅儒者也雅有儒也徳之法先王統禮義一制度以淺持博以古持今以一持萬博也先王當為後王以古持今當以淺持博謂見其淺則可以執持皆傳冩誤也為以今持古苟仁義之類也雖在鳥獸之中若别白黒猶别況在}
