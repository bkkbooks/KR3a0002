  - {type: variant, offset: 202, length: 2, content: 少頃, krp: 舉事無悔其持險應變曲當也其險危其宜當丁浪反持危應變皆曲得與時遷徙與世偃仰設教隨時千舉萬變其道一也是大儒}
  - {type: variant, offset: 205, length: 1, content: 怒, SBCK: 稽也皆歸於治其道一謂於為治一也稽考也考成也也故禹湯文武事跡不同其其窮也俗儒笑之其通也英傑化之嵬􅃈逃之曰傑言英傑之士則倍千人曰英倍萬人則畏}
