  - {type: variant, offset: 962, length: 0, content: '', WYG: 矣倚物怪變所未嘗聞也所未嘗見也卒然起一方則舉統類而應}
  - {type: variant, offset: 962, length: 0, content: '', krp: 矣善類在鳥獸}
  - {type: variant, offset: 963, length: 0, content: '', SBCK: 中倚物怪變}
