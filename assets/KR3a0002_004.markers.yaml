  - {type: variant, offset: 1358, length: 245, content: 君子道其常而小人道其怪也凡人有所一同飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨白黑美惡而耳辨音聲清濁口辨酸鹹甘苦鼻辨芬芳腥臊骨體膚理辨寒暑疾養是又人之所常生而有也是無待而然者也是禹桀之所同也可以為堯禹可以為桀跖可以為工匠可以為農賈在勢注錯習俗之所積爾是又人之所生而有也是無待而然者也是禹桀之所同也為堯禹則常安榮為桀跖則常危辱為堯禹則常愉佚為工匠農賈則常煩勞然而人力為此而寡為彼何也曰陋也堯禹者非生而具者也夫起於變故成乎脩脩之為待盡而後備者也人之生固小, WYG: ''}
