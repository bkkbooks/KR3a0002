  - {type: variant, offset: 183, length: 1, content: 鬭, SBCK: 為學之後則誰能禁我郷也混然涂之人也俄而並乎堯禹豈不賤而貴矣哉知之貎並混然無所涂與途同比也郷音向郷也效門室之辨混然曾不能決也别異猶不能決言所知淺也效白辨别也向}
