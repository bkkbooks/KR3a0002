  - {type: variant, offset: 180, length: 0, content: '', SBCK: 道也君子之所謂賢者非能徧能人之所能之謂也君子之所謂知者非能徧知人之所知之謂也君子之所謂辨者非能徧辨人之所辨之謂也君子之所謂察者非能徧察人之所察之謂也有所正矣徧能或曰正當苟得其正不必於禮義也為止言止相高下視墝􅏂序五種君子不如農人稷豆麥麻序謂不失次序各當土冝也相視也高下原隰也墝薄田也五種黍通財貨相美惡辨貴賤君子不如賈人其貴賤也賈與估視貨物之美惡辨同設䂓矩陳繩墨便備用君子不如工人巧便於備用便備用謂精不䘏是非然不然之情以相薦撙以相恥怍君子不若惠施鄧析也謂相蹈薦藉也陵駕也怍慙也藉撙抑皆謂相若夫謫徳而定次度其徳而定位次謫與商同古字商其徳故下亦有決徳而定次也本或亦多作譎譎與决同謂斷決量能而授官使賢不肖皆得其位能不能皆得其官當其才任使各萬物得其宜事變得其應慎墨不得進其談惠施鄧析不敢竄其察二子之察無竄隠匿也言子皆識也所逃匿君言必治當事必當務是然後君子之所長也凡事行有益於治者立之孟反行下無益於理者廢之夫是之謂中事几知説有益於理者為之無益於理者舎之夫是之謂中説行事失中謂之姦事知説失中謂之姦道姦事姦道治世之所弃而亂世之所從服也若夫充虚之相施易也曰移易謂使充實也施讀虚者實實者虚堅白同異之分隔也分别隔異同異已解以堅白同異之言相也上是聦耳之所不能聽也明目之所不能見也辯士之所不能言也雖有聖人之知未能僂指也反公羊傳曰夫人不僂何休曰僂疾也齊人僂疾也言雖聖人亦不可疾速指陳僂力主也言不知無害為君子知之無損為小人工匠不知無害為巧君子不知無害為治大夫也君子卿王公好之則亂法百姓好之則亂事作業事謂而狂惑戇陋之人乃始率其羣徒辨其談説明其辟稱老身長子不知惡也稱尺證反身老戇愚也辟音譬不知惡之也子長言終身夫是之謂上愚然亦不免於愚故曰上愚有偏僻之見非昧然無知曾不如好相鷄狗之可以為名也之名尚不如有惠施鄧析之名也相鷄狗詩曰為􅀑為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也蜮也則汝誠不可得見也姡然有面目女乃人也人相視無有詩小雅何人斯之篇毛云蜮短狐也靦姡也鄭云使汝為引此以喻狂惑之人也極時終必與女相見也我欲賤而貴愚而知貧而富可乎曰其唯學乎彼學者行之曰士也為士也士者脩立之彼為儒學者能行則稱敦慕焉君子也慕之敦厚知之聖人也於學也於知之謂通聖人無異也事皆通則與上為聖人下為士君子孰禁我哉使}
