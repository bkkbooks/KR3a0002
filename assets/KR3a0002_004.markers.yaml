  - {type: 'tls:seg', offset: 1905, content: '', id: KR3a0002_tls_004-10a.92}
  - {type: variant, offset: 1905, length: 0, content: '', SBCK: 安脩知通統類如是}
  - {type: variant, offset: 1905, length: 0, content: '', krp: 安脩知通統類如是}
  - {type: variant, offset: 1906, length: 3, content: 湯武在, SBCK: 可謂大儒矣大儒者天子三公也者之佐也其才堪王小儒者諸侯大夫士也衆人者工農商賈也禮者人主之所以為羣臣寸尺尋丈檢式也人倫盡矣束檢儒可為天子三公小儒可為諸侯大夫禮可以緫統羣臣人主也式法也度也尺寸尋丈所以知長短也檢束所以制放佚大等也言人道荖盡於禮也之柄也倫當為論或曰倫君子言有壇宇行有防表道有一隆壇宇屋累土為防表謂有標准也一隆謂厚於一不以異端亂之也邊也防隄防表標也言有壇宇謂有所尊高也行有言道徳之求不下於安存道徳之求故誤重寫耳故下此道徳或當為政治以下有治來求則以安存國家已}
