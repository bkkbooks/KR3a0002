  - {type: variant, offset: 70, length: 1, content: 凡, SBCK: 窮閻窮僻之處閻里門仲尼将為魯司寇寇也魯司沈猶氏不敢朝飲其羊公愼氏出其妻慎潰氏踰境而徙魯皆不制慎潰氏奢侈踰法魯之粥六畜者飾之以詣賈人家語曰沈猶氏常朝飲其羊以詐市人公慎氏妻淫魯之粥牛馬者不豫賈必蚤正以待之也定為豫賈正其身以待物故得從化如此賈讀為價高價也粥牛馬者不敢高價言仲尼必先居於闕黨闕黨之子弟罔不分有親者取多閒居闕黨居謂孔子均之中有父母者取其多也之子弟罔不分均有無於分孝弟以化之也以孝弟由孔子之化儒者}
