  - {type: variant, offset: 200, length: 0, content: '', SBCK: 無百里之地則無所見其功輿固馬選矣而不能以至逺一日而千里則非造父也弓調矢直矣而不能以射逺中微則非羿也又中微細之物也善射者既能及逺用百里之地而不能以調一天下制強暴則非大儒也彼大儒者雖隠於窮閻漏屋無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容成名況乎諸侯莫不願得以為臣二子篇已解非十用百里之地而千里之國莫能與之爭勝笞捶暴國齊一天下而莫能傾也是大儒之徴也徵驗也傾危也其言有類其}
