markers:
  front:
  - {type: variant, offset: 0, length: 2, content: 榮辱, SBCK: 荀子卷第四登仕郎守大理評事揚倞儒效}
  - {type: page-break, offset: 0, content: '', id: KR3a0002_SBCK_004-1a}
  - {type: variant, offset: 0, length: 1, content: 榮, WYG: 貴敬故曰貴名不可以比周爭也不可以夸誕有也不可以勢重脅也必将誠此然後就也貴名人所貴儒學之名此身也爭之則失譲之則至遵道則積夸誕則虚遵道則自委積夸誕則尤益空虚故君子務脩其内而譲之於外務積徳於身而處之以遵道如是則貴名起之如日月天下應之如雷霆衆應之聲如雷故曰君子隠而顯微而明辭讓而勝詩曰鶴鳴于九臯聲聞于天此之謂也詩小雅鶴鳴之篇毛云臯澤也言身隠而名著鄭云臯澤中水溢出所為坎自外數至九喻深逺也鄙夫反是比周而譽俞少鄙爭而名俞}
  - {type: page-break, offset: 0, content: '', id: KR3a0002_WYG_004-8a, image: WYG0695/WYG0695-0155a.png}
  - {type: variant, offset: 0, length: 2, content: 榮辱, krp: 荀子卷第四登仕郎守大理評事揚倞儒效}
  body:
  - {type: 'tls:seg', offset: 0, content: '', id: KR3a0002_tls_004-1a.1}
  - {type: xml-element, offset: 0, content: '', id: KR3a0002_tls_004-bkkxmlele1}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 煩勞以求安利其身俞危俞讀為愈詩曰民之無良相怨一方受爵不譲至于已斯亡此之謂也詩小雅角弓之}
  - {type: variant, offset: 3, length: 1, content: 第, WYG: 引此以明不責已而怨人故能小而事大辟之是猶力之少而任重也􅃕粹折無適也舍除也粹讀為碎除碎折之外無所之適言必碎折身不肖而誣賢是猶傴伸而好升高也指其頂者愈衆傴僂也伸讀為身字之誤也傴身之人而彊升高則頭頂尤低屈故指而笑之者愈衆故明主譎徳而序位所以為不亂也忠臣誠能然後敢受職所以為不窮也分不亂於上能不窮於下治辯之極也不亂謂皆當其序不窮謂通於其職列也言儒為治辯之極也詩曰平平左右亦是率從是言上下之交不相亂也詩小雅采菽之篇毛云平平辨治也交謂上下相交接也以容俗為善以貨財為寳以養生為已至道是民徳也養生為已至道謂荘生之徒民徳言不知禮義也行法至堅不以私欲亂所聞如是則可謂勁士矣行法至堅好脩正其所聞以撟飾其情性行法謂行有法度行下孟反撟與矯同其言多當矣而未諭也其行多當矣而未安也其知慮多當矣而未周密也未諭謂未盡曉其義未安謂未得如天性安行之也周密謂盡善也上則能大其所隆下則能開道不已若者如是則可謂篤厚君子矣脩百王之法若辨白黒應當時之變若數一二如數一二之易行禮要節而安之若生}
  - {type: page-break, offset: 3, content: '', id: KR3a0002_WYG_004-8b, image: WYG0695/WYG0695-0155b.png}
  - {type: page-break, offset: 3, content: '', id: KR3a0002_WYG_004-9a, image: WYG0695/WYG0695-0155c.png}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 八也效功大儒之效武王崩成王幼周公屏成王而及武王以屬天下惡天下之倍周也繼屬續屏蔽及欲反也屬之履天下之籍之圖籍也籍謂天下聽天下之斷偃然如固有之而天下不稱貪焉固有之謂如偃然猶安然此位也固合有殺管叔虚殷國而天下不稱戾焉讀虚遷殷頑民于洛邑朝歌爲墟也爲墟戾暴也墟殷國謂殺武庚兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉之國者十有五人姬姓之國者}
  - {type: page-break, offset: 4, content: '', id: KR3a0002_SBCK_004-1b}
  - {type: variant, offset: 4, length: 0, content: '', krp: 八也效功大儒之效武王崩成王幼周公屏成王而及武王以屬天下惡天下之倍周也繼屬續屏蔽及欲反也屬之履天下之籍之圖籍也籍謂天下聽天下之斷偃然如固有之而天下不稱貪焉固有之謂如偃然猶安然此位也固合有殺管叔虚殷國而天下不稱戾焉讀虚遷殷頑民于洛邑朝歌爲墟也爲墟戾暴也墟殷國謂殺武庚兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉之國者十有五人姬姓之國者}
  - {type: xml-element, offset: 5, content: '', id: KR3a0002_tls_004-bkkxmlele2}
  - {type: xml-element, offset: 5, content: '', id: KR3a0002_tls_004-bkkxmlele3}
  - {type: xml-element, offset: 5, content: '', id: KR3a0002_tls_004-bkkxmlele4}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3a0002_tls_004-1a.3}
  - {type: variant, offset: 5, length: 2, content: 憍泄, SBCK: 十人皆舉親也與此數左氏傳成鱄對魏獻子曰昔武王克商光有天下其兄弟建親戚以蕃周室管蔡郕霍魯衛毛耼郜雍曹滕畢原鄷郇略同言四十人蓋舉成數又曰昔周公弔二叔之不咸故封胙祭周公之􅅌也餘國名淺學難盡詳究文之昭也䢴晉應韓武之穆也凡蒋邢茅教誨開導成王使諭於道而能揜迹於文武通導逹揜開導謂開也襲周公歸周黒肩蓋其後也言周公自歸其國也周公所封畿内之國亦名周春秋周公反籍於成王而天下不輟事周然而周公北面而朝之臣明攝政非為已也待其固安之後北面為天子也}
  - {type: page-break, offset: 5, content: '', id: KR3a0002_SBCK_004-2a}
  - {type: variant, offset: 5, length: 3, content: 憍泄者, WYG: 肢要邀也節節文也言安於禮節若身之生四枝不以造物為也要一遙反下要時同要時立功之巧若詔四時邀時立功之巧謂不失機權若天告四時使成萬物也平正和民之善億萬之衆而博若一人如是則可謂聖人矣雖博雜衆多如理一}
  - {type: page-break, offset: 5, content: '', id: KR3a0002_WYG_004-9b, image: WYG0695/WYG0695-0155d.png}
  - {type: variant, offset: 5, length: 2, content: 憍泄, krp: 十人皆舉親也與此數左氏傳成鱄對魏獻子曰昔武王克商光有天下其兄弟建親戚以蕃周室管蔡郕霍魯衛毛耼郜雍曹滕畢原鄷郇略同言四十人蓋舉成數又曰昔周公弔二叔之不咸故封胙祭周公之胤也餘國名淺學難盡詳究文之昭也䢴晉應韓武之穆也凡蒋邢茅教誨開導成王使諭於道而能揜迹於文武通導逹揜開導謂開也襲周公歸周黒肩蓋其後也言周公自歸其國也周公所封畿内之國亦名周春秋周公反籍於成王而天下不輟事周然而周公北面而朝之臣明攝政非為已也待其固安之後北面為天子也}
  - {type: punctuation, offset: 8, content: 、, id: KR3a0002_tls_004-bkkpn1}
  - {type: 'tls:seg', offset: 8, content: '', id: KR3a0002_tls_004-1a.4}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 不可以少當也當此位也不可少頃不可以假攝為也頃假攝天子周公所以少以安周室也之位蓋權宜能則天下歸之不能則天下去之是以周公屏成王而及武王以屬天下惡天下之離周也成王冠成人周公歸周反籍焉明不滅主之義也周公無天下矣郷有天下今無天下非擅也禪同言非禪譲與成郷讀為向下同擅與也王成王郷無天下今有天下非奪也變勢次序節然也序之期如此也節期也權變次故以枝代主而非越也弟故曰枝主成王也枝枝子周公武王之以弟誅兄而非暴也周公之兄也謂殺管叔管叔君臣易位而非不順也然故易位時不得不不順非為因天下之和遂文武之業明枝主之義抑亦變化矣天下厭然猶一也貌一渉反厭然順從之非聖人莫之能為夫是謂大儒之效秦昭王問孫卿子曰儒無益於}
  - {type: page-break, offset: 8, content: '', id: KR3a0002_SBCK_004-2b}
  - {type: variant, offset: 8, length: 0, content: '', krp: 不可以少當也當此位也不可少頃不可以假攝為也頃假攝天子周公所以少以安周室也之位蓋權宜能則天下歸之不能則天下去之是以周公屏成王而及武王以屬天下惡天下之離周也成王冠成人周公歸周反籍焉明不滅主之義也周公無天下矣郷有天下今無天下非擅也禪同言非禪譲與成郷讀為向下同擅與也王成王郷無天下今有天下非奪也變勢次序節然也序之期如此也節期也權變次故以枝代主而非越也弟故曰枝主成王也枝枝子周公武王之以弟誅兄而非暴也周公之兄也謂殺管叔管叔君臣易位而非不順也然故易位時不得不不順非為因天下之和遂文武之業明枝主之義抑亦變化矣天下厭然猶一也貌一渉反厭然順從之非聖人莫之能為夫是謂大儒之效秦昭王問孫卿子曰儒無益於}
  - {type: variant, offset: 10, length: 1, content: 殃, SBCK: 國宣漢以荀卿爲孫卿}
  - {type: variant, offset: 10, length: 1, content: 殃, WYG: 少井井兮其有條理}
  - {type: variant, offset: 10, length: 1, content: 殃, krp: 國宣漢以荀卿爲孫卿}
  - {type: punctuation, offset: 12, content: ，, id: KR3a0002_tls_004-bkkpn2}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3a0002_tls_004-1a.5}
  - {type: variant, offset: 12, length: 2, content: 恭儉, SBCK: 帝名詢劉向編録故孫卿子曰儒}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 井兮良易之貌有條理也嚴嚴兮其能敬已也嚴兮有威重之貎能敬已不可以干非禮也嚴或為儼分分兮其有終始也事各當其分即無雜亂故能有終始分扶問反厭厭兮其能長久也厭足也亂生於不足故知足然後能長久樂樂兮其執道不殆也殆危炤炤兮其用知之明也炤炤明見之貌炤與照同脩脩兮其用統類之行也脩脩整齊之貌統類綱紀也言事不乖悖也綏綏兮其有文章也綏綏安泰之貌綏或為葳蕤之貎熈熈兮其樂人之臧也熈熈和樂之貎隱隱兮其恐人之不當也隱隱憂戚貌恐人皆行事不當理此已上之論大儒之徳也如是則可謂聖人矣此其道出乎一曷謂一曰執神而固執持精神堅固曷謂神曰盡善挾洽之謂神萬物莫足以傾之之謂固挾讀為浹浃周洽也神固之謂聖人聖人也者道之管也天下之道管是矣百王之道一是矣管樞要也是是儒學故詩書禮樂之歸是矣詩言是其志也是儒之志書言是其事也禮言是其行也樂言是其和也春秋言是其微也微謂儒之微㫖一字為褒貶微其文隠其義之類是也故風之所以為不逐者取是以節之也風國風逐流蕩也國風所以不随荒暴之君而流蕩者取聖人之儒道以節之也詩序曰變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也小雅之所以為小雅者取是而文之也雅正也文飾也大雅之所以為大雅者取是而光之也頌之所以為至者取是而通之也至謂盛徳之極天下之道畢矣鄕是者臧倍是者亡鄕是如不臧倍是如不亡者自古及今未嘗有也是皆謂儒也鄕讀為向客有道曰孔子曰周公其盛乎言其徳盛身貴而愈}
  - {type: page-break, offset: 12, content: '', id: KR3a0002_WYG_004-10a, image: WYG0695/WYG0695-0156a.png}
  - {type: page-break, offset: 12, content: '', id: KR3a0002_WYG_004-10b, image: WYG0695/WYG0695-0156b.png}
  - {type: variant, offset: 12, length: 2, content: 恭儉, krp: 帝名詢劉向編録故孫卿子曰儒}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 家富而愈}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 勝敵而愈戒戒備也言勝敵而益戒備荀卿之時有客説孔子之言如此應之曰是殆非周公之行非孔子之言武王崩成王㓜周公屏成王而及武王履天子之籍負扆而坐户牖之間謂之扆諸侯趨走堂下當是時也夫又誰為恭矣哉兼制天下立七十一國姬姓獨居五十三人焉周之子孫苟不狂惑}
  - {type: page-break, offset: 14, content: '', id: KR3a0002_WYG_004-11a, image: WYG0695/WYG0695-0156c.png}
  - {type: punctuation, offset: 15, content: 、, id: KR3a0002_tls_004-bkkpn3}
  - {type: 'tls:seg', offset: 15, content: '', id: KR3a0002_tls_004-1a.6}
  - {type: variant, offset: 15, length: 3, content: 偋五兵, SBCK: 法先王隆禮義謹乎臣子而致貴其上者也謂使不敢謹乎臣子極也為非致人主用之則勢在本朝而宜權勢在本言儒者得合宜也朝則事皆不用則退編百姓而慤必為順下矣勃亂也必不為雖窮困凍餧必不以邪道為貪無置錐之地而明於持社稷之大義嗚呼而莫之能應然而通乎財萬物養百姓之經紀亦不怠惰困弃常通於裁萬物養百姓之綱紀也嗚呼嘆辭也財與裁同雖嘆其莫已知無應之者而勢在人上則王公之材也為人君也在人之上謂在人下則社禝之臣國君之寳}
  - {type: page-break, offset: 15, content: '', id: KR3a0002_SBCK_004-3a}
  - {type: page-break, offset: 15, content: '', id: KR3a0002_SBCK_004-3b}
  - {type: variant, offset: 15, length: 1, content: 偋, WYG: 莫不為天下之顯諸侯孰謂周公儉哉武王之誅紂也行之日以兵忌武王發兵日以兵家所忌之日東面而迎太歲迎謂逆太歲也尸子曰武王伐紂魚辛諫曰歲在北方不北征武王不從至汜而汜至懷而懷汜水名懐地名書曰覃懐底績孔安國曰覃懐近河地名謂至汜而適遇水汎漲而至懐又河水汎溢也吕氏春秋曰武王伐紂天雨日夜不休汜音祀至共頭而山隧共河内縣名共頭蓋共縣之山名隧謂山石崩摧也隧讀為墜共音恭霍叔懼曰出三日而五災至無乃不可乎霍叔武王弟也出行也周居豐鎬軍出三日未嘗至共蓋文王三分天下有其二境上已近於洛矣或曰至汜之後三日也周公曰刳比干而囚箕子飛廉惡來知政夫又惡有不可焉比干紂賢臣箕子紂諸父箕國名子爵也飛廉惡來皆紂之嬖臣飛廉善走惡來有力也遂選馬而進選揀擇也朝食於戚暮宿於百泉杜元凱云戚衛邑在頓丘衛縣西百泉蓋近朝歌地名左氏傳曰晉人敗范氏于百泉厭旦於牧之野厭掩也夜掩於旦謂未明已前也厭於甲反鼓之而紂卒易鄕倒戈而攻鄕讀曰向後也遂乗殷人而進誅紂乗其倒戈之勢蓋殺者非周人因殷人也非周人殺之因殷倒戈之勢自殺之也故無首虜之獲無蹈難之賞周人無立功受賞者反而定三革偃}
