  - {type: variant, offset: 2087, length: 362, content: 是於己長慮顧後幾不甚善矣哉今夫偷生淺知之屬曾此而不知也食太侈不顧其後俄則屈安窮矣是其所以不免於凍餓操瓢囊為溝壑中瘠者也況夫先王之道仁義之統詩書禮樂之分乎彼固天下之大慮也將為天下生民之屬長慮顧後而保萬世也其流長矣其溫厚矣其功盛姚遠矣非順孰脩為之君子莫之能知也故曰短綆不可以汲深井之泉知不幾者不可與及聖人之言夫詩書禮樂之分固非庸人之所知也故曰一之而可再也有之而可久也廣之而可通也慮之而可安也反鉛察之而俞可好也以治情則利以為名則榮以群則和以獨則足樂意者其是邪夫貴為天子富有天下是人情之所同欲也然則從人之欲則勢不能容物不能贍也故先王案為之制禮義以分之使貴賤之等長幼之差知賢愚能不能之分皆使人載其事而各得其宜然後使穀祿多少厚薄之稱是夫群居和一之道也故仁人在上則農以力盡田賈以察盡財百工以巧盡械器士大夫以上至於公侯莫不以其仁厚知能盡官職, WYG: ''}
