  - {type: variant, offset: 963, length: 0, content: '', krp: 中倚物怪變}
  - {type: variant, offset: 964, length: 0, content: '', SBCK: 未甞聞也所未甞見也卒然起一方則舉統類而應之無所儗㤰卒千忽反儗讀為疑㤰與怍同倚竒也韓詩外傳作竒物怪變其統類故舉}
  - {type: page-break, offset: 964, content: '', id: KR3a0002_SBCK_004-17b}
  - {type: variant, offset: 964, length: 0, content: '', WYG: 儗㤰倚竒也韓詩外傳作竒物怪變卒于忽反儗讀為疑㤰與怍同竒物怪變卒然而起人所難處者大儒知其統類故舉}
  - {type: variant, offset: 964, length: 0, content: '', krp: 未甞聞也所未甞見也卒然起一方則舉統類而應之無所儗㤰卒千忽反儗讀為疑㤰與怍同倚竒也韓詩外傳作竒物怪變其統類故舉}
  - {type: variant, offset: 965, length: 5, content: 取煖衣飽食, SBCK: 應之無所疑滯慙怍也竒物怪變卒然而起人所難處者大儒知張法而度之則晻然若合符節是大儒者也故開張其法既無所疑怍同符節相合之物也周禮門關用符節蓋以全竹為之割之以測度之則晻然如合符節言不差錯也度大各反晻與暗合之爲驗也為兩各執其一故人主用俗人則萬乗之國亡利故土也不義而好用俗儒則萬乗之國存存僅用雅儒則千乗之國安用大儒則百里之地久多患小國可以}
  - {type: page-break, offset: 965, content: '', id: KR3a0002_SBCK_004-18a}
  - {type: variant, offset: 965, length: 5, content: 取煖衣飽食, WYG: 應之無所疑滯慚怍也張法而度之則晻然若合符節是大儒者也既無所疑怍故開張其法以測度之則晻然如合荷節言不差錯也度大各反晻與暗同符節相合之物也周禮門關用符節蓋以全竹為之剖之為兩各執其一合之以為驗也故人主用俗人則萬乗之國亡不義而好利故亡也用俗儒則萬乗之國存僅存用雅儒則千乗之國安用大儒則百里之地久外國多患難用大儒然後可以}
  - {type: page-break, offset: 965, content: '', id: KR3a0002_WYG_004-15b, image: WYG0695/WYG0695-0158d.png}
