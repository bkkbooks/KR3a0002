  - {type: variant, offset: 185, length: 1, content: 忘, krp: 明白門室之俄而原仁義分是非圖回天下於掌上而辨白黒豈不愚而知矣哉言圖謀運轉天下之事如在掌上也原夲也謂知仁義之本圖謀也囘轉也郷也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉鏁相聮相繫漢書所謂鋃鐺者胥靡刑徒人也胥相靡繫也謂而服役之猶今囚徒以鏁連枷也也舉皆也顔師古曰聮繫使相隨今有人於此㞕然藏千溢之寳雖行貣而食人謂之富矣然㞕貴敬之此故人尊故曰貴名不可以比周爭也不可以夸誕有也不可以勢重脅也必將誠此然後就也學之名此身也貴名人所貴儒爭之則失讓之則至遵道則積夸誕則虚誕則尤益空虚也遵道則自委積夸故君子務脩其内而讓之於外務積徳於身而處之以遵道如是則貴名起如日月天下應之如雷霆聲如雷衆應之故曰君子隠而顯微而明辭讓而勝詩曰鶴鳴于九臯聲聞于天此之謂也而名箸也鄭云臯澤中水溢岀所爲坎詩小雅鶴鳴之篇毛云臯澤也言身隠喻深逺也自外數至九鄙夫反是比周而譽俞少鄙爭而名俞辱煩勞以求安利}
  - {type: variant, offset: 188, length: 0, content: '', SBCK: 而俞危讀俞愈為詩曰民之無良相怨一方受爵不讓至于已斯亡此之謂也以明不責已而怨人詩小雅角弓之篇引此故不能小而事大辟之是猶力之少而任重也􅃕粹折無適也之外無所之適言必碎折舍除也粹讀為碎除碎折身不肖而誣賢是猶傴身而好升高也指其頂者愈衆頭頂尤低屈故指而笑者愈衆傴傴僂也傴身之人而強昇高則故明主譎徳而序位所以為不亂也忠臣誠能然後敢受職所以為不窮也分不亂於上能不窮於下治辨之極也不窮謂通於其職不亂謂皆當其序治辨之極也列也言儒為詩曰平平左右亦是率從是言上下之交不相亂也平辯治也交謂上下相交詩小雅采菽之篇毛云平也接以從俗為善以貨財為寳以養生為已至道是民徳也徒民徳言不知禮義也養生為已至道謂莊生之行法至堅不以私欲亂所聞如是則可謂勁士矣行法至堅好脩正其所聞以橋飾其情性下孟反橋與矯同行法謂行有法度行其言多當矣而未諭也其行多當矣而未安也其知慮多當矣而未周密也如天性安行之也周密謂盡善也未喻謂未盡曉其義未安謂未得上則能大其所隆下則能開道不已若者如是則可謂篤厚君子矣脩百王之法若辨白黒應當世之變若數一二二之易如數一行禮要節而安之若生四枝生四枝不以造作為也要一遙反及下要邀也節節文也言安於禮節若身之同要時要時立功之巧若詔四時謂不失機權若邀時立功之巧成萬物也天告四時使平正和民之善億萬之衆而博若一人如是則可謂聖人矣理一人之少也雖博雜衆多如井井兮其有理也貌理有條理也井井兮良易之嚴嚴兮其能敬已也不可以干非禮也嚴或為儼嚴嚴兮有威重之貌能敬已分分兮其有終始也故能有終始分扶問反事各當其分即無雜亂猒猒兮其能長久也知足然後能長久也猒足也亂生於不足故樂樂兮其執道不殆也也殆危炤炤兮其用知之明也貌炤與照同炤炤明見之脩脩兮其用統類之行也紀也言事不乖悖也脩脩整齊之貌統類綱綏綏兮其有文章也或為葳蕤之貌綏綏安泰之貌綏熈熈兮其樂人之臧也樂之貌熈熈和隱隱兮其恐人之不當也憂戚隱隱以上皆論大儒之徳也貌恐人之行事不當理此如是則可謂聖人矣此其道出乎一曷謂一曰執神而固神堅固執持精曷謂神曰盡善挾洽之謂神萬物莫足以傾之之謂固浹周洽也挾讀為浹神固之謂聖人聖人也者道之管也天下之道管是矣百王之道一是矣是是儒學管樞要也故詩書禮樂之歸是矣詩言是其志也之志是儒書言是其事也禮言是其行也樂言是其和也春秋言是其微也謂微其文隠其義之類是也儒之微㫖一字為襃貶微故風之所以為不逐者取是以節之也暴之君而流蕩者取聖人之儒道以風國風逐流蕩也國風所以不隨荒乎情人之性也止乎禮義先王之澤也節之也詩序曰變風發乎情止乎禮義發小雅之所以為小者取是而文之也文飾也雅正也大雅之所以為大者取是而光之也文飾也雅正也頌之所以為至者取是而通之也徳之極至謂盛天下之道畢是矣郷是者臧倍是者亡郷是如不臧倍是如不亡者自古及今未甞有也郷讀曰向是皆謂儒也客有道曰孔子曰周公其盛乎徳盛言其身貴而愈恭家富而愈儉勝敵而愈戒言勝敵戒備也客説孔子之言如此而益戒備荀卿之時有應之曰是殆非周公之行非孔子之言也武王崩成王幼周公屏成王而及武王履天子之籍負扆而坐牖户之扆之間謂諸侯趨走堂下當是時也夫又誰為恭矣哉兼制天下立七十一國姬姓獨居五十三人焉周之子孫苟不狂惑者莫不為天下之顯諸侯孰謂周公儉哉武王之誅紂也行之日以兵忌家所忌之日武王發兵以兵東面而迎太歲諫曰歲在北方不北征武王不從迎謂逆太歲尸子曰武王伐紂魚辛至汜而汎至懷而壞河地名謂至汜而適遇水汎漲而至懐又河水汎汜水名懐地名書曰覃懐底績孔安國曰覃懐近紂天雨日夜不休汜音溢也吕氏春秋曰武王伐至共頭而山隧頭蓋共縣之山共河内縣名共隧讀為墜共音恭名隧謂山石崩摧也霍叔懼曰出三日而五災至無乃不可乎未當至共蓋文王三分天下有其二境土已霍叔武王弟也出行也周居豐鎬軍出三日汜之後三日也近於洛矣或曰至周公曰刳比干而囚箕子飛廉惡來知政夫又惡有不可焉父箕國名子爵也飛廉比干紂賢臣箕子紂諸廉善走惡來有力也惡來皆紂之嬖臣飛遂選馬而進擇也選􅂤朝食於戚暮宿乎百泉近朝歌地名左氏傳曰晉人敗范氏于百杜元凱云戚衛邑在頓丘衛縣西百泉蓋泉厭且於牧之野明已前也厭於申反厭掩也夜掩於且謂未鼓之而紂卒易郷也郷讀曰向倒戈而攻後遂乗殷人而誅紂其倒乗乗勢戈之蓋殺者非周人因殷人也倒戈之勢自殺之非周人殺之因殷故無首虜之獲無蹈難之賞功受賞者周人無立反而定三革偃五兵牛也考功記曰凾人為甲犀甲七屬兕甲定息偃仆也皆不用之義三革犀也兕也五兵矛㦸􅃏楯弓矢國語説齊􅁊定三革偃五刃韋昭云三六屬合甲五屬穀梁傳曰天子救日置五麾陳五兵范寗云刀劒矛㦸矢也革甲胄盾也五刃合天下立聲樂下諸侯歸一統也合天下謂合㑹天於是武象起而韶護廢矣名武亦周頌篇名詩序曰武象周武王克殷之後樂殷樂名左氏傳曰吳季札見舞韶護者蓋殷時兼用舜樂武武奏大武也禮記曰下管象朱干玉戚以冕而舞大武韶護之也王廢四海之内莫不變心易慮以化順之故外闔不閇扇也闔門跨天下而無蘄天下而無求言自跨越也蘄求也越之不待求也足也亦人皆與當是時也夫又誰為戒矣哉平太誰備戒如此復造父者天下之善御}
