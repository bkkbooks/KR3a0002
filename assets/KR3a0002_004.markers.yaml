  - {type: 'tls:seg', offset: 185, content: '', id: KR3a0002_tls_004-3a.3}
  - {type: variant, offset: 185, length: 1, content: 忘, SBCK: 明白門室之俄而原仁義分是非圖回天下於掌上而辨白黒豈不愚而知矣哉言圖謀運轉天下之事如在掌上也原夲也謂知仁義之本圖謀也囘轉也郷也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉鏁相聮相繫漢書所謂鋃鐺者胥靡刑徒人也胥相靡繫也謂而服役之猶今囚徒以鏁連枷也也舉皆也顔師古曰聮繫使相隨今有人於此㞕然藏千溢之寳雖行貣而食人謂之富矣然㞕貴敬之此故人尊故曰貴名不可以比周爭也不可以夸誕有也不可以勢重脅也必將誠此然後就也學之名此身也貴名人所貴儒爭之則失讓之則至遵道則積夸誕則虚誕則尤益空虚也遵道則自委積夸故君子務脩其内而讓之於外務積徳於身而處之以遵道如是則貴名起如日月天下應之如雷霆聲如雷衆應之故曰君子隠而顯微而明辭讓而勝詩曰鶴鳴于九臯聲聞于天此之謂也而名箸也鄭云臯澤中水溢岀所爲坎詩小雅鶴鳴之篇毛云臯澤也言身隠喻深逺也自外數至九鄙夫反是比周而譽俞少鄙爭而名俞辱煩勞以求安利}
