  - {type: variant, offset: 1724, length: 1, content: 在, WYG: 士已上之事言道徳之求不二後王道徳教化也人以教化來求則言當時之切所宜施行之事不二後王師告而以逺古也舍後王而言逺古是二也道過三代謂之蕩道過三代已前事以久逺則為浩蕩難信也法二後王謂之不雅雅正也其治法不論當時之事而廣説逺古則為不正也高之下之小之臣之不外是矣臣當為巨雖高下小大不出}
