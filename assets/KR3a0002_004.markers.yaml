  - {type: variant, offset: 1858, length: 0, content: '', SBCK: 也人無師法則隆情矣有師法則隆性矣所欲厚於性謂本於善也隆厚也厚於情謂恣其情之而師法者所得乎情非所受乎性不足以獨立而治怒愛惡情謂喜性不足獨立而治必在因外情而化之或曰情當為積所外物所感者也言師法之於人得於外情非天性所受故則不可獨立而治必在化之也得乎積習非受於天性既非天性性也者吾所不能為也然而可化也也必在化而為之一也言天性非吾自能爲情也者非吾所有也然而可為乎然可以外物誘而為言情非吾天性所有曰非吾所有雖非所有然而可為之也之或曰情亦當為積積習與天然有殊故注錯習俗所以化性也也錯千故反注錯猶措置并一而不二所以成積也師法二謂異端并讀為併一謂習俗移志安久移質俗則移習以為久則移本質其志安之既并一而不二則通於神明參於天地矣故積土而為山積水而為海旦暮積謂之嵗至高謂之天至下謂之地宇中六指謂之極逺則為六極言積近以成逺六指上下四方也盡六指之涂之人百姓積善而全盡謂之聖人彼求之而後得為之而後成積之而後髙盡之而後聖故聖人也者人之所積也行委積言其徳人積耨耕而為農夫積斵削而為工匠積反貨而為商賈為販反讀積禮義而為君子工匠之子莫不繼事而都國之民安習其服風之衣服安習其土居楚而楚居越而越居夏而夏夏夏中是非天性也積靡使然也積習故能然靡順也順其故人知謹注錯愼習俗}
