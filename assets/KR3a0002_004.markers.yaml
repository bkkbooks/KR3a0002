  - {type: variant, offset: 1616, length: 2, content: 生固, WYG: 大寳也無師法者人之大殃也人無師法則隆情矣有師法則隆性矣隆厚也厚於情謂恣其情之欲厚於性謂夲於善也而師法者所得乎情非所受乎性不足以獨立而治情謂喜怒愛惡外物所感者也言師法之於人得於外情非天性所受故性不足獨立而治必在因外情而化之或曰情當為積所得乎積習非及於天性既非天性則不可獨立而治必在化之也性也者吾所不能為也然而可化也言天性非吾自能為也必在化而為之也情也者非吾所有也然而可為乎言情非吾天性所有然可以外物誘而為之或曰情亦當為積積習與天然有殊故曰非吾所有雖非所有然而可為之也注錯習俗所以化性也注錯猶措置也錯千故反并一而不貳所以成積也并讀為併一謂師法貳謂異端習俗移志安久移質習以為俗則移其志安之既久則移夲質并一而不貳則通於神明參於天地矣故積土而為山積水而為海旦暮積謂之嵗至高謂之天至下謂之地宇中六指謂之極六指上下四方也盡六指之逺則為六極言積近以成逺塗之人百姓積善而全盡謂之聖人彼求之而後得為之而後成積之而後高盡之而後聖故聖人也者人之所積也言其徳行委積人積耨耕而為農夫積斵削而為工匠積反貨而為商賈反讀為販積禮義而為君子工匠之子莫不繼事而都國之民安習其服安習其土風之衣服居楚而楚居越而越居夏而夏謂中夏是非天性也積靡使然也靡順也順其積習故能然故人知謹注錯愼習俗大積靡則為君子矣大積靡謂以順積習為也縱情性而不足問學則為}
