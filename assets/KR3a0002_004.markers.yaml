  - {type: variant, offset: 1620, length: 1, content: 又, WYG: 矣為君子則常安榮矣為小人則常危辱矣凡人莫不欲安榮而惡危辱故唯君子為能得其所好小人則日徼其所惡徼與邀同招也於宵反詩曰維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒此之謂也詩大雅桑柔之篇迪進也言厲王有此善人不求而進用之忍害為惡之人反顧念而重復之故天下之民貪亂安然為荼毒之行由王使之然也人論論人之善惡論盧困反志不免於曲私而冀人之}
