  - {type: variant, offset: 205, length: 1, content: 怒, krp: 稽也皆歸於治其道一謂於為治一也稽考也考成也也故禹湯文武事跡不同其其窮也俗儒笑之其通也英傑化之嵬瑣逃之曰傑言英傑之士則倍千人曰英倍萬人則畏}
  - {type: 'tls:seg', offset: 206, content: '', id: KR3a0002_tls_004-3a.7}
  - {type: variant, offset: 207, length: 1, content: 喪, SBCK: 逃去之也慕而化之狂怪之人邪説畏之衆人愧之非其所為衆人初皆媿也媿或爲貴成功之後故自通則一天下窮則獨立貴名名儒天不能死地不能埋桀跖之世不能汙非大儒莫之能立仲尼子弓是也故有俗人者有俗儒者有雅儒者有大儒者之異也辨儒者有不學問無正義以富利為隆是俗人者也逢衣淺帶解果其冠韓詩外傳作逢衣博逢大也淺帶博帶也解果陿隘也左思魏都賦曰風俗以韰倮為嫿韰音下帶言帶博則約束衣服者淺故曰淺帶解果未詳或曰曰臣笑鄰國之祠田以一壺酒三鮒魚祝曰蟹螺者宜介反倮音果嫿音獲靜好也或曰説苑涥于髠謂齊王蓋亦比之謂強爲儒服而無其實也禾汙邪者百車蟹螺蓋髙地也今冠略法先王而足亂世術世法韓詩外傳作略法先王而不足於亂世略粗也粗法先王之遺言不知大體故足以亂繆學雜舉不知法後王而一制度不知隆禮義而殺詩書制度是一也若妄引上古不合於時後王後世之王夫隨當時之政而立法韓詩外傳作不知法先王也制度亂矣故仲尼脩春秋盡用周其衣冠行偽己同於世俗矣然而不知惡者衣淺帶之比行偽衣冠即上所云逢行下孟反謂行僞而堅其言議談説已無所以異於墨子矣然而明不能分别呼先王以欺愚者而求衣食焉稱舉呼謂得委積足以揜其口則揚揚如也意之貌揚揚得隨其長子事其便辟舉其上客然若}
