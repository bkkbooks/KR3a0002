  - {type: variant, offset: 19, length: 0, content: '', WYG: 皆不用之義三革犀也兕也牛也考工記曰函人為甲犀甲七屬兕甲六屬合甲五屬穀梁傳曰天子救日置五麾陳五兵范寗云五兵矛㦸鉞揗弓矢國語説齊桓定三革偃五刃韋昭云三革甲胄盾也五刃刀劒矛㦸矢也合天下立聲樂合天下謂合㑹天下諸侯歸一統也於是武象起而韶濩廢矣武象周武王克殷之後樂名武亦周頌篇名詩序云武奏大武也禮記曰下管象朱干玉戚以冕而舞大武韶濩殷樂名左氏傳曰吴季札見舞韶濩者蓋殷時兼用舜樂武王廢之也四海之内莫不變心易慮以化順之故外闔不閇闔門扉也跨天下而無靳跨越也靳求也越天下而無求言自足也亦人皆與之不待求當是時也夫又誰為戒矣哉太平如此誰復備戒造父者天下之善御者也無輿馬則無所見其能造父周穆王之御者羿者天下之善射者也無弓矢則無所見其巧羿有窮之君逐夏太康而遂簒位者大儒者善調一天下者也無百里之地則無所見其功輿固馬選矣而不能以至逺一日而千里則非造父也弓調矢直矣而不能以射逺中微則非羿也善射者既能及逺又中細微之物用百里之地而不能以調一天下制彊暴則非大儒也彼大儒者雖隠於窮閻漏屋無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容成名況乎諸侯莫不願得以為臣已解非十二子篇用百里之地而千里之國莫能與之爭勝笞棰􅍊國齊一天下而莫能傾也是大儒之徴也傾危徵騐其言有類其行有禮類善也謂比類於善不為狂妄之言其舉事無悔其持險應變曲當險危也持危應變皆曲得其宜當丁浪反與時遷徙與世偃仰随時設教千舉萬變其道一也是大儒之稽也其道一謂皆歸於治也故禹湯文武事跡不同其於為治一也稽考也考成也其窮也俗儒笑之其通也英傑化之嵬瑣逃之倍千人曰英倍萬人曰傑言英傑之士則慕而化之狂怪之人則畏而逃去之邪説畏之衆人愧之衆人初皆非其所為成功之後故自愧也愧或為貴也通則一天下窮則獨立貴名儒名天不能死地不能埋桀跖之世不能汙非大儒莫之能立仲尼子弓是也故有俗人者有俗儒者有雅儒者有大儒者辨儒者之異也不學問無正義以富利為隆是俗人者逢衣淺帶解果其冠逢大也淺帶博帶也韓詩外傳作也逢衣博帶言帶博則約束衣服易故曰淺帶觧果未詳或曰觧果狭隘也左思魏都賦曰風俗以韰惈為嫿韰下界反倮音果嫿音獲静好也或曰説苑淳于髠謂齊王曰臣笑鄰圃之祠田以一壺酒三鮒魚祝曰蠏螺者冝禾汙邪者百車蠏螺蓋髙地也今冠蓋亦比之謂實彊為儒服而無其略法先王而足亂世術略粗也粗法先王之遺言不知大體故足以亂世法韓詩外傳作略法先王而不足於亂世繆學雜舉不知法後王而壹制度不知隆禮義而殺詩書後王後世之王夫随當時之政而平制度是壹也若妄引上古不合於時制度亂矣故仲尼修春秋盡周法韓詩外傳作不知法先王也其衣冠行偽己同於世俗矣然而不知惡者衣冠即上所云逢衣淺帶之比行偽謂行偽而堅行下孟反其言議談説己無異於墨子矣然而明不能分别呼先王以欺愚者而求衣食焉呼謂稱舉得委積足以揜其口則揚揚如也揚揚得意之貌隨其長子事其便辟舉其上客􅀈然若終身之虜而不敢有他志是俗儒者也長子謂君之世子也便辟謂左右小臣親信者也便婢延反辟讀為嬖舉其上客謂褒美其上客冀得其助也􅀈字書無所見蓋環繞囚拘之貌荘子曰睆然在纆繳之中矣法後王一制度隆禮義而殺詩書其言行以有大法矣然而明不能齊}
