  - {type: variant, offset: 170, length: 1, content: 小, SBCK: 君子義信乎人矣通於四海則天下應之如讙讙讙喧也言聲齊應之也以君義通於四海故應之如是何也則貴名白而天下治也可貴白明顯貴名謂儒名故近者歌謳而樂之逺者竭蹶而趨之倒也逺竭蹶顚如不及然者顚倒趨之四海之内若一家通逹之屬莫不從服夫是之謂人師通之處也師長也言儒者之功通逹之屬謂舟車所至人力所為人師長也如此故可以詩曰自西自東自南自北無思不服此之謂也此以明天下皆歸之也詩大雅文王有聲之篇引夫其為人下也如彼其為人上也如此何謂其無益於人之國也昭王曰善先王之道仁人隆也比中而行之謂儒學仁先王之道詭異之説不高不下使賢不肖皆可及也}
