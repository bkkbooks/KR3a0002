  - {type: variant, offset: 1629, length: 0, content: '', WYG: 衆人也溝音寇愚也溝瞀無知也衆人謂衆庶也志忍私然後能公行忍情性然後能脩忍謂矯其性行下孟反知而好問然後能才其智慮不及常好問然後能有才藝公脩而才可謂小儒矣皆矯其不及故為小儒也志安公行安脩知通統類如是則可謂大儒矣大儒者天子之三公也其才堪王者之佐也小儒者諸侯大夫士也衆人者工農商賈也禮者人主之所}
