  - {type: variant, offset: 1859, length: 0, content: '', SBCK: 積靡則為君子矣順積習為也大積靡謂以縱情性而不足問學則為小人矣為君子則常安榮矣為小人則常危辱矣凡人莫不欲安榮而惡危辱故唯君子為能得其所好小人則日徼其所惡也一堯反徼與邀同招詩曰維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒此之謂也進也言厲王有此善詩大雅桑柔之篇迪故天下之民貪亂安然為荼毒之行由王使之然也人不求而進用之忍}
