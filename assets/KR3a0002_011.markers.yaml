  - {type: variant, offset: 3621, length: 1, content: 治, krp: 頌天詩周如大王之能尊大岐山也作之篇引之以明吉凶由人天不爲人之惡寒也輟冬地不爲人之惡遼逺也輟廣君子不爲小人之匈匈也輟行凶又許用反行下孟反匈匈喧譁之聲與訩同音天有常道矣地有常數矣君子有常體矣君子道其常而小人計其功則計一時之功利因物而遷之也道言也君子常造次必守其道小人詩曰何恤人之言兮此之謂也不違何畏人之言也逸詩也以言苟守道楚王後車千乗非知也君子啜菽飲水非愚也是節然也之時命也節謂所遇若夫心意脩徳行厚知慮明生於今而志乎古則是其在我者也故君子慕其在己者而不慕其在天者富貴也在天謂小人錯其在己者而慕其在天者置錯君子敬其在己者而不慕其在天者是以日進也苟故日進求已而不小人錯其在己者而慕在其天者是以日退也己故日退也望徼幸而不求故君子之所以日進與小人之所以日退一也有不慕皆有慕君子小人之所以相縣者在此耳星隊木鳴}
  - {type: variant, offset: 3622, length: 0, content: '', WYG: 然而憂患不可勝校也諰諰然諰思里反常恐天下之一合而軋已也此所謂廣大乎舜禹也然則奈何曰節威反文節減威彊復用文理案用夫端誠信全之君子治天下焉全謂徳全因與之參}
  - {type: page-break, offset: 3622, content: '', id: KR3a0002_WYG_011-9b, image: WYG0695/WYG0695-0216d.png}
  - {type: variant, offset: 3623, length: 0, content: '', SBCK: 人皆恐曰是何也曰無何也也言不足憂也假設問荅無何是天地之變隂陽之化物之罕至}
  - {type: variant, offset: 3623, length: 0, content: '', WYG: 政正是非治曲直聽咸陽使聽咸陽之政順}
