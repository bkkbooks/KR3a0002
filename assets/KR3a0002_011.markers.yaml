  - {type: variant, offset: 4135, length: 3, content: 如帝親, WYG: 情以為文飾則無害淫祀求福則凶也在天者莫明於日月在地者莫明於水火在物者莫明於珠玉在人者莫明於禮義故日月不高則光輝不赫水火不積則煇潤不博珠玉不睹乎外則王公不以為寶禮義不加於國家則功名不白故人}
