  - {type: variant, offset: 543, length: 47, content: 天下莫之敢當也故齊桓晉文楚莊吳闔閭越句踐是皆僻陋之國也威動天下彊殆中國無它故焉略信也是所謂信立, WYG: 王重法愛民}
  - {type: variant, offset: 545, length: 0, content: '', SBCK: 倜然舉去桀紂而犇湯武高舉倜然犇與奔同之貎舉皆也反然舉疾惡桀紂而貴帝湯武音反貎惡烏路反番番然改變是何也夫桀紂何失而湯武何得也問荅假設是無他故焉桀紂者善為人之所惡而湯武者善爲人之所好也人之所惡者何也曰汗漫爭奪貪利是也汙不脩絜汙漫謂穢汙烏路反漫}
