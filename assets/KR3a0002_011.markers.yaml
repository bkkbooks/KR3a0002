  - {type: variant, offset: 3533, length: 0, content: '', SBCK: 大本也爲順愼或堂上不糞則郊草不瞻曠芸也芸謂有草可芸曠空也空謂無草者未理不暇及遠魯連子謂田巴曰堂上不糞者郊草不鋤也堂上猶未糞除則不暇瞻視郊野之草有無也言近也芸白刃扞乎胷則目不見流矢胷謂見斬刺也扞蔽也扞蔽於暇憂流矢也懼白刃之甚不拔㦸加乎首則十指不辭斷惜十言不或作校或作枝指而救首也拔非不以此爲務也疾養緩急之有相先者也矢十指爲務痛癢緩急有所先救者疾痛也養與癢同言非不以郊草流務禮義然後及他事也也言此者明人君當先天論篇第十七天行有常行之道也天自有常不爲堯存不爲桀亡應之以理則吉應之以亂則凶愛堯而惡桀也吉凶由人天非彊本而節用則天不能貧農桑本謂養備而動時則天不能病不失時亦不使勞苦也養生既備動作養備謂使人衣食足動時謂勸人勤力疹不作也以時則疾脩道而不貳則天不能禍倍也貳即故水旱不能使之飢渴寒暑不能使之疾祅恠不能使之凶無飢寒之患則癘疫所不能加之也畜積有素故水旱不能使之飢渴既本荒而用侈則天不能使之富養略而動罕則天不能使之全衣食不足也動希言怠惰也衣略減少也罕希也養略謂使人惰則天不能全也食減少而又怠倍道而妄行則天不能使之吉故水旱未至而飢寒暑未薄而疾音博薄廹也祅恠未至而凶受時與治世同而殃禍與治世異不可以怨天其道然也人自使然非天降災故明於天人之分則可謂至人矣天斯爲至人知在人不在不爲而成不求而得夫是之謂天職四時行焉百物生焉不爲而成不求而得憎於堯桀之間乎天之職任如此豈愛如是者雖深其人不加慮焉雖大不加能焉雖精不加察焉夫是之謂不與天爭職不措意測度焉以其無益於治若措其人至人也言天道雖深逺至人曽子曰六合之外聖人存而不論也其在人者慕其在天者是爭職也莊天有其時地有其財人有其治夫是之謂能參地財而用之人能治天時於天地則是參舎其所以參而願其所參則惑矣人舍意斯惑矣事而欲知天列星隨旋日月遞炤四時代御隂陽大化風雨博施旋相隨回旋也炤與照同隂陽列星有列位者二十八宿也隨施謂廣博施行無不被也大化謂寒暑變化萬物也博萬物各得其和以生各得其養以成不見其事而見其功夫是之謂神見成功斯所以爲神若有眞宰然也和謂和氣養謂風雨不見和養之事但皆知其所以成莫知其無形夫是之謂天之難知言天道謂天功脱功字耳或曰當爲夫是之唯聖人爲不求知天故聖人但脩既天道難測慮於知天也人事不務役天職既立天功既成形具而神生好惡喜怒哀樂臧焉夫是之謂天情之身言人竅神精魂也天情所受於天之情也亦天職天功所成立也形謂百骸九耳目鼻口形能各有接而不相能也夫是之謂天官目辨色耳辨聲不能互相爲用官猶任也言天之所付任有如此也鼻辨臭口辨味形辨寒熱疾癢其所能皆可以接物而心居中虚以治五官夫是之謂天君空虚之地心居於中官是天使爲形體之君也以制治耳目鼻口形之五財非其類以養其類夫是之謂天養使養口腹形體故曰裁非其類以養其類是財與裁同飲食衣服與人異類裁而用之可道如此也天使奉養之順其類者謂之福逆其類者謂之禍夫是之謂天政不能裁者也天政言如賞罰之順其類謂能裁者也逆其類謂事以下論逆天順天之事在人所爲也政令自天職既立以上並論天所置立之闇其天君其心昬亂亂其天官味過度聲色臭棄其天養本節用不能務逆其天政其類也不能養背其天情哀樂無節好惡喜怒以喪天功生成喪其不蕃滋也之大功使夫是之謂大凶故違天之禍此皆言不脩聖人淸其天君正其天官備其天養順其天政養其天情以全其天功如是則知其所爲知其所不爲矣不攻異端知務導逹則天地官而萬物役矣以任天地役萬物也言聖人自脩政則可其行曲治其養曲適其生不傷夫是之謂知天其治其所養人之術曲其所自脩行之政曲盡也言明於人事則知天物其}
