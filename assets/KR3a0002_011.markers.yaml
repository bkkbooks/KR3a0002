  - {type: variant, offset: 3641, length: 2, content: 聽其, SBCK: 廣說萬物書謂六經也可爲勸戒也之怪無用之辯不急之察棄而不治若夫君臣之義父子之親夫婦之别則日切瑳而不舍也雩而雨何也曰無佗也猶不雩而雨也求雩而雨同明非求而得也周禮司巫國大旱則率巫而舞雩雨之禱也或者問嵗旱雩則得雨此何祥也對以與不雩也日月食而救之天旱而雩􅁲筮然後決大事非以爲得求也以文之也爲此以示急於災得求得}
