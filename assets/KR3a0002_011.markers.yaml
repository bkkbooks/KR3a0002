  - {type: variant, offset: 4129, length: 0, content: '', WYG: 雖大不加能焉雖精不加察焉夫}
  - {type: variant, offset: 4130, length: 0, content: '', WYG: 之謂不與天爭職其人至人也言天道雖深遠至人曽不措意測度焉以其無益於理若措其在人者慕其在天者是爭職也莊子曰六合之外聖人存而不論也天有其時地有其財人有其治夫是之謂能參人能治天時地財而用之則是參於天地舎其所以參而願其所參則惑矣舍人事而欲知天意斯惑矣列星隨旋日月遞炤四時代御陰陽大化風雨博施列星有列位者二十八宿也隨旋相隨廻旋也炤與照同陰陽大化謂寒暑變化萬物也博謂廣博施行無不被也萬物各得其和以生各得其養以成不見其事而見其功夫是之謂神和謂和氣養謂風雨不見和養之事但見成功斯所以為神若有真宰然也皆知其所以成莫知其無形夫是之謂天言天道之難知或曰當為夫是之謂天功脱功字耳唯聖人為不求知天既天道難測}
  - {type: page-break, offset: 4130, content: '', id: KR3a0002_WYG_011-14a, image: WYG0695/WYG0695-0219a.png}
  - {type: page-break, offset: 4130, content: '', id: KR3a0002_WYG_011-14b, image: WYG0695/WYG0695-0219b.png}
  - {type: variant, offset: 4131, length: 0, content: '', WYG: 聖人但修人事不務役慮於知天也天職既立天功既成形具而神生好惡喜怒哀樂藏焉夫是之謂天情言人之身亦天職天功所成立也形謂百骸九竅神謂精魂天情所受於天之情也耳目鼻口形能各有接而不相能也夫是之謂天官耳辨聲目辨色鼻辨臭口辨味形辨寒熱疾癢其所能皆可以接物而不能互相為用官猶任也言天之所付任有如此者也心居中虛以治五官夫是之謂天君心居於中空虛之地以制耳鼻口目形之五官是天使為形體之君也財非其類以養其類夫是之謂天養財與裁同飲食衣服與人異類裁而用之可使養口腹形體故曰裁非其類以養其類是天使奉養之道如此也順其類者謂之福逆其類者謂之禍夫是之謂天政順其類謂裁者也逆其類謂不能裁者也言天政如賞罰之政令自天職既立已上論天所置之事已下論逆天順天之事在人所為也暗其天君昏亂其心亂其天官聲色臭味過度棄其天養不能務本節用逆其天政不能養其類也背其天情好惡喜怒哀樂無節以䘮天功䘮其生成之天功使不蕃滋也夫是之謂大凶此皆言不脩政違天之禍聖人清其天君正其天官備其天養順其天政養其天情以全其天功如是則知其所為知其所不為矣知務導逹不攻異端則天地官而萬物役矣言聖人自脩政則可以任天地役萬物其行曲治其養曲適其生不傷夫是之謂知天其所自脩行之政曲盡其治其所養人之術曲盡其適其生長物無所傷害是謂知天也言明於人事則知天物其要曲盡也故大巧在所不為大智在所不慮此明不務知天是乃知天也亦猶大巧在所不為如天地之成萬物若偏有所為則其巧小矣大智在所不慮如聖人無為而治也若偏有所慮則其智窄矣所志於天者已其見象之可以期者矣志記識也聖人雖不務知天猶有記識以助治道所以記識於天者其見垂象之文可以知其節候者也若堯命羲和欽若昊天日月星辰敬授人時者也所志於地者已其見宜之可以息者矣所以記識於地者其見土宜可以蕃息嘉穀者是也所志於四時者已其見數之可以事者矣數謂春作夏長秋斂冬藏必然之數事謂順時理其事也所以記識四時者取順時之數而令生長收藏者也所志於陰陽者已其見知之可以治者矣知謂知其生殺也所以記識陰陽者為知其生殺効之為賞罰以治之知或為和官人守天而自為守道也官人任人欲任人守天在於自守道皆明不務知天之義也治亂天耶曰日月星辰瑞厯是禹桀之所同也或曰當時星辰書之名也禹以治桀以亂治亂非天也時耶曰繁啟蕃長於春夏繁多也蕃茂也畜積收藏於秋冬是又禹桀之所同也禹以治桀以亂治亂非時也地耶曰得地則生失地則死是又禹桀之所同也禹以治桀以亂治亂非地也皆言在人不在天地與時也詩曰天作高山大王荒之彼作矣文王康之此之謂也詩周頌天作之篇引此以明吉凶由人如大王之能尊大岐山也天不為人之惡寒也而輟冬地不為人之惡遼遠也而輟廣君子不為小人匈匈也而輟行匈匈喧譁之聲與訩同音又許同反行下孟反天有常道矣地有常數矣君子有常體矣君子道其常小人計其功道言也君子言常造次必守其道小人則計一時之功利因物而遷之詩曰何恤人之言兮此之謂也逸詩也以言苟守道不違何畏人之言也楚王後車千乗非知也君子啜菽飲水非愚也是節然也節謂所遇之時節也若夫心意脩徳行厚知慮明生於今而志乎古則是其在我者也故君子敬其在己者而不慕其在天者在天謂富貴也小人錯其在己者而慕其在天者錯置君子敬其在己者而不慕其在天者是以日進也求已而不苟故日進小人錯其在己者而慕其在天者是以日退也望徼倖而不求己故日退也故君子之所以日進與小人之所以日退一也皆有慕有不慕君子小人之所以相懸者在此耳星墜木鳴國人皆恐曰是何也曰無何也假設問荅無何也言不足憂也是天地之變陰陽之化物之罕至者也星墜天地之變木鳴陰陽之化罕希也怪之可也畏之非也以其罕至謂之怪異則可因遂畏懼則非夫日月之有蝕風雨之不時怪星之黨見黨見頻見也言如朋黨之多見賢遍反是無世而不常有之上明而政平則是雖並世起無傷也並世起謂一世之中並起上闇而政險則是雖無一至者無益也夫星之墜木之鳴是天地之變陰陽之化物之罕至者也怪之可也畏之非也物之已至者人祅則可畏也物之既至可畏者在人之祅也楛耕傷稼耘耨失薉政險失民楛耕謂麄惡不精也失薉謂耘耨失時使穢也政險威虐也薉與穢同田稼薉惡糴貴民飢道路有死人夫是之謂人祅政令不明舉錯不時本事不理夫是之謂人祅舉謂起兵動衆錯謂懷安失於機也本事農桑之事也禮義不脩内外無别男女淫亂則父子相疑上下乖離冦難並至夫是之謂人祅祅是生於亂三者錯無安國三者三人祅也錯置也置此三祅於中國則無有安也其説甚邇其菑甚慘邇近也三人祅之説比星墜木鳴為淺近然其災害人則甚慘毒也勉力不時則牛馬相生六畜作祅勉力之役也不時則人多怨曠氣之所感故生非其類也可怪也而不可畏也傳曰萬物之怪書不説書謂六經也可為勸戒則明之不務廣説萬物之怪也無用之辯不急之察棄而不治若夫君臣之義父子之親夫婦之别則日切磋而不舍也雩而雨何也曰無何也猶不雩而雨也雩求雨之禱也或者問嵗旱雩則得雨此何祥也對以與不雩而雨同明非求而得也周禮司巫國大旱則率巫而舞雩日月食而救之天旱而雩小筮而後決大事非以為得求也以文之也得求得所求也言為此示急於災害順人之意以文飾政事而已故君子以為文而}
