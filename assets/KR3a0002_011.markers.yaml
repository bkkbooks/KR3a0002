  - {type: variant, offset: 4274, length: 1, content: 適, SBCK: 者也若隱匿則大惑畸音覉也道之所善得中則從偏側則不可爲匿謂隱匿水行者表深表不明則陷陷溺也表標准也治民者表道表不明則亂禮者表也非禮昏世也昏世大亂也世昏闇也昏世謂使故道無不明外内異表隱顯有常民䧟乃去識章示各異也隱顯即内外也有道禮也外謂朝聘内謂冠昏所表民䧟溺之患乃去也常言有常法也如此萬物爲道一偏一物爲萬物一偏愚者爲一物一偏盡一物也如有不能而自以爲知道無知也豈有知哉以偏爲知道愼子有見於後無見於先道故莊子論愼到曰塊不失道以其無愼到本黄老之術明不尚賢不使能之愼子著書四十二篇班固曰先申韓申韓稱之也爭先之意故曰見後而不見先也漢書藝文志老子有見於詘無見於信號稱老聃孔子之師也著五千老子周之守藏史姓李字伯陽曰見詘而不見信也信讀爲伸言其意多以屈爲伸以柔勝剛故墨子有見於齊無見於畸同兼愛是見齊而不見畸也畸謂不齊也墨子著書有上宋子有見於少無見於多云宋子以}
  - {type: page-break, offset: 4274, content: '', id: KR3a0002_SBCK_011-24b}
  - {type: page-break, offset: 4274, content: '', id: KR3a0002_SBCK_011-25a}
  - {type: variant, offset: 4274, length: 1, content: 適, WYG: 者也若隱匿則大惑畸音覉水行者表深表不明則陷表標凖也陷溺也治民者表道表不明則亂禮者表也非禮昬世也昬世大亂也昬世謂使世昬闇也故道無不明外内異表隱顯有常民陷乃去道禮也外謂朝聘内謂冠昬所表識各異也隱顯即内外也有常言有常法也如此民陷溺之患乃去也萬物為道一偏一物為萬物一偏愚者為一物一偏愚者不能盡一物也而自以為知道無知也以偏為知道豈有知哉慎子有見於後無見於先慎到本黄老之術明不尚賢不使能之道故莊子論慎到曰塊不失道以其無爭先之意故曰見後而不見先也漢書藝文志慎子著書四十二篇班固曰先申韓申韓稱之也老子有見於詘無見於信老子周之守藏史姓李字伯陽號耼孔子之師也著書五千言其意多以屈為伸以柔勝剛故曰見詘而不見信也信讀為伸墨子有見於齊無見於畸畸謂不齊也墨子著書與上同兼愛是見齊而不見畸也宋子有見於少無見於多宋子名鈃宋人也與孟子同時下篇云宋子以}
