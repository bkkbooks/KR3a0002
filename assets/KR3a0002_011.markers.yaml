  - {type: variant, offset: 535, length: 2, content: 備齺, SBCK: 用力而敵退是衆威也相攻而敵退則是畏其將合戰用力而敵退則誡敎也凡發誡布令而敵退則是畏其主徙舉衆也畏其臣舍不宜以衆威受賞故曰衆威此以上公孫是時合戰用力而滅蔡以下荀卿之辭也子美子發之辭也譏之曰子發之致命也恭其辭賞也固賞則固陋非坦明之道也固陋也其致命難其辭夫尚賢使能賞有功罰有罪非獨一人為之也皆}
