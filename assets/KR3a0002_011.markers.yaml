  - {type: variant, offset: 1305, length: 2, content: 辟親, SBCK: 山林川谷美溉灌之利也謂多良材及天材之利多産多也所出物是形勝也故曰如高屋之上而建瓴水也形地形便而物産多所以爲勝入境觀其風俗其百姓樸其聲樂不流汙汙濁也不流邪淫也淸雅也流汙言其服不挑民者衣服不貳從容有常以齊其挑偷也不爲竒異之服詩序曰長歸壹也民則民徳甚畏有司而順古之民也及都邑官府邑之解署及至也至縣其百吏肅然莫不恭儉敦敬忠信而不楛古之吏也爲王事靡盬之盬盬楛音苦濫惡也一曰讀固也不堅入其國觀其士大夫出於其門入於公門出於公門歸於其家無有私事也不}
  - {type: page-break, offset: 1305, content: '', id: KR3a0002_SBCK_011-12a}
