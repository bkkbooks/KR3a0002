  - {type: variant, offset: 1316, length: 1, content: 小, WYG: 暴察之威無愛人之心無利人之事而日為亂人之道百姓讙敖則從而執縛之刑灼之不和人心讙喧嘩也敖喧噪也亦讀為敖謂呌呼之聲敖敖然也五刀反如是下比周賁潰以離上矣賁讀為憤憤然也民逃其上曰潰傾覆滅亡可立而待也夫是之謂狂妄之威此三威者不可不熟察也道徳之威成乎安彊暴察之威成乎危弱狂妄之威成乎滅亡公孫子曰子發將西伐蔡克蔡獲蔡侯公孫子齊相也未知其名後語孟嘗君客有公孫成豈後為齊相乎或曰公孫名忌子發楚令尹未知其姓戰國䇿莊辛諫楚莊王曰蔡靈侯南遊乎高陂北陵乎巫山右枕幼妾左擁嬖女馳騁乎高蔡之間不以國家為事不知子發方受命于靈王繫以朱絲而見之史記蔡侯為楚惠王所滅莊辛云靈王與史記不同也歸致命曰蔡侯奉其社稷而歸之楚歸致命於君言蔡侯自奉其社稷歸楚非己之功也舍屬二三子而理其地舍子發名屬之欲反二三子楚之諸臣也理其地謂安輯其民也子發不欲獨擅其功故請諸臣理其地也既楚發其賞既謂論功之後發行也子發辭曰發誡布令而敵退是主威也徙舉相攻而敵退是將威也合戰}
