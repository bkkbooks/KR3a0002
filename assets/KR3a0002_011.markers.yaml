  - {type: variant, offset: 538, length: 0, content: '', krp: 自古彼先王之道也一人之本也善善惡惡之應也齊一人之本善善惡惡之報應也彼彼賞罰也言彼賞罰者乃先王之道治必由之古今一也用賞罰為治必古者明王之舉大事立大功也大事已博大功已立則君享其成羣臣享其功受其獻也享獻也謂士大夫益爵官人益秩庶人益禄也庶人士卒也秩禄皆謂廪食也爵謂若秦庶長不更之屬官人羣吏是以爲善者勸爲不善者沮}
  - {type: variant, offset: 540, length: 0, content: '', SBCK: 一心三軍同力是以百事成而功名大也今子發獨不然反先王之道亂楚國之法墮興功之臣恥受賞之屬臣墮廢其志受賞之屬慙恥於心人皆受賞子發獨辭是使興功之無僇乎族黨而抑卑乎後世子孫揚其功族黨夫先祖有寵錫則稱􅀭雖無刑戮之恥而後世亦抑損卑下無以光榮也遭刑戮則後世䝉其恥今子發自謂無功則子孫無以案獨以為私廉豈不過甚矣哉故曰子發之致命也恭其辭賞也固荀卿子說齊}
  - {type: page-break, offset: 540, content: '', id: KR3a0002_SBCK_011-5a}
  - {type: variant, offset: 540, length: 0, content: '', krp: 一心三軍同力是以百事成而功名大也今子發獨不然反先王之道亂楚國之法墮興功之臣恥受賞之屬臣墮廢其志受賞之屬慙恥於心人皆受賞子發獨辭是使興功之無僇乎族黨而抑卑乎後世子孫揚其功族黨夫先祖有寵錫則稱揚雖無刑戮之恥而後世亦抑損卑下無以光榮也遭刑戮則後世䝉其恥今子發自謂無功則子孫無以案獨以為私廉豈不過甚矣哉故曰子發之致命也恭其辭賞也固荀卿子說齊}
  - {type: variant, offset: 541, length: 1, content: 信, SBCK: 曰處勝人之埶行勝人之道天下莫忿湯武是也處勝人之埶不以行勝人之道用以厚於有天下之埶索爲匹夫不可得也桀紂是也然則得勝人之埶者其不如勝人之道遠矣夫主相者勝人以埶也是為是非為非能為能不能為不能併己之私欲必以道夫公道通義之可以相兼容者是勝人之道也棄私欲遵達公義併讀曰屏棄也屏也今相國上則得專主下則得專國相國之於勝人之埶亶有之矣作擅或曰亶誠也亶讀爲擅本亦或然則胡不敺此勝人之埶赴勝人之道馭之也敺謂駕人之埶誤也或作謳歌此勝求仁厚明通之君子而託王焉王使輔佐也求賢而託之以與之參國政正是非如是則國孰敢不爲義矣化之也國内皆君臣上下貴賤長少至于庶人莫不為義則天下孰不欲合義矣歸義也天下皆來賢士願相國之朝能士願相國之官好利之民莫不願以爲齊為歸是一天下也相國舍是而不爲案直爲是世俗之所以爲但爲勝人之埶不爲勝人之道則女主亂之宮詐臣亂之朝貪吏亂之官衆庶百姓皆以貪利爭奪爲俗曷若是而可以持國乎今巨楚縣吾前前縣聮繫之也楚在齊南故曰大燕鰌吾後故曰後鰌燕在齊北曰鰌我必勝我本亦或作蹲吾後也蹴也藉也如蹴踏於後莊子風謂蛇勁魏鉤吾右西壤之不絶若繩也西壤齊西界之地若繩言細也魏在齊西故曰右鉤謂如鉤取物楚人則乃有襄賁開陽以臨吾左二邑在齊之襄賁開陽楚縣皆屬東海郡賁音肥東者也漢書地理志二是一國作謀則三國必起而乗我三國乗其敝一國謀齊則如是則齊必斷而爲四取其二魏燕各取其一也三國分齊則斷爲四謂楚三國若假城然耳如三言齊久當歸之也國之􅀉城耳不必爲天下大笑曷若其無謀滅天下必笑何如也亡問以爲兩者孰足爲也人之埶一則天下歸兩者勝人之道與勝何者可爲也一則天下笑問天桀紂聖王之後子孫也有天下者之世也繼世世謂埶籍之所存天下之宗室也之所在也埶位國籍土地之大封内千里人之衆數以億萬億萬其數俄}
