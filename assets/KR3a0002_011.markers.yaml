  - {type: variant, offset: 526, length: 8, content: 略審勞佚謹畜積脩, SBCK: 受命子宣王繫以朱絲而見之史記陵乎巫山左枕幼妾右擁嬖女與之馳騁乎高蔡之閒而不以辛云宣王與史記不同蔡侯齊為楚惠王所滅莊歸致命曰蔡侯奉其社稷而歸之楚其社稷歸楚非己之功也歸致命於君言蔡侯自奉舍屬二三子而治其地諸臣也治其地謂安輯其民也子發舍子發名屬請也之欲反二三子楚之請諸臣理其地也不欲獨擅其功故既楚發其賞後發行也既謂論功之子發辭曰發誡布令而敵退是主威也徙舉相攻而敵退是將威也合}
