  - {type: variant, offset: 4277, length: 0, content: '', SBCK: 情爲欲寡而皆以己宋子名鈃宋人也與孟子同時下篇胡泠反漢書藝文志有宋子十八篇班固云荀卿道宋子其之情爲欲多爲過也據此說則是少而不見多也鈃音形又老意言黄有後而無先則羣衆無門開導皆處後而夫衆羣在上之無門戸也不處先羣衆有詘而無信則貴賤不分而賤者貴者伸卑下則無貴賤之别也詘則分别矣若皆貴柔弱有齊而無畸則政令不施若上同則政令何施也夫施政令}
  - {type: page-break, offset: 4277, content: '', id: KR3a0002_SBCK_011-25b}
  - {type: variant, offset: 4277, length: 0, content: '', WYG: 情欲寡而皆以己之情欲多是過也據此説則少而不見多也鈃音刑又胡泠反漢書藝文志有宋子十八篇班固曰荀卿道宋子其言黄老意有後而無先則羣衆無門夫羣衆在上之開導皆處後而不慮先羣衆無門戸也有詘而無信則貴賤不分貴者伸而賤者詘則分别矣若皆貴柔弱卑下則無貴賤之别也有齊而無畸則政令不施夫施政令}
