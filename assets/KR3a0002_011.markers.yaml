  - {type: variant, offset: 3630, length: 1, content: 臣, SBCK: 生六畜作祅時則人多怨曠其氣所感故生非其􅀋也此三句宜承其菑甚慘之}
  - {type: variant, offset: 3630, length: 2, content: 臣下, WYG: 范睢封於應也杜元凱云應國在襄陽城父縣西南也孫卿曰其固塞險形勢便山林川谷美謂多良材及溉灌之利也天材之利多所出物産多也是形勝也形地形便而物産多所以為勝故曰如高屋之上而建瓴水也入境觀其風俗其百姓樸其聲樂不流汙流邪淫也汙濁也不流汙言清雅也其服不佻佻偷也不為竒異之服詩序曰長民者衣服不貳從容有常以齊其民則民徳一也甚畏有司而順古之民也及都邑官府及至也至縣邑之廨署其}
  - {type: variant, offset: 3630, length: 1, content: 臣, krp: 生六畜作祅時則人多怨曠其氣所感故生非其類也此三句宜承其菑甚慘之}
