  - {type: variant, offset: 570, length: 0, content: '', SBCK: 情與謂黨已有數百里之國者也汙漫突盗以爭地陵犯也突謂相然則是棄己之所以安彊而爭己之所以危弱也損己之所以不足以重己之所以有餘與政有餘謂衆與地也損減也重多也不足謂信若是其悖繆也而求有湯武之功名可乎辟之是猶伏而咶天救經而引其足也同經縊咶與舐其足縊愈急也也音徑救縊而引說必不行矣俞務而俞遠爲人臣者不恤已行之不行反下如字上行下孟苟富利而已矣是渠􅓘入穴而求利也城之大車也詩渠大也渠􅓘攻城距衝不若堙内伏橐或作距􅓘蓋言可以距矢石曰臨􅓘閑閑韓子曰奏百貍首射侯不當彊弩趨發平是仁人之所羞而不爲也得故羞而不爲也屈大就小務於苟故人莫貴乎生莫樂乎安所以養生安樂者莫大乎禮義人知貴生樂安而棄禮義辟之是猶欲壽而歾頸也爲刎歾當愚莫大焉故君人者愛民而安好士而榮兩者無一焉而亡詩曰价人維藩大師維垣此之謂也義已解上大雅板之篇力術止義術行曷謂也曰秦之謂也兵之術力術彊術則行發此論以謂秦也新序李斯問孫卿曰當今之時爲義術仁義之術止謂不能進取霸王也言用力術則止用義止義術行秦之謂也秦奈何孫卿曰力術威彊乎湯武廣大乎舜禹然而憂患不可勝校也計校諰諰常恐天下之一合而軋已也此所謂力術止也曷謂乎威彊乎湯武湯武也者乃能使說己者使耳恱說音今楚父死焉國舉焉負三王之廟而辟於陳蔡之閒爲秦所虜而死也至二十一年此楚頃襄王之時也父謂懷王復戰東北保陳城廟主也辟如字謂自屏遠也或曰讀為秦將白起遂拔我鄢郢燒先王墓於夷陵襄王兵散遂不避視可伺閒案欲剡其脛而以蹈秦之腹伐也剡亦斬也視可謂觀其可然而秦使左案左使右案右是能使讎人役也年迎婦於秦城十五年與秦伐燕二十秦能使讎人爲之徒役謂楚襄王七入太子質之類也七年復與秦平而此所謂威彊乎湯武也曷謂廣大乎舜禹也曰古者百王之一天下臣諸侯也未有過封内千里者也之内封畿今秦南乃有沙羨與俱是乃江南也羨縣屬江夏郡漢書地理志沙是有江南也此地俱屬秦北與胡貉爲隣西有巴戎南戎在巴在西屬秦西皆隷東在楚者乃界於齊者乃與齊爲界也謂東侵楚地所得在韓者踰常山乃有臨慮屬河内今屬相州也漢書地理志臨慮縣名在魏者乃據圍津即去大梁百有二十里耳圉津轉寫為圍或作韋津今有韋城豈是耶史記朱忌謂魏安圍當爲圉漢書曾參下脩武度圉津顔師古曰在東郡豈古名河内共汲必危垝圍聲相近疑同垝居委反釐王曰秦固有懐茅邢丘城垝津以臨河内其在趙者剡然有苓而據松柏之塞名未詳所在或曰苓剡然侵削之貌苓地爲卷按卷縣屬河南非趙地也松柏之塞蓋趙樹松柏與秦與靈同漢書地理志常山郡有靈壽縣今屬眞定或曰苓當據有之爲界今秦負西海而固常山今有之言秦背西海東負背也常山本趙山秦爲固也向以常山是地徧天下也}
