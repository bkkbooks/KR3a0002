  - {type: variant, offset: 4291, length: 1, content: 曰, SBCK: 書洪範}
  - {type: variant, offset: 4291, length: 484, content: 曰以小人尚民而威以非所取於民而巧是傷國之大災也大國之主也而好見小利是傷國其於聲色臺榭園囿也愈厭而好新是傷國不好循正其所以有啖啖常欲人之有是傷國三邪者在匈中而又好以權謀傾覆之人斷事其外若是則權輕名辱社稷必危是傷國者也大國之主也不隆本行不敬舊法而好詐故若是則夫朝廷群臣亦從而成俗於不隆禮義而好傾覆也朝廷群臣之俗若是則夫眾庶百姓亦從而成俗於不隆禮義而好貪利矣君臣上下之俗莫不若是則地雖廣權必輕人雖眾兵必弱刑罰雖繁令不下通夫是之謂危國是傷國者也儒者為之不然必將曲辨朝廷必將隆禮義而審貴賤若是則士大夫莫不敄節死制者矣百官則將齊其制度重其官秩若是則百吏莫不畏法而遵繩矣關市幾而不征質律禁止而不偏如是則商賈莫不敦愨而無詐矣百工將時斬伐佻其期日而利其巧任如是則百工莫不忠信而不楛矣縣鄙將輕田野之稅省刀布之斂罕舉力役無奪農時如是則農夫莫不朴力而寡能矣士大夫務節死制然而兵勁百吏畏法循繩然後國常不亂商賈敦愨無詐則商旅安貨財通而國求給矣百工忠信而不楛則器用巧便而財不匱矣農夫朴力而寡能則上不失天時下不失地利中得人和而百事不廢是之謂政令行風俗美以守則固以征則彊居則有名動則有功此儒之所謂曲辨也, WYG: 荀子卷十一欽定四庫全書荀子卷}
