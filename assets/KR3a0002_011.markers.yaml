  - {type: punctuation, offset: 1303, content: ，, id: KR3a0002_tls_011-bkkpn255}
  - {type: 'tls:seg', offset: 1303, content: '', id: KR3a0002_tls_011-4a.31}
  - {type: variant, offset: 1303, length: 1, content: 唯, SBCK: 而聽咸陽聽使之政咸陽順者錯之不順者而後誅之捨而不伐錯置也謂若是則兵不復出於塞外而令行於天下矣若是則雖爲之築明堂於塞外而朝諸侯殆可矣兵不復出於塞外故誤重寫此三字耳殆庶幾明堂天子布政之宮於塞外三字􅄛也以前有外境外也明堂壇也謂廵狩至方岳之下㑹諸侯爲宮方也秦若使賢人爲政雖築明堂朝諸侯庶幾可矣或曰塞王宮於踐土亦其類也或曰築明堂於塞外謂使他國爲秦三百歩四門壇十有二尋深四尺加方明于其上左氏傳爲秦郡縣築帝宮祠春秋稱東蕃是也築帝宮也戰國策韓王謂張儀曰請比假今之世益地不如益信之務也應侯問孫卿子曰入秦何見於應也杜元凱云應侯秦相范睢封城縣西南也應國在襄陽父孫卿子曰其國塞險形埶}
  - {type: page-break, offset: 1303, content: '', id: KR3a0002_SBCK_011-11b}
