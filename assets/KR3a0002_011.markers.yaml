  - {type: variant, offset: 538, length: 0, content: '', SBCK: 自古彼先王之道也一人之本也善善惡惡之應也齊一人之本善善惡惡之報應也彼彼賞罰也言彼賞罰者乃先王之道治必由之古今一也用賞罰為治必古者明王之舉大事立大功也大事已博大功已立則君享其成羣臣享其功受其獻也享獻也謂士大夫益爵官人益秩庶人益禄也庶人士卒也秩禄皆謂廪食也爵謂若秦庶長不更之屬官人羣吏是以爲善者勸爲不善者沮}
