  - {type: variant, offset: 1563, length: 475, content: 焉若是則怡愉無患難矣然後養五綦之具具也故百樂者生於治國者也憂患者生於亂國者也急逐樂而緩治國者非知樂者也故明君者必將先治其國然後百樂得其中闇君者必將荒逐樂而緩治國故憂患不可勝校也必至於身死國亡然後止也豈不哀哉將以為樂乃得憂焉將以為安乃得危焉將以為福乃得死亡焉豈不哀哉於乎君人者亦可以察若言矣故治國有道人主有職若夫貫日而治詳一日而曲別之是所使夫百吏官人為也不足以是傷游玩安燕之樂若夫論一相以兼率之使臣下百吏莫不宿道鄉方而務是夫人主之職也若是則功一天下名配堯禹之主者守至約而詳事至佚而功垂衣裳不下簟席之上而海內之人莫不願得以為帝王夫是之謂至約樂莫大焉人主者以官人為能者也匹夫者以自能為能者也人主得使人為之匹夫則無所移之百畝一守事業窮無所移之也今以一人兼聽天下日有餘而治不足者使人為之也大有天下小有一國必自為之然後可則勞苦耗顇莫甚焉如是則雖臧獲不肯與天子易埶業以是縣天下一四海何故必自為之為之者役夫之道也墨子之說也論德使能而官施之者聖王之道也儒之所謹守也傳曰農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公總方而議則天子共己而矣出若入若, WYG: ''}
