  - {type: variant, offset: 3244, length: 1, content: 分, WYG: 封内千里人之衆數以億萬其數億萬俄而天下倜然舉去桀紂而犇湯武倜然高舉之貎舉皆也犇與奔同反然舉惡桀紂而貴湯武反音翻翻然改變貎惡烏路反是何也夫桀紂何失而湯武何得也假設問答曰是無他故焉桀紂者善為人所惡也而湯武者善為人所好也人之所惡何也曰汙漫爭奪貪利是也汙漫謂穢汙不脩㓗也或曰漫謂欺誑也汙烏路反漫莫但反人之所好者何也曰禮義辭讓忠信是也今君人者辟稱比方則欲自並乎湯武辟讀為譬稱尺證反若其所以統之則無以異於桀紂而求有湯武之功名可乎統制治也故凡得勝者必與人也凡得人者必與道也道也者何也曰禮讓忠信是也故自四五萬而往者彊勝非衆之力也隆在信矣而往猶已上也言有兵四五萬已上者若能崇信則足以自致彊勝不必更待與國之衆}
