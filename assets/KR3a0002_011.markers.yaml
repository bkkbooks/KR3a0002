  - {type: variant, offset: 3349, length: 268, content: 而名美上可以王下可以霸立隆政本朝而不當所使要百事者非仁人也則身勞而國亂功廢而名辱社稷必危是人君者之樞機也故能當一人而天下取失當一人而社稷危不能當一人而能當千人百人者說無之有也既能當一人則身有何勞而為垂衣裳而天下定故湯用伊尹文王用呂尚武王用召公成王用周公旦卑者五伯齊桓公閨門之內懸樂奢泰游抏之脩於天下不見謂脩然九合諸侯一匡天下為五伯長是亦無它故焉知一政於管仲也是君人者之要守也知者易為之興力而功名綦大舍是而孰足為也故古之人有大功名者必道是者也喪其國危其身者必反是者也故孔子曰知者之知固以多矣有以守少能無察乎愚者之知固以少矣有以守多能無狂乎, WYG: 師維垣}
