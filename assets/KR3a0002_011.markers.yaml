  - {type: variant, offset: 551, length: 16, content: 齊桓晉文楚莊吳闔閭越句踐是皆僻陋, SBCK: 自四五萬而徃者彊勝非衆之力也隆在信矣則足以自致彊勝不必更待與國之衆也若不崇而徃猶以上也言有兵四五萬以上者若能崇信益故曰非衆之力也信雖有與國之衆猶無自數百里而徃者安固非大之力也隆在脩政矣安固不必更待地廣也有數百里之地脩政則言此者若言常人之治非論聖人也荀卿常言湯武以百里之地王天下今今已有數萬之衆者也陶誕比周以爭與曰當爲逃謂逃匿其陶當爲檮杌之檮或與}
