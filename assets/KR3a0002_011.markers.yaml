  - {type: variant, offset: 3621, length: 1, content: 治, SBCK: 頌天詩周如大王之能尊大岐山也作之篇引之以明吉凶由人天不爲人之惡寒也輟冬地不爲人之惡遼逺也輟廣君子不爲小人之匈匈也輟行凶又許用反行下孟反匈匈喧譁之聲與訩同音天有常道矣地有常數矣君子有常體矣君子道其常而小人計其功則計一時之功利因物而遷之也道言也君子常造次必守其道小人詩曰何恤人之言兮此之謂也不違何畏人之言也逸詩也以言苟守道楚王後車千乗非知也君子啜菽飲水非愚也是節然也之時命也節謂所遇若夫心意脩徳行厚知慮明生於今而志乎古則是其在我者也故君子慕其在己者而不慕其在天者富貴也在天謂小人錯其在己者而慕其在天者置錯君子敬其在己者而不慕其在天者是以日進也苟故日進求已而不小人錯其在己者而慕在其天者是以日退也己故日退也望徼幸而不求故君子之所以日進與小人之所以日退一也有不慕皆有慕君子小人之所以相縣者在此耳星隊木鳴}
  - {type: page-break, offset: 3621, content: '', id: KR3a0002_SBCK_011-20a}
  - {type: page-break, offset: 3621, content: '', id: KR3a0002_SBCK_011-20b}
  - {type: variant, offset: 3621, length: 0, content: '', WYG: 大雅板之篇義已解上也力術止義術行曷謂也曰秦之謂也力術彊兵之術義術仁義之術止謂不能進取霸王也言用力術則止用義術則行發此論以謂秦也新序李斯問孫卿曰當今之時為秦奈何孫卿曰力止義行秦之謂也威彊乎湯武廣大乎舜禹然而憂患不可勝校也校計諰諰然諰思里反常恐天下之一合而軋已也此所謂力術止也曷謂乎威彊乎湯武湯武也者乃能使説已者使耳説音悦今楚父死焉國舉焉負三王之廟而辟於陳蔡之間此楚頃襄王之時也父謂懷王為秦所虜而死也至二十一年秦將白起遂拔我鄢郢燒先王墓於夷陵襄王兵散遂不復戰東北保陳成廟主也辟如字謂自屏遠也或讀為避視可司間安欲剡其脛而以蹈秦之腹視可謂觀其可伐司音伺間隙也剡亦斬也然而秦使左案左使右案右是乃使讎人役也秦能使讎人為之徒役謂楚襄王七年迎婦於秦城十五年與秦伐燕二十七年復與秦平而入太子質之類也此所謂威彊乎湯武也曷為廣大乎舜禹也曰古者百王之一天下臣諸侯未有過封内千里者也封畿之内今秦南乃有沙羡與俱是乃江南漢書地理志沙羡縣屬江夏郡此地俱屬秦是有江南也北與胡貊為隣西有巴戎巴在西南戎在西皆隸屬秦東在楚者乃界於齊謂東侵楚地所得者乃與齊為界也在韓者踰常山乃在臨慮漢書地理志臨慮縣名屬河内今屬相州也在魏者乃據圉津即去大梁百有二十里耳圉當為圍漢書曹參下脩武度圍津顔師古曰在東郡豈古名圍津傳寫為圉或作韋津今有韋城豈是邪史記朱忌謂魏安釐曰秦固有懐茅邢丘城垝津以臨河内河内共汲必危垝圍聲相近疑同垝居委反其在趙者剡然有苓而據松栢之塞剡然侵削之貌苓地名未詳所在或曰苓與靈同漢書地理志常山郡有靈壽縣今屬真定或曰苓當為卷案卷縣屬河南非趙地也松栢之塞謂趙樹松栢與秦為界今秦據有之負西海而固常山負背也常山本趙山今秦有之言秦背西海東向以常山為固是地徧天下也威動海内彊殆中國秦之彊能危殆中國殆或為}
