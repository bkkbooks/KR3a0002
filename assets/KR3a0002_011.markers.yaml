  - {type: variant, offset: 2663, length: 357, content: 哉欲是之主並肩而存能建是之士不世絕千歲而不合何也曰人主不公人臣不忠也人主則外賢而偏舉人臣則爭職而妒賢是其所以不合之故也人主胡不廣焉無䘏親䟽無倫貴賤唯誠能之求若是則人臣輕職業讓賢而安隨其後矣如是則舜禹還至王業還起功壹天下名配舜禹物由有可樂如是其美焉者乎嗚呼君人者亦可以察若言矣揚朱哭衢涂曰此夫過舉蹞步而覺跌千里者夫哀哭之此亦榮辱安危存亡之衢已此其為可哀甚於衢涂嗚呼哀哉君人者千歲而不覺也無國而不有治法無國而不有亂法無國而不有賢士無國而不有罷士無國而不有愿民無國而不有悍民無國而不有美俗無國而不有惡俗兩者並行而國在上偏而國安在下偏而國危上一而王下一而亡故其法治其佐賢其民愿其俗美而四者齊夫是之謂上一如是則不戰而勝不攻而得甲兵不勞而天下服故湯以亳武王以鄗皆百里之地也天下為一諸侯為臣通達之屬莫不從服無它故焉四者齊也桀紂即, WYG: ''}
