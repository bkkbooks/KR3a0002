  - {type: variant, offset: 3690, length: 251, content: 徵也主道治近不治遠治明不治幽治一不治二主能治近則遠者理主能治明則幽者化主能當一則百事正夫兼聽天下日有餘而治不足者如此也是治之極也既能治近又務治遠既能治明又務見幽既能當一又務正百是過者也過猶不及也辟之是猶立直木而求其影之枉也不能治近又務治遠不能察明又務見幽不能當一又務正百是悖者也辟之是猶立枉木而求其影之直也故明主好要而闇主好詳主好要則百事詳主好詳則百事荒矣君者論一相陳一法明一指以兼覆之兼炤之以觀其盛者也相者論列百官之長要百事之聽以飾朝廷臣下百吏之分度其功勞論其慶賞歲終奉其成功以效於君當則可不當則廢故, SBCK: 命在禮}
