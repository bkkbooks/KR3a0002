  - {type: variant, offset: 3628, length: 1, content: 主, SBCK: 可畏也者在人之祅也物之既至可畏楛耕傷稼耘耨失薉政險失民精也失薉謂耘楛耕謂麤惡不威虐也薉與穢同耨失時使穢也政險田薉稼惡糴貴民飢道路有死人夫是之謂人祅政令不明舉錯不時本事不理夫是之謂人祅錯謂懷安失於舉謂起兵動衆農桑之事也事機也本事勉力不時則牛馬}
  - {type: page-break, offset: 3628, content: '', id: KR3a0002_SBCK_011-21b}
  - {type: variant, offset: 3628, length: 1, content: 主, WYG: 兵不復出於塞外而令行於天下矣若是則雖為之築明堂於塞外而朝諸侯使殆可矣明堂天子布政之宮於塞外三字衍也以前有兵不復出於塞外故誤重寫此三字耳殆庶幾也秦若使賢人為政雖築明堂朝諸侯庶幾可矣或曰塞外境外也明堂壇也謂廵狩至方岳之下㑹諸侯為宮方三百歩四門壇十有二尋深四尺加方明其上左氏傳為王宮於踐土亦其類也或曰築明堂於塞外謂使他國為秦築帝宮也戰國策韓王謂張儀曰謂比秦郡縣築帝宮祠春秋稱東蕃是也假今之世益地不如益信之務也應侯問孫卿曰入秦何見應侯秦}
  - {type: page-break, offset: 3628, content: '', id: KR3a0002_WYG_011-10a, image: WYG0695/WYG0695-0217a.png}
