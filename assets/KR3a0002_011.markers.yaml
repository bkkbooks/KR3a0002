  - {type: variant, offset: 3163, length: 0, content: '', WYG: 大燕鰌吾後燕在齊北故曰後鰌蹴也如蹴㳫於後莊子風謂蛇曰鰌我亦作蹲吾後也勁魏釣吾右西壤之不絶若繩魏在齊西故曰右釣謂釣取物也西壤齊西界之地若繩言細也楚人則乃有襄賁開陽以臨吾左襄賁開陽楚二邑在齊之東者也漢書地理志二縣皆屬東海郡賁音肥是一國作謀三國必起}
