  - {type: variant, offset: 130, length: 286, content: 所務白也挈國以呼禮義而無以害之行一不義殺一無罪而得天下仁者不為也擽然扶持心國且若是其固也之所與為之者之人則舉義士也之所以為布陳於國家刑法者則舉義法也主之所極然帥群臣而首鄉之者則舉義志也如是則下仰上以義矣是綦定也綦定而國定國定而天下定仲尼無置錐之地誠義乎志意加義乎身行箸之言語濟之日不隱乎天下名垂乎後世今亦以天下之顯諸侯誠義乎志意加義乎法則度量箸之以政事案申重之以貴賤殺生使襲然終始猶一也如是則夫名聲之部發於天地之閒也豈不如日月雷霆然矣哉故曰以國齊義一日而白湯武是也湯以亳武王以鄗皆百里之地也天下為一諸侯為臣通達之屬莫不從服無它故焉以濟義矣是所謂義立而王也德雖未至也義雖未濟, WYG: 初開此}
