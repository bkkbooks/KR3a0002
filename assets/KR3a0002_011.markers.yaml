  - {type: variant, offset: 3313, length: 1, content: 數, WYG: 謂信與政有餘謂衆與地也若是其悖繆也而求有湯武之功名可乎辟之是猶伏而咶天救經而引其足也咶與䑛同經縊也救縊而引其足縊愈急也説必不行矣愈務而愈遠為人臣者不恤已行之不行上行下孟反下行如字苟得利而已矣是渠衝入穴而求利也渠大也渠衝攻城之大車也詩曰臨衝閑閑韓子曰奏百貍首射侯不當彊弩趨發平城距衝不若堙内伏橐或作距衝蓋言可以距石矣是仁人之所羞而不為也屈大就小務}
