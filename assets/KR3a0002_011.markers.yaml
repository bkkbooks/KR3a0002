  - {type: variant, offset: 1928, length: 1159, content: 雖臧獲不肯與天子易埶業以是縣天下一四海何故必自為之為之者役夫之道也墨子之說也論德使能而官施之者聖王之道也儒之所謹守也傳曰農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公總方而議則天子共己而矣出若入若天下莫不平均莫不治辨是百王之所同也而禮法之大分也百里之地可以取天下是不虛其難者在於人主之知之也取天下者非負其土地而從之之謂也道足以壹人而已矣彼其人苟壹則其土地且奚去我而適它故百里之地其等位爵服足以容天下之賢士矣其官職事業足以容天下之能士矣循其舊法擇其善者而明用之足以順服好利之人矣賢士一焉能士官焉好利之人服焉三者具而天下盡無有是其外矣故百里之地足以竭埶矣致忠信箸仁義足以竭人矣兩者合而天下取諸侯後同者先危詩曰自西自東自南自北無思不服一人之謂也羿蠭門者善服射者也王良造父者善服馭者也聰明君子者善服人者也人服而勢從之人不服而勢去之故王者已於服人矣故人主欲得善射射遠中微則莫若羿蠭門矣欲得善馭及速致遠則莫若使王良造父矣欲得調壹天下制秦楚則莫若聰明君子矣其用知甚簡其為事不勞而功名致大甚易處而綦可樂也故明君以為寶而愚者以為難夫貴為天子富有天下名為聖王兼制人人莫得而制也是人情之所同欲也而王者兼而有是者也重色而衣之重味而食之重財物而制之合天下而君之飲食甚厚聲樂甚大臺謝甚高園囿甚廣臣使諸侯一天下是又人情之所同欲也而天子之禮制如是者也制度以陳政令以挾官人失要則死公侯失禮則幽四方之國有侈離之德則必滅名聲若日月功績如天地天下之人應之如影響是又人情之所同欲也而王者兼而有是者也故人之情口好味而臭味莫美焉耳好聲而聲樂莫大焉目好色而文章致繁婦女莫眾焉形體好佚而安重閒靜莫愉焉心好利而穀祿莫厚焉合天下之所同願兼而有之睪牢天下而制之若制子孫人苟不狂惑戇陋者其誰能睹是而不樂也哉欲是之主並肩而存能建是之士不世絕千歲而不合何也曰人主不公人臣不忠也人主則外賢而偏舉人臣則爭職而妒賢是其所以不合之故也人主胡不廣焉無䘏親䟽無倫貴賤唯誠能之求若是則人臣輕職業讓賢而安隨其後矣如是則舜禹還至王業還起功壹天下名配舜禹物由有可樂如是其美焉者乎嗚呼君人者亦可以察若言矣揚朱哭衢涂曰此夫過舉蹞步而覺跌千里者夫哀哭之此亦榮辱安危存亡之衢已此其為可哀甚於衢涂嗚呼哀哉君人者千歲而不覺也無國而不有治法無國而不有亂法無國而不有賢士無國而不有罷士無國而不有愿民無國而不有悍民無國而不有美俗無國而不有惡俗兩者並行而國在上偏而國安在下偏而國危上一而王下一而亡故其法治其佐賢其民愿其俗美而四者齊夫是之謂上一如是則不戰而勝不攻而得甲兵不勞而天下服故湯以亳武王以鄗皆百里之地也天下為一諸侯為臣通達之屬莫不從服無它故焉四者齊也桀紂即厚於有天下之勢索為匹夫而不可得也是無它故焉四者並亡也故百王之法不同若是所歸者一也上莫不致愛其下而制之以禮上之於下如保赤子政令制度所以接, SBCK: ''}
