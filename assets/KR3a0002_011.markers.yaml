  - {type: variant, offset: 3546, length: 1, content: 綦, SBCK: 也或曰當時星禹以治桀以亂治亂非天也時邪曰繁啓蕃長於春夏蕃茂也繁多也畜積收臧於秋冬是又禹桀之所同也禹以治桀以亂治亂非時也地邪曰得地則生失地則死是又禹桀之所同也禹以治桀以亂治亂非地也天地與時也言皆在人不在詩曰天作髙山}
