  - {type: variant, offset: 478, length: 0, content: '', SBCK: 不敢嬰也彼國者亦有砥厲禮義節奏是也法度也節奏有故人之命在天國之命在禮人君者隆禮尊賢而王重法愛民而霸好利多詐而危權謀傾覆幽險而亡難知則亡也幽深傾險使下威有三有道徳之威者有暴察之威者有狂妄之威者急嚴察也暴察謂暴此三威者不可不孰察也禮樂則脩分義則明義謂各得其宜分謂上下有分舉錯則時愛利則形之心見於外也形見也愛利人如是百姓貴之如帝高之如天神也帝天親之如父母}
