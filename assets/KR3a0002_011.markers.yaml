  - {type: variant, offset: 701, length: 76, content: 削綦之而亡齊閔薛公是也故用彊齊非以脩禮義也非以本政教也非以一天下也緜緜常以結引馳外為務故彊南足以破楚西足以詘秦北足以敗燕中足以舉宋及以燕趙起而攻之若振槁, SBCK: 殆}
  - {type: variant, offset: 701, length: 410, content: 削綦之而亡齊閔薛公是也故用彊齊非以脩禮義也非以本政教也非以一天下也緜緜常以結引馳外為務故彊南足以破楚西足以詘秦北足以敗燕中足以舉宋及以燕趙起而攻之若振槁然而身死國亡為天下大戮後世言惡則必稽焉是無它故焉唯其不由禮義而由權謀也三者明主之所以謹擇也而仁人之所以務白也善擇者制人不善擇者人制之國者天下之大器也重任也不可不善為擇所而後錯之錯險則危不可不善為擇道然後道之涂薉則塞危塞則亡彼國錯者非封焉之謂也何法之道誰子之與也故道王者之法與王者之人為之則亦王矣道霸者之法與霸者之人為之則亦霸矣道亡國之法與亡國之人為之則亦亡矣三者明主之所以謹擇也而仁人之所以務白也故國者重任也不以積持之則不立故國者世所以新者也是幝幝非變也改玉改行也故一朝之日也一日之人也然而厭焉有千歲之固何也曰援夫千歲之信法以持之也安與夫千歲之信士為之也人無百歲之壽而有千歲之信士何也曰以夫千歲之法自持者是乃千歲之信士矣故與積禮義之君子為之則王與端誠信全之士為之則霸與, WYG: ''}
  - {type: variant, offset: 701, length: 76, content: 削綦之而亡齊閔薛公是也故用彊齊非以脩禮義也非以本政教也非以一天下也緜緜常以結引馳外為務故彊南足以破楚西足以詘秦北足以敗燕中足以舉宋及以燕趙起而攻之若振槁, krp: 殆}
