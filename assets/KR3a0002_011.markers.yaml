  - {type: variant, offset: 1308, length: 1, content: 己, SBCK: 周不朋黨倜然莫不明通而公也古之士大夫也逺貌倜然高觀其朝廷其朝閒聽決百事不留恬然如無治者古之朝也音古莧反朝間朝退者如都無聽治處也恬然安閑貌如無治故四世有勝非幸也數也是所見也故曰佚而治約而詳不煩而功治之至也秦類之矣而有功古之至治有如此者雖佚而治雖約而詳雖不煩似之今秦雖然則有其諰矣懼諰兼是數具者而盡有之然而縣之以王}
