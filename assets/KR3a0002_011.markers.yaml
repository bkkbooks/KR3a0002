  - {type: variant, offset: 4111, length: 0, content: '', WYG: 皆有棄義之志有趨姦之心矣此姦之所以起也且上}
  - {type: punctuation, offset: 4112, content: ，, id: KR3a0002_tls_011-bkkpn766}
  - {type: 'tls:seg', offset: 4112, content: '', id: KR3a0002_tls_011-14a.31}
  - {type: variant, offset: 4112, length: 0, content: '', WYG: 下之師也夫下之和上譬之猶響之應聲影之像形也故為上者不可不順也不可不順義或曰當為慎夫義者内節於人而外節於萬物者也節即謂限禁也上安於主而下調於民者也得其節則上安而下調也内外上下節義之情也義之情皆在得其節然則凡為天下之要義為本而信次之古者禹湯本義務信而天下治桀紂棄義倍信而天下亂故為人上者必將慎禮義務忠信然後可此君人者之大本也慎或為順堂上不糞則郊草不瞻曠芸曠空也空謂無草也芸謂}
  - {type: page-break, offset: 4112, content: '', id: KR3a0002_WYG_011-12b, image: WYG0695/WYG0695-0218b.png}
  - {type: variant, offset: 4113, length: 0, content: '', WYG: 草可芸鋤也堂上猶未糞除則不暇瞻視郊野之草有無也言近者未理不暇及遠魯連子謂田巴曰堂上不糞者郊草不芸也白刄捍乎胷則目不見流矢捍蔽也捍蔽於胷謂見斬刺也懼白刄之甚不暇憂流矢也拔㦸加乎首則十指不辭斷言不惜十指而救首也拔或作校或作枝}
  - {type: variant, offset: 4114, length: 1, content: 理, WYG: 不以此為務也疾養緩急之有相先}
  - {type: variant, offset: 4116, length: 0, content: '', WYG: 也疾病也養與癢同言非不以郊草流矢十指為務痛癢緩急有所先救者也言此明人君當先務以禮義然後及他事也天論篇第十七天行有常天自有常行之道也不為堯存不為桀亡應之以治則吉應之以亂則凶吉凶由人天非愛堯而惡桀也彊本而節用則天不能貧本謂農桑養備而動時則天不能病養備謂使人衣食足動時謂勸人勤力不失時亦不使勞苦也養生既備動作以時則疾疹不作也脩道而不貳則天不能禍貳即倍也故水旱不能使之飢渴寒暑不能使之疾祅恠不能使之凶畜積有素故水旱不能使之飢渴既無飢寒之患則疫癘所不能加之矣本荒而用侈則天不能使之富養略而動罕則天不能使之全略減少也罕希也養略謂使人衣食不足也動希言怠惰也衣食減少而又怠惰則天不能全也倍道而妄行則天不能使之吉故水旱未至而飢渴寒暑未薄而疾薄廹也音博祅怪未至而凶受時與治世同而殃禍與治世異不可以怨天其道然也非天降災人自使然故明於天人之分則可謂至人矣知在人不在天斯為至人不為而成不求而得夫是之謂天職不為而成不求而得四時行焉百物生焉天之職任}
