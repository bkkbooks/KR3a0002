  - {type: variant, offset: 3624, length: 1, content: 分, SBCK: 也地之變星墜天化罕希也木鳴隂陽之怪之可也而畏之非也之怪異則可以其罕至謂懼則非因遂畏夫日月之有食風雨之不時怪星之黨見黨之多見賢遍反黨見頻見也言如朋是無世而不常有之上明而政平則是雖並世起無傷也謂一世並世起起也之中並上闇而政險則是雖無一至者無益也夫星之隊木之鳴是天地之變隂陽之化物之罕至者也怪之可也而畏之非也物之}
