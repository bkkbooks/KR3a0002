  - {type: variant, offset: 4268, length: 2, content: 審吾, SBCK: 殷因於夏禮雖質文廢起時有不同然其要歸以可知也其或繼周者雖百代可知也所損益可知也周因於殷禮所損益理貫不亂其條貫知理則也不亂不知貫不知應變能應變言必差錯而亂不知以禮爲條貫則不也貫之大體未甞亡也亂生其差治盡其詳差謬}
  - {type: variant, offset: 4268, length: 2, content: 審吾, WYG: 殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也理貫不亂知禮則其條貫不亂不知貫不知應變不知以禮為條貫則不能應變言必差錯而亂也貫之大體未嘗亡也亂生其差治盡其詳差謬也}
  - {type: variant, offset: 4268, length: 2, content: 審吾, krp: 殷因於夏禮雖質文廢起時有不同然其要歸以可知也其或繼周者雖百代可知也所損益可知也周因於殷禮所損益理貫不亂其條貫知理則也不亂不知貫不知應變能應變言必差錯而亂不知以禮爲條貫則不也貫之大體未甞亡也亂生其差治盡其詳差謬}
  - {type: variant, offset: 4272, length: 1, content: 適, SBCK: 治者在於精詳也差謬也所以亂者生於條貫故道之所善中則可從畸則不可爲匿則大惑之名謂偏畸者不偶其情禮者明示}
  - {type: variant, offset: 4272, length: 1, content: 適, WYG: 亂者生於條貫差謬可以治者在於精詳也故道之所善中則可從畸則不可為匿則大惑畸者不偶之名謂偏也道之所善得中則從偏側則不可為匿謂隱匿其情禮者明示}
