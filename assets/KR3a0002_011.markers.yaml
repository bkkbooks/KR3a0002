  - {type: variant, offset: 4190, length: 4, content: 請謁以悖, SBCK: 孰與物畜而制之之欲其豐冨孰尊大天而思慕而我裁制之與使物畜積從天而頌之孰與制天命而用之而我用之謂若曲者爲輪一直者爲桶任材而用也頌者美盛徳也從天而羙其盛徳豈如制裁天之所禽望時而侍之孰與應時而使之夫之望嵗也孰與望時而待謂若農􅀱使不失時也應春生夏長之因物而多之孰與聘能而化之}
