  - {type: variant, offset: 3632, length: 4, content: 百吏各謹, SBCK: 勉力力役也不禮義不脩内外無别男女淫亂則父子相疑上下乖離寇難並至夫是之謂人祅祅是生於亂三者錯無安國三祅於國中則無有安也三者三人祅也錯置也置此}
  - {type: page-break, offset: 3632, content: '', id: KR3a0002_SBCK_011-22a}
  - {type: variant, offset: 3632, length: 4, content: 百吏各謹, krp: 勉力力役也不禮義不脩内外無别男女淫亂則父子相疑上下乖離寇難並至夫是之謂人祅祅是生於亂三者錯無安國三祅於國中則無有安也三者三人祅也錯置也置此}
  - {type: 'tls:seg', offset: 3634, content: '', id: KR3a0002_tls_011-12a.4}
  - {type: variant, offset: 3634, length: 2, content: 各謹, WYG: 肅然莫不恭儉敦敬忠信而不楛古之吏也楛音苦濫惡也或曰讀為王事靡盬之盬盬不堅固也入其國觀其士大夫出於其門入於公門出於公門歸於其家無有私事也不比周不朋黨倜然莫不明通而公也古之士大夫也倜然高逺貌觀其朝廷其間聽決百事不留恬然如無治者古之朝也其間朝退也古莧反恬然安閑貌如無治者如都無聽治處也故四世有勝非幸也數也是所見也故曰佚而治約而詳不煩而功治之至也秦類之矣雖佚而治雖約而詳雖不煩而有功古之至治有如此者秦似之雖然則甚有其諰也諰懼兼數具者而盡有之然而縣之以王者之功名則倜倜然其不及遠矣縣音懸謂聯繫是何也則其殆無儒耶故曰粹而王粹謂全用儒道駁而霸無一焉而亡此亦秦之所短也積微月不勝日時不勝月嵗不勝時積微細之事月不如日言當日日留心於庶事不可怠忽也凡人好敖慢小事大事至然後興之務之如是則常不勝夫熟比於小事者矣熟比精審躬親之謂是何也則小事之至也數其縣日也博其為積也大數音朔博謂所縣繫時日多也大謂積小以成大若蟻蛭然也大事之至也希其縣日也淺其為積也小時日既淺則所積亦小故善日者王善時者霸補漏者危大荒者亡善謂愛惜不怠棄也補漏謂不能累功累業至於弊漏然後補之大荒謂都荒廢不治者故王者敬日敬謂不敢慢也故曰吉人為善惟日不足霸者敬時動作皆不失時或曰時變則懼治之不立也僅存之國危而後戚之戚憂亡國至亡而後知亡至死而後知死國之禍敗不可勝悔也所悔之事不可勝舉言甚多霸者之善著焉可以時託也霸者其善明著以}
