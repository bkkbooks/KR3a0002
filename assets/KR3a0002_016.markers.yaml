  - {type: variant, offset: 1119, length: 683, content: 孫也有天下者之世也埶籍之所存天下之宗室也土地之大封內千里人之眾數以億萬俄而天下倜然舉去桀紂而犇湯武反然舉疾惡桀紂而貴帝湯武是何也夫桀紂何失而湯武何得也是無他故焉桀紂者善為人之所惡而湯武者善為人之所好也人之所惡者何也曰汙漫爭奪貪利是也人之所好者何也曰禮義辭讓忠信是也今君人者辟稱比方則欲自並乎湯武若其所以統之則無以異於桀紂而求有湯武之功名可乎故凡得勝者必與人也凡得人者必與道也道也者何也曰禮義辭讓忠信是也故自四五萬而往者彊勝非眾之力也隆在信矣自數百里而往者安固非大之力也隆在脩政矣今已有數萬之眾者也陶誕比周以爭與已有數百里之國者也汙漫突盜以爭地然則是棄己之所以安彊而爭己之所以危弱也損己之所以不足以重己之所以有餘若是其悖繆也而求有湯武之功名可乎辟之是猶伏而咶天救經而引其足也說必不行矣俞務而俞遠為人臣者不恤己行之不行苟富利而已矣是渠衝入穴而求利也是仁人之所羞而不為也故人莫貴乎生莫樂乎安所以養生樂安者莫大乎禮義人知貴生樂安而棄禮義辟之是猶欲壽而歾頸也愚莫大焉故君人者愛民而安好士而榮兩者無一焉而亡詩曰价人維藩大師維垣此之謂也力術止義術行曷謂也曰秦之謂也威彊乎湯武禹廣大乎舜然而憂患不可勝校也諰諰然常恐天下之一合而軋己也此所謂力術止也武湯曷謂乎威彊乎湯武也者乃能使說己者使耳今楚父死焉國舉焉負三王之廟而辟於陳蔡之閒視可伺閒案欲剡其脛而以蹈秦之腹然而秦使左案左使右案右是能使讎人役也此所謂威彊乎湯武也曷謂廣大乎舜禹也曰古者百王之一天下臣諸侯也未有過封內千里者也今秦南乃有沙羡與俱是乃江南也北與胡貉為鄰戎西有巴東在楚者乃界於齊在韓者踰常山乃有臨慮在魏者乃據圍津即去大梁百有二, SBCK: 卷第}
