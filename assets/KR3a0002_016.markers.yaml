  - {type: variant, offset: 1803, length: 880, content: 里耳其在趙者剡然有苓而據松柏之塞負西海而固常山是地徧天下也威動海內彊殆中國此所謂廣大乎舜禹也然而憂患不可勝校也諰諰然常恐天下之一合而軋己也然則奈何曰節威反文案用夫端誠信全之君子治天下焉因與之參國政正是非治曲直而聽咸陽順者錯之不順者而後誅之若是則兵不復出於塞外而令行於天下矣若是則雖為之築明堂於塞外而朝諸侯殆可矣假今之世益地不如益信之務也應侯問孫卿子曰入秦何見孫卿子曰其國塞險形埶便山林川谷美天材之利多是形勝也入境觀其風俗其百姓樸其聲樂不流汙其服不挑甚畏有司而順古之民也及都邑官府其百吏肅然莫不恭儉敦敬忠信而不楛古之吏也入其國觀其士大夫出於其門入於公門出於公門歸於其家無有私事也不比周不朋黨倜然莫不明通而公也古之士大夫也觀其朝廷其朝閒聽決百事不留恬然如無治者古之朝也故四世有勝非幸也數也是所見也故曰佚而治約而詳不煩而功治之至也秦類之矣雖然則有其諰矣兼是數具者而盡有之然而縣之以王者之功名則倜倜然其不及遠矣是何也則其殆無儒邪故曰粹而王駮而霸無一焉而亡此亦秦之所短也積微月不勝日時不勝月歲不勝時凡人好敖慢小事大事至然後興之務之如是則常不勝夫敦比於小事者矣是何也則小事之至也數其縣日也博其為積也大大事之至也希其縣日也淺其為積也小故善日者王善時者霸補漏者危大荒者亡故王者敬日霸者敬時僅存之國危而後戚之亡國至亡而後知亡至死而後知死亡國之禍敗不可勝悔也霸者之善箸焉可以時記也王者之功名不可勝數可以日志也財物貨寶以大為重政教功名反是能積微者速成詩曰德輶如毛民鮮克舉之此之謂也凡姦人之所以起者以上之不貴義不敬義也夫義者所以限禁人之為惡與姦者也今上不貴義不敬義如是則下之人百姓皆有棄義之志而有趨姦之心矣此姦人之所以起也且上者下之師也夫下之和上辟之猶響之應聲影之像形也故為人上者不可不順也夫義者內節於人而外節於萬物者也上安於主而下調於民者也內外上下節者義之情也然則凡為天下之要義為本而信次之古者禹湯本義務信而天下治桀紂棄義背信而天下亂故為人上者必將慎禮義務忠信然後可此君人者之大本也堂上不糞則郊草不芸瞻曠白刃扞乎胸則目不見流矢拔戟加乎首則十指不辭斷非不以此為務也疾養緩急之有相先者也, SBCK: 六}
