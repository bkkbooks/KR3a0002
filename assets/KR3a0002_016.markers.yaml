  - {type: variant, offset: 901, length: 5, content: 而託王焉與, SBCK: 慎其獨也􅀃菀作誤在此耳此篇}
  - {type: variant, offset: 901, length: 366, content: 而託王焉與之參國政正是非如是則國孰敢不為義矣君臣上下貴賤長少至于庶人莫不為義則天下孰不欲合義矣賢士願相國之朝能士願相國之官好利之民莫不願以齊為歸是一天下也相國舍是而不為案直為是世俗之所以為則女主亂之宮詐臣亂之朝貪吏亂之官眾庶百姓皆以貪利爭奪為俗曷若是而可以持國乎今巨楚縣吾前大燕鰌吾後勁魏鉤吾右西壤之不絕若繩楚人則乃有襄賁開陽以臨吾左是一國作謀則三國必起而乘我如是則齊必斷而為四三國若假城然耳必為天下大笑曷若兩者孰足為也夫桀紂聖王之後子孫也有天下者之世也埶籍之所存天下之宗室也土地之大封內千里人之眾數以億萬俄而天下倜然舉去桀紂而犇湯武反然舉疾惡桀紂而貴帝湯武是何也夫桀紂何失而湯武何得也是無他故焉桀紂者善為人之所惡而湯武者善為人之所好也人之所惡者何也曰汙漫爭奪貪利是也人之所好者何也曰禮義辭讓忠信是也今君人者辟稱比方則欲自並乎湯武若, krp: 慎}
