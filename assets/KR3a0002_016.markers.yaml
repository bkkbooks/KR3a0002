  - {type: variant, offset: 437, length: 280, content: 危弱狂妄之威成乎滅亡也公孫子曰子發將而伐蔡克蔡獲蔡侯歸致命曰蔡侯奉其社稷而歸之楚舍屬二三子而治其地既楚發其賞子發辭曰發誡布令而敵退是主威也徙舉相攻而敵退是將威也合戰用力而敵退是眾威也臣舍不宜以眾威受賞譏之曰子發之致命也恭其辭賞也固夫尚賢使能賞有功罰有罪非獨一人為之也彼先王之道也一人之本也善善惡惡之應也治必由之古今一也古者明王之舉大事立大功也大事已博大功已立則君享其成群臣享其功士大夫益爵官人益秩庶人益祿是以為善者勸為不善者沮上下一心三軍同力是以百事成而功名大也今子發獨不然反先王之道亂楚國之法墮興功之臣恥受賞之屬無僇乎族黨而抑卑乎後世案獨以為私廉豈不過甚矣哉, SBCK: 微}
