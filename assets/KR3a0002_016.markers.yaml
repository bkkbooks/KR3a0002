  - {type: variant, offset: 20, length: 0, content: '', SBCK: 商之刑法未聞康誥曰十官也文謂節文威儀禮即周之儀禮也之允當也爵名從周謂五等諸侯及三百六散名之加於萬物者則從諸夏之成俗曲期方言也期成俗舊俗期㑹物之名者也㑹也曲期謂委曲逺方異俗之郷則因之}
  - {type: page-break, offset: 20, content: '', id: KR3a0002_SBCK_016-1b}
  - {type: variant, offset: 20, length: 0, content: '', krp: 商之刑法未聞康誥曰十官也文謂節文威儀禮即周之儀禮也之允當也爵名從周謂五等諸侯及三百六散名之加於萬物者則從諸夏之成俗曲期方言也期成俗舊俗期㑹物之名者也㑹也曲期謂委曲逺方異俗之郷則因之}
  - {type: variant, offset: 21, length: 3, content: 莫邪已, SBCK: 爲通所名遂以爲通而不改作也逺方異俗名之乖異者則因其散名之在人者散在人者舉名之分生之所以然者謂之性必然之理是所人生善惡固有之性也受作天性之和所生精合感應不事而自然謂之性生精合感應不使而自然言其天性如此也精和隂陽沖和氣也事任使也言人之性和氣所合也感應謂外物感心而來應也合謂若耳目之精靈與見聞之物性之好惡喜怒哀樂謂之情爲此六者謂之情人性感物之後分情}
  - {type: variant, offset: 21, length: 3, content: 莫邪已, WYG: 為通逺方異俗名之乖異者則因其所名遂以為通而不改作也散名之在人者舉名之分散在人者生之所以然者謂之性人生善惡故有必然之理是所受於天之性也性之和所生精合感應不事而自然謂之性和隂陽冲和氣也事任使也然人之性和氣所生精合感應不使而自然言其天性如此也精合謂耳目之精靈與聞見之物合也感應謂外物感心而來應也性之好惡喜怒哀樂謂之情人性感物之後分為此六者謂之情情}
  - {type: variant, offset: 21, length: 3, content: 莫邪已, krp: 爲通所名遂以爲通而不改作也逺方異俗名之乖異者則因其散名之在人者散在人者舉名之分生之所以然者謂之性必然之理是所人生善惡固有之性也受作天性之和所生精合感應不事而自然謂之性生精合感應不使而自然言其天性如此也精和隂陽沖和氣也事任使也言人之性和氣所合也感應謂外物感心而來應也合謂若耳目之精靈與見聞之物性之好惡喜怒哀樂謂之情爲此六者謂之情人性感物之後分情}
  - {type: punctuation, offset: 24, content: 。, id: KR3a0002_tls_016-bkkpn5}
  - {type: 'tls:seg', offset: 24, content: '', id: KR3a0002_tls_016-1a.8}
  - {type: variant, offset: 26, length: 0, content: '', SBCK: 心爲之擇謂之慮否而行謂之慮也情雖無極心擇可心慮而能爲之動謂之僞行之則爲矯拂其本性也僞矯也心有選擇能動而慮積焉能習焉而後成謂之僞學然後能矯其本性也心雖能動亦在積久習正利而爲謂之事事業謂商農工賈者也爲正道之事利則謂之正義而爲謂之行非苟邪行下孟反正義則謂之姦所以知之在人者謂之知知有所合謂之智者知有所合謂所知能合於物也知之在人者謂在人之心有所知智所以能之在人者謂之能者謂之能能才能也智有所能在人之心能有所合謂之能任其事耐乃來乃代二反能當爲耐古字通也耐謂堪性傷謂之病}
  - {type: page-break, offset: 26, content: '', id: KR3a0002_SBCK_016-2a}
  - {type: page-break, offset: 26, content: '', id: KR3a0002_SBCK_016-2b}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 心為之擇謂之慮情雖無極心擇可否而行謂之慮也心慮而能為之動謂之偽偽矯也心有選擇能動而行之則為}
  - {type: page-break, offset: 26, content: '', id: KR3a0002_WYG_016-2a, image: WYG0695/WYG0695-0257a.png}
  - {type: variant, offset: 26, length: 0, content: '', krp: 心爲之擇謂之慮否而行謂之慮也情雖無極心擇可心慮而能爲之動謂之僞行之則爲矯拂其本性也僞矯也心有選擇能動而慮積焉能習焉而後成謂之僞學然後能矯其本性也心雖能動亦在積久習正利而爲謂之事事業謂商農工賈者也爲正道之事利則謂之正義而爲謂之行非苟邪行下孟反正義則謂之姦所以知之在人者謂之知知有所合謂之智者知有所合謂所知能合於物也知之在人者謂在人之心有所知智所以能之在人者謂之能者謂之能能才能也智有所能在人之心能有所合謂之能任其事耐乃來乃代二反能當爲耐古字通也耐謂堪性傷謂之病}
  - {type: variant, offset: 27, length: 2, content: 剝脫, SBCK: 得其所傷於天性節遇謂之命遇謂之命命者節時也當時所命然也如天所是散名之在人者也是後王之成名也定之名也而或者乃爲堅白之説以是爲非斯亂名之略舉此上事是散名之在人者而後王可因襲成就素也尤故王者之制名名定而實辨道行而志通則慎率民而一焉也禮記曰黄帝正名百物以道謂制名之道志通言可曉}
  - {type: variant, offset: 27, length: 2, content: 剝脫, WYG: 矯拂其本性也慮積焉能習焉而後成謂之偽心雖能動亦在積久習學然後能矯其本性也正利而為謂之事為正道之利則謂之事業謂商農工賈之事也正義而為謂之行苟非正義則謂之奸邪行下孟反所以知之在人者謂之知知有所合謂之智知之在人者謂在人之心有所知者知有所合謂所知能於合物也知所以能之在人者謂之能能當為耐古字通也耐謂堪任其事耐乃來乃代二反性傷謂之病傷於天性}
  - {type: variant, offset: 27, length: 2, content: 剝脫, krp: 得其所傷於天性節遇謂之命遇謂之命命者節時也當時所命然也如天所是散名之在人者也是後王之成名也定之名也而或者乃爲堅白之説以是爲非斯亂名之略舉此上事是散名之在人者而後王可因襲成就素也尤故王者之制名名定而實辨道行而志通則慎率民而一焉也禮記曰黄帝正名百物以道謂制名之道志通言可曉}
  - {type: punctuation, offset: 29, content: ，, id: KR3a0002_tls_016-bkkpn6}
  - {type: 'tls:seg', offset: 29, content: '', id: KR3a0002_tls_016-1a.9}
  - {type: variant, offset: 30, length: 2, content: 砥厲, SBCK: 敢以異端改作也明民慎率民而一焉言故析辭擅作名以亂正名使民疑惑人多辨訟則謂之大姦其罪猶爲符節度量之罪也之難約大獄袍衣小獄襦新序曰子産決鄧析教民國大亂民口讙譁子産患之於是討鄧析而僇之民乃服袴民之獻袍衣襦袴者不可勝數以非爲是以是爲非鄭是其類也是非乃定故其民莫敢託爲竒辭以亂正名故其民愨愨則易使易使則公其民莫敢託爲竒辭以亂正名故壹於道法而謹於循令矣如是則其迹長矣不敢亂其名畏服於上迹王者所立之迹也下長丁丈反故迹長也迹長功成治之極也是謹於守名約之功也約要約謹嚴也今聖王没名守慢竒辭起名實亂是非之形不明則雖守法之吏誦數之儒亦皆亂所守偏儒者疑其所習竒辭亂實故法吏迷其若有王者起必將有循於舊名有作於新名善者名之孔子曰必也正名乎循之不善者作之故然則所爲有名與所縁有同異與制名之樞要不可不察也要大要揔縁因也樞目鼻口而制同異又不可常别雖萬物萬殊有時欲之舉其大名也物無名}
  - {type: page-break, offset: 30, content: '', id: KR3a0002_SBCK_016-3a}
  - {type: page-break, offset: 30, content: '', id: KR3a0002_SBCK_016-3b}
  - {type: variant, offset: 30, length: 2, content: 砥厲, WYG: 得其所節遇謂之命節時也當時遇謂之命命者知天所命然也是散名之在人者也是後王之成名也略舉此上事是散名之在人者而後王可因襲成就素定之名也而或者乃為堅白之説以是為非斯亂名之尤者也故王者之制名名定而實辨道行而志通則慎率民而一焉道謂制名之道志通言可曉也禮記曰黄帝正名百物以明民慎率民而一焉言不敢以異端改作故析辭擅作名以亂正名使民疑惑民多辯訟則謂之大姦其罪猶為符節度量之罪也新序曰子産决鄧析教民之難約大獄袍衣小獄鶉袴民之獻袍衣鶉袴者不可勝數以非為是以是為非鄭國大亂民口讙譁子産患之於是討鄧析而僇之民乃服是非乃定是其類也故其民莫敢為竒辭以亂正名故其民慤慤則易使易使則公其民莫敢為竒辭以亂正名故一於道法而謹於循令矣如是則其迹長矣迹王者所立之迹也下不敢亂其名畏服於上故迹長也長丁丈反迹長功成治之極也是謹於守名約之功也謹嚴也約要約今聖王没名守慢竒辭起名實亂是非之刑不明則雖守法之吏誦數之儒亦皆亂也竒辭亂實故法吏迷其所守偏儒疑其所習若有王者起必將有循於舊名有作於新名名之善者循之不善者作之故孔子曰必也正名乎然則所為有名與所縁有同異與制名之樞要不可不察也樞自也樞要大要總名也物無名}
