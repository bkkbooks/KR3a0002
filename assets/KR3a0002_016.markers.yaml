  - {type: variant, offset: 183, length: 1, content: 孰, SBCK: 察而知其意也綱故制爲名之樞要謂若謂之禽知其二足而羽謂之獸知其異形離心知其不同也此已下覆明有名之意萬物之形各異則分離人之心言人心交喻異物名實􅀇紐名使物物而交相譬喻之則名實􅀇深隱也紐結也若不爲分别立難知也深隱紛結貴賤不明同異不别如是則志必有不喻之患而事必有困廢之禍故知者爲之分别制名以指實之分界制名所以指明實無名則物雜亂故智者爲也事上以明貴賤下以辨同異貴賤明同異别如是則志無不喻之患事無困廢之禍此所爲有名也意在此有名之然則何縁而以同異異之意也設問覆明同曰縁天官官言各有所司主也縁天官天官耳目鼻口心體也謂之同謂之異則異也言天官謂之同則凡同類同情者其天官之意物也同故比方之疑似而通是所以共其約名以相期也小不同天官意想其同類所以共其同類同情謂若天下之馬雖白黑大而命之各爲制名也省約之名以相期會形體色理以目異也色五色形體形狀色理以目别異之而制名也理文理也言萬物形體聲音淸濁調竽竒聲以耳異類所以導衆樂者也不言革木之屬而言竽者清濁宫徴之屬調竽謂調和笙竽之聲也竽笙之始莊子天籟地籟亦其義也竒竒異也竒聲萬物衆聲或曰竽八音之首故黄帝使泠綸取竹作管是竹爲聲音者也之異甘苦鹹淡辛酸竒味以口異之異者也竒味衆味香臭芬鬱腥臊洒酸竒臭以鼻異之香氣芬花草酸氣也竒臭衆臭之異者氣之應臯者爲臭故香亦謂之也鬱腐臭也周禮曰鳥臕色而沙鳴鬱洒未詳酸暑浥之誤耳禮記曰馬黒脊而班臂漏鄭音螻螻蛄臭者也臭禮記曰皆佩容臭或曰洒當爲漏篆文稍相似因疾養凔熱滑鈹輕重以形體異凔寒也滑與汩同疾痛也養與癢同澁同輕重謂分銖與鈞石也此皆在人形體别異之而立名鈹與被同皆壞亂之名或曰滑如字鈹當爲鈒傳寫誤耳與又楚陵反也凔初亮反說故喜怨哀樂愛惡欲以心異猶律文之故誤也說讀爲脫誤也脫故心有徴知占萬物而知之徴召也言心能徴知則縁耳而知聲可也縁目而知形可也也以縁因形爲之立名心雖有知不因耳目亦不可也心能占知萬物故可以因耳而知聲因目而知然而徴知必將待天官之當簿其類然後可也官天書不雜亂也類謂可聞之物耳之類可見之物目之類言耳目也當主也丁浪反簿簿書也當簿謂如各主當其簿其類然後可也言心亦不能自主之也心雖能占所知必將任使耳目令各主掌五官簿之而不知心徴之而無說則人莫不然謂之不知此所縁而以同異也官能主之而不能知心五官耳目鼻口心也五如此故聖人分别因立同異之名使人曉之也能占而知之若又無説則人皆謂之不知也以其然後隨而命之之此已下覆明制名樞要之意也旣分同異之後然後隨所名而命同則同之異則異之異類則異名同類則同名單足以喻則單單不足以喻則兼喻其物則謂之馬喻其毛色則謂之白馬單物之單名也兼複名也喻曉也謂若止比也黄馬之單與兼無所相避則共雖共不爲害矣之馬雖萬馬同名複名謂之白馬亦然雖共不害於分别謂單名複名有不可相避者則雖共同其名謂若單名謂也知異實者之異名也故使異實者莫不異名也不可亂也不亂也謂若牛與馬爲異實也知謂人心知之異實者異名則猶使異實者莫不同名也故猶使異實者有時而同恐異實異名卒不可徧舉名其不可相亂猶如使同實者莫不同名也一名也或曰異實當爲同實言使異實者異故萬物雖衆有時而欲徧舉之故謂之物物也者大共名也推而共之共則有共至於無共然後止於揔謂之物散爲萬名是異名者本生於則同名者也推比共名之理則有共至於無共言自同至於異也起有時而欲徧舉之故謂之鳥獸鳥獸也者大别名也推而別之別則有別至於無別然後止名者生於欲都舉異名也言此者所以别異名言自異至於同也謂揔其萬名復謂之物是同之意同名名無固宜約之以命約定俗成謂之宜異於約則謂之不宜約之以命謂立其約而命名無故宜言名本無定也人皆謂之天也之若約爲天則名無固實約之以命實約定俗成謂之實名文辭謂若天地日月之比也實名謂以名實各使成言語名有固善徑易而不拂謂之善名謂易曉之名也即謂徑疾平易而不違拂待訓解者拂音佛呼其名遂曉共意不物有同狀而異所者兩馬謂若處之類也同狀各在一有異狀而同所者是一身也蠶蛾之謂若老㓜異狀同是也類亦可别也狀同而爲異所者雖可合謂之二實合同謂之馬其實二也即謂兩馬之類名雖可狀變而實無别而爲異者謂之化有化而無别謂之一實而實不狀雖變鴽之類雖有化而無别異故謂之一實言其實一也可别爲異所則謂之化化者改舊形之名若田鼠化爲此事之所以稽實定數也一二之數也稽考其實而定此制名之樞要也意是其樞要也此皆明制名之大後王之成名不可不}
