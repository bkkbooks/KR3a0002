  - {type: variant, offset: 225, length: 1, content: 賞, SBCK: 辨􅀃也及辨􅀃之意也荀卿自述正名實不喻然後命命不喻然後期期不喻然後􅀃􅀃不喻然後辨之也期㑹也命謂以名命曉也謂若白馬但言馬則未喻故更以白㑹之若是事多言物之稍難明命之不喻者則以形狀大小㑹之使人易􅀃亦不喻者則反覆辨明之也㑹亦不喻者則􅀃其所以然若故期命辨􅀃也者用之大文也而王業之始也不行故爲用之大文無期命辨􅀃則萬事名故曰王業之始也飾王業之始在於正名聞而實喻名之用也之名易知也用本在於累而成文名之麗也所以爲名之華累名而成文辭或曰麗同配偶也麗詩書之言皆是也用麗俱得謂之知名深俱淺與則爲知名不失其所名也者所以期累實也數其實以成名者期於累名者所以期於使實各異也言語或曰累實當爲異實言辭也者兼異實之名以論一意也數異實之名以成言辭猶若元年春辭者􅀃事之言辭兼異實之名謂兼名以論公即位之一意也王正月公即位兼􅀃亡實之辨􅀃也者不異實名以喻動靜之道也異常實之名所以喻是非之理動靜是非也言辨􅀃者不唯兼者明兩端者辭者論一意辨期命也者辨􅀃之用也名以㑹物也期謂委曲爲爲辨􅀃之用期與命所以辨􅀃也者心之象道也爲心想象辨􅀃所以明則辨􅀃也之道故心有所心也者道之工宰也能生物心之工能成物宰然也於道亦道也者治之經理也爲理國之常法條貫也經常也理條貫也言道心合於道􅀃合於心辭合於􅀃爲辭謂心能知言􅀃爲􅀃成文辭能成言也道􅀃能合心正名而期質請而喻辨異而不過推類而不悖聽則合文辨則盡故以正道而辨姦猶引繩以持曲直是故邪􅀃不能亂百家無所竄不惑也質物之形質質請而喻謂正名而期謂正其名以㑹物使人以别異物則已不過􅀃也推類而不悖謂推同類之物使若形質自請其名然因而喻知其實也辨異而不過謂足則取其合文理者自辨􅀃則盡其事實也正道謂正名之共其名不使乖悖也聼則合文辨則盡故謂聽他人之􅀃所隱竄言皆知其姦詐也道持制也竄匿也百家無有兼聽之明而無奮矜之容有兼覆之厚而無伐德之色􅀃行則天下正􅀃不行則白道而不􅄀窮是以聖人之辨􅀃也辨􅀃雖兼聽兼覆而無奮矜伐德之色是時百家曲􅀃皆競自矜伐故述聖人也􅄀窮謂退而窮處也也白道明道也􅄀幽隱詩曰顒顒卬卬如珪如璋令問令望愷悌君子四方爲綱此之謂也敬順也卬卬志氣髙朗也詩大雅卷阿之篇顒顒體貌辭讓之節得矣長少之理順矣忌諱不稱祅辭不出以仁心􅀃以學心聽以公心辨仁以人之􅀃不爭辨也以公心辨謂以至心辨他人之􅀃是心􅀃謂務於開導不騁辭辨也以學心聽悚敬而聽他也非不動乎衆人之非譽動但自正其辭􅀃也不以衆人是非而爲之不治觀者之耳目夸􅅭於衆人其所辨􅀃不求不賂貴者之權埶貴者之權埶也不爲貨賂而移不利傳辟者之辭也辟讀曰僻利謂􅀃愛之故能處道而不貳吐而不奪利而不流貴公正而賤鄙爭是士君子之辨􅀃也謂吐論人吐而不奪利或爲和人不能奪詩曰長夜漫兮永思騫兮大古之不慢兮禮義之不愆兮何恤人之言兮此之謂也此以明辨􅀃得其正何憂人之言也逸詩也漫謂漫漫長夜貌騫咎也引君子之言涉然而精俛然而類差差然而齊彼正其名當其辭以務白其志義者也統類不虚誕也差差不齊貌謂論列是非似若不齊然終渉然深入之貌俛然俯就貌俛然而類謂俯近於人皆有當丁浪反歸於齊一也彼名辭也者志義之使也足以相通則舎之矣苟之姦也使所吏反通謂得其理故名之足以指實辭足以見極則舍之矣見賢遍反極中也本也外是者謂之訒是君子之所棄而愚者拾以爲已實是務爲難􅀃耳君子}
