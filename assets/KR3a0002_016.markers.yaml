  - {type: variant, offset: 183, length: 1, content: 孰, WYG: 察而知其意也異形離心萬物之形各異則分離人之心言人心知其不同也此已下覆明有名之意交喻異物名實𤣥紐𤣥深隱也紐結也若不為分别立名使物物而交相譬喻之則名實深隠紛結難知也貴賤不明同異不别如是則志必有不喻之患而事必有困廢之禍故知者為之分别制名以指實無名則物雜亂故智者為之分辨制名所以指明實事也上以明貴賤下以辨同異貴賤明同異别如是則志無不喻之患事無困廢之禍此所為有名也有名之意在此然則何縁而以同異設問覆明同異之意也曰縁天官天官耳鼻口心體也謂之官言各有所司主也縁天官言天官謂之同則同謂之異則異也凡同類同情者其天官之意物也同故比方之疑似而通是所以共其約名以相期也同類同情謂若天下之馬雖白黑小大不同天官意想其同類所以共其省約之名以相期會而命之名為制名也形體色理以目異形體形狀也色五色也理文理也言萬物形體色理以目别異之而制名也聲音清濁調竽竒聲以耳異清濁宫徴之屬調竽謂調和笙竽之聲也竽笙類所以導衆樂者也不言革木之屬而言竽者或曰竽八音之首故黄帝使伶倫取竹作筦是竹為音聲之始莊子天籟地籟亦其義也竒竒異也竒聲萬物衆聲之異者也甘苦鹹淡辛酸竒味以口異竒味衆味之異者也香臭芬鬱腥臊洒酸竒臭以鼻異芬花草之香氣也鬱腐臭也禮記曰烏皫色而沙鳴鬱洒未詳酸暑浥之酸氣也竒臭衆臭之異者氣之應鼻者為臭故香亦謂之臭禮記曰皆佩容臭或曰洒當為漏篆文稍相似因誤耳禮記曰馬黒脊而般臂漏鄭音螻螻蛄臭者也疾養凔熱滑鈹輕重以形體異疾痛也養與癢同凔寒也滑與汩同鈹與披同皆壞亂之名或曰滑如字鈹當為鈒傳寫誤耳與澁同輕重謂分銖與鈞石也此皆在人形體别異之而立名也凔初亮反又楚陵反說故喜怒哀樂愛惡欲以心異說讀為脫誤也脫故猶律文之故誤也心有徴知徴召也言心能召萬物而知之徴知則縁耳而知聲可也縁目而知形可也縁因也以心能召知萬物故可以因耳而知聲因目而知形為之立名心雖有知不因耳目亦不可也然而徴知必將待天官之當簿其類然後可也天官耳目也當主也丁浪反簿書也當簿謂如各主當其簿書不雜亂也類謂可聞之物耳之類可見之物目之類言心雖能召所知必將任使耳目令各主掌其類然後可也言心亦不能自主之也五官簿之而不知心徴之而無說則人莫不然謂之不知此所縁而以同異也五官耳目鼻口心也五官能主之而不能知心能召而知之若又無説則人皆謂之不知也以其如此故聖人分别因立同異之名使人曉之也然後隨而命之既分同異之後然後隨所名而命之此已下覆明制名樞要之意也同則同之異則異之同類則同名異類則異名單足以喻則單單不足以喻則兼單物之單名也兼復名也喻曉也謂若止喻其物則謂之馬喻其毛色則謂之白馬黄馬之比也單與兼無所相避則共雖共不為害矣謂單名復名不可相避者則雖共同其名若單名謂之馬萬馬同名復名謂之白馬亦然雖共不害於分别也知異實者之異名也故使異實者莫不異名也不可亂也知謂人心知之異實者異名則不亂也謂若牛與馬為異實也猶使異實者莫不同名也恐異實異名卒不可徧舉故猶使異實者有時而同一名也或曰異實當為同實言使異實者異名其不可相亂猶如使同實者莫不同名也故萬物雖衆有時而欲徧舉之故謂之物物也者大共名也推而共之共則有共至於無共然後止推此共名之理則有共至於無共言自同至於異也起於總謂之物散為萬名是異名者本生於别同名者也有時而欲徧舉之故謂之鳥獸鳥獸也者大别名也推而别之别則有别至於無别然後止言自異至於同也謂總其萬名復謂之物是同名者生於欲都舉異名也言此者所以别異名同名之意名無固宜約之以命約定俗成謂之宜異於約則謂之不宜名無固宜言名本無定也約之以命謂立其約而命之若約為天則人皆謂之天也名無固實約之以命實約定俗成謂之實名實名以名實各使成言語文辭謂若天地日月之比也名有固善徑易而不拂謂之善名徑疾平易而不違拂謂易曉之名也即謂呼其名遂曉其意不待訓解者拂音佛物有同狀而異所者謂若兩馬同狀各在一處之類也有異狀而同所者謂若老㓜異狀同是一身也蠶蛾之類亦是也可别也而為異所者雖可合謂之二實即謂兩馬之類名雖可合同謂之馬其實二也狀變而實無别而為異者謂之化有化而無别謂之一實狀雖變而實可别為異所則謂之化化者改舊形之名若田鼠化為鴽之類雖有化而無别異故謂之一實言其實一也此事之所以稽實定數也稽考其實而定一二之數也此制名之樞要也此皆明制名之大意是其樞要後王之成名不可不}
