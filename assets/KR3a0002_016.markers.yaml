  - {type: variant, offset: 237, length: 0, content: '', SBCK: 而北走也哉多猶欲之也惡北無寡謂北雖至寡猶惡之也有人欲往南而惡往北也欲南無多謂南雖至之不可得盡因肯捨南而走北乎言此人旣欲南而惡北豈爲夫南今人所欲無多所惡無寡豈爲夫所欲之不可盡也離得欲之道而取所惡也哉惡雖至寡猶惡之豈爲欲之今夫人情欲雖至多猶欲之而宋墨之徒不喻斯理而強令去欲寡欲此何異使之離南不可得盡因肯取所惡哉言聖人以道節欲則各安其分矣惡必不可得也而北走捨欲而取故可道而從之奚以損之而亂則從之奚以損亂而過此也可道合道也損減也言若合道不可道而離之奚以益之而治雖爲有欲之􅀃亦可從之不合道雖爲去欲之不合道則離之奚以益治而過此此明若合道離之也􅀃亦可故知者論道而已矣小家珍􅀃之所願皆衰矣於有欲無欲也能知此者則宋墨之家自知治亂者論合道與不合道而已矣不在欲寡欲者皆衰矣珍貴其􅀃願人之去凡人之取也所欲未甞粹而來也其去也所惡未甞粹而往也故人無動而不可以不與權俱欲未甞全來意有所去其粹全也凡人意有所取其也能權變適時故以喻道也言人之欲惡常難適意故其惡未甞全去皆所不適意也權者稱之權所以知輕重者道者不戚戚於貧賤不汲汲於富貴故能遣夫得喪欲惡所舉動而不可不與道俱不與道俱則惑於欲惡矣故達欲自節矣不以介懷而衡不正則重縣於仰而人以爲輕輕縣於俛而人以爲重此人所以惑於輕重也等而平矣若偏舉之則重縣於俛而猶未平也遂衡稱之衡也不正謂偏舉也衡若均舉之則輕重重是惑也以此定輕權不正則禍託於欲而人以爲福福託於惡而人以爲禍此亦人所以惑於禍福也謂無德而禄因以爲福不知禍不旋踵也福託於惡謂若權不正謂不知道而偏見如稱之權不正者也禍託於欲也言不知道則惑於倚伏之理也有才未偶因以爲禍不知先號後笑道者古今之正權離道而内自擇則不知禍福之所託知禍道能則不知輕重離道則不知禍福也福之正如權之知輕重之正離權易者以一易一人曰無得亦無喪也物相易易謂以以一易兩人曰無喪而有得也以兩易一人曰無得而有喪也計者取所多謀者從所可以兩易一人莫之爲明其數也從道而出猶以一易兩也奚喪喪儒術是也從道則無所離道而内自擇是猶以兩易一也奚得得宋墨也離道則無所其累百年之欲易一時之嫌然且爲之不明其數也謂不以道求富貴累積也嫌惡也此禍也終遇有甞試深觀其隱而難其察者又雖隱有讀爲觀之則可知也而難察以下四事志輕理而不重物者無之有也之精微理爲道外重物而不内憂者無之有也行離理而不外危者無之有也外危而不内恐者無之有也心憂恐則口銜芻豢而不知其味耳聽鍾鼓而不知其聲目視黼黻而不知其狀輕煖平簟而體不知其安故嚮萬物之美而不能嗛也獻也嗛足也快也史記嚮讀爲享獻也謂受其嗛於志嗛口簟反樂􅐧􅐧曰先王以爲假而得問而嗛之則不能離也意終亦不能離於不足也假或有人問之蹔以爲足其故嚮萬物之美而盛憂兼萬物之利而盛害如此者其求物也飬生也粥壽也耶問之辭也皆當爲故欲飬其欲而縱其情終不可養也縱其情則故欲養其性而危其形欲養其樂而攻其心欲養其名而亂其行重物皆外致也之所如此者雖封侯稱君其與夫盗無以異乗軒戴絻其與無足無以異冕同絻與}
