  - {type: variant, offset: 244, length: 2, content: 威禮, SBCK: 役使已爲物心平愉則色不及傭而可以養目保之人亦可養目所視之物不及傭聲不及傭而可以養耳􅂼食菜羮而可以養口麤布之衣麤紃之履而可以養體麤麻屨也麤紃之履屋室廬􅁃葭稾蓐尚机筵而可以養形屋也廬草賤人之居也尚机筵未詳或曰尚言尚古猶若稱尚書􅁃屋如廪􅁃者葭廬也以廬爲屋室葭稾爲席蓐者貧質朴之机筵也之尚也尚机筵故無萬物之美而可以養}
