  - {type: variant, offset: 6, length: 0, content: '', SBCK: 登仕郎守大理平事􅀭倞注正名篇第二十二以是爲非故作正名篇尹文子曰是時公孫龍惠施之徒亂名改作事物無所隱其理矣名有三科一曰命物之名方圓白黒形以定名名以定事事以驗名察其所以然則形名之與也三曰況謂之名賢愚愛憎是也是也二曰毁譽之名善惡貴賤是後王之成名名謂舊名可法効者也後之王者有素定成就之}
  - {type: variant, offset: 6, length: 14, content: 刑范正金錫美工冶巧火齊得剖刑, WYG: 十官也文謂節文威儀禮即周之儀禮也散名之加於萬物者則從諸夏之成俗曲期成俗舊俗方言也期㑹也曲期謂委曲期㑹物之名者也逺方異俗之鄉則因之}
  - {type: page-break, offset: 6, content: '', id: KR3a0002_WYG_016-1b, image: WYG0695/WYG0695-0256d.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 登仕郎守大理平事揚倞注正名篇第二十二以是爲非故作正名篇尹文子曰是時公孫龍惠施之徒亂名改作事物無所隱其理矣名有三科一曰命物之名方圓白黒形以定名名以定事事以驗名察其所以然則形名之與也三曰況謂之名賢愚愛憎是也是也二曰毁譽之名善惡貴賤是後王之成名名謂舊名可法効者也後之王者有素定成就之}
