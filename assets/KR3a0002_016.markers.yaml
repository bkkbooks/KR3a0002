  - {type: variant, offset: 237, length: 0, content: '', WYG: 而北走也哉有人欲徃南而惡徃北也欲南無多謂南雖至多猶欲之也惡北無寡謂北雖至寡猶惡之也言此人既欲南而惡北豈為夫南之不可得盡因肯捨南而走北乎今人所欲無多所惡無寡豈為夫所欲之不可盡也離得欲之得之道而取所惡也哉今夫人情欲雖至多猶欲之惡雖至寡猶惡之豈為欲之不可得盡因肯取所惡哉言聖人以道節欲則各安其分矣而宋墨之徒不喻斯理而彊令去欲寡欲此何異使之離南而北走捨欲而取惡必不可得也故可道而從之奚以損之而亂可道合道也損減也言若合道則從之奚以損亂而過此也不可道而離之奚以益之而治不合道則離之奚以益治而過此此明上合道雖為有欲之説亦可從之不合道雖為去欲之説亦可離之也故知者論道而已矣小家珍説之所願皆衰矣知治亂者論合道與不合道而已矣不在於有欲無欲也能知此者則宋墨之家自珍貴其説願人之去欲寡欲者皆衰矣凡人之取也所欲未嘗粹而來也其去也所惡未嘗粹而徃也故人無動而不可以不與權俱粹全也凡人意有所取其欲未嘗全來意有所去其惡未嘗全去皆所不適意也權者秤之權所以知輕重者也能權變適時故以喻道也言人之欲惡常難適意故其所舉動而不可不與道俱不與道俱則惑於欲惡矣故逹道者不戚戚於貧賤不汲汲於富貴故能遣夫得䘮欲惡不以介懷而欲自節矣衡不正則重懸於仰而人以為輕輕懸於俛而人以為重此人所以惑於輕重也衡枰之衡也不正謂偏舉也衡若均舉之則輕重等而平矣若偏舉之則重懸於俛而猶未平也遂以此定輕重是惑也權不正則禍託於欲而人以為福福託於惡而人以為禍此亦人所以惑於禍福也權不正謂不知道而偏見如秤之權不正者也禍託於欲謂無德而禄因以為福不知禍不旋踵也福託於惡謂若有才未偶因以為禍不知先號後笑也言不知道則惑於倚伏之理也道者古今之正權離道而内自擇則不知禍福之所託道能知禍福之正如權之知輕重之正離權則不知輕重離道則不知禍福也易者以一易一人曰無得亦無䘮也易謂以物相易以一易兩人曰無䘮而有得也以兩易一人曰無得而有䘮也計者取所多謀者從所可以兩易一人莫之為明其數也從道而出猶以一易兩也奚䘮從道則無所䘮儒術是也離道而内自擇是猶以兩易一也奚得離道則無所得宋墨是也其累百年之欲易一時之嫌然且為之不明其數也累積也嫌惡也此謂不以道求富貴終遇禍也有甞試深觀其隱而難其察者有讀為又雖隱而難察以下四事觀之則可知也志輕理而不重物者無之有也理為道之精微外重物而不内憂者無之有也行離理而不外危者無之有也外危而不内恐者無之有也心憂恐則口銜芻豢而不知其味耳聽鐘鼓而不知其聲目視黼黻而不知其狀輕煖平簟而體不知其安故嚮萬物之羙而不能嗛也嚮讀為享獻也謂受其獻也嗛足也快也史記樂毅曰先王以為嗛於志嗛口簟反假而得問而嗛之則不能離也假或有人問之蹔以為足其意終亦不能離於不足也故嚮萬物之羙而盛憂兼萬物之利而盛害如此者其求物也飬生也粥夀也也皆當為耶問之辭故欲飬其欲而縱其情縱其情則欲終不可養也欲養其性而危其形欲養其樂而攻其心欲飬其名而亂其行皆外重物之所致也如此者雖封侯稱君其與夫盗無以異乘軒戴絻與其無足無以異絻與冕同}
