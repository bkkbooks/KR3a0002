  - {type: variant, offset: 1618, length: 184, content: 天下之一合而軋己也此所謂力術止也武湯曷謂乎威彊乎湯武也者乃能使說己者使耳今楚父死焉國舉焉負三王之廟而辟於陳蔡之閒視可伺閒案欲剡其脛而以蹈秦之腹然而秦使左案左使右案右是能使讎人役也此所謂威彊乎湯武也曷謂廣大乎舜禹也曰古者百王之一天下臣諸侯也未有過封內千里者也今秦南乃有沙羡與俱是乃江南也北與胡貉為鄰戎西有巴東在楚者乃界於齊在韓者踰常山乃有臨慮在魏者乃據圍津即去大梁百有二, krp: 荀子卷第}
