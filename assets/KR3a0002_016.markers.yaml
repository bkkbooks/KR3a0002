  - {type: variant, offset: 5, length: 0, content: '', WYG: 二是時公孫龍惠施之徒亂名改作以是為非故作正名篇尹文子曰形以定名名以定事事以驗名察其所以然則形名之與事物無所隱其理矣名有三科一曰命物之名方圓白黒是也二曰毁譽之名善惡貴賤是也三曰况謂之名賢愚愛憎是也後王之成名後之王者有素定成就之名謂舊名可法効者也刑名從商爵名從周文名從禮商之刑法未聞康誥曰殷罰有倫是亦言殷刑之允當也爵名從周謂五等諸侯及三百}
