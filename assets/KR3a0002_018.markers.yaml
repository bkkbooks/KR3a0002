  - {type: variant, offset: 3554, length: 0, content: '', WYG: 復治也與愚}
  - {type: variant, offset: 3555, length: 8, content: 有義榮有埶辱無害, WYG: 疑願聞反辭反辭反覆敘說之辭猶楚詞亂曰弟子言當時政事既與愚反疑惑之人故更願以亂辭敘之也其小歌也此下一章即其反辭故謂之小歌總論前意也念彼逺方何其塞矣逺方猶大道也仁人絀約暴人􅄛矣􅄛饒也忠臣危殆讒人服矣服用也本或作讒人般矣般樂也音盤琁玉瑤珠不知佩也說文云琁赤王瑤美玉也孔安國曰瑤美石言不知以此四實}
