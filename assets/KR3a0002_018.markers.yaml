  - {type: variant, offset: 742, length: 0, content: '', SBCK: 身休息畎同甽與得后稷五榖殖夔爲樂正鳥獸服笙鏞以間鳥獸蹌蹌也謂擊石拊石百獸率舞契爲司徒民知孝弟尊有德禹有功抑下鴻使歸下也鴻即洪抑遏也下謂治水降水警予也水也書曰禹辟除民害逐共工于幽此云禹}
  - {type: page-break, offset: 742, content: '', id: KR3a0002_SBCK_018-5b}
  - {type: variant, offset: 742, length: 3, content: 未嘗合, WYG: 後世法之成律貫法之為條貫也賦篇第二十六所賦之事皆生人所切而時多不知故特示之或曰荀卿所賦甚多今存者唯此言也舊第二十二今亦降在下爰有大物爰}
