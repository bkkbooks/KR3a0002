  - {type: 'tls:seg', offset: 3466, content: '', id: KR3a0002_tls_018-10a.34}
  - {type: variant, offset: 3466, length: 6, content: 流淫汙僈犯分, SBCK: 貴也行至公以利百姓非謂無私罪人憼革二兵儆同憼與邪嫉惡乃以儆備増益兵革之道言強盛也備也二副也謂無私罪人言果於去惡也言去道德純備讒口將將或曰將將讀爲蹡蹡進貌將去也言以讒言相退送仁人絀約敖暴擅強窮約絀退天下幽險恐失世英暗凶險天下幽賢不見用也如此必恐時螭龍爲蝘蜓鴟梟爲鳳皇如龍而黄說文云螭龍之聖反謂之蝘蜓鴟梟之惡反以爲鳳皇也北方謂之蛇螻蝘蜓守宫言世俗不知善惡螭比干見刳孔子拘匡昭昭乎其知之明也郁郁乎其遇時之不祥也拂乎其欲禮義之大行也闇乎天下之晦盲也此蓋誤耳當爲拂乎其郁郁有文章貌拂違也義之大行晦盲言人莫之識也遇時之不詳也郁郁乎其欲禮皓天不復憂無疆也千歲必反古之常也也呼昊天而許之云世}
  - {type: page-break, offset: 3466, content: '', id: KR3a0002_SBCK_018-16b}
