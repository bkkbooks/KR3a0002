  - {type: variant, offset: 3486, length: 1, content: 夫, SBCK: 娵爲醜惡蓋一名明陬漢書音義韋昭曰閭閭娵古之美女後語作明娵楚詞七諫謂閭都蓋都字誤爲奢耳後語作子都莫之媒言無人爲之謀也陬梁王魏瞿之美女字奢當爲子都鄭之美人詩曰不見子于反娵子嫫母刁父}
  - {type: variant, offset: 3486, length: 0, content: '', WYG: 以能合從又善連衡從竪也子容反衡横也言箴亦能如戰國合從連衡之人南北為從東西為衡也下覆百姓上飾帝王功業甚博不見賢良見猶顯也不自顯其功伐見賢遍反時用則存不用則亡順時行藏臣愚不識敢請之王王曰此夫始生鉅其成功小者耶為鐵則鉅為箴則小長其尾而銳其剽者耶長其尾謂線也剽末也謂箴之鋒也莊子曰有實而無乎處者宇也有長而無本剽者宙也剽杪末之意匹小反頭銛達而剽趙繚者耶重說長其尾而銳其剽趙讀為掉掉繚長貌言箴掉尾而繚也掉徒弔反一徃一來結尾以為事結其尾線然後行箴無羽無翼反覆甚極極讀為亟亟急也尾生而事起尾邅而事已尾邅廻盤結則箴功畢也簪以為父管以為母簮形似箴而大故曰為父言此者欲狀其形也管所以盛箴故曰為母禮記曰箴管線纊也既以縫表又以連裏}
