  - {type: variant, offset: 3473, length: 2, content: 理驕, SBCK: 皓與昊同昊天元氣昊大必反於治亦古之常道千或爲卒不復憂不可竟也復自解釋云亂久弟子勉學天不忘也爲善無益而解墯故以此勉之也言天道福善故曰不忘恐弟子疑聖人共手時幾將矣也將送也去也言戰國之時世事已去共讀爲拱聖人拱手言不得用也幾辭治也不可復與愚以疑願聞反辭辭猶楚詞亂曰弟反辭反復叙􅀃之之人故更願以亂辭叙之也子言當時政事旣與愚反疑惑其小歌也即其反辭此下一章揔論前意也故謂之小歌念彼逺方何其塞矣大道也逺方猶仁人絀約}
