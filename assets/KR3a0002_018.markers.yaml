  - {type: variant, offset: 9, length: 0, content: '', SBCK: 殃愚闇愚闇墮賢艮重墮賢良也墮許䂓反世之殃由於愚此愚闇以人主無賢如瞽無相何倀倀息亮反倀丑羊反倀倀無所往貌相請布基愼聖人請􅀃陳布愼讀爲順順聖人也基業在乎愚而自專事不治主忌苟勝羣臣莫諫必逢災苟欲勝人也主旣猜忌又論臣過反其施人臣言論施惠施式豉反之過在乎不行尊主安國尚賢義拒諫飾非愚而上同國必禍諫飾非以愚闇之性苟合於上則所以尊主安國在崇尚賢義若拒也必禍曷謂罷國多私疲謂弱不任事者也所以弱假設問荅以明其意罷讀曰韋昭曰罷病也無行曰病者由於多私國語罷士無伍比周還主黨與施繞還逺賢近讒忠臣蔽塞主勢移曷謂賢明君臣道則爲賢明君臣之上能尊主愛下民主誠聽之天下爲一海内賔主之孽讒人達賢能遁逃國乃蹷顚覆也孽災也蹷愚以重愚闇以重闇成爲桀遂至於桀也久而愚闇愈甚世之災妬賢能飛廉知政任惡來有力飛廉善走父子俱以材力事紂也惡來飛廉之子秦之先也史記曰惡來卑其志意大其園囿髙其臺榭逺慮不慕往古卑其志意言無武王怒師牧野紂卒易郷啓乃下攻于後啓微子名下降易郷回也謂前徒倒戈爲向也郷讀武王善之封於宋立其祖不絶也左傳曰立其祖使祭祀帝乙宋祖世之衰讒人歸比干見刳箕子累}
  - {type: page-break, offset: 9, content: '', id: KR3a0002_SBCK_018-1b}
  - {type: page-break, offset: 9, content: '', id: KR3a0002_SBCK_018-2a}
