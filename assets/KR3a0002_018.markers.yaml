  - {type: variant, offset: 3436, length: 4, content: 形埶勝上, WYG: 堯禹參}
  - {type: variant, offset: 3436, length: 3, content: 形埶勝, krp: 堯禹成萬物其德厚於堯禹者矣參謂天地相似雲所以致雨生精微乎毫毛而盈大乎㝢宙時則如毫毛其廣大㝢與宇同言細微之爲宇}
  - {type: punctuation, offset: 3439, content: ，, id: KR3a0002_tls_018-bkkpn790}
  - {type: 'tls:seg', offset: 3439, content: '', id: KR3a0002_tls_018-10a.30}
  - {type: variant, offset: 3440, length: 1, content: 為, SBCK: 大參}
  - {type: variant, offset: 3440, length: 1, content: 為, krp: 大參}
  - {type: variant, offset: 3442, length: 0, content: '', SBCK: 地此又云盈大宇宙言􅀃雲之變化或大則盈大於宇宙之内宇覆也謂天所覆三蒼云四方上下言之也或小故重忽兮其極之逺也攭兮其相逐而反也而逺舉或分散相逐而還於山攭音戾攭與劙同攭兮分判貌言雲或慌忽之極卬卬兮天下之咸蹇也雨則天下皆蹇難也卬卬髙貌雲髙而不德厚而不捐五采備而成文覆被之皆無捐棄矣捐棄也萬物或美或惡往來惽憊通于大神不測也憊困也人困目亦昬暗故惽憊猶晦暝也通于大神言變化晦暝也惽憊爲出入甚極莫知其門門謂所出也極讀爲亟急也天下失之則滅得之則存成雨也雲所以弟}
  - {type: variant, offset: 3442, length: 3, content: 子諸侯, WYG: 地相似雲所以致雨生成萬物其德厚於堯禹者也精微乎毫毛而盈大乎㝢宙㝢與宇同言細微之時則如毫毛其廣大時則盈大於宇宙之内宇覆也謂天所覆三蒼云四方上}
  - {type: variant, offset: 3442, length: 0, content: '', krp: 地此又云盈大宇宙言說雲之變化或大則盈大於宇宙之内宇覆也謂天所覆三蒼云四方上下言之也或小故重忽兮其極之逺也攭兮其相逐而反也而逺舉或分散相逐而還於山攭音戾攭與劙同攭兮分判貌言雲或慌忽之極卬卬兮天下之咸蹇也雨則天下皆蹇難也卬卬髙貌雲髙而不德厚而不捐五采備而成文覆被之皆無捐棄矣捐棄也萬物或美或惡往來惽憊通于大神不測也憊困也人困目亦昬暗故惽憊猶晦暝也通于大神言變化晦暝也惽憊爲出入甚極莫知其門門謂所出也極讀爲亟急也天下失之則滅得之則存成雨也雲所以弟}
  - {type: variant, offset: 3443, length: 2, content: 諸侯, SBCK: 不敏此之願陳君子設辭請測意之子不敏願陳此事不弟子荀卿自謂言弟言雲之功德唯君子乃明知之也知何名欲君子設辭請測其意亦曰此夫大而不塞者歟故曰不塞雲氣無實充盈大宇而不窕入郄穴而不偪者歟反則入郄穴而曽無偪側不容也窱土吊窕讀爲窱深貌也言充盈則滿大宇幽深反行逺疾速而不可託訙者與疾速宜於託訙訙書問也行逺續同也言雲行逺疾速不可依託繼續也今雲者虛無故不可本或作託訓或曰與似往來惽憊而不可爲固塞者歟若使牢固蔽塞則不可雖往來晦冥掩蔽萬物暴至殺傷而不億忌者歟億則屢中或曰與抑同億謂以意度之論語曰億度疑忌而果決不測也􅊨謂雷霆震怒殺傷萬物曽不功被天}
  - {type: page-break, offset: 3443, content: '', id: KR3a0002_SBCK_018-12b}
  - {type: page-break, offset: 3443, content: '', id: KR3a0002_SBCK_018-13a}
  - {type: variant, offset: 3443, length: 2, content: 諸侯, krp: 不敏此之願陳君子設辭請測意之子不敏願陳此事不弟子荀卿自謂言弟言雲之功德唯君子乃明知之也知何名欲君子設辭請測其意亦曰此夫大而不塞者歟故曰不塞雲氣無實充盈大宇而不窕入郄穴而不偪者歟反則入郄穴而曽無偪側不容也窱土吊窕讀爲窱深貌也言充盈則滿大宇幽深反行逺疾速而不可託訙者與疾速宜於託訙訙書問也行逺續同也言雲行逺疾速不可依託繼續也今雲者虛無故不可本或作託訓或曰與似往來惽憊而不可爲固塞者歟若使牢固蔽塞則不可雖往來晦冥掩蔽萬物暴至殺傷而不億忌者歟億則屢中或曰與抑同億謂以意度之論語曰億度疑忌而果決不測也􅊨謂雷霆震怒殺傷萬物曽不功被天}
