  - {type: variant, offset: 3602, length: 246, content: 聖王以為法士大夫以為道官人以為守百姓以成俗萬世不能易也今子宋子案不然獨詘容為己慮一朝而改之說必不行矣譬之是猶以塼塗塞江海也以僬僥而戴太山也蹎跌碎折不待頃矣二三子之善於子宋子者殆不若止之將恐得傷其體也子宋子曰人之情欲寡而皆以己之情為欲多是過也故率其群徒辨其談說明其譬稱將使人知情之欲寡也應之曰然則亦以人之情為欲目不欲綦色耳不欲綦聲口不欲綦味鼻不欲綦臭形不欲綦佚此五綦者亦以人之情為不欲乎曰人之情欲是已曰若是則說必不行矣以人之情為欲此五綦者而不欲多譬之是猶以人之情為欲富貴而不欲貨也好美而惡西施也, WYG: 閭娵}
