  - {type: variant, offset: 9, length: 0, content: '', krp: 殃愚闇愚闇墮賢艮重墮賢良也墮許䂓反世之殃由於愚此愚闇以人主無賢如瞽無相何倀倀息亮反倀丑羊反倀倀無所往貌相請布基愼聖人請說陳布愼讀爲順順聖人也基業在乎愚而自專事不治主忌苟勝羣臣莫諫必逢災苟欲勝人也主旣猜忌又論臣過反其施人臣言論施惠施式豉反之過在乎不行尊主安國尚賢義拒諫飾非愚而上同國必禍諫飾非以愚闇之性苟合於上則所以尊主安國在崇尚賢義若拒也必禍曷謂罷國多私疲謂弱不任事者也所以弱假設問荅以明其意罷讀曰韋昭曰罷病也無行曰病者由於多私國語罷士無伍比周還主黨與施繞還逺賢近讒忠臣蔽塞主勢移曷謂賢明君臣道則爲賢明君臣之上能尊主愛下民主誠聽之天下爲一海内賔主之孽讒人達賢能遁逃國乃蹷顚覆也孽災也蹷愚以重愚闇以重闇成爲桀遂至於桀也久而愚闇愈甚世之災妬賢能飛廉知政任惡來有力飛廉善走父子俱以材力事紂也惡來飛廉之子秦之先也史記曰惡來卑其志意大其園囿髙其臺榭逺慮不慕往古卑其志意言無武王怒師牧野紂卒易郷啓乃下攻于後啓微子名下降易郷回也謂前徒倒戈爲向也郷讀武王善之封於宋立其祖不絶也左傳曰立其祖使祭祀帝乙宋祖世之衰讒人歸比干見刳箕子累}
  - {type: variant, offset: 10, length: 1, content: 說, SBCK: 縲累讀子之囚書曰釋箕武王誅之吕尚招麾殷民懐揮也招麾指世之禍惡賢士子胥見殺百里徙夫伍貟字子胥吳大遷也謀不見用虞滅係虜遷徙於秦也爲夫差所殺百里奚虞公之臣徙穆公得之強配五伯六卿施子之制春秋時大國亦僭置六卿六卿穆公秦穆公任好也伯讀曰霸六卿天六卿也施言施世之愚惡大儒逆斥不通孔子拘拒逆拘謂畏匡戹陳也斥逐大儒不使通展禽三絀春申道綴基畢輸下三絀謂爲士師三見絀也春申楚相黄歇封爲春展禽魯大夫無駭之後名獲字子禽謚曰惠居於栁李園所殺其儒術政治道德基業盡傾覆委地也申君綴止也與輟同畢盡也輸傾委也言春申爲請牧基賢}
  - {type: page-break, offset: 10, content: '', id: KR3a0002_SBCK_018-2b}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 順請}
  - {type: variant, offset: 10, length: 0, content: '', krp: 縲累讀子之囚書曰釋箕武王誅之吕尚招麾殷民懐揮也招麾指世之禍惡賢士子胥見殺百里徙夫伍貟字子胥吳大遷也謀不見用虞滅係虜遷徙於秦也爲夫差所殺百里奚虞公之臣徙穆公得之強配五伯六卿施子之制春秋時大國亦僭置六卿六卿穆公秦穆公任好也伯讀曰霸六卿天六卿也施言施世之愚惡大儒逆斥不通孔子拘拒逆拘謂畏匡戹陳也斥逐大儒不使通展禽三絀春申道綴基畢輸下三絀謂爲士師三見絀也春申楚相黄歇封爲春展禽魯大夫無駭之後名獲字子禽謚曰惠居於栁李園所殺其儒術政治道德基業盡傾覆委地也申君綴止也與輟同畢盡也輸傾委也言春申爲請牧基賢者思治牧堯在萬世如見之讒人罔極險陂傾側此之疑此讒人傾險也陂與詖同言當疑基必施辨賢罷疲也罷讀曰文武之道同伏戲王伏戲古帝王文武周文王武書契者戲與羲同太昊氏始畫八卦造由之者治不由者亂何疑爲凡成相辨法方至治之極復後王時之王後王當隨時設敎不必拘於古法言欲爲至治在歸復後王謂愼墨季惠百家之}
  - {type: variant, offset: 11, length: 2, content: 者曰, WYG: 陳布基業在乎順聖人也愚而自專事不治}
