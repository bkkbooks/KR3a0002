  - {type: variant, offset: 3514, length: 0, content: '', WYG: 重以譏當世也天下不治請陳佹詩荀卿請陳佹異激切之詩言天下不治之意也天地易位四時易鄉皆言賢愚易位也鄉猶方也春夏秋冬皆不當其方言錯亂也鄉如字列星殞墜旦暮晦盲列星二十八宿有行列}
