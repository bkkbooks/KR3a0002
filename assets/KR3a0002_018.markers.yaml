  - {type: variant, offset: 3451, length: 0, content: '', krp: 精神請歸之雲化唯雲乃可當此至精至神通於變也說雲之知放於此則明也雲所以潤萬物人莫有物於此㒩㒩兮其狀屢化如神蟲倮之倮㒩讀如其謂三俯三起蛾蛹之類也㒩㒩無毛羽之貌變化即功被天下爲萬世文飾文禮樂以成貴賤以分養老長㓜待之而後存名號不美與暴爲鄰食故曰與暴爲鄰也侵暴者亦取名於蠶功立而身廢事成而家敗絲窮而蠶盡是家敗蠶成而見殺是身廢棄其耆老收其後世後世種也耆老蛾也人屬所利飛鳥所害飛鳥則害而食之人屬則保而用之臣愚而不識請占之五帝皆務本深知蠶之功大故請驗之也占驗也五帝少昊顓頊髙辛唐虞理帝占之曰此}
