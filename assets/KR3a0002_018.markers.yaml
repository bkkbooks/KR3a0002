  - {type: variant, offset: 3538, length: 0, content: '', WYG: 訴之云世亂不復憂}
  - {type: variant, offset: 3540, length: 0, content: '', WYG: 竟也復自解釋云亂久必反於治亦古之常道千或為卒弟子勉學天不忘也言天道福善故曰不忘恐弟子疑為善無應而懈惰故}
  - {type: variant, offset: 3541, length: 4, content: 有義辱小, WYG: 此勉之也聖}
