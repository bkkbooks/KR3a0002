  - {type: variant, offset: 78, length: 4, content: 莫大焉故, WYG: 治復一修之吉君子執之心如結言堅固不解也衆人貳之讒夫弃之形是詰衆人則不能復一讒夫則兼弃之但詰問治之形狀言侮慢也或曰形當為刑無德化唯刑戮是詰言虐暴也水至平端不傾心術如此象聖人聖人心平如水而有埶直而用抴必參天而有勢之}
