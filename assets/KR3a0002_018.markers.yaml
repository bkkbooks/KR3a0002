  - {type: variant, offset: 3460, length: 0, content: '', SBCK: 游謂化前亂而後治絲治也繭亂而夏生而而惡暑先暑而化生長於夏喜溼而惡雨生之後則惡雨溼謂浴其種旣蛹以爲母蛾以爲父之也㸦言三俯三起事乃大已之後事乃畢也謂化而成􅅙也俯謂卧而不食事乃大已言三起}
  - {type: variant, offset: 3460, length: 0, content: '', krp: 游謂化前亂而後治絲治也繭亂而夏生而而惡暑先暑而化生長於夏喜溼而惡雨生之後則惡雨溼謂浴其種旣蛹以爲母蛾以爲父之也㸦言三俯三起事乃大已之後事乃畢也謂化而成蠶也俯謂卧而不食事乃大已言三起}
  - {type: variant, offset: 3464, length: 1, content: 埶, SBCK: 蠶理帝五之義理也言此乃蠶蠶休其蠶織戰國時此俗尤甚故荀卿感而賦之蠶之功至大時人鮮知其本詩曰婦無公事有物於此生於山阜處於室堂所生也山阜鐵無知無巧善治衣裳爲智知讀不盜不竊穿窬而行日夜合離以成文章章亦待其連綴而成也合離謂使離者相合文以能合從又善連衡能如戰國合從連衡之人南北從竪也子容反衡撗也言箴亦爲衡也爲從東西下覆百姓上飾帝王功業甚愽不見賢良其功伐見賢遍反見猶顯也不自顯時用則存不用則亡行藏順時臣愚不識敢請之王王曰此夫始生鉅其成功小者邪爲箴則小爲鐵則巨長其尾而銳其剽者邪實而無乎處者宇也有長而無本剽者宙也剽長其尾謂線也剽末也謂箴之鋒也莊子曰有意匹小反者眇末之頭銛達而尾趙繚者邪而銳其剽趙重􅀃長其尾地易位四時易郷夏秋冬皆不當其方言錯亂也皆言賢愚易位也郷猶方也春字郷如列星隕墜旦暮晦盲者隕墜以喻百官㢮廢列星二十八宿有行列當時星辰隕墜旦暮昏霧也旦暮晦盲言無蹔明時也或曰幽晦登昭日月下藏明如日月反下藏也昭或爲照言幽闇之人登昭明之位君子公正無私反見從撗謂從撗反覆之志也言公正無私之人反見志愛公利重樓䟽堂上位欲在重樓䟽堂之}
