  - {type: variant, offset: 1150, length: 1379, content: 治古如是是不然以為治邪則人固莫觸罪非獨不用肉刑亦不用象刑矣以為人或觸罪矣而直輕其刑然則是殺人者不死傷人者不刑也罪至重而刑至輕庸人不知惡矣亂莫大焉凡刑人之本禁暴惡惡且徵其未也殺人者不死而傷人者不刑是謂惠暴而寬賊也非惡惡也故象刑殆非生於治古並起於亂今也治古不然凡爵列官職賞慶刑罰皆報也以類相從者也一物失稱亂之端也夫德不稱位能不稱官賞不當功罰不當罪不祥莫大焉昔者武王伐有商誅紂斷其首縣之赤旆夫征暴誅悍治之盛也殺人者死傷人者刑是百王之所同也未有知其所由來者也刑稱罪則治不稱罪則亂故治則刑重亂則刑輕犯治之罪固重犯亂之罪固輕也書曰刑罰世輕世重此之謂也世俗之為說者湯武不能禁令是何也曰楚越不受制是不然湯武者至天下之善禁令者也湯居亳武王居鄗皆百里之地也天下為一諸侯為臣通達之屬莫不振動從服以化順之曷為楚越獨不受制也彼王者之制也視形埶而制械用稱遠近而等貢獻豈必齊哉故魯人以榶衛人用柯齊人用一革土地刑制不同者械用備飾不可不異也故諸夏之國同服同儀蠻夷戎狄之國同服不同制封內甸服封外侯服侯衛賓服蠻夷要服戎狄荒服甸服者祭侯服者祀賓服者享要服者貢荒服者終王日祭月祀時享歲貢夫是之謂視形勢而制械用稱遠近而等貢獻是王者之制也彼楚越者且時享歲貢終王之屬也必齊之日祭月祀之屬然後曰受制邪是規磨之說也溝中之瘠也則未足與及王者之制也語曰淺不可與測深愚不足與謀知坎井之鼃不可與語東海之樂此之謂也世俗之為說者曰堯舜擅讓是不然天子者埶位至尊無敵於天下夫有誰與讓矣道德純備智惠甚明南面而聽天下生民之屬莫不振動從服以化順之天下無隱士無遺善同焉者是也異焉者非也夫有惡擅天下矣曰死而擅之是又不然聖王在上決德而定次量能而授官皆使民載其事而各得其宜不能以義制利不能以偽飾性則兼以為民聖王已沒天下無聖則固莫足以擅天下矣天下有聖而在後者則天下不離朝不易位國不更制天下厭然與鄉無以異也以堯繼堯夫又何變之有矣聖不在後子而在三公則天下如歸猶復而振之矣天下厭然與鄉無以異也以堯繼堯夫又何變之有矣唯其徙朝改制為難故天子生則天下一隆致順而治論德而定次死則能任天下者必有之矣夫禮義之分盡矣擅讓惡用矣哉曰老衰而擅是又不然血氣筋力則有衰若夫知慮取舍則無衰曰老者不堪其勞而休也是又畏事者之議也天子者埶至重而形至佚心至愉而志無所詘而形不為勞尊無上矣衣被則服五采雜閒色重文繡加飾之以珠玉食飲則重大牢而備珍怪期臭味曼而饋代睪而食雍而徹乎五祀執薦者百人侍西房居則設張容負依而坐諸侯趨走乎堂下出戶而巫覡有事出門而宗祀有事乘大路趨越席以養安側載睪芷以養鼻前有錯衡以養目和鸞之聲步中武象騶中韶護以養耳三公奉軶持納諸侯持輪挾輿先馬大侯編後大夫次之小侯元士次之庶士介而夾道庶人隱竄莫敢視望居如大神動如天帝持老養衰猶有善於是者不與老者休也休猶有安樂恬愉如是者乎故曰諸侯有老天子無老有擅國無擅天下古今一也夫曰堯舜擅讓是虛言也是淺者之傳陋者之說也不知逆順之理小大至不至之變者也未可與及天下之大理者也世俗之為說者曰堯舜不能教化是何也曰朱象不化是不然也堯舜者至天下之善教化者也南面而聽天下生民之屬莫不振動從服以化順之然而朱象獨不化是非堯舜之過朱象之罪也堯舜者天下之英也朱象者天下之嵬一時之瑣也今世俗之為說者不怪朱象而非堯舜也豈不過甚矣哉夫是之謂嵬說羿蠭門者天下之善射者也不能以撥弓曲矢中微王梁造父者天下之善馭者也不能以辟馬毀輿致遠堯舜者天下之善教化者也不能使嵬瑣化何世, SBCK: 粹}
