  - {type: variant, offset: 3452, length: 0, content: '', krp: 身女好而頭馬首者與周禮馬質禁原蠶者鄭玄云女好柔婉也其頭又類馬首值大火則浴其種}
  - {type: variant, offset: 3453, length: 1, content: 榮, SBCK: 蠶與馬同氣也天文辰爲馬故蠶書曰蠶爲龍精月屢化而不壽者與其壽命不得終善壯而拙老者與老而見殺壯得其養有父母而無牝牡者與有牝牡也爲蠶}
