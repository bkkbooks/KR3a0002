  - {type: variant, offset: 3428, length: 7, content: 義榮爵列尊貢祿, SBCK: 君子之知論此人之智不然也君子之智明小知有物於此居則周靜致下動則綦髙以鉅時周密也鉅大也居謂雲物發在地貟者中規方者中矩之貟方也言滿天地大參天地德}
  - {type: variant, offset: 3428, length: 7, content: 義榮爵列尊貢祿, WYG: 君子之知此論君子之智明小人之不智不然也知有物於此居則周靜致下動則綦髙以鉅居謂雲物發在地時周密也鉅大也圓者中規方者中矩言滿天地之圓方也大參天地德}
