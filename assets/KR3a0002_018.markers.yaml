  - {type: variant, offset: 142, length: 351, content: 所由生也上周密則下疑玄矣上幽險則下漸詐矣上偏曲則下比周矣疑玄則難一漸詐則難使比周則難知難一則不彊難使則不功難知則不明是亂之所由作也故主道利明不利幽利宣不利周故主道明則下安主道幽則下危故下安則貴上下危則賤上故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危故主道莫惡乎難知莫危乎使下畏己傳曰惡之者眾則危矣書曰克明明德詩曰明明在下故先王明之豈特玄之耳哉世俗之為說者曰桀紂有天下湯武篡而奪之是不然以桀紂為常有天下之籍則然親有天下之籍則不然天下謂在桀紂則不然古者天子千官諸侯百官以是千官也令行於諸夏之國謂之王以是百官也令行於境內國雖不安不至於廢易遂亡謂之君聖王之子也有天下之後也埶籍之所在也天下之宗室也然而不材不中內則百姓疾之外則諸侯叛之近者境內不一遙者諸侯不聽令不行於境內甚者諸侯侵削之攻伐之若是則雖, WYG: ''}
