  - {type: variant, offset: 3455, length: 4, content: 從外至者, SBCK: 時未冬伏而夏游食桑而吐絲而出}
  - {type: variant, offset: 3455, length: 4, content: 從外至者, WYG: 時未有牝牡也冬伏而夏游食桑而吐絲遊謂化而出也前亂而後治繭亂而絲治也夏生而惡暑生長於夏先暑而化喜溼而惡雨溼謂浴其種既生之後則惡雨也蛹以為母蛾以為父互言之也三俯三起事乃大已俯為卧而不食事乃大已言三起之後事乃畢也謂化而成繭}
