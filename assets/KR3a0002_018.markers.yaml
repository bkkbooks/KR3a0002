  - {type: variant, offset: 84, length: 0, content: '', WYG: 興賢良窮困􅍊人芻豢仁人糟糠禮樂滅息聖人隱伏墨術行治之經禮與刑君子以修百姓寧明德愼罰國爭既治四海平治之志後勢富為治之意後權勢與富者則公道行而貨賂息也君子誠之好以待君子必誠此意好以待用處之敦固有深藏之能逺思敦厚也有讀為又既處之厚固又能深藏逺慮思乃精志之榮好而一之神以成好而不二則通於神明也精神相反一而不二為聖人相反謂反覆不離散治之道美不老老休息也莊子曰佚我以老為治當日新其美無休息君子由之佼以好佼亦好也音絞}
