  - {type: variant, offset: 2531, length: 892, content: 嵬何時而無瑣自太皞燧人莫不有也故作者不祥學者受其殃非者有慶詩曰下民之孼匪降自天噂沓背憎職競由人此之謂也世俗之為說者曰大古薄葬棺厚三寸衣衾三領葬田不妨田故不掘也亂今厚葬飾棺故掘也是不及知治道而不察於抇不抇者之所言也凡人之盜也必以有為不以備不足足則以重有餘也而聖王之生民也皆使富厚優猶不知足而不得以有餘過度故盜不竊賊不刺狗豕吐菽粟而農賈皆能以貨財讓風俗之美男女自不取於涂而百姓羞拾遺故孔子曰天下有道盜其先變乎雖珠玉滿體文繡充棺黃金充椁加之以丹矸重之以曾青犀象以為樹琅玕龍茲華覲以為實人猶且莫之抇也是何也則求利之詭緩而犯分之羞大也夫亂今然後反是上以無法使下以無度行知者不得慮能者不得治賢者不得使若是則上失天性下失地利中失人和故百事廢財物詘而禍亂起王公則病不足於上庶人則凍餒羸瘠於下於是焉桀紂群居而盜賊擊奪以危上矣必禽獸行虎狼貪故脯巨人而炙嬰兒矣若是則有何尤抇人之墓抉人之口而求利矣哉雖此倮而埋之猶且必抇也安得葬薶哉彼乃將食其肉而齕其骨也夫曰大古薄葬故不抇也亂今厚葬故抇也是特姦人之誤於亂說以欺愚者而潮陷之以偷取利焉夫是之謂大姦傳曰危人而自安害人而自利此之謂也子宋子曰明見侮之不辱使人不鬭人皆以見侮為辱故鬭也知見侮之為不辱則不鬭矣應之曰然則亦以人之情為不惡侮乎曰惡而不辱也曰若是則必不得所求焉凡人之鬭也必以其惡之為說非以其辱之為故也今倡優侏儒狎徒詈侮而不鬭者是豈鉅知見侮之為不辱哉然而不鬭者不惡故也今人或入其央瀆竊其豬彘則援劍戟而逐之不避死傷是豈以喪豬為辱也哉然而不憚鬭者惡之故也雖以見侮為辱也不惡則不鬭雖知見侮為不辱惡之則必鬭然則鬭與不鬭邪亡於辱之與不辱也乃在於惡之與不惡也夫今子宋子不能解人之惡侮而務說人以勿辱也豈不過甚矣哉金舌弊口猶將無益也不知其無益則不知知其無益也直以欺人則不仁不仁不知辱莫大焉將以為有益於人則與無益於人也則得大辱而退耳說莫病是矣子宋子曰見侮不辱應之曰凡議必將立隆正然後可也無隆正則是非不分而辨訟不決故所聞曰天下之大隆是非之封界分職名象之所起王制是也故凡言議期命莫非以聖王為師而聖王之分榮辱是也是有兩端矣有義榮者有埶榮者有義辱者有埶辱者志意脩德行厚知慮明是榮之由中出者, SBCK: 疵}
