  - {type: variant, offset: 3476, length: 4, content: 貪利是辱, SBCK: 人􅄛矣也􅄛饒忠臣危殆讒人服矣般矣般樂也音盤服用也本或作讒人琁玉瑤珠不知佩也國曰瑤美石言不知以此四寶說文云琁赤玉瑤美玉也孔安琁音瓊爲佩􅀃文雜布與錦不知異也麤布雜布閭娵子奢莫}
