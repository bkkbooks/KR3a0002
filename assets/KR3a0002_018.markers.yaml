  - {type: variant, offset: 101, length: 229, content: 愿愨矣上公正則下易直矣治辨則易一愿愨則易使易直則易知易一則彊易使則功易知則明是治之所由生也上周密則下疑玄矣上幽險則下漸詐矣上偏曲則下比周矣疑玄則難一漸詐則難使比周則難知難一則不彊難使則不功難知則不明是亂之所由作也故主道利明不利幽利宣不利周故主道明則下安主道幽則下危故下安則貴上下危則賤上故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危故主道莫惡乎難知莫危乎使下畏己傳曰惡之者眾則危矣書曰克明明德詩曰明明在下故先王明之豈特玄之耳哉世俗之為說者曰桀紂有, SBCK: 舜授禹以}
