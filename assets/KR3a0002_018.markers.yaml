  - {type: variant, offset: 332, length: 400, content: 湯武篡而奪之是不然以桀紂為常有天下之籍則然親有天下之籍則不然天下謂在桀紂則不然古者天子千官諸侯百官以是千官也令行於諸夏之國謂之王以是百官也令行於境內國雖不安不至於廢易遂亡謂之君聖王之子也有天下之後也埶籍之所在也天下之宗室也然而不材不中內則百姓疾之外則諸侯叛之近者境內不一遙者諸侯不聽令不行於境內甚者諸侯侵削之攻伐之若是則雖未亡吾謂之無天下矣聖王沒有埶籍者罷不足以縣天下天下無君諸侯有能德明威積海內之民莫不願得以為君師然而暴國獨侈安能誅之必傷害無罪之民誅暴國之君若誅獨夫若是則可謂能用天下矣能用天下之謂王湯武非取天下也脩其道行其義興天下之同利除天下之同害而天下歸之也桀紂非去天下也反禹湯之德亂禮義之分禽獸之行積其凶全其惡而天下去之也天下歸之之謂王天下去之之謂亡故桀紂無天下而湯武不弒君由此效之也湯武者民之父母也桀紂者民之怨賊也今世俗之為說者以桀紂為君而以湯武為弒然則是誅民之父母而師民之怨賊也不祥莫大焉, SBCK: 亦}
