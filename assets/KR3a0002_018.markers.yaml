  - {type: variant, offset: 3446, length: 4, content: 為卿相士, SBCK: 而不私置者歟所私置又言無偏頗天下同被其功曾無託地而游宇友風而子雨雨因雲而生故曰子風與雲並行故曰友冬日作寒夏日作暑而凝在冬蒸暑也寒在夏而廣}
  - {type: variant, offset: 3446, length: 4, content: 為卿相士, krp: 而不私置者歟所私置又言無偏頗天下同被其功曾無託地而游宇友風而子雨雨因雲而生故曰子風與雲並行故曰友冬日作寒夏日作暑而凝在冬蒸暑也寒在夏而廣}
  - {type: variant, offset: 3447, length: 0, content: '', WYG: 宇上大參天地此又云盈大宇宙言說雲之變化或大或小故重言之也忽兮其極之逺也攭兮其相逐而反也攭與劙同攭兮分判貌言雲或慌忽之極而逺舉或分散相逐而還於山攭音戾卬卬兮天下之咸蹇也卬卬髙貌雲髙而不雨則天下皆蹇難也德厚而不捐五采備而成文捐弃也萬物或美或惡覆被之皆無捐弃也徃來惽憊通于大神惽憊猶晦暝也通于大神言變化不測也憊困也人困目亦昏暗故惽憊為晦暝也出入甚極莫知其門極讀為亟急也門謂所出也天下失之則滅得之則存雲所以成雨也弟子不敏此之願陳君子設辭請測意之弟子荀}
  - {type: page-break, offset: 3447, content: '', id: KR3a0002_WYG_018-11a, image: WYG0695/WYG0695-0279c.png}
  - {type: variant, offset: 3448, length: 2, content: 相士, WYG: 自謂言弟子不敏願陳此事不知何名欲君子設辭請測其意亦言雲之功德唯君子乃明知之也曰此夫}
  - {type: variant, offset: 3451, length: 0, content: '', SBCK: 精神請歸之雲化唯雲乃可當此至精至神通於變也􅀃雲之知放於此則明也雲所以潤萬物人莫有物於此㒩㒩兮其狀屢化如神蟲倮之倮㒩讀如其謂三俯三起蛾蛹之類也㒩㒩無毛羽之貌變化即功被天下爲萬世文飾文禮樂以成貴賤以分養老長㓜待之而後存名號不美與暴爲鄰食故曰與暴爲鄰也侵暴者亦取名於􅅙功立而身廢事成而家敗絲窮而􅅙盡是家敗􅅙成而見殺是身廢棄其耆老收其後世後世種也耆老蛾也人屬所利飛鳥所害飛鳥則害而食之人屬則保而用之臣愚而不識請占之五帝皆務本深知蠶之功大故請驗之也占驗也五帝少昊顓頊髙辛唐虞理帝占之曰此}
  - {type: page-break, offset: 3451, content: '', id: KR3a0002_SBCK_018-13b}
  - {type: variant, offset: 3451, length: 0, content: '', WYG: 而不塞者與雲氣無實故曰不塞充盈大宇而不窕入郄穴而不偪者與窕讀為窱深貌也言充盈則滿大宇幽深則入郄穴而曽無偪側不容也窱他弔反行逺疾速而不可託訊者與訊書問也行逺疾速宜於託訊今雲者虛無故不可本或作託訓或曰與似續同也言雲行逺疾速不可依託繼續也徃來惽憊而不可為固塞者與雖徃來晦暝掩蔽萬物若使牢固蔽塞則不可也暴至殺傷而不億忌者與億謂以意度之論語曰億則屢中或曰與抑同謂雷霆震怒殺傷萬物曽不億度疑忌而果決不測也功被天下而不私置者與天下同被其功曾無所私置又言無偏頗託地而游宇友風而子雨風與雲並行故曰友雨因雲而生故曰子冬日作寒夏日作暑在冬而凝寒在夏而蒸暑也廣大精神請歸之雲至精至神通於變化唯雲乃可當此說也雲雲所以潤萬物人莫之知放於此則明也有物於此㒩㒩兮其狀屢化如神㒩讀如其蟲倮之倮㒩㒩無毛羽之貌變化即謂三俯三起成蛾蛹之類功被天下為萬世文文飾禮樂以成貴賤以分養老長㓜待之而後存名號不美與暴為隣侵暴者亦取名於蠶食故曰與暴為隣也功立而身廢事成而家敗繭成而見殺是身廢絲窮而繭盡是家敗弃其耆老收其後世耆老蛾也後世種也人屬所利飛鳥所害人屬則保而用之飛鳥則害而食之臣愚而不識請占之五帝占驗也五帝少吴顓頊髙辛唐虞理皆務本深知蠶之功大故請驗之也帝占之曰此}
