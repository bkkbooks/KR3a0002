  - {type: punctuation, offset: 739, content: ，, id: KR3a0002_tls_018-bkkpn168}
  - {type: 'tls:seg', offset: 739, content: '', id: KR3a0002_tls_018-2a.76}
  - {type: variant, offset: 739, length: 0, content: '', WYG: 之道有五甚簡約明白謂臣下職一也君法明二也刑稱陳三也言有節四也上通利至莫敢恣五也臣下職莫游食游食謂不勤於事素飱游手也務本節用財無極事業聽上莫得相使一民力所興事業皆聽於上羣下不得擅相役使}
  - {type: variant, offset: 740, length: 0, content: '', WYG: 民力一也禮記曰用民之力歲不過三日守其職足衣食民不失職則衣食足矣厚薄有等明爵服貴賤有别利徃卭上莫得擅與孰私得利之所徃皆仰於上莫得擅為賜與則誰敢私得於人乎擅相賜與若齊田氏然卭與仰同宜亮反君法明論有常君法所以明在言論有常不二三也表儀既設民知方進退有律莫得貴賤孰私王進人退人皆以法律貴賤各以其才孰有私佞於王乎君法儀禁不為為君之法儀在自禁止不為惡莫不説教名不移既能正己則民皆恱上之教而名器不移也說讀為恱修之者榮離之者辱孰他師孰敢以他為師言皆歸王道不敢離貳也刑稱陳守其銀稱謂當罪當罪之法施陳則各守其分限稱尺證反銀與垠同下不得用輕私門下不得專用刑法則私門自輕罪禍有律莫得輕重威不分禍亦罪也請牧祺明有基祺吉也請牧治吉祥之事在明其所有之基業主好論議必善謀五聽修領莫理續主執持五聽折獄之五聽也修領謂修之使得綱領莫不有文理相續主自執持此道不使權歸於下也聽之經明其請請當為情聽獄之經在明其情參伍明謹施賞刑參伍猶錯雜也謂或徃參之或徃伍之皆使明謹施其賞刑言精研不使有僭濫也顯者必得隱者復顯民反誠幽隱皆通則民不詐偽也言有節稽其實節謂法度欲使民言有法及不欺誑在稽考行實也信誕以分賞罰必下不欺上皆以情言明若日上通利隱逺至上通利不壅蔽則幽隱遐逺者皆至也觀法不法見不視所觀之法非法則雖見不視也耳目既顯吏敬法令莫敢恣此已上論君有五之事也君教出行有律五論之教既出則民所行有法言知方也吏謹將之無鈹滑將持也詩曰無將大車鈹與披同滑與汩同言不使紛亂披汨也下不私請各以宜舎巧拙請謁舎止也羣下不私謁各以所宜不苟求也如此則以道事君巧拙之事亦皆止臣謹修君制變臣職在謹修君職在制變公察善思論不亂以治}
