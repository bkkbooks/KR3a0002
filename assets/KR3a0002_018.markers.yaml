  - {type: variant, offset: 6, length: 0, content: '', SBCK: 登仕郎守大理評事􅀭倞注成相篇第二十五事以自見其意故下云託於成相以初發語名篇雜論君臣治亂之之流也或曰成功在相故作成相三章也以喻意漢書藝文志謂之成相雜辭蓋亦賦請成相相之辭請言成}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 今以是荀卿雜語故降請成相請言成相之辭}
  - {type: variant, offset: 6, length: 0, content: '', krp: 登仕郎守大理評事揚倞注成相篇第二十五事以自見其意故下云託於成相以初發語名篇雜論君臣治亂之之流也或曰成功在相故作成相三章也以喻意漢書藝文志謂之成相雜辭蓋亦賦請成相相之辭請言成}
