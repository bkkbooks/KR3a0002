  - {type: variant, offset: 3529, length: 133, content: 故君子可以有埶辱而不可以有義辱小人可以有埶榮而不可以有義榮有埶辱無害為堯有埶榮無害為桀義榮埶榮唯君子然後兼有之義辱埶辱唯小人然後兼有之是榮辱之分也聖王以為法士大夫以為道官人以為守百姓以成俗萬世不能易也今子宋子案不然獨詘容為己慮一朝而改之說必不行矣譬之是猶以塼塗塞江海, SBCK: 嫫母醜女黄帝時}
  - {type: variant, offset: 3529, length: 133, content: 故君子可以有埶辱而不可以有義辱小人可以有埶榮而不可以有義榮有埶辱無害為堯有埶榮無害為桀義榮埶榮唯君子然後兼有之義辱埶辱唯小人然後兼有之是榮辱之分也聖王以為法士大夫以為道官人以為守百姓以成俗萬世不能易也今子宋子案不然獨詘容為己慮一朝而改之說必不行矣譬之是猶以塼塗塞江海, krp: 嫫母醜女黄帝時}
  - {type: variant, offset: 3532, length: 1, content: 可, WYG: 明如日月反下藏也昭或為照公正無私反見從横公正無私之人反見謂從横反覆之志也志愛公利重樓疏堂欲在上位行至公}
  - {type: page-break, offset: 3532, content: '', id: KR3a0002_WYG_018-14a, image: WYG0695/WYG0695-0281a.png}
  - {type: variant, offset: 3534, length: 0, content: '', WYG: 利百姓非謂重樓疏堂之榮貴也無私罪人憼革貳兵憼與儆同備也貳副也謂無私罪人言果於去惡也言去邪嫉惡乃以儆備増益兵革之道言彊盛也道德純備讒口將將將去也言以讒言相退送或曰將將讀為鏘鏘進貌仁人絀約敖暴擅彊絀退窮約天下幽險恐失世英天下幽暗凶險如此必恐時賢不見用也螭龍為蝘蜓鴟梟為鳳皇說文云螭如龍而黄北方謂之虵螻蝘蜓守宫言世俗不知善惡螭龍之聖反謂之蝘蜓鴟梟之惡反以為鳳皇也比干見刳孔子拘匡昭昭乎其知之明也郁郁乎其遇時之不祥也拂乎其欲禮義之大行也闇乎天下之晦盲也郁郁}
  - {type: variant, offset: 3535, length: 2, content: 埶辱, WYG: 文章貌拂違也此蓋誤耳當為拂乎其遇時之不祥也郁郁乎其欲禮義之大行晦盲言人莫之識也皓天不復憂無彊也千歲必反古之常也皓與昊同昊天言氣昊大也呼吴天}
  - {type: page-break, offset: 3535, content: '', id: KR3a0002_WYG_018-14b, image: WYG0695/WYG0695-0281b.png}
