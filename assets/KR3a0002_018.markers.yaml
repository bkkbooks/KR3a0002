  - {type: variant, offset: 15, length: 0, content: '', krp: 行而貨賂息爲治之意後權埶與富也君子誠之好以待意好以待用君子必誠此處之敦固有深藏之能逺思之厚固又能深藏逺慮敦厚也有讀爲又旣處思乃精志之榮好而壹之神以成通於神明也好而不二則精神相反一而不貳爲聖人覆不離散相反謂反治之道美不老爲治當日新其美無休息老休息也莊子曰佚我以老君子由之佼以好也音絞佼亦好下以敎誨子弟上以事祖考以仁接下孝也事親以成相竭辭不蹷篇無顚蹷之辭蹷音厥竭盡也論成相之事雖終君子道之順以達子言之必弘順而通達道言說也辭旣不蹷君宗其賢良辨其殃孽良致治辨其殃孽爲之害也君子尋成相之辭必能宗其賢請成相道聖王未盡故再論之也道亦言說前章意堯舜尚賢身辭讓許由善卷重義輕}
