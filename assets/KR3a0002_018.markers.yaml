  - {type: variant, offset: 743, length: 1, content: 嘗, SBCK: 詳今尚書舜流共工北決九河通十二渚䟽三江淮渭洛七水又有濰按禹貢導弱黒漾沇止於十二此云十二渚未詳其􅀃也淄其道伊洛􅗉澗旣入于河數則不禹溥土平天下溢禹分布治九州之土也溥讀爲敷孔安國云洪水泛躬親爲民行勞苦所行之事也行讀如字謂得益皐陶横革直成爲輔直木横革而不順理者革之直者成之也聞韓侍郎云此論益皐陶之功横契􅀇王生昭明曰詩契爲堯司徒封於商賜姓子氏契卒子昭明立也天命􅀇鳥降而生商又曰􅀇王􅁊撥皆謂契也史記居於砥石遷于商傳曰閼伯居商丘相土因之相土昭明子砥石地名未詳所在或曰即砥柱也左氏孫相土乃遷商丘也也言契初居砥石至十有四世乃有天乙是成湯昌若立昌若卒子曹圉立曹圉卒子㝠立爲夏司空史記曰契卒子昭明立昭明卒子相土立相土卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬勤其官死於水殷人郊之冥卒子振立振卒子微立微卒子卒子乙立是十四世也立主壬卒子主癸立主癸天乙湯論舉當身讓卞隋舉牟光不受皆投水死牟與務同也莊子湯讓天下於卞隋務光二人道古賢聖基必張基業必張大也道􅀃古之賢聖願陳辭世亂惡善不此治亂惡善之弊不知治此世隱諱疾賢良由姦詐鮮無災長用詐少無災也隱諱過惡病害賢良患難哉阪爲先聖先聖之所爲阪與反同反知不用愚者謀前車已覆後未知更何覺時更何有覺悟之時也前車已覆猶不知戒不覺悟不知苦迷惑失指易上下忠不上達蒙揜耳目塞門户四門也不能闢門户塞大迷惑悖亂昏莫不終極終極無己時也莫冥莫言闇也不是非反易比周欺上惡正直反下同惡烏路正是惡心無度邪枉辟回夫道途爲僻辟讀已無郵人我獨自美豈獨無故已亦有事而不知其過也或曰下無獨字故事也不可尤責於人自美其身已豈無事不知戒後必有恨悔恨後遂過不肯悔前之非不肯悔讒夫多進反覆言語生詐態人之態不如備詐態上不知爲備如當爲知言人爲爭寵嫉賢利惡忌忌賢者利在惡妬功毁賢下斂黨與上蔽匿與則上蔽匿也斂聚也下聚黨上壅蔽失輔埶則埶不在上失輔弼之臣任用讒夫不能制孰公長父之難曰厲王染於公長父榮夷終公與孰公孰公長父皆厲王之嬖臣未詳其姓名墨子即詩所云皇父也孰或爲郭不同未知孰是或曰孰公長父厲王流于彘河東左傳彘地名在邪遂使難作厲王流竄於彘晉大夫有彘子言孰公長父姦周幽厲所以敗不聽䂓諫忠是害嗟我何人獨不遇時當亂世獨我哉自慰勉之辭也言自古忠良多有遇害何欲衷對言不從誠意以對衷誠也欲從而遇禍也時君恐言不恐爲子胥身離凶進諫不聽剄而獨鹿棄之江差賜子胥之劎名屬之欲反鏤力朱反獨鹿與屬鏤同本亦或作屬鏤吳王夫是自剄之後盛以罜䍡棄之江也賈逵云罣䍡小罟也國語里革曰鳥獸成水蟲孕於是乎禁罝罣䍡此當觀往事以自戒治亂是非亦可識託於成相以喻意讀爲志也識如字亦請成相言治方之方術言爲治君論有五約以明君謹守之下皆平正國乃昌簡約明白謂臣下職論爲君之道有五甚有節四也上通利至莫敢恣五也一也君法明二也刑稱陳三也言臣下職莫游食食游素飡游手也謂不勤於事務本節用財無極事業聽上莫得相使一民力役使則民力一也禮記曰用民之力所興事業皆聽於上羣下不得擅相三日也歲不過守其職足衣食衣食足矣民不失職則厚薄有等明爵服有别貴賤利往卬上莫得擅與孰私得之利人乎擅相賜與若齊田氏然卬與仰同宜亮反所往皆卬於上莫得擅爲賜與則誰敢私得於君法明論有常論有常不二三也君法所以明在言表儀旣設民知方進退有律莫得貴賤孰私王賤各以其才孰有私佞進人退人皆以法律貴乎於王君法儀禁不爲自禁止不爲惡爲君之法儀在莫不􅀃敎名不移而名器不移也􅀃讀爲恱旣能正己則民皆恱上之敎修之者榮離之者辱孰它師歸王道不敢離貳也孰敢以它爲師言皆刑稱陳守其銀守其分限稱尺證反銀與垠同稱謂當罪當罪之法施陳則各下不得用輕私門不下則私門自輕得專用刑法罪禍有律莫得輕重威不分罪也禍亦請牧祺明有基事在明其所有之基業祺吉也請牧治􅁻祥之主好論議必善謀五聽循領莫不理續主執持折獄五聽文理相續主自執持此道不使權歸於下之五聽也循領謂修之使得綱領莫不有聽之經明其請之經在明其情請當爲情聽獄參伍明謹施賞刑雜也謂或參伍猶錯其賞刑言精研不使僭濫也往參之或往伍之皆使明謹施顯者必得隱者復顯民反誠民不詐僞也幽隱皆通則言有節稽其實使民言有法節謂法度欲稽考行實也及不欺誑在信誕以分賞罰必下不欺上皆以情言明若日上通利隱逺至幽隱遐逺者皆至上通利不壅蔽則也觀法不法見不視則雖見不視也所觀之法非法耳目旣顯吏敬法令莫敢恣有五之事也此已上君論君敎出行有律所行有法言知方也五論之敎旣出則民吏謹將之無鈹滑無將大車鈹將持也詩曰言不使紛披汨也與披同滑與汨同下不私請各以冝舎巧拙謁請也如此則以道事君巧拙之事亦皆止舎止也羣下不私謁各以所宜不苟求臣謹修君制變君職在制變臣職在謹修公察善思論不亂以治天下後世法之成律貫爲條貫也律貫法之賦篇第二十六特明之或曰荀卿所賦甚多今存者唯所賦之事皆生人所切而時多不知故也此言爰有大物大者莫過於禮故謂之大物也爰於也言於此有大物天人之非絲非帛文理成章文章禮亦然也絲帛能成黼黻非日非月爲天下明生者以壽死者以葬城郭以固三軍以强粹而王駁而伯無一焉而亡臣愚不識敢請之王問於先王云臣但見其功亦不識其名唯先王言禮之功用甚大時人莫知故荀卿假爲隱語因重演其義而告之能知敢請辭之先王王曰此夫文而不采者與王先飾而不至華采者歟爲解禮意曰此乃有文簡然易知而致有理者歟君子所敬而小人所不者與性不得則若禽獸性得之則甚雅似者歟古人詩曰維其有雅正也似謂似續似之之是以匹夫隆之則爲聖人諸侯隆之則一四海者歟致明而約甚順而體請歸之禮易行也先王言唯歸於禮乃}
