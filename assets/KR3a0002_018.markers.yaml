  - {type: variant, offset: 76, length: 0, content: '', WYG: 曷謂罷國明多私假設問荅以明其意罷讀為疲謂弱}
  - {type: variant, offset: 77, length: 0, content: '', WYG: 任事者也所以弱者由於多私國語曰罷士無伍韋昭曰罷病也無行曰病比周還主黨與施還繞逺賢近讒忠臣蔽塞主勢移曷謂賢明君臣明君臣之道則為賢上能尊主愛下民主誠聽之天下為一海内賔主之孽讒人達賢能遁逃國乃蹷孽災也蹷顚覆也愚以重愚闇以重闇成為桀久而愚闇愈甚遂至於桀也世之災妬賢能飛廉知政任惡來惡來飛廉之子秦之先也史記曰惡來有力飛廉善走父子俱以材力事紂卑其志意大其園囿髙其臺榭卑其志意言無逺慮不慕徃古武王怒師牧野紂卒易鄉啓乃下易鄉廻也謂前徒倒戈攻于後啓微子名下降也鄉讀為向武王善之封之於宋立其祖立其祖使祭祀不絶也左傳曰宋祖帝乙也世之衰讒人歸比干見刳箕子累累讀為縲書曰釋箕子之囚武王誅之吕尚招麾殷民懐招麾指揮也世之禍惡賢士子胥見殺百里徙子胥吳大夫伍貟字也為夫差所殺百里奚虞公之臣徙遷也謀不見用虞滅係虜遷徙於秦穆公任之彊配五伯六卿施穆公秦穆公任好也伯讀為霸六卿天子之制春秋時大國亦僭置六卿六卿施言施六卿也世之愚惡大儒逆斥不通孔子拘逆拒斥逐大儒不使通也拘謂畏匡厄陳也展禽三絀春申道綴基畢輸展禽魯大夫無駭之後名獲字子禽諡曰惠居於栁下三絀為士師三見絀也春申楚相黄歇封為春申君綴止也與輟同畢盡也輸傾委也言春申為李園所殺其儒術政治道德基業盡傾覆委地也請牧基賢者思牧治堯在萬世如見之讒人罔極險陂傾側此之疑陂與詖同言當疑此讒人傾險也基必施辨賢罷罷讀為疲文武之道同伏戲文武周文王武王伏戲古帝王大昊氏始畫八卦造書契者戲與羲同由之者治不由者亂何疑為凡成相辨法方至治之極復後王後王當時之王言欲為至治在歸復後王謂隨時設教不必拘於古法也愼墨季惠百家之說誠不詳愼到墨翟惠施或曰季即莊子云季眞之莫為者也又曰季子聞而笑之據此則是梁惠王犀首惠施同時人也韓侍郎云或曰季梁也列子曰季梁楊朱之友言四子及百家好為異說故不用心詳明之詳或為}
