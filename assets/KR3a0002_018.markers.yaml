  - {type: variant, offset: 736, length: 4, content: 合為君則, SBCK: 舜所以授禹也故尚得推賢不失序爲德得當外不避仇内不阿親賢者予私其子子讀爲與謂殛鯀興禹又不禹勞心力堯有德干戈不用三苗服舉舜甽畒任之}
  - {type: variant, offset: 736, length: 1, content: 合, WYG: 故也尚得推賢不失序得當為德外不避仇内不阿親賢者予謂殛鯀興禹又不私其子予讀為與禹勞心力堯有德干戈不用三苖服舉舜甽畆任之天下身休息甽與畎同得后稷五榖殖䕫為樂正鳥獸服謂擊石拊石百獸辛舞笙鏞以間鳥獸蹌蹌也契為司徒民知孝弟尊有德禹有功抑下鴻抑遏也下謂治水使歸下也鴻即洪水也書曰禹降水警予也辟除民害逐共工今尚書舜流共工于幽州此云禹未詳北決九河通十二渚疏三江案禹貢道弱黒漾沇淮渭洛七水又有雍淄伊洛瀍澗既入于河數則不止於十二此云十二未詳其説也禹溥土平天下溥讀為敷孔安國云洪水泛溢禹分布治九州之上也躬親為民行勞苦行讀如字謂所行之事也得益臯陶横革直成為輔横革直未聞韓侍郎云此論益臯陶之功横而不順理者革之直者成之也契𤣥王生昭明詩曰天命𤣥烏降而生商又曰𤣥王桓撥皆謂契也史記曰契為堯司徒封於商賜姓子氏契卒子昭明立也居於砥石遷于商砥石地名未詳所在或曰即底柱也左氏傳曰閼伯居商丘相土因之相土昭明子也言契初居砥石至孫相土乃遷商丘也十有四世乃有天乙是成湯史記曰契卒子昭明立昭明卒子相土立相土卒子昌若立昌若卒子曹圉立曹圉卒子㝠立為夏司空勤其官死於水殷人郊之冥卒子振立振卒子微立微卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬立主壬卒子主癸立主癸卒子乙立是十四世也天乙湯論舉當身讓卞隋舉牟光莊子曰湯讓天下於卞隋務光二人不受皆投水死牟與務同道古賢聖基必張道説古之賢聖基業必張大也願陳辭世亂惡善不此治不知治此世亂惡善之弊隱諱疾賢良由姦詐鮮無災隱諱過惡疾害賢良長用姦詐少無災也患難哉阪為先聖阪與反同反先聖之所為知不用愚者謀前車已覆後未知更何覺時前車已覆猶不知戒更何有覺悟之時也不覺悟不知苦迷惑失指易上下中不上達䝉揜耳目塞門户不能關四門也門户塞大迷惑悖亂昬莫不終極莫冥寞言闇也不終極無已時也是非反易比周欺上惡正直惡烏路反下同正直惡心無度邪枉辟回失道途辟讀為僻已無尤人我獨自美豈獨無故故事也不可尤責於人自美其身已豈無事已亦有事而不知其過也或曰下無獨字不知戒後必有恨恨悔也後遂過不肯悔不肯悔前之非讒夫多進反覆言語生詐態人之態不如備如當為知言人為詐態上不知為備爭寵嫉賢利惡忌利在惡忌賢者妬功毁賢下斂黨與上蔽匿斂聚也下聚黨與則上蔽匿也上壅蔽失輔勢失輔弼之臣則勢不在上任用讒夫不能制孰公長父之難孰公長父皆厲王之嬖臣未詳其姓名墨子曰厲王染於􅀈公長父榮夷終􅀈公與孰公不同未知孰是或曰孰公長父即詩所云皇父也孰或為郭厲王流于彘彘地名在河束左傳晉大夫有彘子言孰公長父奸邪遂使難作厲王流竄於彘周幽厲所以敗不聽規諫忠是害嗟我何人獨不遇時當亂世言自古忠良多有遇害何獨我哉自慰勉之辭也欲𠂻對言不從𠂻誠也欲誠意以對時君恐言不從而遇禍也恐為子胥身離凶進諫不聽剄而獨鹿棄之江獨鹿與屬鏤同本亦或作屬鏤吳王夫差賜子胥之劎名屬之欲反鏤力朱反國語里革曰鳥獸成水蟲孕水虞於是禁罜䍡此當足自剄之後盛以罜䍡弃之江也賈云罜䍡小罟也觀徃事以自戒治亂是非亦可識託於成相以喻意識如字亦讀如志請成相言治方言為治之方術君論有五約以明君謹守之下皆平正國乃昌論}
