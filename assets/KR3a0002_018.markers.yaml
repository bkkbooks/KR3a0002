  - {type: variant, offset: 13, length: 1, content: 主, SBCK: 文武之}
  - {type: variant, offset: 13, length: 1, content: 主, krp: 季子聞而笑之據此則是愼到墨翟惠施或曰季即莊子曰季眞之季梁楊朱之友言四子及百家好異說故不用心詳明之梁惠王犀首惠施同時人也韓侍郎云或曰季梁也列子曰爲祥詳或治復一脩之吉君子執之心如結固不言堅也解衆人貳之讒夫棄之形是詰復一讒夫則衆人則不能形當爲刑無德化唯刑戮是詰言苛暴也兼棄之但詰問治之形狀言侮嫚也或曰水至平端不傾心術如此象聖人平如水聖人心而有埶直而用抴必參天度已以繩接人用抴功業必參天也而有勢之上疑脱一字言旣得權勢則世無王窮賢良賢良窮困無王者興暴人芻豢仁人糟糠禮樂滅息聖人隱伏墨術行治之經禮與刑君子以修百姓寧明德愼罰國家旣治四海平治之志後埶富者則公}
  - {type: variant, offset: 14, length: 4, content: 道利周是, WYG: 忌苟勝羣臣莫諫必逢災主既猜忌又苟欲勝人也論臣過反其施言論人臣之過在乎}
  - {type: variant, offset: 15, length: 0, content: '', SBCK: 同伏戲王伏戲古帝王文武周文王武書契者戲與羲同太昊氏始畫八卦造由之者治不由者亂何疑爲凡成相辨法方至治之極復後王時之王後王當隨時設敎不必拘於古法言欲爲至治在歸復後王謂愼墨季惠百家之􅀃誠不詳莫爲者也又曰季子聞而笑之據此則是愼到墨翟惠施或曰季即莊子曰季眞之季梁楊朱之友言四子及百家好異􅀃故不用心詳明之梁惠王犀首惠施同時人也韓侍郎云或曰季梁也列子曰爲祥詳或治復一脩之􅁻君子執之心如結固不言堅也解衆人貳之讒夫棄之形是詰復一讒夫則衆人則不能形當爲刑無德化唯刑戮是詰言苛暴也兼棄之但詰問治之形狀言侮嫚也或曰水至平端不傾心術如此象聖人平如水聖人心而有埶直而用抴必參天度已以繩接人用抴功業必參天也而有勢之上疑脱一字言旣得權勢則世無王窮賢良賢良窮困無王者興暴人芻豢仁人糟糠禮樂滅息聖人隱伏墨術行治之經禮與刑君子以修百姓寧明德愼罰國家旣治四海平治之志後埶富者則公道行而貨賂息爲治之意後權埶與富也君子誠之好以待意好以待用君子必誠此處之敦固有深藏之能逺思之厚固又能深藏逺慮敦厚也有讀爲又旣處思乃精志之榮好而壹之神以成通於神明也好而不二則精神相反一而不貳爲聖人覆不離散相反謂反治之道美不老爲治當日新其美無休息老休息也莊子曰佚我以老君子由之佼以好也音絞佼亦好下以敎誨子弟上以事祖考以仁接下孝也事親以成相竭辭不蹷篇無顚蹷之辭蹷音厥竭盡也論成相之事雖終君子道之順以達子言之必􅀪順而通達道言􅀃也辭旣不蹷君宗其賢良辨其殃孽良致治辨其殃孽爲之害也君子尋成相之辭必能宗其賢請成相道聖王未盡故再論之也道亦言􅀃前章意堯舜尚賢身辭讓許由善卷重義輕}
