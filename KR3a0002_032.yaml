body:
  text: 堯問篇第三十二堯問於舜曰我欲致天下為之奈何對曰執一無失行微無怠忠信無倦而天下自來執一如天地行微如日月忠誠盛於內賁於外形於四海天下其在一隅邪夫有何足致也魏武侯謀事而當群臣莫能逮退朝而有喜色吳起進曰亦嘗有以楚莊王之語聞於左右者乎武侯曰楚莊王之語何如吳起對曰楚莊王謀事而當群臣莫逮退朝而有憂色申公巫臣進問曰王朝而有憂色何也莊王曰不穀謀事而當群臣莫能逮是以憂也其在中蘬之言也曰諸侯自為得師者王得友者霸得疑者存自為謀而莫己若者亡今以不穀之不肖而群臣莫吾逮吾國幾於亡乎是以憂也楚莊王以憂而君以喜武侯逡巡再拜曰天使夫子振寡人之過也伯禽將歸於魯周公謂伯禽之傅曰女將行盍志而子美德乎對曰其為人寬好自用以慎此三者其美德已周公曰嗚呼以人惡為美德乎君子好以道德故其民歸道彼其寬也出無辨矣女又美之彼其好自用也是所以窶小也君子力如牛不與牛爭力走如馬不與馬爭走知如士不與士爭知彼爭者均者之氣也女又美之彼其慎也是其以淺也聞之曰無越踰不見士見士問曰無乃不察乎不聞即物少至少至則淺彼淺者賤人之道也女又美之乎吾語女我文王之為子武王之為弟成王之為叔父吾於天下不賤矣然而吾所執贄而見者十人還贄而相見者三十人貌執之士者百有餘人欲言而請畢事者千有餘人於是吾僅得三士焉以正吾身以定天下吾所以得三士者亡於十人與三十人中乃在百人與千人之中故上士吾薄為之貌下士吾厚為之貌人人皆以我為越踰好士然故士至士至而後見物見物然後知其是非之所在戒之哉女以魯國驕人幾矣夫仰祿之士猶可驕也正身之士不可驕也彼正身之士舍貴而為賤舍富而為貧舍佚而為勞顏色黎黑而不失其所是以天下之紀不息文章不廢也語曰繒丘之封人見楚相孫叔敖曰吾聞之也處官久者士妬之祿厚者民怨之位尊者君恨之今相國有此三者而不得罪於楚之士民何也孫叔敖曰吾三相楚而心愈卑每益祿而施愈博位滋尊而禮愈恭是以不得罪於楚之士民也子貢問於孔子曰賜為人下而未知也孔子曰為人下者乎其猶土也深抇之而得甘泉焉樹之而五穀播焉草木殖焉禽獸育焉生則立焉死則入焉多其功而不德為人下者其猶土也昔虞不用宮之奇而晉并之萊不用子馬而齊并之紂刳王子比干而武王得之不親賢用知而身死國亡也為說者曰孫卿不及孔子是不然孫卿迫於亂世鰌於嚴刑上無賢主下遇暴秦禮義不行教化不成仁者詘約天下冥冥行全剌之諸侯大傾當是時也知者不得慮能者不得治賢者不得使故君上蔽而無覩賢人距而不受然則孫卿懷將聖之心蒙佯狂之色視天下以愚詩曰既明且哲以保其身此之謂也是其所以名聲不白徒與不衆光輝不博也今之學者得孫卿之遺言餘教足以為天下法式表儀所存者神所過者化觀其善行孔子弗過世不詳察云非聖人奈何天下不治孫卿不遇時也德若堯禹世少知之方術不用為人所疑其知至明循道正行足以為紀綱嗚呼賢哉宜為帝王天地不知善桀紂殺賢良比干剖心孔子拘匡接輿辟世箕子佯狂田常為亂闔閭擅強為惡得福善者有殃今為說者又不察其實乃信其名時世不同譽何由生不得為政功安能成志修德厚孰謂不賢乎
