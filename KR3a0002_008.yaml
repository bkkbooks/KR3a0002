body:
  text: 儒效篇第八大儒之效武王崩成王幼周公屏成王而及武王以屬天下惡天下之倍周也履天子之籍聽天下之斷偃然如固有之而天下不稱貪焉殺管叔虛殷國而天下不稱戾焉兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉教誨開導成王使諭於道而能掩迹於文武周公歸周反籍於成王而天下不輟事周然而周公北面而朝之天子也者不可以少當也不可以假攝為也能則天下歸之不能則天下去之是以周公屏成王而及武王以屬天下惡天下之離周也成王冠成人周公歸周反籍焉明不滅主之義也周公無天下矣鄉有天下今無天下非擅也成王鄉無天下今有天下非奪也變勢次序之節然也故以枝代主而非越也以弟誅兄而非暴也君臣易位而非不順也因天下之和遂文武之業明枝主之義抑亦變化矣天下厭然猶一也非聖人莫之能為夫是謂大儒之效秦昭王問孫卿子曰儒無益於人之國孫卿子曰儒者法先王隆禮義謹乎臣子而致貴其上者也人主用之則勢在本朝而宜不用則退編百姓而愨必為順下矣雖窮困凍餧必不以邪道為貪無置錐之地而明於持社稷之大義嗚呼而莫之能應然而通乎財萬物養百姓之經紀勢在人上則王公之材也在人下則社稷之臣國君之寶也雖隱於窮閻漏屋人莫不貴貴道誠存也仲尼將為魯司寇沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏踰境而徙魯之粥牛馬者不豫賈必蚤正以待之也居於闕黨闕黨之子弟罔不分有親者取多孝弟以化之也儒者在本朝則美政在下位則美俗儒之為人下如是矣王曰然則其為人上何如孫卿曰其為人上也廣大矣志意定乎內禮節修乎朝法則度量正乎官忠信愛利形乎下行一不義殺一無罪而得天下不為也此君子義信乎人矣通於四海則天下應之如歡是何也則貴名白而天下治也故近者歌謳而樂之遠者竭蹶而趨之四海之內若一家通達之屬莫不從服夫是之謂人師詩曰自西自東自南自北無思不服此之謂也夫其為人下也如彼其為人上也如此何謂其無益於人之國也昭王曰善先王之道仁之隆也比中而行之曷謂中曰禮義是也道者非天之道非地之道人之所以道也君子之所道也君子之所謂賢者非能遍能人之所能之謂也君子之所謂知者非能遍知人之所知之謂也君子之所謂辨者非能遍辨人之所辨之謂也君子之所謂察者非能遍察人之所察之謂也有所止矣相高下視墝肥序五種君子不如農人通財貨相美惡辨貴賤君子不如賈人設規矩陳繩墨便備用君子不如工人不恤是非然不然之情以相薦撙以相恥怍君子不若惠施鄧析也若夫譎德而定次量能而授官使賢不肖皆得其位能不能皆得其官萬物得其宜事變得其應慎墨不得進其談惠施鄧析不敢竄其察言必當理事必當務是然後君子之所長也凡事行有益於治者立之無益於理者廢之夫是之謂中事凡知説有益於理者為之無益於理者舍之夫是之謂中説事行失中謂之姦事知説失中謂之姦道姦事姦道治世之所棄而亂世之所從服也若夫充虛之相施易也堅白同異之分隔也是聰耳之所不能聽也明目之所不能見也辨士之所不能言也雖有聖人之知未能僂指也不知無害為君子知之無損為小人工匠不知無害為巧君子不知無害為治王公好之則亂法百姓好之則亂事而狂惑戇陋之人乃始率其群徒辨其談説明其辟稱老身長子不知惡也夫是之謂上愚曾不如好相雞狗之可以為名也詩曰為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也我欲賤而貴愚而知貧而富可乎曰其唯學乎彼學者行之曰士也敦慕焉君子也知之聖人也上為聖人下為士君子孰禁我哉鄉也混然塗之人也俄而並乎堯禹豈不賤而貴矣哉鄉也效門室之辨混然曾不能決也俄而原仁義分是非圖回天下於掌上而辨白黑豈不愚而知矣哉鄉也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉今有人於此屑然藏千溢之寶雖行貣而食人謂之富矣彼寶也者衣之不可衣也食之不可食也賣之不可僂售也然而人謂之富何也豈不大富之器誠在此也是杅杅亦富人已豈不貧而富矣哉故君子無爵而貴無祿而富不言而信不怒而威窮處而榮獨居而樂豈不至尊至富至重至嚴之情舉積此哉故曰貴名不可以比周爭也不可以夸誕有也不可以勢重脅也必將誠此然後就也爭之則失讓之則至遵遁則積夸誕則虛故君子務修其內而讓之於外務積德於身而處之以遵遁如是則貴名起如日月天下應之如雷霆故曰君子隱而顯微而明辭讓而勝詩曰鶴鳴于九皋聲聞于天此之謂也鄙夫反是比周而譽俞少鄙爭而名俞辱煩勞以求安利其身而俞危詩曰民之無良相怨一方受爵不讓至于己斯亡此之謂也故能小而事大辟之是猶力之少而任重也舍粹折無適也身不肖而誣賢是猶傴身而好升高也指其頂者愈衆故明主譎德而序位所以為不亂也忠臣誠能然後敢受職所以為不窮也分不亂於上能不窮於下治辨之極也詩曰平平左右亦是率從是言上下之交不相亂也以從俗為善以貨財為寶以養生為己至道是民德也行法至堅不以私欲亂所聞如是則可謂徑士矣行法至堅好修正其所聞以橋飾其情性其言多當矣而未諭也其行多當矣而未安也其知慮多當矣而未周密也上則能大其所隆下則能開道不己若者如是則可謂篤厚君子矣修百王之法若辨白黑應當世之變若數一二行禮要節而安之若生四枝要時立功之巧若詔四時平正和民之善億萬之衆而摶若一人如是則可謂聖人矣井井兮其有理也嚴嚴兮其能敬己也介介兮其有終始也猒猒兮其能長久也樂樂兮其執道不殆也照照兮其用知之明也修修兮其用統類之行也綏綏兮其有文章也熙熙兮其樂人之臧也隱隱兮其恐人之不當也則可謂聖人矣此其道出乎一曷謂一曰執神而固曷謂神曰盡善挾治之謂神曷謂固曰萬物莫足以傾之之謂固神固之謂聖人聖人也者道之管也天下之道管是矣百王之道一是矣故詩書禮樂之道歸是矣詩言是其志也書言是其事也禮言是其行也樂言是其和也春秋言是其微也故風之所以為不逐者取是以節之也小雅之所以為小者取是而文之也大雅之所以為大者取是而光之也頌之所以為至者取是而通之也天下之道畢是矣鄉是者臧倍是者亡鄉是如不臧倍是如不亡者自古及今未嘗有也客有道曰孔子曰周公其盛乎身貴而愈恭家富而愈儉勝敵而愈戒應之曰是殆非周公之行非孔子之言也武王崩成王幼周公屏成王而及武王履天子之籍負扆而坐諸侯趨走堂下當是時也夫又誰為恭矣哉兼制天下立七十一國姬姓獨居五十三人焉周之子孫苟不狂惑者莫不為天下之顯諸侯孰謂周公儉哉武王之誅紂也行之日以兵忌東面而迎太歲至泛而泛至懷而壞至共頭而山隧霍叔懼曰出三日而五災至無乃不可乎周公曰刳比干而囚箕子飛廉惡來知政夫又惡有不可焉遂選馬而進朝食於戚暮宿乎百泉旦厭於牧之野鼓之而紂卒易鄉遂乘殷人而誅紂蓋殺者非周人因殷人也故無首虜之獲無蹈難之賞反而定三革偃五兵合天下立聲樂於是武象起而韶護廢矣四海之內莫不變心易慮以化順之故外闔不閉跨天下而無蘄當是時也夫又誰為戒矣哉造父者天下之善御者也無輿馬則無所見其能羿者天下之善射者也無弧矢則無所見其巧大儒者善調一天下者也無百里之地則無所見其功輿固馬選矣而不能以至遠一日而千里則非造父也弓調矢直矣而不能以射遠中微則非羿也用百里之地而不能以調一天下制強暴則非大儒也彼大儒者雖隱於窮閻漏屋無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容成名況乎諸侯莫不願得以為臣用百里之地而千里之國莫能與之爭勝笞捶暴國齊一天下而莫能傾也是大儒之徵也其言有類其行有禮其舉事無悔其持險應變曲當與時遷徙與世偃仰千舉萬變其道一也是大儒之稽也其窮也俗儒笑之其通也英傑化之嵬瑣逃之邪説畏之衆人愧之通則一天下窮則獨立貴名天不能死地不能埋桀跖之世不能汙非大儒莫之能立仲尼子弓是也故有俗人者有俗儒者有雅儒者有大儒者有不學問無正義以富利為隆是俗人者也逢衣淺帶解果其冠略法先王而足亂世術繆學雜舉不知法後王而一制度不知隆禮義而殺詩書其衣冠行偽已同於世俗矣然而不知惡者其言議談説已無所以異於墨子矣然而明不能分別呼先王以欺愚者而求衣食焉得委積足以掩其口則揚揚如也隨其長子事其便辟舉其上客億然若終身之虜而不敢有他志是俗儒者也法後王一制度隆禮義而殺詩書其言行已有大法矣然而明不能齊法教之所不及聞見之所未至則知不能類也知之曰知之不知曰不知內不自以誣外外不自以欺內以是尊賢畏法而不敢怠傲是雅儒者也法先王統禮義一制度以淺持博以古持今以一持萬苟仁義之類也雖在鳥獸之中若別白黑倚物怪變所未嘗聞也所未嘗見也卒然起一方則舉統類而應之無所擬怍張法而度之則暗然若合符節是大儒者也故人主用俗人則萬乘之國亡用俗儒則萬乘之國存用雅儒則千乘之國安用大儒則百里之地久而後三年天下為一諸侯為臣用萬乘之國則舉錯而定一朝而伯不聞不若聞之聞之不若見之見之不若知之知之不若行之學至於行之而止矣行之明也明之為聖人聖人也者本仁義當是非齊言行不失豪釐無他道焉已乎行之矣故聞之而不見雖博必謬見之而不知雖識必妄知之而不行雖敦必困不聞不見則雖當非仁也其道百舉而百陷也故人無師無法而知則必為盜勇則必為賊云能則必為亂察則必為怪辨則必為誕人有師有法而知則速通勇則速威云能則速成察則速盡辨則速論故有師法者人之大寶也無師法者人之大殃也人無師法則隆性矣有師法則隆積矣而師法者所得乎積非所受乎性性不足以獨立而治性也者吾所不能為也然而可化也積也者非吾所有也然而可為也注錯習俗所以化性也并一而不二所以成積也習俗移志安久移質并一而不二則通於神明參於天地矣故積土而為山積水而為海旦暮積謂之歲至高謂之天至下謂之地宇中六指謂之極塗之人百姓積善而全盡謂之聖人彼求之而後得為之而後成積之而後高盡之而後聖故聖人也者人之所積也人積耨耕而為農夫積斫削而為工匠積反貨而為商賈積禮義而為君子工匠之子莫不繼事而都國之民安習其服居楚而楚居越而越居夏而夏是非天性也積靡使然也故人知謹注錯慎習俗大積靡則為君子矣縱情性而不足問學則為小人矣為君子則常安榮矣為小人則常危辱矣凡人莫不欲安榮而惡危辱故唯君子為能得其所好小人則日徼其所惡詩曰維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒此之謂也人論志不免於曲私而冀人之以己為公也行不免於汙漫而冀人之以己為修也甚愚陋溝瞀而冀人之以己為知也是衆人也志忍私然後能公行忍情性然後能修知而好問然後能才公修而才可謂小儒矣志安公行安修知通統類如是則可謂大儒矣大儒者天子三公也小儒者諸侯大夫士也衆人者工農商賈也禮者人主之所以為群臣寸尺尋丈檢式也人倫盡矣君子言有壇宇行有防表道有一隆言道德之求不下於安存言志意之求不下於士言道德之求不二後王道過三代謂之蕩法二後王謂之不雅高之下之小之臣之不外是矣是君子之所以騁志意於壇宇宮庭也故諸侯問政不及安存則不告也匹夫問學不及為士則不教也百家之説不及先王則不聽也夫是之謂君子言有壇宇行有防表也
