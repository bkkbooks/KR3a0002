body:
  text: 非十二子篇第六假今之世飾邪說文姦言以𣻏亂天下欺惑愚衆矞宇嵬瑣使天下混然不知是非治亂之所存者有人矣縱情性安恣睢禽獸行不足以合文通治然而其持之有故其言之成理足以欺惑愚衆是它囂魏牟也忍情性綦溪利跂苟以分異人為高不足以合大衆明大分然而其持之有故其言之成理足以欺惑愚衆是陳仲史鰌也不知一天下建國家之權稱上功用大儉約而僈差等曾不足以容辨異縣君臣然而其持之有故其言之成理足以欺惑愚衆是墨翟宋鈃也尚法而無法不循而好作上則取聽於上下則取從於俗終日言成文典反紃察之則倜然無所歸宿不可以經國定分然而其持之有故其言之成理足以欺惑愚衆是慎到田駢也不法先王不是禮義而好治怪說玩琦辭甚察而不急辨而無用多事而寡功不可以為治綱紀然而其持之有故其言之成理足以欺惑愚衆是惠施鄧析也略法先王而不知其統然而猶材劇志大聞見雜博案往舊造說謂之五行甚僻違而無類幽隱而無說閉約而無解案飾其辭而祗敬之曰此真先君子之言也子思唱之孟軻和之世俗之溝猶瞀儒嚾嚾然不知其所非也遂受而傳之以為仲尼子游為茲厚於後世是則子思孟軻之罪也若夫總方略齊言行一統類而群天下之英傑而告之以大古教之以至順奧窔之閒簟席之上歙然聖王之文章具焉佛然平世之俗起焉則六說者不能入也十二子者不能親也無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容成名況乎諸侯莫不願以為臣是聖人之不得藝者也仲尼子弓是也一天下財萬物長養人民兼利天下通達之屬莫不從服六說者立息十二子者遷化則是聖人之得勢者舜禹是也今夫仁人也將何務哉上則法舜禹之制下則法仲尼子弓之義以務息十二子之說如是則天下之害除仁人之事畢聖王之跡箸矣信信信也疑疑亦信也貴賢仁也賤不肖亦仁也言而當知也默而當亦知也故知默由知言也故多言而類聖人也少言而法君子也多少無法而流湎然雖辨小人也故勞力而不當民務謂之姦事勞知而不律先王謂之姦心辨說譬諭齊給便利而不順禮義謂之姦說此三姦者聖王之所禁也知而險賊而神為詐而巧無用而辨不急而察治之大殃也行辟而堅飾非而好玩姦而澤言辨而逆古之大禁也知而無法勇而無憚察辨而操僻淫大而用之好姦而與衆利足而迷負石而墜是天下之所棄也兼服天下之心高上尊貴不以驕人聰明聖知不以窮人齊給速通不以先人剛毅勇敢不以傷人不知則問不能則學雖能必讓然後為德遇君則修臣下之義遇鄉則修長幼之義遇長則修子弟之義遇友則修禮節辭讓之義遇賤而少者則修告導寬容之義無不愛也無不敬也無與人爭也恢然如天地之苞萬物如是則賢者貴之不肖者親之如是而不服者則可謂訞怪狡猾之人矣雖則子弟之中刑及之而宜詩云匪上帝不時殷不用舊雖無老成人尚有典刑曾是莫聽大命以傾此之謂也古之所謂仕士者厚敦者也合群者也樂富貴者也樂分施者也遠罪過者也務事理者也羞獨富者也今之所謂仕士者汙漫者也賊亂者也恣睢者也貪利者也觸抵者也無禮義而唯權藝之嗜者也古之所謂處士者德盛者也能靜者也修正者也知命者也箸是者也今之所謂處士者無能而云能者也無知而云知者也利心無足而佯無欲者也行僞險穢而彊高言謹愨者也以不俗為俗離縰而跂訾者也士君子之所能為不能為君子能為可貴不能使人必貴己能為可信不能使人必信己能為可用不能使人必用己故君子恥不修不恥見汙恥不信不恥不見信恥不能不恥不見用是以不誘於譽不恐於誹率道而行端然正己不為物傾側夫是之謂誠君子詩云溫溫恭人維德之基此之謂也士君子之容其冠進其衣逢其容良儼然壯然祺然蕼然恢恢然廣廣然昭昭然蕩蕩然是父兄之容也其冠進其衣逢其容愨儉然恀然輔然端然訾然洞然綴綴然瞀瞀然是子弟之容也吾語汝學者之嵬容其冠絻其纓禁緩其容𥳑連填填然狄狄然莫莫然瞡瞡然瞿瞿然盡盡然盱盱然酒食聲色之中則瞞瞞然瞑瞑然禮節之中則疾疾然訾訾然勞苦事業之中則儢儢然離離然偷儒而罔無廉恥而忍䜁詬是學者之嵬也弟他其冠祌禫其辭禹行而舜趨是子張氏之賤儒也正其衣冠齊其顏色嗛然而終日不言是子夏氏之賤儒也偷儒憚事無廉恥而耆飲食必曰君子固不用力是子游氏之賤儒也彼君子則不然佚而不惰勞而不僈宗原應變曲得其宜如是然後聖人也
