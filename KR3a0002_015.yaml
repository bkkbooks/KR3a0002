body:
  text: 議兵篇第十五臨武君與孫卿子議兵於趙孝成王前王曰請問兵要臨武君對曰上得天時下得地利觀敵之變動後之發先之至此用兵之要術也孫卿子曰不然臣所聞古之道凡用兵攻戰之本在乎一民也弓矢不調則羿不能以中微六馬不和則造父不能以致遠士民不親附則湯武不能以必勝也故善附民者是乃善用兵者也故兵要在乎善附民而已臨武君曰不然夫兵之所貴者藝利也所行者變詐也善用兵者感忽悠暗莫知其所從出孫吳用之無敵於天下豈必待附民哉孫卿子曰不然臣之所道仁人之兵王者之志也君之所貴權謀藝利也所行攻奪變詐者諸侯之事也仁人之兵不可詐也彼可詐者怠慢者也路亶者也君臣上下之間渙然有離德者也故以桀詐桀猶巧拙有幸焉以桀詐堯譬之若以卵投石若以指撓沸若赴水火入焉焦沒耳故仁人上下百將一心三軍同力臣之於君也下之於上也若子之事父弟之事兄也若手臂之扞頭目而覆胸腹也詐而襲之與先驚而後擊之一也且仁人之用十里之國則將有百里之聽用百里之國則將有千里之聽用千里之國則將有四海之聽必將聰明警戒和摶而一故仁人之兵聚則成卒散則成列延則若莫邪之長刃嬰之者斷兌則若莫邪之利鋒當之者潰圜居而方正則若盤石然觸之者角摧案角鹿埵隴種東籠而退耳且夫暴國之君將誰與至哉彼其所與至者必其民也而其民之親我歡若父母其好我芬若椒蘭彼反顧其上則若灼黥若仇讎人之情雖桀跖豈又肯為其所惡賊其所好者哉是猶使人之子孫自賊其父母也彼必將來告之夫又何可詐也故仁人用國日明諸侯先順者安後順者危慮敵之者削反之者亡詩曰武王載發有虔秉鉞如火烈烈則莫我敢遏此之謂也孝成王臨武君曰善請問王者之兵設何道何行而可孫卿子曰凡在大王將率末事也臣請遂道王者諸侯強弱存亡之效安危之藝君賢者其國治君不能者其國亂隆禮貴義者其國治簡禮賤義者其國亂治者強亂者弱是強弱之本也上足卬則下可用也上不足卬則下不可用也下可用則強下不可用則弱是強弱之常也隆禮效功上也重祿貴節次也上功賤節下也是強弱之凡也好士者強不好士者弱愛民者強不愛民者弱政令信者強政令不信者弱民齊者強民不齊者弱賞重者強賞輕者弱刑威者強刑侮者弱械用兵革攻完便利者強械用兵革窳楛不便利者弱重用兵者強輕用兵者弱權出一者強權出二者弱是強弱之常也齊人隆技擊其技也得一首者則賜贖錙金無本賞矣是事小敵毳則偷可用也事大敵堅則渙然離耳若飛鳥然傾側反覆無日是亡國之兵也兵莫弱是矣是其出賃市傭而戰之幾矣魏氏之武卒以度取之衣三屬之甲操十二石之弩負服矢五十個置戈其上冠胄帶劍贏三日之糧日中而趨百里中試則復其戶利其田宅是其氣力數年而衰而復利未可奪也改造則不易周也是故地雖大其稅必寡是危國之兵也秦人其生民也狹厄其使民也酷烈劫之以藝隱之以厄忸之以慶賞鰌之以刑罰使天下之民所以要利於上者非鬭無由也厄而用之得而後功之功賞相長也五甲首而隸五家是最為衆強長久多地以正故四世有勝非幸也數也故齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義有遇之者若以焦熬投石焉兼是數國者皆干賞蹈利之兵也傭徒鬻賣之道也未有貴上安制綦節之理也諸侯有能微妙之以節則作而兼殆之耳故招近募選隆藝詐尚功利是漸之也禮義教化是齊之也故以詐遇詐猶有巧拙焉以詐遇齊辟之猶以錐刀墮大山也非天下之愚人莫敢試故王者之兵不試湯武之誅桀紂也拱揖指麾而強暴之國莫不趨使誅桀紂若誅獨夫故泰誓曰獨夫紂此之謂也故兵大齊則制天下小齊則治鄰敵若夫招近募選隆藝詐尚功利之兵則勝不勝無常代翕代張代存代亡相為雌雄耳矣夫是之謂盜兵君子不由也故齊之田單楚之莊蹻秦之衛鞅燕之繆蟣是皆世俗之所謂善用兵者也是其巧拙強弱則未有以相君也若其道一也未及和齊也掎契司詐權謀傾覆未免盜兵也齊桓晉文楚莊吳闔閭越句踐是皆和齊之兵也可謂入其域矣然而未有本統也故可以霸而不可以王是強弱之效也孝成王臨武君曰善請問為將孫卿子曰知莫大乎棄疑行莫大乎無過事莫大乎無悔事至無悔而止矣成不可必也故制號政令欲嚴以威慶賞刑罰欲必以信處舍收臧欲周以固徙舉進退欲安以重欲疾以速窺敵觀變欲潛以深欲伍以參遇敵決戰必道吾所明無道吾所疑夫是之謂六術無欲將而惡廢無急勝而忘敗無威內而輕外無見其利而不顧其害凡慮事欲孰而用財欲泰夫是之謂五權將所以不受命於主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至凡受命於主而行三軍三軍既定百官得序群物皆正則主不能喜敵不能怒夫是之謂至臣慮必先事而申之以敬慎終如始終始如一夫是之謂大吉凡百事之成也必在敬之其敗也必在慢之故敬勝怠則吉怠勝敬則滅計勝欲則從欲勝計則凶戰如守行如戰有功如幸敬謀無壙敬事無壙敬終無壙敬衆無壙敬敵無壙夫是之謂五無壙慎行此六術五權三至而處之以恭敬無壙夫是之謂天下之將則通於神明矣臨武君曰善請問王者之軍制孫卿子曰將死鼓御死轡百吏死職士大夫死行列聞鼓聲而進聞金聲而退順命為上有功次之令不進而進猶令不退而退也其罪惟均不殺老弱不獵禾稼服者不禽格者不舍奔命者不獲凡誅非誅其百姓也誅其亂百姓者也百姓有扞其賊則是亦賊也以故順刃者生蘇刃者死奔命者貢微子開封於宋曹觸龍斷於軍殷之服民所以養生之者也無異周人故近者歌謳而樂之遠者竭蹶而趨之無幽間辟陋之國莫不趨使而安樂之四海之內若一家通達之屬莫不從服夫是之謂人師詩曰自西自東自南自北無思不服此之謂也王者有誅而無戰城守不攻兵格不擊上下相喜則慶之不屠城不潛軍不留衆師不越時故亂者樂其政不安其上欲其至也臨武君曰善陳囂問孫卿子曰先生議兵常以仁義為本仁者愛人義者循理然則又何以兵為凡所為有兵者為爭奪也孫卿子曰非女所知也彼仁者愛人愛人故惡人之害之也義者循理循理故惡人之亂之也彼兵者所以禁暴除害也非爭奪也故仁人之兵所存者神所過者化若時雨之降莫不説喜是以堯伐歡兜舜伐有苗禹伐共工湯伐有夏文王伐崇武王伐紂此四帝兩王皆以仁義之兵行於天下也故近者親其善遠方慕其義兵不血刃遠邇來服德盛於此施及四極詩曰淑人君子其儀不忒此之謂也李斯問孫卿子曰秦四世有勝兵強海內威行諸侯非以仁義為之也以便從事而已孫卿子曰非女所知也女所謂便者不便之便也吾所謂仁義者大便之便也彼仁義者所以修政者也政修則民親其上樂其君而輕為之死故曰凡在於軍將率末事也秦四世有勝諰諰然常恐天下之一合而軋己也此所謂末世之兵未有本統也故湯之放桀也非其逐之鳴條之時也武王之誅紂也非以甲子之朝而後勝之也皆前行素修也此所謂仁義之兵也今女不求之於本而索之於末此世之所以亂也禮者治辨之極也強國之本也威行之道也功名之揔也王公由之所以得天下也不由之所以隕社稷也故堅甲利兵不足以為武高城深池不足以為固嚴令繁刑不足以為威由其道則行不由其道則廢楚人鮫革犀兕以為甲鞈如金石宛巨鐵釶慘如蜂蠆輕利僄遬卒如飄風然而兵殆於垂沙唐蔑死莊蹻起楚分而為三四是豈無堅甲利兵也哉其所以統之者非其道故也汝潁以為險江漢以為池限之以鄧林緣之以方城然而秦師至而鄢郢舉若振稿然是豈無固塞隘阻也哉其所以統之者非其道故也紂刳比干囚箕子為炮格之刑殺戮無時臣下懍然莫必其命然而周師至而令不行乎下不能用其民是豈令不嚴刑不繁也哉其所以統之者非其道故也古之兵戈矛弓矢而已矣然而敵國不待試而詘城郭不辦溝池不拑固塞不樹機變不張然而國晏然不畏外而固者無它故焉明道而鈞分之時使而誠愛之則下之和上也如影響有不由令者然后俟之以刑故刑一人而天下服罪人不郵其上知罪之在己也是故刑罰省而威行如流無它故焉由其道故也古者帝堯之治天下也蓋殺一人刑二人而天下治傳曰威厲而不試刑錯而不用此之謂也凡人之動也為賞慶為之則見害傷焉止矣故賞慶刑罰藝詐不足以盡人之力致人之死為人主上者也其所以接下之人百姓者無禮義忠信焉慮率用賞慶刑罰藝詐險厄其下獲其功用而已矣大寇則至使之持危城則必畔遇敵處戰則必北勞苦煩辱則必奔霍焉離耳下反制其上故賞慶刑罰藝詐之為道者傭徒粥賣之道也不足以合大衆美國家故古之人羞而不道也故厚德音以先之明禮義以道之致忠信以愛之尚賢使能以次之爵服慶賞以申之時其事輕其任以調齊之長養之如保赤子政令以定風俗以一有離俗不順其上則百姓莫不敦惡莫不毒孽若祓不祥然後刑於是起矣是大刑之所加也辱孰大焉將以為利耶則大刑加焉身苟不狂惑戇陋誰睹是而不改也哉然後百姓曉然皆知循上之法像上之志而安樂之於是有能化善修身正行積禮義尊道德百姓莫不貴敬莫不親譽然後賞於是起矣是高爵豐祿之所加也榮孰大焉將以為害邪則高爵豐祿以持養之生民之屬孰不願也雕雕焉縣貴爵重賞於其前縣明刑大辱於其後雖欲無化能乎哉故民歸之如流水所存者神所為者化而順暴悍勇力之屬為之化而願旁辟曲私之屬為之化而公矜糾收繚之屬為之化而調夫是之謂大化至一詩曰王猶允塞徐方既來此之謂也凡兼人者有三術有以德兼人者有以力兼人者有以富兼人者彼貴我名聲美我德行欲為我民故辟門除塗以迎吾入因其民襲其處而百姓皆安立法施令莫不順比是故得地而權彌重兼人而兵俞強是以德兼人者也非貴我名聲也非美我德行也彼畏我威劫我藝故民雖有離心不敢有畔慮若是則戎甲俞衆奉養必費是故得地而權彌輕兼人而兵俞弱是以力兼人者也非貴我名聲也非美我德行也用貧求富用飢求飽虛腹張口來歸我食若是則必發夫稟窖之粟以食之委之財貨以富之立良有司以接之已期三年然後民可信也是故得地而權彌輕兼人而國俞貧是以富兼人者也故曰以德兼人者王以力兼人者弱以富兼人者貧古今一也兼并易能也唯堅凝之難焉齊能并宋而不能凝也故魏奪之燕能并齊而不能凝也故田單奪之韓之上地方數百里完全富足而趨趙趙不能凝也故秦奪之故能并之而不能凝則必奪不能并之又不能凝其有則必亡能凝之則必能并之矣得之則凝兼兵無強古者湯以薄武王以滈皆百里之地也天下為一諸侯為臣無它故焉能凝之也故凝士以禮凝民以政禮修而士服政平而民安士服民安夫是之謂大凝以守則固以征則強令行禁止王者之事畢矣
