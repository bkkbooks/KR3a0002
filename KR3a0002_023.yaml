body:
  text: 性惡篇第二十三人之性惡其善者偽也今人之性生而有好利焉順是故爭奪生而辭讓亡焉生而有疾惡焉順是故殘賊生而忠信亡焉生而有耳目之欲有好聲色焉順是故淫亂生而禮義文理亡焉然則從人之性順人之情必出於爭奪合於犯文亂理而歸於暴故必將有師法之化禮義之道然後出於辭讓合於文理而歸於治用此觀之然則人之性惡明矣其善者偽也故枸木必將待檃括烝矯然後直鈍金必將待礱厲然後利今人之性惡必將待師法然後正得禮義然後治今人無師法則偏險而不正無禮義則悖亂而不治古者聖王以人之性惡以為偏險而不正悖亂而不治是以為之起禮義制法度以矯飾人之情性而正之以擾化人之情性而導之也使皆出於治合於道者也今之人化師法積文學道禮義者為君子縱性情安恣睢而違禮義者為小人用此觀之然則人之性惡明矣其善者偽也孟子曰人之學者其性善曰是不然是不及知人之性而不察乎人人之性偽之分者也凡性者天之就也不可學不可事禮義者聖人之所生也人之所學而能所事而成者也不可學不可事之在人者謂之性可學而能可事而成之在人者謂之偽是性偽之分也今人之性目可以見耳可以聽夫可以見之明不離目可以聽之聰不離耳目明而耳聰不可學明矣孟子曰今人之性善將皆失喪其性故也曰若是則過矣今人之性生而離其朴離其資必失而喪之用此觀之然則人之性惡明矣其善者偽也所謂性善者不離其朴而美之不離其資而利之也使夫資朴之於美心意之於善若夫可以見之明不離目可以聽之聰不離耳故曰目明而耳聰也今人之性飢而欲飽寒而欲煖勞而欲休此人之情性也今人飢見長而不敢先食者將有所讓也勞而不敢求息者將有所代也夫子之讓乎父弟之讓乎兄子之代乎父弟之代乎兄此二行者皆反於性而悖於情也然而孝子之道禮義之文理也故順情性則不辭讓矣辭讓則悖於情性矣用此觀之然則人之性惡明矣其善者偽也問者曰人之性惡則禮義惡生應之曰凡禮義者是生於聖人之偽非故生於人之性也故陶人埏埴而為器然則器生於陶人之偽非故生於人之性也故工人斲木而成器然則器生於工人之偽非故生於人之性也聖人積思慮習偽故以生禮義而起法度然則禮義法度者是生於聖人之偽非故生於人之性也若夫目好色耳好聲口好味心好利骨體膚理好愉佚是皆生於人之情性者也感而自然不待事而後生之者也夫感而不能然必且待事而後然者謂之偽是性偽之所生其不同之徵也故聖人化性而起偽偽起於信而生禮義禮義生而制法度然則禮義法度者是聖人之所生也故聖人之所以同於眾其不異於眾者性也所以異而過眾者偽也夫好利而欲得者此人之情性也假之人有弟兄資財而分者且順情性好利而欲得若是則兄弟相怫奪矣且化禮義之文理若是則讓乎國人矣故順情性則弟兄爭矣化禮義則讓乎國人矣凡人之欲為善者為性惡也夫薄願厚惡願美狹願廣貧願富賤願貴苟無之中者必求於外故富而不願財貴而不願埶苟有之中者必不及於外用此觀之人之欲為善者為性惡也今人之性固無禮義故彊學而求有之也性不知禮義故思慮而求知之也然則生而已則人無禮義不知禮義人無禮義則亂不知禮義則悖然則生而已則悖亂在己用此觀之人性惡明矣其善者偽也孟子曰人之性善曰是不然凡古今天下之所謂善者正理平治也所謂惡者偏險悖亂也是善惡之分也已今誠以人之性固正理平治邪則有惡用聖王惡用禮義矣哉雖有聖王禮義將曷加於正理平治也哉今不然人之性惡故古者聖人以人之性惡以為偏險而不正悖亂而不治故為之立君上之埶以臨之明禮義以化之起法正以治之重刑罰以禁之使天下皆出於治合於善也是聖王之治而禮義之化也今當試去君上之埶無禮義之化去法正之治無刑罰之禁倚而觀天下民人之相與也若是則夫彊者害弱而奪之眾者暴寡而譁之天下之悖亂而相亡不待頃矣用此觀之然則人之性惡明矣其善者偽也故善言古者必有節於今善言天者必有徵於人凡論者貴其有辨合有符驗故坐而言之起而可設張而可施行今孟子曰人之性善無辨合符驗坐而言之起而不可設張而不可施行豈不過甚矣哉故性善則去聖王息禮義矣性惡則與聖王貴禮義矣故檃栝之生為枸木也繩墨之起為不直也立君上明禮義為性惡也用此觀之然則人之性惡明矣其善者偽也直木不待檃栝而直者其性直也枸木必將待檃栝烝矯然後直者以其性不直也今人之性惡必將待聖王之治禮義之化然後皆出於治合於善也用此觀之然則人之性惡明矣其善者偽也問者曰禮義積偽者是人之性故聖人能生之也應之曰是不然夫陶人埏埴而生瓦然則瓦埴豈陶人之性也哉工人斲木而生器然則器木豈工人之性也哉夫聖人之於禮義也辟亦陶埏而生之也然則禮義積偽者豈人之本性也哉凡人之性者堯舜之與桀跖其性一也君子之與小人其性一也今將以禮義積偽為人之性邪然則有曷貴堯禹曷貴君子矣哉凡所貴堯禹君子者能化性能起偽偽起而生禮義然則聖人之於禮義積偽也亦猶陶埏而生之也用此觀之然則禮義積偽者豈人之性也哉所賤於桀跖小人者從其性順其情安恣睢以出乎貪利爭奪故人之性惡明矣其善者偽也天非私曾騫孝己而外眾人也然而曾騫孝己獨厚於孝之實而全於孝之名者何也以綦於禮義故也天非私齊魯之民而外秦人也然而秦人於父子之義夫婦之別不如齊魯之孝共敬文者何也以秦人之從情性安恣睢慢於禮義故也豈其性異矣哉塗之人可以為禹曷謂也曰凡禹之所以為禹者以其為仁義法正也然則仁義法正有可知可能之理然而塗之人也皆有可以知仁義法正之質皆有可以能仁義法正之具然則其可以為禹明矣今以仁義法正為固無可知可能之理邪然則唯禹不知仁義法正不能仁義法正也將使塗之人固無可以知仁義法正之質而固無可以能仁義法正之具邪然則塗之人也且內不可以知父子之義外不可以知君臣之正不然今不然塗之人者皆內可以知父子之義外可以知君臣之正然則其可以知之質可以能之具其在塗之人明矣今使塗之人者以其可以知之質可以能之具本夫仁義之可知之理可能之具然則其可以為禹明矣今使塗之人伏術為學專心一志思索孰察加日縣久積善而不息則通於神明參於天地矣故聖人者人之所積而致矣曰聖可積而致然而皆不可積何也曰可以而不可使也故小人可以為君子而不肯為君子君子可以為小人而不肯為小人小人君子者未嘗不可以相為也然而不相為者可以而不可使也故塗之人可以為禹則然塗之人能為禹未必然也雖不能為禹無害可以為禹足可以徧行天下然而未嘗有能徧行天下者也夫工匠農賈未嘗不可以相為事也然而未嘗能相為事也用此觀之然則可以為未必能也雖不能無害可以為然則能不能之與可不可其不同遠矣其不可以相為明矣堯問於舜曰人情何如舜對曰人情甚不美又何問焉妻子具而孝衰於親嗜欲得而信衰於友爵祿盈而忠衰於君人之情乎人之情乎甚不美又何問焉唯賢者為不然有聖人之知者有士君子之知者有小人之知者有役夫之知者多言則文而類終日議其所以言之千舉萬變其統類一也是聖人之知也少言則徑而省論而法若佚之以繩是士君子之知也其言也謟其行也悖其舉事多悔是小人之知也齊給便敏而無類雜能旁魄而毋用析速粹孰而不急不恤是非不論曲直以期勝人為意是役夫之知也有上勇者有中勇者有下勇者天下有中敢直其身先王有道敢行其意上不循於亂世之君下不俗於亂世之民仁之所在無貧窮仁之所亡無富貴天下知之則欲與天下共樂之天下不知之則傀然獨立天地之間而不畏是上勇也禮恭而意儉大齊信焉而輕貨財賢者敢推而尚之不肖者敢援而廢之是中勇也輕身而重貨恬禍而廣解苟免不恤是非然不然之情以期勝人為意是下勇也繁弱鉅黍古之良弓也然而不得排檠則不能自正桓公之葱大公之闕文王之錄莊君之曶闔閭之干將莫邪鉅闕辟閭此皆古之良劍也然而不加砥厲則不能利不得人力則不能斷驊騮騹驥纖離綠耳此皆古之良馬也然而必前有銜轡之制後有鞭策之威加之以造父之馭然後一日而致千里也夫人雖有性質美而心辨知必將求賢師而事之擇賢友而友之得賢師而事之則所聞者堯舜禹湯之道也得良友而友之則所見者忠信敬讓之行也身日進於仁義而不自知也者靡使然也今與不善人處則所聞者欺誣詐偽也所見者汙漫淫邪貪利之行也身且加於刑戮而不自知者靡使然也傳曰不知其子視其友不知其君視其左右靡而已矣靡而已矣
