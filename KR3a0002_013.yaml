body:
  text: 臣道篇第十三人臣之論有態臣者有篡臣者有功臣者有聖臣者內不足使一民外不足使拒難百姓不親諸侯不信然而巧敏佞說善取寵乎上是態臣者也上不忠乎君下善取譽乎民不䘏公道通義朋黨比周以環主圖私為務是篡臣者也內足使以一民外足使以拒難民親之士信之上忠乎君下愛百姓而不倦是功臣者也上則能尊君下則能愛民政令教化刑下如景應卒遇變齊給如響推類接譽以待無方曲成制象是聖臣者也故用聖臣者王用功臣者彊用篡臣者危用態臣者亡態臣用則必死篡臣用則必危功臣用則必榮聖臣用則必尊故齊之蘇秦楚之州侯秦之張儀可謂態臣者也韓之張去疾趙之奉陽齊之孟嘗可謂篡臣也齊之管仲晉之咎犯楚之孫叔敖可謂功臣矣殷之伊尹周之太公可謂聖臣矣是人臣之論也吉凶賢不肖之極也必謹志之而慎自為擇取焉足以稽矣從命而利君謂之順從命而不利君謂之諂逆命而利君謂之忠逆命而不利君謂之篡不䘏君之榮辱不䘏國之臧否偷合苟容以持祿養交而已耳謂之國賊君有過謀過事將危國家殞社稷之懼也大臣父子兄弟有能進言於君用則可不用則去謂之諫有能進言於君用則可不用則死謂之爭有能比知同力率群臣百吏而相與彊君橋君君雖不安不能不聽遂以解國之大患除國之大害成於尊君安國謂之輔有能抗君之命竊君之重反君之事以安國之危除君之辱功伐足以成國之大利謂之拂故諫爭輔拂之人社稷之臣也國君之寶也明君之所尊所厚也而闇主惑之以為己賊也故明君之所賞闇君之所罰也闇君之所賞明君之所殺也伊尹箕子可謂諫矣比干子胥可謂爭矣平原君之於趙也可謂輔矣信陵君之於魏也可謂拂矣傳曰從道不從君此之謂也故正義之臣設則朝廷不頗諫爭輔拂之人信則君過不遠爪牙之士施則仇讎不作邊境之臣處則疆垂不喪故明主好同而闇主好獨明主尚賢使能而饗其盛闇主妬賢畏能而滅其功罰其忠賞其賊夫是之謂至闇桀紂所以滅也事聖君者有聽從無諫爭事中君者有諫爭無諂諛事暴君者有補削無橋拂迫脅於亂時窮居於暴國而無所避之則崇其美揚其善違其惡隱其敗言其所長不稱其所短以為成俗詩曰國有大命不可以告人防其躬身此之謂也恭敬而遜聽從而敏不敢有以私決擇也不敢有以私取與也以順上為志是事聖君之義也忠信而不諛諫諍而不諂橋然剛折端志而無傾側之心是案曰是非案曰非是事中君之義也調而不流柔而不屈寬容而不亂曉然以至道而無不調和也而能化易時關內之是事暴君之義也若馭其樸馬若養赤子若食餧人故因其懼也而改其過因其憂也而辨其故因其喜也而入其道因其怒也而除其怨曲得所謂焉書曰從命而不拂微諫而不倦為上則明為下則遜此之謂也事人而不順者不疾者也疾而不順者不敬者也敬而不順者不忠者也忠而不順者無功者也有功而不順者無德者也故無德之為道也傷疾墮功滅苦故君子不為也有大忠者有次忠者有下忠者有國賊者以德復君而化之大忠也以德調君而補之次忠也以是諫非而怒之下忠也不卹君之榮辱不卹國之臧否偷合苟容以之持祿養交而已耳國賊也若周公之於成王也可謂大忠矣若管仲之於桓公可謂次忠矣若子胥之於夫差可謂下忠矣若曹觸龍之於紂者可謂國賊矣仁者必敬人凡人非賢則案不肖也人賢而不敬則是禽獸也人不肖而不敬則是狎虎也禽獸則亂狎虎則危災及其身矣詩曰不敢暴虎不敢馮河人知其一莫知其它戰戰兢兢如臨深淵如履薄冰此之謂也故仁者必敬人敬人有道賢者則貴而敬之不肖者則畏而敬之賢者則親而敬之不肖者則䟽而敬之其敬一也其情二也若夫忠信端愨而不害傷則無接而不然是仁人之質也忠信以為質端愨以為統禮義以為文倫類以為理喘而言臑而動而一可以為法則詩曰不僭不賊鮮不為則此之謂也恭敬禮也調和樂也謹慎利也鬭怒害也故君子安禮樂樂謹慎而無鬭怒是以百舉不過也小人反是通忠之順權險之平禍亂之從聲三者非明主莫之能知也爭然後善戾然後功出死無私致忠而公夫是之謂通忠之順信陵君似之矣奪然後義殺然後仁上下易位然後貞功參天地澤被生民夫是之謂權險之平湯武是也過而通情和而無經不䘏是非不治曲直偷合苟容迷亂狂生夫是之謂禍亂之從聲飛廉惡來是也傳曰斬而齊枉而順不同而壹詩曰受小球大球為下國綴旒此之謂也
