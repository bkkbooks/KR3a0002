body:
  text: 哀公篇第三十一魯哀公問於孔子曰吾欲論吾國之士與之治國敢問何如取之邪孔子對曰生今之世志古之道居今之俗服古之服舍此而為非者不亦鮮乎哀公曰然則夫章甫絇屨紳帶而搢笏者此皆賢乎孔子對曰不必然夫端衣玄裳絻而乘路者志不在於食葷斬衰菅屨杖而啜粥者志不在於酒肉生今之世志古之道居今之俗服古之服舍此而為非者雖有不亦鮮乎哀公曰善孔子曰人有五儀有庸人有士有君子有賢人有大聖哀公曰敢問何如斯可謂庸人矣孔子對曰所謂庸人者口不能道善言心不知邑邑不知選賢人善士而託其身焉以為己憂動行不知所務止立不知所定日選擇於物不知所貴從物如流不知所歸五鑿為正心從而壞如此則可謂庸人矣哀公曰善敢問何如斯可謂士矣孔子對曰所謂士者雖不能盡道術必有率也雖不能徧美善必有處也是故知不務多務審其所知言不務多務審其所謂行不務多務審其所由故知既已知之矣言既已謂之矣行既已由之矣則若性命肌膚之不可易也故富貴不足以益也卑賤不足以損也如此則可謂士也哀公曰善敢問何如斯可謂之君子矣孔子對曰所謂君子者言忠信而心不德仁義在身而色不伐思慮明通而辭不爭故猶然如將可及者君子也哀公曰善敢問何如斯可謂賢人矣孔子對曰所謂賢人者行中規繩而不傷於本言足法於天下而不傷於身富有天下而無怨財布施天下而不病貧如此則謂賢人矣哀公曰善敢問何如斯可謂大聖矣孔子對曰所謂大聖者知通乎大道應變而不窮辨乎萬物之情性者也大道者所以變化遂成萬物也情性者所以理然不取舍也是故其事大辨乎天地明察乎日月總要萬物於風雨繆繆肫肫其事不可循若天之嗣其事不可識百姓淡然不識其鄰若此則可謂大聖矣哀公曰善魯哀公問舜冠於孔子孔子不對三問不對哀公曰寡人問舜冠於子何以不言也孔子對曰古之王者有務而拘領者矣其政好生而惡殺焉是以鳳在列樹麟在郊野烏鵲之巢可俯而窺也君不此問而問舜冠所以不對也魯哀公問於孔子曰寡人生於深宮之中長於婦人之手寡人未嘗知哀也未嘗知憂也未嘗知勞也未嘗知懼也未嘗知危也孔子曰君之所問聖君之問也丘小人也何足以知之曰非吾子無所聞之也孔子曰君入廟門而右登自胙階仰視榱棟俛見几筵其器存其人亡君以此思哀則哀將焉而不至矣君昧爽而櫛冠平明而聽朝一物不應亂之端也君以此思憂則憂將焉而不至矣君平明而聽朝日昃而退諸侯之子孫必有在君之末庭者君以此思勞則勞將焉而不至矣君出魯之四門以望魯四郊亡國之虛則必有數蓋焉君以此思懼則懼將焉而不至矣且丘聞之君者舟也庶人者水也水則載舟水則覆舟君以此思危則危將焉而不至矣魯哀公問於孔子曰紳委章甫有益於仁乎孔子蹴然曰君號然也資衰苴杖者不聽樂非耳不能聞也服使然也黼衣黻裳者不茹葷非口不能味也服使然也且丘聞之好肆不守折長不為市竊其有益與其無益君其知之矣魯哀公問於孔子曰請問取人孔子對曰無取健無取詌無取口啍健貪也詌亂也口啍誕也故弓調而後求勁焉馬服而後求良焉士信愨而後求知能焉士不信愨而有多知能譬之其豺狼也不可以身尒也語曰桓公用其賊文公用其盜故明主任計不信怒闇主信怒不任計計勝怒則強怒勝計則亡定公問於顏淵曰子亦聞東野畢之善馭乎顏淵對曰善則善矣雖然其馬將失定公不悅入謂左右曰君子固讒人乎三日而校來謁曰東野畢之馬失兩驂列兩服入廄定公越席而起曰趨駕召顏淵顏淵至定公曰前日寡人問吾子吾子曰東野畢之馭善則善矣雖然其馬將失不識吾子何以知之顏淵對曰臣以政知之昔舜巧於使民而造父巧於使馬舜不窮其民造父不窮其馬是以舜無失民造父無失馬也今東野畢之馭也上車執轡銜體正矣步驟馳騁朝禮畢矣歷險致遠馬力盡矣然猶求馬不已是以知之也定公曰善可得少進乎顏淵對曰臣聞之鳥窮則啄獸窮則攫人窮則詐自古及今未有窮其下而能無危者也
