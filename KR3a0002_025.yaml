body:
  text: 成相篇二十五請成相世之殃愚暗愚暗墮賢良人主無賢如瞽無相何倀倀請布基慎聖人愚而自專事不治主忌苟勝群臣莫諫必逢災論臣過反其施尊主安國尚賢義拒諫飾非愚而上同國必禍曷謂罷國多私比周還主黨與施遠賢近讒忠臣蔽塞主勢移曷謂賢明君臣上能尊主下愛民主誠聽之天下為一海內賓主之孽讒人達賢能遁逃國乃蹶愚以重愚暗以重暗成為桀世之災妬賢能飛廉知政任惡來卑其志意大其園囿高其臺榭武王怒師牧野紂卒易鄉啓乃下武王善之封之於宋立其祖世之衰讒人歸比干見刳箕子纍武王誅之呂尚招麾殷民懷世之禍惡賢士子胥見殺百里徙穆公得之強配五伯六卿施世之愚惡大儒逆斥不通孔子拘展禽三絀春申道綴基畢輸請牧基賢者思堯在萬世如見之讒人罔極險陂傾側此之疑基必施辨賢罷文武之道同伏戲由之者治不由者亂何疑為凡成相辨法方至治之極復後王慎墨季惠百家之說誠不詳治復一修之吉君子執之心如結衆人二之讒夫棄之形是詰水至平端不傾心術如此象聖人人而有藝直而用抴必參天世無王窮賢良暴人芻豢仁人糟糠禮樂滅息聖人隱伏墨術行治之經禮與刑君子以修百姓寧明德慎罰國家既治四海平治之志後藝富君子誠之好以待處之敦固有深藏之能遠思思乃精志之榮好而一之神以成精神相及一而不二為聖人治之道美不老君子由之佼以好下以教誨子弟上以事祖考成相竭辭不蹶君子道之順以達宗其賢良辨其殃孽請成相道聖王堯舜尚賢身辭讓許由善卷重義輕利行顯明堯讓賢以為民泛利兼愛德施均辨治上下貴賤有等明君臣堯授能舜遇時尚賢推德天下治雖有賢聖適不遇世孰知之堯不德舜不辭妻以二女任以事大人哉舜南面而立萬物備舜授禹以天下尚得推賢不失序外不避仇內不阿親賢者豫禹勞心力堯有德干戈不用三苗服舉舜甽畝任之天下身休息得后稷五穀殖夔為樂正鳥獸服契為司徒民知孝弟尊有德禹有功抑下鴻辟除民害逐共工北決九河通十二渚疏三江禹溥土平天下躬親為民行勞苦得益皋陶橫革直成為輔契玄王生昭明居於砥石遷于商十有四世乃有天乙是成湯天乙湯論舉當身讓卞隨舉牟光道古賢聖基必張願陳辭世亂惡善不此治隱過疾賢長由姦詐鮮無災患難哉阪為之聖知不用愚者謀前車已覆後未知更何覺時不覺悟不知苦迷惑失指易上下忠不上達蒙掩耳目塞門戶門戶塞大迷惑悖亂昏莫不終極是非反易比周欺上惡正直正直惡心無度邪枉辟回失道途己無郵人我獨自美豈獨無故不知戒後必有恨復遂過不肯悔讒夫多進反覆言語生詐態人之態不如備爭寵嫉賢相惡忌妬功毀賢下斂黨與上蔽匿上壅蔽失輔藝任用讒夫不能制孰公長父之難厲王流于彘周幽厲所以敗不聽規諫忠是害嗟我何人獨不遇時當亂世欲對衷言不從恐為子胥身離凶進諫不聽剄而獨鹿棄之江觀往事以自戒治亂是非亦可識託於成相以喻意請成相言治方君論有五約以明君謹守之下皆平正國乃昌臣下職莫游食務本節用財無極事業聽上莫得相使一民力守其職足衣食厚薄有等明爵服利隹卬上莫得擅與孰私得君法明論有常表儀既設民知方進退有律莫得貴賤孰私王君法儀禁不為莫不說教名不移修之者榮離之者辱孰它師刑稱陳守其銀下不得用輕私門罪禍有律莫得輕重威不分請牧基明有祺主好論議必善謀五聽修領莫不理績孰主持聽之經明其請參伍明謹施賞刑顯者必得隱者復顯民反誠言有節稽其實信誕以分賞罰必下不欺上皆以情言明若日上通利隱遠至觀法不法見不視耳目既顯吏敬法令莫敢恣君教出行有律吏謹將之無鈹滑下不私請各以宜舍巧拙臣謹循君制變公察善思論不亂以治天下後世法之成律貫
