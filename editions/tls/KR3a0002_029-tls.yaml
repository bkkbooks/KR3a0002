body:
  text: 子道篇第二十九入孝出弟人之小行也上順下篤人之中行也從道不從君從義不從父人之大行也若夫志以禮安言以類使則儒道畢矣雖舜不能加毫末於是也孝子所以不從命有三從命則親危不從命則親安不從命乃衷從命則親辱不從命則親榮孝子不從命乃義從命則禽獸不從命則脩飾孝子不從命乃敬故可以從而不從是不子也未可以從而從是不衷也明於從不從之義而能致恭敬忠信端愨以慎行之則可謂大孝矣傳曰從道不從君從義不從父此之謂也故勞苦彫萃而能無失其敬災禍患難而能無失其義則不幸不順見惡而能無失其愛非仁人莫能行詩曰孝子不匱此之謂也魯哀公問於孔子曰子從父命孝乎臣從君命貞乎三問孔子不對孔子趨出以語子貢曰鄉者君問丘也曰子從父命孝乎臣從君命貞乎三問而丘不對賜以為何如子貢曰子從父命孝矣臣從君命貞矣夫子有奚對焉孔子曰小人哉賜不識也昔萬乘之國有爭臣四人則封疆不削千乘之國有爭臣三人則社稷不危百乘之家有爭臣二人則宗廟不毀父有爭子不行無禮士有爭友不為不義故子從父奚子孝臣從君奚臣貞審其所以從之之謂孝之謂貞也子路問於孔子曰有人於此夙興夜寐耕耘樹藝手足胼胝以養其親然而無孝之名何也孔子曰意者身不敬與辭不遜與色不順與古之人有言曰衣與繆與不女聊今夙興夜寐耕耘樹藝手足胼胝以養其親無此三者則何以為而無孝之名也意者所友非仁人邪孔子曰由志之吾語汝雖有國士之力不能自舉其身非無力也勢不可也故入而行不脩身之罪也出而名不章友之過也故君子入則篤行出則友賢何為而無孝之名也子路問於孔子曰魯大夫練而床禮邪孔子曰吾不知也子路出謂子貢曰吾以夫子為無所不知夫子徒有所不知子貢曰女何問哉子路曰由問魯大夫練而床禮邪夫子曰吾不知也子貢曰吾將為汝問之子貢問曰練而床禮邪孔子曰非禮也子貢出謂子路曰女謂夫子為有所不知乎夫子徒無所不知汝問非也禮居是邑不非其大夫子路盛服見孔子孔子曰由是裾裾何也昔者江出於岷山其始出也其源可以濫觴及其至江之津也不放舟不避風則不可涉也非唯下流水多邪今汝衣服既盛顏色充盈天下且孰肯諫汝矣由子路趨而出改服而入蓋猶若也孔子曰志之吾語女慎於言者不華慎於行者不伐色知而有能者小人也故君子知之曰知之不知曰不知言之要也能之曰能之不能曰不能行之至也言要則知行至則仁既知且仁夫惡有不足矣哉子路入子曰由知者若何仁者若何子路對曰知者使人知己仁者使人愛己子曰可謂士矣子貢入子曰賜知者若何仁者若何子貢對曰知者知人仁者愛人子曰可謂士君子矣顏淵入子曰回知者若何仁者若何顏淵對曰知者自知仁者自愛子曰可謂明君子矣子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意既已得之又樂其治是以有終身之樂無一日之憂小人者其未得也則憂不得既已得之又恐失之是以有終身之憂無一日之樂也
