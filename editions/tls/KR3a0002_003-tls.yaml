body:
  text: 不苟篇第三君子行不貴苟難說不貴苟察名不貴苟傳唯其當之為貴故懷負石而赴河是行之難為者也而申徒狄能之然而君子不貴者非禮義之中也山淵平天地比齊秦襲入乎耳出乎口鉤有須卵有毛是說之難持者也而惠施鄧析能之然而君子不貴者非禮義之中也盜跖吟口名聲若日月與禹舜俱傳而不息然而君子不貴者非禮義之中也故曰君子行不貴苟難說不貴苟察名不貴苟得唯其當之為貴詩曰物其有矣唯其時矣此之謂也君子易和而難狎易懼而難脅畏患而不避義死欲利而不為所非交親而不比言辯而不亂蕩蕩乎其有以殊於世也君子能亦好不能亦好小人能亦醜不能亦醜君子能則寬容易直以開道人不能則恭敬繜絀以畏事人小人能則倨傲僻違以驕溢人不能則妬嫉怨誹以傾覆人故曰君子能則人榮學焉不能則人樂告之小人能則人賤學焉不能則人羞告之是君子小人之分也君子寬而不僈廉而不劌辯而不爭察而不激直立而不勝堅彊而不暴柔從而不流恭敬謹慎而容夫是之謂至文詩曰溫溫恭人惟德之基此之謂也君子崇人之德揚人之美非諂諛也正義直指舉人之過非毀疵也言己之光美擬於禹舜參於天地非夸誕也與時屈伸柔從若蒲葦非懾怯也剛彊猛毅靡所不信非驕暴也以義變應知當曲直故也詩曰左之左之君子宜之右之右之君子有之此言君子能以義屈信變應故也君子小人之反也君子大心則敬天而道小心則畏義而節知則明通而類愚則端愨而法見由則恭而止見閉則敬而齊喜則和而理憂則靜而理通則文而明窮則約而詳小人則不然大心則慢而暴小心則流淫而傾知則攫盜而漸愚則毒賊而亂見由則兌而倨見閉則怨而險喜則輕而翾憂則挫而懾通則驕而偏窮則棄而儑傳曰君子兩進小人兩廢此之謂也君子治治非治亂也曷謂耶曰禮義之謂治非禮義之謂亂也故君子者治禮義者也非治非禮義者也然則國亂將弗治與曰國亂而治之者非案亂而治之之謂也去亂而被之以治人汙而脩之者非案汙而脩之之謂也去汙而易之以脩故去亂而非治亂也去汙而非脩汙也治之為名猶曰君子為治而不為亂為脩而不為汙也君子絜其辯而同焉者合矣善其言而類焉者應矣故馬鳴而馬應之非知也其勢然也故新浴者振其衣新沐者彈其冠人之情也其誰能以己之潐潐受人之掝掝者哉君子養心莫善於誠致誠則無它事矣唯仁之為守唯義之為行誠心守仁則形形則神神則能化矣誠心行義則理理則明明則能變矣變化代興謂之天德天不言而人推高焉地不言而人推厚焉四時不言而百姓期焉夫此有常以至其誠者也君子至德嘿然而喻未施而親不怒而威夫此順命以慎其獨者也善之為道者不誠則不獨不獨則不形不形則雖作於心見於色出於言民猶若未從也雖從必疑天地為大矣不誠則不能化萬物聖人為知矣不誠則不能化萬民父子為親矣不誠則䟽君上為尊矣不誠則卑夫誠者君子之所守也而政事之本也唯所居以其類至操之則得之舍之則失之操而得之則輕輕則獨行獨行而不舍則濟矣濟而材盡長遷而不反其初則化矣君子位尊而志恭心小而道大所聽視者近而所聞見者遠是何邪則操術然也故千人萬人之情一人之情是也天地始者今日是也百王之道後王是也君子審後王之道而論於百王之前若端𢪙而議推禮義之統分是非之分總天下之要治海內之眾若使一人故操彌約而事彌大五寸之矩盡天下之方也故君子不下室堂而海內之情舉積此者則操術然也有通士者有公士者有直士者有愨士者有小人者上則能尊君下則能愛民物至而應事起而辨若是則可謂通士矣不下比以闇上不上同以疾下分爭於中不以私害之若是則可謂公士矣身之所長上雖不知不以悖君身之所短上雖不知不以取賞長短不飾以情自竭若是則可謂直士矣庸言必信之庸行必慎之畏法流俗而不敢以其所獨是若是則可謂愨士矣言無常信行無常貞唯利所在無所不傾若是則可謂小人矣公生明偏生闇端愨生通詐偽生塞誠信生神夸誕生惑此六生者君子慎之而禹桀所以分也欲惡取舍之權見其可欲也則必前後慮其可惡也者見其可利也則必前後慮其可害也者而兼權之孰計之然後定其欲惡取舍如是則常不大陷矣凡人之患偏傷之也見其可欲也則不慮其可惡也者見其可利也則不顧其可害也者是以動則必陷為則必辱是偏傷之患也人之所惡者吾亦惡之夫富貴者則類傲之夫貧賤者則求柔之是非仁人之情也是姦人將以盜名於晻世者也險莫大焉故曰盜名不如盜貨田仲史鰌不如盜也
