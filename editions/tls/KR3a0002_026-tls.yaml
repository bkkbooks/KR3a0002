body:
  text: 賦篇第二十六爰有大物非絲非帛文理成章非日非月為天下明生者以壽死者以葬城郭以固三軍以強粹而王駁而伯無一焉而亡臣愚不識敢請之王王曰此夫文而不采者與簡然易知而致有理者歟君子所敬而小人所不者與性不得則若禽獸性得之則甚雅似者歟匹夫隆之則為聖人諸侯隆之則一四海者歟致明而約甚順而體請歸之禮禮皇天隆物以施下民或厚或薄常不齊均桀紂以亂湯武以賢惽惽淑淑皇皇穆穆周流四海曾不崇日君子以脩跖以穿室大參于天精微而無形行義以正事業以成可以禁暴足窮百姓待之而後寧泰臣愚而不識願問其名曰此夫安寬平而危險隘者邪修潔之為親而雜汙之為狄者邪甚深藏而外勝敵者邪法禹舜而能弇迹者邪行為動靜待之而後適者邪血氣之精也志意之榮也百姓待之而後寧也天下待之而後平也明達純粹而無疵也夫是之謂君子之知知有物於此居則周靜致下動則綦高以鉅員者中規方者中矩大參天地德厚堯禹精微乎毫毛而充盈乎大㝢宙忽兮其極之遠也攭兮其相逐而反也卬卬兮天下之咸蹇也德厚而不捐五采備而成文往來惽憊通于大神出入甚極莫知其門天下失之則滅得之則存弟子不敏此之願陳君子設辭請測意之曰此夫大而不塞者歟充盈大宇而不窕入郄穴而不偪者歟行遠疾速而不可託訊者與往來惽憊而不可為固塞者歟暴至殺傷而不億忌者歟功被天下而不私置者歟託地而游宇友風而子雨冬日作寒夏日作暑廣大精神請歸之雲雲有物於此㒩㒩兮其狀屢化如神功被天下為萬世文禮樂以成貴賤以分養老長幼待之而後存名號不美與暴為鄰功立而身廢事成而家敗棄其耆老收其後世人屬所利飛鳥所害臣愚而不識請占之五泰五泰占之曰此夫身女好而頭馬首者與屢化而不壽者與善壯而拙老者與有父母而無牝牡者與冬伏而夏游食桑而吐絲前亂而後治夏生而惡暑喜溼而惡雨蛹以為母蛾以為父三俯三起事乃大已夫是之謂蠶理蠶有物於此生於山阜處於室堂無知無巧善治衣裳不盜不竊穿窬而行日夜合離以成文章以能合從又善連衡下覆百姓上飾帝王功業甚博不見賢良時用則存不用則亡臣愚不識敢請之王王曰此夫始生鉅其成功小者邪長其尾而銳其剽者邪頭銛達而尾趙繚者邪一往一來結尾以為事無羽無翼反覆甚極尾生而事起尾邅而事已簪以為父管以為母既以縫表又以連裏夫是之謂箴理箴天下不治請陳佹詩天地易位四時易鄉列星隕墜旦暮晦盲幽闇登昭日月下藏公正無私見謂從橫志愛公利重樓䟽堂無私罪人憼革戒兵道德純備讒口將將仁人絀約敖暴擅強天下幽險恐失世英螭龍為蝘蜓鴟梟為鳳皇比干見刳孔子拘匡昭昭乎其知之明也郁郁乎其遇時之不祥也拂乎其欲禮義之大行也闇乎天下之晦盲也皓天不復憂無疆也千歲必反古之常也弟子勉學天不忘也聖人共手時幾將矣與愚以疑願聞反辭其小歌也念彼遠方何其塞矣仁人詘約暴人衍矣忠臣危殆讒人服矣琁玉瑤珠不知佩也雜布與錦不知異也閭娵子奢莫之媒也嫫母刁父是之喜也以盲為明以聾為聰以危為安以吉為凶嗚呼上天曷維其同
