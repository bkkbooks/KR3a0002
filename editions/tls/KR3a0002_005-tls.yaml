body:
  text: 非相篇第五相人古之人無有也學者不道也古者有姑布子卿今之世梁有唐舉相人之形狀顏色而知其吉凶妖祥世俗稱之古之人無有也學者不道也故相形不如論心論心不如擇術形不勝心心不勝術術正而心順則形相雖惡而心術善無害為君子也形相雖善而心術惡無害為小人也君子之謂吉小人之謂凶故長短小大善惡形相非吉凶也古之人無有也學者不道也蓋帝堯長帝舜短文王長周公短仲尼長子弓短昔者衛靈公有臣曰公孫呂身長七尺面長三尺焉廣三寸鼻目耳具而名動天下楚之孫叔敖期思之鄙人也突禿長左軒較之下而以楚霸葉公子高微小短瘠行若將不勝其衣然白公之亂也令尹子西司馬子期皆死焉葉公子高入據楚誅白公定楚國如反手爾仁義功名善於後世故士不揣長不揳大不權輕重亦將志乎心爾長短小大美惡形相豈論也哉且徐偃王之狀目可瞻馬仲尼之狀面如蒙倛周公之狀身如斷菑皋陶之狀色如削瓜閎夭之狀面無見膚傅說之狀身如植鰭伊尹之狀面無須麋禹跳湯偏堯舜參牟子從者將論志意比類文學邪直將差長短辨美惡而相欺傲邪古者桀紂長巨姣美天下之傑也筋力越勁百人之敵也然而身死國亡為天下大僇後世言惡則必稽焉是非容貌之患也聞見之不眾論議之卑爾今世俗之亂君鄉曲之儇子莫不美麗姚冶奇衣婦飾血氣態度擬於女子婦人莫不願得以為夫處女莫不願得以為士棄其親家而欲奔之者比肩並起然而中君羞以為臣中父羞以為子中兄羞以為弟中人羞以為友俄則束乎有司而戮乎大市莫不呼天啼哭苦傷其今而後悔其始是非容貌之患也聞見之不眾而論議之卑爾然則從者將孰可也人有三不祥幼而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也人有三必窮為上則不能愛下為下則好非其上是人之一必窮也鄉則不若偝則謾之是人之二必窮也智行淺薄曲直有以相縣矣然而仁人不能推知士不能明是人之三必窮也人有此數行者以為上則必危為下則必滅詩曰雨雪瀌瀌宴然聿消莫肯下隧式居屢驕此之謂也人之所以為人者何已也曰以其有辨也飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也然則人之所以為人者非特以二足而無毛也以其有辨也今夫狌狌形笑亦二足而毛也然而君子啜其羹食其胾故人之所以為人者非特以其二足而無毛也以其有辨也夫禽獸有父子而無父子之親有牝牡而無男女之別故人道莫不有辨辨莫大於分分莫大於禮禮莫大於聖王聖王有百吾孰法焉故曰文久而滅節族久而絕守法數之有司極禮而褫故曰欲觀聖王之跡則於其粲然者矣後王是也彼後王者天下之君也舍後王而道上古譬之是猶舍己之君而事人之君也故曰欲觀千歲則數今日欲知億萬則審一二欲知上世則審周道欲知周道則審其人所貴君子故曰以近知遠以一知萬以微知明此之謂也夫妄人曰古今異情其所以治亂者異道而眾人惑焉彼眾人者愚而無說陋而無度者也其所見焉猶可欺也而況於千世之傳也妄人者門庭之閒猶可誣欺也而況於千世之上乎聖人何以不可欺曰聖人者以己度者也故以人度人以情度情以類度類以說度功以道觀盡古今一也類不悖雖久同理故鄉乎邪曲而不迷觀乎雜物而不惑以此度之五帝之外無傳人非無賢人也久故也五帝之中無傳政非無善政也久故也禹湯有傳政而不若周之察也非無善政也久故也傳者久則俞略近則俞詳略則舉大詳則舉小愚者聞其略而不知其詳聞其小而不知其大也是以文久而滅節族久而絕凡言不合先王不順禮義謂之姦言雖辨君子不聽法先王順禮義黨學者然而不好言不樂言則必非誠士也故君子之於善也志好之行安之樂言之故君子必辯凡人莫不好言其所善而君子為甚故贈人以言重於金石珠玉觀人以言美於黼黻文章聽人以言樂於鍾鼓琴瑟故君子之於言無厭鄙夫反是好其實不䘏其文是以終身不免埤汙傭俗故易曰括囊無咎無譽腐儒之謂也凡說之難以至高遇至卑以至治接至亂未可直至也遠舉則病繆近舉則病傭善者於是閒也亦必遠舉而不繆近舉而不傭與時遷徙與世偃仰緩急嬴絀府然苦梁匽檃栝之於己也曲得所謂焉然而不折傷故君子之度己則以繩接人則用枻度己以繩故足以為天下法則矣接人用枻故能寬容因眾以成天下之大事矣故君子賢而能容罷知而能容愚博而能容淺粹而能容雜夫是之謂兼術詩曰徐方既同天子之功此之謂也談說之術矜莊以莅之端誠以處之堅彊以持之譬稱以諭之分別以明之欣驩芬薌以送之寶之珍之責之神之如是則說常無不受雖不說人人莫不貴夫是之謂為能貴其所貴傳曰唯君子為能貴其所貴此之謂也君子必辯凡人莫不好言其所善而君子為甚焉是以小人辯言險君子辯言仁也言而非仁之中也則其言不若其默也其辯不若其吶也言而仁之中也則好言者上矣不好言者下也故仁言大矣起於上所以導於下政令是也起於下所以忠於上謀救是也故君子之行仁也無厭志好之行安之樂言之故言君子必辯小辯不如見端見端不如見本分小辯而察見端而明本分而理聖人士君子之分具矣有小人之辯者有士君子之辯者有聖人之辯者不先慮不早謀發之而當成文而類居錯遷徙應變不窮是聖人之辯者也先慮之早謀之斯須之言而足聽文而致實博而黨正是士君子之辯者也聽其言則辭辨而無統用其身則多詐而無功上不足以順明王下不足以和齊百姓然而口舌之於噡唯則節足以為奇偉偃卻之屬夫是之謂姦人之雄聖王起所以先誅也然後盜賊次之盜賊得變此不得變也
