body:
  text: 仲尼篇第七仲尼之門人五尺之豎子言羞稱乎五伯是何也曰然彼誠可羞稱也齊桓五伯之盛者也前事則殺兄而爭國內行則姑姊妹之不嫁者七人閨門之內般樂奢汰以齊之分奉之而不足外事則詐邾襲莒并國三十五其事行也若是其險汙淫汰也彼固曷足稱乎大君子之門哉若是而不亡乃霸何也曰於乎夫齊桓公有天下之大節焉夫孰能亡之倓然見管仲之能足以託國也是天下之大知也安忘其怒出忘其讎遂立以為仲父是天下之大決也立以為仲父而貴戚莫之敢妬也與之高國之位而本朝之臣莫之敢惡也與之書社三百而富人莫之敢距也貴賤長少秩秩焉莫不從桓公而貴敬之是天下之大節也諸侯有一節如是則莫之能亡也桓公兼此數節者而盡有之夫又何可亡也其霸也宜哉非幸也數也然而仲尼之門五尺之豎子言羞稱乎五伯是何也曰然彼非平政教也非致隆高也非綦文理也非服人之心也鄉方略審勞佚謹畜積脩鬭備而能顛倒其敵者也詐心以勝矣彼以讓飾爭依乎仁而蹈利者也小人之傑也彼固曷足稱乎大君子之門哉彼王者則不然致賢而能以救不肖致彊而能以寬弱戰必能殆之而羞與之鬭委然成文以示之天下而暴國安自化矣有災繆者然後誅之故聖王之誅也綦省矣文王誅四武王誅二周公卒業至於成王則安以無誅矣故道豈不行矣哉文王載百里地而天下一桀紂舍之厚於有天下之勢而不得以匹夫老故善用之則百里之國足以獨立矣不善用之則楚六千里而為讎人役故人主不務得道而廣有其埶是其所以危也持寵處位終身不厭之術主尊貴之則恭敬而僔主信愛之則謹慎而嗛主專任之則拘守而詳主安近之則慎比而不邪主䟽遠之則全一而不倍主損絀之則恐懼而不怨貴而不為夸信而不忘處謙任重而不敢專財利至則言善而不及也必將盡辭讓之義然後受福事至則和而理禍事至則靜而理富則施廣貧則用節可貴可賤也可富可貧也可殺而不可使為姦也是持寵處位不厭之術也雖在貧窮徒處之埶亦取象於是矣夫是之謂吉人詩曰媚茲一人應侯順德永言孝思昭哉嗣服此之謂也求善處大重理任大事擅寵於萬乘之國必無後患之術莫若好同之援賢博施除怨而無妨害人能耐任之則慎行此道也而不耐任且恐失寵則莫若早同之推賢讓能而安隨其後如是有寵則必榮失寵則必無罪是事君者之寶而必無後患之術也故知兵者之舉事也滿則慮嗛平則慮險安則慮危曲重其豫猶恐及其𣄸是以百舉而不陷也孔子曰巧而好度必節勇而好同必勝知而好謙必賢此之謂也愚者反是處重擅權則好專事而妬賢能抑有功而擠有罪志驕盈而輕舊怨以吝嗇而不行施道乎上為重招權於下以妨害人雖欲無危得乎哉是以位尊則必危任重則必廢擅寵則必辱可立而待也可炊而傹也是行也則墮之者眾而持之者寡矣天下之行術以事君則必通以為仁則必聖立隆而勿貳也然後恭敬以先之忠信以統之慎謹以行之端愨以守之頓窮則從之疾力以申重之君雖不知無怨疾之心功雖甚大無伐德之色省求多功愛敬不倦如是則常無不順矣以事君則必通以為仁則必聖夫是之謂天下之行術少事長賤事貴不肖事賢是天下之通義也有人也埶不在人上而羞為人下是姦人之心也志不免乎姦心行不免乎姦道而求有君子聖人之名辟之是猶伏而咶天救經而引其足也說必不行矣俞務而俞遠故君子時詘則詘時伸則伸也
