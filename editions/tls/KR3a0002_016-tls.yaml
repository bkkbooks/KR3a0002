body:
  text: 彊國篇第十六刑范正金錫美工冶巧火齊得剖刑而莫邪已然而不剝脫不砥厲則不可以斷繩剝脫之砥厲之則劙槃盂刎牛馬忽然耳彼國者亦彊國之剖刑已然而不教不誨不調不一則入不可以守出不可以戰教誨之調一之則兵勁城固敵國不敢嬰也彼國者亦有砥厲禮義節奏是也故人之命在天國之命在禮人君者隆禮尊賢而王重法愛民而霸好利多詐而危權謀傾覆幽險而亡威有三有道德之威者有暴察之威者有狂妄之威者此三威者不可不孰察也禮樂則脩分義則明舉錯則時愛利則形如是百姓貴之如帝高之如天親之如父母畏之如神明故賞不用而民勸罰不用而威行夫是之謂道德之威禮樂則不脩分義則不明舉錯則不時愛利則不形然而其禁暴也察其誅不服也審其刑罰重而信其誅殺猛而必黭然而雷擊之如牆厭之如是百姓劫則致畏嬴則敖上執拘則冣得閒則散敵中則奪非劫之以形埶非振之以誅殺則無以有其下夫是之謂暴察之威無愛人之心無利人之事而日為亂人之道百姓讙敖則從而執縛之刑灼之不和人之心如是下比周賁潰以離上矣傾覆滅亡可立而待也夫是之謂狂妄之威此三威者不可不孰察也道德之威成乎安彊暴察之威成乎危弱狂妄之威成乎滅亡也公孫子曰子發將而伐蔡克蔡獲蔡侯歸致命曰蔡侯奉其社稷而歸之楚舍屬二三子而治其地既楚發其賞子發辭曰發誡布令而敵退是主威也徙舉相攻而敵退是將威也合戰用力而敵退是眾威也臣舍不宜以眾威受賞譏之曰子發之致命也恭其辭賞也固夫尚賢使能賞有功罰有罪非獨一人為之也彼先王之道也一人之本也善善惡惡之應也治必由之古今一也古者明王之舉大事立大功也大事已博大功已立則君享其成群臣享其功士大夫益爵官人益秩庶人益祿是以為善者勸為不善者沮上下一心三軍同力是以百事成而功名大也今子發獨不然反先王之道亂楚國之法墮興功之臣恥受賞之屬無僇乎族黨而抑卑乎後世案獨以為私廉豈不過甚矣哉故曰子發之致命也恭其辭賞也固荀卿子說齊相曰處勝人之埶行勝人之道天下莫忿湯武是也處勝人之埶不以行勝人之道厚於有天下之埶索為匹夫不可得也桀紂是也然則得勝人之埶者其不如勝人之道遠矣夫主相者勝人以埶也是為是非為非能為能不能為不能併己之私欲必以道夫公道通義之可以相兼容者是勝人之道也今相國上則得專主下則得專國相國之於勝人之埶亶有之矣然則胡不敺此勝人之埶赴勝人之道求仁厚明通之君子而託王焉與之參國政正是非如是則國孰敢不為義矣君臣上下貴賤長少至于庶人莫不為義則天下孰不欲合義矣賢士願相國之朝能士願相國之官好利之民莫不願以齊為歸是一天下也相國舍是而不為案直為是世俗之所以為則女主亂之宮詐臣亂之朝貪吏亂之官眾庶百姓皆以貪利爭奪為俗曷若是而可以持國乎今巨楚縣吾前大燕鰌吾後勁魏鉤吾右西壤之不絕若繩楚人則乃有襄賁開陽以臨吾左是一國作謀則三國必起而乘我如是則齊必斷而為四三國若假城然耳必為天下大笑曷若兩者孰足為也夫桀紂聖王之後子孫也有天下者之世也埶籍之所存天下之宗室也土地之大封內千里人之眾數以億萬俄而天下倜然舉去桀紂而犇湯武反然舉疾惡桀紂而貴帝湯武是何也夫桀紂何失而湯武何得也是無他故焉桀紂者善為人之所惡而湯武者善為人之所好也人之所惡者何也曰汙漫爭奪貪利是也人之所好者何也曰禮義辭讓忠信是也今君人者辟稱比方則欲自並乎湯武若其所以統之則無以異於桀紂而求有湯武之功名可乎故凡得勝者必與人也凡得人者必與道也道也者何也曰禮義辭讓忠信是也故自四五萬而往者彊勝非眾之力也隆在信矣自數百里而往者安固非大之力也隆在脩政矣今已有數萬之眾者也陶誕比周以爭與已有數百里之國者也汙漫突盜以爭地然則是棄己之所以安彊而爭己之所以危弱也損己之所以不足以重己之所以有餘若是其悖繆也而求有湯武之功名可乎辟之是猶伏而咶天救經而引其足也說必不行矣俞務而俞遠為人臣者不恤己行之不行苟富利而已矣是渠衝入穴而求利也是仁人之所羞而不為也故人莫貴乎生莫樂乎安所以養生樂安者莫大乎禮義人知貴生樂安而棄禮義辟之是猶欲壽而歾頸也愚莫大焉故君人者愛民而安好士而榮兩者無一焉而亡詩曰价人維藩大師維垣此之謂也力術止義術行曷謂也曰秦之謂也威彊乎湯武禹廣大乎舜然而憂患不可勝校也諰諰然常恐天下之一合而軋己也此所謂力術止也武湯曷謂乎威彊乎湯武也者乃能使說己者使耳今楚父死焉國舉焉負三王之廟而辟於陳蔡之閒視可伺閒案欲剡其脛而以蹈秦之腹然而秦使左案左使右案右是能使讎人役也此所謂威彊乎湯武也曷謂廣大乎舜禹也曰古者百王之一天下臣諸侯也未有過封內千里者也今秦南乃有沙羡與俱是乃江南也北與胡貉為鄰戎西有巴東在楚者乃界於齊在韓者踰常山乃有臨慮在魏者乃據圍津即去大梁百有二十里耳其在趙者剡然有苓而據松柏之塞負西海而固常山是地徧天下也威動海內彊殆中國此所謂廣大乎舜禹也然而憂患不可勝校也諰諰然常恐天下之一合而軋己也然則奈何曰節威反文案用夫端誠信全之君子治天下焉因與之參國政正是非治曲直而聽咸陽順者錯之不順者而後誅之若是則兵不復出於塞外而令行於天下矣若是則雖為之築明堂於塞外而朝諸侯殆可矣假今之世益地不如益信之務也應侯問孫卿子曰入秦何見孫卿子曰其國塞險形埶便山林川谷美天材之利多是形勝也入境觀其風俗其百姓樸其聲樂不流汙其服不挑甚畏有司而順古之民也及都邑官府其百吏肅然莫不恭儉敦敬忠信而不楛古之吏也入其國觀其士大夫出於其門入於公門出於公門歸於其家無有私事也不比周不朋黨倜然莫不明通而公也古之士大夫也觀其朝廷其朝閒聽決百事不留恬然如無治者古之朝也故四世有勝非幸也數也是所見也故曰佚而治約而詳不煩而功治之至也秦類之矣雖然則有其諰矣兼是數具者而盡有之然而縣之以王者之功名則倜倜然其不及遠矣是何也則其殆無儒邪故曰粹而王駮而霸無一焉而亡此亦秦之所短也積微月不勝日時不勝月歲不勝時凡人好敖慢小事大事至然後興之務之如是則常不勝夫敦比於小事者矣是何也則小事之至也數其縣日也博其為積也大大事之至也希其縣日也淺其為積也小故善日者王善時者霸補漏者危大荒者亡故王者敬日霸者敬時僅存之國危而後戚之亡國至亡而後知亡至死而後知死亡國之禍敗不可勝悔也霸者之善箸焉可以時記也王者之功名不可勝數可以日志也財物貨寶以大為重政教功名反是能積微者速成詩曰德輶如毛民鮮克舉之此之謂也凡姦人之所以起者以上之不貴義不敬義也夫義者所以限禁人之為惡與姦者也今上不貴義不敬義如是則下之人百姓皆有棄義之志而有趨姦之心矣此姦人之所以起也且上者下之師也夫下之和上辟之猶響之應聲影之像形也故為人上者不可不順也夫義者內節於人而外節於萬物者也上安於主而下調於民者也內外上下節者義之情也然則凡為天下之要義為本而信次之古者禹湯本義務信而天下治桀紂棄義背信而天下亂故為人上者必將慎禮義務忠信然後可此君人者之大本也堂上不糞則郊草不芸瞻曠白刃扞乎胸則目不見流矢拔戟加乎首則十指不辭斷非不以此為務也疾養緩急之有相先者也
