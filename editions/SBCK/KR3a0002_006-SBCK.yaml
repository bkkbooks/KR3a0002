body:
  text: 登仕郎守大理評事揚倞注富國篇第十萬物同宇而異體形體有異同生宇内無宜而有用於雖理得其道使之不爭然後可以富國也人無常定之宜皆有可用人之理必在為人數也人倫並處同求而異道同欲而異知處羣居也倫類也並道謂或求為善或求為惡此人之性也其在人之法數則以類羣居也同求異生也皆有可也知愚同所可異也知愚分意之謂也可者遂其埶同而知異行私而無禍縱欲而不窮則民心奮而不可説也競也説讀為恱若縱其情性禍患也窮極也奮謂起而争争競而不可恱服也而無分則民心奮起如是則知者未得治也知者未得治則功名未成也由於任智功名之立功名未成則羣衆未縣也然後羣衆懸隔若未有功名則有功名者居上無功名者居下等也羣衆齊羣衆未縣則君臣未立也則未有君既無懸隔位也臣之無君以制臣無上以制下天下害生縱欲害生於各縱其欲也無上下相制則天下之欲惡同物欲多而物寡寡則必爭矣焉死亡貧苦人之大惡存焉是同物謂飲食男女人之大欲存恣其欲則物不能贍故必爭之也賢愚同有此情也無君上之制各故百技所成所以養一人也以養一人是物多而所奉者寡故能治也技工也一人君上也言百工所成之衆物而能不能兼技匠輪輿各安其業則治雜之則亂也雖能者亦不兼其技功使有分也謂梓人不能兼官若䕫典樂稷播種之類也皆使專一於分不二事也謂離居不相待則窮羣而無分則爭謂為物所困也此不相待遺弃也窮而無分亦不可也言不羣則不可羣窮者患也爭者禍也救患除禍則莫若明分使羣矣能羣然後可以富國此巳上皆明有分則強脅弱也知懼愚也民下違上少陵長不以徳為政知分義也徳謂敎化使如是則老弱有失養之憂而壯者有分爭之禍矣憂失養壯者以力老弱不能自存故分爭也相勝故有事業所惡也功利所好也職業無分必使各供其職各從所務若無分則莫不惡勞而好逸事業勞役之事人之所惡職業謂官職及四人之業也也如是則人有樹事之患而有爭功之禍矣已事而爭人之功以此為禍也樹立也若無分則人人患於樹立男女之合夫婦之分人各有偶也合配也分謂㛰姻娉内送逆無禮為㛰壻婦之父問名也内讀曰納納幣也送致女逆親迎也之父為􅊚言㛰姻者明皆以二人之命也聘如是則人有失合之憂而有爭色之禍矣其配偶也失合謂喪故知者為之分也道者又讀為智皆通知如字知者謂知治足國之道國之明富也術節用裕民而善臧其餘餘謂雖有餘不耗損裕謂優饒也善臧其藏之而善節用以禮裕民以政政謂取之有道也以禮謂用不過度以彼裕民故多餘力作故多餘也人得優饒務於裕民則民富民富則田肥以易墾平易易謂耕田肥以易則出實百倍實多也所出榖上以法取焉而下以禮節用之什一也法取謂不妄耗費也以禮節用謂餘若丘山不時焚燒無所臧之言以極也多之夫君子奚患乎無餘憂不足以墨子故知節用裕民則必有仁義聖良之名而且有富厚丘山之積矣皆美名實此無佗故焉生於節用裕民也不知節用裕民則民貧民貧則田瘠以穢耕耨失時也貧則力不足田瘠以穢則出實不半其半不得上雖好取侵奪猶将寡獲也而或以無禮節用之則必有貪利糾譑之名而且有空虚窮乏之實矣罪也譑音矯糾察也譑發人此無佗故焉不知節用裕民也康誥曰􅀪覆乎天若徳裕乃身不廢在王庭此之謂也德是乃所以寛裕􅀪覆如天又順於君孰與不足也汝身言百姓足禮者貴賤有等長幼有差貧富輕重皆有稱者也證反稱尺故天子袾裷衣冕古袾朱衮以朱為質也衣冕猶服冕也朱字裷與衮同畫龍於衣謂之衮諸侯􅀇裷衣冕上謂冕而下如王之服也公也周禮公之服自衮大夫裨冕祭服也天子六服衣禆衣而服冕謂服之諸侯已下亦服焉鷩冕絺冕皆是也大裘為上其餘為裨裨之言卑也以事尊卑士皮弁服升布為之積猶辟也辟蹙其􅆎中故謂之素積也皮弁謂以白鹿皮為冠象上古也素積為裳用十五徳必稱位位必稱禄禄必稱用由士以上則必以禮樂節之衆庻百姓則必以法數制之子君人用刑用德小量地而立國縣内九十三國也謂若王制天子之計利而畜民所出畜萬二千五百家謂若周制計一郷地利度人力而授事受田百􅅿謂若一夫使民必勝事事必出利利足以生民皆使衣食百用出入相揜出財也入入利也揜覆蓋也百用雜用養生送死之類出出使覆蓋不乏絶也出入相揜謂量入為必時臧餘謂之稱數餘則以足用有有稱之術數也時臧之此之謂故自天子通於庻人事無大小多少由是推之故曰朝無幸位民無幸生此之謂也徒無德而禄謂之幸位惰㳺而食謂之幸生上下所為之事皆以稱數推之故無徼幸之也輕田野之税平關市之征幾而不征也平猶除也謂省商賈之數農夫衆也省減也謂使罕興力役無奪農時如是則國富矣夫是之謂以政裕民優饒民此以政也之術人之生不能無羣羣而無分則爭爭則亂亂則窮矣困窮故無分者人之大害也有分者天下之本利也為大本當而人君者所以管分之樞要也樞也樞户故美之者是美天下之本也其有分美謂美安之者是安天下之本也貴之者是貴天下之本也古者先王分割而等異之也以等差異也以分割制之故使或美或惡或厚或薄或佚或樂或劬或勞薄貴賤也在位則佚樂美謂褒寵惡謂刑戮厚劬勞也百姓則非特以為淫泰夸麗之聲將以明仁之文通仁之順也瞻望自為夸大之聲将以明仁人仁謂人也言為此上事不唯使人乃得此順從言不違其志也乃得此文飾言至貴也通仁人故為之雕琢刻鏤黼黻文章謂之鏤白與黒謂之黼黒與青謂玉謂之雕亦謂之琢木謂之刻金文赤與白謂之章之黻青與赤謂之使足以辨貴賤而已不求其觀望也古亂反不求使人觀為之鍾鼓管磬琴瑟竽笙使足以辨吉凶合歡定和而已不求其餘度而作鄭衛者也和謂和氣餘謂過為之宫室臺榭使足以避燥溼養德辨輕重而已不求其外上之德德謂君峻宇雕牆之類也輕重尊卑也外謂詩曰雕琢其章金玉其相亹亹我王綱紀四方此之謂也篇相質也亹亹詩大雅棫樸之力為善所以綱紀四方也與詩義小異也勸勉之貎言雕琢為文章又以金玉為質勉若夫重色而衣之重味而食之重財物而制之合天下而君之直用及重多也非特以為淫泰也固以為王天下治萬變材萬物裁同材與養萬民兼制天下者為莫若仁人之善也夫故其知慮足以治之其仁厚足以安之其德音足以化之得之則治失之則亂百姓誠賴其知也故相率而為之勞苦以務佚之以養其知也為智知讀誠美其厚也故為之出死斷亡以覆救之以養其厚也出身致死㫁猶判厚恩厚也出死謂蓋蔽也㫁丁亂反也言判其死亡也覆誠美其德也故為之雕琢刻鏤黼黻文章以藩飾之以養其德也德有衞文飾也者宜備藩故仁人在上百姓貴之如帝也天帝親之如父母為之出死斷亡而愉者歡愉無它故焉其所是焉誠美其所得焉誠大其所利焉誠多所得者多故親愛之也是謂可其意也言百姓詩曰我任我輦我車我牛我行既集蓋云歸哉此之謂也上也鄭云集猶成也蓋猶皆也轉餫之役有負任詩小雅黍苗之篇引此以明百姓不憚勤勞以奉事既成召伯則皆告之云可歸哉者有輓輦者有将車者有牽徬牛者故曰君子以德小人以力百姓以力事上也君子以德撫下故力者德之役也為力使役德所百姓之力待之而後功上所使然後有功百姓雖有力待君也百姓之羣待之而後和百姓之財待之而後聚百姓之埶待之而後安百姓之壽待之而後長然後無爭奪相殺也皆明待君上之德化父子不得不親兄弟不得不順男女不得不歡少者以長老者以養故曰天地生之聖人成之此之謂也引以明之也古者有此語今之世而不然厚刀布之斂以奪之財重田野之税以奪之食苛􅀜市之征以難其事征出入賣買皆有税也使貨苛暴也征亦税也苛闗市之故曰難其事財不得通流不然而已矣此而已不唯如有掎挈伺詐權謀傾覆以相顛倒以靡敝之摭其事挈舉有讀為又掎也敝敗也或曰靡讀為麋麋散也敝盡也其過伺候其罪詐偽其辭顛倒反覆也靡盡百姓曉然皆知其汙漫暴亂而將大危亡也穢行也汙漫皆半反漫莫是以臣或弑其君下或殺其上粥其城倍其節而不死其事者無它故焉人主自取之也此皆由上無恩德故下亦傾覆也粥其城謂以城降人以為已利節忠節詩曰無言不讎無德不報此之謂也抑之篇詩大雅兼足天下之道在明分掩地表􅅿田使土相掩地謂耕經界使有畔也掩表明也謂明其刺􅋄殖榖古草字刺絶也􅋄多糞肥田是農夫衆庶之事也守時力民力民使之疾力守時敬授人時進事長功長其功利進其事業和齊百姓使人不偷是將率之事也也若今宰守将率猶主領高者不旱下者不水寒暑和節而五榖以時孰是天下之事也事非由人力也是天下豐穰之若夫兼而覆之兼而愛之兼而制之嵗雖凶敗水旱使百姓無凍餒之患則是聖君賢相之事也墨子之言昭昭然為天下憂不足夫不足非天下之公患也之患也非公共特墨子之私憂過計也今是土之生五榖也人善治之則􅅿數盆一嵗而再獲之實二鬴墨子曰子墨子弟子仕蓋當時以盆為量考工記曰盆待汝以千盆授我五百盆故去之獲讀為穫於衞而反子曰何故反曰與我言而不當曰然後􅀲桃棗李一夲數以盆鼓獻米者操量鼓數以盆鼓謂一本一株也鼓量也禮記曰謂除五榖之外更有此果實數度以盆量之也言然後者然後葷菜百䟽以澤量澤也猶俗量牛馬然後義與上同葷辛菜也䟽與􅂼同以澤量言滿然後六畜禽獸一而剸車一獸滿一車剸與專同言黿鼉魚鼈鰌鱣以時别一而成羣夭其生使得成遂也一而成羣言每别謂生育與母分别也以時别謂不得成羣一類皆然後飛鳥鳬鴈若煙海覆海皆言多遠望如煙之然後昆蟲萬物生其閒物之外其閒又有昆蟲萬物昆蟲蚳䗘蜩范之屬也除天出得隂而藏之蟲也鄭云昆明也得陽而可以相食養者不可勝數也夫天地之生萬物也固有餘足以食人矣麻葛繭絲鳥獸之羽毛齒革也固有餘足以衣人矣聲衣去夫有餘不足非天下之公患也特墨子之私憂過計也天下之公患亂傷之也胡不甞試相與求亂之者誰也我以墨子之非樂也則使天下亂墨子之節用也則使天下貧非将墮之也説不免焉論説不免如此非将墮毁墨子墨子大有天下小有一國子天侯諸将蹙然衣麤食惡憂戚而非樂言樂墨子人情憂戚故曰憂戚而非樂也無益於人故作非樂篇無樂則若是則瘠瘠則不足欲不足欲則賞不行奉養既薄則瘠奉養薄也也夫賞以富厚故人勸勉有功勞者而與之麤衣惡食不能足其欲欲既不足則賞何能行乎言皆由不顧賞其道也大觳郭云觳無潤也義與瘠同觳苦角反是賞道廢也莊子説墨子曰其生也勤其死也薄墨子大有天下小有一國將少人徒省官職景反省所上功勞苦與百姓均事業齊功勞食饔飡而治也謂君臣並耕而若是則不威不威則賞罰不行若君臣齊等則威不立矣上下懸隔故得以法臨馭賞不行則賢者不可得而進也罰不行則不肖者不可得而退也賢而退不肖賞罰所以進賢者不可得而進不肖不可得而退則能不能不可得而官也於列位不可置置也而廢若是則萬物失冝事變失應上失天時下失地利中失人和貫故有斯敝也賞罰不行賢愚一天下敖然若燒若焦萬物寡少如被焚燒然敖讀為熬若燒若焦言墨子雖為之衣褐帶索嚽菽飲水惡能足之乎與嚽音烏啜同惡既以伐其本竭其原而焦天下矣故先王聖人為之不然知夫為人主上者不美不飾之不足以一民也不富不厚之不足以管下也包也管猶不威不強之不足以禁暴勝悍也故必將撞大鐘擊鳴鼓吹竽笙彈琴瑟以塞其耳必将錭琢刻鏤黼黻文章以塞其目雕同錭與必將芻豢稻梁五味芬芳以塞其口充也塞猶然後衆人徒備官職漸慶賞進漸嚴刑罰以戒其心使天下生民之屬皆知己之所願欲之舉在于是也故其賞行願欲皆在是于也説苑亦作是于也舉皆也于是猶言是于言生民所皆知己之所畏恐之舉在于是也故其罰威可畏其罰賞行罰威則賢者可得而進也不肖者可得而退也能不能可得而官也若是則萬物得其宜事變得其應上得天時下得地利中得人和財貨渾渾如泉源源言不絶也渾户渾渾水流貌如泉反本汸汸如河海水多貌也汸讀為滂暴暴如丘山卒起暴暴高大如丘山也之貌言物多委積不時焚燒無所臧之夫天下何患乎不足也故儒術誠行則天下大而富使而功上之使也可使則有功也大讀為泰優泰也使謂為撞鐘擊鼓而和詩曰鐘鼓喤喤管磬瑲瑲降福穰穰降福􅂤􅂤威儀反反既醉既飽福禄來反此之謂也穰衆也􅂤􅂤大也鄭云反反順習之貌反復也詩周頌執競之篇毛云喤喤瑲瑲皆聲和貌穰故墨術誠行則天下尚儉而彌貧非鬭而日爭地利則物出必寡雖尚儉而民彌貧物不能贍雖墨子有非政篇非政即非鬭也既上失天時下失日日爭競也以鬭為非而勞苦頓萃而愈無功愀然憂戚非樂而日不和不能相制雖勞苦頓顇猶將無益説文云頓下首也萃與顇同上下愀然變動貌也也鄭注禮記云詩曰天方薦瘥喪亂􅀪多民一饒反牢反要進事長功功利也益上之輕非譽而恬失民譽而安然忘於失民也恬安也言不顧下之毁事進矣而百姓疾之長進事雖姓怨而百是又不可偷偏者也為此勞民之事也言亦不可苟且偏徒壊墮落必反無功墮落必反無成功也雖苟求功利旋即毁壊故垂事養譽不可以遂功而忘民亦不可皆姦道也用以故古之人為之不然使民夏不宛暍暍傷暑也或曰宛當為奥篆文宛字與奥字略相似使民謂役使民也宛讀爲藴暑氣也詩曰藴隆蟲蟲六反熱也遂誤耳奥於冬不凍寒急不傷力緩不後時不使有所傷害皆謂量民之力事成功立上下俱富而百姓皆愛其上人歸之如流水親之歡如父母為之出死㫁亡而愉者無它故焉忠信調和均辨之至也明察也均平均辨故君國長民者欲趨時遂功則和調累解速乎急疾忠信均辨説乎賞慶矣必先脩正其在我者然後徐責其在人者威乎刑罰其義未詳亦恐脱誤自故君國長人已下而使嬰累解釋則民速乎急疾言效上之急不後時也若或曰累解嬰累解釋也言君長人欲趨時遂功者若和調則民畏乎刑罰累音類解佳買反説讀為恱忠信均辨則民悦乎慶賞若先責已而後責人三德者誠乎上則下應之如影嚮解忠信均辨正三德謂調和累嚮讀為響或曰三德即忠信調和均辨也己而後責人也誠乎上謂上誠意行之也雖欲無明達得乎哉書曰乃大明服維民其力懋和而有疾此之謂也則民勉力為和調而疾速以明效書康誥懋勉也言君大明以服下急也上之故不教而誅則刑繁而邪不勝教而不誅則姦民不懲誅而不賞則勤屬之民不勸屬之欲反屬或為厲屬也者謂箸於事業也誅賞而不類則下疑俗儉而百姓不一罪儉當為險險謂徼幸免罪苟且求不類不以其類謂賞不當功罰不當也賞故先王明禮義以壹之致忠信以愛之尚賢使能以次之爵服慶賞以申重之亦申令曰申重也再時其事輕其任以調齊之人趨時不奪時其事謂使量力而使也之也輕其任謂潢然兼覆之養長之如保赤子水大至之貌也潢與滉同潢然若是故姦邪不作盜賊不起而化善者勸勉矣為善者也化善化而是何邪則其道易可行平易其塞固其政令一民心者固其所充塞其防表明防隄白易識標表明故曰上一則下一矣上二則下二矣辟之若􅋄木枝葉必類本此之謂也􅋄古草字辟讀為譬不利而利之不如利而後利之之利也不愛而用之不如愛而後用之之功也利而後利之不如利而不利者之利也愛而後用之不如愛而不用者之功也利而不利也愛而不用也者取天下矣利而後利之愛而後用之者保社稷矣不利而利之不愛而用之者危國家也觀國之治亂臧否至於疆易而端已見矣也見賢遍反易與場同端首其􅃸徼支繚分繚繞言委曲巡警也候斥候徼巡也支繚支其竟關之政盡察察言無不察也竟與境同盡察極是亂國已故用苛察之政也亂國多盜賊姦人入其境其田疇穢都邑露是貪主已財民貧力不足故露也露謂無城郭墻垣主貪觀其朝廷則其貴者不賢觀其官職則其治者不能觀其便嬖則其信者不慤是闇王已臣寵幸者也便嬖左右小慤也主闇故姦人多容也信者不慤所親信者不愿凡主相臣下百吏之俗其於貨財取與計數也須孰盡察風俗俗謂盡察極察也其於計數貨財必待精孰極察然後行取謂賦斂與謂賜與計數計筭也須待也孰精孰也於貪利者也言不簡易急其禮義節奏也芒軔僈楛是辱國已荒言不習孰也軔柔也亦怠惰之義僈與慢禮義節奏謂行禮義之節文芒昧也或讀為國言必見陵辱也同楛不堅固也辱其耕者樂田其戰士安難其百吏好法其朝廷隆禮其卿相調議是治國已逃難也安難不觀其朝廷則其貴者賢觀其官職則其治者能觀其便嬖則其信者慤是明主已凡主相臣下百吏之屬其於貨財取與計數也寛饒􅂤易貨財也不汲汲於其於禮義節奏也陵謹盡察是榮國已於禮義也謹陵侵陵言深敢慢易也嚴也言不賢齊則其親者先貴能齊則其故者先官所謂故舊不遺則民不偷雖舉在至公而必先親故其臣下百吏汙者皆化而脩悍者皆化而愿躁者皆化而慤是明主之功已之人也躁暴急觀國之強弱貧富有徵驗先見也徵驗言其上不隆禮則兵弱上不愛民則兵弱已諾不信則兵弱慶賞不漸則兵弱進漸将率不能則兵弱帥同率與上好攻取功則國貧安業也民不得上好利則國貧重也賦斂士大夫衆則國貧百赤茀所謂三工商衆則國貧者少農桑無制數度量則國貧則物耗費不為限量下貧則上貧下富則上富君孰不足百姓與足故田野縣鄙者財之本也垣窌倉廩者財之末也窌窖也掘地藏榖也榖垣築墻四周以藏榖也廩窌匹教反藏曰倉米藏曰百姓時和事業得叙者貨之源也等賦府庫者貨之流也豐也事業得叙耕稼得時和得天之和氣謂嵗通名别而言之則粟米布帛曰財錢布􅀛貝曰貨也其次序上不奪農時也等賦以差等制賦貨財皆錢榖故明主必謹養其和節其流開其源而時斟酌焉謂賦斂賑䘏豐荒有制也節謂薄斂開謂勸課時斟酌潢然使天下必有餘而上不憂不足如是則上下俱富交無所藏之是知國計之極也上下不相隱交無所藏言故禹十年水湯七年旱而天下無菜色者十年之後年榖復孰而陳積有餘之色也無食菜是無它故焉知本末源流之謂也故田野荒而倉廩實百姓虚而府庫滿夫是之謂國蹷倒也蹷傾伐其本竭其源而并之其末然而主相不知惡也則其傾覆滅亡則可立而待也以國持之而不足以容其身夫是之謂至貪是愚王之極也而無所容其身者貪也以一國扶持之至堅固也将以求富而喪其國将以求利而危其身古有萬國今有十數焉是無它故焉其所以夫之一也失之矣皆以貪君人者亦可以覺矣覺悟也以此自百里之國足以獨立矣亡有道則雖小足以獨立此言無道則雖大必至滅凡攻人者非以為名則案以為利也不然則忿之也之利不然則以忿怒不出此三事也為干偽反凡攻伐者不求討亂征暴之名則求貨財土地仁人之用國将脩志意正身行下孟反用為也行伉隆髙高遠大之事伉舉也舉崇致忠信期文理理謂其有條貫期當為綦極文也布衣紃屨之士誠是則雖在窮閻漏屋而王公不能與之争名繩之屨也或讀為穿王紃絛也謂編麻為之麤言名過王公也公不能與之争名以國載之則天下莫之能隱匿也下莫能隱匿言其國聲光大也載猶任也以國委任賢士則天若是則為名者不攻也惡名故不攻伐有道祗成将辟田野實倉廩便備用上下一心三軍同力與之遠舉極戰則不可彼暴國欲與我如此則不可也違舉縣軍於遠也極戰苦戰也境内之聚也保固視可視其可進謂觀釁而動也其境内屯聚則保其險固午其軍取其将若撥䵄事之籩其實䵄蕡鄭云䵄熬麥今午讀曰迕遇也周禮籩人職云朝也至脆弱故以喻之若撥䵄如以手撥䵄也音豐同河間已北煑種麥賣之名曰䵄據鄭之説䵄麥之牙糱彼得之不足以藥傷補敗不足以藥其所傷補其藥猶醫也彼縱有所得不如所亡也所敗言所獲彼愛其爪牙畏其仇敵若是則為利者不攻也為仇敵為于偽反愛已之爪牙畏與我将脩小大強弱之義以持慎之之義守持此道以順大國也慎讀曰順脩小事大弱事強禮節将甚文珪璧将甚碩貨賂將甚厚敬事文謂聘好之物碩大也之威儀也珪璧所用所以説之者必将雅文辨慧之君子也文雅禮讓之士説音税所使行人往説之者則用彼苟有人意焉夫誰能忿之若是則忿之者不攻也為名者否為利者否為忿者否為于偽反否不攻也則國安于盤石壽於旗翼箕箕翼二十八宿名言壽盤石盤薄大石也旗讀為亦其類也或曰禮記百年曰期頥鄭云期要也頥養也比於星也莊子曰傅説得之乘東維騎箕尾而比於列宿人皆亂我獨治人皆危我獨安人皆失喪之我按起而制之然後也或曰按故仁人之用國非特將持其有而已也又將兼人所有而已不唯持其詩曰淑人君子其儀不忒其儀不忒正是四國此之謂也鳩之篇曹風尸持國之難易易之法也論守國難事強暴之國難使強暴之國事我易事之以貨寶則貨寶單而交不結約信盟誓則約定而畔無日已約日文子作約定而反無日也定隨即畔之無日言不過一割國之錙銖以賂之則割定而欲無猒以地賂強國割地必不多與故十黍之重爲銖八兩爲錙此謂傳作割國之疆垂以賂之也以錙銖言之猒一占反韓詩外事之彌煩其侵人愈甚必至於資單國舉然後已盡舉其國與人單盡也國舉謂也雖左堯而右舜未有能以此道得免焉者也辟之是猶使處女嬰寳珠佩寳玉繫嬰玉中可寳者也於頸也寳謂珠負戴黃金而遇中山之盜也雖為之逄䝉視詘要橈膕君盧屋妾由将不足以免之橈曲也膕曲脚中古獲反盧當為廬由逄䝉古之善射者詘與屈同要讀為􅆎既微視又屈􅆎橈膕言俯伏畏懼之甚也君廬屋妾謂與猶同言處女如善射者之視物謂微眇不敢正視也之辭也雖畏懼卑辭如此猶不免劫奪之也處女自稱是君廬屋之妾猶言箕箒妾卑下故非有一人之道也同力以拒大國也謂不能齊一其人直将巧繁拜請而畏事之請以畏事之也巧為繁多拜則不足以爲持國安身故明君不道也以為持國安身之術故明君恥辱如此雖得免禍亦不足也不言必将脩禮以齊朝正法以齊官平政以齊民然後節奏齊於朝節文也謂上下皆齊整也節奏禮之也有禮百事齊於官有法度百事皆衆庶齊於下政上民齊一平均故如是則近者競親遠方致願願來附也致極也極上下一心三軍同力名聲足以暴炙之聲名炙炎赫也如日暴火威強足以捶笞之拱揖指麾而強暴之國莫不趨使譬之是猶烏獲與焦僥搏也僥短人長三尺者搏鬭也烏獲秦之力人舉千鈞者焦故曰事強暴之國難使強暴之國事我易此之謂也荀子卷第六
