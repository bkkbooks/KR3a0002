body:
  text: 登仕郎守大理評事楊倞注勸學篇第一君子曰學不可以巳青取之於藍而青於藍冰水爲之而寒於水過其本性也以喻學則才木直中繩輮以爲輪其曲中規雖有槁暴不復挺者輮使之然也晏子春秋作不復羸矣輮屈槁枯暴乾挺直也故木受繩則直金就礪則利君子博學而日參省乎已則知明而行無過矣省吾身行下孟反參三也曽子曰日三故不登髙山不知天之髙也不臨深谿不知地之厚也不聞先王之遺言不知學問之大也有益大謂人於干越夷貉之子生而同聲長而異俗教使之然也越髙誘曰吳邑也貉東北夷同聲謂啼聲同貉莫干越猶言吳越吕氏春秋荆有次非得寳劒於干反革詩曰嗟爾君子無􅁪安息靖共爾位好是正直神之聽之介爾景福謀介助景大也無􅁪詩小雅小明之篇靖之道則神聽而助之福引此詩以喻勤學也安息戒之不使懷安也言能謀恭其位好正直神莫大於化道福莫長於無禍神莫大焉脩身則爲學則自化道故福莫長焉自無禍故吾甞終日而思矣不如須􅁷之所學也吾甞跂而望矣不如登髙之博見也足也跂舉登髙而招臂非加長也而見者逺順風而呼聲非加疾也而聞者彰假輿馬者非利足也而致千里假舟楫者非能水也而絶江河絶過能善君子生非異也善假於物也生非異言與衆人同也皆以喻脩身在假於學南方有鳥焉名曰蒙鳩以羽爲巢而編之以髪繫之葦苕風至苕折􅆑破子死巢非不完也所繫者然也鳥之巢至精密多繫於葦竹之上蒙鳩焦鷯也苕葦之秀也今巧婦曰一名蒙鳩亦以其愚也言人不知學問其所置身亦猶繫葦之是也蒙當爲蔑方言云鷦鷯自關而西謂之桑飛或謂之蔑雀或謂完堅矣大風至則苕折卵破者何也所託者然也危也說苑客謂孟甞君曰鷦鷯巢於葦苕箸之以髪可西方有木焉名曰射干莖長四寸生於髙山之上而臨百仞之淵木莖非能長也所立者然也執竿又引阮公詩云射干臨層城是生於髙處也據本草在本草藥名有射干一名烏扇陶􅀪景云花白莖長如射人之寸即是草云木誤也蓋生南陽亦生西方也射音夜草部中又生南陽川谷此云西方有木未詳或曰長四蓬生麻中不扶而直蘭槐之根是爲芷其漸之滫君子不近庶人不服其質非不美也所漸者然也離騷所謂蘭茝也蓋苗名蘭茝根名芷也蘭槐當是蘭茝别蘭槐香草其根是爲芷也本草白芷一名白茝陶􅀪景云即雖香草浸漬於溺中則可惡也漸子廉反滫思酒反名故云蘭槐之根是爲芷也漸漬也染也滫溺也言故君子居必擇鄉遊必就士所以防邪僻而近中正也物􅀋之起必有所始榮辱之來必象其德肉腐出蟲魚枯生蠧怠慢忘身禍災乃作強自取柱柔自取束則見束而約急皆其自取也凡物強則以爲柱而任勞柔邪穢在身怨之所􅌟亦所自取搆結也言施薪若一火就燥也火就燥而焚之矣布薪於地均若一平地若一水就溼也草木疇生禽獸羣焉物各從其類也同類也疇與儔是故質的張而弓矢至焉林木茂而斧斤至焉射侯的正鵠也所謂召禍也質樹成䕃而衆鳥息焉䤈酸而蜹聚焉慕之者衆喻有德則故言有召禍也行有招辱也君子慎其所立乎所立所立即謂學也禍福如此不可不慎積土成山風雨興焉積水成淵蛟龍生焉積善成德而神明自得聖心備焉自通於神明神明自得謂故不積蹞步無以至千里蹞與跬同半步曰蹞不積小流無以成江海騏驥一躍不能十步駑馬十駕云駑馬十駕則亦及之此亦當同疑脫一句言駑馬十度引車則亦及騏驥之一躍據下功在不舍鍥而舍之朽木不折鍥而不舍金石可鏤功在言立秋傳曰陽虎借邑人之車鍥其軸於不舍舍與捨同鍥刻也苦結反春虻螾無爪牙之利筋骨之強上食埃土下飲黄泉用心一也蚓同螾與蟹六跪而二螯非蛇蟺之穴無可􅀉託者用心躁也如鉞者許叔重說文云蟹六足二􅚺也跪足也韓子以刖足爲刖跪螯蟹首上是故無㝠㝠之志者無昭昭之明無惽惽之事者無赫赫之功黙精誠之謂也㝠㝠惽惽皆專行衢道者不至事兩君者不容也或曰衢道兩道也不至不能有所至下爾雅云四逹謂之衢孫炎云衢交道四出猶以兩爲衢古之遺言歟篇有楊朱哭衢塗今秦俗目不能兩視而明耳不能兩聽而聦螣蛇無足而飛云龍類能興雲霧而爾雅云螣螣蛇郭璞中也遊其梧䑕五技而窮又誤爲梧耳技才能也言技能雖多梧䑕當爲鼫䑕蓋本誤爲鼯字傳寫能窮木能游不能度谷能穴不能掩身能走不能先人而不能如螣蛇專一故窮五技謂能飛不能上屋能縁不詩曰尸鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮故君子結於一也風尸詩曹平均如一善人君子其執義亦當如尸鳩之一執義一則用心堅固故鳩之篇毛云尸鳩鴶鞠也尸鳩之養七子且從上而下暮從下而上結也曰心如昔者瓠巴鼓瑟而流魚出聽鼓瑟者不知瓠巴古之善子云瓠巴鼓琴鳥舞魚躍何代人流魚中流之魚也列伯牙鼓琴六馬仰秣古之伯牙六馬白虎通曰天子之馬六者示有事於天地四方也張衡西京賦善鼔琴者亦不知何代人六馬天子路車之馬也漢書曰乾六車坤齊騰驤而沛艾仰秣仰首而秣聽其聲也曰天子御雕軫六駿駁又曰六􅀇虬之奕奕故聲無小而不聞行無隱而不形形可見形謂有玉在山而草木潤淵生珠而崖不枯爲善不積邪安有不聞者乎枯燥崖岸學惡乎始惡乎終問也假設曰其數則始乎誦經終乎讀禮禮謂典禮之屬也數術也經謂詩書其義則始乎爲士終乎爲聖人在乎脩身也義謂學之意言真積力乆則入力乆則能入於學也真誠也力力行也誠積學至乎没而後止也不可生則惰怠故學數有終若其義則不可須􅁷舍也爲之人也舍之禽獸也故書者政事之紀也所書說六經之意以紀政事此詩者中聲之所止也音至乎中而止不使詩謂樂章所以節聲降五降之後不容彈矣流淫也春秋傳曰中聲以禮者法之大分羣類之綱紀也觸類而長者猶律條之比附方言云齊謂法爲類也禮所以爲典法之大分統類之綱紀類謂禮法所無故學至乎禮而止矣夫是之謂道德之極禮之敬文也車服等級之文也禮有周旋揖讓之敬樂之中和也得中和恱也中和謂使人詩書之博也獸草木及政事也博謂廣記土風鳥春秋之微也勸微而顯志微謂襃貶沮類也而晦之在天地之閒者畢矣君子之學也入乎耳箸乎心布乎四體形乎動靜布乎四體謂有威儀潤身也形乎動靜謂知所措履也所謂古之學者爲巳入乎耳箸乎心謂聞則志而不忘也端而言蝡而動一可以爲法則蝡微動也一皆也或端讀爲喘喘微言也蝡人允反或曰端而言謂端莊而言也喘息微言或蝡蠢微動皆可以爲法則小人之學也入乎耳出乎口人道聽涂說也所謂今之學者爲口耳之閒則四寸曷足以美七尺之軀哉爲財與纔同韓侍郎云則當古之學者爲已今之學者爲人君子之學也以美其身小人之學也以爲禽犢獻之物禽犢饋也故不問而告謂之傲曰讀爲嗷聲曰嗷嗷然也嗷傲喧噪也言與戲傲無異或通與敖問一而告二謂之􅓐讃助之今賛禮謂之賛􅓐即讃字也謂以言強與言多通唱古字口傲􅓐非也君子如響矣應聲如響學莫便乎近其人師也謂賢禮樂法而不說不曲說也有大法而詩書故而不切故曰學詩三百使於四方不能專對也詩書但論先王故事而不委曲切近於人春秋約而不速能使人速曉其意也文義隱約襃貶難明不方其人之習君子之説則尊以徧矣周於世矣而徧周於世事矣六經則當其人習説之時則尊髙然矣不能故曰學莫便乎近其人學之經莫速乎好其人隆禮次之於好近賢人若學之大經無速禮爲次之無其人則隆上不能好其人下不能隆禮安特將學雜識志順詩書而巳爾則末世窮年不免爲陋儒而巳此字禮記三年問作焉戰國䇿謂趙王曰秦安語助猶言抑也或作安或作按荀子多用氏春秋吴起謂商文曰今置質爲臣其主安重釋璽辭官其主安輕與韓爲上交秦禍案移於梁矣秦與􅆝爲上交秦禍案攘於趙矣吕記之書百家之説也言既不能好其人又不能隆禮直學雜説順蓋當時人通以安爲語助或方言耳特猶言直也雜識志謂雜志儒乎言不知通變也時書而已豈免爲陋將原先王本仁義則禮正其經緯蹊徑也在於禮也所成所出皆若挈裘領詘五指而頓之順者不可勝數也與屈同頓挈也順者不可勝數言禮亦爲人之綱領挈舉也詘順矣言禮皆不道禮憲以詩書爲之憲標表也道言説也譬之猶以指測河也以戈春黍也以錐飡壷也不可以得之矣故隆禮雖未明法士也不隆禮雖察辯散儒也以不才木爲散木也散謂不自檢束莊子問楛者勿告也器物堅好者謂之功濫惡者謂之楛國語楛與苦同惡也問楛謂所問非禮義也凡史記曰器不苦窳或曰楛讀爲沽儀禮有沽功鄭云沽麤也曰辨其功苦韋昭曰堅曰功脆曰苦故西京賦曰鬻良雜苦告楛者勿問也說楛者勿聽也有爭氣者勿與辨也故必由其道至然後接之非其道則避之則不接道不至故禮恭而後可與言道之方辭順而後可與言道之理色從而後可與言道之致至而後接之也致極也此謂道故未可與言而言謂之傲亦傲未及而言謂之躁戲傲也論語曰言可與言而不言謂之隱不觀氣色而言謂之瞽故君子不傲不隱不瞽謹慎其身人之顔色瞽者不識詩曰匪交匪舒天子所予此之謂也人交接不敢舒緩故受天子之賜予也詩小雅采菽之篇匪交當爲彼交言彼與百發失一不足謂善射千里蹞步不至不足謂善御全盡未能倫類不通仁義不一不足謂善學貫之觸類而長也一仁義謂造次不離他術不能亂也通倫類謂雖禮法所未該以其等倫比類而通之謂一以學也者固學一之也一出焉一入焉涂巷之人也或否或善其善者少不善者多桀紂盜跖也之傍侵諸侯孔子説之而不入者也盜跖柳下季之弟聚徒九千人於太山全之盡之然後學者也全盡學然後君子知夫不全不粹之不足以爲美也故誦數以貫之之數以貫穿之使習禮樂詩書思索以通之意也思求其爲其人以處之與之處也爲擇賢人除其害者以持養之使目非是無欲見也使耳非是無欲聞也使口非是無欲言也使心非是無欲慮也或曰是謂正道也是猶此也謂學也及至其致好之也目好之五色耳好之五聲口好之五味心利之有天下之有天下之富也或曰學成之後必受榮貴致極也謂不學極恣其性欲不可禁也心利其欲也故能盡是故權利不能傾也羣衆不能移也天下不能蕩也則物不能傾移矣蕩動也覆說爲學生乎由是死乎由是夫是之謂德操是乃德之操行死生必由於學德操然後能定能定然後能應能應物也我能定故能定能應夫是之謂成人乃爲成就之人也内自定而外應物天見其明地見其光君子貴其全也天顯其日月之明地顯其水火金見顯也明謂日月光謂水火金玉貴其德之全也玊之光君子則脩身篇第二見善脩然必有以自存也自整飭使存於身也脩然整飭貌言見善必見不善愀然必以自省也自省其過也愀然憂懼貌善在身介然必以自好也石焉自好自樂其善也介然堅固貌易曰介如不善在身菑然必以自惡也災害在身之貌菑讀爲災災然故非我而當者吾師也是我而當者吾友也謟䛕我者吾賊也故君子隆師而親友以致惡其賊下同致極也好善無猒受諫而能戒雖欲無進得乎哉小人反是致亂而惡人之非己也致不肖而欲人之賢己也心如虎狼行如禽獸而又惡人之賊己也謟䛕者親諫爭者䟽脩正爲笑至忠爲賊雖欲無滅亡得乎哉以爲賊至忠反詩曰潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依此之謂也上鄭云臣不事君亂之階也故甚可哀潝許急反訿音紫詩小雅小旻之篇毛云潝潝然患其上訿訿然不思稱乎扁善之度以治氣養生則後彭祖以脩身自名則配堯禹之度言君子有辨别善之法即謂禮扁讀爲辨韓詩外傳曰君子有辨善號則夀配堯禹不朽矣言禮雖不能治氣養生而長於脩身也言若用禮治氣養生夀則不及於彭祖若以脩身自爲名鏗封於彭城經虞夏至商夀七百歳也自名以此辨之則善可知也彭祖堯臣名宜於時通利以處窮禮信是也禮誠是也孟子曰君子窮則獨善信誠也言所用脩身及時通處窮兼善天下其身達則凡用血氣志意知慮由禮則治通不由禮則勃亂提僈曰好人提提皆舒緩之義也提舒緩也爾雅媞媞安也詩食飲衣服居處動靜由禮則和節不由禮則觸䧟生疾容貌態度進退趨行由禮則雅不由禮則夷固僻違庸衆而野語曰原壤夷倨也論衆衆人野郊野之人夷俟固陋也庸凡庸故人無禮則不生事無禮則不成國家無禮則不寧詩云禮儀卒度笑語卒獲此之謂也卒盡也獲得也詩小雅楚茨之篇以善先人者謂之教以善和人者謂之順胡卧反下同先謂首唱也和以不善先人者謂之謟以不善和人者謂之䛕與俞義同故爲不善和人也謟之言䧟也謂以佞言䧟之䛕是是非非謂之智爲非謂之智也能辨是爲是非非是是非謂之愚爲非則謂之愚以非爲是以是傷良曰讒害良曰賊是謂是非謂非曰直竊貨曰盜匿行曰詐易言曰誕趣舍無定謂之無常之人不􅁪保利弃義謂之至賊安保多聞曰博少聞曰淺多見曰閑能習其閑習也迫遽也事則不少見曰陋難進曰偍同謂弛緩也偍與提媞皆易忘曰漏少而理曰治多而亂曰耗條理謂之治耗虚少謂舉其要而有而易盡曰耗竭也凡物多治氣養心之術心之術不必如彭祖也言以禮脩身是亦治氣飬血氣剛強則柔之以調和智慮漸深則一之以易良裳言智慮深則近險詐故一之以易良也漸進也或曰漸浸也子廉反詩曰漸車帷勇膽猛戾則輔之以道順多不順故以道順輔之也膽有膽氣戾忿惡也此性齊給便利則節之以動止也懼其太陵遽故節之使安徐也爾雅云齊疾也齊給便利皆捷速狹隘褊小則廓之以廣大卑溼重遲貪利則抗之以髙志也方言溼憂也自關而西凡志而不得欲卑謂謙下溼亦謂自卑下如地之下溼然無禮者重遲寛緩也夫過恭則無威儀寛緩常不及機事而不獲髙而有墜行而中止皆謂之溼亦謂之過謙恭而緩也言遲緩之人如有卑溼之疾不能運動也貪利則苟得故皆抗之髙志也或曰卑溼亦爲遲庸衆駑散則刦之以師友馬者也散不拘檢者也刦奪庸衆巳解上駑謂材下如駑去其舊性也去也言以師友怠慢僄弃則炤之以禍災謂自輕僄輕也以禍災謂以禍災照燭之使知懼也炤與照同其身也音匹妙反方言楚謂相輕薄爲僄炤之愚款端愨則合之以禮樂通之以思索文云款意有款誠款也說禮樂此皆言修身之術在攻其所短也所欲也愚款端愨多無潤色故合之以凡治氣養心之術莫徑由禮莫要得師莫神一好也神神徑捷速善不怒惡也明也一好謂好夫是之謂治氣養心之術也志意脩則驕富貴道義重則輕王公内省而外物輕矣傳曰君子役物小人役於物此之謂也言傳曰皆舊所傳聞之言也君子能役物小人爲物所役凡身勞而心安爲之利少而義多爲之事亂君而通不如事窮君而順焉暴亂之君違道而通不如事小國窮君小國廹脅之君也言事大國其道也之君順行故良農不爲水旱不耕良賈不爲折閲不市閱賣之物價也賈音古折損也閲賣也謂損所士君子不爲貧窮怠乎道體恭敬而心忠信術禮義而情愛人也術法横行天下雖困四夷人莫不貴行也困窮也言横行不順理而貴也所至皆勞苦之事則爭先饒樂之事則能讓端慤誠信拘守而詳詳謂審於事也拘守謂守而勿失橫行天下雖困四夷人莫不任體倨固而心執詐術順墨而精雜汙齊宣王時處士慎到也其術本黄老倨傲也固鄙固順墨當爲愼墨愼謂一篇墨翟宋人號墨子墨子箸書三十五篇其術多務儉嗇精歸刑名先申韓其意相似多明不尚賢不使能之道箸書四十非禮義之言也當爲情雜汗謂横行天下雖達四方人莫不賤勞苦之事則偷儒轉脫弱畏事皆嬾惰之義或曰偷謂苟避於事儒亦謂懦㦏也又云解輸儒謂懦之人苟求免於事之義偷當爲輸揚子雲方言云儒輸愚郭璞注謂懦饒樂之事則佞兊而不曲樂之事不曲謂直取之也兊恱也言侫恱於人以求饒辟違而不慤慤誠信辟讀爲僻乖僻違背不能端程役而不録勞役錄檢程功程役而不檢束言不能拘守而詳也束也於功程及勞役之事怠隋橫行天下雖達四方人莫不弃行而供冀非漬淖也恭敬非謂漬於泥淖也人在供恭也冀當爲翼凡行自當冀州曰冀近也恭近謂不敢放誕也泥淖中則兢兢然或曰李廵注爾雅行而俯頃非擊戾也者也擊戾猶言了戾也擊戾謂頃曲戾不能仰偶視而先俯非恐懼也視也偶視對然夫士欲獨脩其身不以得罪於此俗之人也夫驥一日而千里駑馬十駕則亦及之矣將以窮無窮逐無極與其折骨絶筋終身不可以相及也將有所止之則千里雖逺亦或遲或速或先或後胡爲乎其不可以相及也不識步道者將以窮無窮逐無極與意亦有所止之與行歩夫堅白同異有厚無厚之察非不察也可爲法也堅白謂離堅白也公孫此言公孫龍惠施之曲說異理不白不知其堅則謂之白石手觸石則知其堅而不知其白則謂堅白論曰堅白石三可乎曰不可二可乎曰可謂目視石但見白馬非馬也同異謂使異者同同者異或曰即莊子所謂大同之堅石是堅白終不可合爲一也司馬彪曰堅白謂堅石非石各有種類所同故謂之小同是大同與小同異也此略舉同異而與小同異此之謂小同異言同在天地之間故謂之大同物舊物緫謂之物莫不皆同是萬物畢同若分而别之則人耳目臯故曰此之謂小同異莊子又曰萬物畢同畢異此之謂大同異言此之謂大同異莊子又曰無厚不可積也其大千里無厚謂厚之口靣體草木枝葉花實無不皆異是物畢異也此具舉同異故曰不可積因於有厚可積故得其大千里千里者舉大之極也極不可爲厚薄也不可積言其委積至多不可復積也凡無厚然而君子不辯止之也不爲止而􅀝魁之行非不難也然而君子不行止之也之竒方言云秦晉之􅀝竒也竒讀爲竒偶偏僻狂怪之行莊子曰南方有􅀝人曰黄繚也閒凡物體全而不具謂之􅀝魁大也􅀝魁皆謂故學曰遲彼止而待我我行而就之言也遲待也直吏反學曰謂爲學者傳此則亦或遲或速或先或後胡爲乎其不可以同至也故蹞歩而不休跛鼈千里累土而不輟丘山崇成厭其源開其瀆江河可竭反瀆水竇也厭塞也音一渉一進一退一左一右六驥不致能致道路也言不齊故不彼人之才性之相縣也豈若跛鼈之與六驥足哉然而跛鼈致之六驥不致是無他故焉或爲之或不爲爾道雖邇不行不至事雖小不爲不成其爲人也多暇日者其出入不逺矣入謂道路所至也多暇日謂怠惰出好法而行士也士事也謂能治其事也好法而能行則謂之士篤志而體君子也大體者也厚其志而知齊明而不竭聖人也偏無頗齊謂無成湯克齊聖廣淵也不竭不窮也書曰人無法則倀倀然履禮記曰倀倀乎其何之倀倀無所適貌言不知所措有法而無志其義則渠渠然通渠渠不寛泰之貌渠讀爲遽古字渠遽但拘守文字而巳志識也不識其義謂依乎法而又深其類然後温温然之貌舉類君子所難故屢言之也深其類謂深知統類温温有潤澤禮者所以正身也師者所以正禮也無禮何以正身無師吾安知禮之爲是也禮然而然則是情安禮也師云而云則是知若師也情安禮知若師則是聖人也性所安不以學情安禮謂若天人無異言師法之效如此也也行不違禮言不違師則與聖故非禮是無法也非師是無師也以師爲師無師謂不不是師法而好自用譬之是猶以盲辨色以聾辨聲也舍亂妄無爲也人孰肯爲此也舍除也除亂妄之故學也者法禮也夫師以身爲正儀而貴自安者也儀如性之所安斯爲效師之禮法以爲正或爲體貴也禮詩云不識不知順帝之則此之謂也天道如文王雖未知已順天之法則也詩大雅皇矣之篇引此以喻師法暗合端愨順弟則可謂善少者矣悌同弟與加好學遜敏焉則有鈞無上可以爲君子者矣好既可以爲君子矣或曰有鈞無上四字􅄛耳學遜敏又有鈞平之心而無上人之意則偷儒憚事無廉恥而嗜乎飲食則可謂惡少者矣事皆謂偷儒憚勞苦之人也懦弱怠惰畏加惕悍而不順險賊而不弟焉侍韓邊易謂放蕩兇悍也郎云惕與蕩同字作心則可謂不詳少者矣雖䧟刑戮可也爲祥詳當老老而壯者歸焉老而尊敬之也老老謂以老爲是天下之父也其父歸之其子焉住矣孟子曰伯夷太公二老者天下之達老不窮窮而通者積焉填委也既然則通者歸亦多矣覆巢毁卵則鳳皇不至竭窮者則寛而容之不迫蹙以苛政謂惠䘏鰥寡窮匱也積不遊義與此同澤涸魚則蛟龍行乎㝠㝠而施乎無報而賢不肖一焉報謂施不務報如此賢不肖同慕而歸之行乎㝠㝠謂行事不務求人之知施乎無人有此三行雖有大過天其不遂乎祐之矣此固不宜有若不幸而有過天亦也大災君子之求利也略其逺害也早其避辱也懼其行道理也勇君子貧窮而志廣富貴而體恭安燕而血氣不惰勞勌而容貌不枯怒不過奪喜不過予三曰予以馭其幸予賜也周禮八柄君子貧窮而志廣隆仁也廣言務於逺大濟物也仁愛之心厚故所思者富貴而體恭殺埶也埶之滅權謹殺所介反威故形體恭安燕而血氣不惰柬理也言柬擇其柬與簡同故雖安燕而不至怠惰事理所宜而不務驕逸勞勌而容貌不枯好交也物志意常泰也以和好交接於怒不過奪喜不過予是法勝私也賞罰得中也以公滅私故書曰無有作好遵王之道無有作惡遵王之路此言君子之能以公義勝私欲也之辭也書洪範荀子卷第一
