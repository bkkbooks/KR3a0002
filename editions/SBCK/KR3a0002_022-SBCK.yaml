front:
  text: 重刋宋台州夲荀子跋今世中土􅀁􅀓荀子宋夲有二一為北宋吕夏卿熈甯夲一為南宋錢佃江西漕司夲而唐與政􅀁刋于台州當時為一重公案者顧無􅀓焉嘉􅂟间盧􅈽􅀴學士據朱文㳺􅀁蔵影鈔吕夏卿夲合元明夲校刋行世王懐祖顧澗薲皆有異議然吕錢兩夲至今無重刋者余􅀄来日夲時􅀙書肆購淂此書􅀟鈎夲數卷訪之廼知為狩石望之舊蔵台州夲此其􅀁擬重刋未成者厥􅓸􅀙島田篁村見影摹全部因告知星使黎公求淂之以付梓人一仍其舊踰年乃成按此夲後亦有吕夏卿等衘名又别有熈甯元年中書劄子曽公亮等銜名據興政自序忠視熈甯之故則知其略無校改案王伯厚所擧四條惟君子知嚮矣此夲仍作如響不相應因知伯厚􅀁擧者嚮響之異非知如之異此自校刋紀聞者之失夲仍何挍如作若盧􅈽􅀴􅀁勘以此夲照之其遺漏不下數百字又不第顧澗薲􅀁擧君道篇狂生者不胥時而樂之不作落也此間别有朝鮮古刋夲亦略与此夲同余又合元纂啚夲明丗徳堂夲及王懷祖劉端臨郝蘭皋諸先生之說更􅂙以日夲物茂卿子四卷有讀荀冡田虎斷四卷有荀子久保愛注二十卷有荀子増豬飼彦博遺一卷有荀子􅀘􅀁訂别爲札記以未見吕錢兩原夲􅀅以有待故未附刋焉光緒甲申三月宜都楊守敬􅀝装書經籍訪古志荀子二十卷求古樓藏宋槧大字本
  hash: sha256:7f1dc54bad367fce045667422c32f4701c83a277e58b88d77ab671e46d9b17fd
