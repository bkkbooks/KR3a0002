body:
  text: 登仕郎守大理評事􅀭倞注解蔽篇第二十一一隅如有物壅蔽之者蔽者言不能通明滯於凡人之患蔽於一曲而闇於大理曲説是時各一曲一端之作此篇以解之蔽於異端曲説故治則復經兩疑則惑矣用禮義言治世道而疑蔽者爲是一本作兩則疑惑矣則自復經常之正道兩疑謂不知一於正天下無二道聖人無兩心今諸侯異政百家異説則必惑是惑非惑治惑亂亂國之君亂家之人此其誠心莫不求正而以自爲也妬繆於道而人誘其所迨也亂君亂人本亦求理以迨近也近謂所好也言若好儉則墨氏誘之好辯則惠氏誘之也其嫉妬迷繆於道故人因其所好而誘之謂私其所積唯恐聞其惡也習積􅀝其所私以觀異術唯恐聞其美也傍觀也言妬於異術也􅀝任也或曰偏􅀝也猶是以與治雖走而是已不輟也其所習妬繆於道雖與治走並馳治謂正道也旣私輟雖或作離並馳而自是不豈不蔽於一曲而失正求也哉心不使焉則白黒在前而目不見雷鼔在側而耳不聞況於使者乎者使役也以論不雷鼔大鼓聲如雷役心於異術豈復更聞正求哉役心於正道則自無聞見矣況乎德道之人德也有賢亂國之君非之上亂家之人非之下豈不哀哉故可哀也上下共非故爲蔽之端也數爲蔽欲爲蔽惡爲蔽始爲蔽終爲蔽逺爲蔽近爲蔽博爲蔽淺爲蔽古爲蔽今爲蔽一隅故皆爲蔽也此其所知所好滯於凡萬物異則莫不相爲蔽此心術之公患也異則相爲蔽公共也所好昔人君之蔽者夏桀殷紂是也桀蔽於末喜斯觀而不知關龍逄以惑其心而亂其行爲斟斟觀夏同姓國蓋其君當時爲桀末喜桀妃斯觀未聞韓侍郎云斯或當以末喜女焉賈侍中云有施喜姓國也佞臣也國語史蘇曰昔夏桀伐有施有施人紂蔽於妲己飛廉而不知微子啓以惑其心而亂其行子紂之庶兄微國子爵啓其名也國語曰殷紂伐有蘇有妲己紂妃飛廉紂之佞臣惡來之父善走者秦之祖也微中云有蘇己姓國也蘇氏以妲己女焉賈侍故羣臣去忠而事私百姓怨非而不用上用也非或爲誹事任也不用不爲賢良退處而隱逃此其所以喪九牧之地而虛宗廟之國也牧虛讀爲墟九牧九州之桀死於亭山本作鬲山案漢書亭山南巢之山或爲鬲傳寫又誤爲亭耳􅈞音潜地理志廬江有􅈞縣當是誤以􅈞紂縣於赤斾記史此云赤斾所傳聞異也武王斬紂頭縣於大白旗身不先知人又莫之諌此蔽塞之禍也成湯鑒於夏桀故主其心而愼治之邪佞所惑也主其心言不爲是以能長用伊尹而身不失道此其所以代夏王而受九有也文王監於殷紂故主其心而慎治之是以能長用呂望而身不失道此其所以代殷王而受九牧也則謂之九有養其民則謂之九九有九牧皆九州也撫有其地牧逺方莫不致其珍故目視備色耳聽備聲口食備味形居備宫名受備號生則天下歌死則四海哭夫是之謂至盛詩曰鳳凰秋秋其翼若干其聲若蕭有鳳有凰樂帝之心此不蔽之福也雌凰秋秋猶蹌蹌蹌逸詩也爾雅鶠鳳其堯能用賢不蔽天下和平故有鳳凰來儀之福也蹌謂舞也干楯也此帝蓋謂堯也堯時鳳凰巢於阿閣言昔人臣之蔽者唐鞅奚齊是也王之臣吕唐鞅宋康子論衡曰宋王問唐鞅曰吾殺戮甚衆而羣臣愈不畏何氏春秋曰宋康王染於唐鞅田不禋奚齊晋獻公驪􅁎之也不若無辨其善一時罪之則羣臣畏矣宋王從之也對曰王罰不善者善者胡爲畏王少欲羣臣之畏唐鞅蔽於欲權而逐載子王者見孟子或曰戴子戴驩也載讀爲戴戴不勝使薛居州傅門者謹爲我司之使者報曰不見輜車見有奉笥而與李史史韓子曰戴驩爲宋太宰夜使人曰吾聞有數夜乘輜車之李史據其時代當是戴驩也蓋為唐鞅所逐奔齊也受笥又戴驩謂齊王曰王大仁於薛公大不忍人奚齊蔽於欲國而罪申生譛獻公殺之春秋穀梁傳曰晉里克弑其申生晋獻公之太子奚齊之兄為驪􅁎所子也不正其殺太子申生而立也君之子奚齊其君之子云者國人不唐鞅戮於宋奚齊戮於晉逐賢相而罪孝兄身爲刑戮然而不知此蔽塞之禍也故以貪鄙背叛爭權而不危辱滅亡者自古及今未甞有之也鮑叔􅇞戚隰朋仁知且不蔽故能持管仲而名利福禄與管仲齊翼也持扶召公吕望仁知且不蔽故能持周公而名利福禄與周公齊傳曰知賢之謂明輔賢之謂能勉之彊之其福必長此之謂也此不蔽之福也言必勉之勉之彊之若山出口丁子有尾之類也蔽於虛辭而不知實理虚辭謂莊子蔽於天而不知人推治亂於天而不知在人也天謂無爲自然之道莊子但故由用謂之道盡利也道無復仁義皆盡於求利也由從也若由於用則天下之由俗謂之道盡嗛矣節限則天下之道盡於快意也嗛口簟反俗當爲欲嗛與慊同快也言若從人所欲不爲由法謂之道盡數矣下之道盡於術數也由法而不由賢則天由埶謂之道盡便矣則盡於逐便無復脩立便便宜也從埶而去智由辭謂之道盡論矣􅀃也論辨由天謂之道盡因矣其自因任治化也然無復此數具者皆道之一隅也夫道者體常而盡變一隅不足以舉之變猶天地常存言道者體常盡之變化也能盡萬物曲知之人觀於道之一隅而未之能識也一隅猶昧況大道乎曲知言不通於大道也故以爲足而飾之其言之成理也謂其持之有故内以自亂外以惑人上以蔽下下以蔽上此蔽塞之禍也孔子仁知且不蔽故學亂術足以爲先王者也多才藝足以亂雜也言其王也及先一家得周道舉而用之不蔽於成積也習也言其所用不滯於衆人舊習故能功業如此一家得謂作春秋也周道舉謂刪詩書定禮樂成積舊故德與周公齊名與三王並此不蔽之福也聖人知心術之患見蔽塞之禍故無欲無惡無始無終無近無逺無博無淺無古無今兼陳萬物而中縣衡焉其中而縣衡揣不滯於一隅但當重也其輕是故衆異不得相蔽以亂其倫也理倫何謂衡曰道禮義道謂故心不可以不知道心不知道則不可道而可非道以道爲可可謂心不知道則不也合意人孰欲得恣而守其所不可以禁其所可合意之事以自禁其合意者人心誰欲得縱恣而肯守其不以其不可道之心取人則必合於不道人而不知合於道人其類各求以其不可道之心與不可道之人論道人亂之本也賢害善必有妬夫何以知以知道問何道也人曰心知道然後可道可道然後能守道以禁非道以其可道之心取人則合於道人而不合於不道之人矣以其可道之心與道人論非道治之要也姦去惡必能懲何患不知患不知道人心苟知道何故治之要在於知道人何以知道問知道之術如何也旣知道人在於知道曰心無邪在心心何以知曰虚壹而靜以知道也能然則可心未甞不臧也然而有所謂虚未甞不苞藏然有所謂虚也臧讀爲藏古字通下同言心心未甞不滿也然而有所謂一謂同時兼知滿當爲兩兩心未甞不動也然而有所謂靜害靜也雖動不使人生而有知知而有志志也者臧也爲志在心然而有所謂虚不以己所臧害所將受謂之虚則遷見善積習也不滯於心生而有知知而有異異也者同時兼知之同時兼知之兩也然而有所謂一不以夫一害此一謂之壹物雖輻湊而至旣不滯於一隅待之也盡可以一心卧則夢偷則自行使之則謀也自卧寢則必夢偷則必放縱役用則必謀慮行放縱也使役也言人心有所思寢故心未甞不動也然而有所謂靜不以夢劇亂知謂之靜胷中以亂其知斯爲靜也此皆明不蔽於一端虚受之義也夢想象也劇囂煩也言處心有常不蔽於想象囂煩而介於未得道而求道者謂之虚壹而靜心不滯於有求道之是虛壹而靜偏見曲説則作之則將須道者之虚則人將事道者之壹則盡盡將思道者靜則察義此也將行也當爲須道者虚則將事道者壹則盡思道者靜則察未詳或恐脱誤耳或曰此皆論虛一而靜之功也作動也須待道則萬事無不行以一心事道則萬物無不盡以飾心思道則其餘字皆衍也作之則行言人心有動作則自行也以虚心須執其本而末隨也萬變無不察此皆言知道察知道行體道者也謂須道者虚則將也體謂不離道也知道察謂思道者靜則察也知道行虚壹而靜謂之大淸明壅蔽者言無有萬物莫形而不見莫見而不論莫論而失位者無不見見則無不能論􅀃論􅀃旣虚壹而靜則通於萬物故有形得其宜則無不坐於室而見四海處於今而論久逺䟽觀萬物而知其情參稽治亂而通其度考度制也䟽通參驗稽經緯天地而材官萬物制割大理而宇宙裏矣任裏當爲理材或爲栽也材謂當其分官謂不失其恢恢廣廣孰知其極睪睪廣廣孰知其德涫涫紛紛孰知其形明參日月大滿八極是之謂大人夫惡有蔽矣哉於神明人莫能測也又此皆明虚一而靜則通沸貌紛紛離亂皃涫音官又音貫安能蔽哉睪讀爲暭皥皥廣大貌涫涫心者形之君也而神明之主也出令而無所受令以使百心出令體所使也體不爲百自禁也自使也自奪也自取也自行也自止也然所以爲形之君也此六者皆由心使也故口可劫而使墨云形可劫而使詘申心不可劫而使易意是之則受非之則辭心不可劫所以尤冝慎擇劫迫也云言也百體可劫塞之患也所好懼蔽故曰心容其擇也無禁必自見其物也雜博禁止則見雜博不精所以貴夫虚壹而靜容受也言心能容受萬物若其選擇無所也其情之至也不貳不貳若雜博則惑也其情之至極在一而詩云采采卷耳不盈頃筐嗟我懷人寘彼周行也頃筐畚屬易盈之器也思君子置於周之列位也詩周南卷耳之篇毛公云采采事采之也卷耳苓耳頃筐易滿也卷耳易得也然而不可以貳周行則不能滿況乎難得之正道而可以他術貳之乎采易得之物實易滿之器以懷人寘周行之心貳之故曰心枝則無知傾則不精貳則疑惑以賛稽之萬物可兼知也以一端而不二之道助考之則可枝旁引如樹枝也賛助也稽考也雜則愈不知也兼知萬物若博身盡其故則美事則身美矣故事也盡不二之類不可兩也故知者擇一而壹焉不可兩故凡事類皆焉故異端不能蔽也知者精於一道而專一農精於田而不可以爲田師賈精於市而不可以爲市師工精於器而不可以爲器師不可爲師長也皆蔽於一技故有人也不能此三技而可使治三官曰精於道也一道精於理萬事故可以精於物者也精於物者以物物能謂農賈之屬也名物其一物若精於道者兼物物名物其一謂能兼治也物者故君子壹於道而以賛稽物以助考物壹於道所兼治也也助考謂壹於道則正以賛稽物則察以正志行察論則萬物官矣謂各當其任無差錯也在心爲志發言爲論官昔者舜之治天下也不以事詔而萬物成能舜已未甞躬親以事告人一於道伹委任衆賢而處一之危其榮滿側養一之微榮矣而未知危謂不自安戒懼之謂也側一謂心一也危之當爲之危業業終使之安也養心之微謂養其未萌不使異端亂之謂偪側亦充滿之義微精妙也處心之危言能戒懼兢兢無形故雖榮而未知言辭之爲治養其未萌也也處心之危有形故其榮滿則可知也養心之微故道經曰人心之危道心之微蓋有道之經也孔安國曰今虞書有此語而云道經此以明舜之治在精一於道不蔽於一隅也危則難安微則難明故誡以精一信執其中引危微之幾惟明君子而後能知之與機同㡬萌兆也故人心譬如槃水正錯而勿動則湛濁在下而淸明在上滓也下同湛讀爲沈泥則足以見鬚眉而察理矣之文理理肌膚微風過之湛濁動乎下淸明亂於上則不可以得大形之正也心亦如是矣故導之以理養之以淸物莫之傾和之氣淸謂沖則足以定是非決嫌疑矣小物引之則其正外易其心内傾則不足以決麤理矣心不一於道爲言此者以喻則惑也異端所蔽故好書者衆矣而倉頡獨傳者壹也道異術不能亂之故獨傳也情箸古者倉頡之有天倉頡黄帝史官言古亦有好書者不如倉頡一於其神農亦然也下守法授親好稼者衆矣而后稷獨傳者壹也好樂者衆矣而夔獨傳者壹也好義者衆矣而舜獨傳者壹也倕作弓浮游作矢而羿精於射云黄帝臣此云浮游未詳或者浮游夷倕舜之共工世本云夷牟作矢宋􅂨注也弓矢舜已前有之此云倕作弓當是改制精巧故亦言作也牟之别名或聲相近而誤耳言倕游雖作弓矢未必能射而羿精之奚仲作車乘杜作乘馬而造父精於御自古及今未甞有兩而能精者也帝時已有車服故謂奚仲夏禹時車正黄同乘馬四馬也四馬駕車處於相土故曰作乗馬以其作乗之軒轅此云奚仲者亦改制耳世本云相土作乗馬杜與土土契孫也吕氏春秋曰乗馬作一駕馬之法故謂之乗杜乗並音剰相曾子曰是其庭可以搏䑕惡能與我歌矣言有人視庭中可是蓋當爲視曽子外物誘之思不精故不能成歌詠也以搏擊䑕則安能與我成歌詠乎言空石之中有人焉其名曰觙山空石之中名之曰觙觙字及事並空石石穴也蓋古有善射之人處深假設喻之耳未詳所出或其爲人也善射以好思静思其射好喜也清妙之耳目之欲接則敗其思蚊䖟之聲聞則挫其精是以闢耳目之欲而逺蚊蝱之聲閑居靜思則通靜思不接外物故能通射之妙挫損也精精誠也闢屏除也言閑居思仁若是可謂微乎則可謂微乎假設問之辭也言靜思仁如空石之人思射孟子惡敗而出妻可謂能自彊矣之之辭孟此已下荅可謂能自彊於脩身也子惡其敗德而出其妻有子惡卧而焠掌可謂能自忍矣未及好也其寢卧而焠其掌若刺股有子蓋有若也焠灼也惡子焠掌可謂能自忍其身則未及善好思者也若思道之至然也未及好也當爲未及好思也誤分在下更作一句耳有用焠掌乎則自無寢焉闢耳目之欲可謂能自彊矣未及思也蚊蝱之聲聞則挫其精可謂危矣未可謂微也矣言能闢耳目之欲則可謂能自危而戒懼未可謂能自彊矣未及思也十字並􅄛耳可謂危精妙之謂也可謂㣲也微者夫微者至人也如舜者惟精惟一至人也何彊何忍何危在作爲苟未臻極雖在空石之中旣造於精妙之域則冥與理㑹不至也猶未故濁明外景淸明内景混跡淸謂虚白景光色也濁謂聖人縱其欲兼其情而制焉者理矣夫何彊何忍何危由於暗與理㑹故也何必如空石之徒乎兼猶盡也聖人雖縱欲盡情而不過制者故仁者之行道也無爲也聖人之行道也無彊也也無彊謂全無違理彊制之萌也無爲謂知違理則不作所謂造形而悟仁者之思也恭聖人之思也樂此治心之道也樂謂性與天道無所不適思慮也恭謂乾乾夕惕也凡觀物有疑中心不定則外物不淸審也淸明吾慮不淸則未可定然否也㝠㝠而行者見寢木以爲伏虎也見植林以爲後人也㝠㝠蔽其明也夜也􅄀􅄀暮醉者越百歩􅇍溝以爲蹞􅇍之澮也曰跬澮小溝也蹞與跬同半􅇍俯而出城門以爲小之閨也酒亂其神也門也閨小厭目而視者視一以爲兩掩耳而聽者聽漠漠而以爲哅哅埶亂其官也也哅哅喧聲也官司主也言厭指按也一渉反漠漠無聲主守哅許用反勢亂耳目之所故從山下望牛者若羊而求羊者不下牽也逺蔽其大也從山下而望木者十仞之木若箸而求箸者不上折也髙蔽其長也守道者亦宜知異術之蔽類此也皆知爲髙逺所蔽故不往求然則水動而景揺人不以定美惡水埶􅀇也或讀爲􅅭􅀇幽深也瞽者仰視而不見星人不以定有無用精惑也明也精目之有人焉以此時定物則世之愚者也彼愚者之定物以疑决疑决必不當夫苟不當安能無過乎慎墨之屬也以疑决疑猶夏首之南有人焉曰㳙蜀梁而不見王逸曰夏首水口也㳙蜀梁未詳何代夏首夏水之首楚詞云過夏首而西浮顧龍門人隱於宕山餌木能致風雨者也人姓㳙名蜀梁列仙傳有㳙子齊其爲人也愚而善畏好有所畏善猶喜也明月而宵行俯見其影以爲伏􅀑也卬視其髮以爲立魅也仰同卬與背而走比至其家者失氣而死豈不哀哉氣謂困甚氣背棄去也失也絶凡人之有􅀑也必以其感忽之閒疑􅀇之時正之深難測也必以此時定其有􅀑也感驚動也感忽猶慌愡也􅀇亦幽此人之所以無有而有無之時也以無爲有也此皆人所疑惑無有謂以有爲無也有無謂也之時而已以正事故傷於溼而擊鼓鼓痺則必有敝鼔喪豚之費矣而未有俞疾之福也反擊鼓烹豚以禱神何益於愈疾乎若以此定事則與已以正事謂人以此定事也痺冷疾也傷於濕則患痺俞讀爲愈俗不殊也故雖不在夏首之南則無以異矣墨慎猶是也之蔽亦凡以知人之性也可以知物之理也之性推以知人物理也之則可知以可以知人之性求可以知物之理而無所疑止之則没世窮年不能徧也盡其年壽疑或爲凝疑止謂有所不爲窮年其所以貫理焉雖億萬已不足以浹萬物之變與愚者若一浹周也貫習也當爲接子叶反或學老身長子而與愚者若一猶不知錯夫是之謂妄人子已長矣猶不知廢捨無益錯置也謂廢捨也身已老矣愚妄之人也之學夫是之謂故學也者固學止之也惡乎止之曰止諸至足曷謂至足曰聖也當有王字誤或曰聖下更道不學異術也聖王之道是爲至足也脱耳言人所學當止於聖人之道及王聖也者盡倫者也王也者盡制者也制法度也倫物理也兩盡者足以爲天下極矣至足也所以爲故學者以聖王爲師案以聖王之制爲法法其法以求其統類類以務象效其人之大綱統類法嚮是而務士也類是而幾君子也者脩飾之名君子有道徳之稱也幾近也類聖人而近之則爲君子士知之聖人也之道者知聖王故有知非以慮是則謂之懼是則謂之能戒懼也自知其非以圖慮於有勇非以持是則謂之賊持制是也勇於爲非以察孰非以分是則謂之簒甚孰之心此簒奪之人也也察甚其非以分爲是多能非以脩蕩是則謂之知爲是則謂之知言智者能變非爲是也脩飾也蕩動也多能知非脩飾蕩動而辨利非以言是則謂之詍之詍詍多言也詩曰無然詍詍辯説利口而飾非以言亂是則謂傳曰天下有二非察是是察非非之以爲非者衆以爲是者而之而察謂合王制與不合王制也察非觀其合王所以非察是是否也制與天下有不以是爲隆正也然而猶有能分是非治曲直者耶正而能分是非治曲直乎言有不以合王制與不合爲隆能也必不若夫非分是非非治曲直非辨治亂非治人道雖能之無益於人不能無損於人案直將治怪説玩竒辭以相撓滑也案彊鉗而利口厚顔而忍詬無正而恣睢妄辨而幾利矝夸也幾近也妄辨幾利謂妄爲辨説所近者惟滑亂也音骨彊彊服人鉗鉗人口也詬詈也恣睢也利不好辭讓不敬禮節而好相推擠此亂世姦人之􅀃也則天下之治􅀃者方多然矣惠之屬慎墨季傳曰析辭而爲察言物而爲辨君子賤之博聞彊志不合王制君子賤之此之謂也亂名改作者也所謂析言破律爲之無益於成也求之無益於得也憂戚之無益於幾也無益復言役心能近道也憂戚亦不則廣焉能棄之矣不以自妨也不少頃干之胷中謂不以無益害有益也廣讀爲曠逺也不以自妨不慕往不閔來無邑憐之心益之事而往從之也不慕往謂不恱慕無來也不慕往古不閔將來言唯義所在無所繫滯也邑憐未詳不閔來謂不憂閔無益之事而來正之也或曰往古昔也來將事更無悒怏吝惜之心此皆明不爲異端所蔽也或曰邑與悒同悒怏也憐讀爲吝惜也言棄無益之當時則動物至而應事起而辨治亂可否昭然明矣周而成泄而敗明君無之有也漏泄爲敗明君以周密爲成以之照臨安用周密也無此事也明君日月宣而成隱而敗闇君無之有也也闇君務在隱蔽而不知昭明之功也以宣露爲成以隱蔽爲敗闇君亦無此事故君人者周則讒言至矣而直言反矣小人邇而君子逺矣詩云墨以爲明狐狸其蒼此言上幽而下險也居然有異若以蔽塞爲明則臣下誑君言逸詩墨謂蔽塞也狐狸其蒼言狐狸之色馬者也幽暗也險傾側也其色蒼然無别猶指鹿爲君人者宣則直言至矣而讒言反矣君子邇而小人逺矣歸而不敢出矣反還也䜛言復讒人相倍反也或曰反倍也言與詩曰明明在下赫赫在上此言上明而下化也明在下故赫赫然著見於天也詩大雅大明之篇言文王之德明荀子卷第十五
