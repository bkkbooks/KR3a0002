front:
  text: 荀子注序昔周公稽古三五之道損益夏殷之典制禮作樂以仁義理天下其德化刑政存乎詩至于幽厲失道始變風變雅作矣平王東遷諸侯分政逮五霸之後則王道不絶如綫故仲尼定禮樂作春秋然後三代遺風㢮而復張而無時無位功烈不得被于天下但門人傳述而巳陵夷至于戰國於是申商苛虐孫吳變詐以族論罪殺人盈城談􅀃者又以愼墨蘇張爲宗則孔氏之道幾乎息矣有志之士所爲痛心疾首也故孟軻闡其前荀卿振其後觀其立言指事根極理要敷陳往昔掎几音挈當世撥亂興理易於反掌眞名世之士王者之師又其書亦所以羽翼六經増光孔氏非徒諸子之言也蓋周公制作之仲尼祖述之荀孟贊成之所以膠固王道至深至備雖春秋之四夷交侵戰國之三綱㢮絕斯道竟不墜矣倞以末宦之暇頗窺篇籍竊感炎黃之風未洽於聖代謂荀孟有功於時政尤所耽慕而孟子有趙氏章句漢代亦甞立博士傳習不絕故今之君子多好其書獨荀子未有注解亦復編簡爛脫傳寫謬誤雖好事者時亦覽之至於文義不通屢掩卷焉夫理曉則愜心文舛則忤意未知者謂異端不覽覽者以脫誤不終所以荀氏之書千載而未光焉輒用申杼鄙思敷尋義理其所徴據則博求諸書伹以古今字殊齊楚言異事資參考不得不廣或取偏傍相近聲􅀋相通或字少増加文重刋削或求之古字或徴之方言加以􅀌陋寡儔愚昧多蔽穿鑿之責於何可逃曽未足粗明先賢之旨適増其蕪穢耳蓋以自備省覽非敢傳之將來以文字煩多故分舊十二卷三十二篇爲二十卷又攺孫卿新書爲荀子其篇第亦頗有移易使以􅀋相從云時歲在戊戌大唐睿聖文武皇帝元和十三年十二月也荀子新目録
