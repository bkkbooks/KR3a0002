body:
  text: 登仕郎守大理評事楊倞注王制篇第九請問為政曰賢能不待次而舉若傅説起於板不以官之次序相也築為罷不能不待頃而廢􅁷也頃須元惡不待敎而誅惡不待教而誅之也不教而殺謂之虐唯元中庸雜民不待政而化化之不待政成之後也中庸民易與為善故教則分未定也則有昭繆也使賢者居上不肖者居下如昭穆之分别然不問其世族繆讀為穆父昭子穆言為政當分未定之時則為之分别也雖王公士大夫之子孫也不能屬於禮義則歸之庶人雖庶人之子孫也積文學正身行能屬於禮義則歸之卿相士大夫繫屬欲反也之故姦言姦説姦事姦能遁逃反側之民職而敎之須而待之本事也須而待之謂須暇之而待其遷善也反側不安之民也職而教之謂使各當敎其勉之以慶賞懲之以刑罰安職則畜不安職則棄四裔之比也畜養也棄謂投五疾上收而養之材而事之之謂若矇瞽脩聲聾聵司火之屬也五疾瘖聾跛躄㫁者侏儒各當其材使官施而衣食之兼覆無遺而與之衣食也官為之施設所職才行反時者死無赦夫是之謂天德王者之政也覆之徳天徳天聽政之大分以善至者待之以禮以不善至者待之以刑兩者分别則賢不肖不雜是非不亂賢不肖不雜則英傑至是非不亂則國家治若是名聲日聞天下願令行禁止則王者之事畢矣皆願矣願謂人人凡聽政也論聽威嚴猛厲而不好假導人寛和假借導引人也厲剛烈也假導謂以則下畏恐而不親周閉而不竭不竭盡也隱閉其情而若是則大事殆乎弛小事殆乎遂也春秋傳曰遂弛廢也遂因循於弛廢小事近於因循言不肯革敝矣繼事也下既隱情不敢論説則大事近和解調通好假導人而無所凝止之定也凝止謂定止其不可也和解調通謂寛和不拒下也凝則姦言並至甞試之説鋒起事試為之也莊子曰嘗試之説謂假借以刃齊起言鋭而難拒也甞試論之鋒起謂如鋒若是則聽大事煩是又傷之也多也傷傷政也聽大謂所聽之事故法而不議則法之所不至者必廢則不周洽故法所不至者必廢也議謂講論也雖有法度而不能講論職而不通則職之所不及者必隊不能通明其類雖舉當其職而必隊隊與墜同則職所不及者故法而議職而通無隱謀無遺善而百事無過非君子莫能故公平者職之衡也中和者聽之繩也重繩所以辨曲直言君聽聽政也衡所以知輕事無過中和謂寛猛得中也子用公平中和之道故能百其有法者以法行無法者以類舉聽之盡也比類類謂偏黨而無經聽之辟也也辟讀曰僻無經謂無常法故有良法而亂者有之矣有君子而亂者自古及今未嘗聞也傳曰治生乎君子亂生乎小人此之謂也其人亡其政息其人存其政舉分均則不偏也分扶問反分均謂貴賤敵埶齊則不壹衆齊則不使則不可相制也此皆名無差等有天有地而上下有差明王始立而處國有制差等也制亦謂夫兩貴之不能相事兩賤之不能相使是天數也數也天之埶位齊而欲惡同物不能澹則必爭不知紀極故物不能足也澹讀為贍既無等級則皆爭則必亂亂則窮矣竭也物窮先王惡其亂也故制禮義以分之使有貧富貴賤之等足以相兼臨者是養天下之夲也而不窮竭使物有餘書曰維齊非齊此之謂也以諭有差等然後可以為治也書吕刑言維齊一者乃在不齊馬駭輿則君子不安輿車中也馬駭於庶人駭政則君子不安位上之政也駭政不安馬駭輿則莫若静之庶人駭政則莫若惠之惠也惠恩選賢良舉篤敬興孝悌收孤寡補貧窮如是則庶人安政矣庶人安政然后君子安位傳曰君者舟也庶人者水也水則載舟水則覆舟此之謂也故君人者欲安則莫若平政愛民矣欲榮則莫若隆禮敬士矣欲立功名則莫若尚賢使能矣是君人者之大節也三節者當則其餘莫不當矣三節者不當則其餘雖曲當猶將無益也當當丁浪反曲當謂委曲皆孔子曰大節是也小節是也上君也大節是也小節非也一出焉一入焉中君也一失也謂一得大節非也小節雖是也吾無觀其餘矣成侯嗣公聚斂計數之君也也史記衞聲公卒成侯嗣公皆衞君公重如耳愛泄姬而恐其皆因其愛重以雍已也乃貴薄疑子成侯立成侯卒子平侯立平侯卒子嗣君立韓子曰衛嗣賂之以金後召關市問其有客過與汝金汝回遣之關市大以敵如耳尊魏妃以耦泄姬曰以是相參也又使過客關市此皆計數之類也恐以嗣公為明察未及取民也取也民謂得民心未及謂其才未及鄭子產取民者也未及為政者也衆人之母能食禮記曰子産猶敎之也之不能管仲為政者也未及脩禮者也教化也言未及故脩禮者王為政者彊取民者安聚斂者亡故王者富民霸者富士伍也士卒僅存之國富大夫亡國富筐篋實府庫筐篋已富府庫已實而百姓貧夫是之謂上溢而下漏空虚可立而待也如器之上溢下漏入不可以守出不可以戰則傾覆滅亡可立而待也故我聚之以亡敵得之以彊聚斂者召寇肥敵亡國危身之道也故明君不蹈也王奪之人霸奪之與彊奪之地國也彊國之術人謂賢人與與地也則奪人奪之人者臣諸侯奪之與者友諸侯奪之地者敵諸侯臣諸侯者王友諸侯者霸敵諸侯者危用彊者非知彊道者用彊力勝人人之城守人之出戰而我以力勝之也則傷人之民必甚矣傷人之民甚則人之民惡我必甚矣人之民惡我甚則日欲與我鬬人之城守人之出戰而我以力勝之則傷吾民必甚矣傷吾民甚則吾民之惡我必甚矣吾民之惡我甚則日不欲為我鬬人之民日欲與我鬭吾民日不欲為我鬭是彊者之所以反弱也地來而民去累多而功少累也累憂雖守者益所以守者損是以大者之所以反削也者所以守者謂所以守地之人也守者謂地也守國以地為本故曰守諸侯莫不懐交接怨而不忘其敵以力勝而不義交接連結也既夲多作壊交接言壊其與已交接之道也故諸侯皆欲相連結怨國而不忘與之為敵伺彊大之間承彊大之敝也知彊大之敝此彊大之殆時也也殆危知彊大者不務彊也不務以力勝也知彊大之術者慮以王命全其力凝其德慮常用王命謂不敢慮計也以用也其計其徳謂不輕舉也擅侵暴也凝定也定力全則諸侯不能弱也德凝則諸侯不能削也天下無王霸主則常勝矣是知彊道者也國常勝主或衍字無王霸之主則彊彼霸者不然辟田野實倉廩便備用傳曰無重器備備用足用也左案謹募選閲材技之士重募也選閲揀擇也材技武藝案發聲謹嚴也募招也謹募猶之材官也過人者猶漢然後漸慶賞以先之勉以慶賞也漸進也言進嚴刑罰以糾之存亡繼絶衞弱禁暴而無兼并之心則諸侯親之矣併下同并讀曰脩友敵之道以敬接諸侯則諸侯説之矣恱下同説讀為所以親之者以不并也并之見則諸侯䟽之矣遍反見賢所以説之者以友敵也臣之見則諸侯離矣故明其不并之行信其友敵之道孟反行下人不疑信謂使天下無王霸主則常勝矣是知霸道者也主常勝也無王者則霸閔王毁於五國十年樂毅以燕史記齊閔王四閔王出奔莒也趙楚魏秦破齊􅁊公劫於魯莊爲魯莊公之臣曹劌所公羊傳柯之盟齊􅁊公也劫無它故焉非其道而慮之以王也以計慮爲王不行其道而亡也所以危彼王者不然仁眇天下義眇天下威眇天下仁感其義畏其威也眇盡也盡天下皆懷其仁眇天下故天下莫不親也義眇天下故天下莫不貴也威眇天下故天下莫敢敵也以不敵之威輔服人之道以服人其道可故不戰而勝不攻而得甲兵不勞而天下服是知王道者也知此三具者欲王而王欲霸而霸欲彊而彊矣王者之人之佐王者飾動以禮義動必以禮義所脩飾及舉聽斷以類善類謂輕重得中也所聽斷之事皆得其明振毫末言細微振舉也見必舉錯應變而不窮夫是之謂有原是王者之人也為政之本原本也知王者之制制度也説王者道不過三代法不貳後王貳後王言以當世之王為法不離貳而遠取之論王道不過夏殷周之事過則久遠難信法不道過三代謂之蕩法貳後王謂之不雅解上並已衣服有制宫室有度人徒有數卒胥徒也人徒謂士喪祭械用皆有等宜級各當其宜也械器也皆有等聲則凡非雅聲者舉廢皆舉色則凡非舊文者舉息繢之事也謂染采畫械用則凡非舊器者舉毁代故事舊謂三夫是之謂復古是王者之制也復古不必遠舉也復三代故事則是王者之論罰也盧困反論謂論説賞無德不貴無能不官無功不賞無罪不罰朝無幸位民無幸生幸也幸僥尚賢使能而等位不遺等位等級之位也不遺言各當其材析愿禁悍而刑罰不過與凶悍者異也悍凶暴也刑析分異也分其愿慤之民使而已不刻深也罰不過言但禁之百姓曉然皆知夫為善於家而取賞於朝也為不善於幽而䝉刑於顯也夫是之謂定論是王者之論也論論不易則定論不易之勸也人知沮王者之等賦政事財萬物所以養萬民也制萬物皆為養人非貪利也財與裁同等賦賦税有等所以為等賦及政事裁田野什一一也什税􅀜市幾而不征不征税也禮記幾作譏幾呵察也但呵察姦人而山林澤梁以時禁發而不税及時則發禮記曰􅆩祭魚然後漁人石絶水爲梁所以取魚也非時則禁然後入山林也入澤梁草木零落相地而衰政輕重政或讀爲征衰初相視也衰差也政爲之反危理道之遠近而致貢若百里賦納緫二百里納銍理條理也貢任土所貢也謂也之類通流財物粟米無有滯留不使有滯積也􅐙遷有無化居使相歸移也四海之内若一家言通啇及轉輸相歸讀爲饋移轉也海之廣若一家也救無不豐足雖四故近者不隱其能遠者不疾其勞疾苦其勞謂奔走來王也不隱其能謂竭其才力也不無幽閒隱僻之國莫不趨使而安樂之隔之國不為王者趨使而幽深也閒隔也言無有深教也安樂政夫是之謂人師是王者之法也為政如此師長也言亦使人法效之者也乃可以長久也師者北海則有走馬吠犬焉然而中國得而畜使之也走馬吠犬今北地之大犬也海謂荒晦絶遠之地不必至海水南海則有羽翮齒革曾青丹干焉然而中國得而財之可繢畫及化黃金者出蜀山越嶲丹于丹砂翮大鳥羽齒象齒革犀兕之革曽青銅之精尚書禹貢雍州球琳琅玕孔云石而似珠者爾雅亦云西北也蓋一名丹干干讀為矸胡旦反或曰丹丹砂也干當為玕方此云南方者蓋南方亦有也方之美者有球琳琅玕焉皆出西東海則有紫紶魚鹽焉然而中國得而衣食之字書亦無紶字當紫紫具也紶未詳蓋亦蚌蛤之屬今案本草謂之石决明陶云俗傳是紫貝定小為蜐郭璞江賦曰石􅎕應節而􅀭葩注云石􅎕􅀛形春則生花古以􅀛具為貨故曰衣食之􅎕居業反異附石生大者如手明耀五色内亦含珠西海則有皮革文旄焉然而中國得而用之織皮孔云貢四獸禹貢梁州貢熊羆尾文旄謂染之為文綵也之皮織皮今之罽也旄旄牛故澤人足乎木山人足乎魚農夫不斵削不陶冶而足械用工賈不耕田而足菽粟故虎豹為猛矣然而君子剥而用之故天之所覆地之所載莫不盡其美致其用來為人用也物皆盡其美而上以飾賢良下以養百姓而安樂之養謂衣食飾謂車服夫是之謂大神物故曰大神也能變通裁制萬詩曰天作髙山大王荒之彼作矣文王康之此之謂也之篇荒大也詩周頌天作則能尊大之彼大王作此都文王又能安之也康安也言天作此高山使興雲雨大王自豳遷焉以類行雜不患於雜也得其統類則以一行萬萬人可治也行於一人則樞要也皆謂得其始則終終則始若環之無端也舍是而天下以衰矣以此道為治終始不窮無休息則始謂類與一也終謂雜與萬也言則亂也衰初危反天下得其次序舍此天地者生之始也禮義者治之始也君子者禮義之始也義本於君子也始猶本也言禮為之貫之積重之致好之者君子之始也禮言之謂學使委積重多也致極也好之言不倦也義以君子為本君子以習學為本貫習也積重故天地生君子君子理天地君子者天地之參也萬物之緫也民之父母也成化育也緫領也參謂與之相參共無君子則天地不理禮義無統上無君師下無父子夫婦是之謂至亂君臣父子兄弟夫婦始則終終則始與天地同理與萬世同久夫是之謂大本上下尊卑人之大本有君子始則終終則始謂一世始言長久也然後可以故喪祭朝聘師旅一也之始為之制喪祭朝此已下明君子禮義不使淫放也下一之義皆同聘之禮所以齊一民各當其道貴賤殺生與奪一也於沮勸使民一君君臣臣父父子子兄兄弟弟一也於恩義使人一農農士士工工商商一也於職業使人一水火有氣而無生草木有生而無知知謂性識生謂滋長禽獸有知而無義人有氣有生有知亦且有義故最為天下貴也亦有無義者也亦且者言其中力不若牛走不若馬而牛馬為用何也曰人能羣彼不能羣也人何以能羣曰分則不能羣也無分則爭爭分何以能行曰以義故義以分則和須也義謂言分義相也裁㫁和則一一則多力多力則彊彊則勝物故宫室可得而居也所以安居物不能害故序四時裁萬物兼利天下無它故焉得之分義也有以治天下也分義故能故人生不能無羣羣而無分則爭爭則亂亂則離離則弱弱則不能勝物故宫室不可得而居也不可少頃舍禮義之謂也能以事親謂之孝能以事兄謂之弟能以事上謂之順能以使下謂之君能以禮義能以皆謂也君者善羣也為羣也善能使人羣道當則萬物皆得其宜六畜皆得其長羣生皆得其命其安命性故養長時則六畜育殺生時則草木殖斬伐殺生政令時則百姓一賢良服聖主之制也謂爲之任使時謂有常服草木榮華滋碩之時則斧斤不入山林不夭其生不絶其長也黿鼉魚鼈鰌鱣孕别之時魯宣公曰魚方別孕韋昭曰自别於別謂生育與母分别也國語里革諫子也雄而懷罔􅅈毒藥不入澤不夭其生不絶其長也雍氏禁澤之沈者也毒藥毒魚之藥周禮春耕夏耘秋收冬藏四者不失時故五榖不絶而百姓有餘食也汙池淵沼川澤謹其時禁處謹嚴也汙渟水之故魚鼈優多而百姓有餘用也外可用􅐙易用謂食足之斬伐養長不失其時故山林不童而百姓有餘材也木曰童山無草聖王之用也用也用財上察於天下錯於地財也錯千故反順天時以養地塞備天地之閒加施萬物之上地萬物皆得其所言聖王之用使天微而明短而長狹而廣者近所及者遠也言用禮義故所守神明博大以至約治化雖神言用禮義本至簡約也明博大原其故曰一與一是為人者謂之聖人也此為人者則謂之聖人也一與一動皆一也是此也以序官官之法也謂王者序宰爵知賔客祭祀饗食犧牲之牢數之屬有庖人獸人皆掌犧牲一曰爵官爵宰膳宰爵主掌也饗食饗宴也周禮膳夫掌犧牲之事者也也言膳宰之官爵司徒知百宗城郭立器之數司徒之職掌建邦土地之圖與其人民之數立器言五方器百宗百族也城郭謂其小大也立器所立之器用也周禮大使作竒伎奇器也械異制皆知其數不司馬知師旅甲兵乘白之數四丘為甸亦謂之乘以其治田則謂之甸出長轂一乘則周禮二千五百人為師五百人為旅四井為邑四邑為丘謂甸徒猶今之白丁也或曰白當為百百人也謂之乘每乘又有甲士三人歩卒七十二人白脩憲命憲脩德教國子中和祗庸孝友之類也法之命所以表示人也謂若以樂審詩商賞字體及聲詩商當為誅者或曰詩謂四方之歌謡商謂商聲哀思之音如寗戚之悲歌之誤故樂論篇曰其在序官也脩憲命審誅賞其徒屬之功過也禁淫聲聲鄭云淫聲鄭衛之音也周禮大司樂禁其淫聲慢以時順脩不謂順之脩之失其時而使夷俗邪音不敢亂雅大師之事也大師樂官之長大讀曰太夷俗謂蠻夷之樂雅正聲也脩隄梁水梁橋也隄所以防通溝澮有澮澮上有道鄭云溝廣深各四尺澮廣二㝷深二仞溝澮皆所以通水周禮十夫之田有溝溝上有畛千夫也行水潦下孟反行廵行也安水臧使漏溢臧才浪反使水歸其壑安謂不以時決塞之不使失時也旱則決之水則塞歲雖凶敗水旱使民有所耘艾司空之事也為刈艾讀相高下視肥墝序五種觀其地所宜而種之墝苦交反高下原隰也五榖􅁰稷豆麻麥省農功勤惰而勸之省觀也觀其謹蓄臧嚴謹以時順脩使農夫樸力而寡能治田之事也禁其佗能也治田田使農夫敦朴於力穡也畯脩火憲林鄭注周禮憲表也主表其刑禁也不使非時焚山澤月令二月無焚山養山林藪澤草木魚鼈百索索百物也百索上所以時禁發發謂許民采取禁謂為之厲禁使國家足用而財物不屈虞師之事也禮山虞澤虞也屈竭也虞師周順州里和順使之定􅌀宅謂􅌀也定其分界不使相侵奪也市内百姓之居宅謂邑内居養六畜之也勸人養閒樹藝間之使䟽宻得宜也樹藝種樹及桑柘也勸教化趨孝弟化趨之使敦勸之使從敎讀爲促孝弟趨以時順脩使百姓順命安樂處郷郷師之事也公一人郷大夫每郷卿一人郷師公卿也周禮郷老二郷論百工巧拙論其誠工有不當必行其罪也月令曰物勒工名以考其審時事有氣材有美工有巧考工記曰天有時地工日號無悖于時皆審其時之事也合此四者然後可以為良月令曰監辨功苦好者若謂濫功謂器之精功堅苦脆也惡者韋昭曰尚完利若車之利轉之類也完堅也利謂便於用便備用使彫琢文采不敢專造於家工師之事也造專也私造相隂陽陽謂數也相視也隂占祲兆相侵之氣赤黒之占占候也祲隂陽兆謂望其雲物知歳之吉凶也祲是其類也兆謂􅀛兆或曰兆萌鑚􅀛陳卦火􅋹荆華鑚􅀛謂以揲蓍布卦也灼之也陳卦謂主攘擇五卜五卜洪範所謂曰雨曰霽曰攘擇攘除不祥擇取吉事也言兆之形也䝉曰驛曰剋知其吉凶祥傴巫跛擊之事也卜筮巫祝之事故曰傴巫跛覡胡狄反擊讀為覡男巫也古者以廢疾之人主脩採清之事採謂脩其採清禮蜡氏掌除骴凡國之大祭祀令州里除不蠲也採去其穢清謂使之清㓗皆謂除道路穢惡也周易道路平之脩而謹盜賊氏職曰有相翔者誅謹嚴禁也周禮野廬平室律室逆旅之平均布也姦人若今五家為保也室平其室之法皆不使容以時順脩使賔旅安而􅐙財通治市之事也蓋七國時設官不同治市之官兼此於周禮野廬氏之職今云治市制據當時職事言之也掌道路不必全依周禮抃急禁悍為愿已解上也抃當為析急當防淫除邪戮之以五刑使暴悍以變姦邪不作司宼之事也本政教正法則兼聽而時稽之正其治受其㑹而詔王廢置三嵗則大計也稽計也考也周禮太宰嵗終則令百官府各度其功勞論其慶賞以時順脩使百吏免盡而衆庶不偷冡宰之事也論禮樂正身行廣教化美風俗兼覆而調一之辟公之事也全道德致隆高綦文理一天下振毫末使天下莫不順比從服天王之事也故政事亂則冡宰之罪也國家失俗則辟公之過也天下不一諸侯俗反則天王非其人也具具而王具具而霸具具而存具具而亡用萬乘之國者威彊之所以立也名聲之所以美也敵人之所以屈也國之所以安危臧否也制與在此亡乎人王霸安存危殆滅亡制與在我亡乎人夫威彊未足以殆鄰敵也名聲未足以懸天下也則是國未能獨立也豈渠得免夫累乎天下脅於暴國而黨為吾所不欲於是者日與桀同事同行無害為堯是非功名之所就也非存亡安危之所墮也功名之所就存亡安危之所墮必將於愉殷赤心之所誠以其國為王者之所亦王以其國為危殆滅亡之所亦危殆滅亡殷之日案以中立無有所偏而為縱橫之事偃然案兵無動以觀夫暴國之相卒也案平政敎審節奏砥礪百姓為是之日而兵剸天下勁矣案然脩仁義伉隆髙正法則選賢良養百姓為是之日而名聲剸天下之美矣權者重之兵者勁之名聲者美之夫堯舜者一天下也不能加毫末於是矣故權謀傾覆之人退則賢良知聖之士案自進矣刑政平百姓和國俗節則兵勁城固敵國案自詘矣務本事積財物而勿忘棲遲薛越也是使羣臣百姓皆以制度行則財物積國家案自富矣三者體此而天下服暴國之君案自不能用其兵矣何則彼無與至也彼其所與至者必其民也其民之親我也歡若父母好我芳若芝蘭反顧其上則若灼黥若仇讎彼人之情性也雖桀跖豈有肯為其所惡賊其所好者哉彼以奪矣故古之人有以一國取天下者非徃行之也脩政其所莫不願如是而可以誅暴禁悍矣故周公南征而北國怨曰何獨不來也東征而西國怨曰何獨後我也孰能有與是鬭者與安以其國為是者王殷之日安以靜兵息民慈愛百姓辟田野實倉廩便備用安謹募選閲材技之士然後漸賞慶以先之嚴刑罰以防之擇士之知事者使相率貫也是以厭然畜積脩飾而物用之足也兵革器械者彼将日日暴露毁折之中原我今將脩飾之拊循之掩蓋之於府庫貨財粟米者彼將日日捿遲薛越之中野我今将畜積并聚之於倉廩材技股肱健勇爪牙之士彼將日日挫頓竭之於仇敵我今將來致之并閲之砥礪之於朝廷如是則彼日積敝我日積完彼日積貧我日積富彼日積勞我日積佚君臣上下之間者彼將厲厲焉日日相離疾也我今将頓頓焉日日相親愛也以是待其敝安以其國為是者霸立身則從傭俗事行則遵傭故進退貴賤則舉傭士之所以接下之百姓者則庸寛惠如是者則安存立身則輕楉事行則蠲疑進退貴賤則舉佞㣞之所以接下之人百姓者則好取侵奪如是者危殆立身則憍暴事行則傾覆進退貴賤則舉幽險詐故人之所以接下之人百姓者則好用其死力矣而慢其功勞好用其籍斂矣而忘其本務如是者滅亡此五等者不可不善擇也王霸安存危殆滅亡之具也善擇者制人不善擇者人制之善擇之者王不善擇之者亡夫王者之與亡者制人之與人制之也是其為相懸也亦遠矣荀子卷第五
