body:
  text: 登仕郎守大理評事揚倞注非相篇第五多以此惑世時人或矜其狀貌而忽於務實相視也視其骨狀以知吉凶貴賤也妄誕者刑法家有相人二十四篇故荀卿作此篇非之漢書相人古之人無有也學者不道也說道古者有姑布子卿襄子者或本無姑字姑布姓子卿名相趙今之世梁有唐舉蔡澤者相李兊相人之形狀顔色而知其吉凶妖祥世俗稱之古之人無有也學者不道也深非之也再三言者故相形不如論心論心不如擇術術也術道形不勝心心不勝術術正而心順則形相雖惡而心術善無害爲君子也形相雖善而心術惡無害爲小人也君子之謂吉小人之謂凶故長短小大善惡形相非吉凶也古之人無有也學者不道也蓋帝堯長帝舜短文王長周公短仲尼長子弓短馯臂字子弓江東人受易者也然馯臂傳易之外子弓蓋仲弓也言子者著其爲師也漢書儒林傳夫稱公白公亦是也微細也葉音攝於葉名諸梁字子髙楚􅆫稱王其大然白公之亂也令尹子西司馬子期皆死焉孫子西楚平王長庶子公子白公楚太子建之子平王之王子公子結申子期亦平葉公子髙入據楚誅白公定楚國如反手爾仁義功名善於後世故士不揣長不揳大不權輕重亦將志乎心爾同約也揳與絜輕重體之輕重也言不論形狀長短大小肥瘠唯在志意脩飾耳謂約計其大小也絜户結反莊子匠石見社樹絜之百圍權稱也長短小大美惡形相豈論也哉且徐偃王之狀目可瞻馬之偃王周穆王使楚誅之瞻馬言不能俯徐國名僣稱王其狀偃仰而不能俯故謂曰徐偃王有筋而無骨也視細物逺望纔見馬尸子仲尼之狀面如蒙倛也其首倛方相倛倛音欺慎子曰毛廧西施天下之至姣也衣之以皮倛則見之者皆蒙茸然故曰蒙倛子虚賦曰蒙公先驅韓侍郎云四目爲方相兩目爲也走周公之狀身如斷菑曰椔與菑同爾雅云木立死臯陶之狀色如削􅀲􅀲青綠色如削皮之閎夭之狀面無見膚夭閎言多􅁂髯蔽其膚也文王臣在十亂之中傅說之狀身如植鰭魚之立也植立也如伊尹之狀面無須麋眉同麋與禹跳湯偏禹之勞尹子曰禹歩鄭注尚書大傳云湯半體枯呂氏春秋曰禹通水濬川顔十年不窺其家手不爪脛不生毛偏枯之病多歩不相過人曰不相過色黎黑歩堯舜參牟子之相參也史記曰舜目重瞳牟與眸同參牟子謂有二瞳法岀言成章當時傳聞今書傳亦難盡詳究所岀也重曈蓋堯亦然尸子曰舜兩眸子是謂重明作事成從者將論志意比類文學邪直將差長短辨美惡而相欺傲邪文學邪伹以好醜相欺傲也從者荀卿門人問將論志意古者桀紂長巨姣美天下之傑也筋力越勁百人之敵也越過人也勁勇也姣好也倍萬人曰傑然而身死國亡爲天下大僇後世言惡則必稽焉世言惡必考桀紂爲僇與戮同稽考也後也證是非容貌之患也聞見之不衆論議之卑爾但以聞見不廣論議不髙故致禍耳亦非以容貌害身言美惡皆非所患今世俗之亂君鄉曲之儇子翾義同輕薄巧慧之子也儇方言云儇疾也慧也與喜而反火􅀇莫不美麗姚冶竒衣婦飾血氣態度擬於女子婦人之飾言輕細也擬於女子言柔弱便辟也說文云姚美好貌冶妖竒衣珍異之衣婦飾謂如婦人莫不願得以爲夫處女莫不願得以爲士曰老婦得其士夫士者未娶妻之稱易弃其親家而欲奔之者比肩並起然而中君羞以爲臣中父羞以爲子中兄羞以爲弟中人羞以爲友必不知惡也上智皆俄則束乎有司而戮乎大市有司所束犯刑法爲也縳莫不呼天啼哭苦傷其今而後悔其始悔其始之所爲苦傷今之刑戮是非容貌之患也聞見之不衆而論議之卑爾然則從者將孰可也形相與問從者爲益乎志意孰人有三不祥㓜而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也有禍言必也災人有三必窮爲上則不能愛下爲下則好非其上是人之一必窮也鄉則不若偝則謾之是人之二必窮也謾欺毁也莫于反鄉讀爲向若如也智行淺薄曲直有以相縣矣然而仁人不能推知士不能明是人之三必窮也也言智慮德曲直猶能否言不知已之不及也知音智行下孟反縣讀爲懸行至淺薄其能否與人又相縣逺不能推讓明白之人有此三數行者以爲上則必危爲下則必滅詩曰雨雪瀌瀌宴然聿消莫肯下隧式居屢驕此之謂也聲之誤耳晛日氣也隧讀爲隨屢讀爲婁婁歛詩小雅角弓之篇今詩作見晛曰消作宴然蓋矣幽王曽莫肯下隨於人用此居處歛其驕慢之過也也言雨雪瀌瀌然見日氣而自消喻欲爲善則惡自消人之所以爲人者何巳也之人而貴於禽獸也巳與以同問何以謂曰以其有辨也也辨别飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也而知也不待學是禹桀之所同也然則人之所以爲人者非特以二足而無毛也以其有辨也今夫狌狌形笑亦二足而毛也交阯笑笑者能言笑也狌狌獸似人而能言出然而君子啜其羮食其胾賤而食之側吏反胾臠也禽獸無辨故故人之所以爲人者非特以其二足而無毛也以其有辨也夫禽獸有父子而無父子之親有牝牡而無男女之别故人道莫不有辨辨莫大於分踈之分也有上下親分莫大於禮有禮也分生於禮莫大於聖王其人存其政舉聖王制禮者言聖王有百吾孰法焉聖問可爲法也王至多誰故曰文久而息節族久而絶制度也言文禮文節息宗族久則廢也禮文久則制度滅守法數之有司極禮而褫有司世褫解也朝三禠之言此者以喻久逺難詳不如隨時興治禠直吏反世相承守禮之法數至於極久亦下脫也易曰或錫之鞶帶終故曰欲觀聖王之跡則於其粲然者矣後王是也則是聖王之跡也夫禮法所興以救當世之急故隨後王近時之王也粲然明白之貌言近世明王之法之術然後可斯惑也孔子曰殷因於夏禮所損益可知也故荀卿深時設教不必拘於舊聞而時人以爲君必用堯舜之道臣必行禹稷後王者以其近巳而俗相類議卑而易行也陳以後王爲法審其所貴君子焉司馬遷曰法彼後王者天下之君也舍後王而道上古譬之是猶舍己之君而事人之君也故曰欲觀千歳則數今日欲知億萬則審一二欲知上世則審周道欲知周道則審其人所貴君子巳謂群觀其道也之君也審謂故曰以近知逺以一知萬以微知明此之謂也夫妄人曰古今異情其以治亂者異道而衆人惑焉彼衆人者愚而無說陋而無度者也測度度大各反下同言其愚陋而不能辨說其所見焉猶可欺也而況於千世之傳也聞也傳傳妄人者門庭之閒猶可誣欺也而況於千世之上乎聖人何以不欺曰聖人者以已度者也之意故人不能以已意度古人欺人也欺亦不故以人度人以情度情之人情既云欲惡以今之人情度古治亂有異皆同豈其以類度類若牛馬也類種類謂以說度功其功業也以言說度以道觀盡人百姓積善而全盡謂之聖人也以道觀盡物之理儒效篇曰涂之古今一度也彼安在其古今異情乎古今不殊盡可以此度類不悖雖久同理乖悖雖久言種類不不殊何至人而獨異哉而理同今之牛馬與古故鄉乎邪曲而不迷觀乎雜物而不惑以此度之不正之道而不迷雜物􅋑燿而以測度之道明之故向於邪曲讀爲向不惑鄉五帝之外無傳人其人事跡後世無傳者外謂巳前也無傳人謂非無賢人也久故也五帝之中無傳政非無善政也久故也顓頊髙辛唐虞也中間也五帝少昊禹湯有傳政而不若周之察也非無善政也久故也傳者久則論略近則論詳略則舉大詳則舉小綱詳周備也略謂舉其大愚者聞其略而不知其詳聞其詳而不知其大也知詳以小知大也唯聖賢乃能以略是以文久而滅節族久而絶凡言不合先王不順禮義謂之姦言雖辨君子不聽鄧析之屬也公孫龍惠施法先王順禮義黨學者比也黨親然而不好言不樂言則必非誠士也至誠好善之士言講說也誠士謂故君子之於言也志好之行安之樂言之故君子必辯談說也辯謂能凡人莫不好言其所善而君子爲甚所好尚也所善謂巳故贈人以言重於金石珠玉觀人以言美於黼黻文章黼黻文章皆色之美者白觀人以言謂使人歡其言與赤謂之文赤與白謂之章與黒謂之黼黒與青謂之黻青聽人以言樂於鍾鼓琴瑟其言使人聽故君子之於言無厭倦也無厭鄙夫反是好其實不䘏其文飾若墨子之屬也但好其質而不知文是以終身不免埤汙傭俗與庳同豬水處謂之汙亦埤汙皆下也謂鄙陋也埤音婢汙一孤反地之下者也庳故易曰括囊無咎無譽腐儒之謂也也引易以喻不談說者腐儒如朽腐之物無所用凡說之難以至髙遇至卑以至治接至亂卑至亂之君所以爲難也說音稅以先王之至髙至治之道說末世至未可直至也逺舉則病繆近世則病傭舉上世之事則患繆妄下舉近世未可直至言必在援引古今也逺傭鄙也之事則患善者於是閒也亦必逺舉而不繆近世而不傭與時遷徙與世偃仰緩急嬴絀猶言伸屈也嬴餘也嬴絀府然若渠匽櫽栝之於已也同就物府與俯栝所以制木君子制人亦猶比也之貌或讀爲附渠匽所以制水櫽曲得所謂焉然而不折傷所謂然而不折傷其道也言談説委曲皆得其意之故君子之度已則以繩接人則用枻則以繩墨接人則牽引而致之言正枻牽引也度已猶正已也君子正已度大各反枻以世反韓侍郎云枻者檠枻也正弓弩之器也已而馴致人也或曰枻當爲拽枻楫也言如以楫櫂進舟􅂳也度已以繩故足以爲天下法則矣接人用枻故能寛容因求以成天下之大事矣在衆成事故君子賢而能容罷事者音疲罷弱不任知而能容愚博而能容淺粹而能容雜夫是之謂兼術術兼容之法粹專一也兼詩曰徐方既同天子之功此之謂也物亦猶天子之同徐方也詩大雅常武之篇言君子容談說之術矜莊以莅之端誠以處之堅彊以持之分别以諭之譬稱以明之欣驩芬薌以送之寶之珍之責之神之如是則說常無不受神之謂目神異其説不敢慢也說並音稅稱尺言談説之法如此人乃信之芬薌言至芳絜也與香同證反薌雖不說人人莫不貴況其説之不説猶貴夫是之謂爲能貴其所貴賤之也不使人傳曰唯君子爲能貴其所貴此之謂也君子必辯凡人莫不好言其所善所好也所善謂而君子爲甚焉是以小人辯言險君子辯言仁也愛之道仁謂忠言而非仁之中也則其言不若其黙也其辯不若其呐也記其言呐呐然非呐與訥同或引禮言而仁之中也則好言者上矣不好言者下也故仁言大矣起於上所以導於下政令是也起於下所以忠於上謀救是也嘉謀匡謀救謂不可以巳也如是救此言談説之益故君子之行仁也無厭倦時無厭志好之行安之樂言之故言三者也行如字所以好言說由此君子必辯小辯不如見端首端見端不如見本分貴賤之分上下不如見本分言辯說止於知本分而已分小辯謂辯說小事則不如見端首見端首則小辯而察見端而明本分而理聖人士君子之分具矣後聖賢之分具此言能辯說然有小人之辯者有士君子之辯者有聖人之辯者不先慮不早謀發之而當成文而類不失其類謂不乖悖也言闇與理會成文理而居錯遷徙應變不窮居也錯千故反錯置也居錯安是聖人之辯者也先慮之早謀之斯須之言而足聽巳可聽也斯須發言文而致實博而黨正是士君子之辯者也辯說文謂失於虚詐博則失於流蕩故致實黨正爲重之詞也致至也黨與讜同謂直言也凡辯則聽其言則辭辨而無統木也無根用其身則多詐而無功上不足以順明王下不足以和齊百姓然而口舌之於噡唯則節唯則節四字未詳或剰蓋謂騁口舌之辯也噡誤耳少錯足以爲竒偉偃却之屬偃仰即偃蹇也言姦竒偉誇大也偃却猶誇大偃蹇而已雄口辯適足以自夫是之謂姦人之雄聖王起所以先誅也然後盜賊次之盜賊得變此不得變也使自新也變謂教之非十二子篇第六假今之世亂之世治世則姦言無所容故十二子借亂世假如今之世也或曰假借也今之世謂戰國昬衆也以惑飾邪說文姦言以􅞏亂天下僥同􅞏與欺惑愚衆矞宇嵬􅃈大也放蕩恢大也嵬謂爲狂險之行者也􅃈矞與譎同詭詐也又余律反宇未詳或曰宇亦猶山之髙不平也周禮大司樂云大傀烖則去樂鄭云傀猶怪也晏者謂爲姦細之行者也說文云嵬髙不平也今此言嵬者其行狂險傀行自勤於飢寒命之曰狂僻之民明上之所禁也嵬當與傀義同子春秋曰不以上爲本不以民爲憂内不恤其家外不顧其游夸言又牛彼反音五每反使天下混然不知是非治亂之所存者有人矣之貌有在也混然無分别縱情性安恣睢禽獸行義則與禽獸無異故曰禽獸行睢許季反恣睢矜放之貌言任情性所爲而不知禮不足以合文通治文義通於治道不足合於古之然而其持之有故其言之成理足以欺惑愚衆曰持之有故又其言論能妄稱古人亦有如此者故足欺惑愚人衆人矣成文理故曰言之成理是它嚻魏牟也本楚平王孫有曰公它嚻未詳何代人世志道家有公子牟四篇班固曰先莊子莊子稱之今莊子有公子牟它成豈同族乎韓詩外傳作范魏牟牟魏公子封於中山漢書藝文公孫龍之言公孫龍平原君之客而張湛以爲文侯子據年代非也稱莊子之言以折公孫龍據即與莊子同時也又列子稱公子牟解送之未知何者爲定也說苑曰公子牟東行穰侯忍情性綦谿利跂性也綦谿未忍謂違驕其足也莊子曰楊墨乃始離跂自以爲得離力智反跂丘氏反詳蓋與跂義同也利與離同離跂違俗自絜之貌謂離於物而跂苟以分異人爲髙人以爲髙行也苟求分異不同於不足以合大衆明大分不足明大分大分謂忠孝之大義也既求分異則不足合大衆苟立小節故然而其持之有故其言之成理足以欺惑愚衆是陳仲史鰌也上巳解不知一天下建國家之權稱權稱言不知輕重稱尺證反不知齊一天下建立國家之上功用大儉約而僈差等也僈輕也輕僈差等謂欲使君臣上下同勞苦也功用功力也大讀曰太言以功力爲上而過儉約曽不足以容辨異縣君臣分别而縣隔君臣也上下同等則其中不容然而其持之有故其言之成理足以欺惑愚衆是墨翟宋鈃也時孟子作宋牼牼與鈃同音口莖反宋鈃宋人與孟子尹文子彭蒙慎到同尚法而無法下脩而好作法爲上而自無法以脩尚上也言所著書雖以言自相矛盾也立爲下而好作爲上則取聽於上下則取從於俗下之意也言苟順上終日言成文典及紃察之則倜然無所歸宿成文典若循察則䟽逺無所指歸也紃與循同倜然䟽逺貌宿止也雖言不可以經國定分俗故法度不立也取聽於上取從於然而其持之有故其言之成理足以欺惑愚衆是慎到田駢也學本黄老大歸名法慎到已解上田駢齊人遊稷下著書十五篇其不法先王不是禮義義為是不以禮而好治怪說玩􅄾辭為竒異之竒玩與翫同􅄾讀甚察而不惠順惠辯而無用多事而寡功不可以爲治綱紀然而其持之有故其言之成理足以欺惑愚衆是惠施鄧析也略法先王而不知其統不知體統統謂綱紀也言其大略雖法先王而然而猶材劇志大聞見雜博案徃舊造說謂之五行前案行五行五常仁義禮智者也古之事而自造其說謂之五甚僻違而無類幽隱而無說閉約而無解戾而不知善類也幽隱無說閉約無約結也解說也僻違無類謂乖僻違作方略也荀卿常言法後王治賞世而孟軻子思以爲必行堯舜文解謂其言幽隱閉結而不能自解說謂伹言堯舜之道而不知其興僻違無類孟子曰管仲曾西之所不爲解佳買反武之道然後爲治不知隨時設教救當世之弊故言案飾其辭而祗敬之曰此真先君子之言也說先君子孔言自敬其辭也子子思唱之孟軻和之軻鄒人字子輿皆著書七篇子思孔子之孫名伋字子思孟世俗之溝猶瞀儒嚾嚾然不知其所非也區瞀與此義同嚾嚾喧囂之貌謂爭辨也拘音㓂猶音柚溝讀爲拘拘愚也猶猶豫不定也瞀闇也漢書五行志作遂受而傳之以爲仲尼子游爲兹厚於後世尼仲德厚於後世也子游爲此言垂是則子思孟軻之罪也若夫緫方略齊言行壹統類而羣天下之英傑而告之以大古教之以至順比類大謂之統分别謂緫領也統謂綱紀類謂也大讀曰太之類羣會合奥窔之閒簟席之上斂然聖王之文章具焉佛然乎世之俗起焉東南隅謂之窔西南隅謂之奥佛讀爲勃勃然興起貌窔一弔反言不出室堂之内也斂聚集之貌則六説者不能入也十二子者不能親也無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容諸侯所能畜一國所能容言王者之佐雖在下位非國能畜者故仲尼所至輕去也或曰時君不知其賢無一君一成名況乎諸侯莫不願以爲臣不願得以爲臣或曰既成名之後則王者之輔佐也況況比也言其所成之名比況於人莫與爲偶故諸侯莫容也或曰況猶益也國語驪姬曰衆況厚之諸侯莫不願得以爲臣乎未知其賢則無國能是聖人之不得埶者也仲尼子弓是也一天下財萬物裁同財與長養人民兼利天下通達之屬莫不從服至人力所通者也通達之屬謂舟車所六說者立息十二子者遷化從化遷而則是聖人之得勢者舜禹是也今夫仁人也將何務哉上則法舜禹之制下則法仲尼子弓之義以務息十二子之說如是則天下之害除仁人之事畢聖王之跡箸矣信信信也疑疑亦信也雖不同皆歸於信也信可信者疑可疑者意貴賢仁也賤不肖亦仁也言而當知也黙而當亦知也故知黙由知言也不知爲不知是知也論語曰知之爲知之浪反當丁故多言而類聖人也少言而法君子也少言而法謂不敢自造言説所言皆守典法也言雖多而不流􅊺皆類於禮義是聖人之制作者也多少無法而流湎然雖辯小人也反沈者不復出也湎沈也流者不復故勞力而不當民務謂之姦事民之務民務四勞知而不律先王謂之姦心法律辯說譬諭齊給便利而不順禮義謂之姦說亦謂言辭敏捷也齊疾也給急也便利此三姦者聖王之所禁也知而險賊而神賊害不測如用智於險又也神爲詐而巧爲詐巧於言無用而辯無用也言辯而辯不給惠而察道理而聦察也惠順也辭辯不順治之大殃也行辟而堅曰僻辟讀飾非而好非也好飾玩姦而澤而使有潤澤也玩與翫同習姦言辯而逆古之大禁也於常理逆者乖知而無法異見騁其如字也知勇而無憚死輕察辯而操僻淫操持僻淫之事爲察察之辯而刀反操七大而用之大而用之也以前數事爲好姦而與衆衆人共之好姦而與同之也謂使人利足而迷惑不顧禍患也苟求利足而迷負石而墜狄負石謂申徒亦利足而迷者之類也投河言好名以至此也是天下之所弃也兼服天下之心髙上尊貴不以驕人不驕人在貴位聦明聖知不以窮人齊給速通不爭先人剛毅勇敢不以傷人不知則問不能則學雖能必讓然後爲德賢之德也然後爲聖遇君則脩臣下之義遇鄉則脩長幼之義之中也在鄉黨遇長則脩子弟之義遇友則脩禮節辭讓之義遇賤而少者則脩告導寛容之義無不愛也無不敬也無與人爭也恢然如天地之苞萬物如是則賢者貴之不肖者親之如是而不服者則可謂訞怪狡猾之人矣妖同訞與雖則子弟之中刑及之而宜人子弟之中亦宜刑戮妖怪狡猾之人雖在家公法乎及之況詩云匪上帝不時殷不用舊雖無老成人尚有典刑曽是莫聽大命以傾此之謂也陟臣扈之屬也典刑常事故法也詩大雅蕩之篇鄭云老成人伊尹伊古之所謂士仕者厚敦者也合羣者也謂士士仕和合羣衆也之入仕合謂樂富貴者也道也樂其樂分施者也宜反施或所逺罪過者也願反逺于務事理者也有條理務使事羞獨富者也人足也使家給今之所謂士仕者汙漫者也賊亂者也在榮辱篇汙漫已解恣睢者也解於上恣睢巳貪利者也觸抵者也而忤人恃權埶無禮義而唯權埶之嗜者也古之所謂處士者德盛者也能靜者也或處能靜謂安時處順也處士不仕者也易曰或出脩正者也知命者也箸是者也使人疑其姦詐也明箸其時是之事不今之所謂處士者無能而云能者也亂也云能而害無能則亂也蓋戰國時云能自言其能也慎子曰勁而害能則當時之語也以言能爲云能無知而云知者也利心無足而佯無欲者也詐爲無欲者也好利不知足而行僞險穢而彊髙言謹愨者也以不俗爲俗自爲其俗也以不合俗人離縱而跂訾者也而恣其志意皆違俗自髙之貌或曰縱當爲縰傳寫訾讀爲恣離縱謂離於俗而放縱跂恣謂跂足違俗跂足自髙而訾毁於人離力智反跂丘氏反縱所綺反誤耳縱與纚同步也離縱謂離於俗而步去跂訾亦謂士君子之所能不能爲君子能爲可貴不能使人必貴已道德也可貴謂能爲可信不能使人必信已能爲可用不能使人必用已才能也可用謂故君子恥不脩不恥見汙所汙穢也見汙爲人恥不信不恥不見信恥不能不耻不見用是以不誘於譽不恐於誹能誘誹虚譽不能動謗不率道而行端然正已不爲物傾側夫是之謂誠君子無虚僞也誠實也謂詩云温温恭人維德之基此之謂也不苟篇已解在士君子之容其冠進其衣逢其容良冠在進謂掖也良謂樂易也前也逢大也謂逢儼然壯然祺然蕼然恢恢然廣廣然昭昭然蕩蕩然是父兄之容也貌壯然不可儼然矜莊之憂懼之貌蕼當爲肆謂寛舒之貌恢恢廣廣皆容衆貌昭昭明犯之貌或當爲莊祺然蕼然未詳或曰祺祥也吉也謂安泰不恢夷之貌顯之貌蕩蕩其冠進其衣逢其容愨敬謹儉然恀然輔然端然訾然洞然綴綴然瞀瞀然是子弟之容也爾雅曰恀恃也郭云江東呼母爲恀儉然自卑謙之貌恀然恃尊長之貌洞洞乎其敬也綴綴然不乖離之貌謂相連綴也瞀瞀然不敢正音紙輔然相親附之貌端然不傾倚之貌洞然恭敬之貌禮記曰貌視之吾語汝學者之嵬容形狀嵬巳解於上說學者爲嵬行之其冠絻其纓禁緩其容簡連俯也纓冠之繫也禁緩未絻當爲俛謂太向前而低傲慢不前之貌紟其禁反連讀如徃蹇來連之連詳或曰讀爲紟紟帶也言其纓大如帶而緩也簡連填填然狄狄然莫莫然瞡瞡然瞿瞿然盡盡然盱盱然之貌或動而跳躍或靜而不言皆謂舉指無􅁪也瞡瞡未填填滿足貌狄讀爲趯跳躍之貌莫讀爲貊貊靜也不言物之貌盱盱張目之貌皆謂視瞻不平或大察也盱許于反詳或曰瞡與規同規規小見之貌瞿瞿瞪視之貌盡盡極視盡酒食聲色之中瞞瞞然瞑瞑然視不審貌謂好恱之瞞瞞閇目之貌瞑瞑莫干反瞑母丁反甚佯若不視也瞞禮節之中則疾疾然訾訾然憎謂訾也嫉毁勞苦事業之中則儢儢然離離然偷儒而罔無廉恥而忍謢徯音訽是學者之嵬也心不力也音吕偷儒謂苟辟事之勞苦也罔謂罔冐不畏人之言事業謂作業也儢儢不勉彊之貌離離不親事之貌陸法言云儢所解或取聲韻假借或推傳寫錯誤因隨所見而通之也也謢訽謂詈辱也此一章皆明視其狀貌而辨善惡也今之弟佗其冠祌禫其辭爲沖澹謂其言淡泊也弟佗其冠未詳祌禫當禹行而舜趨是子張氏之賤儒也威儀而已矣但宗聖人之正其衣冠齊其顔色嗛然而終日不言是子夏氏之賤儒也沈黙史記樂毅與燕惠王書曰先王以爲嗛於嗛與慊同快也謂自得之貌終日不言謂務於也志偷儒憚事無廉恥而耆飲食必曰君子固不用力是子游氏之賤儒也同此皆言先儒性有偷儒巳解上耆與嗜之故有此敝也所偏愚者效而慕彼君子則不然佚而不惰勞而不僈雖勞而不弛慢雖逸而不懈惰宗原應變曲得其宜如是然後聖人也應變皆曲得其宜也宗原根本也言根本及仲尼篇第七仲尼之門人五尺之竪子言羞稱乎五伯是何也曰然彼誠可羞稱也齊􅁊五伯之盛者也爲諸侯之長春秋傳曰王命内史叔興父䇿命晉言盛者猶如此況其下乎伯讀爲霸或曰伯長也伯也爲侯前事則殺兄而爭國糾也兄子内行則姑姊妹之不嫁者七人閨門之内般樂奢汰亦般音太下同􅊨樂也汰侈也以齊之分奉之而不足稅之半也公分半也用賦喪分焉羊傳曰師外事則詐邾襲莒并國三十五邾詐也并國三十五謂滅譚滅遂滅項之類其餘所未盡聞也􅊨未聞襲莒謂􅁊公與管仲謀伐莒未發爲東郭牙先知之是其事行也若是其險汙淫汰也如彼也行下孟反事險而行汙固曷足稱乎大君子之門哉若是而不亡乃霸何也曰於乎夫齊􅁊公有天下之大節焉夫孰能亡之聲大節謂大節義也於乎讀爲嗚呼歎美之倓然見管仲之能足以託國也是天下之大知也謂知人之大也倓他坎反倓安也安然不疑也大知安忘其怒出忘其讎遂立以爲仲父是天下之大決也外也言内忘忿安猶内也出猶事之如父故號爲仲父大決謂斷決之大也恚之怒外忘射鉤之讎仲者夷吾之字父者立以爲仲父而貴戚莫之敢妬也其親宻不敢妬與之髙國之位而本朝之臣莫之敢惡也卿今以其位與之本髙子國子世爲齊上仲曰有天子之二守國髙在朝之臣謂舊臣也春秋傳管與之書社三百而富人莫之敢距也五家爲社距與拒同敵也言齊之富人莫書社謂以社之戸口書於版圖周禮二十仲者也有敢敵管貴賤長少秩秩焉莫不從􅁊公而貴敬之是天下之大節也敘之貌秩秩順諸侯有一節如是則莫之能亡也􅁊公兼此數節者而盡有之夫又何可亡也其霸也宜哉非幸也數也非爲幸遇也其術數可霸然而仲尼之門人五尺之竪子言羞稱乎五伯是何也曰然彼非本政教也非致隆髙也極也致至非綦文理也章條理也非極有文非服人之心也服之也非以義鄉方略審勞佚謂審知使人之勞佚也鄉讀爲向趨也審勞佚畜積脩􅃲而能顛倒其敵者也術而能傾覆其敵也畜積倉廪脩戰􅃲之詐心以勝矣彼以讓飾爭依乎仁而蹈利者也飾爭非真爲讓所以蹈利非真仁也讓也行仁所以小人之傑也彼固曷足稱乎大君子之門哉者之政故言其失孟子曰五霸者三王前章言五霸救時故褒美之此章明王人也之罪彼王者則不然致賢能而以救不肖致彊而能以寛弱戰必能殆之而羞與之􅃲不力服也必以義服委然成文以示之天下就人使成文理以示委然俯就之貌言俯下天而暴國安自化矣有災繆者然後誅之災有之非顛倒其敵也怪繆戾者然後誅故聖王之誅也綦省矣所景反省少也文王誅四大邦侵阮徂共春秋傳曰文王聞崇徳亂而伐四謂密也阮也共也崇也詩曰密人不恭敢拒與此小異誅者討伐殺戮之通名之因壘而降史記亦説文王征伐武王誅二紂與妲己尸子史記云武王斬汙於血不温而食當此之時猶猛獸者也曰武王親射惡來之口親斫殷紂之頸手周公卒業王業亦周公終監淮夷商奄也時有小征伐謂三至於成王則安以無誅矣行刑措言其化也故道豈不行矣哉不行耳故又以下事明之以此言之道豈不行人自文王載百里地而天下一而天下一以有道也所載之地不過百里桀紂舍之厚於有天下之勢而不得以匹夫老紂桀勢而不得如庶人夀終舍道雖有天下厚重之故善用之則百里之國足以獨立矣不善用之則楚六千里而爲讎人役秦其子襄王又爲秦所制而役使之也善用謂善用道也讎人秦也楚懐王死於故人主不務得道而廣有其埶是其所以危也持寵處位終身不厭之術終身行之之術論人臣處位可主尊貴之則恭敬而僔卑退也僔與撙同主信愛之則謹慎而嗛春秋榖梁傳曰一榖不升謂之嗛嗛與歉同不足也言不敢自滿也按主專任之則拘守而詳詳明法度謹守職事主安近之則慎比而不邪而不回邪謟佞謹慎親比於上主䟽逺之則全一而不倍懷離二之心不以䟽逺而主損絀之則恐懼而不怨貴而不爲夸侈也夸奢信而不忘處謙得信於主謙讀爲嫌疑其作威福也不處嫌疑閒使人任重而不敢專財利至則言善而不及也必將盡辭讓之義然後受而善寡如不合當此財利也不及而如也言已之善福事至則和而理禍事至則靜而理充屈静而理謂不隕穫也理謂不失其道和而理謂不富則施廣貧則用節可貴可賤也可富可貧也可殺而不可使爲姦也終不可使爲姦也君雖寵榮屈辱之是持寵處身不厭之術也雖在貧窮徒處之埶亦取象於是矣夫是之謂吉人處也雖貧賤其所徒處徒行或曰獨法於此也立志亦取詩曰媚兹一人應侯順德永言孝思昭哉嗣服此之謂也應當侯維服事也鄭云媚愛兹詩大雅下武之篇一人謂君也哉武王之嗣行祖考之事謂伐紂定天下引此者明臣事君亦猶此也可愛乎武王能當此順德謂能成其祖考之功也服事也明祖考也武王之繼求善處大重理任大事大位也大重謂擅寵於萬乗之國必無後患之術莫若好同之與之同好賢人也者援賢博施除怨而無妨害人念舊惡除怨不能耐任之則慎行此道也能者雖不欲用必忍而用之耐忍也慎讀爲順言人有賢道耐乃代反則順巳所行之能而不耐任忍急用之有能者不且恐失寵則莫若早同之推賢讓能而安隨其後如是有寵則必榮失寵則必無罪是事君者之寶而必無後患之術也其言駁雜今此又言以或曰荀子非王道之書道或論彊國在時君所擇同歸於治者也若髙言堯舜則道不必術事君曰不然夫荀卿生於衰世意在濟時故或論王道或論霸平之後則亦堯舜之道也又荀卿門人多仕於大國故戒其保身合何以拯斯民於塗炭乎故反經合義曲成其道若得行其志治明且哲豈云異哉推賢之術與大雅既故知兵者之舉事也滿則慮嗛其後不足之時而先防之嗛不足也當其盈滿則思平則慮險安則慮危曲重其豫猶恐及其旤是以百舉而不䧟也恐其及旤旤與禍同委曲重多而備豫之猶孔子曰巧而好度必節勇而好同必勝知而好謙必賢此之謂也勇者多陵物故好與人同者必勝之也巧者多作淫靡故好法度者必得其節愚者反是處重擅權則好專事而妬賢能抑有功而擠有罪志驕盈而輕舊怨輕舊怨謂輕報舊怨擠排也言重傷之也以吝嗇而不行施道乎上爲重招權於下以妨害人雖欲無危得乎哉威福故招權使歸於巳施道施惠之道欲重其是以位尊則必危任重則必廢擅寵則必辱可立而待也可炊而傹也僵言可以氣吹之炊與吹同傹當爲傹音竟而僵仆是行也則墮之者衆而持之者寡矣䂓反墮許天下之行術天下之術可以行於以事君則必通以爲仁則必聖立隆而勿貳也以事君則必通達以仁謂仁人聖亦通也厚而專一也此謂可行天下之術也爲仁則必有聖知之名者在於所立敦然後恭敬以先之忠信以統之慎謹以行之端愨以守之頓窮則從之疾力以申重之本然後輔之以以敦厚不貳爲時則尤加勤力而不敢怠惰申重猶再三也恭敬之屬頓謂困躓也疾力勤力也困戹之君雖不知無怨疾之心功雖甚大無伐德之色省求多功愛敬不倦如是則常無不順矣所求即多省少也少所景反立功勞省以事君則必通以爲仁則必聖夫是之謂天下之行術少事長賤事貴不肖事賢是天下之通義也有人也埶不在人上而羞爲人下是姦人之心也志不免乎姦心行不免乎姦道而求有君子聖人之名辟之是猶伏而咶天救經而引其足也伏而䑛天愈益逺也救經而辟讀爲譬咶與䑛同經縊也急也經音徑引其足愈益說必不行矣俞務而俞逺爲愈俞讀故君子時詘則詘時伸則伸也下則爲下必當其埶在上則爲上在而羞爲下之心哉分安有埶不在上荀子卷第三
