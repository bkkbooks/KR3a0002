body:
  text: 登仕郎守大理評事􅀭倞注性惡篇第二十三荀卿明於治道知其可化無勢位當戰國時競爲貪亂不脩仁義而欲無主乃亂惟聦明時乂亦與此義同也以臨之故激憤而著此論書曰惟天生民有人之性惡其善者僞也凡非天性而人作爲之者僞爲也矯也矯其本性也傍爲亦㑹意字也皆謂之僞故爲字人今人之性生而有好利焉順是故爭奪生而辭讓亡焉謂順其性也天生性也順是生而有疾惡焉順是故殘賊生而忠信亡焉惡烏路反疾與嫉同生而有耳目之欲有好聲色焉順是故淫亂生而禮義文理亡焉文條理也文理謂節然則從人之性順人之情必出於爭奪合於犯分亂理而歸於暴故必將有師法之化禮義之道導同道與然後出於辭讓合於文理而歸於治用此觀之然則人之性惡明矣其善者僞也故枸木必將待櫽括烝矯然後直木也烝謂烝之使柔矯謂矯之使直也枸讀爲鈎曲也下皆同櫽括正曲木之鈍金必將待礱厲然後利厲與礪同礱厲皆磨也今人之性惡必將待師法然後正得禮義然後治今人無師法則偏險而不正無禮義則悖亂而不治古者聖王以人之性惡以爲偏險而不正悖亂而不治是以爲之起禮義制法度以矯飾人之情性而正之以擾化人之情性而導之也使皆出於治合於道者也擾馴也矯彊抑也今之人化師法積文學道禮義者爲君子縱性情安恣睢而違禮義者爲小人用此觀之然則人之性惡明矣其善者僞也孟子曰人之學者其性善所以成其天性之善孟子言人之有學適所論者是也非矯也與告子曰是不然是不及知人之性而不察人人之性僞之分者也近不能及於知猶不及知謂智慮淺冲人不及知之言不到也書曰予凡性者天之就也不可學不可事禮義者聖人之所生也人之所學而能所事而成者也也任也周禮太宰職六曰事典聖人之所生明非天性也事爲官鄭云任事也以富邦國以任百不可學不可事而在人者謂之性可學而能可事而成之在人者謂之僞是性僞之分也學而能不事而成也不可學不可事謂不今人之性目可以見耳可以聽夫可以見之明不離目可以聽之聦不離耳目可聽之聦常不離可見之明常不離於也於耳目明而耳聦不可學明矣於學是乃天性也如目明耳聦之不假孟子曰今人之性善將皆失喪其性故也本性故惡也孟子言失喪曰若是則過矣今人之性生而離其朴離其資必失而喪之生而任其性則離其質朴質也資材也言人若而愚惡其失喪必也朴而偷薄離其資材用此觀之然則人之性惡明矣所謂性善者不離其朴而美之不離其資而利之也不假飾而善此則爲天性不離質朴資材自得美利使夫資朴之於美心意之於善若夫可以見之明不離目可以聽之聦不離耳聞見之聦明常不離使質朴資材自善如乃天性也於耳目此故曰目明而耳聦也乃是其性不然則是故曰如目明耳聦此之也矯僞使今人之性飢而欲飽寒而欲煖勞而欲休此人之情性也今人飢見長而不敢先食者將有所讓也勞而不敢求息者將有所代也尊長也所以代夫子之讓乎父弟之讓乎兄子之代乎父弟之代乎兄此二行者皆反於性而悖於情也違悖然而孝子之道禮義之文理也故順情性則不辭讓矣辭讓則悖於情性矣用此觀之然則人之性惡明矣其善者僞也問者曰人之性惡則禮義惡生生惡音烏禮義何從而應之曰凡禮義者是生於聖人之僞非故生於人之性也矯僞抑制非本生於人性也故猶本也言禮義生於聖人故陶人埏埴而爲器也擊黏土而成器埏音羶陶人瓦工也埏擊也埴黏土然則器生於工人之僞非故生於人之性也自是生言陶器爲之也或曰工人當爲陶人故猶本也於工人學而爲之非本生於人性自能故工人斵木而成器然則器生於工人之僞非故生於人之性也聖人積思慮習僞故以生禮義而起法度然則禮義法度者是生於聖人之僞非故生於人之性也之如陶人工人然也自是聖人矯人性而爲若夫目好色耳好聲口好味心好利骨體膚理好愉佚是皆生於人之情性者也膚文理膚理皮苦則皮膚枯槁也也佚與逸同人勞感而自然不待事而後生之者也待學而知也受性自爾不夫感而不能然必且待事而後然者謂之生於僞是性僞之所生其不同之徴也驗徴故聖人化性而起僞本性而興起矯言聖人能變化也僞僞起於信而生禮義子亦云仁相僞也義相虧老子曰智惠出有大僞莊其本性也也皆言非禮義生而制法度然則禮義法度者是聖人之所生也故聖人之所以同於衆其不異於衆者性也所以異而過衆者僞也在能起僞聖人過衆夫好利而欲得者此人之情性也假之人有弟兄資財而分者且順情性好利而欲得若是則兄弟相怫奪矣違怫而西謂之拂今之農器連枷也且發辭也戾也或曰拂字從木旁弗擊也方言云自關且化禮義之文理若是則讓乎國人矣故順情性則弟兄爭矣化禮義則讓乎國人矣凡人之欲爲善者爲性惡也以欲爲善也爲其性惡所夫薄願厚惡願美狹願廣貧願富賤願貴苟無之中者必求於外故富而不願財貴而不願埶苟有之中者必不及於外不及財勢於外也旣有富貴於中故用此觀之人之欲爲善者爲性惡也外亦猶貧願富無於中故求於比之今人之性固無禮義故彊學而求有之也性不知禮義故思慮而求知之也然則生而已則人無禮義不知禮義不矯僞者性而已謂人無禮義則亂不知禮義則悖然則生而已則悖亂在已用此觀之人性惡明矣其善者僞也已以此知其性惡也不矯而爲之則悖亂在孟子曰人之性善曰是不然凡古今天下之所謂善者正理平治也所謂惡者偏險悖亂也是善惡之分也已二者分扶問反善惡之分在此今誠以人之性固正理平治邪則有惡用聖王惡用禮義矣哉惡音烏也有讀爲又雖有聖王禮義將曷加於正理平治也哉今不然人之性惡者爲人之性惡也今以性善爲不然故古者聖人以人之性惡以爲偏險而不正悖亂而不治故爲之立君上之埶以臨之明禮義以化之起法正以治之重刑罰以禁之使天下皆出於治合於善也是聖王之治而禮義之化也今當試去君上之埶無禮義之化去法正之治無刑罰之禁􅀝而觀天下民人之相與也偏倚猶傍觀也倚任也或曰􅀝若是則夫彊者害弱而奪之衆者暴寡而譁之譁之不使得發言也衆者陵暴於寡而諠天下之悖亂而相亡不待頃矣爲須須􅁷也頃少頃也本或用此觀之然則人之性惡明矣其善者僞也故善言古者必有節於今善言天者必有徴於人徵驗節準凡論者貴其有辨合其符驗也周辨别符以竹爲之亦相合之物言論議如别之合如符之驗然可禮小宰聽稱責以傅别鄭司農云别之爲兩兩家各執其一也施行故坐而言之起而可設張而可施行今孟子曰人之性善無辨合符驗坐而言之起而不可設張而不可施行豈不過甚矣哉故性善則去聖王息禮義矣假聖王禮性善則不也義性惡則與聖王貴禮義矣故櫽栝之生爲枸木也繩墨之起爲不直也立君上明禮義爲性惡也用此觀之然則人之性惡明矣其善者僞也直木不待櫽栝而直者其性直也枸木必將待櫽栝烝矯然後直者以其性不直也今人之性惡必將待聖王之治禮義之化然後皆出於治合於善也用此觀之然則人之性惡明矣其善者僞也問者曰禮義積僞者是人之性故聖人能生之也自有聖人能生之衆人但不能生耳言禮義雖是積僞所爲亦皆人之天性應之曰是不然夫陶人埏埴而生瓦然則瓦埴豈陶人之性也哉哉亦積僞然後成也豈陶人亦性而能瓦埴工人斵木而生器然則器木豈工人之性也哉夫聖人之於禮義也辟亦陶埏而生之也爲譬辟讀然則禮義積僞者豈人之本性也哉凡人之性者堯舜之與桀跖其性一也君子之與小人其性一也惡也言皆今將以禮義積僞爲人之性邪然則有曷貴堯禹曷貴君子矣哉性異於衆也有讀爲又所以貴堯禹者以其能化凡所貴堯禹君子者能化性能起僞僞起而生禮義然則聖人之於禮義積僞也亦猶陶埏而生之也陶人埏埴而生瓦聖人化性於禮義猶用此觀之然則禮義積僞者豈人之性也哉明非本性也旣類陶埏而生所賤於桀跖小人者從其性順其情安恣睢以出乎貪利爭奪故人之性惡明矣其善者僞也人之本性也桀跖小人是天非私曾騫孝已而外衆人也之太子皆有至孝之行也曽参閔子騫也孝已殷髙宗然而曾騫孝已獨厚於孝之實而全於孝之名者何也以綦於禮義故也極爲禮義故也三人能矯其性天非私齊魯之民而外秦人也然而於父子之義夫婦之别不如齊魯之孝具敬父者何也孝道敬父孝具能具而有文謂夫婦有别也當爲敬文傳冩誤耳敬以秦人之從情性安恣睢慢於禮義故也豈其性異矣哉爲曾閔慢綦禮義則善則曾閔不當與衆人殊齊魯不當與秦人異也禮義則爲秦人明性同於惡唯在所化耳若以爲性塗之人可以爲禹曷謂也引以自難言若性惡何塗道路也舊有此語今可以爲禹也故塗之人皆曰凡禹之所以爲禹者以其爲仁義法正也然則仁義法正有可知可能之理有之人皆然而塗之人也皆有可以知仁義法正之質皆有可以能仁義法正之具然則其可以爲禹明矣今以仁義法正爲固無可知可能之理邪然則唯禹不知仁義法正不能仁義法正也爲雖唯讀將使塗之人固無可以知仁義法正之質而固無可以能仁義法正之具邪然則塗之人也且内不可以知父子之義外不可以知君臣之正不然能之論爲不然也以塗之人無可知可今塗之人者皆内可以知父子之義外可以知君臣之正然則其可以知之質可以能之具其在塗之人明矣今使塗之人者以其可以知之質可以能之具本夫仁義之可知之理可能之具然則其可以爲禹明矣今使塗之人伏術爲學專心一志思索孰察加日縣久積善而不息則通於神明參於天地矣伏膺伏術累日也縣久縣繫以久長於術孰察精孰而察加日故聖人者人之所積而致也人書曰唯狂克念作聖雖性惡若積習則可爲聖曰聖可積而致然而皆不可積何也曰可以而不可使也爲而可以以其性惡不可使爲故小人可以爲君子而不肯爲君子君子可以爲小人而不肯爲小人小人君子者未甞不可以相爲也然而不相爲者可以而不可使也故塗之人可以爲禹然則塗之人能爲禹未必然也雖不能爲禹無害可以爲禹足可以徧行天下然而未甞有能徧行天下者也夫工匠農賈未甞不可以相爲事也業事然則未甞能相爲事也用此觀之然則可以爲未必能也雖不能無害可以爲然則能不能之與可不可其不同逺矣其不可以相爲明矣以相爲工賈可爲也此明禹亦性惡以能積僞爲聖人非禹性本善也聖人異而不能相爲是可與能不同也可與能旣不同則終不可以相化性也於衆者在堯問於舜曰人情何如舜對曰人情甚不美又何問焉妻子具而孝衰於親嗜欲得而信衰於友爵禄盈而忠衰於君人之情乎人之情乎甚不美又何問焉唯賢者爲不然曰性也者與生俱生也情也者接於引此亦以明性之惡韓侍郎作性原以爲情七曰何也曰性之品有上中下三上焉者善而已矣中物而生也性之品有三而其所以爲性五情之品有三而其所仁曰禮曰信曰義曰智曰上焉者之於五也主於一而行於四焉者可道而上下也下焉者惡焉而已矣其所以爲性者五曰之於五也反於一而悖於四性之於情視其品情之品有上中中焉者之於五一也不少有焉則少反焉其於四也混下焉者焉者之於七也動而處其中中焉者之於七也有所甚有所亡下三其所以爲情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上情之於性視其品孟子之言性曰人之性善荀子之言性曰人然而求合其中者也下焉者之於七也亡與甚直情而行者也而進善與始也混而今也善惡皆舉其中而遺其上下者也得之性惡揚子之言性曰人之性善惡混夫始善而進惡與始惡食我之生也叔向之母聞其號也知必滅其宗越椒之生也子其一而失其二者也叔魚之生也其母視之知其必以賄死􅀭也其母無災其始匍匐也則歧歧然嶷嶷然文王之在母也母文以爲大慼知若敖氏之􅀑不食也人之性果善乎后稷之生之均文三之管蔡習非不善也而卒爲姦瞽􅅱之舜鮌之禹習不憂旣生也傅不勤旣學也師不煩人之性果惡乎堯之朱舜舉其中而遺其上下者也得其一而失其二者也曰然則性之非不惡也而卒爲聖人之性善惡果混乎故曰三子之言性也寡罪是故上者可學而下者可制也其品則孔子謂不移也曰上下者其終不可移乎曰上之性就學而愈明下之性畏威而佛而言也雜老佛而言之也者奚言而不異今之言性者異於此何也曰今之言者雜老有聖人之知者有士君子之知者有小人之知者有役夫之知者多言則文而類終日議其所以言之千舉萬變其統類一也是聖人之知也議其所以然其言千舉萬變終始條貫如一是聖文謂言不鄙陋也類謂其統類不乖謬也雖終日知也人之少言則徑而省論而法若佚之以繩是士君子之知也有法不放縱也論或爲倫佚猶引也佚徑易也省謂辭寡論而法謂論議皆多言君子止恭其所守故曰少言也以繩言其直也聖人經營事廣故曰其言也諂其行也悖其舉事多悔是小人之知也言行相違也言諂行悖謂齊給便敏而無類雜能旁魄而母用給謂應齊疾也多異術也旁魄廣博也毋用不應於用便匹延反魄音薄之速如供給者也便謂輕巧敏速也無類首尾乖戾雜能析速粹孰而不急謂發辭捷速粹孰所著論甚精析謂析辭若堅白之論者也速不急於用也孰也不急亦不恤是非不論曲直以期勝人爲意是役夫之知也勞苦爭勝而不知禮義故曰役期於必勝人惠施之論也徒自知也夫之有上勇者有中勇者有下勇者天下有中敢直其身謂中立而不􅀝無回邪也中謂中道敢果决也直其身先王有道敢行其意疑也言不上不循於亂世之君下不俗於亂世之民謂從其俗也循順從也俗仁之所在無貧窮仁之所亡無富貴記曰不祈多積多文唯仁所在爲富貴禮富也以爲天下知之則欲與天下同苦樂之則與天得權位苦或爲共也下之人同休戚天下不知之則傀然獨立天地之間而不畏是上勇也曰傀與塊同獨居之貌也傀傀偉大貌也公回反或禮恭而意儉大齊信焉而輕貨財謂釐齊於信大重也齊信也賢者敢推而尚之不肖者敢援而廢之是中勇也牽引也尚上也援輕身而重貨恬禍而廣解觧􅀃言以辭勝人也解佳買反恬安也謂安於禍難也而廣自苟免不恤是非然不然之情以期勝人爲意是下勇也繁弱鉅黍古之良弓也父之繁弱鉅與拒同黍當繁弱封父之弓左傳曰封來司馬貞云言弓弩埶勁足以拒於來敵也爲來史記蘇秦􅀃韓王曰谿子少府時力距然而不得排㯳則不能自正之器㯳巨京反排㯳轉正弓弩􅁊公之葱大公之闕文王之録莊君之曶闔閭之干將莫邪鉅闕辟閭此皆古之良劒也齊􅁊公齊葱闕録曶三劒以色爲名曹植七啓􅀃劒云雕以翠緑亦其類也曶劒光太公周文王楚莊王之劒名皆未詳所出葱青色也録與緑同因以爲名鉅闕亦是也干將莫邪巨闕皆呉王闔閭劒名辟閭采慌忽難視以形爲名也闕未詳或曰闕缺也劒至利則喜缺辟閭即湛盧也閭盧聲相近盧黑色也湛盧言湛然如水而黒未詳新序閭丘卬謂齊宣王曰辟閭巨闕天下之良劒也或曰也言神劒柔可卷而懷之舒則可用辟閭或此義歟也又張景陽七發􅀃劒曰舒辟不常李善云辟卷然而不加砥厲則不能利不得人力則不能斷驊騮騹􅂹纎離緑耳此皆古之良馬也騹讀爲騏謂青皆周穆王八駿名此不同纎離即列子盗驪也驪文如博棊列子作赤􅂹與然而前必有銜轡之制後有鞭䇿之威加之以造父之馭然後一日而致千里也夫人雖有性質美而心辨知必將求賢師而事之擇賢友而友之得賢師而事之則所聞者堯舜禹湯之道也得良友而友之則所見者忠信敬讓之行也身日進於仁義而不自知也者靡使然也順從也靡謂相磨切也或曰靡今與不善人處則所聞者欺誣詐僞也所見者汙漫淫邪貪利之行也也漫誕汙穢行曰舜以其辱行漫我也漫欺誑也莊子北人無擇身且加於刑戮而不自知者靡使然也傳曰不知其子視其友不知其君視其左右靡而已矣靡而已矣君子篇第二十四君之事即君子當爲天子恐傳寫誤也凡篇名多用初發之語名之此篇皆論人天子無妻告人無匹也尊無與二故無匹也告言也妻者齊也天子四海之内無客禮告無適也曰天子無客禮適讀爲敵禮記自阼階不敢有其室也莫敢主焉君適其臣升足能行待相者然後進口能言待官人然後詔舌之官也官人掌喉不視而見不聽而聦不言而信不慮而知不動而功告至備也故能至備也盡委於羣下天子也者埶至重形至佚心至愈爲愉愈讀志無所詘形無所勞尊無上矣詩曰普天之下莫非王土率土之濵莫非王臣此之謂也率循也濵涯也詩小雅北山之篇聖王在上分義行乎下則士大夫無流淫之行百吏官人無怠慢之事衆庶百姓無姦怪之俗無盜賊之罪莫敢犯大上之禁太上至大讀爲號尊之天下曉然皆知夫盜竊之人不可以爲富也皆知夫賊害之人不可以爲壽也皆知夫上之禁不可以爲安也由其道則人得其所好焉不由其道則必遇其所惡焉政令道謂是故刑罪綦省而威行如流治世曉然皆知夫爲姦則雖隱竄逃亡之由不足以免也莫不服罪而請刑戮自請書曰凡人自得罪此之謂也自得其言人人義不同或斷章取義歟罪不敢隱也與今康誥故刑當罪則威不當罪則侮爵當賢則貴不當賢則賤下所侮賤不當則爲古者刑不過罪爵不踰德故殺其父而臣其子殺其兄而臣其弟至公也謂若殛鮌興言當罪而用賢歸於康叔之比者禹殺管叔封刑罰不怒罪爵賞不踰德分然各以其誠通皆得通達無屈滯善惡分然其忠誠是以爲善者勸爲不善者沮刑罰綦省而威行如流政令致明而化易如神傳曰一人有慶兆人賴之此之謂也刑之辭尚書甫亂世則不然刑罰怒罪爵賞踰德以族論罪以世舉賢誓太亦云尹氏卒曷爲貶譏世卿也所謂罪人以族官人以世公羊故一人有罪而三族皆夷德雖如舜不免刑均是以族論罪也均同也謂同被其刑也三族父母妻族也夷滅也先祖當賢後子孫必顯行雖如桀紂列從必尊此以世舉賢也從謂行列相從當或爲甞也當賢謂身當賢人之號也列以族論罪以世舉賢雖欲無亂得乎哉詩曰百川沸騰山冢崒崩髙岸爲谷深谷爲陵哀今之人胡􅉃莫懲此之謂也云沸出也騰乘也山頂曰詩小雅十月之交之篇毛也懲止也變異如此禍亂方至哀哉今在位之人何曾冢崒者崔嵬髙岸爲谷深谷爲陵言易位也鄭云慘曾德止無以道論法聖王則知所貴矣效聖王論議法以義制事則知所利矣則利博以義制事論知所貴則知所養矣事知所利則動知所出矣所出謂所從養謂自奉養也二者是非之本而得失之原也故成王之於周公也無所徃而不聽知所貴也􅁊公之於管仲也國事無所徃而不用知所利也呉有伍子胥而不能用國至乎亡倍道失賢也故尊聖者王貴賢者霸敬賢者存慢賢者亡古今一也故尚賢使能等貴賤分親䟽序長幼此先王之道也故尚賢使能則主尊下安貴賤有等則令行而不流其分故無違令流邪移也各知親䟽有分則施行而不悖親故不乖悖施式豉反分扶問反施謂恩惠親䟽有分則恩惠各親其長幼有序則事業捷成而有所休業速成而亦有所休息之時捷速也長幼各任其力故事也故仁者仁此者也貴賤分親䟽序長幼五者也愛仁謂愛􅀃也此謂尚賢使能等則爲仁也􅀃此五者義者分此者也合宜則爲義也分别此五者使節者死生此者也生則爲名節也能爲此五者死忠者惇慎此者也讀慎此五者則爲忠也如順人臣能厚順兼此而能之備矣而能之則爲德兼此仁義忠節也備備而不矜一自善也謂之聖不矜伐於人皆一皆也徳備而如也聖人包容萬物與天地同功何所矜伐爲也所以自善則謂之聖人夫衆人之心有一善則􅀭􅀭不矜矣夫故天下不與爭能而致善用其功矜不善用於衆功矜則有敵故不尊也而推衆力故天下不敢爭能而極有而不有也夫故爲天下貴矣不自有有能而詩曰淑人君子其儀不忒其儀不忒正是四國此之謂也尸鳩之詩曹風正身任物則四國皆化恃才矜能則所得者小也篇言善人君子其儀不忒故能正四方之國以喻荀子卷第十七
