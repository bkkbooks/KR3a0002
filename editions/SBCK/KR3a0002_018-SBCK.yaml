  text: 荀子卷第十八
  hash: sha256:d49461d62df5e6b013d2524652e65852bf911599ed34ebbe9fb405223cb800b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0002_SBCK_018-1a}
body:
  text: 登仕郎守大理評事􅀭倞注成相篇第二十五事以自見其意故下云託於成相以初發語名篇雜論君臣治亂之之流也或曰成功在相故作成相三章也以喻意漢書藝文志謂之成相雜辭蓋亦賦請成相相之辭請言成世之殃愚闇愚闇墮賢艮重墮賢良也墮許䂓反世之殃由於愚此愚闇以人主無賢如瞽無相何倀倀息亮反倀丑羊反倀倀無所往貌相請布基愼聖人請􅀃陳布愼讀爲順順聖人也基業在乎愚而自專事不治主忌苟勝羣臣莫諫必逢災苟欲勝人也主旣猜忌又論臣過反其施人臣言論施惠施式豉反之過在乎不行尊主安國尚賢義拒諫飾非愚而上同國必禍諫飾非以愚闇之性苟合於上則所以尊主安國在崇尚賢義若拒也必禍曷謂罷國多私疲謂弱不任事者也所以弱假設問荅以明其意罷讀曰韋昭曰罷病也無行曰病者由於多私國語罷士無伍比周還主黨與施繞還逺賢近讒忠臣蔽塞主勢移曷謂賢明君臣道則爲賢明君臣之上能尊主愛下民主誠聽之天下爲一海内賔主之孽讒人達賢能遁逃國乃蹷顚覆也孽災也蹷愚以重愚闇以重闇成爲桀遂至於桀也久而愚闇愈甚世之災妬賢能飛廉知政任惡來有力飛廉善走父子俱以材力事紂也惡來飛廉之子秦之先也史記曰惡來卑其志意大其園囿髙其臺榭逺慮不慕往古卑其志意言無武王怒師牧野紂卒易郷啓乃下攻于後啓微子名下降易郷回也謂前徒倒戈爲向也郷讀武王善之封於宋立其祖不絶也左傳曰立其祖使祭祀帝乙宋祖世之衰讒人歸比干見刳箕子累為縲累讀子之囚書曰釋箕武王誅之吕尚招麾殷民懐揮也招麾指世之禍惡賢士子胥見殺百里徙夫伍貟字子胥吳大遷也謀不見用虞滅係虜遷徙於秦也爲夫差所殺百里奚虞公之臣徙穆公得之強配五伯六卿施子之制春秋時大國亦僭置六卿六卿穆公秦穆公任好也伯讀曰霸六卿天六卿也施言施世之愚惡大儒逆斥不通孔子拘拒逆拘謂畏匡戹陳也斥逐大儒不使通展禽三絀春申道綴基畢輸下三絀謂爲士師三見絀也春申楚相黄歇封爲春展禽魯大夫無駭之後名獲字子禽謚曰惠居於栁李園所殺其儒術政治道德基業盡傾覆委地也申君綴止也與輟同畢盡也輸傾委也言春申爲請牧基賢者思治牧堯在萬世如見之讒人罔極險陂傾側此之疑此讒人傾險也陂與詖同言當疑基必施辨賢罷疲也罷讀曰文武之道同伏戲王伏戲古帝王文武周文王武書契者戲與羲同太昊氏始畫八卦造由之者治不由者亂何疑爲凡成相辨法方至治之極復後王時之王後王當隨時設敎不必拘於古法言欲爲至治在歸復後王謂愼墨季惠百家之􅀃誠不詳莫爲者也又曰季子聞而笑之據此則是愼到墨翟惠施或曰季即莊子曰季眞之季梁楊朱之友言四子及百家好異􅀃故不用心詳明之梁惠王犀首惠施同時人也韓侍郎云或曰季梁也列子曰爲祥詳或治復一脩之􅁻君子執之心如結固不言堅也解衆人貳之讒夫棄之形是詰復一讒夫則衆人則不能形當爲刑無德化唯刑戮是詰言苛暴也兼棄之但詰問治之形狀言侮嫚也或曰水至平端不傾心術如此象聖人平如水聖人心而有埶直而用抴必參天度已以繩接人用抴功業必參天也而有勢之上疑脱一字言旣得權勢則世無王窮賢良賢良窮困無王者興暴人芻豢仁人糟糠禮樂滅息聖人隱伏墨術行治之經禮與刑君子以修百姓寧明德愼罰國家旣治四海平治之志後埶富者則公道行而貨賂息爲治之意後權埶與富也君子誠之好以待意好以待用君子必誠此處之敦固有深藏之能逺思之厚固又能深藏逺慮敦厚也有讀爲又旣處思乃精志之榮好而壹之神以成通於神明也好而不二則精神相反一而不貳爲聖人覆不離散相反謂反治之道美不老爲治當日新其美無休息老休息也莊子曰佚我以老君子由之佼以好也音絞佼亦好下以敎誨子弟上以事祖考以仁接下孝也事親以成相竭辭不蹷篇無顚蹷之辭蹷音厥竭盡也論成相之事雖終君子道之順以達子言之必􅀪順而通達道言􅀃也辭旣不蹷君宗其賢良辨其殃孽良致治辨其殃孽爲之害也君子尋成相之辭必能宗其賢請成相道聖王未盡故再論之也道亦言􅀃前章意堯舜尚賢身辭讓許由善卷重義輕利行顯明堯讓天莊子曰下也遂不受舜讓天下於善卷善卷不受遂入深山不知下於許由許由曰予適有幽憂之病方且治之未暇治天也其處堯讓賢以爲民所以不私其子爲萬民求明君氾利兼愛德施均辨治上下貴賤有等明君臣堯授能舜遇時尚賢推德天下治雖有賢聖適不遇世孰知之自歎蓋以堯不德舜不辭歸皆公至妻以二女任以事大人哉舜南面而立萬物備無爲而理委任羣下舜授禹以天下亦以天下之舜所以授禹也故尚得推賢不失序爲德得當外不避仇内不阿親賢者予私其子子讀爲與謂殛鯀興禹又不禹勞心力堯有德干戈不用三苗服舉舜甽畒任之天下身休息畎同甽與得后稷五榖殖夔爲樂正鳥獸服笙鏞以間鳥獸蹌蹌也謂擊石拊石百獸率舞契爲司徒民知孝弟尊有德禹有功抑下鴻使歸下也鴻即洪抑遏也下謂治水降水警予也水也書曰禹辟除民害逐共工于幽此云禹未詳今尚書舜流共工北決九河通十二渚䟽三江淮渭洛七水又有濰按禹貢導弱黒漾沇止於十二此云十二渚未詳其􅀃也淄其道伊洛􅗉澗旣入于河數則不禹溥土平天下溢禹分布治九州之土也溥讀爲敷孔安國云洪水泛躬親爲民行勞苦所行之事也行讀如字謂得益皐陶横革直成爲輔直木横革而不順理者革之直者成之也聞韓侍郎云此論益皐陶之功横契􅀇王生昭明曰詩契爲堯司徒封於商賜姓子氏契卒子昭明立也天命􅀇鳥降而生商又曰􅀇王􅁊撥皆謂契也史記居於砥石遷于商傳曰閼伯居商丘相土因之相土昭明子砥石地名未詳所在或曰即砥柱也左氏孫相土乃遷商丘也也言契初居砥石至十有四世乃有天乙是成湯昌若立昌若卒子曹圉立曹圉卒子㝠立爲夏司空史記曰契卒子昭明立昭明卒子相土立相土卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬勤其官死於水殷人郊之冥卒子振立振卒子微立微卒子卒子乙立是十四世也立主壬卒子主癸立主癸天乙湯論舉當身讓卞隋舉牟光不受皆投水死牟與務同也莊子湯讓天下於卞隋務光二人道古賢聖基必張基業必張大也道􅀃古之賢聖願陳辭世亂惡善不此治亂惡善之弊不知治此世隱諱疾賢良由姦詐鮮無災長用詐少無災也隱諱過惡病害賢良患難哉阪爲先聖先聖之所爲阪與反同反知不用愚者謀前車已覆後未知更何覺時更何有覺悟之時也前車已覆猶不知戒不覺悟不知苦迷惑失指易上下忠不上達蒙揜耳目塞門户四門也不能闢門户塞大迷惑悖亂昏莫不終極終極無己時也莫冥莫言闇也不是非反易比周欺上惡正直反下同惡烏路正是惡心無度邪枉辟回夫道途爲僻辟讀已無郵人我獨自美豈獨無故已亦有事而不知其過也或曰下無獨字故事也不可尤責於人自美其身已豈無事不知戒後必有恨悔恨後遂過不肯悔前之非不肯悔讒夫多進反覆言語生詐態人之態不如備詐態上不知爲備如當爲知言人爲爭寵嫉賢利惡忌忌賢者利在惡妬功毁賢下斂黨與上蔽匿與則上蔽匿也斂聚也下聚黨上壅蔽失輔埶則埶不在上失輔弼之臣任用讒夫不能制孰公長父之難曰厲王染於公長父榮夷終公與孰公孰公長父皆厲王之嬖臣未詳其姓名墨子即詩所云皇父也孰或爲郭不同未知孰是或曰孰公長父厲王流于彘河東左傳彘地名在邪遂使難作厲王流竄於彘晉大夫有彘子言孰公長父姦周幽厲所以敗不聽䂓諫忠是害嗟我何人獨不遇時當亂世獨我哉自慰勉之辭也言自古忠良多有遇害何欲衷對言不從誠意以對衷誠也欲從而遇禍也時君恐言不恐爲子胥身離凶進諫不聽剄而獨鹿棄之江差賜子胥之劎名屬之欲反鏤力朱反獨鹿與屬鏤同本亦或作屬鏤吳王夫是自剄之後盛以罜䍡棄之江也賈逵云罣䍡小罟也國語里革曰鳥獸成水蟲孕於是乎禁罝罣䍡此當觀往事以自戒治亂是非亦可識託於成相以喻意讀爲志也識如字亦請成相言治方之方術言爲治君論有五約以明君謹守之下皆平正國乃昌簡約明白謂臣下職論爲君之道有五甚有節四也上通利至莫敢恣五也一也君法明二也刑稱陳三也言臣下職莫游食食游素飡游手也謂不勤於事務本節用財無極事業聽上莫得相使一民力役使則民力一也禮記曰用民之力所興事業皆聽於上羣下不得擅相三日也歲不過守其職足衣食衣食足矣民不失職則厚薄有等明爵服有别貴賤利往卬上莫得擅與孰私得之利人乎擅相賜與若齊田氏然卬與仰同宜亮反所往皆卬於上莫得擅爲賜與則誰敢私得於君法明論有常論有常不二三也君法所以明在言表儀旣設民知方進退有律莫得貴賤孰私王賤各以其才孰有私佞進人退人皆以法律貴乎於王君法儀禁不爲自禁止不爲惡爲君之法儀在莫不􅀃敎名不移而名器不移也􅀃讀爲恱旣能正己則民皆恱上之敎修之者榮離之者辱孰它師歸王道不敢離貳也孰敢以它爲師言皆刑稱陳守其銀守其分限稱尺證反銀與垠同稱謂當罪當罪之法施陳則各下不得用輕私門不下則私門自輕得專用刑法罪禍有律莫得輕重威不分罪也禍亦請牧祺明有基事在明其所有之基業祺吉也請牧治􅁻祥之主好論議必善謀五聽循領莫不理續主執持折獄五聽文理相續主自執持此道不使權歸於下之五聽也循領謂修之使得綱領莫不有聽之經明其請之經在明其情請當爲情聽獄參伍明謹施賞刑雜也謂或參伍猶錯其賞刑言精研不使僭濫也往參之或往伍之皆使明謹施顯者必得隱者復顯民反誠民不詐僞也幽隱皆通則言有節稽其實使民言有法節謂法度欲稽考行實也及不欺誑在信誕以分賞罰必下不欺上皆以情言明若日上通利隱逺至幽隱遐逺者皆至上通利不壅蔽則也觀法不法見不視則雖見不視也所觀之法非法耳目旣顯吏敬法令莫敢恣有五之事也此已上君論君敎出行有律所行有法言知方也五論之敎旣出則民吏謹將之無鈹滑無將大車鈹將持也詩曰言不使紛披汨也與披同滑與汨同下不私請各以冝舎巧拙謁請也如此則以道事君巧拙之事亦皆止舎止也羣下不私謁各以所宜不苟求臣謹修君制變君職在制變臣職在謹修公察善思論不亂以治天下後世法之成律貫爲條貫也律貫法之賦篇第二十六特明之或曰荀卿所賦甚多今存者唯所賦之事皆生人所切而時多不知故也此言爰有大物大者莫過於禮故謂之大物也爰於也言於此有大物天人之非絲非帛文理成章文章禮亦然也絲帛能成黼黻非日非月爲天下明生者以壽死者以葬城郭以固三軍以强粹而王駁而伯無一焉而亡臣愚不識敢請之王問於先王云臣但見其功亦不識其名唯先王言禮之功用甚大時人莫知故荀卿假爲隱語因重演其義而告之能知敢請辭之先王王曰此夫文而不采者與王先飾而不至華采者歟爲解禮意曰此乃有文簡然易知而致有理者歟君子所敬而小人所不者與性不得則若禽獸性得之則甚雅似者歟古人詩曰維其有雅正也似謂似續似之之是以匹夫隆之則爲聖人諸侯隆之則一四海者歟致明而約甚順而體請歸之禮易行也先王言唯歸於禮乃合此義也極明而簡約言易知也甚順而有體言禮皇天隆物以示下民物萬物也隆猶備也或厚或薄帝不齊均或寡薄天帝亦不能齊均也言人雖同見方所知或多厚桀紂以亂湯武以賢惽惽淑淑皇皇穆穆也淑淑未詳或惽惽思慮昬亂之美也言或愚或智也曰美也皇皇穆穆言緒周流四海曾不崇日也言崇充充滿一日而遍也智周流四海曽不君子以脩跖以穿室之弟太山跖柳下惠智以穿室皆帝不齊均之意也之盗也君子用智以脩身跖用大參于天精微而無形小則精微無形也言智慮大則參天行義以正事業以成智也皆在孟反行下可以禁暴足窮百姓待之而後寧泰之智而後安寧泰當爲泰寧也足窮謂使窮者足也百姓待君上臣愚而不識願問其名曰此夫安寛平而危險隘者邪常欲言智逺害就利修㓗之爲親而雜汙之爲狄者邪修智與夷狄無異言險詐難近也㓗則可相親若雜亂穢汙則甚深藏而外勝敵者邪法禹舜而能弇迹者邪襲弇行爲動靜待之而後適者邪血氣之精也志意之榮也靈精華榮百姓待之而後寧也天下待之而後平也明達純粹而無疵也夫是之謂君子之知論此人之智不然也君子之智明小知有物於此居則周靜致下動則綦髙以鉅時周密也鉅大也居謂雲物發在地貟者中規方者中矩之貟方也言滿天地大參天地德厚堯禹成萬物其德厚於堯禹者矣參謂天地相似雲所以致雨生精微乎毫毛而盈大乎㝢宙時則如毫毛其廣大㝢與宇同言細微之爲宇上大參天地此又云盈大宇宙言􅀃雲之變化或大則盈大於宇宙之内宇覆也謂天所覆三蒼云四方上下言之也或小故重忽兮其極之逺也攭兮其相逐而反也而逺舉或分散相逐而還於山攭音戾攭與劙同攭兮分判貌言雲或慌忽之極卬卬兮天下之咸蹇也雨則天下皆蹇難也卬卬髙貌雲髙而不德厚而不捐五采備而成文覆被之皆無捐棄矣捐棄也萬物或美或惡往來惽憊通于大神不測也憊困也人困目亦昬暗故惽憊猶晦暝也通于大神言變化晦暝也惽憊爲出入甚極莫知其門門謂所出也極讀爲亟急也天下失之則滅得之則存成雨也雲所以弟子不敏此之願陳君子設辭請測意之子不敏願陳此事不弟子荀卿自謂言弟言雲之功德唯君子乃明知之也知何名欲君子設辭請測其意亦曰此夫大而不塞者歟故曰不塞雲氣無實充盈大宇而不窕入郄穴而不偪者歟反則入郄穴而曽無偪側不容也窱土吊窕讀爲窱深貌也言充盈則滿大宇幽深反行逺疾速而不可託訙者與疾速宜於託訙訙書問也行逺續同也言雲行逺疾速不可依託繼續也今雲者虛無故不可本或作託訓或曰與似往來惽憊而不可爲固塞者歟若使牢固蔽塞則不可雖往來晦冥掩蔽萬物暴至殺傷而不億忌者歟億則屢中或曰與抑同億謂以意度之論語曰億度疑忌而果決不測也􅊨謂雷霆震怒殺傷萬物曽不功被天下而不私置者歟所私置又言無偏頗天下同被其功曾無託地而游宇友風而子雨雨因雲而生故曰子風與雲並行故曰友冬日作寒夏日作暑而凝在冬蒸暑也寒在夏而廣大精神請歸之雲化唯雲乃可當此至精至神通於變也􅀃雲之知放於此則明也雲所以潤萬物人莫有物於此㒩㒩兮其狀屢化如神蟲倮之倮㒩讀如其謂三俯三起蛾蛹之類也㒩㒩無毛羽之貌變化即功被天下爲萬世文飾文禮樂以成貴賤以分養老長㓜待之而後存名號不美與暴爲鄰食故曰與暴爲鄰也侵暴者亦取名於􅅙功立而身廢事成而家敗絲窮而􅅙盡是家敗􅅙成而見殺是身廢棄其耆老收其後世後世種也耆老蛾也人屬所利飛鳥所害飛鳥則害而食之人屬則保而用之臣愚而不識請占之五帝皆務本深知蠶之功大故請驗之也占驗也五帝少昊顓頊髙辛唐虞理帝占之曰此夫身女好而頭馬首者與周禮馬質禁原蠶者鄭􅀇云女好柔婉也其頭又類馬首值大火則浴其種是蠶與馬同氣也天文辰爲馬故蠶書曰蠶爲龍精月屢化而不壽者與其壽命不得終善壯而拙老者與老而見殺壯得其養有父母而無牝牡者與有牝牡也爲蠶之時未冬伏而夏游食桑而吐絲而出也游謂化前亂而後治絲治也繭亂而夏生而而惡暑先暑而化生長於夏喜溼而惡雨生之後則惡雨溼謂浴其種旣蛹以爲母蛾以爲父之也㸦言三俯三起事乃大已之後事乃畢也謂化而成􅅙也俯謂卧而不食事乃大已言三起夫是之謂蠶理帝五之義理也言此乃蠶蠶休其蠶織戰國時此俗尤甚故荀卿感而賦之蠶之功至大時人鮮知其本詩曰婦無公事有物於此生於山阜處於室堂所生也山阜鐵無知無巧善治衣裳爲智知讀不盜不竊穿窬而行日夜合離以成文章章亦待其連綴而成也合離謂使離者相合文以能合從又善連衡能如戰國合從連衡之人南北從竪也子容反衡撗也言箴亦爲衡也爲從東西下覆百姓上飾帝王功業甚愽不見賢良其功伐見賢遍反見猶顯也不自顯時用則存不用則亡行藏順時臣愚不識敢請之王王曰此夫始生鉅其成功小者邪爲箴則小爲鐵則巨長其尾而銳其剽者邪實而無乎處者宇也有長而無本剽者宙也剽長其尾謂線也剽末也謂箴之鋒也莊子曰有意匹小反者眇末之頭銛達而尾趙繚者邪而銳其剽趙重􅀃長其尾地易位四時易郷夏秋冬皆不當其方言錯亂也皆言賢愚易位也郷猶方也春字郷如列星隕墜旦暮晦盲者隕墜以喻百官㢮廢列星二十八宿有行列當時星辰隕墜旦暮昏霧也旦暮晦盲言無蹔明時也或曰幽晦登昭日月下藏明如日月反下藏也昭或爲照言幽闇之人登昭明之位君子公正無私反見從撗謂從撗反覆之志也言公正無私之人反見志愛公利重樓䟽堂上位欲在重樓䟽堂之榮貴也行至公以利百姓非謂無私罪人憼革二兵儆同憼與邪嫉惡乃以儆備増益兵革之道言強盛也備也二副也謂無私罪人言果於去惡也言去道德純備讒口將將或曰將將讀爲蹡蹡進貌將去也言以讒言相退送仁人絀約敖暴擅強窮約絀退天下幽險恐失世英暗凶險天下幽賢不見用也如此必恐時螭龍爲蝘蜓鴟梟爲鳳皇如龍而黄說文云螭龍之聖反謂之蝘蜓鴟梟之惡反以爲鳳皇也北方謂之蛇螻蝘蜓守宫言世俗不知善惡螭比干見刳孔子拘匡昭昭乎其知之明也郁郁乎其遇時之不祥也拂乎其欲禮義之大行也闇乎天下之晦盲也此蓋誤耳當爲拂乎其郁郁有文章貌拂違也義之大行晦盲言人莫之識也遇時之不詳也郁郁乎其欲禮皓天不復憂無疆也千歲必反古之常也也呼昊天而許之云世亂皓與昊同昊天元氣昊大必反於治亦古之常道千或爲卒不復憂不可竟也復自解釋云亂久弟子勉學天不忘也爲善無益而解墯故以此勉之也言天道福善故曰不忘恐弟子疑聖人共手時幾將矣也將送也去也言戰國之時世事已去共讀爲拱聖人拱手言不得用也幾辭治也不可復與愚以疑願聞反辭辭猶楚詞亂曰弟反辭反復叙􅀃之之人故更願以亂辭叙之也子言當時政事旣與愚反疑惑其小歌也即其反辭此下一章揔論前意也故謂之小歌念彼逺方何其塞矣大道也逺方猶仁人絀約暴人􅄛矣也􅄛饒忠臣危殆讒人服矣般矣般樂也音盤服用也本或作讒人琁玉瑤珠不知佩也國曰瑤美石言不知以此四寶說文云琁赤玉瑤美玉也孔安琁音瓊爲佩􅀃文雜布與錦不知異也麤布雜布閭娵子奢莫之媒也娵爲醜惡蓋一名明陬漢書音義韋昭曰閭閭娵古之美女後語作明娵楚詞七諫謂閭都蓋都字誤爲奢耳後語作子都莫之媒言無人爲之謀也陬梁王魏瞿之美女字奢當爲子都鄭之美人詩曰不見子于反娵子嫫母刁父是之喜也刁父未詳喜恱也嫫母醜女黄帝時也以盲爲明以聾爲聦以危爲安以吉爲凶嗚呼上天曷維其同同言何可與之同也後語作曷其與言惑亂如此故歎而告上天曷維其申君之賦也同此章即遺春荀子卷第十八
