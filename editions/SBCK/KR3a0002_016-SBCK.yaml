body:
  text: 登仕郎守大理平事􅀭倞注正名篇第二十二以是爲非故作正名篇尹文子曰是時公孫龍惠施之徒亂名改作事物無所隱其理矣名有三科一曰命物之名方圓白黒形以定名名以定事事以驗名察其所以然則形名之與也三曰況謂之名賢愚愛憎是也是也二曰毁譽之名善惡貴賤是後王之成名名謂舊名可法効者也後之王者有素定成就之刑名從商爵名從周文名從禮殷罰有倫是亦言殷刑商之刑法未聞康誥曰十官也文謂節文威儀禮即周之儀禮也之允當也爵名從周謂五等諸侯及三百六散名之加於萬物者則從諸夏之成俗曲期方言也期成俗舊俗期㑹物之名者也㑹也曲期謂委曲逺方異俗之郷則因之而爲通所名遂以爲通而不改作也逺方異俗名之乖異者則因其散名之在人者散在人者舉名之分生之所以然者謂之性必然之理是所人生善惡固有之性也受作天性之和所生精合感應不事而自然謂之性生精合感應不使而自然言其天性如此也精和隂陽沖和氣也事任使也言人之性和氣所合也感應謂外物感心而來應也合謂若耳目之精靈與見聞之物性之好惡喜怒哀樂謂之情爲此六者謂之情人性感物之後分情然而心爲之擇謂之慮否而行謂之慮也情雖無極心擇可心慮而能爲之動謂之僞行之則爲矯拂其本性也僞矯也心有選擇能動而慮積焉能習焉而後成謂之僞學然後能矯其本性也心雖能動亦在積久習正利而爲謂之事事業謂商農工賈者也爲正道之事利則謂之正義而爲謂之行非苟邪行下孟反正義則謂之姦所以知之在人者謂之知知有所合謂之智者知有所合謂所知能合於物也知之在人者謂在人之心有所知智所以能之在人者謂之能者謂之能能才能也智有所能在人之心能有所合謂之能任其事耐乃來乃代二反能當爲耐古字通也耐謂堪性傷謂之病不得其所傷於天性節遇謂之命遇謂之命命者節時也當時所命然也如天所是散名之在人者也是後王之成名也定之名也而或者乃爲堅白之説以是爲非斯亂名之略舉此上事是散名之在人者而後王可因襲成就素也尤故王者之制名名定而實辨道行而志通則慎率民而一焉也禮記曰黄帝正名百物以道謂制名之道志通言可曉不敢以異端改作也明民慎率民而一焉言故析辭擅作名以亂正名使民疑惑人多辨訟則謂之大姦其罪猶爲符節度量之罪也之難約大獄袍衣小獄襦新序曰子産決鄧析教民國大亂民口讙譁子産患之於是討鄧析而僇之民乃服袴民之獻袍衣襦袴者不可勝數以非爲是以是爲非鄭是其類也是非乃定故其民莫敢託爲竒辭以亂正名故其民愨愨則易使易使則公其民莫敢託爲竒辭以亂正名故壹於道法而謹於循令矣如是則其迹長矣不敢亂其名畏服於上迹王者所立之迹也下長丁丈反故迹長也迹長功成治之極也是謹於守名約之功也約要約謹嚴也今聖王没名守慢竒辭起名實亂是非之形不明則雖守法之吏誦數之儒亦皆亂所守偏儒者疑其所習竒辭亂實故法吏迷其若有王者起必將有循於舊名有作於新名善者名之孔子曰必也正名乎循之不善者作之故然則所爲有名與所縁有同異與制名之樞要不可不察也要大要揔縁因也樞目鼻口而制同異又不可常别雖萬物萬殊有時欲之舉其大名也物無名則不可分辨故因而有名也名不可一貫故因耳四足而毛旣爲治在正名則此三者不可不察而知其意也綱故制爲名之樞要謂若謂之禽知其二足而羽謂之獸知其異形離心知其不同也此已下覆明有名之意萬物之形各異則分離人之心言人心交喻異物名實􅀇紐名使物物而交相譬喻之則名實􅀇深隱也紐結也若不爲分别立難知也深隱紛結貴賤不明同異不别如是則志必有不喻之患而事必有困廢之禍故知者爲之分别制名以指實之分界制名所以指明實無名則物雜亂故智者爲也事上以明貴賤下以辨同異貴賤明同異别如是則志無不喻之患事無困廢之禍此所爲有名也意在此有名之然則何縁而以同異異之意也設問覆明同曰縁天官官言各有所司主也縁天官天官耳目鼻口心體也謂之同謂之異則異也言天官謂之同則凡同類同情者其天官之意物也同故比方之疑似而通是所以共其約名以相期也小不同天官意想其同類所以共其同類同情謂若天下之馬雖白黑大而命之各爲制名也省約之名以相期會形體色理以目異也色五色形體形狀色理以目别異之而制名也理文理也言萬物形體聲音淸濁調竽竒聲以耳異類所以導衆樂者也不言革木之屬而言竽者清濁宫徴之屬調竽謂調和笙竽之聲也竽笙之始莊子天籟地籟亦其義也竒竒異也竒聲萬物衆聲或曰竽八音之首故黄帝使泠綸取竹作管是竹爲聲音者也之異甘苦鹹淡辛酸竒味以口異之異者也竒味衆味香臭芬鬱腥臊洒酸竒臭以鼻異之香氣芬花草酸氣也竒臭衆臭之異者氣之應臯者爲臭故香亦謂之也鬱腐臭也周禮曰鳥臕色而沙鳴鬱洒未詳酸暑浥之誤耳禮記曰馬黒脊而班臂漏鄭音螻螻蛄臭者也臭禮記曰皆佩容臭或曰洒當爲漏篆文稍相似因疾養凔熱滑鈹輕重以形體異凔寒也滑與汩同疾痛也養與癢同澁同輕重謂分銖與鈞石也此皆在人形體别異之而立名鈹與被同皆壞亂之名或曰滑如字鈹當爲鈒傳寫誤耳與又楚陵反也凔初亮反說故喜怨哀樂愛惡欲以心異猶律文之故誤也說讀爲脫誤也脫故心有徴知占萬物而知之徴召也言心能徴知則縁耳而知聲可也縁目而知形可也也以縁因形爲之立名心雖有知不因耳目亦不可也心能占知萬物故可以因耳而知聲因目而知然而徴知必將待天官之當簿其類然後可也官天書不雜亂也類謂可聞之物耳之類可見之物目之類言耳目也當主也丁浪反簿簿書也當簿謂如各主當其簿其類然後可也言心亦不能自主之也心雖能占所知必將任使耳目令各主掌五官簿之而不知心徴之而無說則人莫不然謂之不知此所縁而以同異也官能主之而不能知心五官耳目鼻口心也五如此故聖人分别因立同異之名使人曉之也能占而知之若又無説則人皆謂之不知也以其然後隨而命之之此已下覆明制名樞要之意也旣分同異之後然後隨所名而命同則同之異則異之異類則異名同類則同名單足以喻則單單不足以喻則兼喻其物則謂之馬喻其毛色則謂之白馬單物之單名也兼複名也喻曉也謂若止比也黄馬之單與兼無所相避則共雖共不爲害矣之馬雖萬馬同名複名謂之白馬亦然雖共不害於分别謂單名複名有不可相避者則雖共同其名謂若單名謂也知異實者之異名也故使異實者莫不異名也不可亂也不亂也謂若牛與馬爲異實也知謂人心知之異實者異名則猶使異實者莫不同名也故猶使異實者有時而同恐異實異名卒不可徧舉名其不可相亂猶如使同實者莫不同名也一名也或曰異實當爲同實言使異實者異故萬物雖衆有時而欲徧舉之故謂之物物也者大共名也推而共之共則有共至於無共然後止於揔謂之物散爲萬名是異名者本生於則同名者也推比共名之理則有共至於無共言自同至於異也起有時而欲徧舉之故謂之鳥獸鳥獸也者大别名也推而別之別則有別至於無別然後止名者生於欲都舉異名也言此者所以别異名言自異至於同也謂揔其萬名復謂之物是同之意同名名無固宜約之以命約定俗成謂之宜異於約則謂之不宜約之以命謂立其約而命名無故宜言名本無定也人皆謂之天也之若約爲天則名無固實約之以命實約定俗成謂之實名文辭謂若天地日月之比也實名謂以名實各使成言語名有固善徑易而不拂謂之善名謂易曉之名也即謂徑疾平易而不違拂待訓解者拂音佛呼其名遂曉共意不物有同狀而異所者兩馬謂若處之類也同狀各在一有異狀而同所者是一身也蠶蛾之謂若老㓜異狀同是也類亦可别也狀同而爲異所者雖可合謂之二實合同謂之馬其實二也即謂兩馬之類名雖可狀變而實無别而爲異者謂之化有化而無别謂之一實而實不狀雖變鴽之類雖有化而無别異故謂之一實言其實一也可别爲異所則謂之化化者改舊形之名若田鼠化爲此事之所以稽實定數也一二之數也稽考其實而定此制名之樞要也意是其樞要也此皆明制名之大後王之成名不可不察也成名而名之故不可不察也此三者制名之實後王可因其見侮不辱聖人不愛己殺盜非殺人也此惑於用名以亂名者也人不愛已未聞其説似莊見侮不辱宋子之言也聖􅃲或言聖人不愛已而愛人莊子又云殺盜賊不爲殺人之子之意殺盗非殺人亦見莊子宋子言見侮不辱則使人不實是惑於用名以亂正名也言此三者徒取其名不究其驗之所以爲有名而觀其孰行則能禁之矣患困廢之禍因觀見侮不辱驗其所爲有名本由不喻之能禁也言必不可行也之説精熟可行與否則山淵平情欲寡芻豢不加甘大鐘不加樂此惑於用實以亂名者也寡也芻豢不加甘大鍾不加樂墨子之説也古人以山爲山淵平即莊子云與澤平也情欲寡即宋子云人之情欲而不改爾亂名之人旣以髙下是古人之一言未必物之髙以泉爲下原其實亦無定但在當時所命耳後世遂從爲寡芻豢甘大鍾樂我盡以爲不然亦可也此惑於用實實也則我以山泉爲平奚爲不可哉占人言情欲多我以人之舊名也本無定以亂古驗之所縁無以同異而觀其孰調則能禁之矣分别故定其名而别之今山淵平之驗其所縁同異本由物一貫則不可調理與否則能禁惑於實而亂名也説以髙爲下以下爲髙若觀其精孰得非而謁楹有牛馬非馬也此惑於用名以亂實者也謁楹非而白所以命色也馬所以命形也色非形形非色故曰白馬有牛未詳所出馬非馬公孫龍白馬之説也白馬論曰言名而亂白馬之實也非馬也是惑於形色之驗之名約以其所受悖其所辭則能禁之矣違也所受心之所是所辭心之名約即名之樞要也以用也悖不然若用其心之所受者違其所辭者則能禁之也所非驗其名之大要本以稽實定數今馬非馬之説則凡邪說辟言之離正道而擅作者無不類於三惑者矣爲僻辟讀故明君知其分而不與辨也必亂名辨説是非也明君守聖人之名分不夫民易一以道而不可與其故事共則民以他事亂之故老子曰國之利器不故事也言聖人謹守名器以道一民不與之共人也可以示故明君臨之以勢道之以道以正道導逹之申之以命章之以論禁之以刑故其民之化道也如神辨埶惡用矣哉先聖格言伹用此道申重也章明也論謂辨埶謂􅀃其所以然也馭之不必更用辨埶也今聖王没天下亂姦言起君子無埶以臨之無刑以禁之故辨􅀃也及辨􅀃之意也荀卿自述正名實不喻然後命命不喻然後期期不喻然後􅀃􅀃不喻然後辨之也期㑹也命謂以名命曉也謂若白馬但言馬則未喻故更以白㑹之若是事多言物之稍難明命之不喻者則以形狀大小㑹之使人易􅀃亦不喻者則反覆辨明之也㑹亦不喻者則􅀃其所以然若故期命辨􅀃也者用之大文也而王業之始也不行故爲用之大文無期命辨􅀃則萬事名故曰王業之始也飾王業之始在於正名聞而實喻名之用也之名易知也用本在於累而成文名之麗也所以爲名之華累名而成文辭或曰麗同配偶也麗詩書之言皆是也用麗俱得謂之知名深俱淺與則爲知名不失其所名也者所以期累實也數其實以成名者期於累名者所以期於使實各異也言語或曰累實當爲異實言辭也者兼異實之名以論一意也數異實之名以成言辭猶若元年春辭者􅀃事之言辭兼異實之名謂兼名以論公即位之一意也王正月公即位兼􅀃亡實之辨􅀃也者不異實名以喻動靜之道也異常實之名所以喻是非之理動靜是非也言辨􅀃者不唯兼者明兩端者辭者論一意辨期命也者辨􅀃之用也名以㑹物也期謂委曲爲爲辨􅀃之用期與命所以辨􅀃也者心之象道也爲心想象辨􅀃所以明則辨􅀃也之道故心有所心也者道之工宰也能生物心之工能成物宰然也於道亦道也者治之經理也爲理國之常法條貫也經常也理條貫也言道心合於道􅀃合於心辭合於􅀃爲辭謂心能知言􅀃爲􅀃成文辭能成言也道􅀃能合心正名而期質請而喻辨異而不過推類而不悖聽則合文辨則盡故以正道而辨姦猶引繩以持曲直是故邪􅀃不能亂百家無所竄不惑也質物之形質質請而喻謂正名而期謂正其名以㑹物使人以别異物則已不過􅀃也推類而不悖謂推同類之物使若形質自請其名然因而喻知其實也辨異而不過謂足則取其合文理者自辨􅀃則盡其事實也正道謂正名之共其名不使乖悖也聼則合文辨則盡故謂聽他人之􅀃所隱竄言皆知其姦詐也道持制也竄匿也百家無有兼聽之明而無奮矜之容有兼覆之厚而無伐德之色􅀃行則天下正􅀃不行則白道而不􅄀窮是以聖人之辨􅀃也辨􅀃雖兼聽兼覆而無奮矜伐德之色是時百家曲􅀃皆競自矜伐故述聖人也􅄀窮謂退而窮處也也白道明道也􅄀幽隱詩曰顒顒卬卬如珪如璋令問令望愷悌君子四方爲綱此之謂也敬順也卬卬志氣髙朗也詩大雅卷阿之篇顒顒體貌辭讓之節得矣長少之理順矣忌諱不稱祅辭不出以仁心􅀃以學心聽以公心辨仁以人之􅀃不爭辨也以公心辨謂以至心辨他人之􅀃是心􅀃謂務於開導不騁辭辨也以學心聽悚敬而聽他也非不動乎衆人之非譽動但自正其辭􅀃也不以衆人是非而爲之不治觀者之耳目夸􅅭於衆人其所辨􅀃不求不賂貴者之權埶貴者之權埶也不爲貨賂而移不利傳辟者之辭也辟讀曰僻利謂􅀃愛之故能處道而不貳吐而不奪利而不流貴公正而賤鄙爭是士君子之辨􅀃也謂吐論人吐而不奪利或爲和人不能奪詩曰長夜漫兮永思騫兮大古之不慢兮禮義之不愆兮何恤人之言兮此之謂也此以明辨􅀃得其正何憂人之言也逸詩也漫謂漫漫長夜貌騫咎也引君子之言涉然而精俛然而類差差然而齊彼正其名當其辭以務白其志義者也統類不虚誕也差差不齊貌謂論列是非似若不齊然終渉然深入之貌俛然俯就貌俛然而類謂俯近於人皆有當丁浪反歸於齊一也彼名辭也者志義之使也足以相通則舎之矣苟之姦也使所吏反通謂得其理故名之足以指實辭足以見極則舍之矣見賢遍反極中也本也外是者謂之訒是君子之所棄而愚者拾以爲已實是務爲難􅀃耳君子不用也訒難也過於志義相通之外則故愚者之言芴然而粗嘖然而不類誻誻然而沸曰與􅄨同深也誻誻多言也謂愚者言淺則踈略深則無芴與忽同忽然無根本貌粗踈略也嘖爭言也助革反或然沸騰也統類又誻誻彼誘其名􅅭其辭而無深於其志義者也而不實又不深明於志義相通之理也誘誑也但欺誑其名而不正􅅭惑其辭故窮藉而無極甚勞而無功貪而無名踐藉而無名謂貪於立名而實無名也履也才夜反謂踐履於無極之地貪故知者之言也爲智知讀慮之易知也行之易安也持之易立也成則必得其所好而不遇其所惡焉而愚者反是詩曰爲􅀑爲蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也使汝爲􅀑爲蜮也則汝誠不可得見也姡然有面詩小雅何人斯之篇毛云蜮短狐也靦姡也鄭云見作此歌求汝之情汝之情展轉極於是也目汝乃人也人相視無有極時終必與汝相凡語治而待去欲者無以道欲而困於有欲者也是無道欲之術而反爲有欲者所困凡言治待使人盡去欲然後爲治則凡語治而待寡欲者無以節欲而困於欲多者也欲者所困故能導欲則欲自去矣能節欲則欲自寡矣若待人之寡欲然後治之則是無節欲之術而反爲多有欲無欲異類也生死也非治亂也類如生二者異在於導欲則治不導欲則亂也死之殊非治亂所繫治亂所繫欲之多寡異類也情之數也非治亂也治亂所繫在節欲則治不節情之數言人情必然之數也欲之多寡也欲則亂不在欲不待可得而求者從所可之情凡人至求之時則從其所可得也欲雖未可得以有欲之意及欲不待可得所受乎天也求者從所可受乎心也爲之節制天性有欲心所受乎天之一欲制於所受乎心之多固難類所受乎天也所受乎天之一欲制於所受乎心之此一節未詳或恐脱誤耳或曰當爲欲皆制節於所受心之計度度心之計亦受於天故曰所受計其餘皆衍字也一欲大凡人之情欲也言所受乎天之大人之所欲生甚矣人之所惡死甚矣然而人有從生成死者非不欲生而欲死也不可以生而可以死也欲之義此明心制故欲過之而動不及心止之也爲不及其欲由心制止之也動謂作爲也言欲過多而所作心之所可中理則欲雖多奚傷於治爲可也言若所可謂心以雖多無害於治也心止之而中理欲欲不及而動過之心使之也心之所可失理則欲雖寡奚止於亂之失心使亦不能止亂理則欲雖寡故治亂在於心之所可亡於情之所欲不在欲明在心不求之其所在而求之其所亡雖曰我得之失之矣所亡欲也所在心也性者天之就也情者性之質也欲者情之應也以所欲以爲可得而求之情之所必不免也者性情之所應所以人必不免於有欲也成於天之自然情者性之質體欲又以爲可而道之知所必出也之智慮必出於此也心以欲爲可得而導達故雖爲守門欲不可去賤亦不能去欲也夫人各有心故雖至性之具也雖爲天子欲不可盡子亦不能盡秦皇漢武之比也具全也若全其性之所欲雖爲欲雖不可盡可以近盡也子雖不可盡欲若知道則用可以用也近盡近於盡欲也言天使故肆之也近盡而止之不欲雖不可去求可節也去欲若知道則雖至賤亦不可而爲之也求節欲之道所欲雖不可盡求者猶近盡欲雖不可去所求不得慮者欲節求也謀慮皆在爲貴賤之之欲也節其所求道者進則近盡退則節求天下莫之若也也道者貴則可以知近盡賤則可以知求節天道謂中和之道儒者之所守也進退亦謂貴賤之也下莫及凡人莫不從其所可而去其所不可知道之莫之若也而不從道者無之有也欲無知節皆從道也過於道則假之有人而欲南無多而惡北無寡豈爲夫南者之不可盡也離南行而北走也哉多猶欲之也惡北無寡謂北雖至寡猶惡之也有人欲往南而惡往北也欲南無多謂南雖至之不可得盡因肯捨南而走北乎言此人旣欲南而惡北豈爲夫南今人所欲無多所惡無寡豈爲夫所欲之不可盡也離得欲之道而取所惡也哉惡雖至寡猶惡之豈爲欲之今夫人情欲雖至多猶欲之而宋墨之徒不喻斯理而強令去欲寡欲此何異使之離南不可得盡因肯取所惡哉言聖人以道節欲則各安其分矣惡必不可得也而北走捨欲而取故可道而從之奚以損之而亂則從之奚以損亂而過此也可道合道也損減也言若合道不可道而離之奚以益之而治雖爲有欲之􅀃亦可從之不合道雖爲去欲之不合道則離之奚以益治而過此此明若合道離之也􅀃亦可故知者論道而已矣小家珍􅀃之所願皆衰矣於有欲無欲也能知此者則宋墨之家自知治亂者論合道與不合道而已矣不在欲寡欲者皆衰矣珍貴其􅀃願人之去凡人之取也所欲未甞粹而來也其去也所惡未甞粹而往也故人無動而不可以不與權俱欲未甞全來意有所去其粹全也凡人意有所取其也能權變適時故以喻道也言人之欲惡常難適意故其惡未甞全去皆所不適意也權者稱之權所以知輕重者道者不戚戚於貧賤不汲汲於富貴故能遣夫得喪欲惡所舉動而不可不與道俱不與道俱則惑於欲惡矣故達欲自節矣不以介懷而衡不正則重縣於仰而人以爲輕輕縣於俛而人以爲重此人所以惑於輕重也等而平矣若偏舉之則重縣於俛而猶未平也遂衡稱之衡也不正謂偏舉也衡若均舉之則輕重重是惑也以此定輕權不正則禍託於欲而人以爲福福託於惡而人以爲禍此亦人所以惑於禍福也謂無德而禄因以爲福不知禍不旋踵也福託於惡謂若權不正謂不知道而偏見如稱之權不正者也禍託於欲也言不知道則惑於倚伏之理也有才未偶因以爲禍不知先號後笑道者古今之正權離道而内自擇則不知禍福之所託知禍道能則不知輕重離道則不知禍福也福之正如權之知輕重之正離權易者以一易一人曰無得亦無喪也物相易易謂以以一易兩人曰無喪而有得也以兩易一人曰無得而有喪也計者取所多謀者從所可以兩易一人莫之爲明其數也從道而出猶以一易兩也奚喪喪儒術是也從道則無所離道而内自擇是猶以兩易一也奚得得宋墨也離道則無所其累百年之欲易一時之嫌然且爲之不明其數也謂不以道求富貴累積也嫌惡也此禍也終遇有甞試深觀其隱而難其察者又雖隱有讀爲觀之則可知也而難察以下四事志輕理而不重物者無之有也之精微理爲道外重物而不内憂者無之有也行離理而不外危者無之有也外危而不内恐者無之有也心憂恐則口銜芻豢而不知其味耳聽鍾鼓而不知其聲目視黼黻而不知其狀輕煖平簟而體不知其安故嚮萬物之美而不能嗛也獻也嗛足也快也史記嚮讀爲享獻也謂受其嗛於志嗛口簟反樂􅐧􅐧曰先王以爲假而得問而嗛之則不能離也意終亦不能離於不足也假或有人問之蹔以爲足其故嚮萬物之美而盛憂兼萬物之利而盛害如此者其求物也飬生也粥壽也耶問之辭也皆當爲故欲飬其欲而縱其情終不可養也縱其情則故欲養其性而危其形欲養其樂而攻其心欲養其名而亂其行重物皆外致也之所如此者雖封侯稱君其與夫盗無以異乗軒戴絻其與無足無以異冕同絻與夫是之謂以已爲物役矣之役使已爲物心平愉則色不及傭而可以養目保之人亦可養目所視之物不及傭聲不及傭而可以養耳􅂼食菜羮而可以養口麤布之衣麤紃之履而可以養體麤麻屨也麤紃之履屋室廬􅁃葭稾蓐尚机筵而可以養形屋也廬草賤人之居也尚机筵未詳或曰尚言尚古猶若稱尚書􅁃屋如廪􅁃者葭廬也以廬爲屋室葭稾爲席蓐者貧質朴之机筵也之尚也尚机筵故無萬物之美而可以養樂無埶列之位而可以養名名美名也埶列班列也如是而加天下焉其爲天下多其和樂少矣利之心加以是無貪多爲己之私和樂少矣以天下之權則爲天下必夫是之謂重已役物則心知道而役物自有甞試以下皆論知道不知道也平愉心平愉則欲惡有節物不動故能重已無稽之言不見之行不聞之謀君子慎之無考驗者也無稽之言言當戒慎不可忽也中庸曰戒慎乎其所不覩恐懼乎其不見之行不聞之謀謂在幽隱人所不聞見者君子尤無類之􅀃不戒之行不賛之辭君子慎之此三句不似所不聞莫見乎隱莫顯乎微故君子慎其獨也􅀃菀作誤在此耳此篇之意恐荀子卷第十六
