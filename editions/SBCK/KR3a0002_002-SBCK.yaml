body:
  text: 登仕郎守大理評事揚倞注不苟篇第三君子行不貴苟難說不貴苟察察聦察行如字名不貴苟傳唯其當之爲貴也當丁浪反當謂合禮義故懷負石而赴河是行之難爲者也而申徒狄能之人韓詩外傳曰申徒狄將自投於河崔嘉聞而止之不從申徒狄恨道不行發憤而負石自沈於河莊子音義曰殷時然而君子不貴者非禮義之中也止則止時行禮義之中時君子遭時則大行不遇則龍蛇何必沈身則行不必枯槁赴淵也揚子雲非屈原曰山淵平天地比地卑於天若以宇宙之髙則似天地皆卑天地皆卑則山與澤平比謂齊等也莊子曰天與地卑山與澤平音義曰以平地比天則無天髙地下之殊也在髙山則天亦髙在深泉則天亦下故曰天矣或曰天無實形地之上空虚者盡皆天也是天地長親比相隨皆相似是山澤平也地比地去夫天逺近齊秦襲逺若以天地之大包之則曾無襲合也齊在東秦在西相去甚爲一國也隔異亦可合入乎耳出乎口口也言山有耳口也凡呼於未詳所明之意或曰即山出乎耳出乎口或曰山能吐納雲霧是以有口一山衆山皆應是山聞人聲而應之故曰入鈎有須齊秦襲未詳自也丁之曲者爲鈎須與尾皆毛類是同也荘子音義云夫萬物無入乎耳出乎口鈎有須皆淺學所未見或曰鈎有須即丁子有尾曲波爲尾今丁子二字雖左行曲波亦是尾也定形形無定稱在上爲首在下爲尾世人謂右行􅆑有毛也毛氣成毛羽氣成羽雖胎卵未生而毛羽之性已箸矣故曰卵司馬彪曰胎卵之生必有毛羽鷄伏鵠卵卵不爲鷄則生類於鵠毛有是說之難持者也而惠施鄧析能之曲說故皆異端劉向云鄧析好刑名操兩可之說設無窮之辭數難子產爲政子曰難持惠施梁相與莊子同時其書五車其道舛駁鄧析鄭大夫而用其竹刑而云子產戮之恐誤也產執而戮之按左氏傳鄭駟歂殺鄧析然而君子不貴者非禮義之中也盜跖吟口名聲若日月與禹舜俱傳而不息然而君子不貴者非禮義之中也也說苑作盜跖匈貪吟口吟咏長在人口故曰君子行不貴苟難說不貴苟察名不貴苟得唯其當之爲貴詩曰物其有矣唯其時矣此之謂也須得其時以喻當之爲貴也詩小雅魚麗之篇言雖有物亦君子易知而難狎不比黨故難狎坦蕩蕩故易知易懼而難脅不可奪也小心而志畏患而不避義死欲利而不爲所非則捨之心以爲非交親而不比比謂暱狎親謂仁恩言辯而不辭足辯至於騁辭以明一不蕩蕩乎其有以殊於世也有異與俗人君子能亦好不能亦好小人能亦醜不能亦醜君子能則寛容易直以開道人導同道與不能則恭敬繜絀以畏事人同謂自撙節貶損繜與撙同絀與黜小人能則倨傲僻違以驕溢人滿溢不能則妬嫉怨誹以傾覆人故曰君子能則人榮學焉不能則人樂告之小人能則人賤學焉不能則人羞告之是君子小人之分也如字分異也君子寛而不僈怠惰也僈與慢同廉而不劌文云劌利廉稜也說不至於刃傷也傷也但有廉隅辯而不爭察而不激不激切也但明察而寡立而不勝堅彊而不暴雖堅強而不兇暴雖寡立人不能勝柔從而不流恭敬謹慎而容孤介也不至於夫是之謂至文備言德詩曰温温恭人惟德之基此之謂也温温寛柔貌詩大雅抑之篇君子崇人之德揚人之美非謟䛕也正義直指舉人之過惡非毁疵也曰讀爲訾疵病也或言已之光美擬於禹舜參於天地非夸誕也與時屈伸柔從若蒲葦非懾怯也席可卷者也蒲葦所以爲剛彊猛毅靡所不信非驕暴也同古字通用信讀爲伸下以義變應知當曲直故也所知當於曲直也以義隨變而應其詩曰左之左之君子宜之右之右之君子有之此言君子能以義屈信變應故也以能應變故左右無不詩小雅裳裳者華之篇也得宜君子小人之反也相反與小人君子大心則天而道小心則畏義而節於天而順道天而道謂合知則明通而類統類類謂知愚則端愨而法法謂守法度也愚謂無機智也見由則恭而止曰止禮也言恭而有禮也由用也止謂不放縱也或見閉則敬而齊齊謂自齊整而不怨也謂閉塞道不行也敬而喜則和而理憂則靜而理其理皆當通則文而明彰明也有文而窮則約而詳明其道也隱約而詳小人則不然大心則慢而暴小心則流淫而傾事人也以邪謟知則攫盜而漸利不知止也漸進也謂貪愚則毒賊而亂無畏忌也毒害也愚而見由則兊而倨言喜於兊恱也倨傲也徼幸而見閇則怨而險險賊也怨上而喜則輕而翾輕佻輕謂翾然許緣反或曰與懁同說文云懁急也失據翾小飛也言小人之喜輕佻如小鳥之憂則挫而懾通則驕而偏也偏頗窮則弃而儑言云溼憂也字書無儑弃自弃也儑當爲溼方作弃而累也字韓詩外傳傳曰君子兩進小人兩廢此之謂也君子治治非治亂也曷謂耶曰禮義之謂治非禮義之謂亂也故君子者治禮義者也非治非禮義者也然則國亂將弗治與曰國亂而治之者非案亂而治之之謂也去亂而被之以治安案多爲語助與此不同也案據也舊亂而治之也荀子人汙而脩之者行將脩爲善人有汙穢之非案汙而脩之之謂也去汙而易之以脩故去亂而非治亂也去汙而非脩汙也治之爲名猶曰君子爲治而不爲亂爲脩而不爲汙也號如此治之名君子挈其辯而同焉者合矣謂不煩雜絜脩整也善其言而類焉者應矣里之外應之出其言善千故馬鳴而馬應之非知也其勢然也智知音故新浴者振其衣新沐者彈其冠人之情也外物之汙也猶言㓗其身者懼善人之汙者也賢者必不受不其誰能以已之潐潐受人之掝掝者哉當爲惑掝掝昏也楚詞曰安能以身之察察受物之昏潐潐明察之貌潐盡謂窮盡明於事易曰窮理盡性掝予誚反昏者乎潐君子養心莫善於誠心常安也無姦詐則致誠則無它事矣則外物不能害致極也極其誠唯仁之爲守唯義之爲行在仁義致其誠誠心守仁則形形則神神則能化矣尊之如神能化育之矣化謂遷善也誠心守於仁愛則必形見於外則下誠心行義則理理則明明則能變矣不敢欺故能變改其惡也義行則事有條理明而易人變化代興謂之天德化改其舊質謂之變言始於化終於變既能變化則德同於天馴致於善謂之化春生冬落則爲變也也猶天道隂陽運行則爲天不言而人推髙焉地不言而人推厚焉四時不言而百姓期焉知其期謂􅃸時夫此有常以至其誠者也有常如此者由極其誠至極也天地四時所以致所君子至德嘿然而喻未施而親不怒而威不言而人自喻其意也君子有至德所以嘿然夫此順命以愼其獨者也以順人所不睹恐懼乎其所不聞至誠不欺故人亦不違之也命如此者由慎其獨所致也慎其獨謂戒慎乎其所善之爲道者不誠則不獨能慎其獨也無至誠則不不獨則不形慎其不能能形見於外獨故其徳亦不不形則雖作於心見於色出於言民猶若未從也雖從必疑出令民猶如未從者若如也無至誠故雖亦必疑之也雖彊使之從天地爲大矣不誠則不能化萬物聖人爲知矣不誠則不能化萬民父子爲親矣不誠則䟽君上爲尊矣不誠則卑謂卑下所尊不爲在夫誠者君子之所守也而政事之本也唯所居以其類至類自至謂天地誠則能化萬物聖所居所止也唯其所止至誠則以誠則親君上誠則尊也人誠則能化萬民父子操之則得之舍之則失之持操操而得之則輕舉也詩曰德輶如毛持至誠也而得之則易輕則獨行而不難舉至誠事自行矣則慎獨之獨行而不舍則濟矣乎不巳至誠在濟而材盡長遷而不反其初則化矣不反其初謂中道不廢也既濟則材性自盡長遷君子位尊而志恭心小而道大所聽視者近而所聞見者逺是何邪是操術然也以謂所持之術如此也近知逺以今知古故千人萬人之情一人之情是也相逺人情不天地始者今日是也百王之道後王是也王不殊行堯舜則是亦堯舜也後王當今之王言後王之道與百君子審後王之道而論於百王之前若端拜而議以百王之前比之若服􅀇端拜揖而議言其從容不勞也時人多端􅀇端朝服也端拜猶言端拱言君子審後王所宜施行之道而爲治故荀卿明之言後世澆醨難以推禮義之統分是非之分如字上分之使當其分下扶問反分緫天下之要治海内之衆若使一人故操彌約而事彌大其宗主也約少也得五寸之矩盡天下之方也之器也矩正方故君子不下室堂而海内之情舉積此者則操術然也也舉皆有通士者有公士者有直士者有愨士者有小人者上則能尊君下則能愛民物至而應事起而辨若是則可謂通士矣則能應物有至通者不滯之謂也之事有疑則能辨之不下比以闇上不上同以疾下也疾與嫉同闇上掩上之明分爭於中不以私害之若是則可謂公士矣私害之則可謂公正之士也謂於事之中有分爭者不以身之所長上雖不知不以悖君違悖也不怨君而身之所短上雖不知不以取賞不誣受禄長短不飾以情自竭若是則可謂直士矣短但任直道而竭不矜其長不掩其情也盡其庸言必信之庸行必慎之常信行常慎庸常也謂言畏法流俗而不敢以其所獨甚之俗又不敢以其法效也畏法流移不敢獨爲君子也所獨善而甚過人謂若是則可謂愨士矣不回端愨言無常信行無常貞唯利所在無所不傾之利意求之所在皆傾若是則可謂小人矣公生明偏生闇端愨生通詐僞生塞塞也多窮誠信生神中庸曰至誠如神誠信至則通於神明夸誕生惑貪惑於物也矜夸妄誕則此六生者君子慎之而禹桀所以分也以所愚也分賢欲惡取舍之權事也舉下見其可欲也則必前後慮其可惡也者見其可利也則必前後慮其可害也者而兼權之孰計之輕重者孰權所以平成孰也甚也猶然後定其欲惡取舍如是則常不大陷矣凡人之患偏傷之也其一隅偏謂見見其可欲也則不慮其可惡也者見其可利也則不顧其可害也者是以動則必陷爲則必辱是偏傷之患也人之所惡者吾亦惡之必異於衆人矣賢人欲惡之不夫富貴者則類傲之是非皆傲之也富貴之類不論夫貧賤者則求柔之柔屈就之也見貧賤者皆是非仁人之情也是姦人將以盜名於晻世者也險莫大焉之名於昏闇之世姦人盜富貴貧賤暗同晻與故曰盜名不如盜貨田仲史鰌不如盜也號曰於陵仲子史鰌衛大夫字子魚賣直也田仲齊人處於陵不食兄禄辭富貴爲人灌園榮辱篇第四憍泄者人之殃也慢也殃或爲䄃泄與媟同嬻也恭儉者偋五兵也窶也與此義不同偋防正反偋當爲屏却也說文有偋字僻雖有戈矛之剌不如恭儉之利也人深言入故與人善言煖於布帛傷人之言深於矛㦸故薄薄之地不得履之非地不安也危足無所履者也凡在言也以廣大之地側足無所容者皆由以言害身也薄薄謂旁薄廣大之貌危足側足也凡皆也所巨涂則讓小涂則殆雖欲不謹若云不使凡行前殆近也單行則後之若能用意如此雖欲爲不謹敬若有制物而不使之者逺而後近故近者亦後之義謂行於道涂大道並行則讓之小道可爭險易之利儒行曰道涂不快快而亡者怒也由於忿怒也肆其快意而亡察察而殘者忮也由於有忮害之心也至明察而見傷殘者博之而窮者訾也辯博言詞於好毁訾也而見窮蹙者由淸之而俞濁者口也濁者在口說之過欲求其清而俞矣但能口說斯俞濁也俞讀爲愈謂言過其實也或曰絜其身則自淸豢之而俞瘠者交也瘠也故上篇云勞倦而容貌不枯好交也所交接非其道則必有患難雖食芻豢而更辯而不說者爭也稱說或讀爲恱不說不爲人所直立而不見知者勝也勝謂好勝人也直立謂已直人曲廉而不見貴者劌也刻巳太劌傷也故不見貴也過不得中道勇而不見憚者貪也故雖勇而不見憚貪利則委曲求人信而不見敬者好剸行也行謂不度是剸與專同專如白公者也非好復言此小人之所務而君子之所不爲也􅃲者忘其身者也忘其親者也忘其君者也行其少頃之怒而喪終身之軀然且爲之是忘其身也家室立殘親戚不免乎刑戮然且爲之是忘其親也戮及親戚尸子曰非人蓋當時禁􅃲殺人之法以親戚徇一言而不顧之也君之用兵也以爲民傷􅃲則君上之所惡也刑法之所大禁也然且爲之是忘其君也憂忘其身曰當爲下忘其身誤爲夏又夏轉誤爲憂字耳遭憂患刑戮而不能保其身是憂忘其身也或内忘其親上忘其君是刑法之所不舍也聖王之所不畜也乳彘不觸虎乳㺃不逺遊不忘其親也人也憂忘其身内忘其親上忘其君則是人也而曽㺃彘之不若也凡􅃲者必自以爲是而以人爲非也已誠是也人誠非也則是己君子而人小人也以君子與小人相賊害也憂以忘其身内以忘其親上以忘其君豈不過甚矣哉是人也所謂以狐父之戈钃牛矢也於賤也狐父地名史記伍被時人舊有此語喻以貴而用管子曰蚩尤爲雍狐之㦸狐父之戈豈近此耶钃刺也之欲反故良曰吳王兵敗於狐父徐廣曰梁碭之間也蓋其地山名戈其說未聞刺也或讀斸爲斫劒謂之屬鏤亦取其將以爲智邪則愚莫大焉將以爲利邪則害莫大焉將以爲榮邪則辱莫大焉將以爲安邪則危莫大焉人之有􅃲何哉我欲屬之狂惑疾病邪則不可聖王又誅之之欲反屬託也我欲屬之鳥䑕禽獸邪則不可其形體又人而好惡多同也其好惡多與賢視其形體則又人􅃲爲異耳人同但好人之有􅃲何哉我甚醜之何爲􅃲也其禍如此有㺃彘之勇者有賈盜之勇者賈盜勇於求財㺃彘勇於求食古賈音有小人之勇者有士君子之勇者於暴士小人勇人有此數勇也君子勇於義言爭飲食無廉恥不知是非不辟死傷不畏衆彊恈恈然惟利飲食之見是狗彘之勇者也言云牟愛也宋魯之間曰牟辟讀爲避恈恈愛欲之貌方爲事利爲于僞反爲事及利也爭貨財無辭讓果敢而振猛貪而戾恈恈然唯利之見是賈盜之勇也戾乖背振動也振而矜之何休云亢陽之貌也也春秋公羊傳曰葵丘之㑹􅁊公輕死而暴是小人之勇也義之所在不傾於權不顧其利舉國而與之不爲攺視重死持義而不橈是士君子之勇也苟生也儒行曰愛其死以有待也雖重愛其死而執節持義不橈曲以儵䱁者浮陽之魚也水上就陽也今字書無䱁字蓋儵䱁魚名浮陽謂此魚好浮於濠梁之上儵魚出遊是亦浮陽之義或曰浮陽渤海縣名也儵音稠當爲鮁說文云即鱣鮪鮁鮁字蓋儵魚一名儵鮁莊子與惠子遊於末反鮁布胠於沙而思水則無逮矣言云袪去也齊趙之胠與袪同揚子雲方莊子有胠篋篇亦取去之義也緫語去於沙謂失水去在沙上也挂於患而欲謹則無益矣魚也人亦猶自知者不怨人知命者不怨天怨人者窮者則窮迫無所出徒怨憤於人不自修怨天者無志之人有志皆歸於命故不怨天但自修身遇與不遇失之已反之人豈不迂乎哉責人也迂失也反榮辱之大分安危利害之常體先義而後利者榮先利而後義者辱榮者常通辱者常窮通者常制人窮者常制於人於人受制是榮辱之大分也然其大分如此矣其中雖未必皆然材愨者常安利蕩悍者常危害蕩悍巳解於脩身篇材愨謂材性愿愨也安利者常樂易危害者常憂險詩所謂愷悌者也樂易歡樂平易也樂易者常夀長憂險者常夭折是安危利害之常體也如此亦大率夫天生蒸民有所以取之下職業皆有取之道非言天生衆民其君臣上敗之也其道所以志意致脩德行致厚智慮致明是天子之所以取天下也之所以取天下之道也致極也言如此是乃天子政令法舉措時聽斷公役不奪農時也舉措時謂興力上則能順天子之命下則能保百姓是諸侯之所以取國家也志行脩臨官治上則能順上下則能保其職是士大夫之所以取田邑也循法則度量刑辟圖籍左氏傳曰先王議事以制不爲度尺丈量斗斛刑辟刑法之書籍謂書其戸口之數也刑辟圖謂模寫土地之形不知其義謹守其數慎不敢損益也所然若制父子相傳以持王公以保持王公世傳法則所所爲治者也言王公賴之是故三代雖亡治法猶存是官人百吏之所以取禄秩也孝弟愿愨軥録疾力以敦比其事業而不敢怠傲是庻人之所以取煖衣飽食長生久視以免於刑戮也而作也敦厚也比親也言不敢怠惰也軥與拘同拘録謂自檢束也疾力謂速力飾邪說文姦言爲􅀝事事怪異之事􅀝已解上􅀝陶誕突盜檮頑嚚之貌突陶當爲檮杌之當爲逃隱匿其情也凌突不順也或曰陶愓悍憍暴蕩同愓與以偷生反側於亂世之閒是姦人之所以取危辱死刑也其慮之不深其擇之不謹其定取舍楛僈是其所以危也失也楛惡也謂不堅固也小人所以危亡由於計慮之材性知能君子小人一也好榮惡辱好利惡害是君子小人之所同也若其所以求之之道則異矣小人也者疾爲誕而欲人之信已也疾爲詐而欲人之親已也禽獸之行而欲人之善已也慮之難知也行之難安也持之難立也言易顛覆也持之難立謂難扶持之也慮之難知謂人難測其姦詐行之難安成則必不得其所好必遇其所惡焉得成亦必雖使姦詐無福有禍故君子者信矣而亦欲人之信已也忠矣而亦欲人之親已也脩正治辨矣而亦欲人之善已也慮之易知也行之易安也持之易立也成則必得其所好必不遇其所惡焉是故窮則不隱通則大明不能隱蔽不隱謂人身死而名彌白明也白彰小人莫不延頸舉踵而願曰知慮材性固有以賢人矣賢人謂賢願猶慕也人也過於夫不知其與已無以異也則君子汪錯之當而小人注錯之過也錯履也亦與措注錯謂所注意同也置義故孰察小人之知能足以知其有餘可以爲君子之所爲也譬之越人安越楚人安楚君子安雅弁彼鸒斯歸飛提提鸒斯雅烏也雅正也正而有美德者謂之雅詩曰是非知能材性然也是注錯習俗之節異也俗節限制之也習俗謂所習風仁義德行常安之術也然而未必不危也汙僈突盜常危之術也然而未必不安也人無擇曰舜以其辱行汙漫我漫莫半反莊子又僈當爲漫漫亦汙也水冒物謂之漫莊子云北云縱逸也一曰漫欺誑之也曰澶漫爲樂崔云淫術也李故君子道其常而小人道其怪也之事取以自比也道語也怪謂非常凡人有所一同飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨白黒美惡而耳辨音聲淸濁口辨鹹甘苦鼻辨芬芳腥臊骨體膚理辨寒暑疾養理膚養與癢同肌膚之文理是又人之所常生而有也是無待而然者也是禹桀之所同也可以爲堯禹可以爲桀跖可以爲工匠可以爲農賈在勢注錯習俗之所積爾積習在所是又人之所生而有也是無待而然者也是禹桀之所同也爲堯禹則常安榮爲桀跖則常危辱爲堯禹則常愉佚爲工匠農賈則常煩勞然而人力爲此而寡爲彼何也曰陋也不爲言人由於性之固陋也彼堯禹而爲此桀跖堯禹者非生而具者也夫起於變故成乎脩脩之爲待盡而後備者也後乃能備之孟子曰天將降大任於是人也必先苦其心志勞其變故患難事故也言堯禹起於憂患成於脩飾由於待盡物理然性增益其所不爲也智生於憂患而死於安樂爲于僞反筋骨窮餓其體膚空乏其身行拂亂其所爲不能動心忍人之生固小人無師無法則唯利之見爾人之生固小人又以遇亂世得亂俗是以小重小也以亂得亂也君子非得勢以臨之則無由得開内焉而内善道也開小人之心今是人之口腹安知禮義安知辭讓安知廉恥隅積所知隅一言口腹無也積積習隅謂其分亦呥呥而噍鄉鄉而飽巳矣貌如鹽呥呥噍鄉趨飲食貌許亮反反噍嚼也才笑反鄉人無師無法則其心正其口腹也如口腹之欲也人不學則心正今使人生而未甞睹芻豢稻粱也唯菽藿糟糠之爲睹則以至足爲在此也俄而粲然有秉芻豢而至者則瞲然視之曰此何怪也圈也以榖食於圈中瞲然驚視貌與粲然精絜貌牛羊曰芻犬豕曰豢豢狘許聿反眓或爲俄眓狘同禮記曰故鳥不彼臭之而無嗛於鼻當爲慊厭也臭許又反嗛下忝反苦廉反或甞之而甘於口食之而安於體則莫不弃此而取彼矣今以夫先王之道仁義之統以相羣居以相持養以相藩飾以相安固邪飾藩蔽文飾也持養保養也藩以夫桀跖之道是其爲相縣也幾直夫芻豢稻粱之縣糟糠爾哉糟糠比芻豢哉幾讀爲豈下同言以先王之道與桀跖相縣豈止然而人力爲此而寡爲彼何也曰陋也陋也者天下之公患也此患也公共有人之大殃大害也故曰仁者好告示人告之示之靡之儇之鈆之重之疾也火縁反靡順從也儇與􅆓同循也撫循之申重之也靡之儇之猶言緩之急之也鈆則夫塞者俄且通也陋者俄且僩也愚者俄且知也晉魏之間謂猛爲僴陋僴與􅍀同猛也方言云詩云瑟兮僴兮鄭云僩寛大也下板反者俄且僴言鄙陋之人俄且矜莊有儀也是若不行則湯武在上曷益桀紂在上曷損則湯武何益於天若不行告示之道湯武賤桀紂以行與不行耳下桀紂何損於百姓所以貴湯武存則天下從而治桀紂存則天下從而亂如是者豈非人之情固可與如此可與如彼也哉人之情食欲有芻豢衣欲有文繡行欲有輿馬又欲夫餘財蓄積之富也所貴也皆人之然而窮年累世不知不足是人之情也不知足剰不字不知不足當爲猶不得也耳或曰不足今人之生也方知畜雞狗豬彘又畜牛羊然而食不敢有酒肉餘刀布有囷窌曰囷方曰廪窌窖也地藏曰窖窌匹貌反刀布皆錢也刀取其利布取其廣囷廪也圜然而衣不敢有絲帛約者有筐篋之藏然而行不敢有輿馬也言又富於餘刀布也約儉嗇也筐篋藏布帛者是何也非不欲也幾不長慮顧後而恐無以繼之故也於是又節用禦欲作禦止也禦制也或收斂畜藏以繼之也是於巳長慮顧後幾不甚善矣哉亦幾豈讀爲今夫偷生淺知之屬曽此而不知也苟且偷者也食太侈不顧其後俄則屈安窮矣安語助屈竭也矣安已解上也也猶言屈然窮是其所以不免於凍餓操瓢囊爲溝壑中瘠者也知久逺生業故至於此也乞食羸痩於溝壑者言不況夫先王之道仁義之統詩書禮樂之分乎業尚爲生大者分制也扶問反不能知況能知其逺彼固天下之大慮也將爲天下生民之屬長慮顧後而保萬世也其㳅長矣其温厚矣其功盛姚逺矣足也言先王之㳅古流字温猶與遥同言功業之盛甚長逺也道於生人其爲温足也亦厚矣姚非孰脩爲之君子莫之能知也作爲之君子也孰甚也甚脩飾故曰短綆不可以汲深井之泉知不幾者不可與及聖人之言謂不近於習也綆索也幾近也夫詩書禮樂之分固非庸人之所知也故曰一之而可再也務知二既知一則有之而可久也道而廢不可中廣之而可通也則於事可通知禮樂廣慱慮之而可安也則無危懼思慮禮樂反􅉢察之而俞可好也􅆓同􅉢與之愈可好而不厭俞音愈循也既知禮樂之後却循察以治情則利所以治人之七情脩利益也禮記曰聖王何以治之十義捨禮以爲名則榮以羣則和以獨則足書禮知詩獨處則自足也樂羣居則和同樂意者其是邪過於此樂意莫夫貴爲天子富有天下是人情之所同欲也然則從人之欲則勢不能容物不能贍也故先王案爲之制禮義以分之别上下也以禮義分使貴賤之等長㓜之差知賢愚能不能之分皆使人載其事而各得其宜任之也載行也然後使愨禄多少厚薄之稱當其才稱尺證反愨實也謂實其禄使是夫羣居和一之道也故仁人在上則農以力盡田賈以察盡財百工以巧盡械器虚說文云有盛爲械無盛盡謂精於事察謂明其盈器爲士大夫以上至於公侯莫不以其仁厚知能盡官職夫是之謂至平同然謂之至平也各當其分雖貴賤不故或禄天下而不自以爲多天下爲禄也謂爲天子以或監門御旅抱關擊柝而不自以爲寡御讀爲迓迓監門主門也夜者皆知其分故雖賤而不以爲寡也旅逆旅也抱關門卒也擊柝擊木所以警故曰斬而齊枉而順不同而一夫是之謂人倫喻貴賤雖不同舊有此語引以枉而順雖枉曲不直然而歸於順也不同而一謂殊途同歸也夫如此不以齊一然而要歸於治也斬而齊謂彊斬之使齊若漢書之一切者倫理也是人之詩曰受小共大共爲下國駿蒙此之謂也駿庬言湯執大玉小玉大厚於下國言下皆賴其德也詩殷頌長發之篇共執也駿大也蒙讀爲厖厚也今詩作荀子卷第二
