front:
  text: 十八
  hash: sha256:078c45851449bef08411f664692f1bbc1ff052d23a607d382f80aadd54f6ccec
body:
  text: 唐楊倞註成相篇第二十五以初發語名篇雜論君臣治亂之事以自見其意故下云託於成相以喻意漢書藝文志謂之成相雜辭蓋亦􅑝之流也或曰成功在相故作成相三章舊第八今以是荀卿雜語故降請成相請言成相之辭世之殃愚闇愚闇墮賢良世之殃由於愚此愚闇以埀墮賢良也墮許規反人主無賢如瞽無相何倀倀倀倀無所徃貌相息亮反倀丑羊反請布基愼聖人愼讀為順請說陳布基業在乎順聖人也愚而自專事不治主忌苟勝羣臣莫諫必逢災主既猜忌又苟欲勝人也論臣過反其施言論人臣之過在乎不行施惠施式豉反尊主安國尚賢義拒諫飾非愚而上同國必禍所以尊主安國在崇尚賢義若拒諫飾非以愚闇之性苟合於上則必禍也曷謂罷國明多私假設問荅以明其意罷讀為疲謂弱不任事者也所以弱者由於多私國語曰罷士無伍韋昭曰罷病也無行曰病比周還主黨與施還繞逺賢近讒忠臣蔽塞主勢移曷謂賢明君臣明君臣之道則為賢上能尊主愛下民主誠聽之天下為一海内賔主之孽讒人達賢能遁逃國乃蹷孽災也蹷顚覆也愚以重愚闇以重闇成為桀久而愚闇愈甚遂至於桀也世之災妬賢能飛廉知政任惡來惡來飛廉之子秦之先也史記曰惡來有力飛廉善走父子俱以材力事紂卑其志意大其園囿髙其臺榭卑其志意言無逺慮不慕徃古武王怒師牧野紂卒易鄉啓乃下易鄉廻也謂前徒倒戈攻于後啓微子名下降也鄉讀為向武王善之封之於宋立其祖立其祖使祭祀不絶也左傳曰宋祖帝乙也世之衰讒人歸比干見刳箕子累累讀為縲書曰釋箕子之囚武王誅之吕尚招麾殷民懐招麾指揮也世之禍惡賢士子胥見殺百里徙子胥吳大夫伍貟字也為夫差所殺百里奚虞公之臣徙遷也謀不見用虞滅係虜遷徙於秦穆公任之彊配五伯六卿施穆公秦穆公任好也伯讀為霸六卿天子之制春秋時大國亦僭置六卿六卿施言施六卿也世之愚惡大儒逆斥不通孔子拘逆拒斥逐大儒不使通也拘謂畏匡厄陳也展禽三絀春申道綴基畢輸展禽魯大夫無駭之後名獲字子禽諡曰惠居於栁下三絀為士師三見絀也春申楚相黄歇封為春申君綴止也與輟同畢盡也輸傾委也言春申為李園所殺其儒術政治道德基業盡傾覆委地也請牧基賢者思牧治堯在萬世如見之讒人罔極險陂傾側此之疑陂與詖同言當疑此讒人傾險也基必施辨賢罷罷讀為疲文武之道同伏戲文武周文王武王伏戲古帝王大昊氏始畫八卦造書契者戲與羲同由之者治不由者亂何疑為凡成相辨法方至治之極復後王後王當時之王言欲為至治在歸復後王謂隨時設教不必拘於古法也愼墨季惠百家之說誠不詳愼到墨翟惠施或曰季即莊子云季眞之莫為者也又曰季子聞而笑之據此則是梁惠王犀首惠施同時人也韓侍郎云或曰季梁也列子曰季梁楊朱之友言四子及百家好為異說故不用心詳明之詳或為祥治復一修之吉君子執之心如結言堅固不解也衆人貳之讒夫弃之形是詰衆人則不能復一讒夫則兼弃之但詰問治之形狀言侮慢也或曰形當為刑無德化唯刑戮是詰言虐暴也水至平端不傾心術如此象聖人聖人心平如水而有埶直而用抴必參天而有勢之上疑脱一字言既得權勢則度已以繩接人用抴功業必參天也世無王窮賢良無王者興賢良窮困􅍊人芻豢仁人糟糠禮樂滅息聖人隱伏墨術行治之經禮與刑君子以修百姓寧明德愼罰國爭既治四海平治之志後勢富為治之意後權勢與富者則公道行而貨賂息也君子誠之好以待君子必誠此意好以待用處之敦固有深藏之能逺思敦厚也有讀為又既處之厚固又能深藏逺慮思乃精志之榮好而一之神以成好而不二則通於神明也精神相反一而不二為聖人相反謂反覆不離散治之道美不老老休息也莊子曰佚我以老為治當日新其美無休息君子由之佼以好佼亦好也音絞下以教誨子弟上以事祖考接下以仁事親以孝也成相竭辭不蹷竭盡也論成相之事雖終篇無顚蹷之辭蹷音厥君子道之順以達道言説也辭既不蹷君子言之必𢎞順而通逹宗其賢良辨其殃孽君子尋成相之辭必能宗其賢良致治辨其殃孽為之害也請成相道聖王道亦言說前章意未盡故再論之也堯舜尚賢身辭讓許由善卷重義輕利行顯明莊子曰堯讓天下於許由許由不受又讓於子州支父子州支父曰我適有幽憂之病方且治之未暇冶天下也遂不受舜讓天下於善卷善卷不受遂入深山不知其處也堯讓賢以為民為萬民求明君所以不私其子氾利兼愛德施均辯治上下貴賤有等明君臣堯授能舜遇時尚賢推德天下治雖有賢聖適不遇世孰知之蓋以自歎堯不德舜不辭皆歸至公妻以二女任以事大人哉舜南面而立萬物備委任羣下無為而理舜授禹以天下舜所以授禹亦以天下之故也尚得推賢不失序得當為德外不避仇内不阿親賢者予謂殛鯀興禹又不私其子予讀為與禹勞心力堯有德干戈不用三苖服舉舜甽畆任之天下身休息甽與畎同得后稷五榖殖䕫為樂正鳥獸服謂擊石拊石百獸辛舞笙鏞以間鳥獸蹌蹌也契為司徒民知孝弟尊有德禹有功抑下鴻抑遏也下謂治水使歸下也鴻即洪水也書曰禹降水警予也辟除民害逐共工今尚書舜流共工于幽州此云禹未詳北決九河通十二渚疏三江案禹貢道弱黒漾沇淮渭洛七水又有雍淄伊洛瀍澗既入于河數則不止於十二此云十二未詳其説也禹溥土平天下溥讀為敷孔安國云洪水泛溢禹分布治九州之上也躬親為民行勞苦行讀如字謂所行之事也得益臯陶横革直成為輔横革直未聞韓侍郎云此論益臯陶之功横而不順理者革之直者成之也契𤣥王生昭明詩曰天命𤣥烏降而生商又曰𤣥王桓撥皆謂契也史記曰契為堯司徒封於商賜姓子氏契卒子昭明立也居於砥石遷于商砥石地名未詳所在或曰即底柱也左氏傳曰閼伯居商丘相土因之相土昭明子也言契初居砥石至孫相土乃遷商丘也十有四世乃有天乙是成湯史記曰契卒子昭明立昭明卒子相土立相土卒子昌若立昌若卒子曹圉立曹圉卒子㝠立為夏司空勤其官死於水殷人郊之冥卒子振立振卒子微立微卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬立主壬卒子主癸立主癸卒子乙立是十四世也天乙湯論舉當身讓卞隋舉牟光莊子曰湯讓天下於卞隋務光二人不受皆投水死牟與務同道古賢聖基必張道説古之賢聖基業必張大也願陳辭世亂惡善不此治不知治此世亂惡善之弊隱諱疾賢良由姦詐鮮無災隱諱過惡疾害賢良長用姦詐少無災也患難哉阪為先聖阪與反同反先聖之所為知不用愚者謀前車已覆後未知更何覺時前車已覆猶不知戒更何有覺悟之時也不覺悟不知苦迷惑失指易上下中不上達䝉揜耳目塞門户不能關四門也門户塞大迷惑悖亂昬莫不終極莫冥寞言闇也不終極無已時也是非反易比周欺上惡正直惡烏路反下同正直惡心無度邪枉辟回失道途辟讀為僻已無尤人我獨自美豈獨無故故事也不可尤責於人自美其身已豈無事已亦有事而不知其過也或曰下無獨字不知戒後必有恨恨悔也後遂過不肯悔不肯悔前之非讒夫多進反覆言語生詐態人之態不如備如當為知言人為詐態上不知為備爭寵嫉賢利惡忌利在惡忌賢者妬功毁賢下斂黨與上蔽匿斂聚也下聚黨與則上蔽匿也上壅蔽失輔勢失輔弼之臣則勢不在上任用讒夫不能制孰公長父之難孰公長父皆厲王之嬖臣未詳其姓名墨子曰厲王染於􅀈公長父榮夷終􅀈公與孰公不同未知孰是或曰孰公長父即詩所云皇父也孰或為郭厲王流于彘彘地名在河束左傳晉大夫有彘子言孰公長父奸邪遂使難作厲王流竄於彘周幽厲所以敗不聽規諫忠是害嗟我何人獨不遇時當亂世言自古忠良多有遇害何獨我哉自慰勉之辭也欲𠂻對言不從𠂻誠也欲誠意以對時君恐言不從而遇禍也恐為子胥身離凶進諫不聽剄而獨鹿棄之江獨鹿與屬鏤同本亦或作屬鏤吳王夫差賜子胥之劎名屬之欲反鏤力朱反國語里革曰鳥獸成水蟲孕水虞於是禁罜䍡此當足自剄之後盛以罜䍡弃之江也賈云罜䍡小罟也觀徃事以自戒治亂是非亦可識託於成相以喻意識如字亦讀如志請成相言治方言為治之方術君論有五約以明君謹守之下皆平正國乃昌論為君之道有五甚簡約明白謂臣下職一也君法明二也刑稱陳三也言有節四也上通利至莫敢恣五也臣下職莫游食游食謂不勤於事素飱游手也務本節用財無極事業聽上莫得相使一民力所興事業皆聽於上羣下不得擅相役使則民力一也禮記曰用民之力歲不過三日守其職足衣食民不失職則衣食足矣厚薄有等明爵服貴賤有别利徃卭上莫得擅與孰私得利之所徃皆仰於上莫得擅為賜與則誰敢私得於人乎擅相賜與若齊田氏然卭與仰同宜亮反君法明論有常君法所以明在言論有常不二三也表儀既設民知方進退有律莫得貴賤孰私王進人退人皆以法律貴賤各以其才孰有私佞於王乎君法儀禁不為為君之法儀在自禁止不為惡莫不説教名不移既能正己則民皆恱上之教而名器不移也說讀為恱修之者榮離之者辱孰他師孰敢以他為師言皆歸王道不敢離貳也刑稱陳守其銀稱謂當罪當罪之法施陳則各守其分限稱尺證反銀與垠同下不得用輕私門下不得專用刑法則私門自輕罪禍有律莫得輕重威不分禍亦罪也請牧祺明有基祺吉也請牧治吉祥之事在明其所有之基業主好論議必善謀五聽修領莫理續主執持五聽折獄之五聽也修領謂修之使得綱領莫不有文理相續主自執持此道不使權歸於下也聽之經明其請請當為情聽獄之經在明其情參伍明謹施賞刑參伍猶錯雜也謂或徃參之或徃伍之皆使明謹施其賞刑言精研不使有僭濫也顯者必得隱者復顯民反誠幽隱皆通則民不詐偽也言有節稽其實節謂法度欲使民言有法及不欺誑在稽考行實也信誕以分賞罰必下不欺上皆以情言明若日上通利隱逺至上通利不壅蔽則幽隱遐逺者皆至也觀法不法見不視所觀之法非法則雖見不視也耳目既顯吏敬法令莫敢恣此已上論君有五之事也君教出行有律五論之教既出則民所行有法言知方也吏謹將之無鈹滑將持也詩曰無將大車鈹與披同滑與汩同言不使紛亂披汨也下不私請各以宜舎巧拙請謁舎止也羣下不私謁各以所宜不苟求也如此則以道事君巧拙之事亦皆止臣謹修君制變臣職在謹修君職在制變公察善思論不亂以治天下後世法之成律貫法之為條貫也賦篇第二十六所賦之事皆生人所切而時多不知故特示之或曰荀卿所賦甚多今存者唯此言也舊第二十二今亦降在下爰有大物爰於也言於此有大物夫人之大者莫過於禮故謂之大物也非絲非帛文理成章絲帛能成黼黻文章禮亦然也非日非月為天下明生者以壽死者以葬城郭以固三軍以彊粹而王駁而伯無一焉而亡臣愚不識敢請之王言禮之功用甚大時人莫知故荀卿假為隱語問於先王云臣但見其功亦不識其名唯先王能知敢請辭之先王因重演其義而告之也王曰此夫文而不采者與先王為解禮記曰此乃有文飾而不至華采者歟簡然易知而致有理者與君子所敬而小人所不者與性不得則若禽獸性得之則甚雅似者與雅正也似謂似續古人詩曰維其有之是以似之匹夫隆之則為聖人諸侯隆之則一四海者與致明而約甚順而體請歸之禮極明而簡約言易知也甚順而有體言易行也先王言唯歸於禮乃合此義也禮皇天隆物以示下民隆猶備也物萬物也或厚或薄帝不齊均言人雖同見方所知或多厚或寡薄天帝或不能齊均也桀紂以亂湯武以賢涽涽淑淑皇皇穆穆涽涽思慮昏亂也淑淑未詳或曰美也皇皇穆穆言緒之美也言或愚或智也周流四海曾不崇日崇充也言智周流四海曽不充滿一日而遍也君子以修跖以穿室跖柳下惠之弟太山之盗也君子用智以修身跖用智以穿室皆帝不齊均之意也大參乎天精微而無形言智慮大則參天小則精微無形也行義以正事業以成皆在智也行下孟反可以禁暴足窮百姓待之而後寧泰足窮謂使窮者足也百姓待君上之智而後安寧泰當為泰寧臣愚而不識願問其名曰此夫安寛平而危險隘者也言智常欲就利逺害修潔之為親而雜汙之為狄者耶智修潔則可相親若雜亂穢汙則與夷狄無異言險詐難近也甚深藏而外勝敵者耶法禹舜而不能揜迹者耶揜襲行為動靜待之而後適者耶血氣之精也志意之榮也精靈榮華百姓待之而後寧也天下待之而後平也明達純粹而無疵也夫是之謂君子之知此論君子之智明小人之不智不然也知有物於此居則周靜致下動則綦髙以鉅居謂雲物發在地時周密也鉅大也圓者中規方者中矩言滿天地之圓方也大參天地德厚堯禹參為天地相似雲所以致雨生成萬物其德厚於堯禹者也精微乎毫毛而盈大乎㝢宙㝢與宇同言細微之時則如毫毛其廣大時則盈大於宇宙之内宇覆也謂天所覆三蒼云四方上下為宇上大參天地此又云盈大宇宙言說雲之變化或大或小故重言之也忽兮其極之逺也攭兮其相逐而反也攭與劙同攭兮分判貌言雲或慌忽之極而逺舉或分散相逐而還於山攭音戾卬卬兮天下之咸蹇也卬卬髙貌雲髙而不雨則天下皆蹇難也德厚而不捐五采備而成文捐弃也萬物或美或惡覆被之皆無捐弃也徃來惽憊通于大神惽憊猶晦暝也通于大神言變化不測也憊困也人困目亦昏暗故惽憊為晦暝也出入甚極莫知其門極讀為亟急也門謂所出也天下失之則滅得之則存雲所以成雨也弟子不敏此之願陳君子設辭請測意之弟子荀卿自謂言弟子不敏願陳此事不知何名欲君子設辭請測其意亦言雲之功德唯君子乃明知之也曰此夫大而不塞者與雲氣無實故曰不塞充盈大宇而不窕入郄穴而不偪者與窕讀為窱深貌也言充盈則滿大宇幽深則入郄穴而曽無偪側不容也窱他弔反行逺疾速而不可託訊者與訊書問也行逺疾速宜於託訊今雲者虛無故不可本或作託訓或曰與似續同也言雲行逺疾速不可依託繼續也徃來惽憊而不可為固塞者與雖徃來晦暝掩蔽萬物若使牢固蔽塞則不可也暴至殺傷而不億忌者與億謂以意度之論語曰億則屢中或曰與抑同謂雷霆震怒殺傷萬物曽不億度疑忌而果決不測也功被天下而不私置者與天下同被其功曾無所私置又言無偏頗託地而游宇友風而子雨風與雲並行故曰友雨因雲而生故曰子冬日作寒夏日作暑在冬而凝寒在夏而蒸暑也廣大精神請歸之雲至精至神通於變化唯雲乃可當此說也雲雲所以潤萬物人莫之知放於此則明也有物於此㒩㒩兮其狀屢化如神㒩讀如其蟲倮之倮㒩㒩無毛羽之貌變化即謂三俯三起成蛾蛹之類功被天下為萬世文文飾禮樂以成貴賤以分養老長㓜待之而後存名號不美與暴為隣侵暴者亦取名於蠶食故曰與暴為隣也功立而身廢事成而家敗繭成而見殺是身廢絲窮而繭盡是家敗弃其耆老收其後世耆老蛾也後世種也人屬所利飛鳥所害人屬則保而用之飛鳥則害而食之臣愚而不識請占之五帝占驗也五帝少吴顓頊髙辛唐虞理皆務本深知蠶之功大故請驗之也帝占之曰此夫身女好而頭馬首者與女好柔婉也其頭又類馬首周禮馬質禁原蠶者鄭𤣥云天文辰為馬故蠶書曰蠶為龍精月值大火則浴其種是蠶與馬同氣也屢化而不壽者與善壯而拙老者與壯得其養老而見殺有父母而無牝牡者與為蠶之時未有牝牡也冬伏而夏游食桑而吐絲遊謂化而出也前亂而後治繭亂而絲治也夏生而惡暑生長於夏先暑而化喜溼而惡雨溼謂浴其種既生之後則惡雨也蛹以為母蛾以為父互言之也三俯三起事乃大已俯為卧而不食事乃大已言三起之後事乃畢也謂化而成繭也夫是之謂蠶理五帝言此乃蠶之義理也蠶蠶之功至大時人鮮知其本詩曰婦無公事休其蠶織戰國時此俗尤甚故荀卿感而賦也有物於此生於山阜處於室堂山阜鐵所出也無知無巧善治衣裳知讀為智不盜不竊穿窬而行日夜合離以成文章合離謂使離者相合文章亦待其連綴而成也以能合從又善連衡從竪也子容反衡横也言箴亦能如戰國合從連衡之人南北為從東西為衡也下覆百姓上飾帝王功業甚博不見賢良見猶顯也不自顯其功伐見賢遍反時用則存不用則亡順時行藏臣愚不識敢請之王王曰此夫始生鉅其成功小者耶為鐵則鉅為箴則小長其尾而銳其剽者耶長其尾謂線也剽末也謂箴之鋒也莊子曰有實而無乎處者宇也有長而無本剽者宙也剽杪末之意匹小反頭銛達而剽趙繚者耶重說長其尾而銳其剽趙讀為掉掉繚長貌言箴掉尾而繚也掉徒弔反一徃一來結尾以為事結其尾線然後行箴無羽無翼反覆甚極極讀為亟亟急也尾生而事起尾邅而事已尾邅廻盤結則箴功畢也簪以為父管以為母簮形似箴而大故曰為父言此者欲狀其形也管所以盛箴故曰為母禮記曰箴管線纊也既以縫表又以連裏夫是之謂箴理理義理也箴古者貴賤皆有事故皇后親織𤣥紞公侯夫人加之以紘綖大夫妻成祭服士妻衣其夫末世皆不修婦功故託辭於箴明其為物微而用至重以譏當世也天下不治請陳佹詩荀卿請陳佹異激切之詩言天下不治之意也天地易位四時易鄉皆言賢愚易位也鄉猶方也春夏秋冬皆不當其方言錯亂也鄉如字列星殞墜旦暮晦盲列星二十八宿有行列者隕墜以喻百官弛廢旦暮晦盲言無蹔明時也或曰當時星辰隕墜旦暮昏霧也幽晦登昭日月下藏言幽闇之人登昭明之位君子明如日月反下藏也昭或為照公正無私反見從横公正無私之人反見謂從横反覆之志也志愛公利重樓疏堂欲在上位行至公以利百姓非謂重樓疏堂之榮貴也無私罪人憼革貳兵憼與儆同備也貳副也謂無私罪人言果於去惡也言去邪嫉惡乃以儆備増益兵革之道言彊盛也道德純備讒口將將將去也言以讒言相退送或曰將將讀為鏘鏘進貌仁人絀約敖暴擅彊絀退窮約天下幽險恐失世英天下幽暗凶險如此必恐時賢不見用也螭龍為蝘蜓鴟梟為鳳皇說文云螭如龍而黄北方謂之虵螻蝘蜓守宫言世俗不知善惡螭龍之聖反謂之蝘蜓鴟梟之惡反以為鳳皇也比干見刳孔子拘匡昭昭乎其知之明也郁郁乎其遇時之不祥也拂乎其欲禮義之大行也闇乎天下之晦盲也郁郁有文章貌拂違也此蓋誤耳當為拂乎其遇時之不祥也郁郁乎其欲禮義之大行晦盲言人莫之識也皓天不復憂無彊也千歲必反古之常也皓與昊同昊天言氣昊大也呼吴天而訴之云世亂不復憂不可竟也復自解釋云亂久必反於治亦古之常道千或為卒弟子勉學天不忘也言天道福善故曰不忘恐弟子疑為善無應而懈惰故以此勉之也聖人共手時幾將矣共讀為拱聖人拱手言不得用也幾辭也將送也去也言戰國之時世事已去不可復治也與愚以疑願聞反辭反辭反覆敘說之辭猶楚詞亂曰弟子言當時政事既與愚反疑惑之人故更願以亂辭敘之也其小歌也此下一章即其反辭故謂之小歌總論前意也念彼逺方何其塞矣逺方猶大道也仁人絀約暴人􅄛矣􅄛饒也忠臣危殆讒人服矣服用也本或作讒人般矣般樂也音盤琁玉瑤珠不知佩也說文云琁赤王瑤美玉也孔安國曰瑤美石言不知以此四實為佩說文云琁音瓊雜布與錦不知異也雜布布閭娵子奢莫之媒也閭娵古之美女後語作明娵楚詞七諫謂閭娵為醜惡註一名明陬漢書音義韋昭曰閭陬梁王魏嬰之美女子奢當為子都鄭之美人詩曰不見子都蓋都字誤為奢耳後語作子都莫之媒言無人為之媒也娵子于反嫫母刁父是之喜也嫫母醜女黄帝時也刁父未詳喜恱也以盲為明以聾為聰以危為安以吉為凶嗚呼上天曷維其同言感亂如此故歎而告上天曷維其同言何可與之同也後語作曷其與同此章即遺春申君之賦也荀子卷十八欽定四庫全書荀子卷
