front:
  text: 富國篇第十萬物同宇而異體同生宇内形體有異無宜而有用雖於人無常定之宜皆有可用人之理必在理得其道使之不爭然後可以富國也為人數也人倫並處同求而異道同欲而異知倫類也並處羣居也其在人之法數則以類羣居也同求異道謂或求為善或求為惡此人之性也生也皆有可也知愚同所可異也知愚分可者遂其意之謂也勢同而知異行私而無禍縱欲而不窮則民心奮而不可説也禍患也窮極也奮謂起而争競也説讀為悦若縱情性而無分則民心奮起争競而不可悦服也如是則知者未得治也知者未得治則功名未成也功名之立由於任智功名未成則羣衆未懸也有功名者居上無功名者居下然後羣衆懸隔若未有功名則羣衆齊等羣衆未懸則君臣未立也既無懸隔則未有君臣之位也無君以制臣無上以制下天下害生縱欲無上下相制則天下之害生於各縱其欲也欲惡同物欲多而物寡寡則必爭矣同物謂飲食男女人之大欲存焉死亡貧苦人之大惡存焉是賢愚同有此情也無君上之制各恣其欲則物不能贍故必爭之也故百技所成所以養一人也技功也一人君上也言百工所成之衆物所以養一人是物多而所奉者寡故能治也而能不能兼技雖能者亦不兼其技功使有分也謂梓匠輪輿各安其業則治雜之則亂人不能兼官皆使專一於分不二事也謂若䕫典樂稷播種之類離居不相待則窮羣而無分則爭不相待遺棄也窮謂為物所困也此言不羣則不可羣而無分亦不可也窮者患也爭者禍也救患除禍則莫若明分使羣矣此已上皆明有分則能羣然後可以富國也彊脅弱也知懼愚也民下違上少陵長不以徳為政徳謂教化使如分義如是則老弱有失養之憂而壮者有分爭之禍矣老弱不能以自存故憂失養壮者以力相勝故有分爭也事業所惡也功利所好也職業無分事業謂勞役之事人之所惡職業謂官職及四人之業也必使各供其職各從所務若無分則莫不惡勞而好逸也如是則人有樹事之患而有爭功之禍矣樹立也若無分則人人患於樹立己事而争人之功以此為禍也男女之合夫婦之分合配也分謂人各有偶也㛰姻聘内送逆無禮婦之父為㛰婿之父為姻言㛰姻者皆以二人之命也聘問名也内讀為納納幣也送致女逆親迎也如是則人有失合之憂而有爭色之禍矣失合謂䘮其配偶也故知者為之分也知如字知者謂知治道者乂讀為智皆通足國之道明富國之術也節用裕民而善藏其餘裕謂優饒也善藏其餘謂雖有餘不耗損而善藏之節用以禮裕民以政以禮謂用不過度以政謂取之有道也彼裕民故多餘人得優饒務於力作故多餘也裕民則民富民富則田肥以易易謂耕墾平易田肥以易則出實百倍所出榖實多也上以法取焉而下以禮節用之法取謂什一也以禮節用謂不妄耗費也餘若丘山不時焚燒無所藏之以言多之極也夫君子奚患乎無餘以墨子憂不足故知節用裕民則必有仁義聖良之名而且有富厚邱山之積矣名實皆美此無他故焉生於節用裕民也不知節用裕民則民貧民貧則田􅇤以穢貧則力不足耕耨失時也田􅇤以穢則出實不半不得其半上雖好取侵奪猶将寡獲也而或以無禮節用之則必有貪利紏譑之名而且有空虚窮乏之實矣紏察也譑發人罪也譑音矯此無他故焉不知節用裕民也康誥曰𢎞覆乎天若徳裕乃身此之謂也𢎞覆如天又順於德是乃所以寛裕汝身言百姓足君孰與不足也禮者貴賤有等長㓜有差貧富輕重皆有稱者也稱尺證反故天子袾裷衣冕袾古朱字裷字與衮同盡龍於衣謂之衮朱衮以朱為質也衣冕猶服冕也諸侯𤣥裷衣冕謂上公也周禮公之服自衮冕而下如王之服也大夫裨冕衣禆衣而服冕謂祭服也天子六服大裘為上其餘為裨裨之言卑也以事尊卑服之諸侯已下亦服焉鷩冕絺冕皆是也士皮弁服皮弁謂以白鹿皮為冠象上古也素積為裳用十五升布為之積猶辟也辟蹙其腰中故謂之素積也徳必稱位位必稱禄禄必稱用由士以上則必以禮樂節之衆庻百姓則必以法數制之君子用德小人用刑量地而立國謂若王制天子之縣内九十三國也計利而畜民謂若周制計一鄉地利所出畜萬二千五百家度人力而授事謂若一夫受田百畝使民必勝事事必出利利足以生民皆使衣食百用出入相揜百用雜用養生送死之類出出財也入入利也揜覆蓋也出入相揜謂量入為出使覆蓋不乏絶也必時藏餘謂之稱數足用有餘則以時藏之此之謂有稱之術數也故自天子通於庻人事無大小多少由是推之故曰朝無幸位民無幸生此之謂也上下所為之事皆以稱數推之故無徼幸之徒無德而禄謂之幸位惰㳺而食謂之幸生也輕田野之税平闗市之征平猶除也謂譏而不征也省商賈之數省減也謂使農夫衆也罕興力役無奪農時如是則國富矣夫是之謂以政裕民此以政優饒民之術也人之生不能無羣羣而無分則爭爭則亂亂則窮矣窮困故無分者人之大害也有分者天下之夲利也本當為大而人君者所以管分之樞要也樞户樞也故美之者是美天下之夲也美謂美其有分安之者是安天下之夲也貴之者是貴天下之夲也古者先王分割而等異之也以分割制之以等差異之故使或美或惡或厚或薄或佚或樂或劬或勞美謂褒寵惡謂刑戮厚薄貴賤也在位則佚樂百姓則劬勞也非特以為淫泰夸麗之聲将以明仁之文通仁之順也仁謂人也言為此上事不惟使人瞻望自為夸大之聲将以明仁人乃得此文飾言至貴也通仁人乃得此順從言不違其志也故為之彫琢刻鏤黼黻文章玉謂之彫亦謂之琢木謂之刻金謂之鏤白與黒謂之黼黒與青謂之黻青與赤謂之文赤與白謂之章使足以辨貴賤而已不求其觀不求使人觀望也古亂反為之鐘鼔管磬琴瑟竽笙使足以辨吉凶合歡定和而已不求其餘和謂和􅂔餘謂過度而作鄭衛者也為之宫室臺榭使足以避燥濕養德辨輕重而已不求其外德謂君上之德輕重尊卑也外謂峻宇彫牆之類也詩曰彫琢其章金玉其相亹亹我王綱紀四方此之謂也詩大雅棫樸之篇相質也亹亹勸勉之貎言彫琢為文章又以金玉為質勉力為善所以紀綱四方也與詩義小異也若夫重色而衣之重味而食之重財物而制之合天下而君之重多也直用反非特所以為淫泰也固以為王天下治萬變材萬物材與裁同養萬民兼制天下者為莫若仁人之善也夫故其知慮足以治之其仁厚足以安之其德音足以化之得之則治失之則亂百姓誠頼其知也故相率而為之勞苦以務佚之以養其知也知讀為智誠美其厚也故為之出死㫁亡以覆救之以養其厚厚謂恩厚也出死謂出身致死㫁猶判也言判其死亡也覆蓋蔽也㫁丁亂反誠美其德也故為之彫琢刻鏤黼黻文章以藩飾之以養其德有德者宜備藩衞文飾也故仁人在上百姓貴之如帝天帝也親之如父母為之出死㫁亡而愉者愉歡無他故焉其所是焉誠美其所得焉誠大其所利焉誠多是謂可其意也言百姓所得者多故親愛之也詩曰我任我輦我車我牛我行既集蓋云歸哉此之謂也詩小雅黍苗之篇引此以明百姓不憚勤勞以奉上鄭云集猶成也蓋猶皆也轉餽之役有負任者有輓輦者有将車者有牽傍牛者事既成召伯則皆告之云可以歸矣故曰君子以德小人以力君子以德撫下故百姓以力事上也力者德之役也力為德所使役百姓之力待之而後功百姓雖有力待君上所使然後有功也百姓之羣待之而後和百姓之財待之而後聚百姓之勢待之而後安百姓之壽待之而後長皆明待君上之德化然後無爭奪相殺父子不得不親兄弟不得不順男女不得不歡少者以長老者以養故曰天地生之聖人成之此之謂也古者有此語引此以明之也今之世而不然厚刀布之歛以奪之財重田野之税以奪之食苛闗市之征以難其事苛暴也征亦税也苛闗市之征出入賣買皆有税也使貨不得通流故曰難其事也不然而已矣不惟如此而已有掎挈伺詐權謀傾覆以相顛倒以靡弊之有讀為又掎摭其事挈舉其過伺候其罪詐偽其辭顛倒反覆也靡盡也弊敗也或曰靡讀為縻縻散也弊盡也百姓曉然皆知其汙漫暴亂而将大危亡也汙漫皆穢行也漫莫半反是以臣或弑其君下或殺其上粥其城倍其節而不死其事者無他故焉人主自取之粥其城謂以城降人以為已利節忠節也此皆由丄無恩德故下亦傾覆也詩曰無言不讐無德不報此之謂也詩大雅抑之篇兼足天下之道在明分掩地表畝掩地謂耕田使地相掩表明也謂明其經界使有畔也刺􅋄殖榖刺絶也屮古草字也多糞肥田是農夫衆庶之事也守時力民守時敬授人時力民使之疾力進事長功進其事業長其功利和齊百姓使民不偷是将率之事也将率猶主領也若今宰守高者不旱下者不水寒暑和節而五榖以時熟是天下之事也是天下豐穰之事非由人力也若夫兼而覆之兼而愛之兼而制之嵗雖凶敗水旱使百姓無凍餒之患則是聖君賢相之事也墨子之言昭昭然為天下憂不足夫不足非天下之公患也非公共之患也特墨子之私憂過計也今是土之生五榖也人善治之則畝數盆一嵗而再獲之蓋當時以盆為量考工記曰盆實二鬴墨子曰子墨子弟子仕於衞而反子曰何故反曰與我言而不當曰待汝以千盆授我五百盆故去之獲讀為穫然後𤓰􅊝棗李一夲數以盆鼔一夲一株也鼓量也禮記曰獻米者操量鼔數以盆鼓謂數度以盆量也言然後謂除五榖之外更有此果實然後葷菜百疎以澤量葷辛菜也疎與䟽同以澤量言滿澤也猶俗量牛馬然後義與上同也然後六畜禽獸一切而剸車剸與專同言一獸滿一車也黿鼉魚鼈鰌鱣以時别一而成羣别謂生育與母分别也以時别謂不及其生使得成遂也一而成羣言每一類皆得成羣也然後飛鳥鳬鴈若烟海遠望如烟之覆海皆言多也然後昆蟲萬物生其間昆蟲蚳䗘蜩范之屬也除大物之外其間又有昆蟲萬物鄭云昆明也得陽而出得隂而藏之蟲也可以相食養者不可勝數也夫天地之生萬物也固有餘足以食人矣麻葛繭絲鳥獸之羽毛齒革也固有餘足以衣人矣衣去聲夫有餘不足非天下之公患也特墨子之私憂過計也天下之公患亂傷之也胡不嘗試相與求亂之者誰也我以墨子之非樂也則使天下亂墨子之節用也則使天下貧非将隳之也説不免焉非将隳毁墨子論説不免如此墨子大有天下小有一國天子諸侯将蹙然衣麤食惡憂戚而非樂墨子言樂無益於人故作非樂篇無樂則人情憂戚故曰憂戚而非樂也若是則瘠瘠則不足欲不足欲則賞不行瘠奉養薄也奉養既薄則不能足其欲欲既不足則賞何能行乎言皆由不顧賞也夫賞以富厚故人勸勉有功勞者而與之麄衣惡食是常道廢也荘子説墨子曰其生也勤其死也薄其道大觳郭云觳無潤也義與瘠同觳苦角反墨子大有天下小有一國将少人徒省官職省所景反上功勞苦與百姓均事業齊功勞謂君臣並耕而食饔飡而治若是則不威不威則賞罰不行上下懸隔故得以法臨馭若君臣齊等則威不立矣賞不行則賢者不可得而進也罰不行則不肖者不可得而退也賞罰所以進賢而退不肖賢者不可得而進也不肖者不可得而退也則能不能不可得而官也不可置於列位而廢置也若是則萬物失宜事變失應上失天時下失地利中失人和賞罰不行賢愚一貫故有斯弊天下敖然若燒若焦敖讀為􅆈若燒若焦言萬物寡少如被燒焚然墨子雖為之衣褐帶索嚽菽飲水惡能足之乎嚽與啜同惡與烏同既以伐其夲竭其原而焦天下矣故先王聖人為之不然知為人主上者不美不飾之不足以一民也不富不厚之不足以管下也管猶包也不威不彊之不足以禁暴勝悍也故必将撞大鐘擊鳴鼔吹笙竽彈琴瑟以塞其耳必将錭琢刻鏤黼黻文章以塞其目錭與彫同必将芻豢稻粱五味芬芳以塞其口塞猶充也然後衆人徒備官職漸慶賞漸進嚴刑罰以戒其心使天下生民之屬皆知己之所願欲之舉在于是也故其賞行舉皆也于是猶言是于言生民所願欲皆在是于也説苑亦作是于也皆知己之所畏恐之舉在于是也故其罰威其罰可畏賞行罰威則賢者可得而進也不肖者可得而退也能不能可得而官也若是則萬物得宜事變得應上得天時下得地利中得人和則財貨渾渾如泉源渾渾水流貌如泉源言不絶也渾户夲反汸汸如河海汸讀為滂水多貌也暴暴如丘山暴暴卒起之貌言物多委積高大如邱山也不時焚燒無所藏之夫天下何患乎不足也故儒術誠行則天下大而富使有功大讀為泰優泰也使謂為上之使可使則有功者也撞鐘擊鼓而和詩曰鐘鼔喤喤磬筦将将降福穰穰降福簡簡威儀反反既醉既飽福禄來反此之謂也詩周頌執競之篇毛云喤喤将将皆聲和貌穰穰衆也簡簡大也鄭云反反順習之貌反復也故墨術誠行則天下尚儉而彌貧非鬭而日爭墨子有非政篇非政則非鬭也既上失天時下失地利則物出必寡雖尚儉而民彌貧物不能贍雖以鬭為非日日爭競也勞苦頓萃而愈無功愀然憂戚非樂而日不和説文云頓下首也萃與顇同上下不能相制雖勞苦頓萃猶将無益也鄭注禮記云愀然變動貌詩曰天方薦瘥䘮亂𢎞多民言無嘉憯莫懲嗟此之謂也詩小雅節南山之篇薦重也瘥病也憯曾也懲止也嗟奈何薦或作荐􅂷事養民􅂷下也以上所操持之事下就於民而養之謂施小惠拊循之唲嘔之拊與撫同撫循慰悦也唲嘔嬰兒語聲也唲於佳反嘔與謳同冬日則為之饘粥夏日則與之𤓰麮麩煑麥飯也丘舉反以偷取少頃之譽焉是偷道也可以少頃得姦民之譽然而非長久之道也事必不就功必不立是姦治者也姦人為治偷取其譽傮然要時務民傮然盡人力貌説文云傮終也要時趨時也務勉強也謂以勞役彊民也傮子牢反要一饒反進事長功益上之功利也輕非譽而恬失民恬安也言不顧下之毁譽而安然忘於失民也事進矣而百姓疾之事雖長進而百姓怨是又不可偷偏者也言亦不可苟且偏為此勞苦民之事也徒壊墮落必反無功雖苟求功利旋即毁壊墮落必反無成功也故垂事養譽不可以遂功而忘民亦不可皆姦道也以用故古人為之不然使民夏不宛暍使民謂役使民也宛讀曰藴暑氣也詩曰藴隆蟲蟲暍傷暑也或曰宛當為奥篆文宛字與奥字略相似遂誤耳奥與六反熱也冬不凍寒急不傷力緩不後時皆謂量民之力不使有所傷害事成功立上下俱富而百姓皆愛其上人歸之如流水親之歡如父母為之出死㫁亡而愉者無他故焉忠信調和均辨之至也均平均辨明察故君國長民者欲趨時遂功則和調累解速乎急疾忠信均辨説乎賞慶矣必先脩正其在我者然後徐責其在人者威乎刑罰自故君國長民以下其義未詳亦恐脱誤或曰累解嬰累解釋也言君長人欲趨時遂功者若和調而使嬰累解釋則民速乎急疾言效上之急不後時也若忠信均辨則民悦乎慶賞若先責已後責人則民畏乎刑罰累音類解佳買切説讀為悦三德者誠乎上則下應之如影嚮三德謂調和解累忠信均辨正己而後責人也誠乎上謂上誠意行之也嚮讀為響或曰三德即忠信調和均辨也雖欲無明達得乎哉書曰乃大明服惟民其勑懋和若有疾此之謂也書康誥懋勉也言君大明以服下則勉力為調和而疾速以明效上之急也故不教而誅則刑繁而邪不勝教而不誅則姦民不懲誅而不賞則勤屬之民不勸屬謂著於事業之欲反或讀為厲誅賞而不類則下疑俗儉而百姓不一不類不以其類謂賞不當功罰不當罪儉當為險險謂徼幸免罪苟且求賞也故先王明禮義以一之致忠信以愛之尚賢使能以次之爵服慶賞以申重之申亦重也再令曰申時其事輕其任以調齊之時其事謂使人趨時不奪之也輕其任謂量力而使也潢然兼覆之養長之如保赤子潢與㳾同潢然水大至之貌也若是故姦邪不作盗賊不起而化善者勸勉矣化善化而為善者也是何耶則其道易平易可行其塞固其政令一其所充塞民心者固其防表明隄防標表明白易識故曰上一則下一矣上二則下二矣辟之若􅋄木枝葉必類夲此之謂也辟讀為譬􅋄古草字不利而利之不如利而後利之之利也不愛而用之不如愛而後用之之功也利而後利之不如利而不利者之利也愛而後用之不如愛而不用者之功也利而不利也愛而不用也者取天下矣利而後利之愛而後用之者保社稷也不利而利之不愛而用之者危國家也觀國之治亂臧否至於疆易而端已見矣易與場同端首也見賢遍反其候徼支繚候斥候徼廵也支繚支分繚繞言委曲廵警也其竟關之政盡察竟與境同盡察極察言無不察也是亂國已亂國多盗賊姦人故用苛察之政也入其境其田疇穢都邑路是貪主已路謂無城郭墻垣主貪財民貧力不足故路也觀其朝廷則其貴者不賢觀其官職則其治者不能觀其便嬖則其信者不慤是闇主已便嬖左右小臣寵幸者也信者不慤所親信者不愿慤也主闇故姦人多容也凡主相臣下百吏之俗其於貨財取與計數也湏熟盡察俗謂風俗取謂賦斂與謂賜與計數計算也湏待也熟精熟也盡察極察也其於計數貨財必待精熟極察然後行言不簡易急於貪利者也其禮義節奏也芒軔僈楛是辱國已禮義節奏謂行禮義之節文芒昧也或讀為荒言不習熟也軔柔也亦怠惰之義僈與慢同楛不堅固也辱國言必見凌辱也其耕者樂田其戰士安難其百吏好法其朝廷隆禮其卿相調議是治國已安難不逃難也觀其朝廷則其貴者賢觀其官職則其治者能觀其便嬖則其信者慤是明主已凡主相臣下百吏之俗其於貨財取與計數也寛饒簡易不汲汲於貨財也其於禮義節奏也陵謹盡察是榮國已陵侵陵言深於禮義也謹嚴也言不敢慢易也賢齊則其親者先貴能齊則其故者先官雖舉在至公而必先親故所謂故舊不遺則民不偷其臣下百吏汙者皆化而脩悍者皆化而愿躁者皆化而慤是明主之功已躁暴急之人也觀國之彊弱貧富有徵驗徵驗言其驗先見也上不隆禮則兵弱上不愛民則兵弱已諾不信則兵弱慶賞不漸則兵弱漸進将率不能則兵弱率與帥同上好攻取功則國貧民不得安業也上好利則國貧賦斂重也士大夫衆則國貧所謂三百赤芾工商衆則國貧農桑者少也無制數度量則國貧不為限量則物耗費下貧則上貧下富則上富百姓足君孰與不足故田野縣鄙者財之夲也垣􅐎倉廩者財之末也垣築牆四周以藏榖也􅐎窖也掘地藏榖也榖藏曰倉米藏曰廩􅐎匹教反百姓時和事業得叙者貨之源也等賦府庫者貨之流也時和得天之和􅂔謂嵗豐也事業得叙耕稼得其次序上不奪農時也等賦以差等制賦貨財皆錢榖通名别而言之則䅇未布帛曰財錢布龜貝曰貨也故明主必謹養其和節其流開其源而時斟酌焉節謂薄斂開謂勸課時斟酌謂賦斂賑䘏豐荒有制也潢然使天下必有餘而上不憂不足如是則上下俱富交無所藏之是知國計之極也交無所蔵言上下不相隱故禹十年水湯七年旱而天下無菜色者十年之後年榖復熟而陳積有餘無食菜之色也是無他故焉知夲末源流之謂也故田野荒而倉廩實百姓虚而府庫滿夫是之謂國蹷蹷傾倒也伐其夲竭其源而并之其末然而主相不知惡也則其傾覆滅亡可立而待也以國持之而不足以容其身夫是之謂至貪是愚主之極也以一國扶持之至堅固也而無所容其身者貪也将以求富而䘮其國将以求利而危其身古有萬國今有十數焉是無他故焉其所以失之一也皆以貪失之也君人者亦可以覺矣以此自覺悟也百里之國足以獨立矣此言無道則雖大必至滅亡有道則雖小足以獨立也凡攻人者非以為名則案以為利也不然則忿之也凡攻伐者不求討亂征暴之名則求貨財土地之利不然則以忿怒不出此三事也為于偽反仁人之用國将脩志意正身行用為也行下孟反伉隆髙伉舉也舉崇高遠大之事致忠信期文理期當為綦極文理謂其有條貫也布衣紃屨之士誠是則雖在窮閻漏屋而王公不能與之争名紃絛也謂編麻為之麄䋲之屨也或讀為穿王公不能與之争名過王公也以國載之則天下莫之能隱匿也載猶任也以國委任賢士則天下莫能隱匿言其國聲光大也若是則為名者不攻也伐有道秪成惡名故不攻也将辟田野實倉廩便備用上下一心三軍同力與之遠舉極戰則不可違舉縣君於遠也極戰若戰也彼暴國欲與我如此則不可也境内之聚也保固視可其境内屯聚則保其險固視其可進謂觀釁而動也午其軍取其将若撥䵄午讀為迕遇也周禮籩人職云朝事之籩其實䵄蕡鄭云䵄􅆈麥今河間以此煑穜麥賣之名曰䵄據鄭之説䵄麥之牙蘖也至脆弱故以喻之若撥䵄如以手撥䵄也䵄與豐同彼得之不足以藥傷補敗藥猶醫也彼縱有所得不足以藥其所傷補其所敗言所獲不如所亡也彼愛其爪牙畏其仇敵若是則為利者不攻也愛已之爪牙畏與我為仇敵為于偽反将脩小大彊弱之義以持慎之慎讀為順修小事大弱事彊之義守持此道以順大國禮節将甚文珪璧将甚碩貨賂将甚厚文謂敬事之威儀也珪璧所用聘好之物碩大也所以説之者必将雅文辯慧之君子也所使行人往説之者則用文雅禮讓之士説音税彼苟有人意焉夫誰能忿之若是則忿之者不攻也為名者否為利者否為忿者否否不攻也為于偽反則國安于盤石壽於旗翼盤石盤薄大石也旗讀為箕箕翼二十八宿名言壽比於星也荘子曰傅説得之乘東維騎箕尾而比於列宿亦其類也或曰禮記百年曰期頥鄭云期要也頥養也人皆亂我獨治人皆危我獨安人皆失䘮之我獨按起而制之或曰按然後也故仁人之用國非特将持其有而已也又将兼人不惟持其所有而已詩曰淑人君子其儀不忒其儀不忒正是四國此之謂也曹風鳲鳩之篇持國之難易論守國難易之法也事彊暴之國難使彊暴之國事我易事之以貨寶則貨寶單而交不結約信盟誓則約定而畔無日約以定隨即畔之無日言不過一日文子作約定而反無日割國之錙銖以賂之則割定而欲無厭十黍之重為銖八兩為錙此謂以地賂彊國割地必不多與故以錙銖言之厭一占反韓詩外傳作割國之疆􅂷以賂之事之彌煩其侵人愈甚必至於資單國舉然後已單盡也國舉謂盡舉其國與人也雖左堯而右舜未有能以此道得免焉者也辟之是猶使處女嬰寳珠珮寳玉嬰繫於頸也寳謂珠玉中可寳者也負戴黃金而遇中山之盗雖為之逄䝉視詘要撓膕君盧屋妾由将不足以免之逄䝉古之善射者詘與屈同要讀為腰撓曲也膕曲脚中古獲反盧當為廬由與猶同言處女如善射者之視物謂微眇不敢正視也既微視又屈腰撓膕言俯伏畏懼之甚也君廬屋妾謂處女自稱是君廬屋之妾猶言箕箒妾卑下之辭也雖畏懼卑辭如此猶不免刼奪也故非有一人之道也謂不能齊一其人同力以拒大國也直将巧繁拜請而畏事之但巧為繁多拜請以畏事也則不足以持國安身故明君不道也耻辱如此雖得免禍亦不足以為持國安身之術故明君不言也必将修禮以齊朝正法以齊官平政以齊民然後節奏齊於朝齊整也節奏禮之節文也謂上下皆有禮百事齊於官百事皆有法度衆庶齊於下上政均平故民齊一如是則近者競親遠方致願致極也極願來附也上下一心三軍同力名聲足以暴炙之名聲如日暴火炙炎赫也威彊足以捶笞之拱揖指麾而彊暴之國莫不趨使譬之是猶烏獲與焦僥搏也烏獲秦之力人舉千鈞者焦僥短人長三尺者搏鬭也故曰事彊暴之國難使彊暴之國事我易此之謂也
