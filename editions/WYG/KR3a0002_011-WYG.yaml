  hash: sha256:41cbc3e287cbeb5581532e5ce509a62c991a99eadfa9d6276e41eacbbda4d3f5
body:
  text: 唐楊倞註彊國篇第十六刑范正金錫美工冶巧火齊得火齊得謂生熟齊和得宜考工記云金有六齊齊才細反剖刑而莫耶已刑與形同范法也刑范鑄劔規模之器也剖開也莫耶古之良劒也然而不剥脱不砥礪則不可以斷繩剥脱謂刮去其生澁砥礪謂磨淬也剥脱之砥礪之則蠫盤盂刎牛馬忽然耳蠫割也音戾蠫盤盂刎牛馬蓋古用試劒者也戰國䇿趙奢謂田單曰吳干將之劒肉試則斷牛馬金試則截盤盂盤盂皆銅器猶刜鍾無聲及㫁牛馬者也忽然言容易也彼國者亦彊國之剖刑已如彊國之初開此也然而不教誨不調一則入不可以守出不可以戰教誨之調一之則兵勁城固敵國不敢攖也彼國者亦有砥礪禮義節奏是也節奏有法度也故人之命在天國之命在禮人君者隆禮尊賢而王重法愛民而霸好利多詐而危權謀傾覆幽險而盡亡幽深傾險使下難知則盡亡也威有三有道徳之威者有暴察之威者有狂妄之威者暴察謂暴急嚴察也此三威者不可不熟察也禮樂則脩分義則明分謂上下有分義謂各得其宜舉錯則時愛利則形形見也愛利人之心見於外也如是百姓貴之如帝高之如天帝天神也親之如父母畏之如神明故賞不用而民勸罰不用而威行夫是之謂道徳之威禮樂則不脩分義則不明舉錯則不時愛利則不形然而其禁暴也察其誅不服也審其刑罰重而信其誅殺猛而必申商之比黭然而雷擊之如牆厭之黭然卒至之貎説文云黭黑色猶闇然黭烏感反厭讀為壓如是百姓劫則畏見劫脅之時則畏也嬴則敖稍嬴緩之則敖謾嬴音盈上執拘則最得間則散最聚也間隙也公羊傳曰會猶最也何休曰最聚也敵中則奪敵人得中道則奪其國一曰中擊也丁仲反非劫之以形勢非振之以誅殺則無以有其下振動夫是之謂暴察之威無愛人之心無利人之事而日為亂人之道百姓讙敖則從而執縛之刑灼之不和人心讙喧嘩也敖喧噪也亦讀為敖謂呌呼之聲敖敖然也五刀反如是下比周賁潰以離上矣賁讀為憤憤然也民逃其上曰潰傾覆滅亡可立而待也夫是之謂狂妄之威此三威者不可不熟察也道徳之威成乎安彊暴察之威成乎危弱狂妄之威成乎滅亡公孫子曰子發將西伐蔡克蔡獲蔡侯公孫子齊相也未知其名後語孟嘗君客有公孫成豈後為齊相乎或曰公孫名忌子發楚令尹未知其姓戰國䇿莊辛諫楚莊王曰蔡靈侯南遊乎高陂北陵乎巫山右枕幼妾左擁嬖女馳騁乎高蔡之間不以國家為事不知子發方受命于靈王繫以朱絲而見之史記蔡侯為楚惠王所滅莊辛云靈王與史記不同也歸致命曰蔡侯奉其社稷而歸之楚歸致命於君言蔡侯自奉其社稷歸楚非己之功也舍屬二三子而理其地舍子發名屬之欲反二三子楚之諸臣也理其地謂安輯其民也子發不欲獨擅其功故請諸臣理其地也既楚發其賞既謂論功之後發行也子發辭曰發誡布令而敵退是主威也徙舉相攻而敵退是將威也合戰用力而敵退是衆威也誡教也凡發誡布令而敵退則是畏其主徙舉相攻而敵退則是畏其將合戰用力而敵退則是畏其衆也臣舍不宜以衆威受賞是時合戰用力而滅蔡故曰衆威此已上公孫子美子發之辭也已下孫卿之辭也譏之曰子發之致命也恭其辭賞也固固陋也其致命難其辭賞則固陋非坦明知道者也夫尚賢使能賞有功罰有罪非獨一人為之也自古皆然彼先王之道也一人之本也善善惡惡之應也彼彼賞罰也言彼賞罰者先王之道齊一人之本善善惡惡之報應也治必由之古今一也為治必用賞罰古者明王之舉大事立大功也大事已博大功已立則君享其成羣臣享其功享獻也謂受其獻也士大夫益爵官人益秩庶人益禄爵謂若秦庶長不更之屬官人羣吏也庶人士卒也秩禄皆謂廪食也是以為善者勸為不善者沮上下一心三軍同力是以百事成而功名大也今子發獨不然反先王之道亂楚國之法墮興功之臣耻受賞之屬人皆受賞子發獨辭是使興功之臣墮廢其志受賞之屬慙耻於心無僇乎族黨而抑卑其後世夫先祖有寵錫則子孫揚其功族黨遭刑戮則後世䝉其恥今子發自謂無功則子孫無以稱揚雖無刑戮之恥而後世亦抑損卑下無以光榮也按獨以為私靡豈不過甚矣哉故曰子發之致命也恭其辭賞也固處勝人之勢行勝人之道天下莫忿湯武是也處勝人之勢不以勝人之道以用也厚於有天下之勢索為匹夫不可得也桀紂是也然則得勝人之勢者其不如勝人之道遠矣夫主相者勝人以勢也是為是非為非能為能不能為不能併己之私欲必以道夫公道通義之可以相兼容者是勝人之道也併讀為屏棄也屏棄私欲通達公義今相國上則得專主下則得專國相國之於勝人之勢亶有之矣亶讀為擅本亦或作擅或曰亶誠也然則胡不毆此勝人之勢赴勝人之道毆謂駕馭之也或作謳歌此勝人之勢誤也求仁厚明通之君子而託王焉求賢而託之以王使輔佐也與之參國政正是非如是則國孰敢不為義矣國内皆化之也君臣上下貴賤長少至于庶人莫不為義則天下孰不欲合義矣天下皆來歸義也賢士願相國之朝能士願相國之官好利之民莫不願以齊為歸是一天下也相國舍是而不為安直為是世俗之所以為不為勝人之道但為勝人之勢則女主亂之宮詐臣亂之朝貪吏亂之官衆庶百姓皆以貪利爭奪為俗曷若是而可以持國乎今巨楚縣吾前楚在齊南故曰前縣聮繫之也大燕鰌吾後燕在齊北故曰後鰌蹴也如蹴㳫於後莊子風謂蛇曰鰌我亦作蹲吾後也勁魏釣吾右西壤之不絶若繩魏在齊西故曰右釣謂釣取物也西壤齊西界之地若繩言細也楚人則乃有襄賁開陽以臨吾左襄賁開陽楚二邑在齊之東者也漢書地理志二縣皆屬東海郡賁音肥是一國作謀三國必起而乗我一國謀齊則三國乗其弊如是則齊必斷而為四三國分齊則斷為四謂楚取其二魏燕取其二也三國若假城耳言齊如三國之寄城耳不久當歸之也必為天下大笑曷若天下必笑其無謀滅亡問以為何如也兩者孰足為之兩者勝人之道與勝人之勢一則天下歸一則天下笑問何者可為也夫桀紂聖王之後子孫也有天下者之世也世謂繼也勢籍之所存天下之宗室也勢謂國籍之所在也土地之大封内千里人之衆數以億萬其數億萬俄而天下倜然舉去桀紂而犇湯武倜然高舉之貎舉皆也犇與奔同反然舉惡桀紂而貴湯武反音翻翻然改變貎惡烏路反是何也夫桀紂何失而湯武何得也假設問答曰是無他故焉桀紂者善為人所惡也而湯武者善為人所好也人之所惡何也曰汙漫爭奪貪利是也汙漫謂穢汙不脩㓗也或曰漫謂欺誑也汙烏路反漫莫但反人之所好者何也曰禮義辭讓忠信是也今君人者辟稱比方則欲自並乎湯武辟讀為譬稱尺證反若其所以統之則無以異於桀紂而求有湯武之功名可乎統制治也故凡得勝者必與人也凡得人者必與道也道也者何也曰禮讓忠信是也故自四五萬而往者彊勝非衆之力也隆在信矣而往猶已上也言有兵四五萬已上者若能崇信則足以自致彊勝不必更待與國之衆也若不崇信雖有與國之衆猶無益故曰非衆之力也自數百里而往者安固非大之力也隆在脩政矣有數百里之地脩政則安固不必更在廣也荀卿常言湯武以百里之地王天下今言此者若言常人之理非論聖人也今已有數萬之衆者也陶誕比周以相與陶當為檮杌之檮或曰當為逃謂逃匿其情與謂黨與之國也已有數百里之國者也汙漫突盗以爭地突謂相凌犯也然則是弃己之所安彊而爭己之所以危弱也損己之所不足以重己之所有餘損減也重多也不足謂信與政有餘謂衆與地也若是其悖繆也而求有湯武之功名可乎辟之是猶伏而咶天救經而引其足也咶與䑛同經縊也救縊而引其足縊愈急也説必不行矣愈務而愈遠為人臣者不恤已行之不行上行下孟反下行如字苟得利而已矣是渠衝入穴而求利也渠大也渠衝攻城之大車也詩曰臨衝閑閑韓子曰奏百貍首射侯不當彊弩趨發平城距衝不若堙内伏橐或作距衝蓋言可以距石矣是仁人之所羞而不為也屈大就小務於苟得故羞而不為也故人莫貴乎生莫樂乎安所以養生安樂者莫大乎禮義人知貴生樂安而弃禮義辟之是猶欲夀而歾頸歾當為刎愚莫大焉故君人者愛民而安好士而榮兩者無一焉而亡詩曰价人維藩大師維垣此之謂也大雅板之篇義已解上也力術止義術行曷謂也曰秦之謂也力術彊兵之術義術仁義之術止謂不能進取霸王也言用力術則止用義術則行發此論以謂秦也新序李斯問孫卿曰當今之時為秦奈何孫卿曰力止義行秦之謂也威彊乎湯武廣大乎舜禹然而憂患不可勝校也校計諰諰然諰思里反常恐天下之一合而軋已也此所謂力術止也曷謂乎威彊乎湯武湯武也者乃能使説已者使耳説音悦今楚父死焉國舉焉負三王之廟而辟於陳蔡之間此楚頃襄王之時也父謂懷王為秦所虜而死也至二十一年秦將白起遂拔我鄢郢燒先王墓於夷陵襄王兵散遂不復戰東北保陳成廟主也辟如字謂自屏遠也或讀為避視可司間安欲剡其脛而以蹈秦之腹視可謂觀其可伐司音伺間隙也剡亦斬也然而秦使左案左使右案右是乃使讎人役也秦能使讎人為之徒役謂楚襄王七年迎婦於秦城十五年與秦伐燕二十七年復與秦平而入太子質之類也此所謂威彊乎湯武也曷為廣大乎舜禹也曰古者百王之一天下臣諸侯未有過封内千里者也封畿之内今秦南乃有沙羡與俱是乃江南漢書地理志沙羡縣屬江夏郡此地俱屬秦是有江南也北與胡貊為隣西有巴戎巴在西南戎在西皆隸屬秦東在楚者乃界於齊謂東侵楚地所得者乃與齊為界也在韓者踰常山乃在臨慮漢書地理志臨慮縣名屬河内今屬相州也在魏者乃據圉津即去大梁百有二十里耳圉當為圍漢書曹參下脩武度圍津顔師古曰在東郡豈古名圍津傳寫為圉或作韋津今有韋城豈是邪史記朱忌謂魏安釐曰秦固有懐茅邢丘城垝津以臨河内河内共汲必危垝圍聲相近疑同垝居委反其在趙者剡然有苓而據松栢之塞剡然侵削之貌苓地名未詳所在或曰苓與靈同漢書地理志常山郡有靈壽縣今屬真定或曰苓當為卷案卷縣屬河南非趙地也松栢之塞謂趙樹松栢與秦為界今秦據有之負西海而固常山負背也常山本趙山今秦有之言秦背西海東向以常山為固是地徧天下也威動海内彊殆中國秦之彊能危殆中國殆或為治然而憂患不可勝校也諰諰然諰思里反常恐天下之一合而軋已也此所謂廣大乎舜禹也然則奈何曰節威反文節減威彊復用文理案用夫端誠信全之君子治天下焉全謂徳全因與之參國政正是非治曲直聽咸陽使聽咸陽之政順者錯之不順者而後誅之錯置也謂捨而不伐若是則兵不復出於塞外而令行於天下矣若是則雖為之築明堂於塞外而朝諸侯使殆可矣明堂天子布政之宮於塞外三字衍也以前有兵不復出於塞外故誤重寫此三字耳殆庶幾也秦若使賢人為政雖築明堂朝諸侯庶幾可矣或曰塞外境外也明堂壇也謂廵狩至方岳之下㑹諸侯為宮方三百歩四門壇十有二尋深四尺加方明其上左氏傳為王宮於踐土亦其類也或曰築明堂於塞外謂使他國為秦築帝宮也戰國策韓王謂張儀曰謂比秦郡縣築帝宮祠春秋稱東蕃是也假今之世益地不如益信之務也應侯問孫卿曰入秦何見應侯秦相范睢封於應也杜元凱云應國在襄陽城父縣西南也孫卿曰其固塞險形勢便山林川谷美謂多良材及溉灌之利也天材之利多所出物産多也是形勝也形地形便而物産多所以為勝故曰如高屋之上而建瓴水也入境觀其風俗其百姓樸其聲樂不流汙流邪淫也汙濁也不流汙言清雅也其服不佻佻偷也不為竒異之服詩序曰長民者衣服不貳從容有常以齊其民則民徳一也甚畏有司而順古之民也及都邑官府及至也至縣邑之廨署其百吏肅然莫不恭儉敦敬忠信而不楛古之吏也楛音苦濫惡也或曰讀為王事靡盬之盬盬不堅固也入其國觀其士大夫出於其門入於公門出於公門歸於其家無有私事也不比周不朋黨倜然莫不明通而公也古之士大夫也倜然高逺貌觀其朝廷其間聽決百事不留恬然如無治者古之朝也其間朝退也古莧反恬然安閑貌如無治者如都無聽治處也故四世有勝非幸也數也是所見也故曰佚而治約而詳不煩而功治之至也秦類之矣雖佚而治雖約而詳雖不煩而有功古之至治有如此者秦似之雖然則甚有其諰也諰懼兼數具者而盡有之然而縣之以王者之功名則倜倜然其不及遠矣縣音懸謂聯繫是何也則其殆無儒耶故曰粹而王粹謂全用儒道駁而霸無一焉而亡此亦秦之所短也積微月不勝日時不勝月嵗不勝時積微細之事月不如日言當日日留心於庶事不可怠忽也凡人好敖慢小事大事至然後興之務之如是則常不勝夫熟比於小事者矣熟比精審躬親之謂是何也則小事之至也數其縣日也博其為積也大數音朔博謂所縣繫時日多也大謂積小以成大若蟻蛭然也大事之至也希其縣日也淺其為積也小時日既淺則所積亦小故善日者王善時者霸補漏者危大荒者亡善謂愛惜不怠棄也補漏謂不能累功累業至於弊漏然後補之大荒謂都荒廢不治者故王者敬日敬謂不敢慢也故曰吉人為善惟日不足霸者敬時動作皆不失時或曰時變則懼治之不立也僅存之國危而後戚之戚憂亡國至亡而後知亡至死而後知死國之禍敗不可勝悔也所悔之事不可勝舉言甚多霸者之善著焉可以時託也霸者其善明著以其所託不失時也王者之功名不可勝日志也日記識其政事故能功名不可勝數財物貨寶以大為重政教功名反是能積微者速成詩曰徳輶如毛民鮮克舉此之謂也詩大雅烝民之篇輶輕也引之以明積微至著之功也凡姦人之所以起者以上之不貴義不敬義也上行下效夫義者所以限禁人之為惡與姦者也今上不貴義不敬義如是則下之人百姓皆有棄義之志有趨姦之心矣此姦之所以起也且上者下之師也夫下之和上譬之猶響之應聲影之像形也故為上者不可不順也不可不順義或曰當為慎夫義者内節於人而外節於萬物者也節即謂限禁也上安於主而下調於民者也得其節則上安而下調也内外上下節義之情也義之情皆在得其節然則凡為天下之要義為本而信次之古者禹湯本義務信而天下治桀紂棄義倍信而天下亂故為人上者必將慎禮義務忠信然後可此君人者之大本也慎或為順堂上不糞則郊草不瞻曠芸曠空也空謂無草也芸謂有草可芸鋤也堂上猶未糞除則不暇瞻視郊野之草有無也言近者未理不暇及遠魯連子謂田巴曰堂上不糞者郊草不芸也白刄捍乎胷則目不見流矢捍蔽也捍蔽於胷謂見斬刺也懼白刄之甚不暇憂流矢也拔㦸加乎首則十指不辭斷言不惜十指而救首也拔或作校或作枝非不以此為務也疾養緩急之有相先者也疾病也養與癢同言非不以郊草流矢十指為務痛癢緩急有所先救者也言此明人君當先務以禮義然後及他事也天論篇第十七天行有常天自有常行之道也不為堯存不為桀亡應之以治則吉應之以亂則凶吉凶由人天非愛堯而惡桀也彊本而節用則天不能貧本謂農桑養備而動時則天不能病養備謂使人衣食足動時謂勸人勤力不失時亦不使勞苦也養生既備動作以時則疾疹不作也脩道而不貳則天不能禍貳即倍也故水旱不能使之飢渴寒暑不能使之疾祅恠不能使之凶畜積有素故水旱不能使之飢渴既無飢寒之患則疫癘所不能加之矣本荒而用侈則天不能使之富養略而動罕則天不能使之全略減少也罕希也養略謂使人衣食不足也動希言怠惰也衣食減少而又怠惰則天不能全也倍道而妄行則天不能使之吉故水旱未至而飢渴寒暑未薄而疾薄廹也音博祅怪未至而凶受時與治世同而殃禍與治世異不可以怨天其道然也非天降災人自使然故明於天人之分則可謂至人矣知在人不在天斯為至人不為而成不求而得夫是之謂天職不為而成不求而得四時行焉百物生焉天之職任如此豈愛憎於堯桀之間乎如是者雖深其人不加慮焉雖大不加能焉雖精不加察焉夫是之謂不與天爭職其人至人也言天道雖深遠至人曽不措意測度焉以其無益於理若措其在人者慕其在天者是爭職也莊子曰六合之外聖人存而不論也天有其時地有其財人有其治夫是之謂能參人能治天時地財而用之則是參於天地舎其所以參而願其所參則惑矣舍人事而欲知天意斯惑矣列星隨旋日月遞炤四時代御陰陽大化風雨博施列星有列位者二十八宿也隨旋相隨廻旋也炤與照同陰陽大化謂寒暑變化萬物也博謂廣博施行無不被也萬物各得其和以生各得其養以成不見其事而見其功夫是之謂神和謂和氣養謂風雨不見和養之事但見成功斯所以為神若有真宰然也皆知其所以成莫知其無形夫是之謂天言天道之難知或曰當為夫是之謂天功脱功字耳唯聖人為不求知天既天道難測故聖人但修人事不務役慮於知天也天職既立天功既成形具而神生好惡喜怒哀樂藏焉夫是之謂天情言人之身亦天職天功所成立也形謂百骸九竅神謂精魂天情所受於天之情也耳目鼻口形能各有接而不相能也夫是之謂天官耳辨聲目辨色鼻辨臭口辨味形辨寒熱疾癢其所能皆可以接物而不能互相為用官猶任也言天之所付任有如此者也心居中虛以治五官夫是之謂天君心居於中空虛之地以制耳鼻口目形之五官是天使為形體之君也財非其類以養其類夫是之謂天養財與裁同飲食衣服與人異類裁而用之可使養口腹形體故曰裁非其類以養其類是天使奉養之道如此也順其類者謂之福逆其類者謂之禍夫是之謂天政順其類謂裁者也逆其類謂不能裁者也言天政如賞罰之政令自天職既立已上論天所置之事已下論逆天順天之事在人所為也暗其天君昏亂其心亂其天官聲色臭味過度棄其天養不能務本節用逆其天政不能養其類也背其天情好惡喜怒哀樂無節以䘮天功䘮其生成之天功使不蕃滋也夫是之謂大凶此皆言不脩政違天之禍聖人清其天君正其天官備其天養順其天政養其天情以全其天功如是則知其所為知其所不為矣知務導逹不攻異端則天地官而萬物役矣言聖人自脩政則可以任天地役萬物其行曲治其養曲適其生不傷夫是之謂知天其所自脩行之政曲盡其治其所養人之術曲盡其適其生長物無所傷害是謂知天也言明於人事則知天物其要曲盡也故大巧在所不為大智在所不慮此明不務知天是乃知天也亦猶大巧在所不為如天地之成萬物若偏有所為則其巧小矣大智在所不慮如聖人無為而治也若偏有所慮則其智窄矣所志於天者已其見象之可以期者矣志記識也聖人雖不務知天猶有記識以助治道所以記識於天者其見垂象之文可以知其節候者也若堯命羲和欽若昊天日月星辰敬授人時者也所志於地者已其見宜之可以息者矣所以記識於地者其見土宜可以蕃息嘉穀者是也所志於四時者已其見數之可以事者矣數謂春作夏長秋斂冬藏必然之數事謂順時理其事也所以記識四時者取順時之數而令生長收藏者也所志於陰陽者已其見知之可以治者矣知謂知其生殺也所以記識陰陽者為知其生殺効之為賞罰以治之知或為和官人守天而自為守道也官人任人欲任人守天在於自守道皆明不務知天之義也治亂天耶曰日月星辰瑞厯是禹桀之所同也或曰當時星辰書之名也禹以治桀以亂治亂非天也時耶曰繁啟蕃長於春夏繁多也蕃茂也畜積收藏於秋冬是又禹桀之所同也禹以治桀以亂治亂非時也地耶曰得地則生失地則死是又禹桀之所同也禹以治桀以亂治亂非地也皆言在人不在天地與時也詩曰天作高山大王荒之彼作矣文王康之此之謂也詩周頌天作之篇引此以明吉凶由人如大王之能尊大岐山也天不為人之惡寒也而輟冬地不為人之惡遼遠也而輟廣君子不為小人匈匈也而輟行匈匈喧譁之聲與訩同音又許同反行下孟反天有常道矣地有常數矣君子有常體矣君子道其常小人計其功道言也君子言常造次必守其道小人則計一時之功利因物而遷之詩曰何恤人之言兮此之謂也逸詩也以言苟守道不違何畏人之言也楚王後車千乗非知也君子啜菽飲水非愚也是節然也節謂所遇之時節也若夫心意脩徳行厚知慮明生於今而志乎古則是其在我者也故君子敬其在己者而不慕其在天者在天謂富貴也小人錯其在己者而慕其在天者錯置君子敬其在己者而不慕其在天者是以日進也求已而不苟故日進小人錯其在己者而慕其在天者是以日退也望徼倖而不求己故日退也故君子之所以日進與小人之所以日退一也皆有慕有不慕君子小人之所以相懸者在此耳星墜木鳴國人皆恐曰是何也曰無何也假設問荅無何也言不足憂也是天地之變陰陽之化物之罕至者也星墜天地之變木鳴陰陽之化罕希也怪之可也畏之非也以其罕至謂之怪異則可因遂畏懼則非夫日月之有蝕風雨之不時怪星之黨見黨見頻見也言如朋黨之多見賢遍反是無世而不常有之上明而政平則是雖並世起無傷也並世起謂一世之中並起上闇而政險則是雖無一至者無益也夫星之墜木之鳴是天地之變陰陽之化物之罕至者也怪之可也畏之非也物之已至者人祅則可畏也物之既至可畏者在人之祅也楛耕傷稼耘耨失薉政險失民楛耕謂麄惡不精也失薉謂耘耨失時使穢也政險威虐也薉與穢同田稼薉惡糴貴民飢道路有死人夫是之謂人祅政令不明舉錯不時本事不理夫是之謂人祅舉謂起兵動衆錯謂懷安失於機也本事農桑之事也禮義不脩内外無别男女淫亂則父子相疑上下乖離冦難並至夫是之謂人祅祅是生於亂三者錯無安國三者三人祅也錯置也置此三祅於中國則無有安也其説甚邇其菑甚慘邇近也三人祅之説比星墜木鳴為淺近然其災害人則甚慘毒也勉力不時則牛馬相生六畜作祅勉力之役也不時則人多怨曠氣之所感故生非其類也可怪也而不可畏也傳曰萬物之怪書不説書謂六經也可為勸戒則明之不務廣説萬物之怪也無用之辯不急之察棄而不治若夫君臣之義父子之親夫婦之别則日切磋而不舍也雩而雨何也曰無何也猶不雩而雨也雩求雨之禱也或者問嵗旱雩則得雨此何祥也對以與不雩而雨同明非求而得也周禮司巫國大旱則率巫而舞雩日月食而救之天旱而雩小筮而後決大事非以為得求也以文之也得求得所求也言為此示急於災害順人之意以文飾政事而已故君子以為文而百姓以為神以為文則吉以為神則凶順人之情以為文飾則無害淫祀求福則凶也在天者莫明於日月在地者莫明於水火在物者莫明於珠玉在人者莫明於禮義故日月不高則光輝不赫水火不積則煇潤不博珠玉不睹乎外則王公不以為寶禮義不加於國家則功名不白故人之命在天國之命在禮君人者隆禮尊賢而王重法愛民而霸好利多詐而危權謀傾覆幽險而盡亡矣幽險謂隠匿其情而凶虐難測也權謀多詐幽險三者盡亡之道也大天而思之孰與物畜而制之尊大天而思慕之欲其豐富孰與使物畜積而我裁制之從天而頌之孰與制天命而用之頌者美盛徳也從天而美其盛徳豈如制裁天之所命而我用之謂若曲者為輪直者為桷任材而用也望時而待之孰與應時而使之望時而待謂若農夫之望嵗也孰與應春生夏長之候使不失時也因物而多之孰與騁能而化之因物之自多不如騁其智能而化之使多也若后稷之播種然也思物而物之孰與理物而勿失之也思得萬物以為已物孰與理物皆得其宜不使有所失䘮願於物之所以生孰與有物之所以成故錯人而思天則失萬物之情物之生雖在天成之則在人也此皆言理平豐富在人所為不在天也若廢人而妄思天雖勞心苦思亦無益也百王之無變足以為道貫無變不易也百王不易者謂禮也言理可以為道之條貫也一廢一起應之以貫雖質文廢起時有不同然其要歸以禮為條貫論語孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也理貫不亂知禮則其條貫不亂不知貫不知應變不知以禮為條貫則不能應變言必差錯而亂也貫之大體未嘗亡也亂生其差治盡其詳差謬也所以亂者生於條貫差謬可以治者在於精詳也故道之所善中則可從畸則不可為匿則大惑畸者不偶之名謂偏也道之所善得中則從偏側則不可為匿謂隱匿其情禮者明示人者也若隱匿則大惑畸音覉水行者表深表不明則陷表標凖也陷溺也治民者表道表不明則亂禮者表也非禮昬世也昬世大亂也昬世謂使世昬闇也故道無不明外内異表隱顯有常民陷乃去道禮也外謂朝聘内謂冠昬所表識各異也隱顯即内外也有常言有常法也如此民陷溺之患乃去也萬物為道一偏一物為萬物一偏愚者為一物一偏愚者不能盡一物也而自以為知道無知也以偏為知道豈有知哉慎子有見於後無見於先慎到本黄老之術明不尚賢不使能之道故莊子論慎到曰塊不失道以其無爭先之意故曰見後而不見先也漢書藝文志慎子著書四十二篇班固曰先申韓申韓稱之也老子有見於詘無見於信老子周之守藏史姓李字伯陽號耼孔子之師也著書五千言其意多以屈為伸以柔勝剛故曰見詘而不見信也信讀為伸墨子有見於齊無見於畸畸謂不齊也墨子著書與上同兼愛是見齊而不見畸也宋子有見於少無見於多宋子名鈃宋人也與孟子同時下篇云宋子以人之情欲寡而皆以己之情欲多是過也據此説則少而不見多也鈃音刑又胡泠反漢書藝文志有宋子十八篇班固曰荀卿道宋子其言黄老意有後而無先則羣衆無門夫羣衆在上之開導皆處後而不慮先羣衆無門戸也有詘而無信則貴賤不分貴者伸而賤者詘則分别矣若皆貴柔弱卑下則無貴賤之别也有齊而無畸則政令不施夫施政令所以治不齊者若尚同則政令何施也有少而無多則羣衆不化夫欲多則可以勸誘為善若皆欲少則何能化之書曰無有作好遵王之道無有作惡遵王之路此之謂也書洪範以喻偏好則非遵王道也荀子卷十一欽定四庫全書荀子卷
