front:
  text: 而水圓君者盂也盂方而水方君射則臣決楚莊王好細腰故朝有餓人故曰聞修身未嘗聞為國也君者民之源也源清則流清源濁則流濁故有社稷者而不能愛民不能利民而求民之親愛已不可得也民之不親不愛而求其為已用為已死不可得也人不為己用不為己死而求兵之勁城之固不可得也兵不勁城不固而求敵之不至不可得也敵至而求無危削不滅亡不可得也危削滅亡之情舉積此矣而求安樂是狂生者也狂生者不胥時而落故人主欲彊固安樂則莫若反之民欲附下一民則莫若反之政欲修政美國則莫若求其人彼或積蓄而得之者不世絶彼其人者生乎今之世而志乎古之道以天下之王公莫好之也然而于是獨好之以天下之民莫欲之也然而于是獨為之好之者貧為之者窮然而于是獨猶將為之也不為少頃輟焉曉然獨明於先王之所以得之所以失之知國之安危臧否若别白黑是其人者也大用之則天下為一諸侯為臣小用之則威行鄰敵縱不能用使無去其疆域則國終身無故故君人者愛民而安好士而榮兩者無一焉而亡詩曰价人維藩大師維垣此之謂也道者何也曰君道也君者何也曰能羣也能羣也者何也曰善生養人者也善班治人者也善顯設人者也善藩飾人者也善生養人者人親之善班治人者人安之善顯設人者人樂之善藩飾人者人榮之四統者俱而天下歸之夫是之謂能羣不能生養人者人不親也不能班治人者人不安也不能顯設人者人不樂也不能藩飾人者人不榮也四統者亡而天下去之夫是之謂匹夫故曰道存則國存道亡則國亡省工賈衆農夫禁盗賊除姦邪是所以養生之也天子三公諸侯一相大夫擅官士保職莫不法度而公是所以班治之也論徳而定次量能而授官皆使其人載其事而各得其所宜上賢使之為三公次賢使之為諸侯下賢使之為士大夫是所以顯設之也修冠弁衣裳黼黻文章雕琢刻鏤皆有等差是所以藩飾之也故由天子至於庶人也莫不騁其能得其志安樂其事是所同也衣煖而食充居安而遊樂事時制明而用足是又所同也若夫重色而成文章重味而成珍脩是所術也聖王則術以明辨異上以飾賢良而明貴賤下以飾長㓜而明親疏上在王公之朝下在百姓之家天下曉然皆知其所非以為異也將以明分達治而保萬世也故天子諸侯無靡費之用士大夫無流滛之行百吏官人無怠慢之事衆庶百姓無姦怪之俗無盗賊之罪其能以稱義徧矣故曰治則衍及百姓亂則不足及王公此之謂也至道大形隆禮至法則國有常尚賢使能則民知方纂論公察則民不疑賞克罰偷則民不怠兼聽齊明則天下歸之然後明分職序事業材技官能莫不治理則公道達而私門塞矣公義明而私事息矣如是則徳厚者進而佞說者止貪利者退而亷節者起書曰先時者殺無赦不逮時者殺無赦人習其事而固人之百事如耳目鼻口之不可以相借官也職分而民不探次定而序不亂兼聽齊明而百事不留如是則臣下百吏至於庶人莫不修己而後敢安止誠能而後敢受職百姓易俗小人變心姦怪之屬莫不反慤夫是之謂政教之極故天子不視而見不聽而聦不慮而知不動而功塊然獨坐而天下從之如一體如四胑之從心夫是之謂大形詩曰溫溫恭人維徳之基此之謂也為人主者莫不欲彊而惡弱欲安而惡危欲榮而惡辱是禹桀之所同也要此三欲辟此三惡果何道而便曰在愼取相道莫徑是矣故知而不仁不可仁而不知不可既知且仁是人主之寶也而王霸之佐也不急得不知得而不用不仁無其人而幸有其功愚莫大焉今人主有六患使賢者為之則與不肖者規之使知者慮之則與愚者論之使修士行之則與汙邪之人疑之雖欲成立得乎哉譬之是猶立直木而恐其景之枉也惑莫大焉語曰好女之色惡者之孽也公正之士衆人之痤也循乎道之人汙邪之賊也今使汙邪之人論其怨賊而求其無偏得乎哉譬之是猶立枉木而求其景之直也亂莫大焉故古之人為之不然其取人有道其用人有法取人之道參之以禮用人之法禁之以等行義動静度之以禮知慮取舍稽之以成日月積久校之以功故卑不得以臨尊輕不得以縣重愚不得以謀知是以萬舉不過也故校之以禮而觀其能安敬也與之舉措遷移而觀其能應變也與之安燕而觀其能無䧟也接之以聲色權利忿怒患險而觀其能無離守也彼誠有之者與誠無之者若白黑然可詘邪哉故伯樂不可欺以馬而君子不可欺以人此明王之道也人主欲得善射射逺中微者縣貴爵重賞以招致之内不可以阿子弟外不可以隠逺人能中是者取之是豈不必得之之道也哉雖聖人不能易也欲得善馭及速致逺者一日而千里縣貴爵重賞以招致之内不可以阿子弟外不可以隠逺人能致是者取之是豈不必得之之道也哉雖聖人不能易也欲治國馭民調壹上下將内以固城外以拒難治則制人人不能制也亂則危辱滅亡可立而待也然而求卿相輔佐則獨不若是其公也案唯便嬖親比己者之用也豈不過甚矣哉故有社稷者莫不欲彊俄則弱矣莫不欲安俄則危矣莫不欲存俄則亡矣古有萬國今有數十焉是無他故莫不失之是也故明主有私人以金石珠玉無私人以官職事業是何也曰本不利於所私也彼不能而主使之則是主闇也臣不能而誣能則是臣詐也主闇於上臣詐於下滅亡無日俱害之道也夫文王非無貴戚也非無子弟也非無便辟也倜然乃舉太公於州人而用之豈私之也哉以為親邪則周姬姓也而彼姜姓也以為故邪則未嘗相識也以為好麗邪則夫人行年七十有二齫然而齒墜矣然而用之者夫文王欲立貴道欲白貴名以惠天下而不可以獨也非于是子莫足以舉之故舉是子而用之於是乎貴道果立貴名果明兼制天下立七十一國姬姓獨居五十三人周之子孫苟不狂惑者莫不為天下之顯諸侯如是者能愛人也故舉天下之大道立天下之大功然後隠其所憐所愛其下猶足以為天下之顯諸侯故曰唯明主為能愛其所愛闇主則必危其所愛此之謂也牆之外目不見也里之前耳不聞也而人主之守司逺者天下近者境内不可不略知也天下之變境内之事有弛易齵差者矣而人主無由知之則是拘脅蔽塞之端也耳目之明如是其狹也人主之守司如是其廣也其不可以不知也如是其危也然則人主將何以知之曰便嬖左右者人主之所以窺逺收衆之門户牖嚮也不可不早具也故人主必將有便嬖左右足信者然後可其知惠足使規物其端誠足使定物然後可夫是之謂國具人主不能不有遊觀安燕之時則不得不有疾病物故之變焉如是國者事物之至也如泉源一物不應亂之端也故曰人主不可以獨也卿相輔佐人主之基杖也不可不早具也故人主必將有卿相輔佐足任者然後可其徳音足以鎮撫百姓其知慮足以應待萬變然後可夫是之謂國具四鄰諸侯之相與不可以不相接也然而不必相親也故人主必將有足使喻志决疑於逺方者然後可其辯說足以解煩其知慮足以决疑其齊斷足以距難不還秩不反君然而應薄扞患足以持社稷然後可夫是之謂國具故人主無便嬖左右足信者之謂闇無卿相輔佐足任者謂之獨所使於四鄰諸侯者非其人謂之孤孤獨而晻謂之危國雖若存古之人曰亡矣詩曰濟濟多士文王以寧此之謂也材人愿慤拘録計數纎嗇而無敢遺喪是官人史吏之才也修飾端正尊法敬分而無傾側之心守職循業不敢益損可傳世也而不可使侵奪是士大夫官師之材也知隆禮義之為尊君也知好士之為美名也知愛民之為安國也知有常法之為一俗也知尚賢使能之為長功也知務本禁末之為多材也知無與下争小利之為便於事也知明制度權物稱用之為不泥也是卿相輔佐之材未及君道也能論官此三材者而無失其次是為人主之道也若是則身佚而國治功大而名美上可以王下可以霸是人主之要守也人主不能論此三材者不知道此道安值將卑執出勞併耳目之樂而親自貫日而治詳一内而曲辨之慮與臣下争小察而綦偏能自古及今未有如此而不亂者也是所謂視乎不可見聽乎不可聞為乎不可成此之謂也
