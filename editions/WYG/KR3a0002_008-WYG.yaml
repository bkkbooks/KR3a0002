body:
  text: 荀子卷八欽定四庫全書荀子卷九唐楊倞註臣道篇第十三人臣之論論人臣之善惡有態臣者有篡臣者有功臣者有聖臣者解並在下内不足使一民外不足使距難百姓不親諸侯不信然而巧敏佞說說音恱或作稅善取寵乎上是態臣者也以佞媚為容態上不忠乎君下善取譽乎民不恤公道通義朋黨比周以環主圖私為務是􅆲臣者也環主環繞其主不使賢臣得用圖謀也􅆲臣者􅆲奪其軍政也内足使一民外足使距難民親之士信之上忠乎君下愛百姓而不倦是功臣者也民親士信然後立功也上則能尊君下則能愛民政令教化形下如影形制也言施政令教化以制其下如影之隨形動而輙隨不使違越也應卒遇變齊給如響齊疾也給供給也應事而至謂之給夫卒變人所遲疑今聖臣應之疾速如響之應聲卒倉忽反推類接譽以待無方曲成制象是聖臣者也此明應卒遇變之意無方無常也推其比類接其聲譽言見其本而知其末也待之無常謂不滯於一隅也委曲皆成制度法象言物至而應無非由法不苟而行之也聖者無所不通之謂也故用聖臣者王用功臣者彊用􅆲臣者危用態臣者亡態臣用則必死􅆲臣用則必危此言態臣甚於􅆲臣者葢當時之多用侒媚變詐之人深欲戒之故極言之也功臣用則必榮聖臣用則必尊故齊之蘇秦蘇秦初相趙後仕燕終死於齊故曰齊之蘇秦楚之州侯楚襄王佞臣也史記莊辛諫襄王曰君王左州侯右夏侯輦從鄢陵君與壽陵君載方府之金與之馳騁乎雲夢之中不知穰侯受令於秦王填澠塞之内而投已於澠塞之外韓子曰州侯相荆貴而荆王疑之因問左右對曰無有如出一口也秦之張儀可謂態臣者也皆變態佞媚之臣儀或作禄韓之張去疾葢張良之祖漢書良其先韓人大父開地相韓戰國策韓有張翠納賂於宣大后也趙之奉陽後語蘇秦說趙肅侯肅候之弟奉陽君為相不恱蘇秦蘇秦乃去之又戰國䇿蘇秦說趙王曰天下之卿相人君及至布衣之士莫不髙大王之行義皆願奉教陳忠於前之日久矣雖然奉陽君妬大王不得任事是以外賓客游談之士無敢盡忠於前盧藏用云奉陽君名成又案後語奉陽君卒蘇秦乃從燕而來說肅侯合從之事而公子成武靈王時猶不肯朝服即公子成非奉陽君也齊之孟嘗可謂􅆲臣也史記曰齊閔王既滅宋益驕欲盡滅孟嘗孟甞君恐乃如魏魏昭王以為相西合於秦趙與燕共伐破齊後齊襄王立孟嘗中子為諸侯無所屬襄王新立畏孟嘗而與連和是􅆲臣也
