front:
  text: 貴敬故曰貴名不可以比周爭也不可以夸誕有也不可以勢重脅也必将誠此然後就也貴名人所貴儒學之名此身也爭之則失譲之則至遵道則積夸誕則虚遵道則自委積夸誕則尤益空虚故君子務脩其内而譲之於外務積徳於身而處之以遵道如是則貴名起之如日月天下應之如雷霆衆應之聲如雷故曰君子隠而顯微而明辭讓而勝詩曰鶴鳴于九臯聲聞于天此之謂也詩小雅鶴鳴之篇毛云臯澤也言身隠而名著鄭云臯澤中水溢出所為坎自外數至九喻深逺也鄙夫反是比周而譽俞少鄙爭而名俞辱煩勞以求安利其身俞危俞讀為愈詩曰民之無良相怨一方受爵不譲至于已斯亡此之謂也詩小雅角弓之篇引此以明不責已而怨人故能小而事大辟之是猶力之少而任重也􅃕粹折無適也舍除也粹讀為碎除碎折之外無所之適言必碎折身不肖而誣賢是猶傴伸而好升高也指其頂者愈衆傴僂也伸讀為身字之誤也傴身之人而彊升高則頭頂尤低屈故指而笑之者愈衆故明主譎徳而序位所以為不亂也忠臣誠能然後敢受職所以為不窮也分不亂於上能不窮於下治辯之極也不亂謂皆當其序不窮謂通於其職列也言儒為治辯之極也詩曰平平左右亦是率從是言上下之交不相亂也詩小雅采菽之篇毛云平平辨治也交謂上下相交接也以容俗為善以貨財為寳以養生為已至道是民徳也養生為已至道謂荘生之徒民徳言不知禮義也行法至堅不以私欲亂所聞如是則可謂勁士矣行法至堅好脩正其所聞以撟飾其情性行法謂行有法度行下孟反撟與矯同其言多當矣而未諭也其行多當矣而未安也其知慮多當矣而未周密也未諭謂未盡曉其義未安謂未得如天性安行之也周密謂盡善也上則能大其所隆下則能開道不已若者如是則可謂篤厚君子矣脩百王之法若辨白黒應當時之變若數一二如數一二之易行禮要節而安之若生四肢要邀也節節文也言安於禮節若身之生四枝不以造物為也要一遙反下要時同要時立功之巧若詔四時邀時立功之巧謂不失機權若天告四時使成萬物也平正和民之善億萬之衆而博若一人如是則可謂聖人矣雖博雜衆多如理一人之少井井兮其有條理也井兮良易之貌有條理也嚴嚴兮其能敬已也嚴兮有威重之貎能敬已不可以干非禮也嚴或為儼分分兮其有終始也事各當其分即無雜亂故能有終始分扶問反厭厭兮其能長久也厭足也亂生於不足故知足然後能長久樂樂兮其執道不殆也殆危炤炤兮其用知之明也炤炤明見之貌炤與照同脩脩兮其用統類之行也脩脩整齊之貌統類綱紀也言事不乖悖也綏綏兮其有文章也綏綏安泰之貌綏或為葳蕤之貎熈熈兮其樂人之臧也熈熈和樂之貎隱隱兮其恐人之不當也隱隱憂戚貌恐人皆行事不當理此已上之論大儒之徳也如是則可謂聖人矣此其道出乎一曷謂一曰執神而固執持精神堅固曷謂神曰盡善挾洽之謂神萬物莫足以傾之之謂固挾讀為浹浃周洽也神固之謂聖人聖人也者道之管也天下之道管是矣百王之道一是矣管樞要也是是儒學故詩書禮樂之歸是矣詩言是其志也是儒之志書言是其事也禮言是其行也樂言是其和也春秋言是其微也微謂儒之微㫖一字為褒貶微其文隠其義之類是也故風之所以為不逐者取是以節之也風國風逐流蕩也國風所以不随荒暴之君而流蕩者取聖人之儒道以節之也詩序曰變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也小雅之所以為小雅者取是而文之也雅正也文飾也大雅之所以為大雅者取是而光之也頌之所以為至者取是而通之也至謂盛徳之極天下之道畢矣鄕是者臧倍是者亡鄕是如不臧倍是如不亡者自古及今未嘗有也是皆謂儒也鄕讀為向客有道曰孔子曰周公其盛乎言其徳盛身貴而愈恭家富而愈儉勝敵而愈戒戒備也言勝敵而益戒備荀卿之時有客説孔子之言如此應之曰是殆非周公之行非孔子之言武王崩成王㓜周公屏成王而及武王履天子之籍負扆而坐户牖之間謂之扆諸侯趨走堂下當是時也夫又誰為恭矣哉兼制天下立七十一國姬姓獨居五十三人焉周之子孫苟不狂惑者莫不為天下之顯諸侯孰謂周公儉哉武王之誅紂也行之日以兵忌武王發兵日以兵家所忌之日東面而迎太歲迎謂逆太歲也尸子曰武王伐紂魚辛諫曰歲在北方不北征武王不從至汜而汜至懷而懷汜水名懐地名書曰覃懐底績孔安國曰覃懐近河地名謂至汜而適遇水汎漲而至懐又河水汎溢也吕氏春秋曰武王伐紂天雨日夜不休汜音祀至共頭而山隧共河内縣名共頭蓋共縣之山名隧謂山石崩摧也隧讀為墜共音恭霍叔懼曰出三日而五災至無乃不可乎霍叔武王弟也出行也周居豐鎬軍出三日未嘗至共蓋文王三分天下有其二境上已近於洛矣或曰至汜之後三日也周公曰刳比干而囚箕子飛廉惡來知政夫又惡有不可焉比干紂賢臣箕子紂諸父箕國名子爵也飛廉惡來皆紂之嬖臣飛廉善走惡來有力也遂選馬而進選揀擇也朝食於戚暮宿於百泉杜元凱云戚衛邑在頓丘衛縣西百泉蓋近朝歌地名左氏傳曰晉人敗范氏于百泉厭旦於牧之野厭掩也夜掩於旦謂未明已前也厭於甲反鼓之而紂卒易鄕倒戈而攻鄕讀曰向後也遂乗殷人而進誅紂乗其倒戈之勢蓋殺者非周人因殷人也非周人殺之因殷倒戈之勢自殺之也故無首虜之獲無蹈難之賞周人無立功受賞者反而定三革偃五兵定息偃化也皆不用之義三革犀也兕也牛也考工記曰函人為甲犀甲七屬兕甲六屬合甲五屬穀梁傳曰天子救日置五麾陳五兵范寗云五兵矛㦸鉞揗弓矢國語説齊桓定三革偃五刃韋昭云三革甲胄盾也五刃刀劒矛㦸矢也合天下立聲樂合天下謂合㑹天下諸侯歸一統也於是武象起而韶濩廢矣武象周武王克殷之後樂名武亦周頌篇名詩序云武奏大武也禮記曰下管象朱干玉戚以冕而舞大武韶濩殷樂名左氏傳曰吴季札見舞韶濩者蓋殷時兼用舜樂武王廢之也四海之内莫不變心易慮以化順之故外闔不閇闔門扉也跨天下而無靳跨越也靳求也越天下而無求言自足也亦人皆與之不待求當是時也夫又誰為戒矣哉太平如此誰復備戒造父者天下之善御者也無輿馬則無所見其能造父周穆王之御者羿者天下之善射者也無弓矢則無所見其巧羿有窮之君逐夏太康而遂簒位者大儒者善調一天下者也無百里之地則無所見其功輿固馬選矣而不能以至逺一日而千里則非造父也弓調矢直矣而不能以射逺中微則非羿也善射者既能及逺又中細微之物用百里之地而不能以調一天下制彊暴則非大儒也彼大儒者雖隠於窮閻漏屋無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容成名況乎諸侯莫不願得以為臣已解非十二子篇用百里之地而千里之國莫能與之爭勝笞棰􅍊國齊一天下而莫能傾也是大儒之徴也傾危徵騐其言有類其行有禮類善也謂比類於善不為狂妄之言其舉事無悔其持險應變曲當險危也持危應變皆曲得其宜當丁浪反與時遷徙與世偃仰随時設教千舉萬變其道一也是大儒之稽也其道一謂皆歸於治也故禹湯文武事跡不同其於為治一也稽考也考成也其窮也俗儒笑之其通也英傑化之嵬瑣逃之倍千人曰英倍萬人曰傑言英傑之士則慕而化之狂怪之人則畏而逃去之邪説畏之衆人愧之衆人初皆非其所為成功之後故自愧也愧或為貴也通則一天下窮則獨立貴名儒名天不能死地不能埋桀跖之世不能汙非大儒莫之能立仲尼子弓是也故有俗人者有俗儒者有雅儒者有大儒者辨儒者之異也不學問無正義以富利為隆是俗人者逢衣淺帶解果其冠逢大也淺帶博帶也韓詩外傳作也逢衣博帶言帶博則約束衣服易故曰淺帶觧果未詳或曰觧果狭隘也左思魏都賦曰風俗以韰惈為嫿韰下界反倮音果嫿音獲静好也或曰説苑淳于髠謂齊王曰臣笑鄰圃之祠田以一壺酒三鮒魚祝曰蠏螺者冝禾汙邪者百車蠏螺蓋髙地也今冠蓋亦比之謂實彊為儒服而無其略法先王而足亂世術略粗也粗法先王之遺言不知大體故足以亂世法韓詩外傳作略法先王而不足於亂世繆學雜舉不知法後王而壹制度不知隆禮義而殺詩書後王後世之王夫随當時之政而平制度是壹也若妄引上古不合於時制度亂矣故仲尼修春秋盡周法韓詩外傳作不知法先王也其衣冠行偽己同於世俗矣然而不知惡者衣冠即上所云逢衣淺帶之比行偽謂行偽而堅行下孟反其言議談説己無異於墨子矣然而明不能分别呼先王以欺愚者而求衣食焉呼謂稱舉得委積足以揜其口則揚揚如也揚揚得意之貌隨其長子事其便辟舉其上客􅀈然若終身之虜而不敢有他志是俗儒者也長子謂君之世子也便辟謂左右小臣親信者也便婢延反辟讀為嬖舉其上客謂褒美其上客冀得其助也􅀈字書無所見蓋環繞囚拘之貌荘子曰睆然在纆繳之中矣法後王一制度隆禮義而殺詩書其言行以有大法矣然而明不能齊雖有大體其所見之明猶未能齊言行使無纎介之差法教之所不及聞見之所未至則知不能類也有所未知則不能取比類而通之也禮記雖先王未之有可以義起是能類者矣知之曰知之不知曰不知内不自以誣外不自以欺不自欺人以是尊賢畏法而不敢怠傲是雅儒者也有雅徳之儒也法先王統禮義一制度以淺持博以古持今以一持萬以淺持博謂見其淺則可以執持博也先王當為後王以古持今當為以今持古皆傳冩誤也苟仁義之類也雖在鳥獸之中若别白黒善類在鳥獸之中猶别况在人矣倚物怪變所未嘗聞也所未嘗見也卒然起一方則舉統類而應之無所儗㤰倚竒也韓詩外傳作竒物怪變卒于忽反儗讀為疑㤰與怍同竒物怪變卒然而起人所難處者大儒知其統類故舉以應之無所疑滯慚怍也張法而度之則晻然若合符節是大儒者也既無所疑怍故開張其法以測度之則晻然如合荷節言不差錯也度大各反晻與暗同符節相合之物也周禮門關用符節蓋以全竹為之剖之為兩各執其一合之以為驗也故人主用俗人則萬乗之國亡不義而好利故亡也用俗儒則萬乗之國存僅存用雅儒則千乗之國安用大儒則百里之地久外國多患難用大儒然後可以長久也而後三年天下為一諸侯為臣長久之業既成又三年修徳化則可以一天下臣諸侯蓋殷湯周文皆化行之後三年而王用萬乗之國則舉錯而定一朝而伯錯讀為措伯讀為霸言一朝而霸也不聞不若聞之聞之不若見之見之不若知之知之不若行之學至於行之而止矣行之明也行之則通明於事也明之謂聖人通明於事則為聖人聖人也者夲仁義當是非齊言行不失毫釐無他道焉已乎行之矣當下浪反己止也言聖人無它在止於行其所學者也故聞之而不見雖博必謬雖博聞必有謬誤也見之而不知雖識必妄見而不知雖能記識必昧於指意謂若制力然也知之而不行雖敦必困苟不能行雖所知多厚必至困躓也不聞不見則雖當非仁也雖偶有所當非仁人君子之通明者也其道百舉而百陷也言偶中之道百舉而百陷無一可免也故人無師無法而知則必為盜勇則必為賊云能則必為亂云能自言其能察則必為怪恵施鄧析之比辯則必為誕人有師有法而知則速通勇則速威云能則速成察則速盡辯則速論察則速盡謂有聼察之性則能速盡物理速論謂能速論是非故有師法者人之大寳也無師法者人之大殃也人無師法則隆情矣有師法則隆性矣隆厚也厚於情謂恣其情之欲厚於性謂夲於善也而師法者所得乎情非所受乎性不足以獨立而治情謂喜怒愛惡外物所感者也言師法之於人得於外情非天性所受故性不足獨立而治必在因外情而化之或曰情當為積所得乎積習非及於天性既非天性則不可獨立而治必在化之也性也者吾所不能為也然而可化也言天性非吾自能為也必在化而為之也情也者非吾所有也然而可為乎言情非吾天性所有然可以外物誘而為之或曰情亦當為積積習與天然有殊故曰非吾所有雖非所有然而可為之也注錯習俗所以化性也注錯猶措置也錯千故反并一而不貳所以成積也并讀為併一謂師法貳謂異端習俗移志安久移質習以為俗則移其志安之既久則移夲質并一而不貳則通於神明參於天地矣故積土而為山積水而為海旦暮積謂之嵗至高謂之天至下謂之地宇中六指謂之極六指上下四方也盡六指之逺則為六極言積近以成逺塗之人百姓積善而全盡謂之聖人彼求之而後得為之而後成積之而後高盡之而後聖故聖人也者人之所積也言其徳行委積人積耨耕而為農夫積斵削而為工匠積反貨而為商賈反讀為販積禮義而為君子工匠之子莫不繼事而都國之民安習其服安習其土風之衣服居楚而楚居越而越居夏而夏謂中夏是非天性也積靡使然也靡順也順其積習故能然故人知謹注錯愼習俗大積靡則為君子矣大積靡謂以順積習為也縱情性而不足問學則為小人矣為君子則常安榮矣為小人則常危辱矣凡人莫不欲安榮而惡危辱故唯君子為能得其所好小人則日徼其所惡徼與邀同招也於宵反詩曰維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒此之謂也詩大雅桑柔之篇迪進也言厲王有此善人不求而進用之忍害為惡之人反顧念而重復之故天下之民貪亂安然為荼毒之行由王使之然也人論論人之善惡論盧困反志不免於曲私而冀人之以己為公也行不免於汙漫而兾人之以己為脩也汙穢也漫欺誑也漫莫叛反其愚陋溝瞀而冀人之以己為知也是衆人也溝音寇愚也溝瞀無知也衆人謂衆庶也志忍私然後能公行忍情性然後能脩忍謂矯其性行下孟反知而好問然後能才其智慮不及常好問然後能有才藝公脩而才可謂小儒矣皆矯其不及故為小儒也志安公行安脩知通統類如是則可謂大儒矣大儒者天子之三公也其才堪王者之佐也小儒者諸侯大夫士也衆人者工農商賈也禮者人主之所以為羣臣寸尺尋丈檢式也人倫盡矣檢束也式法也度也尺寸尋丈所以知長短也檢束所以制放佚大儒可為天子三公小儒可為諸侯大夫禮可以揔統羣臣人主之柄也倫讀為論或曰倫等也言人道蓋盡於禮也君子言有壇宇行有防表道有一隆累土為壇宇屋邊也防隄表標也言有壇宇謂有所尊高也行有防表謂有標凖也一隆謂厚於一不以異端亂之也言道徳之求不下於安存此道徳或當為政治以下有道徳之求故誤重寫耳故下云諸侯問政不及安存則不告也謂人以政治來求則以安存國家已上之事語之言志意之求不下於事以脩其志意來求則語為士已上之事言道徳之求不二後王道徳教化也人以教化來求則言當時之切所宜施行之事不二後王師告而以逺古也舍後王而言逺古是二也道過三代謂之蕩道過三代已前事以久逺則為浩蕩難信也法二後王謂之不雅雅正也其治法不論當時之事而廣説逺古則為不正也高之下之小之臣之不外是矣臣當為巨雖高下小大不出此壇宇防表也是君子之所以騁志意於壇宇宫庭也宫謂之室庭門屏之内也君子雖騁志意論説不出此壇宇宫庭之内也是時百家異説多妄引前占以亂當世故荀卿屢有此言之也故諸侯問政不及安存則不告也匹夫問學不及為士則不教也百家之説不及先王則不聽也百家雜説不及先王之道妄起異端則君子不聽之也夫是之謂君子言有壇宇行有防表
