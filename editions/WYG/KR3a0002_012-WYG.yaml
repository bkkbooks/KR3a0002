  hash: sha256:80b044f1afc988e190cb0b200f3c2bc63554109f22803000ca0ee0fa9f440729
body:
  text: 唐楊倞註正論篇第十八世俗之為説者曰主道利周是不然此一篇皆論世俗之乖謬荀卿以正論辨之周密也謂隱匿其情不使下知也世俗以為主道利在如此也主者民之唱也上者下之儀也謂下法上之表儀也彼將聽唱而應視儀而動唱嘿則民無應也儀隱則下無動也不應不動則上下無以相有也上不導其下則下無以効上是不相須者也若是則與無上同也不祥莫大焉故上者下之本也上宣明則下治辨矣宣露辨别也下知所從則明别於事也上端誠則下愿慤矣上公正則下易直矣上公正則下不敢險曲也治辨則易一愿慤則易使易直則易知易一則彊易使則功易知則明是治之所由生也上周密則下疑𤣥矣𤣥謂幽深難知或讀為眩惑也與下同上幽險則下漸詐矣幽隱也險難測也漸進也如字又曰漸浸也謂浸成其詐也子廉反上偏曲則下比周矣疑𤣥則難一疑惑不知所從故難一也漸詐則難使比周則難知人人懷私相親比則上不可知其情禮記曰下難知則君長勞難一則不彊難使則不功難知則不明是亂之所由作也故主道利明不利幽利宣不利周故主道明則下安主道幽則下危下知所從則安不知所從則自危也故下安則貴上下危則賤上貴猶愛也賤猶惡也故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危畏則謀上故主道莫惡乎難知莫危乎使下畏已傳曰惡之者衆則危書曰克明明徳尚書多方曰成湯至于帝乙罔不明徳慎罰詩曰明明在下詩大雅大明之篇言文王之徳明明在下故赫赫然著見於天也故先王明之豈特𤣥之耳哉特猶直也世俗之為説者曰桀紂有天下湯武簒而奪之是不然以桀紂為常有天下之籍則然以常主天下之圖籍則然也親有天下之籍則不然躬親能有天下則不然以其不能治之也天下謂在桀紂則不然古者天子千官諸侯百官以是千官也令行於諸夏之國謂之王夏大也中原之大國以是百官也令行於境内國雖不安不至於廢易遂亡謂之君僅存之君聖王之子也子子孫也有天下之後也勢籍之所在也天下之宗室也然而不材不中不中謂處事不當也中丁仲反内則百姓疾之外則諸侯叛之近者境内不一遙者諸侯不聽令不行於境内甚者諸侯侵削之攻伐之若是則雖未亡吾謂之無天下矣聖王没有勢籍者罷不足以縣天下聖王禹湯也有勢籍者謂其子孫也罷謂弱不任事也縣繫也天下無君桀紂不能治天下是無君諸侯有能徳明威積海内之民莫不願得以為君師師長然而暴國獨侈安能誅之暴國即桀紂也侈謂奢汰放縱必不傷害無罪之民誅暴國之君若誅獨夫天下皆去無助之者若一夫焉若是則可謂能用天下矣能用天下之謂王湯武非取天下也非奪桀紂之天下也脩其道行其義興天下之同利除天下之同害而天下歸之也桀紂非去天下也非天下自去也反禹湯之徳亂禮義之分禽獸之行積其凶全其惡而天下去之也天下歸之之謂王天下去之之謂亡故桀紂無天下而湯武不弑君由此効之也天下皆去桀紂是無天下也湯武誅獨夫耳豈為殺君乎由用也効明也用此論明之湯武者民之父母也桀紂者民之怨賊也今世俗之為説者以桀紂為君而以湯武為弑然則是誅民之父母而師民之怨賊也師長不祥莫大焉以天下合為君則天下未嘗合於桀紂也然則以湯武為弑則天下未嘗有説也直隳之耳自古論説未嘗有此世俗之人隳損湯武耳故天子唯其人天下者至重也非至彊莫之能任物之彊者乃能勝重任至大也非至辯莫之能分至大則難詳故非小智所能分别也至衆也非至明莫之能知天下之人至衆非極知其情偽不能和輯此三至者非聖人莫之能盡故非聖人莫之能王重大如此非聖人安能王乎王于况反聖人備道全美者也是縣天下之權稱也縣天下如權稱之縣揔知輕重也稱尺證反桀紂者其知慮至險也其志意至闇也其行之為至亂也親者疏之賢者賤之生民怨之禹湯之後也而不得一人之與刳比干囚箕子身死國亡為天下之大戮後世之言惡者必稽焉言惡者必稽考桀紂以為龜鏡也是不容妻子之數也不能容有其妻子是如此之人數也猶言不能保其妻子也列子梁王謂楊朱曰先生有一妻不能治也故至賢疇四海湯武是也至罷不容妻子桀紂是也疇四海謂以四海為疇域或曰疇與籌同計度也今世俗之為説者以桀紂為有天下而臣湯武豈不過甚矣哉以桀紂為君以湯武為臣而殺之是過甚也譬之是猶傴巫跂匡大自以為有知也匡讀為尫癈疾之人王霸篇曰賤之如㑌與此匡同禮記曰吾欲暴尫而奚若言俗此説猶巫尫大自以為神異也故可以有奪人國不可有以奪人天下可以有竊國不可有以竊天下也一國之人易服故可以有竊者天下之心難歸故不可也竊國田常六卿之屬是也可以奪之者可以有國而不可以有天下竊可以得國而不可以得天下是何也曰國小具也可以小人有也可以小道得也可以小力持也天下者大具也不可以小人有也不可以小道得也不可以小力持也國者小人可以有之然而未必不亡也小人既可以有之則易滅亡明取國與取天下殊也天下者至大也非聖人莫之能有也世俗之為説者曰治古無肉刑而有象刑治古古治世也肉刑墨劓剕宮也象刑異章服恥辱其形象故謂之象刑也書曰臯陶方施象刑惟明孔安國云象法也案書之象刑亦非謂形象墨黥世俗以為古之重罪以墨湼其面而已更無劓刖之刑也或曰墨黥當為墨幪以黑巾幪其頭而已慅嬰當為澡嬰謂澡濯其布為纓鄭云凶冠之飾令罪人服之禮記曰緦冠繰纓鄭云有事其布以為纓繰或讀為草慎子作草纓共艾畢共未詳或衍字艾蒼白色畢與韠同蔽也所以蔽前君以朱大夫素士爵韋令罪人服之故以蒼白色為韋也菲對屨菲草屨也對當為䋽傳寫誤耳䋽枲也慎子作䋽言罪人或菲或枲為屨故曰菲䋽屨䋽方孔反對或為蒯禮有疏屨傳曰麄蒯之菲也殺赭衣而不純以赤土染衣故曰赭衣純縁也殺之所以異於常人之服也純音準殺所介反慎子曰有虞氏之誅以畫跪當黥以草纓當劓以復䋽當刖以艾畢當宮此有虞之誅也又尚書大傳曰唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪幪巾也治古如是世俗説以治古如是是不然以為治耶則人固莫觸罪非獨不用肉刑亦不用象刑矣以為人或觸罪矣而直輕其刑然則是殺人者不死傷人者不刑也罪至重而刑至輕庸人不知惡也亂莫大焉惡烏路反凡刑人之本禁暴惡惡且徵其未也徵讀為懲未謂將來殺人者不死而傷人者不刑是謂惠暴而寛賊也非惡惡也故象刑殆非生於治古並起於亂今也今之亂世妄為此説治古不然凡爵列官職賞慶刑罰皆報也以類相從者也報謂報其善惡各以類相従謂善者得其善惡者得其惡也一物失稱亂之端也失稱謂失其所稱類不相從也稱尺證反夫徳不稱位能不稱官賞不當功罰不當罪不祥莫大焉昔者武王伐有商誅紂斷其首懸之赤斾史記武王斬紂頭懸之太白旗此云赤斾所傳聞各異禮記明堂位説旗曰周之大赤即史記之説非也夫征暴誅悍治之盛也殺人者死傷人者刑是百王之所同未有知其所由來者也刑稱罪則治不稱罪則亂故治則刑重亂則刑輕治世刑必行則不敢犯故重亂世刑不行則人易犯故輕李奇注漢書曰世所以治乃刑重亂乃刑輕也犯治之罪固重犯亂之罪固輕治世家給人足犯法者少有犯則衆惡之罪固當重也亂世人廹於飢寒犯法者多不可盡用重典當輕也書曰刑罰世輕世重此之謂也書甫刑以言世有治亂故法有重輕世俗之為説者曰湯武不能禁令是何也言不能施禁令故有所不至者曰楚越不受制是不然湯武者至天下之善禁令者也湯居亳武王居鄗皆百里之地也天下為一諸侯為臣通達之屬莫不振動從服以化順之振與震同恐也曷為楚越獨不受制也彼王者之制也視形勢而制械用即禮記所謂廣谷大川異制民生其間者異俗噐械異制衣服異宜稱遠邇而等貢獻豈必齊哉稱尺證反等差也故魯人以榶衛人用柯齊人用一革未詳或曰方言云盌謂之榶盂謂之柯或曰方言榶張也郭云謂榖張也土地形制不同者械用備飾不可不異也故諸夏之國同服同儀儀謂風俗也諸夏廹近京師易一以教化故同服同儀也蠻夷戎狄之國同服不同制夷狄遐遠又各在一方雖同為要荒之服其制度不同也封内甸服王畿之内也禹貢五百里甸服孔安國曰為天子服治田也封外侯服畿外也禹貢五百里侯服孔云甸服之外五百里也侯候也斥候而服事王也韋昭云侯服候圻也侯衛賔服韋昭注國語曰侯候圻衛衛圻自侯圻至衛圻其間五圻圻五百里五五二千五百里中國之界也謂之賔服常以服貢賔見於王五圻者候圻之外曰甸圻甸圻之外曰男圻男圻之外曰采圻采圻之外曰衛圻康誥曰侯甸男采衛是也此據周官職方氏與禹貢異制蠻夷要服職方氏衛服之外五百里曰蠻服又其外五百里曰夷服孔安國云要謂要束以文教要一昭反戎狄荒服職方氏所謂鎮服者也韋昭云各相去五百里九州之外荒裔之地與戎狄同俗故謂之荒荒忽無常之言甸服者祭侯服者祀賔服者享要服者貢荒服者終王韋昭曰日食祭於祖考上食也近漢亦然月祀於曾祖也時享於二祧也嵗貢於壇墠也終謂世終朝嗣王也日祭月祀時享嵗貢終王夫是之謂視形勢而制械用稱遠近而等貢獻是王者之至也至當為志所以志識遠近也彼楚越者且時享嵗貢終王之屬也必齊之日祭月祀之屬然後曰受制耶是規磨之説也規磨之説猶差錯之説也規者正圓之器磨乆則偏盡而不圓失於度程也文子曰水雖平必有波衡雖正必有差韓子曰規有磨而水有波我欲更之無柰之何此通於權言也溝中之瘠也謂行乞之人在溝壑中羸􅇤者以喻智慮淺則未足與及王者之制也語曰淺不足與測深愚不足以謀知坎井之鼃不可與語東海之樂此之謂也言小不知大也司馬彪曰坎井壊井也鼃蝦蟇類也事出莊子坎井或作壇井鼃戸蝸反世俗之為説者曰堯舜擅讓擅與禪同墠亦同義謂除地為墠告天而傳位也後因謂之禪位世俗以為堯舜徳厚故禪讓聖賢後世徳薄故父子相繼荀卿言堯舜相承但傳位於賢而已與傳子無異非謂求名而禪讓也案書序曰將遜于位讓于虞舜是亦有讓之説此云非擅讓蓋書序美堯之徳雖是傳位與遜讓無異非是先有讓意也孟子亦云萬章曰堯以天下與舜有諸孟子曰天子不能以天下與人曰孰與之曰天與之又曰天與賢則與賢天與子則與子是不然天子者勢位至尊無敵於天下夫有誰與讓矣讓者勢位敵之名若上下相縣則無與讓矣有讀為又道徳純備智慧甚明南面而聽天下生民之屬莫不振動從服以化順之天下無隱士無遺善無隱藏不用之士也同焉者是也異焉者非也夫有惡擅天下矣夫自知不堪其事則求賢而禪位今以堯舜之明聖事無不理又焉用禪位也哉曰死而擅之或者既以生無禪讓之事因謂堯舜預求聖賢至死而禪之也是又不然聖王在上圖徳而定次量能而授官一本作决徳而定次皆民載其事而各得其宜不能以義制利不能以偽飾性則兼以為民偽謂矯其本性也無能者則兼并之令盡為民也聖王以沒天下無聖則固莫足以擅天下矣固無擅讓天下有聖而在後者則天下不離有聖繼其後者則天下有所歸不離叛朝不易位國不更制天下厭然與鄉無以異也厭然順服貌一渉反鄉音向以堯繼堯夫又何變之有矣言繼位相承與一堯無異豈為禪讓改變與他人乎聖不在後子而在三公則天下如歸猶復而振之也後子嗣子謂丹朱商均也三公宰相謂舜禹天下如歸言不歸後子而歸三公也復而振之謂猶如天下已去而衰息今使之來復而振起也天下厭然與鄉無以異也以堯易堯夫又何變之有矣疑此三句重也唯其徙朝改制為難謂殊徽號異制度也舜禹相繼與父子無異所難而不忍者在徙朝改制也後世見其改易遂以為擅讓也故天子生則天下一隆致順而治論徳而定次天下一隆謂天下之人皆得其崇厚也致極也死則能任天下者必有之矣夫禮義之分盡矣擅讓惡用矣哉夫讓者禮義之名今聖王但求其能任天下者傳之則是盡禮義之分矣豈復更求禪讓之名也曰老衰而擅是又不然血氣筋力則有衰若夫智慮取舍則無衰曰老者不堪其勞而休也是又畏事者之議也或者自以畏憚勞苦以為聖王亦然也天子者勢至重而形至佚心至愉而志無所詘形不為勞尊無上矣衣被則服五采雜間色衣被謂以衣被身服五采言備五色也間色紅碧之屬禮記曰衣正色裳間色也重文繡加飾之以珠玉食飲則重太牢而備珍怪期臭味重多也謂重多之以太牢也珍怪奇異之食也期當為綦極也曼而饋曼當為萬饋進食也列萬舞而進食代睪而食睪未詳蓋香草也或曰睪讀為藁即所謂蘭茝本也或曰當為澤澤蘭也士虞禮茵著用荼實緩澤焉俗書澤字並水旁睪傳寫誤也遺其水耳代睪而食謂焚香氣歇歇即更以新者代之雍而徹乎雍詩周頌樂章名奏雍而徹饌論語曰三家者以雍徹言其僣也五祀執薦者百人侍西房周禮宗伯以血祭祭社稷五祀鄭云五祀四時迎五行之氣於四郊而祭五徳之帝也或曰此五祀謂礿祀蒸嘗及大祫也或曰國語展禽曰禘郊祖宗報此五者國之祀典也皆王者親臨之祭非謂户竈中霤門行之五祀也薦謂所薦陳之物籩豆之屬也侍侍立也西房西廂侍或為傳居則設張容負依而坐諸侯趨走乎堂下居安居也聽朝之時也容謂羽衛容也居則設張其容儀負依而坐也户牖之間謂之扆依與扆同或曰爾雅曰容謂之防郭璞云如今􅇃頭小曲屏風唱射者所謂隱見也言施此於戸牖間負之而坐也出戸而巫覡有事出户謂出内門也女曰巫男曰覡有事祓除不祥出門而宗祝有事出門謂車駕出國門宗者王祭祀當為祝有事謂祭行神也國語曰使名姓之後能知四時之生犧牲之物玉帛之類采服之儀宗彛之量次主之度屏攝之位壇場之所上下之神氏姓之出而必率舊典者為之宗又曰使先聖之後能知山川之號宗廟之事昭穆之世齋敬之勤禮節之宜威儀之則容貌之崇忠信之質褾絜之服而敬㳟明神者為之祝韋昭曰宗大宗伯也掌祭祀之官禮記曰大祝掌祈福祥也乗大路越席以養安大路祭天車禮曰大路繁纓一就越席結蒲為席養安言恐其不安以此和養之按禮記大路越席為質素也此云養安以為盛飾未詳其意或曰古人以質為重也側載睪芷以養鼻睪芷香草也已解上於車中傍側載芷用以養鼻前有錯衡以養目詩曰約軧錯衡毛曰錯衡文衡和鸞之聲歩中武象騶中韶䕶以養耳和鸞皆車上鈴也韓詩外傳云鸞在衡和在軾前升車則馬動馬動則鸞鳴鸞鳴則和應皆所以為行節也許慎曰和取其敬鸞以象鳥之聲武象韶䕶皆樂名騶當為趨歩謂車緩行趨謂車速行周禮大馭云凡馭路行以肆夏趨以采齊皆以鸞和為節鄭云行謂大寢至路門趨謂路門至應門也三公奉軛持納軛轅前也納與軜同軜謂驂馬内軜繫軾前者詩曰鋈以觼軜諸侯持輪挾輿先馬挾輿在車之左右也先馬導馬也或持輪者或挾輿者或先馬者大侯編後大夫次之大侯國稍大在五等之列者小侯元士次之小侯遠小國及附庸也元士上士也禮記曰庶方小侯入天子之國曰某人又曰天子之元士視附庸也庶士介而坐道庶士軍士也介而坐道被甲坐於道側以禦非常也庶人隱竄莫敢望視居如大神動如天帝言敬畏之甚也持老養衰猶有善於是者與不老者休也休猶有安樂恬愉如是乎不老老也猶言不顯顯也或曰衍不字也夫老者休息名言豈更有休息安樂過此故曰諸侯有老天子無老諸侯供職貢朝聘故有筋力衰竭求致仕者與天子異也有擅國無擅天下古今一也讓者勢位敵之名一國事輕則有請於天子而讓賢天下則不也夫曰堯舜擅讓是虛言也是淺者之傳陋者之説也不知逆順之理小大至不至之變也小謂一國大謂天下至不至猶言當不當也未可與及天下之大理者也世俗之為説者曰堯舜不能教化是何也曰朱象不化是不然也堯舜至天下之善教化者也南面而聽天下生民之屬莫不振動從服以化順之言天下無不化然而朱象獨不化是非堯舜之過朱象之罪矣朱象乃罪人之當誅戮者豈堯舜之過哉論語曰上智與下愚不移是也堯舜者天下之英也鄭康成註禮記云英謂俊選之尤者朱象者天下之嵬一時之瑣也言嵬𤨏之人縱被堯舜之治猶不可化言教化所不及嵬𤨏已解在非十二子之篇今世俗之為説者不怪朱象而非堯舜豈不過甚矣哉夫是之謂嵬説狂妄之説羿蠭門者天下之善射者也不能以撥弓曲矢中撥弓不正之弓中丁仲反王梁造父者天下之善馭者也不能以辟馬毁輿致遠辟與躄同必亦反堯舜者天下之善教化者也不能使嵬𤨏化何世而無嵬何時而無𤨏自太皥燧人莫不有也太皥伏羲也燧人太皥前帝王始作火化者故作者不祥學者受其殃非者有慶作嵬𤨏者不祥有慶言必無刑戮也詩曰下民之孽匪降自天噂沓背憎職競由人此之謂也詩小雅十月之交篇言下民相為妖孽災害非從天降噂噂然相對談語背則相憎為此者蓋由人耳世俗之為説者曰大古薄葬棺厚三寸衣衾三領𦵏田不妨田故不掘也此蓋言古之人君也三領三稱也禮記君陳衣于序東西領南上故以領言葬田不妨田言所葬之地不妨農耕也殷已前平葬無丘壠之識亂今厚葬飾棺故掘也是不及知治道而不察於抇不抇者之所言也抇穿也謂發冢也胡骨反凡人之盜也必以有為其意必有所云為也不以備不足足則以重有餘也而聖王之生民也皆使當厚優猶知足而不得以有餘過度當謂得中也丁浪反優猶寛泰也言聖王之養民輕賦薄斂皆使寛泰而知足又有禁限不得有餘過度故盜不竊賊不刺盜賊通名分而言之則私竊謂之盜劫殺謂之賊狗豕吐菽粟而農賈皆能以貨財讓農賈庶人猶讓則其餘無不讓也風俗之美男女自不取於塗而百姓羞拾遺故孔子曰天下有道盜其先變乎衣食足知榮辱雖珠玉滿體文繡充棺黄金充椁加之以丹矸重之以曾青丹矸丹砂也曾青銅之精形如珠者其色極青故謂之曾青加以丹矸重以曽青言以丹青采畫也犀象以為樹樹之於壙中也琅玕龍兹華覲以為實琅玕似珠崑崙山有琅玕樹龍兹未詳覲當為瑾華謂有光華也或曰龍兹即今之龍鬚席公羊傳曰衛侯朔屬員兹爾雅曰蓐謂之兹史記曰衛叔封市兹徐廣曰兹者籍席之名列女傳無鹽女謂齊宣王曰漸臺五重黄金白玉琅玕龍疏翡翠珠璣莫落連飾萬民疲極此二殆也疑龍兹即龍疏疏鬚音相近也曹大家亦不解實謂實於棺槨中或曰兹與髭同人猶且莫之抇也是何也則求利之詭緩而犯分之羞大也詭詐也求利詭詐之心緩也夫亂今而後反是上以無法使下以無度行知者不得慮能者不得治賢者不得使不得在位使人若是則上失天性下失地利中失人和故百事廢財物屈而禍亂起王公則病不足於上庶人則凍餧羸瘠於下於是桀紂羣居而盜賊擊奪以危上矣言在上位者蓋如桀紂也安禽獸行虎狼貪故脯巨人而炙嬰兒矣若是則有何尤抇人之墓抉人之口而求利矣哉抉挑也抉人口取其珠也雖此倮而埋之猶且必抇也安得葬埋哉不可得葬埋而不發彼乃將食其肉而齕其骨也夫太古薄葬故不抇也亂今厚葬故抇也是特姦人之誤於亂説以欺愚者而潮陷之以偷取利焉夫是之謂大姦言是乃特姦人自誤惑於亂説因以欺愚者猶於潮泥之中陷之謂使䧟於不仁不孝也以偷取利謂背弃死者而苟取其利於生者也是時墨子之徒説薄葬以惑當世故以此譏之傳曰危人而自安害人而自利此之謂也危害死者以利生者與此義同子宋子曰明見侮之不辱使人不鬭宋子已解在天論篇宋子言若能明慢侮而不以為辱則可使人不鬬也莊子説宋子曰見侮不辱救民之鬬尹文子曰見侮不辱見推不矜禁暴息兵救世之鬬此人君之徳可以為主矣宋子蓋尹文弟子何休注公羊曰以子冠氏上者著其為師也言此者蓋以難宋子之徒也人皆以見侮為辱故鬬也知見侮之為不辱則不鬭矣應之曰然則亦以人之情為不惡侮乎曰惡而不辱也雖惡其侮而不以為辱惡烏路反下同曰若是則必不得所求焉求不鬬必不得凡人之鬭也必以其惡之為説非以其辱之為故也凡鬬在於惡不在於辱也今俳優侏儒狎徒詈侮而不鬭者是豈鉅知見侮之為不辱哉狎戲也鉅與遽同言此倡優豈速遽知宋子有見侮不辱之論哉然而不鬭者不惡故也今人或入其央瀆竊其猪彘央瀆中瀆也如今人家出水溝也則援劒㦸而逐之不避死傷是豈以䘮猪為辱也哉然而不憚鬭者惡之故也雖以見侮為辱也不惡則不鬭不知宋子之論者也雖知見侮為不辱惡之則必鬭知宋子之論也然則鬭與不鬭耶亡於辱之與不辱也乃在於惡之與不惡也夫今子宋子不能解人之惡侮而務説人以勿辱也豈不過甚矣哉解達也不知人情惡侮而使見侮不辱是過甚也解如字説讀為税金舌蔽口猶將無益也金舌以金為舌金舌蔽口以喻不言也雖子宋子見侵侮金舌蔽口不對欲以率先猶無益於不鬬也揚子法言曰金口而木舌金或讀為噤不知其無益則不知不知此説無益是不智也知其無益也直以欺人則不仁不仁不知辱莫大焉發論而不仁不知辱無過此也將以為有益於人耶則與無益於人也與讀為預本謂有益於人反預於無益人之論也則得大辱而退耳説莫病是矣本欲使人見侮不辱反自得大辱耳子宋子曰見侮不辱應之曰凡議必將立隆正然後可也崇高正直然後可也無隆正則是非不分而辯訟不决故所聞曰天下之大隆也是非之封界分職名象之所起王制是也名謂指名象謂法象王制謂王者舊制故凡言議期命是非以聖王為師期物之所㑹也命名物也皆以聖王為法而聖王之分榮辱是也聖王以榮辱為人之大分豈如宋子以見侮為不辱哉是有兩端矣榮辱各有二也有義榮者有勢榮者有義辱者有勢辱者志意脩徳行厚知慮明是榮之由中出者也夫是之謂義榮爵列尊貢禄厚形勢勝貢謂所受貢賦謂天子諸侯也禄謂受君之禄卿相士大夫也形勢謂勢位也上為天子諸侯下為卿相士大夫是榮從外至者也夫是之謂勢榮流淫汙僈汙穢行也僈當為漫已解在榮辱篇犯分亂理驕暴貪利是辱之由中出者也夫是之謂義辱詈侮捽搏捽持頭也搏手擊也捶笞臏腳捶笞皆杖擊也臏膝骨也腳古脚字臏脚則刖其膝骨也鄒陽曰司馬喜臏脚於宋卒相中山斬斷枯磔斷如字枯弃市暴屍也磔車裂也周禮以疈辜祭四方百物注謂披磔牲也或者枯與疈辜義同歟韓子曰淮南之地麗水之中生金民多竊采之采金之禁行而輙辜磔所辜磔甚衆而民竊金不止疑辜即枯也又莊子有辜人謂犯罪應死之人藉靡舌􅀈藉見凌藉也才夜反靡繫縛與縻義同即謂胥靡也謂刑徒之人以鐵鏁相連繫也舌􅀈未詳或曰莊子云公孫龍口呿而不合舌舉而不下謂辭窮亦恥辱也是辱之由外至者也夫是之謂勢辱是榮辱之兩端也故君子可以有勢辱而不可以有義辱小人可以有勢榮而不可以有義榮有勢辱無害為堯有勢榮無害為桀義榮勢榮唯君子而後兼有之義辱勢辱唯小人然後兼有之是榮辱之分也聖王以為法士大夫以為道官人以為守百姓以為成俗萬世不能易也言上下皆以榮辱為治也士大夫主教化者官人守職事之官今子宋子案不然獨詘容為已慮一朝而改之説必不行矣言宋子不知聖人以榮辱為大分獨欲屈容受辱為已之道其謀慮乃欲一朝而改聖王之法説必不行也譬之是猶以塼塗而塞江海也以僬僥而戴太山也塼塗以􅂗壘塼也僬僥短人長三尺者也蹎跌碎折不待頃矣蹎與顛同躓也頃少頃也二三子之善於子宋子者殆不若止之將恐得傷其體也二三子慕宋子道者止謂息其説也傷其體謂受大辱子宋子曰人之情欲寡而皆以己之情欲為多是過也宋子以凡人之情所欲在少不在多也莊子説宋子曰以禁攻寢兵為外以情欲寡少為内故率其羣徒辯其談説明其譬稱將使人知情欲之寡也稱謂所宜也尺證反情欲之寡或謂情之欲寡也應之曰然則亦以人之情為欲目不欲綦色耳不欲綦聲口不欲綦味鼻不欲綦臭形不欲綦佚此五綦者亦以人之情為不欲乎曰人之情欲是已曰若是則説必不行矣以人之情為欲此五綦者而不欲多譬之是猶以人之情為欲富貴而不欲貨也好美而惡西施也古之人為之不然以人之情為欲多而不欲寡故賞以富厚而罰以殺損也謂以富厚賞之以殺損罰之殺減也所介反是百王之所同也故上賢禄天下次賢禄一國下賢禄田邑愿慤之民完衣食以人之情為欲多故使徳重者受厚禄下至愿慤之民猶得完衣食皆所以報其功今子宋子以是之情為欲寡而不欲多然則先王以人之所不欲者賞而以人之所欲者罰耶亂莫大焉知宋子之説乃大亂之道今子宋子嚴然而好説嚴讀為儼好説自喜其説也好呼報反聚人徒立師學成文曲文曲文章也然而説不免於以至治為至亂矣豈不過甚矣哉荀子卷十二欽定四庫全書荀子卷十三唐楊倞註禮論篇第十九舊目録第二十三今升在論議之中於文為比禮起於何也曰人生而有欲欲而不得則不能無求求而無度量分界則不能不爭量扶嚮反爭則亂亂則窮窮謂計無所出也先王惡其亂也故制禮義以分之以養人之欲給人之求有分然後欲可養求可給使欲必不窮乎物物必不屈於欲兩者相持而長是禮之所起也屈竭也先王為之立中道故欲不盡於物物不竭於欲欲與物相扶持故能長久是禮所起之本意者也故禮者養也芻豢稻粱五味調香所以養口也椒蘭芬苾所以養鼻也雕琢刻鏤黼黻文章所以養目也鐘鼓管磬琴瑟竽笙所以養耳也疏房檖狽越席牀第几筵所以養體也疏通也疏房通明之房也狽古貌字檖狽未詳或曰檖讀為䆳貌廟也廟者宮室尊嚴之名或曰狽讀為邈言屋宇深䆳綿貌也第牀棧也越席剪蒲席也古人所重司馬貞曰疏䆫也故禮者養也君子既得其養又好其别曷謂别曰貴賤有等長幼有差貧富輕重皆有稱者也稱謂各當其
