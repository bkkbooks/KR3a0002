seq: 13
front:
  text: 宜尺證反故天子大路越席所以養體也側載睪芷所以養鼻也前有錯衡所以養目也和鸞之聲歩中武象趨中韶護所以養耳也並解在正論篇龍旗九斿所以養信也龍旗畫龍旗爾雅曰素升龍干縿練斿九旗正幅為絲斿所以屬之者也信謂使萬人見而信之識至尊也養猶奉也寢兕謂武士寢處於甲胄者也持虎謂以虎皮為弓衣武士執持者也詩曰虎韔鏤膺劉氏云畫虎於鈴竿及楯也蛟韅韅馬服之革蓋象蛟形徐廣曰以蛟魚皮為之絲末末與幦同禮記曰若羔幦虎犆鄭云覆芩也絲幦蓋織絲為幦亡狄反彌龍所以養威也彌如字又讀為弭弭末也謂金飾衡軛之末為龍首也徐廣曰乗輿單以金薄繆龍為輿倚較交虎伏軾龍首銜軛故大路之馬必倍至教順然後乗之所以養安也倍至謂倍加精至也或以必倍為自倍謂反之車在馬前令馬熟識車也至極教順然後乗之備驚奔也熟知夫出死要節之所以養生也熟甚也出死出身死冦難也要節自要約以節義謂立節也使熟便其知其出要節盡忠於君是乃所以受禄養生也若不能然則亂而不保其生也要一遙反熟知夫出費用之所以養財也費用財以成禮謂問遺之屬是乃所以求奉養其財不相侵奪也熟知夫恭敬辭讓之所以養安也無恭敬辭讓則亂而不安也熟知夫禮義文理之所以養情也無禮義文理則縱情性不知所歸也故人苟生之為見若者必死言苟唯以生為所見不能出死要節若此者必死也苟利之為見若者必害苟唯以利為所見不能用財以成禮若此者必遇害苟怠惰偷懦之為安若者必危懦讀為儒言苟以怠惰為安居不能恭敬辭讓若此者必危苟情説之為樂若者必滅説讀為悦言苟以情悦為樂不知禮義文理恣其所欲若此者必滅亡故人一之於禮義則兩得之矣一之於情性則兩䘮之矣專一於禮義則禮義情性兩得專一於情性則禮義情性兩䘮故儒者將使人兩得之者也墨者將使人兩䘮之者也是儒墨之分也禮有三本天地者生之本也先祖者類之本也類種君師者治之本也無天地惡生無先祖惡出無君師惡治三者偏亡焉無安人偏亡謂闕一也故禮上事天下事地尊先祖而隆君師是禮之三本也所以奉其三本也故王者天太祖謂以配天也太祖若周之后稷諸侯不敢壞謂不祧其廟若魯周公史記作不敢懷司馬貞云思也蓋誤耳大夫士有常宗繼别子之後為族人所常宗百世不遷之大宗也别子若魯三桓也所以别貴始貴始得之本也得當為徳言徳之本在貴始穀梁傳有此語郊止乎天子而社至於諸侯道及士大夫道通也言社自諸侯通及士大夫也適士皆得祭門及行史記道作士大夫也或曰道行神也亦作㗖司馬貞曰㗖音含苞也言士大夫皆得苞立社倞謂是萹通道誤為蹈傳寫又誤以蹈為蹈耳所以别尊者事尊卑者事卑宜大者巨宜小者小故有天下者事十世十當為七穀梁傳作天子七廟有一國者事五世有五乗之地者事三世古者十里為成成出革車一乗五乗之地謂大夫有采地者得立三廟也有三乗之地者事二世祭法所謂適士立二廟也持手而食者不得立宗廟持其手而食謂農工所以表積厚積厚者流澤廣積薄者流澤狹也積與績同功業也穀梁傳僖公十五年震夷伯之廟夷伯魯大夫因以此見天子至于士皆有廟也天子廟七諸侯五大夫三士二故徳厚者流光徳薄者流卑是以貴始徳之本也大饗尚𤣥尊俎生魚先大羮貴食飲之本也大饗祫祭先王也尚上也𤣥酒水也大羮汁無鹽梅之味也本謂造飲食之物禮記曰郊血大饗腥也饗尚𤣥尊而用酒醴先黍稷而飯稻粱饗與享同四時享廟也用謂酌獻也以𤣥酒為上而獻以酒醴先陳黍稷而後飯以稻粱者也祭齊大羮而飽庶羞貴本而親用也祭月祭也齊讀為嚌至齒也謂尸舉大羮但至齒而已至庶羞而致飽也用謂可用食也貴本之謂文親用之謂理文謂脩飾理謂合宜兩者合而成文以歸大一夫是之謂大隆貴本親用兩者相合然後備成文理大讀為太太一謂太古時禮記曰夫禮必本於太一言雖備成文理然猶不忘本而歸於太一是謂大隆於禮司馬貞曰隆盛也得禮文理歸於太一是禮之盛也故尊之尚𤣥酒也俎之尚生魚也豆之先大羮也一也一謂一於古也此以象太古時皆貴本之義故云一也利爵之不醮也成事之俎不嘗也三臭之不食也一也醮盡也謂祭禮必告利成利成之時其爵不卒奠于筵前也史記作不卒成事謂尸既飽禮成不嘗其爼儀禮尸又三飯士佐食受尸牢肺正脊加于肵臭謂歆其氣謂食畢也許又反皆謂禮畢無文飾復歸于朴亦象太古時史記作三侑之不食司馬貞云禮祭必立侑以勸尸食至三飯而止每飯有侑一人故曰三侑既是勸尸故不自食也大昬之未發齊也大廟之未入尸也始卒之未小斂也一也皆謂未有威儀節文象太古時也史記作大昏未發齊也司馬貞曰發齊謂昏禮也父親醮子而迎故曲禮云齋戒以告鬼神此三者皆禮之初也始質而未偽故云一也大路之素未集也郊之麻絻也䘮服之先散麻也一也大路祭天車王者所乗也未集不集丹漆也禮記曰大路素而越席又曰丹漆雕幾之美而素車之乗麻絻緝麻為冕所謂大裘而冕不用衮龍之屬也士䘮禮始死主人散帶垂長三尺史記作大路之素幬司馬貞曰儔音稠謂車蓋素帷亦質者也三年之䘮哭之不文也清廟之歌一倡而三歎也縣一鍾尚拊之膈朱絃而通越也一也不文謂無曲折也禮記曰斬衰之哭長往而不反清廟之歌謂工以樂歌清廟之什也一人倡三人歎言和之者寡也縣一鍾比於編鍾為簡畧也尚拊之膈未詳或曰尚謂上古也拊樂器名膈擊也即所謂戞擊鳴球搏拊琴瑟也尚古樂所以示質也揚子雲長楊賦曰戞擊鳴球韋昭曰古文膈為擊或曰膈當為拊大戴禮作搏拊一名相禮記曰治亂以相拊所以輔樂亦相輔之義書曰搏拊琴瑟孔安國曰搏拊以韋為之實之以槺所以節樂也周禮大祭祀登歌令奏擊拊司馬貞曰拊膈謂懸鐘格也不擊其鐘而拊其格不取其聲示質也朱絃通越鄭𤣥云朱絃練朱絃也練則聲濁越瑟底孔所以發越其聲故謂之越疎通之後使聲遲也史記作洞越或曰膈讀為戞凡禮始乎棁成乎文終乎悦校史記作始乎脱成乎文終乎棁言禮始於脱畧成於文飾終於棁减禮記曰禮主其减校未詳大戴禮作終於隆盛也故至備情文俱盡情文俱盡乃為禮之至備情謂禮意䘮主哀祭主敬之類文謂禮物威儀也其次情文代勝不能至備文勝於情情勝於文是亦禮之次也其下復情以歸大一也雖無文飾但復情以歸其素是亦禮也若潢汙行潦之水可薦於鬼神者也天地以合日月以明四時以序星辰以行江河以流萬物以昌好惡以節喜怒以當言禮能上調天時下節人情若無禮以分别之則天時人事皆亂也昌謂各遂其生也以為下則順以為上則明萬物變而不亂貳之則䘮也禮豈不至矣哉禮在下位則使人順在上位則萬變而不亂貳謂不一在禮䘮亡也立隆以為極而天下莫之能損益也立隆盛之禮以極盡人情使天下不復更能損益也本末相順司馬貞曰禮之盛文理合以歸大一禮之殺復情以歸大一是本末相順也終始相應司馬貞曰禮始於脱畧終於梲棁亦殺也殺亦脱畧是終始相應至文以有别至察以有説言禮之至文以其有尊卑貴賤之别至察以其明隆殺委曲之情足以悦人心也天下從之者治不從者亂從之者安不從者危從之者存不從者亡小人不能測也禮之理誠深矣堅白同異之察入焉而溺其理誠大矣擅作典制辟陋之説入焉而䘮其理誠高矣暴慢恣睢輕俗之屬入焉而隊隊古墜字墮也以其深故能使堅白者溺以其大故能使擅作者䘮以其高故能使暴慢者墜司馬貞曰恣睢毁訾也故繩墨誠陳矣則不可欺以曲直衡誠縣矣則不可欺以輕重規矩誠施矣則不可欺以方圓君子審於禮則不可欺以詐偽故繩者直之至衡者平之至規矩者方圓之至禮者人道之極也然而不法禮不足禮謂之無方之民法禮足禮謂之有方之士足謂無闕失方猶道也禮之中焉能思索謂之能慮禮之中焉能勿易謂之能固勿易不變也若不在禮之中雖能思索勿易猶無益能慮能固加好者焉斯聖人矣故天者高之極也地者下之極也無窮者廣之極也東西南北無窮聖人者道之極也故學者固學為聖人也非特學為無方之民也禮者以財物為用以貢獻問遺之類為行禮之用以貴賤為文以車服旂章為貴賤文飾也以多少為異多少異制所以别上下也以隆殺為要隆豐厚殺減降要當也禮或厚或薄唯其所當為貴也文理繁情用省是禮之隆也文理謂威儀情用謂忠誠若享獻之禮賔主百拜情唯主敬文過於情是禮之隆盛也文理省情用繁是禮之殺也若尊之上𤣥酒本於質情過於文雖減殺是亦禮也文理情用相為内外表裏並行而雜是禮之中流也或豐或殺情文代勝並行相雜是禮之中流中流言如水清濁相混故君子上致其隆下盡其殺而中處其中君子知禮者致極也言君子於大禮則極其隆厚小禮則盡其隆殺中用得其中皆不失禮也歩驟馳騁厲鶩不外是矣是君子之壇宇宮庭也厲鶩疾鶩也史記作廣鶩言雖馳騁不出於隆殺之間壇宇宮庭已解於上人有是士君子也外是民也是猶此也民氓無所知也於是其中焉方皇周挾曲得其次序是聖人也方皇讀為彷徨猶徘徊也挾讀為浹布也言於是禮之中徘徊周布委曲皆得其次序而不亂是聖人也故厚者禮之積也大者禮之廣也高者禮之隆也明者禮之盡也聖人所以能厚重者由積禮也能𢎞大者由廣禮也崇高者由隆禮也明察者由盡禮也司馬貞言君子聖人有厚大之徳則為禮之所歸積益𢎞廣者也詩曰禮儀卒度笑語卒獲此之謂也引此明有禮動皆合宜也禮者謹於治生死者也謹嚴生人之始也死人之終也終始俱善人道畢矣故君子敬始而慎終終始如一是君子之道禮義之文也夫厚其生而薄其死是敬其有知而慢其無知也是姦人之道而倍叛之心也君子以倍叛之心接臧穀猶且羞之而況以事其所隆親乎臧已解在王霸篇莊子曰臧與穀相與牧羊音義云孺子曰穀或曰穀讀為鬭穀於蒐之穀穀乳謂哺乳小兒也所隆親所厚之親也故死之為道也一而不可得再復也臣之所以致重其君子之所以致重其親於是盡矣以其死不可再復臣子於極重之道不可不盡也故事生不忠厚不敬文謂之野忠厚忠心篤厚敬文恭敬有文飾野野人不知禮者送死不忠厚不敬文謂之瘠瘠薄君子賤野而羞瘠故天子棺槨十重諸侯五重大夫三重士載重禮記曰天子之棺四重水兕革棺被之其厚三寸杝棺一梓棺二四者皆周棺束縮二衡三衽毎束一柏椁以端長六尺而葬五重八翣鄭云五重杭木與茵也今十重蓋以棺椁與杭木合為十重也諸侯已下與禮記多少不同未詳也然後皆有衣衾多少厚薄之數皆有翣菨文章之等以敬飾之衣謂禮記君陳衣于庭百稱之比也衾謂君錦衾大夫縞衾士緇衾也翣菨當為翣萎鄭康成曰翣萎棺之牆飾也翣以木為衣以白布畫為雲氣如今之攝也周禮縫人衣翣柳之林柳之言聚諸飾所聚柳以象宮室也劉熙釋名云䘮之車其蓋曰柳文章之等謂君龍帷三池振容黼荒火三列黻三列素錦褚加為荒纁紐六齊五采五具黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六大夫已下各有差也使生死終始若一足以為人願是先王之道忠臣孝子之極也生死如一則人願皆足忠孝之極在此也天子之䘮動四海屬諸侯諸侯之䘮動通國屬大夫大夫之䘮動一國屬脩士脩士之䘮動一鄉屬朋友屬謂付託之使主䘮也通國謂通好之國一國謂同在朝之人也脩士士之進脩者謂上士也一鄉鄉内之姻族也春秋傳曰天子七月而葬同軌畢至諸侯五月而葬同盟至大夫三月同位至士踰月外姻至庶人之䘮合族黨動州里刑餘罪人之䘮不得合族黨獨屬妻子棺椁三寸衣衾三領不得飾棺不得晝行以昬殣凡縁而往埋之刑餘遭刑之餘死者墨子曰桐棺三寸葛以為緘趙簡子亦云然則厚三寸刑人之棺也䘮大記士陳衣于序東三十稱今云三領亦貶損之甚也殣道路死人也詩曰行有死人尚或殣之今昬殣如掩道路之死人也惡之甚也凡常也縁因也言其妻子如常日所服而埋之不更加絰杖也今猶謂無盛飾為縁身者也反無哭泣之節無衰麻之服無親疏月數之等各反其平各復其始已葬埋若無䘮者而止夫是之謂至辱此蓋論墨子薄葬是以至辱之道奉君父也禮者謹於吉凶不相厭者也厭掩也烏甲反謂不使相侵掩也或曰不使相厭惡非也紸纊聽息之時則夫忠臣孝子亦知其閔已紸讀為注注纊即屬纊也言此時知其必至於憂閔也或曰纊當為黊黊古化反以為黊字非也然而殯歛之具未有求也所謂不相厭也垂涕恐懼然而幸生之心未巳持生之事未輟也卒矣然後作具之作之具之故雖備家必踰日然後能殯三日而成服備豐足也然後告遠者出矣備物者作矣故殯久不過七十日速不損五十日此皆據士䘮禮首尾三月也損減也是何也曰遠者可以至矣百求可以得矣百事可以成矣其忠至矣其節大矣其文備矣忠誠也節人子之節也文器用儀制也子思曰䘮三日而殯凡附於身者必誠必信勿之有悔焉耳三月而葬凡附於棺者必誠必信勿之有悔焉耳然後月朝卜日月夕卜宅然後葬也月朝月初也月夕月末也先十日知其朝然後卜宅此大夫之禮也士則筮宅士䘮禮先筮宅後卜日此云月朝卜日月夕卜宅未詳也當是時也其義止誰得行之其義行誰得止之聖人為之節制使賢者抑情不肖者企也故三月之葬其貌以生設飾死者也殆非直留死者以安生也貌象也言其象以生之所設器用飾死者三月乃能備之也是致隆思慕之義也䘮禮之凡凡謂常道變而飾謂殯歛每加飾動而遠禮記子㳺曰飯於牖下小歛於戸内大歛於阼殯於客位祖於庭葬於墓所以即遠之久而平久則哀殺如平常也故死之為道也不飾則惡惡則不哀􅈛則翫􅈛與邇同翫戲狎也翫則厭厭則忘忘則不敬一朝而䘮其嚴親而所以送葬之者不哀不敬則嫌於禽獸矣君子恥之故變而飾所以滅惡也動而遠所以遂敬也遂成也邇則懼敬不成也久而平所以優生也優生養生也謂送死有禮復生有節也禮者斷長續短損有餘益不足達愛敬之文而滋成行義之美者也皆謂使賢不肖得中也賢者則達愛敬之文而已不至於滅性不肖者用此成行義之美不至於禽獸也故文飾麤惡聲樂哭泣恬愉憂戚是反也是相反也然而禮兼而用之時舉而代御御進用也時吉則吉時凶則凶也故文飾聲樂恬愉所以持平奉吉也麤衰哀泣憂戚所以持險奉凶也持扶助也險謂不平之時故其立文飾也不至於窕冶窕讀為姚姚冶妖美也其立麤衰也不至於瘠弃立麄衰以為居䘮之飾亦不使羸瘠自弃其立聲樂恬愉也不至於流淫墯慢其立哭泣哀戚也不至於隘懾傷生是禮之中流也隘窮也懾猶戚也之怯反中流禮之中道也故情貌之變足以别吉凶明貴賤親踈之節期止矣期當為斯外是姦也雖難君子賤之故量食而食之量要而帶之相高以毁瘠是姦人之道也非禮義之文非孝子之情也將以有為者也非禮義之節文孝子之真情將有作為以邀名求利若演門也故説豫娩澤憂戚萃惡是吉凶憂愉之情發於顔色者也説讀為悦豫樂也娩媚也音晚澤顔色潤澤也萃與顇同惡顔色惡也發見也歌謡謸笑哭泣諦號是吉凶憂愉之情發於聲音者也謸與傲同戲謔也説文云謸悲聲與此義不同諦音啼管子曰豕人立而啼古字通用號胡刀反芻豢稻粱酒醴餰鬻魚肉菽藿酒漿是吉凶憂愉之情發於食飲者也餰鬻菽藿䘮者之食卑絻黼黻文織資麤衰絰菲繐菅屨是吉凶憂愉之情發於衣服者也卑絻與禆冕同衣裨衣而服冕也裨之言卑也天子六服大裘為上餘為卑以事尊卑服之諸侯已下皆服焉文織染絲織為文章也資與齊同即齊衰也麄麄布也今麄布亦謂之資菲草衣蓋如蓑然或當時䘮者有服此也繐衰也鄭云繐衰小功之繐四升半之衰也凡布細而疎者謂之繐今南陽有鄧林繐布菅茅也春秋傳曰晏子杖菅屨也疎房檖䫉越席牀第几筵屬茨倚廬席薪枕塊是吉凶憂愉之情發於居處者也茨蓋屋草也屬茨令茨相連屬而已至疎漏也倚廬鄭云倚木為廬謂一邊著地如倚物者既葬柱楣􅂗廬也兩情者人生固有端焉兩情謂吉與凶憂與愉言此兩情固自有端緒非出於禮也若夫斷之繼之博之淺之益之損之類之盡之盛之美之使本末終始莫不順比足以為萬世則是禮也人雖自有憂愉之情必須禮以節制進退然後終始合宜類之謂觸類而長比附㑹也毗至反非順敦脩為之君子莫之能知也順從也敦精也脩治也為作也故曰性者本始材朴也偽者文理隆盛也無性則偽之無所加無偽則性不能自美之往性偽合然後聖人之名一天下之功於是就也一謂不分散言性偽合然後成聖人之名也故曰天地合而萬物生陰陽接而變化起性偽合而天下治天能生物不能辨物也地能載人不能治人也宇中萬物生人之屬待聖人然後分也詩曰懷柔百神及河喬嶽此之謂也引此喻聖人能并治之詩周頌時邁之篇䘮禮者以生者飾死者也大象其生以送其死也故如死如生如存如亡終始一也不以死異於生亡異於存始卒沐浴鬠體飯唅象生執也儀禮鬠用組鄭云用組束髮也古文鬠皆為括體為𤓰椾之屬士䘮禮主人左扱米實于右三實一具左中亦如之几實米唯盈鄭云于右尸口之右唯盈取滿而已是飯唅之禮也象生執謂象生時所持之事執或為持不沐則濡櫛三律而止不浴則濡巾三式而止律理髮也今秦俗猶以批髪為栗濡濕也式與拭同士䘮禮尸無有不沐浴者此云蓋末世多不備禮也充耳而設瑱士䘮禮瑱用白纊鄭云瑱充耳纊新綿也飯以生稻唅以槁骨反生術矣生桷禾也槁枯也槁骨具也術法也前説象其生也此已下説反於生之法也説䙝衣襲三稱縉紳而無鈎帶矣縉與搢同扱也紳大帶也搢紳謂扱於帶鈎之所用弛張也今不復解脱故不設鉤也䙝衣親身之衣也士䘮禮飯唅後乃襲三稱明衣不在算設韐帶搢笏禮記曰季康子之母死陳䙝衣鄭𤣥云䙝衣非上服陳之將以歛也設掩面儇目鬠而不冠笄矣士䘮禮掩用練帛廣終幅長五尺儇與還同繞也士䘮禮幎目用緇方尺二寸䞓裏著組繫幎讀如縈縈與還義同鬠而不笄謂但鬠髪而已不加冠及笄也士䘮禮笄用桑又云鬠用組乃笄此云不笄或後世畧也書其名置于其重則名不見而柩獨明矣書其名于旌也士䘮禮為銘各以其物亡則以緇長半幅䞓末長終幅廣三寸書銘于末曰某氏某之柩重以木為之長三尺夏祝取飯之餘為粥盛以二鬲縣于重羃用葦席書其名置于重謂見所書置于重則名已無但知其柩也士䘮禮祝取銘置于重案銘皆有名此云無蓋後世禮變今猶然薦器則冠有鍪而母縱薦器謂陳明器也鍪冠捲如兠鍪也縱韜髪者也士冠禮緇纚廣終幅長六尺謂明器之冠也有如兠鍪加首之形而無韜髮之縱也鍪之言蒙也冒也所以冒首莫侯反或音冒罋廡虛而不實士䘮禮罋三醯醢屑廡二醴酒皆有羃盡䘮禮陳鬼器人器鬼器虛人器實也禮記宋襄公葬其夫人醯醢百罋曽子曰既曰明器而又實之有簟席而無牀第此言棺中不施牀第大歛小歛則皆有也木器不成斵陶器不成物薄器不成内木不成於雕斵不加功也瓦不成於器物不可用也薄器竹葦之器不成内謂有其外形内不可用也内或為用禮記曰竹不成用瓦不成味鄭云成善也竹不可善用謂籩無縢也味當作沬沬靧也笙竽具而不和琴瑟張而不均鄭云無宮商之調也輿藏而馬反告不用也輿謂軼軸也國君謂之輴藏謂埋之也馬謂駕軼軸之馬告示也言也士䘮禮既啓遷于祖用軸禮記君葬用輴四綍二碑大夫葬用輴二綍二碑士葬用國車皆至葬時埋之也具生器以適墓象徙道也生器用器也弓矢盤盂之屬徙遷改也徙道其生時之道器當在家今以適墓以象人行不從常行之道更徙他道也畧而不盡䫉而不功趨輿而藏之金革轡靷而不入明不用也畧而不盡謂簡畧而不盡備也䫉形也言但有形䫉不加功精好也趨輿而藏之謂以輿趨於墓而藏之趨者速也速藏之意也金謂和鸞革車軼也説文云靷所以引軸者也杜元凱云靷在馬胷或曰䫉讀為邈像也今謂畫物為䫉下䫉皆同義象徙道又明不用也以器適墓象具改易生時之器亦所以明不用也是皆所以重哀也有異生時皆所以重孝子之哀也故生器文而不功明器䫉而不用生器生時所用之器士䘮禮曰用器弓矢耒耜兩敦兩杆盤匜之屬明器鬼器塗車芻靈木不成斵竹不成用瓦不成沬之屬禮記曰周人兼用之以言不知死者有知無知故雜用生器與明器也凡禮事生飾歡也送死飾哀也祭祀飾敬也師旅飾威也是百王之所同古今之所一也未有知其所由來者也故壙壠其䫉象室屋也壙墓中壠冢也禮記曰適墓不登壠䫉猶意也言其意以象生時也或音邈棺椁其䫉象版蓋斯象拂也版謂車上障蔽者蓋車蓋也斯未詳象衍字拂即茀也爾雅釋器云輿革前謂之鞎後謂之茀郭云以韋靶車軾及後戸也無帾絲歶縷翣其䫉以象菲帷幬尉也無讀為幠幠覆也所以覆尸者也士䘮禮幠用衾夷衾是也帾與褚同禮記曰素錦褚又曰褚幕丹質鄭云所以覆棺也絲歶未詳蓋亦䘮車之飾也或曰絲讀為綏禮記曰畫翣二皆載綏鄭云以五采羽注於翣首也歶讀為魚謂以銅魚懸於池下禮記曰魚躍拂池縷讀為栁蔞字誤為縷字耳菲謂編章為蔽蓋古人所用障蔽門户者今貧者猶然或曰菲當為厞隱也謂隱奥之處也或曰非讀為扉户扇也幬讀為帳尉讀為罻罻網也帷帳如網也抗折其䫉以象摱茨畨閼也士䘮禮陳明器於乘車之西折横覆之抗木横三縮者五無簀窆事畢加之壙上以承抗席抗禦也所以禦止土者摱扞也茨蓋屋也摱茨猶墍茨也摱莫于反畨讀為藩藩籬也閼為門戸壅閼風塵者抗所以禦上折所以承抗皆不使外物侵内有象於摱茨藩閼也故䘮禮者無他焉明死生之義送以哀敬而終周藏也故葬埋敬葬其形也葬也者藏也所以為葬埋之禮敬藏其形體也祭祀敬事其神也其銘誄繫世敬傳其名也銘謂書其功於器物若孔悝之鼎銘者誄謂誄其行狀以為謚也繫世謂書其傳襲若今之譜諜也皆所以敬傳其名於後世也事生飾始也送死飾終也終始具而孝子之事畢聖人之道備矣刻死而附生謂之墨刻生而附死謂之惑刻損減附増益也墨子之法惑謂惑亂過禮也殺生而送死謂之賊殉葬殺人與賊同也大象其生以送其死使死生終始莫不稱宜而好善是禮義之法式也儒者是矣三年之䘮何也曰稱情而立文鄭康成曰稱人之情輕重而制其禮也因以飾羣别親疎貴賤之節而不可益損也故曰無適不易之術也羣别謂羣而有别也適往也無往不易言所至皆不可易此術或曰適讀為敵創巨者其日久痛甚者其愈遲三年之䘮稱情而立文所以為至痛極也創傷也楚良反日久愈遲互言之也皆言久乃能平故重䘮必待三年乃除亦為至痛之極不可朞月而已齊衰苴杖居廬食粥席薪枕塊所以為至痛飾也禮記斬衰苴杖謂以苴惡死竹為之杖鄭云飾謂章表也三年之䘮二十五月而畢哀痛未盡思慕未忘然而禮以是斷之者豈不以送死有已復生有節也哉斷决也丁亂反鄭云復生謂除䘮反生者之事也凡生乎天地之間者有血氣之屬莫不有知有知之屬莫不愛其類今夫大鳥獸則失亡其羣疋越月踰時則必反鈆過故鄉則必徘徊焉鳴號焉躑躅焉踟蹰焉然後能去之也鈆與㳂同循也禮記作反廵故鄉徘徊旋飛翔之貌躑躅以足擊地也踟蹰不能去之貌小者是燕爵猶有啁噍之頃焉然後能去之也燕爵與鷰雀同故有血氣之屬莫知於人故人之於其親也至死無窮鳥獸猶知愛其羣疋良久乃去况人有生之最知則於親䘮悲哀之情至死不窮已故以三年節之也將由夫愚陋滛邪之人與則彼朝死而夕忘之然而縱之則是曾鳥獸之不若也彼安能相與羣居而無亂乎將由夫脩飾之君子與則三年之䘮二十五月而畢若駟之過隙然而遂之則是無窮也隙壁孔也鄭云喻疾也遂之謂不時除也故先王聖人安為之立中制節一使足以成文理則舍之矣禮記作焉為之立中制節鄭云焉猶然立中制節謂服之年月也舍除也王肅云一皆也然則何以分之分半也半於三年矣曰至親以期斷斷决也鄭云言服之正雖至親皆期而除是何也鄭云問服斷於期之義也曰天地則以易矣四時則以徧矣其在宇中者莫不更始也宇中者謂萬物故先王案以此象之也然則三年何也鄭云法此變易可以期何乃三年為也曰加隆焉案使倍之故載期也鄭云言於父母加厚其恩使倍期也由九月已下何也由從也從大功已下也曰案使不及也鄭云言使其不若父母也故三年以為隆緦麻小功以為殺期九月以為間隆厚也殺減也所介反間則其間也古莧反情在隆殺之間也上取象於天下取象於地中取則於人人所以羣居和一之鄭云取象於天地謂法其變易也自三年以至緦皆嵗時之數言既象天地又足盡人恩聚居粹厚之也故三年之䘮人道之至文者也夫是之謂至隆至文飾人道使成忠孝鄭云言三年之䘮䘮禮之最盛也是百王之所同古今之所一也一謂不變也君之䘮所以取三年何也問君之䘮何取於三年之制君者治辨之主也文理之原也情貌之盡也相率而致隆之不亦可乎治辨謂能治人使有辨别也文理法理條貫也原本也情忠誠也貌恭敬也致至也言人所施忠敬無盡於君者則臣下相率服䘮而至於三年不亦可乎詩云愷悌君子民之父母彼君子者固有為民父母之説焉父能生之不能養之養謂哺乳之也養或謂食母能食之不能教誨之食音嗣君者已能食之矣又善教誨之者也食謂禄廪教誨謂制命也三年畢矣哉君者兼父母之恩以三年報之猶未畢也乳母飲食之者也而三月慈母衣被之者也而九月君曲被之者也三年畢乎哉曲被謂兼飲食衣服得之則治失之則亂文之至也文謂法度也治亂所繫是有法度之至也得之則安失之則危情之至也情謂忠厚使人去危就安是忠厚之至者也兩至者俱積焉以三年事之猶未足也直無由進之耳直但也故社祭社也稷祭稷也社土神以勾龍配之稷百穀之神以棄配之但各止祭一神而已郊者并百王於上天而祭祀之也百王百神也或神字誤為王言社稷唯祭一神至郊天則兼祭百神以喻君兼父母者也三月之殯何也此殯謂葬之也曰大之也重之也所致隆也所致親也將舉錯之遷徙之離宮室而歸丘陵也先王恐其不文也是以繇其期足之日也所至厚至親將徙而歸之陵不可急遽無文飾故繇其期足之日然後葬也繇讀為由從也故天子七月諸侯五月大夫士三月皆使其須足以容事事足以容成成足以容文文足以容備曲容備物之謂道矣須待也謂所待之期也事䘮具也道者委曲容物備物者也祭者志意思慕之情也愅詭唈僾而不能無時至焉愅變也詭異也皆謂變異感動之貌唈僾氣不舒憤鬱之貌爾雅僾唈也郭云嗚唈短氣也言人感動或憤鬱不能無時而至言有待而至也愅音革唈音邑僾音愛故人之歡欣和合之時則夫忠臣孝子亦愅詭而有所至矣歡欣之時忠臣孝子則感動而思君親之不得同樂也彼其所至者甚大動也言所至之情甚大感動也案屈然已則其於志意之情者惆然不嗛其於禮節者闕然不具屈竭也屈然空然也惆然悵然也嗛足也言若無祭祀之禮空然而已則忠臣孝子之情悵然不足禮節又闕然不具也故先王案為之立文尊尊親親之義至矣文謂祭祀節文故曰祭者志意思慕之情也忠信愛敬之至矣禮節文貌之盛矣苟非聖人莫之能知也聖人明知之士君子安行之官人以為守百姓以成俗其在君子以為人道也其在百姓以為鬼事也以為人道則安而行之以為鬼事則畏而奉之也故鐘鼓管磬琴瑟竽笙韶夏護武酌􅁊箾簡象是君子之所以為愅詭其所喜樂之文也因説祭遂廣言喜樂哀痛敦惡之意本皆因於感動而為之文飾也喜樂不可無文飾故制為鐘鼓韶夏之屬箾音朔賈逵曰舞曲名武酌桓皆周頌篇名簡未詳象周武王伐紂之樂也齊衰苴杖居廬食粥席薪枕塊是君子之所以為愅詭其所哀痛之文也感動其所哀痛而不可無文飾故制為齊衰苴杖之屬言本皆因於感動也師旅有制刑法有等莫不稱罪是君子之所以為愅詭其所敦惡之文也師旅所以討有罪制謂人數也有等輕重異也敦厚也厚惡深惡也或曰敦讀為頓頓困躓也本因感動敦惡故制師旅刑法以為文飾卜筮視日齋戒脩塗几筵饋薦告祝如或饗之視日之吉凶史記周文為項燕視日脩塗謂脩自宮至廟之道􅂗也几筵謂祝筵几于室中東靣也饋獻牲體也薦進黍稷也告祝謂尸命祝以嘏于主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受禄于天宜稼于田眉壽萬年勿替引之如或歆饗其祀然也物取而皆祭之如或甞之物取每物皆取也謂祝命授祭尸取葅㨎于醢祭于豆間佐食取黍稷肺授尸尸祭之又取肝㨎于鹽振祭齊之是也如或嘗之謂以尸啐嚌之如神之親嘗然也毋利舉爵當云無舉利爵即上文云利爵之不醮也主人有尊如或觴之謂主人設尊酌以獻尸尸飲之如神飲其觴然也賔出主人拜送反易服即位而哭如或去之此雜説䘮祭也易服易祭服反䘮服也賔出祭事畢即位而哭如神之去然也哀夫敬夫事死如事生事亡如事存狀乎無形影然而成文狀類也言祭祀不見鬼神有類乎無形影者然而足以成人道之節文也
