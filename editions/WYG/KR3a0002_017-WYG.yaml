  hash: sha256:9e27d43472e7138f608c54020a2bb392b10cb3e8651c0bb68eb8c5b0649dfc72
body:
  text: 唐楊倞註性惡篇第二十三當戰國時競為貪亂不修仁義而荀卿明於治道知其可化無勢位以臨之故激憤而著此論書曰惟天生民有欲無主乃亂惟聦明時乂亦與此義同也人之性惡其善者偽也偽為也矯也其本性也凡非天性而人作為之者皆謂之偽故為字人傍為亦㑹意字也今人之性生而有好利焉順是故争奪生而辭讓亡焉天生性也順是謂順其性也生而有疾惡焉順是故殘賊生而忠信亡焉疾與嫉同惡烏路反生而有耳目之欲有好聲色焉順是故淫亂生而禮義文理亡焉文理謂節文條理也然則從人之性順人之情必出於争奪合於犯分亂理而歸於暴故必將有師法之化禮義之道道與導同然後出於辭讓合於文理而歸於治用此觀之然則人之性惡明矣其善者偽也故构木必將待櫽栝烝矯然後直构讀為鈎曲也下同櫽栝正曲木之木也烝謂烝之使柔矯謂矯之使直也鈍金必將待礱厲然後利礱厲皆磨也厲與勵同今人之性惡必將待師法然後正得禮義然後治今人無師法則偏險而不正無禮義則悖亂而不治古者聖王以人之性惡以為偏險而不正悖亂而不治是以為之起禮義制法度以矯飾人之情性而正之以擾化人之情性而道之也使皆出於治合於道者也矯彊抑也擾訓也今之人化師法積文學道禮義者為君子縱性情安恣睢而違禮義者為小人用此觀之然則人之性惡明矣其善者偽也孟子曰人之學者其性善孟子言人之有學適所以成其天性之善非矯也與告子所論是也曰是不然是不及知人之性而不察乎人之性偽之分者也不及知謂智慮淺近不能及於知猶言不到也書曰子冲人不及知之也凡性者天之就也不可學不可事禮義者聖人之所生也人之所學而能所事而成者也聖人之所生明非天性也事為也任也周禮大宰職六曰事典以富邦國以任百官鄭云任事也不可學不可事而在人者謂之性可學而能可事而成之在人者謂之偽是性偽之分也不可學不可事謂不學而能不事而成也今人之性目可以見耳可以聽夫可以見之明不離目可以聽之聦不離耳可見之明常不離於目可聽之聦常不離於耳也目明而耳聦不可學明矣如目明耳聦之不假於學是乃天性也孟子曰今人之性善將皆失䘮其性故也孟子言失䘮本性故惡也曰若是則過矣今人之性生而離朴離其資必失而䘮之朴質也資材也言人若生而任其性則離其質朴而偷薄離其資材而愚惡其失䘮必也用此觀之然則人之性惡明矣所謂性善者不離其朴而美之不離其資而利之也不離質朴資材自得美利不假飾而善此則為天性也使夫資朴之於美心意之於善若夫可以見之明不離目可以聽之聦不離耳使質朴資材自善如聞見之聦明常不離於耳目此乃天性也故曰目明而耳聦也故曰如目明耳聦此乃是其性不然則是矯偽使之也今人之性飢而欲飽寒而欲煖勞而欲休此人之情性也今人飢見長而不敢先食者將有所讓也勞而不敢求息者將有所代也所以代尊長也夫子之讓乎父弟之讓乎兄子之代乎父弟之代乎兄此二行者皆反於性而悖於情也悖違然而孝子之道禮義之文理也故順情性則不辭讓矣辭讓則悖於情性矣用此觀之然則人之性惡明矣其善者偽也問者曰人之性惡則禮義惡生禮義從何而生惡音烏應之曰凡禮義者是生於聖人之偽非故生於人之性也故猶本也言禮義生於聖人矯偽抑制非本生於人性也故陶人埏埴而為噐陶人瓦工也埏擊也埴黏土也擊黏土而成噐埏音羶然則噐生於工人之偽非故生於人之性也言陶噐自是生於工人學而為之非本生於人性自能為之也或曰工人當為陶人故猶本也故工人斵木而成噐然則噐生於工人之偽非故生於人之性也聖人積思慮習偽故以生禮義而起法度然則禮義法度者是生聖人之偽非故生於人之性也自是聖人矯人性而為之如陶人工人然也若夫目好色耳好聲口好味心好利骨體膚理好愉佚是皆生於人之情性者也膚謂皮膚文理也佚與逸同人勞苦則皮膚枯槁也感而自然不待事而後生之者也受性自爾不待學而知也夫感而不能然必且待事而後然者謂之生於偽是性偽之所生其不同之徴也徴驗故聖人化性而起偽言聖人能變化本性而興起矯為也偽起於性而生禮義老子曰智惠出有大偽莊子亦云仁相偽也義相虧也皆言非其本性也禮義生而制法度然則禮義法度者是聖人之所生也故聖人之所以同於衆其不異於衆者性也所以異而過衆者偽也聖人過衆在能起偽夫好利而欲得者此人之情性也假之有弟兄資財而分者且順情性好利而欲得若是則兄弟相拂奪矣拂違戾也或曰拂字從木旁弗擊也方言云自關而西謂之拂今之農噐連枷也且發辭也且化禮義之文理若是則讓乎國人矣故順情性則弟兄争矣化禮義則讓乎國人矣凡人之欲為善者為性惡也為其性惡所以欲為善也夫薄願厚惡願羙狹願廣貧願富賤願貴苟無之中者必求於外故富而不願財貴而不願勢苟有之中者必不及於外既有富貴於中故不及財勢於外也用此觀之人之欲為善者為性惡也無於中故求於外亦猶貧願富之比今人之性固無禮義故彊學而求有之也性不知禮義故思慮而求知之也然則性而已則人無禮義不知禮義性而已謂不矯偽者人無禮義則亂不知禮義則悖然則性而已則悖亂在已用此觀之人之性惡明矣其善者偽也不矯而為之則悖亂在已以此知其性惡也孟子曰人之性善曰是不然凡古今天下之所謂善者正理平治也所謂惡者偏險悖亂也是善惡之分也已言善惡之分在此二者分扶問反今誠以人之性固正理平治邪則有惡用聖王惡用禮義矣哉有讀為又惡音烏雖有聖王禮義將曷加於正理平治也哉今不然人之性惡今以性善為不然者謂人之性惡也故古者聖人以人之性惡以為偏險而不正悖亂而不治故為之立君上之勢以臨之明禮義以化之起法正以治之重刑罰以禁之使天下皆出於治合於善也是聖王之治而禮義之化也今當試去君上之勢無禮義之化去法正之治無刑罰之禁倚而觀天下民人之相與也倚任也或曰倚偏倚猶傍觀也若是則夫彊者害弱而奪之衆者暴寡而譁之衆者陵暴於寡而諠譁之不使得發言也天下之悖亂而相亡不待頃矣頃少頃也本或為須須臾也用此觀之然則人之性惡明矣其善者偽也故善言古者必有節於今善言天者必有徴於人節凖徵驗凡論者貴其有辨合其符驗辨别也周禮小宰聽稱責以傅别郭司農云别之為兩兩家各執其一符以竹為之亦相合之物言論議如别之合如符之驗然後可施行也故坐而言之起而可設張而可施行今孟子曰人之性善無辨合符驗坐而言之起而不可設張而不可施行豈不過甚矣哉故性善則去聖王息禮義矣性善則不假聖王禮義也性惡則興聖王貴禮義矣故櫽栝之生為构木也繩墨之起為不直也立君上明禮義為性惡也用此觀之然則人之性惡明矣其善者偽也直木不待櫽栝而直者其性直也构木必將待櫽栝烝矯然後直者以其性不直也今人之性惡必將待聖王之治禮義之化然後皆出於治合於善也用此觀之然則人之性惡明矣其善者偽也問者曰禮義積偽者是人之性故聖人能生之也言禮義雖是積偽所為亦皆人之天性自有聖人能生之衆人但不能生耳應之曰是不然夫陶人埏埴而生瓦然則瓦埴豈陶人之性也哉豈陶人亦性而能瓦埴哉亦積偽然後成者也工人斵木而生噐然則噐木豈工人之性也哉夫聖人之於禮義也辟亦陶埏而生之也辟讀為譬然則禮義積偽者豈人之本性也哉凡人之性者堯禹之與桀跖也其性一也君子之與小人其性一也言皆惡也今將以禮義積偽為人之性邪然則有曷貴堯禹曷貴君子矣哉所以貴堯禹者以其能化性異於衆也有讀為又凡所貴堯禹君子者能化性能起偽偽起而生禮義然則聖人之於禮義積偽也亦陶埏而生之也聖人化性於禮義猶陶人埏埴而生瓦用此觀之然則禮義積偽者豈人之性也哉既類陶埏而生明非本性也所賤於桀跖小人者從其性順其情安恣睢以出乎貪利争奪故人之性惡明矣其善者偽也桀跖小人是人之本性也天非私曾騫孝已而外衆人也曽参閔子騫孝已殷髙宗之太子皆有至孝之行也然而曾騫孝已獨厚於孝之實而全於孝之名者何也以綦於禮義故也三人能矯其性極為禮義故也天非私齊魯之民而外秦人也然而於父子之義夫婦之别不如齊魯之孝具敬父者何也孝具能具孝道敬父當為敬文傳冩誤耳敬而有文謂夫婦有别也以秦人之從情性安恣睢慢於禮義故也豈其性異矣哉綦禮義則為曾閔慢禮義則為秦人明性同於惡唯在所化耳若以為性善則曾閔不當與衆人殊齊魯不當與秦人異也塗之人可以為禹曷謂也塗道路也舊有此語今引以自難言若性惡何故塗之人皆可以為禹也曰凡禹之所以為禹者以其為仁義法正也然則仁義法正有可知可能之理人皆有之然而塗之人也皆有可以知仁義法正之質皆有可以能仁義法正之具然則其可以為禹明矣今以仁義法正為固無可知可能之理邪然則唯禹不知仁義法正不能仁義法正也唯讀為雖將使塗之人固無可以知仁義法正之質而固無可以能仁義法正之具邪然則塗之人也且内不可以知父子之義外不可以知君臣之正不然以塗之人無可知可能之論為不然也今塗之人者皆内可以知父子之義外可以知君臣之正然則其可以知之質可以能之具其在塗之人明矣今使塗之人者以其可以知之質可以能之具本夫仁義之可知之理可能之具然則其可以為禹明矣今使塗之人伏術為學專心一志思索熟察加日縣久積善而不息則通於神明參於天地矣伏術伏膺於術熟察精熟而察加日累日也縣久縣繫以久長也故聖人者人之所積而致也雖性惡若積習則可為聖人書曰惟狂克念作聖曰聖可積而致然而皆不可積何也曰可以而不可使也可以為而不可使為以其性惡故小人可以為君子而不肯為君子君子可以為小人而不肯為小人小人君子者未嘗不可以相為也然而不相為者可以而不可使也故塗之人可以為禹則然塗之人能為禹未必然也雖不能為禹無害可以為禹足可以徧行天下然而未嘗有能徧行天下者也夫工匠農賈未嘗不可以相為事也事業然則未嘗能相為事也用此觀之然則可以為未必能也雖不能無害可以為然則能不能之與可不可其不同逺矣其不可以相為明矣工賈可以相為而不能相為是可與能不同也可與能既不同則終不可以相為也此明禹亦性惡以能積偽為聖人非禹性本善也聖人異於衆者在化性也堯問於舜曰人情何如舜對曰人情甚不羙又何問焉妻子具而孝衰於親嗜欲得而信衰於友爵禄盈而忠衰於君人之情乎人之情乎甚不美又何問焉唯賢者為不然引此亦以明性之􅁖韓侍即作原性曰性也者與生俱生也情也者接於物而生也性之品有三而其所以為性者五情之品有三而其所以為情者七曰何也曰性之品有上中下三上焉者善而已矣中焉者可道而上下也下焉者惡焉而已矣其所以為性者五曰仁曰禮曰信曰義曰智上焉者之於五也主於一而行於四中焉者之於五一也不少有焉則少及焉則其於四也混下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也情之於性視其品孟子之言性曰人之性善荀子之言性曰人之性惡揚子之言性曰人之性善惡混夫始善而進惡歟始惡而進善歟始也混而今也善惡歟皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為大慼知若敖氏之鬼不食也人之性果善乎后稷之生也其母無灾其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽瞍之舜鯀之禹習非不惡也而卒為聖人之性善惡果混乎故曰三子之言性也舉其中而遺其上下者也得其一而失其二者也曰然則性之上下者其終不可移乎曰上之性就學而愈明下之性畏威而寡罪是故上者可學而下者可制也其品則孔子謂不移也曰今之言性者異於此何也曰今之言者雜老佛而言也雜佛老而言之也者奚言而不異有聖人之知者有士君子之知者有小人之知者有役夫之知者多言則文而類終日議其所以言之千舉萬變其統類一也是聖人之知也文謂言不鄙陋也類謂其統類不乖謬也雖終旦議其所以然其言千舉萬變終始條貫如一是聖人之知也少言則徑而省論而法若佚之以繩是士君子之知也徑易也省謂辭寡論而法謂論議皆有法不放縱也論或為倫佚猶引也佚以繩言其直也聖人經營事廣故曰多言君子止恭其所守故曰少言也其言也諂其行也悖其舉事多侮是小人之知也言諂行悖謂言行相違也齊給便敏而無類雜能旁魄而無用齊疾也給謂應之速如供給者也便謂輕巧敏速也無類首尾乖戾雜能多異術也旁魄廣博也無用不應於用便匹延反魄音薄折速粹熟而不急折謂折辭若堅白之論者也速謂發辭㨗速粹熟所著論甚精熟也不急言不急於用也不恤是非不論曲直以期勝人為意是役夫之知也期於必勝人惠施之論也徒自勞苦争勝而不知禮義故曰役夫之知也有上勇者有中勇者有下勇者天下有中敢直其身中謂中道敢果决也直其身謂中立而不倚無回邪也先王有道敢行其意言不疑也上不循於亂世之君下不俗於亂世之民循順從也俗謂從其俗也仁之所在無貧窮仁之所亡無富貴唯仁亦在為富貴禮記曰不祈多積多文以為富天下知之則欲與天下同苦樂之得權位則與天下之人同休戚苦或為共也天下不知之則傀然獨立天地之間而不畏是上勇也傀偉大貌公回反或曰傀與塊同獨居之貌也禮恭而意儉大齊信焉而輕貨財大重也齊信謂整齊於信也賢者推而尚之不肖者敢援而廢之是中勇也尚上也援牽引也輕身而重貨恬禍而廣觧恬安也謂安於禍難也而廣自觧說言以辭勝人也觧佳買反苟免不恤是非然不然之情以期勝人為意是下勇也繁弱鉅黍古之良弓也繁弱封父之弓左傳曰封父之繁弱鉅與拒同黍當為來史記蘇秦說韓王曰谿子少時力能拒來司馬貞云言弓弩勢勁足以拒於來敵也然而不得排擏則不能自正排擏輔正弓弩之噐擏巨京反桓公之葱太公之闕文王之録莊君之􅘈闔閭之干將莫邪鉅闕辟閭此皆古之良劒也葱闕録􅘈齊桓公齊大公周文王楚莊王之劒名皆未詳所出葱青色也録與緑同三劒以色為名曹植七啓説劒云彫以翠緑亦其類也􅘈劒光采慌惚難視以形為名也闕未詳或曰闕缺也劒至利則喜缺因以為名鉅闕亦是也干將莫邪鉅闕皆呉王闔閭劒名辟閭未詳新序閭丘卭謂齊宣王曰辟閭巨闕天下之良劒也或曰辟閭即湛盧也閭盧聲相近盧黑色也湛盧言湛然如水而黒也又張景陽七發説劒曰舒辟不常李善云辟卷也言神劒柔可卷而懷之舒則可用辟閭或此義歟然而不加砥礪則不能利不得人力則不能斷驊騮騹􅂹纎離緑耳此皆古之良馬也皆周穆王八駿名騹讀為驪謂青驪文如博棊列子作赤􅂹與此不同纎離即列子盗驪者也然而前必有衘轡之制後有鞭䇿之威加之以造父之馭然後一日而致千里也夫人雖有性質羙而心辯知必將求賢師而事之擇賢友而友之得賢師而事之則所聞者堯舜禹湯之道也得良友而友之則所見者忠信敬讓之行也身日進於仁義而不自知也者靡使然也靡謂相順從也或曰靡磨切也今與不善人處則所聞者欺誣詐偽也所見者汙漫淫邪貪利之行也汙穢行也漫誕漫欺誑也莊子北人無擇曰舜以其辱行汙漫我也身且加於刑戮而不自知者靡使然也傳曰不知其子視其友不知其君視其左右靡而已矣靡而已矣君子篇第二十四凡篇名多用初發之語名之此篇皆論人君之事即君子當為天子恐傳寫誤也舊第三十一今升在上天子無妻告人無匹也告言也妻者齊也天子尊無與二故無匹也四海之内無客禮告無適也適讀為敵禮記曰天子無客禮莫敢為主焉君敵其臣升自阼階不敢有其室也足能行待相者然後進口能言待官人然後詔官人掌喉舌之官者不視而見不聽而聦不言而信不慮而知不動而功告至備也盡委於羣下故能至備也天子也者勢至重形至佚心至愈愈讀為愉志無所詘形無所勞尊無上矣詩曰普天之下莫非王土率土之濵莫非王臣此之謂也詩小雅北山之篇率循也濵涯也聖王在上分義行乎下則士大夫無流淫之行百吏官人無怠慢之事衆庶百姓無姦怪之俗無盗賊之罪莫敢犯大上之禁大讀為太太上至尊之號天下曉然皆知夫盗竊之人不可以為富也皆知夫賊害之人不可以為夀也皆知夫犯上之禁不可以為安也由其道則人得其所好焉不由其道則必遇其所惡焉道謂政令是故刑罰綦省而威行如流治世曉然皆知夫為姦則雖隱竄逃亡之由不足以免也故莫不服罪而請自請形戮書曰凡人自得罪此之謂也言人人自得其罪不敢隱也與今康誥義不同或斷章取義歟故刑當罪則威不當罪則侮爵當賢則貴不當賢則賤不當則為下所侮賤古者刑不過罪爵不踰德故殺其父而臣其子殺其兄而臣其弟言當罪而用賢歸于至公也謂若殛鯀與禹殺管叔封康叔之比者刑罰不怒罪爵賞不踰德分然各以其誠通善惡分然其忠誠皆得通逹無屈滯是以為善者勸為不善者沮刑罰綦省而威行如流政令致明而化易如神傳曰一人有慶兆民頼之此之謂也尚書甫刑之辭亂世則不然刑罰怒罪爵賞踰德以族論罪以世舉賢泰誓所謂罪人以族官人以世公羊亦云尹氏卒曷為貶譏世卿也故一人有罪而三族皆夷德雖如舜不免刑均是以族論罪也三族父母妻族也夷滅也均同也謂同被其刑也先祖當賢後子孫必顯行雖如桀紂列從必尊此以世舉賢也當賢謂身當賢人之號也列從謂行列相從也以族論罪以世舉賢雖欲無亂得乎哉詩曰百川沸騰山冡崒崩髙岸為谷深谷為陵哀今之人胡􅉃莫懲此之謂也詩小雅十月之交篇毛云沸出也騰乘也山頂曰冢崒者崔嵬髙岸為谷深谷為陵言易位也鄭云憎曾也懲止也變異如此禍亂方至哀哉今在位之人何曾無以道德止之論法聖王則知所貴矣論議法效聖王以義制事則知所利矣以義制事則利􅀶也論知所貴則知所養矣事知所利則動知所出矣養謂自奉養所出謂所從也二者是非之本得失之源也故成王之於周公也無所徃而不聽知所貴也桓公之於管仲也國事無所徃而不用知所利也呉有伍子胥而不能用國至於亡倍道失賢也故尊聖者王貴賢者覇敬賢者存慢賢者亡古今一也故尚賢使能等貴賤分親踈序長㓜此先王之道也故尚賢使能則主尊下安貴賤有等則令行而不流流邪移也各知其分故無違令親䟽有分則施行而不悖施謂恩惠親䟽有分則恩惠各親其親故不乖悖施式豉反分扶問反長㓜有序則事業㨗成而有所休㨗速也長㓜各任其力故事業速成而亦有所休息之時也故仁者仁此者也仁謂愛恱也此謂尚賢使能等貴賤分親踈序長㓜五者也愛恱此五者則可以為仁義者分此者也分别此五者使合宜則為義也節者死生此者也能為此五者死生則為名節也忠者敦慎此者也慎讀為順人臣能厚順此五者則為忠也兼此而能之備矣兼此仁義忠節而能之則為德備矣備而不矜一自善也謂之聖一皆也徳備而不矜伐於人皆所以自善則謂之聖人夫衆人之心有一善則揚揚如也聖人包容萬物與天地同功何所矜伐為也不矜矣夫故天下不與争能而致善用其功不矜而推衆力故天下不敢争能而極善用於衆功矜則有敵故不尊也有而不有也夫故為天下貴矣有能而不自有詩曰淑人君子其儀不忒其儀不忒正是四國此之謂也詩曹風鳲鳩之篇言善人君子其威儀不忒故能正四方之國以喻正身任物則四國皆化恃才矜能則無所得者也荀子卷十七欽定四庫全書荀子卷
