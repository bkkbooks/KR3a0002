body:
  text: 唐楊倞註議兵篇第十五臨武君與孫卿子議兵於趙孝成王前臨武君盖楚􅀈未知姓名戰國䇿曰天下合從趙使魏加見楚春申君曰君有將乎春申君曰有矣僕欲將臨武君魏加曰臣少之時好射臣願以射譬可乎春申君曰可魏加曰異日者更嬴與王處京臺之下更嬴曰臣能為王引弓虚發而下鳥有間鳴鴈從東方來更嬴以虚發而下之王曰射之精乃至於此乎更嬴曰此孽也王曰先生何以知之對曰其飛徐者其創痛也其鳴悲者久失羣也故羣創未息而驚心未去聞弦音烈而髙飛故云也今臨武君嘗為秦孽不可以為距秦之將趙孝成王晉大夫趙夙之後簡子十世孫或曰劉向叙云孫卿至趙與孫臏議兵趙孝成王前臨武君即孫臏也今案史記年表齊宣王二年孫臏為軍師則敗魏於馬陵至趙孝成王元年已七十餘年年代相逺疑臨武君非此孫臏也王曰請問兵要臨武君對曰上得天時若順太歳及孤虚之類也下得地利若右背山陵前左水澤之比也觀敵之變動後之發先之至此用兵之要術也孫卿子曰不然臣所聞古之道凡用兵攻戰之本在乎一民弓矢不調則羿不能以中微六馬不和則造父不能以致逺士民不親附則湯武不能以必勝也故善附民者是乃善用兵者也故兵要在乎善附民而已臨武君曰不然兵之所貴者勢利也乘勢争利所行者變詐也竒計也善用兵者感忽悠闇莫知其所從出感忽悠闇皆謂倐忽之間也感忽恍忽也悠闇逺視分辨之貎莫知所從出謂若九天之上九地之下使敵人不測魯連子曰弃感忽之恥累世之功也孫吳用之無敵於天下豈必待附民哉孫謂吳王闔閭將孫武吳謂魏武侯將吳起也孫卿子曰不然臣之所道仁人之兵王者之志也帝王之志意如此也君之所貴權謀勢利也所行攻奪變詐者諸侯之事也仁人之兵不可詐也彼可詐者怠慢者也路亶者也路暴露也亶讀為袒露袒謂上下不相覆葢新序作落單君臣上下之間滑然有離徳也滑亂也音骨言彼可欺詐者皆如此之國故以桀詐桀猶巧拙有幸焉以桀詐堯譬之若以卵投石以指撓沸撓攬也以指撓沸言必爛也新序作以指繞沸若赴水火入焉焦沒耳故仁人上下說仁人上下相愛之意百將一心三軍同力臣之於君也下之於上也若子之事父弟之事兄若手臂之扞頭目而覆胷腹也詐而襲之與先驚而後擊之一也先擊頭目使知之而後擊之豈手臂有不救也且仁人之用十里之國則將有百里之聽聽猶耳目也言逺人自為其耳目或曰謂間諜者用百里之國則將有千里之聽用千里之國則將有四海之聽必將聦明警戒和傳而一耳目明而警戒相傳以和無有二心也或以傳為博博衆也而一如一也言和衆如一也故仁人之兵聚則成卒散則成列卒卒伍列行列言動皆有僃也延則若莫耶之長刄嬰之者斷兊則若莫耶之利鋒當之者潰兊猶聚也與隊同謂聚之使短潰壞散也新序作鋭則若莫耶之利鋒也圜居而方正則若盤石然觸之者角摧園居方正謂不動時也則如大石之不可移動也案角鹿埵隴種東籠而退耳其義未詳盖皆摧敗披靡之貌或曰鹿埵下之貎如禾實垂下然埵丁果反隴種遺失貎如隴之種物然或曰即鍾也東籠與涷隴同沾濕貎如衣服之沾濕然新序作隴鍾而退無鹿埵字且夫暴國之君將誰與至哉彼其所與至者必其民也而其民之親我歡若父母其好我芬若椒蘭彼反顧其上則若灼黥如畏灼黥若仇讎人之情雖桀跖豈又肯為其所惡賊其所好者哉是猶使人之子孫自賊其父母也彼必將來告之夫又何可詐也不可得詐襲也故仁人用國日明日益明察諸侯先順者安後順者危慮敵之者削反之者亡謀慮與之為敵者土地必見侵削反謂不服從也詩曰武王載發有䖍秉鉞如火烈烈則莫我敢遏此之謂也詩殷頌武王湯也發讀為斾䖍敬遏止也湯建斾興師本由仁義雖用武持鉞而猶以敬為先故得如火之盛無能止之也孝成王臨武君曰善請問王者之兵設何道何行而可設謂制置道謂論說教令也行動用也孫卿子曰凡在大王將率末事也臣請遂道王者諸侯彊弱存亡之效安危之勢率與帥同所類反道說也效驗也孝成王見荀卿論兵謂王者以兵為急故遂問用兵之術荀卿欲陳王道因不答其問故言凡在大王之所務將帥乃其末事耳所急教化也遂廣說湯武五霸及戰國諸侯之事也君賢者其國治君不能者其國亂隆禮貴義者其國治簡禮賤義者其國亂治者彊亂者弱是彊弱之本也上足卭則下可用也上不足卭則下不可用也卭古仰字不仰不足仰也下託上曰仰宜向反能教且化長養之是足仰下可用則彊下不可用則弱是彊弱之常也隆禮效功上也重禄貴節次也上功賤節下也是彊弱之凡也效驗也功戰功也效功謂不使賞僭也重禄重難其禄不使素餐也節忠義也若能隆禮驗功則彊上戰功輕忠義則弱大凡如此也好士者彊不好士者弱士賢士也愛民者彊不愛民者弱政令信者彊政令不信者弱信謂使下可信民齊者彊不齊者弱齊謂同力賞重者彊賞輕者弱重難其賞使必賞有功則彊輕易其賞則弱也刑威者彊刑侮者弱刑當罪使民可畏則彊不當罪則人侮僈故弱也械用兵革攻完便利者彊攻當為功精好加功者也器械牢固便利於用則彊也械用兵革窳楛不便利者弱窳器疾也音瘐楛濫惡謂不堅固也重用兵者彊輕用兵者弱重難用兵者彊權出一者彊權出二者弱政多門則弱是彊弱之常也齊人隆技擊技技力也齊人以勇力擊斬敵者號為技擊孟康曰兵家之技巧技巧者習手足便器械積機闗以立攻守之勝者其技也得一首者賜贖錙金無本賞矣八兩曰錙本賞謂有功同受賞也其技擊之術斬得一首則官賜錙金贖之斬首雖戰敗亦賞不斬首雖勝亦不賞是無本賞也是事小敵毳則偷可用也可偷竊用之也毳讀為脆史記聶政謂嚴仲子曰屠可以旦夕得甘脆以養親也事大敵堅則渙焉離耳易說卦曰渙者離也若飛鳥然傾側反覆無日若飛鳥言無憑依而易也無日言傾側反覆之速不得一日也是亡國之兵也兵莫弱是矣是其出賃市傭而戰之幾矣此與賃市中傭作之人而使之戰相去幾何也魏氏之武卒以度取之武卒選擇武勇之卒號為武卒度取之謂取其長短材力中度者衣三屬之甲如淳曰上身一髀褌一脛繳一凡三屬也衣於氣反屬之欲反操十二石之弩負服矢五十箇置戈其上置戈於身之上謂荷戈也冠䩜帶劔䩜與胄同漢書作胄帶劒顔師古曰著兜牟而又帶劒也贏三日之糧日中而趨百里贏負擔也日中一日之中也中試則復其户利其田宅復其户不徭役也利其田宅不征衆也顔師古曰利謂給其便利之處中丁仲反復方目反是數年而衰而未可奪也改造則不易周也此中試者筋力數年而衰亦未可􅑈奪其優奪其優復使皆怨也改造更選擇也則又如前是故地雖大其稅必寡是危國之兵也優復既多則稅寡資用貧乏故國危秦人其生民也狹隘其使民也酷烈生民所生之民狹隘謂秦地險固也酷烈嚴刑罰也地險固則㓂不能害嚴刑罰則人皆致死也劫之以勢謂以威勢劫廹之使出戰隱之以阨謂隱蔽以險阨使敵不能害鄭氏曰秦地多阨隱藏其民於阨中也忸之以慶賞忸與狃同串習也戰勝則與之賞慶使習以為常忸女九反鰌之以刑罰鰌藉也不勝則以刑罰陵藉之莊子風謂蛇曰鰌我音秋或作䠓七由反使天下之民所以要利於上者非鬭無由也阨而用之得而後功之守險阨而用之既得勝乃賞其功所以人自為戰而立功者衆也功賞相長也五甲首而𨽻五家有功而賞之使相長獲得五甲首則役𨽻鄉里之五家也是最為衆彊長久多地以正故四世有勝非幸也數也為之有根本不邀一時之利故能衆彊長久也不復其户利其田宅故多地也以正言比齊魏之苟且為正言秦亦非天幸有術數然也四世孝公惠王武王昭王也故齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之銳士秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義有遇之者若以焦熬投石焉以魏遇秦猶以焦熬之物投石也熬五刀反兼是數國者皆干賞蹈利之兵也傭徒鬻賣之道也未有貴上安制綦節之理也干求也言秦魏雖足以相勝皆求賞蹈利之兵與傭徒之人鬻賣其力作無異未有愛貴其上為之致死安於制度自不踰越極於中義心不為非之理者也諸侯有能微妙之以節則作而兼殆之耳微妙精盡也節仁義也作起也殆危也諸侯有能精盡仁義則起而無危也兼此數國謂禽滅之故招近募選隆勢詐尚功利是漸之也近當為延傳寫誤耳招延謂引致之也募選謂以財召之而選擇可者此論齊之技擊也隆勢詐謂以威勢變詐為尚此論秦也尚功利謂有功則利其田宅論魏也漸進也言漸進而近於法未為理也或曰漸浸漬也謂其賞罰纔可漸染於外中心未恱服漸子亷反禮義教化是齊之也服其心是齊一人之術也故以詐遇詐猶有巧拙焉猶齊之技擊不可以當魏之武卒也以詐遇齊辟之猶以錐刀墮太山也辟音譬墮毁也錐許唯反非天下之愚人莫敢試故王者之兵不試一舉而定不必試也湯武之誅桀紂也拱揖指麾而彊暴之國莫不趨使誅其元惡其餘獷悍皆化而來臣役也誅桀紂若誅獨夫故泰誓曰獨夫紂此之謂也故兵大齊則制天下小齊則治隣敵以禮義教化大齊之謂湯武也小齊謂未能大僃若五霸者也治隣敵言隣敵受其治化耳若夫招近募選隆勢詐尚功利之兵則勝不勝無常代翕代張代存代亡相為雌雄耳矣翕斂也代翕代張代存代亡猶言代彊代弱也夫是之謂盗兵君子不由也由用也以詐力相勝是盗賊之兵故齊之田單楚之莊蹻秦之衞鞅燕之繆蟣是皆世俗之所謂善用兵者田單齊襄王臣安平君也史記莊蹻者楚莊王苖裔楚威王使為將將兵循江而上略蜀黔中以西蹻至滇池方三百里地肥饒數千里以兵滅定屬楚欲歸報㑹秦擊奪楚巴黔中郡道塞不通因還以其衆至滇變服從其俗焉衞鞅秦孝公臣封為商君者也繆蟣未聞焉是其巧拙彊弱則未有以相若也若其道一也相若相似也雖術不同皆出於變詐故曰其道一也未及和齊也數子之術未能及於和齊人心也掎契司詐權謀傾覆未免盗兵也契讀為挈持也掎挈猶言掎摭也司讀為伺詐欺誑也皆謂因其危弱即掩襲之也齊桓晉文楚莊吳闔閭越勾踐是皆和齊之兵也可謂入其域矣入禮義教化之域孟康曰入王兵之域也然而未有本統也本統謂前行素修若湯武也故可以霸而不可以王是彊弱之效也湯武王而桓文霸齊魏則代存代亡是其效也孝成王臨武君曰善請問為將孫卿子曰知莫大乎棄疑不用疑謀是智之大行莫大乎無過事莫大乎無悔至無悔而止矣成不可必也不可必不得必謂成功忘其警僃莊子曰聖人以必不必故謂兵衆人以不必必之故多兵故制號政令欲嚴以威慶賞刑罰欲必以信處舍收藏欲周以固處舍營壘也收藏財物也周密牢固則敵不敢凌奪矣徙舉進退欲安以重欲疾以速静則安重而不為輕舉動則疾速而不失機權窺敵觀變欲潛以深欲伍以參謂使間諜觀敵欲潜隱深入之也伍參猶錯雜也使間諜或參之或伍之於敵之間而盡知其事韓子曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以此物伍之以合參也遇敵决戰必道吾所明無道吾所疑道言也行也夫是之謂六術自制號政令已下有六也無欲將而惡廢無急勝而亡敗無威内而輕外無見其利而不顧其害彊使人出戰而輕敵凡慮事欲熟而用財欲泰熟謂精審泰謂不恡賞也夫是之謂五權五者為將之機權也所以不受命於主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至至謂一守而不變凡受命於主而行三軍三軍既定百官得序羣物皆正百官軍之百吏得序各當其任則主不能喜敵不能怒不苟徇上意故主不能喜不為變詐故敵不能怒也夫是之謂至臣為臣之至當也慮必先事而申之以敬謀慮必在事先重之以敬常戒懼而有僃也愼終如始終始如一夫是之謂大吉言必無覆敗之禍也凡百事之成也必在敬之其敗也必在慢之故敬勝怠則吉怠勝敬則滅計勝欲則從欲勝計則凶戰如守不務越逐也書曰不愆于五歩六歩乃止齊焉行如戰有功如幸不務驕矜敬謀無壙無壙言不敢須臾不敬也壙與曠同敬事無壙敬吏無壙敬衆無壙敬敵無壙夫是之謂五無壙愼行此六術五權三至而處之以恭敬無壙夫是之謂天下之將則通於神明矣天下莫及之將臨武君曰善請問王者之軍制孫卿子曰將死鼓死謂不棄之而奔亡也左傳曰師之耳目在吾旗鼓馭死轡百吏死職士大夫死行列聞鼓聲而進聞金聲而退順命為上有功次之軍之所重在順命故有功次之令不進而進猶令不退而退也其罪惟均令教令也言使之不進而進猶令不退而退其罪同也不殺老弱不獵禾稼獵與踐同踐也服者不禽格者不赦犇命者不獲服謂不戰而退者不追禽之格謂相距捍者奔命謂奔走來歸其命者不獲之為囚俘也犇與奔同凡誅非誅其百姓也誅其亂百姓者也百姓有捍其賊則是亦賊也捍其賊謂為賊之捍蔽也以故順刄者生蘇刄者死犇命者貢順刄謂不戰背之而走者蘇讀為傃傃向也謂相向格鬬者貢謂取歸命者獻於上將也微子開封於宋紂之庶兄名啓歸周後封於宋此云開者盖漢景帝諱劉向改之也曹觸龍斷於軍說苑曰桀貴為天子富有四海其臣有左師觸龍者諂諛不正此云紂臣當是說苑誤戰國䇿趙左師觸龍說太后請長安君質秦豈復與古人同官名乎殷之服民所以養生之者也無異周人故近者謌謳而樂之逺者竭蹶而趨之竭蹶顛什猶言匍匐也新序作竭走而趨之無幽間辟陋之國莫不趨使而安樂之四海之内若一家通達之屬莫不從服夫是之謂人師師長詩曰自西自東自南自北無思不服此之謂也詩大雅文王有聲之篇王者有誅而無戰城守不攻兵格不擊徳義未加所以敵人不服故不攻擊也且恐傷我之士卒也上下相喜則慶之敵人上下相愛悦則慶賀之豈尚侵伐乎不屠城屠謂毁其城殺其民若屠者然也不濳軍不留衆不久留暴露於外也師不越時古者行役不踰時也故亂者樂其政不安其上欲其至也東征西怨之比臨武君曰善陳囂問孫卿子曰先生議兵常以仁義為本陳囂荀卿弟子言先生之議常言兵以仁義為本仁者愛人義者循理然則又何以兵為愛人則懼其殺傷循理則不欲争奪焉肯抗兵相加乎凡所爲有兵者為爭奪也非謂愛人循理孫卿子曰非女所知也彼仁者愛人愛人故惡人之害之也義者循理循理故惡人之亂之也彼兵者所以禁暴除害也非争奪也故仁人之兵所存者神所過者化所存止之處畏之如神所過往之國無不從化若時雨之降莫不說喜是以堯伐驩兠伐亦誅也書曰放驩兠于崇山也舜伐有苖命禹伐之書曰帝曰咨禹惟時有苖弗率汝徂征之禹伐共工書曰流共工于幽州皆堯之事此云禹伐共工未詳也湯伐有夏文王伐崇武王伐紂此二帝四王夏殷或稱王或稱帝曲禮曰措之廟立之主曰帝四王謂夏殷也至周自貶損全稱王故以文武為兩王也皆以仁義之兵行於天下也故近者親其善逺方慕其徳兵不血刄逺邇來服徳盛於此施及四極詩曰淑人君子其儀不忒此之謂也曹風鳴鳩之篇李斯問孫卿子曰李斯孫卿弟子後為秦相秦四世有勝兵彊海内威行諸侯非以仁義為之也以便從事而已便其所從之事而已謂若刼之以勢隱之以阨忸之以慶賞鰌之以刑罰之比也孫卿子曰非女所知也女所謂便者不便之便也汝以不便人為便之也吾所謂仁義者大便之便也吾以大便人為便也彼仁義者所以修政者也政修則民親其上樂其君而輕為之死故曰凡在於軍將率末事也荀卿前對趙孝成王有此語弟子所知故引以答之也秦四世有勝諰諰然常恐天下之一合而軋已也漢書諰作鰓蘇林曰讀如愼而無禮則葸之葸鰓懼貎也先禮反張晏曰軋踐轢之也此所謂末世之兵未有本統也本統前行素修故湯之放桀也非其逐之鳴條之時也武王之誅紂也非以甲子之朝而後勝之也皆前行素修也此所謂仁義之兵也前行素修謂前已行之素已修之行讀如字今女不求之於本而索之於末此世之所以亂也本謂仁義末謂變詐世所以亂亦由不求於本而索於末如李斯之說也禮者治辯之極也彊國之本也威行之道也功名之揔也辯别也揔要也彊國謂彊其國也王公由之所以得天下也不由所以隕社稷也故堅甲利兵不足以為勝髙城深池不足以為固嚴令繁刑不足以為威由其道則行不由其道則廢由用也道即禮也用禮即行不用禮雖堅甲嚴刑皆不足恃也楚人鮫革犀兕以為甲鞈如金石鞈堅貎以鮫魚皮及犀兕為甲堅如金石之不可入史記作堅如金石鞈古洽反管子曰制重罪入以兵甲犀脇二㦸輕罪入蘭盾鞈革二㦸犀兕堅如金石之狀也宛鉅鐵釶􅃤如蠭蠆宛地名属南陽徐廣曰大鋼曰鉅釶與鍦同矛也方言云自闗而西謂之矛吳揚之間謂之鍦言宛地出此剛鐵為矛􅃤如蜂蠆言其中人之􅃤毒也鍦音啻輕利僄遫卒如飄風言楚人之􅀈㨗也僄亦輕也匹妙反或當為嫖姚之嫖嫖驍勇也遫與速同然而兵殆於垂沙唐篾死殆謂危亡也垂沙地名未詳所在漢地志沛國有垂鄉豈垂沙乎史記楚懐王二十八年秦與齊韓魏共攻楚殺楚將唐昧取我重丘而去昧與蔑同莊蹻起楚分而為三四司馬貞史記素隱曰莊蹻楚將言其起為亂後楚遂分為四韓子曰楚王欲伐越莊子曰臣患目能見百歩而不見􅊿王之兵敗於齊晉莊蹻為盗境内吏不能禁而欲伐越此智之如目也蹻初為盗後為楚將是豈無堅甲利兵也哉其所以統之者非其道故也汝潁以為險江漢以為池限之以鄧林縁之以方城鄧林北界鄧地之山林縁繞也方城楚北界山名也然而秦師至而鄢郢舉若振槁然舉謂舉而取之鄢郢楚都振擊也槁枯葉也謂白起伐楚一戰舉鄢郢也是豈無固塞隘阻也哉其所以統之者非其道故也紂刳比干囚箕子為炮烙刑列女傳曰炮烙為膏銅柱加之炭上令有罪者行焉輒墜火中紂與妲己大笑烙古責反殺戮無時臣下凛然莫必其命凛然悚慄之貎莫自謂必全其命也然而周師至而令不行乎下不能用其民是豈令不嚴刑不繁也哉其所以統之者非其道故也古之兵戈矛弓矢而已矣然而敵國不待試而詘試用也詘服也城郭不辨辨治也或音辦溝池不拑拑古掘字史記作城郭不集溝池不掘也文子曰無伐樹木無鉗墳墓鉗亦音掘或曰拑當作相篆文相字與拑字相近遂誤耳固塞不樹機變不張固塞謂使邊竟險固若今之邊城也樹立也塞先代反機變謂器械變動攻敵也然而國晏然不畏外而明内者無故焉内當為固史記作晏然不畏外而固也明道而分鈞之時使而誠愛之下之和上也如影嚮和胡卧反有不由令者然後誅之以刑故刑一人而天下服罪人不尤其上知罪之在己也是故刑罰省而威流尤怨也流行也言通流也無他故焉由其道故也古者帝堯之治天下也蓋殺一人刑二人而天下治殺一人謂殛鯀于羽山刑二人謂流共工于幽州放驩兠于崇山傳曰威厲而不試刑措而不用此之謂也厲謂抗舉使人畏之凡人之動也為賞慶為之則見害傷焉止矣故賞慶刑罰勢詐不足以盡人之力致人之死為人主上者也其所以接下之百姓者無禮義忠信焉慮率用賞慶刑罰勢詐除扼其下獲其功用而已矣焉慮無慮猶言大凡也除謂驅逐阨謂廹蹙若秦劫之以勢隱之以扼狃之以慶賞之類阨或為險大宼則至使之持危城則必畔遇敵處戰則必北北敗走也北者乖背之名故以敗走為北也勞苦煩辱則必犇犇與奔同霍焉離耳下反制其上霍焉猶渙焉也離散之後則上下易位若秦項然故賞慶刑罰勢詐之為道者傭徒鬻賣之道也不足以合大衆美國家故古之人羞而不道也故厚徳音以先之明禮義以道之致忠信以愛之賞賢使能以次之爵服慶賞以申之時其事輕其任事作業任力役以調齊之長養之如保赤子政令以定風俗以一有離俗不順其上則百姓莫不敦惡莫不毒孽若祓不祥敦厚也毒害也孽謂妖孽祓除之也然後刑於是起矣是大刑之所加也辱孰大焉將以為利耶則大刑加焉身苟不狂惑戇陋誰睹是而不改也哉然後百姓曉然皆知修上之法像上之志而安樂之於是有能化善修身正行積禮義尊道徳於是像之中更有能自修徳者百姓莫不貴敬莫不親譽然後賞於是起矣是髙爵豐禄之所加也榮孰大焉將以為害耶則髙爵豐禄以持養之持此以飬之生民之屬孰不願也雕雕焉縣貴爵重賞於其前雕雕章明之貎縣明刑大辱於其後雖欲無化能乎哉故民歸之如流水所存者神所為者化存至也言所至之處畏之如神凡所施為民皆從化之也而順暴悍勇力之屬為之化而愿順從也謂好從暴悍勇力之人皆化而愿慤也旁辟曲私之屬為之化而公旁偏頗也辟讀為僻矜紏收繚之屬為之化而調矜謂夸汰紏謂好發摘人過者也收謂掠美者也繚謂繚繞言委曲也四者皆鄙陋之人今被化則調和之也夫是之謂大化至一大化皆化也至一極一也詩曰王猷允塞徐方其來此之謂也凡兼人者有三術有以徳兼人者有以力兼人者有以富兼人者彼貴我名聲美我徳行欲為我民故辟門除塗以迎吾入辟與闢同開也除塗治其道塗也因其民襲其處而百姓皆安因其民之愛悦襲處其處皆安言不驚擾也立法施令莫不順比比親附也施令則民親比是故得地而權彌重兼人而兵俞彊是以徳兼人者也俞讀為愈下同非貴我名聲也非美我徳行也彼畏我威刼我勢為我勢所刼也故民雖有離心不敢有畔慮若是則戎甲俞衆奉養必費奉養戎甲必煩費也是故得地而權彌輕兼人而兵俞弱是以力兼人者也非貴我名聲也非美我徳行也用貧求富用飢求飽虚腹張口來歸我食若是則必發夫掌窌之粟以食之地藏曰窌掌窌主倉廩之官窌匹孝反委之財貨以富之立良有司以接之立温良之有司以慰接之懼其畔去也已朞三年然後民可信也已過也過一朞之後至於三年然後所歸之民可信本非慕化故也是故得地而權彌輕兼人而國俞貧是以富兼人者也故曰以徳兼人者王以力兼人者弱以富兼人者貧古今一也兼并易能也唯堅凝之難焉凝定也堅固定有地為難齊能并宋而不能凝也故魏奪之燕能并齊而不能凝也故田單奪之韓之上地方數百里完全富具而趨趙趙不能凝也故秦奪之上地上黨之地完全言城邑也富具言府庫也趨歸也七朱反史記秦攻上黨韓不能救其守馮亭以上黨降趙趙使馬服子將兵距秦秦使白起大破馬服於長平坑四十餘萬而奪其地殺戮盡也故能并之而不能凝則必奪不能并之又不能凝其有則必亡能凝之則必能并之矣得之則凝兼并無彊得其地則能定之則無有彊而不可兼并者也古者湯以薄武王以滈薄與亳同滈與鎬同皆百里之地天下為一諸侯為臣無他故焉能凝之也故凝士以禮凝民以政禮修而士服政平而民安士服民安夫是之謂大凝以守則固以征則彊令行禁止王者之事畢矣荀子卷十欽定四庫全書荀子卷
