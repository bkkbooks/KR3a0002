front:
  text: 十四
  hash: sha256:29473899eff56892a47924f15290ca4d02a6b5900c4deb190c594181213de9bf
body:
  text: 唐楊倞註樂論篇第二十夫樂者樂也人情之所必不免也故人不能無樂樂則必發於聲音形於動静而人之道聲音動静性術之變盡是矣故人不能不樂樂則不能無形形而不為道則不能無亂先王惡其亂也故制雅頌之聲以道之使其聲足以樂而不流使其文足以辨而不諰使其曲直繁省廉肉節奏足以感動人之善心使夫邪汙之氣無由得接焉是先王立樂之方也而墨子非之奈何故樂在宗廟之中君臣上下同聼之則莫不和敬閨門之内父子兄弟同聽之則莫不和親鄉里族長之中長少同聽之則莫不和順故樂者審一以定和者也比物以飾節者也合奏以成文者也足以率一道足以治萬變是先王立樂之術也而墨子非之奈何故聽其雅頌之聲而志意得廣焉執其干戚習其俯仰屈伸而容貌得莊焉行其綴兆要其節奏而行列得正焉進退得齊焉故樂者出所以征誅也入所以揖讓也征誅揖讓其義一也出所以征誅則莫不聽從入所以揖讓則莫不從服故樂者天下之大齊也中和之紀也人情之所必不免也是先王立樂之術也而墨子非之奈何且樂者先王之所以飾喜也軍旅鈇鉞者先王之所以飾怒也先王喜怒皆得其齊焉是故喜而天下和之怒而暴亂畏之先王之道禮樂正其盛者也而墨子非之故曰墨子之於道也猶瞽之於白黒也猶聾之於清濁也猶之楚而北求之也夫聲樂之入人也深其化人也速故先王謹為之文樂中平則民和而不流樂肅莊則民齊而不亂民和齊則兵勁城固敵國不敢嬰也如是則百姓莫不安其處樂其鄉以至足其上矣然後名聲於是白光輝於是大四海之民莫不願得以為師是王者之始也樂姚冶以險則民流僈鄙賤矣流僈則亂鄙賤則争亂争則兵弱城犯敵國危之如是則百姓不安其處不樂其鄉不足其上矣故禮樂廢而邪音起者危削侮辱之本也故先王貴禮樂而賤邪音其在序官也曰脩憲命審誅賞禁淫聲以時順脩使夷俗邪音不敢亂雅太師之事也墨子曰樂者聖王之所非也而儒者為之過也君子以為不然樂者聖人之所樂也而可以善民心其感人深其移風易俗故先王導之以禮樂而民和睦夫民有好惡之情而無喜怒之應則亂先王惡其亂也故脩其行正其樂而天下順焉故齊衰之服哭泣之聲使人之心悲帯甲嬰胄歌於行伍使人之心傷姚冶之容鄭衛之音使人之心淫紳端章甫舞韶歌武使人之心莊故君子耳不聽淫聲目不視女色口不出惡言此三者君子愼之凡姦聲感人而逆氣應之逆氣成象而亂生焉正聲感人而順氣應之順氣成象而治生焉唱和有應善惡相象故君子愼其所去就也君子以鐘鼔導志以琴瑟樂心動其干戚飾以羽旄從以磬管故其清明象天其廣大象地其俯仰周旋有似於四時故樂行而志清禮脩而行成耳目聰明血氣和平移風易俗天下皆寧莫善於樂故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂故樂者所以導樂也金石絲竹者所以導樂也樂行而民嚮方矣故樂者治人之盛者也而墨子非之且樂也者和之不可變者也禮也者理之不可易者也樂合同禮别異禮樂之統管乎人心矣窮本極變樂之情也著誠去偽禮之經也墨子非之㡬遇刑也明王已沒莫之正也愚者學之危其身也君子明樂乃其德也亂世善惡不此聽也於乎哀哉不得成也弟子免學無所營也聲樂之象鼓大麗鐘統實磬廉制竽笙簫和筦籥發猛塤箎翁博瑟易良琴婦好歌清盡舞意天道兼鼔其樂之君耶故鼔似天鐘似地磬似水竽簫筦籥似星辰日月鞉柷拊􅀢控􅀈似萬物曷以知舞之意曰目不自見耳不自聞也然而治俯仰詘信進退遲速莫不廉制盡筋骨之力以要鐘鼓俯㑹之節而靡有悖逆者衆積䜄䜄乎吾觀於鄉而知王道之易易也主人親速賔及介而衆賔皆從之至于門外主人拜賔及介而衆賔皆入貴賤之義别矣三揖至于階三讓以賔升拜至獻酬辭讓之節繁及介省矣至于衆賔升受坐祭立飲不酢而隆殺之義辨矣工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂偹遂出二人揚觶乃立司正焉知其能和樂而不流也賔酬主人主人酬介介酬衆賔少長以齒終於沃者焉知其能弟長而無遺也降說屨升坐脩爵無數飲酒之節朝不廢朝莫不廢夕賔出主人拜送節文終遂焉知其能安燕而不亂也貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者足以正身安國矣彼國安而天下安故曰吾觀於鄉而知王道之易易也亂世之徴其服組其容婦其俗滛其志利其行雜其聲樂險其文章匿而采其養生無度其送死瘠墨賤禮義而貴勇力貧則為盗富則為賊治世反是也荀子卷十四欽定四庫全書荀子卷十五唐楊倞註解蔽篇第二十一蔽者言不能通明滯於一隅如有物壅蔽之也凡人之患蔽於一曲而闇於大理一曲一端之曲説是時各蔽於異端曲説故作此篇以觧之治則復經兩疑則惑矣言治世用禮義則自復經常之正道兩疑謂不知一於正道而疑蔽者為是一本作兩則疑惑矣天下無二道聖人無兩心今諸侯異政百家異説則必或是或非或理或亂亂國之君亂家之人此其誠心莫不求正而以自為也妬繆於道而人誘其所迨也迨近也近謂所好也言亂君亂人本亦求理以其嫉妬迷繆於道故人因其所好而誘之謂若好險則墨氏誘之好辯則惠氏誘之也私其所積唯恐聞其惡也積習倚其所私以觀異術唯恐聞其羙也倚任也或曰偏倚也猶傍觀也言妬於異術也是以與治雖走而是已不輟也走並馳治謂正道也既私其所習妬繆於道雖與治並馳而自是不輟雖或作離豈不蔽於一曲而失正求也哉心不使焉則白黒在前而目不見雷鼔在側而耳不聞况於使者乎雷鼔大鼓聲如雷者使役也以論不役心於正道則自無聞見矣况乎役心於異術豈復更聞正求哉德道之人有賢德也亂國之君非之上亂家之人非之下豈不哀哉上下共非故可哀也數為蔽數為蔽之端也欲為蔽惡為蔽始為蔽終為蔽逺為蔽近為蔽博為蔽淺為蔽古為蔽今為蔽此其所知所好滯於一隅故皆為蔽凡萬物異則莫不相為蔽此心術之公患也公共也所好異則相為蔽昔人君之蔽者夏桀殷紂是也桀蔽於末喜斯觀而不知關龍逄以惑其心而亂其行末喜桀妃斯觀未聞韓侍郎云斯或當為斟斟觀夏同姓國喜其君當時為桀佞臣也國語史蘇曰昔夏桀伐有施有施人以末喜女焉賈侍中云有施喜姓國也紂蔽於妲己飛廉而不知微子啓以惑其心而亂其行妲己紂妃飛廉紂之佞臣惡來之父善走者秦之祖也微子紂之庶兄微國子爵啓其名也國語曰殷紂伐有蘇有蘇以妲己女焉賈侍中云有蘇紀姓之國也故羣臣去忠而事私百姓怨非而不用事任也不用不為上用也非或為誹賢良退處而隱逃此其所以䘮九牧之地而虛宗廟之國也九牧九州之牧虛讀為墟桀死於亭山亭山南巢之山或本作鬲山案漢書地理志廬江有􅈞縣當是誤以􅈞為鬲傳冩又誤為亭􅈞音潜紂縣於赤斾史記武王斬紂頭縣於太白旗此云赤斾所傳聞異也身不先知又莫之諌此蔽塞之禍也成湯鑒於夏桀故主其心而愼治之主其心言不為邪佞所惑是以能長用伊尹而身不失道此其所以代夏王而受九有也文王鑒於殷紂故主其心而慎治之是以能長用呂望而身不失道此其所以代殷王而受九牧也九有九牧皆九州也撫有其地則謂之九有養其民則謂之九牧逺方莫不致其珍故目視備色耳聽備聲口食備味形居備宫名受備號生則天下歌死則四海哭夫是之謂至盛詩曰鳳凰秋秋其翼若干其聲若簫有鳳有凰樂帝之心此不蔽之福也逸詩也爾雅鶠鳳其雌凰秋秋猶蹌蹌蹌蹌謂舞也干楯也此帝盖謂堯也堯時鳳凰巢於阿閣言堯能用賢不蔽天下和平故有鳳凰來儀之福也昔人臣之蔽者唐鞅奚齊是也唐鞅宋康王之臣吕氏春秋曰宋康王染於唐鞅田不禋奚齊晋獻公驪姬之子論衡云宋王問唐鞅曰吾殺戮甚衆而羣臣愈不畏何也對曰王罰不善者善者胡為畏王少欲羣臣之畏也不若無辨其善與不善一時罪之則羣臣畏矣宋王從之唐鞅蔽於欲權而逐載子載讀為戴戴不勝使薛居州傅王者見孟子或曰戴子戴驩也韓子曰戴驩為宋太宰夜使人曰吾聞有數夜乘輜車之李使門者謹為我司之使者報曰不見輜車見有奉笥而與李史史受笥又戴驩謂齊王曰王大仁於薛公大不忍人據其時代當是戴驩也盖為唐鞅所逐奔齊也奚齊蔽於欲國而罪申生申生晋獻公之太子奚齊之兄為驪姬所譛獻公殺之春秋穀梁傳曰晉里克弑其君之子奚齊其君之子云者國人不子也不正其殺太子申生而立之也唐鞅戮於宋奚齊戮於晉逐賢相而罪孝兄身為刑戮然而不知此蔽塞之禍也故以貪鄙背叛争權而不危辱滅亡者自古及今未嘗有之也鮑叔寗戚隰朋仁智且不蔽故能持管仲而名利福禄與管仲齊持扶翼也召公吕望仁智且不蔽故能持周公而名利福禄與周公齊傳曰知賢之謂明輔賢之謂彊勉之彊之其福必長此之謂也此不蔽之福也勉之彊之言必勉彊於知賢輔賢然後其福長也彊直亮反昔賔孟之蔽者亂家是也賔孟周景王之佞臣立王子朝者亂家謂亂周之家事使庶孽争位也墨子蔽於用而不知文欲使上下勤力股無肢脛無毛而不知貴賤等級之文飾也宋子蔽於欲而不知得宋子以人之情欲寡而不欲多但任其所欲則自治也蔽於此説而不知得欲之道也慎子蔽於法而不知賢慎子本黄老歸刑名多明不尚賢不使能之道故其説曰多賢不可以多君無賢不可以無君其意但明得其法雖無賢亦可為治而不知法待賢而後舉也申子蔽於勢而不知知申子名不害河南京縣人韓昭侯相也其説但賢得權勢以刑法馭下而不知權勢待才智然後治亦與慎子意同下知音智惠子蔽於辭而不知實惠子蔽於虛辭而不知實理虚辭謂
