front:
  text: 齊之管仲晉之咎犯咎與舅同晉文公之舅狐偃咎犯其字也楚之孫叔敖可謂功臣矣殷之伊尹周之太公可謂聖臣矣是人臣之論也凶吉賢不肖之極也國之吉凶人君賢不肖極於論臣也必謹志之而愼自為擇取焉足以稽矣志記也言謹記此四臣之安危而慎自擇取則足以稽考用臣也從命而利君謂之順從命而不利君謂之諂逆命而利君謂之忠逆命而不利君謂之篡不恤君之榮辱不恤國之臧否偷合苟容以持禄養交而已耳謂之國賊養交謂養其與君交接之不忤犯使怒也或曰養其外交若蘇秦張儀孟嘗君所至為相也君有過謀過事將危國家殞社稷之具也大臣父子兄弟有能進言於君用則可不用則去謂之諫有能進言於君用則可不用則死謂之爭有能比知同力比合也知讀為智率羣臣百吏而相與彊君撟君彊其亮切撟與矯同屈也君雖不安不能不聽遂以解國之大患除國之大害成於尊君安國謂之輔事見平原君傳有能抗君之命竊君之重反君之事以安國之危除君之辱功伐足以成國之大利謂之拂抗拒也戰功曰伐左傳郄至驟稱其伐拂讀為弼弼所以輔正弓弩者也或讀為佛違君之意也謂若信陵君違魏王之命竊其兵符殺晉鄙反軍不救趙之事遂破秦而存趙夫輔車相依今趙存則魏安故曰安國之危除君之辱也故諫争輔拂之人社稷之臣也國君之寶也明君之所尊厚也而闇主惑之以為已賊也故明君之所賞闇君之所罰也闇君之所賞明君之所殺也伊尹箕子可謂諫矣伊尹諫太甲箕子諫紂比干子胥可謂争矣平原君之於趙也可謂輔矣信陵君之於魏也可謂拂矣傳曰從道不從君此之謂也故正義之臣設則朝廷不頗設謂置於列位頗邪也諫争輔拂之人信則君過不逺信謂見信於君或曰信讀為伸謂道行也爪牙之士施則仇讎不作爪牙之士勇力之臣也施謂展其材也邊境之臣處則疆垂不喪垂與陲同故明主好同而闇主好獨獨謂自任其智明主尚賢使能而饗其盛盛謂大業言饗其臣之功業也闇主妬賢畏能而滅其功滅掩沒也罰其忠賞其賊夫是之謂至闇桀紂所以滅也事聖君者有聽從無諫争聖君無失事中君者有諫争無諂諛中君可上可下若齊桓公者也諂諛則遂成闇君也事暴君者有補削無撟拂補謂彌縫其闕削謂除去其惡言不敢顯諫闇匡敎之也撟謂屈其性也拂違也撟拂則身見害使君有殺賢之名故不為也拂音佛廹脅於亂時窮居於暴國而無所避之則崇其美揚其善違其惡隠其敗言其所長不稱其所短以爲成俗謂危行言遜以避害也以為成俗言如此而不變若舊俗然也詩曰國有大命不可以告人妨其躬身此之謂也逸詩恭敬而遜聽從而敏不敢有以私决擇也敏謂氶命而速行不敢更私自决斷選擇也不敢有以私取與也以順上為志是事聖君之義也但禀命而已忠信而不諛諫争而不諂撟然剛折端志而無傾側之心撟彊貎禮記曰和而不流彊哉矯剛折剛直靣折也端志不邪曲也是案曰是非案曰非是事中君之義也調而不流柔而不屈寛容而不亂雖調和而不至流湎雖柔從而不屈曲雖寛容而不與為亂也曉然以至道而無不調和也曉然明喻之貎至道無為不争之道以至道則暴君不能加怒無不調和言皆不違拂也而能化易時關内之是事暴君之義也關當為開傳寫誤也内與納同言既以冲和事之則能化易其暴戻之性時以善道開納之也或曰以道關通於君之心中也若馭撲馬撲馬未調習之馬不可遽牽制必縱緩之事暴君之難故重明之也若養赤子赤子嬰兒也未有所知必在順適其性不驚懼也若食餧人使饑渴於至道如餧人之欲食或曰餧人併與之食則必死今以善道節量與之不使狂惑也莊子曰人惑則死故因其懼也而改其過懼則思徳故因使其改過因其憂也而辨其故辨其至憂之端則遷善也因其喜也而入其道忻喜之時多所聽納故因以道入之因其怒也而除其怨怨惡之人因君怒除去之也曲得所謂焉雖憂懼喜怒之殊委曲皆得所謂所謂即化易君性也書曰從命而不拂微諫而不倦為上則明為下則遜此之謂也書伊訓也事人而不順者不疾者也不順上意也疾速也不疾言怠慢也疾而不順者不敬者也敬而不順者不忠者也忠而不順者無功者也有功而不順者無徳者也故無徳之為道也傷疾墮功滅苦故君子不為也傷疾墮功滅苦未詳或恐錯誤耳為或為違也有大忠者有次忠者有下忠者有國賊者以徳復君而化之大忠也復報也以德行之事報白於君使自化於善周禮宰夫掌諸臣之復萬民之逆也以徳調君而補之次忠也謂匡救其惡也以是諫非而怒之下忠也使君有害賢之名故為下忠不恤君之榮辱不恤國之臧否偷合苟容以之持禄養交而已耳國賊也若周公之於成王也可謂大忠矣若管仲之於桓公可謂次忠矣若子胥之於夫差可謂下忠矣若曹觸龍之於紂者可謂國賊矣說苑曰桀貴為天子富有天下其左師觸龍者諂諛不正此云紂未知孰是仁者必敬人凡人非賢則案不肖也人賢而不能則是禽獸也禽獸不知敬賢人不肖而不敬則是狎虎也狎輕侮也言必見害禽獸則亂狎虎則危災及其身詩曰不敢暴虎不敢馮河人知其一莫知其佗戰戰兢兢如臨深淵如履薄氷此之謂也詩小雅小旻之篇暴虎徒搏馮河徒渉人知其一莫知其佗言人皆知暴虎馮河立至於害而不知小人為害有甚於此也故仁者必敬人敬人有道賢者則貴而敬之不肖者則畏而敬之賢者則親而敬之不肖者則疎而敬之其敬一也其情二也若夫忠信端慤而不害傷則無接而不然是仁人之質也其敬雖異至於忠信端慤不傷害則凡所接物皆然言嘉善而矜不能不以人之不肖逆詐待之而欲傷害之也質體也忠信以為質端慤以為統統綱紀也言已端慤自處而待物也禮義以為文用為文飾倫類以為理倫人倫類物之種類言推近以知逺以此為條理也喘而言臑而動而一可以為法則臑與勸學篇蠕同喘微言也臑微動也一皆也言一動一息之間皆可以為法則也臑人元反詩曰不僣不賊鮮不為則此之謂也詩大雅抑之篇言不僣差賊害則少不為人法則矣恭敬禮也調和樂也調和不争競也謹慎利也鬬怒害也故君子安禮樂利謹慎而無鬬怒是以百舉不過也小人反是通忠之順忠有所壅塞故通之然而終歸之於順也權險之平權困危險之事使至於平也或曰權變也既不可扶持則變其危險使治平也禍亂之從聲君雖禍亂應聲而從之也三者非明主莫之能知也闇君不知所以殺害忠賢而身死國亡也争然後善戾然後功出死無私致忠而公夫是之謂通忠之順信陵君似之矣諫争君然後能善違戻君然後立功出身死戰不為私事而歸於至忠至公信陵君諫魏王請救趙不從遂矯君命破秦而魏國以安故似之奪然後義殺然後仁上下易位然後貞奪者不義之名殺者不仁之稱上下易位則非貞也而湯武惡桀紂之亂天下而奪之是義也不忍蒼生之塗炭而殺之是仁也雖上下易位而使賢愚各當分歸於正道是貞也功參天地澤被生民夫是之謂權險之平湯武是也過而同情和而無經經常也但和順上意而無常守不恤是非不論曲直偷合苟容迷亂狂生迷亂其君使生狂也夫是之謂禍亂之從聲飛亷惡來是也傳曰斬而齊枉而順不同而壹此言反經合道如信陵湯武者也所以斬之取其齊也以枉曲之取其順也所以不同取其一也初雖似乖戾然終歸於理者也詩曰受小球大球為下國綴旒此之謂也詩商頌長發之篇球玉也鄭𤣥云綴猶結也旒旌旗之垂者言湯既為天所命則受小玉謂尺二寸圭受大玉謂珽也長三尺執圭搢珽以與諸侯㑹同結定其心如旌旗之旒掺著焉引此以明湯武取天下權險之平為勑下國者也致仕篇第十四明致賢士之義衡聽顯幽重明退姦進良之術衡平也謂不偏聽也顯幽謂使幽人明顯不擁蔽也重明謂既明又使明也書曰德明惟明能顯幽則重明矣能退姦則良進矣朋黨比周之譽君子不聽殘賊加累之譛君子不用殘賊謂賊害人加累以罪惡加累誣人也隠忌雍蔽之人君子不近隠亦蔽也忌謂妬賢雍讀曰擁貨財禽犢之請君子不許行賂請謁者也凡流言流說流事流謀流譽流愬不官而衡至者君子慎之流者無根源之謂愬譛也不官謂無主首也衡讀為横横至横逆而至也聞聽而明譽之君子聞聽流言流說則明白稱譽謂顯露其事不為隱蔽如此則姦人不敢獻其謀也定其當而當然後士其刑賞而還與之士當為事行也言定其當否既當之後乃行其刑賞返與之也謂其言當於善則事之以賞當於惡則事之以刑當丁浪反如是則姦言姦說姦事姦謀姦譽姦愬莫之試也忠言忠說忠事忠謀忠譽忠愬莫不明通方起以尚盡矣明通謂明白通達其意方起並起尚與上同上盡謂盡忠於上也夫是之謂衡聽顯幽重明退姦進良之術川淵深而魚鼈歸之山林茂而禽獸歸之刑政平而百姓歸之禮義僃而君子歸之故禮及身而行修義及國而政明能以禮挾而貴名白天下願令行禁止王者之事畢矣挾讀為浹能以禮浹洽者則貴明白天下皆願從之詩曰惠此中國以綏四方此之謂也詩大雅民勞之篇中國京師也四方諸夏也引此以明自近及逺也川淵者魚龍之居也山林者鳥獸之居也國家者士民之居也川淵枯則魚龍去之山林險則鳥獸去之國家失政則士民去之無土則人不安居無人則土不守無道法則人不至無君子則道不舉故土之與人也道之與法也者國家之本作也本作猶本務也君子也者道法之揔要也不可少頃曠也得之則治失之則亂得之則安失之則危得之則存失之則亡故有良法而亂者有之矣有君子而亂者自古及今未嘗聞也傳曰治生乎君子亂生乎小人此之謂也得衆動天得衆則可以動天言人之所欲天必從之羙意延年美意樂意也無憂患則延年也誠信如神誠信則如神明言物不能欺也夸誕逐魂逐魂逐去其精魂猶喪精也務夸妄誕作偽心勞故喪其精魂此四者皆言善惡之應也人主之患不在乎不言用賢而在乎誠必用賢夫言用賢者口也却賢者行也無善行則賢不至也口行相返而欲賢者之至不肖者之退也不亦難乎夫耀蟬者務在明其火振其樹而已火不明雖振其樹無益也南方人照蟬取而食之禮記有蜩范是也今人主有能明其徳則天下歸之若蟬之歸明火也臨事接民而以義變應寛裕而多容恭敬以先之政之始也多容廣納也然後中和察斷以輔之政之隆也政之崇髙在輔以中和察斷斷丁亂反然後進退誅賞之政之終也故一年與之始三年與之終夫不教而殺謂之虐故為政之始寛裕多容三年政成然後進退誅賞也用其終為始則政令不行而上下怨疾亂所以自作也先賞罰後徳化則亂書曰義刑義殺勿庸以即汝惟曰未有順事言先敎也書康誥曰雖義刑義殺亦勿庸即行之當先敎後刑也雖先後不失尚謙曰我未有順事故使民犯法躬自厚而薄貴於人也程者物之凖也程者度董之揔名也禮者節之凖也節謂君臣之差等也程以立數禮以定倫言有程則可以立一二之數有禮則可以定君臣父子之倫也徳以叙位能以授官度其徳以叙上下之位考其能以授所任之官若䕫典樂伯夷典禮之比也凡節奏欲陵而生民欲寛節奏謂禮節奏陵峻也侵陵亦嚴峻之義生民謂以徳敎生養民也言人君自守禮之節奏則欲嚴峻不弛慢養民則欲寛容不廹切之也節奏陵而文生民寛而安節奏雖峻亦有文飾不至於刻急上文下安功名之極也不可以加矣君者國之隆也父者家之隆也隆猶尊也隆一而治二而亂自古及今未有二隆争重而能長久者師術有四而博習不與焉術法也言有四徳則可以為人師法不在博習也與音預尊嚴而憚可以為師耆艾而信可以為師五十曰艾六十曰耆誦說而不陵不犯可以為師誦謂誦經說謂解說謂守其誦說不自陵突觸犯言行其所學知微而論可以為師知精微之理而能講論論盧困反故師術有四而博習不與焉水深則回回流旋也水深不湍峻則多旋流也樹落糞本謂木葉落糞其根也弟子通利則思師思其厚於已也詩曰無言不讎無徳不報此之謂也此言為善則物必報之也賞不欲僣刑不欲濫賞僣則利及小人刑濫則害及君子若不幸而過寧僣無濫與其害善不若利淫此言為善則物必報之也
