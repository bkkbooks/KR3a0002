body:
  text: 序昔周公稽古三五之道損益夏殷之典制禮作樂以仁義理天下其德化刑政存乎詩至于幽厲失道始變風變雅作矣平王東遷諸侯力政逮五霸之後則王道不絶如綫故仲尼定禮樂作春秋然後三代遺風弛而復張而無時無位功烈不得被于天下但門人傳述而已陵夷至于戰國於是申商苛虐孫吳變詐以族論罪殺人盈城談說者又以愼墨蘇張為宗則孔氏之道幾乎息矣有志之士所為痛心疾首也故孟軻闡其前荀卿振其後觀其立言指事根極理要敷陳往古掎音几挈當世撥亂興理易於反掌眞名世之士王者之師又其書亦所以羽翼六經增光孔氏非徒諸子之言也蓋周公制作之仲尼祖述之荀孟贊成之所以膠固王道至深至備雖春秋之四夷交侵戰國之三綱弛絶斯道竟不墜矣倞以末宦之暇頗窺篇籍竊感炎黃之風未洽於聖代謂荀孟有功於時政尤所取慕而孟子有趙氏章句漢氏亦嘗立博士傳誓不絶故今之君子多好其書獨荀子未有註解亦復編簡爛脫傳寫謬誤雖好事者時亦覽之至於文義不通屢掩卷焉夫理曉則愜心文舛則忤意未知者謂異端不覽覽者以說誤不終所以荀氏之書千載而未光焉輙用申抒鄙思敷尋義理其所徴據則博求諸書但以古今字殊齊楚言異事資叅考不得不廣或取偏傍相近聲類相通或字少增加文重刋削或求之古字或徴諸方言加以孤陋寡儔愚昩多蔽穿鑿之責於何可逃曾未足粗明先賢之㫖適增其蕪穢耳蓋以自備省覽非敢傳之將來以文字煩多故分舊十二卷三十二篇爲二十卷又改孫卿新書為荀卿子其篇第亦頗有移易使以類相從云時歳在戊戌大唐睿聖文武皇帝元和十三年十二月也欽定四庫全書
