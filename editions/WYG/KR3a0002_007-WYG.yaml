  hash: sha256:1b0542878c67f6cdf30e23c175cdcfc8c341b835e66bbf1596a823812397b2a3
body:
  text: 唐楊倞註王霸篇第十一國者天下之制利用也天下用之利者無過於國制衍字耳人主者天下之利勢也勢之最利者也得道以持之則大安也大榮也積美之源也不得道以持之則大危也大累也有之不如無之有國不如無國有也及其綦也索為匹夫不可得也綦謂窮極之時齊湣宋獻是也湣與閔同齊湣王為淖齒所殺宋獻宋君謚也為齊湣王所滅吕氏春秋云宋康王此云獻國滅之後其臣子各私為謚故與此不同也故人主天下之利勢也然而不能自安也安之者必將道也必將以道守之故用國者義立而王信立而霸權謀立而亡三者明主之所謹擇也所宜謹愼擇之仁人之所務白也白明白也挈國以呼禮義而無以害之挈提舉也言挈提一國之人皆使呼召禮義言所務皆禮義也無以害之謂不以他事害禮義也行一不義殺一無罪而得天下仁者不為也櫟然扶持心國且若是其固也櫟然落石貎其所持心持國不行不義不殺無罪落然如石之固也之所與為之者之人則舉義士也舉皆也所與為政之人則皆用義士謂若伊吕之比者也之所以為布陳於國家刑法者則舉義法也謂若周穆王訓夏贖刑之類也主之所極然帥羣臣而首嚮之者則舉義志也志意也主所極信率羣臣歸嚮之者則皆義之志意謂不懐不義之意也或曰志記也舊典之有義者謂若六經也如是則下仰上以義矣是綦定也綦當為基基本也言以義為本仰魚亮反綦定而國定國定而天下定仲尼無置錐之地誠義乎志意加義乎身行仲尼誠能義乎志意又加之以義行言志意及立身立行皆以義行下孟反著之言語以義著言語謂所論說皆明義也濟之日不隠乎天下名垂乎後世以義得濟之日成功之後也言仲尼行義既成之後不行乎天下謂極昭明天下莫能隠匿之今亦以天下之顯諸侯誠義乎志意加義乎法則度量著之以政事案申重之以貴賤殺生使襲然終始猶一也申亦重也既為政皆以義又申重以賞罰使相掩襲無間隙終始如一也如是則夫名聲之部發於天地之間也豈不如日月雷霆然矣哉部當為剖謂開發也仲尼匹夫但著空言猶得不隠乎天下今若以顯諸侯行義必如日月雷霆故曰以國齊義一日而白湯武是也齊當為濟以一國皆取濟於義一朝而名聲明白湯武是也湯以亳武以鄗皆百里之地亳湯國都鄗與鎬同武王所都京也詩曰考卜維王宅是鎬京維龜正之武王成之天下為一諸侯為臣通達之屬莫不從服無它故焉以濟義矣是所謂義立而王也非有他故但取濟於義也徳雖未至也義雖未濟也霸者亦有徳義但未能至極盡濟也然而天下之理略奏矣天下之理謂條理者略有節奏也刑賞己諾信乎天下矣諾許也已不許也禮記曰與其有諾責寜有己怨信乎天下謂若齊桓不背柯盟之比也臣下曉然皆知其可要也要約也皆知其可與要約不欺也要一堯反政令己陳雖覩利敗不欺其民謂若伐原命三日之糧不降而退之比也約結已定雖覩利敗不欺其與與相親與之國謂若齊桓許赦魯衞不遂滅之為己利之比也如是則兵勁城固敵國畏之國一綦明與國信之綦亦當為基也雖在僻陋之國威動天下五伯是也伯讀為霸又如字諸侯之長為伯春秋左傳䇿命晉侯為伯也非本政教也雖有政教未盡修其本也非致隆髙也致極也不如堯舜禹湯之極崇髙也非綦文理也言其駁雜未極條貫非服人之心也未得天下歸心如文王此皆言未能循於王道以略信之故猶能致霸也鄉方略所向唯在方略不在用仁義也審勞佚審以佚待勞之術也謹畜積謹嚴畜積不妄耗費修戰僃齺然上下相信而天下莫之敢當齺齒相逆也齺然上下相向之貎齺土角反故齊桓晉文楚莊吳闔閭越勾踐是皆僻陋之國也威動天下彊殆中國其彊能危中國無他故焉略信也是所謂信立而霸也雖未能濟義畧取信而行之故能致霸也挈國以呼功利此論權謀者也提挈一國之人以呼召功利言所務唯功利也功役使利貪求之也不務張其義齊其信唯利之求張開内則不憚詐其民而求小利焉謂若梁伯好土功詐其民言宼將至之比也外則不憚詐其與而求大利焉謂若楚靈王以義討陳蔡因遂滅之之比也内不修正其所以有然常欲人之有有土地貨財也如是則臣下百姓莫不以詐心待其上矣上詐其下下詐其上則是上下析也離析如是則敵國輕之不得人心故輕之也與國疑之權謀日行而國不免危削綦之而亡其極者則滅亡齊閔薛公是也薛公孟嘗君田文齊閔王之相也齊閔王為五國所伐皆薛公使然故同言之也故用彊齊非以修禮義也非以本政教也非以一天下也綿綿常以結引馳外為務綿綿不絶貎引讀為靷靷引軸之物結引續緜於軸所以引車也齊閔薛公不修徳政但使說客引軸馳騖於他國以權詐為務也故彊南足以破楚史記齊閔王二十三年與秦敗楚重丘南割楚之淮北也西足以詘秦北足以敗燕史記閔王三十六年與韓魏攻秦至凾谷軍焉中足以舉宋閔王三十八年伐宋宋王死於温舉謂舉其國而滅之也及以燕趙起而攻之若振槁然閔王四十年燕秦楚三晉敗我於齊西振擊也槁枯葉也言當權謀强盛之時雖破敵滅國及樂毅以諸國攻之若擊枯葉之易也而身死國亡為天下大戮為天下大戮辱也春秋傳曰古者明王伐不敬取其鯨鯢而封之以為大戮也後世言惡則必稽焉後世稽考閔王為龜鏡也是無他故焉唯其不由禮義而由權謀也三者明王之所謹擇也仁人之所務白也善擇者制人不善擇者人制之善擇者用霸王不善擇者用權謀也國者天下之大器也重任也不可不善為擇所而後錯之錯險則危所處也錯讀為措不可不善為擇道然後道之塗薉則塞不可不善為擇道路而道達之薉與穢同塞謂行不通也危塞則亡所以為之善擇彼國錯者非封焉之謂也非受之茆土然後為安或曰修封疆立城郭之謂也何法之道誰子之與也設問之詞既非封焉之謂問以何法道達之求誰人付與之誰子猶誰人也愼子曰棄道術舍度量以求一人之識識天下誰子之識能足焉故道王者之法與王者之人為之則亦王道霸者之法與霸者之人為之則亦霸道亡國之法與亡國之人為之則亦亡荅辭也道皆與導同三者明主之所謹擇也而仁人之所務白也荀子多重叙前語者叮嚀之也故國者重任也不以積持之則不立不以積久之法持之則傾覆也故國者世所以新者也是憚憚非變也憚與坦同言國者但繼世之主自新耳此積久之法坦坦然無變也巢子曰有陰而逺者有坦明而功者杜伯射宣王於畝田是坦明功者據古憚與坦通改王改行也自是改一王則改其所行之事非法變也或曰國語襄王謂晉文公曰先民有言曰改玉改行玉佩玉行歩也故一朝之日也一日之人也然而厭焉有千歲之固何也設問之辭一朝之日謂今日之事明朝不同言易變也一日之人謂今日之生未保明日言壽促也厭讀為黶禮記曰見君子而後厭然揜其不善鄭注云閉藏貎言事之易變人之夀促如此此何故有黶然深藏千歲不變改之法乎曰援夫千歲之信法以持之也安與夫千歲之信士為之也謂使百世不易可信之士為政人無百歲之壽而有千歲之信士何也又問之曰以夫千歲之法自持者是乃千歲之信士矣以禮義自持者則是千歲之士不以夀千歲也能自持則能持國故與積禮義之君子為之則王與端誠信全之士為之則霸與權謀傾覆之人為之則亡三者明王之所謹擇也仁人之所務白也善擇之者制人不善擇之者人制之彼持國者必不可以獨也君不可獨治也然則彊國榮辱在於取相矣身能相能如是者王謂若湯伊尹文王太公也身不能知恐懼而求能者如是者彊若燕昭樂毅也身不能不知恐懼而求能者安唯便僻左右親比己者之用如是者危削謂若楚㐮王左州侯右夏侯之比也綦之而亡宋獻之比國者巨用之則大小用之則小巨者大之極也綦大而王綦小而亡小巨分流者存小巨各半如水之分流也巨用之者先義而後利安不恤親疎不恤貴賤唯誠能之求夫是之謂巨用之小用之者先利而後義安不恤是非不治曲直唯便僻親比己者之用夫是之謂小用之巨用之者若彼小用之者若此小巨分流者亦一若彼也亦一若此也或誠能之求或親比己者之用故曰粹而王駁而霸無一焉而亡此之謂也粹全也若舜舉臯陶不仁者逺即巨用之綦大而王者也駮雜也若齊桓外任管仲内任豎刁則小巨分流者無一焉而亡無賢人若厲王專任皇甫尹氏即綦小而亡者也國無禮則不正禮之所以正國也譬之猶衡之於輕重也猶繩墨之於曲直也猶規矩之於方圓也禮能正國譬衡所以辨輕重繩墨所以辨曲直規矩所以定方圓也故錯之而人莫能誣也錯置也禮記曰衡誠懸不可欺以輕重䋲墨誠陳不可欺以曲直規矩誠設不可欺以方圓者也詩云如霜雪之將將如日月之光明逸詩為之則存不為之則亡此之謂也為為禮也國危則無樂君國安則無憂民亂則國危治則國安今君人者急逐樂而緩治國豈不過甚矣哉譬之是猶好聲色而恬無耳目也豈不哀哉恬安也安然無耳目雖好聲色將何用哉夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚臭􅂔也凡氣香亦謂之臭禮記曰皆佩容臭綦極也綦或為其傳寫誤耳佚安樂之也此五綦者人情之所必不免也養五綦者有具具謂廣大富厚治辨彊固之道無具則五綦者不可得而致也萬乘之國可謂廣大富厚矣加有治辯彊固之道焉有讀為又辯分别事若是則恬愉無患難矣然後養五綦之具具也故百樂者生於治國者也憂患者生於亂國者也急逐樂而緩治國者非知樂者也故明君者必將先治其國然後百樂得其中得於治國之中樂並音洛闇君者必將荒逐樂而緩治國故憂患不可勝校也計校必至於身死國亡然後止也豈不哀哉將以為樂乃得憂焉將以為安乃得危焉將以為福乃得死亡焉豈不哀哉於乎君人者亦可以察若言矣於乎讀為嗚呼若言如此之言謂己上之說故治國有道人主有職在知其道守其職也若夫貫日而治詳一日而曲列之貫日積日也積日而使條治詳僃一日如委曲列之無差錯也是以所使夫百吏官人為也不足以是傷游玩安燕之樂煩碎之事既使百吏官人為之則不足以此害人君游燕之樂也若夫論一相以兼率之使臣下百吏莫不宿道鄉方而務論謂討論選擇之也率領也宿道止於道也鄉方不迷亂也臣下皆以宿道鄉方為務不敢姦詐也是夫人主之職也論相人主之職不在窮親小事若是則一天下名配堯禹之主者守至約而詳事至佚而功事任垂衣裳不下簟席之上而海内之民莫不願得以為帝王夫是之謂至約樂莫大焉人主者以官人為能者也匹夫者以自能為能者也人主得使人為之匹夫則無所移之百畝一守事業窮無所移之也百畝一夫之守事業耕稼也耕稼窮於此無所移於人若人主必窮治小事則與匹夫何異之也今以一人兼聽天下日有餘而治不足者使人為之也今以一人兼聽天下之大自稱日有餘言兼聽之日有餘也而治不足謂所治之事少而不足言不足治也使人為之故得如此尹子曰堯南撓交阯北懐幽都東西至日之所出入有餘日而不足於治者恕也韓子曰夫為人主而身察百官則日不足力不給也故先王舍己能而因法數審賞罰故治不足而日有餘上之任勢使然也日音而實反大有天下小有一國天子諸侯必自為之然後可則勞苦耗悴莫甚焉耗謂精神竭耗悴顦顇也如是則雖臧獲不肯與天子易勢業臧獲奴婢也方言謂荆淮海岱之間罵奴曰臧罵婢曰獲燕齊亡奴謂之臧亡婢謂之獲或曰取貨謂之臧擒得謂之獲皆謂有罪為奴婢者故周禮其奴婢男子入于罪𨽻女子入于舂槀勢業權勢事業也以是縣天下一四海何故必自為之以是一人之寡縣天下之重一四海之大何故必自為之言力不任之也為之者役夫之道也墨子之說也墨子之說必自勞苦論德使能而官施之者聖王之道也儒之所謹守也官施謂建百官施布職事傳曰農分田而耕賈分貨而販百工分事而勸士大夫分職而聽聽其政治建國諸侯之君分土而守三公揔方而議揔領也議其所揔統之政自陜以東周公主之自陜以西召公主之三公處於内是揔方而議也則天子共己而已矣共讀為恭或讀為拱垂拱而已出若入若天下莫不平均莫不治辯若如此也出若入若謂内外皆如此也謂如論德使能官施之事或曰若順也是百王之所同也而禮法之大分也禮法大分在任人各使當其職分也百里之地可以取天下是不虚其難者在人主之知之也所患人主不知小國可以取天下之道也取天下者非負其土地而從之之謂也非謂它國負荷其土地來而從我之謂也道足以一人而已矣其道足以齊一人故天下歸之也彼其人苟一則其土地且奚去我而適他彼國之人苟一於我則其土地奚往哉故百里之地其等位爵服足以容天下之賢士矣此論百里國取天下之道賢士有道徳者也其官職事業足以容天下之能士矣能士者材藝也循其舊法擇其善者而明用之足以順服好利之人矣擇舊法之善者而明用之謂擇務本厚生之法而用之則民衣食足而好利之民順服也賢士一焉能士官焉好利之人服焉三者具而天下盡無有是其外矣具謂俱為用也故百里之地足以竭勢矣竭盡也有等位爵服官職事業是天下之勢盡於此矣致忠信著仁義足以竭人矣致極也著明也言極忠信明仁義足以盡天下之人謂皆來歸矣兩者合而天下取諸侯後同者先危兩者合謂能盡勢盡人也詩曰自西自東自南自北無思不服一人之謂也其道足以齊一人故四方皆歸之羿蠭門者善服射者也蠭門即蠭䝉學射於羿羿蠭蒙善射故射者服之蠭音逄王良造父者善服馭者也王良趙簡子之馭韓子曰字伯樂造父周穆王之馭皆善御者也馭與御同聦明君子者善服人者也人服而勢從之人不服而勢去之故王者已於服人矣王者之功盡此也故人主欲得善射射逺中微則莫若羿蠭門矣射及逺中細微之物欲得善馭及速致逺則莫若王良造父矣欲調一天下制秦楚則莫若聦明君子矣荀卿在齊楚秦天下彊國故制之者也其用知甚簡用智慮至少也其為事不勞而功名致大甚易處而綦可樂也故明君以為寶而愚者以為難明君以任賢為寶愚者以任賢為難也夫貴為天子富有天下名為聖王兼制人人莫得而制也是人情之所同欲也而王者兼而有是者也重色而衣之重味而食之重財物而制之重多也直用反合天下而君之飲食甚厚聲樂甚大臺謝甚髙謝與榭同園囿甚廣臣使諸侯一天下是又人情之所同欲也而天子之禮制如是者也禮之與制如此其盛言盡人情之所欲也制度以陳政令以挾挾讀為浹洽也官人失要則死公侯失禮則幽要政令之要約也禮記曰各揚其職百官廢質服大刑幽囚也春秋傳曰晉侯執衛侯歸之于京師寘諸深室也四方之國有侈離之徳則必滅侈奢侈離乖離皆謂不遵法度名聲若日月功積如天地天下之人應之如影嚮是又人情之所同欲也而王者兼而有是者也故人之情口好味而臭味莫美焉耳好聲而聲樂莫大焉目好色而文章致繁婦女莫衆焉形體好佚而安重間靜莫愉焉間隙也或讀為閑愉樂也心好利而穀禄莫厚焉合天下之所同願兼而有之睪牢天下而制之若制子孫睪牢未詳睪或作畢言盡牢籠天下也新序作宰牢戰國䇿燕太子丹謂荆軻曰秦有貪功之心非盡天下之地牢海内之王其意不厭或曰睪讀如以薅荼蓼之薅牢與漢書立㛐轇羮同皆修理斡運之意也人苟不狂惑戇陋者其誰能睹是而不樂也哉欲是之主並肩而存能建是之士不世絶千歲而不合何也曰人主不公人臣不忠也人主則外賢而偏舉人臣則爭職而妬賢是其所以不合之故也外賢疎賢也偏舉偏黨而舉所愛也人主胡不廣焉無恤親疎無偏貴賤唯誠能之求廣焉開泰貎或讀為曠誠能實能也若是則人臣輕職業讓賢而安隨其後如是則禹舜還至王業還起還復功一天下名配禹舜物由有可樂如是其美焉者乎嗚呼君人者亦可以察若言矣可以察如此之言也楊朱哭衢塗曰此夫過舉蹞歩而覺跌千里者夫哀哭之楊朱戰國時人後於墨子與墨子弟子禽滑釐辯論其說在愛己不㧞一毛以利天下與墨相反衢塗岐路也秦俗以兩為衢或曰四達謂之衢覺知也半歩曰蹞跌差也言此岐路第過舉半歩則知差而哭况跌千里者乎故甚哀而哭之易曰差以毫釐謬以千里也此亦榮辱安危存亡之衢已此其為可哀甚於衢塗此謂求誠能之士也不求則滅亡故可哀甚於衢塗也嗚呼哀哉君人者千歲而不覺也嘆君人者千嵗而不知求誠能之士無國而不有治法無國而不有亂法無國而不有賢士無國而不有罷士國語曰罷士無伍罷女無家韋昭曰病也無行而罷周禮以嘉石平罷民謂平之使善者也無國而不有愿民無國而不有悍民無國而不有美俗無國而不有惡俗兩者並行而國在上偏而國安在下偏而國危上偏偏行上事也謂治法多亂法少賢士多罷士少愿民多悍民少之類下偏反是上一而王下一而亡一謂令行也故其治法其佐賢其民愿其俗美而四者齊夫是之謂上一如是則不戰而勝不攻而得用兵不勞而天下服故湯以亳武王以鄗鄗與鎬同皆百里之地也天下為一諸侯為臣通達之屬莫不服從無他故焉四者齊也齊謂無所闕也桀紂即序於有天下之勢索為匹夫而不可得也即序於有天下之勢謂就王者之次序為天子是無他故焉四者並亡也故百王之法不同若是所歸者一也上莫不致愛其下而制之以禮上之於下如保赤子政令制度所以接下之人百姓有不理者如豪末則雖孤獨鰥寡必不加焉不以豪末不理加於孤獨鰥寡也四者人所輕賤故聖王尤愛之孝經曰不敢侮於鰥寡而况於上民乎故下之親上歡如父母可殺而不可使不順君臣上下貴賤長㓜至於庶人莫不以是為隆正是謂親上也皆以親上為隆正也然後皆内自省以謹於分愛敬其上故不敢踰越也是百王之所以同也而禮法之樞要也是百王之同用愛民之道而得民也然後農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公揔方而議則天子共己而止矣若出若入天下莫不平均莫不治辯是百王之所同而禮法之大分也亦謂致愛其下故皆勸勉餘並已解上也若夫貫日而治平權物而稱用貫日積日也使條理平正權制物使稱於用稱尺正反使衣服有制宫室有度人徒有數喪祭械用皆有等宜以是用挾於萬物人徒謂胥徒給徭役者也械用噐用也皆有等宜言等差皆得其宜也挾讀為浹尺寸㝷丈莫得不循乎制數度量然後行則是官人使吏之事也不足數於大君子之前官人列官之人使吏所使役之吏數閲數也大君子謂人君也故君人者立隆政本朝而當隆政所隆之政也當丁浪反所使要百事者誠仁人也主百事之要約綱紀者謂相也則身佚而國治功大而名美上可以王下可以霸立隆正本朝而不當所使要百事者非仁人也則身勞而國亂功廢而名辱社稷必危是人君者之樞機者也樞機在得賢相人君當為君人也故能當一人而天下取失當一人而社稷危不能當一人而能當千人百人者說無之有也論說之中無此事能當謂能用人之當也當皆丁浪反既能當一人則身有何營而為而為皆助語也垂衣裳而天下定故湯用伊尹文王用吕尚武王用召公成王用周公且卑者五伯卑言功業卑於王者伯讀為霸齊桓公閨門之内懸樂奢泰游抏之修懸簨簴也泰與汰同抏與玩同言齊桓唯此是修也於天下不見謂修天下不謂之修飾也然九合諸侯一匡天下為五伯長是亦無他故焉知一政於管仲也是君人者之要守也要守在任賢也知者易為之興力而功名綦大智者知任賢之君也舍是而孰足為也舍是任賢之事何足為之言其餘皆不足為也故古之人有大功名者必道是者也道行也必行此任賢之事喪其國危其身者必反是者也故孔子曰知者之知固以多矣有以守少能無察乎上知音智下如字有讀為又智下同守少謂任賢恭己而已也愚者之知固以少矣有以守多能無狂乎此之謂也守多謂自任主百事者也事煩則狂亂也治國者分已定則主相臣下百吏各謹其所聞不務聽其所不聞謹謂守行無越思各謹其所見不務視其所不見所聞所見誠以齊矣齊謂各當其事不侵越也則雖幽間隠辟百姓莫敢不敬分安制以禮化其上是治國之徵也間讀為閑辟讀為僻安制謂安於國之制度不敢踰分徵驗也治國之徵驗在分定主道治近不治逺人主之道如此治明不治幽治一不治二主能治近則逺者理主能治明則幽者化主能當一則百事正夫兼聽天下日有餘而治不足者如此也是治之極也既能治近又務治逺既能治明又務見幽既能當一又務正百當丁浪反是過者也猶不及也辟之是猶立直木而求其影之枉也不能治近又務治逺不能察明又務見幽不能當一又務正百是悖者也悖惑辟之是猶立枉木而求其影之直也故明主好要而闇主好詳任一相而委之是好要不委人而自治百事是好詳主好要則百事詳主好詳則百事荒力不及故荒也君者論一相陳一法明一指以兼覆之兼炤之以觀其盛者也論選擇也指指歸也一法一指皆謂綱紀也盛讀為成觀其成功也相者論列百官之長要百事之聽列置於列位也聽治也要取百事之治考其得失也要一堯反以飾朝廷臣下百吏之分修飾使各當分度其功勞論其慶賞歲終奉其成功以效於君當則可不當則廢效致也周禮太宰歲終則令百官府各正其治受其㑹聽其政事而詔王廢置也故君人勞於索之而休於使之索求也休息也周國者得百姓之力者富得百姓之死者彊得百姓之譽者榮三得者具而天下歸之三得者亡而天下去之天下歸之之謂王天下去之之謂亡湯武者修其道行其義興天下同利除天下同害天下歸之故厚徳音以先之明禮義以道之致忠信以愛之賞賢使能以次之賞當為尚爵服賞慶以申重之時其事輕其任以調齊之潢然兼覆之養長之如保赤子潢與滉同大水貎也生民則致寛生民生活民謂衣食也使民則綦理辯政令制度所以接天下之人百姓有非理者如毫末則雖孤獨鰥寡必不加焉是故百姓貴之如帝親之如父母為之出死斷亡而不愉者無他故焉不愉不字剩耳道徳誠明利澤誠厚也亂世不然汙漫突盜以先之突凌觸盜竊也權謀傾覆以示之俳優侏儒婦女之請謁以悖之俳優倡優侏儒短人可戲弄者悖亂也使愚詔知使不肖臨賢生民則致貧隘使民則綦勞苦是故百姓賤之如㑌惡之如鬼字書無㑌字葢當為尫病人也禮記曰吾欲暴尫而奚若新序作賤之如虺豕也日欲司間而相與投籍之去逐之司間伺其間隙投擲也籍踐也一作投錯之卒有宼難之事又望百姓之為已死不可得也說無以取之焉論說之中無以此事為得也卒千忽反孔子曰審吾所以適人適人之所以來我也此之謂也適人往與人也審慎其與人之道為其復來報我也傷國者何也曰以小人尚民而威尚上也使小人在上位而作威也以非所取於民而巧若兵甲田賦之類也是傷國之大災也大國之主也而好見小利是傷國其於聲色臺榭園囿也愈厭而好新是傷國厭足也一古反不好循政其所以有啖啖常欲人之有是傷國啖啖并吞之貌三邪者在匈中而又好以權謀傾覆之人斷事其外事任也謂斷决任事於外也若是則權輕名辱社稷必危是傷國者也大國之主也不隆本行不敬舊法而好詐故故事變也若是則夫朝廷羣臣亦從而成俗不隆禮義而好傾覆也以不隆義禮為成俗朝廷羣臣之俗若是則夫衆庶百姓亦從而成俗於不隆禮義而好貪利矣君臣上下之俗莫不若是則地雖廣權必輕人雖衆兵必弱刑罰雖繁令不下通夫是之謂危國是傷國者也儒者為之不然必將曲辯辯理也委曲使歸於理也朝廷必將隆禮義而審貴賤若是則士大夫莫不敬節死制者矣節中義制職分百官則將齊其制度重其官秩若是則百吏莫不畏法而遵繩矣秩禄也其制馭百官必將齊一其制度使有守也厚重其秩禄使不貪也關市幾而不征質律禁止而不偏質律質劑也可以為法故言質律也禁止而不偏謂禁止姦人不偏聽也周禮小宰聽賣買以質劑鄭司農云質劑平市價今之月平是也鄭康成云兩書一札同而别之長曰質短曰劑皆今之劵書也左氏傳曰趙盾為政董逋逃由質晏或曰質正也如是則商賈莫不敦慤而無詐矣百工將時斬伐佻其期日而利其巧任如是則百工莫不忠信而不楛矣時斬伐即周禮仲冬月斬陽木仲夏月斬陰木是也佻與徭同緩也謂不廹促也巧任巧者之任不廹促則百工自利矣楛謂器用不牢固也晏子春秋曰景公之時晏子請發粟公不許為路寢之臺令史重其續逺其凃佻其日而不趨三年臺成而民振欲上恱乎君遊民足乎食彼佻亦與此同也縣鄙將輕田野之稅省刀布之歛罕舉力役無奪農時如是則農夫莫不朴力而寡能矣但質朴而力作不務他能也士大夫務節死制然而兵勁然而當為然後百吏畏法循繩然後國常不亂商賈敦慤無詐則商旅安貨通財而國求給矣所求之物皆給足也百工忠信而不楛則器用巧便而財不匱矣農夫朴力而寡能則上不失天時下不失地利中得人和而百事不廢是之謂政令行風俗美以守則固以征則彊居則有名動則有功此儒之所謂曲辯也荀子卷七欽定四庫全書荀子卷八唐楊倞註君道篇卷第十二有亂君無亂國有治人無治法羿之法非亡也而羿不世中禹之法猶存而夏不世王故法不能獨立類不能自行得其人則存失其人則亡法者治之端也君子者法之原也故有君子則法雖省足以徧矣無君子則法雖具失先後之施矣不能應事之變足以亂矣不知法之義而正法之數者雖博傳臨事必亂故明主急得其人而闇主急得其勢急得其人則身佚而國治功大而名美上可以王下可以霸不急得其人而急得其勢則身勞而國亂功廢而名辱社稷必危故君人者勞於索之而休於使之書曰惟文王敬忌一人以懌此之謂也合符節别契劵者所以為信也上好權謀則臣下百吏誕詐之人乗是而後欺探籌投鉤者所以為公也上好曲私則臣下百吏乗是而後偏衡石稱縣者所以為平也上好傾覆則臣下百吏乘是而後險斗斛敦槩者所以為嘖也上好貪利則臣下百吏乗是而後鄙豐取刻與以無度取於民故械數者治之流也非治之源也君子者治之源也官人守數君子養源源清則流清源濁則流濁故上好禮義尚賢使能無貪利之心則下亦將綦辭讓致忠信而謹於臣子矣如是則雖在小民不待合符節别契劵而信不待探籌投鉤而公不待衡石稱縣而平不待斗斛敦槩而嘖故賞不用而民勸罰不用而民服有司不勞而事治政令不煩而俗美百姓莫敢不順上之法象上之志而勸上之事而安樂之矣故籍斂忘費事業忘勞宼難忘死城郭不待飾而固兵刄不待陵而勁敵國不待服而詘四海之民不待令而一夫是之謂王乎詩曰王猷允塞徐方既來此之謂也請問為人君曰以禮分施均徧而不偏請問為人臣曰以禮待君忠順而不懈請問為人父曰寛惠而有禮請問為人子曰敬愛而致文請問為人兄曰慈愛而見友請問為人弟曰敬詘而不苟請問為人夫曰致功而不流致臨而有辨請問為人妻曰夫有禮則柔從聽侍夫無禮則恐懼而自竦也此道也偏立而亂俱立而治其足以稽矣請問兼能之柰何曰審之禮也古者先王審禮以方皇周浹於天下動無不當也故君子恭而不難敬而不鞏貧窮而不約富貴而不驕並遇變應而不窮審之禮也故君子之於禮敬而安之其於事也徑而不失其於人也寡怨寛裕而無阿其所為身也謹修勑而不危其應變故也齊給便㨗而不惑其於天地萬物也不務說其所以然而致善用其材其於百官之事伎藝之人也不與之爭能而致善用其功其侍上也忠順而不懈其使下也均徧而不偏其交遊也縁義而有類其居鄉里也容而不亂是故窮則必有名達則必有功仁厚兼覆天下而不閔明達用天地理萬變而不疑血氣和平志意廣大行義塞於天地之間仁知之極也夫是之謂聖人審之禮也請問為國曰聞修身未甞聞為國也君者儀也儀正而景正君者槃也槃圓
