  hash: sha256:084b42f6e95e4e6545e236975ade8e205383fefe1021c9d793f758c21f9377dc
body:
  text: 唐楊倞註不苟篇第三君子行不貴苟難說不貴苟察行如字察聦察名不貴苟傳唯其當之為貴當謂合禮義也當丁浪反負石而赴河是行之難為者也而申徒狄能之申徒狄恨道不行發憤而負石自沈於河莊子音義曰殷時人韓詩外傳曰申徒狄將自投於河崔嘉聞而止之不從也然而君子不貴者非禮義之中也禮義之中時止則止時行則行不必枯槁赴淵也楊子雲非屈原曰君子遭時則大行不遇時則龍蛇何必沈身也山淵平天地比比謂齊等也莊子曰天與地卑山與澤平音義曰以地比天則地卑於天若宇宙之髙則天地皆卑天地皆卑則山與澤平矣或曰天無實形地之上空虚者盡皆天也是天地長親比相隨無天髙地下之殊也在髙山則天亦髙在深淵則天亦下故曰天地比地去天逺近皆相似是山澤平也齊秦襲襲合也齊在東秦在西相去甚逺若以天地之大包之則曾無隔異亦可合爲一國也入乎耳出乎口未詳所明之意或曰即山出口也言山有耳口也凡呼於一山衆山皆應是山聞人聲而應之故曰入乎耳出乎口或曰山能吐納雲霧是以有口也鈎有須未詳自齊秦襲入乎耳出乎口鈎有須皆淺學所未見或曰鈎有須即丁子有尾也丁之曲者為鈎須與尾皆尾類是同也莊子音義云夫萬物無形形無定稱在上為首在下為尾世人謂右行曲波為尾今丁子二字雖左行曲波亦是尾也卵有毛司馬彪曰胎卵之生必有毛羽雞伏鵠卵卵不為雞則生類於鵠也毛氣成毛羽氣成羽雖胎卵未生而毛羽之性已著矣故曰卵有毛也是說之難持者也而惠施鄧析能精之皆異端曲說故曰難持惠施梁相與莊子同時其書五車其道舛駁鄧柝鄭大夫劉向云鄧析好刑名操兩可之說設無窮之辭數難子產為政子產執而戮之按左氏傳鄭駟歂殺鄧析而用其竹刑而云子產戮之恐誤也然而君子不貴者非禮義之中也盜跖吟口名聲若日月與舜禹俱傳而不息然而君子不貴者非禮義之中也吟口吟咏長在人口也說苑作盜跖凶貪也故君子行不貴苟難說不貴苟察名不貴苟得唯其當之為貴詩曰物其有矣唯其時矣此之謂也詩小雅魚麗之篇言雖有物亦須得其時以喻當之為貴君子易知而難狎坦蕩蕩故易知不比黨故難狎易懼而難脅小心而志不可奪也畏患而不避義死欲利而不為所非心以為非則捨之交親而不比親謂仁恩比謂暱狎言辯而不辭辯足以明事不至於騁辭蕩蕩乎其有以殊於世也與俗人有異也君子能亦好不能亦好小人能亦醜不能亦醜君子能則寛容易直以開道人道與導同不能則恭敬繜絀以畏事人繜與撙同絀與黜同謂自撙節貶損也小人能則倨傲僻違以驕溢人溢滿不能則妬嫉怨誹以傾覆人故曰君子能則人榮學焉不能則人樂告之小人能則人賤學焉不能則人羞告之是君子小人之分也分異也如字君子寛而不僈僈與慢同怠惰也廉而不劌亷稜也說文云劌利傷也但有廉隅不至於兩傷也辯而不争察而不激但明察而不激切也寡立而不勝堅彊而不暴雖寡立而不能勝雖堅彊而不兇暴柔從而不流恭敬謹慎而容不至於孤介也夫是之謂至文言德備也詩曰溫溫恭人維德之基此之謂矣詩大雅抑之篇温温寛柔貌君子崇人之德揚人之美非諂諛也正義直指舉人之過惡非毁疵也疵病也或曰讀為訾言已之光美擬於禹舜參於天地非夸誕也與時屈伸柔從若蒲葦非懾怯也蒲葦所以為席可卷者也剛彊猛毅靡所不信非驕暴也信讀為伸下同古字通用以義變應知當曲直故也以義隨變而應其所知當於曲直也詩曰左之左之君子宜之右之右之君子有之此言君子之能以義屈伸變應也詩小雅裳裳者華之篇以能應變故左右無不得其宜也君子小人之反也與小人相反君子大心則天而道小心則畏義而節天而道謂合於天而順道知則明通而類類謂知統類也愚則端慤而法愚謂無機智也法謂守法度也見由則恭而止由用也止謂不放縱也或曰止禮也言恭而有禮見閉則敬而齊謂閉塞道不行也敬而齊謂自齊整而不怨也喜則和而理憂則靜而理皆當其理通則文而明有文而彰明也窮則約而詳隱約而詳明其道也小人則不然大心則慢而暴小心則淫而傾以邪諂事人也知則攫盜而漸漸進也謂貪利不知止也愚則毒賊而亂毒害也愚而無畏忌也見由則兊而倨兊恱也言喜於徼幸而倨傲也見閉則怨而險怨上而險賊也喜則輕而翾輕謂輕佻失據翾小飛也言小人之喜輕佻如小鳥之翾然音許緣反或曰與環同說文云急也憂則挫而懾通則驕而偏偏頗窮則弃而儑弃自弃也儑當為濕方言云濕優也字書無儑字韓詩外傳作弃而累也傳曰君子兩進小人兩廢此之謂也君子治治非治亂也曷謂耶曰禮義之謂治非禮義之謂亂也故君子者治禮義者也非治非禮義者也然則國亂將弗治與曰國亂而治之者非案亂而治之之謂也去亂而被之以治案據也據舊亂而治之也荀子安案多為語助與此不同人汙而修之者人有汙穢之行將修為善非案汙而修之之謂也去汙而易之以修故去亂而非治亂也去汙而非修汙也治之為名猶曰君子為治而不為亂爲修而不為汙矣治之名號如此君子挈其辯而同焉者合矣挈修整也謂不煩雜善其言而類焉者應矣出其言善千里之外應之故馬鳴而馬應之非知也其勢然也知音智故新浴者振其衣新沐者彈其冠人之情也言潔其身者懼外物之汙也猶賢者必不受不善人之汙者也其誰能以已之僬僬受人之掝掝者哉僬僬明察之貌也僬盡謂窮盡明於事易曰窮理盡性掝當為惑惑惛也楚辭曰安能以身之察察受物之惛惛者乎僬予誚反君子養心莫善於誠無姦詐則心常安也致誠則無他事矣致極也極其誠則外物不能害唯仁之為守唯義之為行致其誠在仁義誠心守仁則形形則神神則能化矣誠心守於仁愛則必形見於外則下尊之如神能化育之矣化謂遷善也誠心行義則理理則明明則能變矣義行則事有條理明而易人不敢欺故能變改其惡也變化代興謂之天德既能變化則德同於天馴致於善謂之化改其舊質謂之變言始於化終於變也猶天道隂陽運行則為化春生冬落則為變也天不言而人推髙焉地不言而人推厚焉四時不言而百姓期焉期謂知其時候夫此有常以至其誠者也至極也天地四時所以有常如此者由極其誠所致君子至德嘿然而喻未施而親不怒而威君子有至德所以嘿然不言而人自喻其意夫此順命以愼其獨者也人所以順命如此者由慎其獨所致也慎其獨謂戒慎乎其所不睹恐懼乎其所不聞至誠不欺故人亦不違之也善之為道者不誠則不獨無至誠則不能慎其獨也不獨則不形不能慎其獨故其徳亦不能形見於外不形則雖作於心見於色出於言民猶若未從也雖從必疑若如也無至誠故雖出令民猶如未從者雖彊使之從亦必疑之也天地為大矣不誠則不能化萬物聖人為知矣不誠則不能化萬民父子為親矣不誠則䟽君上為尊矣不誠則卑卑謂不為在下所尊夫誠者君子之所守也而政事之本也唯所居以其類至所居所止也唯其所止至誠則以類自至謂天地誠則能化萬物聖人誠則能化萬民父子誠則親君上誠則尊也操之則得之舎之則失之操持操而得之則輕持至誠也而得之則易舉也詩曰德輶如毛是也輕則獨行舉至誠而不難則慎獨之事自行矣獨行而不舎則濟矣至誠存乎不已濟而材盡長遷而不反其初則化矣既濟則材性自盡長遷不反其初謂中道不廢也君子位尊而志恭心小而道大所聽視者近而所聞見者逺是何邪是操術然也謂以近知逺以今知古所持之術如此也故千人萬人之情一人之情是也人情不相逺天地始者今日是也百王之道後王是也後王當今之王言後王之道與百王不殊行堯舜則亦是堯舜君子審後王之道而論於百王之前若端拜而議端𤣥端朝服也端拜猶言端拱言君子審後王所宜施行之道而以百王之前比之若服𤣥端拜揖而議言其從容不勞也時人多言後世澆漓難以為治故荀卿明之推禮義之統分是非之分上分如字下無問反分之使當其分揔天下之要治海内之衆若使一人故操彌約而事彌大約少也得其宗主也五寸之矩盡天下之方也矩正方之器也故君子不下室堂而海内之情舉積此者則操術然也舉皆也有通士者有公士者有直士者有慤士者有小人者上則能尊君下則能愛民物至而應事起而辨若是則可謂通士矣物有至則能應之事有疑則能辨之通者不滯之謂也不下比以闇上不上同以疾下闇上掩上之明也疾與嫉同分争於中不以私害之若是則可謂公士矣謂於事之中有分争者不以私害之則可謂公正之士也身之所長上雖不知不以悖君不怨君而違悖也身之所短上雖不知不以取賞受禄不誣長短不飾以情自竭若是則可謂直士矣不矜其長不掩其短但任直道而竭盡其情也庸言必信之庸行必慎之庸常也謂言常信行常慎畏法流俗而不敢以其所獨甚法效也畏法流移之俗又不敢以其所獨善而甚過人謂不敢獨為君子也若是則可謂慤士矣端慤不貳言無常信行無常貞唯利所在無所不傾利之所在皆傾意求之若是則可謂小人矣公生明偏生闇端慤生通詐偽生塞多窮塞也誠信生神誠信至則通於神明中庸曰至誠如神夸誕生惑矜夸妄誕則貪惑於物此六生者君子慎之而禹桀所以分也所以分賢愚也欲惡取舎之權舉下事也見其可欲也則必前後慮其可惡也者見其可利也則必前後慮其可害也者而兼權之熟計之權所以平輕重者熟甚也猶成熟也然後定其欲惡取舎如是則常不失陷矣凡人之患偏傷之也偏謂見其一隅見其可欲也則不慮其可惡也者見其可利也則不顧其可害也者是以動則必陷為則必辱是偏傷之患也人之所惡者吾亦惡之言人欲惡之不必異於衆人也夫富貴者則類傲之富貴之類不論是非皆傲之也夫貧賤者則求柔之見貧賤者皆柔屈就之也是非仁人之情也是姦人將以盜名於晻世者也險莫大焉姦人盜富貴貧賤之名於昏闇之世與暗同故曰盜名不如盜貨田仲史鰌不如盜也田仲齊人處於陵不食兄禄辭富貴為人灌園號曰於陵仲子史鰌衛大夫字子魚質直也榮辱篇第四橋泄者人之殃也泄與渫同嫚也殃或爲袂恭儉者偋五六也偋當爲屏却也說文有偋字僻窶也與此義不同偋防正反雖有戈矛之刺不如恭儉之利也言入人深故與人善言煖於布帛傷人之言深於矛㦸故薄薄之地不得履之非地不安也危足無所履者也凡在言也薄薄謂磅礴廣大之貌危足側足也凡皆也所以廣大之地側足無所容者皆由以言害身也巨塗則讓小塗則殆雖欲不謹若云不使殆近也凡行前逺而後近故近者亦後之義謂行於道塗大道並行則讓之小道可單行則後之若能用意如此雖欲爲不謹敬若有制物而不使之者儒行曰道塗不争險易之利者也快快而亡者怒也肆其快意而亡由於忿怒也察察而殘者忮也至明察而見傷殘者由於有忮害之心也博而窮者訾也言辭辯博而見窮蹙者由於好毁訾也清之而俞濁者口也欲求其清而俞濁者在口說之過謂言過其實也或曰潔其身則自清也但能口說斯俞濁也俞讀為愈豢之而俞瘠者交也所交接非其道則必患難雖食芻豢而更瘠也故上篇云勞勌而容貌不枯好交也辯而不說者争也不說不為人所稱說或讀為恱直立而不見知者勝也直立謂已直人曲勝謂好勝人廉而不見貴者劌也劌傷也刻已太過不得中道故不見貴也勇而不見憚者貪也貪利則委曲求人故雖勇而不見憚信而不見敬者好剸行也剸與專同專行謂不度是非好復言如白公者也此小人之所務而君子之所不為也鬭者忘其身者也忘其親者也忘其君者也行其少頃之怒而喪終身之軀然且為之是忘其身也室家立殘親戚不免乎刑戮然且為之是忘其親也蓋當時禁鬭殺人之法戮及親戚尸子曰非人君之用兵也以為民傷鬬則以親戚殉一言而不改之也君上之所惡刑法之所大禁也然且為之是忘其君也憂忘其身遭憂患刑戮而不能保其身是憂忘其身也或曰當為下忘其身誤為憂字耳内忘其親上忘其君是刑法之所不赦也聖王之所不畜也乳彘觸虎乳狗不逺遊不忘其親也小人憂忘其身内忘其親上忘其君則是人也而曾狗彘之不若也凡鬭者必自以為是而以人為非也已誠是也人誠非也則是己君子而人小人也以君子與小人相賊害也憂以忘其身内以忘其親上以忘其君豈不過甚矣哉是人也所謂以狐父之戈钃牛矢也時人舊有此語喻以貴而用於賤也狐父地名史記伍貟曰吳王兵敗于狐父徐廣曰梁碭之間也蓋其地山名戈其說未聞管子曰蚩尤爲雍狐之㦸狐父之戈豈近此耶钃刺也之欲反古良劒謂之屬鏤亦取其刺也或讀钃為斫將以為智耶則愚莫大焉將以為利耶則害莫大焉將以為榮耶則辱莫大焉將以為安耶則危莫大焉人之有鬭何哉我欲屬之狂惑疾病也則不可聖王又誅之屬託也之欲反我欲屬之鳥鼠禽獸耶則不可其形體又人而好惡多同視其形體則又人也其好惡多與賢人同但好鬬為異耳人之有鬭何哉我甚醜之其禍如此何為鬬也有狗彘之勇者有賈盜之勇者狗彘勇於求食賈盜勇於求利賈音古有小人之勇者有士君子之勇者小人勇於暴士君子勇於義言人有此數勇也争飲食無廉恥不知是非不辟死傷不畏衆彊恈恈然唯利飲食之見是狗彘之勇也辟讀為避恈恈愛欲之貌方言云恈愛也宋魯之間曰牟為事利為事及利也為于偽反爭貨財無辭讓果敢而振猛貪而利恈恈然唯利之見是賈盜之勇也振動也戾乖背也春秋公羊傳曰葵丘之會桓公振而矜之何休云亢陽之貌也輕死而暴是小人之勇也義之所在不傾於權不顧其利舉國而與之不為改視重死持義而不撓是士君子之勇也雖重愛其死而執節持義不撓曲以苟生也儒行曰愛其死以有待也儵䱁者浮陽之魚也儵䱁魚名浮陽謂此魚好浮於水上就陽也今字書無䱁字葢當作鮁說文云即鱣鮪鮁鮁字蓋儵魚一名儵鮁莊子與惠子遊於豪梁之上儵魚出遊是浮陽之義或曰浮陽勃海縣名也儵音稠鮁布末反胠於沙而思水則無逮矣胠與祛同揚子方言云祛去也齊趙之緫語去於沙謂失水去在沙上也莊子有胠篋篇亦取去之義挂於患而欲謹則無益矣人亦猶魚也自知者不怨人知命者不怨天怨人者窮徒憤怨於人不同修者則窮廹無所出怨天者無志有志之士但自修身遇與不遇皆歸於命故不怨天失之已反之人豈不亦迂哉迂失也反責人也榮辱之大分安危利害之常體先義而後利者榮先利而後義者辱榮者常通辱者常窮通者常制人窮者常制於人受制於人是榮辱之大分也其中雖未必皆然然其大分如此矣材慤者常安利蕩悍者常危害材慤謂材性愿慤也蕩悍已解於修身篇安利者常樂易危害者常憂險樂易歡樂平易也詩所謂愷悌者也樂易者常夀長憂險者常夭折是安危利害之常體也亦大率如此夫天生烝民有所以取之言天生衆民其君臣上下職業皆有取之道非其道所以敗之也志意致脩德行致厚智慮致明是天子之所以取天下也致極也言如此是乃天子之所以取天下之道也政令法舉措時聽斷公當為政令法或曰政當為正舉措時謂興力役不奪農時也上則能順天子之命下則能保百姓是諸侯之所以取國家也志行脩臨官治上則能順上下則能保職是士大夫之所以取田邑也脩法則度量刑辟圖籍度丈尺量斗斛刑法之書左氏傳曰先王議事以制不為刑辟圖謂摸寫土地之形籍謂書其戸口之數也不知其義謹守其數慎不敢損益也若制所然父子相傳以持王公世傳法則所以保持王公言王公賴之所為治也是故三代雖亡治法猶存是官人百吏之所以取祿秩也孝悌原慤軥録疾力以敦比其事業而不敢怠傲是庶人之所以取煖衣飽食長生久視以免於刑戮也軥與拘同拘録謂自撿束也疾力謂速力而作也敦厚也比親也言不敢怠惰也飾邪說文姦言為倚事倚已解上倚事怪異之事陶誕突盜陶當為檮杌之檮頑嚚之貌突凌突不順也或曰陶當爲逃隱匿其情也愓悍憍暴愓與蕩同以偷生反側於亂世之間是姦人之所以取危辱死刑也其慮之不深其擇之不謹其定取舎楛僈是其所以危也小人所以危亡由於計慮之失也楛惡也謂不堅固材性知能君子小人一也好榮惡辱好利惡害是君子小人之所同也若其所以求之之道則異矣小人也者疾為誕而欲人之信已也疾為詐而欲人之親已也禽獸之行而欲人之善已也慮之難知也行之難安也持之難立也慮之難知謂人難測其姦詐行之難安言易顛覆也持之難立謂難扶持之也成則必不得其所好必遇其所惡焉雖使姦詐得成亦必有禍無福故君子者信矣而亦欲人之信已也忠矣而亦欲人之親已也脩正治辨矣而亦欲人之善已也慮之易知也行之易安也持之易立也成則必得其所好必不遇其所惡焉是故窮則不隱通則大明不隱謂人不能蔽隱身死而名彌白白彰明也小人莫不延頸舉踵而願曰知慮材性固有似賢人也願猶慕也賢人謂賢過於人也夫不知其與已無以異也則君子注錯之當而小人注錯之過也注錯謂所注意錯履也亦與措智同義也故熟察小人之知能足以知其有餘可以爲君子之所爲也譬之越人安越楚人安楚君子安雅雅正也而有美德者謂之雅詩曰弁彼鸒斯歸飛提提鸒斯雅鳥也是非知能材性然也是注錯習俗之節異也習俗謂所習風俗節限之制也仁義德行常安之術也然而未必不危也汙僈突盜常危之術也然而未必不安也僈當爲漫漫亦汙也水冒物謂之漫莊子云此人無擇曰舜以其辱行漫我漫莫半反莊子又曰澶漫爲樂崔云淫術也李云縱逸也一曰漫欺枉之也故曰君子道其常而小人道其怪道語謂非常之事取以自比也凡人有所一同飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨白黑美惡耳辨音聲清濁口辨鹹酸甘苦鼻辨芬芳腥臊骨體膚理辨寒暑疾養膚理肌膚之文理養與癢同是又人之所常生而有也是無待而然者也是禹桀之所同也可以為堯禹可以為桀跖可以為工匠可以為農賈在勢注錯習俗之所積耳在所積習是又人之所生而有也是無待而然者也是禹桀之所同也為堯禹則常安榮為桀跖則常危辱為堯禹則常愉佚為工匠農賈則常煩勞然而人力為此而寡為彼何也曰陋也言人不為彼堯禹而為此桀跖由於性之固陋者也堯禹者非生而具者也夫起於變故成乎脩脩之爲待盡而後備者也變故患難事故也言堯禹起於憂患成於脩飾由於待盡物理然後乃能備之孟子曰天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所為所以動心忍性增益其所不能然後知生於憂患而死於安樂為于偽反人之生固小人無師無法則惟利之見耳人之生固小人又以遇亂世得亂俗是以小重小也以亂得亂也君子非得勢以臨之則無由得開内焉開小人之心而内善道也今是人之口腹安知禮義安知辭讓安知廉恥隅積言口腹無所知隅二隅謂其分也積積習亦呥呥而噍鄉鄉而飽已矣呥呥噍貌汝鹽反噍嚼也才笑反鄉鄉趨飲食貌許諒反人無師無法則其心正其口腹也人不學則心正如口腹之欲也今使人生而未嘗睹芻豢稻粱也惟菽藿糟糠之為睹則以至足為在此也俄而粲然有秉芻豢稻粱而至者則瞲然視之曰此何怪也粲精絜貌牛羊曰芻犬豕曰豢豢圈也以糓食於圈中瞲然驚視貌與獝同禮記曰故鳥不獝許聿反彼臭之而無嗛於鼻臭許又反嗛當為慊猒也苦廉反或下忝反嘗之而甘於口食之而安於體則莫不弃此而取彼矣今以夫先王之道仁義之統以相羣居以相持養以相藩飾以相安固邪持養保養也藩飾蕃蔽文飾也以夫桀跖之道是其為相縣也幾直夫芻豢之縣糟糠爾哉言以先王之道與桀跖相縣豈止糟糠比芻豢哉幾讀為豈下同然而人力為此而寡為彼何也曰陋也陋也者天下之公患也公共有此患也人之大殃大害也故曰人者好告示人告之示之靡之儇之鈆之重之靡順從也儇疾也火縁反靡之儇之猶言緩之急之也鈆與沿同循也撫循之申重之也則夫塞者俄且通也陋者俄且僴也愚者俄且知也僴與􅍀同猛也方言云晉魏之間謂猛為僴陋者俄且僴言鄙陋之人俄且矜莊有威儀也詩曰瑟兮僴兮鄭云僴寛大也下板反是若不行則湯武在上曷益桀紂在上曷損若不行告示之道則湯武何益於天下桀紂何損於百姓所以貴湯武賤桀紂以行與不行耳湯武存則天下從而治桀紂存則天下從而亂如是者豈非人之情固可與如此可與如彼也哉人之情食欲有芻豢衣欲有文繡行欲有輿馬又欲夫餘財蓄積之富也皆人之所貴也然而窮年累世不知不足是人之情也不知不足當為不知足剰不字或曰不足猶不得也今人之生也方多蓄雞狗猪彘又蓄牛羊然而食不敢有酒肉餘刀布有囷窌刀布皆錢也刀取其利布取其廣囷廪也圜曰囷方曰廪窌窖也地藏曰窖窌匹貌反然而衣不敢有絲帛約者有筐篋之藏然而行不敢有輿馬約儉嗇也筐篋藏布帛者也言又富於餘刀布也是何也非不欲也幾不長慮顧後而恐無以繼之故也於是又節用御欲御制也或作禦止也收歛蓄藏以繼之也是於已長慮顧後幾不甚善矣哉幾亦讀為豈今夫偷生淺知之屬曾此而不知也偷苟且也糧食大侈不顧其後俄則屈安窮矣大讀為太屈竭也安語助也猶言屈然窮矣安已解前是其所以不免於凍餓操瓢囊爲溝壑中瘠者也乞食羸痩於溝壑者言不知久逺生業故至於此也况夫先王之道仁義之統詩書禮樂之分乎為生業尚不能知况能知其逺大者分制也扶問反彼固天下之大慮也將為天下生民之屬長慮顧後而保萬世也其㳅長矣其温厚矣其功盛姚逺矣㳅古流字温猶足也言先王之道於生人其為温足也亦厚矣姚與遙同言功業之盛甚長逺也非熟脩為之君子莫之能知也熟甚也甚脩飾作為之君子也故曰短綆不可以汲深井之泉知不幾者不可與及聖人之言綆索也幾近也謂不近於習也夫詩書禮樂之分固非庸人之所知也故曰一之而可再也既知一則務之二有之而可久也不可中道而廢廣之而可通也知禮樂廣博則於事可通慮之而可安也思慮禮樂則無危懼反鈆察之而俞可好也鈆與㳂同循也既知禮樂之後却循察之愈可好而不厭俞音愈以治情則利利益也禮記曰故聖王所以治人之七情修十義捨禮何以治之以為名則榮以羣則和以獨則足知詩書禮樂羣居則和同獨處則自足樂意者其是耶樂意莫過於此夫貴為天子富有天下是人情之所同欲也然則從人之欲則勢不能容物不能贍也故先王案為之制禮義以分之以禮義分别上下也使有貴賤之等長幼之差知賢愚能不能之分皆使人載其事而各得其宜載行也任之也然後使慤禄多少厚薄之稱慤實也謂實其禄使當其才稱尺證反是夫羣居和一之道也故仁人在上則農以力盡田賈以察盡財百工以巧盡械器盡謂精於事察謂明其盈虚說文云有盛為械無盛為器士大夫以上至於公侯莫不以仁厚知能盡官職夫是之謂至乎各當其分雖貴賤不同然謂之至平也故或禄天下而不自以為多謂為天子以天下為禄也或監門御旅抱關擊柝而不自以為寡監門主門也御讀爲迓迓旅逆旅也抱闗門卒也擊柝擊木所以警夜者皆知其分故雖賤而不以為寡也故曰斬而齊枉而順不同而一夫是之謂人倫舊有此語引以喻貴賤雖不同不以齊一然而要歸於治也斬而齊謂彊斬之使齊若漢書之一切者枉而順雖枉曲不直然而歸於順也不同而一謂殊塗同歸也夫如此是人之倫理也詩曰受小共大共為下國駿䝉此之謂也詩殷頌長發之篇共執也駿大也䝉讀為龎厚也今詩作駿龎言湯執小玉大玉大厚於下國言下皆頼其德也荀子卷二欽定四庫全書荀子卷三唐楊倞註非相篇第五相視也視其骨狀以知吉凶貴賤也妄誕者多以此惑世時人或矜其狀貌而忽於務實故荀卿作此篇非之漢書刑法家有相人二十四篇相人古之人無有也學者不道也道說古者有姑布子卿姑布姓子卿名相趙襄子者或本無姑字今之世梁有唐舉相李斯蔡澤者相人之形狀顏色而知其吉凶妖祥世俗稱之古之人無有也學者不道也載三言者深非之也故相形不如論心論心不如擇術術道術也形不勝心心不勝術術正而心順之則形相雖惡而心術善無害為君子也形相雖善而心術惡無害為小人也君子之謂吉小人之謂凶故長短小大善惡形相非吉凶也古之人無有也學者不道也蓋帝堯長帝舜短文王長周公短仲尼長子弓短子弓蓋仲弓也言子者著其為師也漢書儒林傳馯臂字子弓江東人受易者也然馯臂傳易之外更無所聞荀卿子論說常與仲尼相配必非馯臂也馯音寒昔者衛靈公有臣曰公孫呂身長七尺靣長三尺焉廣三寸鼻目耳具而名動天下靣長三尺廣三寸言其狹而長甚也鼻目耳雖皆具而相去踈逺所以為異名動天下言天下皆知其賢或曰狹長如此不近人情恐文句誤脫也楚之孫叔敖期思之鄙人也杜元凱云期思楚邑名今弋陽期思縣鄙人郊野之人也突秃長左軒較之下而以楚霸突謂短髮可凌突人者故莊子說趙劒士蓬頭突􅁂長左左脚長也軒較之下而以楚霸言修文德不勞甲兵逺征伐也說文云軒曲輈也鄭注考工記云較兩輢較上出式者詩曰猗重較兮葉公子髙㣲小短瘠行若將不勝其衣葉公楚大夫沈尹氏之子食邑
