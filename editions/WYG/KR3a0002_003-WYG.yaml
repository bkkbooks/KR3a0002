front:
  text: 於葉名諸梁字子髙楚僣稱王其大夫稱公白公亦是也㣲細也葉音攝然白公之亂也令尹子西司馬子期皆死焉白公楚太子建之子平王之孫子西楚平王長庶子公子申子期亦平王子公子結葉公子髙入據楚誅白公定楚國如反手耳仁義功名善於後世故事不揣長不揳大不權輕重亦將志乎心耳揳與絜同約也謂約計其大小也絜户結反莊子匠石見櫟社樹絜之百圍權稱也輕重體之輕重也言不論形狀長短大小肥瘠唯在志意修飾耳長短小大美惡形相豈論也哉且徐偃王之狀目可瞻焉徐國名僣稱王其狀偃仰而不俯故謂之偃王周穆王使楚誅之瞻焉言不能俯視細物逺望纔見焉尸子曰徐偃王有筋而無骨仲尼之狀靣如蒙倛倛方相也其首䝉茸然故曰䝉倛子虗賦曰䝉公先驅韓侍郎云四目為方相兩目為倛倛音欺慎子曰毛嬙西施天下之至姣也衣之以皮倛則見之者皆走也周公之狀身如斷菑爾雅云木立死曰椔椔與菑同臯陶之狀色如削𤓰如削去皮之𤓰青綠色閎夭之狀靣無見膚閎夭文王臣在十亂之中言多􅁂髯蔽其膚傅說之狀身如植鰭植立也如魚之立也伊尹之狀靣無須麋麋與眉同禹跳湯偏尹子曰禹之勞十年不窺其家手不爪脛不生毛偏枯之病步不相過人曰禹步鄭注尚書大傳湯半體枯呂氏春秋曰禹通水濬川顔色黎黑步不相過也堯舜參牟子牟與眸同參牟子謂有二瞳之相參也史記曰舜目重瞳重瞳蓋堯亦然尹子曰舜兩眸子是謂重明作事成法出言成章當時傳聞今書傳亦難盡詳究所出矣從者將論志意比類文學邪直將差長短辨美惡而相欺傲邪從者荀卿門人問將論志意文學耶但以好醜相欺傲也古者桀紂長巨姣美天下之傑也筋力越勁百人之敵也姣好也倍萬人曰傑越過人也勁勇也然而身死國亡為天下大僇後世言惡則必稽焉僇與戮同稽考也後世言惡必考桀紂為證是非容貌之患也聞見之不衆論議之卑爾亦非以容貌害身言美惡皆非所患但以聞見不廣議論不髙故致禍耳今世俗之亂君鄉曲之儇子方言云儇疾也又曰慧也與喜而翾義同輕薄巧慧之子也儇火𤣥反莫不美麗姚冶奇衣婦飾血氣態度擬於女子說文曰姚美好貌冶妖竒衣珍異之衣婦飾謂婦人之飾言輕細也擬於女子言柔弱便僻也婦人莫不願得以為夫處女莫不願得以爲士士者未娶妻之稱易曰老婦得其士夫弃其親家而欲奔之者比肩並起然而中君羞以為臣中父羞以為子中兄羞以為弟中人羞以為友不必上智皆知惡也俄則束乎有司而戮乎大市犯刑法為有司所束縳也莫不呼天啼哭苦傷其今而後悔其始苦傷今之刑戮悔其始之所為是非容貌之患也聞見之不衆論議之卑爾然則從者將孰可也問從者形相與志意孰為益乎人有三不祥幼而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也言必有禍災也人有三必窮為上則不能愛下為下則好非其上是人之一必窮也鄉則不若偝則謾之是人之二必窮也鄉讀為向若如也謾欺毁也莫于反知行淺薄曲直有以縣矣然而仁人不能推知士不能明是人之三必窮也曲直猶能否也言智慮德行至淺薄其能否與人又相懸逺不能推讓明白之言不知已之不及也知音智行下孟反縣讀為懸人有此三數行者以為上則必危為下則必滅詩曰雨雪瀌瀌見晛聿消莫肯下遺式居婁驕此之謂也詩小雅角弓之篇今詩作見晛曰消盖聲之誤耳晛日氣也遺讀為隨婁歛也言雨雪瀌瀌然見日氣自消喻欲為善則惡自消矣幽王曾莫肯下隨於人用此居處歛其驕慢之過也人之所以為人者何已也已與以同問何以謂之人而貴於禽獸曰以其有辨也辨别也饑而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也不待學而知是禹桀之所同也然則人之所以為人者非特二足無毛也以其有辨也今夫猩猩形笑亦二足而毛也猩猩獸似人而能言出交趾形笑者能言笑也然而君子啜其羮食其胾胾臠也禽獸無辨故賤而食之胾測吏反故人之所以為人者非特以其二足而無毛也以其有辨也夫禽獸為父子而無父子之親有牝牡而無男女之别故人道莫不有辨辨莫大於分有上下親踈之分也分莫大於禮分生於有禮也禮莫大於聖王聖王則制禮者言其人存其政舉聖王有百吾孰法焉問聖王至多誰可為法故曰文久而息節族久而絶文禮文節制度也言禮文久則制度滅息宗族久則廢也守法數之有司極禮而褫褫解也有司世世相承守禮之法數至於極久亦下脫也易曰或錫之鞶帶終朝三禠之言此者以喻久逺難詳不如隨時興治禠直吏反故曰欲觀聖王之跡則於其粲然者矣後王是也後王近時之王也粲然明白之貌言近世明王之法則是聖人之跡也夫禮法所興以救當世之急故隨時設教不必獨拘於舊聞而時人以為君必用堯舜之道臣必行禹稷之術然後可斯惑矣孔子曰殷因於夏禮所損益可知也故荀卿深陳以後王為法而審其所貴君子焉司馬遷曰法後王者以其近已而俗相類議卑而易行彼後王者天下之君也舎後王而道土古譬之是猶舎己之君而事人之君也故曰欲觀千歳則審今日欲知億萬則審一二欲知上世則審周道欲知周道則審其人所貴君子謂已之君也審謂詳觀其道也故曰以近知逺以一知萬以㣲知明此之謂也夫妄人曰古今異情以其治亂者異道而衆人惑焉彼衆人者愚而無說陋而無度者也言其愚陋而不能辯說測度度徒洛反下同其所見焉猶可欺也而况於千世之傳也傳傳聞也妄人者門庭之間猶可誣欺焉而况於千世之上乎聖人何以不欺曰聖人者以已度者也以已意度古人之意古人不能欺亦不欺人也故以人度人以情度情以今之人情度古之人情既云欲惡皆同豈其治亂有異也以類度類類種類謂若牛馬也以說度功以言說度其功業也以道觀盡以道觀盡物之理儒效篇曰塗之百姓積善而全盡謂之聖人也古今一度也古今不殊盡可以此度彼安在其古今異情乎類不悖雖久同理言種類不乖悖雖久而理同今之牛馬與古不殊何至人而獨異哉故鄉于邪曲而不迷觀乎雜物而不惑以此度之以測度之道明之故向於邪曲不正之道而不迷雜物炫燿而不惑鄉讀為向五帝之外無傳人外謂已前也無傳人謂其人事跡後世無傳者非無賢人也久故也五帝之中無傳政非無善政也久故也中間也五帝少昊顓頊髙辛唐虞也禹湯有傳政而不若周之察也非無善政也久故也傳者久則論略近則論詳略則舉大詳則舉小略謂舉其大綱詳周備也愚者聞其略而不知其詳聞其詳而不知其大也惟聖賢乃能以略知詳以小知大也是以文久而滅節奏久而絶凡言不合先王不順禮義謂之姦言雖辯君子不聽公孫龍惠施鄧析之屬也法先王順禮義黨學者黨親比也然而不好言不樂言則必非誠士也言講說也誠士謂至誠好善之士故君子之於言也志好之行安之樂言之故君子必辯辯謂能談說也凡人莫不好言其所善而君子爲甚所善謂已所好尚也故贈人以言重於金石珠玉觀人以言美於黼黻文章觀人以言謂使人觀其言黼黻文章皆色之美者白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章聽人之言樂於鐘鼓琴瑟使人聽其言故君子之於言無厭無厭倦鄙夫反是好其實不恤其文但好其質而不知文飾若墨子之屬是以終身不免埤汙傭俗埤汙皆下也謂鄙陋也埤與痺音同渚水處謂之汙亦地之下者也汙一孤反故易曰括囊無咎無譽腐儒之謂也腐儒如杇腐之物無所用也引易以喻不談說者凡說之難以至髙遇至卑以至治接至亂以先王之至髙至治之道說末世至卑至亂之君所以為難也說音稅未可直至也逺舉則病繆近世則病傭未可直至言必在援引古今也逺舉上世之事則患繆妄下舉近世之事則患傭鄙也善者於是間也亦必逺舉而不繆近世而不傭與時遷徙與世偃仰緩急贏絀贏餘也贏絀猶言伸屈也府然若渠堰櫽括之於已也府與俯同就物之貌或讀為附渠堰所以制水櫽括所以制木君子制人亦猶此也曲得所謂焉然而不折傷言談説委曲皆得其意之所謂然而不折傷其道也故君子之度已則以繩接人則用抴抴牽引也度已猶正已也君子正已則以繩墨接人則牽引而致之言正已而馴致人也或曰抴當為拽抴揖也言如以揖擢進舟舩也度大各反抴以世反韓侍郎云抴者檠抴也匡弓弩之器也度已以繩故足以為天下法則矣接人用抴故能寛容因求以成天下之大事矣成事在衆故君子賢而能容罷罷弱不任事者音疲知而能容愚博而能容淺粹而能容雜夫是之謂兼術粹專一也兼術兼容之法詩曰徐方既同天子之功此之謂也詩大雅常武之篇言君子容物亦猶天子之同徐方也談說之術齊莊以涖之端誠以處之堅彊以持之分别以喻之譬稱以明之欣驩芬薌以送之寳之珍之貴之神之如是則說常無不受言談説之法如此人乃信之芬薌言至芳潔也神之謂自神異其説不敢慢也說音稅稱尺證反薌與香同雖不說人人莫不貴不説猶貴况其説之夫是之謂為能貴其所貴不使人賤之也傳曰唯君子為能貴其所貴此之謂也君子必辯凡人莫不好言其所善所善謂所好也而君子為甚焉是以小人辯言險而君子辯言仁也仁謂忠愛之道言而非仁之中也則其言不若其黙也其辯不若呐也呐與訥同或引禮記其言呐呐然非言而仁之中也則好言者上矣不好言者下也故仁言大矣起於上所以道於下正令是也道與導同正或爲政起於上所以忠於上謀救是也謀救謂嘉謀匡救此言談説之益不可以已如是也故君子之行仁也無厭無厭倦時志好之行安之樂言之故言所以好言說由此三者行如字君子必辯小辯不如見端端首見端不如見本分分上下貴賤之分小辯謂辯說小事則不如見端首見端首則不如見本分言辯說止於知本分而已小辯而察見端而明本分而理聖人士君子之分具矣此言能辯說然後聖賢之分具有小人之辯者有士君子之辯者有聖人之辯者不先慮不早謀發之而當成文而類言暗與理會成文理而不失其類謂不乖悖也居錯遷徙應變不窮錯致也居錯安居也錯于故反是聖人之辯者也先慮之早謀之斯須之言而足聽斯須發言已可聽也文而致實博而黨正是士君子之辯也文謂辯說之辭致至也黨與讜同謂直言也凡辯則失於虚詐博則失於流蕩故致實黨正爲重也聽其言則辭辯而無統無根本也用其身則多詐而無功上不足以順明王下不足以和齊百姓然而口舌之均噡唯則節蓋謂騁其口舌之辯也噡唯則節四字未詳或剰少錯誤耳足以為奇偉偃却之屬奇偉誇大也偃却猶偃仰即偃蹇也言姦雄口辯適足以自誇大偃蹇而已夫是之謂姦人之雄聖王起所以先誅也然後盜賊次之盜賊得變此不得變也變謂教之使自新也非十二子篇第六假今之世假如今之世也或曰假借也今之世謂戰國昬亂之世治世則姦言無所容故十二子借亂世以惑衆也飾邪說文姦言以梟亂天下梟與鴞同欺惑愚衆矞宇嵬𤨏矞與譎同詭詐也又余律反宇未詳或曰宇大也放蕩恢大也嵬謂為狂險之行也𤨏者謂為姦細之行也說文云嵬髙不平也今此言嵬者其行狂險亦猶山之髙不平也周禮大司樂云大傀烖則去樂鄭云傀猶怪也晏子春秋曰不以上為本不以民為憂内不恤其家外不顧其游夸言傀行自謹於飢寒命之曰狂僻之民明上之所禁也嵬當與傀義同音五每反又牛彼反使天下混然不知是非治亂之所存者有人矣混然無分别之貌有在也縱情性安恣睢禽獸之行恣睢矜放之貌言任情性所為而不知禮義則與禽獸無異故曰禽獸行睢香萃反不足以合文通治不足合於古之文義通於治道然而其持之有故其言之成理足以欺惑愚衆妄稱古之人亦有如此者故曰持之有故又其言論能成文理故曰言之成理足以欺惑愚衆也是它囂魏牟也它囂未詳何代人世本楚平王孫有田公它成豈同族乎韓詩外傳作范魏牟牟魏公子封於中山漢書蓺文志道家有公子牟四篇班固曰先在莊子莊子稱之今莊子有公子牟稱莊子之言以折公孫龍據即與莊子同時也又列子稱公子牟解公孫龍之言公孫龍平原君之客而張湛以為文侯子據年代非也說苑曰公子牟東行穰侯送之未知何者為定也忍情性綦谿利跂忍謂違驕其性也綦谿未詳盖與跂義同也利與離同離跂違俗自絜之貌謂離於物而跂足也莊子曰楊墨乃始離跂自以為得離力智反跂丘氏反苟以分異人為髙苟求分異不同於人以為髙行也不足以合大衆明大分既求分異則不足合大衆苟立小節故不足明大分大分謂忠孝之大義也然而其持之有故其言之成理足以欺惑愚衆是陳仲史鰌也已解上不知壹天下建國家之權稱不知齊一天下建立國家之權稱言不知輕重稱尺證反上功用大儉約而僈差等功用功力也大讀曰太言以公力為上而過儉約也僈輕也輕僈差等謂欲使君臣上下同勞苦也曾不足以容辨異縣君臣上下同等則其中不容分别而懸隔君臣也然而其持之有故其言之成理足以欺惑愚衆是墨翟宋鈃也宋鈃宋人與孟子尹文子彭蒙慎到同時孟子作宋牼牼與鈃同口莖反尚法而無法下修而好作尚上也言所著書雖以法為上而自無法以修立為下而好作偽言自相矛盾矣上則取聽於上下則取從於俗言苟順上下意也終日言成文典及紃察之則倜然無所歸宿紃與循同倜然踈逺貌宿止也雖言成文典若反覆紃察則疎逺無所歸也不可以經國定分取聽於上取從於俗故法度不立也然而其持之有故其言之成理足以欺惑愚衆是慎到田駢也田駢齊人也遊稷下著書十五篇其學本黄老大歸名法慎到已解上不法先王不是禮義不以禮義為是而好治怪說玩琦辯玩與翫同𤦺讀為奇異之竒甚察而不惠惠順辨而無用多事而寡功不可以為治綱紀然而其持之有故其言之成理足以欺惑愚衆是惠施鄧析也略法先王而不知其統言其大略雖法先王而不知體統統謂紀綱也猶然而材劇志大聞見雜博猶然舒遲貌禮記曰君子盖猶猶爾劇繁多也案往舊造說謂之五行案前古之事而自造其說謂之五行五行五常仁義禮智信是也甚僻違而無類幽隱而無說閉約而無解約結也解說也僻違無類謂乖僻違戾而不知善類也幽隱無說閉約無解謂其言幽隱閉結而不能自解說謂但言堯舜之道而不知其興作方略也荀卿常言法後王治當世而孟軻子思以為必行堯舜文武之道然後為治不知隨時設教救當世之弊故言僻違無類孟子曰管仲曾西之所不為解佳買反案飾其辭而祗敬之曰此真先君子之言也言自敬其辭說先君子孔子也子思唱之孟軻和之子思孔子之孫名伋字子思孟軻鄒人字子輿皆著書七篇世俗之溝猶瞀儒嚾嚾然不知其所非也溝讀為拘拘愚也猶猶豫不定之貌瞀儒暗也漢書五行志作區瞀與此義同嚾嚾喧嚻之貌謂爭辯也拘音寇又音抽遂受而傳之以為仲尼子游為兹厚於後世仲尼子游為此言垂德厚於後世也是則子思孟軻之罪也若夫緫方略齊言行壹統類而羣天下之英傑而告之以太古教之以至順緫領也統謂綱紀類謂比類大謂之統分别謂之類羣會合也奥窔之間簟席之上歛然聖王之文章具焉佛然平世之俗起焉西南隅謂之奥東南隅謂之窔言不出堂室之内也歛然聚集之貌佛讀為勃勃然興起貌窔一弔反則六説者不能入也十二子者不能親也無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容言王者之佐雖在下位非諸侯所能畜一國所能容或曰時君不知其賢無一君一國能畜者故仲尼所至輕去也成名況乎諸侯莫不願以為臣況比也言其所成之名比况於人莫與為偶故諸侯莫不願得以為臣或曰既成名之後則王者之輔佐也況諸侯莫不願得以爲臣乎末知其賢則無國能容也或曰況猶益也國語驪姬曰衆況厚之是聖人之不得勢者也仲尼子弓是也一天下財萬物財與裁同養長生民兼利天下通達之屬莫不服從通達之屬謂舟車所至人力所通者也六說者立息十二子者遷化遷而從化則聖人之得勢者舜禹是也今夫仁人也將何務哉上則法舜禹之制下則法仲尼子弓之義以務息十二子之說如是則天下之害除仁人之事畢聖王之跡著矣信信信也疑疑亦信也信可信者疑可疑者意雖不同皆歸於信貴賢仁也賤不肖亦仁也言而當知也黙而當亦知也故知黙猶知言也論語曰知之為知之不知為不知是知也當丁浪反故多言而類聖人也少言而法君子也言雖多而不流􅊺皆類於禮義是聖人制作者也少言而法謂不敢自造言説所言皆守典法也多少無法而流􅊺然雖辯小人也􅊺沉也流者不復返沈者不復出也故勞力而不當民務謂之姦事民務四民之務勞知而不律先王謂之姦心律法辯說譬諭齊給便利而不順禮義謂之姦說齊疾也給急也便利亦謂言辭敏捷也此三姦者聖王之所禁也知而險賊而神用智於險又賊害不測如神也為詐而巧巧於為詐言無用而辯言辯而無用也辯不惠而察惠順也辭辯不順道理不聦察也治之大殃也行辟而堅辟讀為僻飾非而好好飾非也玩姦而澤玩與翫同習姦而使有潤澤也言辯而逆古之大禁也逆者乖於常理知而無法騁其異見也知如字勇而無憚輕死察辯而操僻淫為察察之辯而操持淫僻之事操七刀反大而用之以前數事為大而用之也好姦而與衆好姦而與衆人共之謂使人同之也利足而迷苟求利足而迷惑不顧禍患也負石而墜謂申徒狄負石投河言好名以至此也亦利足而迷者之類也是天下之所弃也兼服天下之心髙上尊貴不以驕人在貴位不驕人聦明聖智不以窮人齊給速通不爭先人剛毅勇敢不以傷人不知則問不能則學雖能必讓然後為德然後為聖賢之德也遇君則脩臣下之義遇鄉則脩長幼之義在鄉黨之中也遇長則脩子弟之義遇友則脩禮節辭讓之義遇賤而少者則脩告導寛容之義無不愛也無不敬也無與人爭也恢然如天地之苞萬物如是則賢者貴之不肖者親之如是而不服者則可謂訞怪狡猾之人矣訞與妖同雖厠子弟之中刑及之而宜妖怪狡猾之人雖在家人子弟之中亦宜刑戮及之況公法乎詩云匪上帝不時殷不用舊雖無老成人尚有典刑曾是莫聽大命以傾此之謂也詩大雅蕩之篇鄭云老成人伊尹伊陟臣扈之屬也典刑常事故法也古之所謂士仕者厚敦者也合羣者也士仕謂士之入仕合謂和合羣衆也樂富貴者也樂其道也樂分施者也施或所宜反逺罪過者也逺于願反務事理者也務使事有條理羞獨富者也使家給人足也今之所謂士仕者汙漫者也賊亂者也汙漫已解在榮辱篇恣睢者也恣睢已解於上貪利者也觸抵者也恃權勢而忤人無禮義而唯權勢之嗜者也古之所謂處士者德盛者也能靜者也處士不仕者也易曰或出或處能靜謂安時處順也脩正者也知命者也著是者也明著其時是之事不使人疑其姦詐也今之所謂處士者無能而云能者也云能自言其能也慎子曰勁而害能則亂也云能而害無能則亂也蓋戰國時以言能為云能當時之語也無知而云知者也利心無足而佯無欲者也好利不知足而詐為無欲者也行偽險穢而彊髙言謹慤者也以不俗為俗以不合俗人自為其俗也離蹤而跂訾者也訾讀為恣離蹤謂離於俗而放蹤跂恣謂跂足違俗而恣其志志意皆違俗自髙之貌或曰蹤當為縰傳寫誤耳縱與纚同步也離縱謂離於俗而步去跂訾謂跂足自髙而訾毁於人離力智反跂丘弭反訾將此反士君子之所能不能為君子能為可貴不能使人必貴已可貴貴道德也能為可信不能使人必信已能為可用不能使人必用已可用謂才能也故君子恥不脩不恥見汙見汙為人所汙穢也恥不信不恥不見信恥不能不恥不見用是以不誘於譽不恐於誹虛譽不能誘誹謗不能動率道而行端然正已不為物傾側夫是之謂誠君子誠實也謂無虚偽也詩云温温恭人維德之基此之謂也已解在不苟篇士君子之容其冠進其衣逢其容良進謂冠在前也逄大也謂逢掖也良謂樂易也儼然壯然祺然蕼然恢恢然廣廣然昭昭然蕩蕩然是父兄之容也儼然矜莊之貌壯然不可犯之貌或當為莊祺然蕼然未詳或曰祺祥也吉也為安泰不憂懼之貌蕼當為肆謂寛舒之貌恢恢廣廣皆容衆之貌昭昭明顯之貌蕩蕩恢夷之貌其冠進其衣逢其容慤謹敬儉然恀然輔然端然紫然洞然綴綴然瞀瞀然是子弟之容也儉然自謙卑之貌多然恃尊長之貌爾雅曰恀恃也郭云江東呼母爲恀音紙輔然相親附之貌端然不傾倚之貌紫然未詳或曰與孳同柔弱之貌洞然恭敬之貌禮記曰洞洞乎其敬也綴綴然不乖離之貌謂相連綴也瞀瞀然不敢正視之貌吾語汝學者之嵬說學者為嵬行之形狀嵬已解於上其冠絻其纓禁緩其容簡連絻當為俛謂太向前而低俯也纓冠之繫也禁緩未詳或曰讀爲紟紟帶也言其纓大如帶而緩也簡連傲慢不前之貌紟其禁反連讀如往蹇來連之連填填然狄狄然莫莫然瞡瞡然瞿瞿然盡盡然盱盱然填填然滿足之貌狄讀爲趯跳躍之貌莫讀爲貊貊靜也不言之貌或動而跳躍或静而不言皆謂舉止無恒也瞡瞡未詳或曰瞡與規同規規小見之貌瞿瞿瞪視之貌盡盡極視盡物之貌盱盱張目之貌皆謂視瞻不平或太察也盱許于反酒食聲色之中則瞞瞞然瞑瞑然瞞瞞閉目之貌瞑瞑視不審之貌謂好恱之甚佯若不視也瞞莫于反瞑母丁反禮節之中則疾疾然訾訾然謂憎疾毁訾也勞苦事業之中則儢儢然離離然偷儒而罔無廉恥而忍謑音徯訽是學者之嵬也事業謂作業也儢儢不勉强之貌離離不親事之貌陸法言云儢心不力也音呂偷儒謂苟避事之勞苦也罔謂冈冐不畏人之言也謑訽謂詈辱也此一章皆明視之狀貌而辨善惡也今之所解或取聲韻假借或推儢爲錯誤因隨所見而通之也第作其冠祌禫其辭第作其冠未詳祌禫當作冲澹謂其言淡薄也禹行而舜趨是子張氏之賤儒也但宗聖人之威儀而已矣正其衣冠齊其顔色嗛然而終日不言是子夏氏之賤儒也嗛與慊同快也謂自得之貌終日不言謂務於沈黙史記樂毅與燕惠王書曰先王以為嗛於志也偷儒憚事無廉恥而耆飲食必曰君子固不用力是子游氏之賤儒也偷儒已解上耆與嗜同此皆言先儒性有所偏愚者效而慕之故有此弊也彼君子則不然佚而不惰勞而不僈雖逸而不懈惰雖勞而不弛慢宗原應變曲得其宜如是然後聖人也宗原根本也言根本及應變皆曲得其宜也仲尼篇第七仲尼之門人五尺之䜿子言羞稱乎五伯是何也曰然彼誠可羞稱也齊桓五伯之盛者也言盛者猶如此況其下乎伯讀為霸或曰伯長也為諸侯之長春秋傳曰王命内史叔興父䇿命晉侯為侯伯也前事則殺兄而爭國兄子糾也内行則姑姊妹之不嫁者七人閨門之内般樂奢汰般亦樂也汰侈也音太下同以齊之分奉之而不足分半也用稅賦之半也公羊傳曰師喪分焉外事則詐邾襲莒并國三十五詐邾未聞襲莒謂桓公與管仲謀伐莒未發爲東郭牙先知之是也并國三十五謂滅譚滅遂滅項之類其餘所未盡聞也其行事也若是其險汙淫汰也事險而行汚也行下孟反彼固曷足稱乎大君子之門哉若是而不亡乃霸何也曰於乎夫齊桓公有天下之大節焉夫孰能亡之於乎讀為嗚呼嘆美之聲大節謂節義也倓然見管仲之能足以託國也是天下之大知也倓安也安然不疑也大知謂知人之大也倓他坎反安忘其怒出忘其讐遂立以為仲父是天下之大决也安猶内也出猶外也言内忘忿恚之怒外忘射鉤之讎仲者夷吾之字父事之如父故號為仲父大决謂斷决之大者也立以為仲父而貴戚莫之敢妬也不敢妬其親宻與之髙國之位而本朝之臣莫之敢惡也髙子國子世為齊上卿今以其位與之本朝之臣謂舊臣也春秋傳管仲曰有天子之二守國髙在與之書社三百而富人莫之敢距也書社謂以社之戸口書於版圖周禮三十五家為社距與拒同敵也言齊之富人莫有敢敵管仲者也貴賤長少莫不秩秩焉從桓公而貴敬之是天下之大節也秩秩順序之貌諸侯有一節如是則莫之能亡也桓公兼此數節者而盡有之夫又何可亡也其霸也冝哉非幸也數也其術數可霸非為幸遇也仲尼之門人五尺之竪子言羞稱乎五霸是何也曰然彼非本政教也非致隆髙也致至極也非綦文理也非極有文章條理也非服人心也非以義服之鄉方略審勞佚鄉讀為向趍也審勞佚謂審知使人之勞佚也畜積脩鬭而能顛倒其敵者也畜積倉廪修戰鬬之術而能傾覆其敵也詐心以勝矣彼以讓飾爭依乎仁而蹈利者也為讓所以飾争非真讓也行仁所以蹈利非真仁也小人之傑也彼固曷足稱乎大君子之門哉前章言五霸救時故褒美之此章明王者之政故言其失孟子曰五霸者三王之罪人也彼王者則不然致賢而能以救不肖致彊而能以寛弱戰必能殆之而羞與之鬬必以義服不力服也委然成文以示之天下委然俯就之貌言俯就人使成文理以示天下也而暴國安自化矣有災繆者然後誅之有災怪繆戾者然後誅之非顛倒其敵也故聖王之誅也綦省矣省少也所景反文王誅四四謂密也阮也共也崇也詩曰密人不恭敢距大邦侵阮徂共春秋傳曰文王聞崇侯亂而伐之因壘而降史記亦説文王三征伐與此小異誅者討伐殺戮之通名武王誅二史記云武王斬紂與妲己尸子曰武王親射惡來之口親砟殷紂之頸手汙於血不温而食當此之時猶猛獸者也周公卒業周公終王業亦時有示征伐謂三監淮夷商奄也至於成王則安以無誅矣言其化行刑措也故道豈不行矣哉以此言之道豈不行人自不行耳故又以下事明之也文王載百里地而天下一所載之地不過百里而天下一以有道也桀紂舎之厚於有天下之勢而不得以匹夫老桀紂舎道雖有天下厚重之勢而不得如庶人夀終故善用之則百里之國足以獨立矣不善用之則楚六千里而爲讎人役善用謂善用道也讎人秦也楚懐王死於秦其子襄王為秦所制而役使之也故人主不務得道而廣有其勢是其所以危也持寵處位終身不厭之術論人臣處位可終身行之之術主尊貴之則恭敬而僔僔與撙同卑退也主信愛之則謹慎而嗛嗛與歉同不足也言不敢自滿也春秋榖梁傳曰一榖不升謂之嗛主專任之則拘守而詳謹守職事詳明法度主安近之則慎比而不邪謹慎親比於上而不回邪諂佞主䟽遠之則全一而不倍不以䟽逺而懷離二之心主損絀之則恐懼而不怨貴而不為夸夸奢侈也信而不處謙謙讀為嫌得信於主不處嫌疑間使人疑其作威福也任重而不敢專財利至則言善而不及也必將盡辭讓之義然後受善而不及如言已之善寡不合當此財利也福事至則和而理禍事至則靜而理理謂不失其道和而理謂不充屈静而理謂不隕穫也富則施廣貧則用節可貴可賤也可富可貧也可殺而不可使爲姦也君雖寵榮屈辱之終不可使為姦也是持寵處位終身不厭之術也雖在貧窮徒處之勢亦取象於是矣夫是之謂吉人徒處徒行或曰獨處也雖貧賤其所立志亦取法於此也詩曰媚兹一人應侯順德永言孝思昭哉嗣服此之謂也詩大雅下武之篇一人謂君也媚愛應當侯維服事也鄭云媚愛兹此也可愛乎武王能此順德謂能成其祖考之功也服事也明哉武王之嗣行祖考之事謂伐紂定天下引此者明臣事君亦猶武王之繼祖考也求善處大重理任大事大重謂大位也擅寵於萬乗之國必無後患之術莫若好同之好賢人與之同者也援賢博施除怨而無妨害之除怨不念舊惡能耐任之則慎行此道耐忍也慎讀為順言人有賢能者雖不欲用必忍而用之則順已所行之道耐乃代反能而不耐任有能者不忍急用之且恐失寵則莫若早同之推賢讓能而安隨其後如是有寵則必榮失寵則必無罪是事君者之寳而必無後患之術也或曰荀子非王道之書其言駁雜今此又言以術事君曰不然夫荀卿生於衰世意在濟時故或論王道或論霸道或論强國在時君所擇同歸於治者也若髙言堯舜則道必不合何以拯斯民於塗炭乎故反經合義曲成其道若得行其志治平之後則亦堯舜之道也又荀卿門人多仕於大國故戒以保身推賢之術與大雅既明且哲豈云異哉故知者之舉事也滿則慮嗛嗛不足也當其盈滿則思其後不足之時而先防之平則慮險安則慮危曲重其豫猶恐及其旤是以百舉而不陷也委曲重多而備豫之猶恐其及旤旤與禍同孔子曰巧而好度必節勇而好同必勝知而好謙必賢此之謂也巧者多作淫靡故好法度者必得其節勇者多凌物故好與人同者必勝之也愚者反是處重擅權則好專事而妬賢能抑有功而擠有罪志驕盈而輕舊怨抑傷之也擠報排也輕舊怨謂輕舊怨以􅈔嗇而不行施道乎上為重招權於下以妨害人雖欲無危得乎哉施道施惠之道欲重其威福故招權使歸於已是以位尊則必危任重則必廢擅寵則必辱可立而待也可炊而傹也炊與吹同傹當為僵言可以氣吹之而僵仆傹音竟是何也則墮之者衆而持之者寡矣墮許窺反天下之行術可以行於天下之術以事君則必通以為仁則必聖立隆而勿貳也仁謂仁人聖亦通也以事君則必通達以為仁則必有聖知之名者在於所立敦厚而專一也此謂可行天下之術也然後恭敬以先之忠信以統之慎謹以行之端慤以守之頓窮則疾力以申重之以敦厚不貳為本然後輔之以恭敬之屬頓謂困躓也疾力勤力也困危之時則尤加勤力而不敢怠惰申重猶再三也君雖不知無怨疾之心功雖甚大無伐德之色省求多功愛敬不勌如是則常無不順矣省少也少所求即多立功勞省所景反以事君則必通以為仁則必聖夫是之謂天下之術少事長賤事貴不肖事賢是天下之通義也有人也勢不在人上而羞為人下是姦人之心也志不免乎姦心行不免乎姦道而求有君子聖人之名辟之是猶伏而咶天救經而引其足也辟讀為譬咶與䑛同經縊也伏而䑛天愈益逺也救經而引其足愈益急也經音徑說必不行矣俞務而俞逺俞讀為愈故君子時屈則屈時伸則伸也勢在上則為上在下則為下必當其分安有勢不在上而羞為下之心哉
