body:
  text: 荀子卷三欽定四庫全書荀子卷四唐楊倞註儒效篇第八效功也大儒之效武王崩成王㓜周公屏成王而及武王以屬天下惡天下之倍周也屏蔽及繼屬續也屬之欲反履天下之籍籍謂天下之圖籍也聽天下之斷偃然如固有之而天下不稱貪焉偃然猶安然固有之謂如固合有此位也殺管叔虚殷國而天下不稱戾焉虚讀為墟戾暴也墟殷國謂殺武庚遷殷頑民于洛邑朝歌為墟也兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉左氏傳成鮮對魏獻子曰昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人皆舉親也與此數略同言四十人蓋舉成數又曰昔周公弔二叔之不咸故封建親戚以蕃周室管蔡郕霍魯衛毛聃郜雍曹滕畢原鄷郇文之昭也䢴晉應韓武之穆也凡蒋邢茅胙祭周公之𦙍也餘國名淺學難盡詳究教誨開導成王使諭於道而能揜迹於文武開導謂開通道逹揜襲也周公歸周周公所歸畿内之國亦名周春秋周公黒肩蓋其後也言周公自歸其國也反籍於成王而天下不輟事周然而周公北面而朝之待其固安之後北面為臣明攝政非為已也天子也者不可以少當也不可少頃當此位也不可以假攝為也周公所以少頃假攝天子之位蓋權宜以安周室也能則天下歸之不能則天下去之是以周公屏成王而及武王以屬天下惡天下之離周也成王冠成人周公歸周反籍焉明不滅主之義也周公無天下矣鄕有天下今無天下非擅也鄕讀為向下同擅與禪同言非禪譲與成王也成王鄕無天下今有天下非奪也變勢次序節然也節期也權變次序之期如此也故以枝代主而非越也枝枝子周公武王之弟故曰枝主成王也以弟誅兄而非暴也謂殺管叔管叔周公之兄也君臣易位而非不順也時不得不然故易位非為不順因天下之和遂文武之業明枝主之義抑亦變化矣天下厭然猶一也厭然順從之貌一渉反非聖人莫之能為夫是之謂大儒之效秦昭王問孫卿曰儒無益於人之國漢宣帝名詢劉向編録故以荀卿為孫卿孫卿子曰儒者法先王隆禮義謹乎臣子而致貴其上者也謹乎臣子謂使不敢為非致極也人主用之則勢在夲朝而宜言儒者得權勢在夲朝則事皆合宜不用則退編百姓而慤必為順下矣必不為悖亂也雖窮困凍餧必不以邪道為貪無置錐之地而明於持社稷之大義嗚呼而莫之能應然而通乎財萬物養百姓之經紀嗚呼歎辭也財與裁同雖歎其莫已知無應之者而亦不怠惰困棄常通於裁萬物養百姓之綱紀也勢在人上則王公之材也在人之上謂為人君也在人下則社稷之臣國君之寳也雖隱於窮閻漏屋人莫不貴之道誠存也窮閻窮僻之處閻里門也漏屋弊屋漏雨者也仲尼将為司寇魯司寇也沈猶氏不敢朝飲其羊公愼氏出其妻慎潰氏踰境而徙皆魯人家語曰沈猶氏常朝飲其羊以詐市人公慎氏妻淫不制慎潰氏奢侈踰法魯之鬻六畜者飾之以儲價魯之粥牛馬者不豫賈必蚤正以待之者也豫賈定為高價也粥牛馬者不敢高價言仲尼必先正其身以待物故得從化如此賈讀為價居於闕黨闕黨之子弟罔不分有親者取多居謂孔子閑居闕黨之子弟罔不分均有無於分均之官有父母者取多也孝悌以化之也由孔子以孝悌化之儒者在夲朝則美政在下位則美俗儒之為人下如是矣王曰然則其為人上何如孫卿曰其為人上也廣大矣志意定乎内禮節脩乎朝法則度量正乎官忠信愛利形乎下官百官形見也行一不義殺一無罪而得天下不為也此君義信乎人矣通於四海則天下應之如讙以君義通於四海故應之如讙讙喧也言聲齊應之也是何也則貴名白而天下治也貴名謂儒名可貴白明顯之貎故近者歌謳而樂之逺者竭蹶而趨之竭蹶顚倒也逺者顚倒趨之如不及然四海之内若一家通逹之屬莫不從服夫是之謂人師通逹之屬謂舟車所至人力所通之處也師長也言儒者之功如此故可以為人師長也詩曰自西自東自南自北無思不服此之謂也詩大雅文王有聲之篇引此以明天下皆歸之夫其為人下也如彼其為人上也如此何謂其無益於人之國也昭王曰善先王之道仁人隆也比中而行之先王之道謂儒學仁人之所崇高也以其比類中道而行之不為詭異之説不高不下使賢不肖皆可及之也曷謂中曰禮義是也道者非天之道非地之道人之所以道也重説先王之道非隂陽山川怪異之事是人所行之道也君子之所道也君子之所謂賢者非能徧能人之所能之謂也君子之所謂知者非能徧知人之所知之謂也君子之所謂辯者非能徧辯人之所辯之謂也君子之所謂察者非能徧察人之所察之謂也有所正矣苟得其正不必徧能或曰正當為止言止於禮義相高下視墝肥序五種君子不如農人相視也高下原隰也墝薄田也五種黍稷豆麥麻謂不失次序各當土宜也通財貨相美惡辨貴賤君子不如賈人視貨物之美惡辨其貴賤也賈與估同設規矩陳繩墨便備用君子不如工人便備用謂精巧便於備用不恤是非然不然之情以相薦撙以相恥怍君子不若惠施鄧析也薦藉也謂相蹈籍撙抑皆謂相陵駕也怍慙也若夫謫徳而定次謫與商同古字商度其徳而定位次夲或亦多作譎譎與决同謂斷决其徳故下亦有决徳而定次也量能而授官使賢不肖皆得其位能不能皆得其官任使各當其才萬物得其宜事變得其應慎墨不得進其談惠施鄧析不敢竄其察竄隠匿也言二子之察無所逃匿君子皆識也言必當理事必當務是然後君子之所長也凡事行有益於理者立之行下孟反無益於理者廢之夫是之謂中事凡知説有益於理者為之無益於理者舎之夫是之謂中説事行失中謂之姦事知説失中謂之姦道姦事姦道治世之所棄而亂世之所從服也若夫充虚之相施易也充實也施讀曰移移易謂使實者虚虚者實堅白同異之分隔也以堅白異同之言相分别隔異同異已解上也是聦耳之所不能聽也明目之所不能見也辯士之所不能言也雖有聖人之知未能僂指也僂疾也言雖聖人亦不可疾速指陳僂力主反公羊傳曰夫人不僂何休曰僂疾也齊人言也不知無害為君子知之無損為小人工匠不知無害為巧君子不知無害為治君子卿大夫也王公好之則亂法百姓好之則亂事事謂作業而狂惑戇陋之人乃始率其羣徒辯其談説明其辟稱老身長子不知惡也戇愚也辟音譬稱尺證反身老子長言終身不知惡之也夫是之謂上愚有偏僻之見非昧然無知然亦不免於愚故曰上愚曾不如好相雞狗之可以為名也有恵施鄧析之名尚不如相雞狗之名也詩曰為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也詩小雅何人斯之篇毛云蜮短狐也靦姡也鄭云使汝為鬼為蜮則汝誠不可得見也姡然有面目汝乃人也人相視無有極時終必與汝相見也引此以喻狂惑之人也我欲賤而貴愚而智貧而富可乎曰其唯學乎彼學者行之曰士也彼為儒學者能行則為士也士者脩立之稱敦慕焉君子也敦厚慕之知之聖人也知之謂通於學也於事皆通則與聖人無異也上為聖人下為士君子孰禁我哉為學之後則誰能禁我使不為聖人士君子也鄕也混然塗之人也俄而並乎堯禹豈不賤而貴矣哉混然無所知之貎並比也鄕音向塗與途同鄕也效門室之辨混然曾不能决也效白辨别也向者明白門室之别異猶不能决言所知淺也俄而原仁義分是非圖廻天下於掌上而辯白黒豈不愚而知矣哉原夲也謂知仁義之夲圖謀也廻轉也言圖謀運轉天下之事如在掌上也鄕也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉胥靡刑徒人也胥相靡繫也謂鏁相聮相繫漢書所謂鋃鐺者也舉皆也顔師古曰聮繫使相隨而服役之猶今囚徒以鏁連枷也今有人於此㞕然藏千溢之寳雖行貸而食人謂之富矣㞕然雜碎衆多之貎行貸行乞也貸士得反彼寳也者衣之不可衣也下衣於既反言已為衣則不可衣著食之不可食也賣之不可僂售也僂疾然而人謂之富何也豈不大富之器誠在此也喻學者雖未得衣食亦猶藏千金之寳也是杅杅亦富人已豈不貧而富矣哉杅杅即于于也自足之貌荘子曰聽居居視于于也故君子無爵而貴無禄而富不言而信不怒而威窮處而榮獨居而樂豈不至尊至富至重至嚴之情舉積此哉舉皆也此儒學也其情皆在此故人尊
