  hash: sha256:adff0166a2f6a97a411c858da24f45fe65c1e742e6322e224eca7737de8534e7
body:
  text: 唐楊倞註正名篇第二十二是時公孫龍惠施之徒亂名改作以是為非故作正名篇尹文子曰形以定名名以定事事以驗名察其所以然則形名之與事物無所隱其理矣名有三科一曰命物之名方圓白黒是也二曰毁譽之名善惡貴賤是也三曰况謂之名賢愚愛憎是也後王之成名後之王者有素定成就之名謂舊名可法効者也刑名從商爵名從周文名從禮商之刑法未聞康誥曰殷罰有倫是亦言殷刑之允當也爵名從周謂五等諸侯及三百六十官也文謂節文威儀禮即周之儀禮也散名之加於萬物者則從諸夏之成俗曲期成俗舊俗方言也期㑹也曲期謂委曲期㑹物之名者也逺方異俗之鄉則因之而為通逺方異俗名之乖異者則因其所名遂以為通而不改作也散名之在人者舉名之分散在人者生之所以然者謂之性人生善惡故有必然之理是所受於天之性也性之和所生精合感應不事而自然謂之性和隂陽冲和氣也事任使也然人之性和氣所生精合感應不使而自然言其天性如此也精合謂耳目之精靈與聞見之物合也感應謂外物感心而來應也性之好惡喜怒哀樂謂之情人性感物之後分為此六者謂之情情然而心為之擇謂之慮情雖無極心擇可否而行謂之慮也心慮而能為之動謂之偽偽矯也心有選擇能動而行之則為不矯拂其本性也慮積焉能習焉而後成謂之偽心雖能動亦在積久習學然後能矯其本性也正利而為謂之事為正道之利則謂之事業謂商農工賈之事也正義而為謂之行苟非正義則謂之奸邪行下孟反所以知之在人者謂之知知有所合謂之智知之在人者謂在人之心有所知者知有所合謂所知能於合物也知所以能之在人者謂之能能當為耐古字通也耐謂堪任其事耐乃來乃代二反性傷謂之病傷於天性不得其所節遇謂之命節時也當時遇謂之命命者知天所命然也是散名之在人者也是後王之成名也略舉此上事是散名之在人者而後王可因襲成就素定之名也而或者乃為堅白之説以是為非斯亂名之尤者也故王者之制名名定而實辨道行而志通則慎率民而一焉道謂制名之道志通言可曉也禮記曰黄帝正名百物以明民慎率民而一焉言不敢以異端改作故析辭擅作名以亂正名使民疑惑民多辯訟則謂之大姦其罪猶為符節度量之罪也新序曰子産决鄧析教民之難約大獄袍衣小獄鶉袴民之獻袍衣鶉袴者不可勝數以非為是以是為非鄭國大亂民口讙譁子産患之於是討鄧析而僇之民乃服是非乃定是其類也故其民莫敢為竒辭以亂正名故其民慤慤則易使易使則公其民莫敢為竒辭以亂正名故一於道法而謹於循令矣如是則其迹長矣迹王者所立之迹也下不敢亂其名畏服於上故迹長也長丁丈反迹長功成治之極也是謹於守名約之功也謹嚴也約要約今聖王没名守慢竒辭起名實亂是非之刑不明則雖守法之吏誦數之儒亦皆亂也竒辭亂實故法吏迷其所守偏儒疑其所習若有王者起必將有循於舊名有作於新名名之善者循之不善者作之故孔子曰必也正名乎然則所為有名與所縁有同異與制名之樞要不可不察也樞自也樞要大要總名也物無名則不可分辨故因而有名也名不可一貫故因耳目鼻口而制同異又不可常别雖萬物萬殊有時欲之舉其大綱故制為名之樞要謂若謂之禽知其二足而羽謂之獸知其四足而毛既為治在正名則此三者不可不察而知其意也異形離心萬物之形各異則分離人之心言人心知其不同也此已下覆明有名之意交喻異物名實𤣥紐𤣥深隱也紐結也若不為分别立名使物物而交相譬喻之則名實深隠紛結難知也貴賤不明同異不别如是則志必有不喻之患而事必有困廢之禍故知者為之分别制名以指實無名則物雜亂故智者為之分辨制名所以指明實事也上以明貴賤下以辨同異貴賤明同異别如是則志無不喻之患事無困廢之禍此所為有名也有名之意在此然則何縁而以同異設問覆明同異之意也曰縁天官天官耳鼻口心體也謂之官言各有所司主也縁天官言天官謂之同則同謂之異則異也凡同類同情者其天官之意物也同故比方之疑似而通是所以共其約名以相期也同類同情謂若天下之馬雖白黑小大不同天官意想其同類所以共其省約之名以相期會而命之名為制名也形體色理以目異形體形狀也色五色也理文理也言萬物形體色理以目别異之而制名也聲音清濁調竽竒聲以耳異清濁宫徴之屬調竽謂調和笙竽之聲也竽笙類所以導衆樂者也不言革木之屬而言竽者或曰竽八音之首故黄帝使伶倫取竹作筦是竹為音聲之始莊子天籟地籟亦其義也竒竒異也竒聲萬物衆聲之異者也甘苦鹹淡辛酸竒味以口異竒味衆味之異者也香臭芬鬱腥臊洒酸竒臭以鼻異芬花草之香氣也鬱腐臭也禮記曰烏皫色而沙鳴鬱洒未詳酸暑浥之酸氣也竒臭衆臭之異者氣之應鼻者為臭故香亦謂之臭禮記曰皆佩容臭或曰洒當為漏篆文稍相似因誤耳禮記曰馬黒脊而般臂漏鄭音螻螻蛄臭者也疾養凔熱滑鈹輕重以形體異疾痛也養與癢同凔寒也滑與汩同鈹與披同皆壞亂之名或曰滑如字鈹當為鈒傳寫誤耳與澁同輕重謂分銖與鈞石也此皆在人形體别異之而立名也凔初亮反又楚陵反說故喜怒哀樂愛惡欲以心異說讀為脫誤也脫故猶律文之故誤也心有徴知徴召也言心能召萬物而知之徴知則縁耳而知聲可也縁目而知形可也縁因也以心能召知萬物故可以因耳而知聲因目而知形為之立名心雖有知不因耳目亦不可也然而徴知必將待天官之當簿其類然後可也天官耳目也當主也丁浪反簿書也當簿謂如各主當其簿書不雜亂也類謂可聞之物耳之類可見之物目之類言心雖能召所知必將任使耳目令各主掌其類然後可也言心亦不能自主之也五官簿之而不知心徴之而無說則人莫不然謂之不知此所縁而以同異也五官耳目鼻口心也五官能主之而不能知心能召而知之若又無説則人皆謂之不知也以其如此故聖人分别因立同異之名使人曉之也然後隨而命之既分同異之後然後隨所名而命之此已下覆明制名樞要之意也同則同之異則異之同類則同名異類則異名單足以喻則單單不足以喻則兼單物之單名也兼復名也喻曉也謂若止喻其物則謂之馬喻其毛色則謂之白馬黄馬之比也單與兼無所相避則共雖共不為害矣謂單名復名不可相避者則雖共同其名若單名謂之馬萬馬同名復名謂之白馬亦然雖共不害於分别也知異實者之異名也故使異實者莫不異名也不可亂也知謂人心知之異實者異名則不亂也謂若牛與馬為異實也猶使異實者莫不同名也恐異實異名卒不可徧舉故猶使異實者有時而同一名也或曰異實當為同實言使異實者異名其不可相亂猶如使同實者莫不同名也故萬物雖衆有時而欲徧舉之故謂之物物也者大共名也推而共之共則有共至於無共然後止推此共名之理則有共至於無共言自同至於異也起於總謂之物散為萬名是異名者本生於别同名者也有時而欲徧舉之故謂之鳥獸鳥獸也者大别名也推而别之别則有别至於無别然後止言自異至於同也謂總其萬名復謂之物是同名者生於欲都舉異名也言此者所以别異名同名之意名無固宜約之以命約定俗成謂之宜異於約則謂之不宜名無固宜言名本無定也約之以命謂立其約而命之若約為天則人皆謂之天也名無固實約之以命實約定俗成謂之實名實名以名實各使成言語文辭謂若天地日月之比也名有固善徑易而不拂謂之善名徑疾平易而不違拂謂易曉之名也即謂呼其名遂曉其意不待訓解者拂音佛物有同狀而異所者謂若兩馬同狀各在一處之類也有異狀而同所者謂若老㓜異狀同是一身也蠶蛾之類亦是也可别也而為異所者雖可合謂之二實即謂兩馬之類名雖可合同謂之馬其實二也狀變而實無别而為異者謂之化有化而無别謂之一實狀雖變而實可别為異所則謂之化化者改舊形之名若田鼠化為鴽之類雖有化而無别異故謂之一實言其實一也此事之所以稽實定數也稽考其實而定一二之數也此制名之樞要也此皆明制名之大意是其樞要後王之成名不可不察也此三者制名之實後王可因其成名而名之故不可不察也見侮不辱聖人不愛己殺盗非殺人也此惑於用名以亂名者也見侮不辱宋子之言也聖人不愛已未聞其説似莊子之意殺盗非殺人亦見莊子宋子言見侮不辱則使人不鬭或言聖人不愛已而愛人莊子又云殺盗賊不為殺人之言此三者徒取其名不究其實是惑於用名亂正名也驗之所以為有名而觀其熟行則能禁之矣驗其所為有名本由不喻之患困廢之禍因觀見侮不辱之説精熟可行與否則能禁也言必不可行也山淵平情欲寡芻豢不加甘大鐘不加樂此惑於用實以亂名者也山淵平即莊子云山與澤平也情欲寡即宋子云人之情欲寡也芻豢不加甘大鐘不加樂墨子之説也古人以山為髙以泉為下原其實亦無定但在當時所命耳後世遂從而不改爾亂名之人既以髙下是古人之一言未必物之實也則我以山泉為平奚為不可哉占人言情欲多我以為寡芻豢甘大鐘樂我盡以為不然亦可也此惑於用實本無定以亂古人之舊名也驗之所縁無以同異而觀其熟調則能禁之矣驗其所縁同異本由物一貫則不可分别故定其名而别之今山淵平之説以髙為下以下為髙若觀其精熟得調理與否則能禁惑於實而亂名也非而謁楹有牛馬非馬也此惑於用名以亂實者也非而謁楹有牛未詳所出馬非馬是公孫龍白馬之説也白馬諭曰言白所以命色也馬所以命形也色非形形非色故曰白馬非馬也是惑於形色之名而亂白馬之實也驗之名約以其所受悖其所辭則能禁之矣名約即名之樞要也以用也悖違也所受心之所是所辭心之所非驗其名之大要本以稽實定數今馬非馬之説則不然若用其心之所受者為其所辭者則能禁之也凡邪説辟言之離正道而擅作者無不類於三惑者矣辟讀為僻故明君知其分而不與辯也明君守聖人之名分不必亂名辨説是非也夫民易一以道而不可與其故故事也言聖人謹守名噐以道一民不與之共事共則民以他事亂之故老子曰國之利噐不可以示人也故明君臨之以勢道之以道道逹之以正道申之以命章之以論禁之以刑故其民之化道也如神辯勢惡用矣哉申重也章明也論謂先聖格言但用此道馭之不必更用辨勢也辯勢謂説其所以然也今聖王没天下亂姦言起君子無勢以臨之無刑以禁之故辯説也荀卿自述正名及亦説之意也實不喻然後命命不喻然後期期不喻然後説説不喻然後辯命謂以名命之也期㑹也言物之稍難名命之不喻者則以形狀大小㑹之使人易曉也謂若白馬但言馬則未喻故更以白㑹之若是事多㑹亦不喻者則説其所以然若説亦不喻者則反覆辯明之也故期命辯説也者用之大文也而王業之始也無期命辯説則萬事不行故為用之大文飾王業之始在於正名故曰王業之始也名聞而實喻名之用也名之用本在於易知也累而成文名之麗也累名而成文辭所以為名之華麗詩書之言皆是也或曰麗同配偶也用麗俱得謂之知名淺與深俱不失其所則為知名也名也者所以期累實也名者期於累數其實以成言語或曰累實當為異實言名者所以期於使實各異也辭也者兼異實之名以論一意也辭者説事之言辭兼異實之名謂兼數異實之名以成言辭猶若元年春王正月公即位兼説亡實之名以論公即位之一意也辯説也者不異實名以喻動静之道也動静是非也言辯説者不唯兼異常實之名所以喻是非之理辭者論一意辨者明兩端者也期命也者辯説之用也期謂委曲為名以㑹物也期與命所以為辯説之用辯説也者心之象道也辯説所以為心想象之道故心有所明則辯説也心也者道之工宰也工能成物宰能生物心之於道亦然也道也者治之經理也經常也理條貫也言道為理國之常法條貫也心合於道説合於心辭合於説言經為説成文為辭謂心能知道説能合心辭能成言也正名而期質請而喻辯異而不過推類而不悖聽則合文辯則盡故正道而辯姦猶引繩以持曲直是故邪説不能亂百家無所竄正名而期謂正其名以㑹物使人不惑也質物之形質質請而喻謂若形質自請其名然因而喻知其實也辯異而不過謂足以别異物則已不過説也推類而不悖謂推同類之物使共其名不使乖悖也聼則合文辯則盡故謂聼它人之説則取其合文理者自辯説則盡其事實也正道謂正名之道持制也竄匿也百家無所隱竄言皆知其姦詐也有兼聽之明而無奮矜之容有兼覆之厚而無伐德之色說行則天下正說不行則白道而𠖇窮是以聖人之辯説也是時百家曲説皆競自矜伐故述聖人辯説雖兼聽兼覆而無奮矜伐德之色也白道明道也𠖇幽隱也冥窮謂退而窮處也詩曰顒顒卬卬如珪如璋令聞令望豈弟君子四方為綱此之謂也詩大雅卷阿之篇顒顒體貎敬順也卬卬志氣髙朗也辭讓之節得矣長少之理順矣忌諱不稱祅辭不出以仁心説以學心聽以公心辯以仁心説謂務於開導不騁辭辯也以學心聽謂悚敬而聽它人之説不爭辯也以公心辯謂以至公辯它人之説是非也不動乎衆人之非譽不以衆人是非而為之動但自正其辭説不治觀者之耳目其所辯説不求夸眩於衆人也不賂貴者之權勢不為貨賂而移貴者之權勢也不利傳辟者之辭利謂恱愛之也辟讀為僻故能處道而不貳吐而不奪利而不流貴公正而賤鄙争是士君子之辯説也吐而不奪謂吐論人人不能奪利或為和詩曰長夜漫兮永思騫兮大古之不慢兮禮義之不愆兮何恤人之言兮此之謂也逸詩也慢謂慢慢長夜貌騫咎也引此以明辯說得其正何憂人之言也君子之言涉然而精俛然而類差差然而齊彼正其名當其辭以務白其志義者也渉然深入貌俛然俯就貌謂俯近於人皆有綂類不虚誕也差差不齊貌謂論列是非似若不齊然終歸於齊一也當丁浪反彼名辭也者志義之使也足以相通則舍之矣通謂得其理使所吏反故名足以指實辭足以見極則舍之矣極中也本也見賢遍反外是者謂之訒是君子之所棄而愚者拾以為已寳訒難也過於志義相通之外則是務為難説耳君子不用故愚者之言芴然而粗嘖然而不類誻誻然而沸芴與忽同忽然無根本貌粗踈畧也嘖争言也助革反或曰與􅄨同深也誻誻多言也謂愚者言淺則踈畧深則無統類又言誻誻然沸騰也彼誘其名眩其辭而無深於其志義者也誘誑也但欺誑其名而不正眩惑其辭而不實乂不深明於志義相通之理故窮藉而無極甚勞而無功貪而無名藉踐履也才夜反謂踐履於無極之地貪而無名謂貪於立名而實無名也故知者之言也知讀為智慮之易知也行之易安也持之易立也成則必得其所好而不遇其所惡焉愚者反是詩曰為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也詩小雅何人斯之篇毛云蜮短狐也靦姡也鄭云使女為鬼為蜮則女誠不可得見姡然有面目女乃人也人相視無有極時終必與安相見作此歌求女之情女之情展轉極於是也凡語治而待去欲者無以道欲而困於有欲者也凡言治待使人盡去欲然後為治則是無道欲之術而反為有欲者所困也凡語治而待寡欲者無以節欲而困於多欲者也若待人之寡欲然後治之則是無節欲之術而反為多欲者所困故能道欲則欲自去矣能節欲則欲自寡矣有欲無欲異類也生死也非治亂也二者異類如生死之殊非治亂所繫治亂所繫在於道欲則治不道欲則亂也欲之多寡異類也情之所也非治亂也情之所言人情必然之所也治亂所繫在節欲則治不節欲則亂不在欲之多寡也欲不待可得而求者從所可凡人之情欲雖未可得以有欲之意及至求之時則從其所可得也欲不待可得所受乎天也求者從所可受乎心也所受乎天之一欲制於所受乎心之多固難類所受乎天此一節未詳或恐脱誤耳或曰當為所受乎天之一欲制於所受乎心之計其餘皆衍字也一欲大凡人之情欲也言所受乎天之大欲皆制節於所受心之計度度心之計亦受於天故曰所受人之所欲生甚矣人之所惡死甚矣然而人有從生成死者非不欲生而欲死也不可以生而可以死也此明心制欲之義故欲過之而動不及心止之也動謂作為也言欲過多而所作為不及其欲由心制止之也心之所可中理則欲雖多奚傷於治所可謂心以為可也言若心止之而中理欲雖多無害於治也欲不及而動過之心使之也心之所可失理則欲雖寡奚止於亂心使之失理則欲雖寡亦不能止亂故治亂在於心之所可亡於情之所欲明在心不在欲不求之其所在而求之其所亡雖曰我得之失之矣所在心也所亡欲也性者天之就也情者性之質也欲者情之應也以所欲以為可得而求之情之所必不免也性者成於天之自然情者性之質體欲又情之所應所以人必不免於有欲也以為可而道之知所必出也心以欲為可得而道逹之智慮必出於此也故雖為守門欲不可去夫人各有心故雖至賤亦不能去欲也性之具也雖為天子欲不可盡具全也若全其性之所欲雖為天子亦不能盡秦皇漢武之比也欲雖不可盡可以近盡也以用也近盡近於盡欲也言天子雖不可盡欲若知道則用可近盡而止之不使故肆之也欲雖不可去求可節也雖至賤亦不可去欲若知道則求節欲之道而為之也所欲雖不可盡求者猶近盡欲雖不可去所求不得慮者欲節求也為貴賤之謀慮皆在節其所求之欲也道者進則近盡退則節求天下莫之若也道謂中和之道儒者之所守也進退亦謂貴賤也道者貴則可以知近盡賤則可以知節求天下莫及之也凡人莫不從其所可而去其所不可知道之莫之若也而不從道者無之有也知節欲無過於道則皆從道也假之有人而欲南無多而惡北無寡豈為夫南者之不可盡也離南行而北走也哉有人欲徃南而惡徃北也欲南無多謂南雖至多猶欲之也惡北無寡謂北雖至寡猶惡之也言此人既欲南而惡北豈為夫南之不可得盡因肯捨南而走北乎今人所欲無多所惡無寡豈為夫所欲之不可盡也離得欲之得之道而取所惡也哉今夫人情欲雖至多猶欲之惡雖至寡猶惡之豈為欲之不可得盡因肯取所惡哉言聖人以道節欲則各安其分矣而宋墨之徒不喻斯理而彊令去欲寡欲此何異使之離南而北走捨欲而取惡必不可得也故可道而從之奚以損之而亂可道合道也損減也言若合道則從之奚以損亂而過此也不可道而離之奚以益之而治不合道則離之奚以益治而過此此明上合道雖為有欲之説亦可從之不合道雖為去欲之説亦可離之也故知者論道而已矣小家珍説之所願皆衰矣知治亂者論合道與不合道而已矣不在於有欲無欲也能知此者則宋墨之家自珍貴其説願人之去欲寡欲者皆衰矣凡人之取也所欲未嘗粹而來也其去也所惡未嘗粹而徃也故人無動而不可以不與權俱粹全也凡人意有所取其欲未嘗全來意有所去其惡未嘗全去皆所不適意也權者秤之權所以知輕重者也能權變適時故以喻道也言人之欲惡常難適意故其所舉動而不可不與道俱不與道俱則惑於欲惡矣故逹道者不戚戚於貧賤不汲汲於富貴故能遣夫得䘮欲惡不以介懷而欲自節矣衡不正則重懸於仰而人以為輕輕懸於俛而人以為重此人所以惑於輕重也衡枰之衡也不正謂偏舉也衡若均舉之則輕重等而平矣若偏舉之則重懸於俛而猶未平也遂以此定輕重是惑也權不正則禍託於欲而人以為福福託於惡而人以為禍此亦人所以惑於禍福也權不正謂不知道而偏見如秤之權不正者也禍託於欲謂無德而禄因以為福不知禍不旋踵也福託於惡謂若有才未偶因以為禍不知先號後笑也言不知道則惑於倚伏之理也道者古今之正權離道而内自擇則不知禍福之所託道能知禍福之正如權之知輕重之正離權則不知輕重離道則不知禍福也易者以一易一人曰無得亦無䘮也易謂以物相易以一易兩人曰無䘮而有得也以兩易一人曰無得而有䘮也計者取所多謀者從所可以兩易一人莫之為明其數也從道而出猶以一易兩也奚䘮從道則無所䘮儒術是也離道而内自擇是猶以兩易一也奚得離道則無所得宋墨是也其累百年之欲易一時之嫌然且為之不明其數也累積也嫌惡也此謂不以道求富貴終遇禍也有甞試深觀其隱而難其察者有讀為又雖隱而難察以下四事觀之則可知也志輕理而不重物者無之有也理為道之精微外重物而不内憂者無之有也行離理而不外危者無之有也外危而不内恐者無之有也心憂恐則口銜芻豢而不知其味耳聽鐘鼓而不知其聲目視黼黻而不知其狀輕煖平簟而體不知其安故嚮萬物之羙而不能嗛也嚮讀為享獻也謂受其獻也嗛足也快也史記樂毅曰先王以為嗛於志嗛口簟反假而得問而嗛之則不能離也假或有人問之蹔以為足其意終亦不能離於不足也故嚮萬物之羙而盛憂兼萬物之利而盛害如此者其求物也飬生也粥夀也也皆當為耶問之辭故欲飬其欲而縱其情縱其情則欲終不可養也欲養其性而危其形欲養其樂而攻其心欲飬其名而亂其行皆外重物之所致也如此者雖封侯稱君其與夫盗無以異乘軒戴絻與其無足無以異絻與冕同夫是之謂以已為物役矣已為物之役使心平愉則色不及傭而可以養目所視之物不及傭作之人亦可養目聲不及傭而可以飬耳蔬食菜羮而可以飬口麤布之衣麤紃之履而可以飬體麄紃之履麄麻屨也屋室廬庾葭藁蓐尚机筵而可以飬形廬草屋也庾屋如廩庾者葭蘆也以蘆為屋室葭藁為席蓐貧賤人之居也尚机筵未詳或曰尚言尚古猶若稱尚書之尚也尚机筵質朴之机筵也故無萬物之羙而可以飬樂無勢列之位而可以飬名勢列班列也名羙名也如是而加天下焉其為天下多其和樂少矣以是無貪利之心加以天下之權則為天下必多為己之私和樂少矣夫是之謂重已役物知道則心平愉心平愉則欲惡有節物不能動故重已而役物自有甞試已下皆論知道不知道也無稽之言不見之行不聞之謀君子慎之無稽之言言無考驗者也不見之行不聞之謀謂在幽隱人所不聞見者君子尤當戒慎不可忽也中庸曰戒慎乎其所不覩恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也説苑作無類之説不刑之行不賛之辭君子慎之此三句不似此篇之意恐誤在此耳荀子卷十六欽定四庫全書荀子卷
