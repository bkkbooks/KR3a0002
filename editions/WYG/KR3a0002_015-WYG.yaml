front:
  text: 若山出口丁子有尾之類也莊子蔽於天而不知人天謂無為自然之道莊子但推治亂於天而不知在人也故由用謂之道盡利也由從也若由於用則天下之道無復於仁義皆盡於求利也由俗謂之道盡嗛也俗當為欲嗛與慊同快也言若從人所欲不為節限則天下之道盡於快意也嗛口簟反由法謂之道盡數矣由法而不由賢則天下之道盡於術數由勢謂之道盡便矣便便宜也從勢而去智則盡於逐便無復修立也由辭謂之道盡論矣論辯説也由天謂之道盡因矣因任其自然無復治化也此而數具者皆道之一隅也夫道者體常而盡變一隅不足以舉之言道者體常盡變猶天地常存能盡萬物之變化曲知之人觀於道之一隅猶未之能識也曲知言不通大道也一隅猶昧况大道乎故以為足而飾之謂其持之有故其言之成理也内以自亂外以惑人上以蔽下下以蔽上此蔽塞之禍也孔子仁智且不蔽故學亂術足以為先王者也亂雜也言其多才藝足以及先王也一家得周道舉而用之不蔽於成積也一家得謂作春秋也周道舉謂刪詩書定禮樂成積舊習也言其所用不滯於衆人舊習故能功業如此故德與周公齊名與三王並此不蔽之福也聖人知心術之患見蔽塞之禍故無欲無惡無始無終無近無逺無愽無淺無古無今兼陳萬物而中懸衡焉不滯於一隅但當其中而懸衡揣其輕重也是故衆異不得相蔽以亂其倫也倫理何謂衡曰道道謂禮義故心不可以不知道心不知道則不可道而可非道心不知道則不以道為可可謂合意也人孰欲得恣而守其所不可以禁其所可人心誰欲得縱恣而肯守其不合意之事以自禁其合意者以其不可道之心取人則必合於不道人而不知合於道人各求其類以其不可道之心與不可道之人論道人亂之本也必有妬賢害善夫何以知問何道以知道人也曰心知道然後可道可道然後能守道以禁非道以其可道之心取人則合於道人而不合於不道之人矣以其可道之心與道人論非道治之要也必能懲姦去惡何患不知心苟知道何患不知道人故治之要在於知道人何以知道既知道人在於知道問知道之術如何也曰心在心無邪心何以知曰虛一而静能然則可以知道也心未嘗不臧也然而有所謂虛臧讀為藏古字通下意同言心未嘗不包藏言有所謂虚也心未嘗不滿也然而有所謂一滿當為兩兩謂同時兼知心未嘗不動也然而有所謂静雖動不使害静人生而有知知而有志志也者臧也在心為志然而有所謂虛不以所已臧害所將受謂之虛見善則遷不滯於積習也心生而有知知而有異異也者同時兼知之同時兼知之兩也然而有所謂一不以夫一害此一謂之一既不滯於一隅物雖輻湊而至盡可以一待之也心卧則夢偷則自行使之則謀卧寢也自行放縱也使役也言人心有所思寢則必夢偷則必放縱役用必謀慮故心未嘗不動也然而有所謂静不以夢劇亂知謂之静夢想象也劇囂煩也言處心有常不蔽於想象囂煩而介於胸中以亂其知斯為静也此皆明不蔽於一端虗受之義也未得道而求道者謂之虛一而静有求道之心不滯於偏見曲説則是虛一而静也作之則將須道者之虛則人將事道者之一則盡將思道者静則察此義未詳或恐脱誤耳或曰此皆論虛一而静之功也作動也須待也將行也當為須道者虛則將事道者一則盡思道者静則察其餘字皆衍也作之則行言人心有動作則自行也以虛心須道則萬事無不行以一心事道則萬物無不盡以静心思道則萬變無不察此皆言執其本而末隨之知道察知道行體道者也知道察謂思道者静則察也知道行謂須道者虛則將也體謂不離道也虛一而静謂之大清明言無有壅蔽者萬物莫形而不見莫見而不論莫論而失位既虚一而静則通於萬物故有形者無不見見則無不能論説論説則無不得其宜也坐於室而見四海處於今而論乆逺䟽觀萬物而知其情㕘稽治亂而通其度䟽通㕘驗稽考度制也經緯天地而材官萬物制割大理而宇宙裏矣材當為分官謂不失其任裏當為理材或為裁恢恢廣廣孰知其極睪睪廣廣孰知其德涫涫紛紛孰知其形明參日月大滿八極夫是之謂大人夫惡有蔽矣哉此皆明虛一而静則通於神明人莫能測也又安能蔽哉睪讀為皥皥皥廣大貌涫涫沸貌紛涫雜亂貌涫音官又音貫心者形之君也而神明之主也出令而無所受令心出令以使百體不為百體所使也自禁也自使也自奪也自取也自行也自止也此六者皆由心使也然所以為形之君也故口可劫而使墨云形可劫而使詘申心不可劫而使易意是之則受非之則辭劫迫也云言也百體可劫心不可劫所以尤宜慎擇所好懼蔽塞之患也故曰心容其擇也無禁必自見其物也雜博容受也言心能容受萬物若其選擇無所禁止則見雜博不精所以貫夫虚一而静也其情之至也不貳其情之至極在一而不貳若雜博則惑也詩云采采卷耳不盈頃筐嗟我懷人寘彼周行詩周南卷耳之篇毛公曰采采事采之也卷耳枲耳也頃筐畚屬易盈之噐也思君子置於周之列位也頃筐易滿也卷耳易得也然而不可以貳周行采易得之物實易盈之噐以懷人寘周行之心二之則不滿况乎難得之正道也而可以他術貳之乎故曰心枝則無知傾則不精貳則疑惑以贊稽之萬物可兼知也枝旁引如樹枝也賛助也稽考也以一端不貳之道助考之則可兼知萬物若博雜則愈不知也身盡其故則羙故自也盡不貳之事則身羙矣類不可兩也故知者擇一而一焉凡事類皆不可兩故知者精於一道而專一焉故異端不能蔽也農精於田而不可以為田師賈精於市而不可以為賈師工精於噐而不可以為噐師皆蔽於一技故不可為師長也有人也不能此三技而可使治三官曰精於道者也精於一道故可以理萬事精於物者也精於物者以物物謂能名物其一也物若農賈之屬精於道者兼物物謂能兼治名物其一物者也故君子一於道而以贊稽物一於道所以助考物也助考謂兼治也一於道則正以贊稽物則察以正志行察論則萬物官矣在心為志發言為論官謂各當其任無為差錯也昔者舜之治天下也不以事詔而萬物成舜能一於道但委任衆賢而已未嘗躬親以事告人處一危之其榮滿側養一之微榮矣而未知一謂心一也危之當為之危危謂不自安戒懼之謂也側謂偪側亦充滿之義微精妙也處心之危言能戒懼兢兢業業終使之安也養心之微謂養其未萌不使異端亂之也處心之危有形故其榮滿則可知也養心之微無形故雖榮而未知言舜之為治養其未萌也故道經曰人心之危道心之微今虞書有此語而云道經盖有道之經也孔安國曰危則難安微則難明故戒以精一信執其中引此以明舜之治在精於一道不蔽於一隅也危微之幾惟明君子而後能知之㡬萌兆也與機同故人心譬如槃水正錯而勿動則湛濁在下而清明在上湛濁謂沈汎滓也下同則足以見鬚眉而察理矣理肌膚之文理微風過之湛濁動乎下清明亂於上則不可以得大形之正也心亦如是矣導之以理養之以清物莫之傾清謂冲和之氣則足以定是非決嫌疑矣小物引之則其正外易其心内傾則不足以决麤理也言此者以喻心不一於道為異端所蔽則惑矣故好書者衆矣而倉頡獨傳者一也倉頡黄帝史官言古亦有好書者不如倉頡一於其道異術不能亂之故獨傳也好稼者衆矣而后稷獨傳者一也好樂者衆矣而䕫獨傳者一也好義者衆矣而舜獨傳者一也倕作弓浮游作矢而羿精於射倕舜之共工世本云夷牟作矢宋𠂻註云黄帝臣此云浮游未詳或者浮游夷牟之别名或聲相近而誤耳言倕游雖作弓矢未必能射而羿精之也弓矢舜已前有之此云倕作弓當是改制精巧故亦言作也奚仲作車乘杜作乘馬而造父精於御自古及今未嘗有兩而能精者也奚仲夏禹時車正黄帝時已有車服故謂之軒轅此云奚仲者亦改制耳世本云相土作乘馬杜與土同乘馬四馬駕車起於相土故曰作乘馬以其作乘馬之法故謂之乘並音剰相土契孫也吕氏春秋曰乘馬作一駕曾子曰是其庭可以搏䑕惡能與我歌矣是當為視曽子曰有人視庭中可以搏擊䑕則安能與我成歌詠乎言外物誘之思不精故不能成歌詠也空石之中有人焉其名曰觙空石石穴也盖古有善射之人處深山空石之中名之曰觙觙字及事並未詳所出或假設喻耳其為人也善射以好思好喜也清静思其射之妙耳目之欲接則敗其思蚊䖟之聲聞則挫其精是以闢耳目之欲而逺蚊䖟之聲閑居静思則通挫損也精精誠也闢屏除也言閑居静思不接外物故能通射之妙也思仁若是可謂微乎言静思仁如空石之人思射則可謂微乎假設問之辭也孟子惡敗而出妻可謂能自彊矣此已下荅之之辭孟子惡其敗德而出其妻可謂能自彊於修身也有子惡卧而焠掌可謂能自忍矣未及好也有子盖有若也焠灼也惡寢卧而焠其掌若刺股然也未及好也當為未及好思也誤分在下更作一句耳有子焠掌可謂能自忍其身則未及善射好思者也若思道之至則自無寢焉用焠掌乎闢耳目之欲可謂能自彊矣末及思也蚊䖟之聲聞則挫其精可謂危矣未可謂微也可謂能自彊矣未及思也十字並衍耳可謂危矣言能闢耳目之欲則可謂能自危而戒懼未可謂㣲也微者精妙之謂也夫微者至人也惟精惟一如舜者至人也何彊何忍何危既造於精妙之域則冥與理㑹不在作為苟未臻極雖在空石之中猶未至也故濁明外景清明内景景光色也濁謂混跡清謂虛白聖人縱其欲兼其情而制焉者理矣夫何彊何忍何危兼猶盡也聖人雖縱欲盡情而不過制者由於暗與理㑹故也何必如空石之徒乎故仁者之行道也無為也聖人之行道也無彊也無為謂知違理則不作所謂造形而悟也無彊謂全無違理彊制之萌也仁者之思也恭聖人之思也樂此治心之道也思慮也恭謂乾乾夕惕也樂謂性與天道無所不適也凡觀物有疑中心不定則外物不清清明審也吾慮不清則未可定然否也冥𠖇而行者見寢石以為伏虎也見植林以為後人也𠖇冥蔽其明也冥𠖇暮夜也醉者越百歩之溝以為蹞歩之澮也蹞與跬同半歩曰跬澮小溝也俯而出城門以為小之閨也酒亂其神也閨小門也厭目而視者視一以為兩掩耳而聽者聽漠漠以為哅哅勢亂其官也厭指按也一渉反漠無聲也哅哅喧聲也官司主也言勢亂耳目之所主守哅許甬反故從山下望牛者若羊而求羊者不下牽也逺蔽其大也從山下而望木者十仞之木若箸而求箸者不上折也髙蔽其長也皆知為髙逺所蔽故不徃求然則守道者亦宜知異術之蔽類此也水動而影揺人不以定羙惡水勢𤣥也𤣥幽深也或讀為眩瞽者仰視而不見星辰不以定有無用精惑也精目之明也有人焉以此時定物則世之愚者也彼愚者之定物以疑决疑决必不當夫苟不當安能無過乎以疑决疑猶慎墨之屬也夏首之南有人焉曰㳙蜀梁夏首夏水之首楚詞云過夏首而西浮顧龍門而不見王逸曰夏首夏水口也㳙蜀梁未詳何代人姓㳙名蜀梁列仙傳有㳙子齊人隱於宕山餌水能致風雨者也其為人也愚而善畏善猶喜也好有所畏明月而宵行俯見其影以為伏鬼也卬視其髮以為立魅也卬與仰同背而走比至其家者失氣而死豈不哀哉背弃去也失氣謂困甚氣絶也凡人之有鬼也必以其感忽之間疑𤣥之時正之感驚動也感忽猶慌惚也𤣥亦幽深難測也必以此時定其有鬼也此人之所以無有而有無之時也無有謂以有為無也有無謂以無為有也此皆人所疑惑之時也而已以正事故傷於溼而擊鼓鼓痺則必有弊鼔䘮豚之費矣而未有俞疾之福也已以正事謂人以此定事也痺冷疾也傷於溼則患痺反擊鼓烹豚以禱神何益於愈疾乎若以此定事則與俗不殊也俞讀為愈故雖不在夏首之南則無以異矣慎墨之蔽亦猶是也凡以知人之性也可以知物之理也以知人之性推之則可知物理也以可以知人之性求可以知物之理而無所疑止之則没世窮年不能徧也疑止謂有所不為窮年盡其年夀疑或為凝其所以貫理焉雖億萬已不足以浹萬物之變與愚者若一貫習也浹周也子叶反或當為接學老身長子而與愚者若一猶不知錯夫是之謂妄人錯置也謂廢捨也身已老矣子已長矣猶不知廢捨無益之學夫是之謂愚妄人也故學也者固學止之也惡乎止之曰止諸至足曷謂至足曰聖也或曰聖下更當有王字誤脱耳言人所學當止於聖人之道及王道不學異術也聖王之道是為至足也聖也者盡倫者也王也者盡制者也倫物理也制法度也兩盡者足以為天下極矣所以為至足也故學者以聖王為師案以聖王之制為法法其法以求其統類類以務象効其人統類法之大綱嚮是而務士也類是而幾君子也幾近也類聖人而近之則為君子士者修飾之名君子有道徳之稱也知之聖人也知聖王之道者故有知非以慮是則謂之懼自知其非以圖慮於是則謂之能戒懼也有勇非以持是則謂之賊勇於為非以持制是察孰非以分是則謂之簒孰甚也察其甚非以分為是之心此簒奪之人也多能非以修蕩是則謂之知修飾也蕩動也多能非修飾蕩動而為是則謂之知言智者能變非為是也辯利非以言是則謂之詍辯説利口而飾非以言亂是則謂之詍詍多言也詩曰無然詍詍傳曰天下有二非察是是察非衆以為是者而非之以為非者而是之謂合王制與不合王制也所以非察是是察非觀其合王制與否也天下有不以是為隆正也然而猶有能分是非治曲直者耶冇不以合王制與不合為隆正者而能分是非治曲直乎言必不能也若夫非分是非非治曲直非辯治亂非治人道雖能之無益於人不能無損於人案直將治怪説玩竒辭以相撓滑也案彊鉗而利口厚顔而忍詬無正而恣睢妄辯而幾利滑亂也音骨彊彊服人鉗鉗人口也詬詈也恣睢矜夸也幾近也妄辯幾利謂妄為辯説所近者惟利也不好辭讓不敬禮節而好相推擠此亂世姦人之説也則天下之治説者方多然矣慎墨季惠之屬傳曰析辭而為察言物以為辯君子賤之博聞彊志不合王制君子賤之此之謂也所謂析言破律亂名改作者也為之無益於成也求之無益於得也憂戚之無益於幾也言役心無益復憂戚亦不能近道也則廣焉能弃之矣不以自妨也不少頃干之胸中廣讀為曠逺也不以自妨謂不以無益害有益也不慕徃不閔來無邑憐之心不慕徃謂不恱慕無益之事而徃從之也不閔來謂不憂閔無益之事而來正之也或曰徃古昔也來將來也不慕徃古不閔將來言為義所在無所繫滯也邑憐未詳或曰邑與悒同怏也憐讀為恡惜也言棄無益之事更無悒怏恡惜之心此皆明不為異端所蔽也當時則動物至而應事起而辯治亂可否昭然明矣周而成泄而敗明君無之有也以周密為成以漏泄為敗明君無此事也明君日月之照臨安用周密也宣而成隱而敗闇君無之有也以宣露為成以隱蔽為敗闇君亦無此事也闇君務在隱蔽而不知昭明之功也故君人者周則讒言至矣而直言反矣小人邇而君子逺矣詩曰墨以為明􅈢狸其蒼此言上幽而下險也逸詩墨謂蔽塞也􅈢狸其蒼言􅈢狸之色居然有異若以蔽為明則臣下誑君言其色蒼然無别猶指鹿為馬者也幽暗也險傾側也君人者宣則直言至矣而讒言反矣君子邇而小人逺矣反還也䜛言復歸而不敢出矣或曰反倍也言與讒人相倍也詩云明明在下赫赫在上此言上明而下化也詩大雅大明之篇言文王之德明明在下故赫赫然著見於天也
