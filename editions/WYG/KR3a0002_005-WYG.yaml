front:
  text: 王制篇第九請問為政曰賢能不待次而舉不以官之次序若傅説起於版築為相也罷不能不待頃而廢頃湏臾也元惡不待教而誅不教而殺謂之虐惟元惡不教而誅之也中庸民不待政而化中庸民易與為善故教則化之不待政成之後也分未定也則有昭繆也繆讀為穆父昭子穆言為政當分未定之時則為之分别使賢者居上不肖者居下如昭穆之分别然不問其世族也雖王公士大夫之子孫也不能屬於禮義則歸之庶人雖庶人之子孫也積文學正身行能屬於禮義則歸之卿相士大夫屬繫也之欲反故姦言姦説姦事姦能遁逃反側之民職而教之湏而待之反側不安之民也職而教之謂使各當教其夲事也湏而待之謂湏暇之而待其遷善也勉之以慶賞懲之以刑罰安職則畜不安職則弃畜養也弃謂投四裔之比也五疾上收而養之材而事之五疾瘖聾跛躄㫁者侏儒各當其材使之謂若矇瞽修聲聾瞶司火之屬官施而衣食之兼覆無遺官為之施設所職而與之衣食才行反時者死無赦夫是之謂天德王者之政也天徳天覆之徳聽政之大分以善至者待之以禮以不善至者待之以刑兩者分别則賢不肖不雜是非不亂賢不肖不雜則英傑至是非不亂則國家治若是名聲日聞天下願令行禁止王者之事畢矣願謂人人皆願矣凡聽論聽政也威嚴猛厲而不好假道人厲剛烈也假道謂以寛和假借道引人也則下畏恐而不親周閉而不竭隱閉其情不竭盡也若是則大事殆乎弛小事殆乎遂弛廢也遂因循也春秋傳曰遂繼事也下既隱情不敢論説則大事近於弛廢小事近於因循言不肯革弊也和解調通好假道人而無所凝止之和解調通則寛和不拒下也凝定也凝止謂定止其不可也則姦言並至嘗試之説鋒起嘗試之説謂假借以事試為之也荘子曰嘗試論之鋒起謂如鋒刃齊起言鋭而難拒也若是則聽大事煩是又傷之也聽大謂所聽之事多也傷傷政也故法而不議則法之所不至者必廢議謂講論也雖有法度而不能講論則不周治故法所不至者必廢也職而不通則職之所不及者必隊雖舉當其職而不能通明其類則職所不及者必隊隊與墜同故法而議職而通無隱謀無遺善而百事無過非君子莫能故公平者職之衡也中和者聽之䋲也聽聽政也衡所以知輕重䋲所以辨曲直言君子用公平中和之道故能百事無過中和謂寛猛得中也其有法者以法行無法者以類舉聽之盡也類謂比類偏黨而無經聽之辟也無經謂無常法也辟讀為僻故有良法而亂者有之矣有君子而亂者自古及今未嘗聞也傳曰治生乎君子亂生乎小人此之謂也其人存則其政舉其人亡則其政息分均則不偏分均謂貴賤敵也分扶問反勢齊則不一衆齊則不使此皆名無差等則不可相制也有天有地而上下有差明王始立而處國有制制亦謂差等夫兩貴之不能相事兩賤之不能相使是天數也天之數也勢位齊而欲惡同物不能澹則必爭澹讀為贍既無等級則皆不知紀極故不能足也爭則亂亂則窮矣物窮竭也先王惡其亂也故制禮義以分之使有貧富貴賤之等足以相兼臨者是養天下之夲也使物有餘而不窮竭書曰維齊非齊此之謂也書吕刑言維齊一者乃在不齊以諭有差等然後可以為治也馬駭輿則君子不安輿馬駭於車中也庶人駭政則君子不安位駭政不安上之政也馬駭輿則莫若静之庶人駭政則莫若恵之恵恩惠也選賢良舉篤敬興孝悌收孤寡補貧窮如是則庶人安政矣庶人安政然後君子安位傳曰君者舟也庶人者水也水則載舟水則覆舟此之謂也故君人者欲安則莫若平政愛民矣欲榮則莫若隆禮敬士矣欲立功名則莫若尚賢使能矣是君人者之大節也三節者當則其餘莫不當矣三節者不當則其餘雖曲當由将無益也曲當謂委曲皆當當丁浪反孔子曰大節是也小節是也上君也大節是也小節一出焉一入焉中君也謂一得一失也大節非也小節雖是也吾無觀其餘矣成侯嗣公聚歛計數之君也成侯嗣公皆衞君也史記衞聲公卒子成侯立成侯卒子平侯立平侯卒子嗣君立韓子曰衞嗣公重如耳愛泄姬而恐其皆因愛重以雍己也乃貴薄疑以敵如耳尊魏妃以偶泄姬曰以是相參也又使過客闗市賂之以金後召闗市問其有客過與汝金汝廻遣之闗市大恐以嗣公為明察此皆計數之類也未及取民也未及謂其才未及取也民謂得民心子產不取民者也未及為政者也禮記曰子産猶人之母能食之不能教之也管仲為政者也未及脩禮者也言未及教化也故脩禮者王為政者彊取民者安聚歛者亡故王者富民覇者富士士卒伍也僅存之國富大夫亡國富筐篋實府庫筐篋已富府庫已實而百姓貧夫是之謂上溢而下漏如器之上溢下漏空虚可立而待也入不可以守出不可以戰則傾覆滅亡可立而待也故我聚之以亡敵得之以彊聚歛者召寇肥敵亡國危身之道也故明君不蹈也王奪之人覇奪之輿彊奪之地人謂賢人輿謂國也彊國之術則奪人地也奪之人者臣諸侯奪之輿者友諸侯奪之地者敵諸侯臣諸侯者王友諸侯者覇敵諸侯者危用彊者用彊力勝人非知彊道者人之城守人之出戰而我以力勝之也則傷人之民必甚矣傷人之民甚則人之民惡我必甚矣人之民惡我甚則日欲與我鬬人之城守人之出戰而我以力勝之則傷吾民必甚矣傷吾民甚則吾民之惡我必甚矣吾民之惡我甚則日不欲為我門人之民日欲與我鬭吾民日不欲為我鬭是彊者之所以反弱也地來而民去累多而功少累憂累也雖守者益所以守者損是以大者之所以反削也守者謂地也守國以地為夲故曰守者所以守者謂所以守地之人也諸侯莫不懐交接怨而不忘其敵交接連結也既以力勝而不義故諸侯皆欲相連結怨國而不忘與之為敵夲多作壊交接言壊其與已交接之道也伺彊大之間承彊大之敝也知彊大之敝此彊大之殆時也殆危也知彊大者不務彊也知彊大之術者不務以力勝也慮以王命全其力凝其德慮計也以用也其計慮常用王命謂不敢擅侵暴也凝定也定其徳謂不輕舉也力全則諸侯不能弱也德凝則諸侯不能削也天下無王覇主則常勝矣是知彊道者也無王覇之主則彊國常勝主或衍字彼覇者不然辟田野實倉廩便備用備用足用也左傳曰無重器備案謹募選閲材伎之士案發聲謹嚴也募招也謹募猶重募也選閲擇揀也材伎武藝過人者猶漢之材官也然後漸慶賞以先之漸進也言進勉以慶賞也嚴刑罰以紏之存亡繼絶衞弱禁暴而無兼并之心則諸侯親之矣并讀為併下同脩友敵之道以敬接諸侯則諸侯説之矣説讀為悦下同所以親之者以不并也并之見則諸侯疏之矣見賢徧反所以説之者以友敵也臣之見則諸侯離矣故明其不并之行信其友敵之道行下孟反信謂使人不疑天下無王覇主則常勝矣是知覇道者也無王者則覇主常勝也閔王毁於五國史記齊閔王四十年樂毅以燕趙楚魏秦破齊閔王出奔莒也桓公刼於魯荘公羊傳柯之盟齊桓公為魯荘公之臣曹劌所刼也無他故焉非其道而慮之以王也不行其道而以計慮為王所以危亡也彼王者不然仁眇天下義眇天下威眇天下眇盡也盡天下皆懷其仁感其義畏其威仁眇天下故天下莫不親也義眇天下故天下莫不貴也威眇天下故天下莫敢敵也以不敵之威輔服人之道其道可以服人故不戰而勝不攻而得甲兵不勞而天下服是知王道者也知此三具者欲王而王欲覇而覇欲彊而彊矣王者之人王者之佐飾動以禮義所脩飾及舉動必以禮義也聽㫁以類所聽㫁之事皆得其善類謂輕重得中也明振毫末振舉也言細㣲必見也舉措應變而不窮夫是之謂有原是王者之人也原夲也知為政之夲王者之制説王者制度也道不過三代法不貳後王論王道不過夏殷周之事過則久遠難信法不貳後王言以當世之王為法不離貳而遠取之道過三代謂之蕩法貳後王謂之不雅並已解上衣服有制宫室有度人徒有數人徒謂士卒胥徒也䘮祭械用皆有等宜械器也皆有等級各當其宜聲則凡非雅聲者舉廢舉皆色則凡非舊文者舉息謂染綵盡繢之事也械用則凡非舊器者舉毁舊謂三代故事夫是之謂復古是王者之制也謂三代故事則是復古必不遠舉也王者之論論謂論説賞罰也盧困反無德不貴無能不官無功不賞無罪不罰朝無幸位民無幸生幸徼倖也尚賢使能而等位不遺不遺言各當其材位等級之位也析愿禁悍而刑罰不過析分異也分其愿慤之民使與凶悍之民異也悍凶暴也刑罰不過但禁之而已不刻深也百姓曉然皆知夫為善於家而取賞於朝也為不善於幽而䝉刑於顯也夫是之謂定論是王者之論也定論不易之論論不易則人知所勸也王者之等賦政事財萬物所以養萬民也等賦賦税有等所以為等賦及政事裁制萬物皆為養人非貪利也財與裁同田野什一什税一也闗市幾而不征幾呵察也但呵察姦人而不征税也禮記幾作譏山林澤梁以時禁發而不税石絶水為梁所以取魚也非時則禁及時則發禮記曰􅆩祭魚然後漁人入澤梁草木零落然後入山林也相地而衰政相視也衰差也政為之輕重政或讀為征衰初危反理道之遠近而致貢理條理也貢任土所貢也謂若百里賦納緫二百里納銍之類也通流財物粟米無有滯留貿遷有無化居不使有滯積也使相歸移也四海之内若一家歸讀為饋移轉也言通商及轉輸相救無不豐足雖四海之廣若一家也故近者不隱其能遠者不疾其勞不隱其能謂竭其才力也不疾苦其勞謂奔走來王也無幽間隱僻之國莫不趨使而安樂之幽深也間隔也言無有深隔之國不為王者趨使而安樂政教也夫是之謂人師是王者之法也師長也言為政如此乃可以長久也師者亦使人法效之者也北海則有走馬吠犬焉然而中國得而畜使之海謂荒晦絶遠之地不必至海水也走馬吠犬今北之大犬也南海則有羽翮齒革曾青丹干焉然而中國得而財之翮大鳥羽齒象齒革犀兕之革曽青銅之精可繪畫及化黃金者出蜀山越崖丹干丹砂也蓋一名丹干干讀為矸胡旦反或曰丹丹砂也玕當為玕尚書禹貢雍州球琳琅玕孔云石而似玉者爾雅云西北方之美者有球琳琅玕焉皆出西方此云南方蓋南方亦有也東海則有紫紶魚鹽焉然而中國得而衣食之紫紫具也紶未詳書亦無紶字當為蜐郭璞江賦曰石蜐應節而揚葩注云石蜐龜形春則生花蓋亦蚌蛤之屬今案夲草謂之石决明陶云俗傳是紫具附石生大者如手明耀五色内亦含珠古以龜具為貨故曰衣食之蜐居怯反西海則有皮革文旄焉然而中國得而用之禹貢梁州貢熊羆狐狸織皮孔云貢四獸之皮織皮今之􅄢也旄旄牛尾文旄謂染之為文彩者也故澤人足乎木山人足乎魚農夫不斵削不陶冶而足械用工賈不耕田而足菽粟故虎豹為猛矣然君子剝而用之故天之所覆地之所載莫不盡其美致其用物皆盡其美而來為人用也上以飾賢良下以養百姓而安樂之飾謂車服養謂衣食夫是之謂大神能變通裁制萬物故曰大神也詩曰天作高山大王荒之彼作矣文王康之此之謂也詩周頌天作之篇荒大也康安也言天作此高山使興雲雨大王自豳遷焉則能尊大之彼大王作此都文王又能安之以類行雜得其統類則不患於雜也以一行萬行於一人則萬人可治也皆謂得其樞要始則終終則始若環之無端也舍是天下以衰矣始謂類與一也終謂雜與萬也言以此道為治終始不窮無休息則天下得其次序舍此則亂也衰初危反天地者生之始也禮義者治之始也君子者禮義之始也始猶夲也言禮義夲於君子也為之貫之積重之致好之者君子之始也言禮義以君子為夲君子以習學為夲貫習也積重之謂學使委積重多也致極也好之言不倦也故天地生君子君子理天地君子者天地之參也萬物之揔也民之父母也參謂與之相參共成化育也揔領也要也無君子則天地不理禮義無統上無君師下無父子夫是之謂至亂君臣父子兄弟夫婦始則終終則始與天地同理與萬世同久夫是之謂大夲始則終終則始謂一世始言上下尊卑人之大夲有君子然後可以長久也故喪祭朝聘師旅一也此已下明君子禮義之始為之制喪祭朝聘之禮所以齊一民各當其道不使淫放也下一之義皆同貴賤殺生與奪一也使民一於沮勸君君臣臣父父子子兄兄弟弟一也使人一於恩義農農士士工工商商一也使人一於職業水火有氣而無生草木有生而無知生謂滋長知謂性識禽獸有知而無義人有氣有生有知亦且有義故最為天下貴也亦且者言其中亦有無義者也力不若牛走不若馬而牛馬為用何也曰人能羣彼不能羣也人何以能羣曰分無分則爭爭則不能羣也分何以能行曰以義故義以分則和言分義相湏也義謂裁㫁也和則一一則多力多力則彊彊則勝物故宫室可得而居也物不能害所以安居故序四時裁萬物兼利天下無他故焉得之分義也以有分義故能治天下也故人生不能無羣羣而無分則爭爭則亂亂則離離則弱弱則不能勝物故宫室不可得而居也不可少頃舍禮義之謂也能以事親謂之孝能以事兄謂之悌能以事上謂之順能以使下謂之君能以皆謂能以禮義也君者善羣也善能使人為羣也羣道當則萬物皆得其宜六畜皆得其長羣生皆得其命安其性命故養長時則六畜育殺生時則草木殖殺生斬伐政命時則百姓一賢良服聖王之制也時謂有常服謂為之任使也草木榮華滋碩之時則斧斤不入山林不夭其生不絶其長也黿鼉魚鼈鰌鱣孕别之時別謂生育與母分别也國語里革諫魯公曰魚方別孕韋昭曰自别於雄而懷子也罔罟毒藥不入澤不夭其生不絶其長也毒藥毒魚之藥周禮雍氏禁澤之酖者春耕夏耘秋收冬藏四者不失時故五榖不絶而百姓有餘食也汙池淵沼川澤謹其時禁汙停水之處謹嚴也故魚鼈優多而百姓有餘用也用謂食足之外可用貿易也斬伐養長不失其時故山林不童而百姓有餘材也山無草木曰童聖王之用也用財用也上察於天下錯於地順天時以養地財也錯千故反塞備天地之間加施萬物之上言聖王之用使天地萬物皆得其所㣲而明短而長狹而廣言用禮義故所守者近所及者遠也神明博大以至約言用禮義治化雖神明博大原其夲至簡約也故曰一與一是為人者謂之聖人一與一動皆一也是此也以此為人者則謂之聖人也序官謂王者序官之法也宰爵知賔客祭祀饗食犧牲牢之數宰膳宰爵主掌也饗食饗宴也周禮膳夫之屬有庖人獸人皆掌犧牲一曰爵官爵也言膳宰之官爵掌犧牲之事者也司徒知百宗城郭立器之數百宗百揆也城郭謂其小大也立器所立之器用也周禮大司徒之職掌建邦土地之圖與其民之數立器言五方器械異制皆知其數不使作竒伎之器也司馬知師旅甲兵乘白之數周禮二千五百人為師五百人為旅四井為邑四邑為丘四丘為甸亦謂之乘以其治田則謂之甸出長轂一乘則謂之乘每一乘又有甲士三人歩卒七十二人自謂甸徒猶今之白丁也或曰白當為百百人也脩憲命脩憲法之命所以表示人也謂若以樂德教國子中和祗庸孝友之類也審詩商詩商當為誅賞字體及聲之誤故樂論篇曰其在序官也脩憲命審誅賞其徒屬之功過者或曰詩謂四方之歌謡商謂商聲哀思之音如寗戚之悲歌也禁淫聲周禮大司樂禁其淫聲慢聲鄭云淫聲鄭衛之音也以時順脩謂不失其時而順之脩之使夷俗邪音不敢亂雅大師之事也夷俗謂蠻夷之樂雅正聲也大師樂官之長大讀為太脩堤梁堤所以防水梁橋也通溝澮溝澮皆所以通水周禮十夫之田有溝溝上有畛千夫有澮澮上有道鄭云溝廣深各四尺澮廣二㝷深二仞也行水潦行廵行也下孟反安水藏使水歸其壑安謂不使漏洩藏才浪反以時决塞旱則決之水則塞之不使失其時也歲雖凶敗水旱使民有所耘艾司空之事也艾讀為刈相高下視肥墝序五種高下原隰也五種黍稷豆麻麥觀其地所宜而種之墝若交反省農功省觀也觀其勤惰而勸之謹畜藏謹嚴以時順脩使農夫樸力而寡能治田之事也使農夫敦朴於力穡禁其他能也治田田畯也脩火憲不使非時焚山澤月令二月無焚山林鄭注周禮憲表也主表其刑禁也養山林藪澤草木魚鼈百索百索上所索百物也以時禁發禁謂為之厲禁發謂許民採取使國家足用而財物不屈虞師之事也屈竭也虞師周禮山虞澤虞也順州里使之和順定㕓宅㕓謂市内百姓之居宅謂邑内居也定其分界不使相侵奪也養六畜勸人養之也間樹藝樹藝種樹及桑柘也間之使疏宻得宜也勸教化趨孝悌勸之使從教化趨之使敦孝悌趨讀為促以時順脩使百姓順命安樂處鄉鄉師之事也鄉師公卿也周禮鄉老二鄉公一人鄉大夫每鄉卿一人論百工論其巧拙月令曰物勒工名以攷其成功苟有不當必行其罪也審時事考工記曰天有時地有􅂔材有美工有巧合此四者然後可以為良月令曰監工日號毋悖于時皆審其時之事也辨功苦功謂器之精好者若謂濫惡者韋昭曰功堅苦脆也尚完利完堅也利謂便於用若車之利轉之類也便備用使雕琢文采不敢專造於家工師之事也專造私造也相陰陽相視也陰陽謂數也占祲兆占占候也祲陰陽相侵之􅂔赤黒之祲是其類也兆謂龜兆或曰兆萌兆謂望其雲物知嵗之吉㓙也鑚龜陳卦鑚龜謂以火􅋹荆華灼之也陳卦謂揲蓍布卦也主禳擇五卜禳擇禳除不祥擇取吉事也五卜洪範所謂曰雨曰霽曰䝉曰驛曰克言兆之形也知其吉㐫妖祥傴巫跛擊之事也擊讀為覡男巫也古者以廢疾之人主卜筮巫祝之事故曰傴巫跛覡覡胡厯反脩採清脩其採清之事採謂採去其穢清謂使之清潔皆謂除道路穢惡也周禮蜡氏掌除骴凡國之大祭祀令州里除不蠲也易道路脩而平之謹盜賊謹嚴禁也周禮野廬氏曰職有相翔者誅之平室律平均布也室逆旅之室平其室之法皆不使容姦人若今五家為保也以時順脩使賔旅安而貨財通治市之事也此皆周禮野廬氏之職今云治市蓋七國時設官不同治市之官兼掌道路不必全依周禮制據當時掌事言之抃急禁悍抃當為折急當為愿已解上也防淫除邪戮之以五刑使暴悍以變姦邪不作司冦之事也夲政教立法則兼聽而時稽之稽計也考也周禮太宰嵗終則令百官府各正其治受其㑹而詔王廢置三嵗則大計也度其功勞論其慶賞以時慎脩使百吏免盡而衆庶不偷冡宰之事也論禮樂正身行廣教化美風俗兼覆而調一之辟公之事也全道德致隆高綦文理一天下振毫末使天下莫不順比從服天王之事也故政事亂則冡宰之罪也國家失俗則辟公之過也天下不一諸侯俗反則天王非其人也具具而王具具而覇具具而存具具而亡用萬乘之國者威彊之所以立也名聲之所以美也敵人之所以屈也國之所以安危臧否也制與在此亡乎人王覇安存危殆滅亡制與在我亡乎人夫威彊未足以殆鄰敵也名聲未足以懸天下也則是國未能獨立也豈渠得免夫累乎天下脅於暴國而黨為吾所不欲於是者日與桀同事同行無害為堯是非功名之所就也非存亡安危之所墮也功名之所就存亡安危之所墮必将於愉殷赤心之所誠以其國為王者之所亦王以其國為危殆滅亡之所亦危殆滅亡殷之日案以中立無有所偏而為縱橫之事偃然案兵無動以觀夫暴國之相卒也案平政教審節奏砥礪百姓為是之日而兵剸天下勁矣案脩仁義伉隆髙正法則選賢良養百姓為是之日而名聲剸天下之美矣權者重之兵者勁之名聲者美之夫堯舜者一天下也不能加毫末於是矣權謀傾覆之人退則賢良知聖之士案自進矣刑政平百姓和國俗節則兵勁城固敵國案自屈矣務夲事積財物而勿忘棲遲薛越也是使羣臣百姓皆以制度行則財物積國家案自富矣三者體此為天下服暴國之君案自不能用其兵矣何則彼無與至也彼其所與至者必其民也其民之親我歡若父母好我芳若芝蘭反顧其上則若灼黥若仇讐彼人之情性也雖桀跖豈有肯為其所惡賊其所好者哉彼以奪矣故古之人有以一國取天下者非往行之也脩政其所莫不願如是而可以誅暴禁悍矣故周公南征而北國怨曰何獨不來也東征而西國怨曰何獨後我也重意書仲虺之誥初征自葛東征西夷怨南征北狄怨曰奚獨後予就能有與是鬭者與安以其國為是者王殷之日安以靜兵息民慈愛百姓辟田野實倉廩便備用安謹募選閲材伎之士然後漸賞慶以先之嚴刑罰以防之擇士之知事者使相率貫也是以厭然畜積脩飾而物用之足也兵革器械者彼将日日暴露毁折之中原我今将修飾之拊循之掩蓋之於府庫貨財栗米者彼将日日棲遲薛越之中野我今将畜積并聚之於倉廩材伎股肱健勇爪牙之士彼将日日拙頓竭之於仇敵我今将來致之并閲之砥礪之於朝廷如是則彼日積弊我日積完彼日積貧我日積富彼日積勞我日積佚君臣上下之間者彼将厲厲焉日日相離疾也我今将頓頓焉日日相親愛也以是待其弊安以其國為是者覇立身則從傭俗事行則遵傭故進退貴賤則舉傭士之所以接下之人百姓者則庸寛惠如是者則安存立身則輕楛事行則蠲疑進退貴賤則舉佞悦之所以接下之人百姓者則好取侵奪如是者危殆立身則憍暴事行則傾覆進退貴賤則舉幽險詐故人之所以接下之人百姓者則好用其死力矣而慢其功勞好用其藉歛矣而忘其夲務如是者滅亡此五等者不可不善擇也王覇安存危殆滅亡之具也善擇者制人不善擇者人制之善擇之者王不善擇之者亡夫王者之與亡者制人之與人制之也是其為相懸也亦遠矣
