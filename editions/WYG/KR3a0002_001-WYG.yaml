front:
  text: 荀子卷一
  hash: sha256:7f27d7b73c7b8fcfda1ffb28c0c264cc6c739a98c9d497528aa54862ea269ed4
body:
  text: 唐楊倞註勸學篇第一君子曰學不可以已青出之於藍而青於藍冰出之於水而寒於水以喻學則才過其本性也木直中繩輮以爲輪其曲中規雖有槁暴不復挺者輮使之然也輮屈槁枯暴乾挺直也晏子春秋作不復羸矣故木受繩則直金就礪則利君子博學而曰參省乎已則知明而行無過矣參三也曾子曰吾日三省吾身知讀為智行下孟反故不登髙山不知天之髙也不臨深谿不知地之厚也不聞先王之遺言不知學問之大也大謂有益於人于越夷貃之子生而同聲長而異俗教使之然也于越猶言吳越吕氏春秋荆有佽飛得寳劒於于越髙誘曰吳邑也貃東北夷同聲謂啼聲同貃莫革反詩曰嗟爾君子無恒安息靖共爾位好是正直神之聽之介爾景福詩小雅小明之篇靖謀介助景大也無􅁪安息戒之不使懷安也言能謀恭其位好正直之道則神聽而助之福引此詩以喻勸學神莫大於化道福莫長於無禍爲學則化道故神莫大焉修身則自無禍故福莫長焉吾嘗終日而思矣不如須臾之所學也吾嘗跂而望矣不如登高之博見也跂舉足也登髙而招臂非加長也而見者逺順風而呼聲非加疾也而聞者彰假輿馬者非利足也而致千里假舟檝者非能水也而絶江河能善絶過君子生非異也善假於物也皆以喻修身在假於學生非異言與衆人同也南方有鳥焉名曰蒙鳩以羽為巢而編之以髪繫之葦苕風至苕折卵破子死巢非不完也所繫者然也䝉鳩鷦鷯也苕葦之秀也今巧婦鳥之巢至精密多繫於葦竹之上是也䝉當爲蔑方言云鷦鷯自闗而西謂之桑飛或謂之蔑雀或曰一名䝉鳩亦以其愚也言人不知學問其所置身亦猶繫葦之危也說苑客謂孟嘗君曰鷦鷯巢於葦苕著之以髪可完堅矣大風至則葦折卵破何也所託然也西方有木焉名曰射干莖長四寸生於髙山之上而臨百仞之淵木莖非能長也所立者然也本草藥名有射干一名烏翣陶𢎞景云花白莖長如射人之執竿又引阮公詩云射干臨層城是生於髙處也據本草在草部中又生南陽川谷此云西方有木未詳或曰長四寸即是草云木誤也葢生南陽亦生西方也射音夜蓬生麻中不扶而直蘭槐之根是爲芷其漸之滫君子不近庶人不服其質非不美也所漸者然也蘭槐香草也其根是為芷也本草白芷一名白茝陶𢎞景云離騷所謂蘭茝也葢苗名蘭茝根名芷也蘭槐當是蘭茝别名故云蘭槐之根是為芷也漸漬也染也滫溺也言雖香草浸漬於溺中則可惡也漸子廉反滫思酒反故君子居必擇鄉遊必就士所以防邪僻而近中正也物類之起必有所始榮辱之來必象其德肉腐出蟲魚枯生蠧怠慢忘身禍災乃作彊自取柱柔自取束凡物彊則以為柱而任勞柔則見束而約急皆其自取也邪穢在身怨之所搆搆結也言亦所自取也施薪若一火就燥也布薪於地均若一火就燥而焚也平地若一水就濕也草木疇生禽獸羣焉物各從其類也疇與儔同類也是故質的張而弓矢至焉林木茂而斧斤至焉所謂召禍也質射侯的正鵠也樹成䕃而衆鳥息焉醯酸而蚋聚焉喻有德則慕之者衆故言有召禍也行有招辱也君子慎其所立乎禍福如此不可不慎所立所立即謂學也積土成山風雨興焉積水成淵蛟龍生焉積善成德而神明自得聖心循焉神明自得謂自通於神明故不積蹞步無以至千里半步曰蹞蹞與跬同不積小流無以成江河騏驥一躍不能十步駑馬十駕言駑馬十度引車則亦及騏驥之一躍據下云駑馬十駕則亦及之此亦當同疑脫一句功在不舎鍥而舎之朽木不折鍥而不舎金石可鏤言立功在於不舎舎與捨同音鍥刻也苦結反春秋傳曰陽虎借邑人之車鍥其軸也螾無爪牙之利筋骨之彊上食埃土下飲黄泉用心一也螾與蚓同蚯蚓也蟹六跪而二螯非虵蟺之穴無所寄託者用心躁也跪足也韓子以刖足爲刖跪敖蟹首上如鉞者許叔重說文云蟹六足二􅚺也是故無冥冥之志者無昭昭之明無惽惽之事者無赫赫之功冥冥惽惽皆專黙精誠之謂也行衢道者不至事兩君者不容爾雅云四達謂之衢孫炎云衢交道四出也或曰衢道兩道也不至不能有所至下篇有楊朱哭衢塗今秦俗猶以兩爲衢古之遺言歟目不兩視而明耳不兩聽而聦螣蛇無足而飛爾雅云螣螣蛇郭璞云龍類能興雲霧而遊其中也梧鼠五技而窮梧䑕當爲鼫䑕葢本誤爲鼯字傳寫誤爲梧耳技才能也言技能雖多而不能如螣蛇專一故窮五技謂能飛不能上屋能縁不能窮木能游不能渡谷能穴不能掩身能走不能先人詩曰鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮故君子結於一也詩曹風鳲鳩之篇毛萇云鳲鳩鴶鞫也鳲鳩之養七子旦從上而下夕從下而上平均如一善人君子其執義亦當如鳲鳩之一執義一則用心堅固故曰心如結也昔者瓠巴鼓瑟而流魚出聽瓠巴古之善鼓瑟者不知何代人也流魚中流之魚也列子云瓠巴鼓瑟鳥舞魚躍也伯牙鼓琴而六馬仰秣伯牙古之善鼔琴者亦不知何代人也六馬天子路車之馬也漢書曰乾六車坤六馬白虎通曰天子之馬六者示有事於天地四方也張衡西京賦曰天子駕彫軫六駿駮又曰六𤣥蚪之奕奕齊騰驤之沛艾仰首而秣聽其聲也故聲無小而不聞行無隱而不形形謂有形可見玉在山而木草潤淵生珠而崖不枯為善不積邪安有不聞者乎崖岸枯燥學惡乎始惡乎終假設問也曰其數則始乎誦經終乎讀禮數術也經謂詩書禮謂典禮之屬也其義則始乎為士終乎爲聖人義謂學之意言在乎脩身也真積力久則入真誠也力行也誠積力久則能入於學也學至乎没而後止也生則不可怠惰也故學數有終若其義則不可須臾舎也爲之人也舎之禽獸也故書者政事之紀也書所以紀政事此說六經之意詩者中聲之所止也詩謂樂章所以節聲音至乎中而止不使流淫也春秋傳曰中聲已降五降之後不容弹矣禮者法之大分羣類之綱紀也禮所以爲典法之大分統類之綱紀類謂禮法所無觸類而長者猶律條之比附方言云齊謂法為類也故學至乎禮而止矣夫是之謂道德之極禮之敬文也禮有周旋揖讓之敬車服等級之文也樂之中和也中和謂使人得中和恱也詩書之博也博謂廣記土風鳥獸草木及政事也春秋之㣲也㣲謂褒貶沮勸㣲而顯志而晦之類也在天地之間者畢矣君子之學也入乎耳著乎心布乎四體形乎動靜所謂古之學爲已入乎耳著乎心謂聞則志而不㤀也布乎四體謂有威儀潤身也形乎動静謂知所措履也端而言蠕而動一可以為法則端讀為喘喘㣲言也蠕㣲動也一皆也或喘息㣲言或蠕蠢㣲動皆可以為法則蠕音人元反或曰端而言謂端莊而言也小人之學也入乎耳出乎口所謂今之學爲人道聽塗說也口耳之間則四寸耳曷足以美七尺之軀哉韓侍郎云則當為財與纔同古之學者為已今之學者爲人君子之學也以美其身小人之學也以為禽犢禽犢饋獻之物也故不問而告謂之傲傲喧噪也言與戲傲無異或曰讀為嗷聲曰嗷嗷然也嗷與傲通問一而告二謂之􅓐􅓐即讃字也謂以言彊讃助之今賛禮謂之賛賛古字口與言多通傲非也􅓐非也君子如嚮矣嚮與響同響應聲學莫便乎近其人謂賢師也禮樂法而不說有大法而不曲說也詩書故而不切詩書但論先王故事而不委曲切近於人故曰學詩三百使於四方不能專對也春秋約而不速文義隱約褒貶難明不能使人速曉其意方其人之習君子之説則尊以徧矣周於世矣當其習説之時則尊髙而徧周於世事矣六經則不能然之也故曰學莫便乎近其人學之經莫速乎好其人隆禮次之學之大經莫速於好近賢人若無其人則隆禮爲次之上不能好其人下不能隆禮安特將學雜識志順詩書而已耳則末世窮年不免為陋儒而已安語助猶言抑也或作安或作案荀子多用此字禮記三年問作焉戰國䇿謂趙王曰秦與韓為上交秦禍案移於梁矣秦與梁為上交秦禍案攘於趙矣呂氏春秋吳起謂商文曰今置質為臣其主安重釋璽辭官其主安輕蓋當時人通以安爲語助或方言耳特猶言直也雜識志謂雜志記書百家之説言既不能好其人又不能隆禮直學雜説順詩書而已豈免為陋儒乎言不知通變也將原先王本仁義則禮正其經緯蹊徑也所成所出者在於禮也若挈裘領詘五指而頓之順者不可勝數也言禮亦爲人之綱領挈舉也詘與屈同頓挈也順者不可勝數言禮皆順也不道禮憲以詩書為之道言説也憲標表也譬之猶以指測河也以戈舂黍也以錐飱壼也不可以得之矣故隆禮雖未明法士也不隆禮雖察辨散儒也散謂不自檢束莊子以不材木爲材木也問楛者勿告也楛與苦同惡也問楛謂所問非禮義也凡器物堅好者謂之功濫惡者謂之楛國語曰辨其功苦韋昭曰堅曰功脆曰苦故西京賦曰鬻良雜苦史記曰器不苦窳或曰楛讀爲沽儀禮有沽功鄭𤣥曰麄也告楛者勿問也說楛者勿聽也有争氣者勿與辯也故必由其道至然後接之非其道則避之道不至則不接故禮恭而後可與言道之方辭順而後可與言道之理色從而後可與言道之致致極也此謂道至而後接之也故未可與言而言謂之傲傲亦戲傲也論語曰言未及而言謂之躁可與言而不言謂之隱不觀顔色而言謂之瞽故君子不傲不隱不瞽謹順其身瞽者不識人之顔色詩曰匪交匪紓天子所予此之謂也詩小雅采菽之篇匪交當為彼交言彼與人交接不敢紓緩故受天子之賜予也百發一失不足謂善射千里蹞步不至不足謂善御未能全盡倫類不通仁義不一不足謂善學通倫類謂禮法所未該以其等倫比類而通之謂一以貫之觸類而長也一云仁義謂造次不離他術不能亂也學也者固學一之也一出焉一入焉塗巷之人也或善或否其善者少不善者多桀紂盜跖也盜跖栁下惠之弟聚徒九千人於太山之傍侵諸侯孔子説之而不入也全之盡之然後學者也學然後全盡君子知夫不全不粹之不足以爲美也故誦數以貫之使習禮樂詩書之數以貫穿之也思索以通之思求其意也為其人以處之爲擇賢人與之處也除其害者以持養之使目非是無欲見也使耳非是無欲聞也使口非是無欲言也使心非是無欲慮也是猶此也謂學也或曰是謂正道也及至其致好之也目好之五色耳好之五聲口好之五味心利之有天下致極也謂不學極恣其性欲不可禁也心利之有天下之富也或曰學成之後必受榮貴故能盡其欲也是故權利不能傾也羣衆不能移也天下不能蕩也蕩動也覆說為學學則物不能傾移也生乎由是死乎由是夫是之謂德操死生必由於學是乃德之操行德操然後能定能定然後能應我能定故能應物也能定能應夫是之謂成人内自定而外應物乃為成就之人也天見其明地見其光君子貴其全也見顯也明謂日月光謂水火金玉天顯其日月之明而地顯其水火金玊之光君子則貴其德之全也脩身篇第二見善脩然必以自存也修然整飾貌言見善必自整飾使存於身也見不善愀然必以自省也愀然憂懼貌自省其過也善在身介然必以自好也介然堅固貌易曰介如石焉自好自樂其善也不善在身也菑然必以自惡也菑讀為災災然災害在身之貌故非我而當者吾師也是我而當者吾友也諂諛我者吾賊也故君子隆師而親友以致惡其賊致猶極也下同好善無厭受諫而能誡雖欲無進得乎哉小人反是致亂而惡人之非己也致不肖而欲人之賢己也心如虎狼行如禽獸而又怨人之賊已也諂諛者親諫諍者䟽修正爲笑至忠爲賊雖欲無滅亡得乎哉至忠反以爲賊詩曰潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依此之謂也詩小雅小旻之篇毛注云潝潝然患其上訿訿然不思稱乎上鄭云臣不事君亂之階也故甚可哀潝許急反訿音紫扁善之度以治氣養生則後彭祖以修身自名則配堯禹扁讀爲辨韓詩外傳曰君子有辨善之度言君子有辨别善之法即謂禮也言若用禮治氣養生則夀不及於彭祖若以修身自為名號則配堯禹不朽矣言禮雖不能治氣養生而長於修身自為名號以此辨之則善可知矣彭祖堯臣名鏗封於彭城經虞夏商夀七百歳也宜於時通利以處窮禮信是也信誠也言所用修身及時通處窮禮誠是也孟子曰君子窮則獨善其身達則兼善天下凡用血氣志意知慮由禮則治通不由禮則勃亂提僈提僈舒緩也爾雅云媞媞安也詩曰好人提提皆舒緩之義食飲衣服居處動靜由禮則和節不由禮則觸陷生疾容貌態度進退趨行由禮則雅不由禮則夷固辟違庸衆而野夷倨也論語曰原壤夷俟固陋也庸凡庸衆衆人野郊野之人故人無禮則不生事無禮則不成國家無禮則不寧詩曰禮儀卒度笑語卒獲此之謂也詩小雅楚茨之篇卒盡也獲得也以善先人者謂之教以善和人者謂之順先謂首唱也和胡卧反下同以不善先人者謂之諂以不善和人者謂之諛諂之言陷也謂以佞言陷之諛與俞同義故為不善和人也是是非非謂之知能辨是為是非爲非謂之智也非是是非謂之愚以是為非以非為是謂之愚也傷良曰讒害良曰賊是謂是非謂非曰直竊貨曰盜匿行曰詐易言曰誕趣舎無定謂之無常不恒之人保利弃義謂之至賊保安多聞曰博少聞曰淺多見曰閑閑習也能習其事則不廹遽少見曰陋難進曰偍偍與提媞皆同謂舒緩也易忘曰漏少而理曰治多而亂曰耗少謂舉其要而有條理謂之治耗虗竭也凡物多而易盡曰耗也治氣養心之術言以禮修身是亦治氣飬心之術不必如彭祖也血氣剛彊則柔之以調和知慮漸深則一之以易良漸進也或曰漸浸也子廉反詩曰漸車帷裳言智慮深則近險詐故一之以易良也勇膽猛戾則輔之以道順膽有膽氣戾忿惡也此性多不順故以道順輔之也齊給便利則節之以動止爾雅云齊疾也齊急便利皆捷速也懼其太陵遽故節之使安徐也狹隘􅄶小則廓之以廣大卑濕重遲貪利則抗之以髙志卑謂謙下濕亦謂自卑下如地之下濕然也方言濕優也自闗而西凡志而不得欲而不獲髙而不墜行而中止皆謂之濕亦謂之過謙恭而無禮者重遲寛緩也夫過恭則無威儀寛緩􅁪不及機事貪利則苟得也故皆抗之髙志也或曰卑濕亦謂遲緩也言遲緩之人如有卑濕之疾不能運動也庸衆駑散則刦之以師友庸衆已解上駑謂材下如駑馬者也散不拘檢者也刦奪去也言以師友去其舊性也怠慢僄弃則炤之以禍災僄輕也謂自輕其身也音匹妙反方言楚謂相輕薄為僄炤之以禍災謂以禍災照燭之使知懼也炤與照同愚款端慤則合之以禮樂通之以思索款誠款也說文云款意有所欲也愚款端慤多無潤色故曰合之以禮樂此皆言修身之術在攻其所短也凡治氣養心之術莫徑由禮莫要得師莫神一好徑捷速也神神明也一好謂好善不好惡也夫是之謂治氣養心之術也志意脩則驕富貴矣道義重則輕王公矣内省則外物輕矣傳曰君子役物小人役於物此之謂也君君子能役物小人為物所役凡言言傳曰皆舊所傳聞之言也身勞而心安爲之利少而義多為之事亂君而通不如事窮君而順焉窮君小國廹脅之君也言事大國暴亂之君違道而通不如事小國之君順行其道也故良農不為水旱不耕良賈不為折閲不市折損也閲賣也謂損所閱賣之物價也賈音古士君子不為貧窮怠乎道體恭敬而心忠信術禮義而情愛人術法也横行天下雖困四夷人莫不貴横行不順理而行困窮也言所至皆貴也勞苦之事則争先饒樂之事則能讓端慤誠信拘守而詳拘守謂守而勿失詳謂審於事也橫行天下雖困四夷人莫不任體倨固而心執詐術順墨而精雜汗倨傲也固鄙固順墨當為愼墨愼謂齊宣王時處士慎到也其術本黄老歸刑名先申韓其意相似多明不尚賢不使能之道著書四十一篇墨翟宋人號墨子墨子著書三十五篇其術多務儉嗇精當為清雜汗謂非禮義之言也横行天下雖逹四方人莫不賤勞苦之事則偷懦轉脫偷謂苟避於事懦亦謂懦弱畏事皆怠惰之義或曰偷當為輸揚子方言云懦輸愚郭璞注謂懦㦏也又云解偷懦謂懦之人苟求免於事之義饒樂之事則佞兊而不曲兊恱也言接恱於人以求饒樂之事不曲謂直取之也辟違而不慤乖辟違背不能端慤誠信辟讀為僻程役而不錄程功役勞役錄檢束也於功程及勞役之事怠惰而不檢束言不能拘守而詳之也橫行天下雖達四方人莫不弃行而供冀非漬淖也供恭也冀當為翼凢行自當恭敬非謂漬於泥淖也人在泥淖中則兢兢然或曰李廵注爾雅冀州曰冀近也恭敬謂不敢放誕也行而俯項非擊戾也擊戾謂項曲戾不能仰者也擊戾猶言乖戾也偶視而先俯非恐懼也偶視對視也然夫士欲獨修其身不以得罪於比俗之人也夫驥一日而千里駑馬十駕則亦及之矣將以窮無窮逐無極與其折骨絶筋終身不可以相及也將有所止之則千里雖逺亦或遲或速或先或後胡為乎其不可以相及也不識步道者將以窮無窮逐無極與意亦有所止之與逺行夫堅白同異有厚無厚之察非不察也此言公孫龍惠施之曲說異理不可為法也堅白謂厚堅白也公孫堅白論曰堅白石三可乎曰不可二可乎曰可謂目視石但見白不知其堅則謂之白石手觸石則知其堅而不知其白則謂之堅石是堅白終不可合為一也司馬彪曰堅白謂堅石非石白馬非馬也同異謂使異者同同者異或曰即莊子所謂大同而與小同異此之謂小同異言同在天地之間故謂之大同物各有種類所同故謂之小同是大同與小同異也此畧舉同異故曰此謂小同異莊子又曰萬物畢同畢異此之謂大同異言萬物揔謂之物莫不皆同是萬物畢同若分而别之則人耳目鼻口百體草木枝葉花實無不皆異是物畢異也此具舉同異故曰此之謂大同異莊子又曰無厚不可積也其大千里無厚謂厚之極不可爲厚薄也不可積言其委積至多不可使復積也凡無厚不可積因於有厚可積故得其大千里千里者舉大之極也然而君子不辨止之也止而不為倚魁之行非不難也然而君子不行止之也倚奇也奇讀為奇偶之奇方言云秦晉之間凡物體全而不具謂之倚魁大也倚魁皆謂偏倚狂怪之行莊子曰南方有倚人焉曰黄獠也故學曰遲彼止而待我我行而就之學曰謂為學者傳此言也遲待也直吏反則亦或遲或速或先或後胡為乎其不可以同至也故蹞步不休跛鼈千里累土不輟丘山崇成重意莊六十四章九層之臺起於累土千里之行始於足下厭其源開其瀆江河可竭厭塞也音一涉反源江竇也一進一退一左一右六驥不致言不齊故不能致逺路也彼人之才性之相懸也豈若跛鼈之與六驥足哉然而跛鼈致之六驥不致是無他故焉或為之或不爲之耳道雖邇不行不至事雖小不為不成其爲人也多暇日者其出入不逺矣多暇日謂怠出入謂道路所至也好法而行士也好法而能行則謂之士士事也謂能治其事也篤志而體君子也厚其志而知大體者也齊明而不竭聖人也齊謂無偏頗也不竭不窮也書曰成湯克齊聖廣淵人無法則倀倀然倀倀無所適貌也言不知所措履禮記曰倀倀乎其何之有法而無志其義則渠渠然渠讀為遽古字渠遽通渠渠不寛泰之貌志識也不識其義謂但拘守文字而已矣依乎法而又深其類然後温温然深其類謂深知統類温温有潤澤之貌舉類君子所難故屢言之也禮者所以正身也師者所以正禮也無禮何以正身無師吾安知禮之為是也禮然而然則是情安禮也師云而云則是知若師也情安禮知若師則是聖人也情安禮謂若天性所安不以學也行不違禮言不違師則與聖人無異言師法之效如此故非禮是無法也非師是無師也無師謂不以師為師不是師法而好自用譬之是猶以盲辨色以聾辨聲也舎亂妄無為也舎除也除亂妄之人孰肯爲此也故學也者禮法也夫師以身為正儀而貴自安者也效師之禮法以爲正儀如性之所安斯爲貴也禮或爲體詩曰不識不知順帝之則此之謂也詩大雅皇矣之篇引此以喻師法暗合天道如文王雖未知已順天之法則也端慤順弟則可謂善少者矣弟與悌同加好學遜敏焉則有鈞無上可以為君子者矣既好學遜敏又有鈞平之心而無上人之意則可以為君子矣或曰有鈞無上四字􅄛耳偷儒憚事無廉恥而嗜乎飲食則可謂惡少者矣偷儒憚事皆謂懦弱怠惰畏勞苦之人也加惕悍而不順險賊而不弟焉韓侍郎云惕與蕩同字作心邊易謂放蕩兇悍也則可謂不詳少者矣雖陷刑戮可也詳當為祥老老而壯者歸焉老老謂以老為老而尊敬之也孟子曰伯夷太公二老者天下之大老也是天下之父也其父歸之其子焉往不窮窮而通者積焉窮者則寛而容之不廹蹙以苛政謂惠恤鰥寡窮匱也積填委也既然則通者歸亦多矣覆巢毁卵則鳳凰不至竭澤涸魚則蛟龍不遊又與此同也行乎冥冥施乎無報而賢不肖一焉行乎𠖇冥謂行事不務求人之知施乎無報謂施不務報如此賢不肖同慕而歸之也人有此三行雖有大過天其不遂乎若不幸而有過天亦佑之矣此固不宜有大災也君子之求利也略其遠思也早其避辱也懼其行道理也勇君子貧窮而志廣富貴而體恭安燕而血氣不惰勞勌而容貌不枯怒不過奪喜不過予予賜也周禮八柄三曰予以馭其幸君子貧窮而志廣隆仁也仁愛之心厚故所思者廣言務於逺大濟物也富貴而體恭殺勢也滅權勢之威故形體恭謹殺所介反安燕而血氣不惰柬理也柬與簡同言柬擇事理所宜而不務驕逸故雖安燕而不至怠惰勞勌而容貌不枯好交也以和好交接於物志意常泰也怒不過奪喜不過予法勝私也以公滅私故賞罰得中也書曰無有作好遵王之道無有作惡遵王之路此言君子之能以公義勝私欲也書洪範之辭荀子卷一欽定四庫全書荀子卷
