  text: 十九
  hash: sha256:9340996fc6c404c0ff856bacaed35ee78791a147a2c7e1eb2a4e61cbdc984deb
body:
  text: 唐楊倞註大略篇第二十七此篇蓋弟子雜録荀卿之語皆略舉其要不可以一事名篇故總謂之大略也舊第二十七大略舉其標首所以起下文也君人者隆禮尊賢而王重法愛民而霸好利多詐而危欲近四旁莫如中央故王者必居天下之中禮也此明都邑居土中之意不近偏旁居中央取其朝貢道里均禮也言其禮制如此天子外屏諸侯内屏禮也外屏不欲見外也内屏不欲見内也屏猶蔽也屏謂之樹鄭康成云若今浮思也何休注公羊云禮天子諸侯臺門天子外闕兩觀諸侯内闕一觀禮天子外屏諸侯内屏大夫以簾士以帷倞謂不欲見内不察泉中魚之義也諸侯召其臣臣不俟駕顚倒衣裳而走禮也詩曰顚之倒之自公召之天子召諸侯諸侯輦輿就馬禮也輦謂人輓車言不暇待馬至故輦輿就馬也詩曰我出我車于彼牧矣自天子所謂我來矣詩小雅出車之篇毛云出車就馬於牧地鄭云有人自天子所謂我來矣謂以王命召已也此明諸侯奉上之禮也天子山冕諸侯𤣥冠大夫裨冕士韋弁禮也山冕謂畫山於衣而服冕即衮冕也蓋取其龍則謂之衮冕取其山則謂之山冕鄭注周禮司服云古冕服十二章衣五章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彞皆畫裳四章次六曰藻次七曰粉米次八曰黼次九曰黻皆繡鄭注覲禮云禆之言卑也天子六服大裘為上其餘為禆以事尊卑服之諸侯亦服焉上公衮無升龍侯伯鷘子男毳孤絺卿大夫𤣥鄭云大夫禆冕蓋亦言禆冕止於大夫士已下不得服也韋弁謂以爵韋為韠而載弁也玉藻曰韠君朱大夫素士爵韋也天子御珽諸侯御荼大夫服笏禮也御服皆器用之名尊者謂之御卑者謂之服御者言臣下所進御也珽大珪長三尺杼上終葵首謂剡上至其首而方也茶古舒字玉之上圓下方者也鄭康成云珽然無所屈也茶讀如舒遲之舒懦者所畏在前也天子彫弓諸侯彤弓大夫黑弓禮也彫謂彫畫為文飾彤弓朱弓此明貴賤服御之禮也諸侯相見卿為介相見謂於郄地為會介副也聘義卿為上擯大夫為承擯君親禮賔言主君見聘使則以卿為上擯出會則以卿為上介也以其教出畢行教謂戒令畢行謂羣臣盡行從君也使仁居守使仁原者主後事春秋傳一子守二子從此明諸侯出疆之禮又榖梁傳曰智者慮義者行仁者守然後可以會矣聘人以珪問士以璧召人以瑗絶人以玦反絶以環聘人以珪謂使人聘他國以珪璋也問謂訪其國事因遺之也衛侯使工尹襄問子貢以弓是其類也說文云瑗者大孔璧也爾雅好倍肉謂之瑗肉倍好謂之璧禮記曰君召臣以三節周禮珍珪以徵守鄭云以徴召守國之諸侯若今徵郡守以竹使符也然則天子以珍珪召諸侯諸侯召臣以瑗璵玦如環而决肉好若一謂之環古者臣有罪待放於境三年不敢去與之環則還與之玦則絶皆所以見意也反絶謂反其將絶者此明諸侯以玉接人臣之禮也人主仁心設焉知其役也禮其盡也故王者先仁而後禮天施然也人主根本施設在仁其役用則在智盡善則在禮天施天道之所施設也此明為國以仁為先也聘禮志曰幣厚則傷德財侈則殄禮禮云禮云玉帛云乎哉志記也言玉帛禮之未也禮記曰不以美設之也詩曰物其指矣唯其偕矣不時宜不敬交不驩欣雖指非禮也詩小雅魚麗之篇指與㫖同美也偕齊等也時謂得時宜謂合宜此明聘好輕財重禮之義也水行者表深使人無陷治民者表亂使人無失禮者其表也先王以禮表天下之亂今廢禮者是去表也故民迷惑而陷禍患此刑罰之所以繁也表標志也此明為國當以禮示人也舜曰維予從欲而治虞書舜美臯陶之辭言臯陶明五刑故舜得從欲而治引之以喻禮能成聖亦猶舜賴臯陶也故禮之生為賢人以下至庶民也非為成聖也然而亦所以成聖也不學不成禮本為中人設然聖人不學亦不成也堯學於君疇舜學於務成昭禹學於西王國君疇漢書古今人表作尹夀又漢藝文志小說家有務成子十一篇昭其名也尸子曰務成昭之教舜曰避天下之逆從天下之順天下不足取也避天下之順從天下之逆天下不足失也西王國未詳所說或曰大禹生於西羌西王國西羌之賢人也新序子夏對哀公曰黄帝學於大填顓頊學于録圖帝嚳學于赤松子堯學于尹夀舜學于務成禹學于西王國湯學于成子伯文王學于時子思武王學于郭叔此明聖人亦資於教也五十不成䘮七十唯衰存不成䘮不備哭踊之節衰存但服縗庥而已其禮皆可略也禮記曰七十唯衰麻在身也親迎之禮父南鄉而立子北面而跪醮而命之徃迎爾相成我宗事鄭云相助也宗事宗廟之事也隆率以敬先妣之嗣若則有常儀禮作朂率鄭云朂勉也若汝也勉率婦道以敬其為先妣之嗣也汝之行則當有常深戒之詩云大姒嗣徽音子曰諾惟恐不能敢忘命矣子言惟恐不能勉率以嗣先妣不敢忘父命也夫行也者行禮之謂也所以稱行者在禮也禮也者貴者敬焉老者孝焉長者弟焉㓜者慈焉賤者惠焉惠亦賜也言行禮如此五者則可為人之行也賜予其宫室猶用慶賞於國家也忿怒其臣妾猶用刑罰於萬民也宫室妻子也此明能治家則以治國也君子之於子愛之而勿面使之而勿貌導之以道而勿彊面貌謂以顔色慰恱之不欲施小惠也故易家人曰有嚴君焉勿彊不欲使其愧也此語出曾子禮以順人心為本故亡於禮經而順人心者背禮者也禮記曰禮也者義之實也協諸義而協則禮雖先王未之有可以義起也禮之大凡事生飾驩也送死飾哀也軍旅飾威也不可太質故為之飾親親故故庸庸勞勞仁之殺也庸功也庸庸勞勞謂稱其功勞以報有功勞者殺差等也皆仁恩之差也殺所介反貴貴尊尊賢賢老老長長義之倫也倫理也此五者非仁恩皆出於義之理也行之得其節禮之序也行仁義得其節則是禮有次序也仁愛也故親義理也故行禮節也故成非仁不親非義不行雖有仁義無禮以節之亦不成仁有里義有門里與門皆謂禮也里所以安居門所以出入仁非其里而虛之非禮也義非其門而由之非義也虛讀為居聲之誤也仁非其里義非其門皆謂有仁義而無禮也推恩而不理不成仁仁雖在推恩而不得其理則不成仁謂若有父子之恩而無嚴敬之義也遂理而不敢不成義雖得其理而不敢行則不成義義在果斷故曰非知之艱行之維艱審節而不知不成禮雖能明審節制而不知其意也知或為和和而不發不成樂雖和順積中而英華不發於外無以播於八音則不成於樂也故曰仁義禮樂其致一也言四者雖殊同歸於得中故曰其致一也君子處仁以義然後仁也仁而能斷行義以禮然後義也雖能斷而不違禮然後為義制禮反本成末然後禮也反復也本謂仁義末謂禮節謂以仁義為本終成於禮節也三者皆通然後道也通明三者然後為道貨財曰賻輿馬曰􅈖衣服曰襚玩好曰贈玉貝曰含此與公羊穀梁之說同玩好謂明器琴瑟笙竽之屬何休曰此皆春秋之制也賻猶覆也􅈖猶助也皆助生送死之禮禭猶遺也遺是助死者之禮也知生則􅈖賻知死則禭含賻􅈖所以佐生也贈襚所以送死也送死不及柩尸弔生不及悲哀非禮也皆謂葬時故吉行五十犇䘮百里􅈖贈及事禮之大也既說弔贈及事因明犇䘮亦宜行逺也禮記犇䘮日行百里不以夜行禮者政之輓也如輓車然為政不以禮政不行矣天子即位上卿進曰如之何憂之長也能除患則為福不能除患則為賊授天子一策上卿於周若冢宰也皆謂書於策讀之而授天子深戒之也言天下安危所繋其憂甚逺長問何以治之能為天下除患則百福歸之不能則反為賊害策編竹為之後易之以玉焉也中卿進曰配天而有下土者先事慮事先患慮患先事慮事謂之接接讀為㨗速也中卿若宗伯也接則事優成先患慮患謂之豫豫則禍不生事至而後慮者謂之後後則事不舉患至而後慮者謂之困困則禍不可禦授天子二策禦禁也二䇿第二策下卿進曰敬戒無怠慶者在堂弔者在閭下卿若司冦也慶者雖在堂弔者已在門言相襲之速閭門也禍與福鄰莫知其門言同一門出入也賈誼曰憂喜聚門豫哉豫哉萬民望之授天子三策豫哉言可戒備也三策第三策禹見耕者耦立而式過十室之邑必下兩人共耕曰耦論語曰長沮桀溺耦而耕十室之邑必有忠信故下之也殺大蚤朝大晩非禮也殺謂田獵禽獸也禮記曰天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車蚤謂下先上也又曰朝辨色始入殺太蚤謂陵犯也朝大晩為懈弛也或曰禮記曰獺祭魚然後魚人入澤梁豺祭獸然後田獵先於此為蚤也又曰田不以禮是暴天物也治民不以禮動斯陷矣平衡曰拜下衡曰稽首至地曰稽顙平衡謂磬折頭與腰如衡之平禮記平衡與此義殊大夫之臣拜不稽首非尊家臣也所以辟君也辟讀為避一命齒於鄉再命齒於族三命族人雖七十不敢先一命公侯之士再命大夫三命卿也鄭註禮記曰此皆鄉飲酒時齒謂以年次坐若立也禮記曰三命不齒族人雖七十者不敢先言不唯不與少者齒老者亦不敢先也上大夫中大夫下大夫此覆一命再命三命也一命惟公侯之士子男之大夫也故曰下大夫也吉事上尊䘮事尚親吉事朝廷列位也䘮事以親者為主禮記曰以服之精麄為序君臣不得不尊父子不得不親兄弟不得不順夫婦不得不驩少者以長老者以養不得謂不得聖人之禮法驩與歡同故天地生之聖人成之聘問也享獻也私覿私見也使大夫出以珪璋聘所以相問也聘享奉束帛加璧享所以有獻也享畢賔奉束帛以請覿所以私見也聘享以賔禮見私覿以臣禮見故曰私見鄭注儀禮云享獻也既聘又獻所以厚恩意也言語之美穆穆皇皇爾雅曰穆穆敬也皇皇正也郭璞云皇皇自修正貌穆穆容儀謹敬也皆由言語之美所以威儀修飾或曰穆穆美也皇皇有光儀也詩曰皇皇者華朝廷之美濟濟鎗鎗鎗與蹌同濟濟多士貌蹌蹌有行列貌為人臣下者有諌而無訕有亡而無疾有怨而無怒謗上曰訕亡去也疾與嫉同惡也怨謂若公弟叔肹衛侯之弟鱄怒謂若慶鄭也君於大夫三問其疾三臨其䘮於士一問一臨諸侯非問疾弔䘮不之臣之家之徃也禮記曰諸侯非問疾弔䘮而入諸臣之家是謂君臣為謔也既葬君若父之友食之則食矣不辟􅆝肉有酒醴則辭鄭云尊者之前可以食美變於顔色亦不可也寢不踰廟設衣不踰祭服禮也謂制度精麄設宴也易之咸見夫婦易咸卦艮下兊上艮為少男兊為少女故曰見夫婦也夫婦之道不可不正也君臣父子之本也易說卦曰有天地然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣故以夫婦為本咸感也以髙下下以男下女柔上而剛下陽唱隂和然後相成聘士之義親迎之道重始也聘士謂若安車束帛重其禮也迎魚敬反禮者人之所履也失所履則顚蹷陷溺所失微而其為亂大者禮也禮之於正國家也如權衡之於輕重也如繩墨之於曲直也故人無禮不生事無禮不成國家無禮不寧和樂之聲此言珩珮之聲和樂人心也步中武象趨中韶䕶珮玉之聲緩則中武象速則中韶䕶禮記曰古之君子必珮玉右徵角左宫羽趨以采齊行以肆夏是其類也或曰此和樂謂在車和鸞之聲步驟之節也君子聽律習容而後士君子在位者之通稱禮記曰既服習容觀玉聲聽律謂聽珮聲使中音律也言威儀如此乃可為士士者修立之名也霜降逆女冰泮殺内十日一御此蓋誤耳當為氷泮逆女霜降殺内故詩曰士如歸妻迨冰未泮殺減也内謂妾御也十日一御即殺内之義氷泮逆女謂發生之時合男女也霜降殺内謂閉藏之時禁嗜慾也月令在十一月此云霜降荀卿與吕氏所傳聞異也鄭云歸妻謂請期也冰未泮正月中以前二月可以成昏禮故云冰泮逆女殺所介反坐視膝立視足應對言語視面儀禮士相見云子視父則遊目無上於面無下於帯若不言立則視足坐則視膝鄭云不言則伺其行起而已立視前六尺而大之六六三十六三丈六尺蓋臣於君前視也近視六尺自此而廣之雖逺視不過三丈六尺曲禮曰立視五嶲彼在車上故與此不同也文貌情用相為内外表裏文謂禮物貌謂威儀情謂中誠用謂語言質文相成不可偏用也禮之中焉能思索謂之能慮禮者本末相順終始相應禮者以財物為用以貴賤為丈以多少為異並解於禮論篇下臣事君以貨中臣事君以身上臣事君以人貨謂聚斂及珍異獻君身謂死衛社稷人謂舉賢也易曰復自道何其咎易小畜卦初九之辭復返也自從也本雖有失返而從道何其咎過也春秋賢穆公以為能變也公羊傳曰秦伯使遂來聘遂者何秦大夫也秦無大夫此何以書賢穆公也何賢乎穆公以為能變也謂前不用蹇叔百里之言敗於崤函而自變悔作秦誓詢兹黄髮是也士有妒友則賢交不親君有妒臣則賢人不至蔽公者謂之昧隱良者謂之妒掩閉公道謂之暗昧奉妒昧者謂之交譎交通於譎詐之人相成為惡也交譎之人妒昧之臣國之薉孽也薉與穢同孽妖孽言終為國之災害也口能言之身能行之國寶也口不能言身能行之國器也如器物雖不言而有行也口能言之身不能行國用也國頼其言可用也口言善身行惡國妖也治國者敬其寶愛其器任其用除其妖不富無以養民情衣食足知榮辱不教無以理民性人性惡故須教故家五畝宅百畝田務其業而勿奪其時所以富之也宅居處也百畝一夫田也務謂勸勉之也孟子曰五畝之宅樹之以桑五十者可以衣帛矣百畝之田無失其時八口之家可以無飢矣立大學設庠序修六禮明十教所以導之也詩曰飲之食之教之誨之王事具矣禮記曰六禮冠昏䘮祭鄉相見十教即十義也禮記曰父慈子孝兄良弟悌夫義婦聽長恵㓜順君仁臣忠十者謂之仁義導謂教導之也十或為七武王始入殷表商容之閭釋箕子之囚哭比干之墓天下鄉善矣表築旌之言武王好善天下鄉之孔安國曰商容殷之賢人紂所貶退也天下國有俊士世有賢人天下之國皆有俊士每世皆有賢人也迷者不問路溺者不問遂亡人好獨以喻雖有賢俊不能用也所以迷由於不問路溺由於不問遂亡由於好獨遂謂徑隧水中可涉之徑也獨謂自用其計也詩曰我言維服勿以為笑先民有言詢于芻蕘言博問也詩大雅板之篇毛云芻蕘薪者也鄭云服事也我之所言乃今之急事汝無笑也有法者以法行無法者以類舉皆類於法而舉之也以其本知其末以其左知其右凡百事異理而相守也其事雖異其守則一謂若為善不同同歸於理之類也慶賞刑罰通類而後應通明於類然後百姓應之謂賞必賞功罰必罰罪不失其類也政教習俗相順而後行順人心然後可行也八十者一子不事九十者舉家不事廢疾非人不養者一人不事父母之䘮三年不事齊衰大功三月不事從諸侯不不當為來謂從他國來或君之人入采地與新有昏朞不事古者有䘮昏皆不事所以重其哀戚與嗣續也事謂力役也子謂子家駒續然大夫不如晏子子孔子謂言也子家駒魯公子慶父孫公孫歸父之後名羈駒其字也續言補續君之過不能興功用故不如晏子也晏子功用之臣也不如子産雖有功用不如子産之恩惠也子産惠人也不如管仲雖有恩惠不如管仲之才略也管仲之為人力功不力義力知不力仁雖九合諸侯一匡天下而不全用仁義也野人也不可以為天子大夫言四子皆類郊野之人未浸漬於仁義故不可為王者佐孟子三見宣王不言事門人曰曷為三遇齊王而不言事孟子曰我先攻其邪心以正色攻去邪心乃可與言也公行子之之燕孟子公行子有子之䘮右師徃弔趙岐云齊大夫也子之蓋其先也遇曾元於􅂗曰燕君何如曾元曰志卑言不求逺大也曾元曾參之子志卑者輕物物事輕物者不求助不求賢以自輔苟不求助何能舉既無輔助必不勝任矣氐𦍑之虜也謂見俘掠不憂其係壘也而憂其不焚也壘讀為累氐𦍑之俗死則焚其屍今不憂虜獲而憂不焚是愚也吕氏春秋曰憂其死而不焚利夫秋毫害靡國家然且為之幾為知計哉靡披靡也利夫秋豪之細其害遂披靡而來及於國家言不恤其大而憂其小與氐𦍑之虜何異幾辭也或曰幾讀為豈今夫亡箴者終日求之而不得其得之非目益明也眸而見之也心之於慮亦然眸謂以眸審視之也言心於思慮亦當反覆盡其精妙如眸子之求箴也義與利者人之所兩有也雖堯舜不能去民之欲利然而能使其欲利不克其好義也克亦勝也雖桀紂亦不能去民之好義然而能使其好義不勝其欲利也故義勝利者為治世利克義者為亂世上重義則義克利上重利則利克義故天子不言多少諸侯不言利害大夫不言得䘮皆謂言財貨也士不通財貨七賤雖得言之亦不得貿遷如商賈也有國之君不息牛羊息繁育也錯質之臣不息雞豚錯置也質讀為贄孟子曰出疆必載質蓋古字通耳置贄謂執贄而置於君士相見禮曰士大夫奠贄於君再拜稽首禮曰畜馬乘者不察於雞豚或曰置質猶言委質也言凡委質為人臣則不得與下爭利冡卿不修幣大夫不為場園冢卿上卿不修幣謂不修財幣販息之也治稼穡曰場樹蔬菜曰園謂若公儀子不奪園夫工女之利也從士以上皆羞利而不與民爭業樂分施而耻積藏然故民不困財貧窶者有所竄其手竄容也容集其手而力作也文王誅四武王誅二周公卒業至成康則案無誅已並解在仲尼篇言周公終王業猶不得無誅伐至成康然後刑措也重引此者明不與民爭利則刑罰省也多積財而羞無有羞貧重民任而誅不能使民不能勝任而復誅之此邪行之所以起刑罰之所以多也上好羞則民闇飾矣好羞貧而事奢侈則民闇自修飾也上好富則民死利矣二者亂之衢也衢道民語曰欲富乎忍恥矣傾絶矣絶故舊矣與義分背矣忍耻不顧廉耻傾絶謂傾身絶命而求也分背如人分背而行上好富則人民之行如此安得不亂湯旱而禱曰政不節與使民疾與何以不雨至斯極也疾苦宫室榮與婦謁盛與何以不雨至斯極也榮盛謁請也婦謁盛謂婦言是用苞苴行與讒夫興與何以不雨至斯極也貨賄必以物苞裏故總謂之苞苴興起也鄭注禮記曰苞苴褁魚肉者或以葦或以茅天之生民非為君也天之立君以為民也故古者列地建國非以貴諸侯而已列官職差爵禄非以尊大夫而已差謂制等級也主道知人臣道知事人謂賢良事謂職守故舜之治天下不以事詔而萬物成不以事詔告但委任而已謂若使禹治水不告治水之方略農精於田而不可以為田師工賈亦然以賢易不肖不待卜而後知吉以治伐亂不待戰而後知克無人禦敵故知必克齊人欲伐魯忌卞莊子不敢過卞卞魯邑莊子卞邑大夫有勇者晉人欲伐衞畏子路不敢過蒲蒲衞邑子路蒲宰杜元凱云蒲邑在長垣縣西南不知而問堯舜好問者則無不知故可比聖人也無有而求天府知無而求之是有天府之富先王之道則堯舜已問先王之道則可為堯舜六貳之博則天府已求財於六貳之博得之不窮故曰天府天府天之府藏言六貳之博可以得貨財先王之道可以為堯舜故以喻焉六貳之博則六博也王逸注楚辭云投六箸行六棊故曰六博今之博局亦二六相對也君子之學如蛻幡然遷之如蟬蛻也幡與翻同故其行効其立効其坐効其置顔色出辭氣効効放也置措也言造次皆學而不捨也無留善有善即行無留滯也無宿問當時即問不俟經宿善學者盡其理善行者究其難非知之難行之惟艱故善行之者事究其難君子立志如窮似不能通變雖天子三公問正以是非對至尊至貴對之唯一故曰如窮也君子隘窮而不失不失道而隕獲勞倦而不苟不苟免也臨患難而不忘細席之言尸子子夏曰君子漸於飢寒而志不僻銙於五兵而辭不懾臨大事不忘昔席之言昔席蓋昔所踐履之言此細亦當讀為昔或曰細席講論之席臨難不忘素所講習忠義之言漢書王吉諌昌邑曰廣厦之下細旃之上歲不寒無以知松栢事不難無以知君子無日不在是無有一日不懐道所謂造次必於是也雨小漢故潛未詳或曰爾雅云漢為潛李廵曰漢水溢流為潛今云雨小漢故潛言漢者本因雨小水濫觴而成至其盛也乃溢為潛矣言自小至大者也夫盡小者大積微者著德至者色澤洽行盡而聲聞逺色澤洽謂德潤身行下孟反小人不誠於内而求之於外言而不稱師謂之畔畔者倍之半也教而不稱師謂之倍教人不稱師其罪重故謂之倍倍者反逆之名也倍畔之人明君不内朝士大夫遇諸塗不與言不足於行者説過言説太過故行不能副也不足於信者誠言數欲誠實其言故信不能副君子所以貴行不貴言也故春秋善胥命而詩非屢盟其心一也春秋魯桓公三年齊侯衞侯胥命于蒲公羊傳曰相命也何言乎相命近正也古者不盟結言而退又詩曰君子屢盟亂是用長言其一心而相信則不在盟誓也善為詩者不説善為易者不占善為禮者不相其心同也皆言與理冥㑹者至於無言説者也相謂入為贊相也曾子曰孝子言為可聞行為可見發言使人可聞不詐妄也立行使人可見不苟為斯為孝子也言為可聞所以說逺也行為可見所以說近也近者說則親逺者說則附親近而附逺孝子之道也說皆讀為恱近親逺附則毁辱無由及親也曾子行晏子從於郊曰嬰聞之君子贈人以言庶人贈人以財嬰貧無財請假於君子贈吾子以言假於君子謙辭也晏子先於孔子曾子之父猶為孔子弟子此言送曾子豈好事者為之歟乘輿之輪大山之木也示諸櫽栝三月五月為幬菜敝而不反其常皆言車之材也示讀為寘櫽栝矯揉木之器也言寘諸櫽栝或三月或五月也幬菜未詳或曰菜讀為菑謂轂輿輻也言矯揉直木為牙至於轂輻皆敝而規曲不反其初所謂三材不失職也周禮考工記曰望其轂欲其眼也進而眡之欲具幬之廉也鄭云幬慢轂之革也革急則木廉隅見考工記又曰察其菑蚤不齵則輪雖敝不匡鄭云菑謂輻入轂中者蚤讀為爪爪謂輻入牙中者也匡刺也晏子春秋曰今夫車輪山之直木良匠揉之其圎中規雖有槁暴不復贏矣君子之櫽栝不可不謹也愼之為移其性故不可慢蘭􅊉槀本漸於蜜醴一佩易之雖皆香草然以浸於甘醴一三佩方可易貿之言所漸者美而加貴也佩或為倍謂其一倍也漸浸也子廉反此語與晏子春秋不同正君漸於香酒可讒而得也雖正直之君其所漸染如香之於酒則讒邪可得而入言甘醴變香草之性甘言變正君之性或為美或為惡皆在其所漸染也君子之所漸不可不愼也人之於文學也猶玉之於琢磨也詩曰如切如磋如琢如磨謂學問也和之璧井里之厥也玉人琢之為天子寶和之璧楚人卞和所得之璧也井里里名厥也未詳或曰厥石也晏子春秋作井里之困也子贛季路故鄙人也被文學服禮義為天下列士學問不厭好士不倦是天府也言所得多君子疑則不言未問則不立道逺日益矣未曾學問不敢立為論議所謂不知為不知也為道久逺自日有所益不必道聽塗説也此語出曾子多知而無親博學而無方好多而無定者君子不與無親不親師也方法也此皆謂雖廣博而無師法也少不諷壯不論議雖可未成也諷謂就學諷詩書也言不學雖有善質未為成人也君子壹教弟子壹學亟成壹專壹也亟急也己力反君子進則能益上之譽而損下之憂進任損減不能而居之誣也無益而厚受之竊也誣君竊位學者非必為仕而仕者必如學如徃子貢問於孔子曰賜倦於學矣願息事君息休息孔子曰詩云温恭朝夕執事有恪事君難事君焉可息哉詩商頌那之篇然則賜願息事親孔子曰詩云孝子不匱永錫爾類事親難事親焉可息哉詩大雅既醉之篇毛云匱竭也類善也言孝子之養無有匱竭之時故天長賜以善也然則賜願息於妻子孔子曰詩云刑于寡妻至于兄弟以御于家邦妻子難妻子焉可息哉詩大雅思齊之篇刑法也寡徳之妻言賢也御治也言文王先立禮法於其妻以至于兄弟然後治于家邦言自家刑國也然則賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友難朋友焉可息哉亦既醉之篇毛云言相攝佐者以威儀也然則賜願息耕孔子曰詩云晝爾于茅宵爾索綯亟其乘屋其始播百榖耕難耕焉可息哉詩豳七月之篇于茅徃取茅也綯絞也亟急也乘屋升屋治其弊漏也然則賜無息者乎孔子曰望其壙臯如也嵮如也鬲如也此則知所息矣壙丘壠臯當為宰宰冢也宰如髙貌嵮與塡同如謂土塡塞也鬲謂革絶於上列子作宰如墳如張湛注云見其墳壤鬲異則知息之有所也子貢曰大哉死乎君子息焉小人休焉國風之好色也傳曰盈其欲而不愆其止好色謂關雎樂得淑女也盈其欲謂好仇寤寐思服也止禮也欲雖盈滿而不敢過禮求之此言好色人所不免美其不過禮也故詩序云關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也其誠可比於金石其聲可内於宗廟其誠以禮自防之誠也比於金石言不變也其聲可内於宗廟謂以樂章播八音奏於宗廟鄉飲酒禮合樂周南關雎葛覃詩序云關雎后妃之徳風之始也所以風化天下故用之鄉人焉用之邦國焉既云用之邦國是其聲可内於宗廟者也小雅不以於汙上自引而居下以用也汙上驕君也言作小雅之人不為驕君所用自引而疏逺也疾今之政以思徃者其言有文焉其聲有哀焉小雅多刺幽厲而思文武言有文謂不鄙陋聲有哀謂哀以思也國將興必貴師而重傅貴師而重傅則法度存國將衰必賤師而輕傅賤師而輕傅則人有快人肆其意人有快則法度壊古者匹夫五十而士禮四十而士五十而後爵此云五十而士恐誤或曰為卿士也天子諸侯子十九而冠冠而聽治其教至也十九而冠先於臣下一年也雖人君之子猶年長而冠冠而後聴其政治以明教至然後治事不敢輕易君子也者而好之其人有君子之質而所好得其人謂得賢師也其人也而不教不祥祥善非君子而好之非其人也既無君子之質又所好非其人非其人而教之齎盗糧借賊兵也若使不善人教非君子是猶資盗賊之兵糧為害滋甚不如不教也齎與資同兵五兵也不自嗛其行者言濫過嗛足也謂行不足也所以不足其行者由於言辭汎濫過度也古之賢人賤為布衣貧為匹夫食則饘粥不足衣則豎褐不完然而非禮不進非義不受安取此豎褐僮豎之褐亦短褐也言賢人雖貧窮義不苟進安取此言過而行不副之事也子夏貧衣若縣鶉人曰子何不仕曰諸侯之驕我者吾不為臣大夫之驕我者吾不復見柳下惠與後門者同衣而不見疑非一日之聞也柳下惠魯賢人公子展之後名獲字禽居於柳下諡惠季其伯仲也後門者君子守後門至賤者子夏言昔柳下惠衣之弊惡與後門者同時人尚無疑怪者言安於貧賤渾跡而人不知也非一日之聞言聞之乆矣爭利如蚤甲而䘮其掌蚤與爪同言仕亂世驕君縱得小利終䘮其身也君人者不可以不愼取臣匹夫者不可以不愼取友友者所以相有也有與友同義相友謂不使䘮亡道不同何以相友也均薪施火火就燥平地注水水流溼夫類之相從也如此之著也以友觀人焉所疑察其友則可以知人之善惡不疑也取友求善人不可不愼是徳之基也取友求善人不可不愼是徳之基本言所以成德也詩曰無將大車維塵冥冥言無與小人處也詩小雅無將大車之篇將猶扶進也將車賤者之事塵冥冥蔽人目明令無所見與小人處亦然也藍苴路作似知而非未詳其義或曰苴讀為姐慢也趙蕤注長短經知人篇曰姐者類智而非智或讀為姐伺也才野反懦弱易奪似仁而非仁者不爭而與物故懦弱易奪者似之易奪無執守之謂也悍戇好鬬似勇而非悍兇戻也戇愚也丁絳反仁義禮善之於人也辟之若貨財粟米之於家也多有之者富少有之者貧至無有者窮故大者不能小者不為是弃國損身之道也凡物有乘而來乘其出者是其反者已反覆也出去也凡乘勢而去者皆是物之還反也言善惡皆所自取也流言滅之貨色逺之禍之所由生也生自纎纎也是故君子蚤絶之流言謂流轉之言不定者也滅亦絶也凡禍之所由生自纎纎微細故君子早絶其萌此語亦出曾子言之信者在乎區蓋之間區藏物處蓋所以覆物者凡言之可信者如物在器皿之間言有分限不流溢也器名區者與丘同義漢書儒林傳唐生褚生應博士弟子選試誦説有法疑者丘蓋不言丘與區同也疑則不言未問則不立重引此兩句以明之知者明於事達於數不可以不誠事也誠忠誠言不可以虛妄事知者故曰君子難說說之不以道不說也說並音恱語曰流丸止於甌􅁷流言止於智者甌􅁷皆甌器也揚子方言云陳魏楚宋之間謂罃為史甌􅁷謂地之􅉾坎如甌􅁷者也或曰甌㬰窳下之地史記曰甌窶滿溝汙邪滿車裴駰云甌窶傾側之地汙邪下地也耶與史聲相近蓋同也窶力侯反汙烏孤反此家言邪學之所以惡儒者也家言謂偏見自成一家之言若宋墨者是非疑則度之以逺事驗之以近物參之以平心流言止焉惡言死焉參驗之至則流言息死猶盡也鄭康成云死之言澌澌猶消盡也曾子食魚有餘曰泔之門人曰泔之傷人不若奥之泔與奥皆烹和之名未詳其說曾子泣涕曰有異心乎哉傷其聞之晩也曾子自傷不知以食餘之傷人故泣涕深自引過謝門人曰吾豈有異心故欲傷人哉乃所不知也言此者以譏時人飾非自是耻言不知與曾子異也無用吾之所短遇人之所長遇當也言已才藝有所短宜自審其分不可彊欲當人所長而辯爭也故塞而避所短移而從所仕疏知而不法察辯而操僻勇果而亡禮君子之所憎惡也塞掩也移就也仕與事同事所能也言掩其不善務其所能也疏通也察辯而操僻謂聰察其辯所操之事邪僻也操七刀反多言而類聖人也應萬變故多類謂皆當其類而無乖越此聖人也少言而法君子也多言無法而流喆然雖辯小人也喆當為湎非十二子篇有此語此當同或曰當為楛也國法禁拾遺惡民之串以無分得也串習也古患反有夫分義則容天下而治無分義則一妻一妾而亂天下之人唯各特意哉然而有所共予也特意謂人殊意予讀為與言味者予易牙言音者予師曠言治者予三王易牙齊桓公宰夫知味者師曠晉平公樂師知音者三王既已定法度制禮樂而傳之有不用而改自作何以異於變易牙之和更師曠之律無三王之治天下不待亡國不待死言不暇有所待而死亡速之甚也更工衡反飲而不食者蟬也不飲不食者蜉蝣也蜉蝣渠略朝生夕死蟲也言此者以喻人既飲且食必須求先王法略為治不得苟且如蜉蝣輩也虞舜孝已孝而親不愛比干子胥忠而君不用仲尼顔淵知而窮於世刧迫於暴國而無所辟之辟讀為避言賢者不遇時危行言遜則崇其善揚其美言其所長而不稱其所短也惟惟而亡者誹也惟讀為唯以癸反唯唯聽從之貌常聽從人而不免亡者由於退後即誹謗也博而窮者訾也清之而愈濁者口也已解於榮辱篇君子能為可貴不能使人必貴已能為可用不能使人必用已修德在已所遇在命誥誓不及五帝誥誓以言辭相戒約也禮記曰約信曰誓又曰殷人作誓而民始畔盟詛不及三王蒞牲曰盟謂殺牲歃血告神以盟約也交質子不及五伯此言後世徳義不足雖要約轉深猶不能固也伯讀曰霸榖梁傳亦有此語荀子卷十九欽定四庫全書荀子卷
