body:
  text: 登仕郎守大理評事揚倞儒效篇第八也效功大儒之效武王崩成王幼周公屏成王而及武王以屬天下惡天下之倍周也繼屬續屏蔽及欲反也屬之履天下之籍之圖籍也籍謂天下聽天下之斷偃然如固有之而天下不稱貪焉固有之謂如偃然猶安然此位也固合有殺管叔虚殷國而天下不稱戾焉讀虚遷殷頑民于洛邑朝歌爲墟也爲墟戾暴也墟殷國謂殺武庚兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉之國者十有五人姬姓之國者四十人皆舉親也與此數左氏傳成鱄對魏獻子曰昔武王克商光有天下其兄弟建親戚以蕃周室管蔡郕霍魯衛毛耼郜雍曹滕畢原鄷郇略同言四十人蓋舉成數又曰昔周公弔二叔之不咸故封胙祭周公之胤也餘國名淺學難盡詳究文之昭也䢴晉應韓武之穆也凡蒋邢茅教誨開導成王使諭於道而能揜迹於文武通導逹揜開導謂開也襲周公歸周黒肩蓋其後也言周公自歸其國也周公所封畿内之國亦名周春秋周公反籍於成王而天下不輟事周然而周公北面而朝之臣明攝政非為已也待其固安之後北面為天子也者不可以少當也當此位也不可少頃不可以假攝為也頃假攝天子周公所以少以安周室也之位蓋權宜能則天下歸之不能則天下去之是以周公屏成王而及武王以屬天下惡天下之離周也成王冠成人周公歸周反籍焉明不滅主之義也周公無天下矣郷有天下今無天下非擅也禪同言非禪譲與成郷讀為向下同擅與也王成王郷無天下今有天下非奪也變勢次序節然也序之期如此也節期也權變次故以枝代主而非越也弟故曰枝主成王也枝枝子周公武王之以弟誅兄而非暴也周公之兄也謂殺管叔管叔君臣易位而非不順也然故易位時不得不不順非為因天下之和遂文武之業明枝主之義抑亦變化矣天下厭然猶一也貌一渉反厭然順從之非聖人莫之能為夫是謂大儒之效秦昭王問孫卿子曰儒無益於人之國宣漢以荀卿爲孫卿也帝名詢劉向編録故孫卿子曰儒者法先王隆禮義謹乎臣子而致貴其上者也謂使不敢謹乎臣子極也為非致人主用之則勢在本朝而宜權勢在本言儒者得合宜也朝則事皆不用則退編百姓而慤必為順下矣勃亂也必不為雖窮困凍餧必不以邪道為貪無置錐之地而明於持社稷之大義嗚呼而莫之能應然而通乎財萬物養百姓之經紀亦不怠惰困弃常通於裁萬物養百姓之綱紀也嗚呼嘆辭也財與裁同雖嘆其莫已知無應之者而勢在人上則王公之材也為人君也在人之上謂在人下則社禝之臣國君之寳也雖隱於窮閻漏屋人莫不貴之道誠存也也漏屋敝屋漏雨者也窮閻窮僻之處閻里門仲尼将為魯司寇寇也魯司沈猶氏不敢朝飲其羊公愼氏出其妻慎潰氏踰境而徙魯皆不制慎潰氏奢侈踰法魯之粥六畜者飾之以詣賈人家語曰沈猶氏常朝飲其羊以詐市人公慎氏妻淫魯之粥牛馬者不豫賈必蚤正以待之也定為豫賈正其身以待物故得從化如此賈讀為價高價也粥牛馬者不敢高價言仲尼必先居於闕黨闕黨之子弟罔不分有親者取多閒居闕黨居謂孔子均之中有父母者取其多也之子弟罔不分均有無於分孝弟以化之也以孝弟由孔子之化儒者在夲朝則美政在下位則美俗儒之為人下如是矣王曰然則其為人上何如孫卿曰其為人上也廣大矣志意定乎内禮節脩乎朝法則度量正乎官忠信愛利形乎下形見也官百官行一不義殺一無罪而得天下不為也此君子義信乎人矣通於四海則天下應之如讙讙讙喧也言聲齊應之也以君義通於四海故應之如是何也則貴名白而天下治也可貴白明顯貴名謂儒名故近者歌謳而樂之逺者竭蹶而趨之倒也逺竭蹶顚如不及然者顚倒趨之四海之内若一家通逹之屬莫不從服夫是之謂人師通之處也師長也言儒者之功通逹之屬謂舟車所至人力所為人師長也如此故可以詩曰自西自東自南自北無思不服此之謂也此以明天下皆歸之也詩大雅文王有聲之篇引夫其為人下也如彼其為人上也如此何謂其無益於人之國也昭王曰善先王之道仁人隆也比中而行之謂儒學仁先王之道詭異之説不高不下使賢不肖皆可及也人之所崇高也以其比類中道而行之不為曷謂中曰禮義是也道者非天之道非地之道人之所以道也怪異之事是人所行之道也重説先王之道非隂陽山川君子之所道也君子之所謂賢者非能徧能人之所能之謂也君子之所謂知者非能徧知人之所知之謂也君子之所謂辨者非能徧辨人之所辨之謂也君子之所謂察者非能徧察人之所察之謂也有所正矣徧能或曰正當苟得其正不必於禮義也為止言止相高下視墝肥序五種君子不如農人稷豆麥麻序謂不失次序各當土冝也相視也高下原隰也墝薄田也五種黍通財貨相美惡辨貴賤君子不如賈人其貴賤也賈與估視貨物之美惡辨同設䂓矩陳繩墨便備用君子不如工人巧便於備用便備用謂精不䘏是非然不然之情以相薦撙以相恥怍君子不若惠施鄧析也謂相蹈薦藉也陵駕也怍慙也藉撙抑皆謂相若夫謫徳而定次度其徳而定位次謫與商同古字商其徳故下亦有決徳而定次也本或亦多作譎譎與决同謂斷決量能而授官使賢不肖皆得其位能不能皆得其官當其才任使各萬物得其宜事變得其應慎墨不得進其談惠施鄧析不敢竄其察二子之察無竄隠匿也言子皆識也所逃匿君言必治當事必當務是然後君子之所長也凡事行有益於治者立之孟反行下無益於理者廢之夫是之謂中事几知説有益於理者為之無益於理者舎之夫是之謂中説行事失中謂之姦事知説失中謂之姦道姦事姦道治世之所弃而亂世之所從服也若夫充虚之相施易也曰移易謂使充實也施讀虚者實實者虚堅白同異之分隔也分别隔異同異已解以堅白同異之言相也上是聦耳之所不能聽也明目之所不能見也辯士之所不能言也雖有聖人之知未能僂指也反公羊傳曰夫人不僂何休曰僂疾也齊人僂疾也言雖聖人亦不可疾速指陳僂力主也言不知無害為君子知之無損為小人工匠不知無害為巧君子不知無害為治大夫也君子卿王公好之則亂法百姓好之則亂事作業事謂而狂惑戇陋之人乃始率其羣徒辨其談説明其辟稱老身長子不知惡也稱尺證反身老戇愚也辟音譬不知惡之也子長言終身夫是之謂上愚然亦不免於愚故曰上愚有偏僻之見非昧然無知曾不如好相鷄狗之可以為名也之名尚不如有惠施鄧析之名也相鷄狗詩曰為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也蜮也則汝誠不可得見也姡然有面目女乃人也人相視無有詩小雅何人斯之篇毛云蜮短狐也靦姡也鄭云使汝為引此以喻狂惑之人也極時終必與女相見也我欲賤而貴愚而知貧而富可乎曰其唯學乎彼學者行之曰士也為士也士者脩立之彼為儒學者能行則稱敦慕焉君子也慕之敦厚知之聖人也於學也於知之謂通聖人無異也事皆通則與上為聖人下為士君子孰禁我哉使不為聖人士君子也為學之後則誰能禁我郷也混然涂之人也俄而並乎堯禹豈不賤而貴矣哉知之貎並混然無所涂與途同比也郷音向郷也效門室之辨混然曾不能決也别異猶不能決言所知淺也效白辨别也向者明白門室之俄而原仁義分是非圖回天下於掌上而辨白黒豈不愚而知矣哉言圖謀運轉天下之事如在掌上也原夲也謂知仁義之本圖謀也囘轉也郷也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉鏁相聮相繫漢書所謂鋃鐺者胥靡刑徒人也胥相靡繫也謂而服役之猶今囚徒以鏁連枷也也舉皆也顔師古曰聮繫使相隨今有人於此㞕然藏千溢之寳雖行貣而食人謂之富矣然㞕貴敬之此故人尊故曰貴名不可以比周爭也不可以夸誕有也不可以勢重脅也必將誠此然後就也學之名此身也貴名人所貴儒爭之則失讓之則至遵道則積夸誕則虚誕則尤益空虚也遵道則自委積夸故君子務脩其内而讓之於外務積徳於身而處之以遵道如是則貴名起如日月天下應之如雷霆聲如雷衆應之故曰君子隠而顯微而明辭讓而勝詩曰鶴鳴于九臯聲聞于天此之謂也而名箸也鄭云臯澤中水溢岀所爲坎詩小雅鶴鳴之篇毛云臯澤也言身隠喻深逺也自外數至九鄙夫反是比周而譽俞少鄙爭而名俞辱煩勞以求安利其身而俞危讀俞愈為詩曰民之無良相怨一方受爵不讓至于已斯亡此之謂也以明不責已而怨人詩小雅角弓之篇引此故不能小而事大辟之是猶力之少而任重也舍粹折無適也之外無所之適言必碎折舍除也粹讀為碎除碎折身不肖而誣賢是猶傴身而好升高也指其頂者愈衆頭頂尤低屈故指而笑者愈衆傴傴僂也傴身之人而強昇高則故明主譎徳而序位所以為不亂也忠臣誠能然後敢受職所以為不窮也分不亂於上能不窮於下治辨之極也不窮謂通於其職不亂謂皆當其序治辨之極也列也言儒為詩曰平平左右亦是率從是言上下之交不相亂也平辯治也交謂上下相交詩小雅采菽之篇毛云平也接以從俗為善以貨財為寳以養生為已至道是民徳也徒民徳言不知禮義也養生為已至道謂莊生之行法至堅不以私欲亂所聞如是則可謂勁士矣行法至堅好脩正其所聞以橋飾其情性下孟反橋與矯同行法謂行有法度行其言多當矣而未諭也其行多當矣而未安也其知慮多當矣而未周密也如天性安行之也周密謂盡善也未喻謂未盡曉其義未安謂未得上則能大其所隆下則能開道不已若者如是則可謂篤厚君子矣脩百王之法若辨白黒應當世之變若數一二二之易如數一行禮要節而安之若生四枝生四枝不以造作為也要一遙反及下要邀也節節文也言安於禮節若身之同要時要時立功之巧若詔四時謂不失機權若邀時立功之巧成萬物也天告四時使平正和民之善億萬之衆而博若一人如是則可謂聖人矣理一人之少也雖博雜衆多如井井兮其有理也貌理有條理也井井兮良易之嚴嚴兮其能敬已也不可以干非禮也嚴或為儼嚴嚴兮有威重之貌能敬已分分兮其有終始也故能有終始分扶問反事各當其分即無雜亂猒猒兮其能長久也知足然後能長久也猒足也亂生於不足故樂樂兮其執道不殆也也殆危炤炤兮其用知之明也貌炤與照同炤炤明見之脩脩兮其用統類之行也紀也言事不乖悖也脩脩整齊之貌統類綱綏綏兮其有文章也或為葳蕤之貌綏綏安泰之貌綏熈熈兮其樂人之臧也樂之貌熈熈和隱隱兮其恐人之不當也憂戚隱隱以上皆論大儒之徳也貌恐人之行事不當理此如是則可謂聖人矣此其道出乎一曷謂一曰執神而固神堅固執持精曷謂神曰盡善挾洽之謂神萬物莫足以傾之之謂固浹周洽也挾讀為浹神固之謂聖人聖人也者道之管也天下之道管是矣百王之道一是矣是是儒學管樞要也故詩書禮樂之歸是矣詩言是其志也之志是儒書言是其事也禮言是其行也樂言是其和也春秋言是其微也謂微其文隠其義之類是也儒之微㫖一字為襃貶微故風之所以為不逐者取是以節之也暴之君而流蕩者取聖人之儒道以風國風逐流蕩也國風所以不隨荒乎情人之性也止乎禮義先王之澤也節之也詩序曰變風發乎情止乎禮義發小雅之所以為小者取是而文之也文飾也雅正也大雅之所以為大者取是而光之也文飾也雅正也頌之所以為至者取是而通之也徳之極至謂盛天下之道畢是矣郷是者臧倍是者亡郷是如不臧倍是如不亡者自古及今未甞有也郷讀曰向是皆謂儒也客有道曰孔子曰周公其盛乎徳盛言其身貴而愈恭家富而愈儉勝敵而愈戒言勝敵戒備也客説孔子之言如此而益戒備荀卿之時有應之曰是殆非周公之行非孔子之言也武王崩成王幼周公屏成王而及武王履天子之籍負扆而坐牖户之扆之間謂諸侯趨走堂下當是時也夫又誰為恭矣哉兼制天下立七十一國姬姓獨居五十三人焉周之子孫苟不狂惑者莫不為天下之顯諸侯孰謂周公儉哉武王之誅紂也行之日以兵忌家所忌之日武王發兵以兵東面而迎太歲諫曰歲在北方不北征武王不從迎謂逆太歲尸子曰武王伐紂魚辛至汜而汎至懷而壞河地名謂至汜而適遇水汎漲而至懐又河水汎汜水名懐地名書曰覃懐底績孔安國曰覃懐近紂天雨日夜不休汜音溢也吕氏春秋曰武王伐至共頭而山隧頭蓋共縣之山共河内縣名共隧讀為墜共音恭名隧謂山石崩摧也霍叔懼曰出三日而五災至無乃不可乎未當至共蓋文王三分天下有其二境土已霍叔武王弟也出行也周居豐鎬軍出三日汜之後三日也近於洛矣或曰至周公曰刳比干而囚箕子飛廉惡來知政夫又惡有不可焉父箕國名子爵也飛廉比干紂賢臣箕子紂諸廉善走惡來有力也惡來皆紂之嬖臣飛遂選馬而進擇也選簡朝食於戚暮宿乎百泉近朝歌地名左氏傳曰晉人敗范氏于百杜元凱云戚衛邑在頓丘衛縣西百泉蓋泉厭且於牧之野明已前也厭於申反厭掩也夜掩於且謂未鼓之而紂卒易郷也郷讀曰向倒戈而攻後遂乗殷人而誅紂其倒乗乗勢戈之蓋殺者非周人因殷人也倒戈之勢自殺之非周人殺之因殷故無首虜之獲無蹈難之賞功受賞者周人無立反而定三革偃五兵牛也考功記曰凾人為甲犀甲七屬兕甲定息偃仆也皆不用之義三革犀也兕也五兵矛㦸鉞楯弓矢國語説齊桓定三革偃五刃韋昭云三六屬合甲五屬穀梁傳曰天子救日置五麾陳五兵范寗云刀劒矛㦸矢也革甲胄盾也五刃合天下立聲樂下諸侯歸一統也合天下謂合㑹天於是武象起而韶護廢矣名武亦周頌篇名詩序曰武象周武王克殷之後樂殷樂名左氏傳曰吳季札見舞韶護者蓋殷時兼用舜樂武武奏大武也禮記曰下管象朱干玉戚以冕而舞大武韶護之也王廢四海之内莫不變心易慮以化順之故外闔不閇扇也闔門跨天下而無蘄天下而無求言自跨越也蘄求也越之不待求也足也亦人皆與當是時也夫又誰為戒矣哉平太誰備戒如此復造父者天下之善御者也無輿馬則無所見其能王之御者造父周穆羿者天下之善射者也無弧矢則無所見其巧太康而遂篡位者羿有窮之君逐夏大儒者善調一天下者也無百里之地則無所見其功輿固馬選矣而不能以至逺一日而千里則非造父也弓調矢直矣而不能以射逺中微則非羿也又中微細之物也善射者既能及逺用百里之地而不能以調一天下制強暴則非大儒也彼大儒者雖隠於窮閻漏屋無置錐之地而王公不能與之爭名在一大夫之位則一君不能獨畜一國不能獨容成名況乎諸侯莫不願得以為臣二子篇已解非十用百里之地而千里之國莫能與之爭勝笞捶暴國齊一天下而莫能傾也是大儒之徴也徵驗也傾危也其言有類其行有禮類於善不為類善也謂比之言狂妄其舉事無悔其持險應變曲當也其險危其宜當丁浪反持危應變皆曲得與時遷徙與世偃仰設教隨時千舉萬變其道一也是大儒之稽也皆歸於治其道一謂於為治一也稽考也考成也也故禹湯文武事跡不同其其窮也俗儒笑之其通也英傑化之嵬瑣逃之曰傑言英傑之士則倍千人曰英倍萬人則畏而逃去之也慕而化之狂怪之人邪説畏之衆人愧之非其所為衆人初皆媿也媿或爲貴成功之後故自通則一天下窮則獨立貴名名儒天不能死地不能埋桀跖之世不能汙非大儒莫之能立仲尼子弓是也故有俗人者有俗儒者有雅儒者有大儒者之異也辨儒者有不學問無正義以富利為隆是俗人者也逢衣淺帶解果其冠韓詩外傳作逢衣博逢大也淺帶博帶也解果陿隘也左思魏都賦曰風俗以韰倮為嫿韰音下帶言帶博則約束衣服者淺故曰淺帶解果未詳或曰曰臣笑鄰國之祠田以一壺酒三鮒魚祝曰蟹螺者宜介反倮音果嫿音獲靜好也或曰説苑涥于髠謂齊王蓋亦比之謂強爲儒服而無其實也禾汙邪者百車蟹螺蓋髙地也今冠略法先王而足亂世術世法韓詩外傳作略法先王而不足於亂世略粗也粗法先王之遺言不知大體故足以亂繆學雜舉不知法後王而一制度不知隆禮義而殺詩書制度是一也若妄引上古不合於時後王後世之王夫隨當時之政而立法韓詩外傳作不知法先王也制度亂矣故仲尼脩春秋盡用周其衣冠行偽己同於世俗矣然而不知惡者衣淺帶之比行偽衣冠即上所云逢行下孟反謂行僞而堅其言議談説已無所以異於墨子矣然而明不能分别呼先王以欺愚者而求衣食焉稱舉呼謂得委積足以揜其口則揚揚如也意之貌揚揚得隨其長子事其便辟舉其上客然若終身之虜而不敢有他志是俗儒者也者也便婢延反辟讀曰嬖舉其上客謂襃美長子謂君之世子也便辟謂左右小臣親信環繞囚拘之貌莊子曰睆然在纆之中其上客冀得其助也字書無所見蓋法後王一制度隆禮義而殺詩書其言行巳有大法矣然而明不能齊能齊言行使無纎介之差雖有大體其所見之明猶未法敎之所不及聞見之所未至則知不能類也知則不有所未夫之有可以義起是能類者矣能取比類而通之也禮記雖先王知之曰知之不知曰不知内不自以誣外外不自以欺内欺人不自以是尊賢畏法而不敢怠傲是雅儒者也雅有儒也徳之法先王統禮義一制度以淺持博以古持今以一持萬博也先王當為後王以古持今當以淺持博謂見其淺則可以執持皆傳冩誤也為以今持古苟仁義之類也雖在鳥獸之中若别白黒猶别況在人矣善類在鳥獸之中倚物怪變所未甞聞也所未甞見也卒然起一方則舉統類而應之無所儗㤰卒千忽反儗讀為疑㤰與怍同倚竒也韓詩外傳作竒物怪變其統類故舉以應之無所疑滯慙怍也竒物怪變卒然而起人所難處者大儒知張法而度之則晻然若合符節是大儒者也故開張其法既無所疑怍同符節相合之物也周禮門關用符節蓋以全竹為之割之以測度之則晻然如合符節言不差錯也度大各反晻與暗合之爲驗也為兩各執其一故人主用俗人則萬乗之國亡利故土也不義而好用俗儒則萬乗之國存存僅用雅儒則千乗之國安用大儒則百里之地久多患小國可以長久也難用大儒然後而後三年天下為一諸侯為臣臣諸侯蓋殷湯周文皆化行之後三年而王也長久之業既成又三年脩徳化則可以一天下用萬乗之國則舉錯而定一朝而伯霸言一朝而霸也錯讀為措伯讀為不聞不若聞之聞之不若見之見之不若知之知之不若行之學至於行之而止矣行之明也明於事也行之則通明之爲聖人則為聖人通明於事聖人也者本仁義當是非齊言行不失豪釐無他道焉已乎行之矣他在止於行其所學者也當丁浪反已止也言聖人無故聞之而不見雖博必謬有謬誤也雖博聞必見之而不知雖識必妄於指意謂若制氏然也見而不知雖能記識必昧知之而不行雖敦必困多厚必至困躓也苟不能行雖所知不聞不見則雖當非仁也君子之通明者也雖偶有所當非仁人其道百舉而百陷也百陷無一可免也言偶中之道百舉而故人無師無法而知則必為盜勇則必為賊云能則必為亂言其能云能自察則必為怪析之比惠施鄧辨則必為誕人有師有法而知則速通勇則速威云能則速成察則速盡辨則速論盡物理速論謂能速論是非也察則速盡謂有聰察之性則能速故有師法者人之大寳也無師法者人之大殃也人無師法則隆情矣有師法則隆性矣所欲厚於性謂本於善也隆厚也厚於情謂恣其情之而師法者所得乎情非所受乎性不足以獨立而治怒愛惡情謂喜性不足獨立而治必在因外情而化之或曰情當為積所外物所感者也言師法之於人得於外情非天性所受故則不可獨立而治必在化之也得乎積習非受於天性既非天性性也者吾所不能為也然而可化也也必在化而為之一也言天性非吾自能爲情也者非吾所有也然而可為乎然可以外物誘而為言情非吾天性所有曰非吾所有雖非所有然而可為之也之或曰情亦當為積積習與天然有殊故注錯習俗所以化性也也錯千故反注錯猶措置并一而不二所以成積也師法二謂異端并讀為併一謂習俗移志安久移質俗則移習以為久則移本質其志安之既并一而不二則通於神明參於天地矣故積土而為山積水而為海旦暮積謂之嵗至高謂之天至下謂之地宇中六指謂之極逺則為六極言積近以成逺六指上下四方也盡六指之涂之人百姓積善而全盡謂之聖人彼求之而後得為之而後成積之而後髙盡之而後聖故聖人也者人之所積也行委積言其徳人積耨耕而為農夫積斵削而為工匠積反貨而為商賈為販反讀積禮義而為君子工匠之子莫不繼事而都國之民安習其服風之衣服安習其土居楚而楚居越而越居夏而夏夏夏中是非天性也積靡使然也積習故能然靡順也順其故人知謹注錯愼習俗大積靡則為君子矣順積習為也大積靡謂以縱情性而不足問學則為小人矣為君子則常安榮矣為小人則常危辱矣凡人莫不欲安榮而惡危辱故唯君子為能得其所好小人則日徼其所惡也一堯反徼與邀同招詩曰維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒此之謂也進也言厲王有此善詩大雅桑柔之篇迪故天下之民貪亂安然為荼毒之行由王使之然也人不求而進用之忍害為惡之人反顧念而重復之人論論盧困反論人之善惡志不免於曲私而冀人之以已為公也行不免於汙漫而冀人之以已為脩也也漫莫叛反汙穢也漫欺誑甚愚陋溝瞀而冀人之以已為知也是衆人也也衆人謂衆庶人也溝音寇愚也溝瞀無知志忍私然後能公行忍情性然後能脩謂忍下孟反矯其性行知而好問然後能才好問然後能有其智慮不及常藝才公脩而才可謂小儒矣故為小儒也皆矯其不及志安公行安脩知通統類如是則可謂大儒矣大儒者天子三公也者之佐也其才堪王小儒者諸侯大夫士也衆人者工農商賈也禮者人主之所以為羣臣寸尺尋丈檢式也人倫盡矣束檢儒可為天子三公小儒可為諸侯大夫禮可以緫統羣臣人主也式法也度也尺寸尋丈所以知長短也檢束所以制放佚大等也言人道荖盡於禮也之柄也倫當為論或曰倫君子言有壇宇行有防表道有一隆壇宇屋累土為防表謂有標准也一隆謂厚於一不以異端亂之也邊也防隄防表標也言有壇宇謂有所尊高也行有言道徳之求不下於安存道徳之求故誤重寫耳故下此道徳或當為政治以下有治來求則以安存國家已上之事語之也云諸侯問政不及安存則不告也謂人以政言志意之求不下於士語為士已上之事以脩其志意來求則言道徳之求不二後王施行之事不二後王師告而不以逮古也舎後王道徳教化也人以教化來求則言當時之切所宜是二也而言逺古道過三代謂之蕩已久逺則為浩蕩道過三代已前事也難信法二後王謂之不雅時之事而廣説逺古則雅正也其治法不論當正也為不高之下之小之臣之不外是矣巨雖高臣當為壇宇防表也下小大不出此是君子之所以騁志意於壇宇宫庭也説不出此壇宇宫庭之内也是時百家異説宫謂之室庭門屏之内也君子雖騁志意論故荀卿屢有此言也多妄引前古以亂當世故諸侯問政不及安存則不告也匹夫問學不及為士則不教也百家之説不及先王則不聽也王之道妄起異端百家雜説不及先聽之也則君子不夫是之謂君子言有壇宇行有防表也荀子卷第四
