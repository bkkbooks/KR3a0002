body:
  text: 登仕郎守大理評事揚倞注彊國篇第十六形范正金錫美工冶巧火齊得孰齊和得宜火齊得謂生六齊齊才細反考工記云金有剖刑而莫邪已鑄劒規模之器也剖開刑與形同范法也形范之良劒也莫邪古然而不剥脱不砥厲則不可以斷繩澀砥厲謂磨淬也剥脱謂刮去其生剥脱之砥厲之則蠫槃盂刎牛馬忽然耳試劒者也戰國䇿趙奢謂田單曰吳蠫割也音戾蠫槃盂刎牛馬蓋古用器猶刜鍾無聲及斬牛馬者也忽然言易也干將之劒肉試則斷牛馬金試則截槃盂皆銅彼國者亦彊國之剖刑已初開此也如彊圑之然而不敎不誨不調不一則入不可以守出不可以戰敎誨之調一之則兵勁城固敵國不敢嬰也彼國者亦有砥厲禮義節奏是也法度也節奏有故人之命在天國之命在禮人君者隆禮尊賢而王重法愛民而霸好利多詐而危權謀傾覆幽險而亡難知則亡也幽深傾險使下威有三有道徳之威者有暴察之威者有狂妄之威者急嚴察也暴察謂暴此三威者不可不孰察也禮樂則脩分義則明義謂各得其宜分謂上下有分舉錯則時愛利則形之心見於外也形見也愛利人如是百姓貴之如帝高之如天神也帝天親之如父母畏之如神明故賞不用而民勸罰不用而威行夫是之謂道徳之威禮樂則不脩分義則不明舉錯則不時愛利則不形然而禁暴也察其誅不服也審其刑罰重而信其誅殺猛而必商申比之黭然而雷擊之如牆厭之文云黭黑色猶闇黭然卒至之貎說厭讀為壓然黭烏感反如是百姓劫則致畏時則畏也見劫脅之嬴則敖上傲慢嬴音盈稍嬴緩之則執拘則最得間則散聚最猶最也何休曰最聚也也間隙也公羊傳曰會敵中則奪國一曰中擊也丁仲敵人得中道則奪其反非劫之以形埶非振之以誅殺則無以有其下動振夫是之謂暴察之威無愛人之心無利人之事而日為亂人之道百姓讙敖則從而執縛之刑灼之不和人之心譁也讙喧呼之聲嗷嗷然也五刀反敖喧噪也亦讀為嗷謂叫如是下比周賁潰以離上矣民逃其上曰潰賁讀為憤憤然也傾覆滅亡可立而待也夫是之謂狂妄之威此三威者不可不孰察也道徳之威成乎安彊暴察之威成乎危弱狂妄之威成乎滅亡也公孫子曰子發將西伐蔡克蔡獲蔡侯其名後語孟嘗君客公孫子齊相也未知知其姓戰國䇿莊辛諫楚襄王曰蔡聖侯南遊乎高陂北有公孫成豈後為齊相乎或曰公孫名忌子發楚令尹未國家為事不知夫子發方受命子宣王繫以朱絲而見之史記陵乎巫山左枕幼妾右擁嬖女與之馳騁乎高蔡之閒而不以辛云宣王與史記不同蔡侯齊為楚惠王所滅莊歸致命曰蔡侯奉其社稷而歸之楚其社稷歸楚非己之功也歸致命於君言蔡侯自奉舍屬二三子而治其地諸臣也治其地謂安輯其民也子發舍子發名屬請也之欲反二三子楚之請諸臣理其地也不欲獨擅其功故既楚發其賞後發行也既謂論功之子發辭曰發誡布令而敵退是主威也徙舉相攻而敵退是將威也合戰用力而敵退是衆威也相攻而敵退則是畏其將合戰用力而敵退則誡敎也凡發誡布令而敵退則是畏其主徙舉衆也畏其臣舍不宜以衆威受賞故曰衆威此以上公孫是時合戰用力而滅蔡以下荀卿之辭也子美子發之辭也譏之曰子發之致命也恭其辭賞也固賞則固陋非坦明之道也固陋也其致命難其辭夫尚賢使能賞有功罰有罪非獨一人為之也皆然自古彼先王之道也一人之本也善善惡惡之應也齊一人之本善善惡惡之報應也彼彼賞罰也言彼賞罰者乃先王之道治必由之古今一也用賞罰為治必古者明王之舉大事立大功也大事已博大功已立則君享其成羣臣享其功受其獻也享獻也謂士大夫益爵官人益秩庶人益禄也庶人士卒也秩禄皆謂廪食也爵謂若秦庶長不更之屬官人羣吏是以爲善者勸爲不善者沮上下一心三軍同力是以百事成而功名大也今子發獨不然反先王之道亂楚國之法墮興功之臣恥受賞之屬臣墮廢其志受賞之屬慙恥於心人皆受賞子發獨辭是使興功之無僇乎族黨而抑卑乎後世子孫揚其功族黨夫先祖有寵錫則稱揚雖無刑戮之恥而後世亦抑損卑下無以光榮也遭刑戮則後世䝉其恥今子發自謂無功則子孫無以案獨以為私廉豈不過甚矣哉故曰子發之致命也恭其辭賞也固荀卿子說齊相曰處勝人之埶行勝人之道天下莫忿湯武是也處勝人之埶不以行勝人之道用以厚於有天下之埶索爲匹夫不可得也桀紂是也然則得勝人之埶者其不如勝人之道遠矣夫主相者勝人以埶也是為是非為非能為能不能為不能併己之私欲必以道夫公道通義之可以相兼容者是勝人之道也棄私欲遵達公義併讀曰屏棄也屏也今相國上則得專主下則得專國相國之於勝人之埶亶有之矣作擅或曰亶誠也亶讀爲擅本亦或然則胡不敺此勝人之埶赴勝人之道馭之也敺謂駕人之埶誤也或作謳歌此勝求仁厚明通之君子而託王焉王使輔佐也求賢而託之以與之參國政正是非如是則國孰敢不爲義矣化之也國内皆君臣上下貴賤長少至于庶人莫不為義則天下孰不欲合義矣歸義也天下皆來賢士願相國之朝能士願相國之官好利之民莫不願以爲齊為歸是一天下也相國舍是而不爲案直爲是世俗之所以爲但爲勝人之埶不爲勝人之道則女主亂之宮詐臣亂之朝貪吏亂之官衆庶百姓皆以貪利爭奪爲俗曷若是而可以持國乎今巨楚縣吾前前縣聮繫之也楚在齊南故曰大燕鰌吾後故曰後鰌燕在齊北曰鰌我必勝我本亦或作蹲吾後也蹴也藉也如蹴踏於後莊子風謂蛇勁魏鉤吾右西壤之不絶若繩也西壤齊西界之地若繩言細也魏在齊西故曰右鉤謂如鉤取物楚人則乃有襄賁開陽以臨吾左二邑在齊之襄賁開陽楚縣皆屬東海郡賁音肥東者也漢書地理志二是一國作謀則三國必起而乗我三國乗其敝一國謀齊則如是則齊必斷而爲四取其二魏燕各取其一也三國分齊則斷爲四謂楚三國若假城然耳如三言齊久當歸之也國之寄城耳不必爲天下大笑曷若其無謀滅天下必笑何如也亡問以爲兩者孰足爲也人之埶一則天下歸兩者勝人之道與勝何者可爲也一則天下笑問天桀紂聖王之後子孫也有天下者之世也繼世世謂埶籍之所存天下之宗室也之所在也埶位國籍土地之大封内千里人之衆數以億萬億萬其數俄而天下倜然舉去桀紂而犇湯武高舉倜然犇與奔同之貎舉皆也反然舉疾惡桀紂而貴帝湯武音反貎惡烏路反番番然改變是何也夫桀紂何失而湯武何得也問荅假設是無他故焉桀紂者善為人之所惡而湯武者善爲人之所好也人之所惡者何也曰汗漫爭奪貪利是也汙不脩絜汙漫謂穢汙烏路反漫莫但反也或曰漫謂欺訴也人之所好者何也曰禮義辭讓忠信是也今君人者辟稱比方則欲自並乎湯武稱尺證反辟讀爲譬若其所以統之則無以異於桀紂而求有湯武之功名可乎治也統制故凡得勝者必與人也凡得人者必與道也道也者何也曰禮義辭讓忠信是也故自四五萬而徃者彊勝非衆之力也隆在信矣則足以自致彊勝不必更待與國之衆也若不崇而徃猶以上也言有兵四五萬以上者若能崇信益故曰非衆之力也信雖有與國之衆猶無自數百里而徃者安固非大之力也隆在脩政矣安固不必更待地廣也有數百里之地脩政則言此者若言常人之治非論聖人也荀卿常言湯武以百里之地王天下今今已有數萬之衆者也陶誕比周以爭與曰當爲逃謂逃匿其陶當爲檮杌之檮或與之國也情與謂黨已有數百里之國者也汙漫突盗以爭地陵犯也突謂相然則是棄己之所以安彊而爭己之所以危弱也損己之所以不足以重己之所以有餘與政有餘謂衆與地也損減也重多也不足謂信若是其悖繆也而求有湯武之功名可乎辟之是猶伏而咶天救經而引其足也同經縊咶與舐其足縊愈急也也音徑救縊而引說必不行矣俞務而俞遠爲人臣者不恤已行之不行反下如字上行下孟苟富利而已矣是渠衝入穴而求利也城之大車也詩渠大也渠衝攻城距衝不若堙内伏橐或作距衝蓋言可以距矢石曰臨衝閑閑韓子曰奏百貍首射侯不當彊弩趨發平是仁人之所羞而不爲也得故羞而不爲也屈大就小務於苟故人莫貴乎生莫樂乎安所以養生安樂者莫大乎禮義人知貴生樂安而棄禮義辟之是猶欲壽而歾頸也爲刎歾當愚莫大焉故君人者愛民而安好士而榮兩者無一焉而亡詩曰价人維藩大師維垣此之謂也義已解上大雅板之篇力術止義術行曷謂也曰秦之謂也兵之術力術彊術則行發此論以謂秦也新序李斯問孫卿曰當今之時爲義術仁義之術止謂不能進取霸王也言用力術則止用義止義術行秦之謂也秦奈何孫卿曰力術威彊乎湯武廣大乎舜禹然而憂患不可勝校也計校諰諰常恐天下之一合而軋已也此所謂力術止也曷謂乎威彊乎湯武湯武也者乃能使說己者使耳恱說音今楚父死焉國舉焉負三王之廟而辟於陳蔡之閒爲秦所虜而死也至二十一年此楚頃襄王之時也父謂懷王復戰東北保陳城廟主也辟如字謂自屏遠也或曰讀為秦將白起遂拔我鄢郢燒先王墓於夷陵襄王兵散遂不避視可伺閒案欲剡其脛而以蹈秦之腹伐也剡亦斬也視可謂觀其可然而秦使左案左使右案右是能使讎人役也年迎婦於秦城十五年與秦伐燕二十秦能使讎人爲之徒役謂楚襄王七入太子質之類也七年復與秦平而此所謂威彊乎湯武也曷謂廣大乎舜禹也曰古者百王之一天下臣諸侯也未有過封内千里者也之内封畿今秦南乃有沙羨與俱是乃江南也羨縣屬江夏郡漢書地理志沙是有江南也此地俱屬秦北與胡貉爲隣西有巴戎南戎在巴在西屬秦西皆隷東在楚者乃界於齊者乃與齊爲界也謂東侵楚地所得在韓者踰常山乃有臨慮屬河内今屬相州也漢書地理志臨慮縣名在魏者乃據圍津即去大梁百有二十里耳圉津轉寫為圍或作韋津今有韋城豈是耶史記朱忌謂魏安圍當爲圉漢書曾參下脩武度圉津顔師古曰在東郡豈古名河内共汲必危垝圍聲相近疑同垝居委反釐王曰秦固有懐茅邢丘城垝津以臨河内其在趙者剡然有苓而據松柏之塞名未詳所在或曰苓剡然侵削之貌苓地爲卷按卷縣屬河南非趙地也松柏之塞蓋趙樹松柏與秦與靈同漢書地理志常山郡有靈壽縣今屬眞定或曰苓當據有之爲界今秦負西海而固常山今有之言秦背西海東負背也常山本趙山秦爲固也向以常山是地徧天下也威動海内彊殆中國中國殆或爲治秦之彊能危殆然而憂患不可勝校也諰諰常恐天下之一合而軋已也此所謂廣大乎舜禹也然則奈何曰節威反文復用文理節減威彊案用夫端誠信全之君子治天下焉徳全全謂因與之參國政正是非治曲直而聽咸陽聽使之政咸陽順者錯之不順者而後誅之捨而不伐錯置也謂若是則兵不復出於塞外而令行於天下矣若是則雖爲之築明堂於塞外而朝諸侯殆可矣兵不復出於塞外故誤重寫此三字耳殆庶幾明堂天子布政之宮於塞外三字衍也以前有外境外也明堂壇也謂廵狩至方岳之下㑹諸侯爲宮方也秦若使賢人爲政雖築明堂朝諸侯庶幾可矣或曰塞王宮於踐土亦其類也或曰築明堂於塞外謂使他國爲秦三百歩四門壇十有二尋深四尺加方明于其上左氏傳爲秦郡縣築帝宮祠春秋稱東蕃是也築帝宮也戰國策韓王謂張儀曰請比假今之世益地不如益信之務也應侯問孫卿子曰入秦何見於應也杜元凱云應侯秦相范睢封城縣西南也應國在襄陽父孫卿子曰其國塞險形埶便山林川谷美溉灌之利也謂多良材及天材之利多産多也所出物是形勝也故曰如高屋之上而建瓴水也形地形便而物産多所以爲勝入境觀其風俗其百姓樸其聲樂不流汙汙濁也不流邪淫也淸雅也流汙言其服不挑民者衣服不貳從容有常以齊其挑偷也不爲竒異之服詩序曰長歸壹也民則民徳甚畏有司而順古之民也及都邑官府邑之解署及至也至縣其百吏肅然莫不恭儉敦敬忠信而不楛古之吏也爲王事靡盬之盬盬楛音苦濫惡也一曰讀固也不堅入其國觀其士大夫出於其門入於公門出於公門歸於其家無有私事也不比周不朋黨倜然莫不明通而公也古之士大夫也逺貌倜然高觀其朝廷其朝閒聽決百事不留恬然如無治者古之朝也音古莧反朝間朝退者如都無聽治處也恬然安閑貌如無治故四世有勝非幸也數也是所見也故曰佚而治約而詳不煩而功治之至也秦類之矣而有功古之至治有如此者雖佚而治雖約而詳雖不煩似之今秦雖然則有其諰矣懼諰兼是數具者而盡有之然而縣之以王者之功名則倜倜然其不及逺矣謂逺繫縣音懸是何也則其殆無儒邪故曰粹而王用儒道粹謂全駮而霸無一焉而亡此亦秦之所短也積微月不勝日時不勝月嵗不勝時之事月積微細心於庶事不可怠忽也不如日言常須日日留凡人好敖慢小事大事至然後興之務之如是則常不勝夫敦比於小事者矣躬親之謂敦比精審是何也則小事之至也數其縣日也博其爲積也大縣繫時日多也數音朔博謂所大若蟻垤然也大謂積小以成大事之至也希其縣日也淺其爲積也小所積亦少也時日既淺則故善日者王善時者霸補漏者危大荒者亡漏謂不能積功累業至善謂愛惜不怠棄也補荒謂都荒廢不治也於敝漏然後補之大故王者敬日曰吉人爲善唯日敬謂不敢慢也故足不霸者敬時變則懼治之不立也動作皆不失時或曰時僅存之國危而後戚之憂戚亡國至亡而後知亡至死而後知死亡國之禍敗不可勝悔也不可勝舉所悔之事甚也言多霸者之善箸焉可以時託也明箸以其霸者其善失時也所託不王者之功名不可勝日志也事故能功名日記識其政勝數不可財物貨寶以大爲重政敎功名反是能積微者速成詩曰徳輶如毛民鮮克舉之此之謂也引之以明積微至著之功詩大雅烝民之篇輶輕也凡姦人之所以起者以上之不貴義不敬義也下效上行夫義者所以限禁人之爲惡與姦者也今上不貴義不敬義如是則下之人百姓皆有棄義之志而有趨姦之心矣此姦人之所以起也且上者下之師也夫下之和上辟之猶響之應聲影之像形也故爲人上者不可不順也或曰當為愼不可不順義夫義者内節於人而外節於萬物者也限禁也節即謂上安於主而下調於民者也安而下調也得其節即上内外上下節者義之情也在得其節義之情皆然則凡爲天下之要義爲本而信次之古者禹湯本義務信而天下治桀紂棄義背信而天下亂故爲人上者必將愼禮義務忠信然後可此君人者之大本也爲順愼或堂上不糞則郊草不瞻曠芸也芸謂有草可芸曠空也空謂無草者未理不暇及遠魯連子謂田巴曰堂上不糞者郊草不鋤也堂上猶未糞除則不暇瞻視郊野之草有無也言近也芸白刃扞乎胷則目不見流矢胷謂見斬刺也扞蔽也扞蔽於暇憂流矢也懼白刃之甚不拔㦸加乎首則十指不辭斷惜十言不或作校或作枝指而救首也拔非不以此爲務也疾養緩急之有相先者也矢十指爲務痛癢緩急有所先救者疾痛也養與癢同言非不以郊草流務禮義然後及他事也也言此者明人君當先天論篇第十七天行有常行之道也天自有常不爲堯存不爲桀亡應之以理則吉應之以亂則凶愛堯而惡桀也吉凶由人天非彊本而節用則天不能貧農桑本謂養備而動時則天不能病不失時亦不使勞苦也養生既備動作養備謂使人衣食足動時謂勸人勤力疹不作也以時則疾脩道而不貳則天不能禍倍也貳即故水旱不能使之飢渴寒暑不能使之疾祅恠不能使之凶無飢寒之患則癘疫所不能加之也畜積有素故水旱不能使之飢渴既本荒而用侈則天不能使之富養略而動罕則天不能使之全衣食不足也動希言怠惰也衣略減少也罕希也養略謂使人惰則天不能全也食減少而又怠倍道而妄行則天不能使之吉故水旱未至而飢寒暑未薄而疾音博薄廹也祅恠未至而凶受時與治世同而殃禍與治世異不可以怨天其道然也人自使然非天降災故明於天人之分則可謂至人矣天斯爲至人知在人不在不爲而成不求而得夫是之謂天職四時行焉百物生焉不爲而成不求而得憎於堯桀之間乎天之職任如此豈愛如是者雖深其人不加慮焉雖大不加能焉雖精不加察焉夫是之謂不與天爭職不措意測度焉以其無益於治若措其人至人也言天道雖深逺至人曽子曰六合之外聖人存而不論也其在人者慕其在天者是爭職也莊天有其時地有其財人有其治夫是之謂能參地財而用之人能治天時於天地則是參舎其所以參而願其所參則惑矣人舍意斯惑矣事而欲知天列星隨旋日月遞炤四時代御隂陽大化風雨博施旋相隨回旋也炤與照同隂陽列星有列位者二十八宿也隨施謂廣博施行無不被也大化謂寒暑變化萬物也博萬物各得其和以生各得其養以成不見其事而見其功夫是之謂神見成功斯所以爲神若有眞宰然也和謂和氣養謂風雨不見和養之事但皆知其所以成莫知其無形夫是之謂天之難知言天道謂天功脱功字耳或曰當爲夫是之唯聖人爲不求知天故聖人但脩既天道難測慮於知天也人事不務役天職既立天功既成形具而神生好惡喜怒哀樂臧焉夫是之謂天情之身言人竅神精魂也天情所受於天之情也亦天職天功所成立也形謂百骸九耳目鼻口形能各有接而不相能也夫是之謂天官目辨色耳辨聲不能互相爲用官猶任也言天之所付任有如此也鼻辨臭口辨味形辨寒熱疾癢其所能皆可以接物而心居中虚以治五官夫是之謂天君空虚之地心居於中官是天使爲形體之君也以制治耳目鼻口形之五財非其類以養其類夫是之謂天養使養口腹形體故曰裁非其類以養其類是財與裁同飲食衣服與人異類裁而用之可道如此也天使奉養之順其類者謂之福逆其類者謂之禍夫是之謂天政不能裁者也天政言如賞罰之順其類謂能裁者也逆其類謂事以下論逆天順天之事在人所爲也政令自天職既立以上並論天所置立之闇其天君其心昬亂亂其天官味過度聲色臭棄其天養本節用不能務逆其天政其類也不能養背其天情哀樂無節好惡喜怒以喪天功生成喪其不蕃滋也之大功使夫是之謂大凶故違天之禍此皆言不脩聖人淸其天君正其天官備其天養順其天政養其天情以全其天功如是則知其所爲知其所不爲矣不攻異端知務導逹則天地官而萬物役矣以任天地役萬物也言聖人自脩政則可其行曲治其養曲適其生不傷夫是之謂知天其治其所養人之術曲其所自脩行之政曲盡也言明於人事則知天物其要則曲盡也盡其適其生長萬物無所傷害是謂知天故大巧在所不爲大知在所不慮天也亦猶大巧在所不此明不務知天是乃知所不慮知聖人無爲而治也若偏有所慮則其知窄矣爲如天地之成萬物也若偏有所爲則其巧小矣大智在所志於天者已其見象之可以期者矣識也志記其見垂象之文可以知其節候者是也謂若堯命羲和聖人雖不務知天猶有記識以助治道所記識於天者辰敬授人時者也欽若昊天日月星所志於地者已其見宜之可以息者矣可以蕃息嘉穀者是也所以記識於地其見土宜所志於四時者已其見數之可以事者矣歛冬臧必然之數數謂春作夏長秋取順時之數而令生長收臧者也事謂順時理其事也所記識於四時者所志於隂陽者已其見知之可以治者矣所以記識隂陽者知謂知其生殺也罰以治之也知或爲和爲知其生殺效之爲賞官人守天而自爲守道也守道也皆明不務知天之義也官人任人欲任人守天在於自治亂天邪曰日月星辰瑞歷是禹桀之所同也辰書之名也或曰當時星禹以治桀以亂治亂非天也時邪曰繁啓蕃長於春夏蕃茂也繁多也畜積收臧於秋冬是又禹桀之所同也禹以治桀以亂治亂非時也地邪曰得地則生失地則死是又禹桀之所同也禹以治桀以亂治亂非地也天地與時也言皆在人不在詩曰天作髙山大王荒之彼作矣文王康之此之謂也頌天詩周如大王之能尊大岐山也作之篇引之以明吉凶由人天不爲人之惡寒也輟冬地不爲人之惡遼逺也輟廣君子不爲小人之匈匈也輟行凶又許用反行下孟反匈匈喧譁之聲與訩同音天有常道矣地有常數矣君子有常體矣君子道其常而小人計其功則計一時之功利因物而遷之也道言也君子常造次必守其道小人詩曰何恤人之言兮此之謂也不違何畏人之言也逸詩也以言苟守道楚王後車千乗非知也君子啜菽飲水非愚也是節然也之時命也節謂所遇若夫心意脩徳行厚知慮明生於今而志乎古則是其在我者也故君子慕其在己者而不慕其在天者富貴也在天謂小人錯其在己者而慕其在天者置錯君子敬其在己者而不慕其在天者是以日進也苟故日進求已而不小人錯其在己者而慕在其天者是以日退也己故日退也望徼幸而不求故君子之所以日進與小人之所以日退一也有不慕皆有慕君子小人之所以相縣者在此耳星隊木鳴國人皆恐曰是何也曰無何也也言不足憂也假設問荅無何是天地之變隂陽之化物之罕至者也地之變星墜天化罕希也木鳴隂陽之怪之可也而畏之非也之怪異則可以其罕至謂懼則非因遂畏夫日月之有食風雨之不時怪星之黨見黨之多見賢遍反黨見頻見也言如朋是無世而不常有之上明而政平則是雖並世起無傷也謂一世並世起起也之中並上闇而政險則是雖無一至者無益也夫星之隊木之鳴是天地之變隂陽之化物之罕至者也怪之可也而畏之非也物之已至者人祅則可畏也者在人之祅也物之既至可畏楛耕傷稼耘耨失薉政險失民精也失薉謂耘楛耕謂麤惡不威虐也薉與穢同耨失時使穢也政險田薉稼惡糴貴民飢道路有死人夫是之謂人祅政令不明舉錯不時本事不理夫是之謂人祅錯謂懷安失於舉謂起兵動衆農桑之事也事機也本事勉力不時則牛馬相生六畜作祅時則人多怨曠其氣所感故生非其類也此三句宜承其菑甚慘之下勉力力役也不禮義不脩内外無别男女淫亂則父子相疑上下乖離寇難並至夫是之謂人祅祅是生於亂三者錯無安國三祅於國中則無有安也三者三人祅也錯置也置此其說甚爾其菑甚慘鳴爲淺近然其災害人則甚慘邇近也三人祅之說比星隊木也毒可怪也而不可畏也蓋録之時錯亂迷誤失其此二句承六畜作祅之下也次傳曰萬物之怪書不說則明之不務廣說萬物書謂六經也可爲勸戒也之怪無用之辯不急之察棄而不治若夫君臣之義父子之親夫婦之别則日切瑳而不舍也雩而雨何也曰無佗也猶不雩而雨也求雩而雨同明非求而得也周禮司巫國大旱則率巫而舞雩雨之禱也或者問嵗旱雩則得雨此何祥也對以與不雩也日月食而救之天旱而雩卜筮然後決大事非以爲得求也以文之也爲此以示急於災得求得所求也言文飾政事而已害順人之意以故君子以爲文而百姓以爲神以爲文則吉以爲神則凶也飾則無害淫祀求順人之情以爲文凶也福則在天者莫明於日月在地者莫明於水火在物者莫明於珠玉在人者莫明於禮義故日月不髙則光輝不赫水火不積則煇潤不愽珠玉不睹乎外則王公不以爲寳禮義不加於國家則功名不白故人之命在天國之命在禮君人者隆禮尊賢而王重法愛民而霸好利多詐而危權謀傾覆幽險而盡亡矣謀多詐幽險三者盡亡之道也幽險謂隠匿其情而凶虐難測也權大天而思之孰與物畜而制之之欲其豐冨孰尊大天而思慕而我裁制之與使物畜積從天而頌之孰與制天命而用之而我用之謂若曲者爲輪一直者爲桶任材而用也頌者美盛徳也從天而羙其盛徳豈如制裁天之所禽望時而侍之孰與應時而使之夫之望嵗也孰與望時而待謂若農候使不失時也應春生夏長之因物而多之孰與聘能而化之之使多也若后稷之播種然也目物而自多不如聘其智能而化思物而物之孰與理物而勿失之也物皆得其冝不使有所失䘮思得万物以爲已物孰與理願於物之所以生孰與有物之所以成故錯人而思天則失萬物之情成之則在人也物之生雖在天若廢人而妄思天雖勞心若思猶旡益也此皆言理平豐冨在人所爲不在天也百王之無變足以爲道貫也言禮可以爲道之條貫也無變不易也百王不易者謂禮一廢一起應之以貫禮爲條貫論語孔子曰殷因於夏禮雖質文廢起時有不同然其要歸以可知也其或繼周者雖百代可知也所損益可知也周因於殷禮所損益理貫不亂其條貫知理則也不亂不知貫不知應變能應變言必差錯而亂不知以禮爲條貫則不也貫之大體未甞亡也亂生其差治盡其詳差謬所以治者在於精詳也差謬也所以亂者生於條貫故道之所善中則可從畸則不可爲匿則大惑之名謂偏畸者不偶其情禮者明示人者也若隱匿則大惑畸音覉也道之所善得中則從偏側則不可爲匿謂隱匿水行者表深表不明則陷陷溺也表標准也治民者表道表不明則亂禮者表也非禮昏世也昏世大亂也世昏闇也昏世謂使故道無不明外内異表隱顯有常民䧟乃去識章示各異也隱顯即内外也有道禮也外謂朝聘内謂冠昏所表民䧟溺之患乃去也常言有常法也如此萬物爲道一偏一物爲萬物一偏愚者爲一物一偏盡一物也如有不能而自以爲知道無知也豈有知哉以偏爲知道愼子有見於後無見於先道故莊子論愼到曰塊不失道以其無愼到本黄老之術明不尚賢不使能之愼子著書四十二篇班固曰先申韓申韓稱之也爭先之意故曰見後而不見先也漢書藝文志老子有見於詘無見於信號稱老聃孔子之師也著五千老子周之守藏史姓李字伯陽曰見詘而不見信也信讀爲伸言其意多以屈爲伸以柔勝剛故墨子有見於齊無見於畸同兼愛是見齊而不見畸也畸謂不齊也墨子著書有上宋子有見於少無見於多云宋子以人之情爲欲寡而皆以己宋子名鈃宋人也與孟子同時下篇胡泠反漢書藝文志有宋子十八篇班固云荀卿道宋子其之情爲欲多爲過也據此說則是少而不見多也鈃音形又老意言黄有後而無先則羣衆無門開導皆處後而夫衆羣在上之無門戸也不處先羣衆有詘而無信則貴賤不分而賤者貴者伸卑下則無貴賤之别也詘則分别矣若皆貴柔弱有齊而無畸則政令不施若上同則政令何施也夫施政令所以治不齊者有少而無多則羣衆不化若皆欲少則何能化之夫欲多則可以勸誘爲善書曰無有作好遵王之道無有作惡遵王之路此之謂也則非遵王道也書洪範以喻偏好荀子卷第十一
