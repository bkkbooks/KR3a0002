  text: 荀子卷第九
  hash: sha256:596fb6288706b6bfa2bea2adec90db0b4aefae312669d347500e27b922340c65
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0002_SBCK_009-1a}
body:
  text: 登仕郎守大理評事揚倞注臣道篇第十三人臣之論之善惡論人臣有態臣者有篡臣者有功臣者有聖臣者在下解並内不足使一民外不足使拒難百姓不親諸侯不信然而巧敏佞說作㣞音恱或善取寵乎上是態臣者也佞以容態媚爲上不忠乎君下善取譽乎民不䘏公道通義朋黨比周以環主圖私爲務是篡臣者也圖謀也篡臣者篡奪君政也環主環繞其主不使賢臣得用内足使以一民外足使以拒難民親之士信之上忠乎君下愛百姓而不倦是功臣者也然後立功民親士信也上則能尊君下則能愛民政令敎化刑下如景影之隨形動而輙隨不使違越也刑制也言施政令敎化以制其下如應卒遇變齊給如響卒變人所遲疑今聖臣應之疾速如響齊疾也給供給也應事而至謂之給夫蒼忽反之應聲卒推類接譽以待無方曲成制象是聖臣者也聲譽言見其本而知其末也待之無常謂不滯於此明應卒遇變之意無方無常也推其比類接其曲法不苟而行之也聖者無所不通之謂也一隅也委曲皆成制度法象言物至而應無非故用聖臣者王用功臣者彊用篡臣者危用態臣者亡態臣用則必死篡臣用則必危甚於篡臣此言態臣之人深欲戒之故極言也者蓋當時之多用佞媚變詐功臣用則必榮聖臣用則必尊故齊之蘇秦於齊故曰齊之蘇秦蘇秦初相趙後仕燕終死楚之州侯州侯右夏侯輦從鄢陵君與壽陵君載方府之楚襄王佞臣也戰國䇿莊辛諫襄王曰君王左内而投已乎黽塞之外韓子曰州侯相荆貴而荆王疑之因問金與之馳騁乎雲夢之中不知穰侯受令乎秦王塡黽塞之齊之管仲晉之咎犯舅孤偃咎犯其字也咎與舅同晉文公之楚之孫叔敖可謂功臣矣殷之伊尹周之太公可謂聖臣矣是人臣之論也吉凶賢不肖之極也不肖極於論臣也國之吉凶人君賢必謹志之而愼自爲擇取焉足以稽矣而愼自擇取則足以稽考用臣也志記也言必謹記此四臣之安危從命而利君謂之順從命而不利君謂之謟逆命而利君謂之忠逆命而不利君謂之篡不䘏君之榮辱不䘏國之臧否偷合苟容以持禄養交而已耳謂之國賊謂養養交外交若蘇秦張儀孟甞君所至爲相也其與君交接之不忤犯使怒也一曰養其君有過謀過事將危國家殞社稷之懼也大臣父子兄弟有能進言於君用則可不用則去謂之諫有能進言於君用則可不用則死謂之爭有能比知同力讀爲智比合也知率羣臣百吏而相與彊君橋君與矯同屈也彊其丈反橋君雖不安不能不聽遂以解國之大患除國之大害成於尊君安國謂之輔原君傳事見平有能抗君之命竊君之重反君之事以安國之危除君之辱功伐足以成國之大利謂之拂功曰伐左抗拒也戰爲佛違君之意也謂若信陵君違魏王之命竊其兵符殺傳郤至驟稱其伐拂讀爲弼弼所以輔正弓弩者也或讀依今趙存則魏安故曰安國之危除君之辱也晉鄙反軍不救趙之事遂破秦而存趙夫輔車相故諫爭輔拂之人社稷之臣也國君之寶也明君之所尊所厚也而闇主惑之以爲已賊也故明君之所賞闇君之所罰也闇君之所賞明君之所殺也伊尹箕子可謂諫矣尹伊子諫紂諫太甲箕比干子胥可謂爭矣平原君之於趙也可謂輔矣信陵君之於魏也可謂拂矣傳曰從道不從君此之謂也故正義之臣設則朝廷不頗位也頗邪也設謂置於列諫爭輔拂之人信則君過不逺信讀爲伸謂道行也信謂見信於君或曰爪牙之士施則仇讎不作也施謂展其材也爪牙之士勇力之臣邊境之臣處則疆垂不喪陲同垂與故明主好同而闇王好獨任其智獨謂自明主尚賢使能而饗其盛其臣之功業也盛謂大業言饗闇主妬賢畏能而滅其功沒也滅掩罰其忠賞其賊夫是之謂至闇桀紂所以滅也事聖君者有聽從無諫爭無失聖君事中君者有諫爭無謟諛者也謟諛則遂成闇君也中君可上可下若齊桓公事暴君者有補削無橋拂其惡言不敢顯諫闇匡救補謂彌縫其闕削謂除去害使君有殺賢之名故不為也拂音佛之也橋謂屈其性也拂違也橋拂則身見廹脅於亂時窮居於暴國而無所避之則崇其美揚其善違其惡隱其敗言其所長不稱其所短以爲成俗俗言如此而不變若舊俗然也謂危行言遜以避害也以爲成詩曰國有大命不可以告人防其躬身此之謂也詩逸恭敬而遜聽從而敏不敢有以私決擇也更私自決斷選擇也敏謂承命而速行不敢不敢有以私取與也以順上爲志是事聖君之義也而已但禀命忠信而不䛕諫諍而不謟橋然剛折端志而無傾側之心剛折剛直面折也端志不邪曲也橋彊貎禮記曰和而不流彊哉矯是案曰是非案曰非是事中君之義也調而不流柔而不屈寛容而不亂從而不屈曲雖寛容而不雖調和而不至流湎雖柔亂也與爲曉然以至道而無不調和也至道無爲不爭曉然明喻之貎怒無不調和言皆不違拂也之道以至道則暴君不能加而能化易時關内之是事暴君之義也旣以沖和事之則能化易其暴戾關當爲開傳寫誤耳内與納同言曰以道關通於君之心中也之性時以善道開納之也或若馭其樸馬習之馬不樸馬未調暴君之難故重明之也可遽牽制必縱緩之事若養赤子知必在順適其性不赤子嬰兒也未有所也驚懼若食餧人併與之食則必死今以善道節量與之不使飢渴於至道如餧人之欲食一曰餧人曰人惑則死使狂惑也莊子故因其懼也而改其過故因使其懼則思德過改因其憂也而辨其故端則遷善也辨其致憂之因其喜也而入其道納故因以道入之欣喜之時多所聽因其怒也而除其怨怒除去之也怨惡之人因君曲得所謂焉曲皆得所謂所謂即雖憂懼喜怒之殊委性也化易君書曰從命而不拂微諫而不倦爲上則明爲下則遜此之謂也訓也書伊事人而不順者不疾者也也不疾言怠慢也不順上意也疾速疾而不順者不敬者也敬而不順者不忠者也忠而不順者無功者也有功而不順者無德者也故無德之爲道也傷疾墮功滅苦故君子不爲也恐錯誤耳爲或爲違傷疾墮功滅苦未詳或有大忠者有次忠者有下忠者有國賊者以德復君而化之大忠也報白於君使自化於復報也以德行之事之復萬民之逆也善周禮宰夫掌諸臣以德調君而補之次忠也其惡也謂匡救以是諫非而怒之下忠也之名故爲下使君有害賢也忠不卹君之榮辱不卹國之臧否偷合苟容以之持禄養交而已耳國賊也若周公之於成王也可謂大忠矣若管仲之於桓公可謂次忠矣若子胥之於夫差可謂下忠矣若曹觸龍之於紂者可謂國賊矣苑說龍者謟䛕不正此云紂未知孰是曰桀貴爲天子富有天下其左師觸仁者必敬人凡人非賢則案不肖也人賢而不能則是禽獸也知敬賢禽獸不人不肖而不敬則是狎虎也言必見害狎輕侮也禽獸則亂狎虎則危災及其身矣詩曰不敢暴虎不敢馮河人知其一莫知其它戰戰兢兢如臨深淵如履薄冰此之謂也徒渉人知其一莫知其它言人皆詩小雅小旻之篇暴虎徒摶馮河知小人爲害有甚於此也知暴虎馮河立至於害而不故仁者必敬人敬人有道賢者則貴而敬之不肖者則畏而敬之賢者則親而敬之不肖者則䟽而敬之其敬一也其情二也若夫忠信端愨而不害傷則無接而不然是仁人之質也則凡所接物皆然言嘉善而矜不其敬雖異至於忠信端愨不傷害之而欲傷害之也質體也能不以人之不肖逆詐待忠信以爲質端愨以爲統自處而待物者也統綱紀也言以端愨禮義以爲文文飾用爲倫類以爲理近以知逺以此爲條理也倫人倫類物之種類言推喘而言臑而動而一可以爲法則動也一皆也言一動一息之間皆臑與勸學篇蝡同喘微言也蠕微也臑人允反可以爲法則詩曰不僭不賊鮮不爲則此之謂也賊害則少不爲人法則矣詩大雅抑之篇言不僭差恭敬禮也調和樂也爭兢也調和不謹愼利也鬪怒害也故君子安禮樂利謹愼而無鬪怒是以百舉不過也小人反是通忠之順然而終歸於順也忠有所雍塞故通之權險之平險之事權用危可扶持則變其危險使治平也使至於平也或曰權變也旣不禍亂之從聲應聲而從君雖禍亂也之三者非明主莫之能知也忠賢而身死國亡也闇君不知所以殺害爭然後善戾然後功出死無私致忠而公夫是之謂通忠之順信陵君似之矣君然諫爭公信陵君諫魏王請救趙不從遂矯君命破秦而魏國以安故後能善違戾君然後立功出身死戰不爲私事而歸於至忠至之似奪然後義殺然後仁上下易位然後貞惡桀紂之亂天下而奪之是義也不忍蒼生之涂炭而殺之奪者不義之名殺者不仁之稱上下易位則非貞也而湯武愚當分歸於正道是貞也是仁也雖上下易位而使賢功參天地澤被生民夫是之謂權險之平湯武是也過而通情和而無經上意而無常守經常也但和順不䘏是非不治曲直偷合苟容迷亂狂生使生狂也迷亂其君夫是之謂禍亂之從聲飛廉惡來是也傳曰斬而齊枉而順不同而壹斬之取其齊也以枉曲之取其順也所此言反經合道如信陵湯武者也所以乖戾然終歸於理者也以不同取其一也初雖似詩曰受小球大球爲下國綴旒此之謂也綴猶結也旒旌旗之垂者言湯既詩商頌長發之篇球玉也鄭玄云圭搢珽以與諸侯㑹同結定其心如旌旗之旒縿著焉引此以爲天所命則受小玉謂尺二寸圭也受大玉謂珽也長三尺執之平爲救下國者也明湯武取天下權險致士篇第十四士之義明致賢衡聽顯幽重明退姦進良之術偏聽也顯幽衡平也謂不曰德明惟明能顯幽則重明矣能退姦則良進矣謂使幽人明顯不雍蔽也重明謂既明又使明也書朋黨比周之譽君子不聽殘賊加累之譖君子不用以罪惡加累誣人也殘賊謂賊害人加累隱忌雍蔽之人君子不近妬賢雍讀曰擁隱亦蔽也忌謂貨財禽犢之請君子不許謁者也行賂請凡流言流說流事流謀流譽流愬不官而衡至者君子愼之愬譖也不官謂無流者無根源之謂撗至撗逆而至也主首也衡讀爲撗聞聽而明譽之說則明白稱譽謂君子聞聽流言流則姦人不敢獻其謀也顯露其事不爲隱蔽如此定其當而當然後士其刑賞而還與之其刑賞反與之也謂其言當於善則事之以士當爲事行也言定其當否既當之後乃行以刑當丁浪反賞當於惡則事之如是則姦言姦說姦事姦謀姦譽姦愬莫之試也忠言忠說忠事忠謀忠譽忠愬莫不明通方起以尚盡矣明白通明通謂同上盡謂盡忠於上也逹其意方起並起尚與上夫是之謂衡聽顯幽重明退姦進良之術川淵深而魚鼈歸之山林茂而禽獸歸之刑政平而百姓歸之禮義備而君子歸之故禮及身而行脩義及國而政明能以禮挾而貴名白天下願令行禁止王者之事畢矣則貴名明白天下皆願從挾讀爲浹能以禮浹洽者也之詩曰惠此中國以綏四方此之謂也民勞之詩大雅也引此以明自近及逺也篇中國京師也四方諸夏川淵者龍魚之居也山林者鳥獸之居也國家者士民之居也川淵枯則龍魚去之山林險則鳥獸去之國家失政則士民去之無土則人不安居無人則土不守無道法則人不至無君子則道不舉故土之與人也道之與法也者國家之本作也本務也本作猶君子也者道法之揔要也不可少頃曠也得之則治失之則亂得之則安失之則危得之則存失之則亡故有良法而亂者有之矣有君子而亂者自古及今未甞聞也傳曰治生乎君子亂生乎小人此之謂也得衆動天人之所欲天必從之得衆則可以動天言美意延年意也無美意樂延年也憂患則誠信如神言物不能欺也誠信則如神明夸誕逐魂去其精逐魂逐喪其精魂此四者皆言善惡之應也魂猶喪精也矜夸妄誕作僞心勞故人主之患不在乎言用賢而在乎誠必用賢夫言用賢者口也却賢者行也賢不至也無善行則口行相反而欲賢者之至不肖者之退也不亦難乎夫燿蟬者務在明其火振其樹而已火不明雖振其樹無益也之禮記有蜩范是也南方人照蟬取而食今人主有能明其德則天下歸之若蟬之歸明火也臨事接民而以義變應寛裕而多容恭敬以先之政之始也納也多容廣然後中和察斷以輔之政之隆也和察斷斷丁亂反政之崇髙在輔以中然後進退誅賞之政之終也故一年與之始三年與之終裕多容三年政成然後進退誅賞也夫不敎而殺謂之虐故爲政之始寛用其終爲始則政令不行而上下怨疾亂所以自作也德化則亂先賞罰後書曰義刑義殺勿庸以即汝惟曰未有順事言先敎也義刑義殺亦書康誥言雖我未有順事故使民犯法躬自厚而薄責於人也勿用即行之當先敎後刑也雖先後不失尚謙曰程者物之準也之揔名也程者度量禮者節之準也謂節差等也君臣之程以立數禮以定倫二之數有禮則可以言有程則可以立一子之倫也定君臣父德以叙位能以授官之位考其能以授度其德以序上下伯夷典禮之比也所任之官若䕫典樂凡節奏欲陵而生民欲寛生養民也言人君自守禮之節奏則欲嚴峻不弛慢養民節奏謂禮節奏陵峻也侵陵亦嚴峻之義生民謂以徳敎迫切之也則欲寛容不節奏陵而文生民寛而安峻亦有節奏雖於刻急文飾不至上文下安功名之極也不可以加矣君者國之隆也父者家之隆也尊也隆猶隆一而治二而亂自古及今未有二隆爭重而能長久者師術有四而博習不與焉可以爲人師師法不術法也言有四德則與音豫在博習也尊嚴而憚可以爲師耆艾而信可以爲師六十曰耆五十曰艾誦說而不陵不犯可以爲師說不自陵突觸犯言行其所學誦謂誦經說謂解說謂守其誦知微而論可以爲師講論論盧困切知精微之理而能故師術有四而博習不與焉水深而回湍峻則多旋流也回流旋也水深不樹落則糞本糞其根也謂木葉落弟子通利則思師於已也思其厚詩曰無言不讎無德不報此之謂也物必報之也此言爲善則賞不欲僭刑不欲濫賞僭則利及小人刑濫則害及君子若不幸而過寧僭無濫與其害善不若利淫荀子卷第九
