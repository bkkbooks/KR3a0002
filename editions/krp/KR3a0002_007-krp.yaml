body:
  text: 登仕郎守大理評事揚王霸篇第十一國者天下之制利用也過於國制衍字耳天下用之利者無人主者天下之利勢也利者也勢之最得道以持之則大安也大榮也積美之原也不得道以持之則大危也大累也有之不如無之如無國有國不及其綦也索爲匹夫不可得也極之時綦謂窮齊湣宋獻是也偃也爲齊閔王所滅吕氏春秋云宋康王湣與閔同齊閔王爲淖齒所殺宋獻宋君各私爲謚故與此不同此云獻國㓕之後其臣子故人主天下之利勢也然而不能自安也安之者必將道也道守之必將以故用國者義立而王信立而霸權謀立而亡三者明主之所謹擇也愼擇之所宜謹仁人之所務白也白也白明挈國以呼禮義而無以害之務皆禮義也無以害之謂不以他事害禮義也挈提舉也言提挈一國之人皆使呼召禮義言所行一不義殺一無罪而得天下仁者不爲也擽然扶持心國且若是其固也所持心持國不行不櫟讀為落石貎也其然如石之固也義不殺無罪落所與爲之者之人則舉義士也用義士謂若伊吕之比者舉皆也所與為政之人則皆所以爲布陳於國家刑法者則舉義法也夏贖刑之類也謂若周穆王訓主之所極然帥羣臣而首郷之者則舉義志也所極信率志意也主也一曰志記也舊典之有義者謂若六經也羣臣歸向之者則皆義之志謂不懐不義之意如是則下仰上以義矣是綦定也以義爲本仰魚亮反綦當爲基基本也言綦定而國定國定而天下定仲尼無置錐之地誠義乎志意加義乎身行志意又加之以仲尼誠能義乎立行皆以義行下孟反義乎身行言志意及立身箸之言語所論說皆明義也以義箸於言語謂濟之日不隱乎天下名垂乎後世之日成功以義得濟乎天下謂極昭明天下莫能隱匿之之後也言仲尼行義既成之後不隱今亦以天下之顯諸侯誠義乎志意加義乎法則度量箸之以政事案申重之以貴賤殺生使襲然終始猶一也賞罰使相掩襲無間隙終始如一也申亦重也既爲政皆以義又申重以如是則夫名聲之部發於天地之閒也豈不如日月雷霆然矣哉空言猶得不隱乎天下今若以顯諸部當爲剖謂開發也仲尼匹夫但箸日月雷霆也侯行義必如故曰以國齊義一日而白湯武是也一朝而名聲明白湯武是也齊當爲濟以一國皆取濟於義湯以亳武王以鄗皆百里之地也詩曰考卜維王宅是鎬京維龜正之亳湯國都鄗與鎬同武王所都京也成之武王天下爲一諸侯爲臣通達之屬莫不從服無它故焉以濟義矣是所謂義立而王也取濟於義也非有它故但德雖未至也義雖未濟也有徳義霸者亦極盡濟也但未能至然而天下之理略奏矣者略有節奏也天下之謂條理刑賞己諾信乎天下矣有諾責寜有己怨信乎天下謂諾許也已不許也禮記曰與其柯盟之比也若齊桓不背臣下曉然皆知其可要也其可與要約要約也皆知一堯反不欺也要政令巳陳雖覩利敗不欺其民原命三謂若伐而退之比也日之糧不降約結巳定雖覩利敗不欺其與相與衞不遂滅之爲己利之比也親與之國謂若齊桓許赦魯如是則兵勁城固敵國畏之國一綦明與國信之爲基也綦亦當雖末在僻陋之國威動天下五伯是也如字爲諸侯伯讀曰霸又曰䇿命晉侯爲伯也之長曰伯春秋左氏傳非本政敎也盡脩其本也雖有政教未非致隆髙也禹湯之極崇髙也致極也不如堯舜非綦文理也雜未極言其駁貫條非服人之心也能備行王道以略信之故猶能致霸未得天下歸心如文王此皆言雖未也郷方略不在用仁義也所向唯在方略審勞佚勞之術也審以佚待謹畜積不妄耗費謹嚴畜積備戰備齺然上下相信而天下莫之敢當也相向之貎齺士角反齺齒相迎也齺然上下故齊桓晉文楚莊吳闔閭越句踐是皆僻陋之國也威動天下彊殆中國危中國其彊能無它故焉略信也是所謂信立而霸也略取信而行雖未能濟義致霸也之故能挈國以呼功利人以呼召功利言所務唯功此論權謀者也提挈一國之利貪求之也利也功役使不務張其義齊其信唯利之求開張内則不憚詐其民而求小利焉土功詐其民謂若梁伯好至之比曰宼將外則不憚詐其與而求大利焉楚靈謂若遂滅之之比也王以義討陳蔡因内不脩正其所以有然常欲人之有貨財也有土地如是則臣下百姓莫不以詐心待其上矣上詐其下下詐其上則是上下析也析離如是則敵國輕之故輕之也不得人心與國疑之權謀日行而國不免危削綦之而亡則滅亡其極者齊閔薛公是也也齊閔王爲五國所伐皆薛公薛公孟甞君田文齊閔王之相言之也使然故同故用彊齊非以脩禮義也非以本政敎也非以一天下也緜緜常以結引馳外爲務所以引車也齊閔薛公不脩德政但使說客引軸馳緜緜不絶貌引讀爲靷靷引軸之物結引謂繫於軸權詐爲務也騖於他國以故彊南足以破楚與秦敗楚於重丘南割史記齊閔王二十三年北也楚之淮西足以詘秦北足以敗燕六年與韓魏共史記閔王三十谷軍焉攻秦至函中足以舉宋於温舉謂舉其國而滅之也閔王三十八年伐宋宋王死及以燕趙起而攻之若振槁然秦楚三晉敗我閔王四十年燕破敵滅國及樂毅以諸國攻之若擊枯葉之易也於濟西振擊也槁枯葉也言當權謀彊盛之時雖而身死國亡爲天下大戮明王伐不敬取其鯨鯢而封之以爲天下大戮辱也春秋傳曰古者戮也爲大後世言惡則必稽焉王爲龜鏡也後世稽考閔是無它故焉唯其不由禮義而由權謀也三者明主之所以謹擇也而仁人之所以務白也善擇者制人不善擇者人制之善擇者用權謀也善擇者用霸王不國者天下之大器也重任也不可不善爲擇所而後錯之錯之險則危讀爲措所處也錯不可不善爲擇道然後道之涂薉則塞爲擇道路不可不善同塞謂行不通也而導逹之薉與穢危塞則亡之善擇所以爲彼國錯者非封焉之謂也曰脩封疆立城郭之謂也非受之茅土然後爲安一何法之道誰子之與也求誰人付與之誰子猶誰人也愼子曰弃道設問之辭旣非封焉之謂問以何法導逹之天下誰子之識能足焉也術舍度量以求一人之識識故道王者之法與王者之人爲之則亦王道霸者之法與霸者之人爲之則亦霸道亡國之法與亡國之人爲之則亦亡皆與導同荅辭也道三者明主之所以謹擇也而仁人之所以務白也語者丁寜之也荀子多重敘前故國者重任也不以積持之則不立之法持之不以積乆覆也則傾故國者世所以新者也是憚憚非變也無變也隨巢子曰有隂而逺者有坦明而功者杜伯射宣王憚與坦同言國者但繼世之主自新耳此積久之法坦坦然者據古憚與坦通於畝田是坦明而功改王改行也之事非法變也或曰國語自是改一王則改其所行曰改王改行玉佩玉行歩也襄王謂晉文公曰先民有言故一朝之日也一日之人也然而厭焉有千歲之固何也一朝之日謂設問之辭言壽促也厭讀爲黶禮記曰見君子而後厭然掩其不善鄭注云今日之事明朝不同言易變也一日之人謂今日之生未保明日故有黶然深藏千歲不變改之法乎閉藏貎言事之易變人之夀促如此何曰援夫千歲之信法以持之也安與夫千歲之信士爲之也可信之士爲政謂使百世不易人無百歲之壽而有千嵗之信士何也之又問曰以夫千歲之法自持者是乃千歲之信士矣以夀千歲也能自持則能持固也以禮義自持者則是千歲之士不故與積禮義之君子爲之則王與端誠信全之士爲之則霸與權謀傾覆之人爲之則亡三者明主之所以謹擇也而仁人之所以務白也善擇之者制人不善擇之者人制之彼持國者必不可以獨也獨治也君不可然則彊固榮辱在於取相矣身能相能如是者王文王太公也謂若湯伊尹身不能知恐懼而求能者如是者彊樂毅也若燕昭身不能不知恐懼而求能者安唯便僻左右親比已者之用如是者危削侯右夏侯之比也謂若楚襄王左州綦之而亡之比宋獻國者巨用之則大小用之則小之極也巨者大綦大而王綦小而亡小巨分流者存水之分流也小巨各半如巨用之者先義而後利安不卹親䟽不卹貴賤唯誠能之求夫是之謂巨用之小用之者先利而後義安不卹是非不治曲直唯便僻親比己者之用夫是之謂小用之巨用之者若彼小用之者若此小巨分流者亦一若彼一若此也親比已者之用或誠能之求或故曰粹而王駮而霸無一焉而亡此之謂也舜舉臯陶粹全也若管仲内任堅貂即小巨分流者無一焉而亡無一賢人若不仁者逺即巨用之綦大而王者也駮雜也若齊桓外任即綦小而亡者也厲王專任皇甫尹氏國無禮則不正禮之所以正國也譬之猶衡之於輕重也猶繩墨之於曲直也猶規矩之於方圓也所以辨曲直規矩所以定方圓也禮能正國譬衡所以辨輕重繩墨旣錯之而人莫之能誣也懸不可欺以輕重繩錯置也禮記曰衡誠矩誠設不可欺以方圓也墨誠陳不可欺以曲直規詩曰如霜雪之將將如日月之光明詩逸爲之則存不爲則亡此之謂也禮也爲爲國危則無樂君國安則無憂民亂則國危治則國安今君人者急逐樂而緩治國豈不過甚矣哉譬之是由好聲色而恬無耳目也豈不哀哉雖好聲色將何用哉恬安也安然無耳目夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚綦極也綦或爲甚傳寫誤耳佚安樂也臭氣也凡氣香亦謂之臭禮記曰佩容臭此五綦者人情之所必不免也養五綦者有具辨彊固之道也具謂廣大富厚治無其具則五綦者不可得而致也萬乗之國可謂廣大富厚矣加有治辨彊固之道焉辨分别事有讀爲又若是則怡愉無患難矣然後養五綦之具具也故百樂者生於治國者也憂患者生於亂國者也急逐樂而緩治國者非知樂者也故明君者必將先治其國然後百樂得其中治國得於並音落之中樂闇君者必將急逐樂而緩治國故憂患不可勝校也校計必至於身死國亡然後止也豈不哀哉將以爲樂乃得憂焉將以爲安乃得危焉將以爲福乃得死亡焉豈不哀哉於乎君人者亦可以察若言矣乎於之言謂以上之說讀爲嗚呼若言如此故治國有道人主有職知在其職也其道守若夫貫日而治詳一日而曲列之積日貫日日而委曲列之無差錯也也積日而使條理詳備一是所使夫百吏官人爲也不足以是傷游玩安燕之樂使百吏官人煩碎之事旣人君游燕之樂也爲之則不足以此害若夫論一相以兼率之使臣下百吏莫不宿道郷方而務擇之也率領論謂討論選下皆以宿道向方爲務不敢姦詐也也宿道止於道也向方不迷亂也臣是夫人主之職也不在躬親小事也論相乃是人主之職若是則一天下名配堯禹之主者守至約而詳事至佚而功任事垂衣裳不下簟席之上而海内之人莫不願得以爲帝王夫是之謂至約樂莫大焉人主者以官人爲能者也匹夫者以自能爲能者也人主得使人爲之匹夫則無所移之百畝一守事業窮無所移之也之守事業百畝一夫人主必躬治小事則與匹夫何異也耕稼也耕稼窮於此無所移於人若今以一人兼聽天下日有餘而治不足者使人爲之也一人今以所治之事少而不足言不足治也使人為之故得如此尸于曰兼聽天下之大自稱日有餘言兼聽之日有餘也而治不足謂治者恕也韓子曰夫爲人主而身察百官則日不足力不給也堯南橈交阯北懷幽都東西至日之所出入有餘日而不足於而日有餘上之任勢使然也日而實反故先王舍已能而因法數審賞罰故治不足大有天下小有一國諸侯天子必自爲之然後可則勞苦耗顇莫甚焉悴顦顇也耗謂精神竭如是則雖臧獲不肯與天子易埶業奴曰臧罵婢曰獲燕齊亡奴謂之臧亡臧獲奴婢也方言云荆淮海岱之間罵者故周禮其奴婢男子入于罪隷女子入于春藁勢業權埶婢謂之獲或曰取貨謂之臧擒得謂之獲皆謂有罪爲奴婢也事業以是縣天下一四海何故必自爲之人之寡以是一必自爲之言力不任之也懸天下之重一四海之大何故爲之者役夫之道也墨子之說也自勞苦矣墨子之說必論德使能而官施之者聖王之道也儒之所謹守也官施布職事官施謂建百傳曰農分田而耕賈分貨而販百工分事而勸士大夫分職而聽政治聽其建國諸侯之君分土而守三公緫方而議自陜以東周公主之自緫領也議其所統之政於内是緫方而議之也陜以西邵公主之一相處則天子共己而矣讀爲拱垂拱共讀爲恭或也而已出若入若天下莫不平均莫不治辨也出若若如此德使能官施之事或曰若順也入若謂内外皆如此也謂如論是百王之所同也而禮法之大分也各使當其職分也禮法大分在任人百里之地可以取天下是不虚其難者在於人主之知之也可以取天下之道也所患人主不知小國取天下者非負其土地而從之之謂也地來而從我之謂也非謂他國負荷其土道足以壹人而已矣故天下歸之也其道足以齊壹人彼其人苟壹則其土地且奚去我而適它一於我則其彼國之人苟徃哉土地奚故百里之地其等位爵服足以容天下之賢士矣道賢士有道德者也此論百里國取天下之其官職事業足以容天下之能士矣才藝也能士者循其舊法擇其善者而明用之足以順服好利之人矣法而用之則民衣食足而好利之人順服也擇舊法之善者而明用之謂擇務本厚生之賢士一焉能士官焉好利之人服焉三者具而天下盡無􅚀是其外矣爲用也具謂俱故百里之地足以竭埶矣業是天下之人埶盡於此矣竭盡也有等位爵服官職事致忠信箸仁義足以竭人矣義足以盡天下之人謂皆來歸致極也箸明也言極忠信明仁也兩者合而天下取諸侯後同者先危者兩埶盡人也合謂能盡詩曰自西自東自南自北無思不服一人之謂也故四方皆歸之其道足以齊一人羿蠭門者善服射者也羿蠭蒙善射故射者服蠭門即蠭蒙學射於羿音逄之蠭王良造父者善服馭者也御韓子曰字伯王良趙簡子之善御者馭與御同也樂造父周穆王之御皆聦明君子者善服人者也人服而勢從之人不服而勢去之故王者已於服人矣盡此也王者之功故人主欲得善射射逺中微則莫若羿蠭門矣細微之物射及逺中欲得善馭及速致逺則莫若使王良造父矣欲得調壹天下制秦楚則莫若聦明君子矣彊國故制之者也荀卿在齊楚秦天下其用知甚簡至少也用智慮其爲事不勞而功名致大甚易處而綦可樂也故明君以爲寶而愚者以爲難寶愚者以任賢明君以任賢爲也爲難夫貴爲天子富有天下名爲聖王兼制人人莫得而制也是人情之所同欲也而王者兼而有是者也重色而衣之重味而食之重財物而制之直用反重多也合天下而君之飲食甚厚聲樂甚大臺謝甚髙榭同謝與園囿甚廣臣使諸侯一天下是又人情之所同欲也而天子之禮制如是者也制如此其禮之所與之所欲也盛言盡人情制度以陳政令以挾浹洽也挾讀爲官人失要則死公侯失禮則幽記曰各揚其職百官要政令之要約也禮執衞侯歸之于京師寘諸深室也廢職服大刑幽囚也春秋傳曰晉侯四方之國有侈離之德則必滅皆謂不遵法度侈奢侈離乖離名聲若日月功績如天地天下之人應之如影嚮是又人情之所同欲也而王者兼而有是者也故人之情口好味而臭味莫美焉耳好聲而聲樂莫大焉目好色而文章致繁婦女莫衆焉形體好佚而安重閒靜莫愉焉也或閒隙愉樂也讀爲閑心好利而穀禄莫厚焉合天下之所同願兼而有之睪牢天下而制之若制子孫䇿燕太子丹謂荆軻曰秦有貪功之心非盡天下之地牢睪牢未詳睪或作畢言盡牢籠天下也新序作宰牢戰國與漢書丘嫂轑釡之轑義同皆修理斡運之意也海内之王其意不厭或曰睪讀如以薅荼蓼之薅牢人苟不狂惑戇陋者其誰能睹是而不樂也哉欲是之主並肩而存能建是之士不世絶千歲而不合何也曰人主不公人臣不忠也人主則外賢而偏舉人臣則爭職而妒賢是其所以不合之故也偏黨而舉所愛也外賢䟽賢也偏舉人主胡不廣焉無䘏親䟽無偏貴賤唯誠能之求爲曠誠能實能也廣焉開泰貌或曰讀若是則人臣輕職業讓賢而安隨其後如是則禹舜還至王業還起復還功壹天下名配舜禹物由有可樂如是其美焉者乎嗚呼君人者亦可以察若言矣此之言也可以察如揚朱哭衢涂曰此夫過舉蹞歩而覺跌千里者夫哀哭之於墨子與墨子弟揚朱戰國時人後衢涂歧路也秦俗以兩爲衢或曰四達謂之衢覺知也半歩曰子禽滑釐辨論其說在愛已不㧞一毛以利天下與墨子相反里者乎故甚哀而哭之易曰差以毫釐謬以千里也蹞跌差也言此歧路第過舉半步則知差而哭況跌千此亦榮辱安危存亡之衢已此其爲可哀甚於衢涂滅亡故可哀甚於衢涂也此謂求誠能之士也不求則嗚呼哀哉君人者千歲而不覺也不知求誠能之士嘆君人者千嵗而無國而不有治法無國而不有亂法無國而不有賢士無國而不有罷士昭曰病也無行而罷周禮以嘉國語曰罷士無伍罷女無家韋之使善者也石平罷民謂平無國而不有愿民無國而不有悍民無國而不有美俗無國而不有惡俗兩者並行而國在上偏而國安在下偏而國危多罷士少愿民多悍民少之類下偏反是上偏偏行上事也謂治法多亂法少賢士上一而王下一而亡行也一謂令故其法治其佐賢其民愿其俗美而四者齊夫是之謂上一如是則不戰而勝不攻而得甲兵不勞而天下服故湯以亳武王以鄗鎬同鄗與皆百里之地也天下爲一諸侯爲臣通逹之屬莫不從服無它故焉四者齊也所闕也齊謂無桀紂即序於有天下之勢索爲匹夫而不可得也有天下即序於次序爲天子也之埶謂就王者之是無它故焉四者並亡也故百王之法不同若是所歸者一也上莫不致愛其下而制之以禮上之於下如保赤子政令制度所以接下之人百姓有不理者如豪末則雖孤獨鰥寡必不加焉豪末不以尤愛之孝經曰不敢侮於鰥寡而況於士民乎不理加於孤獨鰥寡也四者人所輕賤故聖王故下之親上歡如父母可殺而不可使不順君臣上下貴賤長幼至于庶人莫不以是爲隆正親上爲隆正也是謂親上也皆以然後皆内自省以謹於分其上愛敬踰越也故不敢是百王之所以同也而禮法之樞要也民之道而得民也是百王之同用愛然後農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公緫方而議則天子共已而止矣岀若入若天下莫不平均莫不治辨是百王之所同而禮法之大分也勸勉餘並已解上也亦謂致愛其下故皆若夫貫日而治平權物而稱用制物使稱於用稱尺證反貫日積日也使條理平正權使衣服有制宫室有度人徒有數喪祭械用皆有等宜以是用挾於萬物皆有等宜言等差皆得其宜也挾讀爲人徒謂胥徒給傜伇者也械用器用也浹尺寸㝷丈莫得不循乎制度數量然後行則是官人使吏之事也不足數於大君子之前吏數閱數也大君子謂人君也官人列官之人使吏所使役之故君人者立隆政本朝而當也當丁浪反隆政所隆之政所使要百事者誠仁人也綱紀者謂相也主百事之要約則身佚而國治功大而名美上可以王下可以霸立隆政本朝而不當所使要百事者非仁人也則身勞而國亂功廢而名辱社稷必危是人君者之樞機也君當爲君人也樞機在得賢相人故能當一人而天下取失當一人而社稷危不能當一人而能當千人百人者說無之有也之中說論之當也當皆丁浪反無此事能當謂能用人旣能當一人則身有何勞而爲語助也而爲皆垂衣裳而天下定故湯用伊尹文王用吕尚武王用召公成王用周公且卑者五伯王者伯讀爲霸卑言功業卑於齊桓公閨門之内懸樂奢泰游抏之脩抏與玩同言齊桓唯懸簨簴也泰與汰同脩也此是於天下不見謂脩之脩飾也天下不謂然九合諸侯一匡天下爲五伯長是亦無它故焉知一政於管仲也是君人者之要守也任賢也要守在知者易爲之興力而功名綦大賢之君也智者知任舍是而孰足爲也之言其餘皆不定爲也舍是任賢之事何足為故古之人有大功名者必道是者也此任賢之事道行也必行喪其國危其身者必反是者也故孔子曰知者之知固以多矣有以守少能無察乎音智上知少謂任賢恭已而已也下如字有讀爲又下同守愚者之知固以少矣有以守多能無狂乎此之謂也事者也事煩則狂守多謂自任主百也亂治國者分已定則主相臣下百吏各謹其所聞不務聽其所不聞無越思謹謂守行各謹其所見不務視其所不見所聞所見誠以齊矣事不侵越也齊謂各當其則雖幽間隱辟百姓莫敢不敬分安制以禮化其上是治國之徴也度不敢踰分徵驗也治國之徵驗在分定間讀為閑辟讀為僻安制謂安於國之制主道治近不治逺道如此人主之治明不治幽治一不治二主能治近則逺者理主能治明則幽者化主能當一則百事正夫兼聽天下日有餘而治不足者如此也是治之極也旣能治近又務治逺旣能治明又務見幽旣能當一又務正百浪反當丁是過者也猶不及也辟之是猶立直木而求其影之枉也不能治近又務治逺不能察明又務見幽不能當一又務正百是悖者也惑悖辟之是猶立枉木而求其影之直也故明主好要而闇主好詳人而自治百事是好詳也任一相而委之是好要不委主好要則百事詳主好詳則百事荒故荒也力不及君者論一相陳一法明一指以兼覆之兼炤之以觀其盛者也謂紀綱也盛讀爲成觀其成功也論選擇也指指歸也一法一指皆相者論列百官之長要百事之聽也要取百事之治考列置於列位也聽治要一堯反其得失也以飾朝廷臣下百吏之分各當分脩飾使度其功勞論其慶賞歲終奉其成功以效於君當則可不當則廢百官府各正其治受其㑹聽效致也周禮大宰歲終則令王廢置也其政事而詔故君人勞於索之而休於使之休息也索求也用國者得百姓之力者富得百姓之死者彊得百姓之譽者榮三德者具而天下歸之三德者亡而天下去之天下歸之之謂王天下去之之謂亡湯武者循其道行其義興天下同利除天下同害天下歸之故厚徳音以先之明禮義以道之致忠信以愛之賞賢使能以次之為尚賞讀爵服賞慶以申重之時其事經其任以調齊之潢然兼覆之養長之如保赤子大水貎也潢與滉同生民則致寛謂衣食也生民生活民使民則綦理辨政令制度所以接天下之人百姓有非理者如豪末則雖孤獨鰥寡必不加焉是故百姓貴之如帝親之如父母爲之出死斷亡而不愉者無它故焉字剩耳不愉不道德誠明利澤誠厚也亂世不然汙漫突盜以先之盜竊也突陵突觸權謀傾覆以示之俳優侏儒婦女之請謁以悖之可戲弄者悖亂也俳優倡優侏儒短人使愚詔知使不肖臨賢生民則致貧隘使民則綦勞苦是故百姓賤之如㑌惡之如鬼人也禮記曰吾欲暴尫而字書無㑌字蓋當爲尫病賤之如虺豕奚若新序作日欲司間而相與投藉之去遂之籍踐也一作投錯之司間伺其閒隟投擿也卒有宼難之事又望百姓之爲已死不可得也說無以取之焉之中論說也卒千忽反無以此事爲得孔子曰審吾所以適人適人之所以來我也此之謂也與人之道爲其復來報適人往與人也審慎其也我傷國者何也曰以小人尚民而威小人在上尚上也使威也位而作以非所取於民而巧賦之類也若兵甲田是傷國之大災也大國之主也而好見小利是傷國其於聲色臺榭園囿也愈厭而好新是傷國一古反厭足也不好循正其所以有啖啖常欲人之有是傷國吞之貌啖啖并三邪者在匈中而又好以權謀傾覆之人斷事其外決任事於外事任也謂斷也若是則權輕名辱社稷必危是傷國者也大國之主也不隆本行不敬舊法而好詐故變也故事若是則夫朝廷羣臣亦從而成俗於不隆禮義而好傾覆也義爲成俗以不隆禮朝廷羣臣之俗若是則夫衆庶百姓亦從而成俗於不隆禮義而好貪利矣君臣上下之俗莫不若是則地雖廣權必輕人雖衆兵必弱刑罰雖繁令不下通夫是之謂危國是傷國者也儒者爲之不然必將曲辨使歸於理也辨理也委曲朝廷必將隆禮義而審貴賤若是則士大夫莫不敬節死制者矣制職分節忠義百官則將齊其制度重其官秩若是則百吏莫不畏法而遵繩矣齊一其制度使有守也厚秩禄也其制馭百官必將使不貪也重其秩禄關市幾而不征質律禁止而不偏人不偏聽也周禮小宰聽賣買以質劑鄭司農云質劑平市質律質劑也可以為法故言質律也禁止而不偏謂禁止姦曰劑皆今之劵書也左氏傳曰趙盾爲政董逋逃由質要或價今之月平是也鄭康成云兩書一札同而别之長曰質短正也曰質如是則商賈莫不敦愨而無詐矣百工將時斬伐佻其期日而利其巧任如是則百工莫不忠信而不楛矣斬陽木仲夏斬隂木時斬伐即周禮仲冬百工自利矣楛謂器惡不牢固也晏子春秋曰景公之時晏是也佻與傜同緩也謂不迫促也巧任巧者之任不迫促則日而不趨三年臺成而民振欲上恱乎君游民足乎食彼佻子請發粟公不許當爲路寢之臺令史重其績逺其涂佻其同也亦與此縣鄙將輕田野之稅省刀布之斂罕舉力役無奪農時如是則農夫莫不朴力而寡能矣不務他能也但質朴而力作士大夫務節死制然而兵勁爲然後然而當百吏畏法循繩然後國常不亂商賈敦愨無詐則商旅安貨通財而國求給矣皆給足也所求之物百工忠信而不楛則器用巧便而財不匱矣農夫朴力而寡能則上不失天時下不失地利中得人和而百事不廢是之謂政令行風俗美以守則固以征則彊居則有名動則有功此儒之所謂曲辨也荀子卷第七
