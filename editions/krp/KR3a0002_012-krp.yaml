  text: 荀子卷第十二
  hash: sha256:5e3558136f826798774a4d50ac2f41d3a06b06444dfcc602e3fff8744c18d30b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0002_SBCK_012-1a}
body:
  text: 登仕郎守大理評事揚倞注正論篇第十八世俗之爲說者曰主道利周是不然篇皆此一匿其情不使下知也世俗以爲主道利在如此也論世俗之乖謬荀卿以正論辨之周密也謂隱主者民之唱也上者下之儀也之表儀也謂下法上彼將聽唱而應視儀而動唱黙則民無應也儀隱則下無動也不應不動則上下無以相有也以效上是不相須也上不導其下則下無若是則與無上同也不祥莫大焉故上者下之本也上宣明則下治辨矣從則明别於事也宣露辨别也下知所上端誠則下愿愨矣上公正則下易直矣不敢險曲也上公正則下治辨則易一愿愨則易使易直則易知易一則彊易使則功易知則明是治之所由生也上周密則下疑玄矣讀爲眩惑也下同玄謂幽深難知或上幽險則下漸詐矣漸浸也謂浸成其詐也漸子廉反幽隱也險難測也漸進也如字又曰上偏曲則下比周矣疑玄則難一從故難一也疑惑不知所漸詐則難使比周則難知不可知其情禮記曰下人人懷和親比則上長勞也難知則君難一則不彊難使則不功難知則不明是亂之所由作也故主道利明不利幽利宣不利周故主道明則下安主道幽則下危知所從則自危也下知所從則安不故下安則貴上下危則賤上賤猶惡也貴猶愛也故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危謀上畏則故主道莫惡乎難知莫危乎使下畏已傳曰惡之者衆則危書曰克明明徳帝乙罔不明徳愼罰書多方曰成湯至于詩曰明明在下大明之詩大雅故赫赫然著見於天也篇言文王之徳明明在下故先王明之豈特玄之耳哉耳也特猶世俗之爲說者曰桀紂有天下湯武篡而奪之是不然以桀紂爲常有天下之籍則然之圖籍則然以常主天下親有天下之籍則不然有天下躬親能不能治之也則不然以其天下謂在桀紂則不然古者天子千官諸侯百官以是千官也令行於諸夏之國謂之王原之大國夏大也中以是百官也令行於境内國雖不安不至於廢易遂亡謂之君存僅君之聖王之子也孫也子子有天下之後也埶籍之所在也天下之宗室也然而不材不中當也中丁仲反不中謂處事不内則百姓疾之外則諸侯叛之近者境内不一遙者諸侯不聽令不行於境内甚者諸侯侵削之攻伐之若是則雖未亡吾謂之無天下矣聖王没有埶籍者罷不足以縣天下也罷謂弱不任事也縣繫也音懸聖王禹湯也有埶籍者謂其子孫天下無君天下是無君桀紂不能治諸侯有能德明威積海内之民莫不願得以爲君師長師然而暴國獨侈安能誅之侈謂奢汰放縱暴國即桀紂也必傷害無罪之民誅暴國之君若誅獨夫之者若一夫焉天下皆去無助也若是則可謂能用天下矣能用天下之謂王湯武非取天下也之天下也非奪桀紂脩其道行其義興天下之同利除天下之同害而天下歸之也桀紂非去天下也自去也非天下反禹湯之徳亂禮義之分禽獸之行積其凶全其惡而天下去之也天下歸之之謂王天下去之之謂亡故桀紂無天下而湯武不弑君由此效之也獨夫耳豈爲殺君乎由用也效明也天下皆去桀紂是無天下也湯武誅明之用此論湯武者民之父母也桀紂者民之怨賊也今世俗之爲說者以桀紂爲君而以湯武爲弑然則是誅民之父母而師民之怨賊也長師不祥莫大焉以天下之合爲君則天下未甞合於桀紂也然則以湯武爲弑則天下未甞有說也直墮之耳甞有此世俗自古論說未湯武耳之墮損故天子唯其人天下者至重也非至彊莫之能任乃能勝重任物之至彊者至大也非至辨莫之能分小智所能分别也至大則難詳故非至衆也非至明莫之能知其情僞不能和輯也天下之人至衆非極知此三至者非聖人莫之能盡故非聖人莫之能王非聖人安能王重大如此三者況反乎王于聖人備道全美者也是縣天下之權稱也知輕重也稱尺證反懸天下如權稱之懸揔桀紂者其知慮至險也其至意至闇也爲志意至意當其行之爲至亂也親者䟽之賢者賤之生民怨之禹湯之後也而不得一人之與刳比干囚箕子身死國亡爲天下之大僇後世之言惡者必稽焉紂以爲龜鏡也言惡者必稽考桀是不容妻子之數也之徒也列子梁王謂揚朱曰先生有一妻一妾不能治不能容有其妻子是如此之人數也猶言不能保妻子也故至賢疇四海湯武是也至罷不容妻子桀紂是也或曰疇與籌同謂計度也疇四海謂以四海爲疇域今世俗之爲說者以桀紂爲有天下而臣湯武豈不過甚矣哉臣而殺之是過甚也以桀紂爲君以湯武爲譬之是猶傴巫跛匡大自以爲有知也人王霸篇曰賤之匡讀爲尫癈疾之言世俗此說猶巫尫大自以爲神異也如㑌與此匡同禮記曰吾欲暴尫而奚若故可以有奪人國不可以有奪人天下可以有竊國不可以有竊天下也者天下之心難歸故不可也一國之人易服故可以有竊卿之屬是也竊國田常六可以奪之者可以有國不可以有天下竊可以得國而不可以得天下是何也曰國小具也可以小人有也可以小道得也可以小力持也天下者大具也不可以小人有也不可以小道得也不可以小力持也國者小人可以有之然而未必不亡也亡明取國與取天下殊也小人既可以有之則易滅天下者至大也非聖人莫之能有也世俗之爲說者曰治古無肉刑而有象刑形象故謂之象形也書曰臯陶方施象刑惟明孔安國云治古古之治世也肉刑墨劓剕宮也象刑異章服恥辱其刑亦非謂形象也象法也案書之象墨黥其面而已更無劓刖之刑也世俗以爲古之重罪以墨涅以黑巾幪其頭而已或曰墨黥當爲墨幪伹慅嬰布爲纓鄭云凶冠之當爲澡嬰謂澡濯其其布以爲纓也澡或讀爲草愼子作草纓也飾令罪人服之禮記曰緦冠繰纓鄭云有事共艾畢前君以朱大夫素士爵韋令罪人服之故以蒼白色共未詳或衍字耳艾蒼白色畢與韠同紱也所以蔽也爲韠菲對屨也愼子作䋽言罪人或菲或枲爲屨菲草屨也對當爲䋽傳寫誤耳䋽枲禮有䟽屨傳曰藨蒯之菲也故曰菲䋽屨䋽方孔反對或爲蒯殺赭衣而不純純音準殺所介反愼子曰有虞氏之誅以畫詭當黥以草以赤土染衣故曰赭衣純縁也殺之所以異於常人之服也傳曰唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪幪巾纓當劓以復䋽當刖以艾韠當宮此有虞之誅也又尚書大也治古如是治古如是世俗說以是不然以爲治邪則人固莫觸罪非獨不用肉刑亦不用象刑矣以爲人或觸罪矣而直輕其刑然則是殺人者不死傷人者不刑也罪至重而刑至輕庸人不知惡矣亂莫大焉路反惡烏凡刑人之本禁暴惡惡且徵其未也未謂將來徵讀爲懲殺人者不死而傷人者不刑是謂惠暴而寛賊也非惡惡也故象刑殆非生於治古並起於亂今也妄爲此說今之亂世治古不然凡爵列官職賞慶刑罰皆報也以類相從者也其善惡報謂報其善惡者得其惡也各以類相從謂善者得一物失稱亂之端也失其所失稱謂也稱尺證反稱類不相從夫徳不稱位能不稱官賞不當功罰不當罪不祥莫大焉昔者武王伐有商誅紂斷其首懸之赤斾大白旗此云赤旂所傳史記武王斬紂頭懸之大白周之大赤即史記之說非也聞各異也禮記明堂位說旗曰殷之夫征暴誅悍治之盛也殺人者死傷人者刑是百王之所同也未有知其所由來者也刑稱罪則治不稱罪則亂故治則刑重亂則刑輕必行則治世刑注漢書曰世所以治乃刑重所以亂乃刑輕也不敢犯故重亂世刑不行則人易犯故輕李竒犯治之罪固重犯亂之罪固輕也者少有犯則衆惡之治世家給人足犯法法者多不可盡用重典當輕也罪固當重也亂世人廹於飢寒犯書曰刑罰世輕世重此之謂也亂故法有重輕也書甫刑以言世有治世俗之爲說者湯武不能禁令是何也不言有所不至者能施禁令故曰楚越不受制是不然湯武者至天下之善禁令者也湯居亳武王居鄗皆百里之地也天下爲一諸侯爲臣通達之屬莫不振動從服以化順之同恐也振與震曷爲楚越獨不受制也彼王者之制也視形埶而制械用間者異俗器械異制衣服異宜也即禮記所謂廣谷大川異制民生其稱遠近而等貢獻豈必齊哉等差也稱尺證反故魯人以榶衛人用柯齊人用一革之榶或謂之柯或曰方未詳或曰方言云盌謂云謂榖張也言榶張也郭土地形制不同者械用備飾不可不異也故諸夏之國同服同儀也諸夏廹儀謂風俗化故同服同儀也近京師易一以教蠻夷戎狄之國同服不同制爲要荒之服其制度不同也夷狄遐逺又各在一方雖同封内甸服伯里甸服孔安國曰王畿之内也禹貢五治田也爲天子服封外侯服之外五百里也侯候也斥候而服畿外也禹貢五百里侯服孔云甸服侯服候斥也事王也韋昭公侯衛賔服自侯圻至衛圻其閒五圻圻五韋昭注國語曰侯候圻衛衛圻圻之外甸圻甸圻之外男圻男圻之外采圻采圻之外衛圻百里中國之界也謂之賔服常以貢獻賔服於王五圻者侯據周官職方氏與禹貢異制也康誥曰侯甸男邦采衛是也此蠻夷要服服之外五百職方氏云衛安國云要謂要束以文教要一昭反里曰蠻服又其外五百里曰夷服孔戎狄荒服謂鎭服藩職方氏所之地與戎狄同俗故謂之荒荒忽無常之言服也韋昭曰各相去五百里九州之外荒裔甸服者祭侯服者祀賔服者享要服者貢荒服者終王於曾祖也時享於二祧終謂世終朝嗣王也韋昭曰日祭於祖考上食也近漢亦然月祀日祭月祀時享嵗貢二字誤脫耳此下當有終王夫是之謂視形勢而制械用稱遠近而等貢獻是王者之至也志識遠近也至當爲志所以彼楚越者且時享嵗貢終王之屬也必齊之日祭月祀之屬然後曰受制邪是規磨之說也規者正圓之器磨久則偏盡規磨之說猶言差錯之說也韓子曰規有磨而水有波我欲更之無奈之何此通於權者而不圓失於度程也文子曰水雖平必有波衡雖正必有差也言溝中之瘠也羸瘠者以喻智慮淺也謂行乞之人在溝壑中則未足與及王者之制也語曰淺不可與測深愚不足與謀知坎井之鼃不可與語東海之樂此之謂也蟇類也事出莊子坎井或作壇井鼃戸媧反言小不知大也司馬彪曰坎井壊井也鼃蝦世俗之爲說者曰堯舜擅讓義謂除地爲墠告擅與禪同墠亦同賢後世徳薄故父子相繼荀卿言堯舜相承但傳位於賢而天而傳位也後因謂之禪位世俗以爲堯舜徳厚故禪讓聖于虞舜是亦有讓之說此云非擅讓蓋書序美堯之徳雖是已與傳子無異非謂求名而禪讓也案書序曰將遜于位讓以天下與舜有諸孟子曰天子不能以天下與人曰孰與之傳位與遜讓無異非是先自有讓意也孟子亦云萬章曰堯與賢天與子則與子也曰天與之又曰天與賢則是不然天子者埶位至尊無敵於天下夫有誰與讓矣下相縣則無與讓矣有讓者埶位敵之名若上又也讀爲道徳純備智惠甚明南面而聽天下生民之屬莫不振動從服以化順之天下無隱士無遺善用之士也無隱藏不同焉者是也異焉者非也夫有惡擅天下矣事則求賢而禪夫自知不堪其無不理又烏用禪位哉位今以堯舜之明聖事曰死而擅之禪讓之事因謂或者既以生無至死後而禪之堯舜預求聖賢是又不然聖王在上圖徳而定次量能而授官徳而定次一本作決皆使民載其事而各得其宜不能以義制利不能以僞飾性則兼以爲民則兼并之令盡爲民氓也僞謂矯其本性也無能者聖王已沒天下無聖則固莫足以擅天下矣禪讓固無天下有聖而在後者則天下不離後者則天有聖繼其不離叛也下有所歸朝不易位國不更制天下厭然與郷無以異也渉反郷音向厭然順服貌一以堯繼堯夫又何變之有矣豈爲禪讓改變與他人乎言繼位相承與一堯無異聖不在後子而在三公則天下如歸猶復而振之矣歸後子而歸三公也復而振之謂猶如天下巳去而衰息今後子嗣子謂丹朱商均也三公宰相謂舜禹天下如歸言不而振起也使之來復天下厭然與郷無以異也以堯繼堯夫又何變之有矣句重也疑此三唯其徙朝改制爲難而不忍者在徙朝改制也後世見其改易遂以爲謂殊徽號異制度也舜禹相繼與父子無異所難也擅讓故天子生則天下一隆致順而治論徳而定次皆得其崇厚也致極也天下一隆謂天下之人死則能任天下者必有之矣夫禮義之分盡矣擅讓惡用矣哉傳之則是盡禮義之分矣豈復更求禪讓之名夫讓者禮義之名今聖王但求其能任天下者哉曰老衰而擅是又不然血氣筋力則有衰若夫知慮取舍則無衰曰老者不堪其勞而休也是又畏事者之議也憚勞苦以爲或曰自以畏然也聖王亦天子者埶至重而形至佚心至愉而志無所詘而形不爲勞尊無上矣衣被則服五采雜閒色色也閒色紅碧之屬禮記曰衣正衣被謂以衣被身服五采言備五色也色裳閒重文繡加飾之以珠玉食飲則重大牢而備珍恠期臭味牢也珍怪竒異之食也重多也謂重多之以太綦極也期當爲曼而饋也列萬舞而進食曼當爲萬饋進食代睪而食未睪爲澤澤蘭也旣夕禮茵著用荼實綏澤焉俗書澤字作詳蓋香草也或曰睪讀爲槀即所謂蘭茝本也或曰當食謂焚香氣歇即更以新者代之水傍睪傳寫誤遺其水耳代睪而雍而徹樂章名奏雍詩周頌者以雍徹言其僣也雍而徹饌論語曰三家五祀執薦者百人侍西房氣於四郊而祭五徳之帝也或曰此五祀謂礿祠烝甞及周禮宗伯以血祭祭社稷五祀鄭云五祀四時迎五行之也皆王者所親臨之祭非謂户竈中霤門行之五祀也薦大祫也或曰國語展禽曰禘郊祖宗報此五者國之祀典立也西房西廂也侍或爲待也謂所薦陳之物籩豆之屬也侍侍居則設張容負依而坐諸侯趨走乎堂下容謂羽衛也居則設張居安居也聽朝之時也或曰爾雅云容謂之防郭璞云如今牀頭小曲屏風唱其容儀負依而坐也户牖之閒謂之依作扆扆依音同容於戸牖間負之而坐也射者所以隱見也言施此出戸而巫覡有事出内門出户謂有事祓除不祥也女曰巫男曰覡出門而宗祀有事出國門宗者出門謂車駕姓之後能知四時之生犧牲之物玉帛之類采服之宜主祭祀之官祀當爲祝有事謂祭行神也國語曰使名之所出而必帥舊典者為之宗又曰使先聖之後能知山川彝器之量次主之度屏攝之位壇場之所上下之神祇氏姓神者謂之祝韋昭曰宗大宗伯也掌祭祀之禮禮記太祝之號宗廟之事昭穆之世齊敬之勤禮節之宜而敬恭明祥也掌祈福乗大路趨越席以養安曰大路繁纓一就大路祭天車禮記按禮以大路越席爲質素此云養安以爲盛飾未詳其趨衍字耳越席結蒲爲席養安言恐其不安以此和養之以質爲重也意或曰古人側載睪芷以養鼻解上於車上傍睪芷香草也已以養鼻也側載之用前有錯衡以養目毛云錯衡文衡詩曰約軝錯衡和鸞之聲步中武象騶中韶䕶以養耳車上鈴和鸞皆鳴則和應皆所以爲行節也許愼曰和取其敬鸞以象鳥之也韓詩外傳云鸞在衡和在軾前升車馬動馬動則鸞鳴鸞行周禮大馭云凡馭路行以肆夏趨以采薺以鸞和爲節聲武象韶䕶皆樂名也騶當爲趨步謂車緩行趨謂車速趨謂路門至應門也鄭云行謂大寢至路門三公奉軶持納與軜同軜與軶轅前也納者詩曰鋈以觼軜驂馬内軜繫軾前諸侯持輪挾輿先馬之左右也挾輿在車或挾輿者或先馬者先馬導馬也或持輪者大侯編後大夫次之國稍大侯之列者大在五等小侯元士次之元士上士也禮記曰庶方小侯僻逺小國及附庸也曰天子之元士視附庸也小侯入天子之國曰某人又庶士介而夾道也介而坐庶士軍士側以禦非常也道被甲坐於道庶人隱竄莫敢視望居如大神動如天帝之甚也言畏敬持老養衰猶有善於是者與不老者休也休猶有安樂恬愉如是者乎老者休息之名豈更有休息安樂樂過此不老老也猶言不顯顯也或曰不字衍耳夫故曰諸侯有老天子無老有筋力衰竭求致仕諸侯供職貢朝聘故子異也者與天有擅國無擅天下古今一也敵之名一讓者埶位而讓賢天下則不然也國事輕則有請於天子夫曰堯舜擅讓是虚言也是淺者之傳陋者之說也不知逆順之理小大至不至之變者也不至猶言當不當也小謂一國大謂天下至未可與及天下之大理者也世俗之爲說者曰堯舜不能敎化是何也曰朱象不化是不然也堯舜者至天下之善敎化者也南面而聽天下生民之屬莫不振動從服以化順之無不化言天下然而朱象獨不化是非堯舜之過朱象之罪也罪人之朱象乃語曰上智與下愚不移是也當誅戮者豈堯舜之過哉論堯舜者天下之英也英謂俊選之尤者鄭康成注禮記云朱象者天下之嵬一時之瑣也敎化所不及嵬瑣巳解在非十二子之篇言嵬瑣之人雖被堯舜之治猶不可化言今世俗之爲說者不怪朱象而非堯舜也豈不過甚矣哉夫是之謂嵬說之說狂妄羿蠭門者天下之善射者也不能以撥弓曲矢中弓撥中丁仲反不正之弓王梁造父者天下之善馭者也不能以辟馬毁輿致遠必亦反辟與躄同堯舜者天下之善敎化者也不能使嵬瑣化何世而無嵬何時而無瑣自太皥燧人莫不有也前帝王始作火化者太皥伏羲也燧人大皥故作者不祥學者受其殃非者有慶慶言必無刑戮也作嵬瑣者不祥也有詩曰下民之孽匪降自天噂沓背憎職競由人此之謂也天降噂噂沓沓然相對談語背則相憎爲此者王由人耳詩小雅十月之交之篇言下民相爲妖孼災害非從世俗之爲說者曰大古薄葬棺厚三寸衣衾三領葬田不妨田故不掘也君也三領三稱此蓋言古之人所葬之地不妨農耕也殷已前平葬無丘壠之識也也禮記君陳衣于序東西領南上故以領言葬田不妨田言亂今厚葬飾棺故掘也是不及知治道而不察於抇不抇者之所言也家也胡骨反抇穿也謂發凡人之盜也必以有爲所云爲也其意必有不以備不足足則以重有餘也而聖王之生民也皆使當厚優猶不知足而不得以有餘過度謂當之養民輕賦薄斂皆使寛泰而知足也又有禁限不得以得中也丁浪反優猶寛泰也不知足不字亦衍耳言聖王度也有餘過故盜不竊賊不刺私竊謂之盜刼殺謂之盜賊通名分而言之則賊狗豕吐菽粟而農賈皆能以貨財讓賈農餘無不讓也庶人猶讓財其風俗之美男女自不取於涂而百姓羞拾遺故孔子曰天下有道盜其先變乎知榮辱衣食足雖珠玉滿體文繡充棺黄金充椁加之以丹矸重之以曾靑靑銅之精形如丹矸丹砂也曾丹矸重以曽靑言以丹靑采畫也珠者其色極淸故謂之曾靑加以犀象以爲樹於壙樹之也中琅玕龍兹華覲以爲實有琅玕樹龍兹未琅玕似珠崑崙山也公羊傳曰衛侯朔屬負兹爾雅曰蓐謂之兹史記曰衛詳覲當爲瑾華謂有光華者也或曰龍兹即今之龍鬚席王曰漸臺五重黄金白玉琅玕龍䟽翡翠珠璣莫落連飾叔封布兹徐廣曰兹者籍席之名列女傳無鹽女謂齊宣曹大家亦不解實謂實於棺槨中或曰兹與髭同萬民疲極此二殆也疑龍兹即龍䟽鬚音相近也人猶且莫之抇也是何也則求利之詭緩而犯分之羞大也詐之心緩也詭詐也求利詭夫亂今然後反是上以無法使下以無度行知者不得慮能者不得治賢者不得使位使人不得在若是則上失天性下失地利中失人和故百事廢財物詘而禍亂起王公則病不足於上庶人則凍餒羸瘠於下於是焉桀紂群居而盜賊擊奪以危上矣盡如桀紂也言在上位者必禽獸行虎狼貪故脯巨人而炙嬰兒矣若是則有何尤抇人之墓抉人之口而求利矣哉口取其珠也抉挑也抉人雖此倮而埋之猶且必抇也安得葬薶哉薶而不發不可得葬彼乃將食其肉而齕其骨也夫曰大古薄葬故不抇亂今厚葬故抇也是特姦人之誤於亂說以欺愚者而潮䧟之以偷取利焉夫是之謂大姦特姦人言是乃於不仁不孝也以偷取利謂偝棄死者而苟取其利於生自誤惑於亂說因以欺愚者猶於泥潮之中䧟之謂使䧟葬以惑當世故以此譏之者也是時墨子之徒說薄傳曰危人而自安害人而自利此之謂也生者與此義同危害死者以利子宋子曰明見侮之不辱使人不鬭解在天宋子已鬬也莊子說宋子曰見侮不辱救民之鬬尹文子曰見侮論篇宋子言若能明侵侮而不以爲辱之義則可使人不矣宋子蓋尹文弟子何休注公羊曰以子冠氏上者著其師不辱見推不矜禁暴息兵救世之鬬此人君之徳可以爲主難宋子之徒也也言此者蓋以人皆以見侮爲辱故鬬也知見侮之爲不辱則不鬭矣應之曰然則亦以人之情爲不惡侮乎曰惡而不辱也其侮雖惡烏路反下同而不以爲辱惡曰若是則必不得所求焉必不得求不鬬凡人之鬭也必以其惡之爲說非以其辱之爲故也不在於辱也凡鬬在於惡今倡優侏儒狎徒詈侮而不鬭者是豈鉅知見侮之爲不辱哉遽知宋子有見侮不辱之論哉狎戲也鉅與遽同言此倡優豈速然而不鬭者不惡故也今人或入其央瀆竊其豬彘也如今人央瀆中瀆溝也家出水則援劒㦸而逐之不避死傷是豈以喪豬爲辱也哉然而不憚鬭者惡之故也雖以見侮爲辱也不惡則不鬭之論者也不知宋子雖知見侮爲不辱惡之則必鬭之論也知宋子然則鬭與不鬭邪亡於辱之與不辱也乃在於惡之與不惡也夫今子宋子不能解人之惡侮而務說人以勿辱也豈不過甚矣哉達解辱是過甚也解如字說讀爲税也不知人情惡侮而使見侮不金舌弊口猶將無益也見侵侮金舌弊口而不對欲以率先猶無益於不金舌以金爲舌金舌弊口以喻不言也雖子宋子而木舌金或讀爲噤鬬也揚子法言曰金口不知其無益則不知說無益不知此知也是不知其無益也直以欺人則不仁不仁不知辱莫大焉知辱無過此也發論而不仁不將以爲有益於人則與無益於人也反預於無益人之謂也與讀爲預本謂有益於人則得大辱而退耳說莫病是矣侮不辱反自本欲使人見辱耳得大子宋子曰見侮不辱應之曰凡議必將立隆正然後可也然後可也崇高正直無隆正則是非不分而辨訟不決故所聞曰天下之大隆是非之封界分職名象之所起王制是也王制謂王者之舊制名謂指名象謂法象故凡言議期命是非以聖王爲師也皆以聖王爲法也期物之所㑹也命名物而聖王之分榮辱是也如宋子以見侮爲不辱哉聖王以榮辱爲人之大分豈是有兩端矣有二也榮辱各有義榮者有埶榮者有義辱者有埶辱者志意脩德行厚知慮明是榮之由中出者也夫是之謂義榮爵列尊貢禄厚形埶勝也禄謂受君之禄卿相士大貢謂所受貢賦謂天子諸侯謂埶位也夫也形埶上爲天子諸侯下爲卿相士大夫是榮之從外至者也夫是之謂埶榮流淫汗僈漫已解在榮辱篇汙穢行也僈當爲犯分亂理驕暴貪利是辱之由中出者也夫是之謂義辱詈侮捽搏搏手擊也捽持頭也捶笞臏腳骨也腳古脚字臏脚捶笞皆杖擊也臏膝馬喜臏脚於宋卒相中山謂刖其膝骨也鄒陽曰司斬斷枯磔暴屍也磔車裂斷如字枯棄市辜義同歟韓子曰楚南之地麗水之中生金民多竊采之也周禮以疈辜祭四方百物謂披磔牲體也或者枯與疈疑辜即枯也又莊子有辜人謂犯罪應死之人也采金之禁得而輙辜磔所辜磔甚衆而民竊金不止藉靡舌謂胥靡也謂刑徒之人以鐵鏁相連繫也舌藉見陵藉也才夜反靡繫縛也與縻義同即能合舌舉而不能下謂辭窮亦恥辱也未詳或曰莊子云公孫龍口呿而不是辱之由外至者也夫是之謂埶辱是榮辱之兩端也故君子可以有埶辱而不可以有義辱小人可以有埶榮而不可以有義榮有埶辱無害爲堯有埶榮無害爲桀義榮埶榮唯君子然後兼有之義辱埶辱唯小人然後兼有之是榮辱之分也聖王以爲法士大夫以爲道官人以爲守百姓以成俗萬世不能易也主敎化者官人守職事之官也言上下皆以榮辱爲治也士大夫今子宋子案不然獨詘容爲已慮一朝而改之說必不行矣分獨欲屈容受辱爲已之道其言宋子不知聖王以榮辱爲大王之法說必不行也謀慮乃欲一朝而改聖譬之是猶以塼塗塞江海也以僬僥而戴太山也僥短人長三尺者塼涂以塗壘塼也僬蹎跌碎折不待頃矣也頃少頃也蹎與顚同躓二三子之善於子宋子者殆不若止之將恐得傷其體也息其說也傷其體謂受大辱二三子慕宋子道者也止謂子宋子曰人之情欲寡而皆以己之情爲欲多是過也子宋子曰以禁攻寢兵爲外以情欲寡淺為内也以凡人之情所欲在少不在多也莊子說宋故率其羣徒辨其談說明其譬稱將使人知情欲之寡也欲之寡或爲情之欲寡也稱謂所冝也稱尺證反情應之曰然則亦以人之情爲欲目不欲綦色耳不欲綦聲口不欲綦味鼻不欲綦臭形不欲綦佚此五綦者亦以人之情爲不欲乎曰人之情欲是已曰若是則說必不行矣以人之情爲欲此五綦者而不欲多譬之是猶以人之情爲欲富貴而不欲貨也好美而惡西施也古之人爲之不然以人之情爲欲多而不欲寡故賞以富厚而罰以殺損也以謂之殺減也所介反富厚賞之以殺損罰是百王之所同也故上賢禄天下次賢禄一國下賢禄田邑愿愨之民完衣食禄下至愿愨之民猶得完衣食皆所以人之情爲欲多故使徳重者受厚其功以報今子宋子以是之情爲欲寡而不欲多也然則先王以人之所不欲者賞而以人之所欲者罰邪亂莫大焉乃大亂之道如宋子之說今子宋子嚴然而好說其說也好呼報反嚴讀爲儼好說自喜聚人徒立師學成文曲章也文曲文然而說不免於以至治爲至亂也豈不過甚矣哉荀子卷第十二
