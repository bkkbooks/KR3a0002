body:
  text: 登仕郎守大理評事揚倞注議兵篇第十五臨武君與孫卿子議兵於趙孝成王前武臨申君曰君有將乎春申君曰有矣僕欲將臨武君魏加曰臣君蓋楚將未知姓名戰國䇿曰天下合從趙使魏加見楚春更嬴與王處京臺之下更嬴曰臣能爲王引弓虚發而下鳥少之時好射臣願以射譬可乎春申君曰可魏加曰異曰者於此乎更嬴曰此孽也王曰先生何以知之對曰其飛徐者有閒鳴鴈從東方來更嬴以虚發而下之王曰射之精乃至弦音烈而髙飛故隕也今臨武君甞爲秦孽不可以爲距秦其創痛也其鳴悲者久失羣也故創痛未息而驚心未去聞孫卿至趙與孫臏議兵趙孝成王前臨武君即孫臏也今桉史之將趙孝成王晉大夫趙夙之後簡子十世孫或曰劉向叙云成王元年已七十餘年年代相逺疑臨武君非此孫臏也記年表齊宣王二年孫臏爲軍師則敗魏於馬陵至趙孝王曰請問兵要臨武君對曰上得天時歳反孤若順太類也虚之下得地利左水澤之比也若右背山陵前觀敵之變動後之發先之至此用兵之要術也孫卿子曰不然臣所聞古之道凡用兵攻戰之本在乎壹民弓矢不調則羿不能以中微六馬不和則造父不能以致逺士民不親附則湯武不能以必勝也故善附民者是乃善用兵者也故兵要在乎善附民而已臨武君曰不然兵之所貴者埶利也爭利乘埶所行者變詐也計竒善用兵者感忽悠闇莫知其所從出逺視不分辨之貎莫知所從出謂若九天之上感忽悠闇皆謂倐忽之閒也感忽恍忽也悠闇曰棄感忽之恥累世之功也九地之下使敵人不測魯連子孫吳用之無敵於天下豈必待附民哉吳謂魏武侯將吳起也孫謂吳王闔閭將孫武孫卿子曰不然臣之所道仁人之兵王者之志也之志帝王此也意如君之所貴權謀埶利也所行攻奪變詐者諸侯之事也仁人之兵不可詐也彼可詐者怠慢者也路亶者也上下不相覆蓋新叙作落單路暴露也亶讀爲袒露袒謂君臣上下之閒滑然有離德者也言彼可欺詐滑亂也音骨之國也者皆如此故以桀詐桀猶巧拙有幸焉以桀詐堯譬之若以卵投石以指撓沸指撓沸言撓攬也以作以指繞沸必爛也新序若赴水火入焉焦没耳故仁人上下相愛之意說仁人上下百將一心三軍同力臣之於君也下之於上也若子之事父弟之事兄若手臂之扞頭目而覆胷腹也詐而襲之與先驚而後擊之一也擊之豈手臂有不救也先驚頭目使知之而後且仁人之用十里之國則將有百里之聽猶聽耳目或曰謂閒諜者耳目也言逺人自爲其用百里之國則將有千里之聽用千里之國則將有四海之聽必將聦明警戒和傳而一有二心也一云傳或爲博博耳目明而警戒相傳以和無言和衆如一也衆也而一如一也故仁人之兵聚則成卒散則成列言動皆有備也卒卒伍列行列延則若莫邪之長刃嬰之者斷兊則若莫邪之利鋒當之者潰聚也兊猶新序作銳則若莫邪之利鋒也與隊同謂聚之使短潰壞散也圜居而方正則若盤石然觸之者角摧如大石之不可移動也園居方正謂不動時也則案角鹿埵隴種東籠而退耳敗披靡之貌或曰其義未詳蓋皆摧之種物然或曰即鍾也東籠與涷隴同沾溼貎如衣服之鹿埵下之貎如禾實垂下然埵丁果反隴種遺失貎如隴鍾而退無鹿埵字沾溼然於新序作隴且夫暴國之君將誰與至哉彼其所與至者必其民也而其民之親我歡若父母其好我芬若椒蘭彼反顧其上則若灼黥灼黥如畏若仇讎人之情雖桀跖豈又肯爲其所惡賊其所好者哉是猶使人之子孫自賊其父母也彼必將來告之夫又何可詐也詐襲也不可得故仁人用國日明明察日益諸侯先順者安後順者危慮敵之者削反之者亡見侵削反謂不服從也謀慮與之爲敵者土地必詩曰武王載發有虔秉鉞如火烈烈則莫我敢遏此之謂也師本由仁義雖用武持鉞而猶以敬爲先故得如火詩殷頌武王湯也發讀爲斾虔敬遏止也湯建斾興止之也之盛無能孝成王臨武君曰善請問王者之兵設何道何行而可敎令也行動用也設謂制置道謂論說孫卿子曰凡在大王將率末事也臣請遂道王者諸侯強弱存亡之效安危之埶同所類率與帥遂問用兵之術荀卿欲陳王道因不荅其問故言凡在大王反道說也效驗也孝成王見荀卿論兵謂王者以兵爲急故遂廣說湯武五霸及戰國諸侯之事之所務將帥乃其末事耳所急敎化也君賢者其國治君不能者其國亂隆禮貴義者其國治簡禮賤義者其國亂治者強亂者弱是強弱之本也上足卬則下可用也上不足卬則下不可用也仰冝向反能敎且化長養之是足仰卬古仰字不仰不足仰也下託上曰下可用則強下不可用則弱是強弱之常也隆禮效功上也重禄貴節次也上功賤節下也是強弱之凡也賞僭也重禄重難其禄不使素效驗也功戰功也效功謂不使上戰功輕忠義則弱大凡如此也餐也節忠義也君能隆禮驗功則強好士者強不好士者弱士也士賢愛民者強不愛民者弱政令信者強政令不信者弱下可信信謂使民齊者強不齊者弱同力齊謂賞重者強賞輕者弱必賞有功則重難其賞使賞則弱也強輕易其刑威者強刑侮者弱則強不當罪則人刑當罪使人可畏弱也侮僈故械用兵革攻完便利者強好加功者也器攻當爲功功精於用則強也械牢固便利械用兵革窳楛不便利者弱病也窳器謂不堅固也音庾楛濫惡重用兵者強輕用兵者弱用兵重難強者權出一者強權出二者弱則弱也政多門是強弱之常也齊人隆技擊敵者號爲技擊孟康曰兵家技材力也齊人以勇力擊斬械積機闗以立攻守之勝之技巧技巧者習手足便器其技也得一首者賜贖錙金無本賞矣也其技擊之術斬得一首則宫八兩曰錙本賞謂有功同受賞斬首雖勝亦不賞是無本賞也賜錙金贖之斬首雖戰敗亦賞不是事小敵毳則偷可用也仲子曰屠可以旦夕得甘脆以養親也可偷竊用之也毳讀爲脆史記聶政謂嚴事大敵堅則渙然離耳渙者離也易說卦曰若飛鳥然傾側反覆無日言傾側反覆之速不得一日也若飛鳥言無馮而易也無日是亡國之兵也兵莫弱是矣是其出賃市傭而戰之幾矣而使之戰相去幾何也此與賃市中傭作之人魏氏之武卒以度取之取之謂取其長短材力中度者武卒選擇武勇之卒號爲武卒度衣三屬之甲凡三屬也衣於氣反屬之欲反如淳曰上身一髀褌一踁繳一操十二石之弩負服矢五十个置戈其上上謂荷戈也置戈於身之冠䩜帶劔師古曰箸兠鍪而又帶劒也䩜與胄同漢書作胄帶劒顔贏三日之糧日中而趨百里一日之中也贏負擔也日中中試則復其户利其田宅曰利謂給其便利之處中丁仲反復方目反復其户不傜役也利其田宅不征衆也顔師古是數年而衰而未可奪也改造則不易周也奪其優復使皆怨也改造更選擇也則又如前此中試者䈥力數年而衰亦未可遽奪其優是故地雖大其稅必寡是危國之兵也寡資用貧乏故優復既多則稅危國秦人其生民也陿阸其使民也酷烈民生地險固則寇不能害嚴刑罰則人皆致死也所生之地陿阸謂秦地險固也酷烈嚴刑罰也劫之以埶廹之使出戰謂以威埶劫隱之以阸氏曰秦地多阸藏隱其民於阸謂隱蔽以險阸使敵不能害鄭中忸之以慶賞之賞慶使習以爲常忸女九反忸與狃同串習也戰勝則與鰌之以刑罰蛇曰鰌我亦勝我音秩或作䠓七六反鰌藉也不勝則以刑罰陵藉之莊子風謂使天下之民所以要利於上者非鬪無由也阸而用之得而後功之所以人自爲戰而立功者衆也守險阸而用之旣得勝乃賞其功功賞相長也五甲首而隷五家長獲得五甲首則有功而賞之使相之五家也役隷郷里是最爲衆強長久多地以正故四世有勝非幸也數也故能衆強長久也不復其户爲之有根本不邀一時之利亦非天幸有術數然也四世孝公惠王武王昭王也利其田宅故多地也以正言比齊魏之苟且爲正言秦故齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之銳士秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義有遇之者若以焦熬投石焉物投石也熬五刀反以魏遇秦猶以焦熬之兼是數國者皆干賞蹈利之兵也傭徒鬻賣之道也未有貴上安制綦節之理也利之兵與傭徒之人鬻賣其力作無異干求也言秦魏雖足以相勝皆求賞蹈不踰越極於忠義心不爲非之理者也未有愛貴其上爲之致死安於制度自諸侯有能微妙之以節則作而兼殆之耳義也作起也殆危微妙精盡也節仁而無危也兼此數國謂擒滅之也諸侯有能精盡仁義則能起故招近募選隆埶詐尚功利是漸之也謂引致之也募選謂以財近當爲延傳寫誤耳招延詐爲尚此論秦也尚功利謂有功則利其田宅論魏也漸召之而選擇可者此論齊之技擊也隆埶詐謂以威埶變謂其賞罰纔可漸染於外中心未恱服漸子廉反進也言漸進而近於法未爲理也或曰漸浸漬也禮義敎化是齊之也壹人之術也服其心是齊故以詐遇詐猶有巧拙焉以當魏之武卒也猶齊之技擊不可以詐遇齊辟之猶以錐刀墮大山也也許唯反辟音譬墮毁非天下之愚人莫敢試故王者之兵不試不必試也一舉而定湯武之誅桀紂也拱揖指麾而強暴之國莫不趨使者皆化而來臣役也誅其元惡其餘獷悍誅桀紂若誅獨夫故泰誓曰獨夫紂此之謂也故兵大齊則制天下小齊則治鄰敵義敎以禮五霸者也治隣敵言鄰敵受其治化耳化大齊之謂湯武也小謂未能大備若若夫招近募選隆埶詐尚功利之兵則勝不勝無常代翕代張代存代亡相爲雌雄耳矣代翕代翕斂也言代強代弱也張代存代亡猶夫是之謂盜兵君子不由也用由是盜賊之兵也也以詐力相勝故齊之田單楚之莊蹻秦之衞鞅燕之繆蟣是皆世俗之所謂善用兵者也威王使爲將將兵循江而上略蜀黔中以西蹻至滇池田單齊襄王臣安平君也史記莊蹻者楚莊王苖裔楚奪楚巴黔中郡道塞不通因還以其衆至滇變服從其俗方三百里地肥饒數千里以兵滅定屬楚欲歸報㑹秦擊商君者也繆蟣未聞也焉衞鞅秦孝公臣封爲是其巧拙強弱則未有以相君也若其道一也詐故曰其道一也雖術不同皆出於變未及和齊也於和齊人心也數子之術未能及掎契司詐權謀傾覆未免盜兵也司讀爲伺詐欺誑也皆謂因其危契讀爲挈持也掎挈猶言掎摭也襲之也弱即掩齊桓晉文楚莊呉闔閭越句踐是皆和齊之兵也可謂入其域矣域孟康曰入王入禮義敎化之域也兵之然而未有本統也脩若湯武也本統謂前行素故可以霸而不可以王是強弱之效也齊魏則代存代亡湯武王而桓文霸效也是其孝成王臨武君曰善請問爲將孫卿子曰知莫大乎棄疑是智之大不用疑謀行莫大乎無過事莫大乎無悔事至無悔而止矣成不可必也以不必故旡兵衆人以不必必之故多兵不得必謂成功忘其警備莊子曰聖人以故制號政令欲嚴以威慶賞刑罰欲必以信處舍收臧欲周以固密牢固則敵不能陵奪矣處舍營壘也收臧財物也周徙舉進退欲安以重欲疾以速不爲輕舉動靜則安重而不失機權則疾速而窺敵觀變欲潛以深欲伍以參閒諜謂使伍之於敵之閒而盡知其事韓子曰省同異之言以知朋觀敵欲濳隱深入之也伍參猶錯雜也使間諜或叄之或又曰參之以比物伍之以合參也黨之分偶參伍之驗以責陳言之實遇敵決戰必道吾所明無道吾所疑行也道言也夫是之謂六術已下有六也自制號政令無欲將而惡廢無急勝而忘敗無威内而輕外無見其利而不顧其害戰而輕敵強使人出凡慮事欲孰而用財欲泰審泰謂孰謂精賞也不吝夫是之謂五權之機權也五者爲將所以不受命於主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至而不變至謂一守凡受命於主而行三軍三軍旣定百官得序羣物皆正得序各當其任百官軍之百吏則主不能喜敵不能怒喜不爲變詐故敵不能不苟徇上意故主不能也怒夫是之謂至臣至當也爲臣之慮必先事而申之以敬敬常戒懼而有備也謀慮必在事先重之以愼終如始終始如一失是之謂大吉敗之禍也言必無覆凡百事之成也必在敬之其敗也必在慢之故敬勝怠則吉怠勝敬則滅計勝欲則從欲勝計則凶戰如守干五歩六歩乃止齊焉不務越逐也書曰不愆行如戰有功如幸務不矜驕敬謀無壙不敬也壙與曠同無壙言不敢須臾敬事無壙敬終無壙敬衆無壙敬敵無壙夫是之謂五無壙愼行此六術五權三至而處之以恭敬無壙夫是之謂天下之將則通於神明矣莫及天下將之臨武君曰善請問王者之軍制孫卿子曰將死鼓傳曰師之耳目在吾旗鼓死謂不棄之而奔亡也左御死轡百吏死職士大夫死行列聞鼓聲而進聞金聲而退順命爲上有功次之命故有功次之軍之所重在順令不進而進猶令不退而退也其罪惟均令也令敎不退而退其罪同也言使之不進而進猶令不殺老弱不獵禾稼躐同獵與也踐服者不禽格者不舎犇命者不獲戰而退服謂不來歸其命者不獲之爲囚俘也犇與奔同者不追禽之格謂相拒捍者奔命謂奔走凡誅非誅其百姓也誅其亂百姓者也百姓有扞其賊則是亦賊也賊之扞蔽也扞其賊謂爲以故順刃者生蘇刃者死犇命者貢爲傃傃向也謂相向格鬪者貢順刃謂不戰偝之而走者蘇讀獻於上將也謂取歸命者微子開封於宋後封於宋此云開者紂之庶兄名啓歸周劉向改之也蓋漢景帝諱曹觸龍斷於軍富有四海其臣有左說苑曰桀貴爲天子左師觸龍說大后請長安君質秦豈復與古人同官名乎師觸龍者謟䛕不正此云紂臣當是說苑誤又戰國䇿趙有殷之服民所以養生之者也無異周人故近者歌謳而樂之逺者竭蹷而趨之顛仆竭蹷作竭走而趨之猶言匍匐也新序無幽閒辟陋之國莫不趨使而安樂之四海之内若一家通達之屬莫不從服夫是之謂人師長師詩曰自西自東自南自北無思不服此之謂也有聲之篇詩大雅文王王者有誅而無戰城守不攻兵格不擊未加德義也且恐傷我之士卒也所以敵人不服故不攻擊上下相喜則慶之上下敵人之豈況侵伐乎相愛恱則慶賀不屠城民若屠者然也屠謂毁其城殺其不濳軍不留衆露於外也不久留暴師不越時不踰時也古者行役故亂者樂其政不安其上欲其至也怨之比東征西臨武君曰善陳囂問孫卿子曰先生議兵常以仁義爲本議常言兵以仁義爲本也陳囂荀卿弟子言先生之仁者愛人義者循理然則又何以兵爲循理則不欲爭奪愛人則懼其殺傷相加乎焉肯抗兵凡所爲有兵者爲爭奪也人循理非爲愛孫卿子曰非女所知也彼仁者愛人愛人故惡人之害之也義者循理循理故惡人之亂之也彼兵者所以禁暴除害也非爭奪也故仁人之兵所存者神所過者化止之所存往之國無不從化處畏之如神所過若時雨之降莫不說喜是以堯伐驩兠驩兠于崇山也伐亦誅也書曰放舜伐有苗書曰帝曰命禹伐之不率汝徂征之咨禹惟時有苗禹伐共工事此云禹伐共工未詳也書曰流共工于幽州皆堯之湯伐有夏文王伐崇武王伐紂此四帝兩王論夏殷也至周自貶損全稱王故以文武爲兩王也夏殷或稱王或稱帝曲禮曰措之廟立之主曰帝蓋亦皆以仁義之兵行於天下也故近者親其善逺方慕其德兵不血刃逺邇來服德盛於此施及四極詩曰淑人君子其儀不忒此之謂也鳩之篇謂曹風尸李斯問孫卿子曰子後爲秦相李斯孫卿弟秦四世有勝兵強海内威行諸侯非以仁義爲之也以便從事而已之以阸狃之以慶賞鰌之以刑罰之比便其所從之事而已謂若劫之以埶隱孫卿子曰非女所知也女所謂便者不便之便也爲便之也汝以不便人吾所謂仁義者大便之便也人爲便也吾以大便彼仁義者所以脩政者也政脩則民親其上樂其君而輕爲之死故曰凡在於軍將率末事也語弟子所知故引以答之也荀卿前對趙孝成王有此言秦四世有勝諰諰然常恐天下之一合而軋已也之葸鰓懼貌也先禮反張晏曰軋踐轢也漢書諰作鰓蘇林曰讀如愼而無禮則葸此所謂末世之兵未有本統也行素脩本統前故湯之放桀也非其逐之鳴條之時也武王之誅紂也非以甲子之朝而後勝之也皆前行素脩也此所謂仁義之兵也素已修之行讀如字前行素脩謂前已行之今女不求之於本而索之於末此世之所以亂也不求於本而索於末如李斯之說也本謂仁義末謂變詐世所以亂亦由禮者治辨之極也強國之本也威行之道也功名之揔也國謂強其國也辨别也揔要也強王公由之所以得夫下也不由所以隕社稷也故堅甲利兵不足以爲勝髙城深池不足以爲固嚴令繁刑不足以爲威由其道則行不由其道則廢道即禮由用也堅甲嚴刑皆不足恃也也用禮即行不用禮雖楚人鮫革犀兕以爲甲鞈如金石史記作堅如金石鞈古洽反管子曰制重罪入以兵鞈堅貌以鮫魚皮及犀兕爲甲堅如金石之不可入二㦸犀兕堅如金石之狀也甲犀脅二㦸輕罪入蘭盾鞈革宛鉅鐵釶慘如蠭蠆云自關而西謂之矛呉揚之間謂之釶言宛地出此剛宛地名屬南陽徐廣曰大剛曰鉅釶與釶同矛也方言中人之慘毒也鉇音啻鐵爲矛慘如蜂蠆言其輕利僄遬卒如飄風楚言爲嫖姚之嫖嫖驍勇也遬與速同人之趫捷也僄亦輕也匹妙反或當然而兵殆於垂沙唐篾死沛郡有垂鄉豈垂沙乎史記楚懷王二十殆謂危亡也垂沙地名未詳所在漢地志唐昧取我重丘而去昧與蔑同􅊨八年秦與齊韓魏共攻楚殺楚將莊蹻起楚分而爲三四分爲四韓子曰楚王欲伐越莊子曰臣患目能見百司馬貞史記索隱曰莊蹻楚將言其起爲亂後楚遂能禁而欲伐越此智之如目也蹻初爲盗後爲楚將歩而不見其睫主之兵敗於齊晉莊蹻爲盜境内吏不是豈無堅甲利兵也哉其所以統之者非其道故也汝潁以爲險江漢以爲池限之以鄧林縁之以方城繞也方城楚北界山名也鄧林北界鄧地之山林縁然而秦師至而鄢郢舉若振槁然鄢郢楚都振擊舉謂舉而取之伐楚一戰舉鄢郢也也槁枯葉也謂白起是豈無固塞隘阻也哉其所以統之者非其道故也紂刳比干囚箕子爲炮烙刑者行焉輙墮火中紂與妲己大笑烙古責反列女傳曰炮烙謂膏銅柱加之炭上令有罪殺戮無時臣下懔然莫必其命貌莫自謂必懔然悚栗之命也全其然而周師至而令不行乎下不能用其民是豈令不嚴刑不繁也哉其所以統之者非其道故也古之兵戈矛弓矢而已矣然而敵國不待試而詘詘服也試用也城郭不辦治辦音辨也或溝池不拑掘文子曰無伐樹木無鉗墳墓鉗亦拑古掘字史記作城郭不集溝池不抇字與拑字相近遂誤耳音掘或曰拑當爲抇篆文固塞不樹機變不張也塞先代反機變謂器械變動攻敵也固塞謂使邊境險固若今之邊城也樹立然而國晏然不畏外而明内者無它故焉記作晏然不内當爲固史固也畏外而明道而分鈞之時使而誠愛之下之和上也如影嚮卧反和胡有不由令者然后誅之以刑故刑一人而天下服罪人不郵其上知罪之在己也是故刑罰省而威流怨郵言通流也也流行也無它故焉由其道故也古者帝堯之治天下也蓋殺一人刑二人而天下治一殺共工于幽州放驩兠于崇山人謂殛鮌于羽山刑二人謂流傳曰威厲而不試刑錯而不用此之謂也使人畏之厲謂抗舉凡人之動也爲賞慶爲之則見害傷焉止矣故賞慶刑罰埶詐不足以盡人之力致人之死爲人主上者也其所以接下之百姓者無禮義忠信焉慮率用賞慶刑罰埶詐除阸其下獲其功用而已矣言大凡也除焉慮無慮猶以阸狃之以慶賞之類阸或爲險也謂驅逐阸謂廹蹙若秦劫之以埶隱之大宼則至使之持危城則必畔遇敵處戰則必北北者乖背北敗走也走爲北也之名故以敗勞苦煩辱則必犇奔同犇與霍焉離耳下反制其上則上下易位若秦項然霍焉猶渙焉也離散之後故賞慶刑罰埶詐之爲道者傭徒粥賣之道也不足以合大衆美國家故古之人羞而不道也故厚德音以先之明禮義以道之致忠信以愛之尚賢使能以次之爵服慶賞以申之時其事輕其任任力役事作業以調齊之長養之如保赤子政令以定風俗以一有離俗不順其上則百姓莫不敦惡莫不毒孼若祓不祥謂妖孼祓除之也敦厚也毒害也孼然後刑於是起矣是大刑之所加也辱孰大焉將以爲利耶則大刑加焉身苟不狂惑戇陋誰睹是而不改也哉然後百姓曉然皆知脩上之法像上之志而安樂之於是有能化善脩身正行積禮義尊道德能自脩德者也於是像之中更有百姓莫不貴敬莫不親譽然後賞於是起矣是髙爵豐禄之所加也榮孰大焉將以爲害邪則髙爵豐禄以持養之養之也持此以生民之屬孰不願也雕雕焉縣貴爵重賞於其前明之貌雕雕章縣明刑大辱於其後雖欲無化能乎哉故民歸之如流水所存者神所爲者化所至之處存至也言爲民皆從化也畏之如神凡所施而順暴悍勇力之屬爲之化而愿力之人皆化而愿慤也順從也謂好從暴悍勇旁辟曲私之屬爲之化而公辟讀爲僻旁偏頗也矜糺收繚之屬爲之化而調繚繞言委曲也四者皆鄙陋之人今被化則調和也矜謂夸汰糺謂好發摘人過者也收謂掠美者也繚謂夫是之謂大化至一至一極一也大化者皆化也詩曰王猶允塞徐方旣來此之謂也凡兼人者有三術有以德兼人者有以力兼人者有以富兼人者彼貴我名聲美我德行欲爲我民故辟門除涂以迎吾入同開也辟與闢道涂也除涂治其因其民襲其處而百姓皆安之愛恱因其民言不驚擾也襲取其處皆安立法施令莫不順比則民親比之比親附也施令是故得地而權彌重兼人而兵俞強是以德兼人者也愈下同俞讀爲非貴我名聲也非美我德行也彼畏我威劫我埶所劫也爲我埶故民雖有離心不敢有畔慮若是則戎甲俞衆奉養必費必煩費也奉養戎甲是故得地而權彌輕兼人而兵俞弱是以力兼人者也非貴我名聲也非美我德行也用貧求富用飢求飽虚腹張口來歸我食若是則必發夫掌窌之粟以食之廩之官窌音匹孝反地臧曰窌掌窌主倉委之財貨以富之立良有司以接之接之懼其畔去也立温良之有司以慰已朞三年然後民可信也後新歸之民可信本非慕化故也已過也過一朞之後至於三年然是故得地而權彌輕兼人而國俞貧是以富兼人者也故曰以德兼人者王以力兼人者弱以富兼人者貧古今一也兼并易能也唯堅凝之難焉定有地爲難凝定也堅固齊能并宋而不能凝也故魏奪之燕能并齊而不能凝也故田單奪之韓之上地方數百里完全富足而趨趙趙不能凝也故秦奪之全言城邑也富具上地上黨之地完亭以上黨降趙趙使馬服子將兵拒秦秦使白起大破馬服言府庫也趨歸也七朱反史記秦攻上黨韓不能救其守馮而奪其地殺戮蕩盡於長平阮四十餘萬故能并之而不能凝則必奪不能并之又不能凝其有則必亡能凝之則必能并之矣得之則凝兼兵無強其得強而不可兼并者也地則能定之則無有古者湯以薄武王以滈亳同薄與鎬同滈與皆百里之地也天下爲一諸侯爲臣無它故焉能凝之也故凝士以禮凝民以政禮脩而士服政平而民安士服民安夫是之謂大凝以守則固以征則強令行禁止王者之事畢矣荀子卷第十
