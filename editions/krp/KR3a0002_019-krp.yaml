  text: 荀子卷第十九
  hash: sha256:2de76aef703057fb4170243d50c560203040831a381495b8d2ad427629f6fb68
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0002_SBCK_019-1a}
body:
  text: 登仕郎守大理評事揚倞注大略篇第二十七要不可以一事名篇故緫謂之大略也此篇蓋弟子雜録荀卿之語皆略舉其大略以起下文也舉爲標首所君人者隆禮尊賢而王重法愛民而霸好利多詐而危欲近四旁莫如中央故王者必居天下之中禮也居中央取其朝貢道里均禮也言此明都邑居土中之意不近偏旁如此其禮制天子外屏諸侯内屏禮也外屏不欲見外也内屏不欲見内也今浮思也何休注公羊云禮天子屏猶蔽也屏謂之樹鄭康成云若内屏大夫以簾士以帷倞謂不欲見内不察泉中魚之義也諸侯臺門天子外闕兩觀諸侯内闕一觀禮天子外屏諸侯諸侯召其臣臣不俟駕㒹倒衣裳而走禮也詩曰㒹之倒之自公召之天子召諸侯輦輿就馬禮也待馬至故輦輿就馬輦謂人輓車言不暇詩曰我出我輿于彼牧矣自天子所謂我來矣出車之詩小雅來矣謂以王命召已也此明諸侯奉上禮也篇毛云出車就馬於牧地鄭云有人自天子所謂我天子山冕諸侯玄冠大夫裨冕士韋弁禮也冕山取其山則謂之山冕鄭注周禮司服云古冕服十二章謂畫山於衣而服冕即衮冕也蓋取其龍則謂之衮冕彞皆畫裳四章次六曰藻次七曰粉米次八曰黼次九曰黻皆衣五章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗以事尊卑服之諸侯亦服焉上公衮無升龍侯伯鷘子男毳繡鄭注禮云禆之言卑也天子六服大裘為上其餘為禆覲不得服也韋弁謂以爵韋為韠而戴弁也玉藻曰韠君朱大夫孤絺卿大夫玄鄭云大夫禆冕蓋亦言禆冕止於大夫士巳下韋也素士爵天子御珽諸侯御荼大夫服笏禮也所進御也珽大珪長三尺杼上終葵首謂剡上至其首而御服皆器用之名尊者謂之御卑者謂之服御者言臣下然無所屈也荼讀如舒遲之舒儒者所畏在前也方也茶古舒字玊之上圓下方者也鄭康成云珽天子彫弓諸侯彤弓大夫黑弓禮也文飾彤弓朱彫謂彫畫為服御之禮也弓此明貴賤諸侯相見卿為介會介副也聘義卿相見謂於郄地為使則以卿為上擯出會則以卿為上介也為上擯大夫為承擯君親禮賔言主君見聘以其教出畢行羣臣盡行從君也教謂戒令畢行謂使仁居守主後事春使仁厚者梁傳曰智者慮義者行仁者守然後可以會矣秋傳一子守二子從此明諸侯出疆之禮又榖聘人以珪問士以璧召人以瑗絶人以玦反絶以環遺之也衛侯使工尹襄問子貢以弓是其類也說文云聘人以圭謂使人聘他國以珪璋也問謂訪其國事因君召臣以三節周禮珍珪以徵守鄭云以徴召守國之諸侯瑗者大孔璧也爾雅好倍肉謂之瑗肉倍好謂之璧禮記曰臣以瑗歟玦如環而缺肉好若一謂之環古者臣有罪待放若今徵郡守以竹使符也然則天子以珍圭召諸侯諸侯召也反絶謂反其符絶者此明諸侯以玉接人臣之禮也於境三年不敢去與之環則還與之玦則絶皆所以見意人主仁心設焉知其役也禮其盡也故王者先仁而後禮天施然也其役用則在知盡善則人之根本所施設在人也此明為國以仁為先也在禮天施天道之所施設聘禮志曰幣厚則傷德財侈則殄禮禮云禮云玉帛云乎哉記志記曰不以美没之也也言玉帛禮之未也禮詩曰物其指矣唯其偕矣不時冝不敬交不驩欣雖指非禮也魚麗之詩小雅冝謂合冝此明聘好輕財重禮之義也篇指與㫖同美也偕齊等也時謂得時水行者表深使人無陷治民者表亂使人無失禮者其表也先王以禮表天下之亂今廢禮者是去表也故民迷惑而陷禍患此刑罰之所以繁也國當以禮示人也表標志也此明為舜曰維予從欲而治欲而治引之以喻禮能成聖亦猶舜賴臯陶也虞書舜美臯陶之辭言臯陶明五刑故舜得從故禮之生為賢人以下至庶民也非為成聖也然而亦所以成聖也不學不成中人設禮本為亦不成也然聖人不學堯學於君疇舜學於務成昭禹學於西王國說家有務成子十一篇昭其名也尸子曰務君疇漢書古今人表作尹夀又漢藝文志小下之順從天下之逆天下不足失也西王國未詳所說或曰大成昭之教舜曰避天下之逆從天下之順天下不足取也避天學于大填顓頊學于録圖帝嚳學于赤松子堯學于尹夀舜學禹生於西羌西王國西羌之賢人也新序子夏對哀公曰黄帝于時子思武王學于郭叔此明聖人亦資於教也于務成跗禹學于西王國湯學于成子伯文王學五十不成䘮七十唯衰存縗庥而已其禮皆可略也禮曰七不成䘮不備哭踊之節衰存但服在身也十唯衰麻親迎之禮父南郷而立子北面而跪醮而命之徃迎爾相成我宗事也宗事宗鄭云相助事廟之隆率以敬先妣之嗣若則有常作朂儀禮嗣也汝之行則當有常深戒之詩曰大姒嗣徽音率鄭云朂勉也若汝也勉率婦道以敬其為先妣之子曰諾唯恐不能敢忘命矣嗣先妣不敢忘父命也子言唯恐不能勉率以夫行也者行禮之謂也者在禮也所以稱行禮也者貴者敬焉老者孝焉長者弟焉幼者慈焉賤者惠焉五者則可為人之行也惠亦賜也言行禮如此賜予其宫室猶用慶賞於國家也忿怒其臣妾猶用刑罰於萬民也治家則以治國也宫室妻子也此明能君子之於子愛之而勿面使之而勿貌導之以道而勿彊人曰有嚴君焉勿彊不欲使其愧也此語出曾子面貌謂以顔色慰恱之不欲施小惠也故易家禮以順人心為本故亡於禮經而順人心者背禮者也恊則禮雖先王未之有可以義起也禮記曰禮也者義之實也恊諸義而禮之大凡事生飾驩也送死飾哀也軍旅飾威也可不為之飾太質故親親故故庸庸勞勞仁之殺也庸庸勞庸功也差等也皆仁恩之差也殺所介反勞謂稱其功勞以報有功勞者殺貴貴尊尊賢賢老老長長義之倫也恩皆出於義之理也倫理也此五者非仁行之得其節禮之序也則是禮有次序行仁義得其節仁愛也故親義理也故行禮節也故成雖有仁義無禮以節非仁不親非義不行不成之亦仁有里義有門以安居門所以出入也里與門皆謂禮也里所仁非其里而虚之非禮也義非其門而由之非義也非其門皆謂有仁義而無禮也虛讀為居聲之誤也仁非其里義推恩而不理不成仁謂若有父子之恩而無嚴敬之義也仁雖在推恩而不得其理則不成仁遂理而不敢不成義在果斷故曰非知之艱行之惟艱雖得其理而不敢行則不成義義審節而不知不成禮知其意也知或為和雖能明審節制而不和而不發不成樂外無以播八音則不成樂雖和順積中而英華不發於故曰仁義禮樂其致一也得中故曰其致一也言四者雖殊同歸於君子處仁以義然後仁也能斷仁而行義以禮然後義也禮然後為義也雖能斷而不違制禮反本成末然後禮也也本反復義為本終成於禮節也謂仁義末謂禮節謂以仁三者皆通然後道也三者通明為道然後貨財曰賻輿馬曰賵衣服曰禭玩好曰贈玉貝曰唅瑟笙竽之屬何休曰此皆春秋之制也此與公羊穀梁之說同玩好謂明器琴是助死者之禮也知生則賵賻知死則禭唅之也賻猶覆也賵猶助也皆助生送死之禮禭猶遺也遺賻賵所以佐生也贈禭所以送死也送死不及柩尸弔生不及悲哀非禮也葬事皆謂故吉行五十犇喪百里賵贈及事禮之大也贈及事既說弔奔喪曰日行百里不以夜行因明奔喪亦宜行逺也禮記禮者政之輓也車然如輓為政不以禮政不行矣天子即位上卿進曰如之何憂之長也能除患則為福不能除患則為賊授天子一策書於策讀之而授天子深上卿於周若冢宰也皆謂下除患則百福歸之不能則反為賊害策編竹為之後易之戒之也言天下安危所繋其憂甚逺長問何以治之能為天爲也以玉中卿進曰配天而有下土者先事慮事先患慮患先事慮事謂之接中卿若宗伯也接讀爲捷速也接則事優成先患慮患謂之豫豫則禍不生事至而後慮者謂之後後則事不舉患至而後慮者謂之困困則禍不可禦授天子二策第二策也禦禁二䇿下卿進曰敬戒無怠慶者在堂弔者在閭在門言相襲之速閭門之外也下卿若司寇也慶者雖在堂弔者已禍與福鄰莫知其門賈誼曰憂喜聚門言同一門出入也豫哉豫哉萬民望之授天子三策也三策第三策豫哉言可戒備禹見耕者耦立而式過十室之邑必下耕曰耦兩人共室之邑必有忠信故下之也論語曰長沮桀溺耦而耕十殺大蚤朝大晩非禮也小綏大夫殺則止佐車蚤謂下先上也又曰朝辨色始入殺謂田獵禽獸也禮記曰天子殺則下大綏諸侯殺則下後虞人入澤犲祭獸然後田獵先於此為早也又曰田不以禮殺太蚤爲陵犯也朝大晩為懈㢮也或曰禮記曰獺祭魚然物也是暴天治民不以禮動斯陷矣平衡曰拜下衡曰稽首至地曰稽顙衡之平禮記平衡與此平衡謂磬折頭與腰如殊義大夫之臣拜不稽首非尊家臣也所以辟君也為避辟讀一命齒於郷再命齒於族三命族人雖七十不敢先二命卿也鄭注禮記曰此一命公侯之士再命大夫雖七十者不敢先言不唯不與少者齒老者亦不敢先也皆郷飲酒時齒謂以年次坐若立也禮記曰三命不齒族人上大夫中大夫下大夫公侯之士子男之大夫也故曰此覆一命再命三命也一命雖夫也下大吉事尚尊喪事尚親親者為主禮記曰以服之吉事朝廷列位也喪事以序也精麤爲君臣不得不尊父子不得不親兄弟不得不順夫婦不得不驩少者以長老者以養之禮法驩與歡同不得謂不得聖人故天地生之聖人成之聘問也享獻也私覿私見也所以相問也聘享奉使大夫出以圭璋聘聘享以賔禮見私覿以臣禮見故曰私見鄭注儀禮云享獻也束帛加璧享所以有獻也享畢賔奉束錦以請覿所以私見也以厚恩意也既聘又獻所言語之美穆穆皇皇皇皇正也郭璞云爾雅曰穆穆敬也儀脩飾或曰穆穆美也皇皇有光儀也詩曰皇皇者華皇皇正脩正貌穆容儀謹敬也皆由言語之美所以威朝廷之美濟濟鎗鎗貌蹌蹌有行列貌鎗與蹌同濟濟多士為人臣下者有諫而無訕有亡而無疾有怨而無怒公弟叔肸衛疾之弟鱄怒謂若慶鄭也謗上曰訕亡去也疾與嫉同惡也怨謂若君於大夫三問其疾三臨其䘮於士一問一臨諸侯非問疾弔䘮不之臣之家弔䘮而入諸臣之家是謂君之徃也禮記曰諸侯非問疾謔也臣為既葬君若父之友食之則食矣不辟粱肉有酒醴則辭美變於顔色亦不可也鄭云尊者之前可以食寢不踰廟設衣不踰祭服禮也麤設宴也謂制度精易之咸見夫婦男兊為少女故曰見夫婦易咸卦艮下兊上艮為少夫婦之道不可不正也君臣父子之本也然後有男女有男易說卦曰有天地有父子然後有君臣故以夫婦為本女然後有夫婦有夫婦然後有父子咸感也以髙下下以男下女柔上而剛下後相成也陽唱隂和然聘士之義親迎之道重始也重其禮也迎魚敬反聘士謂若安車束帛禮者人之所履也失所履必㒹蹷陷溺所失微而其為亂大者禮也禮之於正國家也如權衡之於輕重也如繩墨之於曲直也故人無禮不生事無禮不成國家無禮不寧和樂之聲聲和樂人心此言珩珮之步中武象趨中韶護必珮玉右徵角左宫羽趨以采薺行以肆夏是其類也珮玉之聲緩則中武象速則中韶護禮記曰古之君子鸞之聲步驟之節也或曰此和樂謂在車和君子聽律習容而后士在位君子中音律也言威儀如此乃可為士士者修立之名也者之通稱禮記曰既服習容觀玉聲聽律謂聽珮聲使霜降逆女冰冸殺内十日一御逆女霜降殺内故詩此蓋誤耳當為冰冸之義氷泮逆女謂發生之時合男女也霜降殺内謂閉藏之時禁曰士如歸妻迨冰未冸殺減也内謂妾御也十日一御即殺内云歸妻謂請期也冰未泮正月中以前二月可以成婚禮故此嗜慾也月令在十一月此云霜降荀卿與吕氏所傳聞異也鄭殺所介反云冰冸逆女坐視膝立視足應對言語視面士相儀禮則視足坐則視膝鄭云不言則伺其行起而已見云子視父則遊目無上於面無下於帶若不言立視前六尺而大之六六三十六三丈六尺視六尺自此而廣之蓋臣於君前視也近視五巂彼在車上故與此不同也雖逺視不過三丈六尺曲禮曰立文貌情用相為内外表裏謂語言質文相成不可偏用也文謂禮物貌謂威儀情謂中誠用禮之中焉能思索謂之能慮禮者本末相順終始相應禮者以財物為用以貴賤為文以多少為異禮論篇並解於下臣事君以貨中臣事君以身上臣事君以人謂死衛社稷人謂舉賢也貨謂聚斂及珍異獻君身易曰復自道何其咎小易雖有失返而從道何其咎過也畜卦初九之辭復返也自從也本春秋賢穆公以為能變也無大夫此何以書賢穆公也何賢乎穆公以為公羊傳曰秦伯使遂來聘遂者何秦大夫也秦殽函而自變悔作秦誓詢兹黄髮是也能變也謂前不用蹇叔百里之言敗於士有妒友則賢交不親君有妒臣則賢人不至蔽公者謂之昧隱良者謂之妒謂之暗昧掩蔽公道奉妒昧者謂之交譎人相成為惡也交通於譎詐之交譎之人妒昧之臣國之薉孽也終為國之災害也薉與穢同孽祅孽言口能言之身能行之國寶也口不能言身能行之國器也言而有行也如器物雖不口能言之身不能行國用也而用也國賴其言口言善身行惡國祅也治國者敬其寶愛其器任其用除其祅不富無以養民情知榮辱衣食足不教無以理民性故須教人性惡故家五畒宅百畒田務其業而勿奪其時所以富之也五畒之宅樹之以桑五十者可以衣帛矣百畒宅居處也百畒一夫田也務謂勸勉之孟子曰之家可以無飢矣之田無失其時八口立太學設庠序脩六禮明十教所以道之也詩曰飲之食之教之誨之王事具矣也禮記曰父慈子孝兄良弟悌夫義婦聽長禮記曰六禮冠昏䘮祭郷相見十教即十義義道謂教導之也十或為七也惠幼順君仁臣忠十者謂之人武王始入殷表商容之閭式箕子之囚哭比干之墓天下郷善矣安國曰商容殷之賢人紂所貶退也表築旌之言武王好善天下郷之孔天下國有儍士世有賢人士每世皆有賢人天下之國皆有儍迷者不問路溺者不問遂亡人好獨所以迷由於不問路溺由以喻雖有賢儍不能用也水中可涉之徑也獨謂自用其計於不問遂亡由於好獨遂謂經隧詩曰我言維服勿用為笑先民有言詢于芻蕘言博問也雅板詩大我之所言乃今之急事汝無笑也之篇毛云芻蕘薪者也鄭云服事也有法者以法行無法者以類舉而舉之也皆類於法以其本知其末以其左知其右凡百事異理而相守也異其守其事雖同歸於理之類也則一謂若為善不同慶賞刑罰通類而後應於類通明功罰必罰罪不失其類也然後百姓應之謂賞必賞致教習俗相順而後行後可行也順人心然八十者一子不事九十者舉家不事廢疾非人不養者一人不事父母之䘮三年不事齊衰大功三月不事從諸侯不來或君之人入菜地不當為來謂從他國與新有昏朞不事䘮昏皆古者有與嗣續也事謂力役不事所以重其哀戚子謂子家駒續然大夫不如晏子父之後名覊駒其字也續然補續君之過不能子孔子謂言也子家駒魯公子慶之孫公孫歸如晏子也興功用故不晏子功用之臣也不如子産用不如雖有功恩惠也子産之子産惠人也不如管仲管仲之才略也雖有恩惠不如管仲之為人力功不力義力智不力仁合諸雖九不全用仁義也侯一匡天下而野人也不可以為天子大夫子皆言四仁義故不可為王者佐類郊野之人未浸漬於孟子三見宣王不言事門人曰曷為三遇齊王而不言事孟子曰我先攻其邪心心乃可與言也以正色攻去邪公行子之之燕岐云齊大夫也子之蓋其先也孟子曰行子有子之䘮右師徃弔趙遇曾元於塗曰燕君何如曾元曰志卑曾元曾參之子言不求逺大也志卑者輕物事物輕物者不求助以自輔不求賢苟不求助何能舉不勝任矣既無輔助必氐羗之虜也俘掠謂見不憂其係壘也而憂其不焚也死則焚其屍今不憂壘讀為纍氐羗之俗氏春秋曰憂其死而不焚虜獲而憂不焚是愚也吕利夫秋豪害靡國家然且為之幾為知計哉害遂披靡而來及於國家言靡披靡也利夫秋豪之細其虜何異幾辭也或曰幾讀為豈不䘏其大而憂其小與氐羗之今夫亡箴者終日求之而不得其得之非目益明也眸而見之也心之於慮亦然亦當反覆盡其精妙如眸子之求眸謂以眸審視之也言心於思慮也箴義與利者人之所兩有也雖堯舜不能去民之欲利然而能使其欲利不克其好義也勝也克亦雖桀紂亦不能去民之好義然而能使其好義不勝其欲利也故義勝利者為治世利克義者為亂世上重義則義克利上重利則利克義故天子不言多少諸侯不言利害大夫不言得䘮貨財也皆謂言士不通貨財得貿遷如商賈也士賤雖得言之亦不有國之君不息牛羊育也息蕃錯質之臣不息鷄豚子曰出疆必載質蓋錯置也質讀為贄孟於君再拜稽首禮記曰畜乗馬者不察於鷄豚或曰置質猶古字通耳置贄謂執贄而置於君士相見禮曰士大夫奠贄人臣則不得與下爭利言委質也言凡委質爲冢卿不脩幣大夫不為場園曰場樹菜𬞞曰園謂若公儀子不奪園夫工女之冢卿上卿不脩幣謂不脩財幣販息之也治稼穡也利從士以上皆羞利而不與民爭業樂分施而恥積臧然故民不困財貧窶者有所竄其手其手而力作也竄容也謂容集文王誅四武王誅二周公卒業至成康則案無誅已篇言周公終並解在仲尼重引此者以明不與民爭利則刑罰省也王業猶不得無誅伐至成康然後刑措也多積財而羞無有貧羞重民任而誅不能任而復誅之使民不能勝此邪行之所以起刑罰之所以多也上好羞則民闇飾矣則民闇自脩飾也好羞貧而事奢侈上好富則民死利矣二者亂之衢也道衢民語曰欲富乎忍恥矣傾絶矣絶故舊矣與義分背矣顧廉恥忍恥不也分背如人分背而行傾絶謂傾身絶命而求上好富則人民之行如此安得不亂湯旱而禱曰政不節與使民疾與何以不雨至斯極也苦疾宫室榮與婦謁盛與何以不雨至斯極也謁盛謂婦言是榮盛謁請也婦也用苞苴行與讒夫興與何以不雨至斯極也注禮記云苞苴裹魚肉者或以葦或以茅也貨賄必以物苞褁故緫謂之苞苴興起也鄭天之生民非為君也天之立君以為民也故古者列地建國非以貴諸侯而已列官職差禄爵非以尊大夫而已等級也差謂制主道知人臣道知事事謂職守人謂賢良故舜之治天下不以事詔而萬物成使禹治水不告治水之方略不以事詔告但委任而已謂若農六博也王逸注楚詞云投六箸行六棊故曰六博今之博局可以得貨財先王之道可以為堯舜故以喻焉六貳之博則相對也亦二六君子之學如蛻幡然遷之幡與翻同如蟬蛻也故其行效其立效其坐效其置顔色出辭氣效造次皆學而不捨也效放也置措也言無留善無留滯有善即行無宿問不俟經宿當時即問善學者盡其理善行者䆒其難善行之者是究其難非知之難行之惟艱故君子立志如窮通變似不能雖天子三公問正以是非對唯一故曰如窮至尊至貴對之也君子隘窮而不失而隕穫不失道勞倦而不苟苟不也免臨患難而不忘細席之言漸於飢寒而志不尸子子夏曰君子昔所踐履之言此細亦當讀為昔或曰細席講論之席僻銙於五兵而辭不懾臨大事不忘昔席之言昔席蓋王吉諫昌邑王曰廣厦之下細旃之上臨難不忘素所講習忠義之言漢書歲不寒無以知松栢事不難無以知君子無日不在是一日無有次必於是也不懐道所謂造雨小漢故濳李廵曰漢水溢流為潛今未詳或曰爾雅云漢為潛成至其盛也乃溢為濳矣言自小至大者也云雨小漢故濳言漢者本因雨小水濫觴而人盡小者大積微者著德至者色澤洽行盡而聲聞逺身行下孟反色澤洽謂德潤小人不誠於内而求之於外言而不稱師謂之畔之半也畔者倍教而不稱師謂之倍之倍倍者反逆之名也教人不稱師其罪重故謂倍畔之人明君不内朝士大夫遇諸塗不與言不足於行者説過行不能副也言説太過故不足於信者誠言言故信不能數欲誠實其行不貴言也副君子所以貴故春秋善胥命而詩非屢盟其心一也傳曰相命也何言乎相命近正也古者不盟春秋魯桓公三年齊侯衞侯胥命于蒲公羊長言其一心而相信則不在盟誓也結言而退又詩曰君子屢盟亂是用善為詩者不説善為易者不占善為禮者不相其心同也言皆者也相謂爲人賛相也與理㝠㑹者至於無言説曾子曰孝子言為可聞行為可見使人可見不苟為斯為孝子也發言使人可聞不詐妄也立行言為可聞所以說逺也行為可見所以說近也近者說則親逺者說則附親近而附逺孝子之道也則毁辱無由及親也說皆讀為恱近親逺附曾子行晏子從於郊曰嬰聞之君子贈人以言庶人贈人以財嬰貧無財請假於君子贈吾子以言君子假於子弟子此云送曾子豈好事者為之歟謙辭也晏子先於孔子曾子之父猶孔乗輿之輪太山之木也示諸檃栝三月五月為幬菜敝而不反其常木之器也言寘諸檃栝或三月或五月此皆言車之才也示讀為寘檃栝矯煣至於轂輻皆敝而䂓曲不反其初所謂三材不失職也周禮也幬菜未詳或曰菜讀為菑謂轂與輻也言矯煣直木為牙冒轂之革也革急則木廉隅見考工記又曰察其菑蚤不齵則考工記曰望其轂欲其眼也進而視之欲其幬之廉也鄭云幬也匡刺也晏子春秋曰今夫車輪山之直木良匠煣之其貟中輪雖敝不匡鄭云菑謂輻入轂中者蚤讀為爪謂輻入牙中者不復羸矣䂓雖有槁暴君子之檃栝不可不謹也愼之故不可慢為移其性蘭茞槀本漸於蜜醴一佩易之而加貴也佩或為倍謂其一倍也漸浸也子廉反此語與晏雖皆香草然以浸於甘醴一玉珮方可易買之言所漸者美不同也子春秋正君漸於香酒可讒而得也君其所漸雖正直之甘言變正君之性或為美或為惡皆在其所漸染也染如香之於酒則讒邪可得而入言甘醴變香草之性君子之所漸不可不愼也人之於文學也猶玉之於琢磨也詩曰如切如瑳如琢如磨謂學問也和之璧井里之厥也玉人琢之為天子寶未詳或曰厥石也晏子春秋作井里之困也和之璧楚人卞和所得之璧也井里里名厥也子贛季路故鄙人也被文學服禮義為天下列士學問不厭好士不倦是天府也得多言所君子疑則不言未問則不立道逺日益矣久逺自日有所益不必道聽塗説也此語出曾子未曾學問不敢立為論議所謂不知為不知也為道多知而無親博學而無方好多而無定者君子不與皆謂雖廣博而無師法也無親不親師也方法也此少不諷壯不論議雖可未成也學雖有善質未為成人也諷謂就學諷詩書也言不君子壹教弟子壹學亟成急也已力反壹專壹也亟君子進則能益上之譽而損下之憂損减進仕不能而居之誣也無益而厚受之竊也竊位誣君學者非必為仕而仕者必如學徃如子貢問於孔子曰賜倦於學矣願息事君息息休孔子曰詩云温恭朝夕執事有恪事君難事君焉可息哉那之篇詩商頌然則賜願息事親孔子曰詩云孝子不匱永錫爾類事親難事親焉可息哉篇毛云匱竭也詩大雅既醉之竭之時故天長賜以善也類善也言孝子之養無有匱然則賜願息於妻子孔子曰詩云刑于寡妻至于兄弟以御于家邦妻子難妻子焉可息哉刑法也寡有之妻詩大雅思齊之篇至于兄弟然後治于家邦言自家刑國也言賢也御治也言文王先立禮法於其妻以然則賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友難朋友焉可息哉相攝佐者以威儀也亦既醉之篇毛云言然則賜願息耕孔子曰詩云晝爾于茅宵爾索綯亟其乗屋其始播百榖耕難耕焉可息哉絞也亟急也乗屋升屋治其敝漏也詩豳風七月之篇于茅徃取茅也綯然則賜無息者乎孔子曰望其壙臯如也嵮如也鬲如也此則知所息矣冢也宰如髙貌嵮與壙丘壠臯當為宰宰如張湛注云見其墳壤鬲異則知息之有所之也塡同謂土塡塞也鬲謂隔絶於上列子作宰如墳子貢曰大哉死乎君子息焉小人休焉國風之好色也傳曰盈其欲而不愆其止得淑女也盈其好色謂關雎樂言好色人所不免美其不過禮也故詩序云關雎樂得淑女以欲謂好仇寤寐思服也止禮也欲雖盈滿而不敢過禮求之此賢才而無傷善之心焉是關雎之義也配君子憂在進賢不淫其色哀窈窕思其誠可比於金石其聲可内於宗廟石言不變也其聲可内於宗廟其誠以禮自防之誠也比於金覃詩云關雎后妃之德風之始也所以風化天下故用之郷謂以其樂章播八音奏於宗廟郷飲酒禮合樂周南關雎葛國是其聲可内於宗廟者也人焉用之邦國焉既云用之邦小雅不以於汙上自引而居下人不為驕君所用自引而䟽逺也以用也汙上驕君也言作小雅之疾今之政以思徃者其言有文焉其聲有哀焉多刺小雅鄙陋聲有哀謂哀以思也幽厲而思文武言有文謂不國將興必貴師而重傅貴師而重傅則法度存國將衰必賤師而輕傅賤師而輕傅則人有快肆意人有人有快則法度壞古者匹夫五十而士十而後爵此云禮四十而仕五或曰為卿士五十而士恐誤天子諸侯子十九而冠冠而聽治其教至也年長而冠冠而後聽其政治以明敎至然十九而冠先於臣下一年也雖人君之子猶敢輕易後治事不君子也者而好之其人所好得其人謂有君子之質而師也得賢其人也而不教不祥善祥非君子而好之非其人也所好非其人也既無君子之質又非其人而教之齎盜糧借賊兵也借盗賊之兵糧為害滋甚不如若使不善人教非君子是猶資同兵五兵也不敎也齎與資不自嗛其行者言濫過行不足也嗛足也謂於言辭汎濫過度也所以不足其行者由古之賢人賤為布衣貧為匹夫食則饘粥不足衣則竪褐不完然而非禮不進非義不受安取此短褐也言賢人雖竪褐僮竪之褐亦言過而行不副之事乎貧窮義不苟進安取此子夏貧衣若縣鶉人曰子何不仕曰諸侯之驕我者吾不為臣大夫之驕我者吾不復見柳下惠與後門者同衣而不見疑非一日之聞也公子展之後柳下惠魯人門至賤者子夏言昔柳下惠衣之弊惡與後門者同時人名獲字禽居於柳下諡惠季其伯仲也後門者君子守後不知也非一日之聞言聞之乆矣尚無疑怪者言安於貧賤渾跡而人爭利如蚤甲而䘮其掌縱得小利終䘮其身矣蚤與爪同言仕亂世驕君君人者不可以不愼取臣匹夫不可以不愼取友友者所以相有也有謂不使䘮亡友與有同義相道不同何以相有也均薪施火火就燥平地注水水流溼夫類之相從也如此之箸也以友觀人焉所疑人之善惡不疑也察其友則可以知取友善人不可不愼是德之基也德之基本言所以成德也取友求善人不可不愼是詩曰無將大車維塵冥冥言無與小人處也車之篇將猶扶詩小雅無將大目明令無所見與小人處亦然也進也將車賤者之事塵冥冥蔽人藍苴路作似知而非曰姐者類智而非智或曰讀為爼伺也姐子野反未詳其義或曰苴讀為姐慢也趙蕤長短經知人篇偄弱易奪似仁而非者似之易奪無執守之謂也仁者不爭而與物故偄弱易奪悍戇好鬬似勇而非愚也丁絳反悍兇戻也戇仁義禮善之於人也辟之若貨財粟米之於家也多有之者富少有之者貧至無有者窮故大者不能小者不為是弃國捐身之道也凡物有乗而來乗其出者是其反者也出去也反復也反還反也言善惡皆所自取也凢乗勢而來乗勢而去者皆是物流言滅之貨色逺之所由生也生自纎纎也是故君子蚤絶之生自纎纎微細故君子早絶其萌此語亦出曾子流言謂流轉之言不定者也滅亦絶也凡禍之所由言之信者在乎區蓋之間者凡言之可信者如物區藏物處蓋所以覆物儒林傳唐生褚生應博士弟子選試誦説有法疑者丘蓋不在器皿之間言有分限不流溢也器名區者與丘同義漢書區同也言丘與疑則不言未問則不立句以明之重引此兩知者明於事達於數不可以不誠事也不可以虛誠忠誠言智者妄事故曰君子難說說之不以道不說也音並恱語曰流丸止於甌臾流言止於知者皆瓦甌臾拗坎如甌臾者也或曰甌臾窳下之地史記曰甌窶滿溝汚器也揚子雲方言云陳魏楚宋之間謂罃為臾甌臾謂地之邪與臾聲相近蓋同也窶力侯反汚烏瓜反邪滿車裴駰云甌窶傾側之地汚邪下地也此家言邪學之所以惡儒者也家之言若宋墨者家言謂偏見自成一是非疑則度之以逺事驗之以近物參之以平心流言止焉惡言死焉鄭康成云死之言澌澌猶消盡參驗之至則流言息死猶盡也也曾子食魚有餘曰泔之門人曰泔之傷人不若奥之之名未詳其說泔與奥皆烹和曾子泣涕曰有異心乎哉傷其聞之晩也人故泣涕深自引過謝門人曾子自傷不知以食餘之傷者以譏時人飾非自是恥言不知與曾子異也曰吾豈有異心故欲傷人哉乃所不知也言此無用吾之所短遇人之所長其分不可彊欲當人所長而辨爭遇當也言已才藝有所短宜自審也故塞而避所短移而從所仕䟽知而不法察辨而操辟勇果而亡禮君子之所憎惡也務其所能也䟽通也察辨而操辟謂聦察其辨所塞掩也移就也仕與事同事所能也言掩其不善也操七刀反操之事邪僻多言而類聖人也皆謂當其類而應萬變故多類聖人也無乖越此少言而法君子也多少無法而流喆然雖辨小人也語此當同或曰當為楛也喆當為湎非十二子篇有此國法禁拾遺惡民之串以無分得也工患反串習也有夫分義則容天下而治無分義則一妻一妾而亂天下之人唯各特意哉然而有所共予也意予讀為與特意謂人人殊言味者予易牙言音者予師曠言治者予三王夫知味者師曠易牙齊桓公宰師知音者晉平公樂三王既已定法度制禮樂而傳之有不用而改自作何以異於變易牙之和更師曠之律無三王之治天下不待亡國不待死速之甚也更工衡反言不暇有所待而死亡飲而不食者蟬也不飲不食者浮蝣也此者以喻人既飲且食必須浮蝣渠略朝生夕死蟲也言得苟且如浮蝣輩也求先王法略為治不虞舜孝己孝而親不愛比干子胥忠而君不用仲尼顔淵知而窮於世劫迫於暴國而無所辟之者不遇時危行辟讀為避言賢遜言則崇其善揚其美言其所長而不稱其所短也惟惟而亡者誹也唯聽從貌常聽從人惟讀為唯以癸反唯退後即誹謗也而不免亡者由於博而窮者訾也清之而俞濁者口也榮辱篇已解於君子能為可貴不能使人必貴已能為可用不能使人必用已已所遇脩德在命在誥誓不及五帝約信曰誓又曰殷人作誓而民誥誓以言辭相誡約也禮記曰畔始盟詛不及三王血告神以盟約也涖牲曰盟謂殺牲歃交質子不及五伯能固也伯讀曰霸榖梁傳亦有此語此言後世德義不足雖要約轉深猶不荀子卷第十九
