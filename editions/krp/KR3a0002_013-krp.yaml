body:
  text: 登仕郎守大理評事揚倞注禮論篇第十九在論議之中於文爲比舊目録第二十三今升禮起於何也曰人生而有欲欲而不得則不能無求求而無度量分界則不能不爭問反分扶爭則亂亂則窮無所出窮謂計先王惡其亂也故制禮義以分之以養人之欲給人之求然後有分求可給欲可養使欲必不窮乎物物必不屈於欲兩者相持而長是禮之所以起也之立中道故爲屈竭也先王爲持故能長久是禮所起之本意也不盡於物物不竭於欲欲與物相扶故禮者養也芻豢稻粱五味調香所以養口也椒蘭芬芳所以養鼻也彫琢刻鏤黼黻文章所以養目也鍾鼓管磬琴瑟竽笙所以養耳也䟽房檖䫉越席牀第几筵所以養體也䟽房通䟽通也宮室尊嚴之名或曰貌讀爲邈言屋宇深䆳𬗟邈也第牀棧明之房也䫉古貌字檖䫉未詳或曰檖讀爲䆳貌廟也廟者所重司馬貞曰疏䆫也也越席剪蒲席也古人故禮者養也君子既得其養又好其别曷謂别曰貴賤有等長㓜有差貧富輕重皆有稱者也宜尺證反稱謂各當其故天子大路越席所以養體也側載睪芷所以養鼻也前有錯衡所以養目也和鸞之聲歩中武象趨中韶護所以養耳也正論篇並解在龍旗九斿所以養信也龍於縿練斿九旗正幅爲絲龍旗畫龍於旗爾雅曰素升見而信之識至尊也養猶奉也斿所以屬之者也信謂使萬人寢兕於甲胄也謂武士寢處持虎暢鏤膺劉氏云畫虎於旍竿及楯等也謂以虎皮爲弓衣武士執持者也詩曰虎蛟韅腋之韅馬曰以鮫魚皮爲之革蓋象蛟形徐廣絲末鄭云覆苓也絲簚蓋織絲爲之末與簚同禮記曰君羔簚虎犆狄反簚亡彌龍所以養威也謂金飾衡軛之末爲龍首彌如字又讀爲弭弭末也爲輿倚較交虎伏軾龍首銜軛也徐廣曰乗輿車以金薄繆龍故大路之馬必倍至敎順然後乗之所以養安也精至也或以倍至謂倍加識車也至極敎順然後乗之備驚奔也必倍爲句倍謂反之車在馬前令馬孰孰知夫出死要節之所以養生也自要約以節義謂立節也使孰便孰甚也出死出身死冦難也要節生也若不能然則亂而不保其生也要一遙反甚知其出死要節盡忠於君是乃所以受禄養孰知夫出費用之所以養財也屬是乃所以求奉養其財費用財以成禮謂問遺之奪也不相侵孰知夫恭敬辭讓之所以養安也恭無而不安也敬辭讓則亂孰知夫禮義文理之所以養情也情性不知所歸也無禮義文理則縱故人苟生之爲見若者必死出死要節若此者必死也言苟唯以生爲所見不能苟利之爲見若者必害以成禮若此者必遇害也苟唯以利爲所見不能用財苟怠惰偷懦之爲安居若者必危不能恭敬辭讓若此者必危也懦讀爲儒言苟以怠惰爲安居苟情說之爲樂若者必滅不知禮義文理恣其所欲若說讀爲恱言苟以情恱爲樂滅亡也此者必故人一之於禮義則兩得之矣一之於情性則兩喪之矣兩得專一於情性則禮義專一於禮義則禮義情性喪也情性兩故儒者將使人兩得之者也墨者將使人兩喪之者也是儒墨之分也禮有三本天地者生之本也先祖者類之本也種類君師者治之本也無天地惡生無先祖惡出無君師惡治三者偏亡焉無安人闕一也偏亡謂故禮上事天下事地尊先祖而隆君師是禮之三本也其三本所以奉故王者天太祖祖若周之后稷謂以配天也太諸侯不敢壞史記作不敢懷司馬貞謂不祧其廟若魯周公蓋誤耳云思也大夫士有常宗百世不遷之大宗也别子若繼别子之後爲族人所常宗桓也魯三所以别貴始貴始得之本也言德之本得當爲徳傳有此語在貴始穀梁郊止乎天子而社止於諸侯道及士大夫神也祭法大夫適士皆得祭門及行史記道作道通也言社自諸侯通及士大夫也或曰道行立社倞謂當是道誤爲蹈傳寫又誤以蹈爲㗖耳蹈亦作㗖司馬貞曰㗖音含苞也言士大夫皆得苞所以别尊者事尊卑者事卑宜大者巨宜小者小也故有天下者事十世傳作天子七廟十當爲七穀梁有一國者事五世有五乗之地者事三世里爲成古者十大夫有菜地者得立三廟也成出革車一乗五乗之地謂有三乗之地者事二世士立二廟也祭法所謂適持手而食者不得立祭廟其持工食力也手而食謂農所以別積厚積厚者流澤廣積薄者流澤狹也年震夷伯之廟夷伯魯大夫因此以積與績同功業也穀梁傳僖公十五二故德厚者流光德薄者流卑是以貴始徳之本也見天子至于士皆有廟也天子七廟諸侯五大夫三士大饗尚玄尊俎生魚先大羹貴食飲之本也饗大味者也本謂造飲食之初禮記曰郊血大饗腥也祫祭先王也尚上也玄酒水也大羮肉汁無鹽梅之饗尚玄尊而用酒醴先黍稷而飯稻梁同四時饗與享以酒醴先陳黍稷而後飯以稻梁也享廟也用謂酌獻也以玄酒爲上而獻祭齊大羮而飽庶羞貴本而親用也齒也謂尸舉大羮但至祭月祭也齊讀爲嚌至飽也用謂可用食也齒而已矣至庶羞而致貴本之謂文親用之謂理理謂合宜文謂脩飾兩者合而成文以歸大一夫是之謂大隆太太一謂太古時也禮記曰夫禮必本於太貴本親用兩者相合然後備成文理大讀爲禮司馬貞曰隆盛也得禮文理歸於太一是禮之盛也一言雖備成文理然猶不忘本而歸於太一是謂大隆於故尊之尚玄酒也俎之尚生魚也豆之先大羹也一也時皆貴本之義故云一也一謂一於古也此以象太古利爵之不醮也成事之俎不甞也三臭之不食也一也前也史記作不啐成事謂尸既飽禮成不甞其爼儀禮醮盡也謂祭祀畢告利成利成之時其爵不卒奠子筵氣謂食畢也許又反皆謂禮畢無文飾復歸於朴亦象尸又三飯上佐食受尸牢肺正脊加于肵是臭謂歆其以勸尸食至三飯而止每飯有侑一人故曰三侑既是太古時也史記作三侑之不食司馬貞云禮祭必立侑自食也勸尸故不昏之未發齊也太廟之未入尸也始卒之未小斂也一也太古時也史記作大昏皆謂未有威儀節文象曲禮云齊戒以告鬼神此三者皆禮之初始質而未備之未廢齊也司馬貞曰廢齊謂㛰禮父親醮子而迎故一也故云大路之素未集也郊之麻絻也喪服之先散麻也一也丹漆也禮記云大路素而越席又曰丹大路殷祭天車王者所乗也未集不集衮龍之屬也士喪禮始死主人散帶垂長三尺史記作大路漆彫幾之美素車之乗麻絻績麻爲冕所謂大裘而冕不用謂車蓋素帷赤質者也之素幬司馬貞曰幬音稠三年之喪哭之不文也淸廟之歌一倡而三歎也縣一鍾尚拊之膈朱絃而通越也一也衰之哭若往而不反淸廟之不文謂無曲折也禮記曰斬鍾比於編鍾爲簡略也尚拊之膈未詳或曰尚謂上古也拊樂器歌謂工以樂歌淸廟之篇也一人倡三人歎言和之者寡也縣一揚子雲長楊賦曰拮膈鳴球韋昭曰古文膈爲擊或曰膈當爲名膈擊也即所謂戞擊鳴球搏拊琴瑟也尚古樂所以示質也義書曰搏拊琴瑟孔安國曰拊以韋爲之實之以糠所以節樂也周特大戴禮作搏拊一名相禮記曰治亂以相拊所以輔樂相亦輔之而拊其格不取其聲示質也朱絃䟽越鄭玄云朱絃練朱絃也練禮大祭祀登歌令奏擊拊司馬貞說拊鬲謂懸鍾格也不擊其鍾越踈通之使聲遲也史記作洞越或曰隔讀爲戞也則聲濁越瑟底孔也畫䟽之所以發越其聲故謂之凡禮始乎稅成乎文終乎恱校禮始於脱略成於文飾終乎稅减史記作始乎脱成乎文終乎稅言大戴禮作終於隆盛也禮記曰禮主其减校未詳故至備情文俱盡爲禮之至備情文俱盡乃之類文謂禮物威儀也情謂禮意喪主哀祭主敬其次情文代勝文勝於情情不能至備或禮之次也勝於文是亦其下復情以歸大一也情以歸質素是雖無文飾但復之水可薦於鬼神也亦禮也若潢汙行潦天地以合日月以明四時以序星辰以行江河以流萬物以昌好惡以節喜怒以當之則天時人事皆亂也昌謂各遂其生也言禮能上調天時下節人情若無禮以分别以爲下則順以爲上則明萬物變而不亂貳之則喪也禮豈不至矣哉順在上位則治萬禮在下位則使人一在禮喪亡也變而不亂貳謂不立隆以爲極而天下莫之能損益也使天下不復更能損益也立隆盛之禮以極盡人情本末相順貞曰司馬復情以歸太一是本末相順也禮之盛文理合以歸太一禮之殺終始相應始於脱略終司馬貞曰禮略是終始相應也於稅亦殺也殺亦脫至文以有別至察以有說禮言司馬貞曰說音悅言禮之至察有以明鴻殺委曲之情文足之至文以其有尊卑貴賤之別至察以其有是非分別之說心也以恱人天下從之者治不從者亂從之者安不從者危從之者存不從者亡小人不能測也禮之理誠深矣堅白同異之察入焉而溺其理誠大矣擅作典制辟陋之說入焉而喪其理誠高矣暴慢恣睢輕俗以爲髙之屬入焉而隊白者溺以其大故能使擅作者喪隊古墜字墮也以其深故能使堅司馬貞曰恣睢毁訾也以其高故能使暴慢者墜故繩墨誠陳矣則不可欺以曲直衡誠縣矣則不可欺以輕重規矩誠設矣則不可欺以方圎君子審於禮則不可欺以詐僞故繩者直之至衡者平之至規矩者方圎之至禮者人道之極也然而不法禮不足禮謂之無方之民法禮足禮謂之有方之士方猶道也足謂無闕失禮之中焉能思索謂之能慮禮之中焉能勿易謂之能固中雖能思索勿易猶無益勿易不變也若不在禮之能慮能固加好者焉斯聖人矣故天者髙之極也地者下之極也無窮者廣之極也北無窮東西南聖人者道之極也故學者固學爲聖人也非特學爲無方之民也禮者以財物爲用爲行禮之用也以貢獻問遺之類以貴賤爲文貴賤文飾也以車服旗章爲以多少爲用以別上下也多少異制所以隆殺爲要或厚或薄唯其所當爲貴也隆豐厚殺減降也要當也禮文理繁情用省是禮之隆也獻之禮賔主百拜情唯主敬文文理謂威儀情用謂忠誠若享之隆盛也過於情是禮文理省情用繁是禮之殺也之尚若尊文雖減殺是亦禮也玄酒本於質素情過於文理情用相爲内外表裏並行而雜是禮之中流也行相雜是禮之中流中或豐或殺情文代勝並淸濁相混也流言如水之故君子上致其隆下盡其殺而中處其中厚小禮則盡其隆殺中用得其中皆不失禮也君子知禮者致極也言君子於大禮則極其隆歩驟馳騁厲鶩不外是矣是君子之壇宇宮廷也出於隆殺之間壇宇宮廷已解於上厲鶩疾鶩也史記作廣鶩言雖馳騁不人有是士君子也外是民也氓無所知者是猶此也民民於是其中焉方皇周挾曲得其次序是聖人也皇方中徘徊周匝委曲皆得其次序而不亂是聖人也讀爲仿偟猶俳徊也挾讀爲浹匝也言於是禮之故厚者禮之積也太者禮之廣也髙者禮之隆也明者禮之盡也也能弘大者由廣禮也崇髙聖人所以能厚重者由積禮子聖人有厚大之徳則爲之所歸積益弘廣也者由隆禮也明察者由盡禮也司馬貞曰言君詩曰禮儀卒度笑語卒獲此之謂也禮動皆合引此明有也冝禮者謹於治生死者也嚴謹生人之始也死人之終也終始俱善人道畢矣故君子敬始而愼終終始如一是君子之道禮義之文也夫厚其生而薄其死是敬其有知而慢其無知也是姦人之道而倍叛之心也君子以倍叛之心接臧榖猶且羞之而況以事其所隆親乎相與牧羊音義云孺子曰穀或曰臧已解在王霸篇莊子曰臧與穀哺乳小兒也所隆親所厚之親也榖讀爲鬭榖於菟之榖榖乳也謂故死之爲道也一而不可得再復也臣之所以致重其君子之所以致重其親於是盡矣臣子於極重之道不以其一死不可再復盡也可不故事生不忠厚不敬文謂之野心篤厚忠厚忠野人不知禮者也敬文恭敬有文飾野送死不忠厚不敬文謂之瘠薄瘠君子賤野而羞瘠故天子棺槨十重諸侯五重大夫三重士再重重水兕革棺被之其禮記云天子之棺四椁以端長六尺又禮器曰天子七月而葬五重八翣鄭云五重厚三寸杝棺一梓棺二四者皆周棺束縮二衡三衽毎束一栢爲十重也諸侯已下與禮記多少不同未詳也謂杭木與茵也今云十重蓋以棺槨與杭木合然後皆有衣衾多少厚薄之數皆有翣菨文章之等以敬飾之比者也衾謂君錦衾大夫縞衾士緇衾也衣謂衣衾禮記所謂君陳衣于庭百稱之棺之牆飾也翣以木爲衣以白布畫爲雲氣如今之攝食謂遣車所苞遣奠也翣菨當爲蔞翣鄭康成云蔞翣飾也柳之言聚也諸飾所聚柳以象宮室也劉熙釋名也周禮縫人衣翣柳之材鄭云必先纏衣其木乃以張黼荒火三列黻三列素錦褚加帷荒纁紐六齊五采五云輿棺之車其蓋曰柳文章之等謂君龍帷三池振容池君纁戴六纁披六大夫已下各有差也具黼翣二黻翣二畫翣二皆戴圭魚躍拂使生死終始若一一足以爲人願是先王之道忠臣孝子之極也足忠孝之極在此也生死如一則人願皆天子之喪動四海屬諸侯諸侯之喪動通國屬大夫大夫之喪動一國屬修士修士之喪動一郷屬朋友之人也修士士之進修者謂上士也一郷謂一郷内之姻族也屬謂付託之使主喪也通國謂通好之國也一國謂同在朝而葬同盟至大夫三月同位至士踰月外姻至春秋傳曰天子七月而葬同軌畢至諸侯五月庶人之喪合族黨動州里刑餘罪人之喪不得合族黨獨屬妻子棺椁三寸衣衾三領不得飾棺不得晝行以昬殣凡縁而往埋之刑之餘刑餘遭寸刑人之棺也喪大記士陳衣于序東三十稱今云三領死也墨子曰桐棺三寸葛以爲緘趙簡子亦云然則厚三昬殣如掩道路之死人惡之甚也凡常也縁因也言其妻亦貶損之甚也殣道死人也詩曰行有死人尚或殣之今絰杖也今猶謂無盛飾爲縁身也子如常日其所服而埋之不更加反無哭泣之節無衰麻之服無親䟽月數之等各反其平各復其始已葬埋若無喪者而止夫是之謂至辱至辱之道奉君父也此蓋論墨子薄葬是以禮者謹於吉凶不相厭者也掩也或曰不使相厭惡非也厭掩也烏甲反謂不使相侵紸纊聽息之時則夫忠臣孝子亦知其閔已屬纊也言此時知紸讀爲注注纊即絓絓古化反以爲黊字非也其必至於憂閔也或曰紸當爲然而殯歛之具未有求也相厭也所謂不垂涕恐懼然而幸生之心未巳持生之事未輟也卒矣然後作具之具之作之故雖備家必踰日然後能殯三日而成服足也備豐然後告遠者出矣備物者作矣故殯久不過七十日速不損五十日三月者也損減也此皆據士喪禮首尾是何也曰遠者可以至矣百求可以得矣百事可以成矣其忠至矣其節大矣其文備矣凡附於身者必誠必信勿之有悔焉耳三月而葬凡附於棺忠誠也節人子之節也文器用儀制也子思曰喪三日而殯之有悔焉耳者必誠必信勿然後月朝卜日月夕卜宅然後葬也大夫之禮也士則筮宅士喪禮先筮宅後卜日此之月月朝月初也月夕月末也先卜日知其期然後卜宅此卜宅未詳也朝卜日月夕當是時也其義止誰得行之其義行誰得止之者抑情不肖者企及聖人爲之節制使賢故三月之葬殯其䫉以生設飾死者也殆非直留死者以安生也器用飾死者三月乃能備也䫉象也言其象以生之所設是致隆思慕之義也卒禮之凡常道凡謂變而飾每加飾謂殯歛動而遠游云飯禮記子客位祖於庭葬於墓所以即遠也於牖下小歛於戸内大歛於阼殯於久而平如平常也久則哀殺故死之爲道也不飾則惡惡則不哀尒則翫翫戲狎也尒與邇同翫則厭厭則忘忘則不敬一朝而喪其嚴親而所以送葬之者不哀不敬則嫌於禽獸矣君子恥之故變而飾所以滅惡也動而遠所以遂敬也懼敬不成也遂成也邇則久而平所以優生也有巳復生有節也優養生者謂送死禮者斷長續短損有餘益不足達愛敬之文而滋成行義之美者也至於滅性不肖者用此成行義之美不至於禽獸也皆謂使賢不肖得中也賢者則達愛敬之文而巳不故文飾麤惡聲樂哭泣恬愉憂戚是反也反也是相然而禮兼而用之時舉而代御吉則吉時凶御進用也時也則凶故文飾聲樂恬愉所以持平奉吉也麤衰哭泣憂戚所以持險奉凶也謂不平之時持扶助也險故其立文飾也不至於窕冶冶妖美也窕讀爲姚姚其立麤衰也不至於瘠棄飾亦不使羸瘠自棄立麤衰以爲居喪之其立聲樂恬愉也不至於流淫惰慢其立哭泣哀戚也不至於隘懾傷生是禮之中流也也懾隘窮流禮之中道也猶戚也之怯反中故情貌之變足以別吉凶明貴賤親䟽之節期止矣爲斯期當外是姦也雖難君子賤之故量食而食之量要而帶之相高以毁瘠是姦人之道也非禮義之文也非孝子之情也將以有爲者也眞情將有作爲以邀名非禮義之節文孝子之演門也求利若故說豫娩澤憂戚萃惡是吉凶憂愉之情發於顔色者也澤顔色潤澤也萃與顇同惡顔說讀爲恱豫樂也娩媚也音晚發見也色惡也歌謡謸笑哭泣諦號是吉凶憂愉之情發於聲音者也聲與此義不同諦讀爲啼管子謸與傲同戲謔也說文云謸悲字通用號胡刀反曰豕人立而啼古芻豢稻粱酒醴餰鬻魚肉菽藿酒漿是吉凶憂愉之情發於食飲者也喪者之食餰鬻菽藿卑絻黼黻文織資麤衰絰菲繐菅屨是吉凶憂愉之情發於衣服者也禆冕同卑絻與以事尊卑服之諸侯以下皆服焉文織染絲織爲文章也資與衣裨衣而服冕也裨之言卑也天子六服大裘爲上其餘爲卑或當時喪者有服此也繐繐衰也鄭玄云繐衰小功之縷四升齊同即齊衰也麤麤布也今麤布亦謂之資菲草衣蓋如蓑然鄧繐布菅茅也春秋傳曰晏子杖菅屨也半之衰也凡布細而踈者謂之繐今南陽有䟽房檖䫉越席牀第几筵屬茨倚廬席薪枕塊是吉凶憂愉之情發於居處者也屬茨令茨相茨蓋屋草也謂一邊著地如倚物者既葬柱楣塗廬也連屬而已至踈漏也倚廬鄭云倚木爲廬兩情者人生固有端焉情固自有端緒非出於禮也兩情謂吉與凶憂與愉言此兩若夫斷之繼之博之淺之益之損之類之盡之盛之美之使本末終始莫不順比純備足以爲萬世則則是禮也禮以節制進退然後終始人雖自有憂愉之情必須長比附㑹也毗至反合冝類之謂觸類而非順孰修爲之君子莫之能知也修治也爲作也順從也孰精也故曰性者本始材朴也僞者文理隆盛也無性則僞之無所加無僞則性不能自美往之性僞合然後成聖人之名一天下之功於是就也合然後成聖人之名一謂不分散言性僞也故曰天地合而萬物生隂陽接而變化起性僞合而天下治天能生物不能辨物也地能載人不能治人也宇中萬物生人之屬待聖人然後分也詩曰懷柔百神及河喬嶽此之謂也之詩周頌時邁之篇引此喻聖人能并治卒禮者以生者飾死者也大象其生以送其死也故如死如生如存如亡終始一也生亡異於存不以死異於始卒沐浴鬠體飯唅象生執也鄭云用組組儀禮鬠用組米實于右三實一貝左中亦如之凡實米唯盈鄭云于右束髮也古文鬠皆爲括體謂爪揃之屬士喪禮主人左扱象生執謂象生時所執持之事執或爲持尸口之右唯盈取滿而已是飯唅之禮也不沐則濡櫛三律而止不浴則濡巾三式而止今秦俗猶律理髮也無有不沐浴者此云蓋末世多不備禮也以批髪爲栗濡濕也式與拭同士喪禮尸充耳而設瑱云瑱充耳纊新綿也士喪禮瑱用白纊鄭飯以生稻唅以槁骨反生術矣前說象其生此已下說反於生之法生稻禾也槁枯也槁骨貝也術法也設褻衣襲三稱縉紳而無鈎帶矣縉紳謂扱笏於帶鈎鈎帶縉與搢同扱也紳大帶也之衣也士喪禮飯唅後乃襲三稱明衣不在筭設韐帶搢帶之鈎所用弛張也今不復解脱故不設鈎也褻衣親身鄭玄云褻衣非上服陳之將以斂笏禮記曰季康子之母死陳褻衣設掩面儇目鬠而不冠笄矣儇與還同繞也士喪禮幎目用緇士喪禮掩用練帛廣終幅長五尺笄謂但鬠髪而已不加冠及笄也士喪禮笄用桑又云鬠方尺二寸䞓裏著組繫幎讀如縈縈與還義同鬠而不笄或後世略也用組乃笄此云不書其名置于其重則名不見而柩獨明矣則以緇長半幅䞓末長終幅廣三寸書銘書其名於旌也士喪禮爲銘各以其物亡粥盛以二鬲懸于重羃用葦席書其名置於重謂見所書置于末曰某氏某之柩重以木爲之長三尺夏祝取飯之餘爲重案銘皆有名此云無蓋後世禮變今猶然也于重則名已無但知其柩也士喪禮祝取銘置于薦器則冠有鍪而母縱縱韜髪者也士冠禮緇纚廣終幅長薦器薦陳明器也鍪冠捲如兠鍪也縱也鍪之言蒙也冒也所以冒首莫侯反或音冒六尺謂明器之冠有如兠鍪加首之形而無韜髮之甕廡虚而不實而不實蓋喪禮陳鬼器人器鬼器虛人器實也旣夕禮甕三醯醢屑甒二醴酒皆有實此云虚曽子曰既曰明器矣而又實之禮記宋襄公葬其夫人醯醢百甕有簟席而無牀第大斂小斂則皆有也此言棺中不施牀第木器不成斵陶器不成物薄器不成内物不可用也薄器竹葦之器不成内謂木不成於雕斵不加功也瓦不成於器味鄭云成善也竹不可善用謂邊無縢也味當作沬靧也有其外形内不可用也内或爲用禮記曰竹不成用瓦不成竿笙具而不和琴瑟張而不均商之調也鄭玄云無宫輿藏而馬反告不用也埋之也馬謂駕軼軸之馬告示輿謂軼軸也國君謂之輴藏謂碑大夫葬用輴二綍二碑士葬用國車皆至葬時埋之也言也士喪禮既啓遷于祖用軸禮記君葬用輴四綍二具生器以適墓象徙之道也盤盂之屬徙遷改生器用器也弓矢以象人行不從常行之道更徙他道也也徙道其生時之道器當在家今以適墓略而不盡䫉而不功趨輿而藏之金革轡靷而不入明不用也有形䫉不加功精好也趨輿而藏之謂以輿略而不盡謂簡略而不盡備也䫉形也言但鞅也說文云靷所以引軸者也杜元凱云靷在馬胷或趨於墓而藏之趨者速也速藏之意也金謂和鸞革車物爲䫉下䫉皆同義曰䫉讀爲邈像也今畫象徙道又明不用也適墓以器亦所以明不用也象其改易生時之器是皆所以重哀也皆所以重有異生時哀也孝子之故生器文而不功明器䫉而不用器生之屬明器鬼器塗車芻靈木不成斵竹不成用瓦不成沫生時所用之器旣夕禮曰用器弓矢耒耜兩敦兩杆槃匜者有知無知故雜用生器與明器也之屬禮記曰周人兼用之以言不知死凡禮事生飾歡也送死飾哀也祭祀飾敬也師旅飾威也是百王之所同古今之所一也未有知其所由來者也故壙壟其䫉象室屋也也禮記曰適壙墓中壟家意以象生時也或音邈墓不登壟䫉猶意也言其棺椁其䫉象版蓋斯象拂也也爾雅釋器云輿革前謂之鞎後謂之茀郭云以韋板謂車上障蔽者蓋車蓋也斯未詳象衍字拂即茀後戸也靶車軾及無帾絲歶縷翣其䫉以象菲帷幬尉也衾是也帾與禇同禮記曰素錦禇又曰禇幕丹質鄭無讀爲幠幠覆也所以覆尸者也士喪禮幠用衾夷禮記曰畫翣二皆載緌鄭云以五采羽注於翣首也歶讀爲云所以覆棺也絲歶未詳蓋亦喪車之飾也或曰絲讀爲緌誤爲縷耳菲謂編草爲蔽蓋古人所用障蔽門户者今貧魚謂以銅魚懸於池下禮記曰魚躍拂池縷讀爲柳蔞字扉户扇也擣讀爲幬帳之幬尉讀爲罻罻網也帷帳如網者猶然或曰菲當爲匪隱也謂隱奥之處也或曰菲讀爲也抗折其䫉以象槾茨番閼也於乘車之西折旣夕禮陳明器抗禦也所以禦止土者槾扞也茨蓋屋也槾茨猶墍茨也槾莫撗覆之抗木撗三縮土五無簀窆事畢加之壙上以承抗席折所以承抗皆不使外物侵内有象於槾茨藩閼也干反番讀爲藩籬也閼謂門戸壅閼風塵者抗所以禦土故卒禮者無他焉明死生之義送以哀敬而終周藏也故葬埋敬葬其形也以爲葬埋之禮葬也者藏也所形體也敬藏其祭祀敬事其神也其銘誄繫世敬傳其名也狀以爲謚也繫世謂書其傳襲若今之譜諜也皆所銘謂書其功於器物若孔悝之鼎銘者誄謂誄其行於後世也以敬傳其名事生飾始也送死飾終也終始具而孝子之事畢聖人之道備矣刻死而附生謂之墨刻生而附死謂之惑之法惑謂惑亂過禮也刻損減附増益也墨子殺生而送死謂之賊人與賊殉葬殺也同大象其生以送其死使死生終始莫不稱宜而好善是禮義之法式也儒者是矣三年之喪何也曰稱情而立文之情輕重而制鄭康成云稱人也其禮因以飾羣別親䟽貴賤之節而不可益損也故曰無適不易之術也別也適往也無羣別謂羣而有易此術或曰適讀爲敵往不易言所至皆不可創巨者其日久痛甚者其瘉遲三年之喪稱情而立文所以爲至痛極也能平故重喪必待三年乃除亦爲至痛之極不創傷也楚良反日久瘉遲互言之也皆言久乃而已可朞月齊衰苴杖居廬食粥席薪枕塊所以爲至痛飾也竹爲之杖鄭云飾情之章表也禮記斬衰苴杖苴謂以苴惡死三年之喪二十五月而畢哀痛未盡思慕未忘然而禮以是斷之者豈不以送死有已復生有節也哉謂除喪反生者之事也斷决也丁亂反鄭云復生凡生乎天地之閒者有血氣之屬必有知有知之屬莫不愛其類今夫大鳥獸則失亡其羣匹越月踰時則必反鈆過故郷則必徘徊焉鳴號焉躑躅焉踟蹰焉然後能去之也㳂同鈆與之貌躑躅以足擊地也踟蹰不能去之貌循也禮記作反廵過其故郷徘徊旋飛翔小者是燕爵猶有啁噍之頃焉然後能去之鷰雀同燕爵與故有血氣之屬莫知於人故人之於其親也至死無窮智則於親喪悲哀之情至死不窮已故以三年鳥獸猶知愛其羣匹良久乃去况人有生之最也節之將由夫愚陋淫邪之人與則彼朝死而夕忘之然而縱之則是曾鳥獸之不若也彼安能相與羣居而無亂乎將由夫脩飾之君子與則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也云喻疾也遂隙壁孔也鄭時除也之謂不故先王聖人安爲之立中制節一使足以成文理則舍之矣節鄭云焉猶然立中制禮記作焉爲之立中制除也王肅云一皆也節謂服之年月也舍然則何以分之於三年矣分半也半曰至親以朞斷雖至親皆期而除也斷決也鄭云言服之正是何也斷於期之鄭云問服也義曰天地則已易矣四時則已徧矣其在宇中者莫不更始矣謂萬物宇中者故先王案以此象之也然則三年何也以期何乃三年爲鄭云法此變易可曰加隆焉案使倍之故再期也厚其恩使倍期也鄭云言於父母加由九月以下何也功以下也由從也從大曰案使不及也云鄭不若父母言使其恩故三年以爲隆緦小功以爲殺期九月以爲閒閒也古莧反情在隆殺之閒也隆厚也殺減也所介反閒則其上取象於天下取象於地中取則於人人所以羣居和一之理盡矣易也自三年以至緦皆嵗時鄭云取象於天地謂法其變以盡人聚居粹厚之恩也之數也言既象天地又足故三年之喪人道之至文者也夫是之謂至隆云言三年之喪喪禮之最至文飾人道使成忠孝鄭也盛是百王之所同古今之所一也不變一謂君之喪所以取三年何也於三年之制問君之喪何取曰君者治辨之主也文理之原也情貌之盡也相率而致隆之不亦可乎理法理條貫也原本也情志誠治辨謂能治人使有辨別也文者則臣下相率服喪而至於三年不亦可乎也貌恭敬也致至也言人所施忠敬無盡於君詩曰愷悌君子民之父母彼君子者固有爲民父母之說焉父能生之不能養之也養或爲食養謂哺乳之母能食之不能敎誨之嗣也食者君者巳能食之矣又善敎誨之者也誨謂制命也食謂禄廪敎三年畢矣哉三年報之猶未畢也君者兼父母之恩以乳母飲食之者也而三月慈母衣被之者也而九月君曲備之者也三年畢乎哉飲食衣被曲備謂兼得之則治失之則亂文之至也繫是有法度之至也文謂法度也治亂所得之則安失之則危情之至也就安是忠厚之至也情謂忠厚謂使人去危兩至者俱積焉以三年事之猶未足也直無由進之耳也直但故社祭社也稷祭稷也榖之神以弃配之但各止社土神以勾龍配之稷百而已祭一神郊者并百王於上天而祭祀之也百神百王郊天則兼祭百神以喻君兼父母者也也或神字誤爲王言社稷唯祭一神至三月之殯何也葬也此殯謂曰大之也重之也所致隆也所致親也將舉錯之遷徙之離宫室而歸丘陵也先王恐其不文也是以繇其期足之日也故繇其期足之日然後葬也繇讀為由從也所至厚至親將徙而歸丘陵不可急遽無文飾故天子七月諸侯五月大夫三月皆使其須足以容事事足以容成成足以容文文足以容備曲容備物之謂道矣也事喪具也道者委須待也謂所待之期物者也曲容物備祭者志意思慕之情也愅詭悒僾而不能無時至焉動之貌悒僾氣不舒憤鬱之愅變也詭異也皆謂變異感鬱不能無時而至言有時而至也愅音革悒音邑僾貌爾雅云僾悒也郭云嗚悒短氣也言人感動或憤愛音故人之歡欣和合之時則夫忠臣孝子亦愅詭而有所至矣而思君親之不得同樂也歡欣之時忠臣孝子則感動彼其所至者甚大動也甚大感動也言所至之情案屈然已則其於志意之情者惆然不嗛其於禮節者闕然不具也言若無祭祀之禮空然而已則忠臣屈竭也屈然空然也惆然悵然也嗛足禮節又闕然不具也孝子之情悵然不足故先王案爲之立文尊尊親親之義至矣祀節文文謂祭故曰祭者志意思慕之情也忠信愛敬之至矣禮節文貌之盛矣苟非聖人莫之能知也聖人明知之士君子安行之官人以為守百姓以成俗其在君子以為人道也其在百姓以為鬼事也以為鬼事則畏而奉之以為人道則安而行之故鍾鼓管磬琴瑟竽笙韶夏護武汋桓箾簡象是君子之所以為愅詭其所喜樂之文也哀痛敦惡之意本皆因説祭遂廣言喜樂韶夏之屬箾音朔賈逵曰舞曲名武汋桓皆周頌篇名簡因於感動而為之文飾也喜樂不可無文飾故制為鍾鼓王伐紂之樂未詳象周武齊衰苴杖居廬食粥席薪枕塊是君子之所以為愅詭其所哀痛之文也齊衰苴杖之屬言本皆因於感動也感動其所哀痛而不可無文飾故制為師旅有制刑法有等莫不稱罪是君子之所以為愅詭其所敦惡之文也等輕重異也敦厚也厚惡深惡也師旅所以討有罪制謂人數也有動敦惡故制師旅刑法以為文飾或曰敦讀為頓頓困躓也本因感卜筮視日齊戒修塗几筵饋薦告祝如或饗之文為項燕視日修塗視日之吉凶史記周牲體也薦進黍稷也告祝謂尸命祝以嘏于主人曰皇尸命工謂惨自宮至廟之道塗也几筵謂祝筵几于室中東面也饋獻宜稼于田眉壽萬年勿替引之如或歆饗其祀然也祝承致多福無疆于汝孝孫來女孝孫使女受禄于天物取而皆祭之如或甞之尸取菹㨎于醢祭于豆閒佐食物取每物皆取也謂祝命授祭是也如或嘗之謂尸啐嚌之如神之親嘗然也取黍稷肺授尸尸祭之又取肝㨎于鹽振祭嚌之毋利舉爵文云利爵之不醮也當云無舉利爵即上主人有尊如或觴之設尊酌謂王人如神飲其觴然以獻尸尸飲之賔出主人拜送反易服即位而哭如或去之賔出祭事畢即位而哭如神之去然也此雜說喪祭也易服易祭服反喪服也哀夫敬夫事死如事生事亡如事存狀乎無形影然而成文形影者然而足以成人道之節文也狀類也言祭祀不見鬼神有類乎無荀子卷第十三
