  - {type: variant, offset: 8768, length: 0, content: '', WYG: 十三今升在論議之中於文為比禮起於何也曰人生而有欲欲而不得則不能無求求而無度量分界則不能不爭量扶嚮反爭則亂亂則窮窮謂計無所出也先王惡其亂也故制禮義以分之以養人之欲給人之求有分然後欲可養求可給使欲必不窮乎物物必不屈於欲兩者相持而長是禮之所起也屈竭也先王為之立中道故欲不盡於物物不竭於欲欲與物相扶持故能長久是禮所起之本意者也故禮者養也芻豢稻粱五味調香所以養口也椒蘭芬苾所以養鼻也雕琢刻鏤黼黻文章所以養目也鐘鼓管磬琴瑟竽笙所以養耳也疏房檖狽越席牀第几筵所以養體也疏通也疏房通明之房也狽古貌字檖狽未詳或曰檖讀為䆳貌廟也廟者宮室尊嚴之名或曰狽讀為邈言屋宇深䆳綿貌也第牀棧也越席剪蒲席也古人所重司馬貞曰疏䆫也故禮者養也君子既得其養又好其别曷謂别曰貴賤有等長幼有差貧富輕重皆有稱者也稱謂各當其}
