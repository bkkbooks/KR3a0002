  - {type: variant, offset: 21, length: 973, content: 揚書所狀先准中書劄子奉聖旨校定荀子揚子内揚子一部先次校畢巳於治平二年十二月内申納訖今來再校到荀子一部計二十卷裝寫已了續次申納者申聞事右奉聖旨荀子送國子監開版依揚子并音義例印造進呈及宣賜劄付國子監准此臣盧侗臣王汝翼臣顔復臣焦千之臣梁師孟臣董唐臣臣黎錞臣韓端彦臣程伯孫臣畢之翰臣吕誨臣錢公輔朝散大夫給事中叅知政事上輕車都尉北海郡開國公食邑二千三百戸食實封肆伯戸賜紫金魚袋臣唐介朝散大夫右諫議大夫叅知政事上護軍天水郡開國侯食邑一千戸賜紫金魚袋臣趙抃臣曽公亮荀子二十卷三十二篇唐揚倞注初漢劉向校讎中孫卿書凡三百二十一篇除復重定箸三十二篇爲孫卿新書十二卷至倞分易卷第更名荀子皇朝熈寍初儒官校上詔國子監刋印頒行之中興蒐補遺逸監書􅎊具獨荀子猶闕學者不見舊書傳習閩本文字舛異仲友於三館睹舊文大懼湮没訪得善本假守餘隙迺以公帑鋟木悉視熈寍之故詩曰雖無老成人尚有典刑卿不可作其書獨非典刑乎向博極羣書序卿事大氐本司馬遷於遷書有三不合春申君死當齊王建二十八年距宣王八十七年向言卿以宣王時來㳺學春申君死而卿廢設以宣王末年㳺齊年巳百三十七矣遷書記孟子以惠王三十五年至梁當齊宣王七年惠王以叟稱孟子計亦五十餘後二十三年子之亂燕孟子在齊若卿來以宣王時不得如向言後孟子百餘歳田忘薦孫臏爲軍師敗魏桂陵當齊威王二十六年距趙孝成王七十八年臨武若與卿議兵於王前向以爲孫臏倞以敗魏馬陵疑年馬陵去桂陵又十三年矣崇文揔目言卿楚人楚禮爲客卿與遷書向序駮益難信据遷傳參卿書其大略可睹卿名况趙人以齊襄王時㳺稷下距孟子至齊五十年矣於列大夫三爲祭酒去之楚春申君以爲蘭陵令以䜛去之趙與臨武君議兵入秦見應侯昭王以聘反乎楚復爲蘭陵令旣廢家蘭陵以終自戰國爭冨彊儒道絀孟子學孔子言王可反掌致卒不見用卿後孟子亦尊孔氏子思作中庸孟子述之道性善至卿以爲人性惡故非子思孟軻揚雄以爲同門異戸孟子與告子言性卒絀告子惜卿不見孟子不免異說方說士徼時好卿獨守儒議兵以仁義冨以儒術彊以道德之威旨意與孟子同見應侯病秦無儒昭王謂儒無益人之國極明儒效秦并天下以力意儒果無用至於坑焚减不旋踵漢奮布衣終假儒以定卿言不用而後驗自董仲舒韓愈皆美卿書言王道雖不及孟子抑其流亞廢於衰世亦命矣夫學者病卿以李斯韓非卿老師學者已衆二子適見世晝寢餔啜非師之過使卿登孔門去異意書當與七篇比此君子所爲太息大宋涥熈八年歳在辛丑十有一月甲申朝請郎權發遣台州軍州事唐仲友後序, WYG: ''}
