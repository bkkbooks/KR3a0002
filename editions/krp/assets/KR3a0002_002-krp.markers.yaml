  - {type: variant, offset: 8312, length: 0, content: '', WYG: 十四篇相人古之人無有也學者不道也道說古者有姑布子卿姑布姓子卿名相趙襄子者或本無姑字今之世梁有唐舉相李斯蔡澤者相人之形狀顏色而知其吉凶妖祥世俗稱之古之人無有也學者不道也載三言者深非之也故相形不如論心論心不如擇術術道術也形不勝心心不勝術術正而心順之則形相雖惡而心術善無害為君子也形相雖善而心術惡無害為小人也君子之謂吉小人之謂凶故長短小大善惡形相非吉凶也古之人無有也學者不道也蓋帝堯長帝舜短文王長周公短仲尼長子弓短子弓蓋仲弓也言子者著其為師也漢書儒林傳馯臂字子弓江東人受易者也然馯臂傳易之外更無所聞荀卿子論說常與仲尼相配必非馯臂也馯音寒昔者衛靈公有臣曰公孫呂身長七尺靣長三尺焉廣三寸鼻目耳具而名動天下靣長三尺廣三寸言其狹而長甚也鼻目耳雖皆具而相去踈逺所以為異名動天下言天下皆知其賢或曰狹長如此不近人情恐文句誤脫也楚之孫叔敖期思之鄙人也杜元凱云期思楚邑名今弋陽期思縣鄙人郊野之人也突秃長左軒較之下而以楚霸突謂短髮可凌突人者故莊子說趙劒士蓬頭突􅁂長左左脚長也軒較之下而以楚霸言修文德不勞甲兵逺征伐也說文云軒曲輈也鄭注考工記云較兩輢較上出式者詩曰猗重較兮葉公子髙㣲小短瘠行若將不勝其衣葉公楚大夫沈尹氏之子食邑}
