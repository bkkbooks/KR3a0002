  - {type: variant, offset: 0, length: 869, content: 荀子卷第八登仕郎守大理評事揚倞注君道篇第十二有亂君無亂國有治人無治法羿之法非亡也而羿不世中禹之法猶存而夏不世王故法不能獨立類不能自行得其人則存失其人則亡法者治之端也君子者法之原也故有君子則法雖省足以徧矣無君子則法雖具失先後之施不能應事之變足以亂矣不知法之義而正法之數者雖愽傳臨事必亂故明主急得其人而闇主急得其埶急得其人則身佚而國治功大而名美上可以王下可以霸不急得其人而急得其埶則身勞而國亂功廢而名辱社稷必危故君人者勞於索之而休於使之書曰唯文王敬忌一人以擇此之謂也合符節别契劵者所以爲信也上好權謀則臣下百吏誕詐之人乗是而後欺探籌投鉤者所以爲公也上好曲私則臣下百吏乗是而後偏衡石稱縣者所以爲平也上好傾覆則臣下百吏乗是而後險斗斛敦槩者所以爲嘖也上好貪利則臣下百吏乗是而後豐取刻與以無度取於民故械數者治之流也非治之原也君子者治之原也官人守數君子養原源清則流清源濁則流濁故上好禮義尚賢使能無貪利之心則下亦將綦辭讓致忠信而謹於臣子矣如是則雖在小民不待合符節别契劵而信不待探籌投鉤而公不待衡石稱縣而平不待斗斛敦槩而嘖故賞不用而民勸罰不用而民服有司不勞而事治政令不煩而俗美百姓莫敢不順上之法象上之志而勸上之事而安樂之矣故藉斂忘費事業忘勞宼難忘死城郭不待飾而固兵刃不待陵而勁敵國不待服而詘四海之民不待令而一夫是之謂至平詩曰王猶允塞徐方既來此之謂也請問爲人君曰以禮分施均徧而不偏請問爲人臣曰以禮待君忠順而不懈請問爲人父曰寛惠而有禮請問爲人子曰敬愛而致文請問爲人兄曰慈愛而見友請問爲人弟曰敬詘而不苟請問爲人夫曰致功而不流致臨而有辨請問爲人妻曰夫有禮則柔從聽侍夫無禮則恐懼而自竦也此道也偏立而亂俱立而治其足以稽矣請問兼能之奈何曰審之禮也古者先王審禮以方皇周浹於天下動無不當也故君子恭而不難敬而不鞏貧窮而不約富貴而不驕並遇變應而不窮審之禮也故君子之於禮敬而安之其於事也徑而不失其於人也寡怨寛裕而無阿其所爲身也謹脩飾而不危其應變故也齊給便㨗而不惑其於天地萬物也不務說其所以然而致善用其材其於百官之事技藝之人也不與之爭能而致善用其功其待上也忠順而不懈其使下也均徧而不圎, WYG: ''}
