  - {type: variant, offset: 246, length: 1, content: 嚮, WYG: 之曰知之不知曰不知言之要也能之曰能之不能曰不能行之至也皆在不隠其情言要則知行至則仁既知且仁夫惡有不足}
  - {type: page-break, offset: 246, content: '', id: KR3a0002_WYG_020-11a, image: WYG0695/WYG0695-0298c.png}
  - {type: variant, offset: 248, length: 0, content: '', WYG: 哉子路入子曰由知者若何仁者若何子路對曰知者使人知己仁者使人愛己子曰可謂士矣士者修立之稱子貢入子曰賜知者若何仁者若何子貢對曰知者知人仁者愛人子曰可謂士君子矣顔淵入子曰回知者若何仁者若何知者皆讀為智顔淵對曰知者自知仁者自愛子曰可謂明君子矣子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意樂其為治之意既已得之又樂其治是以有終身之樂無一日之憂小人者其未得也則憂不得既已得之又恐失之是以有終身之憂無一日之樂也法行篇第三十禮義謂之法所以行之謂之行公輸不能加於繩聖人莫能加於禮公輸魯巧人名班雖至巧繩墨之外亦不能加也禮者衆人法而不知聖人法而知之衆人皆知禮可以為法而不知其義者也曾子曰無内人之疏而外人之親無禁辭也内人之疏外人之親謂以疏為内以親為外家語曰不比於親而比於疏者不亦逺乎韓詩外傳作無内疏而無外親也無身不善而怨人無刑已至而呼天内人之疏而外人之親不亦逺乎謂失之逺矣身不善而怨人不亦反乎反謂乖悖刑已至而呼天不亦晩乎詩曰㳙㳙源水不雝不塞轂已破碎乃大其輻事以敗矣乃重太息其云益乎源水水之泉源也雝讀為壅大其輻謂壯大其輻也重太息嘆嗟之甚也三者皆言不愼其初追悔無及也曾子病曾元持足曾子曰元志之吾語汝曾元曾子之子也夫魚鼈黿鼉猶以淵為淺而堀其中堀與窟同鷹鳶猶以山為卑而增巢其上及其得也必以餌故君子苟能無以利害義則耻辱亦無由至矣子貢問於孔子曰君子之所以貴玉而賤珉者何也珉石之似玉者為夫玉之少而珉之多耶孔子曰惡賜是何言也惡音烏猶言烏謂}
  - {type: page-break, offset: 248, content: '', id: KR3a0002_WYG_020-11b, image: WYG0695/WYG0695-0298d.png}
  - {type: page-break, offset: 248, content: '', id: KR3a0002_WYG_020-12a, image: WYG0695/WYG0695-0299a.png}
  - {type: page-break, offset: 248, content: '', id: KR3a0002_WYG_020-12b, image: WYG0695/WYG0695-0299b.png}
  - {type: variant, offset: 249, length: 2, content: 夲仍, WYG: 義也夫君子豈多而賤之少而貴之哉夫玉者君子比德焉温潤而澤仁也鄭康成云色柔温潤似仁縝栗而理知也鄭云栗堅貌也理有文理似智者處事堅固又有文理堅剛而不屈義也似義者剛直不回也廉而不劌行也劌傷也雖有廉稜而不傷物似有徳行者不傷害人折而不撓勇也雖摧折而不撓屈似勇者也瑕適並見情也瑕玉之病也適玉之美澤調適之謂也瑕適並見似不匿其情者也禮記曰瑕不掩瑜瑜不掩瑕忠也扣之其聲清揚而逺聞其止輟然辭也扣與叩同似有辭辨言發言則人樂聽之言畢更無繁辭也禮記}
  - {type: page-break, offset: 249, content: '', id: KR3a0002_WYG_020-13a, image: WYG0695/WYG0695-0299c.png}
  - {type: variant, offset: 252, length: 0, content: '', WYG: 叩之其聲清越以長其終屈然樂也故雖有珉之彫彫不若玉之章章彫彫謂彫飾文采也章章素質明著也詩曰言念君子温其}
  - {type: variant, offset: 253, length: 1, content: 響, WYG: 玉此之謂也詩秦風小戎之篇引之喻君子比德曾子曰同遊而}
  - {type: variant, offset: 255, length: 0, content: '', WYG: 見愛者吾必不仁也仁者必能使人愛己交而不見敬者吾必不長也不長厚故為人所輕臨財而不見信者吾必不信也廉潔不聞於人三者在身曷怨人當反諸已怨人者窮怨天者無識無識不知天命也失諸已而反諸人豈不亦迂哉南郭惠子問於子貢曰夫子之門何其雜也南郭惠子未詳其姓名蓋居南郭因以為號莊子有南郭子綦夫子弟子也雜謂賢不肖}
  - {type: page-break, offset: 255, content: '', id: KR3a0002_WYG_020-13b, image: WYG0695/WYG0695-0299d.png}
  - {type: variant, offset: 256, length: 0, content: '', WYG: 雜而至子貢曰君子正身以俟欲來者不距欲去者不止且夫良醫之門多病人櫽栝之側多枉木是以雜也君子有三恕有君不能事有臣而求其使非恕也有親不能報有子而求其孝非恕也報孝養也詩曰欲報之徳有兄不能敬有弟而求其聽令非恕也士明於此三恕則可以端身矣孔子曰君子有三思而不可不思也少而不學長無能也老而不教死無思也無門人思其徳有而不施窮無與也窮乏之時無所徃託是故君子少思長則學老思死則教有思窮則施哀公篇第三十一魯哀公問於孔子曰吾欲論吾國之士與之治國敢問何如之耶孔子對曰生今之世志古之道居今之俗服古之服志記識也服古之服猶若夫子服逢掖之衣章甫之冠也舎此而為非者不亦鮮乎舍去此謂古也哀公曰然則夫章甫絇屨紳而搢笏者此賢乎章甫殷冠王肅云絇謂屨頭有拘飾也鄭康成云絇之言拘也以為行戒狀如刀衣鼻在屨頭紳大帶也搢笏於紳者也孔子對曰不必然夫端衣𤣥裳絻而乘路者志不在於食葷端衣𤣥裳即朝𤣥端也絻與冕同鄭云端者取其正也士之衣袂皆二尺二寸而廣幅是廣袤等也其祛尺二寸大夫已上侈之侈之者蓋半而益一焉則袂三尺三寸祛尺八寸路王者之車亦車之通名爾雅云輅車之大者葷葱薤之屬也斬衰菅屨杖而啜粥者志不在於酒肉儀禮䘮服曰斬者何不緝也衰長六尺博四寸三升布為之鄭注䘮服云上曰衰下曰裳當心前有衰後有負板左右有辟領孝子哀戚無所不在也菅菲也此言服被於外亦所以制其心也生今之世志古之道居今之俗服古之服舍此而為非者雖有不亦鮮乎哀公曰善孔子曰人有五儀言人之賢愚觀其儀法有五也有庸人有士有君子有賢人有大聖哀公曰敢問何如斯可謂庸人矣孔子對曰所謂庸人者口不能道善言心不知色色色色謂以己之色觀彼之色知其好惡也論語曰色斯舉矣不知選賢人善士託其身焉以為己憂不知託賢但自憂而已勤行不知所務止交不知所定交謂接待於物皆言不能辨是非倀倀失據也日選擇於物不知所貴不知可貴重也從物如流不知所歸為外物所誘蕩而不返也五鑿為正心從而壊如此則可謂庸人矣鑿竅也五鑿謂耳目鼻口及心之竅也言五鑿雖似於正而其心已從外物所誘而壊矣是庸愚之人也一曰五鑿五情也莊子曰六鑿相攘司馬彪曰六情相攘奪韓詩外傳作五藏為正也哀公曰善敢問何如斯可謂士矣孔子對曰所謂士者雖不能盡道術必有率也雖不能徧美善必有處也率循也雖不能盡徧必循處其一隅言有所執守也是故知不務多務審其所知論語曰子路有聞未之能行唯恐有聞也言不務多務審其所謂止於辨明事而已矣行不務多務審其所由由從也謂不從不正之道故知既已知之矣言既已謂之矣行既已由之矣則若性命肌膚之不可易也言固守所見如愛其性命肌膚之不可以他物移易者也故富貴不足以益也卑賤不足以損也皆謂志不可奪如此則可謂士矣士者修立之稱一曰士事也言其善於任事可以入官也哀公曰善敢問何如斯可謂君子矣孔子對曰所謂君子者言忠信而心不德不自以為有德仁義在身而色不伐思慮明通而辭不爭故猶然如將可及者君子也猶然舒遲之貌所謂瞻之在前忽然在後家語作油然王肅曰不進貌也哀公曰善敢問何如斯可謂賢人矣孔子對曰所謂賢人者行中規䋲而不傷於本言足法於天下而不傷於身本亦身也言雖廣大而不傷其身也所謂言滿天下無口過行滿天下無怨惡富有天下而無怨財富有天下謂王者之佐也怨讀為藴言雖富有天下而無藴畜私財也家語作無宛禮記曰事大積焉而不宛古藴通而此因誤為怨字耳布施天下而不病貧言廣施德澤慈惠用窮使家給人足而上不憂貧乏所謂百姓足君孰與不足也如此則可謂賢人矣賢者亞聖之名說文云賢多才哀公曰善敢問何如斯可謂大聖矣孔子對曰所謂大聖者知通乎大道}
