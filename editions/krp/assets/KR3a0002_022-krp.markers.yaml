  - {type: variant, offset: 282, length: 2, content: 夲仍, WYG: 賢士之心故厚為之貌尤加謹敬也人人皆以我為越踰好士然故士至人不知則以為越踰然亦以禮貌之故而至也士至而後見物物事也見物然後知其是非之所在戒之哉汝其以魯國驕人幾矣幾危也周公言我以天下之貴猶不驕士汝今以魯國之小而遂驕人危矣夫仰禄之士猶可驕也仰魚亮反正身之士不可驕也彼正身之士舎貴而為賤舎富而為貧舎佚而為勞顔色黎黑而不失其所黎讀為梨謂面如凍棃之色者也是以天下之紀不息文章不廢也頼守道之士不苟徇人故得綱紀文章尚存也語曰繒丘之封人繒與鄫同鄫丘故國封人掌疆界者漢書地理志繒縣屬東海見楚相孫叔敖曰吾聞之也處官久者士妬之禄厚者民怨之位尊者君恨之今相國有此三者而不得罪楚之士民}
  - {type: page-break, offset: 282, content: '', id: KR3a0002_WYG_020-24a, image: WYG0695/WYG0695-0305a.png}
  - {type: punctuation, offset: 284, content: /, id: KR3a0002_krp_022-bkkpn2}
  - {type: variant, offset: 285, length: 1, content: 挍, WYG: 也孫叔敖曰吾三相楚而心愈卑每益禄而施愈博位滋尊而禮愈恭是以不得罪於楚之士民也子貢問於孔子曰賜為人下而未知也下謙下也子貢問欲為下未知其益孔子曰為人下者其猶土也深抇之而得甘泉焉抇掘也故没反樹之而五榖蕃焉草木殖焉禽獸育焉生則立焉死則入焉多其功而不息為人下者其猶土也昔虞不用宫之竒而晉并之萊不用子馬而齊并之宫之竒虞賢臣諫不從以其族行子馬未詳其姓名左氏傳曰襄二年齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹又六年齊侯伐萊萊人使王湫帥師及正輿子軍齊師齊師大敗之遂滅萊或曰正輿子字子馬其不用未聞說苑諸卿已諫楚莊王曰曹不用僖負羈而宋并之萊不用子猛而齊併之據年代齊滅萊在楚莊王之後未詳諸卿已之諫也紂刳王子比干而武王得之不親賢用知故身死國亡也為說者曰孫卿不}
