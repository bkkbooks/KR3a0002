  - {type: variant, offset: 45, length: 1, content: 政, WYG: 悌同謂自卑如弟子上順下篤人之中行也上順從於君父下篤愛於卑㓜也從道不從君從義不從父人之大行也若夫志以禮安言以類使則儒道畢矣志安於禮不妄動也言發以類不恠說也如北則儒者之道畢矣雖舜不能加毫末於是矣孝子}
