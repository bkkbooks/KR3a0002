  - {type: variant, offset: 33, length: 9, content: 南宋錢佃江西漕司夲, WYG: 彼蓋音盍扇户也皆繼謂其材木斷絶相接繼也子貢問北盍皆繼續彼有說耶匠過誤}
  - {type: variant, offset: 43, length: 1, content: 唐, WYG: 遂絶之也家語作北蓋皆斷王肅云觀北面之盍皆斷絶也孔子曰太廟之堂亦嘗有說言舊曾說今則無也官致良工因麗節文致極也官致良工謂初造太廟之時官致其良工工則因隨其木之美麗節文而裁制之所以斷絶家語作官致良工之匠匠致良材盡其功巧蓋貴文也非無良材也蓋曰貴文也非無良材大木不斷絶者蓋所以貴文飾也此蓋明夫子之博識也子道篇第二十九入孝出弟人之小行也弟}
