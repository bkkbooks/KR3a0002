  - {type: line-break, offset: 263, content: '', id: KR3a0002_SBCK_022-1b04}
  - {type: variant, offset: 264, length: 2, content: 嚮響, WYG: 其美德也已周公曰嗚呼以人惡為美德乎君子好以道德故其民歸道君子好以道德教人故其民歸道者衆非謂寛𢎞也彼其寛也出無辨矣汝又美}
  - {type: variant, offset: 267, length: 2, content: 異非, WYG: 彼伯禽既無道德但務寛容此乃出於善惡無别汝何以為美也孔子曰寛則得衆亦謂人愛恱歸之也彼其好自用也是所以窶小也窶無禮也彼伯禽好自用而不諮詢是乃無禮驕人而器局小也書曰自用則小尚書大傳曰是其好自用也以斂益之也君子力如牛不與牛爭力走如馬不與馬爭走}
  - {type: page-break, offset: 267, content: '', id: KR3a0002_WYG_020-22b, image: WYG0695/WYG0695-0304b.png}
  - {type: variant, offset: 271, length: 8, content: 之異此自校刋紀聞, WYG: 士不與士爭知士謂臣下掌事者不爭言委任彼爭者均}
  - {type: variant, offset: 281, length: 0, content: '', WYG: 氣也汝又美之好自用則必不委任而與之爭事爭事乃均敵者尚氣之事非人君之量也彼其慎也是其所以淺也彼伯禽之慎宻不廣接士適所以自使智識淺近也聞之曰無越踰不見士周公聞之古也越踰謂過一日也見士問曰無乃不察乎懼其壅蔽故問無乃有不察之事乎不聞即物少至少至則淺物事也不見士則無所聞無所聞則所知之事亦少少則意淺矣聞或為問也彼淺者賤人之道也汝又美之吾語汝我文王之為子為文王之子也武王之為弟成王之為叔父周公先成王薨未知成王之諡此云成王乃後人所加之耳吾於天下不賤矣然而吾所執贄而見者十人周公自執贄而見者十人禮見其所尊敬者雖君亦執贄故哀公執贄請見周豐鄭注尚書大傳云十人公卿之中也三十人羣士之中也百人羣大夫之中也還贄而相見者三十人禮臣見君則不還贄敵者不敢當則還之禮尚徃來也士相見禮曰主人復見之以其贄曰曏者吾夫子辱使某見請還贄於將命者鄭康成云贄者所執以至也君子見於所尊敬必執贄以將其厚意也貌執之士者百有餘人執猶待也以禮貌接待之士百餘人也欲言而請畢事者千有餘人謂卑賤之士恐其言之不盡周公先請其畢辭也說苑曰周公踐天子之位七年布衣之士所執贄而師見者十人所見者十二人窮巷白屋所先見者四十九人時進善者百人教士千人朝者萬人於是吾僅得三士焉以正吾身以定天下於是千百人之中僅乃得三士正身治國吾所以得三士者亡於十人與三十人中乃在百人與千人之中十人與三十人雖尊敬未得賢至百人千人然後乃得三人以明接士不廣無由得賢也故上士吾薄為之貌下士吾厚為之貌上士中誠重之故可薄為之貌下士既無執贄之禮懼}
