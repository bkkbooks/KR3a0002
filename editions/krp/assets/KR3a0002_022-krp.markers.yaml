  - {type: variant, offset: 75, length: 507, content: 五名又有涥熙八年唐仲友後序毎半板八行毎行字數不整注雙行界長七寸六分幅五寸七分半左右雙邊毎卷有金澤文庫印印文肥寛異所經見殆文庫火前物與惺窩先生題籖亦希覯之珍云狩谷望之手跋云右宋槧荀子為涥熙公年唐仲友所刻字大如錢書法全撫歐陽朱熹按唐仲友狀云據蔣輝供元是明州百姓涥熙四年六月内因同巳斷配人方百二等偽造官㑹事發蒙臨安府府院將輝斷配合州牢城差在都酒務著役月糧雇本州住人周立代役毎日開書籍供養去年三月内唐仲友叫上輝就公使庫開雕揚子荀子等印板輝共王定等一十八人在局開雕者是本也板心下方所題皆是剞劂氏之姓名蔣輝以下都十九名與朱熹按狀所言輝共王定以下十八人之語合余始讀朱熹集得詳唐仲友刻荀子事喜甚獨怪是不良人為是好事謂不可以其罪廢其人也後讀齊東野語知其詆排之非至論今又得四庫全書總目二則足為仲友吐氣今并録以備攷近年舶來盧文弨校本荀子云以影宋本校今以是本比讐之失校之字不為不多則彼所校猶未精歟將所謂影宋本有落葉歟然則是本豈不貴而重乎且世間北宋刋本傳世無幾如余所見不過小字御注孝經文中子通典聖惠方諸書而是本翻雕熙寍官板者則其實與北宋本無異真希世之寶典也余齋所載南宋本中當以是為第一也吾家子孫宜保䕶之文政五年十一月當道光二年按文政五年壬午, WYG: ''}
