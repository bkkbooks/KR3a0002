  - {type: variant, offset: 17, length: 2, content: 宋夲, WYG: 曰伊稽首不其}
  - {type: variant, offset: 20, length: 2, content: 二一, WYG: 來乎稽首恭敬之至有所不來者為其上失其道而人散也若施德化使下人稽首歸向雖道逺能無來乎孔子觀於東流之水子貢問於孔子曰君子之所以見大水必觀焉者是何孔子曰夫水大徧與諸生而無為也似德徧與諸生謂水能徧生萬物為其不有其功似上德不德者說苑作遍與而無私者其流也埤下裾拘必循其理似義埤讀為卑裾與倨同方也拘讀為鉤曲也其流必就卑下或方或曲必循卑下之理似義者無不循理也說苑作其流也卑下拘倨之也情義分然也其洸洸乎不淈盡似道洸讀為滉滉水至之貌淈讀為屈竭也似道之無窮也家語作浩浩無屈盡之期似道也若有決行之其應佚若聲嚮其赴百仞之谷不懼似勇決行決之使行也佚與逸同奔逸也若聲嚮言若嚮之應聲也似勇者果於赴難也主量必平似法主讀為注量謂坑受水之處也言所經坑坎注必平之然後過似有法度者均平也盈不求概似正概平斗斛之木也考工記曰概而不稅言水盈滿不待概而自平如政者不假於刑法之禁淖約微達似察淖當為綽約弱也綽約柔弱也雖至柔弱而侵淫微通達於物似察之見細微也說苑作綽弱微達以出以入以就鮮絜似善化言萬物出入於水則必鮮絜似善化者之使人去惡就美也說苑作不清以入鮮絜以出也其萬折也必東似志折縈曲也雖東西南北千萬縈折不常然必歸於東似有志不可奪者說苑作其折必東也是故君子見大水必觀焉孔子曰吾有耻也吾有鄙也吾有殆也㓜不能彊學老無以教之吾耻之無才藝以教人也去其故鄉事君而達卒遇故人曾無舊言吾鄙之舊言平生之言卒倉忽反與小人處者吾殆之也孔子曰如垤而進吾與之如丘而止吾已矣今學曾未如肬贅則具然欲為人師肬贅結肉也莊子曰以生為附贅懸肬肬音尤具然自滿足之貌也孔子南適楚厄於陳蔡之間七日不火食藜羮不糂糂與糝同蘇覽反弟子皆有飢色子路進問之曰由聞之為善者天報之以福為不善者天報之以禍今夫子累德積義懐美行之日久矣奚居之隱也隱謂窮約孔子曰由不識吾語汝汝以知者為必用耶王子比干不見剖心乎汝以忠者為必用耶關龍逄不見刑乎汝以為諫者為必用耶伍子胥不磔姑蘇東門外乎磔車裂也姑蘇吳都名夫遇不遇者時也賢不肖者材也君子博學深謀不遇時者多矣由是觀之不遇世者衆矣何獨丘也哉夫芷蘭生於深林非以無人而不芳君子之學非為通也不為求通為窮而不困憂而意不衰也知禍福終始而心不惑也皆為樂天知命夫賢不肖者材也為不為者人也為善不為善在人也遇不遇者時也死生者命也今有其人不遇其時雖賢其能行乎苟遇其時何難之有故君子博學深謀脩身端行以俟其時孔子曰由居吾語汝昔晉公子重耳霸心生於曹重耳晉文公名亡過曹曹共公聞其駢脅使其躶浴薄而觀之公因此激怒而霸心生也越王勾踐霸心生於會稽謂以甲盾五千棲於會稽也齊桓公小白霸心生於莒小白齊桓公名齊亂奔莒蓋亦為所不禮故居不隱者思不逺身不佚者志不廣佚家語作常逸者與逸同謂奔竄也女庸安知吾不得之桑落之下桑落九月時也夫子當時蓋暴露居此樹之下子貢觀於魯廟之北堂出而問於孔子曰鄉者賜觀於太廟之北堂吾亦未輟還復瞻被九蓋皆繼彼有說耶匠過絶耶北堂神主所在也輟止也九富}
