  - {type: variant, offset: 14, length: 2, content: 傳荀, WYG: 履小人所視眷焉顧之澘然出涕豈不哀哉詩小雅大東之篇言失其砥矢之道所以陵遲哀其法度隳壊也詩曰瞻彼日月悠悠我思道之云逺曷云能來詩邶風雄雉之篇}
