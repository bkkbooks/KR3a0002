  - {type: line-break, offset: 0, content: '', id: KR3a0002_SBCK_022-1a01}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 子卷二十唐楊倞註宥坐篇第二十八此已下皆荀卿及弟子所引記傳雜事故總推於末孔子觀於魯桓公之廟有欹器焉春秋哀公三年桓宫僖宫災公羊傳曰此皆毁宗廟也其言災何復立也或曰三桓之祖廟欹器傾欹易覆之器孔子問於守廟者曰此為何器守廟者曰此蓋為宥坐之器宥與右同言人君可置於坐右以為戒也說苑作坐右或曰宥與侑同勸也文子曰三皇五帝有勸戒之器名侑巵注云欹器也孔子曰吾聞宥坐之器者虛則欹中則正滿則覆孔子顧謂弟子曰注水焉弟子挹水而注之挹酌中而正滿而覆虛而欹孔子喟然而嘆曰吁惡有滿而不覆者哉子路曰敢問持滿有道乎孔子曰聰明聖知守之以愚功被天下守之以譲勇力撫世守之以怯撫掩也猶言蓋世也富有四海守之以謙此所謂挹而損之之道也挹亦退也挹而損之猶言損之又損孔子為魯攝相朝七日而誅少正卯為司冦而攝相也朝謂聽朝也門人進問曰夫少正卯魯之聞人也夫子為政而始誅之得無失乎聞人謂有名為人所聞知者也始誅先誅之也孔子曰居吾語汝其故人有惡者五而盗竊不與焉一曰心達而險二曰行辟而堅三曰言偽而辯四曰記醜而博五曰順非而澤心達而險謂心通達於事而凶險也辟讀為僻醜謂怪異之事澤有潤澤也此五者有一於人則不得免於君子之誅而少正夘兼有之故居處足以聚徒成羣言談足以飾邪營衆彊足以反是獨立此小人之桀雄也不可不誅也營讀為熒熒衆惑衆也彊剛愎也反是以非為是也獨立人不能傾之也是以湯誅尹諧文王誅潘止周公誅管叔太公誅華仕管仲誅付里乙子産誅鄧析史付韓子曰太公封於齊東海上有居士狂矞華仕昆弟二人立議曰吾不臣天子不友諸侯耕而食之掘而飲之吾無求於人無上之名無君之禄不仕而事力太公使執而殺之以為首誅周公從魯聞急傳而問曰二子賢者也今日饗國殺之何也太公曰是昆弟立議曰不臣天子是望不得而臣也不友諸侯是望不得而使也耕而食之掘而飲之無求於人者是望不得以賞罰勸禁也且夫王之所以使其臣者非爵禄則刑罰也今四者不足以使之則望誰為君乎是以誅也尹諧潘止付里乙史付事跡並未聞也此七子者皆異世同心不可不誅也詩曰憂心悄悄愠于羣小小人成羣斯足憂矣詩邶風柏舟之篇悄悄憂貌愠怒也孔子為魯司冦有父子訟者孔子拘之三月不别别猶決也謂不辨别其子之罪其父請止孔子舍之季孫聞之不恱曰是老也欺予老大夫之尊稱春秋左傳曰使圉將不得為宣君老也語予曰為國家必以孝今殺一人以戮不孝又舍之冉子以告孔子慨然歎曰嗚呼上失之下殺之其可乎不教其民而聽其獄殺不辜也三軍大敗不可斬也獄犴不治不可刑也罪不在民故也獄犴不治謂法令不當也犴亦獄也詩曰宜犴宜獄獄字從二大象所以守者犴胡地野犬亦善守故獄謂之犴也嫚令謹誅賊也嫚與慢同謹嚴也賊賊害人也今有時斂也無時暴也言生物有時而賦歛無時是陵暴也不教而責成功虐也已此三者然後刑可即也即就已止書曰義刑義殺勿庸以即予維曰未有順事言先教也書康誥言周公命康叔使以義刑義殺勿用以就汝之心不使任其喜怒也維刑殺皆以義猶自謂未有使人可順守之事故有抵犯者自責其教之不至也故先王既陳之以道上先服之服行也謂先自行之然後教之若不可尚賢以綦之若不可廢不能以單之綦極也謂優寵也單盡也盡謂黜削單或為殫綦三年而百姓徃矣百姓從化極不過三年也邪民不從然後俟之以刑則民知罪矣百姓既徃然後誅其奸邪詩曰尹氏大師維周之氐秉國之均四方是維天子是庳卑民不迷詩小雅節南山之篇氐本也庳讀為毗輔也卑讀為俾是以威厲而不試刑錯而不用此之謂也厲抗也試亦用也但抗其威而不用也錯置也如置之於地不動也今之世則不然亂其教繁其刑其民迷惑而墮焉則從而制之是以刑彌繁而邪不勝三尺之岸而虛車不能登也百仞之山任負車登焉何則陵遲故也岸崖也負}
