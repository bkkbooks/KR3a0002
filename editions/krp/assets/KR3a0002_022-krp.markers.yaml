  - {type: variant, offset: 47, length: 6, content: 刋于台州當時, WYG: 以不從命有三從命則親危不從命則親安孝子不從命乃𠂻𠂻善也謂善發於𠂻心矣從命則親辱不從命則親榮孝子不從命乃義從命則禽獸不從命則脩飾孝子不從命乃敬從命則陷身於禽獸之行不從命則親}
  - {type: variant, offset: 54, length: 2, content: 一重, WYG: 脩飾君子不從命是乃敬親故可以從而不從是不子也未可以從而從是不𠂻也明於從不從之義而能致恭敬忠信端慤以愼行之則可謂大孝矣傳曰從道不從君從義不從父此之謂也故勞苦彫萃而能無失其敬彫傷也萃與顇同雖勞苦彫萃而不敢懈惰失敬也災禍患難而能無失其義則不幸不順見惡而能無失其愛不幸以不順於親而見惡也非仁人莫能行詩曰孝子不匱此之謂也魯哀}
