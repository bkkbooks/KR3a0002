  - {type: variant, offset: 57, length: 1, content: 案, WYG: 問於孔子曰子從父命孝乎臣從君命貞乎三問孔子不對不敢違哀公之意故不對孔子趨出以語子貢曰鄉}
  - {type: variant, offset: 59, length: 1, content: 顧, WYG: 君問丘曰子從父命孝乎臣從君命貞乎三問而丘不對賜以為何如子貢曰子從父命孝矣臣從君命貞矣夫子有奚對焉孔子曰小人哉賜不識也昔萬乘之國有爭臣四人則封疆不削千乘之國有爭臣三人則社稷不危百乘之家有爭臣二人則宗廟不毁父有爭子不行}
