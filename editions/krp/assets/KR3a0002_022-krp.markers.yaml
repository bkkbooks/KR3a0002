  - {type: variant, offset: 153, length: 7, content: 厥􅓸從島田篁村, WYG: 身不敬與辭不遜與色不順與古之人有言曰衣與繆與不女聊繆紕繆也與讀為歟聊頼也言雖與之衣而紕繆不精則不聊頼於汝也或曰繆綢也言雖衣服我綢繆我而不敬不順則不頼汝也韓詩外傳作衣子教子家語云人與已不順欺也王肅云人與已事實通不相欺也皆與此不同也今夙興夜寐耕耘樹藝手足胼胝以養其親無此三者則何以為而無孝之名也孔子曰由志之吾語汝雖有國士之力不能自舉其身非無力也勢不可也國士一國勇力之士故入而行不脩身之罪也出而名不章友之過也故君子入則篤行出則友賢何為而無孝之名也子路問於孔子曰魯大夫練而牀禮耶孔子曰吾不知也練小祥也禮語曰期而小祥居垔室寢有席又期而大祥居復寢中月而禫禫而牀也子路出謂子貢曰吾以夫子為無所不知夫子徒有所不知子貢曰汝何問哉子路曰由問魯大夫練而牀禮耶夫子曰吾不知也子貢曰吾將為汝問之子貢問曰練而牀禮耶孔子曰非禮也子貢出謂子路曰汝謂夫子為有所不知乎夫子徒無所不知汝問非也禮居是邑不非其大夫懼於訕上子路盛服}
