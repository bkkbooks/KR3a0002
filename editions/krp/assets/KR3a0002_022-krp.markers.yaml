  - {type: variant, offset: 287, length: 1, content: 作, WYG: 孔子是不然也孫卿迫於亂世鰌於嚴刑上無賢主下遇暴秦禮義不行教化不成仁者絀約天下冥冥行全刺之諸侯大傾當是時也知者不得慮能者不得治賢者不得使故君上蔽而無覩賢人距而不受然則孫卿將懐聖之心蒙佯狂之色視天下以愚詩曰既明且哲以保其身此之謂也是其所以名聲不白徒與不衆光輝不博也今之學者得孫卿之遺言餘教足以為天下法式表儀所存者神所遇者化觀其善行孔子弗過世不詳察云非聖人奈何天下不治孫卿不遇時也德}
