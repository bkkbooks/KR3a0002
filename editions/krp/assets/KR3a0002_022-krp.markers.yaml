  - {type: variant, offset: 257, length: 1, content: 因, WYG: 變而不窮辨乎萬物之情性者也辨别萬物之情性也大道者所以變化遂成萬物也情性者所以理然不取舍也辨情性乃能理是非之取舍而不惑是故其事大辨乎天地其事謂聖人所理化之事言辨别萬事如天地之别萬物各使區分也明察乎日月聖人之明察如日月總要萬物於風雨總要猶統領也風以動之雨以潤之言統領萬物如風雨之生成也繆繆肫肫其事不可循繆當為膠相加之貌莊子云膠膠擾擾肫與訰同雜亂之貌爾雅云訰訰亂也言聖人治萬物錯雜膠膠訰訰然而衆人不能循其事若天之嗣其事不可識嗣繼也言聖人如天之繼嗣衆人不能識其意百姓淺然不識其鄰鄰近也百姓淺見不能識其所近况能識其深乎所謂日用而不}
  - {type: page-break, offset: 257, content: '', id: KR3a0002_WYG_020-17a, image: WYG0695/WYG0695-0301c.png}
  - {type: variant, offset: 259, length: 0, content: '', WYG: 者也若此則可謂大聖矣哀公曰善魯哀公問舜冠於孔子孔子不對哀公不問舜德徒問其冠故不對也三問不對哀公曰寡人問舜冠於子何以不言也孔子對曰古之王者有務而拘領者矣其政好生而惡殺焉務讀為冒拘與句同曲領也言雖冠衣拙朴而行仁政也尚書大傳曰古之人衣上有冒而句領者鄭康成注云言在德不在服也古之人三皇時也冒覆項也句領繞頸也禮正服方領也是以鳳在列樹麟在郊野烏鵲之巢可俯而窺也君不此問而問舜冠所以不對也魯哀公問於孔子曰寡人生於深宫之中長於婦人之手寡人未嘗知哀也未嘗知憂也未嘗知勞也未嘗知懼也未嘗知危也孔子曰君之所問聖君之問也丘小人也何足以知之美大其問故謙不敢對也曰非吾子無所聞之也孔子曰君入廟門而右登自胙階仰視榱棟俛見几筵其器存其人亡君以此思哀則哀將焉不至矣謂祭祀時也胙與阼同榱亦椽也哀將焉不至言必至也君昧爽而櫛冠昧闇也爽明也謂初曉尚暗之時平明而聽朝一物不應亂之端也君以此思憂則憂將焉不至矣君平明而聽朝日昃而退諸侯之子孫必有在君之末庭者君以此思勞則勞將焉不至矣諸侯之子孫謂奔亡至魯而仕者自平明至日昃在末庭而修臣禮君若思其勞則勞可知也以喻哀公亦諸侯之子孫不戒懼修德亦將有此奔亡之勞也君出魯之四門以望魯四郊亡國之虚則必有數蓋焉虛讀為墟有數蓋焉猶言蓋有數焉倒言之耳新序作亡國之墟列必有數矣君以此思懼則懼將焉不至矣且丘聞之君者舟也庶人者水也水則載舟水則覆舟君以此思危則危將焉不至矣魯哀公問於孔子曰紳委章甫有益於仁乎紳大帶也委委貌周之冠也章甫殷冠也鄭注儀禮云委安也所以安正容貌章表明也殷質言所以表明大夫也孔子蹴然曰君號然也莊子音義崔譔云蹴然變色之貌號讀為胡聲相近字遂誤耳家語作君胡然也資衰苴杖者不聽樂非耳不能聞也服使然也資與齊同苴竹杖也苴謂蒼白色自死之竹也黼衣黻裳者不茹葷非口不能味也服使然也黼衣黻裳祭服也白與黒為黼黑與青為黻禮祭致齊不茹葷非不能味謂非不能知味也鄭注周禮司服云𤣥冕者衣裳刺繡而已且丘聞之好肆不守折長者不為市竊其有益與其無益君其知之矣好喜也言喜於市肆之人不使所守貨財折耗而長者亦不能為此市井盗􅀼之事長者不為市而販者不為非也家語王肅注云言市肆弗能為廉好肆則不折也人為市佔之行則不守折人為長者之行則亦不為市買之事竊宜為察察其有益與其無益以竊字屬下句魯哀公問於孔子曰請問取人問取人之術也孔子對曰無取健健羡之人無取詌未詳家語作無取鉗王肅云謂妄對不謹誠者或曰捷給鉗人之口者無取口啍啍與諄同方言云齊魯凡相疾惡謂之諄憎諄之閏反王肅云啍啍多言或曰詩云誨爾諄諄口諄謂口教誨心無誠實者諄諄論也健貪也詌亂也口啍誕也健羡之人多貪欲詌忌之人多悖亂讒疾之人多妄誕說苑曰哀公問於孔子曰人何若為可取也孔子曰無取拑者無取捷者無取口叡者拑者太給利不可盡用也捷者必兼人不可為法也口叡者多誕而寡信後恐不驗也韓詩外傳曰無取健無取佞無取口讒健驕也佞諂也口讒誕也皆大同而小異故弓調而後求勁焉馬服而後求良焉士信慤而後求知能焉士不信慤而有多知能譬之其犲狼也不可以身􅈛也有讀為又􅈛與邇同語曰桓公用其賊文公用其盗謂管仲寺人勃鞮也盗亦賊也以喻士信慤則仇讐可用不信慤則親戚可疎故明主任計不信怒闇主信怒不任計信亦任也計勝怒者彊怒勝計者亡定公問於顔淵曰東野子之善馭乎東野氏也馭與御同顔淵對曰善則善矣雖然其馬將失失讀為逸奔也下同家語作馬將佚也定公不恱入謂左右曰君子固讒人乎三日而校來謁之曰東野畢之馬失校人掌養馬之官也兩驂列兩服入廐兩服馬在中兩驂兩服之外馬列與裂同謂外馬擘裂中馬牽引而入廐定公越席而起曰趨駕召顔淵顔淵至趨讀為促速也定公曰前日寡人問吾子吾子曰東野畢之馭善則善矣雖然其馬將失不識吾子何以知之顔淵對曰臣以政知之昔舜巧於使民而造父巧於使馬舜不窮其民造父不窮其馬是舜無失民造父無失馬也今東野畢之馭上車執轡銜體正矣步驟馳騁朝禮畢矣銜體銜輿馬體也步驟馳騁盡禮畢矣謂調集其馬或步驟馳騁盡朝廷之禮也歷險致逺馬力盡矣然猶求馬不已是以知之也定公曰善可得少進乎定公更請少進其說顔淵對曰臣聞之鳥窮則啄獸窮則攫人窮則詐自古及今未有窮其下而能無危者也堯問第三十二堯問於舜曰我欲致天下為之奈何恐天下不歸故欲致而取之也對曰執一無失行微無怠忠信無倦而天下自來執一專意也行微行細微之事也言精專不怠而天下自歸不必致也執一如天地如天地無變易時也行微如日月日月之行人所不見似於細微安徐然而出無怠止之時也忠誠盛於内賁於外形於四海賁飾也形見也禮記曰富潤屋德潤身心廣體胖故君子必誠其意也天下其在一隅耶夫有何足致也夫物在一隅者則可舉而致之今有道天下盡歸不在於一隅焉用致也有讀為又魏武侯謀事而當羣臣莫能逮退朝而有喜色武侯晉大夫畢萬之後文侯之子也吳起進曰亦常有以楚莊王之語聞於左右者乎武侯曰楚莊王之語何如吳起對曰楚莊王謀事而當羣臣莫逮退朝而有憂色申公巫臣進問曰王朝而有憂色何也巫臣楚申邑大夫也莊王曰不榖謀事而當羣臣莫能逮是以憂也其在中蘬之言也中蘬與仲虺同湯左相也曰諸侯自為得師者王得友者霸得疑者存自為謀而莫已若者亡疑謂博聞達識或決疑惑者今以不榖之不肖而羣臣莫吾逮吾國幾於亡乎是以憂也楚莊王以憂而君以憙武侯逡巡再拜曰天使夫子振寡人之過也振舉}
