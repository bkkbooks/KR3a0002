  - {type: variant, offset: 161, length: 5, content: 影摹全部因, WYG: 孔子孔子曰由是裾裾何也裾裾衣服盛貌說苑作襜襜也昔者江出於岷山其始出也其源可以濫觴及其至江之津也不放舟不避風則不可涉也放讀為方國語曰方舟投附韋昭曰方並也編木為附說苑作方舟方附也詩云方之舟之非維下流水多耶維與唯同言豈不以下流水多故人畏之耶言盛服色厲亦然也說苑作非下衆水之多乎今汝服既盛顔色充盈天下且孰肯諫汝矣充盈猛厲也由}
  - {type: page-break, offset: 161, content: '', id: KR3a0002_WYG_020-10b, image: WYG0695/WYG0695-0298b.png}
