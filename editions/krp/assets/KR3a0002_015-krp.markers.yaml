  - {type: line-break, offset: 0, content: '', id: KR3a0002_SBCK_015-1a01}
  - {type: variant, offset: 0, length: 1517, content: 荀子卷第十五登仕郎守大理評事揚倞注解蔽篇第二十一一隅如有物壅蔽之者蔽者言不能通明滯於凡人之患蔽於一曲而闇於大理曲説是時各一曲一端之作此篇以解之蔽於異端曲説故治則復經兩疑則惑矣用禮義言治世道而疑蔽者爲是一本作兩則疑惑矣則自復經常之正道兩疑謂不知一於正天下無二道聖人無兩心今諸侯異政百家異説則必惑是惑非惑治惑亂亂國之君亂家之人此其誠心莫不求正而以自爲也妬繆於道而人誘其所迨也亂君亂人本亦求理以迨近也近謂所好也言若好儉則墨氏誘之好辯則惠氏誘之也其嫉妬迷繆於道故人因其所好而誘之謂私其所積唯恐聞其惡也習積倚其所私以觀異術唯恐聞其美也傍觀也言妬於異術也倚任也或曰偏倚也猶是以與治雖走而是已不輟也其所習妬繆於道雖與治走並馳治謂正道也旣私輟雖或作離並馳而自是不豈不蔽於一曲而失正求也哉心不使焉則白黒在前而目不見雷鼔在側而耳不聞況於使者乎者使役也以論不雷鼔大鼓聲如雷役心於異術豈復更聞正求哉役心於正道則自無聞見矣況乎德道之人德也有賢亂國之君非之上亂家之人非之下豈不哀哉故可哀也上下共非故爲蔽之端也數爲蔽欲爲蔽惡爲蔽始爲蔽終爲蔽逺爲蔽近爲蔽博爲蔽淺爲蔽古爲蔽今爲蔽一隅故皆爲蔽也此其所知所好滯於凡萬物異則莫不相爲蔽此心術之公患也異則相爲蔽公共也所好昔人君之蔽者夏桀殷紂是也桀蔽於末喜斯觀而不知關龍逄以惑其心而亂其行爲斟斟觀夏同姓國蓋其君當時爲桀末喜桀妃斯觀未聞韓侍郎云斯或當以末喜女焉賈侍中云有施喜姓國也佞臣也國語史蘇曰昔夏桀伐有施有施人紂蔽於妲己飛廉而不知微子啓以惑其心而亂其行子紂之庶兄微國子爵啓其名也國語曰殷紂伐有蘇有妲己紂妃飛廉紂之佞臣惡來之父善走者秦之祖也微中云有蘇己姓國也蘇氏以妲己女焉賈侍故羣臣去忠而事私百姓怨非而不用上用也非或爲誹事任也不用不爲賢良退處而隱逃此其所以喪九牧之地而虛宗廟之國也牧虛讀爲墟九牧九州之桀死於亭山本作鬲山案漢書亭山南巢之山或爲鬲傳寫又誤爲亭耳灊音潜地理志廬江有灊縣當是誤以灊紂縣於赤斾記史此云赤斾所傳聞異也武王斬紂頭縣於大白旗身不先知人又莫之諌此蔽塞之禍也成湯鑒於夏桀故主其心而愼治之邪佞所惑也主其心言不爲是以能長用伊尹而身不失道此其所以代夏王而受九有也文王監於殷紂故主其心而慎治之是以能長用呂望而身不失道此其所以代殷王而受九牧也則謂之九有養其民則謂之九九有九牧皆九州也撫有其地牧逺方莫不致其珍故目視備色耳聽備聲口食備味形居備宫名受備號生則天下歌死則四海哭夫是之謂至盛詩曰鳳凰秋秋其翼若干其聲若蕭有鳳有凰樂帝之心此不蔽之福也雌凰秋秋猶蹌蹌蹌逸詩也爾雅鶠鳳其堯能用賢不蔽天下和平故有鳳凰來儀之福也蹌謂舞也干楯也此帝蓋謂堯也堯時鳳凰巢於阿閣言昔人臣之蔽者唐鞅奚齊是也王之臣吕唐鞅宋康子論衡曰宋王問唐鞅曰吾殺戮甚衆而羣臣愈不畏何氏春秋曰宋康王染於唐鞅田不禋奚齊晋獻公驪姬之也不若無辨其善一時罪之則羣臣畏矣宋王從之也對曰王罰不善者善者胡爲畏王少欲羣臣之畏唐鞅蔽於欲權而逐載子王者見孟子或曰戴子戴驩也載讀爲戴戴不勝使薛居州傅門者謹爲我司之使者報曰不見輜車見有奉笥而與李史史韓子曰戴驩爲宋太宰夜使人曰吾聞有數夜乘輜車之李史據其時代當是戴驩也蓋為唐鞅所逐奔齊也受笥又戴驩謂齊王曰王大仁於薛公大不忍人奚齊蔽於欲國而罪申生譛獻公殺之春秋穀梁傳曰晉里克弑其申生晋獻公之太子奚齊之兄為驪姬所子也不正其殺太子申生而立也君之子奚齊其君之子云者國人不唐鞅戮於宋奚齊戮於晉逐賢相而罪孝兄身爲刑戮然而不知此蔽塞之禍也故以貪鄙背叛爭權而不危辱滅亡者自古及今未甞有之也鮑叔寗戚隰朋仁知且不蔽故能持管仲而名利福禄與管仲齊翼也持扶召公吕望仁知且不蔽故能持周公而名利福禄與周公齊傳曰知賢之謂明輔賢之謂能勉之彊之其福必長此之謂也此不蔽之福也言必勉之勉之彊之, WYG: ''}
