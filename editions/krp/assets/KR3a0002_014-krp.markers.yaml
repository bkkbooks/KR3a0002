  - {type: variant, offset: 1627, length: 0, content: '', WYG: 欽定四庫全書荀子卷十五唐楊倞註解蔽篇第二十一蔽者言不能通明滯於一隅如有物壅蔽之也凡人之患蔽於一曲而闇於大理一曲一端之曲説是時各蔽於異端曲説故作此篇以觧之治則復經兩疑則惑矣言治世用禮義則自復經常之正道兩疑謂不知一於正道而疑蔽者為是一本作兩則疑惑矣天下無二道聖人無兩心今諸侯異政百家異説則必或是或非或理或亂亂國之君亂家之人此其誠心莫不求正而以自為也妬繆於道而人誘其所迨也迨近也近謂所好也言亂君亂人本亦求理以其嫉妬迷繆於道故人因其所好而誘之謂若好險則墨氏誘之好辯則惠氏誘之也私其所積唯恐聞其惡也積習倚其所私以觀異術唯恐聞其羙也倚任也或曰偏倚也猶傍觀也言妬於異術也是以與治雖走而是已不輟也走並馳治謂正道也既私其所習妬繆於道雖與治並馳而自是不輟雖或作離豈不蔽於一曲而失正求也哉心不使焉則白黒在前而目不見雷鼔在側而耳不聞况於使者乎雷鼔大鼓聲如雷者使役也以論不役心於正道則自無聞見矣况乎役心於異術豈復更聞正求哉德道之人有賢德也亂國之君非之上亂家之人非之下豈不哀哉上下共非故可哀也數為蔽數為蔽之端也欲為蔽惡為蔽始為蔽終為蔽逺為蔽近為蔽博為蔽淺為蔽古為蔽今為蔽此其所知所好滯於一隅故皆為蔽凡萬物異則莫不相為蔽此心術之公患也公共也所好異則相為蔽昔人君之蔽者夏桀殷紂是也桀蔽於末喜斯觀而不知關龍逄以惑其心而亂其行末喜桀妃斯觀未聞韓侍郎云斯或當為斟斟觀夏同姓國喜其君當時為桀佞臣也國語史蘇曰昔夏桀伐有施有施人以末喜女焉賈侍中云有施喜姓國也紂蔽於妲己飛廉而不知微子啓以惑其心而亂其行妲己紂妃飛廉紂之佞臣惡來之父善走者秦之祖也微子紂之庶兄微國子爵啓其名也國語曰殷紂伐有蘇有蘇以妲己女焉賈侍中云有蘇紀姓之國也故羣臣去忠而事私百姓怨非而不用事任也不用不為上用也非或為誹賢良退處而隱逃此其所以䘮九牧之地而虛宗廟之國也九牧九州之牧虛讀為墟桀死於亭山亭山南巢之山或本作鬲山案漢書地理志廬江有􅈞縣當是誤以􅈞為鬲傳冩又誤為亭􅈞音潜紂縣於赤斾史記武王斬紂頭縣於太白旗此云赤斾所傳聞異也身不先知又莫之諌此蔽塞之禍也成湯鑒於夏桀故主其心而愼治之主其心言不為邪佞所惑是以能長用伊尹而身不失道此其所以代夏王而受九有也文王鑒於殷紂故主其心而慎治之是以能長用呂望而身不失道此其所以代殷王而受九牧也九有九牧皆九州也撫有其地則謂之九有養其民則謂之九牧逺方莫不致其珍故目視備色耳聽備聲口食備味形居備宫名受備號生則天下歌死則四海哭夫是之謂至盛詩曰鳳凰秋秋其翼若干其聲若簫有鳳有凰樂帝之心此不蔽之福也逸詩也爾雅鶠鳳其雌凰秋秋猶蹌蹌蹌蹌謂舞也干楯也此帝盖謂堯也堯時鳳凰巢於阿閣言堯能用賢不蔽天下和平故有鳳凰來儀之福也昔人臣之蔽者唐鞅奚齊是也唐鞅宋康王之臣吕氏春秋曰宋康王染於唐鞅田不禋奚齊晋獻公驪姬之子論衡云宋王問唐鞅曰吾殺戮甚衆而羣臣愈不畏何也對曰王罰不善者善者胡為畏王少欲羣臣之畏也不若無辨其善與不善一時罪之則羣臣畏矣宋王從之唐鞅蔽於欲權而逐載子載讀為戴戴不勝使薛居州傅王者見孟子或曰戴子戴驩也韓子曰戴驩為宋太宰夜使人曰吾聞有數夜乘輜車之李使門者謹為我司之使者報曰不見輜車見有奉笥而與李史史受笥又戴驩謂齊王曰王大仁於薛公大不忍人據其時代當是戴驩也盖為唐鞅所逐奔齊也奚齊蔽於欲國而罪申生申生晋獻公之太子奚齊之兄為驪姬所譛獻公殺之春秋穀梁傳曰晉里克弑其君之子奚齊其君之子云者國人不子也不正其殺太子申生而立之也唐鞅戮於宋奚齊戮於晉逐賢相而罪孝兄身為刑戮然而不知此蔽塞之禍也故以貪鄙背叛争權而不危辱滅亡者自古及今未嘗有之也鮑叔寗戚隰朋仁智且不蔽故能持管仲而名利福禄與管仲齊持扶翼也召公吕望仁智且不蔽故能持周公而名利福禄與周公齊傳曰知賢之謂明輔賢之謂彊勉之彊之其福必長此之謂也此不蔽之福也勉之彊之言必勉彊於知賢輔賢然後其福長也彊直亮反昔賔孟之蔽者亂家是也賔孟周景王之佞臣立王子朝者亂家謂亂周之家事使庶孽争位也墨子蔽於用而不知文欲使上下勤力股無肢脛無毛而不知貴賤等級之文飾也宋子蔽於欲而不知得宋子以人之情欲寡而不欲多但任其所欲則自治也蔽於此説而不知得欲之道也慎子蔽於法而不知賢慎子本黄老歸刑名多明不尚賢不使能之道故其説曰多賢不可以多君無賢不可以無君其意但明得其法雖無賢亦可為治而不知法待賢而後舉也申子蔽於勢而不知知申子名不害河南京縣人韓昭侯相也其説但賢得權勢以刑法馭下而不知權勢待才智然後治亦與慎子意同下知音智惠子蔽於辭而不知實惠子蔽於虛辭而不知實理虚辭謂}
