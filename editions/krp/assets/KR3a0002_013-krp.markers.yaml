  - {type: variant, offset: 0, length: 360, content: 荀子卷第十三登仕郎守大理評事揚倞注禮論篇第十九在論議之中於文爲比舊目録第二十三今升禮起於何也曰人生而有欲欲而不得則不能無求求而無度量分界則不能不爭問反分扶爭則亂亂則窮無所出窮謂計先王惡其亂也故制禮義以分之以養人之欲給人之求然後有分求可給欲可養使欲必不窮乎物物必不屈於欲兩者相持而長是禮之所以起也之立中道故爲屈竭也先王爲持故能長久是禮所起之本意也不盡於物物不竭於欲欲與物相扶故禮者養也芻豢稻粱五味調香所以養口也椒蘭芬芳所以養鼻也彫琢刻鏤黼黻文章所以養目也鍾鼓管磬琴瑟竽笙所以養耳也䟽房檖䫉越席牀第几筵所以養體也䟽房通䟽通也宮室尊嚴之名或曰貌讀爲邈言屋宇深䆳𬗟邈也第牀棧明之房也䫉古貌字檖䫉未詳或曰檖讀爲䆳貌廟也廟者所重司馬貞曰疏䆫也也越席剪蒲席也古人故禮者養也君子既得其養又好其别曷謂别曰貴賤有等長㓜有差貧富輕重皆有稱者也, WYG: ''}
