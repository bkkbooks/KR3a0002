  - {type: variant, offset: 0, length: 327, content: 荀子卷第三登仕郎守大理評事揚倞注非相篇第五多以此惑世時人或矜其狀貌而忽於務實相視也視其骨狀以知吉凶貴賤也妄誕者刑法家有相人二十四篇故荀卿作此篇非之漢書相人古之人無有也學者不道也說道古者有姑布子卿襄子者或本無姑字姑布姓子卿名相趙今之世梁有唐舉蔡澤者相李兊相人之形狀顔色而知其吉凶妖祥世俗稱之古之人無有也學者不道也深非之也再三言者故相形不如論心論心不如擇術術也術道形不勝心心不勝術術正而心順則形相雖惡而心術善無害爲君子也形相雖善而心術惡無害爲小人也君子之謂吉小人之謂凶故長短小大善惡形相非吉凶也古之人無有也學者不道也蓋帝堯長帝舜短文王長周公短仲尼長子弓短馯臂字子弓江東人受易者也然馯臂傳易之外子弓蓋仲弓也言子者著其爲師也漢書儒林傳夫稱公白公亦是也微細也葉音攝, WYG: ''}
