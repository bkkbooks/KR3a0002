  - {type: variant, offset: 0, length: 562, content: 荀子卷第九登仕郎守大理評事揚倞注臣道篇第十三人臣之論之善惡論人臣有態臣者有篡臣者有功臣者有聖臣者在下解並内不足使一民外不足使拒難百姓不親諸侯不信然而巧敏佞說作㣞音恱或善取寵乎上是態臣者也佞以容態媚爲上不忠乎君下善取譽乎民不䘏公道通義朋黨比周以環主圖私爲務是篡臣者也圖謀也篡臣者篡奪君政也環主環繞其主不使賢臣得用内足使以一民外足使以拒難民親之士信之上忠乎君下愛百姓而不倦是功臣者也然後立功民親士信也上則能尊君下則能愛民政令敎化刑下如景影之隨形動而輙隨不使違越也刑制也言施政令敎化以制其下如應卒遇變齊給如響卒變人所遲疑今聖臣應之疾速如響齊疾也給供給也應事而至謂之給夫蒼忽反之應聲卒推類接譽以待無方曲成制象是聖臣者也聲譽言見其本而知其末也待之無常謂不滯於此明應卒遇變之意無方無常也推其比類接其曲法不苟而行之也聖者無所不通之謂也一隅也委曲皆成制度法象言物至而應無非故用聖臣者王用功臣者彊用篡臣者危用態臣者亡態臣用則必死篡臣用則必危甚於篡臣此言態臣之人深欲戒之故極言也者蓋當時之多用佞媚變詐功臣用則必榮聖臣用則必尊故齊之蘇秦於齊故曰齊之蘇秦蘇秦初相趙後仕燕終死楚之州侯州侯右夏侯輦從鄢陵君與壽陵君載方府之楚襄王佞臣也戰國䇿莊辛諫襄王曰君王左内而投已乎黽塞之外韓子曰州侯相荆貴而荆王疑之因問金與之馳騁乎雲夢之中不知穰侯受令乎秦王塡黽塞之, WYG: ''}
