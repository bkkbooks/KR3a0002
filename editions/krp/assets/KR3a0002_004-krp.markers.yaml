  - {type: variant, offset: 0, length: 2704, content: 荀子卷第四登仕郎守大理評事揚倞儒效篇第八也效功大儒之效武王崩成王幼周公屏成王而及武王以屬天下惡天下之倍周也繼屬續屏蔽及欲反也屬之履天下之籍之圖籍也籍謂天下聽天下之斷偃然如固有之而天下不稱貪焉固有之謂如偃然猶安然此位也固合有殺管叔虚殷國而天下不稱戾焉讀虚遷殷頑民于洛邑朝歌爲墟也爲墟戾暴也墟殷國謂殺武庚兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉之國者十有五人姬姓之國者四十人皆舉親也與此數左氏傳成鱄對魏獻子曰昔武王克商光有天下其兄弟建親戚以蕃周室管蔡郕霍魯衛毛耼郜雍曹滕畢原鄷郇略同言四十人蓋舉成數又曰昔周公弔二叔之不咸故封胙祭周公之胤也餘國名淺學難盡詳究文之昭也䢴晉應韓武之穆也凡蒋邢茅教誨開導成王使諭於道而能揜迹於文武通導逹揜開導謂開也襲周公歸周黒肩蓋其後也言周公自歸其國也周公所封畿内之國亦名周春秋周公反籍於成王而天下不輟事周然而周公北面而朝之臣明攝政非為已也待其固安之後北面為天子也者不可以少當也當此位也不可少頃不可以假攝為也頃假攝天子周公所以少以安周室也之位蓋權宜能則天下歸之不能則天下去之是以周公屏成王而及武王以屬天下惡天下之離周也成王冠成人周公歸周反籍焉明不滅主之義也周公無天下矣郷有天下今無天下非擅也禪同言非禪譲與成郷讀為向下同擅與也王成王郷無天下今有天下非奪也變勢次序節然也序之期如此也節期也權變次故以枝代主而非越也弟故曰枝主成王也枝枝子周公武王之以弟誅兄而非暴也周公之兄也謂殺管叔管叔君臣易位而非不順也然故易位時不得不不順非為因天下之和遂文武之業明枝主之義抑亦變化矣天下厭然猶一也貌一渉反厭然順從之非聖人莫之能為夫是謂大儒之效秦昭王問孫卿子曰儒無益於人之國宣漢以荀卿爲孫卿也帝名詢劉向編録故孫卿子曰儒者法先王隆禮義謹乎臣子而致貴其上者也謂使不敢謹乎臣子極也為非致人主用之則勢在本朝而宜權勢在本言儒者得合宜也朝則事皆不用則退編百姓而慤必為順下矣勃亂也必不為雖窮困凍餧必不以邪道為貪無置錐之地而明於持社稷之大義嗚呼而莫之能應然而通乎財萬物養百姓之經紀亦不怠惰困弃常通於裁萬物養百姓之綱紀也嗚呼嘆辭也財與裁同雖嘆其莫已知無應之者而勢在人上則王公之材也為人君也在人之上謂在人下則社禝之臣國君之寳也雖隱於窮閻漏屋人莫不貴之道誠存也也漏屋敝屋漏雨者也窮閻窮僻之處閻里門仲尼将為魯司寇寇也魯司沈猶氏不敢朝飲其羊公愼氏出其妻慎潰氏踰境而徙魯皆不制慎潰氏奢侈踰法魯之粥六畜者飾之以詣賈人家語曰沈猶氏常朝飲其羊以詐市人公慎氏妻淫魯之粥牛馬者不豫賈必蚤正以待之也定為豫賈正其身以待物故得從化如此賈讀為價高價也粥牛馬者不敢高價言仲尼必先居於闕黨闕黨之子弟罔不分有親者取多閒居闕黨居謂孔子均之中有父母者取其多也之子弟罔不分均有無於分孝弟以化之也以孝弟由孔子之化儒者在夲朝則美政在下位則美俗儒之為人下如是矣王曰然則其為人上何如孫卿曰其為人上也廣大矣志意定乎内禮節脩乎朝法則度量正乎官忠信愛利形乎下形見也官百官行一不義殺一無罪而得天下不為也此君子義信乎人矣通於四海則天下應之如讙讙讙喧也言聲齊應之也以君義通於四海故應之如是何也則貴名白而天下治也可貴白明顯貴名謂儒名故近者歌謳而樂之逺者竭蹶而趨之倒也逺竭蹶顚如不及然者顚倒趨之四海之内若一家通逹之屬莫不從服夫是之謂人師通之處也師長也言儒者之功通逹之屬謂舟車所至人力所為人師長也如此故可以詩曰自西自東自南自北無思不服此之謂也此以明天下皆歸之也詩大雅文王有聲之篇引夫其為人下也如彼其為人上也如此何謂其無益於人之國也昭王曰善先王之道仁人隆也比中而行之謂儒學仁先王之道詭異之説不高不下使賢不肖皆可及也人之所崇高也以其比類中道而行之不為曷謂中曰禮義是也道者非天之道非地之道人之所以道也怪異之事是人所行之道也重説先王之道非隂陽山川君子之所道也君子之所謂賢者非能徧能人之所能之謂也君子之所謂知者非能徧知人之所知之謂也君子之所謂辨者非能徧辨人之所辨之謂也君子之所謂察者非能徧察人之所察之謂也有所正矣徧能或曰正當苟得其正不必於禮義也為止言止相高下視墝肥序五種君子不如農人稷豆麥麻序謂不失次序各當土冝也相視也高下原隰也墝薄田也五種黍通財貨相美惡辨貴賤君子不如賈人其貴賤也賈與估視貨物之美惡辨同設䂓矩陳繩墨便備用君子不如工人巧便於備用便備用謂精不䘏是非然不然之情以相薦撙以相恥怍君子不若惠施鄧析也謂相蹈薦藉也陵駕也怍慙也藉撙抑皆謂相若夫謫徳而定次度其徳而定位次謫與商同古字商其徳故下亦有決徳而定次也本或亦多作譎譎與决同謂斷決量能而授官使賢不肖皆得其位能不能皆得其官當其才任使各萬物得其宜事變得其應慎墨不得進其談惠施鄧析不敢竄其察二子之察無竄隠匿也言子皆識也所逃匿君言必治當事必當務是然後君子之所長也凡事行有益於治者立之孟反行下無益於理者廢之夫是之謂中事几知説有益於理者為之無益於理者舎之夫是之謂中説行事失中謂之姦事知説失中謂之姦道姦事姦道治世之所弃而亂世之所從服也若夫充虚之相施易也曰移易謂使充實也施讀虚者實實者虚堅白同異之分隔也分别隔異同異已解以堅白同異之言相也上是聦耳之所不能聽也明目之所不能見也辯士之所不能言也雖有聖人之知未能僂指也反公羊傳曰夫人不僂何休曰僂疾也齊人僂疾也言雖聖人亦不可疾速指陳僂力主也言不知無害為君子知之無損為小人工匠不知無害為巧君子不知無害為治大夫也君子卿王公好之則亂法百姓好之則亂事作業事謂而狂惑戇陋之人乃始率其羣徒辨其談説明其辟稱老身長子不知惡也稱尺證反身老戇愚也辟音譬不知惡之也子長言終身夫是之謂上愚然亦不免於愚故曰上愚有偏僻之見非昧然無知曾不如好相鷄狗之可以為名也之名尚不如有惠施鄧析之名也相鷄狗詩曰為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也蜮也則汝誠不可得見也姡然有面目女乃人也人相視無有詩小雅何人斯之篇毛云蜮短狐也靦姡也鄭云使汝為引此以喻狂惑之人也極時終必與女相見也我欲賤而貴愚而知貧而富可乎曰其唯學乎彼學者行之曰士也為士也士者脩立之彼為儒學者能行則稱敦慕焉君子也慕之敦厚知之聖人也於學也於知之謂通聖人無異也事皆通則與上為聖人下為士君子孰禁我哉使不為聖人士君子也為學之後則誰能禁我郷也混然涂之人也俄而並乎堯禹豈不賤而貴矣哉知之貎並混然無所涂與途同比也郷音向郷也效門室之辨混然曾不能決也别異猶不能決言所知淺也效白辨别也向者明白門室之俄而原仁義分是非圖回天下於掌上而辨白黒豈不愚而知矣哉言圖謀運轉天下之事如在掌上也原夲也謂知仁義之本圖謀也囘轉也郷也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉鏁相聮相繫漢書所謂鋃鐺者胥靡刑徒人也胥相靡繫也謂而服役之猶今囚徒以鏁連枷也也舉皆也顔師古曰聮繫使相隨今有人於此㞕然藏千溢之寳雖行貣而食人謂之富矣然㞕, WYG: ''}
