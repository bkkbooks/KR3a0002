body:
  text: 勸學篇第一君子曰學不可以已青取之於藍而青於藍冰水為之而寒於水木直中繩輮以為輪其曲中規雖有槁暴不復挺者輮使之然也故木受繩則直金就礪則利君子博學而日參省乎己則智明而行無過矣故不登高山不知天之高也不臨深谿不知地之厚也不聞先王之遺言不知學問之大也干越夷貉之子生而同聲長而異俗教使之然也詩曰嗟爾君子無恆安息靖共爾位好是正直神之聽之介爾景福神莫大於化道福莫長於無禍吾嘗終日而思矣不如須臾之所學也吾嘗跂而望矣不如登高之博見也登高而招臂非加長也而見者遠順風而呼聲非加疾也而聞者彰假輿馬者非利足也而致千里假舟楫者非能水也而絕江海君子生非異也善假於物也南方有鳥焉名曰蒙鳩以羽為巢而編之以髮繫之葦苕風至苕折卵破子死巢非不完也所繫者然也西方有木焉名曰射干莖長四寸生於高山之上而臨百仞之淵木莖非能長也所立者然也蓬生麻中不扶而直白沙在涅與之俱黑蘭槐之根是為芷其漸之滫君子不近庶人不服其質非不美也所漸者然也故君子居必擇鄉遊必就士所以防邪僻而近中正也物類之起必有所始榮辱之來必象其德肉腐生蟲魚栝生蠹怠慢忘身禍災乃作強自取柱柔自取束邪穢在身怨之所構施薪若一火就燥也平地若一水就溼也草木疇生禽獸群居物各從其類也是故質的張而弓矢至焉林木茂而斧斤至焉樹成蔭而眾鳥息焉醯酸而蜹聚焉故言有召禍也行有招辱也君子慎其所立乎積土成山風雨興焉積水成淵蛟龍生焉積善成德而神明自得聖心備焉故不積蹞步無以至千里不積小流無以成江海騏驥一躍不能十步駑馬十駕功在不舍鍥而舍之朽木不折鍥而不舍金石可鏤蚯螾無爪牙之利筋骨之強上食埃土下飲黃泉用心一也蟹六跪而二螯非蛇蟺之穴無可寄託者用心躁也是故無冥冥之志者無昭昭之明無惽惽之事者無赫赫之功行衢道者不至事兩君者不容目不能兩視而明耳不能兩聽而聰螣蛇無足而飛梧鼠五技而窮詩曰尸鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮故君子結於一也昔者瓠巴鼓瑟而流魚出聽伯牙鼓琴而六馬仰秣故聲無小而不聞行無隱而不形玉在山而草木潤淵生珠而崖不枯為善不積邪安有不聞者乎學惡乎始惡乎終曰其數則始乎誦經終乎讀禮其義則始乎為士終乎為聖人真積力久則入學至乎沒而後止也故學數有終若其義則不可須臾舍也為之人也舍之禽獸也故書者政事之紀也詩者中聲之所止也禮者法之大分群類之綱紀也故學至乎禮而止矣夫是之謂道德之極禮之敬文也樂之中和也詩書之博也春秋之微也在天地之閒者畢矣君子之學也入乎耳箸乎心布乎四體形乎動靜端而言蝡而動一可以為法則小人之學也入乎耳出乎口口耳之閒則四寸耳曷足以美七尺之軀哉古之學者為己今之學者為人君子之學也以美其身小人之學也以為禽犢故不問而告謂之傲問一而告二謂之囋傲囋非也君子如響矣學莫便乎近其人禮樂法而不說詩書故而不切春秋約而不速方其人之習君子之說則尊以徧矣周於世矣故曰學莫便乎近其人學之經莫速乎好其人隆禮次之上不能好其人下不能隆禮安特將學雜識志順詩書而已爾則沒世窮年不免為陋儒而已將原先王本仁義則禮正其經緯蹊徑也若挈裘領詘五指而頓之順者不可勝數也不道禮憲以詩書為之譬之猶以指測河也以戈舂黍也以錐飡壺也不可以得之矣故隆禮雖未明法士也不隆禮雖察辯散儒也問楛者勿告也告楛者勿問也說楛者勿聽也有爭氣者勿與辨也故必由其道至然後接之非其道則避之故禮恭而後可與言道之方辭順而後可與言道之理色從而後可與言道之致故未可與言而言謂之傲可與言而不言謂之隱不觀氣色而言謂之瞽故君子不傲不隱不瞽謹慎其身詩曰匪交匪舒天子所予此之謂也百發失一不足謂善射千里蹞步不至不足謂善御倫類不通仁義不一不足謂善學學也者固學一之也一出焉一入焉涂巷之人也其善者少不善者多桀紂盜跖也全之盡之然後學者也君子知夫不全不粹之不足以為美也故誦數以貫之思索以通之為其人以處之除其害者以持養之使目非是無欲見也使耳非是無欲聞也使口非是無欲言也使心非是無欲慮也及至其致好之也目好之五色耳好之五聲口好之五味心利之有天下是故權利不能傾也群眾不能移也天下不能蕩也生乎由是死乎由是夫是之謂德操德操然後能定能定然後能應能定能應夫是之謂成人天見其明地見其光君子貴其全也
