body:
  text: 法行篇第三十公輸不能加於繩墨聖人莫能加於禮禮者衆人法而不知聖人法而知之曾子曰無內人之疏而外人之親無身不善而怨人無刑已至而呼天內人之踈而外人之親不亦反乎身不善而怨人不亦遠乎刑已至而呼天不亦晚乎詩曰涓涓源水不雍不塞轂已破碎乃大其輻事已敗矣乃重大息其云益乎曾子病曾元持足曾子曰元志之吾語汝夫魚鱉黿鼉猶以淵為淺而堀穴其中鷹鳶猶以山為卑而增巢其上及其得也必以餌故君子苟能無以利害義則恥辱亦無由至矣子貢問於孔子曰君子之所以貴玉而賤珉者何也為夫玉之少而珉之多邪孔子曰惡賜是何言也夫君子豈多而賤之少而貴之哉夫玉者君子比德焉溫潤而澤仁也栗而理知也堅剛而不屈義也廉而不劌行也折而不橈勇也瑕適並見情也扣之其聲清揚而遠聞其止輟然辭也故雖有珉之雕雕不若玉之章章詩曰言念君子溫其如玉此之謂也曾子曰同遊而不見愛者吾必不仁也交而不見敬者吾必不長也臨財而不見信者吾必不信也三者在身曷怨人怨人者窮怨天者無識失之己而反諸人豈不亦迂哉南郭惠子問於子貢曰夫子之門何其雜也子貢曰君子正身以俟欲來者不距欲去者不止且夫良醫之門多病人隱栝之側多枉木是以雜也孔子曰君子有三恕有君不能事有臣而求其使非恕也有親不能報有子而求其孝非恕也有兄不能敬有弟而求其聽令非恕也士明於此三恕則可以端身矣孔子曰君子有三思而不可不思也少而不學長無能也老而不教死無思也有而不施窮無與也是故君子少思長則學老思死則教有思窮則施也
