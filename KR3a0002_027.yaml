body:
  text: 大略篇第二十七大略君人者隆禮尊賢而王重法愛民而霸好利多詐而危欲近四旁莫如中央故王者必居天下之中禮也天子外屏諸侯內屏禮也外屏不欲見外也內屏不欲見內也諸侯召其臣臣不俟駕顛倒衣裳而走禮也詩曰顛之倒之自公召之天子召諸侯輦輿就馬禮也詩曰我出我輿于彼牧矣自天子所謂我來矣天子山冕諸侯玄冠大夫裨冕士韋弁禮也天子御珽諸侯御荼大夫服笏禮也天子彫弓諸侯彤弓大夫黑弓禮也諸侯相見卿為介以其教士畢行使仁居守聘人以珪問士以璧召人以瑗絕人以玦反絕以環人主仁心設焉知其役也禮其盡也故王者先仁而後禮天施然也聘禮志曰幣厚則傷德財侈則殄禮禮云禮云玉帛云乎哉詩曰物其指矣唯其偕矣不時宜不敬交不驩欣雖指非禮也水行者表深使人無陷治民者表亂使人無失禮者其表也先王以禮表天下之亂今廢禮者是去表也故民迷惑而陷禍患此刑罰之所以繁也舜曰維予從欲而治故禮之生為賢人以下至庶民也非為成聖也然而亦所以成聖也不學不成堯學於君疇舜學於務成昭禹學於西王國五十不成喪七十唯衰存親迎之禮父南鄉而立子北面而跪醮而命之往迎爾相成我宗事隆率以敬先妣之嗣若則有常子曰諾唯恐不能敢忘命矣夫行也者行禮之謂也禮也者貴者敬焉老者孝焉長者弟焉幼者慈焉賤者惠焉賜予其宮室猶用慶賞於國家也忿怒其臣妾猶用刑罰於萬民也君子之於子愛之而勿面使之而勿貌導之以道而勿彊禮以順人心為本故亡於禮經而順人心者皆禮也禮之大凡事生飾驩也送死飾哀也軍旅飾威也親親故故庸庸勞勞仁之殺也貴貴尊尊賢賢老老長長義之倫也行之得其節禮之序也仁愛也故親義理也故行禮節也故成仁有里義有門仁非其里而處之非仁也義非其門而由之非義也推恩而不理不成仁遂理而不敢不成義審節而不和不成禮和而不發不成樂故曰仁義禮樂其致一也君子處仁以義然後仁也行義以禮然後義也制禮反本成末然後禮也三者皆通然後道也貨財曰賻輿馬曰賵衣服日禭玩好曰贈玉貝曰唅賻賵所以佐生也贈禭所以送死也送死不及柩尸弔生不及悲哀非禮也故吉行五十犇喪百里賵贈及事禮之大也禮者政之輓也為政不以禮政不行矣天子即位上卿進曰如之何憂之長也能除患則為福不能除患則為賊授天子一策中卿進曰配天而有下土者先事慮事先患慮患先事慮事謂之接接則事優成先患慮患謂之豫豫則禍不生事至而後慮者謂之後後則事不舉患至而後慮者謂之困困則禍不可禦授天子二策下卿進曰敬戒無怠慶者在堂弔者在閭禍與福鄰莫知其門豫哉豫哉萬民望之授天子三策禹見耕者耦立而式過十室之邑必下殺大蚤朝大晚非禮也治民不以禮動斯陷矣平衡曰拜下衡曰稽首至地曰稽顙大夫之臣拜不稽首非尊家臣也所以辟君也一命齒於鄉再命齒於族三命族人雖七十不敢先上大夫中大夫下大夫吉事尚尊喪事尚親君臣不得不尊父子不得不親兄弟不得不順夫婦不得不驩少者以長老者以養故天地生之聖人成之聘問也享獻也私覿私見也言語之美穆穆皇皇朝廷之美濟濟鎗鎗為人臣下者有諫而無訕有亡而無疾有怨而無怒君於大夫三問其疾三臨其喪於士一問一臨諸侯非問疾弔喪不之臣之家既葬君若父之友食之則食矣不辟粱肉有酒醴則辭寢不踰廟讌衣不踰祭服禮也易之咸見夫婦夫婦之道不可不正也君臣父子之本也咸感也以高下下以男下女柔上而剛下聘士之義親迎之道重始也禮者人之所履也失所履必顛蹶陷溺所失微而其為亂大者禮也禮之於正國家也如權衡之於輕重也如繩墨之於曲直也故人無禮不生事無禮不成國家無禮不寧和鸞之聲步中武象趨中韶護君子聽律習容而后出霜降逆女冰泮殺止內十日一御坐視膝立視足應對言語視面立視前六尺而六之六六三十六三丈六尺文貌情用相為內外表裏禮之中焉能思索謂之能慮禮者本末相順終始相應禮者以財物為用以貴賤為文以多少為異下臣事君以貨中臣事君以身上臣事君以人易曰復自道何其咎春秋賢穆公以為能變也士有妒友則賢交不親君有妒臣則賢人不至蔽公者謂之昧隱良者謂之妒奉妒昧者謂之交譎交譎之人妒昧之臣國之薉孽也口能言之身能行之國寶也口不能言身能行之國器也口能言之身不能行國用也口言善身行惡國祅也治國者敬其寶愛其器任其用除其祅不富無以養民情不教無以理民性故家五畝宅百畝田務其業而勿奪其時所以富之也立太學設庠序脩六禮明七教所以道之也詩曰飲之食之教之誨之王事具矣武王始入殷表商容之閭式箕子之囚哭比干之墓天下鄉善矣天下國有俊士世有賢人迷者不問路溺者不問遂亡人好獨詩曰我言維服勿用為笑先民有言詢于芻蕘言博問也有法者以法行無法者以類舉以其本知其末以其左知其右凡百事異理而相守也慶賞刑罰通類而後應致教習俗相順而後行八十者一子不事九十者舉家不事廢疾非人不養者一人不事父母之喪三年不事𪗋衰大功三月不事從諸侯不與新有昏朞不事子謂子家駒續然大夫不如晏子晏子功用之臣也不如子產子產惠人也不如管仲管仲之為人力功不力義力智不力仁野人也不可以為天子大夫孟子三見宣王不言事門人曰曷為三遇齊王而不言事孟子曰我先攻其邪心公行子之之燕遇曾元於塗曰燕君何如曾元曰志卑志卑者輕物輕物者不求助苟不求助何能舉氐羗之虜也不憂其係壘也而憂其不焚也利夫秋豪害靡國家然且為之幾為知計哉今夫亡箴者終日求之而不得其得之非目益明也眸而見之也心之於慮亦然義與利者人之所兩有也雖堯舜不能去民之欲利然而能使其欲利不克其好義也雖桀紂亦不能去民之好義然而能使其好義不勝其欲利也故義勝利者為治世利克義者為亂世上重義則義克利上重利則利克義故天子不言多少諸侯不言利害大夫不言得喪士不言通貨財有國之君不息牛羊錯質之臣不息鷄豚冢卿不脩幣施大夫不為場圃從士以上皆羞利而不與民爭業樂分施而恥積臧然故民不困財貧窶者有所竄其手矣文王誅四武王誅二周公卒業至成康則案無誅已多積財而羞無有重民任而誅不能此邪行之所以起刑罰之所以多也上好義則民闇飾矣上好富則民死利矣二者治亂之衢也民語曰欲富乎忍恥矣傾絕矣絕故舊矣與義分背矣上好富則人民之行如此安得不亂湯旱而禱曰政不節與使民疾與何以不雨至斯極也宮室榮與婦謁盛與何以不雨至斯極也苞苴行與讒夫興與何以不雨至斯極也天之生民非為君也天之立君以為民也故古者列地建國非以貴諸侯而已列官職差爵祿非以尊大夫而已主道知人臣道知事故舜之治天下不以事詔而萬物成農精於田而不可以為田師工賈亦然以賢易不肖不待卜而後知吉以治伐亂不待戰而後知克齊人欲伐魯忌卞莊子不敢過卞晉人欲伐衛畏子路不敢過蒲不知而問堯舜無有而求天府曰先王之道則堯舜已六貳之博則天府已君子之學如蛻幡然遷之故其行效其立效其坐效其置顏色出辭氣效無留善無宿問善學者盡其理善行者究其難君子立志如窮雖天子三公問正以是非對君子隘窮而不失勞倦而不苟臨患難而不忘茵席之言歲不寒無以知松柏事不難無以知君子無日不在是雨小漢故潛夫盡小者大積微者著德至者色澤洽行盡而聲問遠小人不誠於內而求之於外言而不稱師謂之畔教而不稱師謂之倍倍畔之人明君不內朝士大夫遇諸塗不與言不足於行者說過不足於信者誠言故春秋善胥命而詩非屢盟其心一也善為詩者不說善為易者不占善為禮者不相其心同也曾子曰孝子言為可聞行為可見言為可聞所以說遠也行為可見所以說近也近者說則親遠者說則附親近而附遠孝子之道也曾子行晏子從於郊曰嬰聞之君子贈人以言庶人贈人以財嬰貧無財請假於君子贈吾子以言乘輿之輪太山之木也示諸檃栝三月五月為幬菜敝而不反其常君子之檃栝不可不謹也慎之蘭茝槀本漸於蜜醴一佩易之正君漸於香酒可讒而得也君子之所漸不可不慎也人之於文學也猶玉之於琢磨也詩曰如切如瑳如琢如磨謂學問也和氏之璧井里之厥也玉人琢之為天下寶子贛季路故鄙人也被文學服禮義為天下列士學問不厭好士不倦是天府也君子疑則不言未問則不言道遠日益矣多知而無親博學而無方好多而無定者君子不與少不諷誦壯不論議雖可未成也君子壹教弟子壹學亟成君子進則能益上之譽而損下之憂不能而居之誣也無益而厚受之竊也學者非必為仕而仕者必如學子貢問於孔子曰賜倦於學矣願息事君孔子曰詩云溫恭朝夕執事有恪事君難事君焉可息哉然則賜願息事親孔子曰詩云孝子不匱永錫爾類事親難事親焉可息哉然則賜願息於妻子孔子曰詩云刑于寡妻至于兄弟以御于家邦妻子難妻子焉可息哉然則賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友難朋友焉可息哉然則賜願息耕孔子曰詩云晝爾于茅宵爾索綯亟其乘屋其始播百穀耕難耕焉可息哉然則賜無息者乎孔子曰望其壙皋如也嵮如也鬲如也此則知所息矣子貢曰大哉死乎君子息焉小人休焉國風之好色也傳曰盈其欲而不愆其止其誠可比於金石其聲可內於宗廟小雅不以於汙上自引而居下疾今之政以思往者其言有文焉其聲有哀焉國將興必貴師而重傅貴師而重傅則法度存國將衰必賤師而輕傅賤師而輕傅則人有快人有快則法度壞古者匹夫五十而士天子諸侯子十九而冠冠而聽治其教至也君子也者而好之其人也其人也而不教不祥非君子而好之非其人也非其人而教之齎盜糧借賊兵也不自嗛其行者言濫過古之賢人賤為布衣貧為匹夫食則饘粥不足衣則豎褐不完然而非禮不進非義不受安取此子夏家貧衣若縣鶉人曰子何不仕曰諸侯之驕我者吾不為臣大夫之驕我者吾不復見柳下惠與後門者同衣而不見疑非一日之聞也爭利如蚤甲而喪其掌君人者不可以不慎取臣匹夫不可以不慎取友友者所以相有也道不同何以相有也均薪施火火就燥平地注水水流溼夫類之相從也如此之箸也以友觀人焉所疑取友善人不可不慎是德之基也詩曰無將大車維塵冥冥言無與小人處也藍苴路作似知而非偄弱易奪似仁而非悍戇好鬭似勇而非仁義禮善之於人也辟之若貨財粟米之於家也多有之者富少有之者貧至無有者窮故大者不能小者不為是棄國捐身之道也凡物有乘而來乘其出者是其反者也流言滅之貨色遠之禍之所由生也生自纖纖也是故君子蚤絕之言之信者在乎區蓋之閒疑則不言未問則不言知者明於事達於數不可以不誠事也故曰君子難說說之不以道不說也語曰流丸止於甌臾流言止於知者此家言邪學之所以惡儒者也是非疑則度之以遠事驗之以近物參之以平心流言止焉惡言死焉曾子食魚有餘曰洎之門人曰洎之傷人不若奧之曾子泣涕曰有異心乎哉傷其聞之晚也無用吾之所短遇人之所長故塞而避所短移而從所仕䟽知而不法察辨而操辟勇果而亡禮君子之所憎惡也多言而類聖人也少言而法君子也多言無法而流喆然雖辨小人也國法禁拾遺惡民之串以無分得也有夫分義則容天下而治無分義則一妻一妾而亂天下之人唯各特意哉然而有所共予也言味者予易牙言音者予師曠言治者予三王三王既已定法度制禮樂而傳之有不用而改自作何異於變易牙之和更師曠之律無三王之法天下不待亡國不待死飲而不食者蟬也不飲不食者浮蝣也虞舜孝己孝而親不愛比干子胥忠而君不用仲尼顏淵知而窮於世劫迫於暴國而無所辟之則崇其善揚其美言其所長而不稱其所短也惟惟而亡者誹也博而窮者訾也清之而俞濁者口也君子能為可貴不能使人必貴己能為可用不能使人必用己誥誓不及五帝盟詛不及三王交質子不及五伯
