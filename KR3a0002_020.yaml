body:
  text: 樂論篇第二十夫樂者樂也人情之所必不免也故人不能無樂樂則必發於聲音形於動靜而人之道聲音動靜生術之變盡於是矣故人不能不樂樂則不能無形形而不為道則不能無亂先王惡其亂也故制雅頌之聲以道之使其聲足以樂而不流使其文足以辨而不𧪩使其曲直繁省廉肉節奏足以感動人之善心使夫邪汙之氣無由得接焉是先王立樂之方也而墨子非之奈何故樂在宗廟之中則君臣上下同聽之莫不和敬閨門之內則父子兄弟同聽之莫不和親鄉里族長之中則長少同聽之莫不和順故樂者審一以定和者也比物以飾節者也節奏合以成文足以率一道足以治萬變是先王立樂之術也而墨子非之奈何故聽其雅頌之聲而志意得廣焉執其干戚習其俯仰屈申而容貌得莊焉行其綴兆要其節奏而行列得正焉進退得齊焉故樂者出所以征誅也入所以揖讓也征誅揖讓其義一也出所以征誅則莫不聽從入所以揖讓則莫不從服故樂者天下之大齊也中和之紀也人情之所必不免也是先王立樂之術也而墨子非之奈何且樂者先王之所以飾喜也軍旅鈇鉞者先王之所以飾怒也先王之喜怒皆得其齊焉是故喜而天下和之怒而暴亂畏之先王之道禮樂正其盛者也而墨子非之故曰墨子之於道也猶瞽之於白黑也猶聾之於清濁也猶欲之楚而北求之也夫聲樂之入人也深其化人也速故先王謹為之文樂中平則民和而不流樂肅莊則民齊而不亂民和齊則兵勁城固敵國不敢嬰也如是則百姓莫不安其處樂其鄉以至足其上矣然後名聲於是白光暉於是大四海之民莫不願得以為師是王者之始也樂姚冶以險則民流慢鄙賤矣流慢則亂鄙賤則爭亂爭則兵弱城犯敵國危之如是則百姓不安其處不樂其鄉不足其上矣故禮樂廢而邪音起者危削侮辱之本也故先王貴禮樂而賤邪音其在序官也曰脩憲命審誅賞禁淫聲以時順脩使夷俗邪音不敢亂雅大師之事也墨子曰樂者聖王之所非也而儒者為之過矣君子以為不然樂者聖人之所樂也而可以善民心其感人深其移風易俗故先王導之以禮樂而民和睦夫民有好惡之情而無喜怒之應則亂先王惡其亂也故脩其行正其樂而天下順焉故齊衰之服哭泣之聲使人之心悲帶甲嬰䩜歌於行伍使人之心傷姚冶之容鄭衛之音使人之心淫紳端章甫舞韶歌武使人之心莊故君子耳不聽淫聲目不視女色口不出惡言此三者君子慎之凡姦聲感人而逆氣應之逆氣成象而亂生焉正聲感人而順氣應之順氣成象而治生焉唱和有應善惡相象故君子慎其所去就也君子以鍾鼓導志以琴瑟樂心動以干戚飾以羽毛從以磬管故其清明象天其廣大象地其俯仰周旋有似於四時故樂行而志清禮脩而行成耳目聰明血氣和平移風易俗天下皆寧美善相樂故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂故樂者所以道樂也金石絲竹所以道德也樂行而民鄉方矣故樂者治人之盛者也而墨子非之且樂也者和之不可變者也禮也者理之不可易者也樂合同禮別異禮樂之統管乎人心矣窮本極變樂之情也著誠去偽禮之經也墨子非之幾遇刑也明王以沒莫之正也愚者學之危其身也君子明樂乃其德也亂世惡善不此聽也於乎哀哉不得成也弟子勉學無所營也聲樂之象鼓天麗鍾統實磬廉制竽笙肅和筦籥發猛塤篪翁博瑟易良琴婦好歌清盡舞意天道兼鼓其樂之君邪故鼓似天鍾似地磬似水竽笙簫和筦籥似星辰日月鞉柷拊鞷椌楬似萬物曷以知舞之意曰目不自見耳不自聞也然而治俯仰詘信進退遲速莫不廉制盡筋骨之力以要鍾鼓俯會之節而靡有悖逆者眾積意謘謘乎孔子曰吾觀於鄉而知王道之易易也主人親速賓及介而眾賓皆從之至于門外主人拜賓及介而眾賓皆入貴賤之義別矣三揖至于階三讓以賓升拜至獻酬辭讓之節繁及其介省矣至于眾賓升受坐祭立飲不酢而降隆殺之義辨矣工入升歌三終主人獻之笙入三終主人獻之閒歌三終合樂三終工告樂備遂出二人揚觶乃立司正焉知其能和樂而不流也賓酬主人主人酬介介酬眾賓少長以齒終於沃洗者焉知其能弟長而無遺也降脫屨升坐脩爵無數飲酒之節朝不廢朝暮不廢夕賓出主人拜送節文終遂焉知其能安燕而不亂也貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者是足以正身安國矣彼國安而天下安故曰吾觀於鄉而知王道之易易也亂世之徵其服組其容婦其俗淫其志利其行雜其聲樂險其文章匿而采其養生無度其送死瘠墨賤禮義而貴勇力貧則為盜富則為賊治世反是也
