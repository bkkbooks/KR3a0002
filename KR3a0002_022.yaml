body:
  text: 正名篇第二十二後王之成名刑名從商爵名從周文名從禮散名之加於萬物者則從諸夏之成俗曲期遠方異俗之鄉則因之而為通散名之在人者生之所以然者謂之性性之和所生精合感應不事而自然謂之性性之好惡喜怒哀樂謂之情情然而心為之擇謂之慮心慮而能為之動謂之偽慮積焉能習焉而後成謂之偽正利而為謂之事正義而為謂之行所以知之在人者謂之知知有所合謂之智智所以能之在人者謂之能能有所合謂之能性傷謂之病節遇謂之命是散名之在人者也是後王之成名也故王者之制名名定而實辨道行而志通則慎率民而一焉故析辭擅作名以亂正名使民疑惑人多辨訟則謂之大姦其罪猶為符節度量之罪也故其民莫敢託為奇辭以亂正名故其民愨愨則易使易使則功其民莫敢託為奇辭以亂正名故壹於道法而謹於循令矣如是則其迹長矣迹長功成治之極也是謹於守名約之功也今聖王沒名守慢奇辭起名實亂是非之形不明則雖守法之吏誦數之儒亦皆亂若有王者起必將有循於舊名有作於新名然則所為有名與所緣以同異與制名之樞要不可不察也異形離心交喻異物名實玄紐貴賤不明同異不別如是則志必有不喻之患而事必有困廢之禍故知者為之分別制名以指實上以明貴賤下以辨同異貴賤明同異別如是則志無不喻之患事無困廢之禍此所為有名也然則何緣而以同異曰緣天官凡同類同情者其天官之意物也同故比方之疑似而通是所以共其約名以相期也形體色理以目異聲音清濁調竽奇聲以耳異甘苦鹹淡辛酸奇味以口異香臭芬鬱腥臊漏庮奇臭以鼻異疾養凔熱滑鈹輕重以形體異說故喜怒哀樂愛惡欲以心異心有徵知徵知則緣耳而知聲可也緣目而知形可也然而徵知必將待天官之當簿其類然後可也五官簿之而不知心徵之而無說則人莫不然謂之不知此所緣而以同異也然後隨而命之同則同之異則異之單足以喻則單單不足以喻則兼單與兼無所相避則共雖共不為害矣知異實者之異名也故使異實者莫不異名也不可亂也猶使同實者莫不同名也故萬物雖眾有時而欲徧舉之故謂之物物也者大共名也推而共之共則有共至於無共然後止有時而欲偏舉之故謂之鳥獸鳥獸也者大別名也推而別之別則有別至於無別然後止名無固宜約之以命約定俗成謂之宜異於約則謂之不宜名無固實約之以命實約定俗成謂之實名名有固善徑易而不拂謂之善名物有同狀而異所者有異狀而同所者可別也狀同而為異所者雖可合謂之二實狀變而實無別而為異者謂之化有化而無別謂之一實此事之所以稽實定數也此制名之樞要也後王之成名不可不察也見侮不辱聖人不愛己殺盜非殺人也此惑於用名以亂名者也驗之所以為有名而觀其孰行則能禁之矣山淵平情欲寡芻豢不加甘大鐘不加樂此惑於用實以亂名者也驗之所緣無以同異而觀其孰調則能禁之矣非而謁楹有牛馬非馬也此惑於用名以亂實者也驗之名約以其所受悖其所辭則能禁之矣凡邪說辟言之離正道而擅作者無不類於三惑者矣故明君知其分而不與辨也夫民易一以道而不可與共故故明君臨之以勢道之以道申之以命章之以論禁之以刑故其民之化道也如神辨埶惡用矣哉今聖人沒天下亂姦言起君子無埶以臨之無刑以禁之故辨說也實不喻然後命命不喻然後期期不喻然後說說不喻然後辨故期命辨說也者用之大文也而王業之始也名聞而實喻名之用也累而成文名之麗也用麗俱得謂之知名名也者所以期累實也辭也者兼異實之名以諭一意也辨說也者不異實名以喻動靜之道也期命也者辨說之用也辨說也者心之象道也心也者道之工宰也道也者治之經理也心合於道說合於心辭合於說正名而期質請而喻辨異而不過推類而不悖聽則合文辨則盡故以正道而辨姦猶引繩以持曲直是故邪說不能亂百家無所竄有兼聽之明而無奮矜之容有兼覆之厚而無伐德之色說行則天下正說不行則白道而不冥窮是聖人之辨說也詩曰顒顒卬卬如珪如璋令問令望愷悌君子四方為綱此之謂也辭讓之節得矣長少之理順矣忌諱不稱祅辭不出以仁心說以學心聽以公心辨不動乎眾人之非譽不冶觀者之耳目不賂貴者之權埶不利傳辟者之辭故能處道而不貳咄而不奪利而不流貴公正而賤鄙爭是士君子之辨說也詩曰長夜漫兮永思騫兮大古之不慢兮禮義之不愆兮何恤人之言兮此之謂也君子之言涉然而精俛然而類差差然而齊彼正其名當其辭以務白其志義者也彼名辭也者志義之使也足以相通則舍之矣苟之姦也故名之足以指實辭足以見極則舍之矣外是者謂之訒是君子之所棄而愚者拾以為己實故愚者之言芴然而粗嘖然而不類誻誻然而沸彼誘其名眩其辭而無深於其志義者也故窮藉而無極甚勞而無功貪而無名故知者之言也慮之易知也行之易安也持之易立也成則必得其所好而不遇其所惡焉而愚者反是詩曰為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側此之謂也凡語治而待去欲者無以道欲而困於有欲者也凡語治而待寡欲者無以節欲而困於欲多者也有欲無欲異類也生死也性之具也非治亂也欲之多寡異類也情之數也非治亂也欲不待可得而求者從所可欲不待可得所受乎天也求者從所可所受乎心也所受乎天之一欲制於所受乎心之多求固難類所受乎天也人之所欲生甚矣人之所惡死甚矣然而人有從生成死者非不欲生而欲死也不可以生而可以死也故欲過之而動不及心止之也心之所可中理則欲雖多奚傷於治欲不及而動過之心使之也心之所可失理則欲雖寡奚止於亂故治亂在於心之所可亡於情之所欲不求之其所在而求之其所亡雖曰我得之失之矣性者天之就也情者性之質也欲者情之應也以所欲以為可得而求之情之所必不免也以為可而道之知所必出也故雖為守門欲不可去雖為天子欲不可盡欲雖不可盡可以近盡也欲雖不可去求可節也所欲雖不可盡求者猶近盡欲雖不可去所求不得慮者欲節求也道者進則近盡退則節求天下莫之若也凡人莫不從其所可而去其所不可知道之莫之若也而不從道者無之有也假之有人而欲南無多而惡北無寡豈為夫南者之不可盡也離南行而北走也哉今人所欲無多所惡無寡豈為夫所欲之不可盡也離得欲之道而取所惡也哉故可道而從之奚以損之而亂不可道而離之奚以益之而治故知者論道而已矣小家珍說之所願皆衰矣凡人之取也所欲未嘗粹而來也其去也所惡未嘗粹而往也故人無動而不可以不與權俱衡不正則重縣於仰而人以為輕輕縣於俛而人以為重此人所以惑於輕重也權不正則禍託於欲而人以為福福託於惡而人以為禍此亦人所以惑於禍福也道者古今之正權離道而內自擇則不知禍福之所託易者以一易一人曰無得亦無喪也以一易兩人曰無喪而有得也以兩易一人曰無得而有喪也計者取所多謀者從所可以兩易一人莫之為明其數也從道而出猶以一易兩也奚喪離道而內自擇是猶以兩易一也奚得其累百年之欲易一時之嫌然且為之不明其數也有嘗試深觀其隱而難其察者志輕理而不外重物者無之有也外重物而不內憂者無之有也行離理而不外危者無之有也外危而不內恐者無之有也心憂恐則口銜芻豢而不知其味耳聽鍾鼓而不知其聲目視黼黻而不知其狀輕煖平簟而體不知其安故嚮萬物之美而不能嗛也假而得閒而嗛之則不能離也故嚮萬物之美而盛憂兼萬物之利而盛害如此者其求物也養生也粥壽也故欲養其欲而縱其情欲養其性而危其形欲養其樂而攻其心欲養其名而亂其行如此者雖封侯稱君其與夫盜無以異乘軒戴絻其與無足無以異夫是之謂以己為物役矣心平愉則色不及傭而可以養目聲不及傭而可以養耳蔬食菜羹而可以養口麤布之衣麤紃之履而可以養體局室蘆簾稾蓐尚机筵而可以養形故無萬物之美而可以養樂無埶列之位而可以養名如是而加天下焉其為天下多其私樂少矣夫是之謂重己役物無稽之言不見之行不聞之謀君子慎之
