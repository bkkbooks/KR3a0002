body:
  text: 榮辱篇第四憍泄者人之殃也恭儉者偋五兵也雖有戈矛之刺不如恭儉之利也故與人善言暖於布帛傷人以言深於矛戟故薄薄之地不得履之非地不安也危足無所履者也凡在言也巨涂則讓小涂則殆雖欲不謹若云不使快快而亡者怒也察察而殘者忮也博之而窮者訾也清之而俞濁者口也豢之而俞瘠者交也辨而不說者爭也直立而不見知者勝也廉而不見貴者劌也勇而不見憚者貪也信而不見敬者好剸行也此小人之所務而君子之所不為也鬭者忘其身者也忘其親者也忘其君者也行其少頃之怒而喪終身之軀然且為之是忘其身也家室立殘親戚不免乎刑戮然且為之是忘其親也君上之所惡也刑法之所大禁也然且為之是忘其君也憂忘其身內忘其親上忘其君是刑法之所不舍也聖王之所不畜也乳彘不觸虎乳狗不遠遊不忘其親也人也憂忘其身內忘其親上忘其君則是人也而曾狗彘之不若也凡鬭者必自以為是而以人為非也己誠是也人誠非也則是己君子而人小人也以君子與小人相賊害也憂以忘其身內以忘其親上以忘其君豈不過甚矣哉是人也所謂以狐父之戈钃牛矢也將以為智邪則愚莫大焉將以為利邪則害莫大焉將以為榮邪則辱莫大焉將以為安邪則危莫大焉人之有鬭何哉我欲屬之狂惑疾病邪則不可聖王又誅之我欲屬之鳥鼠禽獸邪則不可其形體又人而好惡多同人之有鬭何哉我甚醜之有狗彘之勇者有賈盜之勇者有小人之勇者有士君子之勇者爭飲食無廉恥不知是非不辟死傷不畏衆彊恈恈然惟利飲食之見是狗彘之勇者也為事利爭貨財無辭讓果敢而很猛貪而戾恈恈然唯利之見是賈盜之勇也輕死而暴是小人之勇也義之所在不傾於權不顧其利舉國而與之不為改視重死持義而不橈是士君子之勇也鯈䱁者浮陽之魚也胠於沙而思水則無逮矣挂於患而欲謹則無益矣自知者不怨人知命者不怨天怨人者窮怨天者無志失之己反之人豈不迂乎哉榮辱之大分安危利害之常體先義而後利者榮先利而後義者辱榮者常通辱者常窮通者常制人窮者常制於人是榮辱之大分也材愨者常安利蕩悍者常危害安利者常樂易危害者常憂險樂易者常壽長憂險者常夭折是安危利害之常體也夫天生蒸民有所以取之志意致修德行致厚智慮致明是天子之所以取天下也政令法舉措時聽斷公上則能順天子之命下則能保百姓是諸侯之所以取國家也志行修臨官治上則能順上下則能保其職是士大夫之所以取田邑也循法則度量刑辟圖籍不知其義謹守其數慎不敢損益也父子相傳以持王公是故三代雖亡治法猶存是官人百吏之所以取祿秩也孝弟願愨軥録疾力以敦比其事業而不敢怠傲是庶人之所以取暖衣飽食長生久視以免於刑戮也飾邪說文姦言為倚事陶誕突盜愓悍憍暴以偷生反側於亂世之閒是姦人之所以取危辱死刑也其慮之不深其擇之不謹其定取舍楛僈是其所以危也材性知能君子小人一也好榮惡辱好利惡害是君子小人之所同也若其所以求之之道則異矣小人也者疾為誕而欲人之信己也疾為詐而欲人之親己也禽獸之行而欲人之善己也慮之難知也行之難安也持之難立也成則必不得其所好必遇其所惡焉故君子者信矣而亦欲人之信己也忠矣而亦欲人之親己也修正治辨矣而亦欲人之善己也慮之易知也行之易安也持之易立也成則必得其所好必不遇其所惡焉是故窮則不隱通則大明身死而名彌白小人莫不延頸舉踵而願曰知慮材性固有以賢人矣夫不知其與己無以異也則君子注錯之當而小人注錯之過也故孰察小人之知能足以知其有餘可以為君子之所為也譬之越人安越楚人安楚君子安雅是非知能材性然也是注錯習俗之節異也仁義德行常安之術也然而未必不危也汙僈突盜常危之術也然而未必不安也故君子道其常而小人道其怪也凡人有所一同飢而欲食寒而欲暖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨白黑美惡而耳辨音聲清濁口辨酸鹹甘苦鼻辨芬芳腥臊骨體膚理辨寒暑疾養是又人之所常生而有也是無待而然者也是禹桀之所同也可以為堯禹可以為桀跖可以為工匠可以為農賈在勢注錯習俗之所積爾是又人之所生而有也是無待而然者也是禹桀之所同也為堯禹則常安榮為桀跖則常危辱為堯禹則常愈佚為工匠農賈則常煩勞然而人力為此而寡為彼何也曰陋也堯禹者非生而具者也夫起於變故成乎修修之為待盡而後備者也人之生固小人無師無法則唯利之見爾人之生固小人又以遇亂世得亂俗是以小重小也以亂得亂也君子非得勢以臨之則無由得開內焉今是人之口腹安知禮義安知辭讓安知廉恥隅積亦𠯍𠯍而噍鄉鄉而飽已矣人無師無法則其心正其口腹也今使人生而未嘗睹芻豢稻粱也唯菽藿糟糠之為睹則以至足為在此也俄而粲然有秉芻豢而至者則瞲然視之曰此何怪也彼臭之而無嗛於鼻嘗之而甘於口食之而安於體則莫不棄此而取彼矣今以夫先王之道仁義之統以相群居以相持養以相藩飾以相安固邪以夫桀跖之道是其為相縣也幾直夫芻豢稻粱之縣糟糠爾哉然而人力為此而寡為彼何也曰陋也陋也者天下之公患也人之大殃大害也故曰仁者好告示人告之示之靡之儇之鉛之重之則夫塞者俄且通也陋者俄且僩也愚者俄且知也是若不行則湯武在上曷益桀紂在上曷損湯武存則天下從而治桀紂存則天下從而亂如是者豈非人之情固可與如此可與如彼也哉人之情食欲有芻豢衣欲有文繡行欲有輿馬又欲夫餘財蓄積之富也然而窮年纍世不知不足是人之情也今人之生也方知畜雞狗豬彘又畜牛羊然而食不敢有酒肉餘刀布有囷窖然而衣不敢有絲帛約者有筐篋之藏然而行不敢有輿馬是何也非不欲也幾不長慮顧後而恐無以繼之故也於是又節用禦欲收斂畜藏以繼之也是於己長慮顧後幾不甚善矣哉今夫偷生淺知之屬曾此而不知也食太侈不顧其後俄則屈安窮矣是其所以不免於凍餓操瓢囊為溝壑中瘠者也況夫先王之道仁義之統詩書禮樂之分乎彼固天下之大慮也將為天下生民之屬長慮顧後而保萬世也其流長矣其溫厚矣其功盛姚遠矣非順孰修為之君子莫之能知也故曰短綆不可以汲深井之泉知不幾者不可與及聖人之言夫詩書禮樂之分固非庸人之所知也故曰一之而可再也有之而可久也廣之而可通也慮之而可安也反鉛察之而俞可好也以治情則利以為名則榮以群則和以獨則足樂意者其是邪夫貴為天子富有天下是人情之所同欲也然則從人之欲則勢不能容物不能贍也故先王案為之制禮義以分之使貴賤之等長幼之差知賢愚能不能之分皆使人載其事而各得其宜然後使穀祿多少厚薄之稱是夫群居和一之道也故仁人在上則農以力盡田賈以察盡財百工以巧盡械器士大夫以上至於公侯莫不以其仁厚知能盡官職夫是之謂至平故或祿天下而不自以為多或監門御旅抱關擊柝而不自以為寡故曰斬而齊枉而順不同而一夫是之謂人倫詩曰受小共大共為下國駿蒙此之謂也
