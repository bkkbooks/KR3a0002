body:
  text: 致士篇第十四衡聽顯幽重明退姦進良之術朋黨比周之譽君子不聽殘賊加纍之譖君子不用隱忌雍蔽之人君子不近貨財禽犢之請君子不許凡流言流説流事流謀流譽流訴不官而衡至者君子慎之聞聽而明譽之定其當而當然後出其刑賞而還與之如是則姦言姦説姦事姦謀姦譽姦訴莫之試也忠言忠説忠事忠謀忠譽忠訴莫不明通方起以尚盡矣夫是之謂衡聽顯幽重明退姦進良之術川淵深而魚鱉歸之山林茂而禽獸歸之刑政平而百姓歸之禮義備而君子歸之故禮及身而行修義及國而政明能以禮挾而貴名白天下願令行禁止王者之事畢矣詩曰惠此中國以綏四方此之謂也川淵者龍魚之居也山林者鳥獸之居也國家者士民之居也川淵枯則龍魚去之山林險則鳥獸去之國家失政則士民去之無土則人不安居無人則土不守無道法則人不至無君子則道不舉故土之與人也道之與法也者國家之本作也君子也者道法之揔要也不可少頃曠也得之則治失之則亂得之則安失之則危得之則存失之則亡故有良法而亂者有之矣有君子而亂者自古及今未嘗聞也傳曰治生乎君子亂生乎小人此之謂也得衆動天美意延年誠信如神夸誕逐魂人主之患不在乎言用賢而在乎不誠必用賢夫言用賢者口也卻賢者行也口行相反而欲賢者之至不肖者之退也不亦難乎夫耀蟬者務在明其火振其樹而已火不明雖振其樹無益也今人主有能明其德則天下歸之若蟬之歸明火也臨事接民而以義變應寬裕而多容恭敬以先之政之始也然後中和察斷以輔之政之隆也然後進退誅賞之政之終也故一年與之始三年與之終用其終為始則政令不行而上下怨疾亂所以自作也書曰義刑義殺勿庸以即汝惟曰未有順事言先教也程者物之準也禮者節之準也程以立數禮以定倫德以敘位能以授官凡節奏欲陵而生民欲寬節奏陵而文生民寬而安上文下安功名之極也不可以加矣君者國之隆也父者家之隆也隆一而治二而亂自古及今未有二隆爭重而能長久者師術有四而博習不與焉尊嚴而憚可以為師耆艾而信可以為師誦説而不陵不犯可以為師知微而論可以為師故師術有四而博習不與焉水深而回樹落則糞本弟子通利則思師詩曰無言不讎無德不報此之謂也賞不欲僭刑不欲濫賞僭則利及小人刑濫則害及君子若不幸而過寧僭無濫與其害善不若利淫
