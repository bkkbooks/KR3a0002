body:
  text: 君子篇第二十四天子無妻告人無匹也四海之內無客禮告無適也足能行待相者然後進口能言待官人然後詔不視而見不聽而聰不言而信不慮而知不動而功告至備也天子也者藝至重形至佚心至愈志無所詘形無所勞尊無上矣詩曰普天之下莫非王土率土之濱莫非王臣此之謂也聖王在上分義行乎下則士大夫無流淫之行百吏官人無怠慢之事衆庶百姓無姦怪之俗無盜賊之罪莫敢犯上之禁天下曉然皆知夫盜竊之不可以為富也皆知夫賊害之人不可以為壽也皆知夫犯上之禁不可以為安也由其道則人得其所好焉不由其道則必遇其所惡焉是故刑罪綦省而威行如流世曉然皆知夫為姦則雖隱竄逃亡之由不足以免也莫不服罪而請書曰凡人自得罪此之謂也故刑當罪則威不當罪則侮爵當賢則貴不當賢則賤古者刑不過罪爵不踰德故殺其父而臣其子殺其兄而臣其弟刑罰不怒罪爵賞不踰德分然各以其誠通是以為善者勸為不善者沮刑罰綦省而威行如流政令致明而化易如神傳曰一人有慶兆人賴之此之謂也亂世則不然刑罰怒罪爵賞踰德以族論罪以世舉賢故一人有罪而三族皆夷德雖如舜不免刑均是以族論罪也先祖當賢後子孫必顯行雖如桀紂列從必尊此以世舉賢也以族論罪以世舉賢雖欲無亂得乎哉詩曰百川沸騰山冢崒崩高岸為谷深谷為陵哀今之人胡憯莫懲此之謂也論法聖王則知所貴矣以義制事則知所利矣論知所貴則知所養矣事知所利則動知所出矣二者是非之本而得失之原也故成王之於周公也無所往而不聽知所貴也桓公之於管仲也國事無所往而不用知所利也吳有伍子胥而不能用國至乎亡倍道失賢也故尊聖者王貴賢者霸敬賢者存慢賢者亡古今一也故尚賢使能等貴賤分親疏序長幼此先王之道也故尚賢使能則主尊下安貴賤有等則令行而不流親疏有分則施行而不悖長幼有序則事業捷成而有所休故仁者仁此者也義者分此者也節者死生此者也忠者惇慎此者也兼此而能之備矣備而不矜一自善也謂之聖不矜矣夫故天下不與爭能而致善用其功有而不有也夫故為天下貴矣詩曰淑人君子其儀不忒其儀不忒正是四國此之謂也
