body:
  text: 正論篇第十八世俗之為說者曰主道利周是不然主者民之唱也上者下之儀也彼將聽唱而應視儀而動唱默則民無應也儀隱則下無動也不應不動則上下無以相胥也若是則與無上同也不祥莫大焉故上者下之本也上宣明則下治辨矣上端誠則下願愨矣上公正則下易直矣治辨則易一願愨則易使易直則易知易一則彊易使則功易知則明是治之所由生也上周密則下疑玄矣上幽險則下漸詐矣上偏曲則下比周矣疑玄則難一漸詐則難使比周則難知難一則不彊難使則不功難知則不明是亂之所由作也故主道利明不利幽利宣不利周故主道明則下安主道幽則下危故下安則貴上下危則賤上故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危故主道莫惡乎難知莫危乎使下畏己傳曰惡之者衆則危矣書曰克明明德詩曰明明在下故先王明之豈特玄之耳哉世俗之為說者曰桀紂有天下湯武篡而奪之是不然以桀紂為常有天下之籍則然親有天下之籍則不然天下謂在桀紂則不然古者天子千官諸侯百官以是千官也令行於諸夏之國謂之王以是百官也令行於境內國雖不安不至於廢易遂亡謂之君聖王之子也有天下之後也藝籍之所在也天下之宗室也然而不材不中內則百姓疾之外則諸侯叛之近者境內不一遙者諸侯不聽令不行於境內甚者諸侯侵削之攻伐之若是則雖未亡吾謂之無天下矣聖王沒有藝籍者罷不足以縣天下天下無君諸侯有能德明威積海內之民莫不願得以為君師然而暴國獨侈安能誅之必傷害無罪之民誅暴國之君若誅獨夫若是則可謂能用天下矣能用天下之謂王湯武非取天下也修其道行其義興天下之同利除天下之同害而天下歸之也桀紂非去天下也反禹湯之德亂禮義之分禽獸之行積其凶全其惡而天下去之也天下歸之之謂王天下去之之謂亡故桀紂無天下而湯武不弒君由此效之也湯武者民之父母也桀紂者民之怨賊也今世俗之為說者以桀紂為君而以湯武為弒然則是誅民之父母而師民之怨賊也不祥莫大焉以天下之合為君則天下未嘗合於桀紂也然則以湯武為弒則天下未嘗有說也直墮之耳故天子唯其人天下者至重也非至彊莫之能任至大也非至辨莫之能分至衆也非至明莫之能和此三至者非聖人莫之能盡故非聖人莫之能王聖人備道全美者也是縣天下之權稱也桀紂者其知慮至險也其至意至暗也其行之為至亂也親者疏之賢者賤之生民怨之禹湯之後也而不得一人之與刳比干囚箕子身死國亡為天下之大僇後世之言惡者必稽焉是不容妻子之數也故至賢疇四海湯武是也至罷不容妻子桀紂是也今世俗之為說者以桀紂為有天下而臣湯武豈不過甚矣哉譬之是猶傴巫跛匡大自以為有知也故可以有奪國不可以有奪人天下可以有竊國不可以有竊天下也可以奪之者可以有國而不可以有天下竊可以得國而不可以得天下是何也曰國小具也可以小人有也可以小道得也可以小力持也天下者大具也不可以小人有也不可以小道得也不可以小力持也國者小人可以有之然而未必不亡也天下者至大也非聖人莫之能有也世俗之為說者曰治古無肉刑而有象刑墨黥劓慅嬰共艾畢菲䋽屨殺赭衣而不純治古如是是不然以為治邪則人固莫觸罪非獨不用肉刑亦不用象刑矣以為人或觸罪矣而直輕其刑然則是殺人者不死傷人者不刑也罪至重而刑至輕庸人不知惡矣亂莫大焉凡刑人之本禁暴惡惡且徵其未也殺人者不死而傷人者不刑是謂惠暴而寬賊也非惡惡也故象刑殆非生於治古並起於亂今也治古不然凡爵列官職賞慶刑罰皆報也以類相從者也一物失稱亂之端也夫德不稱位能不稱官賞不當功罰不當罪不祥莫大焉昔者武王伐有商誅紂斷其首縣之赤旆夫征暴誅悍治之盛也殺人者死傷人者刑是百王之所同也未有知其所由來者也刑稱罪則治不稱罪則亂故治則刑重亂則刑輕犯治之罪固重犯亂之罪固輕也書曰刑罰世輕世重此之謂也世俗之為說者湯武不能禁令是何也曰楚越不受制是不然湯武者至天下之善禁令者也湯居亳武王居鄗皆百里之地也天下為一諸侯為臣通達之屬莫不振動從服以化順之曷為楚越獨不受制也彼王者之制也視形藝而制械用稱遠近而等貢獻豈必齊哉故魯人以榶衛人用柯齊人用一革土地刑制不同者械用備飾不可不異也故諸夏之國同服同儀蠻夷戎狄之國同服不同制封內甸服封外侯服侯衛賓服蠻夷要服戎狄荒服甸服者祭侯服者祀賓服者享要服者貢荒服者終王日祭月祀時享歲貢夫是之謂視形勢而制械用稱遠近而等貢獻是王者之制也彼楚越者且時享歲貢終王之屬也必齊之日祭月祀之屬然後曰受制邪是規磨之說也溝中之瘠也則未足與及王者之制也語曰淺不可與測深愚不足與謀知坎井之蛙不可與語東海之樂此之謂也世俗之為說者曰堯舜擅讓是不然天子者藝位至尊無敵於天下夫有誰與讓矣道德純備智惠甚明南面而聽天下生民之屬莫不振動從服以化順之天下無隱士無遺善同焉者是也異焉者非也夫有惡擅天下矣曰死而擅之是又不然聖王在上決德而定次量能而授官皆使民載其事而各得其宜不能以義制利不能以僞飾性則兼以為民聖王已沒天下無聖則固莫足以擅天下矣天下有聖而在後者則天下不離朝不易位國不更制天下厭然與鄉無以異也以堯繼堯夫又何變之有矣聖不在後子而在三公則天下如歸猶復而振之矣天下厭然與鄉無以異也以堯繼堯夫又何變之有矣唯其徙朝改制為難故天子生則天下一隆致順而治論德而定次死則能任天下者必有之矣夫禮義之分盡矣擅讓惡用矣哉曰老衰而擅是又不然血氣筋力則有衰若夫知慮取舍則無衰曰老者不堪其勞而休也是又畏事者之議也天子者藝至重而形至佚心至愈而志無所詘而形不為勞尊無上矣衣被則服五采雜閒色重文繡加飾之以珠玉食飲則重大牢而備珍怪期臭味曼而饋代睪而食雍而徹乎五祀執薦者百人侍西房居則設張容負依而坐諸侯趨走乎堂下出戶而巫覡有事出門而宗祀有事乘大路趨越席以養安側載睪芷以養鼻前有錯衡以養目和鸞之聲步中武象騶中韶護以養耳三公奉軛持納諸侯持輪挾輿先馬大侯編後大夫次之小侯元士次之庶士介而夾道庶人隱竄莫敢視望居如大神動如天帝持老養衰猶有善於是者不與老者休也休猶有安樂恬愈如是者乎故曰諸侯有老天子無老有擅國無擅天下古今一也夫曰堯舜擅讓是虛言也是淺者之傳陋者之說也不知逆順之理小大至不至之變者也未可與及天下之大理者也世俗之為說者曰堯舜不能教化是何也曰朱象不化是不然也堯舜者至天下之善教化者也南面而聽天下生民之屬莫不振動從服以化順之然而朱象獨不化是非堯舜之過朱象之罪也堯舜者天下之英也朱象者天下之嵬一時之瑣也今世俗之為說者不怪朱象而非堯舜也豈不過甚矣哉夫是之謂嵬說羿蜂門者天下之善射者也不能以撥弓曲矢中微王梁造父者天下之善馭者也不能以辟馬毀輿致遠堯舜者天下之善教化者也不能使嵬瑣化何世而無嵬何時而無瑣自太皞燧人莫不有也故作者不祥學者受其殃非者有慶詩曰下民之孽匪降自天噂沓背憎職競由人此之謂也世俗之為說者曰大古薄葬棺厚三寸衣衾三領葬田不妨田故不掘也亂今厚葬飾棺故掘也是不及知治道而不察於抇不抇者之所言也凡人之盜也必以有為不以備不足足則以重有餘也而聖王之生民也皆使富厚優猶不知足而不得以有餘過度故盜不竊賊不刺狗豕吐菽粟而農賈皆能以貨財讓風俗之美男女自不取於涂而百姓羞拾遺故孔子曰天下有道盜其先變乎雖珠玉滿體文繡充棺黃金充椁加之以丹矸重之以曾青犀象以為樹琅玕龍茲華覲以為實人猶且莫之抇也是何也則求利之詭緩而犯分之羞大也夫亂今然後反是上以無法使下以無度行知者不得慮能者不得治賢者不得使若是則上失天性下失地利中失人和故百事廢財物詘而禍亂起王公則病不足於上庶人則凍餒羸瘠於下於是焉桀紂群居而盜賊擊奪以危上矣必禽獸行虎狼貪故脯巨人而炙嬰兒矣若是則有何尤抇人之墓抉人之口而求利矣哉雖此倮而埋之猶且必抇也安得葬薶哉彼乃將食其肉而齕其骨也夫曰大古薄葬故不抇也亂今厚葬故抇也是特姦人之誤於亂說以欺愚者而潮陷之以偷取利焉夫是之謂大姦傳曰危人而自安害人而自利此之謂也子宋子曰明見侮之不辱使人不鬭人皆以見侮為辱故鬭也知見侮之為不辱則不鬭矣應之曰然則亦以人之情為不惡侮乎曰惡而不辱也曰若是則必不得所求焉凡人之鬭也必以其惡之為說非以其辱之為故也今倡優侏儒狎徒詈侮而不鬭者是豈巨知見侮之為不辱哉然而不鬭者不惡故也今人或入其央瀆竊其豬彘則援劍戟而逐之不避死傷是豈以喪豬為辱也哉然而不憚鬭者惡之故也雖以見侮為辱也不惡則不鬭雖知見侮為不辱惡之則必鬭然則鬭與不鬭邪亡於辱之與不辱也乃在於惡之與不惡也夫今子宋子不能解人之惡侮而務說人以勿辱也豈不過甚矣哉金舌弊口猶將無益也不知其無益則不知知其無益也直以欺人則不仁不仁不知辱莫大焉將以為有益於人則與無益於人也則得大辱而退耳說莫病是矣子宋子曰見侮不辱應之曰凡議必將立隆正然後可也無隆正則是非不分而辨訟不決故所聞曰天下之大隆是非之封界分職名象之所起王制是也故凡言議期命莫非以聖王為師而聖王之分榮辱是也是有兩端矣有義榮者有藝榮者有義辱者有藝辱者志意修德行厚知慮明是榮之由中出者也夫是之謂義榮爵列尊貢祿厚形藝勝上為天子諸侯下為卿相士大夫是榮之從外至者也夫是之謂藝榮流淫汙僈犯分亂理驕暴貪利是辱之由中出者也夫是之謂義辱詈侮捽搏捶笞臏腳斬斷枯磔藉靡舌𦇙是辱之由外至者也夫是之謂藝辱是榮辱之兩端也故君子可以有藝辱而不可以有義辱小人可以有藝榮而不可以有義榮有藝辱無害為堯有藝榮無害為桀義榮藝榮唯君子然後兼有之義辱藝辱唯小人然後兼有之是榮辱之分也聖王以為法士大夫以為道官人以為守百姓以成俗萬世不能易也今子宋子案不然獨詘容為己慮一朝而改之說必不行矣譬之是猶以磚塗塞江海也以僬僥而戴太山也蹎跌碎折不待頃矣二三子之善於子宋子者殆不若止之將恐得傷其體也子宋子曰人之情欲寡而皆以己之情為欲多是過也故率其群徒辨其談說明其譬稱將使人知情之欲寡也應之曰然則亦以人之情為欲目不欲綦色耳不欲綦聲口不欲綦味鼻不欲綦臭形不欲綦佚此五綦者亦以人之情為不欲乎曰人之情欲是已曰若是則說必不行矣以人之情為欲此五綦者而不欲多譬之是猶以人之情為欲富貴而不欲貨也好美而惡西施也古之人為之不然以人之情為欲多而不欲寡故賞以富厚而罰以殺損也是百王之所同也故上賢祿天下次賢祿一國下賢祿田邑願愨之民完衣食今子宋子以人之情為欲寡而不欲多也然則先王以人之所不欲者賞而以人之所欲者罰邪亂莫大焉今子宋子嚴然而好說聚人徒立師學成文典然而說不免於以至治為至亂也豈不過甚矣哉
