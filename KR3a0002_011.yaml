body:
  text: 王霸篇第十一國者天下之制利用也人主者天下之利勢也得道以持之則大安也大榮也積美之原也不得道以持之則大危也大纍也有之不如無之及其綦也索為匹夫不可得也齊湣宋獻是也故人主天下之利勢也然而不能自安也安之者必將道也故用國者義立而王信立而霸權謀立而亡三者明主之所謹擇也仁人之所務白也挈國以呼禮義而無以害之行一不義殺一無罪而得天下仁者不為也擽然扶持心國且若是其固也之所與為之者之人則舉義士也之所以為布陳於國家刑法者則舉義法也主之所極然帥群臣而首鄉之者則舉義志也如是則下仰上以義矣是綦定也綦定而國定國定而天下定仲尼無置錐之地誠義乎志意加義乎身行箸之言語濟之日不隱乎天下名垂乎後世今亦以天下之顯諸侯誠義乎志意加義乎法則度量箸之以政事案申重之以貴賤殺生使襲然終始猶一也如是則夫名聲之部發於天地之間也豈不如日月雷霆然矣哉故曰以國齊義一日而白湯武是也湯以亳武王以鄗皆百里之地也天下為一諸侯為臣通達之屬莫不從服無它故焉以濟義矣是所謂義立而王也德雖未至也義雖未濟也然而天下之理略奏矣刑賞已諾信乎天下矣臣下曉然皆知其可要也政令已陳雖覩利敗不欺其民約結已定雖覩利敗不欺其與如是則兵徑城固敵國畏之國一綦明與國信之雖末在僻陋之國威動天下五伯是也非本政教也非致隆高也非綦文理也非服人之心也鄉方略審勞佚謹畜積修戰備齺然上下相信而天下莫之敢當也故齊桓晉文楚莊吳闔閭越句踐是皆僻陋之國也威動天下強殆中國無它故焉略信也是所謂信立而霸也挈國以呼功利不務張其義齊其信唯利之求內則不憚詐其民而求小利焉外則不憚詐其與而求大利焉內不修正其所以有啖啖然常欲人之有如是則臣下百姓莫不以詐心待其上矣上詐其下下詐其上則是上下析也如是則敵國輕之與國疑之權謀日行而國不免危削綦之而亡齊閔薛公是也故用強齊非以修禮義也非以本政教也非以一天下也綿綿常以結引馳外為務故強南足以破楚西足以詘秦北足以敗燕中足以舉宋及以燕趙起而攻之若振稿然而身死國亡為天下大戮後世言惡則必稽焉是無它故焉唯其不由禮義而由權謀也三者明主之所以謹擇也而仁人之所以務白也善擇者制人不善擇者人制之國者天下之大器也重任也不可不善為擇所而後錯之錯險則危不可不善為擇道然後道之塗薉則塞危塞則亡彼國錯者非封焉之謂也何法之道誰子之與也故道王者之法與王者之人為之則亦王矣道霸者之法與霸者之人為之則亦霸矣道亡國之法與亡國之人為之則亦亡矣三者明主之所以謹擇也而仁人之所以務白也故國者重任也不以積持之則不立故國者世所以新者也是幝幝非變也改玉改行也故一朝之日也一日之人也然而厭焉有千歲之固何也曰援夫千歲之信法以持之也安與夫千歲之信士為之也人無百歲之壽而有千歲之信士何也曰以夫千歲之法自持者是乃千歲之信士矣故與積禮義之君子為之則王與端誠信全之士為之則霸與權謀傾覆之人為之則亡三者明主之所以謹擇也而仁人之所以務白也善擇之者制人不善擇之者人制之彼持國者必不可以獨也然則強固榮辱在於取相矣身能相能如是者王身不能知恐懼而求能者如是者強身不能不知恐懼而求能者安唯便僻左右親比己者之用如是者危削綦之而亡國者巨用之則大小用之則小綦大而王綦小而亡小巨分流者存巨用之者先義而後利安不恤親疏不恤貴賤唯誠能之求夫是之謂巨用之小用之者先利而後義安不恤是非不治曲直唯便辟親比己者之用夫是之謂小用之巨用之者若彼小用之者若此小巨分流者亦一若彼一若此也故曰粹而王駮而霸無一焉而亡此之謂也國無禮則不正禮之所以正國也譬之猶衡之於輕重也猶繩墨之於曲直也猶規矩之於方圓也既錯之而人莫之能誣也詩曰如霜雪之將將如日月之光明為之則存不為則亡此之謂也國危則無樂君國安則無憂民亂則國危治則國安今君人者急逐樂而緩治國豈不過甚矣哉譬之是由好聲色而恬無耳目也豈不哀哉夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚此五綦者人情之所必不免也養五綦者有具無其具則五綦者不可得而致也萬乘之國可謂廣大富厚矣加有治辨強固之道焉若是則怡愈無患難矣然後養五綦之具具也故百樂者生於治國者也憂患者生於亂國者也急逐樂而緩治國者非知樂者也故明君者必將先治其國然後百樂得其中暗君者必將荒逐樂而緩治國故憂患不可勝校也必至於身死國亡然後止也豈不哀哉將以為樂乃得憂焉將以為安乃得危焉將以為福乃得死亡焉豈不哀哉於乎君人者亦可以察若言矣故治國有道人主有職若夫貫日而治詳一日而曲別之是所使夫百吏官人為也不足以是傷遊玩安燕之樂若夫論一相以兼率之使臣下百吏莫不宿道鄉方而務是夫人主之職也若是則功一天下名配堯禹之主者守至約而詳事至佚而功垂衣裳不下簟席之上而海內之人莫不願得以為帝王夫是之謂至約樂莫大焉人主者以官人為能者也匹夫者以自能為能者也人主得使人為之匹夫則無所移之百畝一守事業窮無所移之也今以一人兼聽天下日有餘而治不足者使人為之也大有天下小有一國必自為之然後可則勞苦耗悴莫甚焉如是則雖臧獲不肯與天子易藝業以是縣天下一四海何故必自為之為之者役夫之道也墨子之説也論德使能而官施之者聖王之道也儒之所謹守也傳曰農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公總方而議則天子共己而矣出若入若天下莫不平均莫不治辨是百王之所同也而禮法之大分也百里之地可以取天下是不虛其難者在於人主之知之也取天下者非負其土地而從之之謂也道足以一人而已矣彼其人苟一則其土地且奚去我而適它故百里之地其等位爵服足以容天下之賢士矣其官職事業足以容天下之能士矣循其舊法擇其善者而明用之足以順服好利之人矣賢士一焉能士官焉好利之人服焉三者具而天下盡無有是其外矣故百里之地足以竭藝矣致忠信箸仁義足以竭人矣兩者合而天下取諸侯後同者先危詩曰自西自東自南自北無思不服一人之謂也羿蜂門者善服射者也王良造父者善服馭者也聰明君子者善服人者也人服而勢從之人不服而勢去之故王者已於服人矣故人主欲得善射射遠中微則莫若羿蜂門矣欲得善馭及速致遠則莫若使王良造父矣欲得調一天下制秦楚則莫若聰明君子矣其用知甚簡其為事不勞而功名致大甚易處而綦可樂也故明君以為寶而愚者以為難夫貴為天子富有天下名為聖王兼制人人莫得而制也是人情之所同欲也而王者兼而有是者也重色而衣之重味而食之重財物而制之合天下而君之飲食甚厚聲樂甚大臺謝甚高園囿甚廣臣使諸侯一天下是又人情之所同欲也而天子之禮制如是者也制度以陳政令以挾官人失要則死公侯失禮則幽四方之國有侈離之德則必滅名聲若日月功績如天地天下之人應之如影響是又人情之所同欲也而王者兼而有是者也故人之情口好味而臭味莫美焉耳好聲而聲樂莫大焉目好色而文章致繁婦女莫衆焉形體好佚而安重間靜莫愈焉心好利而穀祿莫厚焉合天下之所同願兼而有之睪牢天下而制之若制子孫人苟不狂惑戇陋者其誰能睹是而不樂也哉欲是之主並肩而存能建是之士不世絶千歲而不合何也曰人主不公人臣不忠也人主則外賢而偏舉人臣則爭職而妒賢是其所以不合之故也人主胡不廣焉無恤親疏無倫貴賤唯誠能之求若是則人臣輕職業讓賢而安隨其後矣如是則舜禹還至王業還起功一天下名配舜禹物由有可樂如是其美焉者乎嗚呼君人者亦可以察若言矣揚朱哭衢塗曰此夫過舉蹞步而覺跌千里者夫哀哭之此亦榮辱安危存亡之衢已此其為可哀甚於衢塗嗚呼哀哉君人者千歲而不覺也無國而不有治法無國而不有亂法無國而不有賢士無國而不有罷士無國而不有願民無國而不有悍民無國而不有美俗無國而不有惡俗兩者並行而國在上偏而國安在下偏而國危上一而王下一而亡故其法治其佐賢其民願其俗美而四者齊夫是之謂上一如是則不戰而勝不攻而得甲兵不勞而天下服故湯以亳武王以鄗皆百里之地也天下為一諸侯為臣通達之屬莫不從服無它故焉四者齊也桀紂即厚於有天下之勢索為匹夫而不可得也是無它故焉四者並亡也故百王之法不同若是所歸者一也上莫不致愛其下而制之以禮上之於下如保赤子政令制度所以接下之人百姓有不理者如豪末則雖孤獨鰥寡必不加焉故下之親上歡如父母可殺而不可使不順君臣上下貴賤長幼至于庶人莫不以是為隆正然後皆內自省以謹於分是百王之所以同也而禮法之樞要也然後農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公總方而議則天子共己而止矣出若入若天下莫不平均莫不治辨是百王之所同而禮法之大分也若夫貫日而治平權物而稱用使衣服有制宮室有度人徒有數喪祭械用皆有等宜以是周挾於萬物尺寸尋丈莫得不循乎制數度量然後行則是官人使吏之事也不足數於大君子之前故君人者立隆政本朝而當所使要百事者誠仁人也則身佚而國治功大而名美上可以王下可以霸立隆政本朝而不當所使要百事者非仁人也則身勞而國亂功廢而名辱社稷必危是人君者之樞機也故能當一人而天下取失當一人而社稷危不能當一人而能當千人百人者説無之有也既能當一人則身有何勞而為垂衣裳而天下定故湯用伊尹文王用呂尚武王用召公成王用周公旦卑者五伯齊桓公閨門之內懸樂奢泰遊抏之修於天下不見謂修然九合諸侯一匡天下為五伯長是亦無它故焉知一政於管仲也是君人者之要守也知者易為之興力而功名綦大舍是而孰足為也故古之人有大功名者必道是者也喪其國危其身者必反是者也故孔子曰知者之知固以多矣有以守少能無察乎愚者之知固以少矣有以守多能無狂乎此之謂也治國者分已定則主相臣下百吏各謹其所聞不務聽其所不聞各謹其所見不務視其所不見所聞所見誠以齊矣則雖幽間隱辟百姓莫敢不敬分安制以禮化其上是治國之徵也主道治近不治遠治明不治幽治一不治二主能治近則遠者理主能治明則幽者化主能當一則百事正夫兼聽天下日有餘而治不足者如此也是治之極也既能治近又務治遠既能治明又務見幽既能當一又務正百是過者也過猶不及也辟之是猶立直木而求其影之枉也不能治近又務治遠不能察明又務見幽不能當一又務正百是悖者也辟之是猶立枉木而求其影之直也故明主好要而暗主好詳主好要則百事詳主好詳則百事荒矣君者論一相陳一法明一指以兼覆之兼照之以觀其盛者也相者論列百官之長要百事之聽以飾朝廷臣下百吏之分度其功勞論其慶賞歲終奉其成功以效於君當則可不當則廢故君人勞於索之而休於使之用國者得百姓之力者富得百姓之死者強得百姓之譽者榮三德者具而天下歸之三德者亡而天下去之天下歸之之謂王天下去之之謂亡湯武者循其道行其義興天下同利除天下同害天下歸之故厚德音以先之明禮義以道之致忠信以愛之賞賢使能以次之爵服賞慶以申重之時其事經其任以調齊之潢然兼覆之養長之如保赤子生民則致寬使民則綦理辨政令制度所以接天下之人百姓者有非理者如豪末則雖孤獨鰥寡必不加焉是故百姓貴之如帝親之如父母為之出死斷亡而不愈者無它故焉道德誠明利澤誠厚也亂世不然汙漫突盜以先之權謀傾覆以示之俳優侏儒婦女之請謁以悖之使愚詔知使不肖臨賢生民則致貧隘使民則綦勞苦是故百姓賤之如尩惡之如鬼日欲司間而相與投藉之去遂之卒有寇難之事又望百姓之為己死不可得也説無以取之焉孔子曰審吾所以適人適人之所以來我也此之謂也傷國者何也曰以小人尚民而威以非所取於民而巧是傷國之大災也大國之主也而好見小利是傷國其於聲色臺榭園囿也愈厭而好新是傷國不好循正其所以有啖啖常欲人之有是傷國三邪者在胸中而又好以權謀傾覆之人斷事其外若是則權輕名辱社稷必危是傷國者也大國之主也不隆本行不敬舊法而好詐故若是則夫朝廷群臣亦從而成俗於不隆禮義而好傾覆也朝廷群臣之俗若是則夫衆庶百姓亦從而成俗於不隆禮義而好貪利矣君臣上下之俗莫不若是則地雖廣權必輕人雖衆兵必弱刑罰雖繁令不下通夫是之謂危國是傷國者也儒者為之不然必將曲辨朝廷必將隆禮義而審貴賤若是則士大夫莫不敄節死制者矣百官則將齊其制度重其官秩若是則百吏莫不畏法而遵繩矣關市幾而不征質律禁止而不偏如是則商賈莫不敦愨而無詐矣百工將時斬伐佻其期日而利其巧任如是則百工莫不忠信而不楛矣縣鄙將輕田野之稅省刀布之斂罕舉力役無奪農時如是則農夫莫不朴力而寡能矣士大夫務節死制然而兵徑百吏畏法循繩然後國常不亂商賈敦愨無詐則商旅安貨財通而國求給矣百工忠信而不楛則器用巧便而財不匱矣農夫朴力而寡能則上不失天時下不失地利中得人和而百事不廢是之謂政令行風俗美以守則固以征則強居則有名動則有功此儒之所謂曲辨也
